<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Main leaf gradient: purple-left to orange-right -->
    <linearGradient id="leafGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#7B2FBE"/>
      <stop offset="35%" stop-color="#C94080"/>
      <stop offset="65%" stop-color="#E8664D"/>
      <stop offset="100%" stop-color="#F5943A"/>
    </linearGradient>
    <!-- Circuit trace color -->
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Left petal (purple side) -->
  <path d="M100 20 C70 40, 35 70, 30 110 C28 130, 35 155, 55 170 C70 180, 85 178, 100 168 C85 145, 75 110, 80 75 C83 55, 90 35, 100 20Z" fill="url(#leafGrad)" opacity="0.95"/>

  <!-- Right petal (orange side) -->
  <path d="M100 20 C130 40, 165 70, 170 110 C172 130, 165 155, 145 170 C130 180, 115 178, 100 168 C115 145, 125 110, 120 75 C117 55, 110 35, 100 20Z" fill="url(#leafGrad)" opacity="0.85"/>

  <!-- Center petal overlay -->
  <path d="M100 25 C92 45, 85 75, 86 105 C87 130, 92 155, 100 170 C108 155, 113 130, 114 105 C115 75, 108 45, 100 25Z" fill="url(#leafGrad)" opacity="0.6"/>

  <!-- Circuit traces - main stem -->
  <line x1="100" y1="55" x2="100" y2="155" stroke="white" stroke-width="1.8" opacity="0.45"/>

  <!-- Circuit branch - right upper -->
  <polyline points="100,75 120,65 135,72" stroke="white" stroke-width="1.3" fill="none" opacity="0.4"/>
  <circle cx="135" cy="72" r="2.5" fill="white" opacity="0.5"/>

  <!-- Circuit branch - right middle -->
  <polyline points="100,95 118,90 130,98 142,93" stroke="white" stroke-width="1.3" fill="none" opacity="0.4"/>
  <circle cx="142" cy="93" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="118" cy="90" r="2" fill="white" opacity="0.4"/>

  <!-- Circuit branch - right lower -->
  <polyline points="100,118 115,122 125,115" stroke="white" stroke-width="1.3" fill="none" opacity="0.35"/>
  <circle cx="125" cy="115" r="2.5" fill="white" opacity="0.45"/>

  <!-- Circuit branch - left upper -->
  <polyline points="100,70 82,62 68,68" stroke="white" stroke-width="1.3" fill="none" opacity="0.4"/>
  <circle cx="68" cy="68" r="2.5" fill="white" opacity="0.5"/>

  <!-- Circuit branch - left middle -->
  <polyline points="100,100 80,96 65,102 55,97" stroke="white" stroke-width="1.3" fill="none" opacity="0.4"/>
  <circle cx="55" cy="97" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="80" cy="96" r="2" fill="white" opacity="0.4"/>

  <!-- Circuit branch - left lower -->
  <polyline points="100,125 85,130 72,124" stroke="white" stroke-width="1.3" fill="none" opacity="0.35"/>
  <circle cx="72" cy="124" r="2.5" fill="white" opacity="0.45"/>

  <!-- Circuit nodes on stem -->
  <circle cx="100" cy="75" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="100" cy="95" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="100" cy="118" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="100" cy="140" r="2.5" fill="white" opacity="0.45"/>
</svg>