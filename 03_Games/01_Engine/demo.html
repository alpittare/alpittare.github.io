<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Engine — Phase 3 Demo</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0e1a; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
    canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script src="core.js"></script>
<script src="physics.js"></script>
<script src="animation.js"></script>
<script>
'use strict';

// --- Bootstrap ---------------------------------------------------------------
const engine = new GameEngine('gameCanvas', 414, 896);
engine.debug = true;

// --- Collision system --------------------------------------------------------
const collisions = new CollisionSystem(engine);

// --- Player ------------------------------------------------------------------
const player = new Player(187, 400);
engine.addEntity(player);
collisions.register(player);

// --- Animation (Phase 3) — Procedural sprite sheet -------------------------
const SPRITE_W = 48, SPRITE_H = 64, SPRITE_COLS = 6, SPRITE_ROWS = 4;

const { canvas: spriteCanvas, sheet: spriteSheet } = ProceduralSprites.generateCharacter({
    frameW: SPRITE_W,
    frameH: SPRITE_H,
    cols: SPRITE_COLS,
    rows: SPRITE_ROWS,
    bodyColor: '#00e5ff',
    eyeColor: '#fff'
});

const animator = new AnimationController(spriteSheet);

// Define clips — row 0: idle, row 1: run, row 2: jump, row 3: fall
animator.define('idle', [0, 1, 2, 3, 4, 5], { fps: 6, loop: true });
animator.define('run',  [6, 7, 8, 9, 10, 11], { fps: 12, loop: true });
animator.define('jump', [12, 13], { fps: 6, loop: false });
animator.define('fall', [18, 19], { fps: 4, loop: true });

// Map player states → animation clips
animator.mapStates({
    idle: 'idle',
    run:  'run',
    jump: 'jump',
    fall: 'fall'
});

animator.play('idle');

// Attach to player — replaces Player.render with sprite-driven rendering
attachAnimation(player, animator);

// --- Platforms ---------------------------------------------------------------
function addPlatform(x, y, w, h, color) {
    const p = new Platform(x, y, w, h, color);
    engine.addEntity(p);
    collisions.register(p);
    return p;
}

// Ground
addPlatform(0, 780, 414, 116, '#1a3d1a');

// Floating platforms (level layout)
addPlatform(50, 660, 120, 14, '#2a4a6a');
addPlatform(244, 580, 130, 14, '#2a4a6a');
addPlatform(80, 490, 100, 14, '#2a4a6a');
addPlatform(280, 410, 110, 14, '#2a4a6a');
addPlatform(140, 330, 140, 14, '#2a4a6a');

// --- Jump event — dust particles --------------------------------------------
const dustParticles = [];

engine.on('jump', (data) => {
    const e = data.entity;
    const cx = e.x + e.width / 2;
    const cy = e.y + e.height;
    for (let i = 0; i < 6; i++) {
        dustParticles.push({
            x: cx + (Math.random() - 0.5) * 20,
            y: cy,
            vx: (Math.random() - 0.5) * 80,
            vy: -Math.random() * 60 - 20,
            life: 0.3 + Math.random() * 0.2,
            maxLife: 0.3 + Math.random() * 0.2,
            size: 2 + Math.random() * 3
        });
    }
});

// --- Game state ---------------------------------------------------------------
engine.registerState('playing', {
    enter() {
        player.x = 187;
        player.y = 400;
        player.vx = 0;
        player.vy = 0;
    },
    fixedUpdate(dt) {
        // Run collision detection after all entities moved
        collisions.update();

        // Kill plane — respawn if fallen off screen
        if (player.y > engine.HEIGHT + 100) {
            player.x = 187;
            player.y = 200;
            player.vx = 0;
            player.vy = 0;
        }
    },
    update(dt) {
        // Keyboard polling — only apply if no active touch input
        if (Object.keys(activeTouches).length === 0) {
            player.moveDir = 0;
            if (keys['ArrowLeft'] || keys['KeyA']) player.moveDir = -1;
            if (keys['ArrowRight'] || keys['KeyD']) player.moveDir = 1;
        }

        // Update dust particles
        for (let i = dustParticles.length - 1; i >= 0; i--) {
            const p = dustParticles[i];
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vy += 200 * dt; // particle gravity
            p.life -= dt;
            if (p.life <= 0) dustParticles.splice(i, 1);
        }
    },
    render(ctx) {
        // Background gradient
        const grad = ctx.createLinearGradient(0, 0, 0, engine.HEIGHT);
        grad.addColorStop(0, '#050510');
        grad.addColorStop(0.6, '#0c1020');
        grad.addColorStop(1, '#0a1a0a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, engine.WIDTH, engine.HEIGHT);

        // Dust particles
        for (const p of dustParticles) {
            const alpha = p.life / p.maxLife;
            ctx.fillStyle = `rgba(200, 220, 255, ${alpha * 0.6})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
            ctx.fill();
        }

        // HUD
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.font = '11px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('← → Move  |  SPACE Jump  |  Release early = short hop', engine.WIDTH / 2, 24);
        ctx.fillText('Double jump | ` = debug | Animated sprites (Phase 3)', engine.WIDTH / 2, 40);
        ctx.textAlign = 'left';

        // Player state HUD
        ctx.fillStyle = '#00e5ff';
        ctx.font = '10px monospace';
        const clipName = player.animator?.currentClip?.name || 'none';
        const frameIdx = player.animator?.currentFrame || 0;
        ctx.fillText(`vy: ${player.vy.toFixed(0)}  grounded: ${player.grounded}  state: ${player.state}  anim: ${clipName}[${frameIdx}]`, 8, engine.HEIGHT - 8);
    }
});

// --- Input -------------------------------------------------------------------
const keys = {};

document.addEventListener('keydown', (e) => {
    if (keys[e.code]) return; // prevent repeat
    keys[e.code] = true;

    // Backquote (`) for debug toggle, avoiding conflict with movement keys
    if (e.code === 'Backquote' && !e.repeat) engine.debug = !engine.debug;
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
        e.preventDefault();
        player.jump.requestJump();
    }
});

document.addEventListener('keyup', (e) => {
    keys[e.code] = false;
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
        player.jump.releaseJump();
    }
});

// --- Touch input (mobile) ----------------------------------------------------
let activeTouches = {};

document.addEventListener('touchstart', (e) => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
        const pos = engine.screenToWorld(touch.clientX, touch.clientY);
        activeTouches[touch.identifier] = pos;

        // Top third of screen = jump
        if (pos.y < engine.HEIGHT * 0.4) {
            player.jump.requestJump();
        }
        // Bottom — left/right movement
        else if (pos.x < engine.WIDTH / 2) {
            player.moveDir = -1;
        } else {
            player.moveDir = 1;
        }
    }
}, { passive: false });

document.addEventListener('touchend', (e) => {
    for (const touch of e.changedTouches) {
        delete activeTouches[touch.identifier];
    }
    if (Object.keys(activeTouches).length === 0) {
        player.moveDir = 0;
    }
    player.jump.releaseJump();
});

// --- Start -------------------------------------------------------------------
engine.switchState('playing');
engine.start();

</script>
</body>
</html>
