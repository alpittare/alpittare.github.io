<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Engine — Cricket Physics Demo</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0e1a; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
    canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script src="core.js"></script>
<script src="physics.js"></script>
<script src="cricket-physics.js"></script>
<script>
'use strict';

// --- Bootstrap ---------------------------------------------------------------
const engine = new GameEngine('gameCanvas', 414, 896);
engine.debug = true;

// --- Cricket Systems ---------------------------------------------------------
const delivery = new DeliverySystem({ difficulty: 'medium', level: 1 });
const batting = new BattingSystem();
const innings = new InningsManager({ overs: 5, wickets: 3 });
const surge = new SurgeSystem();
const ball = new CricketBall();
const swipeDetector = new SwipeDetector(engine.canvas);

engine.addEntity(ball);

// --- Batsman (visual only) ---------------------------------------------------
const batsmanX = CricketConfig.field.batsmanX;
const batsmanY = CricketConfig.field.batsmanY;
let batSwingAngle = 0;
let batSwinging = false;
let lastHitResult = null;
let resultTimer = 0;
let autoDeliverTimer = 0;

// --- Swipe handling ----------------------------------------------------------
swipeDetector.onSwipe = function(swipe) {
    if (!ball.active || ball.hit) return;
    if (!ball.isInHitZone(batsmanX, batsmanY)) return;

    // Process the hit
    const hitResult = batting.processHit(ball, swipe);
    ball.applyHit(hitResult);
    batSwinging = true;
    batSwingAngle = 0;

    // Record in innings
    const status = innings.recordBall(hitResult);

    // Update surge
    if (hitResult.runs > 0) {
        surge.addProgress(hitResult.runs);
        batting.surgeMultiplier = surge.multiplier;
    }

    // Display result
    lastHitResult = hitResult;
    resultTimer = 120; // ~2 seconds

    if (status.inningsComplete) {
        autoDeliverTimer = -1; // stop auto delivery
    } else {
        autoDeliverTimer = 90; // next ball in 1.5s
    }
};

// --- Bowl a new delivery -----------------------------------------------------
function bowlNext() {
    const d = delivery.generate();
    ball.bowl(d);
    lastHitResult = null;
}

// --- Game state ---------------------------------------------------------------
engine.registerState('playing', {
    enter() {
        innings.reset();
        surge.reset();
        batting.surgeMultiplier = 1.0;
        bowlNext();
    },
    fixedUpdate(dt) {
        // Auto-deliver next ball
        if (autoDeliverTimer > 0) {
            autoDeliverTimer--;
            if (autoDeliverTimer === 0) bowlNext();
        }

        // Ball passed batsman (missed/bowled)
        if (ball.active && !ball.hit && ball.isPastBatsman()) {
            ball.active = false;
            const missResult = { runs: 0, wasCaught: false, quality: 'miss', shotType: ShotTypes.DEFEND };
            const status = innings.recordBall(missResult);
            lastHitResult = { runs: 0, quality: 'miss', shotType: ShotTypes.DEFEND };
            resultTimer = 90;

            if (!status.inningsComplete) {
                autoDeliverTimer = 60;
            } else {
                autoDeliverTimer = -1;
            }
        }

        // Ball off screen after hit
        if (ball.active && ball.hit && ball.isOffScreen(engine.WIDTH, engine.HEIGHT)) {
            ball.active = false;
        }
    },
    update(dt) {
        // Bat swing animation
        if (batSwinging) {
            batSwingAngle += 0.15;
            if (batSwingAngle > Math.PI * 0.8) {
                batSwinging = false;
                batSwingAngle = 0;
            }
        }

        // Result timer
        if (resultTimer > 0) resultTimer--;
    },
    render(ctx) {
        // --- Background: cricket pitch ---
        const grad = ctx.createLinearGradient(0, 0, 0, engine.HEIGHT);
        grad.addColorStop(0, '#1a4a1a');
        grad.addColorStop(0.5, '#0d2d0d');
        grad.addColorStop(1, '#1a3a1a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, engine.WIDTH, engine.HEIGHT);

        // Pitch strip
        const pitchX = engine.WIDTH / 2 - CricketConfig.field.pitchWidth / 2;
        ctx.fillStyle = '#c4a265';
        ctx.fillRect(pitchX, CricketConfig.field.pitchTop - 20,
            CricketConfig.field.pitchWidth, CricketConfig.field.pitchBottom - CricketConfig.field.pitchTop + 40);

        // Crease lines
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(pitchX - 10, CricketConfig.field.pitchTop);
        ctx.lineTo(pitchX + CricketConfig.field.pitchWidth + 10, CricketConfig.field.pitchTop);
        ctx.moveTo(pitchX - 10, CricketConfig.field.batsmanY);
        ctx.lineTo(pitchX + CricketConfig.field.pitchWidth + 10, CricketConfig.field.batsmanY);
        ctx.stroke();

        // Stumps
        const stumpX = CricketConfig.field.stumpX;
        ctx.fillStyle = '#ddd';
        for (let i = -1; i <= 1; i++) {
            ctx.fillRect(stumpX + i * 8 - 2, batsmanY - 5, 4, 30);
        }
        // Bails
        ctx.fillStyle = '#ff0';
        ctx.fillRect(stumpX - 12, batsmanY - 7, 24, 3);

        // --- Batsman ---
        ctx.save();
        ctx.translate(batsmanX, batsmanY - 30);

        // Body
        ctx.fillStyle = '#fff';
        ctx.fillRect(-10, -20, 20, 40);

        // Bat
        ctx.save();
        ctx.translate(12, 0);
        ctx.rotate(-0.3 + batSwingAngle);
        ctx.fillStyle = '#d4a04a';
        ctx.fillRect(0, -3, 35, 6);
        ctx.fillStyle = '#c49030';
        ctx.fillRect(25, -5, 12, 10);
        ctx.restore();

        // Helmet
        ctx.fillStyle = '#336';
        ctx.beginPath();
        ctx.arc(0, -25, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // --- Bowler (at top, visual only) ---
        ctx.fillStyle = '#eee';
        ctx.fillRect(engine.WIDTH / 2 - 8, CricketConfig.field.pitchTop - 60, 16, 35);
        ctx.fillStyle = '#336';
        ctx.beginPath();
        ctx.arc(engine.WIDTH / 2, CricketConfig.field.pitchTop - 68, 8, 0, Math.PI * 2);
        ctx.fill();

        // --- HUD ---
        // Score
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, engine.WIDTH, 55);

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 22px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(innings.scoreString, engine.WIDTH / 2, 28);

        ctx.font = '13px monospace';
        ctx.fillStyle = '#aaa';
        ctx.fillText(`Overs: ${innings.overString}  |  4s: ${innings.fours}  6s: ${innings.sixes}`, engine.WIDTH / 2, 46);

        // Surge bar
        if (surge.progress > 0) {
            const barW = 200;
            const barX = (engine.WIDTH - barW) / 2;
            const barY = 58;
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(barX, barY, barW, 8);
            ctx.fillStyle = surge.activeTier ? surge.activeTier.color : '#27ae60';
            ctx.fillRect(barX, barY, barW * surge.progress, 8);
            if (surge.activeTier) {
                ctx.fillStyle = surge.activeTier.color;
                ctx.font = '10px monospace';
                ctx.fillText(`${surge.activeTier.name} x${surge.activeTier.multiplier}`, engine.WIDTH / 2, barY + 20);
            }
        }

        // Hit result popup
        if (lastHitResult && resultTimer > 0) {
            const alpha = Math.min(1, resultTimer / 30);
            ctx.globalAlpha = alpha;
            ctx.font = 'bold 48px monospace';
            ctx.textAlign = 'center';

            let resultText, resultColor;
            if (lastHitResult.wasCaught) {
                resultText = 'CAUGHT!';
                resultColor = '#ff3333';
            } else if (lastHitResult.runs >= 6) {
                resultText = 'SIX!';
                resultColor = '#ffd700';
            } else if (lastHitResult.runs >= 4) {
                resultText = 'FOUR!';
                resultColor = '#00ff88';
            } else if (lastHitResult.runs > 0) {
                resultText = `${lastHitResult.runs} RUN${lastHitResult.runs > 1 ? 'S' : ''}`;
                resultColor = '#88ccff';
            } else if (lastHitResult.quality === 'miss') {
                resultText = 'DOT';
                resultColor = '#888';
            } else {
                resultText = 'DOT';
                resultColor = '#888';
            }

            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillText(resultText, engine.WIDTH / 2 + 2, 442);

            ctx.fillStyle = resultColor;
            ctx.fillText(resultText, engine.WIDTH / 2, 440);

            // Shot type + quality
            if (lastHitResult.shotType && lastHitResult.quality !== 'miss') {
                ctx.font = '16px monospace';
                ctx.fillStyle = '#ccc';
                ctx.fillText(`${lastHitResult.shotType.name} — ${lastHitResult.quality}`, engine.WIDTH / 2, 470);
            }
            ctx.globalAlpha = 1;
        }

        // Innings complete
        if (innings.wickets >= innings.maxWickets || innings.oversCompleted >= innings.maxOvers) {
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(0, 350, engine.WIDTH, 150);
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 28px monospace';
            ctx.fillText('INNINGS COMPLETE', engine.WIDTH / 2, 400);
            ctx.fillStyle = '#fff';
            ctx.font = '18px monospace';
            ctx.fillText(`Final: ${innings.scoreString} in ${innings.overString} overs`, engine.WIDTH / 2, 440);
            ctx.fillStyle = '#aaa';
            ctx.font = '14px monospace';
            ctx.fillText('Tap to restart', engine.WIDTH / 2, 475);
        }

        ctx.textAlign = 'left';

        // Debug: delivery info
        if (engine.debug && ball.delivery) {
            ctx.fillStyle = '#0f0';
            ctx.font = '10px monospace';
            ctx.fillText(`type: ${ball.delivery.ballType.name}  len: ${ball.delivery.length.key}  line: ${ball.delivery.line.key}`, 8, engine.HEIGHT - 24);
            ctx.fillText(`speed: ${ball.delivery.speed.toFixed(1)}  swing: ${ball.delivery.swing.toFixed(2)}`, 8, engine.HEIGHT - 10);
        }

        // Instruction
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.font = '11px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('SWIPE to bat when ball reaches you | Angle = shot type', engine.WIDTH / 2, engine.HEIGHT - 40);
        ctx.textAlign = 'left';
    }
});

// --- Restart on tap after innings complete ---
engine.canvas.addEventListener('click', () => {
    if (innings.wickets >= innings.maxWickets || innings.oversCompleted >= innings.maxOvers) {
        engine.switchState('playing');
    }
});

// --- Start -------------------------------------------------------------------
engine.switchState('playing');
engine.start();

</script>
</body>
</html>
