<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Engine — AI Phase 4 Demo (Full Stack + Claude API)</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0e1a; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: monospace; }
    canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script src="core.js"></script>
<script src="physics.js"></script>
<script src="cricket-physics.js"></script>
<script src="football-physics.js"></script>
<script src="ai-engine.js"></script>
<script>
'use strict';

// =============================================================================
// AI ENGINE DEMO — Phase 4: Full AI Stack (Rules + Learning + Prediction + API)
// Two panels: Cricket (left tap) | Football (right tap)
// Press 'C' to toggle Claude API mock mode
// =============================================================================

const engine = new GameEngine('gameCanvas', 414, 896);
const ai = new AIEngine({ difficulty: 'medium' });
attachAI(engine, ai);

// --- Phase 4: Claude API Advisor (Mock Mode for Demo) -----------------------
// In production, pass a real API key. Here we use mock mode.
const claudeAdvisor = new ClaudeAIAdvisor({
    apiKey: '', // Empty = disabled by default
    enabled: false,
});
attachClaudeAdvisor(ai, claudeAdvisor);

// Mock mode: simulate API responses with realistic delay
let mockMode = false;
let mockResponses = {};

function enableMockMode() {
    mockMode = true;
    claudeAdvisor.enabled = true;
    claudeAdvisor.apiKey = 'mock-key';
    // Override _callAPI with mock
    claudeAdvisor._callAPI = async function(prompt) {
        // Simulate network delay (200-800ms)
        await new Promise(r => setTimeout(r, 200 + Math.random() * 600));
        // Generate mock response based on prompt content
        let text = '{}';
        if (prompt.includes('cricket')) {
            const types = ['fast','spin','yorker','bouncer'];
            const strats = ['wicket_hunting','defensive','balanced','aggressive'];
            text = JSON.stringify({
                bowling_priority: strats[Math.floor(Math.random() * strats.length)],
                recommended_type: types[Math.floor(Math.random() * types.length)],
                recommended_length: ['short','good','yorker'][Math.floor(Math.random() * 3)],
                aggression_mod: 0.8 + Math.random() * 0.5,
                reasoning: 'Target weakness with variation',
            });
        } else if (prompt.includes('football') || prompt.includes('penalty')) {
            text = JSON.stringify({
                dive_bias: ['left','center','right'][Math.floor(Math.random() * 3)],
                confidence: 0.3 + Math.random() * 0.6,
                expect_switch: Math.random() > 0.5,
                keeper_aggression: 0.5 + Math.random(),
                reasoning: 'Counter predicted direction',
            });
        } else if (prompt.includes('balance') || prompt.includes('difficulty')) {
            text = JSON.stringify({
                suggested_difficulty: 0.5 + Math.random() * 0.8,
                speed_mod: 0.8 + Math.random() * 0.3,
                accuracy_mod: 0.6 + Math.random() * 0.4,
                should_ease: Math.random() > 0.6,
                reasoning: 'Keep player in flow zone',
            });
        } else if (prompt.includes('commentator') || prompt.includes('commentary')) {
            const lines = [
                'What a shot! The crowd goes wild!',
                'Textbook technique right there.',
                'The keeper had no chance!',
                'Edge of the seat stuff!',
                'Bold strategy, lets see if it pays off',
                'Absolutely brilliant placement!',
            ];
            text = JSON.stringify({
                line: lines[Math.floor(Math.random() * lines.length)],
                emotion: ['excited','tense','funny','dramatic'][Math.floor(Math.random() * 4)],
            });
        }
        return { content: [{ text }] };
    };
}

function disableMockMode() {
    mockMode = false;
    claudeAdvisor.enabled = false;
    claudeAdvisor.clearCache();
}

// --- State -------------------------------------------------------------------
let mode = 'cricket';        // 'cricket' | 'football'
let difficulty = 'medium';
const difficultyOrder = ['easy', 'medium', 'hard', 'legend'];
let diffIndex = 1;

// Cricket state
let cricketInput = null;
let cricketResult = null;
let bowlResult = null;
let cricketLog = [];

// Football state
let footballInput = null;
let footballResult = null;
let kickerResult = null;
let footballLog = [];

// Perf
let perfLog = [];

// Phase 3 snapshot: capture Bayes/Sequence state after each decision
let cricketBayesSnap = null;   // { predictions, topAction, confidence }
let cricketSeqSnap = null;     // { predictions, pattern, topState }
let fbBayesSnap = null;
let fbSeqSnap = null;

// --- Generate random cricket delivery ----------------------------------------
function randomCricketInput() {
    const types = ['fast', 'medium', 'spin', 'yorker', 'bouncer', 'slower'];
    const lengths = ['short', 'good', 'yorker'];
    const lines = ['left', 'center', 'right'];
    const timings = ['early', 'perfect', 'late', null];
    return {
        ball_type: types[Math.floor(Math.random() * types.length)],
        length: lengths[Math.floor(Math.random() * lengths.length)],
        line: lines[Math.floor(Math.random() * lines.length)],
        timing: timings[Math.floor(Math.random() * timings.length)],
    };
}

// --- Generate random football input ------------------------------------------
function randomFootballInput() {
    const dirs = ['left', 'center', 'right'];
    return {
        direction: dirs[Math.floor(Math.random() * dirs.length)],
        power: 0.3 + Math.random() * 0.7,
        history: footballLog.slice(-10).map(l => l.input?.direction).filter(Boolean),
    };
}

// --- Simulated game context --------------------------------------------------
let simRuns = 0, simWickets = 0, simOvers = 0;

// --- Run cricket AI ----------------------------------------------------------
function runCricketDecision() {
    cricketInput = randomCricketInput();
    simOvers += 0.1;

    // Batting decision
    const t0 = performance.now();
    cricketResult = ai.cricket.selectShot(cricketInput, { runs: simRuns, wickets: simWickets, overs: simOvers, target: 120 });
    const batMs = performance.now() - t0;

    // Bowling decision
    const t1 = performance.now();
    bowlResult = ai.cricket.selectDelivery({ runs: simRuns, wickets: simWickets, overs: simOvers, target: 120, maxOvers: 10 });
    const bowlMs = performance.now() - t1;

    // Simulate result
    const simRun = Math.random() < 0.3 ? 0 : (Math.random() < 0.5 ? Math.floor(Math.random() * 3) + 1 : (Math.random() < 0.7 ? 4 : 6));
    const simCaught = simRun === 0 && Math.random() < 0.08;
    simRuns += simRun;
    if (simCaught) simWickets++;

    // Phase 3: Use recordBattingEvent (feeds Bayes + Sequence + AdaptiveDifficulty + PlayerModel)
    ai.cricket.recordBattingEvent(cricketInput, {
        action: cricketResult.action,
        quality: cricketInput.timing || 'good',
        runs: simRun,
        wasCaught: simCaught,
    });
    ai.playerModel.recordBowling(bowlResult, { runs: simRun, wasCaught: simCaught });

    // Snapshot Phase 3 state for visualization
    const evidenceKey = AIUtil.hash3(cricketInput.ball_type, cricketInput.length, cricketInput.line);
    cricketBayesSnap = ai.cricketBayes.predict(evidenceKey);
    cricketSeqSnap = {
        prediction: ai.cricketSeq.predict(),
        pattern: ai.cricketSeq.detectPattern(2, 2),
        history: ai.cricketSeq.historyLength,
    };

    cricketLog.unshift({
        input: cricketInput,
        bat: cricketResult,
        bowl: bowlResult,
        simRuns: simRun,
        batMs: batMs.toFixed(3),
        bowlMs: bowlMs.toFixed(3),
    });
    if (cricketLog.length > 8) cricketLog.pop();

    perfLog.push(batMs + bowlMs);
    if (perfLog.length > 60) perfLog.shift();

    // Phase 4: Request commentary for notable events
    if (ai.requestCommentary && (simRun >= 4 || simCaught)) {
        const event = simCaught ? 'wicket' : (simRun === 6 ? 'six' : 'boundary');
        ai.requestCommentary(event, 'cricket', `${cricketResult.action} for ${simRun}`, `${simRuns}/${simWickets}`);
    }
}

// --- Run football AI ---------------------------------------------------------
function runFootballDecision() {
    footballInput = randomFootballInput();

    // Keeper decision
    const t0 = performance.now();
    footballResult = ai.football.decideKeeper(footballInput);
    const keepMs = performance.now() - t0;

    // Kicker decision
    const t1 = performance.now();
    kickerResult = ai.football.selectShot({ round: footballLog.length + 1 });
    const kickMs = performance.now() - t1;

    // Simulate result
    const saved = footballResult.action.includes(footballInput.direction) && Math.random() < 0.5;
    const simResult = saved ? 'save' : 'goal';

    // Record (Phase 3: now feeds Bayes + Sequence + AdaptiveDifficulty)
    ai.football.recordShot(footballInput.direction, footballInput.power, {
        round: footballLog.length + 1,
        maxRounds: 10,
    });
    ai.football.recordResult(simResult);

    // Snapshot Phase 3 state
    fbBayesSnap = ai.fbBayes.predict('mid|med');
    fbSeqSnap = {
        prediction: ai.fbSeq.predict(),
        pattern: ai.fbSeq.detectPattern(2, 2),
        history: ai.fbSeq.historyLength,
    };

    footballLog.unshift({
        input: footballInput,
        keeper: footballResult,
        kicker: kickerResult,
        result: simResult,
        keepMs: keepMs.toFixed(3),
        kickMs: kickMs.toFixed(3),
    });
    if (footballLog.length > 8) footballLog.pop();

    perfLog.push(keepMs + kickMs);
    if (perfLog.length > 60) perfLog.shift();

    // Phase 4: Request commentary for goals
    if (ai.requestCommentary && simResult === 'goal') {
        ai.requestCommentary('goal', 'football', `${footballInput.direction} shot`, `Round ${footballLog.length}`);
    }
}

// --- Render ------------------------------------------------------------------
engine.registerState('demo', {
    enter() {
        runCricketDecision();
        runFootballDecision();
    },
    update(dt) {},
    render(ctx) {
        // Background
        ctx.fillStyle = '#0a0e1a';
        ctx.fillRect(0, 0, engine.WIDTH, engine.HEIGHT);

        // Header
        ctx.fillStyle = '#ff6600';
        ctx.font = 'bold 14px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('AI ENGINE — Phase 4 (Full Stack + Claude)', engine.WIDTH / 2, 24);

        // Mode / Difficulty tabs
        ctx.font = '12px monospace';
        ctx.fillStyle = mode === 'cricket' ? '#00e5ff' : '#555';
        ctx.fillText('[ CRICKET ]', engine.WIDTH * 0.25, 46);
        ctx.fillStyle = mode === 'football' ? '#00e5ff' : '#555';
        ctx.fillText('[ FOOTBALL ]', engine.WIDTH * 0.75, 46);

        ctx.fillStyle = '#888';
        ctx.fillText(`Difficulty: ${difficulty.toUpperCase()}`, engine.WIDTH / 2, 64);

        const yStart = 80;

        if (mode === 'cricket') {
            renderCricket(ctx, yStart);
        } else {
            renderFootball(ctx, yStart);
        }

        // Adaptive difficulty panel (shared, bottom area)
        renderAdaptiveDifficulty(ctx, 680);

        // Claude API panel
        renderClaudePanel(ctx, 745);

        // Perf bar (bottom)
        renderPerf(ctx);

        // Instructions
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.font = '9px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('TAP=decide | L/R=mode | U/D=diff | SPACE=run | B=batch | C=claude', engine.WIDTH / 2, engine.HEIGHT - 8);
        ctx.textAlign = 'left';
    }
});

function renderCricket(ctx, y) {
    ctx.textAlign = 'left';
    const x = 12;
    const w = engine.WIDTH - 24;

    // Input box
    ctx.fillStyle = '#1a1e2a';
    ctx.fillRect(x, y, w, 56);
    ctx.strokeStyle = '#333';
    ctx.strokeRect(x, y, w, 56);

    ctx.fillStyle = '#888';
    ctx.font = '9px monospace';
    ctx.fillText('DELIVERY INPUT:', x + 6, y + 12);
    ctx.fillStyle = '#ccc';
    ctx.font = '11px monospace';
    if (cricketInput) {
        ctx.fillText(`Type: ${cricketInput.ball_type}  Len: ${cricketInput.length}  Line: ${cricketInput.line}  T: ${cricketInput.timing || '-'}`, x + 6, y + 30);
    }

    // Batting result
    y += 60;
    ctx.fillStyle = '#1a2a1a';
    ctx.fillRect(x, y, w, 44);
    ctx.strokeStyle = '#2a4a2a';
    ctx.strokeRect(x, y, w, 44);

    ctx.fillStyle = '#4a4';
    ctx.font = '9px monospace';
    ctx.fillText('BAT AI:', x + 6, y + 12);
    if (cricketResult) {
        ctx.fillStyle = '#0f0';
        ctx.font = 'bold 15px monospace';
        ctx.fillText(`${cricketResult.action}`, x + 60, y + 13);
        ctx.fillStyle = '#8c8';
        ctx.font = '9px monospace';
        ctx.fillText(`conf: ${(cricketResult.confidence * 100).toFixed(0)}%  angle: ${(cricketResult.swipeAngle * 180 / Math.PI).toFixed(0)}°`, x + 6, y + 30);
    }

    // Bowling result
    y += 48;
    ctx.fillStyle = '#2a1a1a';
    ctx.fillRect(x, y, w, 44);
    ctx.strokeStyle = '#4a2a2a';
    ctx.strokeRect(x, y, w, 44);

    ctx.fillStyle = '#a44';
    ctx.font = '9px monospace';
    ctx.fillText('BOWL AI:', x + 6, y + 12);
    if (bowlResult) {
        ctx.fillStyle = '#f66';
        ctx.font = 'bold 12px monospace';
        ctx.fillText(`${bowlResult.type} | ${bowlResult.length} | ${bowlResult.line}`, x + 70, y + 13);
        ctx.fillStyle = '#c88';
        ctx.font = '9px monospace';
        ctx.fillText(`strategy: ${bowlResult.strategy}`, x + 6, y + 30);
    }

    // --- PHASE 3: BAYES POSTERIOR PANEL ---
    y += 50;
    ctx.fillStyle = '#1a1a2a';
    ctx.fillRect(x, y, w, 80);
    ctx.strokeStyle = '#ff6600';
    ctx.strokeRect(x, y, w, 80);

    ctx.fillStyle = '#ff6600';
    ctx.font = 'bold 9px monospace';
    ctx.fillText('BAYES POSTERIOR:', x + 6, y + 12);

    if (cricketBayesSnap && cricketBayesSnap.predictions.length > 0) {
        // Confidence meter
        ctx.fillStyle = '#f80';
        ctx.font = '9px monospace';
        ctx.fillText(`conf: ${(cricketBayesSnap.confidence * 100).toFixed(0)}%  obs: ${ai.cricketBayes.totalObservations}`, x + 140, y + 12);

        // Bar chart of posteriors (top 6)
        const preds = cricketBayesSnap.predictions.slice(0, 6);
        const barMaxW = w - 80;
        const barH = 8;
        let by = y + 20;
        for (const p of preds) {
            // Label
            ctx.fillStyle = '#aaa';
            ctx.font = '8px monospace';
            ctx.fillText(p.action.padEnd(7), x + 6, by + 7);
            // Bar
            const barW = Math.max(p.probability * barMaxW, 1);
            const hue = p.action === cricketBayesSnap.topAction ? '#ff8800' : '#555';
            ctx.fillStyle = hue;
            ctx.fillRect(x + 55, by, barW, barH);
            // Percentage
            ctx.fillStyle = '#888';
            ctx.fillText(`${(p.probability * 100).toFixed(0)}%`, x + 58 + barW, by + 7);
            by += barH + 2;
        }
    } else {
        ctx.fillStyle = '#555';
        ctx.font = '9px monospace';
        ctx.fillText('Gathering observations...', x + 6, y + 30);
    }

    // --- PHASE 3: SEQUENCE PREDICTOR PANEL ---
    y += 84;
    ctx.fillStyle = '#1a2a1a';
    ctx.fillRect(x, y, w, 55);
    ctx.strokeStyle = '#00cc88';
    ctx.strokeRect(x, y, w, 55);

    ctx.fillStyle = '#00cc88';
    ctx.font = 'bold 9px monospace';
    ctx.fillText('MARKOV SEQUENCE:', x + 6, y + 12);

    if (cricketSeqSnap) {
        const sp = cricketSeqSnap.prediction;
        const pat = cricketSeqSnap.pattern;

        ctx.fillStyle = '#8fc';
        ctx.font = '9px monospace';
        ctx.fillText(`history: ${cricketSeqSnap.history}`, x + 140, y + 12);

        if (sp.topState) {
            ctx.fillStyle = '#0f8';
            ctx.font = 'bold 11px monospace';
            ctx.fillText(`Next: ${sp.topState} (${(sp.topProb * 100).toFixed(0)}%)`, x + 6, y + 28);

            // Show top-3 transitions
            ctx.fillStyle = '#8c8';
            ctx.font = '8px monospace';
            const top3 = sp.predictions.slice(0, 3).map(p => `${p.state}:${(p.probability * 100).toFixed(0)}%`).join('  ');
            ctx.fillText(top3, x + 6, y + 42);
        } else {
            ctx.fillStyle = '#555';
            ctx.fillText('Building transition model...', x + 6, y + 28);
        }

        // Pattern detection
        if (pat.pattern) {
            ctx.fillStyle = '#ff0';
            ctx.font = 'bold 9px monospace';
            ctx.fillText(`PATTERN: [${pat.pattern.join('→')}] x${pat.repetitions}`, x + 200, y + 28);
        }
    }

    // --- PHASE 2: PLAYER MODEL (compact) ---
    y += 59;
    ctx.fillStyle = '#1a1a2a';
    ctx.fillRect(x, y, w, 70);
    ctx.strokeStyle = '#33f';
    ctx.strokeRect(x, y, w, 70);

    ctx.fillStyle = '#66f';
    ctx.font = '9px monospace';
    ctx.fillText('PLAYER MODEL:', x + 6, y + 12);

    const pm = ai.playerModel;
    const summary = pm.summary;

    ctx.fillStyle = '#aaf';
    ctx.fillText(`Events: ${summary.events}  Aggr: ${summary.aggression}`, x + 110, y + 12);

    // Weakness
    const weak = summary.weakness;
    ctx.fillStyle = weak ? '#f88' : '#666';
    ctx.fillText(`Weak: ${weak ? weak.type + ' (' + (weak.missRate * 100).toFixed(0) + '%)' : '...'}`, x + 6, y + 28);

    // Timing bar
    const totalTiming = Object.values(pm.timingDist).reduce((s, v) => s + v, 0);
    if (totalTiming > 0) {
        const barX = x + 200, barY2 = y + 20, barW = 170, barH = 8;
        const colors = { perfect: '#0f0', good: '#8f0', edge: '#f80', miss: '#f00' };
        let bx = barX;
        for (const q of ['perfect', 'good', 'edge', 'miss']) {
            const frac = pm.timingDist[q] / totalTiming;
            ctx.fillStyle = colors[q];
            ctx.fillRect(bx, barY2, barW * frac, barH);
            bx += barW * frac;
        }
        ctx.fillStyle = '#666';
        ctx.font = '7px monospace';
        ctx.fillText('perf  good  edge  miss', barX, barY2 + 16);
    }

    // Shot prefs (compact row)
    const types = ['fast', 'spin', 'bouncer'];
    ctx.fillStyle = '#8a8';
    ctx.font = '8px monospace';
    let px = x + 6;
    for (const t of types) {
        const pref = pm.preferredShot(t);
        ctx.fillStyle = pref ? '#afa' : '#444';
        ctx.fillText(`${t}:${pref ? pref.shot : '?'}`, px, y + 46);
        px += 90;
    }

    // Best bowl
    const bestBowl = pm.bestBowlType();
    ctx.fillStyle = '#fa8';
    ctx.font = '8px monospace';
    ctx.fillText(`Bowl: ${bestBowl ? bestBowl.type + '(eco:' + bestBowl.economy.toFixed(1) + ')' : '...'}`, x + 6, y + 60);

    // Decision log
    y += 74;
    ctx.fillStyle = '#888';
    ctx.font = '9px monospace';
    ctx.fillText('LOG:', x, y);
    y += 12;

    for (let i = 0; i < cricketLog.length && i < 5; i++) {
        const entry = cricketLog[i];
        const alpha = 1 - i * 0.15;
        ctx.fillStyle = `rgba(180,180,180,${alpha})`;
        ctx.font = '9px monospace';
        ctx.fillText(
            `${entry.input.ball_type}/${entry.input.length} → ${entry.bat.action} r:${entry.simRuns || 0} | ${entry.bowl.type} [${entry.batMs}ms]`,
            x, y + i * 12
        );
    }
}

function renderFootball(ctx, y) {
    ctx.textAlign = 'left';
    const x = 12;
    const w = engine.WIDTH - 24;

    // Input box
    ctx.fillStyle = '#1a1e2a';
    ctx.fillRect(x, y, w, 44);
    ctx.strokeStyle = '#333';
    ctx.strokeRect(x, y, w, 44);

    ctx.fillStyle = '#888';
    ctx.font = '9px monospace';
    ctx.fillText('SHOT INPUT:', x + 6, y + 12);
    ctx.fillStyle = '#ccc';
    if (footballInput) {
        ctx.fillText(`Dir: ${footballInput.direction}  Power: ${(footballInput.power * 100).toFixed(0)}%  Hist: [${footballInput.history.slice(-4).join(',')}]`, x + 6, y + 30);
    }

    // Keeper result
    y += 48;
    ctx.fillStyle = '#1a2a1a';
    ctx.fillRect(x, y, w, 55);
    ctx.strokeStyle = '#2a4a2a';
    ctx.strokeRect(x, y, w, 55);

    ctx.fillStyle = '#4a4';
    ctx.font = '9px monospace';
    ctx.fillText('KEEPER AI:', x + 6, y + 12);
    if (footballResult) {
        ctx.fillStyle = '#0f0';
        ctx.font = 'bold 14px monospace';
        ctx.fillText(`${footballResult.action}`, x + 80, y + 13);
        ctx.fillStyle = '#8c8';
        ctx.font = '9px monospace';
        ctx.fillText(`conf: ${(footballResult.confidence * 100).toFixed(0)}%  react: ${footballResult.reactionMs}ms  zone: ${footballResult.shotZone}`, x + 6, y + 30);
        ctx.fillText(`anticipated: ${footballResult.anticipated}  speed: ${footballResult.diveSpeed.toFixed(1)}`, x + 6, y + 44);
    }

    // Goal zone visualization
    y += 60;
    const goalW = 200, goalH = 40;
    const goalX = (engine.WIDTH - goalW) / 2;
    ctx.fillStyle = '#111';
    ctx.fillRect(goalX, y, goalW, goalH);
    ctx.strokeStyle = '#fff';
    ctx.strokeRect(goalX, y, goalW, goalH);

    // Zone lines
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    for (let i = 1; i < 5; i++) {
        const zx = goalX + (goalW / 5) * i;
        ctx.beginPath(); ctx.moveTo(zx, y); ctx.lineTo(zx, y + goalH); ctx.stroke();
    }

    // Shot + Dive indicators
    if (footballInput) {
        const shotXMap = { left: goalX + goalW * 0.2, center: goalX + goalW * 0.5, right: goalX + goalW * 0.8 };
        const shotX = shotXMap[footballInput.direction] || goalX + goalW * 0.5;
        ctx.fillStyle = '#ff3333';
        ctx.beginPath(); ctx.arc(shotX, y + goalH / 2, 5, 0, Math.PI * 2); ctx.fill();
    }
    if (footballResult) {
        const diveXMap = { dive_left: goalX + goalW * 0.2, dive_center: goalX + goalW * 0.5, dive_right: goalX + goalW * 0.8 };
        const diveX = diveXMap[footballResult.action] || goalX + goalW * 0.5;
        ctx.fillStyle = '#00ff88';
        ctx.beginPath(); ctx.arc(diveX, y + goalH / 2, 5, 0, Math.PI * 2); ctx.fill();
    }
    ctx.textAlign = 'left';

    // --- PHASE 3: BAYES POSTERIOR PANEL ---
    y += goalH + 14;
    ctx.fillStyle = '#1a1a2a';
    ctx.fillRect(x, y, w, 65);
    ctx.strokeStyle = '#ff6600';
    ctx.strokeRect(x, y, w, 65);

    ctx.fillStyle = '#ff6600';
    ctx.font = 'bold 9px monospace';
    ctx.fillText('BAYES POSTERIOR (Direction):', x + 6, y + 12);

    if (fbBayesSnap && fbBayesSnap.predictions.length > 0) {
        ctx.fillStyle = '#f80';
        ctx.font = '9px monospace';
        ctx.fillText(`conf: ${(fbBayesSnap.confidence * 100).toFixed(0)}%  obs: ${ai.fbBayes.totalObservations}`, x + 220, y + 12);

        // Horizontal bar for L/C/R posteriors
        const barX = x + 6, barY = y + 22, barMaxW = w - 12, barH = 14;
        const dirColors = { left: '#3388ff', center: '#88ff88', right: '#ff8833' };
        let bx = barX;
        for (const p of fbBayesSnap.predictions) {
            const barW = Math.max(p.probability * barMaxW, 2);
            ctx.fillStyle = dirColors[p.action] || '#555';
            ctx.fillRect(bx, barY, barW, barH);
            // Label inside
            ctx.fillStyle = '#000';
            ctx.font = 'bold 9px monospace';
            if (barW > 30) ctx.fillText(`${p.action} ${(p.probability * 100).toFixed(0)}%`, bx + 3, barY + 10);
            bx += barW + 1;
        }

        // Top prediction highlight
        ctx.fillStyle = '#ffa';
        ctx.font = 'bold 10px monospace';
        ctx.fillText(`Predicted: ${fbBayesSnap.topAction}`, x + 6, y + 52);
    } else {
        ctx.fillStyle = '#555';
        ctx.font = '9px monospace';
        ctx.fillText('Gathering observations...', x + 6, y + 30);
    }

    // --- PHASE 3: SEQUENCE PREDICTOR PANEL ---
    y += 69;
    ctx.fillStyle = '#1a2a1a';
    ctx.fillRect(x, y, w, 50);
    ctx.strokeStyle = '#00cc88';
    ctx.strokeRect(x, y, w, 50);

    ctx.fillStyle = '#00cc88';
    ctx.font = 'bold 9px monospace';
    ctx.fillText('MARKOV CHAIN:', x + 6, y + 12);

    if (fbSeqSnap) {
        const sp = fbSeqSnap.prediction;
        const pat = fbSeqSnap.pattern;

        ctx.fillStyle = '#8fc';
        ctx.font = '9px monospace';
        ctx.fillText(`hist: ${fbSeqSnap.history}`, x + 120, y + 12);

        if (sp.topState) {
            ctx.fillStyle = '#0f8';
            ctx.font = 'bold 11px monospace';
            ctx.fillText(`Next: ${sp.topState} (${(sp.topProb * 100).toFixed(0)}%)`, x + 6, y + 28);

            // Transitions
            ctx.fillStyle = '#8c8';
            ctx.font = '8px monospace';
            const top3 = sp.predictions.slice(0, 3).map(p => `${p.state}:${(p.probability * 100).toFixed(0)}%`).join('  ');
            ctx.fillText(top3, x + 6, y + 42);
        } else {
            ctx.fillStyle = '#555';
            ctx.fillText('Building transitions...', x + 6, y + 28);
        }

        // Pattern
        if (pat.pattern) {
            ctx.fillStyle = '#ff0';
            ctx.font = 'bold 9px monospace';
            ctx.fillText(`PATTERN: [${pat.pattern.join('→')}] x${pat.repetitions}`, x + 200, y + 28);
        }
    }

    // --- PHASE 2: FOOTBALL LEARNING (compact) ---
    y += 54;
    ctx.fillStyle = '#1a1a2a';
    ctx.fillRect(x, y, w, 55);
    ctx.strokeStyle = '#33f';
    ctx.strokeRect(x, y, w, 55);

    ctx.fillStyle = '#66f';
    ctx.font = '9px monospace';
    ctx.fillText('PLAYER MODEL:', x + 6, y + 12);

    const pm = ai.playerModel;
    const pred = pm.predictDirection();
    const switchP = pm.switchAfterSaveProbability();

    ctx.fillStyle = '#aaf';
    ctx.fillText(`FB: ${pm.summary.fbSamples}  Pred: ${pred.direction}(${(pred.confidence * 100).toFixed(0)}%)  Switch: ${(switchP * 100).toFixed(0)}%`, x + 110, y + 12);

    // Direction bar
    const totalFB = pm.fbDirection.left + pm.fbDirection.center + pm.fbDirection.right;
    if (totalFB > 0) {
        const barX2 = x + 6, barY2 = y + 22, barW2 = w - 12, barH2 = 10;
        const dirColors = { left: '#3388ff', center: '#88ff88', right: '#ff8833' };
        let bx2 = barX2;
        for (const d of ['left', 'center', 'right']) {
            const frac = pm.fbDirection[d] / totalFB;
            ctx.fillStyle = dirColors[d];
            ctx.fillRect(bx2, barY2, barW2 * frac, barH2);
            bx2 += barW2 * frac;
        }
        ctx.fillStyle = '#888';
        ctx.font = '7px monospace';
        ctx.fillText(`L:${pm.fbDirection.left} C:${pm.fbDirection.center} R:${pm.fbDirection.right}  Streak:${pm.fbStreakDir||'-'}x${pm.fbStreakLen}`, barX2, barY2 + 20);
    }

    // Decision log
    y += 59;
    ctx.fillStyle = '#888';
    ctx.font = '9px monospace';
    ctx.fillText('LOG:', x, y);
    y += 12;

    for (let i = 0; i < footballLog.length && i < 4; i++) {
        const entry = footballLog[i];
        const alpha = 1 - i * 0.15;
        ctx.fillStyle = `rgba(180,180,180,${alpha})`;
        ctx.font = '9px monospace';
        const res = entry.result || '?';
        ctx.fillText(
            `${entry.input.direction}/${(entry.input.power * 100).toFixed(0)}% → ${entry.keeper.action} [${res}] ${entry.keepMs}ms`,
            x, y + i * 12
        );
    }
}

// --- ADAPTIVE DIFFICULTY PANEL (shared) --------------------------------------
function renderAdaptiveDifficulty(ctx, y) {
    const x = 12;
    const w = engine.WIDTH - 24;

    ctx.fillStyle = '#1a0a2a';
    ctx.fillRect(x, y, w, 60);
    ctx.strokeStyle = '#c040ff';
    ctx.strokeRect(x, y, w, 60);

    ctx.fillStyle = '#c040ff';
    ctx.font = 'bold 9px monospace';
    ctx.fillText('ADAPTIVE DIFFICULTY:', x + 6, y + 12);

    const ad = ai.difficulty_adaptive;
    const s = ad.summary;

    // Difficulty meter bar
    const meterX = x + 6, meterY = y + 20, meterW = w - 12, meterH = 10;
    // Background gradient
    const grad = ctx.createLinearGradient(meterX, 0, meterX + meterW, 0);
    grad.addColorStop(0, '#00cc44');
    grad.addColorStop(0.35, '#ffcc00');
    grad.addColorStop(0.65, '#ff6600');
    grad.addColorStop(1, '#ff0033');
    ctx.fillStyle = '#222';
    ctx.fillRect(meterX, meterY, meterW, meterH);
    ctx.fillStyle = grad;
    const fillW = ((ad.currentDifficulty - ad.minDifficulty) / (ad.maxDifficulty - ad.minDifficulty)) * meterW;
    ctx.fillRect(meterX, meterY, Math.max(fillW, 2), meterH);

    // Difficulty indicator
    const indX = meterX + fillW;
    ctx.fillStyle = '#fff';
    ctx.fillRect(indX - 1, meterY - 2, 3, meterH + 4);

    // Labels
    ctx.fillStyle = '#c8a';
    ctx.font = '9px monospace';
    ctx.fillText(`${s.label} (${s.difficulty})`, x + 6, y + 44);
    ctx.fillText(`WinRate: ${s.winRate} (recent: ${s.recentWinRate})`, x + 140, y + 44);
    ctx.fillText(`Streak: ${s.streak}  Events: ${s.events}`, x + 6, y + 56);

    // Scaling values
    if (ad._totalEvents >= 5) {
        const sc = ad.getScaling();
        ctx.fillStyle = '#888';
        ctx.font = '8px monospace';
        ctx.fillText(`spd:${sc.speedMul.toFixed(2)} acc:${sc.accuracyMul.toFixed(2)} react:${sc.reactionMul.toFixed(2)} aggr:${sc.aggressionMul.toFixed(2)}`, x + 140, y + 56);
    }
}

// --- CLAUDE API PANEL --------------------------------------------------------
function renderClaudePanel(ctx, y) {
    const x = 12;
    const w = engine.WIDTH - 24;

    ctx.fillStyle = '#0a1a2a';
    ctx.fillRect(x, y, w, 65);
    ctx.strokeStyle = mockMode ? '#00ccff' : '#333';
    ctx.strokeRect(x, y, w, 65);

    ctx.fillStyle = mockMode ? '#00ccff' : '#555';
    ctx.font = 'bold 9px monospace';
    ctx.fillText(`CLAUDE API [${mockMode ? 'MOCK ON' : 'OFF'}]  Press C to toggle`, x + 6, y + 12);

    if (mockMode) {
        const stats = claudeAdvisor.stats;
        ctx.fillStyle = '#8cf';
        ctx.font = '8px monospace';
        ctx.fillText(`Reqs: ${stats.totalRequests}  Cached: ${stats.totalCacheHits}  Errors: ${stats.totalErrors}  Queue: ${stats.queueDepth}`, x + 6, y + 26);
        ctx.fillText(`Circuit: ${stats.circuitOpen ? 'OPEN (blocked)' : 'CLOSED (ok)'}  Cache: ${stats.cacheSize} items  Inflight: ${stats.inflight}`, x + 6, y + 38);

        // Show latest advice
        const cricketAdvice = claudeAdvisor.getAdvice('cricket_strategy');
        const fbAdvice = claudeAdvisor.getAdvice('football_strategy');
        const commentary = ai.getCommentary ? ai.getCommentary() : null;

        ctx.fillStyle = '#adf';
        ctx.font = '8px monospace';
        if (mode === 'cricket' && cricketAdvice) {
            ctx.fillText(`Advice: ${cricketAdvice.bowling_priority} → ${cricketAdvice.recommended_type} (aggr:${cricketAdvice.aggression_mod?.toFixed(1)})`, x + 6, y + 52);
        } else if (mode === 'football' && fbAdvice) {
            ctx.fillText(`Advice: dive ${fbAdvice.dive_bias} (conf:${fbAdvice.confidence?.toFixed(1)}) switch:${fbAdvice.expect_switch}`, x + 6, y + 52);
        } else if (commentary) {
            ctx.fillStyle = '#ff8';
            ctx.fillText(`"${commentary.line}"`, x + 6, y + 52);
        } else {
            ctx.fillStyle = '#555';
            ctx.fillText('Awaiting first advice response...', x + 6, y + 52);
        }
    } else {
        ctx.fillStyle = '#444';
        ctx.font = '8px monospace';
        ctx.fillText('Claude API disabled. Press C to enable mock mode for testing.', x + 6, y + 28);
        ctx.fillText('In production: pass apiKey to ClaudeAIAdvisor constructor.', x + 6, y + 42);
        ctx.fillText('Game runs fully on Phases 1-3 (local AI) with zero degradation.', x + 6, y + 56);
    }
}

function renderPerf(ctx) {
    const barY = engine.HEIGHT - 42;
    const barH = 20;
    const barW = engine.WIDTH - 24;
    const x = 12;

    ctx.fillStyle = '#111';
    ctx.fillRect(x, barY, barW, barH);

    // Perf bars
    if (perfLog.length > 0) {
        const maxMs = 3;
        for (let i = 0; i < perfLog.length; i++) {
            const ms = perfLog[i];
            const h = Math.min(ms / maxMs, 1) * barH;
            const bx = x + (i / 60) * barW;
            const bw = Math.max(barW / 60 - 1, 1);
            ctx.fillStyle = ms > 2 ? '#ff3333' : (ms > 1 ? '#ffcc00' : '#00cc44');
            ctx.fillRect(bx, barY + barH - h, bw, h);
        }
    }

    // Budget line
    const budgetY = barY + barH - (2 / 3) * barH;
    ctx.strokeStyle = 'rgba(255,0,0,0.4)';
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(x, budgetY); ctx.lineTo(x + barW, budgetY); ctx.stroke();
    ctx.setLineDash([]);

    // Stats text
    const stats = ai.stats;
    const p3 = ai.phase3Stats;
    ctx.fillStyle = '#888';
    ctx.font = '8px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`AI: avg ${stats.avgMs}ms  peak ${stats.peakMs}ms | Bayes:${p3.cricketBayes}+${p3.fbBayes}  Seq:${p3.cricketSeq}+${p3.fbSeq}`, x, barY - 4);
}

// --- Input -------------------------------------------------------------------
engine.canvas.addEventListener('click', (e) => {
    const rect = engine.canvas.getBoundingClientRect();
    const clickX = (e.clientX - rect.left) / rect.width * engine.WIDTH;

    if (clickX < engine.WIDTH / 2) {
        if (mode !== 'cricket') { mode = 'cricket'; return; }
        runCricketDecision();
    } else {
        if (mode !== 'football') { mode = 'football'; return; }
        runFootballDecision();
    }
});

document.addEventListener('keydown', (e) => {
    if (e.code === 'ArrowLeft') { mode = 'cricket'; }
    else if (e.code === 'ArrowRight') { mode = 'football'; }
    else if (e.code === 'ArrowUp') {
        diffIndex = Math.min(diffIndex + 1, difficultyOrder.length - 1);
        difficulty = difficultyOrder[diffIndex];
        ai.setDifficulty(difficulty);
    }
    else if (e.code === 'ArrowDown') {
        diffIndex = Math.max(diffIndex - 1, 0);
        difficulty = difficultyOrder[diffIndex];
        ai.setDifficulty(difficulty);
    }
    else if (e.code === 'Space') {
        e.preventDefault();
        if (mode === 'cricket') runCricketDecision();
        else runFootballDecision();
    }
    else if (e.code === 'KeyC') {
        // Toggle Claude API mock mode
        if (mockMode) disableMockMode();
        else enableMockMode();
    }
    else if (e.code === 'KeyB') {
        // Batch: run 20 decisions quickly to populate models
        for (let i = 0; i < 20; i++) {
            runCricketDecision();
            runFootballDecision();
        }
    }
    else if (e.code === 'Backquote') {
        engine.debug = !engine.debug;
    }
});

// --- Start -------------------------------------------------------------------
engine.switchState('demo');
engine.start();

</script>
