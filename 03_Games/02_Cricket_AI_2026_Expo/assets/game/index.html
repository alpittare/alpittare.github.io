                    this.indicatorTimer++;

                    if (this.y >= this.deliveryY - 20) {
                        this.deliver();
                    }
                } else if (this.state === 'delivering') {
                    // Bowling arm windmill animation
                    this.armPhase += 0.12;
                    this.stateTimer++;

                    if (this.stateTimer > 20) {
                        this.state = 'returning';
                        this.stateTimer = 0;
                    }
                } else if (this.state === 'returning') {
                    // Walk back to mark
                    this.y -= 1.5;
                    this.legPhase += 0.1;
                    this.stateTimer++;

                    if (this.y <= this.restY) {
                        this.y = this.restY;
                        this.state = 'idle';
                    }
                }
            }

            render() {
                const sx = cameraShakeX || 0;
                const sy = cameraShakeY || 0;
                const x = this.x + sx;
                const y = this.y + sy;
                const scale = 0.65;

                // Subtle shadow beneath bowler
                ctx.fillStyle = 'rgba(0, 0, 0, 0.32)';
                ctx.beginPath();
                ctx.ellipse(x, y + 32, 20, 4.5, 0, 0, Math.PI * 2);
                ctx.fill();

                // Legs with running animation (more pronounced swing)
                const legSwing = this.state === 'running' ? Math.sin(this.legPhase) * 10 : 0;
                ctx.fillStyle = '#ffffff'; // white trousers
                ctx.fillRect(x - 8, y + 20 + legSwing, 7, 18);
                ctx.fillRect(x + 1, y + 20 - legSwing, 7, 18);

                // Shoes
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(x - 8, y + 38 + legSwing, 7, 4);
                ctx.fillRect(x + 1, y + 38 - legSwing, 7, 4);

                // Jersey (maroon/red)
                ctx.fillStyle = '#8B0000';
                ctx.fillRect(x - 12, y + 5, 24, 15);

                // Arms — depends on state
                ctx.strokeStyle = '#d4a574';
                ctx.lineWidth = 3;

                if (this.state === 'delivering') {
                    const dt = this.deliveryType || 'fast';
                    const isSpin = (dt === 'spin' || dt === 'slower');
                    const isBouncer = (dt === 'bouncer');

                    if (isSpin) {
                        // Spinner: high loopy arc — arm goes up and over slowly
                        const armAngle = this.armPhase * Math.PI * 0.8; // slower arc
                        const armX = x - 12 + Math.sin(armAngle) * 22; // wider arc
                        const armY = y + 2 - Math.abs(Math.cos(armAngle)) * 24; // higher reach
                        ctx.beginPath();
                        ctx.moveTo(x - 12, y + 8);
                        ctx.lineTo(armX, armY);
                        ctx.stroke();
                        // Flicking wrist indicator — small circle at wrist
                        if (this.stateTimer < 10) {
                            ctx.fillStyle = this.deliveryColor || '#aa44ff';
                            ctx.beginPath();
                            ctx.arc(armX, armY, 4, 0, Math.PI * 2);
                            ctx.fill();
                            // Spin flick lines
                            const flickAngle = this.armPhase * 6;
                            ctx.strokeStyle = this.deliveryColor || '#aa44ff';
                            ctx.lineWidth = 1.5;
                            for (let fi = 0; fi < 3; fi++) {
                                const fa = flickAngle + fi * (Math.PI * 2 / 3);
                                ctx.beginPath();
                                ctx.moveTo(armX + Math.cos(fa) * 5, armY + Math.sin(fa) * 5);
                                ctx.lineTo(armX + Math.cos(fa) * 9, armY + Math.sin(fa) * 9);
                                ctx.stroke();
                            }
                        }
                    } else if (isBouncer) {
                        // Bouncer: short-pitched — arm comes over fast, stops high
                        const armAngle = Math.min(this.armPhase * Math.PI * 1.3, Math.PI * 0.7);
                        const armX = x - 12 + Math.sin(armAngle) * 16;
                        const armY = y + 5 - Math.cos(armAngle) * 20;
                        ctx.beginPath();
                        ctx.moveTo(x - 12, y + 8);
                        ctx.lineTo(armX, armY);
                        ctx.stroke();
                        if (this.stateTimer < 8) {
                            ctx.fillStyle = this.deliveryColor || '#44ff44';
                            ctx.beginPath();
                            ctx.arc(armX, armY, 4, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    } else {
                        // Pace/Yorker/Fast/Medium: standard windmill
                        const armAngle = this.armPhase * Math.PI;
                        const armX = x - 12 + Math.sin(armAngle) * 18;
                        const armY = y + 5 + Math.cos(armAngle) * 18;
                        ctx.beginPath();
                        ctx.moveTo(x - 12, y + 8);
                        ctx.lineTo(armX, armY);
                        ctx.stroke();
                        if (this.stateTimer < 8) {
                            ctx.fillStyle = this.deliveryColor || '#d63031';
                            ctx.beginPath();
                            ctx.arc(armX, armY, 4, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }

                    // Other arm follows through
                    ctx.beginPath();
                    ctx.moveTo(x + 12, y + 8);
                    ctx.lineTo(x + 20, y + 18);
                    ctx.stroke();
                } else if (this.state === 'running') {
                    // Arms pumping while running — speed varies by delivery type
                    const armSwing = Math.sin(this.legPhase) * 12;
                    const isSpin = (this.deliveryType === 'spin' || this.deliveryType === 'slower');
                    ctx.beginPath();
                    ctx.moveTo(x - 12, y + 8);
                    ctx.lineTo(x - 20, y + 8 - armSwing * (isSpin ? 0.6 : 1));
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x + 12, y + 8);
                    ctx.lineTo(x + 20, y + 8 + armSwing * (isSpin ? 0.6 : 1));
                    ctx.stroke();
                } else {
                    // Idle stance — raised bowling arm
                    ctx.beginPath();
                    ctx.moveTo(x - 12, y + 8);
                    ctx.lineTo(x - 20, y - 8);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x + 12, y + 8);
                    ctx.lineTo(x + 18, y + 15);
                    ctx.stroke();
                }

                // Face
                ctx.fillStyle = '#d4a574';
                ctx.fillRect(x - 6, y - 2, 12, 8);

                // Head/hair with better shape
                ctx.fillStyle = '#2d2d2d';
                ctx.beginPath();
                ctx.arc(x, y - 5, 7.5, 0, Math.PI * 2);
                ctx.fill();

                // Hair highlight
                ctx.fillStyle = 'rgba(100, 100, 100, 0.15)';
                ctx.beginPath();
                ctx.arc(x - 2, y - 7, 2.5, 0, Math.PI * 2);
                ctx.fill();

                // Running action detail: show lean
                if (this.state === 'running') {
                    ctx.save();
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x + 2, y + 10);
                    ctx.stroke();
                    ctx.restore();
                }

                // === DELIVERY TYPE INDICATOR (shown during run-up) ===
                if (this.state === 'running' && this.deliveryLabel) {
                    const indicatorAlpha = Math.min(1, this.indicatorTimer / 10); // fade in
                    const bobY = Math.sin(this.indicatorTimer * 0.15) * 2; // gentle bob
                    ctx.save();
                    ctx.globalAlpha = indicatorAlpha * 0.95;

                    // Glowing background pill
                    const labelW = ctx.measureText(this.deliveryLabel).width || 40;
                    const pillW = labelW + 30;
                    const pillH = 22;
                    const pillX = x;
                    const pillY = y - 35 + bobY;

                    // Glow behind pill
                    ctx.shadowColor = this.deliveryColor || '#fff';
                    ctx.shadowBlur = 12;
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.beginPath();
                    ctx.roundRect(pillX - pillW / 2, pillY - pillH / 2, pillW, pillH, 11);
                    ctx.fill();

                    // Colored border
                    ctx.strokeStyle = this.deliveryColor || '#fff';
                    ctx.lineWidth = 1.5;
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.roundRect(pillX - pillW / 2, pillY - pillH / 2, pillW, pillH, 11);
                    ctx.stroke();

                    // Icon + Label text
                    ctx.font = 'bold 11px "Segoe UI", Arial, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = this.deliveryColor || '#fff';
                    ctx.fillText(`${this.deliveryIcon} ${this.deliveryLabel}`, pillX, pillY);

                    ctx.restore();
                }
            }
        }

        const bowler = new Bowler();

        // ============================================================================
        // UMPIRE — stands at bowler's end, signals decisions
        // ============================================================================

        class Umpire {
            constructor() {
                // Position: off to the left of the pitch at bowler's end
                this.x = DESIGN.width / 2 - 55;
                this.y = DESIGN.bowlersCreaseY + 10;
                this.scale = 0.55;

                // Signal state
                this.signal = 'idle';       // idle, six, four, wide, noball, out, not_out
                this.signalTimer = 0;
                this.signalDuration = 80;   // frames to hold signal
            }

            // Trigger a signal animation
            triggerSignal(type) {
                this.signal = type;
                this.signalTimer = 0;
                this.signalDuration = (type === 'six' || type === 'out') ? 90 : 70;
            }

            update() {
                if (this.signal !== 'idle') {
                    this.signalTimer++;
                    if (this.signalTimer >= this.signalDuration) {
                        this.signal = 'idle';
                        this.signalTimer = 0;
                    }
                }
            }

            render() {
                const sx = cameraShakeX || 0;
                const sy = cameraShakeY || 0;
                const x = this.x + sx;
                const y = this.y + sy;
                const s = this.scale;
                const sig = this.signal;
                const t = this.signalTimer;

                // Animation progress 0→1
                const prog = Math.min(1, t / 12); // ramp up over 12 frames

                ctx.save();

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.25)';
                ctx.beginPath();
                ctx.ellipse(x, y + 30 * s, 14 * s, 3.5 * s, 0, 0, Math.PI * 2);
                ctx.fill();

                // Legs (standing still, slightly apart)
                ctx.fillStyle = '#1a1a2e';  // dark trousers
                ctx.fillRect(x - 7 * s, y + 16 * s, 6 * s, 16 * s);
                ctx.fillRect(x + 1 * s, y + 16 * s, 6 * s, 16 * s);

                // Shoes
                ctx.fillStyle = '#111';
                ctx.fillRect(x - 7 * s, y + 32 * s, 7 * s, 3 * s);
                ctx.fillRect(x + 1 * s, y + 32 * s, 7 * s, 3 * s);

                // Jacket / blazer (umpire coat — dark navy/black)
                ctx.fillStyle = '#1c1c3a';
                ctx.fillRect(x - 10 * s, y + 2 * s, 20 * s, 15 * s);

                // White collar detail
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(x - 4 * s, y + 1 * s, 8 * s, 3 * s);

                // === ARMS — depend on signal ===
                ctx.strokeStyle = '#c4956a'; // skin
                ctx.lineWidth = 2.5 * s;
                ctx.lineCap = 'round';

                if (sig === 'six' && prog > 0) {
                    // BOTH arms raised straight up
                    const raise = prog * 22 * s;
                    ctx.beginPath();
                    ctx.moveTo(x - 10 * s, y + 6 * s);
                    ctx.lineTo(x - 12 * s, y - raise);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x + 10 * s, y + 6 * s);
                    ctx.lineTo(x + 12 * s, y - raise);
                    ctx.stroke();
                    // Hands (circles at tips)
                    ctx.fillStyle = '#c4956a';
                    ctx.beginPath(); ctx.arc(x - 12 * s, y - raise, 2 * s, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(x + 12 * s, y - raise, 2 * s, 0, Math.PI * 2); ctx.fill();

                } else if (sig === 'four' && prog > 0) {
                    // One arm waves side to side (horizontal sweep)
                    const wave = Math.sin(t * 0.25) * 18 * s * prog;
                    // Right arm waves
                    ctx.beginPath();
                    ctx.moveTo(x + 10 * s, y + 6 * s);
                    ctx.lineTo(x + 20 * s + wave, y + 2 * s);
                    ctx.stroke();
                    ctx.fillStyle = '#c4956a';
                    ctx.beginPath(); ctx.arc(x + 20 * s + wave, y + 2 * s, 2 * s, 0, Math.PI * 2); ctx.fill();
                    // Left arm at side
                    ctx.beginPath();
                    ctx.moveTo(x - 10 * s, y + 6 * s);
                    ctx.lineTo(x - 14 * s, y + 16 * s);
                    ctx.stroke();

                } else if (sig === 'wide' && prog > 0) {
                    // Both arms stretched out horizontally
                    const spread = prog * 22 * s;
                    ctx.beginPath();
                    ctx.moveTo(x - 10 * s, y + 6 * s);
                    ctx.lineTo(x - 10 * s - spread, y + 4 * s);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x + 10 * s, y + 6 * s);
                    ctx.lineTo(x + 10 * s + spread, y + 4 * s);
                    ctx.stroke();
                    ctx.fillStyle = '#c4956a';
                    ctx.beginPath(); ctx.arc(x - 10 * s - spread, y + 4 * s, 2 * s, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(x + 10 * s + spread, y + 4 * s, 2 * s, 0, Math.PI * 2); ctx.fill();

                } else if (sig === 'noball' && prog > 0) {
                    // One arm extended out, other arm touches elbow (bent arm signal)
                    const extend = prog * 20 * s;
                    // Right arm out
                    ctx.beginPath();
                    ctx.moveTo(x + 10 * s, y + 6 * s);
                    ctx.lineTo(x + 10 * s + extend, y + 2 * s);
                    ctx.stroke();
                    // Left arm bent touching right elbow
                    ctx.beginPath();
                    ctx.moveTo(x - 10 * s, y + 6 * s);
                    ctx.lineTo(x - 2 * s, y - 2 * s);
                    ctx.lineTo(x + 6 * s, y + 2 * s);
                    ctx.stroke();

                } else if (sig === 'out' && prog > 0) {
                    // RIGHT hand raised, index finger pointing up
                    const raise = prog * 26 * s;
                    ctx.beginPath();
                    ctx.moveTo(x + 10 * s, y + 6 * s);
                    ctx.lineTo(x + 8 * s, y - raise);
                    ctx.stroke();
                    // Finger pointing up (small line above hand)
                    ctx.strokeStyle = '#c4956a';
                    ctx.lineWidth = 1.5 * s;
                    ctx.beginPath();
                    ctx.moveTo(x + 8 * s, y - raise);
                    ctx.lineTo(x + 8 * s, y - raise - 5 * s);
                    ctx.stroke();
                    ctx.lineWidth = 2.5 * s;
                    // Left arm at side
                    ctx.beginPath();
                    ctx.moveTo(x - 10 * s, y + 6 * s);
                    ctx.lineTo(x - 14 * s, y + 16 * s);
                    ctx.stroke();

                } else if (sig === 'not_out' && prog > 0) {
                    // Both arms crossed in front (not out signal)
                    const sweep = prog * 16 * s;
                    ctx.beginPath();
                    ctx.moveTo(x - 10 * s, y + 6 * s);
                    ctx.lineTo(x + sweep, y + 2 * s);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x + 10 * s, y + 6 * s);
                    ctx.lineTo(x - sweep, y + 2 * s);
                    ctx.stroke();

                } else {
                    // Idle: hands behind back
                    ctx.beginPath();
                    ctx.moveTo(x - 10 * s, y + 6 * s);
                    ctx.lineTo(x - 6 * s, y + 14 * s);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x + 10 * s, y + 6 * s);
                    ctx.lineTo(x + 6 * s, y + 14 * s);
                    ctx.stroke();
                }

                // Face
                ctx.fillStyle = '#c4956a';
                ctx.fillRect(x - 5 * s, y - 3 * s, 10 * s, 7 * s);

                // Hat (wide-brimmed umpire hat — white/cream)
                ctx.fillStyle = '#f0ead6';
                // Brim
                ctx.fillRect(x - 10 * s, y - 7 * s, 20 * s, 3 * s);
                // Crown
                ctx.fillStyle = '#e8e0c8';
                ctx.fillRect(x - 7 * s, y - 12 * s, 14 * s, 6 * s);
                // Hat band
                ctx.fillStyle = '#1c1c3a';
                ctx.fillRect(x - 7 * s, y - 7.5 * s, 14 * s, 1.5 * s);

                // Sunglasses
                ctx.fillStyle = '#111';
                ctx.fillRect(x - 4 * s, y - 2 * s, 3.5 * s, 2.5 * s);
                ctx.fillRect(x + 0.5 * s, y - 2 * s, 3.5 * s, 2.5 * s);

                ctx.restore();
            }
        }

        const umpire = new Umpire();

        // ============================================================================
        // BOWLER'S END STUMPS (small, at the far end of pitch)
        // ============================================================================

        class BowlerStumps {
            constructor() {
                this.x = DESIGN.width / 2;
                this.y = DESIGN.bowlersCreaseY + 25;
                this.stumpWidth = 2;
                this.stumpHeight = 14; // small (perspective — far away)
                this.stumpGap = 3;
                this.totalWidth = 3 * this.stumpWidth + 2 * this.stumpGap;
            }

            render() {
                const sx = cameraShakeX || 0;
                const sy = cameraShakeY || 0;
                const baseX = this.x - this.totalWidth / 2 + sx;
                const baseY = this.y + sy;

                for (let i = 0; i < 3; i++) {
                    const stumpX = baseX + i * (this.stumpWidth + this.stumpGap);

                    // Stump shadow
                    ctx.fillStyle = 'rgba(0,0,0,0.15)';
                    ctx.fillRect(stumpX + 0.5, baseY + this.stumpHeight, this.stumpWidth, 1.5);

                    // Stump body
                    ctx.fillStyle = '#c4a265';
                    ctx.fillRect(stumpX, baseY, this.stumpWidth, this.stumpHeight);

                    // Highlight
                    ctx.fillStyle = '#d4b87a';
                    ctx.fillRect(stumpX, baseY, 0.5, this.stumpHeight);
                }

                // Bails
                ctx.fillStyle = '#e8d5a0';
                ctx.fillRect(baseX + 0.5, baseY - 1.5, this.stumpWidth + this.stumpGap + 1, 1.5);
                ctx.fillRect(baseX + this.stumpWidth + this.stumpGap + 0.5, baseY - 1.5, this.stumpWidth + this.stumpGap + 1, 1.5);
            }
        }

        const bowlerStumps = new BowlerStumps();

        // ============================================================================
        // STUMPS (behind batsman)
        // ============================================================================

        class Stumps {
            constructor() {
                // Stumps position: behind batsman (below on screen = further from bowler)
                this.x = DESIGN.width / 2;
                this.y = DESIGN.batsmansCreaseY + 65; // well behind batsman's stance
                this.stumpWidth = 4;
                this.stumpHeight = 30;
                this.stumpGap = 6;       // gap between stumps
                this.totalWidth = 3 * this.stumpWidth + 2 * this.stumpGap; // ~24px

                // Hitbox for collision: the area the ball must pass through
                this.hitboxLeft = this.x - this.totalWidth / 2 - 3;
                this.hitboxRight = this.x + this.totalWidth / 2 + 3;
                this.hitboxTop = this.y - 8;
                this.hitboxBottom = this.y + this.stumpHeight + 8;

                // Scatter animation state
                this.scattered = false;
                this.scatterTimer = 0;
                this.stumpPieces = []; // animated pieces when hit
            }

            // Check if a ball at (bx, by) hits the stumps
            checkCollision(bx, by, radius) {
                return bx + radius > this.hitboxLeft &&
                       bx - radius < this.hitboxRight &&
                       by + radius > this.hitboxTop &&
                       by - radius < this.hitboxBottom;
            }

            // Trigger scatter animation when ball hits stumps
            triggerScatter() {
                this.scattered = true;
                this.scatterTimer = 0;
                this.stumpPieces = [];

                // 3 stumps + 2 bails = 5 pieces flying
                for (let i = 0; i < 3; i++) {
                    const sx = this.x - this.totalWidth / 2 + i * (this.stumpWidth + this.stumpGap);
                    this.stumpPieces.push({
                        x: sx, y: this.y,
                        vx: (Math.random() - 0.5) * 4,
                        vy: -3 - Math.random() * 4,
                        rot: 0,
                        rotSpeed: (Math.random() - 0.5) * 0.3,
                        type: 'stump'
                    });
                }
                // 2 bails
                for (let i = 0; i < 2; i++) {
                    const bx = this.x - this.totalWidth / 2 + 5 + i * (this.stumpWidth + this.stumpGap);
                    this.stumpPieces.push({
                        x: bx, y: this.y - 2,
                        vx: (Math.random() - 0.5) * 6,
                        vy: -5 - Math.random() * 3,
                        rot: 0,
                        rotSpeed: (Math.random() - 0.5) * 0.5,
                        type: 'bail'
                    });
                }
            }

            reset() {
                this.scattered = false;
                this.scatterTimer = 0;
                this.stumpPieces = [];
            }

            update() {
                if (this.scattered) {
                    this.scatterTimer++;
                    for (const p of this.stumpPieces) {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.vy += 0.2; // gravity
                        p.rot += p.rotSpeed;
                    }
                    // Auto-reset after animation
                    if (this.scatterTimer > 50) {
                        this.reset();
                    }
                }
            }

            render() {
                const shakeX = cameraShakeX || 0;
                const shakeY = cameraShakeY || 0;

                if (this.scattered) {
                    // Draw scattered pieces
                    for (const p of this.stumpPieces) {
                        ctx.save();
                        ctx.translate(p.x + shakeX, p.y + shakeY);
                        ctx.rotate(p.rot);
                        if (p.type === 'stump') {
                            ctx.fillStyle = '#c4a265';
                            ctx.fillRect(-2, -15, this.stumpWidth, this.stumpHeight);
                        } else {
                            // Bail — small horizontal piece
                            ctx.fillStyle = '#e8d5a0';
                            ctx.fillRect(-5, -1.5, 10, 3);
                        }
                        ctx.restore();
                    }
                } else {
                    // Draw standing stumps
                    const baseX = this.x - this.totalWidth / 2 + shakeX;
                    const baseY = this.y + shakeY;

                    for (let i = 0; i < 3; i++) {
                        const sx = baseX + i * (this.stumpWidth + this.stumpGap);

                        // Stump shadow
                        ctx.fillStyle = 'rgba(0,0,0,0.2)';
                        ctx.fillRect(sx + 1, baseY + this.stumpHeight, this.stumpWidth, 3);

                        // Stump body (wooden brown)
                        ctx.fillStyle = '#c4a265';
                        ctx.fillRect(sx, baseY, this.stumpWidth, this.stumpHeight);

                        // Stump highlight (lighter edge)
                        ctx.fillStyle = '#d4b87a';
                        ctx.fillRect(sx, baseY, 1, this.stumpHeight);

                        // Pointed top
                        ctx.fillStyle = '#b09050';
                        ctx.fillRect(sx, baseY - 2, this.stumpWidth, 2);
                    }

                    // Bails (2 small horizontal pieces on top)
                    ctx.fillStyle = '#e8d5a0';
                    const bailY = baseY - 3;
                    ctx.fillRect(baseX + 1, bailY, this.stumpWidth + this.stumpGap + 2, 2.5);
                    ctx.fillRect(baseX + this.stumpWidth + this.stumpGap + 1, bailY, this.stumpWidth + this.stumpGap + 2, 2.5);
                }
            }
        }

        const stumps = new Stumps();

        // ============================================================================
        // WICKET KEEPER (behind stumps)
        // ============================================================================

        class WicketKeeper {
            constructor() {
                this.x = DESIGN.width / 2;
                this.baseY = stumps.y + stumps.stumpHeight + 20; // crouched behind stumps
                this.y = this.baseY;
                this.bobTimer = 0;
                this.celebrating = false;
                this.celebTimer = 0;
            }

            triggerCelebration() {
                this.celebrating = true;
                this.celebTimer = 0;
            }

            update() {
                this.bobTimer += 0.03;
                // Subtle crouch bobbing
                this.y = this.baseY + Math.sin(this.bobTimer) * 1.5;

                if (this.celebrating) {
                    this.celebTimer++;
                    if (this.celebTimer > 40) {
                        this.celebrating = false;
                        this.celebTimer = 0;
                    }
                }
            }

            render() {
                const shakeX = cameraShakeX || 0;
                const shakeY = cameraShakeY || 0;
                const x = this.x + shakeX;
                let y = this.y + shakeY;
                const scale = 0.9; // slightly smaller than batsman (perspective)

                // Celebration: jump up
                if (this.celebrating) {
                    y -= Math.sin(this.celebTimer * 0.15) * 8;
                }

                // Subtle shadow beneath keeper
                ctx.fillStyle = 'rgba(0, 0, 0, 0.30)';
                ctx.beginPath();
                ctx.ellipse(x, y + 31 * scale, 22 * scale, 5 * scale, 0, 0, Math.PI * 2);
                ctx.fill();

                // Shoes
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(x - 10 * scale, y + 45 * scale, 8 * scale, 5 * scale);
                ctx.fillRect(x + 2 * scale, y + 45 * scale, 8 * scale, 5 * scale);

                // Pads (keeper pads — shorter)
                ctx.fillStyle = '#f0f0f0';
                ctx.fillRect(x - 11 * scale, y + 25 * scale, 9 * scale, 20 * scale);
                ctx.fillRect(x + 2 * scale, y + 25 * scale, 9 * scale, 20 * scale);

                // Body/jersey (green — different from batsman)
                ctx.fillStyle = '#2d8c2d';
                ctx.fillRect(x - 12 * scale, y + 5 * scale, 24 * scale, 20 * scale);

                // Crouching posture — arms out wide (ready position)
                ctx.strokeStyle = '#d4a574';
                ctx.lineWidth = 3;
                // Left arm — out wide
                ctx.beginPath();
                ctx.moveTo(x - 12 * scale, y + 12 * scale);
                ctx.lineTo(x - 28 * scale, y + 18 * scale);
                ctx.stroke();
                // Right arm — out wide
                ctx.beginPath();
                ctx.moveTo(x + 12 * scale, y + 12 * scale);
                ctx.lineTo(x + 28 * scale, y + 18 * scale);
                ctx.stroke();

                // Gloves (large keeper gloves with detail)
                ctx.fillStyle = '#cc3333';
                ctx.beginPath();
                ctx.arc(x - 30 * scale, y + 18 * scale, 6 * scale, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x + 30 * scale, y + 18 * scale, 6 * scale, 0, Math.PI * 2);
                ctx.fill();
                // Glove padding highlights
                ctx.fillStyle = 'rgba(200, 50, 50, 0.6)';
                ctx.beginPath();
                ctx.arc(x - 30 * scale, y + 16 * scale, 3 * scale, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x + 30 * scale, y + 16 * scale, 3 * scale, 0, Math.PI * 2);
                ctx.fill();

                // Face
                ctx.fillStyle = '#d4a574';
                ctx.fillRect(x - 6 * scale, y - 5 * scale, 12 * scale, 10 * scale);

                // Helmet (darker than batsman, more pronounced)
                ctx.fillStyle = '#1a3020';
                ctx.beginPath();
                ctx.arc(x, y - 10 * scale, 9.5 * scale, Math.PI, 0, false);
                ctx.fill();

                // Helmet highlight
                ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
                ctx.beginPath();
                ctx.arc(x - 2 * scale, y - 12 * scale, 3 * scale, 0, Math.PI * 2);
                ctx.fill();

                // Visor
                ctx.fillStyle = '#000000';
                ctx.fillRect(x - 8 * scale, y - 5 * scale, 16 * scale, 3.5 * scale);

                // Celebration arms up
                if (this.celebrating) {
                    ctx.strokeStyle = '#d4a574';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(x - 12 * scale, y + 8 * scale);
                    ctx.lineTo(x - 20 * scale, y - 15 * scale);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x + 12 * scale, y + 8 * scale);
                    ctx.lineTo(x + 20 * scale, y - 15 * scale);
                    ctx.stroke();
                }
            }
        }

        const keeper = new WicketKeeper();

        // ============================================================================
        // FIELDERS — Outfield players that can catch the ball
        // ============================================================================

        class Fielder {
            constructor(baseX, baseY, name, jerseyColor) {
                this.baseX = baseX;
                this.baseY = baseY;
                this.x = baseX;
                this.y = baseY;
                this.name = name;                // e.g. "mid-off", "point"
                this.jerseyColor = jerseyColor;
                this.bobTimer = Math.random() * Math.PI * 2; // randomized phase
                this.catchTimer = 0;
                this.catching = false;
                this.celebrating = false;
                this.celebTimer = 0;
                // Scale based on Y position (perspective: higher Y = closer = larger)
                this.scale = 0.85 + (baseY - DESIGN.farOutfieldStartY) / (DESIGN.pitchEndY - DESIGN.farOutfieldStartY) * 0.35;
                // Catch radius — generous for satisfying gameplay catches
                this.catchRadius = 70 + this.scale * 30;
                // === PHASE 4: Near-miss flash ===
                this.nearMissTimer = 0;
                this.nearMissActive = false;
                // === Aggressive chase: fielder moves toward ball ===
                this.chaseTargetX = null;
                this.chaseTargetY = null;
                this.chasing = false;
                this.chaseSpeed = 3.5 + Math.random() * 1.0; // fast enough to actually intercept balls
                this.jumping = false;
                this.jumpTimer = 0;
                this.jumpHeight = 0;
                this.diving = false;
                this.diveTimer = 0;
            }

            // Reposition fielder smoothly to new base position (over phase change)
            repositionTo(newX, newY) {
                this.baseX = newX;
                this.baseY = newY;
                // Recalculate scale for new position
                this.scale = 0.85 + (newY - DESIGN.farOutfieldStartY) / (DESIGN.pitchEndY - DESIGN.farOutfieldStartY) * 0.35;
                this.catchRadius = 70 + this.scale * 30;
            }

            // Start chasing a ball — fielder runs toward predicted intercept point
            startChase(ballX, ballY, ballVx, ballVy) {
                if (this.catching || this.celebrating) return;
                // Predict where ball will be in ~18 frames (longer prediction = better interception)
                const predictX = ballX + ballVx * 18;
                const predictY = ballY + ballVy * 12;
                const dx = predictX - this.x;
                const dy = predictY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                // Chase if ball is within 300px range — fielders sprint hard
                if (dist < 300 && dist > 10) {
                    this.chasing = true;
                    this.chaseTargetX = predictX;
                    this.chaseTargetY = predictY;
                    // Update chase target dynamically — track actual ball position too
                    this._lastBallX = ballX;
                    this._lastBallY = ballY;
                }
            }

            triggerNearMiss() {
                this.nearMissActive = true;
                this.nearMissTimer = 40; // ~0.7 seconds
            }

            triggerCatch() {
                this.catching = true;
                this.catchTimer = 0;
                this.chasing = false;
                this.diving = true;
                this.diveTimer = 0;
                setTimeout(() => {
                    this.catching = false;
                    this.diving = false;
                    this.celebrating = true;
                    this.celebTimer = 0;
                }, 400);
            }

            update() {
                this.bobTimer += 0.02;

                if (this.chasing && this.chaseTargetX !== null) {
                    // Sprint toward ball intercept point
                    const dx = this.chaseTargetX - this.x;
                    const dy = this.chaseTargetY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > 3) {
                        // Accelerate when close — diving lunge
                        const speedMul = dist < 40 ? 1.5 : 1.0;
                        this.x += (dx / dist) * this.chaseSpeed * speedMul;
                        this.y += (dy / dist) * this.chaseSpeed * speedMul;
                        // Trigger jump/dive when very close to intercept
                        if (dist < 50 && !this.jumping) {
                            this.jumping = true;
                            this.jumpTimer = 0;
                        }
                    } else {
                        this.chasing = false;
                        this.chaseTargetX = null;
                        this.chaseTargetY = null;
                        this.jumping = false;
                    }
                } else if (!this.catching && !this.celebrating) {
                    // Return to base position smoothly when not chasing
                    const retDx = this.baseX - this.x;
                    const retDy = this.baseY - this.y;
                    const retDist = Math.sqrt(retDx * retDx + retDy * retDy);
                    if (retDist > 1) {
                        this.x += retDx * 0.08; // ease back
                        this.y += retDy * 0.08;
                    } else {
                        // Subtle idle sway at base
                        this.x = this.baseX + Math.sin(this.bobTimer) * 2;
                        this.y = this.baseY + Math.cos(this.bobTimer * 0.7) * 1.2;
                    }
                }

                if (this.catching) {
                    this.catchTimer++;
                }
                if (this.diving) {
                    this.diveTimer++;
                    if (this.diveTimer > 20) this.diving = false;
                }
                if (this.jumping) {
                    this.jumpTimer++;
                    // Jump arc: rises then falls over 24 frames
                    this.jumpHeight = Math.sin(Math.min(1, this.jumpTimer / 24) * Math.PI) * 18;
                    if (this.jumpTimer > 24) {
                        this.jumping = false;
                        this.jumpTimer = 0;
                        this.jumpHeight = 0;
                    }
                }
                if (this.celebrating) {
                    this.celebTimer++;
                    if (this.celebTimer > 50) {
                        this.celebrating = false;
                        this.celebTimer = 0;
                    }
                }

                // Phase 4: Near-miss flash countdown
                if (this.nearMissActive) {
                    this.nearMissTimer--;
                    if (this.nearMissTimer <= 0) {
                        this.nearMissActive = false;
                    }
                }
            }

            render() {
                const shakeX = cameraShakeX || 0;
                const shakeY = cameraShakeY || 0;
                const x = this.x + shakeX;
                let y = this.y + shakeY;
                const s = this.scale;

                // Celebration: jump up
                if (this.celebrating) {
                    y -= Math.sin(this.celebTimer * 0.15) * 6 * s;
                }

                // Jump/dive toward ball — visible leap animation
                if (this.jumping && !this.catching) {
                    y -= this.jumpHeight * s;
                }

                // Dive toward ball during catch
                if (this.catching) {
                    const diveProgress = Math.min(1, this.catchTimer / 12);
                    y -= Math.sin(diveProgress * Math.PI) * 8 * s;
                }

                // Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
                ctx.beginPath();
                ctx.ellipse(x, y + 28 * s, 14 * s, 4 * s, 0, 0, Math.PI * 2);
                ctx.fill();

                // Shoes
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(x - 7 * s, y + 22 * s, 6 * s, 4 * s);
                ctx.fillRect(x + 1 * s, y + 22 * s, 6 * s, 4 * s);

                // Trousers
                ctx.fillStyle = '#f0f0f0';
                ctx.fillRect(x - 8 * s, y + 12 * s, 7 * s, 11 * s);
                ctx.fillRect(x + 1 * s, y + 12 * s, 7 * s, 11 * s);

                // Body / jersey
                ctx.fillStyle = this.jerseyColor;
                ctx.fillRect(x - 10 * s, y - 2 * s, 20 * s, 15 * s);

                // Arms
                ctx.strokeStyle = '#d4a574';
                ctx.lineWidth = Math.max(1.5, 2.5 * s);

                if (this.catching || (this.jumping && this.jumpTimer > 4)) {
                    // Arms reaching up for catch / diving leap
                    ctx.beginPath();
                    ctx.moveTo(x - 10 * s, y + 4 * s);
                    ctx.lineTo(x - 6 * s, y - 18 * s);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x + 10 * s, y + 4 * s);
                    ctx.lineTo(x + 6 * s, y - 18 * s);
                    ctx.stroke();
                    // Hands together (catching position)
                    ctx.fillStyle = '#d4a574';
                    ctx.beginPath();
                    ctx.arc(x, y - 19 * s, 4 * s, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.chasing) {
                    // Arms pumping while running — one forward, one back
                    const armSwing = Math.sin(this.bobTimer * 8) * 6;
                    ctx.beginPath();
                    ctx.moveTo(x - 10 * s, y + 4 * s);
                    ctx.lineTo(x - 14 * s, y + (6 + armSwing) * s);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x + 10 * s, y + 4 * s);
                    ctx.lineTo(x + 14 * s, y + (6 - armSwing) * s);
                    ctx.stroke();
                } else if (this.celebrating) {
                    // Arms up celebration
                    ctx.beginPath();
                    ctx.moveTo(x - 10 * s, y + 4 * s);
                    ctx.lineTo(x - 16 * s, y - 14 * s);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x + 10 * s, y + 4 * s);
                    ctx.lineTo(x + 16 * s, y - 14 * s);
                    ctx.stroke();
                } else {
                    // Arms relaxed at sides (ready position)
                    ctx.beginPath();
                    ctx.moveTo(x - 10 * s, y + 4 * s);
                    ctx.lineTo(x - 16 * s, y + 12 * s);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x + 10 * s, y + 4 * s);
                    ctx.lineTo(x + 16 * s, y + 12 * s);
                    ctx.stroke();
                }

                // Face
                ctx.fillStyle = '#d4a574';
                ctx.beginPath();
                ctx.arc(x, y - 8 * s, 6 * s, 0, Math.PI * 2);
                ctx.fill();

                // Cap (colored like jersey)
                ctx.fillStyle = this.jerseyColor;
                ctx.beginPath();
                ctx.arc(x, y - 13 * s, 7 * s, Math.PI, 0, false);
                ctx.fill();
                // Cap brim
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(x - 8 * s, y - 13 * s, 16 * s, 2 * s);

                // === PHASE 4: Near-miss flash effect ===
                if (this.nearMissActive && this.nearMissTimer > 0) {
                    const nmAlpha = this.nearMissTimer / 40;
                    const nmPulse = Math.sin(this.nearMissTimer * 0.4) * 0.3 + 0.7;
                    ctx.save();
                    ctx.globalAlpha = nmAlpha * nmPulse * 0.6;
                    ctx.strokeStyle = '#ff4444';
                    ctx.lineWidth = 2;
                    ctx.shadowColor = '#ff4444';
                    ctx.shadowBlur = 15;
                    const nmR = 20 * s + (40 - this.nearMissTimer) * 0.5;
                    ctx.beginPath();
                    ctx.arc(x, y, nmR, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();

                    // "CLOSE!" text
                    if (this.nearMissTimer > 20) {
                        ctx.save();
                        ctx.globalAlpha = nmAlpha * 0.9;
                        ctx.shadowColor = '#ff4444';
                        ctx.shadowBlur = 10;
                        drawText('CLOSE!', x, y - 30 * s, 12, '#ff4444', 'bold', false);
                        ctx.restore();
                    }
                }
            }
        }

        // ============================================================================
        // DYNAMIC FIELDING SETUPS — positions change EVERY OVER
        // Pitch center X=207. Multiple variations per phase, rotated each over.
        // Also adapts to batsman tendencies (loft-heavy → deeper field).
        // ============================================================================
        // ============================================================================
        // 15 PREDEFINED FIELD SETUPS — one applied each over, rotating through all 15.
        // Pitch center X=207, Y ranges: close catchers 480-530, ring 400-480, deep 340-400.
        // Each setup is a realistic cricket field with 6 fielders.
        // ============================================================================
        // --- Pitch exclusion: fielders must stay OFF the brown pitch strip ---
        // Pitch is a trapezoid: 50px wide at Y=320, 180px wide at Y=720, centered at X=207
        function _pitchEdgesAtY(y) {
            if (y < DESIGN.pitchStartY || y > DESIGN.pitchEndY) return null;
            const ratio = (y - DESIGN.pitchStartY) / (DESIGN.pitchEndY - DESIGN.pitchStartY);
            const halfW = (50 + 130 * ratio) / 2;
            return { left: 207 - halfW, right: 207 + halfW };
        }
        function _pushOffPitch(x, y, pad) {
            pad = pad || 12; // minimum gap from pitch edge
            const edges = _pitchEdgesAtY(y);
            if (!edges) return x; // above or below pitch — fine
            if (x < edges.left - pad || x > edges.right + pad) return x; // already outside
            // Push to nearest side
            const distLeft = Math.abs(x - (edges.left - pad));
            const distRight = Math.abs(x - (edges.right + pad));
            return distLeft <= distRight ? edges.left - pad : edges.right + pad;
        }

        const FIELD_PRESETS = [
            // 0: Standard attacking (close catchers + mid-off)
            [ { x: 80,  y: 510, name: 'short-cover' },  { x: 330, y: 520, name: 'short-midwkt' },
              { x: 145, y: 440, name: 'silly-point' },   { x: 270, y: 450, name: 'short-leg' },
              { x: 40,  y: 430, name: 'point' },          { x: 370, y: 390, name: 'mid-on' } ],
            // 1: Slip cordon — heavy off-side catching
            [ { x: 110, y: 530, name: 'first-slip' },    { x: 140, y: 525, name: 'second-slip' },
              { x: 100, y: 490, name: 'gully' },          { x: 60,  y: 460, name: 'point' },
              { x: 350, y: 500, name: 'fine-leg' },       { x: 370, y: 400, name: 'mid-on' } ],
            // 2: Leg-side trap — packed leg side
            [ { x: 300, y: 510, name: 'short-leg' },     { x: 340, y: 460, name: 'leg-gully' },
              { x: 380, y: 420, name: 'deep-sq-leg' },    { x: 100, y: 500, name: 'cover' },
              { x: 145, y: 440, name: 'mid-off' },        { x: 50,  y: 420, name: 'point' } ],
            // 3: Off-side ring — tight off side circle
            [ { x: 45,  y: 460, name: 'cover' },          { x: 100, y: 400, name: 'extra-cover' },
              { x: 135, y: 370, name: 'mid-off' },        { x: 30,  y: 390, name: 'deep-point' },
              { x: 355, y: 490, name: 'mid-on' },         { x: 380, y: 400, name: 'long-on' } ],
            // 4: Leg-side heavy — midwicket region packed
            [ { x: 320, y: 470, name: 'midwicket' },     { x: 370, y: 410, name: 'deep-mw' },
              { x: 280, y: 370, name: 'long-on' },        { x: 60,  y: 480, name: 'cover' },
              { x: 130, y: 390, name: 'mid-off' },        { x: 40,  y: 360, name: 'deep-point' } ],
            // 5: Catching ring — all 6 in catching arc
            [ { x: 75,  y: 475, name: 'cover' },          { x: 330, y: 485, name: 'midwicket' },
              { x: 145, y: 430, name: 'mid-off' },        { x: 270, y: 440, name: 'mid-on' },
              { x: 45,  y: 425, name: 'point' },          { x: 370, y: 395, name: 'straight-hit' } ],
            // 6: Wide spread defensive
            [ { x: 25,  y: 400, name: 'deep-point' },    { x: 390, y: 410, name: 'deep-sq-leg' },
              { x: 100, y: 360, name: 'long-off' },       { x: 310, y: 370, name: 'long-on' },
              { x: 130, y: 340, name: 'deep-mid-off' },   { x: 60,  y: 470, name: 'sweeper-cover' } ],
            // 7: Straight boundary loaded — 3 on straight boundary
            [ { x: 120, y: 350, name: 'long-off' },      { x: 290, y: 345, name: 'deep-straight' },
              { x: 275, y: 350, name: 'long-on' },        { x: 30,  y: 410, name: 'deep-point' },
              { x: 385, y: 420, name: 'deep-fine' },      { x: 65,  y: 475, name: 'sweeper' } ],
            // 8: Boundary ring — evenly spaced deep arc
            [ { x: 20,  y: 420, name: 'deep-cover' },    { x: 80,  y: 365, name: 'deep-extra' },
              { x: 130, y: 345, name: 'long-off' },       { x: 330, y: 365, name: 'deep-mid-on' },
              { x: 395, y: 420, name: 'deep-sq-leg' },    { x: 60,  y: 460, name: 'sweeper-mid' } ],
            // 9: Umbrella field — 4 close + 2 deep (Dhoni style)
            [ { x: 120, y: 500, name: 'silly-point' },   { x: 280, y: 505, name: 'short-leg' },
              { x: 85,  y: 460, name: 'point' },          { x: 310, y: 465, name: 'square-leg' },
              { x: 40,  y: 370, name: 'deep-cover' },     { x: 380, y: 375, name: 'deep-mw' } ],
            // 10: V-field — strong on both sides of straight
            [ { x: 110, y: 380, name: 'long-off' },      { x: 300, y: 385, name: 'long-on' },
              { x: 55,  y: 450, name: 'cover' },          { x: 360, y: 455, name: 'midwicket' },
              { x: 130, y: 350, name: 'deep-straight' },  { x: 65,  y: 475, name: 'bowler-end' } ],
            // 11: Cow corner loaded — expecting leg-side lofts
            [ { x: 340, y: 370, name: 'deep-mw' },       { x: 390, y: 440, name: 'deep-sq-leg' },
              { x: 280, y: 350, name: 'long-on' },        { x: 130, y: 380, name: 'mid-off' },
              { x: 70,  y: 460, name: 'cover' },          { x: 35,  y: 400, name: 'deep-point' } ],
            // 12: Off-side cordon — short catching off side
            [ { x: 60,  y: 510, name: 'cover-close' },   { x: 100, y: 480, name: 'point-close' },
              { x: 130, y: 500, name: 'gully' },          { x: 40,  y: 420, name: 'deep-point' },
              { x: 350, y: 480, name: 'fine-leg' },       { x: 300, y: 400, name: 'long-on' } ],
            // 13: Spread with sweeper — 1 sweeper + balanced ring
            [ { x: 105, y: 500, name: 'sweeper' },       { x: 55,  y: 445, name: 'cover' },
              { x: 360, y: 450, name: 'midwicket' },      { x: 130, y: 380, name: 'mid-off' },
              { x: 290, y: 385, name: 'mid-on' },         { x: 290, y: 355, name: 'long-on' } ],
            // 14: Anti-loft deep ring — all 6 deep on boundary
            [ { x: 30,  y: 385, name: 'deep-cover' },    { x: 120, y: 355, name: 'long-off' },
              { x: 290, y: 340, name: 'deep-straight' },  { x: 295, y: 355, name: 'long-on' },
              { x: 385, y: 385, name: 'deep-mw' },        { x: 60,  y: 420, name: 'sweeper' } ],
        ];

        // Phase-based depth adjustment: powerplay pulls fielders closer, death pushes deeper
        const PHASE_Y_OFFSET = { powerplay: 50, middle: 0, death: -30 };

        // Create 6 fielders (start with preset 0)
        const fielders = FIELD_PRESETS[0].map(
            pos => new Fielder(pos.x, pos.y, pos.name, '#2d8c2d')
        );

        // Track current over for per-over field changes
        let _lastFieldOver = -1;
        let _currentFieldPhase = 'middle';
        let _usingAntiLoft = false;

        // Reposition fielders EVERY over — cycles through 15 presets + loft-spam override
        function updateFieldSetup() {
            const phase = getOverPhase();
            const currentOver = gameState.oversCompleted;
            const loftSpam = (gameState._consecutiveLofts || 0) >= 4;

            // Only reposition when over changes
            if (currentOver === _lastFieldOver && !loftSpam) return;
            if (currentOver === _lastFieldOver && loftSpam && _usingAntiLoft) return;

            _lastFieldOver = currentOver;
            _currentFieldPhase = phase;

            let setup;
            if (loftSpam) {
                // Override: anti-loft deep field (preset 14)
                setup = FIELD_PRESETS[14];
                _usingAntiLoft = true;
            } else {
                _usingAntiLoft = false;
                // Rotate through all 15 presets each over
                const presetIdx = currentOver % FIELD_PRESETS.length;
                setup = FIELD_PRESETS[presetIdx];
            }

            // Phase-based Y adjustment (closer in powerplay, deeper in death)
            const yOffset = PHASE_Y_OFFSET[phase] || 0;

            // Apply jitter so same preset doesn't look identical across games
            for (let i = 0; i < fielders.length && i < setup.length; i++) {
                const jitterX = (Math.random() - 0.5) * 16; // ±8px random offset
                const jitterY = (Math.random() - 0.5) * 12;
                const targetY = Math.max(330, Math.min(540, setup[i].y + yOffset + jitterY));
                let targetX = Math.max(15, Math.min(DESIGN.width - 15, setup[i].x + jitterX));
                // Enforce pitch exclusion — fielders must stay OFF the brown pitch strip
                targetX = _pushOffPitch(targetX, targetY, 14);
                targetX = Math.max(15, Math.min(DESIGN.width - 15, targetX)); // re-clamp after push
                fielders[i].repositionTo(targetX, targetY);
                fielders[i].name = setup[i].name;
                // Reset chase state on reposition
                fielders[i].chasing = false;
                fielders[i].chaseTargetX = null;
                fielders[i].chaseTargetY = null;
                fielders[i].jumping = false;
                fielders[i].jumpTimer = 0;
                fielders[i].jumpHeight = 0;
            }
        }

        // ============================================================================
        // ADAPTIVE FIELDING — tracks batsman hit direction, shifts fielders mid-over
        // ============================================================================
        const _hitDirectionHistory = []; // rolling window of recent hitAngle values
        const HIT_HISTORY_SIZE = 5;     // remember last 5 scoring shots

        // Called after every scoring hit — records the hitAngle direction
        function recordHitDirection(hitAngle, runs) {
            if (runs <= 0) return; // don't track dot balls
            _hitDirectionHistory.push({ angle: hitAngle, runs: runs, weight: Math.min(runs, 6) });
            if (_hitDirectionHistory.length > HIT_HISTORY_SIZE) {
                _hitDirectionHistory.shift();
            }
        }

        // Analyze scoring pattern and shift fielders toward dominant direction
        // Called every frame — fielders drift toward the batsman's preferred zone
        function adaptFieldToScoring() {
            if (_hitDirectionHistory.length < 2) return;

            // Weighted average of hit directions (heavier shots = more weight)
            let totalWeight = 0;
            let weightedAngle = 0;
            for (const h of _hitDirectionHistory) {
                weightedAngle += h.angle * h.weight;
                totalWeight += h.weight;
            }
            if (totalWeight === 0) return;
            const avgAngle = weightedAngle / totalWeight;

            // Consistency check: are they hitting in one direction repeatedly?
            let sameDirection = 0;
            const avgSign = avgAngle > 0 ? 1 : -1;
            for (const h of _hitDirectionHistory) {
                if ((h.angle > 0 ? 1 : -1) === avgSign) sameDirection++;
            }
            const consistency = sameDirection / _hitDirectionHistory.length;
            if (consistency < 0.6) return;

            // Target zone center: where the batsman is scoring
            const centerX = DESIGN.width / 2; // 207
            const targetX = centerX + (avgAngle > 0 ? 1 : -1) * consistency * 80;
            // targetX: the ideal center of the fielding formation (shifts 0-80px from center)

            // Move each fielder's base toward the target zone while PRESERVING SPREAD
            // Key: each fielder keeps its offset from formation center, but the center drifts
            const driftRate = 0.012 * consistency; // slow drift per frame (smooth transition)

            for (const f of fielders) {
                if (f.catching || f.celebrating) continue;

                // How far is this fielder from center? Preserve this relative offset
                const offsetFromCenter = f.baseX - centerX;
                // Desired position: target center + scaled version of their offset
                // Spread factor: 0.75 = slightly tighter on the scoring side, wider on off-side
                const spreadFactor = (avgSign > 0 && offsetFromCenter > 0) ? 0.8 :
                                     (avgSign < 0 && offsetFromCenter < 0) ? 0.8 : 1.15;
                const desiredX = targetX + offsetFromCenter * spreadFactor;

                // Drift toward desired position (not instant — smooth over many frames)
                const dx = desiredX - f.baseX;
                if (Math.abs(dx) > 0.5) {
                    f.baseX += dx * driftRate;
                    f.baseX = Math.max(15, Math.min(DESIGN.width - 15, f.baseX));
                }
            }
        }

        // ============================================================================
        // RUN ANIMATIONS
        // ============================================================================

        const runAnimation = {
            active: false,
            type: '',      // '4', '6', '1', '2', 'dot', 'bowled'
            timer: 0,
            duration: 0,
            particles: [],

            trigger(type) {
                this.active = true;
                this.type = type;
                this.timer = 0;
                this.particles = [];

                if (type === '6') {
                    this.duration = 70;
                    // Confetti burst for SIX
                    for (let i = 0; i < 30; i++) {
                        this.particles.push({
                            x: DESIGN.width / 2 + (Math.random() - 0.5) * 200,
                            y: 200 + Math.random() * 100,
                            vx: (Math.random() - 0.5) * 5,
                            vy: -2 - Math.random() * 4,
                            color: ['#ffd700', '#ff6b35', '#00ff88', '#ff4444', '#ffffff'][Math.floor(Math.random() * 5)],
                            size: 3 + Math.random() * 5,
                            rot: Math.random() * Math.PI * 2,
                            rotV: (Math.random() - 0.5) * 0.2,
                        });
                    }
                } else if (type === '4') {
                    this.duration = 50;
                    // Boundary flash particles along the edges
                    for (let i = 0; i < 20; i++) {
                        const side = Math.random() > 0.5;
                        this.particles.push({
                            x: side ? 10 : DESIGN.width - 10,
                            y: 200 + Math.random() * 300,
                            vx: side ? 2 : -2,
                            vy: (Math.random() - 0.5) * 2,
                            color: ['#ffd700', '#ff6b35', '#ffffff'][Math.floor(Math.random() * 3)],
                            size: 2 + Math.random() * 4,
                            rot: 0, rotV: 0,
                        });
                    }
                } else {
                    this.duration = 30;
                }
            },

            update() {
                if (!this.active) return;
                this.timer++;

                // Update particles
                for (const p of this.particles) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.08; // gravity
                    p.rot += p.rotV;
                    p.size *= 0.98;
                }

                if (this.timer >= this.duration) {
                    this.active = false;
                }
            },

            render() {
                if (!this.active) return;
                const progress = this.timer / this.duration;
                const alpha = 1 - progress;

                if (this.type === '6') {
                    // Big "SIX" text with glow
                    ctx.globalAlpha = alpha;
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 20;
                    drawText('SIX!', DESIGN.width / 2, 180, 52, '#ffd700', 'bold');
                    ctx.shadowBlur = 0;

                    // Confetti particles
                    for (const p of this.particles) {
                        ctx.globalAlpha = alpha * 0.8;
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.rotate(p.rot);
                        ctx.fillStyle = p.color;
                        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                        ctx.restore();
                    }
                    ctx.globalAlpha = 1;

                } else if (this.type === '4') {
                    // Boundary rope flash
                    ctx.globalAlpha = alpha * 0.6;
                    // Flash along top of near outfield
                    const ropeY = DESIGN.pitchEndY;
                    ctx.strokeStyle = '#ffd700';
                    ctx.lineWidth = 4;
                    ctx.setLineDash([10, 5]);
                    ctx.beginPath();
                    ctx.moveTo(0, ropeY);
                    ctx.lineTo(DESIGN.width, ropeY);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    // "FOUR" text
                    ctx.globalAlpha = alpha;
                    drawText('FOUR!', DESIGN.width / 2, 200, 40, '#ff6b35', 'bold');

                    // Boundary spark particles
                    for (const p of this.particles) {
                        ctx.globalAlpha = alpha * 0.7;
                        ctx.fillStyle = p.color;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;

                } else if (this.type === '2' || this.type === '1') {
                    // Running indicator — arrows between wickets
                    ctx.globalAlpha = alpha;
                    const runs = this.type === '2' ? 2 : 1;
                    drawText(runs + ' RUN' + (runs > 1 ? 'S' : ''), DESIGN.width / 2, 220, 28, '#ffffff', 'bold');

                    // Running arrows on pitch
                    const arrowY = 500 + Math.sin(this.timer * 0.3) * 30;
                    ctx.strokeStyle = 'rgba(255, 255, 255, ' + (alpha * 0.5) + ')';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(DESIGN.width / 2, arrowY);
                    ctx.lineTo(DESIGN.width / 2, arrowY - 20);
                    ctx.lineTo(DESIGN.width / 2 - 6, arrowY - 14);
                    ctx.moveTo(DESIGN.width / 2, arrowY - 20);
                    ctx.lineTo(DESIGN.width / 2 + 6, arrowY - 14);
                    ctx.stroke();

                    ctx.globalAlpha = 1;
                }
            }
        };

        // ============================================================================
        // BALL RENDERING
        // ============================================================================

        function drawBall(ball, time) {
            const skin = BALL_SKINS[gameState.equippedBall];

            // Premium ball trail with gradient fade (enhanced during surge)
            const isSurgeHit = ball._surgeHit && ball.hit;
            const surgeLv = ball._surgeLevel || 0;
            const surgeClr = ball._surgeColor || '#ffd700';

            if (ball.trail.length > 0) {
                for (let i = 0; i < ball.trail.length; i++) {
                    const t = ball.trail[i];
                    const trailProgress = i / ball.trail.length;

                    if (isSurgeHit) {
                        // SURGE TRAIL — fiery glow particles, color-matched to surge tier
                        const alpha = Math.pow(1 - trailProgress, 1.2) * (0.6 + surgeLv * 0.1);
                        const size = Math.max(1, ball.radius * (1.2 - trailProgress * 0.6) * (1 + surgeLv * 0.08));
                        ctx.globalAlpha = alpha;
                        ctx.save();
                        ctx.shadowColor = surgeClr;
                        ctx.shadowBlur = 8 + surgeLv * 3;
                        const grad = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, size);
                        grad.addColorStop(0, '#ffffff');
                        grad.addColorStop(0.3, surgeClr);
                        grad.addColorStop(1, 'rgba(0,0,0,0)');
                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    } else if (!ball.hit && ball._trailColor) {
                        // PRE-HIT delivery type trail — color-coded per ball type
                        const alpha = Math.pow(1 - trailProgress, 1.3) * 0.7;
                        const size = Math.max(1, ball.radius * (1.1 - trailProgress * 0.7));
                        ctx.globalAlpha = alpha;
                        ctx.save();
                        ctx.shadowColor = ball._trailColor;
                        ctx.shadowBlur = 6;
                        const grad = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, size);
                        grad.addColorStop(0, '#ffffff');
                        grad.addColorStop(0.4, ball._trailColor);
                        grad.addColorStop(1, 'rgba(0,0,0,0)');
                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    } else {
                        // Normal post-hit trail
                        const alpha = Math.pow(1 - trailProgress, 1.5) * 0.8;
                        const size = ball.radius * (1 - trailProgress);
                        ctx.globalAlpha = alpha;
                        const grad = ctx.createRadialGradient(t.x - 3, t.y - 3, 0, t.x, t.y, size);
                        grad.addColorStop(0, skin.color2);
                        grad.addColorStop(0.5, skin.color1);
                        grad.addColorStop(1, 'rgba(0,0,0,0.3)');
                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
            ctx.globalAlpha = 1;

            // Enhanced main ball: brighter 3D gradient
            const ballGrad = ctx.createRadialGradient(ball.x - 4, ball.y - 4, 0, ball.x, ball.y, ball.radius);
            ballGrad.addColorStop(0, skin.color2);
            ballGrad.addColorStop(0.6, skin.color1);
            ballGrad.addColorStop(0.95, '#000000');

            ctx.fillStyle = ballGrad;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();

            // Outer glow ring (matching ball skin color or delivery type color pre-hit)
            ctx.save();
            if (!ball.hit && ball._trailColor) {
                // Pre-hit: glow matches delivery type color
                ctx.globalAlpha = 0.6;
                ctx.strokeStyle = ball._trailColor;
                ctx.shadowColor = ball._trailColor;
                ctx.shadowBlur = 8;
            } else {
                ctx.globalAlpha = 0.5;
                ctx.strokeStyle = skin.color1;
            }
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius + 2, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();

            // Bouncer bounce impact marker — draw a small dust puff where it bounced
            if (ball._bouncerBounced && !ball.hit && ball._bounceMarkY === undefined) {
                ball._bounceMarkY = ball.y;
                ball._bounceMarkX = ball.x;
            }
            if (ball._bounceMarkY !== undefined && !ball.hit) {
                ctx.save();
                const bounceAge = ball.y - ball._bounceMarkY;
                const bounceAlpha = Math.max(0, 1 - bounceAge / 80);
                ctx.globalAlpha = bounceAlpha * 0.6;
                ctx.fillStyle = '#c8a96e';
                ctx.beginPath();
                ctx.ellipse(ball._bounceMarkX, ball._bounceMarkY, 8 + bounceAge * 0.15, 3, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            // Spin ball: visible rotation lines on the ball
            if (!ball.hit && (ball._deliveryType === 'spin' || ball._deliveryType === 'slower')) {
                ctx.save();
                ctx.globalAlpha = 0.5;
                ctx.strokeStyle = ball._trailColor || '#aa44ff';
                ctx.lineWidth = 1;
                const spinAngle = (ball._spinPhase || 0) * 2;
                for (let si = 0; si < 2; si++) {
                    const a = spinAngle + si * Math.PI;
                    ctx.beginPath();
                    ctx.moveTo(
                        ball.x + Math.cos(a) * ball.radius * 0.3,
                        ball.y + Math.sin(a) * ball.radius * 0.3
                    );
                    ctx.lineTo(
                        ball.x + Math.cos(a) * ball.radius * 0.9,
                        ball.y + Math.sin(a) * ball.radius * 0.9
                    );
                    ctx.stroke();
                }
                ctx.restore();
            }

            // Seam (curved line) - enhanced
            ctx.strokeStyle = skin.seam;
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.85;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius * 0.8, 0, Math.PI * 2);
            ctx.stroke();
            ctx.globalAlpha = 1;

            // Enhanced shine spots (multiple for more depth)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.beginPath();
            ctx.arc(ball.x - 5, ball.y - 5, 3.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 0.5;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.beginPath();
            ctx.arc(ball.x + 2, ball.y - 3, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;

            // === SURGE GLOW AURA — pulsing radial glow when hit during surge ===
            if (isSurgeHit) {
                ctx.save();
                const pulse = Math.sin(time * 0.12) * 0.15 + 0.85;
                const glowRadius = Math.max(ball.radius * (2.5 + surgeLv * 0.5) * pulse, ball.radius + 1);
                const glowAlpha = (0.25 + surgeLv * 0.08) * pulse;

                // Hex to RGB for surge color
                const sr = parseInt(surgeClr.slice(1, 3), 16) || 255;
                const sg = parseInt(surgeClr.slice(3, 5), 16) || 200;
                const sb = parseInt(surgeClr.slice(5, 7), 16) || 0;

                // Outer radial glow
                const innerR = Math.max(0.1, ball.radius * 0.5);
                const outerR = Math.max(innerR + 1, glowRadius);
                const surgeGrad = ctx.createRadialGradient(ball.x, ball.y, innerR, ball.x, ball.y, outerR);
                surgeGrad.addColorStop(0, `rgba(${sr},${sg},${sb},${glowAlpha})`);
                surgeGrad.addColorStop(0.5, `rgba(${sr},${sg},${sb},${glowAlpha * 0.4})`);
                surgeGrad.addColorStop(1, `rgba(${sr},${sg},${sb},0)`);
                ctx.fillStyle = surgeGrad;
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, outerR, 0, Math.PI * 2);
                ctx.fill();

                // Inner bright ring
                ctx.strokeStyle = `rgba(${sr},${sg},${sb},${Math.min(1, glowAlpha * 1.5)})`;
                ctx.lineWidth = 2 + surgeLv * 0.5;
                ctx.shadowColor = `rgb(${sr},${sg},${sb})`;
                ctx.shadowBlur = 12 + surgeLv * 4;
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius + 3 + surgeLv, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }

            // Glow for special skins (enhanced)
            if (skin.glow) {
                ctx.save();
                ctx.globalAlpha = 0.6;
                ctx.shadowColor = skin.glow;
                ctx.shadowBlur = 12;
                ctx.fillStyle = skin.glow;
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius + 4, 0, Math.PI * 2);
                ctx.fill();

                // Pulsing particle ring for special balls
                const pulseRing = Math.sin(time * 0.015) * 0.3 + 0.7;
                ctx.globalAlpha = pulseRing * 0.3;
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius + 8, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }
        }

        // ============================================================================
        // HUD RENDERING
        // ============================================================================

        function drawHUD() {
            const W = DESIGN.width;

            // ================================================================
            // TOP BAR — Premium glass card with neon cyan border
            // ================================================================
            const topH = 52;

            // Glass card background with blur effect
            ctx.save();
            ctx.globalAlpha = 0.88;
            const topGrad = ctx.createLinearGradient(0, 0, 0, topH + 4);
            topGrad.addColorStop(0, 'rgba(10,15,30,0.95)');
            topGrad.addColorStop(1, 'rgba(10,15,30,0.85)');
            ctx.fillStyle = topGrad;
            ctx.fillRect(0, 0, W, topH);
            ctx.restore();

            // Neon cyan top border (animated)
            const glowIntensity = Math.sin(gameTime * 0.01) * 0.2 + 0.8;
            ctx.shadowColor = '#00e5ff';
            ctx.shadowBlur = 8 * glowIntensity;
            ctx.fillStyle = '#00e5ff';
            ctx.fillRect(0, 0, W, 2);

            // Animated neon line at bottom
            const lineAlpha = Math.sin(gameTime * 0.008) * 0.3 + 0.5;
            ctx.globalAlpha = lineAlpha;
            ctx.fillStyle = '#00ff88';
            ctx.fillRect(0, topH - 1, W, 1);
            ctx.globalAlpha = 1;

            // LEFT: Score + Wickets (LARGER, bright cyan glow)
            const scoreStr = gameState.score + '/' + gameState.wickets;
            ctx.save();
            ctx.shadowColor = '#00e5ff';
            ctx.shadowBlur = 12;
            drawText(scoreStr, 60, 22, 28, '#00e5ff', 'bold', false);
            ctx.restore();

            // LEFT sub: target
            drawText('Target: ' + gameState.target, 60, 42, 8, 'rgba(255,255,255,0.4)', 'normal', false);

            // CENTER: Overs (balls display) with better styling
            const totalOvers = DIFFICULTY_CONFIG[gameState.difficulty].overs;
            const overStr = gameState.oversCompleted + '.' + gameState.ballsInOver;
            drawText(overStr, W / 2, 18, 20, '#00e5ff', 'bold', false);
            drawText('OVERS', W / 2, 40, 8, 'rgba(255,255,255,0.5)', 'normal', false);

            // RIGHT: Difficulty badge (pill-shaped with gradient)
            const diffColors = { easy: '#00ff88', medium: '#ffaa00', hard: '#ff4444', legend: '#cc44ff' };
            const diffColor = diffColors[gameState.difficulty] || '#00d9ff';
            const diffLabel = gameState.difficulty.toUpperCase();
            const diffBadgeW = 70;
            const diffBadgeX = W - diffBadgeW - 14;

            // Gradient fill for difficulty badge
            const diffGrad = ctx.createLinearGradient(diffBadgeX, 8, diffBadgeX, 28);
            diffGrad.addColorStop(0, `${diffColor}33`);
            diffGrad.addColorStop(1, `${diffColor}11`);

            ctx.save();
            ctx.shadowColor = diffColor;
            ctx.shadowBlur = 8;
            drawRoundedRect(diffBadgeX, 8, diffBadgeW, 20, 10, diffGrad, diffColor, 1.5);
            ctx.restore();
            drawText(diffLabel, diffBadgeX + diffBadgeW / 2, 18, 9, diffColor, 'bold', false);

            // Ball-by-ball dots (larger with glow)
            const dotY = 40;
            const maxDots = 6;
            const dotR = 4;
            const dotGap = 11;
            const dotsStartX = W / 2 - ((maxDots - 1) * dotGap) / 2;

            for (let d = 0; d < maxDots; d++) {
                const dx = dotsStartX + d * dotGap;

                if (d < gameState.ballsInOver) {
                    // Glow effect for bowled balls
                    ctx.save();
                    ctx.shadowColor = '#00ff88';
                    ctx.shadowBlur = 6;
                    ctx.fillStyle = '#00ff88';
                    ctx.beginPath();
                    ctx.arc(dx, dotY, dotR, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();

                    // Subtle pulse on current ball
                    if (d === gameState.ballsInOver - 1) {
                        const pulse = Math.sin(gameTime * 0.015) * 0.3 + 0.7;
                        ctx.globalAlpha = pulse * 0.3;
                        ctx.strokeStyle = '#00ff88';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(dx, dotY, dotR + 3, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }
                } else {
                    // Future balls (dim outline)
                    ctx.strokeStyle = 'rgba(100,120,160,0.3)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(dx, dotY, dotR, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
