            // === MISSION SYSTEM ===
            _updateMission(eventType, value) {
                for (let mission of this.missions) {
                    if (mission.completed) continue;

                    if (eventType === 'six' && mission.id === 'hit3sixes') {
                        mission.progress += 1;
                        if (mission.progress >= mission.target) {
                            mission.completed = true;
                            this.addCoins(mission.reward);
                        }
                    } else if (eventType === 'maxScore' && mission.id === 'score50') {
                        mission.progress = Math.max(mission.progress, value);
                        if (mission.progress >= mission.target) {
                            mission.completed = true;
                            this.addCoins(mission.reward);
                        }
                    } else if (eventType === 'phaseComplete' && mission.id === 'beat_phase2') {
                        if (value === 1) { // Phase 2 completed
                            mission.progress = 1;
                            mission.completed = true;
                            this.addCoins(mission.reward);
                        }
                    } else if (eventType === 'gamePlayed' && mission.id === 'play10') {
                        mission.progress += 1;
                        if (mission.progress >= mission.target) {
                            mission.completed = true;
                            this.addCoins(mission.reward);
                        }
                    }
                }
                this.saveToStorage();
            }

            // === DAILY REWARD SYSTEM ===
            _checkDailyReward() {
                const today = new Date().toDateString();
                if (this.dailyReward.lastClaimDate !== today && !this.dailyReward.claimed) {
                    return true; // Reward available
                }
                return false;
            }

            claimDailyReward() {
                const today = new Date().toDateString();
                if (this.dailyReward.lastClaimDate !== today) {
                    // New day or first claim
                    if (this.dailyReward.lastClaimDate === null) {
                        this.dailyReward.streak = 1;
                    } else {
                        this.dailyReward.streak += 1;
                    }
                } else if (this.dailyReward.claimed) {
                    return 0; // Already claimed today
                }

                const streakIdx = Math.min(this.dailyReward.streak - 1, 6);
                const dailyRewards = [5, 8, 10, 15, 20, 25, 50];
                const reward = dailyRewards[streakIdx];

                this.addCoins(reward);
                this.dailyReward.lastClaimDate = today;
                this.dailyReward.claimed = true;
                this.saveToStorage();
                return reward;
            }

            // === XP & LEVELING SYSTEM ===
            addCoins(amount) {
                // Apply 2x VIP bonus
                const finalAmount = this.isVIP ? amount * 2 : amount;
                this.coins = Math.min(999999999, this.coins + finalAmount); // 1B hard cap
            }

            addXP(amount) {
                this.xp += amount;
                while (this.xp >= this.xpToNextLevel) {
                    this.xp -= this.xpToNextLevel;
                    this.level += 1;
                    this.addCoins(15); // Bonus coins on level up
                    // Cap scaling: 1.4x under level 10, 1.2x after for smoother progression
                    const scale = this.level >= 10 ? 1.2 : this.xpScale;
                    this.xpToNextLevel = Math.floor(this.xpToNextLevel * scale);
                }
                this.saveToStorage();
            }

            // === ACHIEVEMENTS CHECK ===
            checkAchievements() {
                try {
                    for (const ach of ACHIEVEMENTS) {
                        if (!this.achievements[ach.id] && ach.check(this)) {
                            this.achievements[ach.id] = true;
                            this.achievementToasts.push({
                                name: ach.name, icon: ach.icon,
                                showTime: Date.now(), duration: 3500,
                            });
                            audio.play('surge');
                            Utils.haptic(50);
                            // Persist to Convex
                            if (window._convexClient && window._convexClient.isRegistered) {
                                window._convexClient.unlockAchievement(ach.id, 'crickbot').catch(e => {
                                    console.warn('[CrickBot] Achievement sync failed:', e.message);
                                });
                            }
                        }
                    }
                } catch(e) { console.warn('[ACHIEVEMENTS]', e.message); }
            }

            // === RECORD MATCH RESULT (call at game over) ===
            recordMatchResult() {
                const won = this.score >= this.target;
                this.totalRuns += this.score;
                this.totalFours += this.fours;
                this.totalSixes += this.sixes;
                this.totalBallsFaced += this.oversCompleted * 6 + this.ballsInOver;
                this.totalCoinsEarned += this.score * 7;
                if (won) this.totalWins++;
                if (won && this.difficulty === 'legend') this._legendWins++;
                this.matchHistory.push({
                    score: this.score, target: this.target, wickets: this.wickets,
                    overs: this.oversCompleted + '.' + this.ballsInOver,
                    difficulty: this.difficulty, won, date: new Date().toLocaleDateString(),
                });
                if (this.matchHistory.length > 10) this.matchHistory.shift();
                this.checkAchievements();
                this.saveToStorage();
            }

            // === CONVEX SYNC ===
            _syncToConvex() {
                try {
                    if (!window._convexClient || !window._convexClient.isRegistered) {
                        console.warn('[CrickBot] Convex client not ready');
                        return;
                    }

                    const won = this.score >= this.target;
                    const stats = {
                        runs: this.score,
                        target: this.target,
                        wickets: this.wickets,
                        overs: this.oversCompleted + '.' + this.ballsInOver,
                        fours: this.fours,
                        sixes: this.sixes,
                        phase: this.currentPhase,
                    };

                    const duration = Math.floor((Date.now() - this.gameStartTime) / 1000);
                    window._convexClient.submitSession('crickbot', this.score, this.difficulty, won, stats, duration).catch(e => {
                        console.warn('[CrickBot] Session sync failed:', e.message);
                    });

                    // Sync career stats
                    const careerPayload = {
                        totalGamesPlayed: this.gamesPlayed || 0,
                        totalCoinsEarned: this.coins || 0,
                        level: this.level || 1,
                        xp: this.xp || 0,
                        bestScores: {
                            crickbot: this.bestScore || 0,
                            goalbot: 0,
                            basehit: 0,
                        },
                        crickbotStats: {
                            totalRuns: this.totalRuns || 0,
                            totalFours: this.totalFours || 0,
                            totalSixes: this.totalSixes || 0,
                            totalBallsFaced: this.totalBallsFaced || 0,
                            totalWins: this.totalWins || 0,
                            legendWins: this._legendWins || 0,
                        },
                        goalbotStats: {
                            totalGoals: 0, totalShots: 0, totalSaves: 0, shotAccuracy: 0,
                        },
                        basehitStats: {
                            totalHRs: 0, totalSwings: 0, totalGoodHits: 0,
                            totalFouls: 0, totalStrikes: 0, bestStreak: 0,
                        },
                    };

                    window._convexClient.syncPlayerStats(careerPayload).catch(e => {
                        console.warn('[CrickBot] Stats sync failed:', e.message);
                    });

                    // Sync campaign progress (phases)
                    const unlockedCount = (this.phasesUnlocked || []).filter(Boolean).length;
                    if (unlockedCount > 1) {
                        window._convexClient.syncCampaign(
                            'crickbot',
                            this.currentPhase + 1,
                            unlockedCount,
                            { phases: this.phasesUnlocked }
                        ).catch(e => {
                            console.warn('[CrickBot] Campaign sync failed:', e.message);
                        });
                    }
                } catch (e) {
                    console.warn('[CrickBot] _syncToConvex error:', e.message);
                }
            }

            async _mpSyncScore(lastResult, lastRuns) {

                try {
                    await window._convexClient.updateInnings(this.mpRoomId, this.mpInnings, {

                        wickets: this.wickets,
                        overs: this.oversCompleted,
                        balls: this.ballsInOver,

            // Complete setter's innings and transition
            async _mpCompleteInnings1() {
                if (!this.mpRoomId) return;
                if (this.mpIsBotMatch) return { target: this.score + 1 };
                try {
                    const result = await window._convexClient.completeInnings1(this.mpRoomId, {
                        finalScore: this.score,
                        finalWickets: this.wickets,
                        finalOvers: this.oversCompleted,
                        finalFours: this.fours,
                        finalSixes: this.sixes,
                    });
                    return result;
                } catch(e) { console.warn('[MP] Complete innings1 failed:', e.message); }
            }

            // Complete chaser's innings and finalize match
            async _mpCompleteMatch() {
                if (!this.mpRoomId) return;
                if (this.mpIsBotMatch) {
                    // Bot match — compute result client-side + record in Convex
                    const target = this.mpTarget;
                    let winner = '', winMargin = '';
                    if (this.score >= target) {
                        winner = 'Alpit';
                        const wLeft = 3 - this.wickets;
                        winMargin = wLeft + ' wicket' + (wLeft !== 1 ? 's' : '');
                    } else if (this.score === target - 1) {
                        winner = 'TIE';
                        winMargin = 'Scores level!';
                    } else {
                        winner = 'Cricket AI 2026';
                        const rDiff = (target - 1) - this.score;
                        winMargin = rDiff + ' run' + (rDiff !== 1 ? 's' : '');
                    }
                    this.mpMatchResult = { winner, winMargin };

                    // Record bot match in Convex for history/dashboard
                    const botRoom = _mpWaitingRoomData;
                    if (botRoom && window._convexClient) {
                        window._convexClient.recordBotMatch({
                            playerName: 'Alpit',
                            difficulty: this.difficulty || 'medium',
                            botScore: botRoom.innings1Score,
                            botWickets: botRoom.innings1Wickets,
                            botOvers: botRoom.innings1Overs,
                            botBalls: botRoom.innings1Balls,
                            botFours: botRoom.innings1Fours,
                            botSixes: botRoom.innings1Sixes,
                            playerScore: this.score,
                            playerWickets: this.wickets,
                            playerOvers: this.oversCompleted,
                            playerBalls: this.ballsInOver,
                            playerFours: this.fours,
                            playerSixes: this.sixes,
                            winner, winMargin,
                        }).catch(e => console.warn('[MP] Bot match record failed:', e.message));
                    }

                    return this.mpMatchResult;
                }
                try {
                    const result = await window._convexClient.completeMatch(this.mpRoomId, {
                        finalScore: this.score,
                        finalWickets: this.wickets,
                        finalOvers: this.oversCompleted,
                        finalFours: this.fours,
                        finalSixes: this.sixes,
                    });
                    this.mpMatchResult = result;
                    return result;

            bowlNextBall() {
                if (this.screen !== 'game') return;
                // Prevent multiple simultaneous active deliveries
                // Block if ANY ball hasn't had its result fully processed yet
                if (this.balls.some(b => !b.resultGiven)) return;

                // Reset stumps for new delivery (rebuild after scatter)
                if (typeof stumps !== 'undefined') stumps.reset();

                // AI selects delivery FIRST (so we can pass type to bowler)
                _syncEngineDifficulty(this.difficulty);
                let delivery;
                const engineDel = _getEngineDelivery(this.difficulty);
                if (engineDel) {
                    // Map engine format → game format
                    const ballType = BALL_TYPES.find(t => t.name === engineDel.type) || BALL_TYPES[0];
                    delivery = {
                        ballType,
                        line: engineDel.line || 'center',
                        length: engineDel.length || 'good',
                        category: engineDel.strategy || 'balanced',
                        typeName: engineDel.type,
                    };
                } else {
                    // Fallback to inline AI
                    delivery = adaptiveAI.selectDelivery(this.difficulty);
                }

                // Start bowler run-up animation WITH delivery type for visual tells
                if (typeof bowler !== 'undefined') bowler.startRunUp(delivery.ballType.name);
                const config = DIFFICULTY_CONFIG[this.difficulty];
                const lineData = BOWL_LINES[delivery.line];
                const lengthData = BOWL_LENGTHS[delivery.length];

                // === LEVEL-BASED SCALING ===
                // AI gets progressively stronger as player levels up (smooth curve, capped at +30%)
                const lvl = gameState.level || 1;
                const levelScaling = {
                    speedMul: 1.0 + Math.min(lvl * 0.015, 0.30),       // +1.5% speed per level, cap +30%
                    swingMul: 1.0 + Math.min(lvl * 0.01, 0.20),        // +1% swing per level, cap +20%
                    accuracyMul: 1.0 - Math.min(lvl * 0.005, 0.15),    // -0.5% jitter per level, cap -15%
                };

                // === FATIGUE MODIFIERS ===
                const fatigueMods = fatigueSystem.getModifiers();

                // Base speed from difficulty config, modified by ball type + length + fatigue + level scaling
                const baseSpeed = config.speeds.min + Math.random() * (config.speeds.max - config.speeds.min);
                const _deathOverSpeedMul = getOverPhase() === 'death' ? 1.15 : 1.0;
                const finalSpeed = baseSpeed * delivery.ballType.speedMul * lengthData.speedMul * fatigueMods.speedMul * levelScaling.speedMul * _deathOverSpeedMul;

                // Adaptive speed boost: if AI bias is high, push speed up slightly
                const adaptiveSpeedBoost = 1 + adaptiveAI.difficultyBias * 0.1;

                // Line offset: where the ball targets (fatigue reduces accuracy, level scaling improves it)
                const accuracyJitter = (1 - fatigueMods.accuracyMul) * 15 * levelScaling.accuracyMul;
                const _deathOverLineMul = getOverPhase() === 'death' ? 1.5 : 1.0;
                const lineOffset = lineData.xOffset + (Math.random() - 0.5) * 8 * levelScaling.accuracyMul * _deathOverLineMul + (Math.random() - 0.5) * accuracyJitter;

                // Swing: from ball type + length modifier + random variation + level scaling
                const swingAmount = (delivery.ballType.swing + delivery.ballType.spin) *
                                    lengthData.swingMul * levelScaling.swingMul *
                                    (0.7 + Math.random() * 0.6);

                // === NO BALL CHECK ===
                const isNoBall = extrasSystem.rollNoBall(this.difficulty);
                if (isNoBall) {
                    extrasSystem.isNoBall = true;
                    extrasSystem.isFreeHit = true; // next ball = free hit
                    extrasSystem.totalNoBalls++;
                    let extraScore = 1;
                    if (gameState._activeScoreBoost) {
                        extraScore *= 2;
                    }
                    this.score += extraScore;
                    this.extras += 1;
                    extrasSystem.totalExtras++;
                    commentary.trigger('noBall');
                    crowdSystem.trigger('noBall');
                    umpire.triggerSignal('noball');
                } else {
                    extrasSystem.isNoBall = false;
                }

                // === ML PREDICTION UPDATE ===
                mlPredictor.predict(this, batsmanProfile, adaptiveAI);

                this.ballType = delivery.ballType.name;
                this.lastDelivery = delivery; // store for ML data

                // Delay ball spawn until bowler reaches crease (~25 frames run-up)
                const self = this;
                const spawnBall = function() {
                    if (self.screen !== 'game') return;
                    audio.play('bowl');

                    const ball = {
                        x: DESIGN.width / 2 + lineOffset,
                        y: DESIGN.bowlersCreaseY,
                        speedY: Math.max(1.5, Math.min(10, finalSpeed * adaptiveSpeedBoost)),
                        speedX: lineOffset * 0.005,  // slight drift toward target line
                        radius: 10,
                        trail: [],
                        swing: (Math.random() > 0.5 ? 1 : -1) * swingAmount,
                        hit: false,
                        resultGiven: false,
                        delivery: delivery,   // store delivery info for ML
                        spawnTime: Date.now(),
                        // Bowler Variation visual properties
                        _deliveryType: delivery.ballType.name,
                        _trailColor: delivery.ballType.trailColor || '#ff4444',
                        _curveMul: delivery.ballType.curveMul || 1.0,
                        _deliveryLabel: delivery.ballType.label || '',
                        // Bouncer mid-pitch bounce point
                        _bouncerBounced: false,
                        // Spin wobble phase
                        _spinPhase: 0,
                    };

                    self.balls.push(ball);

        function drawAIBotBubble(ctx) {
            AI_BOT.update();
            if (AI_BOT.msgTimer <= 0 || !AI_BOT.currentMsg) return;

            const alpha = AI_BOT.msgTimer < 30 ? AI_BOT.msgTimer / 30 : 1;
            const t = Date.now() / 1000;
            const slideIn = Math.min(1, (AI_BOT.msgDuration - AI_BOT.msgTimer) / 12);
            const ease = 1 - Math.pow(1 - slideIn, 4);
            ctx.save();

            // Position: top of screen, just below HUD bar
            const bubbleW = 280;
            const bubbleH = 62;
            const targetX = (DESIGN.width - bubbleW) / 2;
            const bubbleX = targetX + (1 - ease) * DESIGN.width;
            const bubbleY = 55;
            const radius = 14;

            ctx.globalAlpha = alpha;

            const moodThemes = {
                confident: { c1: '#00e5ff', c2: '#0091ea', emoji: '😏', glow: 'rgba(0,229,255,' },
                mocking:   { c1: '#ffd700', c2: '#ff8f00', emoji: '😂', glow: 'rgba(255,215,0,' },
                angry:     { c1: '#ff4444', c2: '#d50000', emoji: '😤', glow: 'rgba(255,68,68,' },
                nervous:   { c1: '#ff8800', c2: '#e65100', emoji: '😰', glow: 'rgba(255,136,0,' },
                defeated:  { c1: '#c084fc', c2: '#7c3aed', emoji: '😱', glow: 'rgba(192,132,252,' }
            };
            const theme = moodThemes[AI_BOT.mood] || moodThemes.confident;

            // === OUTER GLOW PULSE ===
            const glowPulse = 0.4 + 0.3 * Math.sin(t * 2.5);
            ctx.shadowColor = theme.glow + glowPulse + ')';
            ctx.shadowBlur = 20;

            // === MAIN BUBBLE: frosted glass ===
            const bgGrad = ctx.createLinearGradient(bubbleX, bubbleY, bubbleX + bubbleW, bubbleY + bubbleH);
            bgGrad.addColorStop(0, 'rgba(10,14,30,0.88)');
            bgGrad.addColorStop(0.5, 'rgba(18,24,48,0.92)');
            bgGrad.addColorStop(1, 'rgba(10,14,30,0.88)');
            ctx.fillStyle = bgGrad;
            ctx.beginPath();
            ctx.roundRect(bubbleX, bubbleY, bubbleW, bubbleH, radius);
            ctx.fill();
            ctx.shadowBlur = 0;

            // === ANIMATED NEON BORDER ===
            const borderGrad = ctx.createLinearGradient(bubbleX, bubbleY, bubbleX + bubbleW, bubbleY + bubbleH);
            const shift = (t * 0.5) % 1;
            borderGrad.addColorStop((0 + shift) % 1, theme.c1);
            borderGrad.addColorStop((0.5 + shift) % 1, theme.c2);
            borderGrad.addColorStop((1.0 + shift) % 1, theme.c1);
            ctx.strokeStyle = borderGrad;
            ctx.lineWidth = 1.5;
            ctx.globalAlpha = alpha * (0.6 + 0.3 * Math.sin(t * 3));
            ctx.beginPath();
            ctx.roundRect(bubbleX, bubbleY, bubbleW, bubbleH, radius);
            ctx.stroke();
            ctx.globalAlpha = alpha;

            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.roundRect(bubbleX + 1, bubbleY + 1, bubbleW - 2, bubbleH - 2, radius - 1);

            const segments = 4;
            const segAngle = Math.PI * 2 / segments;
            const rotAngle = t * 1.5;
            for (let i = 0; i < segments; i++) {
                const startA = rotAngle + i * segAngle;
                const endA = startA + segAngle * 0.6;
                ctx.strokeStyle = i % 2 === 0 ? theme.c1 : theme.c2;
                ctx.globalAlpha = alpha * (0.5 + 0.5 * Math.sin(t * 3 + i));
                ctx.lineWidth = 2;

                ctx.arc(avX, avY, ringR, startA, endA);
                ctx.stroke();

            ctx.globalAlpha = alpha;
            ctx.restore();

            ctx.beginPath();
            ctx.arc(avX, avY, avR, 0, Math.PI * 2);
            const avGrad = ctx.createRadialGradient(avX, avY - 4, 0, avX, avY, avR);
            avGrad.addColorStop(0, 'rgba(30,35,60,0.95)');
            avGrad.addColorStop(1, 'rgba(10,14,30,0.98)');
            ctx.fillStyle = avGrad;

            ctx.fillText(theme.emoji, avX, avY + 1);

            ctx.fillStyle = theme.c1;
            ctx.fillText('BOWLER BOT', textLeft, bubbleY + 16);

            ctx.globalAlpha = alpha * 0.25;
            ctx.fillStyle = theme.c1;
            ctx.beginPath();
            ctx.roundRect(textLeft + 72, bubbleY + 9, 28, 13, 6);
            ctx.fill();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = theme.c1;
            ctx.font = '700 7.5px "Segoe UI", system-ui, sans-serif';
            ctx.fillText('Lv.4', textLeft + 76, bubbleY + 17);

            // === MESSAGE TEXT with typewriter effect ===
            const typeProgress = Math.min(1, (AI_BOT.msgDuration - AI_BOT.msgTimer) / 30);
            let msg = AI_BOT.currentMsg;
            const maxTextW = bubbleW - 70;
            ctx.font = '600 11px "Segoe UI", system-ui, sans-serif';
            if (ctx.measureText(msg).width > maxTextW) {
                while (ctx.measureText(msg + '...').width > maxTextW && msg.length > 0) msg = msg.slice(0, -1);
                msg += '...';
            }
            const visibleChars = Math.floor(msg.length * typeProgress);
            const displayMsg = msg.substring(0, visibleChars);

            ctx.fillStyle = '#edf0f7';
            ctx.textBaseline = 'middle';
            ctx.fillText(displayMsg, textLeft, bubbleY + 38);

            if (typeProgress < 1) {
                const cursorX = textLeft + ctx.measureText(displayMsg).width + 2;
                ctx.globalAlpha = alpha * (Math.sin(t * 8) > 0 ? 0.8 : 0);
                ctx.fillStyle = theme.c1;
                ctx.fillRect(cursorX, bubbleY + 31, 1.5, 14);

            for (let i = 0; i < 4; i++) {
                const angle = t * 0.8 + i * Math.PI / 2;

            ctx.fillStyle = theme.c1;
            const indW = 30;
            ctx.beginPath();
            ctx.roundRect(bubbleX + (bubbleW - indW) / 2, bubbleY + bubbleH - 3, indW, 2, 1);
            ctx.fill();

            ctx.restore();
        }

        const audio = {
            _ctx: null, muted: false,
            _init() {
                if (this._ctx) {
                    // iOS resume: AudioContext starts suspended, resume on user interaction
                    if (this._ctx.state === 'suspended') this._ctx.resume();
                    return true;
                }
                try { this._ctx = new (window.AudioContext || window.webkitAudioContext)(); return true; }
                catch(e) { return false; }
            },
            _tone(freq, dur, vol, type='sine', freqEnd=null) {
                if (!this._init() || this.muted) return;
                const c=this._ctx, n=c.currentTime, o=c.createOscillator(), g=c.createGain();
                o.type=type; o.connect(g); g.connect(c.destination);
                o.frequency.setValueAtTime(freq, n);
                if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, n+dur);
                g.gain.setValueAtTime(vol, n);
                g.gain.exponentialRampToValueAtTime(0.001, n+dur);
                o.start(n); o.stop(n+dur);
                // Cleanup: disconnect nodes after playback to prevent memory leak (iOS critical)
                o.onended = () => { try { o.disconnect(); g.disconnect(); } catch(e){} };
            },
            _chord(freqs, dur, vol, type='triangle', stagger=0.06) {
                if (!this._init() || this.muted) return;
                const c=this._ctx, n=c.currentTime;
                freqs.forEach((f,i) => {
                    const o=c.createOscillator(), g=c.createGain();
                    o.type=type; o.connect(g); g.connect(c.destination);
                    o.frequency.setValueAtTime(f, n+i*stagger);
                    g.gain.setValueAtTime(vol, n+i*stagger);
                    g.gain.exponentialRampToValueAtTime(0.001, n+dur+i*stagger);
                    o.start(n+i*stagger); o.stop(n+dur+i*stagger+0.01);
                    o.onended = () => { try { o.disconnect(); g.disconnect(); } catch(e){} };
                });
            },
            play(s) {
                if (document.hidden) return; // don't play audio when backgrounded
                try {
                    switch(s) {
                        case 'bowl': this._tone(200,0.25,0.2,'sine',600); break;
                        case 'bat_hit': this._tone(150,0.12,0.25); this._tone(800,0.2,0.12,'square'); break;
                        case 'four': this._chord([523,659,784],0.4,0.12); break;
                        case 'six': this._chord([523,659,784,1047],0.5,0.15); this._tone(80,0.3,0.08); break;
                        case 'wicket': this._chord([349,293,196],0.4,0.15,'sawtooth',0.12); break;
                        case 'click': this._tone(1000,0.06,0.06); break;
                        case 'whistle': this._tone(1200,0.25,0.1); break;
                        case 'surge': this._tone(800,0.35,0.12,'sawtooth',1600); break;
                        case 'coin': this._tone(1600,0.15,0.08,'sine',800); break;
                    }
                } catch(e) {}
            }

        function updateShake() {
            camera.update();
            // Sync legacy vars for entity renderers that read them directly
            cameraShakeX = camera.shakeX;
            cameraShakeY = camera.shakeY;
            cameraShakeIntensity = camera.shakeIntensity;
        }

        // ============================================================================
        // GRAPHICS HELPERS
        // ============================================================================

        // ============================================================================
        // POLISHED RENDERING HELPERS (iOS-grade UI)
        // ============================================================================

        function drawGradient(x, y, w, h, c1, c2, dir = 'v') {
            const grad = dir === 'v'
                ? ctx.createLinearGradient(0, y, 0, y + h)
                : ctx.createLinearGradient(x, 0, x + w, 0);
            grad.addColorStop(0, c1);
            grad.addColorStop(1, c2);
            return grad;
        }

        function drawGradient3(x, y, w, h, c1, c2, c3) {
            const grad = ctx.createLinearGradient(0, y, 0, y + h);
            grad.addColorStop(0, c1);
            grad.addColorStop(0.5, c2);
            grad.addColorStop(1, c3);
            return grad;
        }

        // Font cache to avoid per-frame string allocation
        const _fontCache = {};
        function _getFont(weight, size) {
            const key = weight + size;
            if (!_fontCache[key]) {
                _fontCache[key] = `${weight} ${size}px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif`;
            }
            return _fontCache[key];
        }

        function drawText(text, x, y, size, color, font = 'bold', shadow = true) {
            ctx.font = _getFont(font, size);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (shadow) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillText(text, x + 1, y + 1);
            }

            ctx.fillStyle = color;
            ctx.fillText(text, x, y);
        }

        function drawTextLeft(text, x, y, size, color, font = 'bold') {
            ctx.font = _getFont(font, size);
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = color;
            ctx.fillText(text, x, y);
        }

        function drawGlow(x, y, radius, color, intensity = 3) {
            ctx.save();
            ctx.shadowColor = color;
            ctx.shadowBlur = radius * intensity;
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.15;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawRoundedRect(x, y, w, h, r, fillColor, strokeColor = null, lineWidth = 2) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.arcTo(x + w, y, x + w, y + r, r);
            ctx.lineTo(x + w, y + h - r);
            ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
            ctx.lineTo(x + r, y + h);
            ctx.arcTo(x, y + h, x, y + h - r, r);
            ctx.lineTo(x, y + r);
            ctx.arcTo(x, y, x + r, y, r);
            ctx.closePath();

            if (fillColor) {
                ctx.fillStyle = fillColor;
                ctx.fill();
            }
            if (strokeColor) {
                ctx.strokeStyle = strokeColor;
                ctx.lineWidth = lineWidth;
                ctx.stroke();
            }
        }

        // Glass morphism card — dark frosted glass effect with optional neon border
        function drawGlassCard(x, y, w, h, r, borderColor, bgAlpha, neonColor, glowSize) {
            bgAlpha = bgAlpha || 0.75;
            borderColor = borderColor || 'rgba(100,180,255,0.12)';
            ctx.save();

            // Draw dark glass background
            drawRoundedRect(x, y, w, h, r, `rgba(10,15,30,${bgAlpha})`);

            // Top highlight edge (subtle)
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.arcTo(x + w, y, x + w, y + r, r);
            ctx.strokeStyle = 'rgba(255,255,255,0.08)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Neon glow border if specified
            if (neonColor) {
                ctx.shadowColor = neonColor;
                ctx.shadowBlur = glowSize || 12;
            }

            // Border
            drawRoundedRect(x, y, w, h, r, null, neonColor || borderColor, 2);
            ctx.restore();
        }

        // Helper: Draw neon glowing rectangle
        function drawNeonRect(x, y, w, h, r, color, glowSize) {
            ctx.save();
            ctx.shadowColor = color;
            ctx.shadowBlur = glowSize || 12;
            drawRoundedRect(x, y, w, h, r, null, color, 2);
            ctx.restore();
        }

        // Gradient pill button with highlight
        function drawPillButton(x, y, w, h, text, color1, color2, textSize) {
            textSize = textSize || 16;
            const r = h / 2;
            const grad = ctx.createLinearGradient(x, y, x, y + h);
            grad.addColorStop(0, color1);
            grad.addColorStop(1, color2);
            drawRoundedRect(x, y, w, h, r, null);
            ctx.fillStyle = grad;
            ctx.fill();
            // Top shine
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.arcTo(x + w, y, x + w, y + r, r);
            ctx.lineTo(x + w, y + h * 0.4);
            ctx.lineTo(x, y + h * 0.4);
            ctx.lineTo(x, y + r);
            ctx.arcTo(x, y, x + r, y, r);
            ctx.closePath();
            ctx.fillStyle = 'rgba(100,150,220,0.2)';
            ctx.fill();
            ctx.restore();
            // Border
            drawRoundedRect(x, y, w, h, r, null, 'rgba(100,150,220,0.3)', 1);
            // Text
            drawText(text, x + w / 2, y + h / 2, textSize, '#ffffff', 'bold', false);
        }

        // Utility aliases (delegate to Utils object)
        function lerp(a, b, t) { return Utils.lerp(a, b, t); }
        function easeOutCubic(t) { return Utils.easeOutCubic(t); }
        function easeInOutQuad(t) { return Utils.easeInOutQuad(t); }

        // ============================================================================
        // STADIUM RENDERING
        // ============================================================================

        class Stadium {
            constructor() {
                this.stars = [];
                this.clouds = [];
                this.crowd = [];
                this.generateVisuals();
            }

            generateVisuals() {
                // Generate stars
                for (let i = 0; i < 80; i++) {
                    this.stars.push({
                        x: Math.random() * DESIGN.width,
                        y: Math.random() * 100,
                        size: Math.random() * 1.5,
                        opacity: Math.random() * 0.7 + 0.3,
                        twinklePhase: Math.random() * Math.PI * 2,
                    });
                }

                // Generate clouds
                for (let i = 0; i < 5; i++) {
                    this.clouds.push({
                        x: Math.random() * DESIGN.width,
                        y: Math.random() * 60 + 20,
                        width: 60 + Math.random() * 40,
                        height: 20 + Math.random() * 15,
                        speed: Math.random() * 0.3 + 0.1,
                        opacity: 0.4 + Math.random() * 0.3,
                    });
                }

                // Generate crowd in grandstands (300+ people)
                const crowdColors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#95e1d3', '#f38181', '#aa96da'];
                const bandHeight = (DESIGN.grandstandEndY - DESIGN.grandstandStartY) / 4;
                let crowdIndex = 0;

                for (let band = 0; band < 4; band++) {
                    const bandY = DESIGN.grandstandStartY + band * bandHeight + 5;
                    const peoplePerRow = 80;
                    for (let i = 0; i < peoplePerRow; i++) {
                        const x = (i / peoplePerRow) * DESIGN.width;
                        this.crowd.push({
                            x: x,
                            y: bandY,
                            width: 4 + Math.random() * 2,
                            height: 5 + Math.random() * 3,
                            color: crowdColors[Math.floor(Math.random() * crowdColors.length)],
                            bobPhase: Math.random() * Math.PI * 2,
                            waveFreq: Math.random() * 0.05 + 0.02,
                        });
                        crowdIndex++;
                    }
                }
            }

            render(time) {
                const theme = THEMES[gameState.equippedTheme];

                // === FULL GREEN GROUND FILL (prevents any black gaps) ===
                ctx.fillStyle = theme.groundFill;
                ctx.fillRect(0, 0, DESIGN.width, DESIGN.height);

                // Sky gradient — smooth 3-stop for depth
                const skyGrad = ctx.createLinearGradient(0, 0, 0, DESIGN.skyEndY);
                skyGrad.addColorStop(0, theme.skyTop);
                skyGrad.addColorStop(0.6, theme.skyHorizon);
                skyGrad.addColorStop(1, theme.skyBlend);
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, DESIGN.width, DESIGN.skyEndY);

                // Stars with twinkling (visibility depends on theme)
                for (const star of this.stars) {
                    const twinkle = Math.sin(time * 0.004 + star.twinklePhase) * 0.5 + 0.5;
                    ctx.globalAlpha = star.opacity * twinkle * (theme.starOpacity || 0.5);
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;

                // Clouds — softer rendering
                for (const cloud of this.clouds) {
                    cloud.x = (cloud.x + cloud.speed) % (DESIGN.width + 100);
                    ctx.globalAlpha = cloud.opacity * 0.5;
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                    ctx.beginPath();
                    ctx.ellipse(cloud.x, cloud.y, cloud.width, cloud.height, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // Inner lighter core
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.beginPath();
                    ctx.ellipse(cloud.x, cloud.y, cloud.width * 0.6, cloud.height * 0.6, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;

                // Grandstands — gradient tiers with depth
                const bandHeight = (DESIGN.grandstandEndY - DESIGN.grandstandStartY) / 4;
                for (let i = 0; i < 4; i++) {
                    const by = DESIGN.grandstandStartY + i * bandHeight;
                    const depth = 0.7 + (i * 0.08); // darker at top
                    const baseColor = i % 2 === 0 ? theme.standColor1 : theme.standColor2;
                    ctx.fillStyle = baseColor;
                    ctx.globalAlpha = depth;
                    ctx.fillRect(0, by, DESIGN.width, bandHeight);
                    // Seat line separators
                    ctx.fillStyle = 'rgba(0,0,0,0.15)';
                    ctx.fillRect(0, by + bandHeight - 1, DESIGN.width, 1);
                }
                ctx.globalAlpha = 1;

                // Crowd — bobbing colored heads
                for (const person of this.crowd) {
                    const bob = Math.sin(time * 0.004 + person.bobPhase) * 1.5;
                    ctx.fillStyle = person.color;
                    ctx.globalAlpha = 0.75;
                    ctx.fillRect(person.x, person.y + bob, person.width, person.height);
                }
                ctx.globalAlpha = 1;

                // Floodlights — subtle glow towers
                const floodX = [50, 140, 274, 364];
                for (const fx of floodX) {
                    // Tower pole
                    const poleGrad = ctx.createLinearGradient(0, DESIGN.floodlightsY, 0, DESIGN.grandstandStartY);
                    poleGrad.addColorStop(0, '#888888');
                    poleGrad.addColorStop(1, '#444444');
                    ctx.strokeStyle = poleGrad;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(fx, DESIGN.floodlightsY);
                    ctx.lineTo(fx, DESIGN.grandstandStartY - 8);
                    ctx.stroke();

                    // Light bulb with glow (themed)
                    ctx.save();
                    ctx.shadowColor = theme.floodlightColor;
                    ctx.shadowBlur = 15;
                    ctx.fillStyle = theme.floodlightColor;
                    ctx.beginPath();
                    ctx.arc(fx, DESIGN.floodlightsY, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();

                    // Soft light cone (themed)
                    const coneGrad = ctx.createLinearGradient(0, DESIGN.floodlightsY, 0, DESIGN.pitchStartY);
                    coneGrad.addColorStop(0, theme.floodlightGlow);
                    coneGrad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = coneGrad;
                    ctx.beginPath();
                    ctx.moveTo(fx, DESIGN.floodlightsY);
                    ctx.lineTo(fx - 70, DESIGN.pitchStartY);
                    ctx.lineTo(fx + 70, DESIGN.pitchStartY);
                    ctx.closePath();
                    ctx.fill();
                }

                // === FAR OUTFIELD — themed green with perspective mow stripes ===
                const farH = DESIGN.pitchStartY - DESIGN.farOutfieldStartY;
                const farGrad = drawGradient3(0, DESIGN.farOutfieldStartY, DESIGN.width, farH, theme.grassDark, theme.grassMid, theme.grassLight);
                ctx.fillStyle = farGrad;
                ctx.fillRect(0, DESIGN.farOutfieldStartY, DESIGN.width, farH);

                // Perspective mowing stripes (wider at bottom)
                for (let stripe = 0; stripe < 6; stripe++) {
                    const stripeY = DESIGN.farOutfieldStartY + stripe * (farH / 6);
                    const stripeH = farH / 6;
                    ctx.fillStyle = stripe % 2 === 0 ? 'rgba(30,90,30,0.18)' : 'rgba(45,120,45,0.12)';
                    ctx.fillRect(0, stripeY, DESIGN.width, stripeH);
                }

                // === SIDE OUTFIELD (green flanking pitch on both sides) ===
                const sideGrad = drawGradient(0, DESIGN.pitchStartY, DESIGN.width, DESIGN.pitchEndY - DESIGN.pitchStartY, theme.grassDark, theme.grassLight);
                ctx.fillStyle = sideGrad;
                ctx.fillRect(0, DESIGN.pitchStartY, DESIGN.width, DESIGN.pitchEndY - DESIGN.pitchStartY);

                // Side outfield mowing lines (angled perspective)
                for (let stripe = 0; stripe < 12; stripe++) {
                    const sy = DESIGN.pitchStartY + stripe * ((DESIGN.pitchEndY - DESIGN.pitchStartY) / 12);
                    const sh = (DESIGN.pitchEndY - DESIGN.pitchStartY) / 12;
                    ctx.fillStyle = stripe % 2 === 0 ? 'rgba(35,100,35,0.12)' : 'rgba(25,80,25,0.08)';
                    ctx.fillRect(0, sy, DESIGN.width, sh);
                }

                // === PITCH STRIP: Brown trapezoid in center ===
                const pitchTopWidth = 50;
                const pitchBottomWidth = 180;
                const pitchTopX = (DESIGN.width - pitchTopWidth) / 2;
                const pitchBottomX = (DESIGN.width - pitchBottomWidth) / 2;

                // Pitch surface with multi-stop gradient (themed)
                const pitchGrad = ctx.createLinearGradient(0, DESIGN.pitchStartY, 0, DESIGN.pitchEndY);
                pitchGrad.addColorStop(0, theme.pitchTop);
                pitchGrad.addColorStop(0.4, theme.pitchTop);
                pitchGrad.addColorStop(0.7, theme.pitchBottom);
                pitchGrad.addColorStop(1, theme.pitchBottom);
                ctx.fillStyle = pitchGrad;
                ctx.beginPath();
                ctx.moveTo(pitchTopX, DESIGN.pitchStartY);
                ctx.lineTo(pitchTopX + pitchTopWidth, DESIGN.pitchStartY);
                ctx.lineTo(pitchBottomX + pitchBottomWidth, DESIGN.pitchEndY);
                ctx.lineTo(pitchBottomX, DESIGN.pitchEndY);
                ctx.closePath();
                ctx.fill();

                // Pitch edge shadow (subtle depth)
                ctx.strokeStyle = 'rgba(0,0,0,0.15)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Pitch texture: fine crack lines
                ctx.strokeStyle = 'rgba(100, 80, 40, 0.25)';
                ctx.lineWidth = 0.5;
                for (let y = DESIGN.pitchStartY + 15; y < DESIGN.pitchEndY; y += 20) {
                    const ratio = (y - DESIGN.pitchStartY) / (DESIGN.pitchEndY - DESIGN.pitchStartY);
                    const w1 = pitchTopWidth + (pitchBottomWidth - pitchTopWidth) * ratio;
                    const x1 = DESIGN.width / 2 - w1 / 2 + 5;
                    const x2 = DESIGN.width / 2 + w1 / 2 - 5;
                    ctx.beginPath();
                    ctx.moveTo(x1, y);
                    ctx.lineTo(x2, y);
                    ctx.stroke();
                }

                // Wear marks (center of pitch — darker patches)
                for (let y = DESIGN.pitchStartY + 60; y < DESIGN.pitchEndY - 60; y += 70) {
                    const ratio = (y - DESIGN.pitchStartY) / (DESIGN.pitchEndY - DESIGN.pitchStartY);
                    const w = 10 + (pitchBottomWidth - pitchTopWidth) * ratio * 0.12;
                    ctx.fillStyle = 'rgba(100, 70, 25, 0.15)';
                    ctx.fillRect(DESIGN.width / 2 - w / 2, y, w, 35);
                }

                // === BOWLER'S END CREASE ===
                const bcY = DESIGN.bowlersCreaseY + 40;
                const bcRatio = (bcY - DESIGN.pitchStartY) / (DESIGN.pitchEndY - DESIGN.pitchStartY);
                const bcW = pitchTopWidth + (pitchBottomWidth - pitchTopWidth) * bcRatio;
                const bcLeft = DESIGN.width / 2 - bcW / 2;
                const bcRight = DESIGN.width / 2 + bcW / 2;

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.75)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(bcLeft - 5, bcY);
                ctx.lineTo(bcRight + 5, bcY);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(bcLeft + 5, bcY - 12);
                ctx.lineTo(bcLeft + 5, bcY + 5);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(bcRight - 5, bcY - 12);
                ctx.lineTo(bcRight - 5, bcY + 5);
                ctx.stroke();

                // === BATSMAN'S END CREASE ===
                const batCreaseY = DESIGN.batsmansCreaseY - 15;
                const batRatio = (batCreaseY - DESIGN.pitchStartY) / (DESIGN.pitchEndY - DESIGN.pitchStartY);
                const batW = pitchTopWidth + (pitchBottomWidth - pitchTopWidth) * batRatio;
                const batLeft = DESIGN.width / 2 - batW / 2;
                const batRight = DESIGN.width / 2 + batW / 2;

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(batLeft - 12, batCreaseY);
                ctx.lineTo(batRight + 12, batCreaseY);
                ctx.stroke();

                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(batLeft + 10, batCreaseY - 8);
                ctx.lineTo(batLeft + 10, batCreaseY + 20);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(batRight - 10, batCreaseY - 8);
                ctx.lineTo(batRight - 10, batCreaseY + 20);
                ctx.stroke();

                // Guard marks
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
                ctx.lineWidth = 1;
                for (let i = -1; i <= 1; i++) {
                    ctx.beginPath();
                    ctx.moveTo(DESIGN.width / 2 + i * 8, batCreaseY + 2);
                    ctx.lineTo(DESIGN.width / 2 + i * 8, batCreaseY + 7);
                    ctx.stroke();
                }

                // === ADDITIONAL PITCH TEXTURE & MARKINGS ===
                // Pitch crack and wear lines (subtle random texture)
                ctx.strokeStyle = 'rgba(100, 80, 40, 0.15)';
                ctx.lineWidth = 0.75;
                for (let y = DESIGN.pitchStartY + 20; y < DESIGN.pitchEndY - 20; y += 35) {
                    const ratio = (y - DESIGN.pitchStartY) / (DESIGN.pitchEndY - DESIGN.pitchStartY);
                    const w = pitchTopWidth + (pitchBottomWidth - pitchTopWidth) * ratio;
                    const leftX = DESIGN.width / 2 - w / 2;
                    const rightX = DESIGN.width / 2 + w / 2;

                    // Diagonal crack lines
                    const crackOffs = Math.sin(y * 0.07) * 8;
                    ctx.beginPath();
                    ctx.moveTo(leftX + 15 + crackOffs, y);
                    ctx.lineTo(rightX - 15 + crackOffs, y + 5);
                    ctx.stroke();
                }

                // Stumps shadow on pitch
                const shadowAlpha = 0.08;
                const shadowOffsetX = 3;
                const shadowOffsetY = 4;
                const shadowLength = 35;
                ctx.fillStyle = `rgba(0, 0, 0, ${shadowAlpha})`;
                ctx.beginPath();
                ctx.moveTo(DESIGN.width / 2 + shadowOffsetX, DESIGN.batsmansCreaseY - 5 + shadowOffsetY);
                ctx.lineTo(DESIGN.width / 2 - 20 + shadowOffsetX, DESIGN.batsmansCreaseY + shadowLength + shadowOffsetY);
                ctx.lineTo(DESIGN.width / 2 + 20 + shadowOffsetX, DESIGN.batsmansCreaseY + shadowLength + shadowOffsetY);
                ctx.closePath();
                ctx.fill();

                // Enhanced grass mowing stripe contrast
                ctx.fillStyle = 'rgba(15, 60, 15, 0.08)';
                for (let y = DESIGN.pitchStartY + 12; y < DESIGN.pitchEndY - 12; y += 25) {
                    const ratio = (y - DESIGN.pitchStartY) / (DESIGN.pitchEndY - DESIGN.pitchStartY);
                    const w = pitchTopWidth + (pitchBottomWidth - pitchTopWidth) * ratio;
                    const x = DESIGN.width / 2 - w / 2;
                    ctx.fillRect(x + 8, y, w - 16, 11);
                }

                // === NEAR OUTFIELD — lush green (themed) ===
                // Brighten the grass colors slightly for the near outfield
                const nearGrad = drawGradient3(0, DESIGN.pitchEndY, DESIGN.width, DESIGN.nearOutfieldEndY - DESIGN.pitchEndY, theme.grassDark, theme.grassMid, theme.grassLight);
                ctx.fillStyle = nearGrad;
                ctx.fillRect(0, DESIGN.pitchEndY, DESIGN.width, DESIGN.nearOutfieldEndY - DESIGN.pitchEndY);

                // Near outfield stripes
                for (let stripe = 0; stripe < 5; stripe++) {
                    const stripeY = DESIGN.pitchEndY + stripe * 16;
                    ctx.fillStyle = stripe % 2 === 0 ? 'rgba(30,100,30,0.12)' : 'rgba(50,130,50,0.08)';
                    ctx.fillRect(0, stripeY, DESIGN.width, 16);
                }

                // === BOTTOM GROUND — deep green (themed) ===
                const bottomGrad = drawGradient3(0, DESIGN.nearOutfieldEndY, DESIGN.width, DESIGN.height - DESIGN.nearOutfieldEndY, theme.grassLight, theme.groundFill, theme.groundFill);
                ctx.fillStyle = bottomGrad;
                ctx.fillRect(0, DESIGN.nearOutfieldEndY, DESIGN.width, DESIGN.height - DESIGN.nearOutfieldEndY);

                // === AMBIENT TINT OVERLAY (theme atmosphere) ===
                if (theme.ambientTint) {
                    ctx.fillStyle = theme.ambientTint;
                    ctx.fillRect(0, 0, DESIGN.width, DESIGN.height);
                }

                // Boundary rope illusion (dashed arc at near outfield edge)
                ctx.setLineDash([8, 6]);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, DESIGN.nearOutfieldEndY);
                ctx.lineTo(DESIGN.width, DESIGN.nearOutfieldEndY);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        const stadium = new Stadium();

        // ============================================================================
        // THEME VISUAL MODIFIERS — Visual effects based on level theme
        // ============================================================================

        function drawThemeEffects(ctx, time) {
            if (!gameState.currentLevelTheme) return;
            const mod = gameState.currentLevelTheme.mod;
            if (!mod) return;

            if (mod === 'night') {
                // Darker overlay + stars
                ctx.fillStyle = 'rgba(20, 20, 40, 0.15)';
                ctx.fillRect(0, 0, DESIGN.width, DESIGN.height);
            } else if (mod === 'rain') {
                // Rain streaks
                ctx.strokeStyle = 'rgba(100, 150, 255, 0.3)';
                ctx.lineWidth = 1;
                for (let i = 0; i < 20; i++) {
                    const x = (i * 37 + time * 0.5) % DESIGN.width;
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x - 20, DESIGN.height);
                    ctx.stroke();
                }
            } else if (mod === 'wind') {
                // Wind streaks
                ctx.strokeStyle = 'rgba(200, 200, 200, 0.15)';
                ctx.lineWidth = 2;
                for (let i = 0; i < 8; i++) {
                    const y = (i * 60 + time * 0.3) % DESIGN.height;
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(DESIGN.width, y + 20);
                    ctx.stroke();
                }
            } else if (mod === 'snow') {
                // Snowflakes falling
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                for (let i = 0; i < 30; i++) {
                    const x = (i * 23 + Math.sin(i) * 50) % DESIGN.width;
                    const y = (time * 0.1 + i * 15) % DESIGN.height;
                    ctx.beginPath();
                    ctx.arc(x, y, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else if (mod === 'fog') {
                // Semi-transparent gray overlay
                ctx.fillStyle = 'rgba(150, 150, 150, 0.2)';
                ctx.fillRect(0, 0, DESIGN.width, DESIGN.height);
            } else if (mod === 'sunset') {
                // Warm orange tint
                ctx.fillStyle = 'rgba(255, 120, 0, 0.08)';
                ctx.fillRect(0, 0, DESIGN.width, DESIGN.height);
            } else if (mod === 'storm') {
                // Occasional lightning flash
                if (Math.sin(time * 0.003) > 0.9) {
                    ctx.fillStyle = 'rgba(255, 255, 200, 0.15)';
                    ctx.fillRect(0, 0, DESIGN.width, DESIGN.height);
                }
            } else if (mod === 'desert') {
                // Heat shimmer wave
                const shim = Math.sin(time * 0.002) * 3;
                ctx.globalAlpha = 0.1;
                for (let y = DESIGN.pitchEndY; y < DESIGN.nearOutfieldEndY; y += 15) {
                    ctx.fillStyle = 'rgba(255, 100, 0, 0.3)';
                    ctx.fillRect(0, y + shim, DESIGN.width, 3);
                }
                ctx.globalAlpha = 1;
            } else if (mod === 'champion') {
                // Golden glow + sparkles
                ctx.globalAlpha = 0.05;
                ctx.fillStyle = '#ffd700';
                ctx.fillRect(0, 0, DESIGN.width, DESIGN.height);
                ctx.globalAlpha = 1;
                // Sparkles
                for (let i = 0; i < 5; i++) {
                    const sx = (i * 83 + Math.cos(time * 0.004) * 100) % DESIGN.width;
                    const sy = (i * 170 + Math.sin(time * 0.005) * 100) % DESIGN.height;
                    ctx.fillStyle = `rgba(255, 215, 0, ${Math.sin(time * 0.01 + i) * 0.3 + 0.3})`;
                    ctx.beginPath();
                    ctx.arc(sx, sy, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // ============================================================================
        // SWIPE INPUT SYSTEM
        // ============================================================================

        const swipeState = {
            active: false,        // is a swipe in progress?
            startX: 0, startY: 0, // where the finger/mouse went down (game coords)
            curX: 0, curY: 0,     // current position during drag
            endX: 0, endY: 0,     // where it ended
            direction: null,      // computed: { angle, distance, shotType, label }
            trailPoints: [],      // for visual trail effect
            swipeTime: 0,         // timestamp of swipe start
        };

        // Shot types determined by swipe direction
        const SWIPE_SHOTS = {
            LOFT:    { label: 'LOFT',    icon: '⬆️', color: '#ff4444', minRuns: 4, sixChance: 0.65, desc: 'Aerial shot over bowler' },
            DRIVE:   { label: 'DRIVE',   icon: '↗️', color: '#00e5ff', minRuns: 2, sixChance: 0.30, desc: 'Elegant drive through covers' },
            CUT:     { label: 'CUT',     icon: '➡️', color: '#ffff00', minRuns: 2, sixChance: 0.10, desc: 'Square cut behind point' },
            PULL:    { label: 'PULL',    icon: '⬅️', color: '#ff8800', minRuns: 2, sixChance: 0.10, desc: 'Pull shot to leg side' },
            SWEEP:   { label: 'SWEEP',   icon: '↙️', color: '#aa44ff', minRuns: 1, sixChance: 0.05, desc: 'Sweep along the ground' },
            DEFEND:  { label: 'DEFEND',  icon: '🛡️', color: '#88ff88', minRuns: 0, sixChance: 0.00, desc: 'Defensive block' },
        };

        // Min swipe distance (in game coords) to register as a directional swipe vs tap
        const SWIPE_MIN_DIST = 25;
        const SWIPE_MAX_TIME = 600; // max ms for a valid swipe

        // === PHASE 1: SHOT FEEDBACK SYSTEM ===
        const shotFeedback = {
            active: false,
            shotName: '',
            shotColor: '#fff',
            quality: '',
            qualityColor: '#fff',
            runs: 0,
            x: 0,
            y: 0,
            timer: 0,
            maxTime: 70,

            trigger(shotType, quality, runs, x, y) {
                this.active = true;
                this.shotName = shotType ? shotType.label : 'TAP';
                this.shotColor = shotType ? shotType.color : '#ffffff';
                this.quality = quality.toUpperCase();
                this.runs = runs;
                this.x = x || DESIGN.width / 2;
                this.y = y || 700;
                this.timer = this.maxTime;

                // Quality color mapping
                const qColors = { PERFECT: '#ffd700', GOOD: '#00e5ff', EDGE: '#ff8800', WEAK: '#888888', MISS: '#ff4444' };
                this.qualityColor = qColors[this.quality] || '#ffffff';
            },

            update() {
                if (!this.active) return;
                this.timer--;
                if (this.timer <= 0) this.active = false;
            },

            render(ctx) {
                if (!this.active || this.timer <= 0) return;
                const progress = 1 - (this.timer / this.maxTime);
                const alpha = this.timer < 20 ? this.timer / 20 : 1;
                const rise = progress * 60; // rises 60px total
                const scale = 1 + progress * 0.15; // subtle scale up

                ctx.save();
                ctx.globalAlpha = alpha;

                // Shot name (big, colored)
                const nameY = this.y - rise - 30;
                ctx.shadowColor = this.shotColor;
                ctx.shadowBlur = 12 + Math.sin(this.timer * 0.3) * 4;
                drawText(this.shotName, this.x, nameY, 28 * scale, this.shotColor, 'bold', false);

                // Quality text (smaller, underneath)
                ctx.shadowColor = this.qualityColor;
                ctx.shadowBlur = 8;
                drawText(this.quality, this.x, nameY + 26, 14, this.qualityColor, 'bold', false);

                // Runs text (small, below quality)
                if (this.runs > 0) {
                    ctx.shadowBlur = 0;
                    drawText('+' + this.runs, this.x, nameY + 44, 16, '#ffffff', 'bold', false);
                }

                ctx.restore();
            }
        };

        function classifySwipe(dx, dy, dist) {
            // Angle: 0 = right, PI/2 = down, -PI/2 = up, PI = left
            const angle = Math.atan2(dy, dx);
            const absDist = dist;

            if (absDist < SWIPE_MIN_DIST) {
                // Tap / very short swipe = defend
                return { angle: 0, distance: absDist, shotType: SWIPE_SHOTS.DEFEND, label: 'DEFEND' };
            }

            // Normalize angle to degrees for easier classification
            const deg = angle * (180 / Math.PI);
            // deg: -180 to 180, where -90 = straight up, 0 = right, 90 = down, +-180 = left

            // Direction zones (non-overlapping):
            //   UP:       -120 to -60   → LOFT (six attempt) — requires bigger swipe
            //   UP-RIGHT: -60  to -15   → DRIVE (off-side four)
            //   RIGHT:    -15  to  45   → CUT (quick runs)
            //   DOWN:      45  to 135   → SWEEP (grounded)
            //   LEFT:     135  to 180   → PULL (leg-side)
            //   UP-LEFT: -180  to -120  → DRIVE (leg-side four)
            let shotType;
            if (deg >= -120 && deg < -60) {
                // LOFT requires a more deliberate swipe — short lazy flicks become DRIVE
                shotType = absDist >= 40 ? SWIPE_SHOTS.LOFT : SWIPE_SHOTS.DRIVE;
            } else if (deg >= -60 && deg < -15) {
                shotType = SWIPE_SHOTS.DRIVE;
            } else if (deg >= -15 && deg < 45) {
                shotType = SWIPE_SHOTS.CUT;
            } else if (deg >= 45 && deg < 135) {
                shotType = SWIPE_SHOTS.SWEEP;
            } else if (deg >= 135 || deg < -150) {
                shotType = SWIPE_SHOTS.PULL;
            } else {
                // -150 to -120 = upper-left diagonal → DRIVE
                shotType = SWIPE_SHOTS.DRIVE;
            }

            return { angle, distance: absDist, shotType, label: shotType.label };
        }

        // ============================================================================
        // BATSMAN RENDERING
        // ============================================================================

        class Batsman {
            constructor() {
                this.x = DESIGN.width / 2;
                this.y = DESIGN.batsmansCreaseY + 30;
                this.batAngle = -0.2;
                this.swingInProgress = false;
                this.swingProgress = 0;
                this.hitBallIndex = -1;
                this.swipeDir = null;  // direction info from swipe
                // Phase 2: Celebration state
                this.celebrating = false;
                this.celebTimer = 0;
                this.celebType = 'bat_raise';
                this.celebMilestone = 0;
            }

            swing(swipeDirection) {
                if (!this.swingInProgress) {
                    this.swingInProgress = true;
                    this.swingProgress = 0;
                    this.swipeDir = swipeDirection || null;
                }
            }

            triggerCelebration(milestone) {
                this.celebrating = true;
                this.celebTimer = 0;
                this.celebMilestone = milestone;
                // Pick celebration type based on milestone
                if (milestone >= 100) {
                    this.celebType = 'helmet_off'; // iconic century celebration
                } else if (milestone >= 50) {
                    this.celebType = 'bat_raise'; // classic bat raise for 50
                } else {
                    this.celebType = 'fist_pump'; // quick pump for 25
                }
            }

            update() {
                // Celebration animation update
                if (this.celebrating) {
                    this.celebTimer++;
                    if (this.celebTimer > 160) {
                        this.celebrating = false;
                        this.celebTimer = 0;
                    }
                    return; // don't update swing during celebration
                }

                if (this.swingInProgress) {
                    this.swingProgress += 0.04;
                    if (this.swingProgress >= 1) {
                        this.swingInProgress = false;
                        this.swingProgress = 0;
                        this.batAngle = -0.2;
                        this.swipeDir = null;
                    } else {
                        // Swing arc direction influenced by swipe
                        const baseArc = Math.sin(this.swingProgress * Math.PI) * 1.2;
                        if (this.swipeDir && this.swipeDir.shotType === SWIPE_SHOTS.LOFT) {
                            this.batAngle = -0.4 + baseArc * 1.3;
                        } else if (this.swipeDir && (this.swipeDir.shotType === SWIPE_SHOTS.CUT || this.swipeDir.shotType === SWIPE_SHOTS.PULL)) {
                            this.batAngle = -0.1 + baseArc * 0.8;
                        } else if (this.swipeDir && this.swipeDir.shotType === SWIPE_SHOTS.DEFEND) {
                            this.batAngle = -0.15 + baseArc * 0.3;
                        } else {
                            this.batAngle = -0.2 + baseArc;
                        }
                    }
                }
            }

            render() {
                const x = this.x + cameraShakeX;
                const y = this.y + cameraShakeY;
                const scale = 1;
                const ps = gameState.activePowerShot;

                // === POWER SHOT AURA (full body glow) ===
                if (ps) {
                    const pulse = Math.sin(Date.now() * 0.008) * 0.3 + 0.7;
                    ctx.save();
                    ctx.shadowColor = ps.color;
                    ctx.shadowBlur = 25 * pulse;
                    ctx.fillStyle = ps.color + '18'; // very translucent
                    ctx.beginPath();
                    ctx.ellipse(x, y + 15, 30 * pulse, 50 * pulse, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();

                    // Ground ring glow
                    ctx.save();
                    ctx.strokeStyle = ps.color;
                    ctx.lineWidth = 2;
                    ctx.shadowColor = ps.color;
                    ctx.shadowBlur = 12 * pulse;
                    ctx.globalAlpha = 0.4 * pulse;
                    ctx.beginPath();
                    ctx.ellipse(x, y + 36, 32, 7, 0, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                    ctx.restore();
                }

                // Subtle shadow beneath batsman
                ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
                ctx.beginPath();
                ctx.ellipse(x, y + 36, 28, 5, 0, 0, Math.PI * 2);
                ctx.fill();

                // Shoes
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(x - 12, y + 58, 10, 6);
                ctx.fillRect(x + 2, y + 58, 10, 6);

                // Pads (white with detail straps)
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(x - 13, y + 30, 10, 28);
                ctx.fillRect(x + 3, y + 30, 10, 28);
                // Pad straps
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(x - 13, y + 38);
                ctx.lineTo(x - 3, y + 38);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x + 3, y + 38);
                ctx.lineTo(x + 13, y + 38);
                ctx.stroke();

                // Jersey (blue)
                ctx.fillStyle = '#1e40af';
                ctx.fillRect(x - 15, y + 5, 30, 25);

                // Jersey number
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('7', x, y + 17);

                // Arms (skin tone)
                ctx.strokeStyle = '#d4a574';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(x - 15, y + 10);
                ctx.lineTo(x - 25, y + 8);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x + 15, y + 10);
                ctx.lineTo(x + 25, y + 8);
                ctx.stroke();

                // Gloves (white)
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(x - 27, y + 8, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x + 27, y + 8, 5, 0, Math.PI * 2);
                ctx.fill();

                // Face
                ctx.fillStyle = '#d4a574';
                ctx.fillRect(x - 8, y - 8, 16, 14);

                // Helmet (dark blue dome)
                ctx.fillStyle = '#1a2451';
                ctx.beginPath();
                ctx.arc(x, y - 15, 10, Math.PI, 0, false);
                ctx.fill();

                // Helmet highlight
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.beginPath();
                ctx.arc(x - 3, y - 17, 3, 0, Math.PI * 2);
                ctx.fill();

                // Helmet visor
                ctx.fillStyle = '#000000';
                ctx.fillRect(x - 9, y - 8, 18, 4);

                // BAT (held and swinging with details)
                ctx.save();
                ctx.translate(x + 15, y + 5);
                ctx.rotate(this.batAngle);

                // Power shot bat glow
                if (ps) {
                    const gPulse = Math.sin(Date.now() * 0.01) * 0.4 + 0.6;
                    ctx.shadowColor = ps.color;
                    ctx.shadowBlur = 18 * gPulse;

                    // Neon trail along bat edge
                    ctx.strokeStyle = ps.color;
                    ctx.lineWidth = 2;
                    ctx.globalAlpha = 0.7 * gPulse;
                    ctx.strokeRect(-1, -4, 37, 8);
                    ctx.globalAlpha = 1;
                }

                ctx.fillStyle = ps ? ps.color : '#8B4513';
                ctx.fillRect(0, -3, 35, 6);
                ctx.fillStyle = ps ? '#ffffff' : '#A0522D';
                ctx.fillRect(0, -2.5, 35, 5);

                // Bat grip texture
                ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                ctx.fillRect(0, -2, 8, 4);

                if (ps) { ctx.shadowBlur = 0; }
                ctx.restore();

                // === PHASE 2: CELEBRATION OVERLAY ON BATSMAN ===
                if (this.celebrating) {
                    const ct = this.celebTimer;
                    const cAlpha = ct < 15 ? ct / 15 : ct > 140 ? (160 - ct) / 20 : 1;

                    if (this.celebType === 'bat_raise') {
                        // Classic bat raise — bat goes up at an angle, arm stretches
                        ctx.save();
                        const raiseProgress = Math.min(1, ct / 25);
                        const raiseAngle = -Math.PI * 0.35 * raiseProgress;
                        const raiseY = -20 * raiseProgress;

                        // Raised bat
                        ctx.translate(x + 15, y + 5 + raiseY);
                        ctx.rotate(raiseAngle);
                        ctx.fillStyle = '#A0522D';
                        ctx.fillRect(0, -3, 35, 6);
                        ctx.fillStyle = '#8B4513';
                        ctx.fillRect(0, -2.5, 35, 5);
                        ctx.restore();

                        // Gold glow around batsman
                        ctx.save();
                        ctx.globalAlpha = cAlpha * 0.3;
                        ctx.shadowColor = '#ffd700';
                        ctx.shadowBlur = 25;
                        ctx.fillStyle = 'rgba(255, 215, 0, 0.15)';
                        ctx.beginPath();
                        ctx.ellipse(x, y + 10, 35, 55, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();

                    } else if (this.celebType === 'helmet_off') {
                        // Century celebration — helmet raised high with one hand
                        ctx.save();
                        const liftProgress = Math.min(1, ct / 30);
                        const helmetY = y - 15 - (45 * liftProgress);
                        const helmetX = x + (15 * liftProgress);
                        const helmetWobble = Math.sin(ct * 0.1) * 3 * liftProgress;

                        // Helmet floating above
                        ctx.fillStyle = '#1a2451';
                        ctx.beginPath();
                        ctx.arc(helmetX + helmetWobble, helmetY, 10, Math.PI, 0, false);
                        ctx.fill();
                        ctx.fillStyle = '#000000';
                        ctx.fillRect(helmetX - 9 + helmetWobble, helmetY, 18, 4);

                        // Raised arm holding helmet
                        ctx.strokeStyle = '#d4a574';
                        ctx.lineWidth = 4;
                        ctx.beginPath();
                        ctx.moveTo(x + 15, y + 10);
                        ctx.lineTo(helmetX + helmetWobble, helmetY + 10);
                        ctx.stroke();

                        // Bright golden aura — century is special
                        ctx.globalAlpha = cAlpha * 0.35;
                        const auraSize = 40 + Math.sin(ct * 0.06) * 8;
                        const aGrad = ctx.createRadialGradient(x, y + 10, 10, x, y + 10, auraSize);
                        aGrad.addColorStop(0, 'rgba(255, 215, 0, 0.4)');
                        aGrad.addColorStop(0.6, 'rgba(255, 140, 0, 0.15)');
                        aGrad.addColorStop(1, 'rgba(255, 215, 0, 0)');
                        ctx.fillStyle = aGrad;
                        ctx.beginPath();
                        ctx.arc(x, y + 10, auraSize, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.restore();

                    } else if (this.celebType === 'fist_pump') {
                        // Quick fist pump — arm shoots up
                        ctx.save();
                        const pumpCycle = Math.sin(ct * 0.15) * 0.5 + 0.5;
                        const pumpY = -25 * pumpCycle;

                        // Fist going up
                        ctx.strokeStyle = '#d4a574';
                        ctx.lineWidth = 4;
                        ctx.beginPath();
                        ctx.moveTo(x + 15, y + 10);
                        ctx.lineTo(x + 18, y - 15 + pumpY);
                        ctx.stroke();

                        // Fist
                        ctx.fillStyle = '#ffffff'; // glove
                        ctx.beginPath();
                        ctx.arc(x + 18, y - 18 + pumpY, 5, 0, Math.PI * 2);
                        ctx.fill();

                        // Small glow
                        ctx.globalAlpha = cAlpha * 0.2;
                        ctx.fillStyle = 'rgba(255, 215, 0, 0.2)';
                        ctx.beginPath();
                        ctx.ellipse(x, y + 10, 28, 45, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    }
                }
            }
        }

        const batsman = new Batsman();

        // ============================================================================
        // BOWLER (with run-up animation)
        // ============================================================================

        class Bowler {
            constructor() {
                this.baseX = DESIGN.width / 2;
                this.x = this.baseX + 22; // start right of stumps
                this.restY = DESIGN.bowlerY;
                this.y = this.restY;
                this.runUpStartY = DESIGN.bowlerY - 120;
                this.deliveryY = DESIGN.bowlersCreaseY;

                this.state = 'idle';
                this.stateTimer = 0;
                this.legPhase = 0;
                this.armPhase = 0;
                this.runSpeed = 3;
                this.bowlSide = 1; // 1 = right of stumps, -1 = left
            }

            startRunUp(deliveryType) {
                this.state = 'running';
                this.stateTimer = 0;
                this.y = this.runUpStartY;
                this.legPhase = 0;
                // Alternate side each delivery (over / around the wicket)
                this.bowlSide = Math.random() > 0.5 ? 1 : -1;
                this.x = this.baseX + this.bowlSide * 22;
                // Store delivery type for visual tells
                this.deliveryType = deliveryType || 'fast';
                const bt = BALL_TYPES.find(t => t.name === this.deliveryType);
                this.deliveryLabel = bt ? bt.label : '';
                this.deliveryIcon = bt ? bt.icon : '';
                this.deliveryColor = bt ? bt.trailColor : '#fff';
                // Spin bowlers run slower, pace bowlers charge in
                this.runSpeed = (this.deliveryType === 'spin' || this.deliveryType === 'slower') ? 2.0 : 3.5;
                // Show indicator timer (fades during run-up)
                this.indicatorTimer = 0;
            }

            // Called when ball is actually released
            deliver() {
                this.state = 'delivering';
                this.stateTimer = 0;
                this.armPhase = 0;
            }

            update() {
                if (this.state === 'running') {
                    // Run toward crease
                    this.y += this.runSpeed;
                    this.legPhase += (this.deliveryType === 'spin' ? 0.15 : 0.28);
                    this.stateTimer++;
