        function drawCampaignResultScreen() {
            const W = DESIGN.width, H = DESIGN.height;
            const won = gameState.score >= gameState.target;
            const levelNum = gameState.currentCampaignLevel;
            const levelCfg = CRICKET_LEVELS[levelNum - 1];
            const stars = gameState.levelStars[levelNum] || 0;

            // Dark overlay
            const overlayGrad = ctx.createLinearGradient(0, 0, 0, H);
            overlayGrad.addColorStop(0, 'rgba(5, 8, 20, 0.94)');
            overlayGrad.addColorStop(1, won ? 'rgba(0, 25, 15, 0.96)' : 'rgba(20, 5, 5, 0.96)');
            ctx.fillStyle = overlayGrad;
            ctx.fillRect(0, 0, W, H);

            // Celebration effects
            if (won) {
                if (!_confettiSpawned) { _spawnConfetti(); _confettiSpawned = true; _fireworkTimer = 0; }
                _drawConfetti();
                _fireworkTimer++;
                if (_fireworkTimer % 50 === 0 && _fireworkTimer < 200) {
                    _spawnFirework(40 + Math.random() * (W - 80), 50 + Math.random() * 100);
                }
                _drawFireworks();
            }

            // Panel
            const panelX = 20, panelY = 50, panelW = W - 40, panelH = H - 100;
            drawGlassCard(panelX, panelY, panelW, panelH, 16, null, 0.8, won ? '#00ff88' : '#ff6644', 12);

            // Level header
            drawText('LEVEL ' + levelNum, W / 2, panelY + 28, 14, 'rgba(255,255,255,0.7)', 'bold', false);
            drawText(levelCfg ? levelCfg.name : '', W / 2, panelY + 46, 10, 'rgba(255,255,255,0.35)', 'normal', false);

            // Result
            const t = Date.now();
            if (won) {
                ctx.save();
                ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 20;
                drawText('🏆', W / 2, panelY + 78, 40, '#ffd700', 'normal', false);
                ctx.restore();
                ctx.save();
                const vHue = (t * 0.1) % 360;
                ctx.shadowColor = 'hsl(' + vHue + ', 100%, 60%)'; ctx.shadowBlur = 20;
                drawText('LEVEL COMPLETE!', W / 2, panelY + 112, 24, '#00ff88', 'bold', false);
                ctx.restore();
            } else {
                ctx.save();
                ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 10;
                drawText('😤', W / 2, panelY + 78, 40, '#fff', 'normal', false);
                ctx.restore();
                drawText('LEVEL FAILED', W / 2, panelY + 112, 24, '#ff6644', 'bold', false);
                const needed = gameState.target - gameState.score;
                drawText('Need ' + needed + ' more runs', W / 2, panelY + 132, 10, 'rgba(255,100,100,0.6)', 'normal', false);
            }

            // Score
            drawText(gameState.score + ' / ' + gameState.target, W / 2, panelY + 165, 36, '#ffffff', 'bold', false);
            drawText('RUNS', W / 2, panelY + 190, 10, 'rgba(255,255,255,0.5)', 'normal', false);

            // Stars display
            const starY = panelY + 225;
            for (let s = 0; s < 3; s++) {
                const sx = W / 2 - 50 + s * 50;
                const earned = s < stars;
                const pulse = earned ? 1 + Math.sin(t * 0.004 + s * 0.8) * 0.1 : 1;
                ctx.save();
                if (earned) { ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 15; }
                drawText(earned ? '⭐' : '☆', sx, starY, 28 * pulse, earned ? '#ffd700' : 'rgba(255,255,255,0.2)', 'normal', false);
                ctx.restore();
            }
            // Star criteria
            drawText('Beat Target  •  3+ Boundaries  •  No Wickets', W / 2, starY + 24, 7, 'rgba(255,255,255,0.4)', 'normal', false);

            // Stats
            const sY = starY + 50;
            const stats = [
                { label: 'FOURS', value: gameState.fours },
                { label: 'SIXES', value: gameState.sixes },
                { label: 'WICKETS', value: gameState.wickets + '/3' },
                { label: 'OVERS', value: gameState.oversCompleted + '.' + gameState.ballsInOver },
            ];
            for (let i = 0; i < stats.length; i++) {
                const sx = panelX + (i % 4) * (panelW / 4) + panelW / 8;
                drawText(stats[i].value.toString(), sx, sY, 18, '#00e5ff', 'bold', false);
                drawText(stats[i].label, sx, sY + 17, 7, 'rgba(255,255,255,0.5)', 'normal', false);
            }

            // Rewards
            if (won && levelCfg) {
                const rwdY = sY + 45;
                drawGlassCard(panelX + 20, rwdY - 5, panelW - 40, 45, 10, '#ffd70022', 0.15, '#ffd700', 1);
                drawText('🪙 +' + levelCfg.coinReward, W / 2 - 50, rwdY + 14, 16, '#ffd700', 'bold', false);
                drawText('⚡ +' + levelCfg.xpReward, W / 2 + 50, rwdY + 14, 16, '#00ff88', 'bold', false);
            }

            // === ACTION BUTTONS ===
            const btnY = panelY + panelH - 65;
            const hasNextLevel = won && levelNum < 100;

            if (hasNextLevel) {
                // 3 buttons: Retry, Next Level (big), Levels
                const smallW = 70, bigW = 130, btnH2 = 44, gap = 8;
                const totalW = smallW * 2 + bigW + gap * 2;
                const startX = W / 2 - totalW / 2;

                // Retry
                drawRoundedRect(startX, btnY, smallW, btnH2, btnH2 / 2, 'rgba(0,229,255,0.2)');
                drawNeonRect(startX, btnY, smallW, btnH2, btnH2 / 2, '#00e5ff', 2);
                drawText('RETRY', startX + smallW / 2, btnY + btnH2 / 2, 10, '#00e5ff', 'bold', false);

                // Next Level (highlighted)
                const nextX = startX + smallW + gap;
                const nextGrad = ctx.createLinearGradient(nextX, btnY, nextX, btnY + btnH2);
                nextGrad.addColorStop(0, '#00ff88');
                nextGrad.addColorStop(1, '#00cc66');
                drawRoundedRect(nextX, btnY, bigW, btnH2, btnH2 / 2, nextGrad);
                ctx.save();
                ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 20;
                drawRoundedRect(nextX, btnY, bigW, btnH2, btnH2 / 2, null, '#00ff88', 2);
                ctx.restore();
                drawText('NEXT LEVEL ▶', nextX + bigW / 2, btnY + btnH2 / 2, 13, '#ffffff', 'bold', false);

                // Levels
                const levelsX = nextX + bigW + gap;
                drawRoundedRect(levelsX, btnY, smallW, btnH2, btnH2 / 2, 'rgba(204,68,255,0.2)');
                drawNeonRect(levelsX, btnY, smallW, btnH2, btnH2 / 2, '#cc44ff', 2);
                drawText('LEVELS', levelsX + smallW / 2, btnY + btnH2 / 2, 10, '#cc44ff', 'bold', false);
            } else {
                // 2 buttons: Retry, Levels
                const btnW2 = 120, btnH2 = 44, gap = 16;
                const startX = W / 2 - (btnW2 * 2 + gap) / 2;

                // Retry
                const retryGrad = ctx.createLinearGradient(startX, btnY, startX, btnY + btnH2);
                retryGrad.addColorStop(0, '#00e5ff');
                retryGrad.addColorStop(1, '#00b4d8');
                drawRoundedRect(startX, btnY, btnW2, btnH2, btnH2 / 2, retryGrad);
                drawText('RETRY', startX + btnW2 / 2, btnY + btnH2 / 2, 13, '#ffffff', 'bold', false);

                // Levels
                const levelsX = startX + btnW2 + gap;
                const levGrad = ctx.createLinearGradient(levelsX, btnY, levelsX, btnY + btnH2);
                levGrad.addColorStop(0, '#cc44ff');
                levGrad.addColorStop(1, '#9933cc');
                drawRoundedRect(levelsX, btnY, btnW2, btnH2, btnH2 / 2, levGrad);
                drawText('LEVELS', levelsX + btnW2 / 2, btnY + btnH2 / 2, 13, '#ffffff', 'bold', false);
            }
        }

        // ============================================================================
        // LEADERBOARD SCREEN
        // ============================================================================

        let _lbData = null;
        let _lbLoading = true;
        let _lbRank = null;
        let _lbError = null;

        async function _fetchLeaderboard() {
            if (!window._convexClient || !window._convexClient.isRegistered) {
                _lbData = [];
                _lbLoading = false;
                _lbError = 'Not connected to cloud';
                return;
            }
            try {
                console.log('[CrickBot-LB] Fetching crickbot top 10...');
                const lb = await window._convexClient.getLeaderboard('crickbot', 10);
                console.log('[CrickBot-LB] Raw response:', JSON.stringify(lb));
                let rank = null;
                try {
                    rank = await window._convexClient.getPlayerRank('crickbot');
                } catch (re) {
                    console.warn('[CrickBot-LB] Rank fetch failed:', re.message);
                }
                console.log('[CrickBot-LB] Rank:', JSON.stringify(rank));
                _lbData = Array.isArray(lb) ? lb : [];
                _lbRank = rank;
                _lbLoading = false;
                _lbError = null;
            } catch (e) {
                _lbData = [];
                _lbLoading = false;
                _lbError = 'Offline — play a match to sync';
                console.warn('[CrickBot-LB] Fetch failed:', e.message);
            }
        }

        function drawLeaderboardScreen() {
            const W = DESIGN.width, H = DESIGN.height;
            const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
            bgGrad.addColorStop(0, '#0a0e1a');
            bgGrad.addColorStop(1, '#0a1628');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, W, H);

            // === PREMIUM LEADERBOARD HEADER ===
            const headerY = 40;
            drawText('🏅 LEADERBOARD', W / 2, headerY, 24, '#ff6b6b', 'bold', false);
            ctx.save();
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 15;
            drawText('🏅 LEADERBOARD', W / 2, headerY, 24, '#ff6b6b', 'bold', false);
            ctx.restore();

            // Back button (premium glass pill)
            const backBtnX = 15;
            const backBtnY = headerY - 18;
            const backBtnSize = 36;
            drawGlassCard(backBtnX, backBtnY, backBtnSize, backBtnSize, 12, 'rgba(255,107,107,0.15)', 0.6, '#ff6b6b', 2);
            ctx.save();
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 8;
            drawText('←', backBtnX + backBtnSize / 2, backBtnY + backBtnSize / 2, 16, '#ff6b6b', 'bold', false);
            ctx.restore();

            // Subtitle
            drawText('Top Players Worldwide', W / 2, headerY + 22, 10, 'rgba(255,107,107,0.6)', 'normal', false);

            // Loading state
            if (_lbLoading) {
                drawText('Loading...', W / 2, 180, 16, 'rgba(0,229,255,0.6)', 'normal', false);
                return;
            }

            // Error state
            if (_lbError) {
                drawText(_lbError, W / 2, 180, 13, 'rgba(255,100,100,0.7)', 'normal', false);
                return;
            }

            const data = _lbData || [];

            // Empty state
            if (data.length === 0) {
                drawText('No scores yet — play a match!', W / 2, 180, 14, 'rgba(0,229,255,0.5)', 'normal', false);
                return;
            }

            // Your rank card
            let contentStartY = 80;
            if (_lbRank) {
                const r = _lbRank;
                const cardY = 75;
                drawGlassCard(20, cardY, W - 40, 48, 12, '#00e5ff22', 0.15, '#00e5ff', 1.5);
                drawText('YOUR RANK', 36, cardY + 16, 10, '#00e5ff', 'bold', true);
                drawText('#' + r.rank + ' of ' + r.totalPlayers, 36, cardY + 34, 14, '#fff', 'bold', true);
                drawText(r.score + ' ⭐', W - 36, cardY + 26, 18, '#ffea00', 'bold', false);
                contentStartY = 135;
            }

            // Leaderboard rows
            const rowH = 40;
            const medals = ['🥇', '🥈', '🥉'];

            for (let i = 0; i < data.length; i++) {
                const entry = data[i];
                const y = contentStartY + i * rowH;
                if (y > H - 20) break;

                // Row background
                const rowColor = i % 2 === 0 ? 'rgba(100,150,220,0.1)' : 'rgba(150,180,240,0.08)';
                drawGlassCard(20, y, W - 40, rowH - 4, 10, rowColor, 0.1, 'transparent', 0);

                // Rank with medal icons
                if (i < 3) {
                    // Top 3 get special treatment
                    const medalColor = i === 0 ? '#ffd700' : (i === 1 ? '#c0c0c0' : '#cd7f32');
                    ctx.save();
                    ctx.shadowColor = medalColor;
                    ctx.shadowBlur = 8;
                    drawText(medals[i], 40, y + (rowH - 4) / 2, 22, medalColor, 'normal', false);
                    ctx.restore();
                } else {
                    drawText('#' + entry.rank, 40, y + (rowH - 4) / 2, 12, 'rgba(128,203,196,0.6)', 'bold', false);
                }

                // Name
                drawText(entry.name, 70, y + (rowH - 4) / 2 - 2, 13, '#e0f7fa', 'normal', true);

                // Score
                drawText(String(entry.score), W - 36, y + (rowH - 4) / 2 - 4, 16, '#00e5ff', 'bold', false);

                // Games played
                drawText((entry.gamesPlayed || 0) + ' games', W - 36, y + (rowH - 4) / 2 + 12, 8, 'rgba(128,203,196,0.4)', 'normal', false);
            }
        }

        let achievementScrollY = 0;

        function drawAchievementsScreen() {
            const W = DESIGN.width, H = DESIGN.height;
            const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
            bgGrad.addColorStop(0, '#0a0e1a');
            bgGrad.addColorStop(1, '#0a1628');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, W, H);

            // === PREMIUM ACHIEVEMENTS HEADER ===
            const headerY = 40;
            drawText('🏆 ACHIEVEMENTS', W / 2, headerY, 24, '#00e5ff', 'bold', false);
            ctx.save();
            ctx.shadowColor = '#00e5ff';
            ctx.shadowBlur = 15;
            drawText('🏆 ACHIEVEMENTS', W / 2, headerY, 24, '#00e5ff', 'bold', false);
            ctx.restore();

            // Back button (premium glass pill)
            const backBtnX = 15;
            const backBtnY = headerY - 18;
            const backBtnSize = 36;
            drawGlassCard(backBtnX, backBtnY, backBtnSize, backBtnSize, 12, 'rgba(0,200,255,0.15)', 0.6, '#00e5ff', 2);
            ctx.save();
            ctx.shadowColor = '#00e5ff';
            ctx.shadowBlur = 8;
            drawText('←', backBtnX + backBtnSize / 2, backBtnY + backBtnSize / 2, 16, '#00e5ff', 'bold', false);
            ctx.restore();

            // Progress badge
            const unlockedCount = Object.values(gameState.achievements).filter(Boolean).length;
            drawText(unlockedCount + ' / ' + ACHIEVEMENTS.length + ' UNLOCKED', W / 2, headerY + 24, 10, 'rgba(0,229,255,0.7)', 'bold', false);

            // Grid
            const contentY = 75;
            const contentH = H - contentY - 10;
            const cols = 3;
            const cardW = Math.floor((W - 50) / cols);
            const cardH = cardW + 30;
            const gap = 8;

            ctx.save();
            ctx.beginPath();
            ctx.rect(15, contentY, W - 30, contentH);
            ctx.clip();

            for (let i = 0; i < ACHIEVEMENTS.length; i++) {
                const ach = ACHIEVEMENTS[i];
                const unlocked = !!gameState.achievements[ach.id];
                const row = Math.floor(i / cols);
                const col = i % cols;
                const cx = 20 + col * (cardW + gap);
                const cy = contentY + row * (cardH + gap) + achievementScrollY;

                if (cy + cardH < contentY || cy > contentY + contentH) continue;

                const borderC = unlocked ? '#00ff88' : 'rgba(100,100,100,0.15)';
                drawGlassCard(cx, cy, cardW, cardH, 10, borderC, unlocked ? 0.25 : 0.08, borderC, unlocked ? 2.5 : 0);
                
                // Subtle shine effect for unlocked achievements
                if (unlocked) {
                    ctx.save();
                    ctx.globalAlpha = (Math.sin(gameTime * 0.003) * 0.2 + 0.3);
                    ctx.fillStyle = 'rgba(0,255,136,0.1)';
                    ctx.beginPath();
                    ctx.roundRect(cx + 2, cy + 2, cardW - 4, cardH - 4, 8);
                    ctx.fill();
                    ctx.restore();
                }

                ctx.save();
                if (!unlocked) ctx.globalAlpha = 0.35;
                drawText(ach.icon, cx + cardW / 2, cy + 28, 28, '#fff', 'normal', false);
                ctx.restore();

                if (!unlocked) {
                    drawText('🔒', cx + cardW / 2, cy + 28, 18, 'rgba(200,200,200,0.6)', 'normal', false);
                }

                drawText(ach.name, cx + cardW / 2, cy + 54, 8, unlocked ? '#00ff88' : 'rgba(255,255,255,0.4)', 'bold', false);

                // Progress bar
                const prog = ach.progress ? ach.progress(gameState) : (unlocked ? 100 : 0);
                const barX = cx + 8, barY2 = cy + 66, barW2 = cardW - 16, barH2 = 3;
                drawRoundedRect(barX, barY2, barW2, barH2, 2, 'rgba(100,100,100,0.2)');
                if (prog > 1) drawRoundedRect(barX, barY2, barW2 * prog / 100, barH2, 2, unlocked ? '#00ff88' : '#0066ff');

                drawText(Math.round(prog) + '%', cx + cardW / 2, barY2 + 11, 7, 'rgba(255,255,255,0.5)', 'normal', false);
            }
            ctx.restore();
        }

                drawText('No matches yet — go play!', W / 2, histY + 40, 10, 'rgba(255,255,255,0.4)', 'normal', false);

        // ============================================================================
        // TUTORIAL OVERLAY (first launch only)
        // ============================================================================

        const TUTORIAL_STEPS = 4; // now 4 steps
        function drawTutorial() {
            if (gameState.tutorialStep === null) return;
            const W = DESIGN.width, H = DESIGN.height;
            const step = gameState.tutorialStep;

            // Dark overlay
            ctx.fillStyle = 'rgba(0,0,0,0.75)';
            ctx.fillRect(0, 0, W, H);

            // Step-specific highlights
            if (step === 0) {
                // SWIPE CONTROLS OVERVIEW
                const cy = H / 2 - 60;
                drawText('SWIPE TO BAT!', W / 2, cy - 40, 20, '#00e5ff', 'bold', false);

                // Draw directional arrows showing swipe types
                const arrows = [
                    { dx: 0, dy: -50, label: '⬆️ LOFT (6s)', color: '#ff4444' },
                    { dx: 40, dy: -35, label: '↗️ DRIVE (4s)', color: '#00e5ff' },
                    { dx: 50, dy: 0, label: '➡️ CUT (2-4)', color: '#ffff00' },
                    { dx: -50, dy: 0, label: '⬅️ PULL (2-4)', color: '#ff8800' },
                    { dx: 0, dy: 40, label: '↙️ SWEEP (1-2)', color: '#aa44ff' },
                ];
                const centerX = W / 2, centerY = cy + 30;

                // Draw center dot
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(centerX, centerY, 6, 0, Math.PI * 2);
                ctx.fill();

                for (const a of arrows) {
                    // Arrow line
                    ctx.strokeStyle = a.color;
                    ctx.lineWidth = 3;
                    ctx.globalAlpha = 0.9;
                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY);
                    ctx.lineTo(centerX + a.dx, centerY + a.dy);
                    ctx.stroke();

                    // Arrow tip
                    const tipX = centerX + a.dx, tipY = centerY + a.dy;
                    ctx.fillStyle = a.color;
                    ctx.beginPath();
                    ctx.arc(tipX, tipY, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;

                // Labels
                drawText('⬆️ LOFT = Six attempt', W / 2, cy + 100, 11, '#ff4444', 'bold', false);
                drawText('↗️ DRIVE = Four attempt', W / 2, cy + 118, 11, '#00e5ff', 'bold', false);
                drawText('⬅️➡️ CUT/PULL = Quick runs', W / 2, cy + 136, 11, '#ffff00', 'bold', false);
                drawText('Tap = Defend (safe 1 run)', W / 2, cy + 154, 11, '#88ff88', 'bold', false);

            } else if (step === 1) {
                // TIMING MATTERS
                const batY = DESIGN.batsmansCreaseY - 40;
                ctx.save();
                ctx.globalCompositeOperation = 'destination-out';
                ctx.fillStyle = 'rgba(255,255,255,1)';
                ctx.beginPath();
                ctx.arc(W / 2, batY, 60, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                ctx.strokeStyle = '#00e5ff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(W / 2, batY, 62, 0, Math.PI * 2);
                ctx.stroke();
                drawText('TIMING + DIRECTION', W / 2, batY - 80, 16, '#00e5ff', 'bold', false);
                drawText('Swipe when the ball is near the bat', W / 2, batY + 80, 12, '#fff', 'normal', false);
                drawText('Perfect timing = maximum runs!', W / 2, batY + 100, 12, '#ffdd00', 'bold', false);

            } else if (step === 2) {
                // Highlight power bar
                const barX = W - 18, barY = 80, barH = 220;
                ctx.save();
                ctx.globalCompositeOperation = 'destination-out';
                ctx.fillStyle = 'rgba(255,255,255,1)';
                ctx.fillRect(barX - 15, barY - 10, 40, barH + 20);
                ctx.restore();
                ctx.strokeStyle = '#ffdd00';
                ctx.lineWidth = 2;
                ctx.strokeRect(barX - 16, barY - 11, 42, barH + 22);
                drawText('Fill the POWER BAR', W / 2, H / 2 - 20, 14, '#ffdd00', 'bold', false);
                drawText('by hitting boundaries!', W / 2, H / 2 + 5, 12, 'rgba(255,255,255,0.7)', 'normal', false);
                drawText('→', barX - 40, barY + barH / 2, 24, '#ffdd00', 'bold', false);
            } else if (step === 3) {
                // Highlight power shot icon
                const iconX = 12, iconY = H / 2 - 20, iconS = 40;
                ctx.save();
                ctx.globalCompositeOperation = 'destination-out';
                ctx.fillStyle = 'rgba(255,255,255,1)';
                ctx.beginPath();
                ctx.arc(iconX + iconS / 2, iconY + iconS / 2, iconS / 2 + 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                ctx.strokeStyle = '#ff4444';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(iconX + iconS / 2, iconY + iconS / 2, iconS / 2 + 12, 0, Math.PI * 2);
                ctx.stroke();
                drawText('Tap POWER SHOT when it appears!', W / 2, iconY + iconS + 50, 13, '#ff4444', 'bold', false);
                drawText('←', iconX + iconS + 15, iconY + iconS / 2, 24, '#ff4444', 'bold', false);
            }

            // Step dots
            for (let s = 0; s < TUTORIAL_STEPS; s++) {
                const dotX = W / 2 - (TUTORIAL_STEPS - 1) * 10 + s * 20;
                const dotY = H - 80;
                ctx.fillStyle = s === step ? '#00e5ff' : 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.arc(dotX, dotY, 4, 0, Math.PI * 2);
                ctx.fill();
            }

            // Tap to continue
            const tapAlpha = Math.sin(Date.now() * 0.004) * 0.3 + 0.7;
            drawText('Tap anywhere to continue', W / 2, H - 50, 11, 'rgba(255,255,255,' + tapAlpha + ')', 'normal', false);
        }

        // ============================================================================
        // ACHIEVEMENT TOAST
        // ============================================================================

        function drawAchievementToast() {
            if (gameState.achievementToasts.length === 0) return;
            const n = gameState.achievementToasts[0];
            const elapsed = Date.now() - n.showTime;
            const remaining = n.duration - elapsed;
            if (remaining < 0) { gameState.achievementToasts.shift(); return; }

            const slideIn = Math.min(1, elapsed / 350);
            const y = -60 + slideIn * 70;
            let alpha = 1;
            if (remaining < 300) alpha = remaining / 300;

            ctx.save();
            ctx.globalAlpha = alpha;
            const W = DESIGN.width;
            const tw = 260, th = 50;
            const tx = W / 2 - tw / 2;
            drawGlassCard(tx, y, tw, th, 12, '#00ff88', 0.85, '#00ff88', 8);
            drawText(n.icon, tx + 30, y + th / 2, 22, '#fff', 'normal', false);
            drawText('ACHIEVEMENT UNLOCKED', tx + tw / 2 + 10, y + 15, 8, 'rgba(255,255,255,0.7)', 'bold', false);
            drawText(n.name, tx + tw / 2 + 10, y + 35, 12, '#00ff88', 'bold', false);
            ctx.restore();
        }

        // ============================================================================
        // PHASE COMPLETE SCREEN
        // ============================================================================

        let phaseAnimPhase = 0;

        function drawPhaseCompleteScreen() {
            phaseAnimPhase += 0.016;

            // === Dark overlay with celebration gradient ===
            const overlayGrad = ctx.createLinearGradient(0, 0, 0, DESIGN.height);
            overlayGrad.addColorStop(0, 'rgba(0, 15, 5, 0.95)');
            overlayGrad.addColorStop(0.5, 'rgba(0, 25, 15, 0.92)');
            overlayGrad.addColorStop(1, 'rgba(5, 8, 20, 0.95)');
            ctx.fillStyle = overlayGrad;
            ctx.fillRect(0, 0, DESIGN.width, DESIGN.height);

            // Animated celebration particles
            for (let i = 0; i < 40; i++) {
                const px = (Math.sin(phaseAnimPhase * 0.5 + i * 1.3) * 0.5 + 0.5) * DESIGN.width;
                const py = (Math.cos(phaseAnimPhase * 0.3 + i * 2.1) * 0.5 + 0.5) * DESIGN.height;
                const colors = ['rgba(0,255,136,', 'rgba(255,215,0,', 'rgba(0,229,255,'];
                const c = colors[i % 3];
                ctx.fillStyle = c + (0.06 + Math.sin(phaseAnimPhase * 2 + i) * 0.04) + ')';
                ctx.beginPath();
                ctx.arc(px, py, 1.5 + Math.sin(phaseAnimPhase + i) * 0.5, 0, Math.PI * 2);
                ctx.fill();
            }

            const phase = PHASES[gameState.currentPhase];
            const isLastPhase = gameState.currentPhase === PHASES.length - 1;
            const panelX = 20;
            const panelY = 60;
            const panelW = DESIGN.width - 40;
            const panelH = DESIGN.height - 120;

            // Main panel with gold neon border
            const neonColor = isLastPhase ? '#ffd700' : '#00ff88';
            drawGlassCard(panelX, panelY, panelW, panelH, 16, null, 0.8, neonColor, 18);

            // === TROPHY / STAR ICON ===
            const iconY = panelY + 50;
            ctx.save();
            ctx.shadowColor = neonColor;
            ctx.shadowBlur = 30 + Math.sin(phaseAnimPhase * 3) * 10;
            const trophyEmoji = isLastPhase ? '🏆' : '⭐';
            drawText(trophyEmoji, DESIGN.width / 2, iconY, 48, neonColor, 'bold', false);
            ctx.restore();

            // === PHASE COMPLETE TEXT ===
            ctx.save();
            ctx.shadowColor = neonColor;
            ctx.shadowBlur = 25;
            const titleText = isLastPhase ? 'GAME MASTERED!' : 'PHASE COMPLETE!';
            drawText(titleText, DESIGN.width / 2, panelY + 110, 36, neonColor, 'bold', false);
            ctx.restore();

            // Phase name
            drawText(phase.name.toUpperCase(), DESIGN.width / 2, panelY + 150, 14, 'rgba(255,255,255,0.7)', 'bold', false);

            // === SCORE DISPLAY ===
            drawText(gameState.score.toString(), DESIGN.width / 2, panelY + 210, 56, '#ffffff', 'bold', false);
            drawText('RUNS', DESIGN.width / 2, panelY + 240, 11, 'rgba(255,255,255,0.4)', 'normal', false);
            drawText('Target: ' + gameState.target, DESIGN.width / 2, panelY + 260, 10, 'rgba(255,255,255,0.5)', 'normal', false);

            // === STATS ===
            const statsY = panelY + 295;
            const colW = panelW / 2;
            const statsData = [
                { label: 'FOURS', value: gameState.fours },
                { label: 'SIXES', value: gameState.sixes },
                { label: 'WICKETS', value: gameState.wickets + '/3' },
                { label: 'OVERS', value: gameState.oversCompleted + '.' + gameState.ballsInOver },
            ];
            for (let i = 0; i < statsData.length; i++) {
                const row = Math.floor(i / 2);
                const col = i % 2;
                const sx = panelX + col * colW + colW / 2;
                const sy = statsY + row * 45;
                drawText(statsData[i].value.toString(), sx, sy, 22, '#00e5ff', 'bold', false);
                drawText(statsData[i].label, sx, sy + 20, 9, 'rgba(255,255,255,0.55)', 'normal', false);
            }

            // === REWARDS ===
            const rwdY = statsY + 2 * 45 + 20;
            const coinsEarned = gameState.runsThisInning * 5;
            const xpEarned = gameState.runsThisInning * 2;
            drawText('+' + coinsEarned, DESIGN.width / 2 - 50, rwdY + 12, 18, '#ffd700', 'bold', false);
            drawText('COINS', DESIGN.width / 2 - 50, rwdY + 32, 8, 'rgba(255,215,0,0.6)', 'normal', false);
            drawText('+' + xpEarned, DESIGN.width / 2 + 50, rwdY + 12, 18, '#00ff88', 'bold', false);
            drawText('XP', DESIGN.width / 2 + 50, rwdY + 32, 8, 'rgba(0,255,136,0.6)', 'normal', false);

            // === NEXT PHASE INFO ===
            if (!isLastPhase) {
                const nextPhase = PHASES[gameState.currentPhase + 1];
                const infoY = rwdY + 60;
                drawRoundedRect(panelX + 15, infoY, panelW - 30, 40, 10, 'rgba(0,229,255,0.08)');
                drawRoundedRect(panelX + 15, infoY, panelW - 30, 40, 10, null, 'rgba(0,229,255,0.25)', 1);
                drawText('NEXT: ' + nextPhase.name.toUpperCase(), DESIGN.width / 2, infoY + 14, 11, '#00e5ff', 'bold', false);
                drawText(nextPhase.unlockText, DESIGN.width / 2, infoY + 30, 9, 'rgba(255,255,255,0.4)', 'normal', false);
            }

            // === ACTION BUTTONS ===
            const btnY = panelY + panelH - 65;
            const btnH = 48;

            if (isLastPhase) {
                // Only Menu button (game mastered)
                const btnW = 180;
                const btnX = DESIGN.width / 2 - btnW / 2;
                const menuGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);

        // ============================================================================
        // ACCESSIBILITY UTILITIES
        // ============================================================================

        function applyAccessibilityFilters() {
            // Apply color-blind mode filter if needed
            if (gameState.colorBlindMode !== 'none') {
                // Color-blind filters (CSS filters on canvas)
                // Protanopia (Red-Blind): shift red to orange/yellow
                // Deuteranopia (Green-Blind): shift green to yellow/red
                // Tritanopia (Blue-Blind): shift blue to red/yellow
                const filterMap = {
                    'none': 'none',
                    'protanopia': 'url(#protanopiaf)',
                    'deuteranopia': 'url(#deuteranopiaf)',
                    'tritanopia': 'url(#tritanopiaf)',
                };
                canvas.style.filter = filterMap[gameState.colorBlindMode] || 'none';
            }

            // Apply reduced motion
            if (gameState.reducedMotion) {
                document.documentElement.style.setProperty('--animation-duration', '0s');
            }

            // Apply large touch targets (increase hit zones)
            if (gameState.largeTargets) {
                document.documentElement.style.setProperty('--touch-multiplier', '1.5');
            }

            // Apply high contrast
            if (gameState.highContrast) {
                ctx.globalAlpha = 0.95;
            }
        }

        // ============================================================================
        // MAIN GAME LOOP
        // ============================================================================

        let lastTime = Date.now();
        let gameTime = 0;

        function animate() {
            const now = Date.now();
            const dt = now - lastTime;
            lastTime = now;
            gameTime += dt;

            // Clear canvas — green base (prevents any black flash)
            ctx.fillStyle = '#1a5c1a';
            ctx.fillRect(0, 0, DESIGN.width, DESIGN.height);

            // Apply camera shake + zoom
            updateShake();

            if (gameState.screen === 'game') {
                // Apply camera transform (shake + zoom)
                camera.applyTransform(ctx);

                // Render stadium
                stadium.render(gameTime);

                // Render theme visual effects (campaign level modifiers)
                drawThemeEffects(ctx, gameTime);

                // Render bowler's end stumps (far end, small)
                bowlerStumps.render();

                // Render bowler (with run-up animation)
                bowler.update();
                bowler.render();

                // Render umpire (bowler's end, with signal animations)
                umpire.update();
                umpire.render();

                // Update field setup based on current over phase
                updateFieldSetup();

                // Adaptive per-ball fielder drift DISABLED — fielders only reposition per over
                // adaptFieldToScoring();

                // Aggressive fielder chase: when a ball is in flight, fielders sprint toward it
                for (const ball of gameState.balls) {
                    if (ball.hit && !ball.resultGiven && !ball._fielderCatchImmune && ball.hitTimer > 2) {
                        for (const f of fielders) {
                            // Continuously update chase target as ball moves (not just initial prediction)
                            if (f.chasing) {
                                f.chaseTargetX = ball.x + ball.hitVx * 8;
                                f.chaseTargetY = ball.y + ball.hitVy * 5;
                            } else {
                                f.startChase(ball.x, ball.y, ball.hitVx, ball.hitVy);
                            }
                        }
                    }
                }

                // Render fielders (between bowler and batsman for correct depth)
                for (const f of fielders) {
                    f.update();
                    f.render();
                }

                // === PHASE 4: Fielder position indicators (pre-delivery) ===
                drawFielderIndicators();

                // Render batsman
                batsman.render();

                // Render stumps (behind batsman = below on screen)
                stumps.render();

                // Render wicket keeper (behind stumps)
                keeper.render();

                // Render balls
                for (const ball of gameState.balls) {
                    drawBall(ball, gameTime);
                }

                // Draw HUD
                drawHUD();

                // Draw surge bar
                drawSurgeBar();
                drawChaseHUD();

                // Draw crowd reactions (particles + wave in grandstand)
                crowdSystem.render(ctx);
                crowdSystem._renderPhase2(ctx);

                // Draw run animations (confetti, boundary flash, etc.)
                runAnimation.render();

                // Draw milestone celebration overlay
                milestoneSystem.render(ctx);

                // Draw result text (dot/bowled/caught/simple text)
                if (gameState.resultTextTime > 0 && !runAnimation.active) {
                    ctx.globalAlpha = Math.min(1, gameState.resultTextTime / 40);
                    const isCaught = gameState.resultText.includes('CAUGHT');
                    const isBowled = gameState.resultText.includes('BOWLED');
                    const isWicket = isCaught || isBowled;
                    const resultColor = isWicket ? '#ff4444' : '#ffff99';
                    const resultSize = isWicket ? 40 : 36;
                    if (isWicket) {
                        ctx.save();
                        ctx.shadowColor = '#ff0000';
                        ctx.shadowBlur = 20 + Math.sin(gameTime * 0.15) * 8;
                        drawText(gameState.resultText, DESIGN.width / 2, 250, resultSize, resultColor, 'bold');
                        ctx.restore();
                    } else {
                        drawText(gameState.resultText, DESIGN.width / 2, 250, resultSize, resultColor, 'bold');
                    }
                    ctx.globalAlpha = 1;
                }

                // === PHASE 1: Shot feedback overlay ===
                shotFeedback.render(ctx);

                // === PHASE 3: Aggression toggle button ===
                drawAggressionToggle();

                // Draw commentary (centered, just above bottom zone)
                if (commentary.displayTimer > 0) {
                    const comY = DESIGN.height - 80;
                    const comAlpha = commentary.fadeAlpha;
                    ctx.globalAlpha = comAlpha * 0.85;
                    drawText(commentary.currentLine, DESIGN.width / 2, comY, 10, '#ffe8b8', 'normal', false);
                    ctx.globalAlpha = 1;
                }

                // --- SWIPE VISUAL INDICATOR ---
                if (swipeState.active && swipeState.trailPoints.length > 1) {
                    const pts = swipeState.trailPoints;
                    const dx = swipeState.curX - swipeState.startX;
                    const dy = swipeState.curY - swipeState.startY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const preview = classifySwipe(dx, dy, dist);

                    // Draw glowing trail
                    ctx.save();
                    for (let i = 1; i < pts.length; i++) {
                        const alpha = i / pts.length;
                        const width = 2 + alpha * 4;
                        ctx.strokeStyle = preview.shotType.color;
                        ctx.globalAlpha = alpha * 0.8;
                        ctx.lineWidth = width;
                        ctx.lineCap = 'round';
                        ctx.beginPath();
                        ctx.moveTo(pts[i - 1].x + cameraShakeX, pts[i - 1].y + cameraShakeY);
                        ctx.lineTo(pts[i].x + cameraShakeX, pts[i].y + cameraShakeY);
                        ctx.stroke();
                    }

                    // Draw arrow head at current position
                    if (dist > SWIPE_MIN_DIST) {
                        const angle = Math.atan2(dy, dx);
                        const tipX = swipeState.curX + cameraShakeX;
                        const tipY = swipeState.curY + cameraShakeY;
                        const arrowLen = 12;
                        ctx.globalAlpha = 0.9;
                        ctx.fillStyle = preview.shotType.color;
                        ctx.beginPath();
                        ctx.moveTo(tipX, tipY);
                        ctx.lineTo(tipX - arrowLen * Math.cos(angle - 0.4), tipY - arrowLen * Math.sin(angle - 0.4));
                        ctx.lineTo(tipX - arrowLen * Math.cos(angle + 0.4), tipY - arrowLen * Math.sin(angle + 0.4));
                        ctx.closePath();
                        ctx.fill();

                        // Shot type label
                        ctx.globalAlpha = 0.95;
                        ctx.shadowColor = preview.shotType.color;
                        ctx.shadowBlur = 8;
                        drawText(preview.shotType.icon + ' ' + preview.label, DESIGN.width / 2, DESIGN.height - 50, 16, preview.shotType.color, 'bold');
                        ctx.shadowBlur = 0;
                    } else {
                        // Show DEFEND label for short swipes
                        ctx.globalAlpha = 0.7;
                        drawText('🛡️ DEFEND', DESIGN.width / 2, DESIGN.height - 50, 14, '#88ff88', 'bold');
                    }
                    ctx.restore();
                }

                // Show shot type label briefly after swipe ends
                if (!swipeState.active && swipeState.direction && batsman.swingInProgress) {
                    const sd = swipeState.direction;
                    const flashAlpha = Math.max(0, 1 - batsman.swingProgress * 2);
                    if (flashAlpha > 0) {
                        ctx.save();
                        ctx.globalAlpha = flashAlpha;
                        ctx.shadowColor = sd.shotType.color;
                        ctx.shadowBlur = 12;
                        drawText(sd.shotType.icon + ' ' + sd.label, DESIGN.width / 2, DESIGN.height - 50, 20, sd.shotType.color, 'bold');
                        ctx.shadowBlur = 0;
                        ctx.restore();
                    }
                }

                // Update game logic (skip if paused)
                if (!gameState.paused) {
                    updateGame();
                }

                // Update all systems (skip if paused)
                if (!gameState.paused) {
                    keeper.update();
                    runAnimation.update();
                    commentary.update();
                    crowdSystem.update();
                    crowdSystem._updatePhase2();
                    milestoneSystem.update();
                    particlePool.update(); // global pool-based particle updates
                }

                // Restore camera transform
                camera.restoreTransform(ctx);

                // Draw AI Bot trash talk bubble (before pause overlay so it's visible)
                drawAIBotBubble(ctx);

                // Draw pause button and overlay
                drawPauseButton();
                drawPauseOverlay();

                // Draw subtle vignette
                drawVignette();

            } else if (gameState.screen === 'menu') {
                drawMenuScreen();
            } else if (gameState.screen === 'settings') {
                drawSettingsScreen();
            } else if (gameState.screen === 'levels') {
                drawLevelSelectScreen();
            } else if (gameState.screen === 'shop') {
                drawShopScreen();
            } else if (gameState.screen === 'gameover') {
                drawGameOverScreen();
            } else if (gameState.screen === 'campaign_result') {
                drawCampaignResultScreen();
            } else if (gameState.screen === 'phase_complete') {
                drawPhaseCompleteScreen();
            } else if (gameState.screen === 'achievements') {
                drawAchievementsScreen();
            } else if (gameState.screen === 'stats') {
                drawStatsScreen();
            } else if (gameState.screen === 'leaderboard') {
                drawLeaderboardScreen();
            } else if (gameState.screen === 'mp_lobby') {
                drawMultiplayerLobbyScreen();
            } else if (gameState.screen === 'mp_create_room') {
                drawCreateRoomScreen();
            } else if (gameState.screen === 'mp_join_room') {
                drawJoinRoomScreen();
            } else if (gameState.screen === 'mp_waiting') {
                drawMultiplayerWaitingScreen();
            }

            // Achievement toast (renders on any screen)
            drawAchievementToast();

            // Tutorial overlay (renders on game screen)
            if (gameState.screen === 'game' && gameState.tutorialStep !== null) {
                drawTutorial();
            }

            // VIP popup (renders on top of everything)
            drawVIPPopup(ctx);

            requestAnimationFrame(animate);
        }

        // ============================================================================
        // INPUT HANDLING
        // ============================================================================

        // === Unified tap handler — called by BOTH click and touchstart ===
        function _handleTap(x, y) {

            // VIP Popup handler (highest priority)
            if (_showVIPPopup) {
                if (window._vipBuyBtn) {
                    const btn = window._vipBuyBtn;
                    if (x >= btn.x && x < btn.x + btn.w && y >= btn.y && y < btn.y + btn.h) {
                        // Trigger IAP via NativePurchase bridge
                        if (window.NativePurchase) {
                            window.NativePurchase.buy('vip_yearly');
                        } else {
                            // Web fallback: activate VIP directly for testing
                            gameState.isVIP = true;
                            gameState.saveToStorage();
                            audio.play('click');
                        }
                        _showVIPPopup = false;
                        return;
                    }
                }
                if (window._vipCloseBtn) {
                    const btn = window._vipCloseBtn;
                    if (x >= btn.x && x < btn.x + btn.w && y >= btn.y && y < btn.y + btn.h) {
                        _showVIPPopup = false;
                        audio.play('click');
                        return;
                    }
                }
                if (window._vipDismissBtn) {
                    const btn = window._vipDismissBtn;
                    if (x >= btn.x && x < btn.x + btn.w && y >= btn.y && y < btn.y + btn.h) {
                        _showVIPPopup = false;
                        audio.play('click');
                        return;
                    }
                }
                return; // Block all other taps while popup is showing
            }

            // === PHASE 3: Aggression toggle (game screen only) ===
            if (gameState.screen === 'game' && !gameState.paused) {
                const togX = 45, togY = DESIGN.height - 45, togR = 30;
                const tdx = x - togX, tdy = y - togY;
                if (tdx * tdx + tdy * tdy <= togR * togR) {
                    gameState.battingMode = gameState.battingMode === 'defensive' ? 'attacking' : 'defensive';
                    audio.play('click');
                    return;
                }
            }

            // Settings screen handler
            if (gameState.screen === 'settings') {
                if (handleSettingsTap(x, y)) return;
                return; // Block other taps on settings screen
            }

            if (gameState.screen === 'menu') {
                // Settings gear (top-left)
                if (x >= 14 && x <= 50 && y >= -3 && y <= 33) {
                    audio.play('click'); gameState.screen = 'settings'; return;
                }
                // Stats button
                const navBtnY = 218, navBtnH = 40;
                const navBtnW = (DESIGN.width - 50) / 2;
                if (x >= 20 && x <= 20 + navBtnW && y >= navBtnY && y <= navBtnY + navBtnH) {
                    audio.play('click'); gameState.screen = 'stats'; return;
                }
                // Achievements button
                if (x >= 30 + navBtnW && x <= 30 + navBtnW * 2 && y >= navBtnY && y <= navBtnY + navBtnH) {
                    audio.play('click'); gameState.screen = 'achievements'; achievementScrollY = 0; return;
                }
                // Leaderboard button
                const lbBtnY = navBtnY + navBtnH + 8;
                if (x >= 20 && x <= DESIGN.width - 20 && y >= lbBtnY && y <= lbBtnY + navBtnH) {
                    audio.play('click');
                    _lbData = null; _lbLoading = true; _lbRank = null; _lbError = null;
                    _fetchLeaderboard();
                    gameState.screen = 'leaderboard';
                    return;
                }

                // Menu buttons — match drawMenuScreen layout (synced with draw code)
                const difficulties = ['easy', 'medium', 'hard', 'legend'];
                const mStartX = 20;
                const mStartY = lbBtnY + navBtnH + 12;
                const mBtnW = (DESIGN.width - 50) / 2;
                const mBtnH = 70;
                const mBtnSpacing = 12;

                for (let i = 0; i < 4; i++) {
                    const row = Math.floor(i / 2);
                    const col = i % 2;
                    const bx = mStartX + col * (mBtnW + mBtnSpacing);
                    const by = mStartY + row * (mBtnH + mBtnSpacing);
                    if (x >= bx && x < bx + mBtnW && y >= by && y < by + mBtnH) {
                        // Only allow unlocked phases
                        if (!gameState.phasesUnlocked[i]) return;
                        audio.play('click');
                        gameState.startGame(difficulties[i]);
                        return;
                    }
                }

                // Play button — starts the highest unlocked but not-yet-beaten phase
                const mPlayY = mStartY + 2 * (mBtnH + mBtnSpacing) + 12;
                const mPlayW = 220;
                const mPlayX = DESIGN.width / 2 - mPlayW / 2;
                if (x >= mPlayX && x < mPlayX + mPlayW && y >= mPlayY && y < mPlayY + 56) {
                    audio.play('click');
                    // Find the highest unlocked phase
                    let highestUnlocked = 0;
                    for (let i = PHASES.length - 1; i >= 0; i--) {
                        if (gameState.phasesUnlocked[i]) { highestUnlocked = i; break; }
                    }
                    gameState.startGame(PHASES[highestUnlocked].difficulty);
                    return;
                }

                // Campaign button (full-width, above shop/levels)
                const mCampaignBtnY = mPlayY + 56 + 10;
                const mCampaignBtnW = 220;
                const mCampaignBtnX = DESIGN.width / 2 - mCampaignBtnW / 2;
                if (x >= mCampaignBtnX && x < mCampaignBtnX + mCampaignBtnW && y >= mCampaignBtnY && y < mCampaignBtnY + 38) {
                    audio.play('click');
                    gameState.screen = 'levels';
                    levelSelectScrollY = 0;
                    return;
                }

                // Levels button (small, right side)
                const mLevelsY = mCampaignBtnY + 38 + 10;
                const mLevelsW = 75;
                const mLevelsX = DESIGN.width / 2 + 10;
                if (x >= mLevelsX && x < mLevelsX + mLevelsW && y >= mLevelsY && y < mLevelsY + 45) {
                    audio.play('click');
                    gameState.screen = 'levels';
                    levelSelectScrollY = 0;
                    return;
                }

                // Shop button
                const mShopY = mCampaignBtnY + 38 + 10;
                const mShopW = 75;
                const mShopX = DESIGN.width / 2 - mShopW - 10;
                if (x >= mShopX && x < mShopX + mShopW && y >= mShopY && y < mShopY + 45) {
                    audio.play('click');
                    gameState.screen = 'shop';
                    shopScrollY = 0;
                    return;
                }

                // Multiplayer button
                const mMpY = mShopY + 55;
                const mMpW = 170;
                const mMpX = DESIGN.width / 2 - mMpW / 2;
                if (x >= mMpX && x < mMpX + mMpW && y >= mMpY && y < mMpY + 38) {
                    audio.play('click');
                    _mpSearching = false;
                    gameState.screen = 'mp_lobby';
                    return;
                }

                // Mute toggle (top-right corner)
                const muteX = DESIGN.width - 50;
                const muteY = 15;
                if (x >= muteX - 18 && x <= muteX + 18 && y >= muteY - 18 && y <= muteY + 18) {
                    audio.muted = !audio.muted;
                    gameState.saveToStorage(); // persist mute preference
                    return;
                }

            } else if (gameState.screen === 'levels') {
                // Back button (draw: 15,15 size 38x38 → bounds [15,53]x[15,53], +5px padding)
                if (x >= 10 && x <= 58 && y >= 10 && y <= 58) {
                    audio.play('click'); gameState.screen = 'menu'; return;
                }

                // Level grid clicks (must match drawLevelSelectScreen dimensions)
                const cellSize = 68;
                const cellSpacing = 6;
                const cols = 5;
                const totalGridWidth = cols * cellSize + (cols - 1) * cellSpacing;
                const gridStartX = (DESIGN.width - totalGridWidth) / 2;
                const gridStartY = 90;

                for (let i = 0; i < CRICKET_LEVELS.length; i++) {
                    const level = CRICKET_LEVELS[i];
                    const col = i % cols;
                    const row = Math.floor(i / cols);
                    const cellX = gridStartX + col * (cellSize + cellSpacing);
                    const cellY = gridStartY + row * (cellSize + cellSpacing) - levelSelectScrollY;

                    if (x >= cellX && x < cellX + cellSize && y >= cellY && y < cellY + cellSize) {
                        if (level.level <= gameState.campaignLevel) {
                            audio.play('click');
                            gameState.startCampaignLevel(level.level);
                            return;
                        }
                    }
                }
            } else if (gameState.screen === 'achievements') {
                // Back button (draw: 15,22 size 36x36 → bounds [15,51]x[22,58], +5px padding)
                if (x >= 10 && x <= 56 && y >= 17 && y <= 63) {
                    audio.play('click'); gameState.screen = 'menu'; return;
                }
            } else if (gameState.screen === 'stats') {
                // Back button (draw: 15,22 size 36x36 → bounds [15,51]x[22,58], +5px padding)
                if (x >= 10 && x <= 56 && y >= 17 && y <= 63) {
                    audio.play('click'); gameState.screen = 'menu'; return;
                }
            } else if (gameState.screen === 'leaderboard') {
                // Back button (draw: 15,22 size 36x36 → bounds [15,51]x[22,58], +5px padding)
                if (x >= 10 && x <= 56 && y >= 17 && y <= 63) {
                    audio.play('click'); gameState.screen = 'menu'; return;
                }
            } else if (gameState.screen === 'shop') {
                // === SHOP SCREEN CLICKS ===
                const sHeaderY = 35;

                // Back button
                // Back button (draw: 15,22 size 36x36 → bounds [15,51]x[22,58], +5px padding)
                const sBackX = 10;
                const sBackY = 17;
                const sBackW = 46;
                const sBackH = 46;
                if (x >= sBackX && x < sBackX + sBackW && y >= sBackY && y < sBackY + sBackH) {
                    audio.play('click');
                    gameState.screen = 'menu';
                    return;
                }

                // 4 Tabs (must match rendering layout)
                const sTabY = sHeaderY + 28;
                const sTabGap = 6;
                const sTabW = (DESIGN.width - 40 - sTabGap * 3) / 4;
                const sTabH = 34;
                const sTabX1 = 20;
                const sTabX2 = sTabX1 + sTabW + sTabGap;
                const sTabX3 = sTabX2 + sTabW + sTabGap;
                const sTabX4 = sTabX3 + sTabW + sTabGap;

                const shopTabs = [
                    { key: 'balls', x: sTabX1 },
                    { key: 'stadiums', x: sTabX2 },
                    { key: 'powerups', x: sTabX3 },
                    { key: 'store', x: sTabX4 },
                ];
                for (const st of shopTabs) {
                    if (x >= st.x && x < st.x + sTabW && y >= sTabY && y < sTabY + sTabH) {
                        audio.play('click');
                        gameState.shopTab = st.key;
                        shopScrollY = 0;
                        return;
                    }
                }

                // Level bar
                const sLvlBarY = sTabY + sTabH + 10;
                const sContentY = sLvlBarY + 28;

                if (gameState.shopTab === 'store') {
                    // === STORE TAB CLICKS ===
                    const sPkH = 70;
                    const sPkGap = 10;
                    const sPkW = DESIGN.width - 40;

                    for (let i = 0; i < COIN_PACKS.length; i++) {
                        const pack = COIN_PACKS[i];
                        const py = sContentY + 35 + i * (sPkH + sPkGap) + shopScrollY;

                        // Buy button hit area (right side of pack card)
                        const sBtnX = sPkW - 60;
                        const sBtnY = py + 15;
                        const sBtnW = 70;
                        const sBtnH = 40;

                        if (x >= sBtnX && x < sBtnX + sBtnW && y >= sBtnY && y < sBtnY + sBtnH) {
                            audio.play('click');
                            if (window.NativePurchase) {
                                window.NativePurchase.buy(pack.id);
                            } else {
                                // Web fallback — simulate purchase
                                gameState.addCoins(pack.coins);
                                gameState.saveToStorage();
                                console.log('[IAP-SIM] Simulated: ' + pack.price);
                            }
                            return;
                        }
                    }
                } else {
                    // === BALLS / STADIUMS TAB CLICKS ===
                    const sItemH = 80;
                    const sItemGap = 10;
                    const sItemW = DESIGN.width - 40;

                    let items = [];
                    if (gameState.shopTab === 'balls') {
                        items = Object.keys(BALL_SKINS).map(k => ({ id: k, data: BALL_SKINS[k], category: 'balls' }));
                    } else {
                        items = Object.keys(THEMES).map(k => ({ id: k, data: THEMES[k], category: 'stadiums' }));
                    }

                    for (let i = 0; i < items.length; i++) {
                        const item = items[i];
                        const iy = sContentY + 5 + i * (sItemH + sItemGap) + shopScrollY;

                        if (y >= iy && y < iy + sItemH && x >= 20 && x < 20 + sItemW) {
                            const isLocked = item.data.level > gameState.level;
                            const isUnlocked = item.category === 'balls'
                                ? gameState.unlockedBalls.includes(item.id)
                                : gameState.unlockedThemes.includes(item.id);
                            const isEquipped = item.category === 'balls'
                                ? gameState.equippedBall === item.id
                                : gameState.equippedTheme === item.id;

                            if (isEquipped) return; // No action for equipped items

                            audio.play('click');

                            if (isUnlocked) {
                                // EQUIP (owned but not equipped)
                                if (item.category === 'balls') {
                                    gameState.equippedBall = item.id;
                                } else {
                                    gameState.equippedTheme = item.id;
                                }
                                gameState.saveToStorage();
                            } else {
                                // BUY (not owned — works for both locked and unlocked-level items)
                                if (gameState.purchaseItem(item.category, item.id)) {
                                    console.log('Purchased + equipped: ' + item.data.name);
                                }
                            }
                            return;
                        }
                    }
                }

            } else if (gameState.screen === 'game') {
                // Tutorial: tap advances step
                if (gameState.tutorialStep !== null) {
                    gameState.tutorialStep++;
                    if (gameState.tutorialStep >= TUTORIAL_STEPS) {
                        gameState.tutorialStep = null;
                        gameState.hasSeenTutorial = true;
                        gameState.saveToStorage();
                    }
                    return;
                }
                // === PAUSE BUTTON — small circle top-left ===
                const pauseBtnCx = 18;
                const pauseBtnCy = 22;
                const pauseBtnR = 22; // tap area slightly larger than visual

                // Pause overlay buttons (if paused)
                if (gameState.paused) {
                    const panelW = 240;
                    const panelH = 200;
                    const panelX = DESIGN.width / 2 - panelW / 2;
                    const panelY = DESIGN.height / 2 - panelH / 2;

                    // Resume button
                    const btnW = 160;
                    const btnH = 44;
                    const resumeY = panelY + 75;
                    const resumeX = DESIGN.width / 2 - btnW / 2;
                    if (x >= resumeX && x < resumeX + btnW && y >= resumeY && y < resumeY + btnH) {
                        gameState.paused = false;
                        audio.play('click');
                        return;
                    }

                    // Quit button
                    const quitY = resumeY + btnH + 15;
                    if (x >= resumeX && x < resumeX + btnW && y >= quitY && y < quitY + btnH) {
                        audio.play('click');
                        gameState.screen = 'menu';
                        gameState.paused = false;
                        return;
                    }
                    // Clicking overlay outside buttons does nothing
                    return;
                }

                // Pause button hit test (circular)
                const pdx = x - pauseBtnCx;
                const pdy = y - pauseBtnCy;
                if (pdx * pdx + pdy * pdy <= pauseBtnR * pauseBtnR) {
                    gameState.paused = true;
                    audio.play('click');
                    return;
                }

                // Power shot icon (left side, only visible when available)
                const psIconX = 12;
                const psIconY = DESIGN.height / 2 - 20;
                const psIconS = 48;
                if (x >= psIconX && x <= psIconX + psIconS && y >= psIconY && y <= psIconY + psIconS) {
                    if (!gameState.activePowerShot && gameState.powerShotCooldown <= 0) {
                        for (let t = POWER_SHOTS.length - 1; t >= 0; t--) {
                            if (gameState.surgeProgress >= POWER_SHOTS[t].threshold * 0.95) {
                                gameState.activePowerShot = POWER_SHOTS[t];
                                gameState.powerShotTimer = 240;
                                audio.play('surge');
                                Utils.haptic(80 + t * 30);
                                camera.triggerShake(4 + t * 2);
                                break;
                            }
                        }
                    }
                    return;
                }

                // Power bar tap (slim bar, right side)
                const slimBarX = DESIGN.width - 18;
                const slimBarY = 80;
                const slimBarH = 220;
                if (x >= slimBarX - 20 && x <= slimBarX + 20 && y >= slimBarY && y <= slimBarY + slimBarH) {
                    if (!gameState.activePowerShot && gameState.powerShotCooldown <= 0) {
                        for (let t = POWER_SHOTS.length - 1; t >= 0; t--) {
                            if (gameState.surgeProgress >= POWER_SHOTS[t].threshold * 0.95) {
                                gameState.activePowerShot = POWER_SHOTS[t];
                                gameState.powerShotTimer = 240;
                                audio.play('surge');
                                Utils.haptic(80 + t * 30);
                                camera.triggerShake(4 + t * 2);
                                break;
                            }
                        }
                    }
                    return;
                }

                // Swing handled by mousedown/mouseup swipe — not click
            } else if (gameState.screen === 'mp_lobby') {
                const W = DESIGN.width;
                const H = DESIGN.height;

                // Difficulty selector buttons (only when not searching)
                if (!_mpSearching) {
                    const diffY = 90;
                    const diffBtnW = 62;
                    const diffGap = 6;
                    const diffKeys = ['easy', 'medium', 'hard', 'legend'];
                    const diffTotalW = diffKeys.length * diffBtnW + (diffKeys.length - 1) * diffGap;
                    const diffStartX = W / 2 - diffTotalW / 2;
                    const diffBtnY = diffY + 12;
                    const diffBtnH = 30;
                    for (let di = 0; di < diffKeys.length; di++) {
                        const dx = diffStartX + di * (diffBtnW + diffGap);
                        if (x >= dx && x < dx + diffBtnW && y >= diffBtnY && y < diffBtnY + diffBtnH) {
                            audio.play('click');
                            _mpSelectedDifficulty = diffKeys[di];
                            return;
                        }
                    }
                }

                const btnY = _mpSearching ? 310 : 260; // matches drawMultiplayerLobbyScreen
                const btnW = 200;
                const btnX = W / 2 - btnW / 2;

                // Find Match / Cancel button
                if (x >= btnX && x < btnX + btnW && y >= btnY && y < btnY + 50) {
                    audio.play('click');
                    if (_mpSearching) {
                        // Cancel search — cleanup everything
                        _mpSearching = false;
                        _mpSearchStartTime = 0;
                        if (_mpQueueCheckInterval) {
                            clearInterval(_mpQueueCheckInterval);
                            _mpQueueCheckInterval = null;
                        }
                        if (_mpBotTimeoutId) {
                            clearTimeout(_mpBotTimeoutId);
                            _mpBotTimeoutId = null;
                        }
                        window._convexClient.leaveQueue('Alpit').catch(() => {});
                    } else {
                        // Start matchmaking with 15s bot fallback
                        _mpSearching = true;
                        _mpSearchStartTime = Date.now();
                        _mpIsBotMatch = false;

                        // Clean up any stale queue entries from previous sessions
                        window._convexClient.leaveQueue('Alpit').catch(() => {});

                        // Set 15-second timeout — if no opponent, spawn AI bot
                        _mpBotTimeoutId = setTimeout(() => {
                            if (!_mpSearching) return; // already matched or cancelled
                            console.log('[MP] No opponent found in 15s — spawning AI bot');

                            // Cleanup online search
                            _mpSearching = false;
                            if (_mpQueueCheckInterval) {
                                clearInterval(_mpQueueCheckInterval);
                                _mpQueueCheckInterval = null;
                            }
                            window._convexClient.leaveQueue('Alpit').catch(() => {});
                            _mpBotTimeoutId = null;

                            // Generate bot match
                            _mpIsBotMatch = true;
                            const botRoom = _mpSimulateBotInnings(_mpSelectedDifficulty);
                            _mpWaitingRoomData = botRoom;
                            _mpWaitingForOpponent = false;
                            gameState.screen = 'mp_waiting';
                            audio.play('click');
                        }, _MP_BOT_TIMEOUT_MS);

                        // Try online matchmaking in parallel
                        window._convexClient.joinMatchmaking('Alpit', _mpSelectedDifficulty).then(result => {
                            if (result.status === 'matched') {
                                // Found real opponent — cancel bot timeout
                                _mpSearching = false;
                                _mpSearchStartTime = 0;
                                if (_mpBotTimeoutId) {
                                    clearTimeout(_mpBotTimeoutId);
                                    _mpBotTimeoutId = null;
                                }
                                _mpIsBotMatch = false;
                                window._convexClient.getRoom(result.roomId).then(room => {
                                    _mpWaitingRoomData = room;
                                    _mpWaitingForOpponent = false;
                                    gameState.screen = 'mp_waiting';
                                });
                            } else {
                                // Start polling for match (runs alongside bot timeout)
                                _mpQueueCheckInterval = setInterval(() => {
                                    window._convexClient.checkQueue('Alpit').then(qResult => {
                                        if (qResult.status === 'matched') {
                                            clearInterval(_mpQueueCheckInterval);
                                            _mpQueueCheckInterval = null;
                                            _mpSearching = false;
                                            _mpSearchStartTime = 0;
                                            // Cancel bot timeout — real match found
                                            if (_mpBotTimeoutId) {
                                                clearTimeout(_mpBotTimeoutId);
                                                _mpBotTimeoutId = null;
                                            }
                                            _mpIsBotMatch = false;
                                            window._convexClient.getRoom(qResult.roomId).then(room => {
                                                _mpWaitingRoomData = room;
                                                _mpWaitingForOpponent = false;
                                                gameState.screen = 'mp_waiting';
                                            });
                                        }
                                    });
                                }, 2000);
                            }
                        }).catch(e => {
                            console.warn('[MP] Online matchmaking failed:', e.message);
                            // Don't cancel — bot timeout will still fire as fallback
                        });
                    }
                    return;
                }

                // CREATE ROOM / JOIN ROOM buttons (only when not searching)
                if (!_mpSearching) {
                    const friendY = btnY + 65;
                    const crBtnY = friendY + 32;
                    const crBtnW = 130;
                    const crBtnGap = 10;
                    const crBtnX1 = W / 2 - crBtnW - crBtnGap / 2;
                    const crBtnX2 = W / 2 + crBtnGap / 2;
                    const crBtnH = 42;

                    // CREATE ROOM
                    if (x >= crBtnX1 && x < crBtnX1 + crBtnW && y >= crBtnY && y < crBtnY + crBtnH) {
                        audio.play('click');
                        window._convexClient.createPrivateRoom('Alpit', _mpSelectedDifficulty).then(result => {
                            _mpPrivateRoomId = result.roomId;
                            _mpPrivateRoomCode = result.roomCode;
                            gameState.screen = 'mp_create_room';

                            // Poll every 2s for friend to join
                            _mpPrivatePolling = setInterval(() => {
                                window._convexClient.checkPrivateRoom(_mpPrivateRoomId).then(check => {
                                    if (check.status === 'ready') {
                                        clearInterval(_mpPrivatePolling);
                                        _mpPrivatePolling = null;
                                        _mpWaitingRoomData = check.room;
                                        _mpWaitingForOpponent = false;
                                        _mpIsBotMatch = false;
                                        gameState.screen = 'mp_waiting';
                                        audio.play('click');
                                    }
                                });
                            }, 2000);
                        }).catch(e => {
                            console.warn('[MP] Create room failed:', e.message);
                        });
                        return;
                    }

                    // JOIN ROOM
                    if (x >= crBtnX2 && x < crBtnX2 + crBtnW && y >= crBtnY && y < crBtnY + crBtnH) {
                        audio.play('click');
                        _mpJoinCode = ['', '', '', ''];
                        _mpJoinCodeIdx = 0;
                        _mpJoinError = '';
                        _mpJoinSuccess = false;
                        gameState.screen = 'mp_join_room';
                        return;
                    }
                }

                // Back button
                const backY = H - 60;
                if (x >= W / 2 - 50 && x < W / 2 + 50 && y >= backY && y < backY + 35) {
                    audio.play('click');
                    _mpSearching = false;
                    _mpSearchStartTime = 0;
                    if (_mpQueueCheckInterval) {
                        clearInterval(_mpQueueCheckInterval);
                        _mpQueueCheckInterval = null;
                    }
                    if (_mpBotTimeoutId) {
                        clearTimeout(_mpBotTimeoutId);
                        _mpBotTimeoutId = null;
                    }
                    window._convexClient.leaveQueue('Alpit').catch(() => {});
                    gameState.screen = 'menu';
                    return;
                }

            } else if (gameState.screen === 'mp_create_room') {
                const W = DESIGN.width;
                const H = DESIGN.height;
                // Cancel button
                const cancelY = H - 65;
                if (x >= W / 2 - 70 && x < W / 2 + 70 && y >= cancelY && y < cancelY + 38) {
                    audio.play('click');
                    if (_mpPrivatePolling) {
                        clearInterval(_mpPrivatePolling);
                        _mpPrivatePolling = null;
                    }
                    _mpPrivateRoomId = null;
                    _mpPrivateRoomCode = '';
                    gameState.screen = 'mp_lobby';
                    return;
                }

            } else if (gameState.screen === 'mp_join_room') {
                const W = DESIGN.width;
                const H = DESIGN.height;

                // Keyboard hit detection
                const kbY = 190;
                const kbRows = [
                    'QWERTYUIOP',
                    'ASDFGHJKL',
                    'ZXCVBNM',
                    '1234567890',
                ];
                const kbKeyH = 34;
                const kbGap = 4;

                let keyHit = false;
                for (let row = 0; row < kbRows.length && !keyHit; row++) {
                    const keys = kbRows[row].split('');
                    const kbKeyW = Math.min(26, (W - 20 - (keys.length - 1) * kbGap) / keys.length);
                    const rowW = keys.length * kbKeyW + (keys.length - 1) * kbGap;
                    const rowX = W / 2 - rowW / 2;
                    const rowY = kbY + row * (kbKeyH + kbGap);

                    for (let ki = 0; ki < keys.length; ki++) {
                        const kx = rowX + ki * (kbKeyW + kbGap);
                        if (x >= kx && x < kx + kbKeyW && y >= rowY && y < rowY + kbKeyH) {
                            audio.play('click');
                            if (_mpJoinCodeIdx < 4) {
                                _mpJoinCode[_mpJoinCodeIdx] = keys[ki];
                                _mpJoinCodeIdx = Math.min(3, _mpJoinCodeIdx + 1);
                                // Auto-advance to next empty slot
                                while (_mpJoinCodeIdx < 3 && _mpJoinCode[_mpJoinCodeIdx] !== '') _mpJoinCodeIdx++;
                            }
                            _mpJoinError = '';
                            keyHit = true;
                            break;
                        }
                    }
                }

                // Action buttons (backspace + join)
                const actionY = kbY + 4 * (kbKeyH + kbGap) + 8;

                // Backspace
                if (x >= W / 2 - 130 && x < W / 2 - 50 && y >= actionY && y < actionY + 38) {
                    audio.play('click');
                    // Delete current or previous char
                    if (_mpJoinCode[_mpJoinCodeIdx] !== '') {
                        _mpJoinCode[_mpJoinCodeIdx] = '';
                    } else if (_mpJoinCodeIdx > 0) {
                        _mpJoinCodeIdx--;
                        _mpJoinCode[_mpJoinCodeIdx] = '';
                    }
                    _mpJoinError = '';
                    return;
                }

                // JOIN button
                const allFilled = _mpJoinCode.every(c => c !== '');
                if (allFilled && x >= W / 2 + 10 && x < W / 2 + 130 && y >= actionY && y < actionY + 38) {
                    audio.play('click');
                    const code = _mpJoinCode.join('');
                    _mpJoinError = '';
                    window._convexClient.joinPrivateRoom(code, 'Alpit').then(result => {
                        if (result.success) {
                            _mpJoinSuccess = true;
                            _mpIsBotMatch = false;
                            _mpWaitingRoomData = result.room;
                            _mpWaitingForOpponent = false;
                            setTimeout(() => {
                                gameState.screen = 'mp_waiting';
                            }, 800);
                        } else {
                            _mpJoinError = result.reason || 'Room not found';
                        }
                    }).catch(e => {
                        _mpJoinError = 'Connection failed';
                    });
                    return;
                }

                // Tap on code boxes to select position
                const inputY = 100;
