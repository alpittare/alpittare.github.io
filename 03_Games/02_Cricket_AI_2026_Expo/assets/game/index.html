            // ================================================================
            // PHASE 5: POWERPLAY / DEATH OVERS BANNER
            // ================================================================
            const _overPhase = getOverPhase();
            if (_overPhase === 'powerplay' && !extrasSystem.isFreeHit) {
                const ppFlash = Math.sin(Date.now() * 0.006) * 0.2 + 0.8;
                const ppY = topH + 6;
                ctx.save();
                ctx.shadowColor = '#00e5ff';
                ctx.shadowBlur = 10 * ppFlash;
                drawRoundedRect(W / 2 - 65, ppY, 130, 22, 11, `rgba(0,229,255,${ppFlash * 0.15})`, `rgba(0,229,255,${ppFlash * 0.5})`, 1.5);
                drawText('⚡ POWERPLAY', W / 2, ppY + 11, 9, `rgba(0,229,255,${ppFlash})`, 'bold', false);
                ctx.restore();
            } else if (_overPhase === 'death' && !extrasSystem.isFreeHit) {
                const dFlash = Math.sin(Date.now() * 0.008) * 0.25 + 0.75;
                const dY = topH + 6;
                ctx.save();
                ctx.shadowColor = '#ff4444';
                ctx.shadowBlur = 12 * dFlash;
                drawRoundedRect(W / 2 - 70, dY, 140, 22, 11, `rgba(255,68,68,${dFlash * 0.15})`, `rgba(255,68,68,${dFlash * 0.5})`, 1.5);
                drawText('🔥 DEATH OVERS', W / 2, dY + 11, 9, `rgba(255,68,68,${dFlash})`, 'bold', false);
                ctx.restore();
            }

            // ================================================================
            // FREE HIT BANNER (below top bar)
            // ================================================================
            if (extrasSystem.isFreeHit) {
                const flash = Math.sin(Date.now() * 0.008) * 0.3 + 0.7;
                const fhY = topH + 6;
                ctx.save();
                ctx.shadowColor = '#00ff66';
                ctx.shadowBlur = 10 * flash;
                drawRoundedRect(W / 2 - 50, fhY, 100, 22, 11, `rgba(0,255,100,${flash * 0.2})`, `rgba(0,255,100,${flash * 0.6})`, 1);
                drawText('FREE HIT', W / 2, fhY + 11, 9, `rgba(0,255,100,${flash})`, 'bold', false);
                ctx.restore();
            }

            // ================================================================
            // BOTTOM BAR — Premium glass card with enhanced XP and coins
            // ================================================================
            const botH = 44;
            const botY = DESIGN.height - botH;

            // Glass card background matching top bar
            ctx.save();
            ctx.globalAlpha = 0.88;
            const botGrad = ctx.createLinearGradient(0, botY - 8, 0, DESIGN.height);
            botGrad.addColorStop(0, 'rgba(10,15,30,0.85)');
            botGrad.addColorStop(1, 'rgba(10,15,30,0.95)');
            ctx.fillStyle = botGrad;
            ctx.fillRect(0, botY - 8, W, botH + 8);
            ctx.restore();

            // Animated neon line at top
            const botLineAlpha = Math.sin(gameTime * 0.008) * 0.3 + 0.5;
            ctx.globalAlpha = botLineAlpha;
            ctx.fillStyle = '#00ff88';
            ctx.fillRect(0, botY - 8, W, 1);
            ctx.globalAlpha = 1;

            // Level badge (left)
            const lvBadgeW = 50;
            const lvBadgeX = 12;
            const lvBadgeY = botY + 6;
            const lvGrad = ctx.createLinearGradient(lvBadgeX, lvBadgeY, lvBadgeX, lvBadgeY + 24);
            lvGrad.addColorStop(0, '#00ff8833');
            lvGrad.addColorStop(1, '#00ff8811');
            ctx.save();
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 6;
            drawRoundedRect(lvBadgeX, lvBadgeY, lvBadgeW, 24, 12, lvGrad, '#00ff88', 1);
            ctx.restore();
            drawText('LV.' + gameState.level, lvBadgeX + lvBadgeW / 2, botY + botH / 2, 11, '#00ff88', 'bold', false);

            // XP bar with gradient and shimmer (center-left)
            const xpBarX = lvBadgeX + lvBadgeW + 18;
            const xpBarW = 90;
            const xpBarH = 8;
            const xpBarY = botY + botH / 2 - 2;
            const xpPct = gameState.xp / gameState.xpToNextLevel;

            // XP bar background
            ctx.globalAlpha = 0.3;
            drawRoundedRect(xpBarX, xpBarY, xpBarW, xpBarH, 4, 'rgba(0,229,255,0.4)');
            ctx.globalAlpha = 1;

            // XP bar fill with gradient
            if (xpPct > 0.01) {
                const xpGrad = ctx.createLinearGradient(xpBarX, xpBarY, xpBarX + xpBarW, xpBarY);
                xpGrad.addColorStop(0, '#00e5ff');
                xpGrad.addColorStop(0.6, '#00ff88');
                xpGrad.addColorStop(1, '#00ff88');

                ctx.save();
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = 4;
                drawRoundedRect(xpBarX, xpBarY, xpBarW * xpPct, xpBarH, 4, xpGrad);

                // Animated shimmer across XP bar
                const shimmerPos = (gameTime * 0.003) % (xpBarW * xpPct);
                ctx.globalAlpha = 0.4;
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(xpBarX + shimmerPos - 20, xpBarY, 20, xpBarH);
                ctx.restore();
            }

            // XP text
            drawText(gameState.xp + '/' + gameState.xpToNextLevel, xpBarX + xpBarW / 2, xpBarY + xpBarH + 10, 7, 'rgba(0,229,255,0.6)', 'normal', false);

            // Coins display (right) - gold with glow
            const coinX = W - 80;
            ctx.save();
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 10;
            drawText('🪙 ' + gameState.coins, coinX, botY + botH / 2 - 2, 11, '#ffd700', 'bold', false);
            ctx.restore();
            drawText('COINS', coinX, botY + botH / 2 + 12, 7, 'rgba(255,215,0,0.5)', 'normal', false);

            // ================================================================
            // TAP TO BAT (game start instruction)
            // ================================================================
            const timeSinceStart = Date.now() - gameState.gameStartTime;
            if (timeSinceStart < 3000 && gameState.ballsInOver === 0 && gameState.oversCompleted === 0) {
                const tapAlpha = Math.max(0, 1 - timeSinceStart / 3000);
                drawText('TAP TO BAT', W / 2, DESIGN.height / 2 + 80, 16, `rgba(0,229,255,${tapAlpha * 0.7})`, 'bold', false);
            }

            // Engine AI indicator (small, bottom-right)
            if (USE_ENGINE_AI) {
                ctx.fillStyle = 'rgba(0,255,136,0.5)';
                ctx.font = '8px monospace';
                ctx.textAlign = 'right';
                ctx.fillText(`ENGINE AI | Bayes:${_aiEngine.cricketBayes.totalObservations} Seq:${_aiEngine.cricketSeq.historyLength}`, W - 8, DESIGN.height - 4);
                ctx.textAlign = 'left';
            }
        }

        // ============================================================================
        // PAUSE BUTTON & PAUSE OVERLAY
        // ============================================================================

        function drawPauseButton() {
            if (gameState.screen !== 'game') return;
            // Small pause icon integrated into top-left of top bar
            const btnCx = 18;
            const btnCy = 22;
            const btnR = 12;

            ctx.fillStyle = 'rgba(100,150,220,0.15)';
            ctx.beginPath();
            ctx.arc(btnCx, btnCy, btnR, 0, Math.PI * 2);
            ctx.fill();

            // Two small bars
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.fillRect(btnCx - 4, btnCy - 5, 3, 10);
            ctx.fillRect(btnCx + 1, btnCy - 5, 3, 10);
        }

        function drawPauseOverlay() {
            if (!gameState.paused || gameState.screen !== 'game') return;

            // Semi-transparent overlay
            ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
            ctx.fillRect(0, 0, DESIGN.width, DESIGN.height);

            // Pause panel
            const panelW = 240;
            const panelH = 200;
            const panelX = DESIGN.width / 2 - panelW / 2;
            const panelY = DESIGN.height / 2 - panelH / 2;

            // Draw panel background
            drawGlassCard(panelX, panelY, panelW, panelH, 16, '#00e5ff', 0.15, '#00e5ff', 12);

            // Title
            drawText('PAUSED', DESIGN.width / 2, panelY + 30, 28, '#00e5ff', 'bold', false);

            // Resume button
            const btnW = 160;
            const btnH = 44;
            const resumeY = panelY + 75;
            const resumeX = DESIGN.width / 2 - btnW / 2;
            drawRoundedRect(resumeX, resumeY, btnW, btnH, 10, '#00e5ff', '#00e5ff', 2);
            drawText('RESUME', DESIGN.width / 2, resumeY + btnH / 2, 16, '#ffffff', 'bold', false);

            // Quit button
            const quitY = resumeY + btnH + 15;
            drawRoundedRect(resumeX, quitY, btnW, btnH, 10, 'rgba(255, 68, 68, 0.3)', 'rgba(255, 68, 68, 0.6)', 1.5);
            drawText('QUIT TO MENU', DESIGN.width / 2, quitY + btnH / 2, 14, '#ff4444', 'bold', false);

            // Feedback link
            const fbY = panelY + panelH + 16;
            ctx.globalAlpha = 0.6;
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#00e5ff';
            ctx.fillText('💬 Feedback: ' + APP_CONFIG.support, DESIGN.width / 2, fbY);
            ctx.globalAlpha = 1;
        }

        // ============================================================================
        // VIGNETTE OVERLAY
        // ============================================================================

        function drawVignette() {
            if (gameState.screen !== 'game' || gameState.paused) return;

            // Enhanced vignette with stronger edges
            const centerX = DESIGN.width / 2;
            const centerY = DESIGN.height / 2;
            const maxDist = Math.sqrt(centerX * centerX + centerY * centerY);
            const grad = ctx.createRadialGradient(centerX, centerY, maxDist * 0.3, centerX, centerY, maxDist * 1.3);

            grad.addColorStop(0, 'rgba(0, 0, 0, 0)');
            grad.addColorStop(0.5, 'rgba(0, 0, 0, 0.04)');
            grad.addColorStop(1, 'rgba(0, 0, 20, 0.15)');

            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, DESIGN.width, DESIGN.height);
        }

        // ================================================================
        // PHASE 3: AGGRESSION TOGGLE BUTTON
        // ================================================================
        function drawAggressionToggle() {
            const mode = gameState.battingMode || 'defensive';
            const isAttacking = mode === 'attacking';
            const btnX = 45;
            const btnY = DESIGN.height - 45;
            const btnR = 26;

            ctx.save();

            // Outer glow
            const glowColor = isAttacking ? '#ff4444' : '#00ff88';
            ctx.shadowColor = glowColor;
            ctx.shadowBlur = 12 + Math.sin(gameTime * 0.08) * 4;

            // Button background
            const bgGrad = ctx.createRadialGradient(btnX, btnY, 0, btnX, btnY, btnR);
            if (isAttacking) {
                bgGrad.addColorStop(0, 'rgba(255,40,40,0.35)');
                bgGrad.addColorStop(1, 'rgba(180,20,20,0.55)');
            } else {
                bgGrad.addColorStop(0, 'rgba(0,255,136,0.25)');
                bgGrad.addColorStop(1, 'rgba(0,180,80,0.45)');
            }
            ctx.fillStyle = bgGrad;
            ctx.beginPath();
            ctx.arc(btnX, btnY, btnR, 0, Math.PI * 2);
            ctx.fill();

            // Border
            ctx.strokeStyle = glowColor;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(btnX, btnY, btnR, 0, Math.PI * 2);
            ctx.stroke();

            ctx.shadowBlur = 0;

            // Icon
            const icon = isAttacking ? '⚔️' : '🛡️';
            ctx.font = '18px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(icon, btnX, btnY - 2);

            // Label below button
            const label = isAttacking ? 'ATTACK' : 'DEFEND';
            drawText(label, btnX, btnY + btnR + 10, 7, glowColor, 'bold', false);

            ctx.restore();
        }

        // ================================================================
        // PHASE 5: OVER PHASE SYSTEM (Powerplay / Middle / Death)
        // ================================================================
        function getOverPhase() {
            const totalOvers = (DIFFICULTY_CONFIG[gameState.difficulty] || DIFFICULTY_CONFIG.easy).overs;
            const currentOver = gameState.oversCompleted;

            // Need at least 5 overs for phases to make sense
            if (totalOvers < 5) {
                if (currentOver < 1) return 'powerplay';
                if (currentOver >= totalOvers - 1) return 'death';
                return 'middle';
            }

            if (currentOver < 2) return 'powerplay';
            if (currentOver >= totalOvers - 2) return 'death';
            return 'middle';
        }

        // ================================================================
        // PHASE 4: FIELDER POSITION INDICATORS (pre-delivery awareness)
        // ================================================================
        function drawFielderIndicators() {
            // Only show when no balls are active (between deliveries)
            if (gameState.balls.length > 0) return;

            const t = gameTime * 0.06;
            for (const f of fielders) {
                const sx = cameraShakeX || 0;
                const sy = cameraShakeY || 0;
                const fx = f.x + sx;
                const fy = f.y + sy;

                // Pulsing ring around fielder
                const pulse = Math.sin(t + f.bobTimer) * 0.3 + 0.7;
                ctx.save();
                ctx.globalAlpha = 0.25 * pulse;
                ctx.strokeStyle = '#ff6666';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.arc(fx, fy, f.catchRadius * 0.6, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);

                // Fielder name label
                ctx.globalAlpha = 0.3 * pulse;
                ctx.font = 'bold 6px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#ffaaaa';
                ctx.fillText(f.name.toUpperCase(), fx, fy + 35 * f.scale);
                ctx.restore();
            }
        }

        // ============================================================================
        // SURGE BAR
        // ============================================================================

        // Surge bar energy particles (persistent array for smooth animation)
        const _surgeParticles = [];
        const _SURGE_MAX_PARTICLES = 12;

        function drawSurgeBar() {
            const W = DESIGN.width;
            const progress = Math.max(0, Math.min(1, gameState.surgeProgress));
            const t = gameTime * 0.001; // time in seconds for smooth animation

            // ================================================================
            // POLISHED SURGE BAR — premium glass design with energy particles
            // ================================================================
            const barW = 16;
            const barH = 220;
            const barX = W - 26;
            const barY = 80;
            const r = 8;
            const cx = barX + barW / 2;

            // Tier color stops (matches SURGE_TIERS)
            const tierColors = ['#00aaff', '#00ff88', '#ffdd00', '#ff4444'];
            const activeTierIdx = progress >= 1.0 ? 3 : progress >= 0.75 ? 2 : progress >= 0.5 ? 1 : progress >= 0.25 ? 0 : -1;
            const barColor = activeTierIdx >= 0 ? tierColors[activeTierIdx] : '#3388cc';

            // --- Outer glow (intensifies with progress) ---
            if (progress > 0.1) {
                ctx.save();
                ctx.shadowColor = barColor;
                ctx.shadowBlur = 8 + progress * 14;
                ctx.globalAlpha = 0.15 + progress * 0.2;
                ctx.fillStyle = barColor;
                ctx.beginPath();
                ctx.roundRect(barX - 2, barY - 2, barW + 4, barH + 4, r + 1);
                ctx.fill();
                ctx.restore();
            }

            // --- Dark glass background ---
            ctx.save();
            ctx.globalAlpha = 0.65;
            ctx.fillStyle = 'rgba(8,12,24,0.85)';
            ctx.beginPath();
            ctx.roundRect(barX, barY, barW, barH, r);
            ctx.fill();
            ctx.restore();

            // --- Inner shadow (depth effect) ---
            ctx.save();
            ctx.globalAlpha = 0.3;
            const innerShadow = ctx.createLinearGradient(barX, barY, barX + barW, barY);
            innerShadow.addColorStop(0, 'rgba(0,0,0,0.5)');
            innerShadow.addColorStop(0.3, 'rgba(0,0,0,0)');
            innerShadow.addColorStop(0.7, 'rgba(0,0,0,0)');
            innerShadow.addColorStop(1, 'rgba(0,0,0,0.3)');
            ctx.fillStyle = innerShadow;
            ctx.beginPath();
            ctx.roundRect(barX + 1, barY + 1, barW - 2, barH - 2, r - 1);
            ctx.fill();
            ctx.restore();

            // --- Fluid fill with tier-based gradient ---
            const fillH = barH * progress;
            if (progress > 0.01) {
                const fillY = barY + barH - fillH;

                // Clip to bar shape
                ctx.save();
                ctx.beginPath();
                ctx.roundRect(barX + 1, barY + 1, barW - 2, barH - 2, r - 1);
                ctx.clip();

                // Animated flowing gradient
                const wave = Math.sin(t * 2) * 8;
                const fillGrad = ctx.createLinearGradient(0, barY + barH + wave, 0, barY - 30 + wave);
                fillGrad.addColorStop(0, '#0055cc');
                fillGrad.addColorStop(0.25, '#00aaff');
                fillGrad.addColorStop(0.5, '#00ff88');
                fillGrad.addColorStop(0.75, '#ffdd00');
                fillGrad.addColorStop(1, '#ff4444');

                ctx.globalAlpha = 0.85;
                ctx.fillStyle = fillGrad;
                ctx.fillRect(barX + 1, fillY, barW - 2, fillH);

                // Liquid surface wobble at the top of the fill
                if (fillH > 5) {
                    const wobbleAmp = 1.5 + progress * 1.5;
                    ctx.globalAlpha = 0.6;
                    ctx.fillStyle = 'rgba(255,255,255,0.25)';
                    ctx.beginPath();
                    ctx.moveTo(barX + 1, fillY + 2);
                    for (let px = 0; px <= barW - 2; px++) {
                        const wy = fillY + Math.sin((px / (barW - 2)) * Math.PI * 2 + t * 4) * wobbleAmp;
                        ctx.lineTo(barX + 1 + px, wy);
                    }
                    ctx.lineTo(barX + barW - 1, fillY + 4);
                    ctx.lineTo(barX + 1, fillY + 4);
                    ctx.closePath();
                    ctx.fill();
                }

                // Glass highlight (left edge reflection)
                ctx.globalAlpha = 0.18;
                const glassHL = ctx.createLinearGradient(barX + 1, 0, barX + barW * 0.4, 0);
                glassHL.addColorStop(0, 'rgba(255,255,255,0.6)');
                glassHL.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = glassHL;
                ctx.fillRect(barX + 2, fillY + 3, barW * 0.35, fillH - 4);

                ctx.restore(); // end clip
            }

            // --- Energy particles rising inside the bar ---
            if (progress > 0.15) {
                // Spawn new particles
                if (_surgeParticles.length < _SURGE_MAX_PARTICLES && Math.random() < 0.12 + progress * 0.15) {
                    _surgeParticles.push({
                        x: barX + 3 + Math.random() * (barW - 6),
                        y: barY + barH - 4,
                        vy: -(0.3 + Math.random() * 0.6) * (0.5 + progress),
                        size: 1 + Math.random() * 1.8,
                        life: 1.0,
                        color: barColor
                    });
                }
                // Update + draw particles
                ctx.save();
                ctx.beginPath();
                ctx.roundRect(barX + 1, barY + 1, barW - 2, barH - 2, r - 1);
                ctx.clip();
                for (let i = _surgeParticles.length - 1; i >= 0; i--) {
                    const p = _surgeParticles[i];
                    p.y += p.vy;
                    p.x += Math.sin(t * 3 + i) * 0.15; // gentle sway
                    p.life -= 0.012;
                    const maxY = barY + barH - fillH;
                    if (p.life <= 0 || p.y < maxY - 10) {
                        _surgeParticles.splice(i, 1);
                        continue;
                    }
                    ctx.globalAlpha = p.life * 0.7;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 4;
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }

            // --- Tier markers: notch lines with labels ---
            const tierThresholds = [0.25, 0.5, 0.75, 1.0];
            const tierLabels = ['I', 'II', 'III', 'IV'];
            for (let m = 0; m < tierThresholds.length; m++) {
                const pct = tierThresholds[m];
                const msY = barY + barH - (barH * pct);
                const isActive = progress >= pct * 0.95;

                // Notch line
                ctx.save();
                ctx.globalAlpha = isActive ? 0.9 : 0.2;
                ctx.strokeStyle = isActive ? tierColors[m] : 'rgba(150,180,220,0.4)';
                ctx.lineWidth = isActive ? 1.5 : 0.8;
                ctx.beginPath();
                ctx.moveTo(barX + 2, msY);
                ctx.lineTo(barX + barW - 2, msY);
                ctx.stroke();

                // Glow dot on active tiers
                if (isActive) {
                    ctx.shadowColor = tierColors[m];
                    ctx.shadowBlur = 6;
                    ctx.fillStyle = tierColors[m];
                    ctx.beginPath();
                    ctx.arc(cx, msY, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Tier label to the left
                ctx.globalAlpha = isActive ? 0.85 : 0.25;
                ctx.font = 'bold 6px Arial';
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = isActive ? tierColors[m] : '#8899bb';
                ctx.fillText(tierLabels[m], barX - 4, msY);
                ctx.restore();
            }

            // --- Thin border ---
            ctx.save();
            ctx.globalAlpha = 0.4;
            ctx.strokeStyle = 'rgba(120,160,220,0.5)';
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.roundRect(barX, barY, barW, barH, r);
            ctx.stroke();
            ctx.restore();

            // --- Multiplier badge below bar ---
            if (activeTierIdx >= 0) {
                const mul = activeTierIdx + 1;
                const badgeY = barY + barH + 16;
                const pulse = Math.sin(t * 3) * 0.12 + 0.88;

                ctx.save();
                // Badge pill background
                ctx.globalAlpha = 0.7 * pulse;
                ctx.shadowColor = tierColors[activeTierIdx];
                ctx.shadowBlur = 8;
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.beginPath();
                ctx.roundRect(cx - 12, badgeY - 7, 24, 14, 7);
                ctx.fill();
                ctx.strokeStyle = tierColors[activeTierIdx];
                ctx.lineWidth = 1;
                ctx.stroke();

                // Badge text
                ctx.globalAlpha = pulse;
                ctx.font = 'bold 9px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = tierColors[activeTierIdx];
                ctx.fillText('x' + mul, cx, badgeY);
                ctx.restore();
            }

            // --- Full bar celebration: pulsing neon border ---
            if (progress > 0.95) {
                const neonPulse = Math.sin(t * 5) * 0.3 + 0.7;
                ctx.save();
                ctx.globalAlpha = neonPulse * 0.7;
                // Animated hue shift
                const hue = ((t * 60) % 360) | 0;
                ctx.strokeStyle = `hsl(${hue}, 100%, 60%)`;
                ctx.lineWidth = 2.5;
                ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.roundRect(barX - 1, barY - 1, barW + 2, barH + 2, r + 1);
                ctx.stroke();
                ctx.restore();

                // "MAX" label above bar
                const maxPulse = Math.sin(t * 4) * 0.2 + 0.8;
                ctx.save();
                ctx.globalAlpha = maxPulse;
                ctx.shadowColor = '#ff4444';
                ctx.shadowBlur = 10;
                ctx.font = 'bold 8px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillStyle = '#ff4444';
                ctx.fillText('MAX', cx, barY - 6);
                ctx.restore();
            }

            // --- "SURGE" label at very top ---
            ctx.save();
            ctx.globalAlpha = 0.5 + progress * 0.3;
            ctx.font = 'bold 6px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillStyle = progress > 0.5 ? barColor : '#8899bb';
            ctx.fillText('SURGE', cx, barY - (progress > 0.95 ? 16 : 4));
            ctx.restore();

            // ================================================================
            // POWER SHOT INDICATOR — only shows when a shot is available
            // ================================================================
            let highestTier = -1;
            for (let t = POWER_SHOTS.length - 1; t >= 0; t--) {
                if (progress >= POWER_SHOTS[t].threshold * 0.95) { highestTier = t; break; }
            }

            if (highestTier >= 0 && !gameState.activePowerShot) {
                // Show small tappable power shot icon on left side
                const ps = POWER_SHOTS[highestTier];
                const iconY = DESIGN.height / 2 - 20;
                const iconX = 12;
                const iconS = 40;
                const onCooldown = gameState.powerShotCooldown > 0;
                const pulse = onCooldown ? 0.4 : Math.sin(Date.now() * 0.005) * 0.15 + 0.85;

                ctx.save();
                ctx.globalAlpha = (onCooldown ? 0.35 : 0.85) * pulse;
                ctx.shadowColor = onCooldown ? '#666666' : ps.color;
                ctx.shadowBlur = onCooldown ? 0 : 10 * pulse;

                // Circular button
                ctx.fillStyle = `rgba(0,0,0,0.5)`;
                ctx.beginPath();
                ctx.arc(iconX + iconS / 2, iconY + iconS / 2, iconS / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = ps.color;
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.globalAlpha = 1;
                // Icon
                drawText(ps.icon, iconX + iconS / 2, iconY + iconS / 2 - 2, 16, '#ffffff', 'normal', false);
                // Shot name or cooldown indicator below
                if (onCooldown) {
                    drawText(gameState.powerShotCooldown + ' BALLS', iconX + iconS / 2, iconY + iconS + 6, 7, '#ff6666', 'bold', false);
                } else {
                    drawText(ps.name, iconX + iconS / 2, iconY + iconS + 6, 7, ps.color, 'bold', false);
                }
                ctx.restore();
            }

            // ================================================================
            // ACTIVE POWER SHOT BANNER (centered, above gameplay)
            // ================================================================
            if (gameState.activePowerShot) {
                const aps = gameState.activePowerShot;
                // Offset banner below free hit if active
                const bannerY = extrasSystem.isFreeHit ? 82 : 52;
                const bannerPulse = Math.sin(Date.now() * 0.008) * 0.12 + 0.88;

                ctx.save();
                ctx.globalAlpha = bannerPulse;
                ctx.shadowColor = aps.color;
                ctx.shadowBlur = 12;

                // Pill banner
                const bw = 140;
                const bh = 28;
                const bx = W / 2 - bw / 2;
                drawRoundedRect(bx, bannerY, bw, bh, bh / 2, `rgba(0,0,0,0.6)`, aps.color, 1.5);
                drawText(aps.icon + ' ' + aps.name, W / 2, bannerY + bh / 2, 10, aps.color, 'bold', false);

                // Timer bar below
                ctx.globalAlpha = 0.5;
                const tmPct = gameState.powerShotTimer / 240;
                drawRoundedRect(bx + 10, bannerY + bh + 3, (bw - 20) * tmPct, 2, 1, aps.color);
                ctx.globalAlpha = 1;
                ctx.restore();
            }
        }

        // ============================================================================
        // GAMEPLAY
        // ============================================================================

        // Helper: advance to next ball, handle over/game-over logic
        function _advanceBall(isExtra) {
            if (gameState.screen !== 'game') return;
            const config = DIFFICULTY_CONFIG[gameState.difficulty];

            // Extras (wides, no-balls) don't count as a legal delivery
            if (!isExtra) {
                fatigueSystem.onBallBowled();
                // Decrement power shot cooldown each legal delivery
                if (gameState.powerShotCooldown > 0) gameState.powerShotCooldown--;
                gameState.ballsInOver++;
                if (gameState.ballsInOver >= 6) {
                    gameState.oversCompleted++;
                    gameState.ballsInOver = 0;

                    if (gameState.oversCompleted >= config.overs) {
                        _endGame();
                        return;
                    }
                }
            }

            // Free hit commentary
            if (extrasSystem.isFreeHit && !extrasSystem.isNoBall) {
                commentary.trigger('freeHit');
            }

            // Multiplayer: sync score every ball
            if (gameState.isMultiplayer) {
                gameState._mpSyncScore(gameState.resultText || '', 0);

                // Chaser auto-win: if score >= target, end game immediately
                if (gameState.mpRole === 'chaser' && gameState.score >= gameState.mpTarget) {
                    _endGame();
                    return;
                }
            }

            gameState.bowlNextBall();
        }

        function _endGame() {
            // Prevent double end-game processing
            if (gameState.gameOverProcessed) return;
            gameState.gameOverProcessed = true;

            // === MULTIPLAYER END-GAME HANDLING ===
            if (gameState.isMultiplayer) {
                // Sync final score
                gameState._mpSyncScore('END', 0);

                if (gameState.mpRole === 'setter') {
                    // Setter finished — complete innings 1, go to waiting screen
                    gameState._mpCompleteInnings1().then(() => {
                        _mpWaitingForOpponent = true;
                        // Start polling for opponent's innings completion
                        const pollId = setInterval(async () => {
                            const room = await gameState._mpPollRoom();
                            if (room) {
                                _mpOpponentInningsData = {
                                    score: room.innings2Score,
                                    wickets: room.innings2Wickets,
                                    overs: room.innings2Overs,
                                    balls: room.innings2Balls,
                                    lastBallResult: room.lastBallResult,
                                };
                                _mpWaitingRoomData = room;
                                if (room.status === 'completed') {
                                    clearInterval(pollId);
                                    _mpWaitingForOpponent = false;
                                    gameState.mpMatchResult = { winner: room.winner, winMargin: room.winMargin };
                                    gameState.screen = 'gameover';
                                }
                            }
                        }, 2000);
                    });
                    gameState.screen = 'mp_waiting';
                    return;
                } else {
                    // Chaser finished — complete match
                    gameState._mpCompleteMatch().then(result => {
                        gameState.mpMatchResult = result;
                    });
                    // Fall through to normal gameover screen
                }

                gameState.isMultiplayer = false;
                gameState.screen = 'gameover';
                gameState.saveToStorage();
                return;
            }

            gameState.gamesPlayed++;
            if (gameState.score > gameState.bestScore) {
                gameState.bestScore = gameState.score;
            }

            const won = gameState.score >= gameState.target;

            // === AI BOT GAME OVER REACTION ===
            if (won) {
                AI_BOT.show('playerWinGame'); // Player won!
            } else {
                AI_BOT.show('botWinGame'); // Bot won
            }

            // === VIP POPUP TRIGGER (after first game completes) ===
            if (gameState.gamesPlayed === 1 && !gameState.vipPopupShown && !gameState.isVIP) {
                _showVIPPopup = true;
                gameState.vipPopupShown = true;
                gameState.saveToStorage();
            }

            // === CAMPAIGN LEVEL STAR CALCULATION ===
            if (gameState.isCampaignMode && gameState.currentCampaignLevel) {
                if (won) {
                    // Calculate stars: base 1 star for beating target
                    let stars = 1;
                    // +1 star for 3+ boundaries
                    if (gameState.fours >= 3) stars++;
                    // +1 star for no wickets (perfect)
                    if (gameState.wickets === 0) stars++;

                    const levelNum = gameState.currentCampaignLevel;
                    const oldStars = gameState.levelStars[levelNum] || 0;
                    gameState.levelStars[levelNum] = Math.max(oldStars, stars);
                    gameState.totalStars = Object.values(gameState.levelStars).reduce((a, b) => a + b, 0);

                    // Advance campaign if completed current level
                    if (gameState.campaignLevel === levelNum && levelNum < 100) {
                        gameState.campaignLevel = levelNum + 1;
                    }

                    // Award coins & XP from level config
                    const level = CRICKET_LEVELS[levelNum - 1];
                    gameState.addCoins(level.coinReward);
                    gameState.addXP(level.xpReward);
                }
            }

            // Record career stats & achievements
            gameState.recordMatchResult();

            // === PHASE 5: MISSION & XP UPDATES ===
            gameState._updateMission('gamePlayed', 1);
            gameState._updateMission('maxScore', gameState.score);
            if (won && gameState.currentPhase === 1) {
                gameState._updateMission('phaseComplete', 1); // Phase 2 (index 1)
            }
            // Award XP
            const xpReward = won ? 50 : 20;
            gameState.addXP(xpReward);
            // Check for daily reward
            if (gameState._checkDailyReward()) {
                // Daily reward available (could show popup on menu)
            }

            // Phase unlock logic (always runs, but doesn't control screen routing for campaign)
            if (won && gameState.currentPhase < PHASES.length) {
                const nextPhase = gameState.currentPhase + 1;
                // Unlock next phase if it exists
                if (nextPhase < PHASES.length && !gameState.phasesUnlocked[nextPhase]) {
                    gameState.phasesUnlocked[nextPhase] = true;
                    gameState.phaseJustCompleted = true;
                }
            }

            // Campaign mode: ALWAYS go to campaign_result (with RETRY | NEXT LEVEL | LEVELS)
            if (gameState.isCampaignMode && gameState.currentCampaignLevel) {
                gameState.screen = 'campaign_result';
                gameState.saveToStorage();
                gameState._syncToConvex();
                gameState.gameOverProcessed = true;
                return;
            }

            // Non-campaign: show phase_complete screen when a new phase was just unlocked
            if (won && gameState.phaseJustCompleted) {
                gameState.screen = 'phase_complete';
                gameState.saveToStorage();
                gameState._syncToConvex();
                gameState.gameOverProcessed = true;
                return;
            }
            // Non-campaign: final phase won — show GAME MASTERED
            if (won && gameState.currentPhase === PHASES.length - 1) {
                gameState.phaseJustCompleted = true;
                gameState.screen = 'phase_complete';
                gameState.saveToStorage();
                gameState._syncToConvex();
                gameState.gameOverProcessed = true;
                return;
            }

            // Normal game over (lost or replaying already-cleared phase)
            gameState.screen = 'gameover';
            gameState.saveToStorage();
            gameState._syncToConvex();
            gameState.gameOverProcessed = true;
        }

        // Post-hit trajectory constants
        const GRAVITY = 0.15;          // gravity pulls ball back down
        const HIT_SHRINK_RATE = 0.992; // ball shrinks gently as it flies (visible longer for fielder catches)

        function updateGame() {
            // Power shot timer countdown
            if (gameState.activePowerShot) {
                gameState.powerShotTimer--;
                if (gameState.powerShotTimer <= 0) {
                    gameState.activePowerShot = null;
                    gameState.powerShotTimer = 0;
                }
            }

            // Update balls
            for (let i = gameState.balls.length - 1; i >= 0; i--) {
                const ball = gameState.balls[i];

                // Trail
                ball.trail.unshift({ x: ball.x, y: ball.y });
                if (ball.trail.length > 12) ball.trail.pop();

                if (ball.hit) {
                    // === POST-HIT TRAJECTORY ===
                    // Ball flies away from batsman after being struck
                    ball.x += ball.hitVx;
                    ball.y += ball.hitVy;
                    ball.hitVy += GRAVITY; // gravity curves it back down (or slows upward)

                    // Shrink ball as it flies away (perspective effect)
                    ball.radius *= (ball._surgeShrinkRate || HIT_SHRINK_RATE);

                    // Track how long since hit for removal timing
                    ball.hitTimer = (ball.hitTimer || 0) + 1;

                    // === FIELDER CATCH DETECTION ===
                    // Sixes/fours are immune. Free hits are immune. Already caught = skip.
                    if (!ball._fielderCatchImmune && !ball._fielderCaught && !ball.resultGiven && !extrasSystem.isFreeHit &&
                        ball.hit && ball.hitTimer > 5 && ball.hitTimer < 55) {
                        for (const f of fielders) {
                            const fdx = ball.x - f.x;
                            const fdy = ball.y - f.y;
                            const dist = Math.sqrt(fdx * fdx + fdy * fdy);
                            const ballSpeed = Math.sqrt(ball.hitVx * ball.hitVx + ball.hitVy * ball.hitVy);
                            const _phFielderMul = getOverPhase() === 'powerplay' ? 0.5 : getOverPhase() === 'death' ? 1.3 : 1.0;
                            // Difficulty scaling: harder = better catchers, wider speed threshold
                            const _diffFielderMul = { easy: 0.7, medium: 0.85, hard: 1.0, legend: 1.25 }[gameState.difficulty] || 1.0;
                            const _diffSpeedThresh = { easy: 9.0, medium: 10.5, hard: 12.0, legend: 14.0 }[gameState.difficulty] || 10.5;
                            // Chasing fielders get +50% catch radius (diving reach), jumping get +70%
                            const _effectiveCatchRadius = f.jumping ? f.catchRadius * 1.7 : f.chasing ? f.catchRadius * 1.5 : f.catchRadius;
                            // Loft spam boost: fielders read repetitive shots, catch rate up after 3+ lofts
                            const _spamBoost = Math.min(1.5, 1.0 + Math.max(0, (gameState._consecutiveLofts || 0) - 2) * 0.12);
                            if (dist < _effectiveCatchRadius && ballSpeed < _diffSpeedThresh && Math.random() < (0.70 * _phFielderMul * _diffFielderMul * _spamBoost)) {
                                // CAUGHT by fielder!
                                ball._fielderCaught = true;
                                ball.resultGiven = true;
                                f.triggerCatch();
                                gameState.wickets++;
                                audio.play('wicket');
                                triggerShake(16);
                                camera.triggerZoom(1.08, DESIGN.width / 2, 400, 700);
                                Utils.haptic(150);
                                gameState.resultText = '🧤 CAUGHT!';
                                gameState.resultTextTime = 70;
                                gameState.surgeProgress = Math.max(0, gameState.surgeProgress - 0.15);
                                umpire.triggerSignal('out');
                                commentary.trigger('caught');
                                crowdSystem.trigger('six'); // big crowd reaction for catches
                                crowdSystem.triggerWicket();
                                adaptiveAI.recordResult({ hit: false, runs: 0, quality: 'caught', timing: ball.y });
                                batsmanProfile.record(ball.delivery || {}, { hit: false, runs: 0 });
                                _feedEngineEvent(ball.delivery || {}, { quality: 'caught', runs: 0, shotType: 'CAUGHT' });
                                AI_BOT.show('playerWicket'); // Bot reacts to wicket
                                AI_BOT.consecutiveBoundaries = 0; // Reset streak on wicket

                                // Undo any runs that were already awarded for this ball
                                if (ball._runsAwarded) {
                                    gameState.score = Math.max(0, gameState.score - ball._runsAwarded);
                                    gameState.runsThisInning = Math.max(0, gameState.runsThisInning - ball._runsAwarded);
                                }

                                // Stop ball at fielder position
                                ball.hitVx = 0;
                                ball.hitVy = 0;

                                // Spawn catch celebration particles around fielder
                                for (let cp = 0; cp < 8; cp++) {
                                    particlePool.spawn({
                                        x: f.x + (Math.random() - 0.5) * 30,
                                        y: f.y - 10,
                                        vx: (Math.random() - 0.5) * 3,
                                        vy: -2 - Math.random() * 3,
                                        color: ['#ff4444', '#ffaa00', '#ffffff', '#00e5ff'][cp % 4],
                                        size: 3 + Math.random() * 3,
                                        life: 30 + Math.random() * 20,
                                        maxLife: 50,
                                    });
                                }

                                // Trigger all fielders to celebrate
                                for (const cf of fielders) {
                                    if (cf !== f) {
                                        setTimeout(() => { cf.celebrating = true; cf.celebTimer = 0; }, 200 + Math.random() * 300);
                                    }
                                }
                                // Keeper also celebrates
                                keeper.triggerCelebration();

                                if (gameState.wickets >= 3) {
                                    setTimeout(() => _endGame(), 1200);
                                } else {
                                    setTimeout(() => _advanceBall(), 1400);
                                }
                                break;
                            }
                            // === PHASE 4: Near-miss detection ===
                            else if (dist < f.catchRadius * 1.6 && !ball._nearMissTriggered) {
                                f.triggerNearMiss();
                                ball._nearMissTriggered = true;
                            }
                        }
                    }

                    // Remove ball when: off-screen OR after ~80 frames (longer for fielder catches)
                    if (ball.x < -30 || ball.x > DESIGN.width + 30 ||
                        ball.y < -30 || ball.y > DESIGN.height + 30 ||
                        ball.hitTimer > 80 || ball.radius < 2) {
                        gameState.balls.splice(i, 1);
                    }
                } else {
                    // === PRE-HIT: Ball traveling down the pitch toward batsman ===
                    const curveMul = ball._curveMul || 1.0;
                    const dt = ball._deliveryType || 'fast';

                    ball.y += ball.speedY;
                    // Amplified swing using curveMul — spin balls curve dramatically
                    ball.x += ball.speedX + ball.swing * 0.01 * curveMul;

                    // Spin wobble: ball oscillates laterally for spin/slower deliveries
                    if (dt === 'spin' || dt === 'slower') {
                        ball._spinPhase = (ball._spinPhase || 0) + 0.25;
                        ball.x += Math.sin(ball._spinPhase) * 0.4 * curveMul;
                    }

                    // Bouncer: mid-pitch bounce effect — ball slows then accelerates + bounces up
                    if (dt === 'bouncer' && !ball._bouncerBounced) {
                        const midPitchY = (DESIGN.bowlersCreaseY + DESIGN.pitchEndY) * 0.55;
                        if (ball.y >= midPitchY) {
                            ball._bouncerBounced = true;
                            ball.speedY *= 0.75; // slow down after bounce
                            ball.speedX += (Math.random() - 0.5) * 1.2; // lateral deviation
                        }
                    }

                    // Yorker: late dip — ball accelerates in the last third of pitch
                    if (dt === 'yorker') {
                        const pitchProgress = (ball.y - DESIGN.bowlersCreaseY) / (DESIGN.pitchEndY - DESIGN.bowlersCreaseY);
                        if (pitchProgress > 0.65) {
                            ball.speedY *= 1.008; // subtle late acceleration
                        }
                    }

                    // Swing decay
                    if (Math.abs(ball.swing) > 0.05) {
                        ball.swing *= 0.97;
                    }

                    // --- HIT DETECTION ---
                    const dx = Math.abs(ball.x - batsman.x);
                    const dy = Math.abs(ball.y - batsman.y);
                    const inHitZone = dx < 70 && dy < 90;

                    if (!ball.resultGiven && inHitZone && batsman.swingInProgress) {
                        // Bat connected with ball!
                        ball.hit = true;
                        ball.hitTimer = 0;
                        audio.play('bat_hit');

                        // Timing quality based on ball Y position
                        // === PHASE 3: Aggression mode modifies timing zones ===
                        const _modeOffset = gameState.battingMode === 'attacking' ? -15 :
                                            gameState.battingMode === 'defensive' ? 20 : 0;
                        let quality = 'weak';
                        if (ball.y >= (TIMING_ZONES.perfect.min - _modeOffset) && ball.y <= (TIMING_ZONES.perfect.max + _modeOffset)) {
                            quality = 'perfect';
                        } else if ((ball.y >= (TIMING_ZONES.good.min - _modeOffset) && ball.y <= (TIMING_ZONES.good.max + _modeOffset)) ||
                                   (ball.y >= (TIMING_ZONES.good.min2 - _modeOffset) && ball.y <= (TIMING_ZONES.good.max2 + _modeOffset))) {
                            quality = 'good';
                        } else if ((ball.y >= (TIMING_ZONES.edge.min - _modeOffset) && ball.y <= (TIMING_ZONES.edge.max + _modeOffset)) ||
                                   (ball.y >= (TIMING_ZONES.edge.min2 - _modeOffset) && ball.y <= (TIMING_ZONES.edge.max2 + _modeOffset))) {
                            quality = 'edge';
                        }

                        // Runs scored — SWIPE DIRECTION + TIMING QUALITY together
                        const swDir = batsman.swipeDir;
                        const shotType = swDir ? swDir.shotType : SWIPE_SHOTS.DEFEND;
                        const swipePower = swDir ? Math.min(swDir.distance / 80, 1.0) : 0.2; // 0-1 normalized

                        // === ANTI-SPAM: Swipe accuracy + consecutive loft penalty ===
                        // Dead-center straight-up (-90°) is lazy; penalize it
                        // Swipes near edge of LOFT zone (-120° or -60°) show intent
                        let _swipeAccuracy = 1.0;
                        if (shotType === SWIPE_SHOTS.LOFT && swDir) {
                            const deg = swDir.angle * (180 / Math.PI);
                            // -90° = dead center of LOFT zone. Distance from -90 = 0-30°
                            const deviationFromCenter = Math.abs(deg - (-90)); // 0 = dead center, 30 = edge
                            // Dead center (0°) → accuracy 0.55, Edge (30°) → accuracy 1.0
                            _swipeAccuracy = 0.55 + (deviationFromCenter / 30) * 0.45;
                            _swipeAccuracy = Math.min(1.0, Math.max(0.55, _swipeAccuracy));
                        }

                        // Track consecutive lofts — AI adapts to spam
                        if (!gameState._consecutiveLofts) gameState._consecutiveLofts = 0;
                        if (shotType === SWIPE_SHOTS.LOFT) {
                            gameState._consecutiveLofts++;
                        } else {
                            gameState._consecutiveLofts = Math.max(0, gameState._consecutiveLofts - 1);
                        }
                        // After 3+ consecutive lofts, six chance drops progressively
                        const _loftSpamPenalty = Math.max(0.4, 1.0 - Math.max(0, gameState._consecutiveLofts - 2) * 0.15);

                        let runs = 1;
                        let wasCaught = false;

                        if (quality === 'perfect') {
                            // Perfect timing + swipe type
                            if (shotType === SWIPE_SHOTS.LOFT) {
                                // Difficulty-scaled six probability: harder = fewer sixes
                                const _loftSixBase = { easy: 0.38, medium: 0.28, hard: 0.18, legend: 0.10 }[gameState.difficulty] || 0.28;
                                const _loftSixPow = { easy: 0.15, medium: 0.10, hard: 0.07, legend: 0.04 }[gameState.difficulty] || 0.10;
                                const _adjustedSixChance = (_loftSixBase + swipePower * _loftSixPow) * _swipeAccuracy * _loftSpamPenalty;
                                // Additional outcome: mishit loft → caught chance (not just 6 or 4)
                                const _mishitCatchChance = { easy: 0.05, medium: 0.10, hard: 0.18, legend: 0.25 }[gameState.difficulty] || 0.10;
                                if (!extrasSystem.isFreeHit && Math.random() < _mishitCatchChance * (1 - _swipeAccuracy + 0.3)) {
                                    // Mishit loft — top edge, skied to fielder
                                    wasCaught = true;
                                    runs = 0;
                                } else {
                                    runs = Math.random() < _adjustedSixChance ? 6 : 4;
                                }
                            } else if (shotType === SWIPE_SHOTS.DRIVE) {
                                runs = Math.random() < 0.55 ? 4 : (Math.random() < 0.3 ? 6 : 2);
                            } else if (shotType === SWIPE_SHOTS.CUT || shotType === SWIPE_SHOTS.PULL) {
                                runs = Math.random() < 0.5 ? 4 : 2;
                            } else if (shotType === SWIPE_SHOTS.SWEEP) {
                                runs = Math.random() < 0.4 ? 4 : 2;
                            } else {
                                // DEFEND on perfect timing = safe 1-2
                                runs = Math.random() < 0.3 ? 2 : 1;
                            }
                        } else if (quality === 'good') {
                            if (shotType === SWIPE_SHOTS.LOFT) {
                                // Difficulty-scaled: harder difficulties = fewer sixes on good timing
                                const _goodLoftSix = { easy: 0.25, medium: 0.18, hard: 0.10, legend: 0.06 }[gameState.difficulty] || 0.18;
                                // Good timing loft also has mishit risk
                                const _goodMishitChance = { easy: 0.08, medium: 0.14, hard: 0.22, legend: 0.30 }[gameState.difficulty] || 0.14;
                                if (!extrasSystem.isFreeHit && Math.random() < _goodMishitChance * (1 - _swipeAccuracy + 0.3)) {
                                    wasCaught = true;
                                    runs = 0;
                                } else {
                                    runs = Math.random() < (_goodLoftSix * _swipeAccuracy * _loftSpamPenalty) ? 6 : (Math.random() < 0.5 ? 4 : 2);
                                }
                            } else if (shotType === SWIPE_SHOTS.DRIVE) {
                                runs = Math.random() < 0.45 ? 4 : 2;
                            } else if (shotType === SWIPE_SHOTS.CUT || shotType === SWIPE_SHOTS.PULL) {
                                runs = Math.random() < 0.35 ? 4 : 2;
                            } else if (shotType === SWIPE_SHOTS.SWEEP) {
                                runs = Math.random() < 0.3 ? 2 : 1;
                            } else {
                                runs = 1;
                            }
                        } else if (quality === 'edge') {
                            // === PHASE 3: Catch chance varies by batting mode ===
                            const _catchChance = gameState.battingMode === 'attacking' ? 0.18 :
                                                 gameState.battingMode === 'defensive' ? 0.08 : 0.12;
                            if (!extrasSystem.isFreeHit && Math.random() < _catchChance) {
                                wasCaught = true;
                                ball.resultGiven = true;
                                gameState.wickets++;
                                audio.play('wicket');
                                triggerShake(14);
                                camera.triggerZoom(1.06, DESIGN.width / 2, 400, 600);
                                Utils.haptic(150);
                                gameState.resultText = '🧤 CAUGHT!';
                                gameState.resultTextTime = 70;
                                gameState.surgeProgress = Math.max(0, gameState.surgeProgress - 0.15);
                                umpire.triggerSignal('out');
                                commentary.trigger('caught');
                                crowdSystem.trigger('six'); // big crowd roar for catches
                                adaptiveAI.recordResult({ hit: false, runs: 0, quality: 'caught', timing: ball.y });
                                batsmanProfile.record(ball.delivery || {}, { hit: false, runs: 0 });
                                _feedEngineEvent(ball.delivery || {}, { quality: 'caught', runs: 0, shotType: 'DEFEND' });
                                extrasSystem.isFreeHit = false;
                                keeper.triggerCelebration();
                                AI_BOT.show('playerWicket'); // Bot reacts to wicket
                                AI_BOT.consecutiveBoundaries = 0; // Reset streak on wicket
                                // Give ball a caught trajectory (lobbed up to keeper/fielder)
                                ball._fielderCatchImmune = true; // Already caught on edge
                                ball.hitVx = (Math.random() - 0.5) * 3;
                                ball.hitVy = -5 - Math.random() * 2;
                                if (gameState.wickets >= 3) {
                                    setTimeout(() => _endGame(), 1000);
                                } else {
                                    setTimeout(() => _advanceBall(), 1200);
                                }
                            }
                            if (!wasCaught) runs = Math.random() > 0.7 ? 2 : 1;
                        } else {
                            // Weak quality — mistimed, mostly dot balls
                            if (shotType === SWIPE_SHOTS.DEFEND) {
                                runs = Math.random() < 0.4 ? 1 : 0; // safe block, sometimes a run
                            } else if (shotType === SWIPE_SHOTS.LOFT) {
                                runs = Math.random() < 0.15 ? 2 : 0; // risky loft mistimed = mostly dot
                            } else {
                                runs = Math.random() < 0.25 ? 1 : 0; // mistimed = usually dot
                            }
                        }
                        // Handle loft mishit catch (from perfect/good quality loft mishit)
                        if (wasCaught && quality !== 'edge') {
                            ball.resultGiven = true;
                            gameState.wickets++;
                            audio.play('wicket');
                            triggerShake(14);
                            camera.triggerZoom(1.06, DESIGN.width / 2, 400, 600);
                            Utils.haptic(150);
                            gameState.resultText = '🏏 SKIED! CAUGHT!';
                            gameState.resultTextTime = 70;
                            gameState.surgeProgress = Math.max(0, gameState.surgeProgress - 0.15);
                            umpire.triggerSignal('out');
                            commentary.trigger('caught');
                            crowdSystem.trigger('six');
                            adaptiveAI.recordResult({ hit: false, runs: 0, quality: 'caught', timing: ball.y });
                            batsmanProfile.record(ball.delivery || {}, { hit: false, runs: 0 });
                            _feedEngineEvent(ball.delivery || {}, { quality: 'caught', runs: 0, shotType: 'LOFT' });
                            extrasSystem.isFreeHit = false;
                            AI_BOT.show('playerWicket');
                            AI_BOT.consecutiveBoundaries = 0;
                            ball._fielderCatchImmune = true;
                            ball.hitVx = (Math.random() - 0.5) * 3;
                            ball.hitVy = -6 - Math.random() * 3;
                            if (gameState.wickets >= 3) {
                                setTimeout(() => _endGame(), 1000);
                            } else {
                                setTimeout(() => _advanceBall(), 1200);
                            }
                        }
                        if (wasCaught) continue; // skip normal scoring, move to next ball in loop

                        // Snapshot surge state BEFORE power shot may drain it
                        const _surgeSnapshot = gameState.activeSurge;

                        // Apply surge multiplier
                        if (gameState.activeSurge) {
                            runs = Math.ceil(runs * gameState.activeSurge.multiplier);
                        }

                        // Apply POWER SHOT if active (guaranteed runs + bonus effects)
                        if (gameState.activePowerShot) {
                            const ps = gameState.activePowerShot;
                            // Track power shot use for achievements
                            if (gameState._psUses[ps.id] !== undefined) gameState._psUses[ps.id]++;
                            gameState.totalPowerShots++;

                            // Override runs: guaranteed minimum + six chance
                            if (Math.random() < ps.sixChance) {
                                runs = Math.max(ps.minRuns, 6);
                            } else {
                                runs = ps.minRuns;
                            }

                            // Apply surge multiplier on top of power shot
                            if (gameState.activeSurge) {
                                runs = Math.ceil(runs * gameState.activeSurge.multiplier);
                            }

                            // Bonus coins from power shot
                            gameState.addCoins(ps.bonusCoins);

                            // Coin multiplier (some shots give 2x/3x coins for this hit)
                            if (ps.coinMultiplier) {
                                // Extra coins will be applied below in the normal coin award
                                // Store multiplier temporarily
                                ball._powerShotCoinMul = ps.coinMultiplier;
                            }

                            // Camera + haptic effects scaled to power shot tier
                            camera.triggerShake(ps.shakePower);
                            camera.triggerZoom(1.1 + ps.tier * 0.03, DESIGN.width / 2, 400, 800);
                            Utils.haptic(100 + ps.tier * 50);

                            // Drain surge bar
                            gameState.surgeProgress = Math.max(0, gameState.surgeProgress - ps.drainPct);
                            // Cooldown: can't use another power shot for 3 balls
                            gameState.powerShotCooldown = 3;

                            // Re-evaluate active surge tier after drain
                            gameState.activeSurge = null;
                            for (let st = SURGE_TIERS.length - 1; st >= 0; st--) {
                                if (gameState.surgeProgress >= SURGE_TIERS[st].threshold) {
                                    gameState.activeSurge = SURGE_TIERS[st];
                                    break;
                                }
                            }

                            // Clear power shot
                            gameState.activePowerShot = null;
                            gameState.powerShotTimer = 0;
                        }

                        // --- POST-HIT TRAJECTORY VELOCITY (SWIPE-DRIVEN) ---
                        // Direction from swipe angle, power from runs + swipe distance
                        let hitAngle;
                        if (swDir && swDir.distance >= SWIPE_MIN_DIST) {
                            // Use actual swipe direction for ball trajectory
                            // Swipe angle maps to horizontal direction (left/right spread)
                            hitAngle = Math.cos(swDir.angle) * 0.8 + (Math.random() - 0.5) * 0.3;
                        } else {
                            hitAngle = (Math.random() - 0.5) * 1.2; // fallback random for taps
                        }

                        if (runs >= 6) {
                            // Lofted shot — ball flies UP and away fast
                            ball.hitVx = hitAngle * 6;
                            ball.hitVy = -10 - Math.random() * 3;
                            ball._fielderCatchImmune = true; // Sixes fly over fielders
                        } else if (runs >= 4) {
                            // Driven — ball shoots toward boundary
                            ball.hitVx = hitAngle * 5;
                            ball.hitVy = -7 - Math.random() * 2;
                            ball._fielderCatchImmune = true; // Fours race past fielders
                        } else if (runs >= 2) {
                            // Push into outfield — travels to fielder zone
                            ball.hitVx = hitAngle * 4.2;
                            ball.hitVy = -7.5 - Math.random() * 1.5;
                        } else if (runs === 1) {
                            // Single — nudge into the field, catchable by close fielders
                            ball.hitVx = hitAngle * 2.5;
                            ball.hitVy = -3.5 - Math.random() * 1;
                        } else {
                            // Dot/block — dead bat, stays close to pitch
                            ball.hitVx = hitAngle * 1.2;
                            ball.hitVy = -1.5 - Math.random() * 0.5;
                            ball._fielderCatchImmune = true; // blocks don't carry to fielders
                        }

                        // === SURGE BOOST: faster ball + glow flag ===
                        if (_surgeSnapshot) {
                            const surgeIdx = SURGE_TIERS.indexOf(_surgeSnapshot);
                            const lvl = surgeIdx + 1; // 1-4
                            // Aggressive speed boost: L1=1.4x, L2=1.7x, L3=2.0x, L4=2.4x
                            const speedBoost = 1 + lvl * 0.35;
                            ball.hitVx *= speedBoost;
                            ball.hitVy *= speedBoost;
                            ball._surgeHit = true;
                            ball._surgeLevel = lvl;
                            ball._surgeColor = _surgeSnapshot.color;
                            // Surge hits shrink slower so the glow is visible longer
                            ball._surgeShrinkRate = 0.996;
                        }

                        const prevScore = gameState.score;
                        let finalRuns = runs;
                        // === PHASE 3: Aggression mode run modifiers ===
                        if (gameState.battingMode === 'attacking') {
                            finalRuns = Math.ceil(finalRuns * 1.5); // +50% runs in attacking mode
                        } else if (gameState.battingMode === 'defensive') {
                            finalRuns = Math.min(finalRuns, 4); // cap at 4 in defensive mode
                        }
                        // === PHASE 5: Powerplay run bonus ===
                        if (getOverPhase() === 'powerplay' && finalRuns > 0) {
                            finalRuns = Math.min(6, finalRuns + 1); // +1 bonus run, capped at 6
                        }
                        // Apply score boost power-up
                        if (gameState._activeScoreBoost) {
                            finalRuns *= 2;
                        }
                        gameState.score += finalRuns;
                        gameState.runsThisInning += finalRuns;
                        ball._runsAwarded = finalRuns; // Track for potential fielder catch undo (use actual awarded runs)

                        // === PHASE 2: Milestone check ===
                        milestoneSystem.check(prevScore, gameState.score);

                        // === PHASE 2: Consecutive boundary tracking + reset dots ===
                        crowdSystem.triggerBoundary(runs);
                        gameState._consecutiveDots = 0;

                        // === PHASE 1: Track shot stats + trigger feedback ===
                        const shotLabel = shotType ? shotType.label : 'DEFEND';
                        if (gameState.shotStats[shotLabel] !== undefined) gameState.shotStats[shotLabel]++;
                        if (gameState.shotQualities[quality] !== undefined) gameState.shotQualities[quality]++;
                        shotFeedback.trigger(shotType, quality, finalRuns, DESIGN.width / 2, 680);

                        // === PHASE 2: Consecutive boundary tracking + reset dots ===
                        crowdSystem.triggerBoundary(runs);
                        gameState._consecutiveDots = 0;

                        if (runs >= 6) {
                            audio.play('six');
                            triggerShake(18);
                            camera.triggerZoom(1.08, DESIGN.width / 2, 400, 600);
                            Utils.haptic(100); // big event
                            gameState.sixes++;
                            gameState._updateMission('six', 1); // Update six mission
                            gameState.surgeProgress = Math.min(1, gameState.surgeProgress + 0.12);
                            const shotLabel = shotType !== SWIPE_SHOTS.DEFEND ? shotType.label + ' ' : '';
                            gameState.resultText = shotLabel + 'SIX!';
                            runAnimation.trigger('6');
                            AI_BOT.show('playerSix'); // Bot reacts to six
                            AI_BOT.consecutiveBoundaries++;
                            umpire.triggerSignal('six');
                        } else if (runs >= 4) {
                            audio.play('four');
                            triggerShake(10);
                            Utils.haptic(50); // impact
                            gameState.fours++;
                            gameState.surgeProgress = Math.min(1, gameState.surgeProgress + 0.06);
                            const shotLabel = shotType !== SWIPE_SHOTS.DEFEND ? shotType.label + ' ' : '';
                            gameState.resultText = shotLabel + 'FOUR!';
                            runAnimation.trigger('4');
                            AI_BOT.show('playerFour'); // Bot reacts to four
                            AI_BOT.consecutiveBoundaries++;
                            umpire.triggerSignal('four');
                        } else if (runs >= 2) {
                            audio.play('click');
                            triggerShake(5);
                            Utils.haptic(15); // light tap
                            gameState.surgeProgress = Math.min(1, gameState.surgeProgress + 0.03);
                            gameState.resultText = runs + ' runs';
                            runAnimation.trigger('2');
                            AI_BOT.show('playerSingle'); // Bot reacts to single
                            AI_BOT.consecutiveBoundaries = 0; // Reset streak on non-boundary
                        } else {
                            audio.play('click');
                            triggerShake(3);
                            Utils.haptic(10); // subtle
                            gameState.surgeProgress = Math.min(1, gameState.surgeProgress + 0.02);
                            gameState.resultText = shotType === SWIPE_SHOTS.DEFEND ? 'BLOCKED' : '1 run';
                            runAnimation.trigger('1');
                            if (runs === 0) AI_BOT.show('playerMiss'); // Bot reacts to miss/dot
                            AI_BOT.consecutiveBoundaries = 0; // Reset streak on non-boundary
                        }

                        // Coins and XP (use addXP to trigger level-ups)
                        let coinMul = ball._powerShotCoinMul || 1;
                        // Apply coin magnet power-up
                        if (gameState._activeCoinMagnet) {
                            coinMul *= 1.5;
                        }
                        gameState.addCoins(Math.ceil(runs * 2 * coinMul));

                        let xpAmount = runs * 2;
                        // Apply XP boost power-up
                        if (gameState._activeXPBoost) {
                            xpAmount *= 2;
                        }
                        gameState.addXP(xpAmount);

                        // Check surge tier upgrades
                        for (let t = SURGE_TIERS.length - 1; t >= 0; t--) {
                            if (gameState.surgeProgress >= SURGE_TIERS[t].threshold) {
                                if (!gameState.activeSurge || gameState.activeSurge.name !== SURGE_TIERS[t].name) {
                                    gameState.activeSurge = SURGE_TIERS[t];
                                    audio.play('surge');
                                    Utils.haptic(100); // surge activation
                                }
                                break;
                            }
                        }

                        ball.resultGiven = true;
                        gameState.resultTextTime = 60;

                        // Check if player is on a streak and trigger AI Bot reaction
                        if (AI_BOT.consecutiveBoundaries >= 3) {
                            AI_BOT.show('playerStreak');
                        } else if (gameState.score >= gameState.target * 0.7) {
                            // Player is winning by 70%+ of target
                            AI_BOT.show('playerWinning');
                        }

                        // Feed result to adaptive AI + profiling + commentary + crowd
                        adaptiveAI.recordResult({ hit: true, runs, quality, timing: ball.y });
                        batsmanProfile.record(ball.delivery || {}, { hit: true, runs, quality });
                        _feedEngineEvent(ball.delivery || {}, { quality, runs, shotType: shotType?.label || 'DEFEND' });
                        commentary.trigger('hit', { runs, quality });
                        crowdSystem.trigger(runs >= 6 ? 'six' : runs >= 4 ? 'four' : 'dot');

                        // Clear free hit after hitting
                        extrasSystem.isFreeHit = false;

                        // ML data collection
                        mlDataStore.record({
                            event: 'hit',
                            difficulty: gameState.difficulty,
                            delivery: ball.delivery || null,
                            ballY: ball.y,
                            ballX: ball.x,
                            quality, runs,
                            adaptiveBias: adaptiveAI.difficultyBias,
                            reactionTime: ball.spawnTime ? Date.now() - ball.spawnTime : 0,
                            over: gameState.oversCompleted,
                            ballInOver: gameState.ballsInOver,
                            score: gameState.score,
                            wickets: gameState.wickets,
                        });

                        // Schedule next ball — but skip if a fielder catch happens first
                        // For catchable shots (1-3 runs), delay longer to allow fielder interception
                        if (!ball._fielderCatchImmune && runs > 0 && runs < 4) {
                            ball._advanceScheduled = true;
                            setTimeout(() => {
                                if (!ball._fielderCaught) _advanceBall();
                            }, 1800); // Longer delay for catchable shots
                        } else {
                            setTimeout(() => _advanceBall(), 1200);
                        }
                    }

                    // --- STUMP COLLISION / WIDE / DOT: Ball past batsman ---
                    if (!ball.resultGiven && ball.y > DESIGN.batsmansCreaseY + 30) {

                        // === WIDE BALL CHECK ===
                        const isWide = extrasSystem.checkWide(ball.x);

                        if (isWide) {
                            // WIDE! +1 run, doesn't count as legal delivery, re-bowl
                            ball.resultGiven = true;
                            extrasSystem.isWide = true;
                            extrasSystem.totalWides++;
                            extrasSystem.totalExtras++;
                            let extraScore = 1;
                            if (gameState._activeScoreBoost) {
                                extraScore *= 2;
                            }
                            gameState.score += extraScore;
                            gameState.extras += 1;
                            audio.play('click');
                            gameState.resultText = 'WIDE!';
                            gameState.resultTextTime = 60;
                            commentary.trigger('wide');
                            crowdSystem.trigger('wide');
                            umpire.triggerSignal('wide');

                            adaptiveAI.recordResult({ hit: false, runs: 0, quality: 'wide', timing: ball.y });
                            batsmanProfile.record(ball.delivery || {}, { hit: false, runs: 0 });
                            _feedEngineEvent(ball.delivery || {}, { quality: 'wide', runs: 0 });
                            mlDataStore.record({
                                event: 'wide',
                                difficulty: gameState.difficulty,
                                delivery: ball.delivery || null,
                                ballY: ball.y, ballX: ball.x,
                                quality: 'wide', runs: 1,
                                adaptiveBias: adaptiveAI.difficultyBias,
                                reactionTime: ball.spawnTime ? Date.now() - ball.spawnTime : 0,
                                over: gameState.oversCompleted,
                                ballInOver: gameState.ballsInOver,
                                score: gameState.score, wickets: gameState.wickets,
                            });

                            // Wide doesn't count as a legal ball — re-bowl
                            setTimeout(() => _advanceBall(true), 800);

                        } else {
                            // Not wide — check stumps
                            const hitsStumps = stumps.checkCollision(ball.x, ball.y, ball.radius);

                            if (hitsStumps && !extrasSystem.isFreeHit) {
                                // BOWLED! Ball hit the stumps (not on free hit)
                                ball.resultGiven = true;
                                gameState.wickets++;
                                audio.play('wicket');
                                triggerShake(18);
                                camera.triggerZoom(1.1, DESIGN.width / 2, DESIGN.batsmansCreaseY, 800);
                                Utils.haptic(200); // major event — wicket
                                stumps.triggerScatter();
