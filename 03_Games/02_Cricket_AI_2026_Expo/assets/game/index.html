                const boxW = 44;
                const boxH = 56;
                const boxGap = 12;
                const totalBoxW = 4 * boxW + 3 * boxGap;
                const boxStartX = W / 2 - totalBoxW / 2;
                for (let bi = 0; bi < 4; bi++) {
                    const bx = boxStartX + bi * (boxW + boxGap);
                    if (x >= bx && x < bx + boxW && y >= inputY && y < inputY + boxH) {
                        audio.play('click');
                        _mpJoinCodeIdx = bi;
                        return;
                    }
                }

                // Back button
                const cancelY = H - 55;
                if (x >= W / 2 - 50 && x < W / 2 + 50 && y >= cancelY && y < cancelY + 35) {
                    audio.play('click');
                    gameState.screen = 'mp_lobby';
                    return;
                }

            } else if (gameState.screen === 'mp_waiting') {
                const W = DESIGN.width;
                // Start batting button
                const startY = 250;
                const startW = 180;
                const startX = W / 2 - startW / 2;
                if (!_mpWaitingForOpponent && _mpWaitingRoomData &&
                    x >= startX && x < startX + startW && y >= startY && y < startY + 50) {
                    audio.play('click');
                    const room = _mpWaitingRoomData;
                    const role = room.player1Name === 'Alpit' ? 'setter' : 'chaser';
                    gameState.startMultiplayerGame(room, role);
                    return;
                }

            } else if (gameState.screen === 'gameover') {
                const goPanelY = 80;
                const goPanelH = DESIGN.height - 160;
                const goBtnY = goPanelY + goPanelH - 60;
                const goBtnW = 110;
                const goBtnH = 44;
                const goBtnGap = 20;
                const goTotalW = goBtnW * 2 + goBtnGap;
                const goBtnStartX = DESIGN.width / 2 - goTotalW / 2;

                if (x >= goBtnStartX && x < goBtnStartX + goBtnW && y >= goBtnY && y < goBtnY + goBtnH) {
                    audio.play('click');
                    gameState.startGame(gameState.difficulty);
                    return;
                }
                if (x >= goBtnStartX + goBtnW + goBtnGap && x < goBtnStartX + goTotalW && y >= goBtnY && y < goBtnY + goBtnH) {
                    audio.play('click');
                    gameState.screen = 'menu';
                    return;
                }
            } else if (gameState.screen === 'campaign_result') {
                // Campaign result screen buttons
                const crLevelNum = gameState.currentCampaignLevel;
                const crWon = gameState.score >= gameState.target;
                const crHasNext = crWon && crLevelNum < 100;
                const crPanelY = 50, crPanelH = DESIGN.height - 100;
                const crBtnY = crPanelY + crPanelH - 65;
                const crBtnH = 44;

                if (crHasNext) {
                    // 3 buttons: Retry(70), Next(130), Levels(70), gap=8
                    const smW = 70, bgW = 130, gap = 8;
                    const totalW = smW * 2 + bgW + gap * 2;
                    const startX = DESIGN.width / 2 - totalW / 2;
                    // Retry
                    if (x >= startX && x < startX + smW && y >= crBtnY && y < crBtnY + crBtnH) {
                        audio.play('click');
                        gameState.startCampaignLevel(crLevelNum);
                        return;
                    }
                    // Next Level
                    const nextX = startX + smW + gap;
                    if (x >= nextX && x < nextX + bgW && y >= crBtnY && y < crBtnY + crBtnH) {
                        audio.play('click');
                        gameState.startCampaignLevel(crLevelNum + 1);
                        return;
                    }
                    // Levels
                    const levX = nextX + bgW + gap;
                    if (x >= levX && x < levX + smW && y >= crBtnY && y < crBtnY + crBtnH) {
                        audio.play('click');
                        gameState.screen = 'levels';
                        levelSelectScrollY = 0;
                        return;
                    }
                } else {
                    // 2 buttons: Retry(120), Levels(120), gap=16
                    const bW = 120, gap = 16;
                    const startX = DESIGN.width / 2 - (bW * 2 + gap) / 2;
                    // Retry
                    if (x >= startX && x < startX + bW && y >= crBtnY && y < crBtnY + crBtnH) {
                        audio.play('click');
                        gameState.startCampaignLevel(crLevelNum);
                        return;
                    }
                    // Levels
                    const levX = startX + bW + gap;
                    if (x >= levX && x < levX + bW && y >= crBtnY && y < crBtnY + crBtnH) {
                        audio.play('click');
                        gameState.screen = 'levels';
                        levelSelectScrollY = 0;
                        return;
                    }
                }
            } else if (gameState.screen === 'phase_complete') {
                // Phase complete screen buttons
                const isLastPhase = gameState.currentPhase === PHASES.length - 1;
                const pcPanelY = 60;
                const pcPanelH = DESIGN.height - 120;
                const pcBtnY = pcPanelY + pcPanelH - 65;
                const pcBtnH = 48;

                if (isLastPhase) {
                    // Single MENU button
                    const pcBtnW = 180;
                    const pcBtnX = DESIGN.width / 2 - pcBtnW / 2;
                    if (x >= pcBtnX && x < pcBtnX + pcBtnW && y >= pcBtnY && y < pcBtnY + pcBtnH) {
                        audio.play('click');
                        gameState.screen = 'menu';
                        return;
                    }
                } else {
                    // NEXT PHASE + MENU buttons
                    const pcBtnW = 130;
                    const pcBtnGap = 16;
                    const pcTotalW = pcBtnW * 2 + pcBtnGap;
                    const pcBtnStartX = DESIGN.width / 2 - pcTotalW / 2;

                    // Next Phase button
                    if (x >= pcBtnStartX && x < pcBtnStartX + pcBtnW && y >= pcBtnY && y < pcBtnY + pcBtnH) {
                        audio.play('click');
                        const nextPhaseIdx = gameState.currentPhase + 1;
                        if (nextPhaseIdx < PHASES.length) {
                            gameState.startGame(PHASES[nextPhaseIdx].difficulty);
                        }
                        return;
                    }
                    // Menu button
                    if (x >= pcBtnStartX + pcBtnW + pcBtnGap && x < pcBtnStartX + pcTotalW && y >= pcBtnY && y < pcBtnY + pcBtnH) {
                        audio.play('click');
                        gameState.screen = 'menu';
                        return;
                    }
                }
            }
        }

        // Click handler (desktop) — calls unified _handleTap
        canvas.addEventListener('click', (e) => {
            const { x, y } = screenToGame(e.clientX, e.clientY);
            _handleTap(x, y);
        });

        // Touch handler (mobile) — calls unified _handleTap + swipe init
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length !== 1) return;
            const touch = e.touches[0];
            const { x, y } = screenToGame(touch.clientX, touch.clientY);

            _handleTap(x, y);

            // Start swipe tracking for batting (game screen only)
            if (gameState.screen === 'game' && !gameState.paused && gameState.tutorialStep === null) {
                // Don't start swipe on pause button, power-up bar, or surge button
                const pcx = DESIGN.width / 2, pcy = 22, pr = 22;
                if ((x - pcx) * (x - pcx) + (y - pcy) * (y - pcy) <= pr * pr) { /* pause btn */ }
                else {
                    swipeState.active = true;
                    swipeState.startX = x;
                    swipeState.startY = y;
                    swipeState.curX = x;
                    swipeState.curY = y;
                    swipeState.trailPoints = [{ x, y, t: Date.now() }];
                    swipeState.swipeTime = Date.now();
                    swipeState.direction = null;
                }
            }

            if (false) {
                const tNavBtnY = 243, tNavBtnH = 34;
                const tNavBtnW = (DESIGN.width - 50) / 2;
                if (x >= 20 && x <= 20 + tNavBtnW && y >= tNavBtnY && y <= tNavBtnY + tNavBtnH) {
                    audio.play('click'); gameState.screen = 'stats'; return;
                }
                if (x >= 30 + tNavBtnW && x <= 30 + tNavBtnW * 2 && y >= tNavBtnY && y <= tNavBtnY + tNavBtnH) {
                    audio.play('click'); gameState.screen = 'achievements'; achievementScrollY = 0; return;
                }

                const difficulties = ['easy', 'medium', 'hard', 'legend'];
                const mStartX = 20;
                const mStartY = 262;
                const mBtnW = (DESIGN.width - 50) / 2;
                const mBtnH = 60;
                const mBtnSpacing = 12;

                for (let i = 0; i < 4; i++) {
                    const row = Math.floor(i / 2);
                    const col = i % 2;
                    const bx = mStartX + col * (mBtnW + mBtnSpacing);
                    const by = mStartY + row * (mBtnH + mBtnSpacing);
                    if (x >= bx && x < bx + mBtnW && y >= by && y < by + mBtnH) {
                        if (!gameState.phasesUnlocked[i]) return;
                        audio.play('click');
                        gameState.startGame(difficulties[i]);
                        return;
                    }
                }

                const mPlayY = mStartY + 2 * (mBtnH + mBtnSpacing) + 12;
                const mPlayW = 180;
                const mPlayX = DESIGN.width / 2 - mPlayW / 2;
                if (x >= mPlayX && x < mPlayX + mPlayW && y >= mPlayY && y < mPlayY + 50) {
                    audio.play('click');
                    let highestUnlocked = 0;
                    for (let i = PHASES.length - 1; i >= 0; i--) {
                        if (gameState.phasesUnlocked[i]) { highestUnlocked = i; break; }
                    }
                    gameState.startGame(PHASES[highestUnlocked].difficulty);
                    return;
                }

                // Campaign/Levels button (touch)
                const tCampaignY = mPlayY + 50 + 15;
                const tCampaignW = 65;
                const tCampaignX = DESIGN.width / 2 + 8;
                if (x >= tCampaignX && x < tCampaignX + tCampaignW && y >= tCampaignY && y < tCampaignY + 40) {
                    audio.play('click');
                    gameState.screen = 'levels';
                    levelSelectScrollY = 0;
                    return;
                }

                // Shop button (touch)
                const mShopY = mPlayY + 50 + 15;
                const mShopW = 65;
                const mShopX = DESIGN.width / 2 - mShopW - 8;
                if (x >= mShopX && x < mShopX + mShopW && y >= mShopY && y < mShopY + 40) {
                    audio.play('click');
                    gameState.screen = 'shop';
                    shopScrollY = 0;
                    return;
                }

                // Mute toggle (top-right corner)
                const tMuteX = DESIGN.width - 50;
                const tMuteY = 15;
                if (x >= tMuteX - 18 && x <= tMuteX + 18 && y >= tMuteY - 18 && y <= tMuteY + 18) {
                    audio.muted = !audio.muted;
                    gameState.saveToStorage();
                    return;
                }

            } else if (gameState.screen === 'achievements') {
                if (x >= 10 && x <= 54 && y >= 14 && y <= 58) {
                    audio.play('click'); gameState.screen = 'menu'; return;
                }
            } else if (gameState.screen === 'stats') {
                if (x >= 10 && x <= 54 && y >= 14 && y <= 58) {
                    audio.play('click'); gameState.screen = 'menu'; return;
                }
            } else if (gameState.screen === 'shop') {
                // === SHOP SCREEN TOUCHES (mirrors click handler) ===
                const tSHeaderY = 35;
                const tSBackX = 15;
                const tSBackY = tSHeaderY - 16;
                const tSBackS = 32;
                if (x >= tSBackX && x < tSBackX + tSBackS && y >= tSBackY && y < tSBackY + tSBackS) {
                    audio.play('click');
                    gameState.screen = 'menu';
                    return;
                }

                const tSTabY = tSHeaderY + 28;
                const tSTabGap = 6;
                const tSTabW = (DESIGN.width - 40 - tSTabGap * 3) / 4;
                const tSTabH = 34;
                const tSTabs = [
                    { key: 'balls', x: 20 },
                    { key: 'stadiums', x: 20 + tSTabW + tSTabGap },
                    { key: 'powerups', x: 20 + 2 * (tSTabW + tSTabGap) },
                    { key: 'store', x: 20 + 3 * (tSTabW + tSTabGap) },
                ];
                for (const st of tSTabs) {
                    if (x >= st.x && x < st.x + tSTabW && y >= tSTabY && y < tSTabY + tSTabH) {
                        audio.play('click');
                        gameState.shopTab = st.key;
                        shopScrollY = 0;
                        return;
                    }
                }

                const tSLvlBarY = tSTabY + tSTabH + 10;
                const tSContentY = tSLvlBarY + 28;

                if (gameState.shopTab === 'store') {
                    const tSPkH = 70;
                    const tSPkGap = 10;
                    const tSPkW = DESIGN.width - 40;
                    for (let i = 0; i < COIN_PACKS.length; i++) {
                        const py = tSContentY + 35 + i * (tSPkH + tSPkGap) + shopScrollY;
                        const tSBtnX = tSPkW - 60;
                        const tSBtnY = py + 15;
                        if (x >= tSBtnX && x < tSBtnX + 70 && y >= tSBtnY && y < tSBtnY + 40) {
                            audio.play('click');
                            if (window.NativePurchase) {
                                window.NativePurchase.buy(COIN_PACKS[i].id);
                            } else {
                                // Web fallback — simulate purchase
                                gameState.addCoins(COIN_PACKS[i].coins);
                                gameState.saveToStorage();
                                console.log('[IAP-SIM] Simulated: ' + COIN_PACKS[i].price);
                            }
                            return;
                        }
                    }

                    // Restore Purchases tap
                    if (window._crickbot_restoreBtnY) {
                        const rpW = 180, rpH = 34;
                        const rpX = DESIGN.width / 2 - rpW / 2;
                        const rpY = window._crickbot_restoreBtnY;
                        if (x >= rpX && x <= rpX + rpW && y >= rpY && y <= rpY + rpH) {
                            audio.play('click');
                            gameState.restorePurchases();
                        }
                    }
                    // Privacy Policy tap
                    if (window._crickbot_privacyY) {
                        const ppY = window._crickbot_privacyY;
                        if (y >= ppY && y <= ppY + 20 && x > DESIGN.width / 2 - 60 && x < DESIGN.width / 2 + 60) {
                            window.open('https://exafabs.ai/privacy-policy/', '_blank');
                        }
                    }
                } else if (gameState.shopTab === 'powerups') {
                    // === POWER-UPS TAB TAPS ===
                    if (_shopPowerUpButtons && _shopPowerUpButtons.length > 0) {
                        for (let i = 0; i < _shopPowerUpButtons.length; i++) {
                            const btn = _shopPowerUpButtons[i];
                            if (x >= btn.x && x < btn.x + btn.w && y >= btn.y && y < btn.y + btn.h) {
                                // Check if user has enough coins
                                if (gameState.coins >= btn.cost) {
                                    audio.play('click');
                                    gameState.addCoins(-btn.cost);
                                    gameState.powerUps[btn.puId]++;
                                    gameState.saveToStorage();
                                    console.log('[POWERUP] Purchased ' + btn.puId + ' for ' + btn.cost + ' coins');
                                } else {
                                    audio.play('error');
                                }
                                return;
                            }
                        }
                    }
                } else {
                    const tSItemH = 80;
                    const tSItemGap = 10;
                    const tSItemW = DESIGN.width - 40;
                    let items = [];
                    if (gameState.shopTab === 'balls') {
                        items = Object.keys(BALL_SKINS).map(k => ({ id: k, data: BALL_SKINS[k], category: 'balls' }));
                    } else {
                        items = Object.keys(THEMES).map(k => ({ id: k, data: THEMES[k], category: 'stadiums' }));
                    }
                    for (let i = 0; i < items.length; i++) {
                        const item = items[i];
                        const iy = tSContentY + 5 + i * (tSItemH + tSItemGap) + shopScrollY;
                        if (y >= iy && y < iy + tSItemH && x >= 20 && x < 20 + tSItemW) {
                            const isLocked = item.data.level > gameState.level;
                            const isUnlocked = item.category === 'balls'
                                ? gameState.unlockedBalls.includes(item.id)
                                : gameState.unlockedThemes.includes(item.id);
                            const isEquipped = item.category === 'balls'
                                ? gameState.equippedBall === item.id
                                : gameState.equippedTheme === item.id;
                            if (isEquipped) return;
                            audio.play('click');
                            if (isUnlocked) {
                                if (item.category === 'balls') gameState.equippedBall = item.id;
                                else gameState.equippedTheme = item.id;
                                gameState.saveToStorage();
                            } else {
                                // BUY — works for locked and unlocked-level items
                                gameState.purchaseItem(item.category, item.id);
                            }
                            return;
                        }
                    }
                }

            } else if (gameState.screen === 'levels') {
                // === LEVELS SCREEN TOUCHES (mirrors click handler) ===
                // Back button
                if (x >= 15 && x <= 47 && y >= 15 && y <= 47) {
                    audio.play('click'); gameState.screen = 'menu'; return;
                }
                // Level grid taps (must match drawLevelSelectScreen dimensions)
                const tLCellSize = 68;
                const tLCellSpacing = 6;
                const tLCols = 5;
                const tLTotalW = tLCols * tLCellSize + (tLCols - 1) * tLCellSpacing;
                const tLGridStartX = (DESIGN.width - tLTotalW) / 2;
                const tLGridStartY = 90;
                for (let i = 0; i < CRICKET_LEVELS.length; i++) {
                    const level = CRICKET_LEVELS[i];
                    const col = i % tLCols;
                    const row = Math.floor(i / tLCols);
                    const cellX = tLGridStartX + col * (tLCellSize + tLCellSpacing);
                    const cellY = tLGridStartY + row * (tLCellSize + tLCellSpacing) - levelSelectScrollY;
                    if (x >= cellX && x < cellX + tLCellSize && y >= cellY && y < cellY + tLCellSize) {
                        if (level.level <= gameState.campaignLevel) {
                            audio.play('click');
                            gameState.startCampaignLevel(level.level);
                            return;
                        }
                    }
                }

            } else if (gameState.screen === 'game') {
                // Tutorial: tap advances step (touch)
                if (gameState.tutorialStep !== null) {
                    gameState.tutorialStep++;
                    if (gameState.tutorialStep >= TUTORIAL_STEPS) {
                        gameState.tutorialStep = null;
                        gameState.hasSeenTutorial = true;
                        gameState.saveToStorage();
                    }
                    return;
                }
                // === PAUSE BUTTON & OVERLAY HANDLING (TOUCH) ===
                const pauseBtnCx = 18, pauseBtnCy = 22, pauseBtnR = 22;

                // Pause overlay buttons (if paused)
                if (gameState.paused) {
                    const tPanelW = 240;
                    const tPanelH = 200;
                    const tPanelX = DESIGN.width / 2 - tPanelW / 2;
                    const tPanelY = DESIGN.height / 2 - tPanelH / 2;

                    // Resume button
                    const tBtnW = 160;
                    const tBtnH = 44;
                    const tResumeY = tPanelY + 75;
                    const tResumeX = DESIGN.width / 2 - tBtnW / 2;
                    if (x >= tResumeX && x < tResumeX + tBtnW && y >= tResumeY && y < tResumeY + tBtnH) {
                        gameState.paused = false;
                        audio.play('click');
                        return;
                    }

                    // Quit button
                    const tQuitY = tResumeY + tBtnH + 15;
                    if (x >= tResumeX && x < tResumeX + tBtnW && y >= tQuitY && y < tQuitY + tBtnH) {
                        audio.play('click');
                        gameState.screen = 'menu';
                        gameState.paused = false;
                        return;
                    }
                    // Clicking overlay outside buttons does nothing
                    return;
                }

                // Pause button (circular, top-left, touch)
                {
                    const pdx = x - pauseBtnCx, pdy = y - pauseBtnCy;
                    if (pdx * pdx + pdy * pdy <= pauseBtnR * pauseBtnR) {
                        gameState.paused = true;
                        audio.play('click');
                        return;
                    }
                }

                // Power shot icon tap (left side, single icon, touch)
                {
                    const psIconX = 12, psIconY = DESIGN.height / 2 - 20, psIconS = 48;
                    if (x >= psIconX && x <= psIconX + psIconS && y >= psIconY && y <= psIconY + psIconS) {
                        if (!gameState.activePowerShot && gameState.powerShotCooldown <= 0) {
                            for (let t = POWER_SHOTS.length - 1; t >= 0; t--) {
                                if (gameState.surgeProgress >= POWER_SHOTS[t].threshold * 0.95) {
                                    gameState.activePowerShot = POWER_SHOTS[t];
                                    gameState.powerShotTimer = 240;
                                    audio.play('surge');
                                    Utils.haptic(80 + t * 30);
                                    camera.triggerShake(4 + t * 2);
                                    break;
                                }
                            }
                        }
                        return;
                    }
                }

                // Slim surge bar tap (right edge, touch)
                {
                    const barX = DESIGN.width - 18, barY = 80, barH = 220, margin = 20;
                    if (x >= barX - margin && x <= barX + 10 + margin && y >= barY && y <= barY + barH) {
                        if (!gameState.activePowerShot && gameState.powerShotCooldown <= 0) {
                            for (let t = POWER_SHOTS.length - 1; t >= 0; t--) {
                                if (gameState.surgeProgress >= POWER_SHOTS[t].threshold * 0.95) {
                                    gameState.activePowerShot = POWER_SHOTS[t];
                                    gameState.powerShotTimer = 240;
                                    audio.play('surge');
                                    Utils.haptic(80 + t * 30);
                                    camera.triggerShake(4 + t * 2);
                                    break;
                                }
                            }
                        }
                        return;
                    }
                }
                // Guard: don't start swipe if paused or in tutorial
                if (gameState.paused || gameState.tutorialStep !== null) return;
                // Record swipe start for batting (touch)
                swipeState.active = true;
                swipeState.startX = x;
                swipeState.startY = y;
                swipeState.curX = x;
                swipeState.curY = y;
                swipeState.trailPoints = [{ x, y, t: Date.now() }];
                swipeState.swipeTime = Date.now();
                swipeState.direction = null;
            } else if (gameState.screen === 'gameover') {
                // Continue button tap
                if (window._goContButtonX !== undefined) {
                    if (x >= window._goContButtonX && x < window._goContButtonX + window._goContButtonW &&
                        y >= window._goContButtonY && y < window._goContButtonY + window._goContButtonH) {
                        const cost = window._goContButtonCost;
                        if (gameState.coins >= cost) {
                            audio.play('click');
                            gameState.addCoins(-cost);
                            // Increment continue cost for next time
                            gameState._continueCostMultiplier++;
                            // Restore 3 wickets and resume game
                            gameState.wickets = Math.max(0, gameState.wickets - 3);
                            // Reset critical flags so game loop works again
                            gameState.gameOverProcessed = false;
                            gameState.screen = 'game';
                            // Clear any stale balls from the field
                            gameState.balls = [];
                            // Reset result text so it doesn't linger
                            gameState.resultText = '';
                            gameState.resultTextTime = 0;
                            // Clear any active power shot state
                            gameState.activePowerShot = null;
                            gameState.powerShotTimer = 0;
                            gameState.saveToStorage();
                            // Bowl a new delivery after a short delay
                            setTimeout(() => gameState.bowlNextBall(), 600);
                            console.log('[CONTINUE] Used continue, cost: ' + cost + ', wickets: ' + gameState.wickets);
                            return;
                        } else {
                            audio.play('error');
                            return;
                        }
                    }
                }

                const goPanelY = 80;
                const goPanelH = DESIGN.height - 160;
                const goBtnY = goPanelY + goPanelH - 60;
                const goBtnW = 110;
                const goBtnH = 44;
                const goBtnGap = 20;
                const goTotalW = goBtnW * 2 + goBtnGap;
                const goBtnStartX = DESIGN.width / 2 - goTotalW / 2;

                if (x >= goBtnStartX && x < goBtnStartX + goBtnW && y >= goBtnY && y < goBtnY + goBtnH) {
                    audio.play('click');
                    gameState._continueCostMultiplier = 0; // Reset continue cost for new game
                    gameState.startGame(gameState.difficulty);
                    return;
                }
                if (x >= goBtnStartX + goBtnW + goBtnGap && x < goBtnStartX + goTotalW && y >= goBtnY && y < goBtnY + goBtnH) {
                    audio.play('click');
                    gameState._continueCostMultiplier = 0; // Reset continue cost when going to menu
                    gameState.screen = 'menu';
                    return;
                }
            } else if (gameState.screen === 'campaign_result') {
                // Campaign result (touch) — mirrors click handler
                const crLevelNum = gameState.currentCampaignLevel;
                const crWon = gameState.score >= gameState.target;
                const crHasNext = crWon && crLevelNum < 100;
                const crPanelY = 50, crPanelH = DESIGN.height - 100;
                const crBtnY = crPanelY + crPanelH - 65;
                const crBtnH = 44;

                if (crHasNext) {
                    const smW = 70, bgW = 130, gap = 8;
                    const totalW = smW * 2 + bgW + gap * 2;
                    const startX = DESIGN.width / 2 - totalW / 2;
                    if (x >= startX && x < startX + smW && y >= crBtnY && y < crBtnY + crBtnH) {
                        audio.play('click'); gameState.startCampaignLevel(crLevelNum); return;
                    }
                    const nextX = startX + smW + gap;
                    if (x >= nextX && x < nextX + bgW && y >= crBtnY && y < crBtnY + crBtnH) {
                        audio.play('click'); gameState.startCampaignLevel(crLevelNum + 1); return;
                    }
                    const levX = nextX + bgW + gap;
                    if (x >= levX && x < levX + smW && y >= crBtnY && y < crBtnY + crBtnH) {
                        audio.play('click'); gameState.screen = 'levels'; levelSelectScrollY = 0; return;
                    }
                } else {
                    const bW = 120, gap = 16;
                    const startX = DESIGN.width / 2 - (bW * 2 + gap) / 2;
                    if (x >= startX && x < startX + bW && y >= crBtnY && y < crBtnY + crBtnH) {
                        audio.play('click'); gameState.startCampaignLevel(crLevelNum); return;
                    }
                    const levX = startX + bW + gap;
                    if (x >= levX && x < levX + bW && y >= crBtnY && y < crBtnY + crBtnH) {
                        audio.play('click'); gameState.screen = 'levels'; levelSelectScrollY = 0; return;
                    }
                }
            } else if (gameState.screen === 'phase_complete') {
                const isLastPhase = gameState.currentPhase === PHASES.length - 1;
                const pcPanelY = 60;
                const pcPanelH = DESIGN.height - 120;
                const pcBtnY = pcPanelY + pcPanelH - 65;
                const pcBtnH = 48;

                if (isLastPhase) {
                    const pcBtnW = 180;
                    const pcBtnX = DESIGN.width / 2 - pcBtnW / 2;
                    if (x >= pcBtnX && x < pcBtnX + pcBtnW && y >= pcBtnY && y < pcBtnY + pcBtnH) {
                        audio.play('click');
                        gameState.screen = 'menu';
                        return;
                    }
                } else {
                    const pcBtnW = 130;
                    const pcBtnGap = 16;
                    const pcTotalW = pcBtnW * 2 + pcBtnGap;
                    const pcBtnStartX = DESIGN.width / 2 - pcTotalW / 2;

                    if (x >= pcBtnStartX && x < pcBtnStartX + pcBtnW && y >= pcBtnY && y < pcBtnY + pcBtnH) {
                        audio.play('click');
                        const nextPhaseIdx = gameState.currentPhase + 1;
                        if (nextPhaseIdx < PHASES.length) {
                            gameState.startGame(PHASES[nextPhaseIdx].difficulty);
                        }
                        return;
                    }
                    if (x >= pcBtnStartX + pcBtnW + pcBtnGap && x < pcBtnStartX + pcTotalW && y >= pcBtnY && y < pcBtnY + pcBtnH) {
                        audio.play('click');
                        gameState.screen = 'menu';
                        return;
                    }
                }

            // ── VIP Popup (highest priority, blocks other taps) ──
            } else if (_showVIPPopup) {
                if (window._vipBuyBtn) {
                    const btn = window._vipBuyBtn;
                    if (x >= btn.x && x < btn.x + btn.w && y >= btn.y && y < btn.y + btn.h) {
                        if (window.NativePurchase) {
                            window.NativePurchase.buy('vip_yearly');
                        } else {
                            gameState.isVIP = true;
                            gameState.saveToStorage();
                            audio.play('click');
                        }
                        _showVIPPopup = false;
                        return;
                    }
                }
                if (window._vipCloseBtn) {
                    const btn = window._vipCloseBtn;
                    if (x >= btn.x && x < btn.x + btn.w && y >= btn.y && y < btn.y + btn.h) {
                        _showVIPPopup = false; audio.play('click'); return;
                    }
                }
                if (window._vipDismissBtn) {
                    const btn = window._vipDismissBtn;
                    if (x >= btn.x && x < btn.x + btn.w && y >= btn.y && y < btn.y + btn.h) {
                        _showVIPPopup = false; audio.play('click'); return;
                    }
                }
                return; // Block all other taps while popup is showing

            // ── Settings Screen ──
            } else if (gameState.screen === 'settings') {
                handleSettingsTap(x, y);
                return;

            // ── Leaderboard Screen ──
            } else if (gameState.screen === 'leaderboard') {
                if (x >= 10 && x <= 56 && y >= 17 && y <= 63) {
                    audio.play('click'); gameState.screen = 'menu'; return;
                }

            // ── Multiplayer Lobby ──
            } else if (gameState.screen === 'mp_lobby') {
                const W = DESIGN.width;
                const H = DESIGN.height;

                // Difficulty selector buttons
                if (!_mpSearching) {
                    const diffY = 90;
                    const diffBtnW = 62;
                    const diffGap = 6;
                    const diffKeys = ['easy', 'medium', 'hard', 'legend'];
                    const diffTotalW = diffKeys.length * diffBtnW + (diffKeys.length - 1) * diffGap;
                    const diffStartX = W / 2 - diffTotalW / 2;
                    const diffBtnY = diffY + 12;
                    const diffBtnH = 30;
                    for (let di = 0; di < diffKeys.length; di++) {
                        const dx = diffStartX + di * (diffBtnW + diffGap);
                        if (x >= dx && x < dx + diffBtnW && y >= diffBtnY && y < diffBtnY + diffBtnH) {
                            audio.play('click'); _mpSelectedDifficulty = diffKeys[di]; return;
                        }
                    }
                }

                const btnY = _mpSearching ? 310 : 260;
                const btnW = 200;
                const btnX = W / 2 - btnW / 2;

                // Find Match / Cancel button
                if (x >= btnX && x < btnX + btnW && y >= btnY && y < btnY + 50) {
                    audio.play('click');
                    if (_mpSearching) {
                        _mpSearching = false;
                        _mpSearchStartTime = 0;
                        if (_mpQueueCheckInterval) { clearInterval(_mpQueueCheckInterval); _mpQueueCheckInterval = null; }
                        if (_mpBotTimeoutId) { clearTimeout(_mpBotTimeoutId); _mpBotTimeoutId = null; }
                        window._convexClient.leaveQueue('Alpit').catch(() => {});
                    } else {
                        _mpSearching = true;
                        _mpSearchStartTime = Date.now();
                        _mpIsBotMatch = false;
                        window._convexClient.leaveQueue('Alpit').catch(() => {});
                        _mpBotTimeoutId = setTimeout(() => {
                            if (!_mpSearching) return;
                            _mpSearching = false;
                            if (_mpQueueCheckInterval) { clearInterval(_mpQueueCheckInterval); _mpQueueCheckInterval = null; }
                            window._convexClient.leaveQueue('Alpit').catch(() => {});
                            _mpBotTimeoutId = null;
                            _mpIsBotMatch = true;
                            const botRoom = _mpSimulateBotInnings(_mpSelectedDifficulty);
                            _mpWaitingRoomData = botRoom;
                            _mpWaitingForOpponent = false;
                            gameState.screen = 'mp_waiting';
                            audio.play('click');
                        }, _MP_BOT_TIMEOUT_MS);
                        window._convexClient.joinMatchmaking('Alpit', _mpSelectedDifficulty).then(result => {
                            if (result.status === 'matched') {
                                _mpSearching = false; _mpSearchStartTime = 0;
                                if (_mpBotTimeoutId) { clearTimeout(_mpBotTimeoutId); _mpBotTimeoutId = null; }
                                _mpIsBotMatch = false;
                                window._convexClient.getRoom(result.roomId).then(room => {
                                    _mpWaitingRoomData = room; _mpWaitingForOpponent = false;
                                    gameState.screen = 'mp_waiting';
                                });
                            } else {
                                _mpQueueCheckInterval = setInterval(() => {
                                    window._convexClient.checkQueue('Alpit').then(qResult => {
                                        if (qResult.status === 'matched') {
                                            clearInterval(_mpQueueCheckInterval); _mpQueueCheckInterval = null;
                                            _mpSearching = false; _mpSearchStartTime = 0;
                                            if (_mpBotTimeoutId) { clearTimeout(_mpBotTimeoutId); _mpBotTimeoutId = null; }
                                            _mpIsBotMatch = false;
                                            window._convexClient.getRoom(qResult.roomId).then(room => {
                                                _mpWaitingRoomData = room; _mpWaitingForOpponent = false;
                                                gameState.screen = 'mp_waiting';
                                            });
                                        }
                                    });
                                }, 2000);
                            }
                        }).catch(e => { console.warn('[MP] Online matchmaking failed:', e.message); });
                    }
                    return;
                }

                // Create Room / Join Room buttons
                if (!_mpSearching) {
                    const friendY = btnY + 65;
                    const crBtnY = friendY + 32;
                    const crBtnW = 130;
                    const crBtnGap = 10;
                    const crBtnX1 = W / 2 - crBtnW - crBtnGap / 2;
                    const crBtnX2 = W / 2 + crBtnGap / 2;
                    const crBtnH = 42;

                    if (x >= crBtnX1 && x < crBtnX1 + crBtnW && y >= crBtnY && y < crBtnY + crBtnH) {
                        audio.play('click');
                        window._convexClient.createPrivateRoom('Alpit', _mpSelectedDifficulty).then(result => {
                            _mpPrivateRoomId = result.roomId;
                            _mpPrivateRoomCode = result.roomCode;
                            gameState.screen = 'mp_create_room';
                            _mpPrivatePolling = setInterval(() => {
                                window._convexClient.checkPrivateRoom(_mpPrivateRoomId).then(check => {
                                    if (check.status === 'ready') {
                                        clearInterval(_mpPrivatePolling); _mpPrivatePolling = null;
                                        _mpWaitingRoomData = check.room; _mpWaitingForOpponent = false;
                                        _mpIsBotMatch = false; gameState.screen = 'mp_waiting'; audio.play('click');
                                    }
                                });
                            }, 2000);
                        }).catch(e => { console.warn('[MP] Create room failed:', e.message); });
                        return;
                    }

                    if (x >= crBtnX2 && x < crBtnX2 + crBtnW && y >= crBtnY && y < crBtnY + crBtnH) {
                        audio.play('click');
                        _mpJoinCode = ['', '', '', ''];
                        _mpJoinCodeIdx = 0;
                        _mpJoinError = '';
                        _mpJoinSuccess = false;
                        gameState.screen = 'mp_join_room';
                        return;
                    }
                }

                // Back button
                const backY = H - 60;
                if (x >= W / 2 - 50 && x < W / 2 + 50 && y >= backY && y < backY + 35) {
                    audio.play('click');
                    _mpSearching = false; _mpSearchStartTime = 0;
                    if (_mpQueueCheckInterval) { clearInterval(_mpQueueCheckInterval); _mpQueueCheckInterval = null; }
                    if (_mpBotTimeoutId) { clearTimeout(_mpBotTimeoutId); _mpBotTimeoutId = null; }
                    window._convexClient.leaveQueue('Alpit').catch(() => {});
                    gameState.screen = 'menu';
                    return;
                }

            // ── Create Room Screen ──
            } else if (gameState.screen === 'mp_create_room') {
                const W = DESIGN.width;
                const H = DESIGN.height;
                const cancelY = H - 65;
                if (x >= W / 2 - 70 && x < W / 2 + 70 && y >= cancelY && y < cancelY + 38) {
                    audio.play('click');
                    if (_mpPrivatePolling) { clearInterval(_mpPrivatePolling); _mpPrivatePolling = null; }
                    _mpPrivateRoomId = null; _mpPrivateRoomCode = '';
                    gameState.screen = 'mp_lobby';
                    return;
                }

            // ── Join Room Screen ──
            } else if (gameState.screen === 'mp_join_room') {
                const W = DESIGN.width;
                const H = DESIGN.height;

                // Keyboard
                const kbY = 190;
                const kbRows = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM', '1234567890'];
                const kbKeyH = 34;
                const kbGap = 4;

                let keyHit = false;
                for (let row = 0; row < kbRows.length && !keyHit; row++) {
                    const keys = kbRows[row].split('');
                    const kbKeyW = Math.min(26, (W - 20 - (keys.length - 1) * kbGap) / keys.length);
                    const rowW = keys.length * kbKeyW + (keys.length - 1) * kbGap;
                    const rowX = W / 2 - rowW / 2;
                    const rowY = kbY + row * (kbKeyH + kbGap);
                    for (let ki = 0; ki < keys.length; ki++) {
                        const kx = rowX + ki * (kbKeyW + kbGap);
                        if (x >= kx && x < kx + kbKeyW && y >= rowY && y < rowY + kbKeyH) {
                            audio.play('click');
                            if (_mpJoinCodeIdx < 4) {
                                _mpJoinCode[_mpJoinCodeIdx] = keys[ki];
                                _mpJoinCodeIdx = Math.min(3, _mpJoinCodeIdx + 1);
                                while (_mpJoinCodeIdx < 3 && _mpJoinCode[_mpJoinCodeIdx] !== '') _mpJoinCodeIdx++;
                            }
                            _mpJoinError = ''; keyHit = true; break;
                        }
                    }
                }

                // Backspace + Join buttons
                const actionY = kbY + 4 * (kbKeyH + kbGap) + 8;
                if (x >= W / 2 - 130 && x < W / 2 - 50 && y >= actionY && y < actionY + 38) {
                    audio.play('click');
                    if (_mpJoinCode[_mpJoinCodeIdx] !== '') {
                        _mpJoinCode[_mpJoinCodeIdx] = '';
                    } else if (_mpJoinCodeIdx > 0) {
                        _mpJoinCodeIdx--;
                        _mpJoinCode[_mpJoinCodeIdx] = '';
                    }
                    _mpJoinError = ''; return;
                }

                const allFilled = _mpJoinCode.every(c => c !== '');
                if (allFilled && x >= W / 2 + 10 && x < W / 2 + 130 && y >= actionY && y < actionY + 38) {
                    audio.play('click');
                    const code = _mpJoinCode.join('');
                    _mpJoinError = '';
                    window._convexClient.joinPrivateRoom(code, 'Alpit').then(result => {
                        if (result.success) {
                            _mpJoinSuccess = true; _mpIsBotMatch = false;
                            _mpWaitingRoomData = result.room; _mpWaitingForOpponent = false;
                            setTimeout(() => { gameState.screen = 'mp_waiting'; }, 800);
                        } else { _mpJoinError = result.reason || 'Room not found'; }
                    }).catch(e => { _mpJoinError = 'Connection failed'; });
                    return;
                }

                // Tap on code boxes
                const inputY = 100;
                const boxW = 44, boxH = 56, boxGap = 12;
                const totalBoxW = 4 * boxW + 3 * boxGap;
                const boxStartX = W / 2 - totalBoxW / 2;
                for (let bi = 0; bi < 4; bi++) {
                    const bx = boxStartX + bi * (boxW + boxGap);
                    if (x >= bx && x < bx + boxW && y >= inputY && y < inputY + boxH) {
                        audio.play('click'); _mpJoinCodeIdx = bi; return;
                    }
                }

                // Back button
                const cancelY = H - 55;
                if (x >= W / 2 - 50 && x < W / 2 + 50 && y >= cancelY && y < cancelY + 35) {
                    audio.play('click'); gameState.screen = 'mp_lobby'; return;
                }

            // ── Multiplayer Waiting Screen ──
            } else if (gameState.screen === 'mp_waiting') {
                const W = DESIGN.width;
                const startY = 250;
                const startW = 180;
                const startX = W / 2 - startW / 2;
                if (!_mpWaitingForOpponent && _mpWaitingRoomData &&
                    x >= startX && x < startX + startW && y >= startY && y < startY + 50) {
                    audio.play('click');
                    const room = _mpWaitingRoomData;
                    const role = room.player1Name === 'Alpit' ? 'setter' : 'chaser';
                    gameState.startMultiplayerGame(room, role);
                    return;
                }
            }
        }, { passive: false });

        // ============================================================================
        // SWIPE GESTURE HANDLERS (touch + mouse)
        // ============================================================================

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!swipeState.active || gameState.screen !== 'game') return;
            const touch = e.touches[0];
            const { x, y } = screenToGame(touch.clientX, touch.clientY);
            swipeState.curX = x;
            swipeState.curY = y;
            swipeState.trailPoints.push({ x, y, t: Date.now() });
            // Keep trail to last 15 points
            if (swipeState.trailPoints.length > 15) swipeState.trailPoints.shift();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (!swipeState.active || gameState.screen !== 'game') {
                swipeState.active = false;
                return;
            }
            swipeState.active = false;
            const elapsed = Date.now() - swipeState.swipeTime;

            // Reject swipes that took too long (accidental drags)
            if (elapsed > SWIPE_MAX_TIME) {
                swipeState.direction = null;
                return;
            }

            const dx = swipeState.curX - swipeState.startX;
            const dy = swipeState.curY - swipeState.startY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            // Classify the swipe
            const dir = classifySwipe(dx, dy, dist);
            swipeState.direction = dir;

            // Trigger the swing with direction info
            batsman.swing(dir);
            audio.play('click');

            // Brief flash of the shot label
            swipeState.endX = swipeState.curX;
            swipeState.endY = swipeState.curY;
        }, { passive: false });

        // Mouse swipe support (desktop)
        let _mouseSwipeDown = false;
        let _mouseStartX = 0, _mouseStartY = 0;
        let _mouseSwipeTime = 0;

        canvas.addEventListener('mousedown', (e) => {
            if (gameState.screen !== 'game') return;
            // Don't start swipe if tutorial/paused/UI buttons were handled by click
            if (gameState.tutorialStep !== null || gameState.paused) return;

            const { x, y } = screenToGame(e.clientX, e.clientY);

            // Check if clicking UI elements (pause, power shot, surge bar) — skip swipe
            const pauseR = 16;
            const pdx = x - 18, pdy = y - 22;
            if (pdx * pdx + pdy * pdy <= pauseR * pauseR) return;
            const psIconX = 12, psIconY = DESIGN.height / 2 - 20, psIconS = 48;
            if (x >= psIconX && x <= psIconX + psIconS && y >= psIconY && y <= psIconY + psIconS) return;
            const barX = DESIGN.width - 18, barY = 80, barH = 220, margin = 20;
            if (x >= barX - margin && x <= barX + 10 + margin && y >= barY && y <= barY + barH) return;

            _mouseSwipeDown = true;
            _mouseStartX = x;
            _mouseStartY = y;
            _mouseSwipeTime = Date.now();

            swipeState.active = true;
            swipeState.startX = x;
            swipeState.startY = y;
            swipeState.curX = x;
            swipeState.curY = y;
            swipeState.trailPoints = [{ x, y, t: Date.now() }];
            swipeState.swipeTime = Date.now();
            swipeState.direction = null;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!_mouseSwipeDown || gameState.screen !== 'game') return;
            const { x, y } = screenToGame(e.clientX, e.clientY);
            swipeState.curX = x;
            swipeState.curY = y;
            swipeState.trailPoints.push({ x, y, t: Date.now() });
            if (swipeState.trailPoints.length > 15) swipeState.trailPoints.shift();
        });

        canvas.addEventListener('mouseup', (e) => {
            if (!_mouseSwipeDown || gameState.screen !== 'game') {
                _mouseSwipeDown = false;
                swipeState.active = false;
                return;
            }
            _mouseSwipeDown = false;
            swipeState.active = false;

            const elapsed = Date.now() - _mouseSwipeTime;
            if (elapsed > SWIPE_MAX_TIME) {
                swipeState.direction = null;
                return;
            }

            const { x, y } = screenToGame(e.clientX, e.clientY);
            const dx = x - _mouseStartX;
            const dy = y - _mouseStartY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            const dir = classifySwipe(dx, dy, dist);
            swipeState.direction = dir;

            batsman.swing(dir);
            audio.play('click');

            swipeState.endX = x;
            swipeState.endY = y;
        });

        // Visibility change handler — pause game when app backgrounded (iOS battery save)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && gameState.screen === 'game' && !gameState.paused) {
                gameState.paused = true;
            }
        });

        // Start animation
        animate();

        // ============================================================
        // CONVEX CLOUD BACKEND — ConvexGameClient (HTTP, no SDK needed)
        // Deployment: gallant-kingfisher-867
        // ============================================================
        (function() {
            const CONVEX_URL = 'https://gallant-kingfisher-867.convex.cloud';

            class ConvexGameClient {
                constructor(url) {
                    this._url = url;
                    this._playerId = null;
                    try {
                        const cached = localStorage.getItem('convex_player_id');
                        if (cached) this._playerId = cached;
                    } catch(e) {}
                }
                get playerId() { return this._playerId; }
                get isRegistered() { return this._playerId !== null; }

                async _mutation(path, args) {
                    const res = await fetch(this._url + '/api/mutation', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ path, args }),
                    });
                    if (!res.ok) throw new Error(await res.text());
                    return (await res.json()).value;
                }
                async _query(path, args) {
                    const res = await fetch(this._url + '/api/query', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ path, args: args || {} }),
                    });
                    if (!res.ok) throw new Error(await res.text());
                    return (await res.json()).value;
                }

                async registerPlayer(name) {
                    const id = await this._mutation('players:registerPlayer', { name });
                    this._playerId = id;
                    try { localStorage.setItem('convex_player_id', id); } catch(e) {}
                    return id;
                }
                async getOrRegisterPlayer(name) {
                    // If we have a cached ID, validate it still exists on this deployment
                    if (this._playerId) {
                        try {
                            const player = await this._query('players:getPlayer', { playerId: this._playerId });
                            if (player) return this._playerId; // Valid — use it
                        } catch(e) {
                            // Invalid ID (wrong deployment, deleted, etc.) — clear cache
                            console.warn('[Convex] Cached player ID invalid, re-registering...');
                        }
                        this._playerId = null;
                        try { localStorage.removeItem('convex_player_id'); } catch(e) {}
                    }
                    // Look up by name
                    const existing = await this._query('players:getPlayerByName', { name });
                    if (existing) {
                        this._playerId = existing._id;
                        try { localStorage.setItem('convex_player_id', existing._id); } catch(e) {}
                        return existing._id;
                    }
                    // First time on this deployment — register
                    return this.registerPlayer(name);
                }
                async submitSession(game, score, difficulty, won, stats, duration) {
                    if (!this._playerId) return null;
                    const args = { playerId: this._playerId, game, score, difficulty, won, stats };
                    if (duration != null && Number.isFinite(duration)) args.duration = duration;
                    return this._mutation('sessions:submitGameSession', args);
                }
                async getLeaderboard(game, limit) {
                    return this._query('leaderboard:getLeaderboard', { game, limit: limit || 10 });
                }
                async getPlayerRank(game) {
                    if (!this._playerId) return null;
                    return this._query('leaderboard:getPlayerRank', { playerId: this._playerId, game });
                }
                async syncPlayerStats(payload) {
                    if (!this._playerId) return null;
                    return this._mutation('players:updatePlayerStats', {
                        playerId: this._playerId, ...payload,
                    });
                }
                async unlockAchievement(achievementId, game) {
                    if (!this._playerId) return null;
                    return this._mutation('achievements:unlockAchievement', {
                        playerId: this._playerId, achievementId, game,
                    });
                }
                async syncCampaign(game, currentLevel, totalStars, levelStars) {
                    if (!this._playerId) return null;
                    return this._mutation('campaign:syncCampaign', {
                        playerId: this._playerId, game, currentLevel, totalStars, levelStars,
                    });
                }

                // === MULTIPLAYER CHASE MODE API ===
                async joinMatchmaking(playerName, difficulty) {
                    return this._mutation('multiplayer:joinQueue', { playerName, difficulty: difficulty || 'medium' });
                }
                async checkQueue(playerName) {
                    return this._query('multiplayer:checkQueue', { playerName });
                }
                async leaveQueue(playerName) {
                    return this._mutation('multiplayer:leaveQueue', { playerName });
                }
                async getRoom(roomId) {
                    return this._query('multiplayer:getRoom', { roomId });
                }
                async updateInnings(roomId, innings, data) {
                    return this._mutation('multiplayer:updateInnings', { roomId, innings, ...data });
                }
                async completeInnings1(roomId, data) {
                    return this._mutation('multiplayer:completeInnings1', { roomId, ...data });
                }
                async completeMatch(roomId, data) {
                    return this._mutation('multiplayer:completeMatch', { roomId, ...data });
                }
                async getLiveMatches() {
                    return this._query('multiplayer:getLiveMatches', {});
                }
                async getQueueCount() {
                    return this._query('multiplayer:getQueueCount', {});
                }
                async recordBotMatch(data) {
                    return this._mutation('multiplayer:recordBotMatch', data);
                }
                async createPrivateRoom(playerName, difficulty) {
                    return this._mutation('multiplayer:createPrivateRoom', { playerName, difficulty: difficulty || 'medium' });
                }
                async joinPrivateRoom(roomCode, playerName) {
                    return this._mutation('multiplayer:joinPrivateRoom', { roomCode, playerName });
                }
                async checkPrivateRoom(roomId) {
                    return this._query('multiplayer:checkPrivateRoom', { roomId });
                }
            }

            window._convexClient = new ConvexGameClient(CONVEX_URL);
            window._convexClient.getOrRegisterPlayer('Alpit').then(id => {
                console.log('[Convex] Player ready:', id);
            }).catch(e => {
                console.warn('[Convex] Init failed (offline?):', e.message);
            });
        })();
    </script>
    <script>
        // Register Service Worker for offline PWA support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    </script>
</body>
