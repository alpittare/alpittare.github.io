                                keeper.triggerCelebration();
                                gameState.resultText = 'BOWLED!';
                                gameState.resultTextTime = 80;
                                gameState.surgeProgress = Math.max(0, gameState.surgeProgress - 0.15);
                                commentary.trigger('bowled');
                                crowdSystem.trigger('bowled');
                                umpire.triggerSignal('out');
                                crowdSystem.triggerWicket();
                                AI_BOT.show('playerWicket'); // Bot reacts to wicket
                                AI_BOT.consecutiveBoundaries = 0; // Reset streak on wicket

                                adaptiveAI.recordResult({ hit: false, runs: 0, quality: 'bowled', timing: ball.y });
                                batsmanProfile.record(ball.delivery || {}, { hit: false, runs: 0 });
                                _feedEngineEvent(ball.delivery || {}, { quality: 'bowled', runs: 0 });
                                mlDataStore.record({
                                    event: 'bowled',
                                    difficulty: gameState.difficulty,
                                    delivery: ball.delivery || null,
                                    ballY: ball.y, ballX: ball.x,
                                    quality: 'bowled', runs: 0,
                                    adaptiveBias: adaptiveAI.difficultyBias,
                                    reactionTime: ball.spawnTime ? Date.now() - ball.spawnTime : 0,
                                    over: gameState.oversCompleted,
                                    ballInOver: gameState.ballsInOver,
                                    score: gameState.score, wickets: gameState.wickets,
                                });

                                // Clear free hit after this delivery
                                extrasSystem.isFreeHit = false;

                                if (gameState.wickets >= 3) {
                                    setTimeout(() => _endGame(), 1000);
                                } else {
                                    setTimeout(() => _advanceBall(), 1200);
                                }

                            } else if (hitsStumps && extrasSystem.isFreeHit) {
                                // FREE HIT: stumps hit but batsman can't be out!
                                ball.resultGiven = true;
                                audio.play('click');
                                gameState.resultText = 'FREE HIT SAVE!';
                                gameState.resultTextTime = 60;
                                stumps.triggerScatter();
                                extrasSystem.isFreeHit = false; // consumed

                                adaptiveAI.recordResult({ hit: false, runs: 0, quality: 'freeHitSave', timing: ball.y });
                                batsmanProfile.record(ball.delivery || {}, { hit: false, runs: 0 });
                                _feedEngineEvent(ball.delivery || {}, { quality: 'miss', runs: 0 });

                                setTimeout(() => _advanceBall(), 1000);

                            } else if (ball.y > DESIGN.batsmansCreaseY + 100) {
                                // Ball missed bat AND missed stumps → DOT BALL
                                ball.resultGiven = true;
                                audio.play('click');
                                gameState.resultText = 'DOT';
                                gameState.resultTextTime = 40;
                                gameState._consecutiveDots = (gameState._consecutiveDots || 0) + 1;
                                commentary.trigger('dot');
                                crowdSystem.trigger('dot');
                                crowdSystem.triggerDotBallPressure(gameState._consecutiveDots);

                                adaptiveAI.recordResult({ hit: false, runs: 0, quality: 'dot', timing: ball.y });
                                batsmanProfile.record(ball.delivery || {}, { hit: false, runs: 0 });
                                _feedEngineEvent(ball.delivery || {}, { quality: 'dot', runs: 0 });
                                mlDataStore.record({
                                    event: 'dot',
                                    difficulty: gameState.difficulty,
                                    delivery: ball.delivery || null,
                                    ballY: ball.y, ballX: ball.x,
                                    quality: 'dot', runs: 0,
                                    adaptiveBias: adaptiveAI.difficultyBias,
                                    reactionTime: ball.spawnTime ? Date.now() - ball.spawnTime : 0,
                                    over: gameState.oversCompleted,
                                    ballInOver: gameState.ballsInOver,
                                    score: gameState.score, wickets: gameState.wickets,
                                });

                                // Clear free hit after legal delivery
                                extrasSystem.isFreeHit = false;

                                setTimeout(() => _advanceBall(), 800);
                            }
                        }
                    }

                    // Remove missed/dot ball once off screen
                    if (ball.resultGiven && !ball.hit && ball.y > 950) {
                        gameState.balls.splice(i, 1);
                    }
                }
            }

            // Check if game won (target reached)
            if (gameState.screen === 'game' && gameState.score >= gameState.target) {
                _endGame();
            }

            // === PHASE 1: Update shot feedback animation ===
            shotFeedback.update();

            // Update result text timer
            if (gameState.resultTextTime > 0) {
                gameState.resultTextTime--;
            }

            // Update batsman animation
            batsman.update();

            // Update stumps animation (scatter)
            stumps.update();
        }

        // ============================================================================
        // MENU SCREEN
        // ============================================================================

        // Menu animation state
        let menuAnimPhase = 0;

        function drawMenuScreen() {
            menuAnimPhase += 0.016; // ~60fps

            // === PREMIUM BACKGROUND: Multi-layer with mesh grid and bokeh ===
            const bgGrad = ctx.createLinearGradient(0, 0, 0, DESIGN.height);
            bgGrad.addColorStop(0, '#050810');
            bgGrad.addColorStop(0.4, '#0a1628');
            bgGrad.addColorStop(1, '#0d1a2d');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, DESIGN.width, DESIGN.height);

            // Animated mesh/grid pattern (sports arena floor perspective)
            ctx.save();
            ctx.strokeStyle = 'rgba(0, 229, 255, 0.08)';
            ctx.lineWidth = 0.5;
            const gridSpacing = 40;
            const perspectiveStrength = menuAnimPhase * 0.1;
            for (let x = 0; x <= DESIGN.width; x += gridSpacing) {
                const yShift = Math.sin((menuAnimPhase * 0.15 + x * 0.003)) * 8;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x + Math.cos(menuAnimPhase * 0.08) * 15, DESIGN.height + yShift);
                ctx.stroke();
            }
            for (let y = 0; y <= DESIGN.height; y += gridSpacing) {
                const xShift = Math.cos((menuAnimPhase * 0.12 + y * 0.002)) * 8;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(DESIGN.width + xShift, y + Math.sin(menuAnimPhase * 0.1) * 10);
                ctx.stroke();
            }
            ctx.restore();

            // Large blur orbs (premium bokeh effect)
            const orbs = [
                { x: 0.15, y: 0.2, r: 20, color: '#00e5ff', phase: 0 },
                { x: 0.85, y: 0.3, r: 25, color: '#00ff88', phase: 1.2 },
                { x: 0.1, y: 0.8, r: 18, color: '#cc44ff', phase: 0.5 },
                { x: 0.9, y: 0.7, r: 22, color: '#ffaa00', phase: 1.8 }
            ];
            for (const orb of orbs) {
                const orbX = orb.x * DESIGN.width;
                const orbY = orb.y * DESIGN.height;
                const wobble = Math.sin(menuAnimPhase * 0.05 + orb.phase) * 15;
                ctx.save();
                ctx.shadowColor = orb.color;
                ctx.shadowBlur = 60;
                ctx.globalAlpha = 0.03;
                ctx.fillStyle = orb.color;
                ctx.beginPath();
                ctx.arc(orbX + wobble, orbY, orb.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            // Enhanced animated floating particles (50 total, varying sizes)
            for (let i = 0; i < 50; i++) {
                const px = (Math.sin(menuAnimPhase * 0.3 + i * 1.7) * 0.5 + 0.5) * DESIGN.width;
                const py = (Math.cos(menuAnimPhase * 0.2 + i * 2.3) * 0.5 + 0.5) * DESIGN.height;
                const size = 1 + (i % 4) * 0.75;
                const colorVariant = ['#00e5ff', '#00ff88', '#cc44ff', '#ffaa00'][i % 4];
                ctx.fillStyle = `rgba(${colorVariant.slice(1).match(/.{1,2}/g).map(x => parseInt(x, 16)).join(',')}, ${0.04 + Math.sin(menuAnimPhase + i) * 0.03})`;
                ctx.beginPath();
                ctx.arc(px, py, size, 0, Math.PI * 2);
                ctx.fill();
            }

            // === PREMIUM LOGO — Detailed bat + ball + stumps with neon glow ===
            {
                const cx = DESIGN.width / 2;
                const cy = 32;
                const pulse = Math.sin(menuAnimPhase * 1.5) * 0.15 + 0.85;
                const slowSpin = menuAnimPhase * 0.3;

                ctx.save();

                // Outer glow ring (rotating)
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(slowSpin);
                ctx.globalAlpha = 0.08 * pulse;
                for (let r = 0; r < 3; r++) {
                    ctx.strokeStyle = ['#00e5ff', '#00ff88', '#ffd700'][r];
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(0, 0, 22 + r * 3, r * 2.1, r * 2.1 + 1.8);
                    ctx.stroke();
                }
                ctx.globalAlpha = 1;
                ctx.restore();

                // Soft background circle
                ctx.save();
                ctx.shadowColor = '#00e5ff';
                ctx.shadowBlur = 14 * pulse;
                const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 22);
                bgGrad.addColorStop(0, 'rgba(0, 229, 255, 0.06)');
                bgGrad.addColorStop(1, 'rgba(0, 229, 255, 0)');
                ctx.fillStyle = bgGrad;
                ctx.beginPath();
                ctx.arc(cx, cy, 22, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // === STUMPS (3 vertical lines behind bat, scaled 0.7x) ===
                ctx.save();
                ctx.strokeStyle = '#c9a96e';
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.5;
                for (let s = -1; s <= 1; s++) {
                    ctx.beginPath();
                    ctx.moveTo(cx + s * 4.5 + 1.5, cy - 10);
                    ctx.lineTo(cx + s * 4.5 + 1.5, cy + 12);
                    ctx.stroke();
                }
                // Bails
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(cx - 5, cy - 10);
                ctx.lineTo(cx + 7, cy - 10);
                ctx.stroke();
                ctx.globalAlpha = 1;
                ctx.restore();

                // === CRICKET BAT (angled, scaled 0.7x) ===
                ctx.save();
                ctx.translate(cx - 8, cy + 1);
                ctx.rotate(-0.65);
                ctx.scale(0.7, 0.7);

                // Bat shadow
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(-2, -23, 9, 46);

                // Bat blade
                const batGrad = ctx.createLinearGradient(0, -20, 7, -20);
                batGrad.addColorStop(0, '#d4a55a');
                batGrad.addColorStop(0.3, '#e8c280');
                batGrad.addColorStop(0.7, '#d4a55a');
                batGrad.addColorStop(1, '#b8894a');
                ctx.fillStyle = batGrad;
                ctx.beginPath();
                ctx.moveTo(0, -20);
                ctx.quadraticCurveTo(-1, -23, 3, -24);
                ctx.quadraticCurveTo(7, -23, 7, -20);
                ctx.lineTo(7, 8);
                ctx.quadraticCurveTo(7, 10, 5, 10);
                ctx.lineTo(2, 10);
                ctx.quadraticCurveTo(0, 10, 0, 8);
                ctx.closePath();
                ctx.fill();

                // Grain lines
                ctx.strokeStyle = 'rgba(180,120,50,0.25)';
                ctx.lineWidth = 0.5;
                for (let g = 1; g <= 4; g++) {
                    ctx.beginPath();
                    ctx.moveTo(g * 1.5, -20);
                    ctx.lineTo(g * 1.5, 8);
                    ctx.stroke();
                }

                // Handle
                const hGrad = ctx.createLinearGradient(1, 10, 5, 10);
                hGrad.addColorStop(0, '#2a2a2a');
                hGrad.addColorStop(0.5, '#444');
                hGrad.addColorStop(1, '#2a2a2a');
                ctx.fillStyle = hGrad;
                ctx.fillRect(1, 10, 5, 16);

                // Grip bands
                ctx.fillStyle = '#00e5ff';
                ctx.globalAlpha = 0.6;
                for (let b = 0; b < 4; b++) {
                    ctx.fillRect(1, 12 + b * 4, 5, 1.5);
                }
                ctx.globalAlpha = 1;

                ctx.restore();

                // === CRICKET BALL (leather red with seam, scaled down) ===
                ctx.save();
                const ballX = cx + 12;
                const ballY = cy - 4;
                const ballR = 7;

                // Ball glow
                ctx.shadowColor = '#ff3333';
                ctx.shadowBlur = 7 * pulse;

                // Ball base (cherry red)
                const ballGrad = ctx.createRadialGradient(ballX - 2, ballY - 2, 1, ballX, ballY, ballR);
                ballGrad.addColorStop(0, '#ff4444');
                ballGrad.addColorStop(0.6, '#cc2222');
                ballGrad.addColorStop(1, '#881111');
                ctx.fillStyle = ballGrad;
                ctx.beginPath();
                ctx.arc(ballX, ballY, ballR, 0, Math.PI * 2);
                ctx.fill();

                // Seam (curved stitching line)
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                ctx.arc(ballX, ballY, ballR * 0.65, -0.8, 2.3);
                ctx.stroke();

                // Stitch marks
                ctx.strokeStyle = 'rgba(255,215,0,0.5)';
                ctx.lineWidth = 0.5;
                for (let st = 0; st < 4; st++) {
                    const angle = -0.4 + st * 0.6;
                    const sx = ballX + Math.cos(angle) * ballR * 0.65;
                    const sy = ballY + Math.sin(angle) * ballR * 0.65;
                    ctx.beginPath();
                    ctx.moveTo(sx - 1, sy - 1);
                    ctx.lineTo(sx + 1, sy + 1);
                    ctx.stroke();
                }

                // Shine
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.arc(ballX - 2, ballY - 3, 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();

                // === NEON ACCENT — energy arc connecting bat to ball ===
                ctx.save();
                ctx.strokeStyle = '#00e5ff';
                ctx.lineWidth = 0.8;
                ctx.globalAlpha = 0.2 * pulse;
                ctx.shadowColor = '#00e5ff';
                ctx.shadowBlur = 4;
                ctx.beginPath();
                ctx.moveTo(cx - 1, cy - 10);
                ctx.quadraticCurveTo(cx + 14, cy - 18, ballX, ballY - ballR);
                ctx.stroke();
                ctx.globalAlpha = 1;
                ctx.restore();
                ctx.restore(); // match outer ctx.save() at logo block start
            }

            // === PREMIUM TITLE "CRICKET AI 2026" with enhanced neon glow ===
            const titleBounce = Math.sin(menuAnimPhase * 1.2) * 2;
            const titleGlowPulse = 30 + Math.sin(menuAnimPhase * 1.8) * 12;
            const titleY = 78 + titleBounce;
            ctx.save();
            ctx.shadowColor = '#00e5ff';
            ctx.shadowBlur = titleGlowPulse;
            drawText('CRICKET AI 2026', DESIGN.width / 2, titleY, 36, '#ffffff', 'bold', false);
            // Double-render for extra glow
            ctx.globalAlpha = 0.3;
            ctx.shadowColor = '#00e5ff';
            ctx.shadowBlur = 50;
            drawText('CRICKET AI 2026', DESIGN.width / 2, titleY, 36, '#00e5ff', 'bold', false);
            ctx.restore();

            // Animated glowing underline below title
            const underlineY = titleY + 20;
            const underlineWidth = 120 + Math.sin(menuAnimPhase * 1.5) * 30;
            const underlineX = DESIGN.width / 2 - underlineWidth / 2;
            ctx.save();
            ctx.shadowColor = '#00e5ff';
            ctx.shadowBlur = 15;
            ctx.strokeStyle = '#00e5ff';
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.6 + Math.sin(menuAnimPhase * 2) * 0.2;
            ctx.beginPath();
            ctx.moveTo(underlineX, underlineY);
            ctx.lineTo(underlineX + underlineWidth, underlineY);
            ctx.stroke();
            ctx.restore();

            // === PREMIUM SUBTITLE with letter-spacing feel ===
            const subtitle = 'AI CRICKET CHALLENGE';
            ctx.save();
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.font = 'bold 11px -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.letterSpacing = '2px';
            ctx.fillText(subtitle, DESIGN.width / 2, 108);
            ctx.restore();

            // === PREMIUM Phase progress indicator with badge glow ===
            const unlockedCount = gameState.phasesUnlocked.filter(p => p).length;
            const badgeText = 'PHASES UNLOCKED: ' + unlockedCount + ' / ' + PHASES.length;
            ctx.save();
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 12;
            drawText(badgeText, DESIGN.width / 2, 124, 9, '#00ff88', 'normal', false);
            ctx.restore();

            // === PREMIUM STATS CARD ===
            const panelY = 136;
            drawGlassCard(20, panelY, DESIGN.width - 40, 70, 12, '#0088ff', 0.7, '#0088ff', 12);
            const colW = (DESIGN.width - 40) / 3;
            const stats = [

        /**
         * Simulate a bot innings — generates a realistic ball-by-ball score
         * based on difficulty. Returns a fake room-like object.
         */
        function _mpSimulateBotInnings(difficulty) {
            const diff = difficulty || 'medium';
            // Parameters matched to DIFFICULTY_CONFIG overs + competitive scoring
            // Bot should set a challenging but beatable target
            const params = {
                //                                                  overs match DIFFICULTY_CONFIG
                easy:   { sixChance: 0.06, fourChance: 0.16, wicketChance: 0.04, maxOvers: 5,  maxWickets: 3, minScore: 20,  targetRange: [22, 38]  },
                medium: { sixChance: 0.10, fourChance: 0.20, wicketChance: 0.04, maxOvers: 8,  maxWickets: 3, minScore: 40,  targetRange: [42, 72]  },
                hard:   { sixChance: 0.14, fourChance: 0.24, wicketChance: 0.03, maxOvers: 10, maxWickets: 3, minScore: 65,  targetRange: [68, 115] },
                legend: { sixChance: 0.18, fourChance: 0.28, wicketChance: 0.03, maxOvers: 15, maxWickets: 3, minScore: 110, targetRange: [115, 195]},
            };
            const p = params[diff] || params.medium;
            const ballsPerOver = 6;

            let score = 0, wickets = 0, overs = 0, balls = 0, fours = 0, sixes = 0;
            const totalBalls = p.maxOvers * ballsPerOver;

            // Phase-based batting: bot starts cautious, accelerates in later overs
            for (let b = 0; b < totalBalls && wickets < p.maxWickets; b++) {
                const inningsProgress = b / totalBalls; // 0 → 1
                // Aggression ramps up: first 40% cautious, then increasingly aggressive
                const aggrMul = inningsProgress < 0.4 ? 0.8 : (0.8 + (inningsProgress - 0.4) * 1.5);
                const rand = Math.random();
                let runs = 0;

                // Wicket chance stays low to ensure innings longevity
                if (rand < p.wicketChance * (1 + aggrMul * 0.3)) {
                    wickets++;
                    runs = 0;
                } else if (rand < p.wicketChance + p.sixChance * aggrMul) {
                    runs = 6;
                    sixes++;
                } else if (rand < p.wicketChance + p.sixChance * aggrMul + p.fourChance * aggrMul) {
                    runs = 4;
                    fours++;
                } else {
                    // Singles, twos, threes, dots — weighted distribution
                    const dotChance = Math.max(0.05, 0.25 - inningsProgress * 0.15);
                    const r2 = Math.random();
                    if (r2 < dotChance) runs = 0;
                    else if (r2 < dotChance + 0.30) runs = 1;
                    else if (r2 < dotChance + 0.55) runs = 2;
                    else runs = 3;
                }

                score += runs;
                balls++;
                if (balls >= ballsPerOver) {
                    overs++;
                    balls = 0;
                }
            }

            // Ensure competitive minimum — if RNG was unlucky, boost to targetRange
            if (score < p.minScore) {
                // Add realistic bonus runs to reach minimum
                const deficit = p.minScore - score;
                score += deficit + Math.floor(Math.random() * 8);
                fours += Math.floor(deficit / 5);
                sixes += Math.floor(deficit / 12);
            }
            // Clamp to target range for consistency
            const [minT, maxT] = p.targetRange;
            if (score < minT) score = minT + Math.floor(Math.random() * 5);
            if (score > maxT) score = maxT - Math.floor(Math.random() * 5);

            return {
                _id: 'bot_match_' + Date.now(),
                player1Name: 'Cricket AI 2026',
                player2Name: 'Alpit',
                difficulty: diff,
                status: 'innings2',
                createdAt: Date.now(),
                innings1Score: score,
                innings1Wickets: wickets,
                innings1Overs: overs,
                innings1Balls: balls,
                innings1Fours: fours,
                innings1Sixes: sixes,
                innings1Complete: true,
                innings2Score: 0, innings2Wickets: 0, innings2Overs: 0,
                innings2Balls: 0, innings2Fours: 0, innings2Sixes: 0,
                innings2Complete: false,
                target: score + 1,
                winner: '', winMargin: '',
                updatedAt: Date.now(),
                lastBallResult: '', lastBallRuns: 0,
                _isBot: true,
            };
        }

                        ctx.fillStyle = dOpt.color;
                        ctx.globalAlpha = 0.25;
                        ctx.beginPath();
                        ctx.roundRect(dx, diffBtnY, diffBtnW, diffBtnH, 8);
                        ctx.fill();
                        ctx.restore();
                        ctx.strokeStyle = dOpt.color;
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.roundRect(dx, diffBtnY, diffBtnW, diffBtnH, 8);
                        ctx.stroke();
                    } else {
                        // Unselected — dim outline
                        ctx.fillStyle = 'rgba(255,255,255,0.04)';
                        ctx.beginPath();
                        ctx.roundRect(dx, diffBtnY, diffBtnW, diffBtnH, 8);
                        ctx.fill();
                        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.roundRect(dx, diffBtnY, diffBtnW, diffBtnH, 8);
                        ctx.stroke();
                    }
                    const labelColor = isSelected ? dOpt.color : 'rgba(255,255,255,0.4)';
                    drawText(dOpt.icon + ' ' + dOpt.label, dx + diffBtnW / 2, diffBtnY + diffBtnH / 2, 7, labelColor, 'bold', false);
                }

                // Description card — only shown when NOT searching
                const cardY = diffBtnY + diffBtnH + 12;
                ctx.fillStyle = 'rgba(0, 30, 60, 0.6)';
                ctx.beginPath();
                ctx.roundRect(20, cardY, W - 40, 100, 12);
                ctx.fill();
                ctx.strokeStyle = 'rgba(0, 229, 255, 0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();

                drawText('HOW IT WORKS', W / 2, cardY + 16, 10, '#00e5ff', 'bold', false);
                drawText('1. Find an opponent online', W / 2, cardY + 34, 8, '#ffffff', 'normal', false);
                drawText('2. Player 1 bats → sets target', W / 2, cardY + 48, 8, '#ffffff', 'normal', false);
                drawText('3. Player 2 chases the target', W / 2, cardY + 62, 8, '#ffffff', 'normal', false);
                drawText('4. Higher score wins! 🏆', W / 2, cardY + 80, 8, '#ffd700', 'normal', false);
            }

            // FIND MATCH button — position shifts when searching to make room for radar
            const btnY = _mpSearching ? 310 : 260;
            const btnW = 200;
            const btnX = W / 2 - btnW / 2;

            if (_mpSearching) {
                // === PREMIUM MATCHMAKING ANIMATION ===
                const elapsed = Date.now() - _mpSearchStartTime;
                const remaining = Math.max(0, Math.ceil((_MP_BOT_TIMEOUT_MS - elapsed) / 1000));
                const progress = Math.min(1, elapsed / _MP_BOT_TIMEOUT_MS);
                const t = gameTime * 0.001; // smooth time

                // --- Phase-based color theming ---
                const isUrgent = remaining <= 8;
                const isWarning = remaining <= 15 && remaining > 8;
                const primaryColor = isUrgent ? '#ff4444' : isWarning ? '#ff8c00' : '#00e5ff';
                const secondaryColor = isUrgent ? '#ff6666' : isWarning ? '#ffaa44' : '#00ccff';
                const glowColor = isUrgent ? 'rgba(255,68,68,' : isWarning ? 'rgba(255,140,0,' : 'rgba(0,229,255,';

                // --- RADAR / SEARCH GLOBE (centered in the freed-up card space) ---
                const radarCX = W / 2;
                const radarCY = 180;
                const radarR = 55;

                // Outer glow pulse
                ctx.save();
                const pulseSize = 1 + Math.sin(t * 3) * 0.15;
                ctx.beginPath();
                ctx.arc(radarCX, radarCY, radarR * pulseSize + 8, 0, Math.PI * 2);
                ctx.fillStyle = glowColor + '0.06)';
                ctx.fill();
                ctx.restore();

                // Radar background circle (dark)
                ctx.save();
                ctx.beginPath();
                ctx.arc(radarCX, radarCY, radarR, 0, Math.PI * 2);
                const radarBg = ctx.createRadialGradient(radarCX, radarCY, 0, radarCX, radarCY, radarR);
                radarBg.addColorStop(0, 'rgba(0, 20, 40, 0.95)');
                radarBg.addColorStop(1, 'rgba(0, 10, 25, 0.98)');
                ctx.fillStyle = radarBg;
                ctx.fill();
                // Radar border
                ctx.strokeStyle = glowColor + '0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();

                // Radar grid lines (cross + concentric circles)
                ctx.save();
                ctx.globalAlpha = 0.12;
                ctx.strokeStyle = primaryColor;
                ctx.lineWidth = 0.5;
                // Cross
                ctx.beginPath();
                ctx.moveTo(radarCX - radarR + 4, radarCY);
                ctx.lineTo(radarCX + radarR - 4, radarCY);
                ctx.moveTo(radarCX, radarCY - radarR + 4);
                ctx.lineTo(radarCX, radarCY + radarR - 4);
                ctx.stroke();
                // Concentric rings
                for (let ring = 1; ring <= 3; ring++) {
                    ctx.beginPath();
                    ctx.arc(radarCX, radarCY, radarR * ring / 3.5, 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.restore();

                // Radar sweep beam (WebView compatible - no createConicGradient)
                ctx.save();
                const sweepAngle = t * 2.5;
                const sweepSpan = Math.PI * 0.4;
                ctx.beginPath();
                ctx.moveTo(radarCX, radarCY);
                ctx.arc(radarCX, radarCY, radarR - 2, sweepAngle - sweepSpan, sweepAngle + sweepSpan);
                ctx.closePath();
                const sweepGrad = ctx.createRadialGradient(radarCX, radarCY, 0, radarCX, radarCY, radarR - 2);
                sweepGrad.addColorStop(0, 'transparent');
                sweepGrad.addColorStop(0.5, glowColor + '0.15)');
                sweepGrad.addColorStop(1, glowColor + '0.25)');
                ctx.fillStyle = sweepGrad;
                ctx.fill();
                ctx.restore();

                // Sweep line (bright leading edge)
                ctx.save();
                ctx.strokeStyle = primaryColor;
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.8;
                ctx.beginPath();
                ctx.moveTo(radarCX, radarCY);
                ctx.lineTo(radarCX + Math.cos(sweepAngle) * (radarR - 3), radarCY + Math.sin(sweepAngle) * (radarR - 3));
                ctx.stroke();
                ctx.restore();

                // Blip dots (fake "players found" blips that appear and fade)
                ctx.save();
                for (let bd = 0; bd < 5; bd++) {
                    const blipAngle = (bd * 1.37 + t * 0.3) % (Math.PI * 2);
                    const blipDist = (radarR * 0.3) + ((bd * 7 + 13) % 20) * (radarR * 0.025);
                    const blipX = radarCX + Math.cos(blipAngle) * blipDist;
                    const blipY = radarCY + Math.sin(blipAngle) * blipDist;
                    // Only show if sweep recently passed this angle
                    let angleDiff = (sweepAngle - blipAngle + Math.PI * 4) % (Math.PI * 2);
                    if (angleDiff < Math.PI * 0.8) {
                        const blipAlpha = Math.max(0, 1 - angleDiff / (Math.PI * 0.8));
                        ctx.beginPath();
                        ctx.arc(blipX, blipY, 2.5, 0, Math.PI * 2);
                        ctx.fillStyle = glowColor + blipAlpha * 0.8 + ')';
                        ctx.fill();
                        // Blip glow
                        ctx.beginPath();
                        ctx.arc(blipX, blipY, 5, 0, Math.PI * 2);
                        ctx.fillStyle = glowColor + blipAlpha * 0.2 + ')';
                        ctx.fill();
                    }
                }
                ctx.restore();

                // Center icon in radar
                drawText('🏏', radarCX, radarCY, 18, '#ffffff', 'normal', false);

                // --- COUNTDOWN ARC (around the radar) ---
                ctx.save();
                const arcStartAngle = -Math.PI / 2;
                const arcEndAngle = arcStartAngle + (1 - progress) * Math.PI * 2;
                ctx.beginPath();
                ctx.arc(radarCX, radarCY, radarR + 6, arcStartAngle, arcEndAngle);
                ctx.strokeStyle = primaryColor;
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.shadowColor = primaryColor;
                ctx.shadowBlur = 8;
                ctx.stroke();
                ctx.restore();

                // Countdown number (top-right of radar)
                ctx.save();
                ctx.beginPath();
                ctx.arc(radarCX + radarR - 2, radarCY - radarR + 2, 14, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
                ctx.fill();
                ctx.strokeStyle = primaryColor;
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();
                drawText(String(remaining), radarCX + radarR - 2, radarCY - radarR + 2, 11, primaryColor, 'bold', false);

                // --- ORBITING DOTS (around radar edge) ---
                ctx.save();
                for (let od = 0; od < 3; od++) {
                    const orbitAngle = t * 1.8 + (od * Math.PI * 2 / 3);
                    const orbitX = radarCX + Math.cos(orbitAngle) * (radarR + 14);
                    const orbitY = radarCY + Math.sin(orbitAngle) * (radarR + 14);
                    const orbitPulse = 0.5 + Math.sin(t * 4 + od * 2) * 0.5;
                    ctx.beginPath();
                    ctx.arc(orbitX, orbitY, 3, 0, Math.PI * 2);
                    ctx.fillStyle = glowColor + orbitPulse + ')';
                    ctx.fill();
                }
                ctx.restore();

                // --- SEARCHING BUTTON (pulsing border) ---
                const dots = '.'.repeat(Math.floor(gameTime * 0.03) % 4);
                const btnPulse = 0.3 + Math.sin(t * 4) * 0.15;
                ctx.fillStyle = glowColor + '0.1)';
                ctx.beginPath();
                ctx.roundRect(btnX, btnY, btnW, 50, 25);
                ctx.fill();
                ctx.save();
                ctx.strokeStyle = glowColor + btnPulse + ')';
                ctx.lineWidth = 2;
                ctx.shadowColor = primaryColor;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.roundRect(btnX, btnY, btnW, 50, 25);
                ctx.stroke();
                ctx.restore();

                drawText('SEARCHING' + dots, W / 2, btnY + 25, 13, primaryColor, 'bold', false);

                // --- STATUS MESSAGE (phase-based) ---
                let statusText = '';
                let statusColor = 'rgba(255,255,255,0.5)';
                if (remaining > 22) {
                    statusText = 'Scanning for online opponents...';
                    statusColor = '#00e5ff';
                } else if (remaining > 15) {
                    statusText = 'Searching worldwide...';
                    statusColor = '#00ccff';
                } else if (remaining > 8) {
                    statusText = 'Expanding search range...';
                    statusColor = '#ff8c00';
                } else if (remaining > 3) {
                    statusText = '🤖 AI Bot preparing to join...';
                    statusColor = '#ff6644';
                } else {
                    statusText = '🤖 AI Bot joining now!';
                    statusColor = '#ff4444';
                }
                drawText(statusText, W / 2, btnY + 58, 9, statusColor, 'bold', false);

                // --- ANIMATED PROGRESS BAR below status ---
                const barX = W / 2 - 80;
                const barY = btnY + 72;
                const barW = 160;
                const barH = 4;
                // Background
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.beginPath();
                ctx.roundRect(barX, barY, barW, barH, 2);
                ctx.fill();
                // Fill
                const barGrad = ctx.createLinearGradient(barX, barY, barX + barW * progress, barY);
                barGrad.addColorStop(0, secondaryColor);
                barGrad.addColorStop(1, primaryColor);
                ctx.fillStyle = barGrad;
                ctx.beginPath();
                ctx.roundRect(barX, barY, barW * progress, barH, 2);
                ctx.fill();
                // Shimmer effect on progress bar
                const shimmerX = barX + (barW * progress * ((t * 0.5) % 1));
                ctx.save();
                ctx.globalAlpha = 0.4;
                ctx.beginPath();
                ctx.arc(Math.min(shimmerX, barX + barW * progress), barY + barH / 2, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.restore();

                // Cancel text
                drawText('Tap to cancel', W / 2, btnY + 92, 8, 'rgba(255,255,255,0.25)', 'normal', false);
            } else {
                // Find Match button
                const fmGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + 50);
                fmGrad.addColorStop(0, '#ff8c00');
                fmGrad.addColorStop(1, '#ff6b00');
                ctx.fillStyle = fmGrad;
                ctx.beginPath();
                ctx.roundRect(btnX, btnY, btnW, 50, 25);
                ctx.fill();
                ctx.save();
                ctx.shadowColor = '#ff8c00';
                ctx.shadowBlur = 15;
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(btnX, btnY, btnW, 50, 25);
                ctx.stroke();
                ctx.restore();
                drawText('🔍 FIND MATCH', W / 2, btnY + 25, 14, '#ffffff', 'bold', false);
            }

            // --- PLAY WITH FRIEND section (only when not searching) ---
            if (!_mpSearching) {
                const friendY = btnY + 65;
                // Divider
                ctx.save();
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(30, friendY);
                ctx.lineTo(W - 30, friendY);
                ctx.stroke();
                ctx.restore();
                drawText('OR PLAY WITH A FRIEND', W / 2, friendY + 18, 9, 'rgba(255,255,255,0.4)', 'bold', false);

                // Create Room button
                const crBtnY = friendY + 32;
                const crBtnW = 130;
                const crBtnGap = 10;
                const crBtnX1 = W / 2 - crBtnW - crBtnGap / 2;
                const crBtnX2 = W / 2 + crBtnGap / 2;
                const crBtnH = 42;

                // CREATE ROOM
                ctx.fillStyle = 'rgba(0, 200, 120, 0.12)';
                ctx.beginPath();
                ctx.roundRect(crBtnX1, crBtnY, crBtnW, crBtnH, 12);
                ctx.fill();
                ctx.strokeStyle = '#00cc88';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.roundRect(crBtnX1, crBtnY, crBtnW, crBtnH, 12);
                ctx.stroke();
                drawText('🏠 CREATE', crBtnX1 + crBtnW / 2, crBtnY + 15, 10, '#00ff88', 'bold', false);
                drawText('ROOM', crBtnX1 + crBtnW / 2, crBtnY + 30, 8, '#00cc88', 'normal', false);

                // JOIN ROOM
                ctx.fillStyle = 'rgba(100, 100, 255, 0.12)';
                ctx.beginPath();
                ctx.roundRect(crBtnX2, crBtnY, crBtnW, crBtnH, 12);
                ctx.fill();
                ctx.strokeStyle = '#6688ff';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.roundRect(crBtnX2, crBtnY, crBtnW, crBtnH, 12);
                ctx.stroke();
                drawText('🔗 JOIN', crBtnX2 + crBtnW / 2, crBtnY + 15, 10, '#88aaff', 'bold', false);
                drawText('ROOM', crBtnX2 + crBtnW / 2, crBtnY + 30, 8, '#6688ff', 'normal', false);
            }

            // Back button
            const backY = H - 60;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.beginPath();
            ctx.roundRect(W / 2 - 50, backY, 100, 35, 17);
            ctx.fill();
            drawText('← BACK', W / 2, backY + 17, 11, '#ffffff', 'normal', false);
        }

        // ============================================================================
        // PRIVATE ROOM SCREENS
        // ============================================================================

        let _mpPrivateRoomId = null;
        let _mpPrivateRoomCode = '';
        let _mpPrivatePolling = null;
        let _mpJoinCode = ['', '', '', ''];  // 4-char input
        let _mpJoinCodeIdx = 0;              // which char is being entered
        let _mpJoinError = '';
        let _mpJoinSuccess = false;

        function drawCreateRoomScreen() {
            const W = DESIGN.width;
            const H = DESIGN.height;

            // Background
            const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
            bgGrad.addColorStop(0, '#0a0e1a');
            bgGrad.addColorStop(0.5, '#0a1e0a');
            bgGrad.addColorStop(1, '#0a1628');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, W, H);

            drawText('🏠 PRIVATE ROOM', W / 2, 45, 20, '#00ff88', 'bold', false);
            drawText('Share this code with your friend', W / 2, 70, 9, 'rgba(255,255,255,0.5)', 'normal', false);

            // Room code display — large, glowing
            const codeY = 110;
            ctx.fillStyle = 'rgba(0, 40, 20, 0.6)';
            ctx.beginPath();
            ctx.roundRect(W / 2 - 100, codeY, 200, 80, 16);
            ctx.fill();
            ctx.save();
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 15;
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(W / 2 - 100, codeY, 200, 80, 16);
            ctx.stroke();
            ctx.restore();

            // Code letters — large with spacing
            if (_mpPrivateRoomCode) {
                const letters = _mpPrivateRoomCode.split('');
                const letterW = 36;
                const totalLetterW = letters.length * letterW;
                const letterStartX = W / 2 - totalLetterW / 2 + letterW / 2;
                for (let li = 0; li < letters.length; li++) {
                    const lx = letterStartX + li * letterW;
                    // Letter box
                    ctx.fillStyle = 'rgba(0, 255, 136, 0.08)';
                    ctx.beginPath();
                    ctx.roundRect(lx - 15, codeY + 18, 30, 42, 8);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0, 255, 136, 0.3)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.roundRect(lx - 15, codeY + 18, 30, 42, 8);
                    ctx.stroke();
                    drawText(letters[li], lx, codeY + 42, 24, '#00ff88', 'bold', false);
                }
            }

            // Waiting animation
            const waitY = 220;
            const dots = '.'.repeat(Math.floor(gameTime * 0.03) % 4);
            const spinAngle = gameTime * 0.04;
            ctx.save();
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(W / 2, waitY, 14, spinAngle, spinAngle + Math.PI * 1.5);
            ctx.stroke();
            ctx.restore();
            drawText('Waiting for friend to join' + dots, W / 2, waitY + 35, 11, '#ffffff', 'normal', false);

            // Difficulty label
            drawText('Difficulty: ' + _mpSelectedDifficulty.toUpperCase(), W / 2, waitY + 58, 9, '#ff8c00', 'bold', false);

            // Instruction
            drawText('Your friend should tap JOIN ROOM', W / 2, waitY + 85, 8, 'rgba(255,255,255,0.35)', 'normal', false);
            drawText('and enter the code above', W / 2, waitY + 100, 8, 'rgba(255,255,255,0.35)', 'normal', false);

            // Cancel button
            const cancelY = H - 65;
            ctx.fillStyle = 'rgba(255, 60, 60, 0.15)';
            ctx.beginPath();
            ctx.roundRect(W / 2 - 70, cancelY, 140, 38, 19);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255, 60, 60, 0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(W / 2 - 70, cancelY, 140, 38, 19);
            ctx.stroke();
            drawText('✕ CANCEL', W / 2, cancelY + 19, 11, '#ff6666', 'bold', false);
        }

        function drawJoinRoomScreen() {
            const W = DESIGN.width;
            const H = DESIGN.height;

            // Background
            const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
            bgGrad.addColorStop(0, '#0a0e1a');
            bgGrad.addColorStop(0.5, '#0a0a2e');
            bgGrad.addColorStop(1, '#0a1628');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, W, H);

            drawText('🔗 JOIN ROOM', W / 2, 45, 20, '#88aaff', 'bold', false);
            drawText('Enter your friend\'s room code', W / 2, 70, 9, 'rgba(255,255,255,0.5)', 'normal', false);

            // Code input boxes
            const inputY = 100;
            const boxW = 44;
            const boxH = 56;
            const boxGap = 12;
            const totalBoxW = 4 * boxW + 3 * boxGap;
            const boxStartX = W / 2 - totalBoxW / 2;

            for (let bi = 0; bi < 4; bi++) {
                const bx = boxStartX + bi * (boxW + boxGap);
                const isActive = bi === _mpJoinCodeIdx;
                const hasChar = _mpJoinCode[bi] !== '';

                // Box background
                ctx.fillStyle = isActive ? 'rgba(100, 130, 255, 0.15)' : 'rgba(255,255,255,0.05)';
                ctx.beginPath();
                ctx.roundRect(bx, inputY, boxW, boxH, 10);
                ctx.fill();

                // Box border
                if (isActive) {
                    ctx.save();
                    ctx.shadowColor = '#6688ff';
                    ctx.shadowBlur = 10;
                    ctx.strokeStyle = '#6688ff';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.roundRect(bx, inputY, boxW, boxH, 10);
                    ctx.stroke();
                    ctx.restore();
                    // Blinking cursor
                    if (Math.floor(gameTime * 0.03) % 2 === 0 && !hasChar) {
                        ctx.fillStyle = '#6688ff';
                        ctx.fillRect(bx + boxW / 2 - 1, inputY + 18, 2, 24);
                    }
                } else {
                    ctx.strokeStyle = hasChar ? 'rgba(100,130,255,0.4)' : 'rgba(255,255,255,0.15)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.roundRect(bx, inputY, boxW, boxH, 10);
                    ctx.stroke();
                }

                // Character
                if (hasChar) {
                    drawText(_mpJoinCode[bi], bx + boxW / 2, inputY + boxH / 2, 22, '#88aaff', 'bold', false);
                }
            }

            // On-screen keyboard (A-Z, 0-9)
            const kbY = 190;
            const kbRows = [
                'QWERTYUIOP',
                'ASDFGHJKL',
                'ZXCVBNM',
                '1234567890',
            ];
            const kbKeyH = 34;
            const kbGap = 4;

            for (let row = 0; row < kbRows.length; row++) {
                const keys = kbRows[row].split('');
                const kbKeyW = Math.min(26, (W - 20 - (keys.length - 1) * kbGap) / keys.length);
                const rowW = keys.length * kbKeyW + (keys.length - 1) * kbGap;
                const rowX = W / 2 - rowW / 2;
                const rowY = kbY + row * (kbKeyH + kbGap);

                for (let ki = 0; ki < keys.length; ki++) {
                    const kx = rowX + ki * (kbKeyW + kbGap);
                    ctx.fillStyle = 'rgba(255,255,255,0.07)';
                    ctx.beginPath();
                    ctx.roundRect(kx, rowY, kbKeyW, kbKeyH, 6);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.roundRect(kx, rowY, kbKeyW, kbKeyH, 6);
                    ctx.stroke();
                    drawText(keys[ki], kx + kbKeyW / 2, rowY + kbKeyH / 2, 11, '#cccccc', 'bold', false);
                }
            }

            // Backspace + JOIN buttons below keyboard
            const actionY = kbY + 4 * (kbKeyH + kbGap) + 8;
            // Backspace
            ctx.fillStyle = 'rgba(255, 80, 80, 0.15)';
            ctx.beginPath();
            ctx.roundRect(W / 2 - 130, actionY, 80, 38, 10);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255, 80, 80, 0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(W / 2 - 130, actionY, 80, 38, 10);
            ctx.stroke();
            drawText('⌫ DELETE', W / 2 - 90, actionY + 19, 9, '#ff6666', 'bold', false);

            // JOIN button
            const allFilled = _mpJoinCode.every(c => c !== '');
            const joinAlpha = allFilled ? 1 : 0.3;
            ctx.save();
            ctx.globalAlpha = joinAlpha;
            const joinGrad = ctx.createLinearGradient(W / 2 + 10, actionY, W / 2 + 10, actionY + 38);
            joinGrad.addColorStop(0, '#00ff88');
            joinGrad.addColorStop(1, '#00cc66');
            ctx.fillStyle = joinGrad;
            ctx.beginPath();
            ctx.roundRect(W / 2 + 10, actionY, 120, 38, 10);
            ctx.fill();
            ctx.restore();
            if (allFilled) {
                ctx.save();
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = 10;
                ctx.strokeStyle = '#00ff88';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.roundRect(W / 2 + 10, actionY, 120, 38, 10);
                ctx.stroke();
                ctx.restore();
            }
            drawText('JOIN ▶', W / 2 + 70, actionY + 19, 12, allFilled ? '#ffffff' : 'rgba(255,255,255,0.3)', 'bold', false);

            // Error message
            if (_mpJoinError) {
                drawText(_mpJoinError, W / 2, actionY + 55, 9, '#ff4444', 'bold', false);
            }

            // Success animation
            if (_mpJoinSuccess) {
                drawText('✅ Joining match...', W / 2, actionY + 55, 10, '#00ff88', 'bold', false);
            }

            // Back button

            if (!gameState.isMultiplayer) return;
            const W = DESIGN.width;

            // Chase info bar below main HUD
            const chaseY = 56;
            ctx.save();
            ctx.globalAlpha = 0.85;
            ctx.fillStyle = 'rgba(255, 140, 0, 0.12)';
            ctx.fillRect(0, chaseY, W, 22);

                drawText('⚡ SETTING TARGET — Bat big!', W / 2, chaseY + 11, 8, '#ff8c00', 'bold', false);
            } else {
                // Chaser: show target, runs needed, required run rate
                const target = gameState.mpTarget;
                const runsNeeded = Math.max(0, target - gameState.score);
                const config = DIFFICULTY_CONFIG[gameState.difficulty];
                const totalBalls = config.overs * 6;
                const ballsBowled = gameState.oversCompleted * 6 + gameState.ballsInOver;
                const ballsLeft = Math.max(1, totalBalls - ballsBowled);
                const rrr = (runsNeeded / (ballsLeft / 6)).toFixed(1);

                if (runsNeeded <= 0) {
                    drawText('🏆 TARGET ACHIEVED!', W / 2, chaseY + 11, 9, '#00ff88', 'bold', false);
                } else {
                    const chaseText = `Need ${runsNeeded} off ${ballsLeft} balls  |  RRR: ${rrr}`;
                    const urgentColor = runsNeeded / ballsLeft > 2 ? '#ff4444' : '#ff8c00';
                    drawText(chaseText, W / 2, chaseY + 11, 8, urgentColor, 'bold', false);

                const row = Math.floor(i / cols);
                const x = gridStartX + col * (cellSize + cellSpacing);
                const y = gridStartY + row * (cellSize + cellSpacing) - levelSelectScrollY;

                if (y > -cellSize && y < DESIGN.height - 40) {
                    const isUnlocked = level.level <= gameState.campaignLevel;
                    const stars = gameState.levelStars[level.level] || 0;
                    const isBoss = level.isBoss;

                    const r = 10;
                    if (isUnlocked) {
                        // Unlocked level - with neon border
                        const bgColor = level.theme.bg1;
                        const neonColor = isBoss ? '#FF4444' : level.theme.bg2;
                        const isCurrent = level.level === gameState.campaignLevel;

                        // Card with gradient fill
                        const levelGrad = ctx.createLinearGradient(x, y, x, y + cellSize);
                        levelGrad.addColorStop(0, bgColor);
                        levelGrad.addColorStop(1, isBoss ? '#8B0000' : level.theme.bg1);
                        ctx.fillStyle = levelGrad;
                        ctx.globalAlpha = 0.4;
                        ctx.beginPath();
                        ctx.roundRect(x, y, cellSize, cellSize, r);
                        ctx.fill();
                        ctx.globalAlpha = 1;

                        // Neon border with glow
                        if (isCurrent) {
                            // Pulsing cyan border for current level
                            const pulse = Math.sin(gameTime * 0.005) * 0.5 + 0.5;
                            ctx.strokeStyle = '#00e5ff';
                            ctx.lineWidth = 2.5 + pulse * 0.5;
                            ctx.shadowColor = '#00e5ff';
                            ctx.shadowBlur = 12;

                            // Golden glow for 3-star levels
                            ctx.strokeStyle = '#ffd700';
                            ctx.lineWidth = 2;
                            ctx.shadowColor = '#ffd700';
                            ctx.shadowBlur = 8;
                        } else {

                            ctx.strokeStyle = neonColor;
                            ctx.lineWidth = isBoss ? 2.5 : 2;
                            ctx.shadowColor = neonColor;
                            ctx.shadowBlur = 6;

                        ctx.shadowColor = 'transparent';

                        // Level number
                        ctx.fillStyle = '#ffffff';
                        ctx.font = 'bold 20px sans-serif';

                        ctx.roundRect(x, y, cellSize, cellSize, r);
                        ctx.fill();

                        ctx.strokeStyle = 'rgba(100,100,120,0.3)';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.roundRect(x, y, cellSize, cellSize, r);

                    }

            }

        // Initialize native IAP store (Apple StoreKit via Capacitor)
        function initIAP() {
            // If running in Expo WebView with NativePurchase bridge, skip Capacitor IAP
            if (window.NativePurchase || window.__HAS_IAP__) {
                console.log('[IAP] Using NativePurchase bridge (Expo)');
                return;
            }
            if (!window.CdvPurchase) {
                console.log('[IAP] No native store — web mode');
                return;
            }
            const store = window.CdvPurchase.store;
            COIN_PACKS.forEach(pack => {
                store.register({ id: pack.id, type: CdvPurchase.CONSUMABLE, platform: CdvPurchase.APPLE_APPSTORE });
            });
            store.when().approved(transaction => {
                const pid = transaction.products[0]?.id;
                console.log('[IAP] Approved:', pid);
                const pack = COIN_PACKS.find(p => p.id === pid);
                if (pack) {
                    gameState.addCoins(pack.coins);
                }
                gameState.save();
                transaction.finish();
            });
            store.initialize([CdvPurchase.APPLE_APPSTORE]);
            console.log('[IAP] Store initialized');
        }
        // Call after DOM ready
        if (document.readyState === 'complete') initIAP();
        else window.addEventListener('load', initIAP);

        window.addEventListener('purchaseSuccess', function(e) {
            var data = e.detail;

            // VIP Pass purchase

                gameState.isVIP = true;
                gameState.saveToStorage();
                console.log('[IAP] VIP Pass purchased!');
                audio.play('click');
                return;

            // Coin pack purchase
            if (data && data.coins) {
                gameState.addCoins(data.coins);
                gameState.saveToStorage();
                console.log('[IAP] Purchase success: +' + data.coins + ' coins');
            }
        });

        // Confetti system for game over celebration
        const _confetti = [];
        let _confettiSpawned = false;
        function _spawnConfetti() {
            _confetti.length = 0;
            const colors = ['#00ff88','#00e5ff','#ffd700','#ff6b6b','#cc44ff','#ff8800','#ffffff'];
            for (let i = 0; i < 80; i++) {
                _confetti.push({
                    x: DESIGN.width / 2 + (Math.random() - 0.5) * 60,
                    y: 50 + Math.random() * 30,
                    vx: (Math.random() - 0.5) * 6,
                    vy: -3 - Math.random() * 5,
                    gravity: 0.08 + Math.random() * 0.04,
                    w: 3 + Math.random() * 4,
                    h: 2 + Math.random() * 3,
                    rot: Math.random() * Math.PI * 2,
                    rotV: (Math.random() - 0.5) * 0.2,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    alpha: 1,
                    decay: 0.003 + Math.random() * 0.002,
                });
            }
        }
        function _drawConfetti() {
            for (let i = _confetti.length - 1; i >= 0; i--) {
                const c = _confetti[i];
                c.x += c.vx;
                c.vy += c.gravity;
                c.y += c.vy;
                c.rot += c.rotV;
                c.alpha -= c.decay;
                if (c.alpha <= 0 || c.y > DESIGN.height + 20) { _confetti.splice(i, 1); continue; }
                ctx.save();
                ctx.globalAlpha = c.alpha;
                ctx.translate(c.x, c.y);
                ctx.rotate(c.rot);
                ctx.fillStyle = c.color;
                ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
                ctx.restore();
            }
        }

        // Firework burst particles
        const _fireworks = [];
        let _fireworkTimer = 0;
        function _spawnFirework(fx, fy) {
            const color = ['#ffd700','#00ff88','#ff6b6b','#00e5ff','#cc44ff'][Math.floor(Math.random() * 5)];
            for (let i = 0; i < 20; i++) {
                const angle = (Math.PI * 2 / 20) * i + Math.random() * 0.3;
                const speed = 2 + Math.random() * 3;
                _fireworks.push({
                    x: fx, y: fy,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    alpha: 1,
                    color: color,
                    size: 1.5 + Math.random(),
                });
            }
        }
        function _drawFireworks() {
            for (let i = _fireworks.length - 1; i >= 0; i--) {
                const f = _fireworks[i];
                f.x += f.vx;
                f.y += f.vy;
                f.vy += 0.04;
                f.vx *= 0.98;
                f.alpha -= 0.018;
                if (f.alpha <= 0) { _fireworks.splice(i, 1); continue; }
                ctx.save();
                ctx.globalAlpha = f.alpha;
                ctx.shadowColor = f.color;
                ctx.shadowBlur = 6;
                ctx.fillStyle = f.color;
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function handleSettingsTap(x, y) {
            if (_settingsButtons.back && x >= _settingsButtons.back.x && x < _settingsButtons.back.x + _settingsButtons.back.w &&
                y >= _settingsButtons.back.y && y < _settingsButtons.back.y + _settingsButtons.back.h) {
                audio.play('click'); gameState.screen = 'menu'; return true;
            }
            if (_settingsButtons.audioToggle && x >= _settingsButtons.audioToggle.x && x < _settingsButtons.audioToggle.x + _settingsButtons.audioToggle.w &&
                y >= _settingsButtons.audioToggle.y && y < _settingsButtons.audioToggle.y + _settingsButtons.audioToggle.h) {
                audio.muted = !audio.muted;
                gameState.saveToStorage(); return true;
            }
            if (_settingsButtons.hapticsToggle && x >= _settingsButtons.hapticsToggle.x && x < _settingsButtons.hapticsToggle.x + _settingsButtons.hapticsToggle.w &&
                y >= _settingsButtons.hapticsToggle.y && y < _settingsButtons.hapticsToggle.y + _settingsButtons.hapticsToggle.h) {
                if (!gameState.settings) gameState.settings = {};
                gameState.settings.hapticsDisabled = !gameState.settings.hapticsDisabled;
                gameState.saveToStorage(); return true;
            }
            if (_settingsButtons.reset && x >= _settingsButtons.reset.x && x < _settingsButtons.reset.x + _settingsButtons.reset.w &&
                y >= _settingsButtons.reset.y && y < _settingsButtons.reset.y + _settingsButtons.reset.h) {
                if (confirm('Are you sure you want to reset all progress? This cannot be undone.')) {
                    localStorage.removeItem('crickbot_save');
                    location.reload();
                }
                return true;
            }
            if (_settingsButtons.feedback && x >= _settingsButtons.feedback.x && x < _settingsButtons.feedback.x + _settingsButtons.feedback.w &&
                y >= _settingsButtons.feedback.y && y < _settingsButtons.feedback.y + _settingsButtons.feedback.h) {
                window.open('mailto:' + APP_CONFIG.support + '?subject=' + APP_CONFIG.name + ' v' + APP_CONFIG.version + ' Feedback', '_blank');
                return true;
            }
            return false;
        }

        function drawGameOverScreen() {
            const W = DESIGN.width, H = DESIGN.height;
            const won = gameState.score >= gameState.target;

            // === Dark overlay ===
            const overlayGrad = ctx.createLinearGradient(0, 0, 0, H);
            overlayGrad.addColorStop(0, 'rgba(5, 8, 20, 0.92)');
            overlayGrad.addColorStop(1, won ? 'rgba(0, 20, 10, 0.95)' : 'rgba(5, 15, 10, 0.95)');
            ctx.fillStyle = overlayGrad;
            ctx.fillRect(0, 0, W, H);

            // === CELEBRATION / MOURNING EFFECTS ===
            if (won) {
                if (!_confettiSpawned) {
                    _spawnConfetti();
                    _confettiSpawned = true;
                    _fireworkTimer = 0;
                }
                _drawConfetti();

                // Periodic firework bursts
                _fireworkTimer++;
                if (_fireworkTimer % 45 === 0 && _fireworkTimer < 250) {
                    _spawnFirework(40 + Math.random() * (W - 80), 60 + Math.random() * 120);
                }
                _drawFireworks();

                // Floating star sparkles
                for (let s = 0; s < 8; s++) {
                    const sx = (Math.sin(Date.now() * 0.001 + s * 1.3) * 0.5 + 0.5) * W;
                    const sy = (Math.cos(Date.now() * 0.0008 + s * 2.1) * 0.5 + 0.5) * (H * 0.4);
                    const sAlpha = Math.sin(Date.now() * 0.003 + s) * 0.3 + 0.4;
                    ctx.save();
                    ctx.globalAlpha = sAlpha;
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 8;
                    drawText('✨', sx, sy, 10 + Math.sin(Date.now() * 0.004 + s) * 3, '#ffd700', 'normal', false);
                    ctx.restore();
                }
            } else {
                _confettiSpawned = false;

                // Sad rain drops falling
                for (let r = 0; r < 20; r++) {
                    const rx = ((r * 73 + Math.floor(Date.now() * 0.002)) % W);
                    const ry = ((Date.now() * 0.08 + r * 137) % (H + 40)) - 20;
                    const rAlpha = 0.08 + Math.sin(r * 0.5) * 0.04;
                    ctx.fillStyle = `rgba(100,150,200,${rAlpha})`;
                    ctx.fillRect(rx, ry, 1, 8 + Math.sin(r) * 3);
                }

                // Subtle dark vignette for loss
                const lossVig = ctx.createRadialGradient(W / 2, H / 2, H * 0.2, W / 2, H / 2, H * 0.7);
                lossVig.addColorStop(0, 'rgba(0,0,0,0)');
                lossVig.addColorStop(1, 'rgba(0,0,0,0.3)');
                ctx.fillStyle = lossVig;
                ctx.fillRect(0, 0, W, H);
            }

            // === RESULT PANEL ===
            const panelX = 20;
            const panelY = 80;
            const panelW = W - 40;
            const panelH = H - 160;
            const neonColor = won ? '#00ff88' : '#ffaa00';

            drawGlassCard(panelX, panelY, panelW, panelH, 16, null, 0.8, neonColor, 15);

            // === TROPHY / EMOJI + RESULT TEXT ===
            const t = Date.now();
            if (won) {
                const tPulse = Math.sin(t * 0.004) * 0.15 + 0.85;
                const bounce = Math.sin(t * 0.003) * 3;

                // Glowing trophy with orbiting stars
                ctx.save();
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 25 * tPulse;
                drawText('🏆', W / 2, panelY + 28 + bounce, 40, '#ffd700', 'normal', false);
                ctx.restore();

                // Orbiting emojis around trophy
                const orbitEmojis = ['⭐', '🏏', '🎉', '🔥'];
                for (let oe = 0; oe < orbitEmojis.length; oe++) {
                    const oAngle = t * 0.002 + oe * (Math.PI / 2);
                    const ox = W / 2 + Math.cos(oAngle) * 35;
                    const oy = panelY + 28 + Math.sin(oAngle) * 12;
                    ctx.save();
                    ctx.globalAlpha = 0.6;
                    drawText(orbitEmojis[oe], ox, oy, 10, '#fff', 'normal', false);
                    ctx.restore();
                }

                // Victory text with rainbow shimmer
                ctx.save();
                const vHue = (t * 0.1) % 360;
                ctx.shadowColor = `hsl(${vHue}, 100%, 60%)`;
                ctx.shadowBlur = 25;
                drawText('VICTORY!', W / 2, panelY + 66, 36, '#00ff88', 'bold', false);
                ctx.restore();

                // Dynamic win messages based on performance
                let winMsg = 'Well played!';
                const sc = gameState.score;
                const wk = gameState.wickets;
                if (sc >= 150) winMsg = 'LEGENDARY KNOCK!';
                else if (sc >= 100 && wk === 0) winMsg = 'Flawless Century!';
                else if (sc >= 100) winMsg = 'What a Century!';
                else if (gameState.sixes >= 8) winMsg = 'SIX-HITTING MACHINE!';
                else if (wk === 0) winMsg = 'Unbeatable! Not Out!';
                else if (sc >= gameState.target * 1.5) winMsg = 'Absolute Domination!';
                else if (sc - gameState.target < 5) winMsg = 'Nail-biting finish!';
                else winMsg = ['Smashed it!', 'Champion!', 'Brilliant!', 'What a knock!', 'Incredible!'][sc % 5];
                drawText(winMsg, W / 2, panelY + 90, 12, 'rgba(0,255,136,0.7)', 'bold', false);

                // Extra flair emojis row
                const flairRow = '🎊  🏆  🎊';
                ctx.save();
                ctx.globalAlpha = 0.4 + Math.sin(t * 0.003) * 0.2;
                drawText(flairRow, W / 2, panelY + 106, 10, '#ffd700', 'normal', false);
                ctx.restore();
            } else {
                const sadBounce = Math.sin(t * 0.002) * 2;

                // Dynamic sad emoji based on how badly they lost
                const scorePct = gameState.score / gameState.target;
                let sadEmoji = '😢';
                let lossTitle = 'OUT!';
                if (scorePct < 0.1) { sadEmoji = '💀'; lossTitle = 'DESTROYED'; }
                else if (scorePct < 0.25) { sadEmoji = '😭'; lossTitle = 'CRUSHED'; }
                else if (scorePct < 0.5) { sadEmoji = '😞'; lossTitle = 'OUTPLAYED'; }
                else if (scorePct < 0.75) { sadEmoji = '😤'; lossTitle = 'CHALLENGED'; }
                else if (scorePct < 0.95) { sadEmoji = '😩'; lossTitle = 'SO CLOSE!'; }
                else { sadEmoji = '🫠'; lossTitle = 'HEARTBREAK!'; }

                // Sad emoji with slow pulse
                ctx.save();
                ctx.shadowColor = '#ff6b6b';
                ctx.shadowBlur = 10;
                drawText(sadEmoji, W / 2, panelY + 28 + sadBounce, 36, '#fff', 'normal', false);
                ctx.restore();

                // Title text
                ctx.save();
                ctx.shadowColor = '#ffaa00';
                ctx.shadowBlur = 20;
                drawText(lossTitle, W / 2, panelY + 66, 32, '#ffaa00', 'bold', false);
                ctx.restore();

                // Dynamic loss messages
                let lossMsg = 'Try again!';
                if (gameState.wickets >= 3 && gameState.oversCompleted === 0) lossMsg = 'The bowler was on fire!';
                else if (gameState.score === 0) lossMsg = 'Golden duck! Ouch!';
                else if (gameState.score < 10) lossMsg = 'Rough start... dust yourself off!';
                else if (scorePct >= 0.95) lossMsg = 'One more shot and you had it!';
                else if (scorePct >= 0.8) lossMsg = 'You were SO close! Go again!';
                else if (gameState.sixes >= 3) lossMsg = 'Big hitting, just needed more!';
                else lossMsg = ['Keep grinding!', 'Next time for sure!', 'Almost there!', 'Chin up, champ!', 'The comeback is ON!'][gameState.score % 5];
                drawText(lossMsg, W / 2, panelY + 90, 11, 'rgba(255,170,0,0.65)', 'normal', false);

                // Broken stumps emoji row
                const sadRow = '🏏  💔  🏏';
                ctx.save();
                ctx.globalAlpha = 0.35 + Math.sin(t * 0.002) * 0.1;
                drawText(sadRow, W / 2, panelY + 106, 10, '#ff6b6b', 'normal', false);
                ctx.restore();
            }

            // === SCORE ===
            drawText(gameState.score.toString(), W / 2, panelY + 135, 58, '#ffffff', 'bold', false);
            drawText('RUNS', W / 2, panelY + 168, 11, 'rgba(255,255,255,0.4)', 'normal', false);
            drawText('Target: ' + gameState.target, W / 2, panelY + 185, 10, 'rgba(255,255,255,0.5)', 'normal', false);

            // === STATS GRID ===
            const statsY = panelY + 210;
            const colW = panelW / 2;
            const rowH = 48;
            const statsData = [
                { label: 'FOURS', value: gameState.fours, icon: '4️⃣' },
                { label: 'SIXES', value: gameState.sixes, icon: '6️⃣' },
                { label: 'WICKETS', value: gameState.wickets + '/3', icon: '🏏' },
                { label: 'OVERS', value: gameState.oversCompleted + '.' + gameState.ballsInOver, icon: '⚾' },
            ];

            for (let i = 0; i < statsData.length; i++) {
                const row = Math.floor(i / 2);
                const col = i % 2;
                const sx = panelX + col * colW + colW / 2;
                const sy = statsY + row * rowH;

                drawText(statsData[i].value.toString(), sx, sy, 22, '#00e5ff', 'bold', false);
                drawText(statsData[i].label, sx, sy + 20, 9, 'rgba(255,255,255,0.55)', 'normal', false);
            }

            // === PHASE 1: Pre-compute shot map data ===
            const _shotNames = ['LOFT', 'DRIVE', 'CUT', 'PULL', 'SWEEP', 'DEFEND'];
            const _totalShots = _shotNames.reduce((sum, s) => sum + (gameState.shotStats[s] || 0), 0);
            const shotMapExtraH = _totalShots > 0 ? 155 : 0;

            // === PHASE 1: SHOT MAP ===
            if (_totalShots > 0) {
                const shotMapY = statsY + 2 * rowH + 8;
                const shotColors = { LOFT: '#ff4444', DRIVE: '#00e5ff', CUT: '#ffff00', PULL: '#ff8800', SWEEP: '#aa44ff', DEFEND: '#88ff88' };

                drawText('SHOT MAP', W / 2, shotMapY, 10, 'rgba(255,255,255,0.5)', 'bold', false);

                const barStartX = panelX + 70;
                const barMaxW = panelW - 100;
                const barH = 13;
                const barGap = 3;
                let barIdx = 0;

                for (let si = 0; si < _shotNames.length; si++) {
                    const sName = _shotNames[si];
                    const sCount = gameState.shotStats[sName] || 0;
                    if (sCount === 0) continue;
                    const by = shotMapY + 16 + barIdx * (barH + barGap);
                    const barW = Math.max(10, (sCount / _totalShots) * barMaxW);

                    // Bar background
                    ctx.fillStyle = 'rgba(255,255,255,0.06)';
                    ctx.beginPath();
                    ctx.roundRect(barStartX, by, barMaxW, barH, 3);
                    ctx.fill();

                    // Bar fill
                    ctx.fillStyle = shotColors[sName] || '#ffffff';
                    ctx.globalAlpha = 0.75;
                    ctx.beginPath();
                    ctx.roundRect(barStartX, by, barW, barH, 3);
                    ctx.fill();
                    ctx.globalAlpha = 1;

                    // Label (left of bar)
                    ctx.save();
                    ctx.textAlign = 'right';
                    ctx.font = 'bold 7px Arial';
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.fillText(sName, barStartX - 5, by + barH / 2 + 3);
                    ctx.restore();

                    // Count (right of bar)
                    ctx.save();
                    ctx.textAlign = 'left';
                    ctx.font = 'bold 7px Arial';
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(sCount.toString(), barStartX + barW + 5, by + barH / 2 + 3);
                    ctx.restore();

                    barIdx++;
                }

                // Timing quality summary
                const qualY = shotMapY + 16 + barIdx * (barH + barGap) + 12;
                const quals = [
                    { label: 'PERFECT', count: gameState.shotQualities.perfect, color: '#ffd700' },
                    { label: 'GOOD', count: gameState.shotQualities.good, color: '#00e5ff' },
                    { label: 'EDGE', count: gameState.shotQualities.edge, color: '#ff8800' },
                    { label: 'WEAK', count: gameState.shotQualities.weak, color: '#888888' },
                ];
                const qualSpacing = panelW / 4;
                for (let qi = 0; qi < quals.length; qi++) {
                    const qx = panelX + qualSpacing * qi + qualSpacing / 2;
                    drawText(quals[qi].count.toString(), qx, qualY, 14, quals[qi].color, 'bold', false);
                    drawText(quals[qi].label, qx, qualY + 14, 6, 'rgba(255,255,255,0.45)', 'bold', false);
                }
            }

            // === EXTRAS ===
            if (gameState.extras > 0) {
                const extY = statsY + 2 * rowH + 12;
                drawText('Extras: ' + gameState.extras + ' (W:' + extrasSystem.totalWides + ' NB:' + extrasSystem.totalNoBalls + ')', W / 2, extY, 9, 'rgba(255,255,255,0.35)', 'normal', false);
            }

            // === REWARDS ===
            const rwdY = statsY + 2 * rowH + 38 + shotMapExtraH;
            const coinsEarned = gameState.runsThisInning * 7;
            const xpEarned = gameState.runsThisInning * 2;

            // Rewards card
            drawGlassCard(panelX + 15, rwdY - 5, panelW - 30, 55, 10, won ? '#ffd70033' : '#ffaa0022', 0.15, won ? '#ffd700' : '#ffaa00', 1);

            drawText('🪙 +' + coinsEarned, W / 2 - 50, rwdY + 15, 18, '#ffd700', 'bold', false);
            drawText('COINS', W / 2 - 50, rwdY + 34, 8, 'rgba(255,215,0,0.5)', 'normal', false);

            drawText('⚡ +' + xpEarned, W / 2 + 50, rwdY + 15, 18, '#00ff88', 'bold', false);
            drawText('XP', W / 2 + 50, rwdY + 34, 8, 'rgba(0,255,136,0.5)', 'normal', false);

            // === CONTINUE BUTTON (cost scales: 50, 100, 200) ===
            const continueCosts = [50, 100, 200];
            const continueCost = continueCosts[Math.min(gameState._continueCostMultiplier, 2)];
            const continueButtonAvailable = !won && gameState.coins >= continueCost;

            if (!won && continueButtonAvailable) {
                const contY = rwdY + 65;
                const contW = 180;
                const contH = 38;
                const contX = W / 2 - contW / 2;
                const contColor = continueButtonAvailable ? '#ff6b88' : 'rgba(100,100,100,0.4)';
                drawRoundedRect(contX, contY, contW, contH, contH / 2, contColor);
                ctx.save();
                ctx.shadowColor = '#ff6b88';
                ctx.shadowBlur = 12;
                drawRoundedRect(contX, contY, contW, contH, contH / 2, null, '#ff6b88', 2);
                ctx.restore();
                drawText('CONTINUE? 🪙' + continueCost, contX + contW / 2, contY + contH / 2, 12, '#ffffff', 'bold', false);
                window._goContButtonX = contX;
                window._goContButtonY = contY;
                window._goContButtonW = contW;
                window._goContButtonH = contH;
                window._goContButtonCost = continueCost;
            }

            // === ACTION BUTTONS ===
            const btnY = panelY + panelH - 60;
            const btnW = 110;
            const btnH = 44;
            const btnGap = 20;
            const totalBtnW = btnW * 2 + btnGap;
            const btnStartX = W / 2 - totalBtnW / 2;

            // Replay button (cyan)
            const replayX = btnStartX;
            const replayGrad = ctx.createLinearGradient(replayX, btnY, replayX, btnY + btnH);
            replayGrad.addColorStop(0, '#00e5ff');
            replayGrad.addColorStop(1, '#00b4d8');
            drawRoundedRect(replayX, btnY, btnW, btnH, btnH / 2, replayGrad);
            ctx.save();
            ctx.shadowColor = '#00e5ff';
            ctx.shadowBlur = 15;
            drawRoundedRect(replayX, btnY, btnW, btnH, btnH / 2, null, '#00e5ff', 2);
            ctx.restore();
            drawText('REPLAY', replayX + btnW / 2, btnY + btnH / 2, 13, '#ffffff', 'bold', false);

            // Menu button (purple)
            const menuX = btnStartX + btnW + btnGap;
            const menuGrad = ctx.createLinearGradient(menuX, btnY, menuX, btnY + btnH);
            menuGrad.addColorStop(0, '#cc44ff');
            menuGrad.addColorStop(1, '#9933cc');
            drawRoundedRect(menuX, btnY, btnW, btnH, btnH / 2, menuGrad);
            ctx.save();
            ctx.shadowColor = '#cc44ff';
            ctx.shadowBlur = 15;
            drawRoundedRect(menuX, btnY, btnW, btnH, btnH / 2, null, '#cc44ff', 2);
            ctx.restore();
            drawText('MENU', menuX + btnW / 2, btnY + btnH / 2, 13, '#ffffff', 'bold', false);
        }
