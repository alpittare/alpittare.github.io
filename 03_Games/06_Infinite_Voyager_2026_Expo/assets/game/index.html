    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            position: fixed;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        canvas {
            display: block;
            background: #001a2e;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            image-rendering: crisp-edges;
        }
        #error-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(200, 0, 0, 0.8);
            color: white;
            font-size: 14px;
            padding: 20px;
            overflow: auto;
            z-index: 10000;
            display: none;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>

        // ============================================
        // Phase 3: Campaign System
        // ============================================

        const GAME_LEVELS = (() => {
            const levels = [];
            for (let i = 0; i < 100; i++) {
                const levelNum = i + 1;
                const isBoss = levelNum % 25 === 0;
                const isMilestone = levelNum % 10 === 0;
                levels.push({
                    level: levelNum,
                    isBoss,
                    isMilestone,
                    targetDistance: 2 + i * 0.3 + (isBoss ? 3 : 0),
                    maxTime: 60 + i * 2,
                    coinReward: 10 + i * 3 + (isBoss ? 50 : 0),
                    starsRequired: isBoss ? 2 : 1,
                });
            }
            return levels;
        })();

        function getCampaignDifficulty(levelNum) {
            if (levelNum <= 10) return 'easy';
            if (levelNum <= 30) return 'medium';
            if (levelNum <= 60) return 'hard';
            return 'legend';
        }

        // Check and unlock next phase if current phase is complete
        function updatePhaseProgress() {
            for (let p = 0; p < 4; p++) {
                const [start, end] = PHASE_RANGES[p];
                let phaseComplete = true;
                for (let lvl = start; lvl <= end; lvl++) {
                    if ((gameState.levelStars[lvl] || 0) === 0) {
                        phaseComplete = false;
                        break;
                    }
                }
                if (phaseComplete && p < 3) {
                    gameState.phasesUnlocked[p + 1] = true;
                }
            }
        }

        const PHASE_NAMES = ['Inner Solar', 'Asteroid Belt', 'Outer Reaches', 'Deep Space'];
        const PHASE_RANGES = [[1, 25], [26, 50], [51, 75], [76, 100]];

        // ============================================
        // Phase 4: Progression Systems
        // ============================================

        const SHOP_SKINS = [
            { id: 'default', name: 'Voyager Mk-I', cost: 0, levelReq: 1, desc: 'The trusty explorer that started it all. Balanced thrust and agility.', rarity: 'COMMON', color: '#4488cc' },
            { id: 'neon', name: 'Neon Striker', cost: 200, levelReq: 3, desc: 'Built for speed junkies. Neon-lit edges cut through dark matter like butter.', rarity: 'RARE', color: '#00ffff' },
            { id: 'solar', name: 'Solar Phoenix', cost: 500, levelReq: 5, desc: 'Forged in a dying star. Its solar wings burn brighter the faster you fly.', rarity: 'EPIC', color: '#ff6600' },
            { id: 'stealth', name: 'Shadow Blade', cost: 800, levelReq: 8, desc: 'Invisible to alien scanners. Whisper-quiet engines leave no trace.', rarity: 'EPIC', color: '#8844aa' },
            { id: 'aurora', name: 'Aurora Sentinel', cost: 1200, levelReq: 12, desc: 'Ancient tech from a lost civilization. Channels cosmic energy through crystalline armor.', rarity: 'LEGENDARY', color: '#00ff88' },
        ];

        // Ship drawing functions — each skin gets a unique detailed spaceship
        function drawShipSkin(ctx, skinId, scale) {
            const s = scale || 1;
            switch (skinId) {
                case 'default': drawShip_Voyager(ctx, s); break;
                case 'neon': drawShip_Neon(ctx, s); break;
                case 'solar': drawShip_Phoenix(ctx, s); break;
                case 'stealth': drawShip_Shadow(ctx, s); break;
                case 'aurora': drawShip_Aurora(ctx, s); break;
                default: drawShip_Voyager(ctx, s);
            }
        }

        // SHIP 1: Voyager Mk-I — classic pointed spacecraft with fins and cockpit
        function drawShip_Voyager(ctx, s) {
            // Main fuselage
            ctx.fillStyle = '#4488cc';
            ctx.beginPath();
            ctx.moveTo(0, -20 * s);
            ctx.lineTo(6 * s, -8 * s);
            ctx.lineTo(7 * s, 10 * s);
            ctx.lineTo(4 * s, 16 * s);
            ctx.lineTo(-4 * s, 16 * s);
            ctx.lineTo(-7 * s, 10 * s);
            ctx.lineTo(-6 * s, -8 * s);
            ctx.closePath();
            ctx.fill();
            // Nose highlight
            ctx.fillStyle = '#66bbee';
            ctx.beginPath();
            ctx.moveTo(0, -20 * s);
            ctx.lineTo(3 * s, -10 * s);
            ctx.lineTo(-3 * s, -10 * s);
            ctx.closePath();
            ctx.fill();
            // Left wing
            ctx.fillStyle = '#336699';
            ctx.beginPath();
            ctx.moveTo(-7 * s, 4 * s);
            ctx.lineTo(-16 * s, 14 * s);
            ctx.lineTo(-14 * s, 18 * s);
            ctx.lineTo(-5 * s, 12 * s);
            ctx.closePath();
            ctx.fill();
            // Right wing
            ctx.beginPath();
            ctx.moveTo(7 * s, 4 * s);
            ctx.lineTo(16 * s, 14 * s);
            ctx.lineTo(14 * s, 18 * s);
            ctx.lineTo(5 * s, 12 * s);
            ctx.closePath();
            ctx.fill();
            // Cockpit window
            ctx.fillStyle = '#aaeeff';
            ctx.beginPath();
            ctx.arc(0, -6 * s, 3 * s, 0, Math.PI * 2);
            ctx.fill();
            // Engine nozzles
            ctx.fillStyle = '#ff6600';
            ctx.globalAlpha = 0.8;
            ctx.fillRect(-3 * s, 16 * s, 2.5 * s, 3 * s);
            ctx.fillRect(0.5 * s, 16 * s, 2.5 * s, 3 * s);
            ctx.globalAlpha = 1;
        }

        // SHIP 2: Neon Striker — sleek racing ship with glowing edges
        function drawShip_Neon(ctx, s) {
            // Body
            ctx.fillStyle = '#111133';
            ctx.beginPath();
            ctx.moveTo(0, -22 * s);
            ctx.lineTo(5 * s, -6 * s);
            ctx.lineTo(8 * s, 8 * s);
            ctx.lineTo(3 * s, 18 * s);
            ctx.lineTo(-3 * s, 18 * s);
            ctx.lineTo(-8 * s, 8 * s);
            ctx.lineTo(-5 * s, -6 * s);
            ctx.closePath();
            ctx.fill();
            // Neon outline
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 1.5 * s;
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 8 * s;
            ctx.stroke();
            ctx.shadowBlur = 0;
            // Wing stripes
            ctx.strokeStyle = '#ff00ff';
            ctx.lineWidth = 1 * s;
            ctx.shadowColor = '#ff00ff';
            ctx.shadowBlur = 5 * s;
            ctx.beginPath();
            ctx.moveTo(-8 * s, 8 * s); ctx.lineTo(-15 * s, 16 * s);
            ctx.moveTo(8 * s, 8 * s); ctx.lineTo(15 * s, 16 * s);
            ctx.stroke();
            ctx.shadowBlur = 0;
            // Cockpit
            ctx.fillStyle = '#00ffcc';
            ctx.globalAlpha = 0.7;
            ctx.beginPath();
            ctx.ellipse(0, -8 * s, 2 * s, 4 * s, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            // Engine
            ctx.fillStyle = '#00ffff';
            ctx.globalAlpha = 0.9;
            ctx.fillRect(-2 * s, 18 * s, 4 * s, 4 * s);
            ctx.globalAlpha = 1;
        }

        // SHIP 3: Solar Phoenix — wide wings with fiery accents
        function drawShip_Phoenix(ctx, s) {
            // Main body
            ctx.fillStyle = '#cc4400';
            ctx.beginPath();
            ctx.moveTo(0, -18 * s);
            ctx.lineTo(5 * s, -4 * s);
            ctx.lineTo(6 * s, 12 * s);
            ctx.lineTo(-6 * s, 12 * s);
            ctx.lineTo(-5 * s, -4 * s);
            ctx.closePath();
            ctx.fill();
            // Left flame wing
            ctx.fillStyle = '#ff6600';
            ctx.beginPath();
            ctx.moveTo(-5 * s, 0);
            ctx.lineTo(-20 * s, 10 * s);
            ctx.lineTo(-18 * s, 16 * s);
            ctx.lineTo(-12 * s, 12 * s);
            ctx.lineTo(-6 * s, 14 * s);
            ctx.closePath();
            ctx.fill();
            // Right flame wing
            ctx.beginPath();
            ctx.moveTo(5 * s, 0);
            ctx.lineTo(20 * s, 10 * s);
            ctx.lineTo(18 * s, 16 * s);
            ctx.lineTo(12 * s, 12 * s);
            ctx.lineTo(6 * s, 14 * s);
            ctx.closePath();
            ctx.fill();
            // Wing tips — bright orange
            ctx.fillStyle = '#ffaa00';
            ctx.beginPath();
            ctx.moveTo(-18 * s, 12 * s); ctx.lineTo(-22 * s, 18 * s); ctx.lineTo(-16 * s, 15 * s);
            ctx.closePath(); ctx.fill();
            ctx.beginPath();
            ctx.moveTo(18 * s, 12 * s); ctx.lineTo(22 * s, 18 * s); ctx.lineTo(16 * s, 15 * s);
            ctx.closePath(); ctx.fill();
            // Cockpit — golden
            ctx.fillStyle = '#ffdd44';
            ctx.beginPath();
            ctx.arc(0, -6 * s, 3 * s, 0, Math.PI * 2);
            ctx.fill();
            // Engine fire
            ctx.fillStyle = '#ff3300';
            ctx.globalAlpha = 0.8;
            ctx.beginPath();
            ctx.moveTo(-3 * s, 12 * s); ctx.lineTo(0, 22 * s); ctx.lineTo(3 * s, 12 * s);
            ctx.closePath(); ctx.fill();
            ctx.globalAlpha = 1;
        }

        // SHIP 4: Shadow Blade — angular stealth bomber, dark with purple accents
        function drawShip_Shadow(ctx, s) {
            // Main body — angular
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.moveTo(0, -22 * s);
            ctx.lineTo(4 * s, -10 * s);
            ctx.lineTo(18 * s, 6 * s);
            ctx.lineTo(12 * s, 10 * s);
            ctx.lineTo(4 * s, 8 * s);
            ctx.lineTo(2 * s, 16 * s);
            ctx.lineTo(-2 * s, 16 * s);
            ctx.lineTo(-4 * s, 8 * s);
            ctx.lineTo(-12 * s, 10 * s);
            ctx.lineTo(-18 * s, 6 * s);
            ctx.lineTo(-4 * s, -10 * s);
            ctx.closePath();
            ctx.fill();
            // Edges highlight
            ctx.strokeStyle = '#7733aa';
            ctx.lineWidth = 1 * s;
            ctx.stroke();
            // Center spine
            ctx.strokeStyle = '#9944cc';
            ctx.lineWidth = 1.5 * s;
            ctx.beginPath();
            ctx.moveTo(0, -22 * s); ctx.lineTo(0, 16 * s);
            ctx.stroke();
            // Engine — purple
            ctx.fillStyle = '#aa44ff';
            ctx.globalAlpha = 0.7;
            ctx.beginPath();
            ctx.moveTo(-2 * s, 16 * s); ctx.lineTo(0, 22 * s); ctx.lineTo(2 * s, 16 * s);
            ctx.closePath(); ctx.fill();
            ctx.globalAlpha = 1;
        }

        // SHIP 5: Aurora Sentinel — rounded organic shape with shield-like rings
        function drawShip_Aurora(ctx, s) {
            // Central body — rounded
            ctx.fillStyle = '#225566';
            ctx.beginPath();
            ctx.ellipse(0, 0, 7 * s, 16 * s, 0, 0, Math.PI * 2);
            ctx.fill();
            // Outer ring 1
            ctx.strokeStyle = '#00ffaa';
            ctx.lineWidth = 1.5 * s;
            ctx.globalAlpha = 0.5;
            ctx.beginPath();
            ctx.ellipse(0, 2 * s, 14 * s, 10 * s, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.globalAlpha = 1;
            // Outer ring 2
            ctx.strokeStyle = '#44ffcc';
            ctx.lineWidth = 1 * s;
            ctx.globalAlpha = 0.3;
            ctx.beginPath();
            ctx.ellipse(0, 2 * s, 18 * s, 12 * s, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.globalAlpha = 1;
            // Inner panels
            ctx.fillStyle = '#33aa88';
            ctx.beginPath();
            ctx.moveTo(-5 * s, -10 * s); ctx.lineTo(-12 * s, 2 * s); ctx.lineTo(-5 * s, 6 * s);
            ctx.closePath(); ctx.fill();
            ctx.beginPath();
            ctx.moveTo(5 * s, -10 * s); ctx.lineTo(12 * s, 2 * s); ctx.lineTo(5 * s, 6 * s);
            ctx.closePath(); ctx.fill();
            // Nose
            ctx.fillStyle = '#66ffcc';
            ctx.beginPath();
            ctx.arc(0, -12 * s, 3 * s, 0, Math.PI * 2);
            ctx.fill();
            // Core glow
            const grd = ctx.createRadialGradient(0, 0, 2 * s, 0, 0, 8 * s);
            grd.addColorStop(0, 'rgba(100, 255, 200, 0.4)');
            grd.addColorStop(1, 'rgba(100, 255, 200, 0)');
            ctx.fillStyle = grd;
            ctx.beginPath();
            ctx.arc(0, 0, 8 * s, 0, Math.PI * 2);
            ctx.fill();
            // Engine
            ctx.fillStyle = '#00ffaa';
            ctx.globalAlpha = 0.8;
            ctx.beginPath();
            ctx.moveTo(-3 * s, 14 * s); ctx.lineTo(0, 21 * s); ctx.lineTo(3 * s, 14 * s);
            ctx.closePath(); ctx.fill();
            ctx.globalAlpha = 1;
        }

        const SHOP_THEMES = [

            { id: 'shield_start', name: 'Shield Start', cost: 75, icon: '🛡', desc: 'Shield active for first 10s', color: '#00ccff' },

        // ============================================

        // ============================================
        const ENCOUNTER_TYPES = {

            distress_signal: { name: 'Distress Signal', weight: 0.25 },

        function clamp(v, min, max) {
            return Math.min(max, Math.max(min, v));
        }

        function lerp(a, b, t) {
            return a + (b - a) * t;
        }

        function distance(x1, y1, x2, y2) {
            const dx = x2 - x1, dy = y2 - y1;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function distanceToLineSegment(px, py, x1, y1, x2, y2) {
            const dx = x2 - x1, dy = y2 - y1;
            let t = ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy);
            t = clamp(t, 0, 1);
            const closestX = x1 + t * dx;
            const closestY = y1 + t * dy;
            return distance(px, py, closestX, closestY);
        }

        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function getRandomChoice(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function fitCanvas() {
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const scale = Math.min(vw / DESIGN_WIDTH, vh / DESIGN_HEIGHT);
            canvas.width = DESIGN_WIDTH;
            canvas.height = DESIGN_HEIGHT;
            canvas.style.width = (DESIGN_WIDTH * scale) + 'px';
            canvas.style.height = (DESIGN_HEIGHT * scale) + 'px';
        }

        function screenToGame(screenX, screenY) {
            const rect = canvas.getBoundingClientRect();
            const x = (screenX - rect.left) * (DESIGN_WIDTH / rect.width);
            const y = (screenY - rect.top) * (DESIGN_HEIGHT / rect.height);
            return { x, y };
        }

        function drawRoundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function drawButton(x, y, w, h, label, hover = false, pulse = false) {
            let scale = 1;
            if (pulse) {
                scale = 1 + Math.sin(animationTime * 4) * 0.05;
                const cx = x + w / 2;
                const cy = y + h / 2;
                x = cx - (w * scale) / 2;
                y = cy - (h * scale) / 2;
                w *= scale;
                h *= scale;
            }
            const bgColor = hover ? COLORS.ui : '#003366';
            ctx.fillStyle = bgColor;
            drawRoundRect(x, y, w, h, 8);
            ctx.fill();
            ctx.strokeStyle = COLORS.ui;
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = COLORS.text;
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(label, x + w / 2, y + h / 2);
        }

            playThrust() {
                if (this._muted) return;
                const now = Date.now();
                if (now - this.lastThrustTime < 500) return;
                this.lastThrustTime = now;

                const ctx = this.audioContext;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                const filter = ctx.createBiquadFilter();

                osc.type = 'sawtooth';
                osc.frequency.value = 80;
                filter.type = 'lowpass';
                filter.frequency.value = 120;

                gain.gain.setValueAtTime(0.05, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);

                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.1);

        class ParticlePool {
            constructor(max = 250) {
                this.pool = [];
                this.max = max;
                for (let i = 0; i < max; i++) {
                    this.pool.push({
                        _active: false,
                        x: 0,
                        y: 0,
                        vx: 0,
                        vy: 0,
                        life: 0,
                        maxLife: 1,
                        size: 2,
                        color: '#fff',
                        alpha: 1,
                        type: 'circle'
                    });
                }
            }

            spawn(x, y, vx, vy, life, color, size = 2, type = 'circle') {
                for (let i = 0; i < this.pool.length; i++) {
                    const p = this.pool[i];
                    if (!p._active) {
                        p._active = true;
                        p.x = x;
                        p.y = y;
                        p.vx = vx;
                        p.vy = vy;
                        p.life = life;
                        p.maxLife = life;
                        p.color = color;
                        p.size = size;
                        p.type = type;
                        p.alpha = 1;
                        return;
                    }
                }
            }

            spawnBurst(x, y, count, color, speed, life, size = 3) {
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 * i) / count;
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    this.spawn(x, y, vx, vy, life, color, size, 'circle');
                }
            }

            update(dt) {
                for (let i = 0; i < this.pool.length; i++) {
                    const p = this.pool[i];
                    if (p._active) {
                        p.x += p.vx * dt;
                        p.y += p.vy * dt;
                        p.vy += 100 * dt;
                        p.life -= dt;
                        p.alpha = Math.max(0, p.life / p.maxLife);
                        if (p.life <= 0) {
                            p._active = false;
                        }
                    }
                }
            }

            draw(ctx) {
                for (let i = 0; i < this.pool.length; i++) {
                    const p = this.pool[i];
                    if (p._active) {
                        ctx.globalAlpha = p.alpha;
                        ctx.fillStyle = p.color;
                        if (p.type === 'circle') {
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }
                ctx.globalAlpha = 1;
            }
        }

        function startTransition(callback) {
            transition.active = true;
            transition.alpha = 0;
            transition.direction = 'out';
            transition.callback = callback;
        }

        function updateTransition(dt) {
            if (!transition.active) return;
            const step = transition.speed * dt;
            if (transition.direction === 'out') {
                transition.alpha += step;
                if (transition.alpha >= 1) {
                    transition.alpha = 1;
                    transition.direction = 'in';
                    if (transition.callback) transition.callback();
                }
            } else {
                transition.alpha -= step;
                if (transition.alpha <= 0) {
                    transition.alpha = 0;
                    transition.active = false;
                }
            }
        }

        function drawTransition(ctx) {
            if (transition.alpha > 0) {
                ctx.fillStyle = 'rgba(0, 0, 0, ' + transition.alpha + ')';
                ctx.fillRect(0, 0, DESIGN_WIDTH, DESIGN_HEIGHT);
            }
        }

        class Ship {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.angle = 0;
                this.targetAngle = 0;
                this.thrust = 0;
                this.radius = SHIP_RADIUS;
                this.trail = [];
            }

            update(dt) {
                // Full directional finger-follow (X and Y)
                const targetX = gameRuntime.mouseX;
                const targetY = gameRuntime.mouseY;
                const prevX = this.x;
                this.x = lerp(this.x, targetX, 0.10);
                this.y = lerp(this.y, targetY, 0.10);

                // Tilt angle based on horizontal movement
                const dx = this.x - prevX;
                this.targetAngle = clamp(dx * 0.08, -Math.PI * 0.25, Math.PI * 0.25);
                this.angle = lerp(this.angle, this.targetAngle, 0.15);

                // Solar sail physics — thrust drives forward speed
                const distAU = gameRuntime.distance / 150;
                const solarPower = BASE_SOLAR_POWER / Math.max(1, distAU * distAU);
                const sailBonus = gameState.upgrades.sail * 0.1 + 1;
                let thrustMult = 1.0;
                // Solar flare doubles thrust
                if (gameRuntime.activeEncounter && gameRuntime.activeEncounter.type === 'solar_flare') {
                    thrustMult = 2.0;
                }
                this.thrust = solarPower * sailBonus * thrustMult;

                // Battery upgrade: +15% recharge per level
                const batteryBonus = gameState.upgrades.battery * 0.15 + 1;
                gameRuntime.energy.recharge = (SOLAR_RECHARGE_BASE / Math.max(1, distAU * distAU)) * batteryBonus;

                // Forward velocity (auto-flies forward, thrust controls speed)
                const forwardSpeed = BASE_SPEED + this.thrust * 0.5;
                gameRuntime.velocity = lerp(gameRuntime.velocity, forwardSpeed, 0.05);
                gameRuntime.distance += gameRuntime.velocity * dt * 0.01;

                // Thrust particles
                if (this.thrust > 5) {
                    audioManager.playThrust();
                    if (Math.random() < 0.6) {
                        particles.spawn(this.x, this.y + 18, (Math.random() - 0.5) * 30, 60 + Math.random() * 40, 0.4, '#ff8800', 2, 'circle');
                    }
                    if (Math.random() < 0.3) {
                        particles.spawn(this.x, this.y + 18, (Math.random() - 0.5) * 15, 50 + Math.random() * 30, 0.3, '#ffcc44', 1.5, 'circle');
                    }
                }

                this.trail.push({ x: this.x, y: this.y, life: 0.5 });
                if (this.trail.length > 50) this.trail.shift();
                this.trail.forEach(t => t.life -= dt);
                this.trail = this.trail.filter(t => t.life > 0);

                // Clamp within screen bounds
                this.x = clamp(this.x, this.radius, DESIGN_WIDTH - this.radius);
                this.y = clamp(this.y, this.radius + 120, DESIGN_HEIGHT - this.radius - 20);
            }

            draw() {
                // Dynamic engine glow that scales with velocity
                if (this.thrust > 5) {
                    const velocityFactor = Math.min(1, gameRuntime.velocity / 150);
                    const glowSize = 35 + velocityFactor * 30;
                    const glowOpacity = 0.25 + velocityFactor * 0.35;

                    const glowGrad = ctx.createRadialGradient(this.x, this.y + 22, 4, this.x, this.y + 22, glowSize);
                    glowGrad.addColorStop(0, 'rgba(255, 136, 0, ' + glowOpacity + ')');
                    glowGrad.addColorStop(0.5, 'rgba(255, 80, 0, ' + (glowOpacity * 0.3) + ')');
                    glowGrad.addColorStop(1, 'rgba(255, 80, 0, 0)');
                    ctx.fillStyle = glowGrad;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y + 22, glowSize, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Trail
                ctx.strokeStyle = '#00aaff';
                ctx.lineWidth = 1.5;
                for (let i = 0; i < this.trail.length - 1; i++) {
                    const t = this.trail[i];
                    ctx.globalAlpha = t.life * 0.4;
                    ctx.beginPath();
                    ctx.moveTo(t.x, t.y);
                    ctx.lineTo(this.trail[i + 1].x, this.trail[i + 1].y);
                    ctx.stroke();
                }
                ctx.globalAlpha = 1;

                // Wing-tip particle trails
                if (this.thrust > 5) {
                    const velocityFactor = Math.min(1, gameRuntime.velocity / 150);
                    if (Math.random() < velocityFactor * 0.7) {
                        // Left wing trail
                        particles.spawn(this.x - 8, this.y + 12, -10 - Math.random() * 20, 40 + Math.random() * 30, 0.3, '#00ccff', 1.5, 'circle');
                        // Right wing trail
                        particles.spawn(this.x + 8, this.y + 12, 10 + Math.random() * 20, 40 + Math.random() * 30, 0.3, '#00ccff', 1.5, 'circle');
                    }
                }

                // Draw the ship using equipped skin
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle); // tilt only, ship faces UP by default
                drawShipSkin(ctx, gameState.equippedSkin, 1);
                ctx.restore();

                // Animated shield with rotating hexagon pattern
                if (gameRuntime.shield.active) {
                    ctx.strokeStyle = COLORS.shield;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 8, 0, Math.PI * 2);
                    ctx.stroke();

                    // Pulsing rings effect
                    const pulsePhase = animationTime * 3;
                    const ringCount = 3;
                    for (let r = 0; r < ringCount; r++) {
                        const ringRadius = this.radius + 12 + r * 6;
                        const ringAlpha = Math.sin(pulsePhase - r * Math.PI / ringCount) * 0.3 + 0.2;
                        ctx.globalAlpha = Math.max(0, ringAlpha);
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, ringRadius, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                    ctx.globalAlpha = 1;
                }

                // Surge mode with electric arc effects
                if (gameRuntime.surge.active) {
                    ctx.strokeStyle = COLORS.surge[gameRuntime.surge.tier];
                    ctx.lineWidth = 3;
                    ctx.globalAlpha = 0.7;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 15, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = 1;

                    // Electric arcs around ship
                    const arcCount = 4;
                    for (let a = 0; a < arcCount; a++) {
                        const angle = (a / arcCount) * Math.PI * 2 + animationTime * 2;
                        const x1 = this.x + Math.cos(angle) * (this.radius + 12);
                        const y1 = this.y + Math.sin(angle) * (this.radius + 12);
                        const nextAngle = angle + (Math.PI * 2 / arcCount);
                        const x2 = this.x + Math.cos(nextAngle) * (this.radius + 12);
                        const y2 = this.y + Math.sin(nextAngle) * (this.radius + 12);

                        ctx.strokeStyle = COLORS.surge[gameRuntime.surge.tier];
                        ctx.globalAlpha = Math.sin(animationTime * 6 + a) * 0.5 + 0.3;
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        // Zigzag path for electric effect
                        const midX = (x1 + x2) / 2 + (Math.random() - 0.5) * 8;
                        const midY = (y1 + y2) / 2 + (Math.random() - 0.5) * 8;
                        ctx.quadraticCurveTo(midX, midY, x2, y2);
                        ctx.stroke();
                    }
                    ctx.globalAlpha = 1;
                }
            }
        }

        // ============================================
        // Obstacle Pool
        // ============================================

        class ObstaclePool {
            constructor(maxObstacles = 100) {
                this.pool = [];
                for (let i = 0; i < maxObstacles; i++) {
                    this.pool.push({
                        _active: false,
                        x: 0,
                        y: 0,
                        vx: 0,
                        vy: 0,
                        type: 'asteroid',
                        radius: 15,
                        life: 1,
                    });
                }
            }

            spawn(x, y, type) {
                for (let i = 0; i < this.pool.length; i++) {
                    if (!this.pool[i]._active) {
                        const obj = this.pool[i];
                        obj._active = true;
                        obj.x = x;
                        obj.y = y;
                        obj.vx = getRandomInt(-30, 30);
                        // Obstacle speed scales with ship velocity for visual sync and difficulty
                        const diffMultipliers = { easy: 0.6, medium: 1.0, hard: 1.4, legend: 2.0 };
                        const diffMult = diffMultipliers[gameState.settings.difficulty] || 1.0;
                        const baseVy = (100 + gameRuntime.velocity * 1.2) * diffMult;
                        obj.vy = baseVy + getRandomInt(-20, 40);
                        obj.type = type;
                        obj.radius = type === 'storm' ? 12 : (type === 'powerup' ? 18 : 15);
                        obj.life = 0; // age counter: 0 = just spawned
                        return obj;
                    }
                }
                return null;
            }

            update(dt) {
                for (let i = 0; i < this.pool.length; i++) {
                    const obj = this.pool[i];
                    if (!obj._active) continue;

                    obj.x += obj.vx * dt;
                    obj.y += obj.vy * dt;
                    obj.vy += 30 * dt; // gentle acceleration
                    // life tracks age for visual fade-in only (no decay-based despawn)
                    obj.life += dt;

                    if (obj.y > DESIGN_HEIGHT + 50 || obj.x < -60 || obj.x > DESIGN_WIDTH + 60) {
                        obj._active = false;
                        // AI Director: obstacle went off-screen = dodged
                        gameRuntime.aiDirector.totalObstaclesPassed++;
                        if (obj.type !== 'storm' && obj.type !== 'powerup') {
                            gameRuntime.aiDirector.totalObstaclesDodged++;
                        }
                    }
                }
            }

            draw() {
                for (let i = 0; i < this.pool.length; i++) {
                    const obj = this.pool[i];
                    if (!obj._active) continue;
                    // Fade-in over 0.5s (life = age in seconds)
                    ctx.globalAlpha = Math.min(1, obj.life * 2);

                    if (obj.type === 'asteroid') {
                        // DANGER — jagged brown rock with rotating animation and outer glow ring
                        const glow = ctx.createRadialGradient(obj.x, obj.y, obj.radius * 0.5, obj.x, obj.y, obj.radius * 2.5);
                        glow.addColorStop(0, 'rgba(255, 80, 50, 0.2)');
                        glow.addColorStop(0.6, 'rgba(255, 50, 50, 0.08)');
                        glow.addColorStop(1, 'rgba(255, 50, 50, 0)');
                        ctx.fillStyle = glow;
                        ctx.beginPath();
                        ctx.arc(obj.x, obj.y, obj.radius * 2.5, 0, Math.PI * 2);
                        ctx.fill();

                        // Outer glow ring
                        ctx.strokeStyle = 'rgba(255, 100, 80, 0.4)';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(obj.x, obj.y, obj.radius * 2, 0, Math.PI * 2);
                        ctx.stroke();

                        // Jagged rock shape with rotation
                        ctx.save();
                        ctx.translate(obj.x, obj.y);
                        ctx.rotate(animationTime * 0.8); // rotating effect
                        ctx.fillStyle = '#8b6914';
                        ctx.beginPath();
                        const sides = 7;
                        for (let s = 0; s < sides; s++) {
                            const a = (s / sides) * Math.PI * 2;
                            const r = obj.radius * (0.7 + Math.sin(s * 3.7) * 0.3);
                            const px = Math.cos(a) * r;
                            const py = Math.sin(a) * r;
                            s === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                        }
                        ctx.closePath();
                        ctx.fill();
                        ctx.strokeStyle = '#aa8820';
                        ctx.lineWidth = 1;
                        ctx.stroke();

                        // Surface detail lines
                        ctx.strokeStyle = 'rgba(170, 136, 32, 0.6)';
                        ctx.lineWidth = 1;
                        for (let d = 0; d < 3; d++) {
                            const a = (d / 3) * Math.PI * 2;
                            ctx.beginPath();
                            ctx.moveTo(0, 0);
                            ctx.lineTo(Math.cos(a) * obj.radius * 0.9, Math.sin(a) * obj.radius * 0.9);
                            ctx.stroke();
                        }

                        // Danger icon: red X
                        ctx.strokeStyle = '#ff3333';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(-5, -5); ctx.lineTo(5, 5);
                        ctx.moveTo(5, -5); ctx.lineTo(-5, 5);
                        ctx.stroke();
                        ctx.restore();

                    } else if (obj.type === 'debris') {
                        // MINOR DAMAGE — metallic fragments with tumbling rotation and sheen effect
                        ctx.save();
                        ctx.translate(obj.x, obj.y);
                        ctx.rotate(animationTime * 4); // faster tumbling rotation

                        // Metallic sheen effect
                        const shineGrad = ctx.createLinearGradient(-obj.radius * 0.6, -obj.radius * 0.4, obj.radius * 0.6, obj.radius * 0.4);
                        shineGrad.addColorStop(0, 'rgba(200, 200, 200, 0.4)');
                        shineGrad.addColorStop(0.5, 'rgba(100, 100, 100, 0)');
                        shineGrad.addColorStop(1, 'rgba(150, 150, 150, 0.2)');

                        // Main fragment
                        ctx.fillStyle = '#777';
                        ctx.fillRect(-obj.radius * 0.6, -obj.radius * 0.4, obj.radius * 1.2, obj.radius * 0.8);
                        ctx.fillStyle = shineGrad;
                        ctx.fillRect(-obj.radius * 0.6, -obj.radius * 0.4, obj.radius * 1.2, obj.radius * 0.8);

                        // Secondary fragment
                        ctx.fillStyle = '#999';
                        ctx.fillRect(-obj.radius * 0.3, -obj.radius * 0.7, obj.radius * 0.6, obj.radius * 0.4);
                        ctx.fillStyle = shineGrad;
                        ctx.fillRect(-obj.radius * 0.3, -obj.radius * 0.7, obj.radius * 0.6, obj.radius * 0.4);

                        ctx.restore();

                        // Caution: orange outline with glow
                        const glowDebris = ctx.createRadialGradient(obj.x, obj.y, obj.radius, obj.x, obj.y, obj.radius + 4);
                        glowDebris.addColorStop(0, 'rgba(255, 165, 0, 0.2)');
                        glowDebris.addColorStop(1, 'rgba(255, 165, 0, 0)');
                        ctx.fillStyle = glowDebris;
                        ctx.beginPath();
                        ctx.arc(obj.x, obj.y, obj.radius + 4, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.strokeStyle = 'rgba(255, 165, 0, 0.6)';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.arc(obj.x, obj.y, obj.radius + 3, 0, Math.PI * 2);
                        ctx.stroke();

                    } else if (obj.type === 'radiation') {
                        // DAMAGE — pulsing green glow with animated expanding rings
                        const pulse = 0.8 + Math.sin(animationTime * 3) * 0.2;
                        const glow2 = ctx.createRadialGradient(obj.x, obj.y, 2, obj.x, obj.y, obj.radius * 2 * pulse);
                        glow2.addColorStop(0, 'rgba(0, 255, 0, 0.7)');
                        glow2.addColorStop(0.5, 'rgba(0, 255, 0, 0.2)');
                        glow2.addColorStop(1, 'rgba(0, 255, 0, 0)');
                        ctx.fillStyle = glow2;
                        ctx.beginPath();
                        ctx.arc(obj.x, obj.y, obj.radius * 2 * pulse, 0, Math.PI * 2);
                        ctx.fill();

                        // Animated expanding rings
                        const ringCount = 3;
                        for (let r = 0; r < ringCount; r++) {
                            const ringPhase = (animationTime * 2 - r * 0.5) % (Math.PI * 2);
                            const ringRadius = obj.radius * 0.8 + Math.sin(ringPhase) * obj.radius * 0.5;
                            const ringAlpha = Math.abs(Math.sin(ringPhase)) * 0.5;
                            ctx.strokeStyle = 'rgba(0, 255, 100, ' + ringAlpha + ')';
                            ctx.lineWidth = 1.5;
                            ctx.beginPath();
                            ctx.arc(obj.x, obj.y, ringRadius, 0, Math.PI * 2);
                            ctx.stroke();
                        }

                        // Radiation trefoil with rotation
                        ctx.save();
                        ctx.translate(obj.x, obj.y);
                        ctx.rotate(animationTime * 1.5);
                        ctx.fillStyle = '#00ff00';
                        for (let s = 0; s < 3; s++) {
                            const a = (s / 3) * Math.PI * 2 - Math.PI / 2;
                            ctx.beginPath();
                            ctx.arc(Math.cos(a) * 6, Math.sin(a) * 6, 4, 0, Math.PI * 2);
                            ctx.fill();
                        }
                        ctx.restore();

                        // Hazard symbol
                        ctx.strokeStyle = 'rgba(255, 50, 50, 0.7)';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(obj.x, obj.y, obj.radius + 5, 0, Math.PI * 2);
                        ctx.stroke();

                    } else if (obj.type === 'storm') {
                        // COLLECT — golden energy orb with golden particle trail and animated lightning arcs
                        const glow3 = ctx.createRadialGradient(obj.x, obj.y, 3, obj.x, obj.y, obj.radius * 3);
                        glow3.addColorStop(0, 'rgba(255, 220, 0, 0.6)');
                        glow3.addColorStop(0.4, 'rgba(255, 200, 0, 0.2)');
                        glow3.addColorStop(1, 'rgba(255, 220, 0, 0)');
                        ctx.fillStyle = glow3;
                        ctx.beginPath();
                        ctx.arc(obj.x, obj.y, obj.radius * 3, 0, Math.PI * 2);
                        ctx.fill();

                        // Golden particle trail
                        if (Math.random() < 0.6) {
                            particles.spawn(obj.x + (Math.random() - 0.5) * 6, obj.y + (Math.random() - 0.5) * 6,
                                           (Math.random() - 0.5) * 20, (Math.random() - 0.5) * 20, 0.3, '#ffdd00', 1.5, 'circle');
                        }

                        // Animated lightning arcs
                        const arcCount = 3;
                        for (let a = 0; a < arcCount; a++) {
                            const angle = (a / arcCount) * Math.PI * 2 + animationTime * 1.2;
                            const x1 = obj.x + Math.cos(angle) * obj.radius;
                            const y1 = obj.y + Math.sin(angle) * obj.radius;
                            const nextAngle = angle + (Math.PI * 2 / arcCount);
                            const x2 = obj.x + Math.cos(nextAngle) * obj.radius;
                            const y2 = obj.y + Math.sin(nextAngle) * obj.radius;

                            ctx.strokeStyle = 'rgba(255, 220, 0, ' + (Math.sin(animationTime * 5 + a) * 0.3 + 0.4) + ')';
                            ctx.lineWidth = 1.5;
                            ctx.beginPath();
                            ctx.moveTo(x1, y1);
                            const midX = (x1 + x2) / 2 + (Math.random() - 0.5) * 6;
                            const midY = (y1 + y2) / 2 + (Math.random() - 0.5) * 6;
                            ctx.quadraticCurveTo(midX, midY, x2, y2);
                            ctx.stroke();
                        }

                        // Golden core with sparkle
                        ctx.fillStyle = '#ffdd00';
                        ctx.beginPath();
                        ctx.arc(obj.x, obj.y, obj.radius * 0.9, 0, Math.PI * 2);
                        ctx.fill();

                        // Animated sparkle
                        const sparkleOffset = Math.sin(animationTime * 4) * 4;
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(obj.x - 3 + sparkleOffset, obj.y - 3 + sparkleOffset, 2.5, 0, Math.PI * 2);
                        ctx.fill();

                        // Plus sign — collect indicator (bobbing animation)
                        const bobOffset = Math.sin(animationTime * 3) * 3;
                        ctx.strokeStyle = '#00ff88';
                        ctx.lineWidth = 2.5;
                        ctx.beginPath();
                        ctx.moveTo(obj.x, obj.y - obj.radius - 6 - bobOffset);
                        ctx.lineTo(obj.x, obj.y - obj.radius - 12 - bobOffset);
                        ctx.moveTo(obj.x - 3, obj.y - obj.radius - 9 - bobOffset);
                        ctx.lineTo(obj.x + 3, obj.y - obj.radius - 9 - bobOffset);
                        ctx.stroke();
                    } else if (obj.type === 'powerup' && obj.powerUpType) {
                        // Animated floating effect (bobbing up/down)
                        const bobHeight = Math.sin(animationTime * 2.5 + obj.x * 0.01) * 4;

                        // Bright beacon glow
                        const glowPower = ctx.createRadialGradient(obj.x, obj.y + bobHeight, 5, obj.x, obj.y + bobHeight, obj.radius * 2.5);
                        glowPower.addColorStop(0, obj.powerUpType.color);
                        glowPower.addColorStop(0.5, 'rgba(200, 200, 200, 0.2)');
                        glowPower.addColorStop(1, 'rgba(0,0,0,0)');
                        ctx.fillStyle = glowPower;
                        ctx.beginPath();
                        ctx.arc(obj.x, obj.y + bobHeight, obj.radius * 2.5, 0, Math.PI * 2);
                        ctx.fill();

                        // Pulsating outer ring
                        const pulseScale = 0.8 + Math.sin(animationTime * 4) * 0.3;
                        ctx.strokeStyle = obj.powerUpType.color;
                        ctx.globalAlpha = 0.6 + Math.sin(animationTime * 3) * 0.3;
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(obj.x, obj.y + bobHeight, obj.radius * 1.8 * pulseScale, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.globalAlpha = 1;

                        // White core
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(obj.x, obj.y + bobHeight, obj.radius, 0, Math.PI * 2);
                        ctx.fill();

                        // Spinning icon indicator
                        ctx.save();
                        ctx.translate(obj.x, obj.y + bobHeight);
                        ctx.rotate(animationTime * 3);
                        ctx.fillStyle = obj.powerUpType.color;
                        ctx.font = "bold 18px 'Orbitron', monospace";
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(obj.powerUpType.icon, 0, 0);
                        ctx.restore();
                    }
                    ctx.globalAlpha = 1;
                }
            }

            getActive() {
                return this.pool.filter(o => o._active);
            }
        }

        // ============================================
        // Initialization
        // ============================================

        function initGame() {
            if (!gameState.isCampaignMode) {
                gameState.isCampaignMode = false;
                gameState.currentCampaignLevel = null;
            }

            gameRuntime.ship = new Ship(DESIGN_WIDTH / 2, DESIGN_HEIGHT * 0.7);
            gameRuntime.mouseX = DESIGN_WIDTH / 2;
            gameRuntime.mouseY = DESIGN_HEIGHT * 0.7;
            gameRuntime.obstacles = new ObstaclePool(100);
            gameRuntime.distance = 0;
            gameRuntime.velocity = 0;
            gameRuntime.energy.current = MAX_ENERGY;
            gameRuntime.surge.bar = 0;
            gameRuntime.surge.active = false;
            gameRuntime.stormCount = 0;
            gameRuntime.multiplier = 1;
            gameRuntime.excitement = 0;
            gameRuntime.gameStartTime = Date.now();
            gameRuntime.state = STATES.playing;
            gameRuntime.phaseJustCompleted = false;
            gameRuntime.combo = 0;
            gameRuntime.bestCombo = 0;
            gameRuntime.nearMissCount = 0;
            gameRuntime.lastNearMissTime = 0;
            gameRuntime.activePowerUp = null;
            gameRuntime.powerUpEndTime = 0;
            gameRuntime.powerUpSpawnTimer = 0;

            // Apply purchased power-ups (consume one of each active)
            if (gameState.powerUps.energy_boost > 0) {
                gameState.powerUps.energy_boost--;
                gameRuntime.energy.current = MAX_ENERGY * 1.5;
                gameRuntime.energy.max = MAX_ENERGY * 1.5;
                showToast('⚡ Energy Boost Active!');
            }
            if (gameState.powerUps.shield_start > 0) {
                gameState.powerUps.shield_start--;
                gameRuntime.shield.active = true;
                gameRuntime.shieldStartTimer = 10; // 10 second shield
                showToast('🛡 Shield Start Active!');
            }
            if (gameState.powerUps.coin_magnet > 0) {
                gameState.powerUps.coin_magnet--;
                gameRuntime.coinMagnetActive = true;
                showToast('🧲 Coin Magnet Active!');
            }
            if (gameState.powerUps.double_xp > 0) {
                gameState.powerUps.double_xp--;
                gameRuntime.doubleXPActive = true;
                showToast('✨ 2x XP Active!');
            }
            if (gameState.powerUps.alien_scanner > 0) {
                gameState.powerUps.alien_scanner--;
                gameRuntime.alienScannerActive = true;
                showToast('👁 Alien Scanner Active!');
            }

            // Initialize boss if campaign level is a boss level
            gameRuntime.boss = null;
            gameRuntime.bossPhase = 0;
            gameRuntime.bossTimer = 0;
            if (gameState.isCampaignMode) {
                const lvl = gameState.currentCampaignLevel;
                if (lvl === 10) initBoss('hive_queen');
                else if (lvl === 20) initBoss('void_sentinel');
                else if (lvl === 30) initBoss('architect');
            }

            // Initialize companion
            gameRuntime.companion = null;
            initCompanion();

            // Initialize encounters
            gameRuntime.encounterTimer = 0;
            gameRuntime.activeEncounter = null;

            initStars();
            initAIShips();
            saveToStorage();
        }

        function startCampaignLevel(levelNumber) {
            const level = GAME_LEVELS[levelNumber - 1];
            if (!level) return;
            gameState.isCampaignMode = true;
            gameState.currentCampaignLevel = levelNumber;
            initGame();
        }

        function initStars() {
            gameRuntime.stars = [];
            for (let i = 0; i < 200; i++) {
                gameRuntime.stars.push({
                    x: Math.random() * DESIGN_WIDTH,
                    y: Math.random() * DESIGN_HEIGHT,
                    z: Math.random(),
                    baseX: Math.random() * DESIGN_WIDTH,
                    baseY: Math.random() * DESIGN_HEIGHT,
                });
            }
        }

        function initAIShips() {
            gameRuntime.aiShips = [];
            gameRuntime.aliens = [];
            gameRuntime.alienBolts = [];
            gameRuntime.alienSpawnTimer = 0;
            gameRuntime.aliensKilled = 0;
            gameRuntime.alienDodges = 0;

            // Reset AI Director
            const dir = gameRuntime.aiDirector;
            dir.spawnRateMult = 1.0;
            dir.alienAccuracyMult = 1.0;
            dir.powerUpBoost = 1.0;
            dir.dodgeRate = 0;
            dir.coinEfficiency = 0;
            dir.lastUpdateTime = 0;
            dir.totalObstaclesPassed = 0;
            dir.totalObstaclesDodged = 0;
            dir.totalCoinsSpawned = 0;
            dir.totalCoinsCollected = 0;
            // Keep recentDeaths across runs for stealth assist
        }

        // ============================================
        // ALIEN FLEET — Spawn, Update, Combat (P0)
        // ============================================

        function spawnAlien(type, x, y) {
            const def = ALIEN_TYPES[type];
            if (!def) return null;
            const alien = {
                type: type,
                x: x !== undefined ? x : 30 + Math.random() * (DESIGN_WIDTH - 60),
                y: y !== undefined ? y : -40,
                hp: def.hp,
                maxHp: def.hp,
                radius: def.radius,
                speed: def.speed,
                _active: true,
                time: 0,
                // Behavior-specific state
                weaveOffset: Math.random() * Math.PI * 2,
                weaveAmp: 40 + Math.random() * 30,
                fireTimer: def.fireRate ? def.fireRate * 0.5 : 99,
                spawnTimer: def.spawnRate || 99,
                cloakTimer: 0,
                isCloaked: false,
                flashTimer: 0,
                deathAnim: 0,
            };
            gameRuntime.aliens.push(alien);
            return alien;
        }

        function spawnAlienBolt(x, y, targetX, targetY) {
            const angle = Math.atan2(targetY - y, targetX - x);
            const accuracyMult = gameRuntime.aiDirector.alienAccuracyMult;
            const spread = (1 - accuracyMult) * 0.5; // more spread when stealth assist active
            const finalAngle = angle + (Math.random() - 0.5) * spread;
            gameRuntime.alienBolts.push({
                x: x, y: y,
                vx: Math.cos(finalAngle) * 150,
                vy: Math.sin(finalAngle) * 150,
                radius: 4,
                _active: true,
                time: 0,
            });
        }

        function updateAliens(dt) {
            const shipX = gameRuntime.ship.x;
            const shipY = gameRuntime.ship.y;
            const diffMultipliers = { easy: 0.6, medium: 1.0, hard: 1.4, legend: 2.0 };
            const diffMult = diffMultipliers[gameState.settings.difficulty] || 1.0;
            const dirMult = gameRuntime.aiDirector.spawnRateMult;
            // Solar flare slows aliens by 50%
            const solarFlareSlowdown = (gameRuntime.activeEncounter && gameRuntime.activeEncounter.type === 'solar_flare') ? 0.5 : 1.0;

            // Spawn aliens based on distance + difficulty + AI director
            gameRuntime.alienSpawnTimer += dt;
            const baseSpawnInterval = 6.0 / diffMult / dirMult;
            if (gameRuntime.alienSpawnTimer > baseSpawnInterval) {
                gameRuntime.alienSpawnTimer = 0;
                // Pick alien type weighted by distance eligibility
                const eligible = [];
                let totalWeight = 0;
                for (const key in ALIEN_TYPES) {
                    const at = ALIEN_TYPES[key];
                    if (gameRuntime.distance >= at.minDistance) {
                        eligible.push({ type: key, weight: at.spawnWeight });
                        totalWeight += at.spawnWeight;
                    }
                }
                if (eligible.length > 0) {
                    let r = Math.random() * totalWeight;
                    let chosen = eligible[0].type;
                    for (let i = 0; i < eligible.length; i++) {
                        if (r < eligible[i].weight) { chosen = eligible[i].type; break; }
                        r -= eligible[i].weight;
                    }
                    spawnAlien(chosen);
                }
            }

            // Update each alien
            for (let i = gameRuntime.aliens.length - 1; i >= 0; i--) {
                const a = gameRuntime.aliens[i];
                if (!a._active) { gameRuntime.aliens.splice(i, 1); continue; }

                a.time += dt;
                const def = ALIEN_TYPES[a.type];

                // Movement behaviors
                const speedMult = solarFlareSlowdown;
                switch (def.behavior) {
                    case 'weave':
                        a.y += a.speed * speedMult * dt;
                        a.x += Math.sin(a.time * 3 + a.weaveOffset) * a.weaveAmp * dt;
                        a.x = clamp(a.x, a.radius, DESIGN_WIDTH - a.radius);
                        break;
                    case 'track':
                        a.y += a.speed * speedMult * dt;
                        // Lerp toward player X
                        a.x = lerp(a.x, shipX + (Math.random() - 0.5) * 30, 0.02);
                        a.x = clamp(a.x, a.radius, DESIGN_WIDTH - a.radius);
                        // Fire bolts
                        a.fireTimer -= dt;
                        if (a.fireTimer <= 0 && a.y > 50 && a.y < DESIGN_HEIGHT * 0.7) {
                            a.fireTimer = def.fireRate;
                            spawnAlienBolt(a.x, a.y, shipX, shipY);
                            audioManager.playCollision();
                        }
                        break;
                    case 'hover':
                        // Descend to a hover zone, then stay
                        if (a.y < 150) {
                            a.y += a.speed * speedMult * dt;
                        } else {
                            a.x += Math.sin(a.time * 0.8) * 20 * dt;
                            a.x = clamp(a.x, a.radius, DESIGN_WIDTH - a.radius);
                        }
                        // Spawn scouts periodically
                        a.spawnTimer -= dt;
                        if (a.spawnTimer <= 0 && gameRuntime.aliens.length < 12) {
                            a.spawnTimer = def.spawnRate;
                            spawnAlien('scout', a.x + (Math.random() - 0.5) * 40, a.y + 20);
                        }
                        break;
                    case 'mirror':
                        a.y += a.speed * 0.6 * speedMult * dt;
                        // Mirror player X with offset
                        const mirrorX = DESIGN_WIDTH - shipX + (Math.random() - 0.5) * 20;
                        a.x = lerp(a.x, mirrorX, 0.03);
                        a.x = clamp(a.x, a.radius, DESIGN_WIDTH - a.radius);
                        // Cloaking
                        a.cloakTimer += dt;
                        if (a.isCloaked && a.cloakTimer > def.cloakDuration) {
                            a.isCloaked = false;
                            a.cloakTimer = 0;
                        } else if (!a.isCloaked && a.cloakTimer > def.cloakInterval) {
                            a.isCloaked = true;
                            a.cloakTimer = 0;
                        }
                        break;
                }

                // Flash timer decay
                if (a.flashTimer > 0) a.flashTimer -= dt;

                // Off-screen removal (below screen)
                if (a.y > DESIGN_HEIGHT + 60) {
                    a._active = false;
                    gameRuntime.alienDodges++;
                    gameRuntime.aiDirector.totalObstaclesDodged++;
                }
            }

            // Update alien bolts
            for (let i = gameRuntime.alienBolts.length - 1; i >= 0; i--) {
                const b = gameRuntime.alienBolts[i];
                if (!b._active) { gameRuntime.alienBolts.splice(i, 1); continue; }
                b.x += b.vx * dt;
                b.y += b.vy * dt;
                b.time += dt;
                if (b.x < -20 || b.x > DESIGN_WIDTH + 20 || b.y < -20 || b.y > DESIGN_HEIGHT + 20 || b.time > 5) {
                    b._active = false;
                }
            }
        }

        function checkAlienCollisions() {
            const ship = gameRuntime.ship;

            // Ship vs Aliens
            for (let i = 0; i < gameRuntime.aliens.length; i++) {
                const a = gameRuntime.aliens[i];
                if (!a._active) continue;
                const d = distance(ship.x, ship.y, a.x, a.y);

                // Surge damages aliens
                if (gameRuntime.surge.active && d < ship.radius + a.radius + 20) {
                    a.hp -= 2;
                    a.flashTimer = 0.15;
                    particles.spawnBurst(a.x, a.y, 8, ALIEN_TYPES[a.type].color, 100, 0.3, 2);
                    gameRuntime.cameraShakeIntensity = 4;
                    gameRuntime.cameraShakeDuration = 0.05;
                    if (a.hp <= 0) {
                        killAlien(a);
                    }
                }

                // Direct collision with alien
                if (d < ship.radius + a.radius) {
                    if (a.isCloaked) continue; // can't collide with cloaked phantom
                    if (gameRuntime.shield.active) {
                        // Shield absorbs hit and damages alien
                        a.hp -= 1;
                        a.flashTimer = 0.15;
                        gameRuntime.shield.active = false;
                        audioManager.playShieldHit();
                        gameRuntime.cameraShakeIntensity = 8;
                        gameRuntime.cameraShakeDuration = 0.1;
                        particles.spawnBurst(a.x, a.y, 10, '#44aaff', 120, 0.4, 2);
                        hapticFeedback('heavy');
                        if (a.hp <= 0) killAlien(a);
                    } else {
                        // Player dies
                        particles.spawnBurst(ship.x, ship.y, 20, '#ff4444', 180, 0.6, 3);
                        endGame();
                        return;
                    }
                }

                // Near-miss with alien (bonus combo)
                if (d < (ship.radius + a.radius) * 2.5 && d > ship.radius + a.radius && !a.isCloaked) {
                    if (Date.now() - gameRuntime.lastNearMissTime > 300) {
                        gameRuntime.nearMissCount++;
                        gameRuntime.combo++;
                        gameRuntime.bestCombo = Math.max(gameRuntime.bestCombo, gameRuntime.combo);
                        gameRuntime.lastNearMissTime = Date.now();
                        gameRuntime.multiplier += 0.3; // slightly higher than obstacle near-miss
                        gameRuntime.surge.bar = Math.min(100, gameRuntime.surge.bar + 5);
                        showToast('ALIEN DODGE! x' + gameRuntime.combo);
                    }
                }
            }

            // Ship vs Alien Bolts
            for (let i = 0; i < gameRuntime.alienBolts.length; i++) {
                const b = gameRuntime.alienBolts[i];
                if (!b._active) continue;
                const d = distance(ship.x, ship.y, b.x, b.y);
                if (d < ship.radius + b.radius) {
                    b._active = false;
                    if (gameRuntime.shield.active) {
                        gameRuntime.shield.active = false;
                        audioManager.playShieldHit();
                        particles.spawnBurst(b.x, b.y, 6, '#44aaff', 80, 0.3, 2);
                    } else {
                        // Shield upgrade: -12% damage per level
                        const boltShieldReduce = Math.max(0.4, 1 - gameState.upgrades.shield * 0.12);
                        gameRuntime.energy.current -= 20 * boltShieldReduce;
                        gameRuntime.cameraShakeIntensity = 6;
                        gameRuntime.cameraShakeDuration = 0.08;
                        particles.spawnBurst(b.x, b.y, 8, '#ff4444', 100, 0.3, 2);
                        hapticFeedback('medium');
                        if (gameRuntime.energy.current <= 0) {
                            endGame();
                            return;
                        }
                    }
                }
            }
        }

        function killAlien(a) {
            a._active = false;
            gameRuntime.aliensKilled++;
            const def = ALIEN_TYPES[a.type];
            const coinAmount = def.coinDrop[0] + Math.floor(Math.random() * (def.coinDrop[1] - def.coinDrop[0]));
            let finalCoins = Math.floor(coinAmount * gameRuntime.multiplier);
            // Apply coin magnet
            if (gameRuntime.coinMagnetActive) {
                finalCoins = Math.floor(finalCoins * 1.5);
            }
            // Apply VIP 2x
            if (gameState.isVIP) {
                finalCoins *= 2;
            }
            gameState.coins += finalCoins;
            gameRuntime.aiDirector.totalCoinsCollected += finalCoins;
            particles.spawnBurst(a.x, a.y, 20, def.color, 160, 0.5, 3);
            particles.spawnBurst(a.x, a.y, 10, '#ffdd00', 120, 0.4, 2); // gold coin burst
            showToast('+' + finalCoins + ' coins!');
            audioManager.playCoinCollect();
            gameRuntime.excitement = Math.min(1, gameRuntime.excitement + 0.4);
            gameRuntime.surge.bar = Math.min(100, gameRuntime.surge.bar + 8);
            hapticFeedback('success');

            // Mothership drops a power-up
            if (def.dropsPowerUp) {
                const pu = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
                const spawned = gameRuntime.obstacles.spawn(a.x, a.y, 'powerup');
                if (spawned) {
                    spawned.powerUpType = pu;
                    spawned.radius = 18;
                }
            }
        }

        // ============================================
        // AI DIRECTOR — Adaptive Difficulty (P2)
        // ============================================

        function updateAIDirector(dt) {
            const dir = gameRuntime.aiDirector;
            dir.lastUpdateTime += dt;
            if (dir.lastUpdateTime < AI_DIRECTOR_CONFIG.updateInterval) return;
            dir.lastUpdateTime = 0;

            // Calculate dodge rate
            if (dir.totalObstaclesPassed > 5) {
                dir.dodgeRate = dir.totalObstaclesDodged / dir.totalObstaclesPassed;
            }

            // Calculate coin efficiency
            if (dir.totalCoinsSpawned > 0) {
                dir.coinEfficiency = dir.totalCoinsCollected / dir.totalCoinsSpawned;
            }

            // Adapt spawn rate
            if (dir.dodgeRate > AI_DIRECTOR_CONFIG.dodgeRateThresholdHigh) {
                // Player is too good — increase spawns
                dir.spawnRateMult = Math.min(AI_DIRECTOR_CONFIG.spawnRateAdjustRange[1],
                    dir.spawnRateMult + 0.05);
            } else if (dir.dodgeRate < AI_DIRECTOR_CONFIG.dodgeRateThresholdLow) {
                // Player struggling — ease up
                dir.spawnRateMult = Math.max(AI_DIRECTOR_CONFIG.spawnRateAdjustRange[0],
                    dir.spawnRateMult - 0.05);
            }

            // Power-up boost for struggling players
            const survivalTime = (Date.now() - gameRuntime.gameStartTime) / 1000;
            if (survivalTime < AI_DIRECTOR_CONFIG.survivalThresholdShort && gameRuntime.distance < 1) {
                dir.powerUpBoost = 1.4; // spawn power-ups more often
            } else {
                dir.powerUpBoost = Math.max(1.0, dir.powerUpBoost - 0.1);
            }

            // Stealth assist: check recent deaths
            const now = Date.now();
            dir.recentDeaths = dir.recentDeaths.filter(t => now - t < AI_DIRECTOR_CONFIG.stealthAssistWindow * 1000);
            if (dir.recentDeaths.length >= AI_DIRECTOR_CONFIG.stealthAssistDeaths) {
                dir.stealthAssistUntil = now + AI_DIRECTOR_CONFIG.stealthAssistDuration * 1000;
                dir.recentDeaths = []; // reset after triggering
            }

            // Apply stealth assist — reduce alien accuracy
            if (now < dir.stealthAssistUntil) {
                dir.alienAccuracyMult = 0.5; // bolts scatter more
                dir.spawnRateMult = Math.max(0.6, dir.spawnRateMult - 0.1);
            } else {
                dir.alienAccuracyMult = 1.0;
            }
        }

        function recordDeath() {
            gameRuntime.aiDirector.recentDeaths.push(Date.now());
        }

        // ============================================
        // BOSS FIGHTS (P1)
        // ============================================

        function initBoss(bossType) {
            const bossData = BOSS_TYPES[bossType];
            if (!bossData) return;
            gameRuntime.boss = {
                type: bossType,
                hp: bossData.hp,
                maxHp: bossData.hp,
                x: DESIGN_WIDTH / 2,
                y: 120,
                radius: bossData.radius,
                time: 0,
                phase: 0,
                phaseTimer: 0,
                attacks: [],
                flashTimer: 0,
                defeated: false,
                spawnedMinions: [],
                laserAngle: 0,
                gravityWellX: 0,
                gravityWellY: 0,
                gravityWellTimer: 0,
                mirrorCloneX: 0,
                mirrorCloneY: 0,
                controlReversalTimer: 0,
                glitchTimer: 0,
            };
        }

        function updateBoss(dt) {
            if (!gameRuntime.boss) return;
            const boss = gameRuntime.boss;
            boss.time += dt;
            boss.phaseTimer += dt;
            boss.flashTimer = Math.max(0, boss.flashTimer - dt);

            if (boss.type === 'hive_queen') {
                // Hovers at y=120, sways left-right
                boss.x = DESIGN_WIDTH / 2 + Math.sin(boss.time * 1.5) * 80;
                boss.y = 120;

                // Every 3s: spawn 4 scout aliens in a circle
                if (boss.phaseTimer > 3.0) {
                    boss.phaseTimer = 0;
                    for (let i = 0; i < 4; i++) {
                        const angle = (i / 4) * Math.PI * 2;
                        const x = boss.x + Math.cos(angle) * 60;
                        const y = boss.y + Math.sin(angle) * 60;
                        const alien = spawnAlien('scout', x, y);
                        if (alien) boss.spawnedMinions.push(alien);
                    }
                }

                // Every 6s: fire 8 bolts in a ring pattern
                if (boss.time > 6.0 && (Math.floor(boss.time / 6.0) > Math.floor((boss.time - dt) / 6.0))) {
                    for (let i = 0; i < 8; i++) {
                        const angle = (i / 8) * Math.PI * 2;
                        const bx = boss.x + Math.cos(angle) * 20;
                        const by = boss.y + Math.sin(angle) * 20;
                        const vx = Math.cos(angle) * 200;
                        const vy = Math.sin(angle) * 200;
                        gameRuntime.alienBolts.push({ x: bx, y: by, vx, vy, time: 0, _active: true });
                    }
                }

                // Weak point: glows red every 5s for 1.5s
                const weakPointCycle = boss.time % 5.0;
                if (weakPointCycle < 1.5) {
                    // Weak point exposed
                    boss.phase = 1;
                } else {
                    boss.phase = 0;
                }
            } else if (boss.type === 'void_sentinel') {
                // Hovers at y=100, barely moves
                boss.x = DESIGN_WIDTH / 2 + Math.sin(boss.time * 0.3) * 30;
                boss.y = 100;

                // Sweeping laser beam that rotates
                boss.laserAngle += dt * 2.0; // rotates fast

                // Every 5s: create a gravity well at random position for 3s
                if (boss.time > 5.0 && (Math.floor(boss.time / 5.0) > Math.floor((boss.time - dt) / 5.0))) {
                    boss.gravityWellX = 60 + Math.random() * (DESIGN_WIDTH - 120);
                    boss.gravityWellY = 200 + Math.random() * 400;
                    boss.gravityWellTimer = 3.0;
                }
                boss.gravityWellTimer = Math.max(0, boss.gravityWellTimer - dt);
            } else if (boss.type === 'architect') {
                // Teleports to random positions every 4s
                if (boss.phaseTimer > 4.0) {
                    boss.phaseTimer = 0;
                    boss.x = 60 + Math.random() * (DESIGN_WIDTH - 120);
                    boss.y = 80 + Math.random() * 200;
                }

                // Every 3s: reverse player controls for 2s
                if (boss.time > 3.0 && (Math.floor(boss.time / 3.0) > Math.floor((boss.time - dt) / 3.0))) {
                    boss.controlReversalTimer = 2.0;
                }
                boss.controlReversalTimer = Math.max(0, boss.controlReversalTimer - dt);

                // Every 8s: screen glitch effect for 1s
                if (boss.time > 8.0 && (Math.floor(boss.time / 8.0) > Math.floor((boss.time - dt) / 8.0))) {
                    boss.glitchTimer = 1.0;
                }
                boss.glitchTimer = Math.max(0, boss.glitchTimer - dt);

                // Mirror clone: moves opposite to player
                boss.mirrorCloneX = DESIGN_WIDTH - gameRuntime.ship.x;
                boss.mirrorCloneY = gameRuntime.ship.y;
            }
        }

        function drawBoss() {
            if (!gameRuntime.boss) return;
            const boss = gameRuntime.boss;

            ctx.save();

            if (boss.type === 'hive_queen') {
                // Insectoid shape — oval body with mandibles
                ctx.fillStyle = boss.phase === 1 ? '#ff0000' : boss.color;
                if (boss.phase === 1) ctx.globalAlpha = 0.9 + Math.sin(Date.now() * 0.01) * 0.1;

                // Body (oval)
                ctx.beginPath();
                ctx.ellipse(boss.x, boss.y, 35, 40, 0, 0, Math.PI * 2);
                ctx.fill();

                // Mandibles
                ctx.fillStyle = boss.phase === 1 ? '#ff3333' : '#ff9900';
                ctx.beginPath();
                ctx.moveTo(boss.x - 15, boss.y - 35);
                ctx.lineTo(boss.x - 20, boss.y - 50);
                ctx.lineTo(boss.x - 10, boss.y - 40);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(boss.x + 15, boss.y - 35);
                ctx.lineTo(boss.x + 20, boss.y - 50);
                ctx.lineTo(boss.x + 10, boss.y - 40);
                ctx.closePath();
                ctx.fill();

                // Wing-like protrusions
                ctx.fillStyle = 'rgba(255, 136, 0, 0.6)';
                ctx.beginPath();
                ctx.ellipse(boss.x - 40, boss.y, 15, 30, -0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(boss.x + 40, boss.y, 15, 30, 0.3, 0, Math.PI * 2);
                ctx.fill();

                ctx.globalAlpha = 1;
            } else if (boss.type === 'void_sentinel') {
                // Concentric rotating rings
                ctx.strokeStyle = boss.color;
                ctx.lineWidth = 3;

                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.arc(boss.x, boss.y, 30 + i * 10, boss.laserAngle + i * Math.PI / 3, boss.laserAngle + i * Math.PI / 3 + Math.PI * 0.6);
                    ctx.stroke();
                }

                // Central eye
                ctx.fillStyle = boss.color;
                ctx.beginPath();
                ctx.arc(boss.x, boss.y, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(boss.x + 3, boss.y - 3, 4, 0, Math.PI * 2);
                ctx.fill();

                // Laser beam — gradient line
                if (boss.hp > 0) {
                    const laserLen = 400;
                    const laserEndX = boss.x + Math.cos(boss.laserAngle) * laserLen;
                    const laserEndY = boss.y + Math.sin(boss.laserAngle) * laserLen;

                    const grd = ctx.createLinearGradient(boss.x, boss.y, laserEndX, laserEndY);
                    grd.addColorStop(0, 'rgba(68, 0, 255, 0.8)');
                    grd.addColorStop(1, 'rgba(68, 0, 255, 0)');
                    ctx.strokeStyle = grd;
                    ctx.lineWidth = 6;
                    ctx.beginPath();
                    ctx.moveTo(boss.x, boss.y);
                    ctx.lineTo(laserEndX, laserEndY);
                    ctx.stroke();
                }
            } else if (boss.type === 'architect') {
                // Glitchy, reality-warping shape — shifting polygons
                ctx.fillStyle = boss.color;

                // Draw with some static noise effect
                const glitchOffset = boss.glitchTimer > 0 ? (Math.random() - 0.5) * 8 : 0;
                ctx.translate(glitchOffset, glitchOffset);

                // Shifting hexagon
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2 + boss.time;
                    const r = 35 + Math.sin(boss.time + i) * 10;
                    const px = boss.x + Math.cos(angle) * r;
                    const py = boss.y + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();

                // Draw glitch lines when glitching
                if (boss.glitchTimer > 0) {
                    ctx.strokeStyle = 'rgba(255, 0, 255, 0.5)';
                    ctx.lineWidth = 1;
                    for (let i = 0; i < 3; i++) {
                        ctx.beginPath();
                        ctx.moveTo(boss.x - 40, boss.y - 30 + i * 20 + (Math.random() - 0.5) * 5);
                        ctx.lineTo(boss.x + 40, boss.y - 30 + i * 20 + (Math.random() - 0.5) * 5);
                        ctx.stroke();
                    }
                }

                ctx.translate(-glitchOffset, -glitchOffset);

                // Draw mirror clone
                ctx.globalAlpha = 0.4;
                ctx.fillStyle = 'rgba(255, 0, 255, 0.3)';
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2 + boss.time;
                    const r = 35 + Math.sin(boss.time + i) * 10;
                    const px = boss.mirrorCloneX + Math.cos(angle) * r;
                    const py = boss.mirrorCloneY + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            ctx.restore();

            // HP bar at top
            ctx.fillStyle = '#333333';
            ctx.fillRect(50, 30, DESIGN_WIDTH - 100, 12);
            const hpRatio = boss.hp / boss.maxHp;
            ctx.fillStyle = hpRatio > 0.3 ? '#00ff00' : '#ff3300';
            ctx.fillRect(50, 30, (DESIGN_WIDTH - 100) * hpRatio, 12);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1;
            ctx.strokeRect(50, 30, DESIGN_WIDTH - 100, 12);

            // Boss name
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 14px Arial';
