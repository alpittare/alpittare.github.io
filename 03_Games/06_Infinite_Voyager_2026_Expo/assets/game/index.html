                    ctx.fillStyle = isMe ? '#ffdd00' : '#88aacc';
                    ctx.fillText(((entry.score || 0) / 100).toFixed(1), DESIGN_WIDTH - 32, y + 20);
                }
            }

            // Refresh button
            ctx.fillStyle = _leaderboardLoading ? '#444' : '#0088cc';

        const NAME_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_';

        function drawNameEntryScreen() {
            ctx.fillStyle = COLORS.bg;
            ctx.fillRect(0, 0, DESIGN_WIDTH, DESIGN_HEIGHT);

            if (!nameEntryBuffer) {
                nameEntryBuffer = (localStorage.getItem('iv_player_name') || '').toUpperCase();
            }

            ctx.fillStyle = '#00ccff';
            ctx.font = 'bold 26px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('ENTER YOUR NAME', DESIGN_WIDTH / 2, 60);

            ctx.fillStyle = COLORS.textAlt;
            ctx.font = '13px Arial';
            ctx.fillText('This name shows on the leaderboard', DESIGN_WIDTH / 2, 85);

            // Name display box
            ctx.fillStyle = 'rgba(0, 50, 80, 0.6)';
            drawRoundRect(30, 105, DESIGN_WIDTH - 60, 50, 10);
            ctx.fill();
            ctx.strokeStyle = '#00ccff';
            ctx.lineWidth = 2;
            drawRoundRect(30, 105, DESIGN_WIDTH - 60, 50, 10);
            ctx.stroke();

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 28px monospace';
            ctx.textAlign = 'center';
            const displayName = nameEntryBuffer || '_ _ _';
            ctx.fillText(displayName, DESIGN_WIDTH / 2, 138);

            // Character count
            ctx.fillStyle = COLORS.textAlt;
            ctx.font = '11px Arial';
            ctx.fillText(nameEntryBuffer.length + '/12', DESIGN_WIDTH - 50, 148);

            // Keyboard grid
            const kbTop = 175;
            const kbPad = 12;
            const cols = 10;
            const keyW = (DESIGN_WIDTH - kbPad * 2 - (cols - 1) * 4) / cols;
            const keyH = 38;
            const keyGap = 4;

            for (let i = 0; i < NAME_CHARS.length; i++) {
                const col = i % cols;
                const row = Math.floor(i / cols);
                const kx = kbPad + col * (keyW + keyGap);
                const ky = kbTop + row * (keyH + keyGap);

                ctx.fillStyle = 'rgba(0, 80, 140, 0.5)';
                drawRoundRect(kx, ky, keyW, keyH, 6);
                ctx.fill();
                ctx.strokeStyle = 'rgba(0, 180, 255, 0.3)';
                ctx.lineWidth = 1;
                drawRoundRect(kx, ky, keyW, keyH, 6);
                ctx.stroke();

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 16px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(NAME_CHARS[i], kx + keyW / 2, ky + keyH / 2);
            }

            // Action buttons row
            const actY = kbTop + Math.ceil(NAME_CHARS.length / cols) * (keyH + keyGap) + 10;

            // DELETE button
            ctx.fillStyle = '#cc3333';
            drawRoundRect(kbPad, actY, 100, 42, 8);
            ctx.fill();
            ctx.fillStyle = COLORS.text;
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('DELETE', kbPad + 50, actY + 21);

            // SPACE button
            ctx.fillStyle = '#336688';
            drawRoundRect(kbPad + 110, actY, 80, 42, 8);
            ctx.fill();
            ctx.fillStyle = COLORS.text;
            ctx.fillText('SPACE', kbPad + 150, actY + 21);

            // SAVE button
            const saveEnabled = nameEntryBuffer.trim().length >= 2;
            ctx.fillStyle = saveEnabled ? '#00aa44' : '#444';
            drawRoundRect(DESIGN_WIDTH - kbPad - 120, actY, 120, 42, 8);
            ctx.fill();
            ctx.fillStyle = COLORS.text;
            ctx.font = 'bold 14px Arial';
            ctx.fillText('SAVE', DESIGN_WIDTH - kbPad - 60, actY + 21);

            // Cancel
            ctx.fillStyle = '#555';
            drawRoundRect(DESIGN_WIDTH / 2 - 50, actY + 55, 100, 36, 8);
            ctx.fill();
            ctx.fillStyle = COLORS.text;
            ctx.font = '13px Arial';
            ctx.fillText('CANCEL', DESIGN_WIDTH / 2, actY + 73);

            ctx.textBaseline = 'alphabetic';

            consumeTap((tap) => {
                // Keyboard chars
                for (let i = 0; i < NAME_CHARS.length; i++) {
                    const col = i % cols;
                    const row = Math.floor(i / cols);
                    const kx = kbPad + col * (keyW + keyGap);
                    const ky = kbTop + row * (keyH + keyGap);
                    if (pointInRect(tap.x, tap.y, kx, ky, keyW, keyH)) {
                        if (nameEntryBuffer.length < 12) {
                            nameEntryBuffer += NAME_CHARS[i];
                            audioManager.playButtonClick();
                        }
                        return;
                    }
                }
                // DELETE
                if (pointInRect(tap.x, tap.y, kbPad, actY, 100, 42)) {
                    nameEntryBuffer = nameEntryBuffer.slice(0, -1);
                    audioManager.playButtonClick();
                    return;
                }
                // SPACE
                if (pointInRect(tap.x, tap.y, kbPad + 110, actY, 80, 42)) {
                    if (nameEntryBuffer.length < 12) nameEntryBuffer += ' ';
                    return;
                }
                // SAVE
                if (pointInRect(tap.x, tap.y, DESIGN_WIDTH - kbPad - 120, actY, 120, 42) && saveEnabled) {
                    const newName = nameEntryBuffer.trim();
                    localStorage.setItem('iv_player_name', newName);
                    // Re-register with Convex under new name
                    voyagerConvex._playerId = null;
                    localStorage.removeItem('convex_player_id');
                    voyagerConvex.getOrRegister(newName).catch(() => {});
                    _leaderboardCache = null; // force refresh
                    showToast('Name saved: ' + newName);
                    audioManager.playButtonClick();
                    gameRuntime.currentScreen = 'leaderboard';
                    nameEntryBuffer = '';
                    return;
                }
                // CANCEL
                if (pointInRect(tap.x, tap.y, DESIGN_WIDTH / 2 - 50, actY + 55, 100, 36)) {
                    audioManager.playButtonClick();
                    nameEntryBuffer = '';
                    gameRuntime.currentScreen = 'leaderboard';
                }
            });
        }

        function drawChallengesScreen() {
            ctx.fillStyle = COLORS.bg;
            ctx.fillRect(0, 0, DESIGN_WIDTH, DESIGN_HEIGHT);

            ctx.fillStyle = COLORS.text;
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('WEEKLY CHALLENGES', DESIGN_WIDTH / 2, 60);

            // Pick 3 challenges based on week number for consistency
            const weekNum = Math.floor(Date.now() / (7 * 24 * 60 * 60 * 1000));
            const selectedChallenges = [];
            for (let i = 0; i < 3; i++) {
                const idx = (weekNum + i) % WEEKLY_CHALLENGES.length;
                selectedChallenges.push(WEEKLY_CHALLENGES[idx]);
            }

            let yPos = 130;
            const claimButtonRects = [];
            for (let i = 0; i < selectedChallenges.length; i++) {
                const ch = selectedChallenges[i];
                const reward = ch.target * 100;
                const isClaimed = gameState.challengesClaimed[ch.id];

                // Initialize progress tracking for this challenge
                if (!gameState.challengeProgress[ch.id]) {
                    gameState.challengeProgress[ch.id] = {};
                }
                const progress_data = gameState.challengeProgress[ch.id];

                // Calculate progress based on stat type
                let progress = 0;
                let progressValue = 0;
                if (ch.stat === 'distance') {
                    progressValue = gameState.totalDistance;
                    progress = Math.min(1, progressValue / ch.target);
                } else if (ch.stat === 'storms') {
                    progressValue = gameState.stats.totalStormsCollected;
                    progress = Math.min(1, progressValue / ch.target);
                } else if (ch.stat === 'combo') {
                    progressValue = progress_data.combo || 0;
                    progress = Math.min(1, progressValue / ch.target);
                } else if (ch.stat === 'survival') {
                    progressValue = progress_data.survival || 0;
                    progress = Math.min(1, progressValue / ch.target);
                } else if (ch.stat === 'totalDistance') {
                    progressValue = gameState.totalDistance;
                    progress = Math.min(1, progressValue / ch.target);
                } else if (ch.stat === 'runs') {
                    progressValue = gameState.stats.totalRuns;
                    progress = Math.min(1, progressValue / ch.target);
                }

                const isCompleted = progress >= 1;
                const cardColor = isClaimed ? 'rgba(100, 100, 100, 0.2)' : (isCompleted ? 'rgba(0, 200, 100, 0.2)' : 'rgba(0, 102, 204, 0.3)');
                const borderColor = isClaimed ? '#666666' : (isCompleted ? '#00cc00' : '#0099ff');

                // Challenge card
                ctx.fillStyle = cardColor;
                drawRoundRect(30, yPos, DESIGN_WIDTH - 60, 100, 8);
                ctx.fill();
                ctx.strokeStyle = borderColor;
                ctx.lineWidth = 2;
                ctx.stroke();

                // Challenge name and description
                ctx.fillStyle = COLORS.text;
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'left';
                ctx.fillText(ch.name, 50, yPos + 25);

                ctx.font = '12px Arial';
                ctx.fillStyle = COLORS.textAlt;
                ctx.fillText(ch.desc, 50, yPos + 45);

                // Progress bar
                ctx.fillStyle = '#333333';
                drawRoundRect(50, yPos + 58, 120, 12, 3);
                ctx.fill();
                ctx.fillStyle = isCompleted ? '#00ff88' : '#0099ff';
                drawRoundRect(50, yPos + 58, 120 * progress, 12, 3);
                ctx.fill();

                // Progress text
                ctx.fillStyle = COLORS.textAlt;
                ctx.font = '10px Arial';
                ctx.textAlign = 'left';
                ctx.fillText(Math.floor(progressValue) + '/' + ch.target, 175, yPos + 65);

                // Reward
                ctx.fillStyle = '#ffdd00';
                ctx.font = 'bold 13px Arial';
                ctx.textAlign = 'right';
                ctx.fillText('💰 +' + reward, DESIGN_WIDTH - 50, yPos + 35);

                // Claim button or claimed badge
                if (isClaimed) {
                    ctx.fillStyle = '#666666';
                    ctx.font = 'bold 11px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('✓ CLAIMED', DESIGN_WIDTH - 70, yPos + 72);
                } else if (isCompleted) {
                    const btnX = DESIGN_WIDTH - 130;
                    const btnY = yPos + 58;
                    const btnW = 70;
                    const btnH = 28;
                    claimButtonRects.push({ x: btnX, y: btnY, w: btnW, h: btnH, id: ch.id, reward: reward });

                    ctx.fillStyle = '#00cc00';
                    drawRoundRect(btnX, btnY, btnW, btnH, 4);
                    ctx.fill();
                    ctx.strokeStyle = '#00ff88';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    ctx.fillStyle = '#000000';
                    ctx.font = 'bold 11px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('CLAIM', btnX + btnW / 2, btnY + btnH / 2);
                }

                yPos += 115;
            }

            drawButton(DESIGN_WIDTH / 2 - 50, DESIGN_HEIGHT - 80, 100, 50, 'BACK');

            // Handle claim button taps
            consumeTap((tap) => {
                for (let i = 0; i < claimButtonRects.length; i++) {
                    const btn = claimButtonRects[i];
                    if (pointInRect(tap.x, tap.y, btn.x, btn.y, btn.w, btn.h)) {
                        audioManager.playButtonClick();
                        gameState.coins += btn.reward;
                        gameState.challengesClaimed[btn.id] = true;
                        showToast('Challenge Claimed! +' + btn.reward + ' coins');
                        saveToStorage();
                        return;
                    }
                }

                if (pointInRect(tap.x, tap.y, DESIGN_WIDTH / 2 - 50, DESIGN_HEIGHT - 80, 100, 50)) {
                    audioManager.playButtonClick();
                    gameRuntime.currentScreen = 'menu';
                }
            });
        }

        // ============================================
        // STORE TAB RENDERING
        // ============================================
        function drawStoreTab(yPos) {
            // Coin packs
            const packW = (DESIGN_WIDTH - 50) / 3;
            const packH = 180;

            for (let i = 0; i < COIN_PACKS.length; i++) {
                const pack = COIN_PACKS[i];
                const x = 20 + i * (packW + 5);

                // Gradient background
                const grd = ctx.createLinearGradient(x, yPos, x, yPos + packH);
                grd.addColorStop(0, pack.color + '44');
                grd.addColorStop(1, pack.color + '11');
                ctx.fillStyle = grd;
                drawRoundRect(x, yPos, packW, packH, 12);
                ctx.fill();

                // Border
                ctx.strokeStyle = pack.color;
                ctx.lineWidth = 2;
                drawRoundRect(x, yPos, packW, packH, 12);
                ctx.stroke();

                // Coin emoji
                ctx.font = '32px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('💰', x + packW / 2, yPos + 30);

                // Coin amount
                ctx.fillStyle = pack.color;
                ctx.font = 'bold 18px Arial';
                ctx.fillText(pack.coins.toString(), x + packW / 2, yPos + 70);

                // Bonus tag
                if (pack.tag) {
                    ctx.fillStyle = pack.color;
                    ctx.font = 'bold 9px Arial';
                    ctx.fillText(pack.tag, x + packW / 2, yPos + 90);
                }

                // Price button
                ctx.fillStyle = COLORS.ui;
                drawRoundRect(x + 5, yPos + packH - 35, packW - 10, 30, 6);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px Arial';
                ctx.fillText(pack.price, x + packW / 2, yPos + packH - 20);
            }

            yPos += 200;

            // VIP card
            const vipCardW = DESIGN_WIDTH - 40;
            const vipCardH = 140;

            // Gold gradient
            const vipGrad = ctx.createLinearGradient(20, yPos, 20, yPos + vipCardH);
            vipGrad.addColorStop(0, '#ffdd0044');
            vipGrad.addColorStop(1, '#dd8800ff');
            ctx.fillStyle = vipGrad;
            drawRoundRect(20, yPos, vipCardW, vipCardH, 12);
            ctx.fill();

            // Gold border
            ctx.strokeStyle = '#ffdd00';
            ctx.lineWidth = 2;
            drawRoundRect(20, yPos, vipCardW, vipCardH, 12);
            ctx.stroke();

            // VIP title
            ctx.fillStyle = '#ffdd00';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('👑 VIP PASS', 40, yPos + 30);

            // Benefits
            ctx.fillStyle = '#fff';
            ctx.font = '11px Arial';
            const benefits = ['✓ All skins free', '✓ 2x coins', '✓ VIP badge', '✓ Exclusive ship'];
            let bY = yPos + 50;
            for (const b of benefits) {
                ctx.fillText(b, 50, bY);
                bY += 16;
            }

            // Status
            if (gameState.isVIP) {
                ctx.fillStyle = '#00ff88';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'right';
                ctx.fillText('ACTIVE ✓', DESIGN_WIDTH - 40, yPos + 55);
            } else {
                // Price button
                ctx.fillStyle = COLORS.ui;
                drawRoundRect(DESIGN_WIDTH - 130, yPos + vipCardH - 35, 110, 30, 6);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('$0.99/year', DESIGN_WIDTH - 75, yPos + vipCardH - 20);
            }

            yPos += 160;

            // Restore link
            ctx.fillStyle = '#0088ff';
            ctx.font = '10px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Restore Purchases', DESIGN_WIDTH / 2, yPos + 20);
        }

        // ============================================
        // BOOSTS TAB RENDERING
        // ============================================
        function drawBoostsTab(yPos) {
            for (let i = 0; i < POWERUP_SHOP.length; i++) {
                const boost = POWERUP_SHOP[i];
                const affordable = gameState.coins >= boost.cost;
                const owned = gameState.powerUps[boost.id] || 0;

                // Card
                ctx.fillStyle = 'rgba(15, 15, 25, 0.85)';
                drawRoundRect(20, yPos, DESIGN_WIDTH - 40, 80, 12);
                ctx.fill();

                ctx.strokeStyle = boost.color;
                ctx.lineWidth = 1;
                drawRoundRect(20, yPos, DESIGN_WIDTH - 40, 80, 12);
                ctx.stroke();

                // Icon
                ctx.font = '28px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(boost.icon, 50, yPos + 45);

                // Name
                ctx.fillStyle = boost.color;
                ctx.font = 'bold 13px Arial';
                ctx.textAlign = 'left';
                ctx.fillText(boost.name, 85, yPos + 25);

                // Description
                ctx.fillStyle = '#aaa';
                ctx.font = '10px Arial';
                ctx.fillText(boost.desc, 85, yPos + 42);

                // Owned count
                if (owned > 0) {
                    ctx.fillStyle = boost.color;
                    ctx.font = 'bold 11px Arial';
                    ctx.fillText('x' + owned, 85, yPos + 60);
                }

                // Buy button
                const btnW = 65, btnH = 30;
                const btnX = DESIGN_WIDTH - 105, btnY = yPos + 25;
                ctx.fillStyle = affordable ? COLORS.ui : '#444';
                drawRoundRect(btnX, btnY, btnW, btnH, 6);
                ctx.fill();
                ctx.fillStyle = affordable ? '#fff' : '#666';
                ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('BUY', btnX + btnW / 2, btnY + btnH / 2);

                // Cost
                ctx.font = 'bold 9px Arial';
                ctx.fillStyle = '#ffdd00';
                ctx.fillText(boost.cost, btnX + btnW / 2, btnY + btnH + 12);

                yPos += 95;
            }
        }

        // ============================================
        // STORE & BOOSTS TAP HANDLERS
        // ============================================
        function handleStoreTap(tap) {
            const packW = (DESIGN_WIDTH - 50) / 3;
            const packH = 180;

            // Check coin pack buttons
            for (let i = 0; i < COIN_PACKS.length; i++) {
                const pack = COIN_PACKS[i];
                const x = 20 + i * (packW + 5);
                const btnY = 160 + packH - 35;
                if (pointInRect(tap.x, tap.y, x + 5, btnY, packW - 10, 30)) {
                    audioManager.playPurchase();
                    triggerPurchase(pack.id);
                    return;
                }
            }

            // Check VIP button
            const vipBtnX = DESIGN_WIDTH - 130;
            const vipBtnY = 360;
            if (pointInRect(tap.x, tap.y, vipBtnX, vipBtnY, 110, 30) && !gameState.isVIP) {
                audioManager.playPurchase();
                triggerPurchase('vip_yearly');
                return;
            }

            // Check restore link
            if (pointInRect(tap.x, tap.y, DESIGN_WIDTH / 2 - 60, 540, 120, 20)) {
                audioManager.playButtonClick();
                triggerRestore();
            }
        }

        function handleBoostsTap(tap) {
            const btnW = 65, btnH = 30;
            let yPos = 160;

            for (let i = 0; i < POWERUP_SHOP.length; i++) {
                const boost = POWERUP_SHOP[i];
                const affordable = gameState.coins >= boost.cost;
                const btnX = DESIGN_WIDTH - 105, btnY = yPos + 25;

                if (pointInRect(tap.x, tap.y, btnX, btnY, btnW, btnH) && affordable) {
                    audioManager.playPurchase();
                    gameState.coins -= boost.cost;
                    gameState.powerUps[boost.id] = (gameState.powerUps[boost.id] || 0) + 1;
                    showToast(boost.name + ' purchased!');
                    saveToStorage();
                    return;
                }

                yPos += 95;
            }
        }

        function drawShopScreen() {
            ctx.fillStyle = COLORS.bg;
            ctx.fillRect(0, 0, DESIGN_WIDTH, DESIGN_HEIGHT);

            ctx.fillStyle = COLORS.text;
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('SHOP', DESIGN_WIDTH / 2, 60);

            const tabY = 100;
            const tabH = 40;
            const tabW = 70;
            const tabGap = 6;
            const skinsTab = { x: 20, y: tabY, w: tabW, h: tabH, label: 'SKINS' };
            const themesTab = { x: 20 + tabW + tabGap, y: tabY, w: tabW, h: tabH, label: 'THEMES' };
            const companionTab = { x: 20 + 2 * (tabW + tabGap), y: tabY, w: tabW, h: tabH, label: 'DRONE' };
            const boostsTab = { x: 20 + 3 * (tabW + tabGap), y: tabY, w: tabW, h: tabH, label: 'BOOSTS' };
            const storeTab = { x: 20 + 4 * (tabW + tabGap), y: tabY, w: tabW, h: tabH, label: 'STORE' };
            const currentTab = gameRuntime.shopTab || 'skins';

            // Draw tabs
            for (const tab of [skinsTab, themesTab, companionTab, boostsTab, storeTab]) {
                const isActive = currentTab === (tab.label === 'SKINS' ? 'skins' : tab.label === 'THEMES' ? 'themes' : tab.label === 'DRONE' ? 'companion' : tab.label === 'BOOSTS' ? 'boosts' : 'store');
                ctx.fillStyle = isActive ? COLORS.ui : '#333333';
                drawRoundRect(tab.x, tab.y, tab.w, tab.h, 6);
                ctx.fill();
                ctx.fillStyle = COLORS.text;
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(tab.label, tab.x + tab.w / 2, tab.y + tab.h / 2);
            }

            // Coins display
            ctx.fillStyle = '#ffdd00';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'right';
            ctx.fillText(gameState.coins + ' coins', DESIGN_WIDTH - 40, 60);

            let yPos = 160;
            const cardH = 105; // taller cards for all tabs
            const rarityColors = { COMMON: '#aaaaaa', RARE: '#00aaff', EPIC: '#cc44ff', LEGENDARY: '#ffaa00' };

            // Handle different tab content
            if (currentTab === 'store') {
                drawStoreTab(yPos);
            } else if (currentTab === 'boosts') {
                drawBoostsTab(yPos);
            } else {
                // Skins, Themes, Companion
                let items;
                if (currentTab === 'skins') items = SHOP_SKINS;
                else if (currentTab === 'themes') items = SHOP_THEMES;
                else items = SHOP_COMPANIONS;

            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                // VIP makes all skins free
                const effectiveCost = (currentTab === 'skins' && gameState.isVIP) ? 0 : item.cost;
                const canAfford = gameState.coins >= effectiveCost && gameState.level >= item.levelReq;
                let isOwned, isEquipped;
                if (currentTab === 'skins') {
                    isOwned = gameState.unlockedSkins.includes(item.id) || gameState.isVIP;
                    isEquipped = gameState.equippedSkin === item.id;
                } else if (currentTab === 'themes') {
                    isOwned = gameState.unlockedThemes.includes(item.id);
                    isEquipped = gameState.equippedTheme === item.id;
                } else {
                    isOwned = gameState.companionLevel >= (i + 1);
                    isEquipped = false;
                }

                // Card background with rarity-tinted border
                const rc = rarityColors[item.rarity] || '#444';
                ctx.fillStyle = isEquipped ? 'rgba(0, 40, 60, 0.8)' : 'rgba(15, 15, 25, 0.85)';
                drawRoundRect(20, yPos, DESIGN_WIDTH - 40, cardH, 12);
                ctx.fill();
                ctx.strokeStyle = isEquipped ? '#00ff88' : rc;
                ctx.lineWidth = isEquipped ? 2 : 1;
                drawRoundRect(20, yPos, DESIGN_WIDTH - 40, cardH, 12);
                ctx.stroke();

                // Preview area (left side)
                const previewW = 58, previewH = cardH - 16;
                ctx.fillStyle = item.preview || '#0a0a1a';
                drawRoundRect(30, yPos + 8, previewW, previewH, 8);
                ctx.fill();

                if (currentTab === 'skins') {
                    ctx.save();
                    ctx.translate(30 + previewW / 2, yPos + cardH / 2);
                    if (isOwned || item.cost === 0) {
                        drawShipSkin(ctx, item.id, 0.75);
                    } else {
                        ctx.globalAlpha = 0.2;
                        drawShipSkin(ctx, item.id, 0.75);
                        ctx.globalAlpha = 1;
                        ctx.fillStyle = '#666';
                        ctx.font = 'bold 18px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('?', 0, 0);
                    }
                    ctx.restore();
                } else if (currentTab === 'themes') {
                    // Theme preview — mini gradient swatch
                    const grd = ctx.createLinearGradient(30, yPos + 8, 30, yPos + 8 + previewH);
                    grd.addColorStop(0, item.preview || '#001a2e');
                    grd.addColorStop(1, '#000000');
                    ctx.fillStyle = grd;
                    drawRoundRect(30, yPos + 8, previewW, previewH, 8);
                    ctx.fill();
                    // Mini stars
                    ctx.fillStyle = '#ffffff';
                    for (let s = 0; s < 8; s++) {
                        const sx = 35 + Math.sin(s * 4.7) * 22 + 22;
                        const sy = yPos + 15 + Math.cos(s * 3.1) * (previewH * 0.35) + previewH * 0.35;
                        ctx.globalAlpha = 0.4 + Math.sin(animationTime * 2 + s) * 0.3;
                        ctx.beginPath();
                        ctx.arc(sx, sy, 1 + Math.sin(s) * 0.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;
                } else {
                    // Companion drone preview — colored orb with glow
                    const droneColor = item.color || '#00ccff';
                    const dGlow = ctx.createRadialGradient(30 + previewW / 2, yPos + cardH / 2, 3, 30 + previewW / 2, yPos + cardH / 2, 22);
                    dGlow.addColorStop(0, droneColor);
                    dGlow.addColorStop(0.5, droneColor + '44');
                    dGlow.addColorStop(1, 'transparent');
                    ctx.fillStyle = dGlow;
                    ctx.beginPath();
                    ctx.arc(30 + previewW / 2, yPos + cardH / 2, 22, 0, Math.PI * 2);
                    ctx.fill();
                    // Inner drone body
                    ctx.fillStyle = droneColor;
                    ctx.beginPath();
                    ctx.arc(30 + previewW / 2, yPos + cardH / 2, 8, 0, Math.PI * 2);
                    ctx.fill();
                    // Orbiting ring
                    ctx.strokeStyle = droneColor;
                    ctx.lineWidth = 1.5;
                    ctx.globalAlpha = 0.5;
                    ctx.beginPath();
                    ctx.ellipse(30 + previewW / 2, yPos + cardH / 2, 16, 6, animationTime * 1.5 + i, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }

                // Text area
                const textLeft = 100;
                const textWidth = DESIGN_WIDTH - textLeft - 85;

                // Rarity badge
                ctx.fillStyle = rc;
                ctx.font = 'bold 9px Arial';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText(item.rarity || '', textLeft, yPos + 8);

                // Name
                ctx.fillStyle = item.color || COLORS.text;
                ctx.font = 'bold 14px Arial';
                ctx.fillText(item.name, textLeft, yPos + 20);

                // Description — word-wrapped
                ctx.fillStyle = COLORS.textAlt;
                ctx.font = '10px Arial';
                const desc = item.desc || '';
                const words = desc.split(' ');
                let line = '', lineY = yPos + 38;
                for (let w = 0; w < words.length; w++) {
                    const test = line + words[w] + ' ';
                    if (ctx.measureText(test).width > textWidth && line) {
                        ctx.fillText(line.trim(), textLeft, lineY);
                        line = words[w] + ' ';
                        lineY += 13;
                    } else {
                        line = test;
                    }
                }
                if (line.trim()) ctx.fillText(line.trim(), textLeft, lineY);

                // Ability line (for companions)
                if (item.ability) {
                    ctx.fillStyle = '#00ddaa';
                    ctx.font = 'bold 9px Arial';
                    ctx.fillText('ABILITY: ' + item.ability, textLeft, yPos + cardH - 28);
                }

                // Cost + level requirement
                ctx.fillStyle = '#888';
                ctx.font = '10px Arial';
                const costText = effectiveCost === 0 ? 'FREE' : effectiveCost + ' coins | Lv.' + item.levelReq;
                ctx.fillText(costText, textLeft, yPos + cardH - 14);

                // Status badge on right
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                if (isEquipped) {
                    ctx.fillStyle = '#00ff88';
                    ctx.font = 'bold 11px Arial';
                    ctx.fillText('EQUIPPED', DESIGN_WIDTH - 32, yPos + 24);
                    ctx.fillStyle = '#00ff8844';
                    ctx.font = '18px Arial';
                    ctx.fillText('✓', DESIGN_WIDTH - 32, yPos + 50);
                } else if (item.cost === 0 || isOwned) {
                    ctx.fillStyle = '#0088ff';
                    drawRoundRect(DESIGN_WIDTH - 90, yPos + cardH / 2 - 14, 55, 28, 6);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 11px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('EQUIP', DESIGN_WIDTH - 62, yPos + cardH / 2);
                } else if (canAfford) {
                    ctx.fillStyle = '#00aa44';
                    drawRoundRect(DESIGN_WIDTH - 90, yPos + cardH / 2 - 14, 55, 28, 6);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 11px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('BUY', DESIGN_WIDTH - 62, yPos + cardH / 2);
                    ctx.font = '9px Arial';
                    ctx.fillStyle = '#ffdd00';
                    ctx.fillText(effectiveCost, DESIGN_WIDTH - 62, yPos + cardH / 2 + 18);
                } else {
                    ctx.fillStyle = '#444';
                    drawRoundRect(DESIGN_WIDTH - 90, yPos + cardH / 2 - 14, 55, 28, 6);
                    ctx.fill();
                    ctx.fillStyle = '#777';
                    ctx.font = '10px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('Lv.' + item.levelReq, DESIGN_WIDTH - 62, yPos + cardH / 2);
                }

                yPos += cardH + 10;
            }
            }

            drawButton(DESIGN_WIDTH / 2 - 50, DESIGN_HEIGHT - 80, 100, 50, 'BACK');

            consumeTap((tap) => {
                if (pointInRect(tap.x, tap.y, skinsTab.x, skinsTab.y, skinsTab.w, skinsTab.h)) {
                    audioManager.playButtonClick();
                    gameRuntime.shopTab = 'skins';
                } else if (pointInRect(tap.x, tap.y, themesTab.x, themesTab.y, themesTab.w, themesTab.h)) {
                    audioManager.playButtonClick();
                    gameRuntime.shopTab = 'themes';
                } else if (pointInRect(tap.x, tap.y, companionTab.x, companionTab.y, companionTab.w, companionTab.h)) {
                    audioManager.playButtonClick();
                    gameRuntime.shopTab = 'companion';
                } else if (pointInRect(tap.x, tap.y, boostsTab.x, boostsTab.y, boostsTab.w, boostsTab.h)) {
                    audioManager.playButtonClick();
                    gameRuntime.shopTab = 'boosts';
                } else if (pointInRect(tap.x, tap.y, storeTab.x, storeTab.y, storeTab.w, storeTab.h)) {
                    audioManager.playButtonClick();
                    gameRuntime.shopTab = 'store';
                } else if (pointInRect(tap.x, tap.y, DESIGN_WIDTH / 2 - 50, DESIGN_HEIGHT - 80, 100, 50)) {
                    audioManager.playButtonClick();
                    gameRuntime.currentScreen = 'menu';
                } else if (currentTab !== 'store' && currentTab !== 'boosts') {
                    // Handle item selection for skins/themes/companion tabs
                    let items;
                    if (currentTab === 'skins') items = SHOP_SKINS;
                    else if (currentTab === 'themes') items = SHOP_THEMES;
                    else items = SHOP_COMPANIONS;
                    const tapCardH = 105;
                    yPos = 160;
                    for (let i = 0; i < items.length; i++) {
                        if (pointInRect(tap.x, tap.y, 20, yPos, DESIGN_WIDTH - 40, tapCardH)) {
                            const item = items[i];
                            let isOwned;
                            if (currentTab === 'skins') {
                                isOwned = gameState.unlockedSkins.includes(item.id) || gameState.isVIP;
                            } else if (currentTab === 'themes') {
                                isOwned = gameState.unlockedThemes.includes(item.id);
                            } else {
                                isOwned = gameState.companionLevel >= (i + 1);
                            }
                            const effectiveCost = (currentTab === 'skins' && gameState.isVIP) ? 0 : item.cost;
                            const canAfford = gameState.coins >= effectiveCost && gameState.level >= item.levelReq;
                            if (effectiveCost === 0 || isOwned) {
                                audioManager.playButtonClick();
                                if (currentTab === 'skins') {
                                    gameState.equippedSkin = item.id;
                                } else if (currentTab === 'themes') {
                                    gameState.equippedTheme = item.id;
                                }
                            } else if (canAfford) {
                                audioManager.playPurchase();
                                gameState.coins -= effectiveCost;
                                if (currentTab === 'skins') {
                                    gameState.unlockedSkins.push(item.id);
                                    gameState.equippedSkin = item.id;
                                } else if (currentTab === 'themes') {
                                    gameState.unlockedThemes.push(item.id);
                                    gameState.equippedTheme = item.id;
                                } else {
                                    gameState.companionLevel = i + 1;
                                    initCompanion();
                                }
                            }
                            saveToStorage();
                            break;
                        }
                        yPos += tapCardH + 10;
                    }
                } else if (currentTab === 'store') {
                    handleStoreTap(tap);
                } else if (currentTab === 'boosts') {
                    handleBoostsTap(tap);
                }
            });
        }

        function drawLevelsScreen() {
            ctx.fillStyle = COLORS.bg;
            ctx.fillRect(0, 0, DESIGN_WIDTH, DESIGN_HEIGHT);

            // Initialize phase select if not set
            if (gameRuntime.currentPhaseSelect === undefined) {
                gameRuntime.currentPhaseSelect = 0;
            }

            const selectedPhase = gameRuntime.currentPhaseSelect || 0;
            const [phaseStart, phaseEnd] = PHASE_RANGES[selectedPhase];

            // Draw title
            ctx.fillStyle = COLORS.text;
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('CAMPAIGN', DESIGN_WIDTH / 2, 50);

            // Draw phase tabs at top
            const tabWidth = (DESIGN_WIDTH - 40) / 4;
            const tabHeight = 40;
            const tabY = 70;

            for (let p = 0; p < 4; p++) {
                const tabX = 20 + p * (tabWidth + 2);
                const isSelected = p === selectedPhase;
                const isUnlocked = gameState.phasesUnlocked[p];

                // Draw tab background
                ctx.fillStyle = isSelected ? '#00ccff' : (isUnlocked ? 'rgba(0, 204, 255, 0.3)' : 'rgba(100, 100, 100, 0.3)');
                ctx.fillRect(tabX, tabY, tabWidth, tabHeight);

                // Draw tab border
                ctx.strokeStyle = isSelected ? '#00ffff' : (isUnlocked ? '#00ccff' : '#666666');
                ctx.lineWidth = isSelected ? 2 : 1;
                ctx.strokeRect(tabX, tabY, tabWidth, tabHeight);

                // Draw phase name
                ctx.fillStyle = isUnlocked ? COLORS.text : '#666666';
                ctx.font = isSelected ? 'bold 12px Arial' : '11px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(PHASE_NAMES[p], tabX + tabWidth / 2, tabY + tabHeight / 2);
            }

            // Draw level grid for selected phase
            const gridStartY = 130;
            const cols = 5;
            const cellW = 60;
            const cellH = 70;
            const cellGap = 6;
            const gridX = (DESIGN_WIDTH - (cols * cellW + (cols - 1) * cellGap)) / 2;

            let cellIndex = 0;
            for (let lvl = phaseStart; lvl <= phaseEnd; lvl++) {
                const col = cellIndex % cols;
                const row = Math.floor(cellIndex / cols);
                const cellX = gridX + col * (cellW + cellGap);
                const cellY = gridStartY + row * (cellH + cellGap);

                const level = GAME_LEVELS[lvl - 1];
                const isUnlocked = lvl === 1 || (gameState.levelStars[lvl - 1] || 0) > 0;
                const stars = gameState.levelStars[lvl] || 0;
                const isBoss = level && level.isBoss;

                // Draw cell background
                ctx.save();
                if (!isUnlocked) {
                    ctx.globalAlpha = 0.35;
                }
                ctx.fillStyle = isBoss ? 'rgba(255, 51, 85, 0.2)' : 'rgba(0, 204, 255, 0.1)';
                ctx.fillRect(cellX, cellY, cellW, cellH);

                // Draw cell border
                ctx.strokeStyle = stars > 0 ? '#ffcc00' : (isUnlocked ? '#00ccff' : '#444444');
                ctx.lineWidth = stars > 0 ? 2 : 1;
                ctx.strokeRect(cellX, cellY, cellW, cellH);

                // Draw level number
                ctx.font = isBoss ? 'bold 18px Arial' : 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = isUnlocked ? '#ffffff' : '#666666';
                ctx.fillText(lvl, cellX + cellW / 2, cellY + 20);

                // Draw boss indicator
                if (isBoss) {
                    ctx.font = '9px Arial';
                    ctx.fillStyle = '#ff3355';
                    ctx.fillText('BOSS', cellX + cellW / 2, cellY + 33);
                }

                // Draw stars
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                for (let s = 0; s < 3; s++) {
                    ctx.fillStyle = s < stars ? '#ffcc00' : 'rgba(255, 255, 255, 0.15)';
                    ctx.fillText('★', cellX + 10 + s * 18, cellY + cellH - 12);
                }

                // Draw lock icon if locked
                if (!isUnlocked) {
                    ctx.font = 'bold 20px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillStyle = '#666666';
                    ctx.fillText('🔒', cellX + cellW / 2, cellY + 45);
                }

                ctx.restore();
                cellIndex++;
            }

            // Draw back button
            drawButton(DESIGN_WIDTH / 2 - 50, DESIGN_HEIGHT - 80, 100, 50, 'BACK');

            // Handle taps
            consumeTap((tap) => {
                // Check back button
                if (pointInRect(tap.x, tap.y, DESIGN_WIDTH / 2 - 50, DESIGN_HEIGHT - 80, 100, 50)) {
                    audioManager.playButtonClick();
                    gameRuntime.state = STATES.menu;
                    gameRuntime.currentScreen = 'menu';
                    return;
                }

                // Check phase tabs
                for (let p = 0; p < 4; p++) {
                    const tabX = 20 + p * ((DESIGN_WIDTH - 40) / 4 + 2);
                    if (pointInRect(tap.x, tap.y, tabX, tabY, tabWidth, tabHeight)) {
                        if (gameState.phasesUnlocked[p]) {
                            audioManager.playButtonClick();
                            gameRuntime.currentPhaseSelect = p;
                        }
                        return;
                    }
                }

                // Check level cells
                cellIndex = 0;
                for (let lvl = phaseStart; lvl <= phaseEnd; lvl++) {
                    const col = cellIndex % cols;
                    const row = Math.floor(cellIndex / cols);
                    const cellX = gridX + col * (cellW + cellGap);
                    const cellY = gridStartY + row * (cellH + cellGap);

                    if (pointInRect(tap.x, tap.y, cellX, cellY, cellW, cellH)) {
                        const isUnlocked = lvl === 1 || (gameState.levelStars[lvl - 1] || 0) > 0;
                        if (isUnlocked) {
                            audioManager.playButtonClick();
                            startCampaignLevel(lvl);
                        }
                        return;
                    }
                    cellIndex++;
                }
            });
        }


        function drawCampaignResultScreen() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, DESIGN_WIDTH, DESIGN_HEIGHT);

            const level = GAME_LEVELS[gameState.currentCampaignLevel - 1];
            const distAchieved = gameRuntime.distance;
            const targetDist = level.targetDistance;
            const ratio = distAchieved / targetDist;

            let stars = ratio >= 1.5 ? 3 : ratio >= 1.2 ? 2 : ratio >= 1 ? 1 : 0;
            const oldStars = gameState.levelStars[gameState.currentCampaignLevel] || 0;
            stars = Math.max(oldStars, stars);
            gameState.levelStars[gameState.currentCampaignLevel] = stars;
            updatePhaseProgress();
            saveToStorage();

            // Sync campaign progress to Convex backend
            const totalStars = Object.values(gameState.levelStars).reduce((a, b) => a + b, 0);
            voyagerConvex.syncCampaign(gameState.currentCampaignLevel, totalStars, JSON.stringify(gameState.levelStars)).catch(() => {});

            if (ratio >= 1) {
                audioManager.playLevelComplete();
            } else {
                audioManager.playGameOver();
            }

            ctx.fillStyle = COLORS.text;
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            let resultText = 'LEVEL ' + gameState.currentCampaignLevel;
            if (ratio >= 1) resultText += ' COMPLETE';
            else resultText += ' FAILED';
            ctx.fillText(resultText, DESIGN_WIDTH / 2, 150);

            ctx.font = '18px Arial';
            ctx.fillText('Distance: ' + distAchieved.toFixed(1) + ' / ' + targetDist.toFixed(1), DESIGN_WIDTH / 2, 220);
            ctx.fillText('Stars: ' + stars, DESIGN_WIDTH / 2, 270);

            if (ratio >= 1) {
                drawButton(DESIGN_WIDTH / 2 - 120, DESIGN_HEIGHT - 120, 100, 50, 'NEXT');
                drawButton(DESIGN_WIDTH / 2 + 20, DESIGN_HEIGHT - 120, 100, 50, 'LEVELS');
            } else {
                drawButton(DESIGN_WIDTH / 2 - 60, DESIGN_HEIGHT - 120, 120, 50, 'RETRY');
            }

            consumeTap((tap) => {
                if (ratio >= 1) {
                    if (pointInRect(tap.x, tap.y, DESIGN_WIDTH / 2 - 120, DESIGN_HEIGHT - 120, 100, 50)) {
                        audioManager.playButtonClick();
                        gameState.missionProgress.levelsCompleted++;
                        gameState.currentCampaignLevel++;
                        if (gameState.currentCampaignLevel <= 100) {
                            startCampaignLevel(gameState.currentCampaignLevel);
                        } else {
                            gameRuntime.phaseJustCompleted = true;
                            gameRuntime.state = STATES.phase_complete;
                        }
                        saveToStorage();
                    } else if (pointInRect(tap.x, tap.y, DESIGN_WIDTH / 2 + 20, DESIGN_HEIGHT - 120, 100, 50)) {
                        audioManager.playButtonClick();
                        gameRuntime.state = STATES.levels;
                        saveToStorage();
                    }
                } else {
                    if (pointInRect(tap.x, tap.y, DESIGN_WIDTH / 2 - 60, DESIGN_HEIGHT - 120, 120, 50)) {
                        audioManager.playButtonClick();
                        startCampaignLevel(gameState.currentCampaignLevel);
                    }
                }
            });
        }

        // ============================================
        // Control Functions
        // ============================================

        function endGame() {
            recordDeath(); // AI Director tracks recent deaths for stealth assist
            gameState.bestDistance = Math.max(gameState.bestDistance, gameRuntime.distance);
            gameState.totalDistance += gameRuntime.distance;
            let coinsEarned = Math.floor(gameRuntime.distance * 50);
            // Apply coin magnet boost
            if (gameRuntime.coinMagnetActive) {
                coinsEarned = Math.floor(coinsEarned * 1.5);
            }
            // Apply VIP 2x coins
            if (gameState.isVIP) {
                coinsEarned *= 2;
            }
            gameState.coins += coinsEarned;
            gameState.stats.totalRuns++;
            gameState.stats.totalDistance += gameRuntime.distance;
            gameState.stats.totalStormsCollected += gameRuntime.stormCount;
            if (!gameState.stats.totalAliensKilled) gameState.stats.totalAliensKilled = 0;
            gameState.stats.totalAliensKilled += gameRuntime.aliensKilled;
            const survivalTime = (Date.now() - gameRuntime.gameStartTime) / 1000;
            gameState.stats.totalPlayTime += survivalTime;
            gameState.stats.bestSurvivalTime = Math.max(gameState.stats.bestSurvivalTime, survivalTime);

            // Track challenge progress
            for (const ch of WEEKLY_CHALLENGES) {
                if (!gameState.challengeProgress[ch.id]) {
                    gameState.challengeProgress[ch.id] = {};
                }
                const prog = gameState.challengeProgress[ch.id];
                if (ch.stat === 'survival') {
                    prog.survival = Math.max(prog.survival || 0, survivalTime);
                }
                if (ch.stat === 'combo') {
                    prog.combo = Math.max(prog.combo || 0, gameRuntime.combo || 0);
                }
            }

            // Track session best
            gameRuntime.sessionBest = Math.max(gameRuntime.sessionBest, gameRuntime.distance);

            awardXP(Math.floor(gameRuntime.distance * 10));
            checkAchievements();

            // Store promo popup every N games
            gameState.gamesPlayedSincePromo++;
            if (gameState.gamesPlayedSincePromo >= STORE_PROMO_INTERVAL) {
                gameState.gamesPlayedSincePromo = 0;
                gameRuntime.showStorePromo = true;
            }

            saveToStorage();

            if (gameState.isCampaignMode) {
                gameRuntime.state = STATES.campaign_result;
                return;
            }

            if (gameRuntime.phaseJustCompleted) {
                gameRuntime.state = STATES.phase_complete;
                return;
            }

            gameRuntime.state = STATES.gameover;
        }

        function showCommentary(category) {
            if (Date.now() < gameRuntime.commentary.cooldown) return;

            const commentaries = {
                storm: ['Great catch!', 'Storm collected!', 'Energy restored!', 'Boost activated!', 'Perfect dodge!'],
                milestone: ['50 AU reached!', '100 AU milestone!', 'Keep going!', 'Excellent progress!', 'New record incoming!'],
                danger: ['Watch out!', 'Incoming hazard!', 'Danger ahead!', 'Stay alert!', 'Brace for impact!'],
                surge: ['Surge ready!', 'Tap to activate!', 'Power up available!', 'Surge charged!', 'Let it rip!'],
            };

            const msgs = commentaries[category] || ['Go!'];
            const msg = getRandomChoice(msgs);

            gameRuntime.commentary.text = msg;
            gameRuntime.commentary.endTime = Date.now() + 4000;
            gameRuntime.commentary.cooldown = Date.now() + 4000;
        }

        function consumeTap(callback) {
            while (gameRuntime.taps.length > 0) {
                const tap = gameRuntime.taps.shift();
                callback(tap);
            }
        }

        function pointInRect(px, py, rx, ry, rw, rh) {
            return px >= rx && px <= rx + rw && py >= ry && py <= ry + rh;
        }

        function hapticFeedback(pattern) {
            try {
                if (gameState.settings.mute) return;
                const patterns = {
                    light: [10],
                    medium: [20],
                    heavy: [50],
                    success: [50, 100, 50],
                    error: [100, 50, 100],
                };
                navigator.vibrate(patterns[pattern] || [20]);
            } catch (e) {
                // Vibration not supported
            }
        }

        // ============================================
        // Input Handling
        // ============================================

        function initInput() {
            document.addEventListener('touchstart', (e) => {
                e.preventDefault();
                audioManager.unlock();
                for (let i = 0; i < e.touches.length; i++) {
                    const touch = e.touches[i];
                    const pos = screenToGame(touch.clientX, touch.clientY);
                    gameRuntime.taps.push(pos);
                    // Apply control reversal if architect boss is active
                    if (gameRuntime.boss && gameRuntime.boss.type === 'architect' && gameRuntime.boss.controlReversalTimer > 0) {
                        gameRuntime.mouseX = DESIGN_WIDTH - pos.x; // Reverse X
                    } else {
                        gameRuntime.mouseX = pos.x;
                    }
                    // Ship renders above finger so player can see it
                    gameRuntime.mouseY = pos.y - TOUCH_OFFSET_Y;
                }
            }, { passive: false });

            document.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length > 0) {
                    const touch = e.touches[0];
                    const pos = screenToGame(touch.clientX, touch.clientY);
                    // Apply control reversal if architect boss is active
                    if (gameRuntime.boss && gameRuntime.boss.type === 'architect' && gameRuntime.boss.controlReversalTimer > 0) {
                        gameRuntime.mouseX = DESIGN_WIDTH - pos.x; // Reverse X
                    } else {
                        gameRuntime.mouseX = pos.x;
                    }
                    // Ship renders above finger so player can see it
                    gameRuntime.mouseY = pos.y - TOUCH_OFFSET_Y;
                }
            }, { passive: false });

            document.addEventListener('mousemove', (e) => {
                const pos = screenToGame(e.clientX, e.clientY);
                // Apply control reversal if architect boss is active
                if (gameRuntime.boss && gameRuntime.boss.type === 'architect' && gameRuntime.boss.controlReversalTimer > 0) {
                    gameRuntime.mouseX = DESIGN_WIDTH - pos.x; // Reverse X
                } else {
                    gameRuntime.mouseX = pos.x;
                }
                gameRuntime.mouseY = pos.y;
            });

            document.addEventListener('mousedown', (e) => {
                audioManager.unlock();
                const pos = screenToGame(e.clientX, e.clientY);
                gameRuntime.taps.push(pos);
            });

            window.addEventListener('resize', fitCanvas);
        }

        // ============================================
        // Main Game Loop
        // ============================================

        function gameLoop() {
            try {
                const now = Date.now();
                const dt = Math.min((now - gameRuntime.lastFrameTime) / 1000, 0.016 * 3);
                gameRuntime.lastFrameTime = now;
                animationTime += dt;

                if (gameRuntime.state === STATES.playing) {
                    consumeTap((tap) => {
                        // Pause button (top-right)
                        if (tap.x > DESIGN_WIDTH - 50 && tap.y < 50) {
                            audioManager.playButtonClick();
                            gameRuntime.state = STATES.pause;
                            return;
                        }

                        // Check encounter taps first
                        handleEncounterTap(tap.x, tap.y);

                        // Double-tap anywhere → activate surge
                        const now = Date.now();
                        const timeSinceLastTap = now - gameRuntime.lastTapTime;
                        gameRuntime.lastTapTime = now;

                        if (timeSinceLastTap < 350) { // 350ms window = double-tap
                            const thresholds = { L1: 20, L2: 50, L3: 75, L4: 100 };
                            if (gameRuntime.surge.bar >= thresholds[gameRuntime.surge.tier] && !gameRuntime.surge.active) {
                                audioManager.playSurgeActivate();
                                const surgeColor = COLORS.surge[gameRuntime.surge.tier];
                                particles.spawnBurst(gameRuntime.ship.x, gameRuntime.ship.y, 30, surgeColor, 200, 0.8, 4);
                                gameRuntime.surge.active = true;
                                gameRuntime.surge.endTime = now + 3000;
                                gameRuntime.surge.bar = 0;
                                gameRuntime.velocity *= 1.5;
                                hapticFeedback('success');
                                showToast('SURGE ACTIVATED!');
                                gameRuntime.lastTapTime = 0; // reset to prevent triple-tap re-trigger
                            } else if (!gameRuntime.surge.active) {
                                audioManager.playSurgeTap();
                                showToast('Surge not ready (' + Math.floor(gameRuntime.surge.bar) + '%)');
                            }
                        }
                    });

                    updateGame(dt);
                    drawGame();
                } else if (gameRuntime.state === STATES.gameover) {
                    ctx.fillStyle = COLORS.bg;
                    ctx.fillRect(0, 0, DESIGN_WIDTH, DESIGN_HEIGHT);
                    drawGameOverScreen();
                    if (gameRuntime.showStorePromo) {
                        drawStorePromo();
                    }
                } else if (gameRuntime.state === STATES.pause) {
                    drawGame();
                    drawPauseScreen();
                } else if (gameRuntime.state === STATES.campaign_result) {
                    ctx.fillStyle = COLORS.bg;
                    ctx.fillRect(0, 0, DESIGN_WIDTH, DESIGN_HEIGHT);
                    drawCampaignResultScreen();
                } else if (gameRuntime.state === STATES.phase_complete) {
                    ctx.fillStyle = COLORS.bg;
                    ctx.fillRect(0, 0, DESIGN_WIDTH, DESIGN_HEIGHT);
                    drawPhaseCompleteScreen();
                } else if (gameRuntime.state === STATES.levels) {
                    drawLevelsScreen();
                } else if (gameRuntime.state === STATES.menu) {
                    if (gameRuntime.currentScreen === 'settings') {
                        drawSettingsScreen();
                    } else if (gameRuntime.currentScreen === 'upgrades') {
                        drawUpgradesScreen();
                    } else if (gameRuntime.currentScreen === 'shop') {
                        drawShopScreen();
                    } else if (gameRuntime.currentScreen === 'stats') {
                        drawStatsScreen();
                    } else if (gameRuntime.currentScreen === 'achievements') {
                        drawAchievementsScreen();
                    } else if (gameRuntime.currentScreen === 'challenges') {
                        drawChallengesScreen();
                    } else if (gameRuntime.currentScreen === 'leaderboard') {
                        drawLeaderboardScreen();
                    } else if (gameRuntime.currentScreen === 'name_entry') {
                        drawNameEntryScreen();
                    } else {
                        drawMenuScreen();
                    }
                }

                requestAnimationFrame(gameLoop);
            } catch (e) {
                console.error('Game error:', e);
                const overlay = document.getElementById('error-overlay');
                overlay.textContent = 'ERROR:\n' + e.message + '\n' + e.stack;
                overlay.style.display = 'block';
            }
        }

        function triggerPurchase(productId) {
            // Native bridge (Expo/Capacitor)
            if (window.NativePurchase) {
                window.NativePurchase.buy(productId);
                return;
            }
            // Web fallback — simulate purchase for testing
            const pack = COIN_PACKS.find(p => p.id === productId);
            if (pack) {
                const reward = PLACEMENT_REWARDS[pack.placement] || pack.coins;
                gameState.coins += reward;
                showToast('+' + reward + ' coins!');
                saveToStorage();
            } else if (productId === 'vip_yearly') {
                gameState.isVIP = true;
                showToast('VIP Activated!');
                saveToStorage();
            }
        }

        function triggerRestore() {
            if (window.NativePurchase) {
                window.NativePurchase.restore();
                return;
            }
            showToast('No purchases to restore');
        }

        // Listen for native purchase success events
        window.addEventListener('purchaseSuccess', function(e) {
            const d = e.detail;
            if (d.productId === 'vip_yearly') {
                gameState.isVIP = true;
                showToast('VIP Activated!');
            } else if (d.coins) {
                gameState.coins += d.coins;
                showToast('+' + d.coins + ' coins!');
            }
            saveToStorage();
        });

        const voyagerConvex = {
            _url: CONVEX_URL,
            _playerId: null,

            init() {
                const cached = localStorage.getItem('convex_player_id');
                if (cached) this._playerId = cached;
            },

            async _mutation(path, args) {
                try {
                    const res = await fetch(this._url + '/api/mutation', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ path, args }),
                    });
                    if (!res.ok) return null;
                    const data = await res.json();
                    return data.value;
                } catch (e) {
                    console.warn('[Convex] Mutation failed:', e.message);
                    return null;
                }
            },

            async _query(path, args) {
                try {
                    const res = await fetch(this._url + '/api/query', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ path, args: args || {} }),
                    });
                    if (!res.ok) return null;
                    const data = await res.json();
                    return data.value;
                } catch (e) {
                    console.warn('[Convex] Query failed:', e.message);
                    return null;
                }
            },

            async getOrRegister(name) {
                if (this._playerId) return this._playerId;
                const existing = await this._query('players:getPlayerByName', { name });
                if (existing) {
                    this._playerId = existing._id;
                    localStorage.setItem('convex_player_id', existing._id);
                    return existing._id;
                }
                const id = await this._mutation('players:registerPlayer', { name });
                if (id) {
                    this._playerId = id;
                    localStorage.setItem('convex_player_id', id);
                }
                return id;
            },

            async submitSession(score, difficulty, won, stats, duration) {
                if (!this._playerId) return;
                await this._mutation('sessions:submitGameSession', {
                    playerId: this._playerId,
                    game: 'infinitevoyager',
                    score, difficulty, won, stats, duration,
                });
            },

            async syncCampaign(currentLevel, totalStars, levelStars) {
                if (!this._playerId) return;
                await this._mutation('campaign:syncCampaign', {
                    playerId: this._playerId,
                    game: 'infinitevoyager',
                    currentLevel, totalStars, levelStars,
                });
            },

            async unlockAchievement(achievementId) {
                if (!this._playerId) return;
                await this._mutation('achievements:unlockAchievement', {
                    playerId: this._playerId,
                    achievementId,
                    game: 'infinitevoyager',
                });
            },

            async getLeaderboard(limit) {
                return await this._query('leaderboard:getLeaderboard', {
                    game: 'infinitevoyager', limit: limit || 10,
                });
            },

            async getPlayerRank() {
                if (!this._playerId) return null;
                return await this._query('leaderboard:getPlayerRank', {
                    playerId: this._playerId,
                    game: 'infinitevoyager',
                });
            },

            async syncStats() {
                if (!this._playerId) return;
                await this._mutation('players:updatePlayerStats', {
                    playerId: this._playerId,
                    totalGamesPlayed: gameState.stats.totalRuns || 0,
                    totalCoinsEarned: gameState.coins || 0,
                    level: gameState.level || 1,
                    xp: gameState.xp || 0,
                    bestScores: {
                        crickbot: 0, goalbot: 0, basehit: 0, survivalarena: 0,
                        infinitevoyager: Math.floor((gameState.bestDistance || 0) * 100),
                    },
                    crickbotStats: { totalRuns: 0, totalFours: 0, totalSixes: 0, totalBallsFaced: 0, totalWins: 0, legendWins: 0 },
                    goalbotStats: { totalGoals: 0, totalShots: 0, totalSaves: 0, shotAccuracy: 0 },
                    basehitStats: { totalHRs: 0, totalSwings: 0, totalGoodHits: 0, totalFouls: 0, totalStrikes: 0, bestStreak: 0 },
                    survivalarenaStats: { totalKills: 0, totalWins: 0, bestKills: 0, bestStreak: 0, levelsCompleted: 0 },
                    infinitevoyagerStats: {
                        totalDistance: gameState.totalDistance || 0,
                        totalAliensKilled: gameState.stats.totalAliensKilled || 0,
                        totalBossesDefeated: gameState.stats.totalBossesDefeated || 0,
                        totalStormsCollected: gameState.stats.totalStormsCollected || 0,
                        bestDistance: gameState.bestDistance || 0,
                        bestCombo: gameState.stats.bestCombo || 0,
                    },
                });
            },
        };

        // Hook into endGame for automatic session submission
        const _originalEndGame = endGame;
        endGame = function() {
            _originalEndGame();
            // Async Convex sync (fire-and-forget, non-blocking)
            const score = Math.floor(gameRuntime.distance * 100);
            const difficulty = gameState.settings.difficulty || 'medium';
            const survivalTime = (Date.now() - gameRuntime.gameStartTime) / 1000;
            voyagerConvex.submitSession(score, difficulty, false, {
                distance: gameRuntime.distance,
                aliensKilled: gameRuntime.aliensKilled || 0,
                bossesDefeated: 0,
                stormsCollected: gameRuntime.stormCount || 0,
                bestCombo: gameRuntime.bestCombo || 0,
                powerUpsUsed: 0,
                companionLevel: gameState.companionLevel || 0,
            }, survivalTime).catch(() => {});
            // Sync full stats every game over
            voyagerConvex.syncStats().catch(() => {});
        };

        // Hook into achievement system
        const _originalCheckAchievements = checkAchievements;
        checkAchievements = function() {
            const before = Object.keys(gameState.achievements);
            _originalCheckAchievements();
            const after = Object.keys(gameState.achievements);
            // Sync newly unlocked achievements
            for (const id of after) {
                if (!before.includes(id)) {
                    voyagerConvex.unlockAchievement(id).catch(() => {});
                }
            }
        };

        window.addEventListener('load', () => {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            fitCanvas();
            loadFromStorage();
            initInput();
            gameRuntime.state = STATES.menu;
            gameRuntime.currentScreen = 'menu';
            gameRuntime.shopTab = 'skins';
            // Initialize Convex connection
            voyagerConvex.init();
            // Auto-register with player name (use stored or generate)
            const playerName = localStorage.getItem('iv_player_name') || ('Voyager_' + Math.floor(Math.random() * 9999));
            localStorage.setItem('iv_player_name', playerName);
            voyagerConvex.getOrRegister(playerName).catch(() => {});
            requestAnimationFrame(gameLoop);
        });
    </script>
</body>
</html>
