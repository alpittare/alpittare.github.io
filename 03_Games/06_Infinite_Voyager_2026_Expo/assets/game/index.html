            ctx.textAlign = 'center';
            ctx.fillText(BOSS_TYPES[boss.type].name, DESIGN_WIDTH / 2, 65);
        }

        function checkBossCollisions() {
            if (!gameRuntime.boss) return;
            const boss = gameRuntime.boss;

            // Player surge damages boss (all types)
            if (gameRuntime.surge.active) {
                const d = distance(gameRuntime.ship.x, gameRuntime.ship.y, boss.x, boss.y);
                if (d < gameRuntime.ship.radius + boss.radius) {
                    if (boss.type === 'hive_queen' && boss.phase !== 1) {
                        // Can't damage during normal phase, only during weak point
                    } else {
                        boss.hp--;
                        boss.flashTimer = 0.15;
                        particles.spawnBurst(boss.x, boss.y, 10, boss.color, 100, 0.4, 2);
                        audioManager.playCollision();
                        if (boss.hp <= 0) {
                            defeatBoss();
                        }
                    }
                }
            }

            // Boss attacks damage player
            // Hive Queen: bolts and scout aliens
            // Void Sentinel: laser beam and gravity well
            // The Architect: control reversal and glitch effect

            if (boss.type === 'void_sentinel') {
                // Check laser collision
                const laserLen = 400;
                const laserEndX = boss.x + Math.cos(boss.laserAngle) * laserLen;
                const laserEndY = boss.y + Math.sin(boss.laserAngle) * laserLen;
                const laserDist = distanceToLineSegment(gameRuntime.ship.x, gameRuntime.ship.y, boss.x, boss.y, laserEndX, laserEndY);
                if (laserDist < gameRuntime.ship.radius + 3) {
                    if (!gameRuntime.shield.active) {
                        particles.spawnBurst(gameRuntime.ship.x, gameRuntime.ship.y, 15, '#ff4444', 150, 0.5, 3);
                        endGame();
                        return;
                    } else {
                        gameRuntime.shield.active = false;
                        audioManager.playShieldHit();
                        particles.spawnBurst(boss.x, boss.y, 8, '#44aaff', 100, 0.3, 2);
                    }
                }

                // Gravity well pulls player
                if (boss.gravityWellTimer > 0) {
                    const gwDist = distance(gameRuntime.ship.x, gameRuntime.ship.y, boss.gravityWellX, boss.gravityWellY);
                    if (gwDist < 120) {
                        const dx = boss.gravityWellX - gameRuntime.ship.x;
                        const dy = boss.gravityWellY - gameRuntime.ship.y;
                        const len = Math.sqrt(dx * dx + dy * dy);
                        if (len > 0) {
                            gameRuntime.ship.x += (dx / len) * 80 * dt;
                            gameRuntime.ship.y += (dy / len) * 80 * dt;
                        }
                    }
                }
            }

            if (boss.type === 'architect' && boss.controlReversalTimer > 0) {
                // Controls are reversed — handled in touch handlers
            }
        }

        function defeatBoss() {
            if (!gameRuntime.boss) return;
            const boss = gameRuntime.boss;
            const reward = BOSS_TYPES[boss.type].reward;

            // Explosion
            particles.spawnBurst(boss.x, boss.y, 30, boss.color, 250, 1.0, 5);
            audioManager.playLevelComplete();

            // Award coins
            gameState.coins += reward;
            showToast('BOSS DEFEATED! +' + reward + ' coins');

            // Mark campaign level as completed with 3 stars
            if (gameState.isCampaignMode && gameState.currentCampaignLevel) {
                const levelKey = 'level_' + gameState.currentCampaignLevel;
                gameState.levelStars[levelKey] = 3;
                gameState.missionProgress.levelsCompleted++;
            }

            gameRuntime.boss.defeated = true;
            // Continue normal gameplay or end level
        }

        // ============================================
        // COMPANION DRONE (P3)
        // ============================================

        function initCompanion() {
            if (gameState.companionLevel >= 1) {
                gameRuntime.companion = {
                    angle: 0,
                    orbitRadius: 40,
                    shieldCooldown: 0,
                    fireCooldown: 0,
                    collectRadius: 40,
                };
            }
        }

        function updateCompanion(dt) {
            if (!gameRuntime.companion) return;
            const comp = gameRuntime.companion;

            // Orbit
            comp.angle += 2.5 * dt;
            const orbitX = gameRuntime.ship.x + Math.cos(comp.angle) * comp.orbitRadius;
            const orbitY = gameRuntime.ship.y + Math.sin(comp.angle) * comp.orbitRadius;

            // Level 1: Auto-collect nearby coins/storms
            if (gameState.companionLevel >= 1) {
                const active = gameRuntime.obstacles.getActive();
                for (let i = 0; i < active.length; i++) {
                    const obs = active[i];
                    if ((obs.type === 'storm' || obs.type === 'powerup') && distance(orbitX, orbitY, obs.x, obs.y) < comp.collectRadius) {
                        if (obs.type === 'storm') {
                            audioManager.playCoinCollect();
                            particles.spawnBurst(obs.x, obs.y, 8, '#ffdd00', 80, 0.3, 2);
                            gameRuntime.energy.current = Math.min(MAX_ENERGY, gameRuntime.energy.current + 30);
                            gameRuntime.multiplier += 0.5;
                        } else if (obs.type === 'powerup' && obs.powerUpType) {
                            audioManager.playCoinCollect();
                            particles.spawnBurst(obs.x, obs.y, 10, obs.powerUpType.color, 100, 0.4, 2);
                            gameRuntime.activePowerUp = obs.powerUpType;
                            gameRuntime.powerUpEndTime = Date.now() + obs.powerUpType.duration;
                        }
                        obs._active = false;
                    }
                }
            }

            // Level 2: Absorb 1 hit every 30s (mini-shield)
            if (gameState.companionLevel >= 2) {
                comp.shieldCooldown = Math.max(0, comp.shieldCooldown - dt);
            }

            // Level 3: Fire weak bolt at nearest alien every 5s
            if (gameState.companionLevel >= 3) {
                comp.fireCooldown = Math.max(0, comp.fireCooldown - dt);
                if (comp.fireCooldown <= 0 && gameRuntime.aliens.length > 0) {
                    comp.fireCooldown = 5.0;
                    let nearestAlien = null;
                    let minDist = Infinity;
                    for (let i = 0; i < gameRuntime.aliens.length; i++) {
                        const alien = gameRuntime.aliens[i];
                        const d = distance(orbitX, orbitY, alien.x, alien.y);
                        if (d < minDist) {
                            minDist = d;
                            nearestAlien = alien;
                        }
                    }
                    if (nearestAlien) {
                        const dx = nearestAlien.x - orbitX;
                        const dy = nearestAlien.y - orbitY;
                        const len = Math.sqrt(dx * dx + dy * dy);
                        if (len > 0) {
                            gameRuntime.alienBolts.push({
                                x: orbitX,
                                y: orbitY,
                                vx: (dx / len) * 150,
                                vy: (dy / len) * 150,
                                time: 0,
                                _active: true,
                                isCompanionBolt: true,
                            });
                        }
                    }
                }
            }
        }

        function drawCompanion() {
            if (!gameRuntime.companion) return;
            const comp = gameRuntime.companion;
            const orbitX = gameRuntime.ship.x + Math.cos(comp.angle) * comp.orbitRadius;
            const orbitY = gameRuntime.ship.y + Math.sin(comp.angle) * comp.orbitRadius;

            // Determine color based on level
            let color = '#00ffff'; // L1: cyan
            if (gameState.companionLevel >= 2) color = '#00ff88'; // L2: green
            if (gameState.companionLevel >= 3) color = '#ffdd00'; // L3: gold

            // Small glowing orb
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(orbitX, orbitY, 8, 0, Math.PI * 2);
            ctx.fill();

            // Glow effect
            const grd = ctx.createRadialGradient(orbitX, orbitY, 4, orbitX, orbitY, 12);
            grd.addColorStop(0, 'rgba(0, 255, 255, 0.3)');
            grd.addColorStop(1, 'rgba(0, 255, 255, 0)');
            ctx.fillStyle = grd;
            ctx.beginPath();
            ctx.arc(orbitX, orbitY, 12, 0, Math.PI * 2);
            ctx.fill();

            // Shield ring when available (L2)
            if (gameState.companionLevel >= 2 && comp.shieldCooldown <= 0) {
                ctx.strokeStyle = 'rgba(0, 255, 200, 0.4)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(orbitX, orbitY, 18, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Trailing particles
            particles.spawnBurst(orbitX, orbitY, 1, color, 40, 0.2, 1);
        }

        // ============================================
        // ALIEN ENCOUNTERS (P4)
        // ============================================

        function updateEncounters(dt) {
            gameRuntime.encounterTimer += dt;

            // Spawn new encounter every 45-90 seconds if none active
            if (!gameRuntime.activeEncounter && gameRuntime.encounterTimer > 45 + Math.random() * 45) {
                gameRuntime.encounterTimer = 0;
                const types = Object.keys(ENCOUNTER_TYPES);
                const randomType = types[Math.floor(Math.random() * types.length)];
                gameRuntime.activeEncounter = {
                    type: randomType,
                    x: 60 + Math.random() * (DESIGN_WIDTH - 120),
                    y: 150 + Math.random() * 400,
                    timer: 0,
                    data: {
                        distressHP: 3,
                        wormholeActive: false,
                    },
                };
            }

            // Update active encounter
            if (gameRuntime.activeEncounter) {
                const enc = gameRuntime.activeEncounter;
                enc.timer += dt;

                if (enc.type === 'wormhole') {
                    // Check if player enters it
                    const d = distance(gameRuntime.ship.x, gameRuntime.ship.y, enc.x, enc.y);
                    if (d < 50) {
                        gameRuntime.distance += 2; // teleport +200m
                        gameRuntime.velocity *= 1.2;
                        particles.spawnBurst(enc.x, enc.y, 20, '#6644ff', 200, 0.8, 3);
                        // Spawn burst of aliens on other side
                        for (let i = 0; i < 3 + Math.floor(Math.random() * 3); i++) {
                            spawnAlien('scout', DESIGN_WIDTH / 2 + (Math.random() - 0.5) * 100, 100 + Math.random() * 100);
                        }
                        gameRuntime.activeEncounter = null;
                        gameRuntime.encounterTimer = 0;
                    }
                } else if (enc.type === 'distress_signal') {
                    // Check if aliens destroy the signal or if player protects it for 10s
                    if (enc.timer > 10) {
                        gameState.coins += 150;
                        showToast('Distress Signal Protected! +150 coins');
                        gameRuntime.activeEncounter = null;
                        gameRuntime.encounterTimer = 0;
                    }
                    // Aliens can hit it — handled elsewhere
                } else if (enc.type === 'solar_flare') {
                    // Screen tinted orange, ship thrust doubles, aliens slow
                    if (enc.timer > 8) {
                        gameRuntime.activeEncounter = null;
                        gameRuntime.encounterTimer = 0;
                    }
                } else if (enc.type === 'alien_market') {
                    // Available for 8s, tap to buy
                    if (enc.timer > 8) {
                        gameRuntime.activeEncounter = null;
                        gameRuntime.encounterTimer = 0;
                    }
                }
            }
        }

        function drawEncounter() {
            if (!gameRuntime.activeEncounter) return;
            const enc = gameRuntime.activeEncounter;

            if (enc.type === 'wormhole') {
                // Spinning spiral with purple-blue gradient
                ctx.save();
                ctx.translate(enc.x, enc.y);
                ctx.rotate(enc.timer * 3);

                for (let i = 0; i < 3; i++) {
                    ctx.strokeStyle = ['rgba(102, 68, 255, 0.6)', 'rgba(68, 102, 255, 0.4)', 'rgba(68, 68, 255, 0.2)'][i];
                    ctx.lineWidth = 3 - i;
                    ctx.beginPath();
                    ctx.arc(0, 0, 20 + i * 15, 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.restore();
            } else if (enc.type === 'distress_signal') {
                // Small flickering ship with "SOS" text
                ctx.save();
                ctx.translate(enc.x, enc.y);

                if (Math.floor(enc.timer * 2) % 2 === 0) {
                    ctx.fillStyle = '#ffff00';
                    ctx.globalAlpha = 0.8;
                } else {
                    ctx.fillStyle = '#ff8800';
                    ctx.globalAlpha = 0.3;
                }

                ctx.beginPath();
                ctx.moveTo(0, -10);
                ctx.lineTo(-8, 10);
                ctx.lineTo(0, 6);
                ctx.lineTo(8, 10);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = '#ffff00';
                ctx.globalAlpha = 1;
                ctx.font = 'bold 8px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('SOS', 0, 20);

                ctx.restore();
            } else if (enc.type === 'solar_flare') {
                // Orange-tinted overlay with pulsing gradient
                const alpha = 0.3 + Math.sin(enc.timer * 3) * 0.1;
                ctx.fillStyle = 'rgba(255, 165, 0, ' + alpha + ')';
                ctx.fillRect(enc.x - 100, enc.y - 100, 200, 200);
            } else if (enc.type === 'alien_market') {
                // Rotating space station with green lights
                ctx.save();
                ctx.translate(enc.x, enc.y);
                ctx.rotate(enc.timer * 1.5);

                ctx.strokeStyle = '#00ff44';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, 20, 0, Math.PI * 2);
                ctx.stroke();

                // Spokes
                for (let i = 0; i < 4; i++) {
                    const angle = (i / 4) * Math.PI * 2;
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(Math.cos(angle) * 25, Math.sin(angle) * 25);
                    ctx.stroke();
                }

                // Green lights
                ctx.fillStyle = '#00ff44';
                for (let i = 0; i < 4; i++) {
                    const angle = (i / 4) * Math.PI * 2;
                    ctx.beginPath();
                    ctx.arc(Math.cos(angle) * 25, Math.sin(angle) * 25, 3, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        function handleEncounterTap(x, y) {
            if (!gameRuntime.activeEncounter) return;
            const enc = gameRuntime.activeEncounter;
            const d = distance(x, y, enc.x, enc.y);

            if (d < 40) {
                if (enc.type === 'alien_market') {
                    // Open quick-buy menu (simplified: just give shield for 50 coins)
                    if (gameState.coins >= 50) {
                        gameState.coins -= 50;
                        gameRuntime.shield.active = true;
                        showToast('Shield acquired!');
                        gameRuntime.activeEncounter = null;
                        gameRuntime.encounterTimer = 0;
                    } else {
                        showToast('Not enough coins!');
                    }
                }
            }
        }

        // ============================================
        // XP & Level System
        // ============================================

        function awardXP(amount) {
            gameState.xp += amount;
            while (gameState.xp >= gameState.xpToNext) {
                gameState.xp -= gameState.xpToNext;
                gameState.level++;
                gameState.xpToNext = Math.floor(gameState.xpToNext * (gameState.level < 10 ? 1.4 : 1.2));
                showToast('Level ' + gameState.level + '!');
            }
        }

        // ============================================
        // Achievement System
        // ============================================

        function checkAchievements() {
            for (let i = 0; i < ACHIEVEMENTS.length; i++) {
                const ach = ACHIEVEMENTS[i];
                if (!gameState.achievements[ach.id] && ach.check()) {
                    audioManager.playAchievement();
                    gameState.achievements[ach.id] = { unlocked: true, unlockedAt: Date.now() };
                    gameState.coins += ach.reward;
                    showToast('Achievement: ' + ach.name);
                    saveToStorage();
                }
            }
        }

        // ============================================
        // Game Updates
        // ============================================

        function updateGame(dt) {
            if (gameRuntime.state !== STATES.playing) return;

            let energyDrain = NAV_DRAIN;
            if (gameRuntime.shield.active) energyDrain += SHIELD_DRAIN;
            if (gameState.settings.aiAssist) energyDrain += AI_DRAIN;
            // Stabilizer upgrade: -10% energy drain per level
            const stabilizerReduction = Math.max(0.4, 1 - gameState.upgrades.stabilizer * 0.1);
            gameRuntime.energy.current -= energyDrain * stabilizerReduction * dt;
            gameRuntime.energy.current += gameRuntime.energy.recharge * dt;
            gameRuntime.energy.current = clamp(gameRuntime.energy.current, 0, MAX_ENERGY);

            if (gameRuntime.energy.current < 10) gameRuntime.shield.active = false;

            if (gameRuntime.surge.active && Date.now() > gameRuntime.surge.endTime) {
                gameRuntime.surge.active = false;
            }

            // Ship follows finger position directly (set in touch/mouse handlers)
            gameRuntime.ship.update(dt);

            // Power-up spawning (AI Director adjusts frequency)
            gameRuntime.powerUpSpawnTimer += dt;
            const puInterval = (15 + Math.random() * 10) / gameRuntime.aiDirector.powerUpBoost;
            if (gameRuntime.powerUpSpawnTimer > puInterval && !gameRuntime.activePowerUp) {
                gameRuntime.powerUpSpawnTimer = 0;
                const pu = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
                const spawned = gameRuntime.obstacles.spawn(Math.random() * (DESIGN_WIDTH - 60) + 30, -30, 'powerup');
                if (spawned) {
                    spawned.powerUpType = pu;
                    spawned.radius = 18;
                }
            }

            // Difficulty-based spawn scaling (AI Director modulates)
            const diffMultipliers = { easy: 0.6, medium: 1.0, hard: 1.4, legend: 2.0 };
            const diffMult = diffMultipliers[gameState.settings.difficulty] || 1.0;
            const distanceScale = 1 + gameRuntime.distance * 0.02; // gets harder over time
            const directorScale = gameRuntime.aiDirector.spawnRateMult;
            const spawnChance = 0.03 * diffMult * Math.min(distanceScale, 3) * directorScale;

            if (Math.random() < spawnChance) {
                const types = ['asteroid', 'debris', 'radiation', 'storm'];
                const chances = [0.35, 0.25, 0.25, 0.15];
                let r = Math.random();
                let type = 'asteroid';
                for (let i = 0; i < types.length; i++) {
                    if (r < chances[i]) {
                        type = types[i];
                        break;
                    }
                    r -= chances[i];
                }
                gameRuntime.obstacles.spawn(Math.random() * DESIGN_WIDTH, -30, type);
                if (type === 'storm') gameRuntime.aiDirector.totalCoinsSpawned++;
            }

            gameRuntime.obstacles.update(dt);

            const active = gameRuntime.obstacles.getActive();
            for (let i = 0; i < active.length; i++) {
                const obs = active[i];
                const d = distance(gameRuntime.ship.x, gameRuntime.ship.y, obs.x, obs.y);
                if (d < gameRuntime.ship.radius + obs.radius) {
                    if (obs.type === 'asteroid') {
                        gameRuntime.combo = 0;
                        if (!gameRuntime.shield.active) {
                            particles.spawnBurst(gameRuntime.ship.x, gameRuntime.ship.y, 15, '#ff4444', 150, 0.5, 3);
                            endGame();
                            return;
                        } else {
                            audioManager.playShieldHit();
                            particles.spawnBurst(obs.x, obs.y, 8, '#44aaff', 100, 0.3, 2);
                            gameRuntime.shield.active = false;
                            gameRuntime.cameraShakeIntensity = 10;
                            gameRuntime.cameraShakeDuration = 0.1;
                            hapticFeedback('heavy');
                        }
                    } else if (obs.type === 'storm') {
                        audioManager.playCoinCollect();
                        particles.spawnBurst(obs.x, obs.y, 12, '#ffdd00', 120, 0.4, 2);
                        gameRuntime.energy.current = Math.min(MAX_ENERGY, gameRuntime.energy.current + 50);
                        gameRuntime.velocity *= 1.4;
                        gameRuntime.surge.bar = Math.min(100, gameRuntime.surge.bar + 20);
                        gameRuntime.stormCount++;
                        gameRuntime.multiplier += 1;
                        gameRuntime.excitement = Math.min(1, gameRuntime.excitement + 0.3);
                        gameRuntime.aiDirector.totalCoinsCollected++;
                        showCommentary('storm');
                        hapticFeedback('success');
                    } else if (obs.type === 'debris') {
                        audioManager.playCollision();
                        particles.spawnBurst(obs.x, obs.y, 10, '#cccccc', 80, 0.35, 2);
                        // Shield upgrade: -12% damage per level
                        const shieldReduce = Math.max(0.4, 1 - gameState.upgrades.shield * 0.12);
                        gameRuntime.energy.current -= 15 * shieldReduce;
                        gameRuntime.cameraShakeIntensity = 5;
                        gameRuntime.cameraShakeDuration = 0.05;
                    } else if (obs.type === 'radiation') {
                        audioManager.playCollision();
                        particles.spawnBurst(obs.x, obs.y, 10, '#00ff00', 90, 0.3, 2);
                        const shieldReduce2 = Math.max(0.4, 1 - gameState.upgrades.shield * 0.12);
                        gameRuntime.energy.current -= 25 * shieldReduce2;
                    } else if (obs.type === 'powerup' && obs.powerUpType) {
                        audioManager.playCoinCollect();
                        particles.spawnBurst(obs.x, obs.y, 20, obs.powerUpType.color, 150, 0.5, 3);
                        gameRuntime.activePowerUp = obs.powerUpType;
                        gameRuntime.powerUpEndTime = Date.now() + obs.powerUpType.duration;
                        showToast(obs.powerUpType.icon + ' ' + obs.powerUpType.name + '!');
                        if (obs.powerUpType.id === 'shield') gameRuntime.shield.active = true;
                    }
                    obs._active = false;
                    gameRuntime.aiDirector.totalObstaclesPassed++; // AI Director: obstacle interacted
                } else if (!obs.type.includes('powerup') && !obs.type.includes('storm')) {
                    // Near-miss detection — if obstacle passed close but didn't hit
                    if (d < (gameRuntime.ship.radius + obs.radius) * 2.5 && d > (gameRuntime.ship.radius + obs.radius)) {
                        if (obs.type !== 'storm' && Date.now() - gameRuntime.lastNearMissTime > 300) {
                            gameRuntime.nearMissCount++;
                            gameRuntime.combo++;
                            gameRuntime.bestCombo = Math.max(gameRuntime.bestCombo, gameRuntime.combo);
                            gameRuntime.lastNearMissTime = Date.now();
                            gameRuntime.multiplier += 0.2;
                            gameRuntime.surge.bar = Math.min(100, gameRuntime.surge.bar + 3);
                            particles.spawnBurst(obs.x, obs.y, 5, '#ffffff', 60, 0.2, 1);
                            showToast('NEAR MISS! x' + gameRuntime.combo);
                        }
                    }
                }
            }

            if (gameRuntime.surge.bar >= 100) gameRuntime.surge.tier = 'L4';
            else if (gameRuntime.surge.bar >= 75) gameRuntime.surge.tier = 'L3';
            else if (gameRuntime.surge.bar >= 50) gameRuntime.surge.tier = 'L2';
            else gameRuntime.surge.tier = 'L1';

            // Power-up expiry
            if (gameRuntime.activePowerUp && Date.now() > gameRuntime.powerUpEndTime) {
                if (gameRuntime.activePowerUp.id === 'slowmo') {
                    // speed returns to normal
                }
                gameRuntime.activePowerUp = null;
            }

            gameRuntime.multiplier = Math.max(1, gameRuntime.multiplier - 0.25 * dt);
            gameRuntime.excitement = Math.max(0, gameRuntime.excitement - 0.5 * dt);

            // ALIEN FLEET UPDATE (P0)
            updateAliens(dt);
            checkAlienCollisions();

            // BOSS FIGHTS UPDATE (P1)
            if (gameRuntime.boss) {
                updateBoss(dt);
                checkBossCollisions();
            }

            // COMPANION DRONE UPDATE (P3)
            if (gameRuntime.companion) {
                updateCompanion(dt);
            }

            // ALIEN ENCOUNTERS UPDATE (P4)
            updateEncounters(dt);

            // AI DIRECTOR UPDATE (P2)
            updateAIDirector(dt);

            if (gameRuntime.cameraShakeDuration > 0) {
                gameRuntime.cameraShakeDuration -= dt;
            } else {
                gameRuntime.cameraShakeIntensity = 0;
            }

            particles.update(dt);
            updateTransition(dt);

            if (gameRuntime.energy.current <= 0) {
                endGame();
            }
        }

        // ============================================
        // Drawing
        // ============================================

        function drawGame() {
            ctx.save();

            if (gameRuntime.cameraShakeIntensity > 0) {
                const dx = (Math.random() - 0.5) * gameRuntime.cameraShakeIntensity;
                const dy = (Math.random() - 0.5) * gameRuntime.cameraShakeIntensity;
                ctx.translate(dx, dy);
            }

            // Rich deep-space gradient background
            const bgGrad = ctx.createLinearGradient(0, 0, 0, DESIGN_HEIGHT);
            bgGrad.addColorStop(0, '#0a1a3a');
            bgGrad.addColorStop(0.4, '#001a2e');
            bgGrad.addColorStop(1, '#000814');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, DESIGN_WIDTH, DESIGN_HEIGHT);

            drawNebulas();
            drawStars();
            drawAuroraEffect();
            drawSpeedLines();
            drawSun();
            gameRuntime.obstacles.draw();
            drawAIShips();
            if (gameRuntime.boss) drawBoss();
            gameRuntime.ship.draw();
            if (gameRuntime.companion) drawCompanion();
            particles.draw(ctx);
            if (gameRuntime.activeEncounter) drawEncounter();

            // Add vignette and high-speed effects before restore
            drawVignette();
            if (gameRuntime.velocity > 100) drawHighSpeedEffects();

            ctx.restore();

            drawHUD();
            drawSurgeZone();

            // Touch crosshair — shows where finger is guiding the ship
            if (gameRuntime.state === STATES.playing) {
                const tx = gameRuntime.mouseX, ty = gameRuntime.mouseY;
                ctx.strokeStyle = 'rgba(0, 200, 255, 0.2)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(tx, ty, 18, 0, Math.PI * 2);
                ctx.stroke();
                // Small crosshair
                ctx.beginPath();
                ctx.moveTo(tx - 6, ty); ctx.lineTo(tx + 6, ty);
                ctx.moveTo(tx, ty - 6); ctx.lineTo(tx, ty + 6);
                ctx.stroke();
            }

            drawTransition(ctx);
        }

        function drawStars() {
            for (let i = 0; i < gameRuntime.stars.length; i++) {
                const s = gameRuntime.stars[i];
                // Parallax: deeper stars (low z) scroll slower, near stars (high z) faster
                const scrollSpeed = (1 + s.z * 3) * 80; // 80-320 px/sec equivalent
                const scroll = gameRuntime.distance * scrollSpeed * 0.01;
                const y = ((s.baseY + scroll) % DESIGN_HEIGHT + DESIGN_HEIGHT) % DESIGN_HEIGHT;
                const size = 0.5 + s.z * 1.5; // near stars bigger

                // Twinkling effect: per-star phase offset
                const phase = (s.baseX * 0.31 + s.baseY * 0.47) % (Math.PI * 2);
                const twinkle = 0.3 + Math.sin(animationTime * 3 + phase) * 0.4 + s.z * 0.3;

                ctx.fillStyle = '#ffffff';
                ctx.globalAlpha = Math.max(0.1, twinkle);
                ctx.beginPath();
                ctx.arc(s.baseX, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        // Nebula clouds — rich colors, larger, more abundant
        const NEBULAS = [
            { cx: 80, cy: 150, r: 180, color: '100, 40, 150' },    // magenta
            { cx: 350, cy: 250, r: 160, color: '30, 120, 180' },   // teal
            { cx: 200, cy: 450, r: 200, color: '80, 30, 120' },    // purple
            { cx: 50, cy: 650, r: 170, color: '40, 100, 140' },    // blue
            { cx: 320, cy: 750, r: 150, color: '120, 30, 100' },   // magenta
            { cx: 150, cy: 900, r: 190, color: '60, 80, 160' },    // deep blue
            { cx: 370, cy: 1050, r: 140, color: '100, 40, 180' },  // purple
            { cx: 100, cy: 1250, r: 160, color: '50, 110, 140' },  // teal
            { cx: 300, cy: 1400, r: 150, color: '90, 40, 130' },   // magenta
            { cx: 200, cy: 1600, r: 170, color: '40, 90, 150' },   // blue
        ];
        function drawNebulas() {
            for (let i = 0; i < NEBULAS.length; i++) {
                const n = NEBULAS[i];
                const scroll = (gameRuntime.distance * 5 + i * 300) % (DESIGN_HEIGHT + n.r * 2);
                const ny = ((n.cy + scroll) % (DESIGN_HEIGHT + n.r * 2)) - n.r;
                const grd = ctx.createRadialGradient(n.cx, ny, n.r * 0.1, n.cx, ny, n.r);
                grd.addColorStop(0, 'rgba(' + n.color + ', 0.15)');
                grd.addColorStop(0.5, 'rgba(' + n.color + ', 0.06)');
                grd.addColorStop(1, 'rgba(' + n.color + ', 0)');
                ctx.fillStyle = grd;
                ctx.beginPath();
                ctx.arc(n.cx, ny, n.r, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Speed lines — dramatic at high velocity, wider, brighter, longer
        function drawSpeedLines() {
            const speed = gameRuntime.velocity;
            if (speed < 40) return;
            const intensity = Math.min(1, (speed - 40) / 100);
            const lineCount = Math.floor(intensity * 20);
            const opacity = Math.min(0.4, intensity * 0.4);
            ctx.strokeStyle = 'rgba(100, 200, 255, ' + opacity + ')';
            ctx.lineWidth = 1.5 + intensity * 1.5;
            for (let i = 0; i < lineCount; i++) {
                // Seeded position so lines don't flicker randomly each frame
                const seed = (i * 137.5 + gameRuntime.distance * 50) % DESIGN_WIDTH;
                const x = seed;
                const scrollY = ((i * 97.3 + gameRuntime.distance * 200) % (DESIGN_HEIGHT + 100)) - 50;
                const len = 25 + intensity * 50;
                ctx.beginPath();
                ctx.moveTo(x, scrollY);
                ctx.lineTo(x + (Math.sin(i) * 2), scrollY + len);
                ctx.stroke();
            }
        }

        // Aurora effect — animated color band across top third of screen
        function drawAuroraEffect() {
            const height = DESIGN_HEIGHT / 3;
            const grad = ctx.createLinearGradient(0, 0, 0, height);

            // Animate color shift for aurora wave
            const hueShift = animationTime * 0.5;
            const c1 = Math.sin(hueShift) * 0.3;
            const c2 = Math.sin(hueShift + Math.PI * 0.66) * 0.3;
            const c3 = Math.sin(hueShift + Math.PI * 1.33) * 0.3;

            grad.addColorStop(0, 'rgba(' + Math.floor(100 + c1 * 100) + ',' + Math.floor(80 + c2 * 100) + ',' + Math.floor(200 + c3 * 100) + ', 0.08)');
            grad.addColorStop(0.5, 'rgba(' + Math.floor(80 + c1 * 100) + ',' + Math.floor(100 + c2 * 100) + ',' + Math.floor(180 + c3 * 100) + ', 0.04)');
            grad.addColorStop(1, 'rgba(100, 100, 150, 0)');

            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, DESIGN_WIDTH, height);
        }

        // Vignette — dark edges, bright center
        function drawVignette() {
            const radius = Math.sqrt(DESIGN_WIDTH * DESIGN_WIDTH + DESIGN_HEIGHT * DESIGN_HEIGHT) / 2;
            const vignette = ctx.createRadialGradient(DESIGN_WIDTH / 2, DESIGN_HEIGHT / 2, radius * 0.5, DESIGN_WIDTH / 2, DESIGN_HEIGHT / 2, radius);
            vignette.addColorStop(0, 'rgba(0, 0, 0, 0)');
            vignette.addColorStop(0.8, 'rgba(0, 0, 0, 0.1)');
            vignette.addColorStop(1, 'rgba(0, 0, 0, 0.3)');
            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, DESIGN_WIDTH, DESIGN_HEIGHT);
        }

        // High-speed effects — subtle tint and chromatic aberration hint
        function drawHighSpeedEffects() {
            const speedFactor = Math.min(1, (gameRuntime.velocity - 100) / 100);

            // Blue tint at screen edges
            const edgeTint = ctx.createLinearGradient(0, 0, DESIGN_WIDTH, 0);
            edgeTint.addColorStop(0, 'rgba(100, 150, 200, ' + (speedFactor * 0.08) + ')');
            edgeTint.addColorStop(0.5, 'rgba(100, 150, 200, 0)');
            edgeTint.addColorStop(1, 'rgba(100, 150, 200, ' + (speedFactor * 0.08) + ')');
            ctx.fillStyle = edgeTint;
            ctx.fillRect(0, 0, DESIGN_WIDTH, DESIGN_HEIGHT);

            // Chromatic aberration hint (subtle colored edge offset)
            if (speedFactor > 0.5) {
                const aberration = speedFactor * 2;
                // Red left edge
                ctx.strokeStyle = 'rgba(255, 100, 100, ' + (speedFactor * 0.04) + ')';
                ctx.lineWidth = aberration;
                ctx.beginPath();
                ctx.moveTo(2, 0);
                ctx.lineTo(2, DESIGN_HEIGHT);
                ctx.stroke();
                // Cyan right edge
                ctx.strokeStyle = 'rgba(100, 200, 255, ' + (speedFactor * 0.04) + ')';
                ctx.beginPath();
                ctx.moveTo(DESIGN_WIDTH - 2, 0);
                ctx.lineTo(DESIGN_WIDTH - 2, DESIGN_HEIGHT);
                ctx.stroke();
            }
        }

        function drawSun() {
            const distAU = gameRuntime.distance / 150;
            // Sun shrinks and moves up as you fly away
            const sunY = 20 - distAU * 5;
            const coronaSize = Math.max(15, 100 / Math.sqrt(Math.max(1, distAU)));
            const coreSize = Math.max(5, 15 / Math.sqrt(Math.max(1, distAU * 0.5)));
            if (sunY + coronaSize < -20) return; // off-screen, skip draw
            const grd = ctx.createRadialGradient(DESIGN_WIDTH / 2, sunY, coreSize * 0.5, DESIGN_WIDTH / 2, sunY, coronaSize);
            grd.addColorStop(0, '#ffff99');
            grd.addColorStop(0.5, '#ff9900');
            grd.addColorStop(1, 'rgba(255, 150, 0, 0)');
            ctx.fillStyle = grd;
            ctx.beginPath();
            ctx.arc(DESIGN_WIDTH / 2, sunY, coronaSize, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.arc(DESIGN_WIDTH / 2, sunY, coreSize, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawAIShips() {
            // Draw alien bolts
            for (let i = 0; i < gameRuntime.alienBolts.length; i++) {
                const b = gameRuntime.alienBolts[i];
                if (!b._active) continue;
                ctx.save();
                ctx.translate(b.x, b.y);
                // Glowing energy bolt
                const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, 8);
                grad.addColorStop(0, '#ff4466');
                grad.addColorStop(0.5, '#ff2244');
                grad.addColorStop(1, 'rgba(255,34,68,0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(0, 0, 8, 0, Math.PI * 2);
                ctx.fill();
                // Core
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(0, 0, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            // Draw aliens
            for (let i = 0; i < gameRuntime.aliens.length; i++) {
                const a = gameRuntime.aliens[i];
                if (!a._active) continue;

                ctx.save();
                ctx.translate(a.x, a.y);

                // Flash white when hit
                const isFlashing = a.flashTimer > 0;

                // Cloak effect for phantom
                if (a.isCloaked) {
                    // If alien scanner is active, show at reduced alpha instead of fully cloaked
                    if (gameRuntime.alienScannerActive) {
                        ctx.globalAlpha = 0.4;
                    } else {
                        ctx.globalAlpha = 0.15 + Math.sin(a.time * 6) * 0.1;
                    }
                }

                switch (a.type) {
                    case 'scout': drawAlien_Scout(ctx, a, isFlashing); break;
                    case 'drone': drawAlien_Drone(ctx, a, isFlashing); break;
                    case 'mothership': drawAlien_Mothership(ctx, a, isFlashing); break;
                    case 'phantom': drawAlien_Phantom(ctx, a, isFlashing); break;
                }

                // HP bar (if damaged and not scout)
                if (a.hp < a.maxHp && a.maxHp > 1) {
                    const barW = a.radius * 2;
                    const barH = 3;
                    const barX = -barW / 2;
                    const barY = -a.radius - 10;
                    ctx.fillStyle = 'rgba(255,0,0,0.5)';
                    ctx.fillRect(barX, barY, barW, barH);
                    ctx.fillStyle = '#00ff44';
                    ctx.fillRect(barX, barY, barW * (a.hp / a.maxHp), barH);
                }

                ctx.restore();
            }
        }

        function drawAlien_Scout(ctx, a, flash) {
            const t = a.time;
            // Sleek triangular UFO with cyan glow
            const glow = ctx.createRadialGradient(0, 0, 4, 0, 0, 22);
            glow.addColorStop(0, flash ? 'rgba(255,255,255,0.6)' : 'rgba(0,229,255,0.4)');
            glow.addColorStop(1, 'rgba(0,229,255,0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(0, 0, 22, 0, Math.PI * 2);
            ctx.fill();

            // Body
            ctx.fillStyle = flash ? '#ffffff' : '#00b8d4';
            ctx.beginPath();
            ctx.moveTo(0, -14);
            ctx.lineTo(12, 8);
            ctx.lineTo(4, 5);
            ctx.lineTo(0, 12);
            ctx.lineTo(-4, 5);
            ctx.lineTo(-12, 8);
            ctx.closePath();
            ctx.fill();

            // Cockpit
            ctx.fillStyle = flash ? '#ffffff' : '#00e5ff';
            ctx.beginPath();
            ctx.arc(0, -2, 4, 0, Math.PI * 2);
            ctx.fill();

            // Thruster glow
            ctx.fillStyle = 'rgba(0,229,255,' + (0.3 + Math.sin(t * 10) * 0.2) + ')';
            ctx.beginPath();
            ctx.arc(0, 14, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawAlien_Drone(ctx, a, flash) {
            const t = a.time;
            // Rotating hexagonal craft with purple pulse
            ctx.save();
            ctx.rotate(t * 1.5);

            // Outer glow
            const glow = ctx.createRadialGradient(0, 0, 6, 0, 0, 28);
            glow.addColorStop(0, flash ? 'rgba(255,255,255,0.5)' : 'rgba(170,68,255,0.3)');
            glow.addColorStop(1, 'rgba(170,68,255,0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(0, 0, 28, 0, Math.PI * 2);
            ctx.fill();

            // Hexagon body
            ctx.fillStyle = flash ? '#ffffff' : '#7722cc';
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i - Math.PI / 6;
                const px = Math.cos(angle) * 16;
                const py = Math.sin(angle) * 16;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();

            // Inner hex
            ctx.fillStyle = flash ? '#ffffff' : '#aa44ff';
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i;
                const px = Math.cos(angle) * 8;
                const py = Math.sin(angle) * 8;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();

            ctx.restore();

            // Center eye
            ctx.fillStyle = flash ? '#ffffff' : '#ff44ff';
            ctx.beginPath();
            ctx.arc(0, 0, 4, 0, Math.PI * 2);
            ctx.fill();

            // Pulse ring
            const pulseR = 18 + Math.sin(t * 4) * 4;
            ctx.strokeStyle = 'rgba(170,68,255,' + (0.4 + Math.sin(t * 4) * 0.2) + ')';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(0, 0, pulseR, 0, Math.PI * 2);
            ctx.stroke();
        }

        function drawAlien_Mothership(ctx, a, flash) {
            const t = a.time;
            // Wide saucer with green tractor beam
            const glow = ctx.createRadialGradient(0, 0, 10, 0, 0, 40);
            glow.addColorStop(0, flash ? 'rgba(255,255,255,0.5)' : 'rgba(0,255,102,0.3)');
            glow.addColorStop(1, 'rgba(0,255,102,0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(0, 0, 40, 0, Math.PI * 2);
            ctx.fill();

            // Tractor beam
            ctx.fillStyle = 'rgba(0,255,102,' + (0.08 + Math.sin(t * 2) * 0.04) + ')';
            ctx.beginPath();
            ctx.moveTo(-18, 10);
            ctx.lineTo(18, 10);
            ctx.lineTo(30, 80);
            ctx.lineTo(-30, 80);
            ctx.closePath();
            ctx.fill();

            // Saucer body
            ctx.fillStyle = flash ? '#ffffff' : '#226644';
            ctx.beginPath();
            ctx.ellipse(0, 0, 28, 10, 0, 0, Math.PI * 2);
            ctx.fill();

            // Dome
            ctx.fillStyle = flash ? '#ffffff' : '#33cc66';
            ctx.beginPath();
            ctx.ellipse(0, -6, 14, 10, 0, Math.PI, 0);
            ctx.fill();

            // Lights around rim
            for (let i = 0; i < 8; i++) {
                const angle = (Math.PI * 2 / 8) * i + t * 2;
                const lx = Math.cos(angle) * 24;
                const ly = Math.sin(angle) * 8;
                ctx.fillStyle = i % 2 === 0 ? '#00ff66' : '#ffff00';
                ctx.beginPath();
                ctx.arc(lx, ly, 2, 0, Math.PI * 2);
                ctx.fill();
            }

            // Center light
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(0, -4, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawAlien_Phantom(ctx, a, flash) {
            const t = a.time;
            // Translucent shifting shape with red eye
            const glow = ctx.createRadialGradient(0, 0, 4, 0, 0, 24);
            glow.addColorStop(0, flash ? 'rgba(255,255,255,0.6)' : 'rgba(255,34,68,0.4)');
            glow.addColorStop(1, 'rgba(255,34,68,0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(0, 0, 24, 0, Math.PI * 2);
            ctx.fill();

            // Shifting body — organic shape
            ctx.fillStyle = flash ? 'rgba(255,255,255,0.7)' : 'rgba(100,0,30,0.7)';
            ctx.beginPath();
            for (let i = 0; i < 8; i++) {
                const angle = (Math.PI * 2 / 8) * i + t * 0.5;
                const r = 12 + Math.sin(t * 3 + i * 1.2) * 4;
                const px = Math.cos(angle) * r;
                const py = Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();

            // Red eye
            const eyeSize = 3 + Math.sin(t * 5) * 1;
            ctx.fillStyle = flash ? '#ffffff' : '#ff0033';
            ctx.beginPath();
            ctx.arc(0, 0, eyeSize, 0, Math.PI * 2);
            ctx.fill();

            // Eye glow
            ctx.fillStyle = 'rgba(255,0,51,' + (0.3 + Math.sin(t * 5) * 0.2) + ')';
            ctx.beginPath();
            ctx.arc(0, 0, eyeSize + 4, 0, Math.PI * 2);
            ctx.fill();

            // Cloak shimmer rings
            if (a.isCloaked) {
                ctx.strokeStyle = 'rgba(255,34,68,0.15)';
                ctx.lineWidth = 0.5;
                for (let r = 10; r < 20; r += 5) {
                    ctx.beginPath();
                    ctx.arc(0, 0, r + Math.sin(t * 4 + r) * 2, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
        }

        function drawHUD() {
            const safeTop = 20;
            const safeRight = 20;

            // Left panel background — glassmorphism style
            drawGlassPanel(15, safeTop + 10, 170, 140, 10, 'rgba(50, 80, 120, 0.15)');

            ctx.fillStyle = COLORS.text;
            ctx.font = "bold 18px 'Orbitron', monospace";
            ctx.textAlign = 'left';
            ctx.fillText('DISTANCE', 20, safeTop + 20);
            ctx.fillText(gameRuntime.distance.toFixed(1) + ' AU', 20, safeTop + 45);
            ctx.fillText('SPD: ' + gameRuntime.velocity.toFixed(0), 20, safeTop + 70);

            // Premium health bar with heart icon and animation
            drawHealthBar(20, safeTop + 85);

            // Surge bar with pulsation
            drawSurgeBar(20, safeTop + 115);

            // Right panel background — glassmorphism style
            drawGlassPanel(DESIGN_WIDTH - safeRight - 110, safeTop + 10, 100, 80, 8, 'rgba(50, 80, 120, 0.15)');

            ctx.textAlign = 'right';
            ctx.font = "bold 16px 'Orbitron', monospace";
            ctx.fillStyle = COLORS.multiplier;
            ctx.fillText('x' + gameRuntime.multiplier.toFixed(1), DESIGN_WIDTH - safeRight - 10, safeTop + 20);

            ctx.fillStyle = COLORS.text;
            ctx.font = "12px 'Orbitron', monospace";
            ctx.fillText('COINS: ' + gameState.coins, DESIGN_WIDTH - safeRight - 10, safeTop + 45);

            // Excitement bar
            ctx.fillStyle = '#333333';
            drawRoundRect(DESIGN_WIDTH - safeRight - 100, safeTop + 55, 90, 10, 2);
            ctx.fill();

            ctx.fillStyle = '#ff6b9d';
            drawRoundRect(DESIGN_WIDTH - safeRight - 100, safeTop + 55, 90 * gameRuntime.excitement, 10, 2);
            ctx.fill();

            // Combo counter with glow and scale animation
            if (gameRuntime.combo > 2) {
                const comboScale = 1 + Math.sin(animationTime * 4) * 0.15;
                ctx.save();
                ctx.translate(DESIGN_WIDTH / 2, 100);
                ctx.scale(comboScale, comboScale);
                ctx.font = "bold 28px 'Orbitron', monospace";
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ffdd00';
                ctx.globalAlpha = 0.9;
                // Glow effect
                ctx.shadowColor = '#ffdd00';
                ctx.shadowBlur = 20;
                ctx.fillText('COMBO x' + gameRuntime.combo, 0, 0);
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
                ctx.restore();
            }

            // Alien kill counter
            if (gameRuntime.aliensKilled > 0) {
                ctx.font = "12px 'Orbitron', monospace";
                ctx.textAlign = 'right';
                ctx.fillStyle = '#00e5ff';
                ctx.fillText('KILLS: ' + gameRuntime.aliensKilled, DESIGN_WIDTH - safeRight - 10, safeTop + 80);
            }

            // Alien warning indicator
            if (gameRuntime.aliens.length > 0) {
                const warningAlpha = 0.5 + Math.sin(Date.now() * 0.005) * 0.3;
                ctx.fillStyle = 'rgba(255,34,68,' + warningAlpha + ')';
                ctx.font = "bold 11px 'Orbitron', monospace";
                ctx.textAlign = 'center';
                ctx.fillText('ALIENS: ' + gameRuntime.aliens.filter(a => a._active).length, DESIGN_WIDTH / 2, safeTop + 18);
            }

            // Active power-up indicator
            if (gameRuntime.activePowerUp) {
                const remaining = Math.max(0, (gameRuntime.powerUpEndTime - Date.now()) / 1000);
                ctx.fillStyle = gameRuntime.activePowerUp.color;
                ctx.font = "bold 12px 'Orbitron', monospace";
                ctx.textAlign = 'left';
                ctx.fillText(gameRuntime.activePowerUp.icon + ' ' + gameRuntime.activePowerUp.name + ' ' + remaining.toFixed(1) + 's', 20, safeTop + 95);
            }

            // Commentary box
            if (gameRuntime.commentary.text && Date.now() < gameRuntime.commentary.endTime) {
                const alpha = Math.max(0, (gameRuntime.commentary.endTime - Date.now()) / 1000);
                ctx.fillStyle = `rgba(30, 30, 30, ${Math.min(1, alpha)})`;
                drawRoundRect(DESIGN_WIDTH / 2 - 120, DESIGN_HEIGHT - 100, 240, 50, 12);
                ctx.fill();

                ctx.fillStyle = COLORS.text;
                ctx.globalAlpha = alpha;
                ctx.font = "bold 14px 'Orbitron', monospace";
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(gameRuntime.commentary.text, DESIGN_WIDTH / 2, DESIGN_HEIGHT - 75);
                ctx.globalAlpha = 1;
            }

            // Pause button
            ctx.fillStyle = COLORS.ui;
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'top';
            ctx.fillText('⏸', DESIGN_WIDTH - 20, safeTop);

            // Red vignette flash when health is low
            if (gameRuntime.energy.current < 30) {
                const lowHealthFlash = Math.sin(animationTime * 6) * 0.5 + 0.5;
                ctx.fillStyle = 'rgba(200, 50, 50, ' + (lowHealthFlash * 0.1) + ')';
                ctx.fillRect(0, 0, DESIGN_WIDTH, DESIGN_HEIGHT);
            }

            // Screen-edge red pulse when taking damage
            if (gameRuntime.cameraShakeIntensity > 0) {
                const pulseIntensity = gameRuntime.cameraShakeIntensity / 10;
                ctx.strokeStyle = 'rgba(255, 100, 100, ' + (pulseIntensity * 0.3) + ')';
                ctx.lineWidth = Math.max(1, pulseIntensity * 3);
                ctx.beginPath();
                const offset = pulseIntensity * 2;
                ctx.rect(offset, offset, DESIGN_WIDTH - offset * 2, DESIGN_HEIGHT - offset * 2);
                ctx.stroke();
            }

            drawToasts();
        }

        // Glassmorphism panel background
        function drawGlassPanel(x, y, w, h, r, fillColor) {
            ctx.fillStyle = fillColor;
            drawRoundRect(x, y, w, h, r);
            ctx.fill();

            // Subtle gradient border for frosted glass effect
            ctx.strokeStyle = 'rgba(150, 180, 220, 0.3)';
            ctx.lineWidth = 1.5;
            drawRoundRect(x, y, w, h, r);
            ctx.stroke();
        }

        // Premium health bar with inner glow, gradient, and heart icon
        function drawHealthBar(x, y) {
            const energyPercent = gameRuntime.energy.current / MAX_ENERGY;
            const energyColor = energyPercent > 0.5 ? COLORS.energy.full :
                                 energyPercent > 0.2 ? COLORS.energy.mid : COLORS.energy.low;

            // Background
            ctx.fillStyle = '#1a1a2e';
            drawRoundRect(x, y, 150, 20, 4);
            ctx.fill();

            // Gradient fill for health bar
            const healthGrad = ctx.createLinearGradient(x, y, x, y + 20);
            healthGrad.addColorStop(0, energyColor);
            healthGrad.addColorStop(0.5, energyColor);
            healthGrad.addColorStop(1, 'rgba(200, 200, 200, 0.3)');
            ctx.fillStyle = healthGrad;
            drawRoundRect(x, y, 150 * energyPercent, 20, 4);
            ctx.fill();

            // Inner glow effect
            const glowGrad = ctx.createLinearGradient(x, y, x, y + 20);
            glowGrad.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
            glowGrad.addColorStop(0.5, 'rgba(255, 255, 255, 0)');
            glowGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = glowGrad;
            drawRoundRect(x, y, 150 * energyPercent, 20, 4);
            ctx.fill();

            // Border
            ctx.strokeStyle = energyColor;
            ctx.lineWidth = 2;
            drawRoundRect(x, y, 150, 20, 4);
            ctx.stroke();

            // Heart icon
            drawHeartIcon(x - 12, y + 6, 8);

            // Health percentage text with glow
            ctx.fillStyle = COLORS.text;
            ctx.font = "12px 'Orbitron', monospace";
            ctx.textAlign = 'center';
            ctx.globalAlpha = 0.8;
            ctx.shadowColor = energyColor;
            ctx.shadowBlur = 10;
            ctx.fillText(gameRuntime.energy.current.toFixed(0) + '/' + MAX_ENERGY, x + 75, y + 14);
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        // Draw a small heart icon for health display
        function drawHeartIcon(x, y, size) {
            ctx.fillStyle = '#ff4444';
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(size / 8, size / 8);
            ctx.beginPath();
            ctx.moveTo(0, -2);
            ctx.quadraticCurveTo(-3, -5, -5, -3);
            ctx.quadraticCurveTo(-6, -2, -4, 0);
            ctx.lineTo(0, 5);
            ctx.lineTo(4, 0);
            ctx.quadraticCurveTo(6, -2, 5, -3);
            ctx.quadraticCurveTo(3, -5, 0, -2);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        // Surge bar with pulsation when near full
        function drawSurgeBar(x, y) {
            const surgePercent = gameRuntime.surge.bar / 100;
            const surgeColor = COLORS.surge[gameRuntime.surge.tier];
            const threshold = gameRuntime.surge.tier === 'L1' ? 20 : gameRuntime.surge.tier === 'L2' ? 50 : gameRuntime.surge.tier === 'L3' ? 75 : 100;
            const isFull = gameRuntime.surge.bar >= threshold;

            // Pulsation effect when surge bar is near full
            let barWidth = 150;
            if (isFull) {
                barWidth = 150 + Math.sin(animationTime * 5) * 3;
            }

            // Background
            ctx.fillStyle = '#1a1a2e';
            drawRoundRect(x, y, 150, 15, 3);
            ctx.fill();

            // Surge fill
            ctx.fillStyle = surgeColor;
            drawRoundRect(x, y, 150 * surgePercent, 15, 3);
            ctx.fill();

            // Border
            ctx.strokeStyle = surgeColor;
            ctx.lineWidth = 1.5;
            drawRoundRect(x, y, barWidth, 15, 3);
            ctx.stroke();

            // Text label
            ctx.fillStyle = COLORS.text;
            ctx.font = "bold 10px 'Orbitron', monospace";
            ctx.textAlign = 'center';
            ctx.fillText('SURGE ' + gameRuntime.surge.tier, x + 75, y + 10);
        }

        function drawSurgeZone() {
            const surgeColor = COLORS.surge[gameRuntime.surge.tier];
            const threshold = gameRuntime.surge.tier === 'L1' ? 20 : gameRuntime.surge.tier === 'L2' ? 50 : gameRuntime.surge.tier === 'L3' ? 75 : 100;
            const ready = gameRuntime.surge.bar >= threshold;
            const fillPct = Math.min(1, gameRuntime.surge.bar / threshold);

            // Surge active full-screen edge glow
            if (gameRuntime.surge.active) {
                const remaining = Math.max(0, (gameRuntime.surge.endTime - Date.now()) / 3000);
                ctx.globalAlpha = remaining * 0.15;
                ctx.strokeStyle = surgeColor;
                ctx.lineWidth = 4;
                drawRoundRect(2, 2, DESIGN_WIDTH - 4, DESIGN_HEIGHT - 4, 8);
                ctx.stroke();
                ctx.globalAlpha = 1;
            }

            // Bottom-center surge indicator (compact pill)
            const pw = 140, ph = 28;
            const px = (DESIGN_WIDTH - pw) / 2, py = DESIGN_HEIGHT - 42;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            drawRoundRect(px, py, pw, ph, 14);
            ctx.fill();

            // Fill bar
            if (fillPct > 0.01) {
                ctx.fillStyle = ready ? surgeColor : 'rgba(255, 100, 0, 0.35)';
                drawRoundRect(px + 2, py + 2, (pw - 4) * fillPct, ph - 4, 12);
                ctx.fill();
            }

            // Border
            ctx.strokeStyle = ready ? surgeColor : 'rgba(255, 255, 255, 0.12)';
            ctx.lineWidth = ready ? 1.5 : 0.5;
            drawRoundRect(px, py, pw, ph, 14);
            ctx.stroke();

            // Text
            ctx.font = 'bold 11px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            if (gameRuntime.surge.active) {
                const secs = Math.max(0, (gameRuntime.surge.endTime - Date.now()) / 1000).toFixed(1);
                ctx.fillStyle = surgeColor;
                ctx.fillText('SURGE ACTIVE  ' + secs + 's', px + pw / 2, py + ph / 2);
            } else if (ready) {
                // Pulsing text
                ctx.fillStyle = surgeColor;
                const pulse = 0.7 + Math.sin(Date.now() * 0.008) * 0.3;
                ctx.globalAlpha = pulse;
                ctx.fillText('DOUBLE-TAP for SURGE!', px + pw / 2, py + ph / 2);
                ctx.globalAlpha = 1;
            } else {
                ctx.fillStyle = 'rgba(255,255,255,0.45)';
                ctx.fillText(gameRuntime.surge.tier + '  ' + Math.floor(gameRuntime.surge.bar) + '%', px + pw / 2, py + ph / 2);
            }
        }

        function drawToasts() {
            let yPos = DESIGN_HEIGHT - 100;
            for (let i = 0; i < toasts.length; i++) {
                const toast = toasts[i];
                toast.timer -= 0.016;
                if (toast.timer <= 0) {
                    toasts.splice(i, 1);
                    i--;
                    continue;
                }
                const alpha = Math.max(0, Math.min(1, toast.timer));
                ctx.fillStyle = `rgba(100, 200, 100, ${alpha * 0.8})`;
                drawRoundRect(30, yPos - 30, DESIGN_WIDTH - 60, 30, 6);
                ctx.fill();
                ctx.fillStyle = COLORS.text;
                ctx.globalAlpha = alpha;
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(toast.text, DESIGN_WIDTH / 2, yPos - 15);
                ctx.globalAlpha = 1;
                yPos -= 40;
            }
        }

        // ============================================
        // Menu Screens
        // ============================================

        // Reusable glass-card drawer
        function drawGlassCard(x, y, w, h, r, borderColor) {
            ctx.fillStyle = 'rgba(8, 18, 40, 0.65)';
            drawRoundRect(x, y, w, h, r);
            ctx.fill();
            ctx.strokeStyle = borderColor || 'rgba(80, 160, 255, 0.25)';
            ctx.lineWidth = 1;
            drawRoundRect(x, y, w, h, r);
            ctx.stroke();
        }

        // Reusable styled menu button
        function drawMenuBtn(x, y, w, h, label, baseColor, isActive) {
            // Dark fill with colored left accent bar
            drawGlassCard(x, y, w, h, 10, isActive ? baseColor : 'rgba(255,255,255,0.08)');
            // Accent bar on left
            ctx.fillStyle = baseColor;
            drawRoundRect(x, y, 4, h, 2);
            ctx.fill();
            // Subtle inner glow if active
            if (isActive) {
                ctx.fillStyle = baseColor.replace(')', ',0.12)').replace('rgb', 'rgba');
                drawRoundRect(x, y, w, h, 10);
                ctx.fill();
                ctx.strokeStyle = baseColor;
                ctx.lineWidth = 1.5;
                drawRoundRect(x, y, w, h, 10);
                ctx.stroke();
            }
            // Label
            ctx.fillStyle = isActive ? '#ffffff' : 'rgba(255,255,255,0.75)';
            ctx.font = isActive ? 'bold 14px Arial' : '13px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(label, x + w / 2, y + h / 2);
        }

        function drawMenuScreen() {
            // Background
            ctx.fillStyle = '#000a18';
            ctx.fillRect(0, 0, DESIGN_WIDTH, DESIGN_HEIGHT);

            // Background nebula gradients
            const nGrd1 = ctx.createRadialGradient(80, 200, 20, 80, 200, 250);
            nGrd1.addColorStop(0, 'rgba(20, 0, 60, 0.4)');
            nGrd1.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = nGrd1;
            ctx.fillRect(0, 0, DESIGN_WIDTH, DESIGN_HEIGHT);
            const nGrd2 = ctx.createRadialGradient(350, 600, 20, 350, 600, 200);
            nGrd2.addColorStop(0, 'rgba(0, 30, 80, 0.3)');
            nGrd2.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = nGrd2;
            ctx.fillRect(0, 0, DESIGN_WIDTH, DESIGN_HEIGHT);

            drawStars();

            // ─── TITLE ───
            // Glow behind title
            ctx.shadowColor = '#00aaff';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText('INFINITE VOYAGER', DESIGN_WIDTH / 2, 38);
            ctx.shadowBlur = 0;
            // Subtitle
            ctx.fillStyle = 'rgba(150, 200, 255, 0.6)';
            ctx.font = '12px Arial';
            ctx.fillText('Solar Sail Explorer', DESIGN_WIDTH / 2, 74);
            // Animated underline
            const lineW = 100 + Math.sin(animationTime * 2) * 15;
            ctx.strokeStyle = 'rgba(0, 170, 255, 0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(DESIGN_WIDTH / 2 - lineW / 2, 90);
            ctx.lineTo(DESIGN_WIDTH / 2 + lineW / 2, 90);
            ctx.stroke();

            // ─── SHIP PREVIEW ───
            const shipCY = 138;
            // Rotating orbit ring
            ctx.save();
            ctx.translate(DESIGN_WIDTH / 2, shipCY);
            ctx.rotate(animationTime * 0.5);
            ctx.strokeStyle = 'rgba(0, 200, 255, 0.12)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.ellipse(0, 0, 50, 18, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
            // Ship glow
            const sGlow = ctx.createRadialGradient(DESIGN_WIDTH / 2, shipCY, 5, DESIGN_WIDTH / 2, shipCY, 55);
            sGlow.addColorStop(0, 'rgba(0, 180, 255, 0.25)');
            sGlow.addColorStop(0.6, 'rgba(0, 100, 200, 0.06)');
            sGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = sGlow;
            ctx.beginPath();
            ctx.arc(DESIGN_WIDTH / 2, shipCY, 55, 0, Math.PI * 2);
            ctx.fill();
            // Ship
            ctx.save();
            ctx.translate(DESIGN_WIDTH / 2, shipCY);
            drawShipSkin(ctx, gameState.equippedSkin, 2.0);
            ctx.restore();

            // ─── PLAYER STATUS CARD ───
            const cardY = 192;
            const cardH = 68;
            drawGlassCard(24, cardY, DESIGN_WIDTH - 48, cardH, 12, 'rgba(0, 200, 100, 0.15)');
            // Gradient accent top edge
            const topAccent = ctx.createLinearGradient(24, cardY, DESIGN_WIDTH - 24, cardY);
            topAccent.addColorStop(0, 'rgba(0, 255, 136, 0.5)');
            topAccent.addColorStop(0.5, 'rgba(0, 170, 255, 0.5)');
            topAccent.addColorStop(1, 'rgba(140, 80, 255, 0.5)');
            ctx.fillStyle = topAccent;
            drawRoundRect(24, cardY, DESIGN_WIDTH - 48, 2, 1);
            ctx.fill();

            // Level pill
            ctx.fillStyle = 'rgba(0, 255, 136, 0.15)';
            drawRoundRect(36, cardY + 10, 50, 20, 10);
            ctx.fill();
            ctx.fillStyle = '#00ff88';
            ctx.font = 'bold 11px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('LV ' + gameState.level, 61, cardY + 20);

            // XP bar
            const xpBarX = 96, xpBarW = 110, xpBarH = 6;
            const xpPct = Math.min(1, gameState.xp / gameState.xpToNext);
            ctx.fillStyle = 'rgba(255,255,255,0.08)';
            drawRoundRect(xpBarX, cardY + 17, xpBarW, xpBarH, 3);
            ctx.fill();
            const xpGrd = ctx.createLinearGradient(xpBarX, 0, xpBarX + xpBarW, 0);
            xpGrd.addColorStop(0, '#00ff88');
            xpGrd.addColorStop(1, '#00bbff');
            ctx.fillStyle = xpGrd;
            if (xpPct > 0.01) { drawRoundRect(xpBarX, cardY + 17, xpBarW * xpPct, xpBarH, 3); ctx.fill(); }
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.font = '9px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(gameState.xp + '/' + gameState.xpToNext, xpBarX, cardY + 12);

            // Coins
            ctx.textAlign = 'right';
            ctx.fillStyle = '#ffdd44';
            ctx.font = 'bold 13px Arial';
            ctx.fillText(gameState.coins.toLocaleString(), DESIGN_WIDTH - 38, cardY + 18);
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.font = '9px Arial';
            ctx.fillText('coins', DESIGN_WIDTH - 38, cardY + 30);
            // Best / Streak
            ctx.fillStyle = 'rgba(255,255,255,0.55)';
            ctx.font = '11px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('Best: ' + gameState.bestDistance.toFixed(1) + ' AU', 36, cardY + 52);
            ctx.textAlign = 'right';
            ctx.fillText('Streak: ' + gameState.dailyStreak + ' day' + (gameState.dailyStreak !== 1 ? 's' : ''), DESIGN_WIDTH - 38, cardY + 52);

            // ─── DIFFICULTY SECTION LABEL ───
            const diffY = 280;
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.font = '10px Arial';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText('SELECT DIFFICULTY TO PLAY', 28, diffY - 14);

            // ─── DIFFICULTY GRID (2×2) ───
            const difficulties = ['easy', 'medium', 'hard', 'legend'];
            const diffColors = { easy: 'rgb(34, 204, 102)', medium: 'rgb(255, 153, 0)', hard: 'rgb(255, 51, 51)', legend: 'rgb(255, 215, 0)' };
            const diffNames = { easy: 'EASY', medium: 'MEDIUM', hard: 'HARD', legend: 'LEGEND' };
            const diffIcons = { easy: '▶', medium: '▶▶', hard: '▶▶▶', legend: '★' };
            const mPad = 24;
            const gapX = 10;
            const gapY = 8;
            const btnW = (DESIGN_WIDTH - mPad * 2 - gapX) / 2;
            const btnH = 44;

            for (let i = 0; i < difficulties.length; i++) {
                const diff = difficulties[i];
                const col = i % 2;
                const row = Math.floor(i / 2);
                const bx = mPad + col * (btnW + gapX);
                const by = diffY + row * (btnH + gapY);
                const isSelected = gameState.settings.difficulty === diff;
                drawMenuBtn(bx, by, btnW, btnH, diffIcons[diff] + '  ' + diffNames[diff], diffColors[diff], isSelected);
            }

            // ─── MODE SECTION LABEL ───
            const modeY = diffY + 2 * (btnH + gapY) + 12;
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.font = '10px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('GAME MODES', 28, modeY - 14);

            // ─── MODE BUTTONS (3-col) ───
            const modeBtnW = (DESIGN_WIDTH - mPad * 2 - gapX * 2) / 3;
            const modeBtnH = 38;
            const modeBtns = [
                { x: mPad, label: 'CAMPAIGN', color: 'rgb(0, 204, 255)' },
                { x: mPad + modeBtnW + gapX, label: 'RANKINGS', color: 'rgb(255, 204, 0)' },
                { x: mPad + 2 * (modeBtnW + gapX), label: 'CHALLENGES', color: 'rgb(255, 102, 51)' },
            ];
            for (let i = 0; i < modeBtns.length; i++) {
                const btn = modeBtns[i];
                drawMenuBtn(btn.x, modeY, modeBtnW, modeBtnH, btn.label, btn.color, false);
            }

            // ─── UTILITY SECTION ───
            const utilY = modeY + modeBtnH + 20;
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.font = '10px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('MORE', 28, utilY - 14);

            const utilBtns = [
                { label: 'SHOP', color: 'rgb(255, 136, 0)' },
                { label: 'UPGRADES', color: 'rgb(0, 136, 255)' },
                { label: 'SETTINGS', color: 'rgb(136, 136, 200)' },
                { label: 'STATS', color: 'rgb(100, 200, 150)' },
            ];
            const utilBtnH = 40;
            for (let i = 0; i < utilBtns.length; i++) {
                const col = i % 2;
                const row = Math.floor(i / 2);
                const bx = mPad + col * (btnW + gapX);
                const by = utilY + row * (utilBtnH + gapY);
                drawMenuBtn(bx, by, btnW, utilBtnH, utilBtns[i].label, utilBtns[i].color, false);
            }

            // Achievements row
            const achY = utilY + 2 * (utilBtnH + gapY) + 4;
            drawMenuBtn(mPad, achY, DESIGN_WIDTH - mPad * 2, 38, 'ACHIEVEMENTS', 'rgb(140, 80, 255)', false);

            // ─── TAP HANDLERS ───
            consumeTap((tap) => {
                // Difficulty grid
                for (let i = 0; i < difficulties.length; i++) {
                    const col = i % 2;
                    const row = Math.floor(i / 2);
                    const bx = mPad + col * (btnW + gapX);
                    const by = diffY + row * (btnH + gapY);
                    if (pointInRect(tap.x, tap.y, bx, by, btnW, btnH)) {
                        audioManager.playButtonClick();
                        gameState.settings.difficulty = difficulties[i];
                        saveToStorage();
                        initGame();
                        return;
                    }
                }
                // Mode buttons
                for (let i = 0; i < modeBtns.length; i++) {
                    if (pointInRect(tap.x, tap.y, modeBtns[i].x, modeY, modeBtnW, modeBtnH)) {
                        audioManager.playButtonClick();
                        if (i === 0) gameRuntime.state = STATES.levels;
                        else if (i === 1) gameRuntime.currentScreen = 'leaderboard';
                        else if (i === 2) gameRuntime.currentScreen = 'challenges';
                        return;
                    }
                }
                // Utility grid
                const utilActions = ['shop', 'upgrades', 'settings', 'stats'];
                for (let i = 0; i < utilBtns.length; i++) {
                    const col = i % 2;
                    const row = Math.floor(i / 2);
                    const bx = mPad + col * (btnW + gapX);
                    const by = utilY + row * (utilBtnH + gapY);
                    if (pointInRect(tap.x, tap.y, bx, by, btnW, utilBtnH)) {
                        audioManager.playButtonClick();
                        gameRuntime.currentScreen = utilActions[i];
                        return;
                    }
                }
                // Achievements
                if (pointInRect(tap.x, tap.y, mPad, achY, DESIGN_WIDTH - mPad * 2, 38)) {
                    audioManager.playButtonClick();
                    gameRuntime.currentScreen = 'achievements';
                    return;
                }
            });
        }

        // ============================================
        // LEADERBOARD SCREEN (Convex Backend)
        // ============================================
        let _leaderboardCache = null;
        let _leaderboardLoading = false;
        let _leaderboardLastFetch = 0;
        let _playerRankCache = null;

        function fetchLeaderboard() {
            if (_leaderboardLoading) return;
            const now = Date.now();
            if (_leaderboardCache && now - _leaderboardLastFetch < 15000) return; // cache 15s
            _leaderboardLoading = true;
            Promise.all([
                voyagerConvex.getLeaderboard(20),
                voyagerConvex.getPlayerRank(),
            ]).then(([lb, rank]) => {
                _leaderboardCache = lb || [];
                _playerRankCache = rank;
                _leaderboardLastFetch = Date.now();
            }).catch(() => {}).finally(() => { _leaderboardLoading = false; });
        }

        function drawLeaderboardScreen() {
            ctx.fillStyle = COLORS.bg;
            ctx.fillRect(0, 0, DESIGN_WIDTH, DESIGN_HEIGHT);

            // Fetch on first render
            fetchLeaderboard();

            // Title
            ctx.fillStyle = '#ffcc00';
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('LEADERBOARD', DESIGN_WIDTH / 2, 55);

            // Player name + rank badge
            const pName = localStorage.getItem('iv_player_name') || 'Unknown';
            ctx.fillStyle = COLORS.textAlt;
            ctx.font = '13px Arial';
            ctx.fillText('Player: ' + pName, DESIGN_WIDTH / 2, 78);

            if (_playerRankCache) {
                ctx.fillStyle = '#00ffcc';
                ctx.font = 'bold 14px Arial';
                ctx.fillText('Your Rank: #' + (_playerRankCache.rank || '—') + '  |  Best: ' + ((_playerRankCache.score || 0) / 100).toFixed(1) + ' AU', DESIGN_WIDTH / 2, 98);
            }

            // Loading state
            if (_leaderboardLoading && !_leaderboardCache) {
                ctx.fillStyle = COLORS.textAlt;
                ctx.font = '16px Arial';
                ctx.fillText('Loading...', DESIGN_WIDTH / 2, DESIGN_HEIGHT / 2);
            } else if (!_leaderboardCache || _leaderboardCache.length === 0) {
                ctx.fillStyle = COLORS.textAlt;
                ctx.font = '16px Arial';
                ctx.fillText('No leaderboard data yet', DESIGN_WIDTH / 2, DESIGN_HEIGHT / 2);
                ctx.font = '13px Arial';
                ctx.fillText('Play a game to get on the board!', DESIGN_WIDTH / 2, DESIGN_HEIGHT / 2 + 25);
            } else {
                // Table header
                const tableTop = 118;
                const rowH = 32;
                ctx.fillStyle = 'rgba(0, 100, 200, 0.2)';
                drawRoundRect(20, tableTop, DESIGN_WIDTH - 40, rowH, 6);
                ctx.fill();

                ctx.fillStyle = '#88aacc';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'left';
                ctx.fillText('#', 32, tableTop + 20);
                ctx.fillText('PLAYER', 60, tableTop + 20);
                ctx.textAlign = 'right';
                ctx.fillText('SCORE', DESIGN_WIDTH - 120, tableTop + 20);
                ctx.fillText('BEST AU', DESIGN_WIDTH - 32, tableTop + 20);

                // Rows
                const maxVisible = Math.min(_leaderboardCache.length, 18);
                for (let i = 0; i < maxVisible; i++) {
                    const entry = _leaderboardCache[i];
                    const y = tableTop + rowH + i * rowH;

                    // Highlight current player
                    const isMe = voyagerConvex._playerId && entry.playerId === voyagerConvex._playerId;

                    // Alternating row bg
                    if (isMe) {
                        ctx.fillStyle = 'rgba(0, 255, 200, 0.12)';
                    } else if (i % 2 === 0) {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
                    } else {
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                    }
                    drawRoundRect(20, y, DESIGN_WIDTH - 40, rowH - 2, 4);
                    ctx.fill();

                    // Rank medal for top 3
                    ctx.textAlign = 'left';
                    ctx.font = 'bold 13px Arial';
                    if (i === 0) ctx.fillStyle = '#ffd700';
                    else if (i === 1) ctx.fillStyle = '#c0c0c0';
                    else if (i === 2) ctx.fillStyle = '#cd7f32';
                    else ctx.fillStyle = isMe ? '#00ffcc' : COLORS.text;
                    ctx.fillText((i + 1).toString(), 32, y + 20);

                    // Name
                    ctx.font = isMe ? 'bold 13px Arial' : '13px Arial';
                    ctx.fillStyle = isMe ? '#00ffcc' : COLORS.text;
                    const name = (entry.playerName || 'Voyager').substring(0, 14);
                    ctx.fillText(name, 60, y + 20);

                    // Score
                    ctx.textAlign = 'right';
                    ctx.font = '13px Arial';
                    ctx.fillStyle = isMe ? '#ffdd00' : '#aabbcc';
                    ctx.fillText((entry.score || 0).toLocaleString(), DESIGN_WIDTH - 120, y + 20);

                    // Best AU
