let _scale = 1;
function fitCanvas() {
    const r = Math.min(window.innerWidth / W, window.innerHeight / H);
    canvas.style.width = (W * r) + 'px';
    canvas.style.height = (H * r) + 'px';
    _scale = r;
}
window.addEventListener('resize', fitCanvas); fitCanvas();

function screenToGame(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: (clientX - rect.left) / (rect.width / W),
        y: (clientY - rect.top) / (rect.height / H)
    };
}

// === DRAW ROUND RECT WRAPPER — NEVER use ctx.roundRect() directly ===
function drawRoundRect(ctx, x, y, w, h, r) {
    const R = typeof r === 'number' ? r : (Array.isArray(r) ? r[0] : 0);
    ctx.beginPath();
    ctx.moveTo(x + R, y);
    ctx.lineTo(x + w - R, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + R);
    ctx.lineTo(x + w, y + h - R);
    ctx.quadraticCurveTo(x + w, y + h, x + w - R, y + h);
    ctx.lineTo(x + R, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - R);
    ctx.lineTo(x, y + R);
    ctx.quadraticCurveTo(x, y, x + R, y);
    ctx.closePath();
}

// === TOUCH + MOUSE INPUT (DUAL) ===
const _taps = [];
let _dragStart = null;
let _dragCurrent = null;
let _isDragging = false;

function consumeTap() { return _taps.length > 0 ? _taps.shift() : null; }

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const pos = screenToGame(e.touches[0].clientX, e.touches[0].clientY);
    _taps.push(pos);
    _dragStart = pos;
    _dragCurrent = pos;
    _isDragging = true;
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (_isDragging) {
        _dragCurrent = screenToGame(e.touches[0].clientX, e.touches[0].clientY);
    }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    _isDragging = false;
    _dragStart = null;
    _dragCurrent = null;
}, { passive: false });

canvas.addEventListener('mousedown', (e) => {
    const pos = screenToGame(e.clientX, e.clientY);
    _taps.push(pos);
    _dragStart = pos;
    _dragCurrent = pos;
    _isDragging = true;
});

canvas.addEventListener('mousemove', (e) => {
    if (_isDragging) {
        _dragCurrent = screenToGame(e.clientX, e.clientY);
    }
});

canvas.addEventListener('mouseup', () => {
    _isDragging = false;
    _dragStart = null;
    _dragCurrent = null;
});

// === PRESTIGE SYSTEM FUNCTIONS (Phase 7) ===
function canPrestige() {
    return gameState.level >= PRESTIGE_CONFIG.maxLevel && gameState.prestigeLevel < PRESTIGE_CONFIG.maxPrestige;
}

function activatePrestige() {
    if (!canPrestige()) return;
    gameState.prestigeLevel++;
    const reward = PRESTIGE_CONFIG.rewards[gameState.prestigeLevel - 1];
    gameState.addCoins(reward.coinBonus);
    gameState.level = 1;
    gameState.xp = 0;
    gameState.saveToStorage();
    showToast(`${reward.name}! Prestige ${gameState.prestigeLevel}`, PRESTIGE_CONFIG.colors[gameState.prestigeLevel - 1], 3);
}

// === CHALLENGE FUNCTIONS (Phase 7) ===
function getWeekStart() {
    const d = new Date();
    d.setDate(d.getDate() - d.getDay());
    return d.toISOString().split('T')[0];
}

function refreshChallenges() {
    const today = new Date().toISOString().split('T')[0];
    const weekStart = getWeekStart();

    // Refresh daily challenges (pick 3 random from pool)
    if (gameState.lastDailyRefresh !== today) {
        const shuffled = [...CHALLENGE_POOL.daily].sort(() => Math.random() - 0.5);
        gameState.dailyChallenges = shuffled.slice(0, 3).map(c => ({ ...c, progress: 0, completed: false }));
        gameState.lastDailyRefresh = today;
    }

    // Refresh weekly challenges (pick 2 random from pool)
    if (gameState.lastWeeklyRefresh !== weekStart) {
        const shuffled = [...CHALLENGE_POOL.weekly].sort(() => Math.random() - 0.5);
        gameState.weeklyChallenges = shuffled.slice(0, 2).map(c => ({ ...c, progress: 0, completed: false }));
        gameState.lastWeeklyRefresh = weekStart;
    }

    gameState.saveToStorage();
}

function updateChallengeProgress(matchData) {
    // matchData = { kills, won, streak, combo, powerupsCollected, difficulty, hpPercent }
    const allChallenges = [...gameState.dailyChallenges, ...gameState.weeklyChallenges];
    for (const c of allChallenges) {
        if (c.completed) continue;
        switch (c.type) {
            case 'kills_single': if (matchData.kills >= c.target) { c.progress = c.target; } break;
            case 'wins': if (matchData.won) c.progress++; break;
            case 'combo': if (matchData.combo >= c.target) c.progress = c.target; break;
            case 'powerups': if (matchData.powerupsCollected >= c.target) c.progress = c.target; break;
            case 'healthy_win': if (matchData.won && matchData.hpPercent > 50) c.progress = 1; break;
            case 'streak': if (matchData.streak >= c.target) c.progress = c.target; break;
            case 'kills_total': c.progress += matchData.kills; break;
            case 'legend_win': if (matchData.won && matchData.difficulty === 'legend') c.progress = 1; break;
        }
        if (c.progress >= c.target && !c.completed) {
            c.completed = true;
            gameState.addCoins(c.reward);
            showToast(`✅ ${c.name} complete! +${c.reward}🪙`, '#00ff88', 2.5);
        }
    }
    gameState.saveToStorage();
}

// === UI DRAWING HELPERS ===
function drawGlassCard(ctx, x, y, w, h, r, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha || 0.15;
    ctx.fillStyle = '#ffffff';
    drawRoundRect(ctx, x, y, w, h, r || 16);
    ctx.fill();
    ctx.globalAlpha = 0.3;
    ctx.strokeStyle = '#00ff88';
    ctx.lineWidth = 1;
    drawRoundRect(ctx, x, y, w, h, r || 16);
    ctx.stroke();
    ctx.restore();
}

function drawNeonText(ctx, text, x, y, size, color, align) {
    ctx.save();
    ctx.font = `bold ${size}px 'Segoe UI', Arial, sans-serif`;
    ctx.textAlign = align || 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = color || '#00ff88';
    ctx.shadowBlur = 15;
    ctx.fillStyle = color || '#00ff88';
    ctx.fillText(text, x, y);
    ctx.shadowBlur = 0;
    ctx.restore();
}

function drawButton(ctx, text, x, y, w, h, color, textColor) {
    ctx.save();
    const gradient = ctx.createLinearGradient(x, y, x, y + h);
    gradient.addColorStop(0, color || '#00ff88');
    gradient.addColorStop(1, shadeColor(color || '#00ff88', -30));
    ctx.fillStyle = gradient;
    drawRoundRect(ctx, x, y, w, h, 12);
    ctx.fill();
    ctx.shadowColor = color || '#00ff88';
    ctx.shadowBlur = 10;
    drawRoundRect(ctx, x, y, w, h, 12);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.font = `bold ${Math.min(22, h * 0.45)}px 'Segoe UI', Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = textColor || '#0a0a1a';
    ctx.fillText(text, x + w / 2, y + h / 2);
    ctx.restore();
}

function shadeColor(color, percent) {
    const num = parseInt(color.replace('#', ''), 16);
    const amt = Math.round(2.55 * percent);
    const R = Math.min(255, Math.max(0, (num >> 16) + amt));
    const G = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amt));
    const B = Math.min(255, Math.max(0, (num & 0x0000FF) + amt));
    return `#${(0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1)}`;
}

// === SAKURA PETAL SYSTEM ===
const _sakuraPetals = [];
const SAKURA_MAX = 30;
function initSakura() {
    _sakuraPetals.length = 0;
    for (let i = 0; i < SAKURA_MAX; i++) {
        _sakuraPetals.push({
            x: Math.random() * W, y: Math.random() * H,
            size: 2 + Math.random() * 4,
            speed: 0.3 + Math.random() * 0.6,
            drift: (Math.random() - 0.5) * 0.4,
            rot: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.03,
            alpha: 0.15 + Math.random() * 0.25,
        });
    }
}
initSakura();
function updateSakura(dt) {
    for (const p of _sakuraPetals) {
        p.y += p.speed;
        p.x += p.drift + Math.sin(p.y * 0.01) * 0.3;
        p.rot += p.rotSpeed;
        if (p.y > H + 10) { p.y = -10; p.x = Math.random() * W; }
        if (p.x > W + 10) p.x = -10;
        if (p.x < -10) p.x = W + 10;
    }
}
function drawSakuraPetals(ctx) {
    for (const p of _sakuraPetals) {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = p.alpha;
        // Petal shape — two arcs forming a leaf
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(p.size, -p.size, p.size * 2, 0, 0, p.size);
        ctx.bezierCurveTo(-p.size * 2, 0, -p.size, -p.size, 0, 0);
        ctx.fillStyle = '#ffb7c5';
        ctx.fill();
        ctx.restore();
    }
}

// === JAPANESE WAVE PATTERN ===
let _wavePhase = 0;
function drawWavePattern(ctx) {
    _wavePhase += 0.003;
    ctx.save();
    ctx.globalAlpha = 0.04;
    ctx.strokeStyle = '#c8a0e8';
    ctx.lineWidth = 0.8;
    for (let row = 0; row < H; row += 50) {
        ctx.beginPath();
        for (let col = 0; col <= W; col += 2) {
            const yOff = Math.sin((col * 0.02) + _wavePhase + row * 0.1) * 8;
            if (col === 0) ctx.moveTo(col, row + yOff);
            else ctx.lineTo(col, row + yOff);
        }
        ctx.stroke();
    }
    ctx.restore();
}

// === VIGNETTE BACKGROUND (JAPANESE) ===
function drawBackground(ctx) {
    // During gameplay, use selectedTheme; on menu, use equippedTheme
    const themeKey = gameState.screen === 'playing' ? gameState.selectedTheme : gameState.equippedTheme;
    const arenaTheme = ARENA_THEMES[themeKey];
    const theme = THEME_MAP[gameState.equippedTheme] || THEME_MAP['neon'];

    // Use arena theme colors if available, otherwise fall back to THEME_MAP
    let bg;
    if (arenaTheme) {
        bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, arenaTheme.skyColor1);
        bg.addColorStop(0.5, arenaTheme.skyColor2);
        bg.addColorStop(1, arenaTheme.skyColor1);
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);
        // Grid from arena theme
        ctx.strokeStyle = arenaTheme.gridColor;
        ctx.lineWidth = 0.5;
        for (let x = 0; x < W; x += 50) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
        }
        for (let y = 0; y < H; y += 50) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
        }
        // Vignette
        const vg = ctx.createRadialGradient(W/2, H/2, H*0.25, W/2, H/2, H*0.65);
        vg.addColorStop(0, 'rgba(0,0,0,0)');
        vg.addColorStop(1, 'rgba(0,0,0,0.6)');
        ctx.fillStyle = vg;
        ctx.fillRect(0, 0, W, H);
    } else {
        // Fallback to original THEME_MAP logic
        bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, theme.bg[0]);
        bg.addColorStop(0.5, theme.bg[1]);
        bg.addColorStop(1, theme.bg[2]);
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);
        // Wave overlay (optional per theme)
        if (theme.wave) drawWavePattern(ctx);
        // Grid with theme-tinted color
        ctx.strokeStyle = theme.grid;
        ctx.lineWidth = 0.5;
        for (let x = 0; x < W; x += 50) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
        }
        for (let y = 0; y < H; y += 50) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
        }
        // Sakura petals (optional per theme)
        if (theme.petals) drawSakuraPetals(ctx);
        // Vignette
        const vg = ctx.createRadialGradient(W/2, H/2, H*0.25, W/2, H/2, H*0.65);
        vg.addColorStop(0, 'rgba(0,0,0,0)');
        vg.addColorStop(1, theme.vignette);
        ctx.fillStyle = vg;
        ctx.fillRect(0, 0, W, H);
    }
}

// === WEATHER FUNCTIONS (Phase 6) ===
function initWeatherParticles(weatherType) {
    weatherParticles = [];
    const cfg = WEATHER_EFFECTS[weatherType];
    if (!cfg || cfg.particles === 0) return;
    for (let i = 0; i < cfg.particles; i++) {
        weatherParticles.push({
            x: Math.random() * W,
            y: Math.random() * H,
            speed: cfg.speed * (0.7 + Math.random() * 0.6),
            size: cfg.size * (0.5 + Math.random()),
            drift: (cfg.drift || 0) * (Math.random() - 0.5),
        });
    }
}

function updateWeather(dt, weatherType) {
    const cfg = WEATHER_EFFECTS[weatherType];
    if (!cfg || cfg.particles === 0) return;
    // Storm lightning flash
    if (cfg.flashChance && Math.random() < cfg.flashChance) {
        weatherFlashTimer = 0.1;
    }
    if (weatherFlashTimer > 0) weatherFlashTimer -= dt;
    for (const p of weatherParticles) {
        p.y += p.speed * dt;
        p.x += (cfg.angle || 0) * p.speed * dt + (p.drift || 0) * Math.sin(p.y * 0.02) * dt * 30;
        // Wrap around
        if (p.speed > 0 && p.y > H) { p.y = -5; p.x = Math.random() * W; }
        if (p.speed < 0 && p.y < 0) { p.y = H + 5; p.x = Math.random() * W; }
        if (p.x < 0) p.x = W;
        if (p.x > W) p.x = 0;
    }
}

function drawWeather(ctx, weatherType) {
    const cfg = WEATHER_EFFECTS[weatherType];
    if (!cfg || cfg.particles === 0) return;
    ctx.save();
    ctx.globalAlpha = 0.6;
    // Storm flash
    if (weatherFlashTimer > 0) {
        ctx.globalAlpha = weatherFlashTimer * 3;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, W, H);
        ctx.globalAlpha = 0.6;
    }
    for (const p of weatherParticles) {
        ctx.fillStyle = cfg.color;
        if (weatherType === 'rain' || weatherType === 'storm') {
            // Rain as angled lines
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p.x + cfg.angle * 8, p.y + 8);
            ctx.strokeStyle = cfg.color;
            ctx.lineWidth = p.size * 0.5;
            ctx.globalAlpha = 0.4;
            ctx.stroke();
        } else {
            // Snow/embers as circles
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    ctx.restore();
}

function initMenuPetals() {

            rotSpeed: (Math.random() - 0.5) * 0.04,
            alpha: 0.25 + Math.random() * 0.35,
            color: c.fill,

            phase: Math.random() * Math.PI * 2,      // individual phase offset
        });
    }
}
initMenuPetals();

function updateMenuPetals(dt) {
    for (const p of _menuPetals) {
        p.y += p.speedY;
        p.x += p.speedX + Math.sin(p.y * p.driftFreq + p.phase) * p.drift * dt * 2;
        p.rot += p.rotSpeed;
        // Subtle size pulse
        p._pulse = (p._pulse || 0) + dt * 2;
        if (p.y > H + 15) { p.y = -15; p.x = Math.random() * W; }
        if (p.x > W + 15) p.x = -15;
        if (p.x < -15) p.x = W + 15;
    }
}

function drawMenuPetals(ctx) {
    for (const p of _menuPetals) {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        const pulse = 1 + 0.15 * Math.sin(p._pulse || 0);
        const sz = p.size * pulse;
        ctx.globalAlpha = p.alpha;
        // Soft glow behind petal
        ctx.shadowColor = p.glowColor;
        ctx.shadowBlur = sz * 2;
        // Petal shape — two bezier arcs forming a leaf
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(sz, -sz * 1.1, sz * 2.2, 0, 0, sz * 1.1);
        ctx.bezierCurveTo(-sz * 2.2, 0, -sz, -sz * 1.1, 0, 0);
        ctx.fillStyle = p.color;
        ctx.fill();
        // Inner highlight
        ctx.globalAlpha = p.alpha * 0.4;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(sz * 0.5, -sz * 0.5, sz * 1.1, 0, 0, sz * 0.5);
        ctx.bezierCurveTo(-sz * 1.1, 0, -sz * 0.5, -sz * 0.5, 0, 0);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();
    }
}

            radius: 2 + Math.random() * 3,
            color: MENU_ORB_COLORS[i % MENU_ORB_COLORS.length],
            vx: (Math.random() - 0.5) * 0.6,
            vy: (Math.random() - 0.5) * 0.4,
            phase: Math.random() * Math.PI * 2,
            orbitRadius: 30 + Math.random() * 60,
            orbitSpeed: 0.3 + Math.random() * 0.5,
            trail: [],  // position history for trail
            alpha: 0.5 + Math.random() * 0.3,
        });
    }
}
initMenuOrbs();

function updateMenuOrbs(dt, t) {
    for (const o of _menuOrbs) {
        // Smooth orbital wandering
        o.x += o.vx + Math.sin(t * o.orbitSpeed + o.phase) * 0.5;
        o.y += o.vy + Math.cos(t * o.orbitSpeed * 0.7 + o.phase) * 0.3;
        // Bounce off edges gently
        if (o.x < -20) o.x = W + 20;
        if (o.x > W + 20) o.x = -20;
        if (o.y < -20) o.y = H + 20;
        if (o.y > H + 20) o.y = -20;
        // Trail — store last 12 positions
        o.trail.push({ x: o.x, y: o.y });
        if (o.trail.length > 12) o.trail.shift();
    }
}

function drawMenuOrbs(ctx) {
    for (const o of _menuOrbs) {
        ctx.save();
        // Draw trail
        if (o.trail.length > 2) {
            for (let i = 1; i < o.trail.length; i++) {
                const t = o.trail[i];
                const frac = i / o.trail.length;
                ctx.globalAlpha = frac * o.alpha * 0.3;
                ctx.beginPath();
                ctx.arc(t.x, t.y, o.radius * frac * 0.6, 0, Math.PI * 2);
                ctx.fillStyle = o.color;
                ctx.fill();
            }
        }
        // Main orb with glow
        ctx.globalAlpha = o.alpha;
        ctx.shadowColor = o.color;
        ctx.shadowBlur = o.radius * 6;
        ctx.beginPath();
        ctx.arc(o.x, o.y, o.radius, 0, Math.PI * 2);
        const orbGrad = ctx.createRadialGradient(o.x - 1, o.y - 1, 0, o.x, o.y, o.radius);
        orbGrad.addColorStop(0, '#ffffff');
        orbGrad.addColorStop(0.3, o.color);
        orbGrad.addColorStop(1, o.color + '00');
        ctx.fillStyle = orbGrad;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();
    }
}

const _auroraWaves = [];
const AURORA_WAVE_COUNT = 4;
const AURORA_COLORS = [
    { from: 'rgba(0,255,136,0.06)', to: 'rgba(0,255,136,0)' },
    { from: 'rgba(0,204,255,0.05)', to: 'rgba(0,204,255,0)' },
    { from: 'rgba(204,68,255,0.04)', to: 'rgba(204,68,255,0)' },
    { from: 'rgba(232,160,191,0.04)', to: 'rgba(232,160,191,0)' },
];
for (let i = 0; i < AURORA_WAVE_COUNT; i++) {
    _auroraWaves.push({
        yBase: 30 + i * 35,
        amplitude: 15 + i * 8,
        freq: 0.008 + i * 0.003,
        speed: 0.4 + i * 0.15,
        height: 60 + i * 20,
        color: AURORA_COLORS[i],
        phase: i * 1.2,
    });
}

function drawAurora(ctx, t) {
    ctx.save();
    for (const wave of _auroraWaves) {
        ctx.beginPath();
        ctx.moveTo(0, wave.yBase);
        // Build wave path across screen width
        for (let x = 0; x <= W; x += 4) {
            const y = wave.yBase + Math.sin(x * wave.freq + t * wave.speed + wave.phase) * wave.amplitude
                     + Math.sin(x * wave.freq * 2.3 + t * wave.speed * 0.7) * wave.amplitude * 0.3;
            ctx.lineTo(x, y);
        }
        // Close to bottom of wave band
        for (let x = W; x >= 0; x -= 4) {
            const y = wave.yBase + wave.height + Math.sin(x * wave.freq * 0.8 + t * wave.speed * 0.5 + wave.phase + 1) * wave.amplitude * 0.5;
            ctx.lineTo(x, y);
        }
        ctx.closePath();
        // Gradient fill
        const grad = ctx.createLinearGradient(0, wave.yBase, 0, wave.yBase + wave.height);
        grad.addColorStop(0, wave.color.from);
        grad.addColorStop(0.5, wave.color.from);
        grad.addColorStop(1, wave.color.to);
        ctx.fillStyle = grad;
        ctx.fill();
    }
    ctx.restore();
}

        ctx.lineTo(s.x - sz * 0.3, s.y - sz * 0.3);
        ctx.closePath();
        ctx.shadowColor = s.color;
        ctx.shadowBlur = sz * 3;

function updateMenu(dt) {
    // Check daily reward availability
    if (checkDailyReward && checkDailyReward()) {
        // Show daily indicator (handled in draw)
    }
    // Tutorial on first launch — progressive onboarding
    if (!gameState.tutorialSeen) {
        const tap = consumeTap();
        if (tap) {
            tutorialStep++;
            if (tutorialStep >= TUTORIAL_STEPS.length) {
                gameState.tutorialSeen = true;
                if (gameState.onboardingStep === 0) gameState.onboardingStep = 1; // start progressive onboarding
                gameState.saveToStorage();
            }
        }
        return;
    }
    const tap = consumeTap();
    if (!tap) return;
    // Settings gear (top-right, drawn at W-28, 28 r16)
    if (hitTest(tap, W - 46, 10, 36, 36)) {
        gameState.screen = 'settings';
        return;
    }
    // Daily reward button (bottom area — Y=750)
    if (hitTest(tap, _mx, 750, 50, 42)) {
        gameState.screen = 'daily';
        return;
    }
    // Weapon selector (3 cards) — 34px height
    const weaponY = ML.weaponY, weaponW = (_mw - 8) / 3;
    const weaponKeys = Object.keys(WEAPONS);
    for (let i = 0; i < weaponKeys.length; i++) {
        const wx = _mx + i * (weaponW + 4);
        if (hitTest(tap, wx, weaponY, weaponW, 34)) {
            gameState.selectedWeapon = weaponKeys[i];
            gameState.saveToStorage();
            return;
        }
    }

        const shimmerX = ((pTime * 40 + by * 0.5) % (bw + 60)) - 30;

    }

    // === Bottom ambient fog ===
    const fogGrad = ctx.createLinearGradient(0, H - 80, 0, H);
    fogGrad.addColorStop(0, 'rgba(0,0,0,0)');
    fogGrad.addColorStop(0.6, `rgba(0,10,5,${0.15 + 0.05 * Math.sin(pTime * 0.5)})`);
    fogGrad.addColorStop(1, `rgba(0,20,10,${0.3 + 0.1 * Math.sin(pTime * 0.8)})`);
    ctx.fillStyle = fogGrad;
    ctx.fillRect(0, H - 80, W, 80);

    // === Top edge subtle light line ===
    ctx.save();
    const topLineGrad = ctx.createLinearGradient(0, 0, W, 0);
    topLineGrad.addColorStop(0, 'rgba(0,255,136,0)');
    topLineGrad.addColorStop(0.3, `rgba(0,255,136,${0.15 + 0.1 * Math.sin(pTime * 1.2)})`);
    topLineGrad.addColorStop(0.5, `rgba(0,204,255,${0.2 + 0.1 * Math.sin(pTime * 1.5)})`);
    topLineGrad.addColorStop(0.7, `rgba(200,160,232,${0.15 + 0.1 * Math.sin(pTime * 1.8)})`);
    topLineGrad.addColorStop(1, 'rgba(0,255,136,0)');
    ctx.strokeStyle = topLineGrad; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0, 1); ctx.lineTo(W, 1); ctx.stroke();
    ctx.restore();

    // Tutorial overlay
    if (typeof drawTutorial === 'function') drawTutorial(ctx);
}

// === ML DATA STORE ===
const mlStore = { events: [], maxEvents: 500 };
function logEvent(type, data) {
    mlStore.events.push({ type, data, ts: Date.now() });
    if (mlStore.events.length > mlStore.maxEvents) mlStore.events.shift();
}

// === CAMERA SHAKE ===
const camera = { shakeX: 0, shakeY: 0, shakeDur: 0, shakeIntensity: 0 };
function cameraShake(intensity, duration) {
    camera.shakeIntensity = intensity;
    camera.shakeDur = duration;
}
function updateCamera(dt) {
    if (camera.shakeDur > 0) {
        camera.shakeDur -= dt;
        camera.shakeX = (Math.random() - 0.5) * camera.shakeIntensity * 2;
        camera.shakeY = (Math.random() - 0.5) * camera.shakeIntensity * 2;
    } else { camera.shakeX = 0; camera.shakeY = 0; }
}

// === CROWD SYSTEM ===
const crowd = { excitement: 0, mood: 'neutral', waveTimer: 0 };
function updateCrowd(event) {
    switch(event) {
        case 'kill': crowd.excitement = Math.min(100, crowd.excitement + 25); crowd.mood = 'cheering'; break;
        case 'streak': crowd.excitement = Math.min(100, crowd.excitement + 35); crowd.mood = 'wild'; break;
        case 'damage': crowd.excitement = Math.max(0, crowd.excitement - 10); crowd.mood = 'tense'; break;
        case 'win': crowd.excitement = 100; crowd.mood = 'roaring'; break;
        case 'lose': crowd.excitement = 0; crowd.mood = 'disappointed'; break;
    }
}
function drawCrowd(ctx) {
    const barW = (crowd.excitement / 100) * 120;
    ctx.fillStyle = crowd.excitement > 70 ? '#ff4444' : crowd.excitement > 40 ? '#ffaa00' : '#44ff44';
    drawRoundRect(ctx, W - 140, 15, barW, 8, 4); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1;
    drawRoundRect(ctx, W - 140, 15, 120, 8, 4); ctx.stroke();
    ctx.font = '9px Arial'; ctx.textAlign = 'right'; ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('CROWD', W - 22, 12);
}

// === HAPTICS ===
const haptics = {
    enabled: true,
    fire(pattern) {
        if (!this.enabled || !gameState.hapticsEnabled) return;
        try {
            switch(pattern) {
                case 'light':   navigator.vibrate(10); break;
                case 'medium':  navigator.vibrate(25); break;
                case 'heavy':   navigator.vibrate(50); break;
                case 'success': navigator.vibrate([20, 50, 20]); break;
                case 'error':   navigator.vibrate([50, 30, 50, 30, 50]); break;
            }
        } catch(e) {}
    }
};

// Narrator state
let narratorText = '';
let narratorTimer = 0;
let narratorFadeIn = 0;
let narratorPriority = 0; // higher priority overrides current
let _narratorCooldown = 0;
let _firstBloodDone = false;
let _halfwayDone = false;
let _finalThreeDone = false;
let _gameStartNarrated = false;
let _lastNarratorEvent = '';

function triggerNarrator(event, data, priority) {
    priority = priority || 1;
    // Cooldown prevents spam (0.8s between low-priority, 0s for high-priority)
    if (_narratorCooldown > 0 && priority <= narratorPriority) return;
    if (priority < narratorPriority && narratorTimer > 0.5) return;

    const pool = AI_NARRATOR[event];
    if (!pool || pool.length === 0) return;
    let text = pool[Math.floor(Math.random() * pool.length)];

    // Template replacement
    if (data) {
        for (const [k, v] of Object.entries(data)) {
            text = text.replace(`{${k}}`, v);
        }
    }

    narratorText = text;
    narratorTimer = 3.5;
    narratorFadeIn = 0;
    narratorPriority = priority;
    _narratorCooldown = priority >= 3 ? 0.3 : 1.2;
    _lastNarratorEvent = event;
}

function updateNarrator(dt) {
    if (narratorTimer > 0) {
        narratorTimer -= dt;
        narratorFadeIn = Math.min(1, narratorFadeIn + dt * 4);
    }
    if (_narratorCooldown > 0) _narratorCooldown -= dt;

    // Auto-triggers based on game state
    if (!_gameStartNarrated && gameTimer > 0.5 && gameTimer < 2) {
        _gameStartNarrated = true;
        triggerNarrator('game_start', { count: aliveCount }, 2);
    }
    // Halfway point
    if (!_halfwayDone && aliveCount <= Math.ceil((totalBots + 1) / 2) && aliveCount > 3) {
        _halfwayDone = true;
        triggerNarrator('halfway', { count: aliveCount }, 2);
    }
    // Final three
    if (!_finalThreeDone && aliveCount === 3) {
        _finalThreeDone = true;
        triggerNarrator('final_three', {}, 3);
    }
}

function drawNarrator(ctx) {
    if (narratorTimer <= 0 || !narratorText) return;
    const alpha = Math.min(narratorFadeIn, Math.min(1, narratorTimer));
    if (alpha <= 0) return;

    ctx.save();
    ctx.globalAlpha = alpha;

    // Narrator bar at top-center below HUD (~y=60)
    const barY = 68;
    const barH = 28;
    const barW = Math.min(W - 20, 360);
    const barX = (W - barW) / 2;

    // Dark glass background
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    drawRoundRect(ctx, barX, barY, barW, barH, 8);
    ctx.fill();

    // Subtle accent border
    const borderGrad = ctx.createLinearGradient(barX, barY, barX + barW, barY);
    borderGrad.addColorStop(0, 'rgba(200,160,232,0.3)');
    borderGrad.addColorStop(0.5, 'rgba(232,160,191,0.5)');
    borderGrad.addColorStop(1, 'rgba(200,160,232,0.3)');
    ctx.strokeStyle = borderGrad;
    ctx.lineWidth = 1;
    drawRoundRect(ctx, barX, barY, barW, barH, 8);
    ctx.stroke();

    // AI icon
    ctx.font = '12px Arial';
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(200,160,232,0.8)';
    ctx.fillText('🤖', barX + 8, barY + barH / 2 + 4);

    // Narrator text — typewriter slide-in effect
    const displayLen = Math.floor(narratorText.length * Math.min(1, narratorFadeIn * 2));
    const displayText = narratorText.substring(0, displayLen);
    ctx.font = 'bold 11px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#e8d0f0';
    ctx.shadowColor = '#c8a0e8';
    ctx.shadowBlur = 4;
    ctx.fillText(displayText, W / 2, barY + barH / 2 + 4);
    ctx.shadowBlur = 0;

    ctx.restore();
}

function resetNarratorState() {
    narratorText = '';
    narratorTimer = 0;
    narratorFadeIn = 0;
    narratorPriority = 0;
    _narratorCooldown = 0;
    _firstBloodDone = false;
    _halfwayDone = false;
    _finalThreeDone = false;
    _gameStartNarrated = false;
    _lastNarratorEvent = '';
}

// === FLOATING DAMAGE NUMBERS ===
const _dmgNums = [];
function spawnDmgNum(x, y, text, color, isCrit) {
    _dmgNums.push({
        x: x + (Math.random() - 0.5) * 16, y, text: String(text),
        color: color || '#fff', vy: -80, alpha: 1, timer: 0.9,
        scale: isCrit ? 1.6 : 1.0, isCrit: !!isCrit,
    });
    if (_dmgNums.length > 20) _dmgNums.shift();
}
function updateDmgNums(dt) {
    for (let i = _dmgNums.length - 1; i >= 0; i--) {
        const d = _dmgNums[i];
        d.y += d.vy * dt;
        d.vy *= 0.96;
        d.timer -= dt;
        d.alpha = Math.max(0, d.timer / 0.9);
        if (d.timer <= 0) _dmgNums.splice(i, 1);
    }
}
function drawDmgNums(ctx) {
    for (const d of _dmgNums) {
        ctx.save();
        ctx.globalAlpha = d.alpha;
        ctx.font = `bold ${Math.floor(14 * d.scale)}px Arial`;
        ctx.textAlign = 'center';
        if (d.isCrit) { ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 12; }
        ctx.fillStyle = d.color;
        ctx.fillText(d.text, d.x, d.y);
        ctx.restore();
    }
}

// === ENVIRONMENTAL HAZARDS (Phase 3) ===
const HAZARD_TYPES = {
    lava: { name: 'Lava Pool', color: '#ff4400', glowColor: 'rgba(255,68,0,0.25)', radius: 35, damage: 5, interval: 0.5, duration: 12, spawnAfter: 15, warningTime: 2.0 },
    lightning: { name: 'Lightning', color: '#ffff00', glowColor: 'rgba(255,255,0,0.25)', radius: 40, damage: 25, duration: 0.3, spawnAfter: 25, warningTime: 1.5, stunDuration: 1.0 },
    poison: { name: 'Poison Cloud', color: '#88ff00', glowColor: 'rgba(136,255,0,0.15)', radius: 50, damage: 3, interval: 0.3, duration: 8, spawnAfter: 20, warningTime: 1.0, slowFactor: 0.5 },
};
let activeHazards = [];
let hazardSpawnTimer = 10;

function spawnHazard() {
    // Pick a hazard type based on game time
    const eligible = Object.entries(HAZARD_TYPES).filter(([k, v]) => gameTimer >= v.spawnAfter);
    if (eligible.length === 0 || activeHazards.length >= 3) return;
    const [key, cfg] = eligible[Math.floor(Math.random() * eligible.length)];
    const x = arena.x + 30 + Math.random() * (arena.w - 60);
    const y = arena.y + 30 + Math.random() * (arena.h - 60);
    activeHazards.push({
        type: key, x, y, ...cfg,
        timer: cfg.warningTime + cfg.duration,
        warningTimer: cfg.warningTime,
        active: false,
        damageTickTimer: 0,
        opacity: 0,
        hasStruck: false, // for lightning (one-shot)
    });
    showToast(key === 'lava' ? '🔥 LAVA POOL!' : key === 'lightning' ? '⚡ LIGHTNING INCOMING!' : '☠ POISON CLOUD!', cfg.color, 1.5);
}

function updateHazards(dt) {
    for (let i = activeHazards.length - 1; i >= 0; i--) {
        const h = activeHazards[i];
        h.timer -= dt;
        // Warning phase
        if (h.warningTimer > 0) {
            h.warningTimer -= dt;
            if (h.warningTimer <= 0) {
                h.active = true;
                h.opacity = 1;
            }
            activeHazards[i] = h;
            continue;
        }
        // Active phase — check collisions with ALL entities
        if (h.active) {
            h.opacity = Math.min(1, h.timer / 1.0); // fade out in last second
            const allEntities = [player, ...bots].filter(e => e && e.alive);
            for (const entity of allEntities) {
                const dx = entity.x - h.x, dy = entity.y - h.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > h.radius) continue;

                if (h.type === 'lightning' && !h.hasStruck) {
                    // One-shot burst damage + stun
                    entity.hp -= h.damage;
                    entity.hitFlash = 0.2;
                    if (entity.isPlayer) spawnDmgNum(entity.x, entity.y - 25, `-${h.damage}`, '#ffff00', true);
                    // Stun: freeze movement briefly
                    entity.frozen = true;
                    entity.effectTimers.freeze = h.stunDuration || 1.0;
                    cameraShake(10, 0.3);
                    // Check for death
                    if (entity.hp <= 0 && entity.alive) {
                        entity.alive = false;
                        aliveCount--;
                        playDeathFX(entity);
                        if (!entity.isPlayer) {
                            addKillFeed('⚡ ' + h.name, entity.nameTag);
                        }
                    }
                } else if (h.type === 'lava' || h.type === 'poison') {
                    // Tick damage
                    h.damageTickTimer -= dt;
                    if (h.damageTickTimer <= 0) {
                        h.damageTickTimer = h.interval;
                        entity.hp -= h.damage;
                        entity.hitFlash = 0.1;
                        if (entity.isPlayer) spawnDmgNum(entity.x, entity.y - 20, `-${h.damage}`, h.color, false);
                        // Check for death
                        if (entity.hp <= 0 && entity.alive) {
                            entity.alive = false;
                            aliveCount--;
                            playDeathFX(entity);
                            if (!entity.isPlayer) {
                                const hazardIcon = h.type === 'lava' ? '🔥' : '☠';
                                addKillFeed(hazardIcon + ' ' + h.name, entity.nameTag);
                            }
                        }
                    }
                    // Poison slow
                    if (h.type === 'poison' && !entity.frozen) {
                        entity._poisonSlow = true;
                    }
                }
            }
            if (h.type === 'lightning' && !h.hasStruck) h.hasStruck = true;
        }
        // Remove expired or out-of-arena hazards
        if (h.timer <= 0 || h.x < arena.x || h.x > arena.x + arena.w || h.y < arena.y || h.y > arena.y + arena.h) {
            activeHazards.splice(i, 1);
        }
    }
}

function drawHazards(ctx) {
    for (const h of activeHazards) {
        ctx.save();
        if (!h.active) {
            // Warning phase: pulsing dashed circle
            const pulse = 0.4 + 0.4 * Math.sin(Date.now() / 150);
            ctx.globalAlpha = pulse;
            ctx.beginPath();
            ctx.arc(h.x, h.y, h.radius, 0, Math.PI * 2);
            ctx.strokeStyle = '#ff3355';
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
            // Warning text
            ctx.font = 'bold 10px Arial'; ctx.textAlign = 'center';
            ctx.fillStyle = '#ff3355';
            ctx.fillText('⚠', h.x, h.y + 4);
        } else {
            ctx.globalAlpha = h.opacity * 0.7;
            if (h.type === 'lava') {
                // Orange-red glowing circle with bubble animation
                const grad = ctx.createRadialGradient(h.x, h.y, 0, h.x, h.y, h.radius);
                grad.addColorStop(0, 'rgba(255,100,0,0.8)');
                grad.addColorStop(0.6, 'rgba(255,50,0,0.5)');
                grad.addColorStop(1, 'rgba(255,30,0,0)');
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.arc(h.x, h.y, h.radius, 0, Math.PI * 2); ctx.fill();
                // Bubbles
                ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 10;
                for (let b = 0; b < 4; b++) {
                    const bx = h.x + Math.cos(Date.now() / 300 + b * 1.5) * h.radius * 0.5;
                    const by = h.y + Math.sin(Date.now() / 250 + b * 2) * h.radius * 0.4;
                    ctx.beginPath(); ctx.arc(bx, by, 2 + Math.sin(Date.now()/200 + b) * 1.5, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,200,50,0.6)'; ctx.fill();
                }
            } else if (h.type === 'lightning') {
                // Bright flash with jagged lines
                ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 20;
                ctx.beginPath(); ctx.arc(h.x, h.y, h.radius * 0.8, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,100,0.6)'; ctx.fill();
                // Jagged lines
                ctx.strokeStyle = '#ffff88'; ctx.lineWidth = 2;
                for (let l = 0; l < 6; l++) {
                    const a = (l / 6) * Math.PI * 2;
                    ctx.beginPath(); ctx.moveTo(h.x, h.y);
                    let px = h.x, py = h.y;
                    for (let s = 0; s < 3; s++) {
                        px += Math.cos(a) * 12 + (Math.random() - 0.5) * 10;
                        py += Math.sin(a) * 12 + (Math.random() - 0.5) * 10;
                        ctx.lineTo(px, py);
                    }
                    ctx.stroke();
                }
            } else if (h.type === 'poison') {
                // Green translucent cloud with swirling particles
                const grad = ctx.createRadialGradient(h.x, h.y, 0, h.x, h.y, h.radius);
                grad.addColorStop(0, 'rgba(100,255,0,0.4)');
                grad.addColorStop(0.7, 'rgba(80,200,0,0.2)');
                grad.addColorStop(1, 'rgba(60,150,0,0)');
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.arc(h.x, h.y, h.radius, 0, Math.PI * 2); ctx.fill();
                // Swirl particles
                ctx.shadowColor = '#88ff00'; ctx.shadowBlur = 6;
                for (let p = 0; p < 5; p++) {
                    const pa = Date.now() / 500 + p * 1.3;
                    const pr = h.radius * 0.3 + Math.sin(pa * 2) * h.radius * 0.2;
                    const px = h.x + Math.cos(pa) * pr;
                    const py = h.y + Math.sin(pa) * pr;
                    ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(150,255,50,0.5)'; ctx.fill();
                }
            }
        }
        ctx.restore();
    }
}

// === HIT SPARK SYSTEM ===
function spawnHitSparks(attackerX, attackerY, targetX, targetY, count, isCrit) {
    const angle = Math.atan2(targetY - attackerY, targetX - attackerX);
    const sparkCount = isCrit ? count * 2 : count;
    for (let i = 0; i < sparkCount; i++) {
        const spread = (Math.random() - 0.5) * 1.2;
        const spd = 150 + Math.random() * 150;
        const life = 0.2 + Math.random() * 0.2;
        _hitSparks.push({
            x: targetX, y: targetY,
            vx: Math.cos(angle + spread) * spd,
            vy: Math.sin(angle + spread) * spd,
            life, maxLife: life,
            size: isCrit ? 3 + Math.random() * 2 : 2 + Math.random() * 2,
            isCrit,
        });
    }
    if (_hitSparks.length > 60) _hitSparks.splice(0, _hitSparks.length - 60);
}
function updateHitSparks(dt) {
    for (let i = _hitSparks.length - 1; i >= 0; i--) {
        const s = _hitSparks[i];
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        s.vx *= 0.92; s.vy *= 0.92;
        s.life -= dt;
        if (s.life <= 0) _hitSparks.splice(i, 1);
    }
}
function drawHitSparks(ctx) {
    for (const s of _hitSparks) {
        const t = s.life / s.maxLife;
        ctx.save();
        ctx.globalAlpha = t;
        // Color gradient: white→yellow→orange over lifetime
        if (t > 0.6) ctx.fillStyle = '#ffffff';
        else if (t > 0.3) ctx.fillStyle = '#ffdd44';
        else ctx.fillStyle = '#ff8800';
        if (s.isCrit) { ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 8; }
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size * t, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

function updateElimRings(dt) {

        r.timer -= dt;

        r.radius = 10 + (r.maxRadius - 10) * progress;

}
function drawElimRings(ctx) {
