// === ENTITY UPDATE HELPERS ===
function clampToArena(entity) {
    const r = entity.radius;
    entity.x = Math.max(arena.x + r, Math.min(arena.x + arena.w - r, entity.x));
    entity.y = Math.max(arena.y + r, Math.min(arena.y + arena.h - r, entity.y));
}

function isOutsideArena(entity) {
    return entity.x < arena.x || entity.x > arena.x + arena.w ||
           entity.y < arena.y || entity.y > arena.y + arena.h;
}

function dist(a, b) {
    return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
}

function findNearest(entity, targets) {
    let nearest = null, minDist = Infinity;
    for (const t of targets) {
        if (!t.alive || t === entity) continue;
        const d = dist(entity, t);
        if (d < minDist) { minDist = d; nearest = t; }
    }
    return { target: nearest, dist: minDist };
}

function applyDamage(attacker, target) {
    if (!target.alive) return;
    if (target.frozen) return; // frozen targets immune momentarily
    // Check dodge invulnerability
    if (target.isInvulnerable) {
        showToast('DODGE!', '#00ffcc', 0.6);
        spawnDmgNum(target.x, target.y - target.radius - 10, 'DODGE!', '#00ffcc', false);
        return;
    }
    if (target.shieldActive) {
        showToast('BLOCKED!', '#ffcc00', 0.8);
        spawnDmgNum(target.x, target.y - target.radius, 'BLOCK', '#ffcc00', false);
        return;
    }
    let dmg = attacker.damage;
    if (attacker.damageBoost) dmg *= 2;
    if (rageMode && attacker.isPlayer) dmg *= 1.5;
    // Bot-vs-bot damage reduction — bots deal 50% less to each other so games last longer
    if (!attacker.isPlayer && !target.isPlayer) dmg *= 0.5;
    // Critical hit (20% chance)
    let isCrit = false;
    if (Math.random() < 0.2) {
        dmg = Math.floor(dmg * 2);
        isCrit = true;
        cameraShake(6, 0.15);
    }
    dmg = Math.floor(dmg);
    // === COMBO SYSTEM ===
    if (attacker.isPlayer) {
        // Increment combo and reset timer
        attacker.comboCount++;
        attacker.comboTimer = 3.0;
        // Calculate damage bonus: 10% per combo hit, max 80%
        attacker.comboDamageBonus = Math.min(attacker.comboCount * 0.1, 0.8);
        dmg = Math.floor(dmg * (1 + attacker.comboDamageBonus));
        // Track max combo
        if (attacker.comboCount > attacker.maxCombo) {
            attacker.maxCombo = attacker.comboCount;
            maxComboThisGame = attacker.maxCombo;
        }
        // Combo pulse animation
        attacker.comboPulse = 0.15;
        // Floating combo text on hits
        if (attacker.comboCount > 1) {
            spawnDmgNum(target.x, target.y + target.radius + 10, `+${attacker.comboCount - 1}`, '#ffaa00', false);
        }
    }
    target.hp -= dmg;
    target.hitFlash = 0.15;
    // Floating damage number
    const dmgColor = isCrit ? '#ffcc00' : (attacker.isPlayer ? '#ff3355' : '#ff8888');
    spawnDmgNum(target.x, target.y - target.radius, isCrit ? `${dmg}!` : `-${dmg}`, dmgColor, isCrit);
    // Knockback
    const kbDx = target.x - attacker.x;
    const kbDy = target.y - attacker.y;
    const kbLen = Math.sqrt(kbDx * kbDx + kbDy * kbDy) || 1;
    const baseKbForce = attacker.knockback || 20;
    const kbForce = isCrit ? baseKbForce * 1.5 : baseKbForce * 0.5;
    target.vx += (kbDx / kbLen) * kbForce;
    target.vy += (kbDy / kbLen) * kbForce;
    // === HIT SPARKS (Phase 4) ===
    spawnHitSparks(attacker.x, attacker.y, target.x, target.y, 6, isCrit);
    if (isCrit && attacker.isPlayer) {
        triggerScreenFlash('#ffcc00', 0.25);
        spawnDmgNum(target.x + 15, target.y - target.radius - 18, 'CRIT!', '#ffff00', true);
    }
    if (attacker.isPlayer) {
        surgeMeter = Math.min(100, surgeMeter + 5);
        updateCrowd('damage');
        // Only vibrate on crits, not every auto-attack
        if (isCrit) haptics.fire('medium');
        audio.play('hit');
        logEvent('hit', { dmg, targetHp: target.hp, isCrit });
    }
    if (target.hp <= 0) {
        target.alive = false;
        aliveCount--;
        // Elimination ring effect (Phase 4)
        spawnElimRing(target.x, target.y, target.skin.body);
        cameraShake(6, 0.2);
        // Death FX (custom or default)
        playDeathFX(target);
        // Kill FX — upgraded with more particles
        playKillFX(attacker, target);
        // Extra burst particles for eliminations
        particles.burst(target.x, target.y, 18, { speed: 130, life: 0.5, size: 3, color: target.skin.body, gravity: 150, shrink: true });
        if (attacker.isPlayer) {
            gameState.kills++;
            gameState.score += GAME_CONFIG.scoring.killPoints;
            streak++;
            if (streak > bestStreakThisGame) bestStreakThisGame = streak;
            surgeMeter = Math.min(100, surgeMeter + 15);
            gameState.addCoins(5);
            cameraShake(8, 0.3);
            haptics.fire('medium');
            audio.play('kill');
            updateCrowd('kill');
            showToast(getCommentary('kill'), '#ff3355', 1.5);
            addKillFeed('YOU', target.nameTag);
            spawnKanjiVFX(target.x, target.y, 'kill');
            // === KILL CAM LOGIC (Phase 4) ===
            const aliveBotsAfterKill = bots.filter(b => b.alive).length;
            if (aliveBotsAfterKill === 0) {
                // Last kill — cinematic final kill cam
                activateKillCam('FINAL KILL', target.x, target.y, 1.8);
                triggerScreenFlash('#ffffff', 0.4);
                cameraShake(15, 0.6);
            } else if (rageMode) {
                // Rage kill — shorter kill cam
                activateKillCam('RAGE KILL', target.x, target.y, 0.8);
                triggerScreenFlash('#ff3355', 0.2);
            } else {
                slowMoTimer = 0.25; // normal kill slow-mo
            }
            logEvent('kill', { kills: gameState.kills, streak });
            // Kill streak VFX escalation (Phase 4)
            if (streak >= 5) {
                killStreakGlowTimer = 3.0;
                killStreakGlowIntensity = Math.min(0.4, 0.15 + streak * 0.03);
            }
            if (streak >= 3) {
                spawnKanjiVFX(player.x, player.y - 30, 'streak');
                showToast(streak >= 5 ? '🔥 UNSTOPPABLE! x' + streak : getCommentary('streak'), '#ffcc00', 2);
                updateCrowd('streak');
                haptics.fire('heavy');
                audio.play('streak');
            }
            // Narrator: personality-specific kill line for player kills
            if (target.personality && AI_NARRATOR.personality_kill[target.personality.id]) {
                // Narrate who player killed based on victim's personality
                triggerNarrator('personality_kill_victim', null, 1);
            }
            // Narrator: first blood
            if (!_firstBloodDone) {
                _firstBloodDone = true;
                triggerNarrator('first_blood', { killer: 'YOU' }, 3);
            }
            // Narrator: player streak
            if (streak >= 3) {
                triggerNarrator('player_streak', { streak }, 2);
            }
        } else {
            // Bot killed another bot
            addKillFeed(attacker.nameTag, target.nameTag);
            aliveCount = 1 + bots.filter(b => b.alive).length;
            // Narrator: first blood by bot
            if (!_firstBloodDone) {
                _firstBloodDone = true;
                triggerNarrator('first_blood', { killer: attacker.nameTag }, 2);
            }
            // Narrator: personality-specific kill for bots
            if (attacker.personality) {
                const persKills = AI_NARRATOR.personality_kill[attacker.personality.id];
                if (persKills && Math.random() < 0.4) {
                    const line = persKills[Math.floor(Math.random() * persKills.length)];
                    narratorText = line.replace('{name}', attacker.nameTag);
                    narratorTimer = 3; narratorFadeIn = 0; narratorPriority = 1;
                    _narratorCooldown = 1.5;
                }
            }
            // Narrator: bot-vs-bot clash (low frequency)
            if (Math.random() < 0.15) {
                triggerNarrator('bot_vs_bot', { a: attacker.nameTag, b: target.nameTag }, 1);
            }
        }
    }
    // === EMOTIONAL TRIGGERS ===
    // Last Stand — player HP drops below 20% for the first time
    if (target.isPlayer && target.alive && target.hp > 0 && target.hp <= target.maxHp * 0.2 && !gameState._lastStandTriggered) {
        gameState._lastStandTriggered = true;
        showToast('💔 LAST STAND — FIGHT OR FALL!', '#ff3355', 3);
        cameraShake(10, 0.5);
        haptics.fire('heavy');
        slowMoTimer = 0.4;
        spawnKanjiVFX(player.x, player.y, 'danger');
        triggerNarrator('player_low_hp', {}, 3);
    }
    // Revenge — player kills the bot that last hurt them
    if (attacker.isPlayer && target.hp <= 0 && gameState._lastAttacker === target) {
        showToast('⚡ REVENGE!', '#ff8800', 2);
        spawnKanjiVFX(target.x, target.y - 20, 'revenge');
        cameraShake(10, 0.3);
        haptics.fire('heavy');
        gameState.addCoins(10); // bonus revenge coins
        surgeMeter = Math.min(100, surgeMeter + 20);
    }
    // Track who last hit the player
    if (target.isPlayer && !attacker.isPlayer) {
        gameState._lastAttacker = attacker;
    }
    // Clutch Kill — player gets a kill while under 25% HP
    if (attacker.isPlayer && target.hp <= 0 && player.hp <= player.maxHp * 0.25 && player.hp > 0) {
        showToast('🔥 CLUTCH KILL!', '#ffcc00', 2.5);
        spawnKanjiVFX(player.x, player.y - 30, 'clutch');
        haptics.fire('heavy');
        gameState.addCoins(15);
    }
    // Final Two — dramatic moment when only player and 1 bot remain
    if (attacker.isPlayer && target.hp <= 0) {
        const aliveBotsNow = bots.filter(b => b.alive).length;
        if (aliveBotsNow === 1 && !gameState._finalTwoTriggered) {
            gameState._finalTwoTriggered = true;
            const lastBot = bots.find(b => b.alive);
            showToast(`⚔ FINAL SHOWDOWN vs ${lastBot ? lastBot.nameTag : 'last enemy'}!`, '#cc44ff', 3);
            cameraShake(8, 0.4);
            haptics.fire('heavy');
            slowMoTimer = 0.5;
            // Boost last bot slightly for dramatic tension
            if (lastBot) {
                lastBot.hp = Math.max(lastBot.hp, Math.floor(lastBot.maxHp * 0.5));
                lastBot.speed *= 1.2;
            }
        }
    }
    // Comeback — player gets 3 kills after being below 30% HP
    if (attacker.isPlayer && target.hp <= 0 && player.hp <= player.maxHp * 0.3) {
        gameState._comebackKills = (gameState._comebackKills || 0) + 1;
        if (gameState._comebackKills === 3) {
            showToast('🌟 INCREDIBLE COMEBACK!', '#00ff88', 3);
            spawnKanjiVFX(player.x, player.y - 40, 'comeback');
            cameraShake(12, 0.5);
            haptics.fire('heavy');
            gameState.addCoins(25);
            // Heal reward for the comeback
            player.hp = Math.min(player.maxHp, player.hp + 20);
        }
    } else if (attacker.isPlayer && player.hp > player.maxHp * 0.3) {
        gameState._comebackKills = 0; // reset when healthy
    }
}

function collectPowerUp(entity, pu) {
    switch (pu.type) {
        case 'speed':
            entity.speedBoost = true;
            entity.effectTimers.speed = pu.duration;
            break;
        case 'shield':
            entity.shieldActive = true;
            entity.effectTimers.shield = pu.duration;
            break;
        case 'heal':
            entity.hp = Math.min(entity.maxHp, entity.hp + 30);
            break;
        case 'damage':
            entity.damageBoost = true;
            entity.effectTimers.damage = pu.duration;
            break;
        case 'freeze':
            // Freeze all enemies near the collector
            const freezeTargets = entity.isPlayer ? bots : [player, ...bots.filter(b => b !== entity)];
            for (const t of freezeTargets) {
                if (!t.alive) continue;
                if (dist(entity, t) < 150) {
                    t.frozen = true;
                    t.effectTimers.freeze = pu.duration;
                    t.vx = 0; t.vy = 0;
                    particles.burst(t.x, t.y, 8, { speed: 40, life: 0.5, size: 2, color: '#88ddff', gravity: 0, shrink: true });
                }
            }
            break;
        case 'magnet':
            entity.magnetActive = true;
            entity.effectTimers.magnet = pu.duration;
            break;
    }
    pu.alive = false;
    if (entity.isPlayer) {
        powerupsCollectedThisMatch++;
        showToast(getCommentary('powerup'), pu.color, 1.5);
        triggerNarrator('player_powerup', { type: pu.effect || pu.type || 'Power' }, 1);
        haptics.fire('light');
        audio.play('powerUp');
        surgeMeter = Math.min(100, surgeMeter + 8);
    }
}

// === AI BEHAVIOR (Personality-Driven) ===
function pickAITarget(bot, allTargets) {
    const pers = bot.personality;
    if (!pers || !pers.traits) return findNearest(bot, allTargets);
    const pref = pers.traits.targetPreference || 'nearest';
    switch (pref) {
        case 'weakest': {
            // Assassin — pick lowest HP target
            let weakest = null, lowestHp = Infinity;
            for (const t of allTargets) {
                if (t.hp < lowestHp) { lowestHp = t.hp; weakest = t; }
            }
            if (weakest) return { target: weakest, dist: dist(bot, weakest) };
            return findNearest(bot, allTargets);
        }
        case 'locked': {
            // Hunter — stick to one target until dead or timer expires
            if (bot.aiLockedTarget && bot.aiLockedTarget.alive && bot.aiLockTimer > 0) {
                return { target: bot.aiLockedTarget, dist: dist(bot, bot.aiLockedTarget) };
            }
            // Lock a new target (prefer player for drama)
            const result = findNearest(bot, allTargets);
            if (result.target) {
                // 40% chance to lock onto player specifically if alive
                if (player && player.alive && Math.random() < 0.4) {
                    bot.aiLockedTarget = player;
                } else {
                    bot.aiLockedTarget = result.target;
                }
                bot.aiLockTimer = pers.traits.lockDuration || 10;
            }
            return result;
        }
        case 'isolated': {
            // Predator — target the most isolated enemy (farthest from other enemies)
            let mostIsolated = null, maxMinDist = 0;
            for (const t of allTargets) {
                let minD = Infinity;
                for (const other of allTargets) {
                    if (other === t) continue;
                    const d = dist(t, other);
                    if (d < minD) minD = d;
                }
                if (minD > maxMinDist) { maxMinDist = minD; mostIsolated = t; }
            }
            if (mostIsolated) return { target: mostIsolated, dist: dist(bot, mostIsolated) };
            return findNearest(bot, allTargets);
        }
        case 'random': {
            // Trickster — switch targets randomly
            if (allTargets.length > 0) {
                const t = allTargets[Math.floor(Math.random() * allTargets.length)];
                return { target: t, dist: dist(bot, t) };
            }
            return findNearest(bot, allTargets);
        }
        default:
            return findNearest(bot, allTargets);
    }
}

function updateAI(bot, dt) {
    if (!bot.alive || !bot.aiCfg) return;
    if (bot.frozen) return;
    const pers = bot.personality;
    const traits = pers ? pers.traits : {};
    const weights = pers ? pers.weights : { chase: 0.4, flee: 0.2, powerup: 0.2, wander: 0.2 };

    // Tick down lock timer for hunter personality
    if (bot.aiLockTimer > 0) bot.aiLockTimer -= dt;

    bot.aiDecisionTimer -= dt;
    if (bot.aiDecisionTimer <= 0) {
        bot.aiDecisionTimer = bot.aiCfg.reactionTime + Math.random() * 0.3;
        // Aggression ramps over time
        let aggroRamp = Math.min(1, gameTimer / 12);
        // Camper late-aggro: stays passive longer, then explodes
        if (traits.lateAggro) aggroRamp = Math.min(1, Math.max(0, (gameTimer - 20) / 10));
        const effectiveAggro = bot.aiCfg.aggression * aggroRamp;

        // Find targets using personality-driven targeting
        const allTargets = [player, ...bots].filter(t => t.alive && t !== bot);
        const targeting = pickAITarget(bot, allTargets);
        bot.aiTarget = targeting.target;
        const d = targeting.dist;

        // --- Personality-weighted decision ---
        const hpPct = bot.hp / bot.maxHp;
        const fleeThreshold = (traits.fleeThreshold || 30) / 100;

        // Berserker low-HP rage — gets MORE aggressive when low
        if (traits.lowHpRage && hpPct < 0.3) {
            bot.aiBehavior = 'chase';
        }
        // Scavenger — always go for power-ups if any exist and not powered up
        else if (traits.powerupAddict && powerUps.some(p => p.alive) &&
                 !bot.speedBoost && !bot.shieldActive && !bot.damageBoost) {
            bot.aiBehavior = 'powerup';
        }
        // Guardian — prioritize shield/heal power-ups
        else if (traits.shieldSeeker && hpPct < 0.7 && powerUps.some(p => p.alive)) {
            bot.aiBehavior = 'powerup';
        }
        // Standard flee check — threshold varies per personality
        else if (hpPct < fleeThreshold && Math.random() < weights.flee * 2) {
            bot.aiBehavior = 'flee';
        }
        // In attack range — always chase
        else if (d < bot.attackRange * 1.5 && effectiveAggro > 0.4) {
            bot.aiBehavior = 'chase';
        }
        // Weighted random selection for remaining cases
        else {
            const roll = Math.random();
            const chaseW = weights.chase * effectiveAggro;
            const puW = weights.powerup * (powerUps.some(p => p.alive) ? 1 : 0);
            const wanderW = weights.wander;
            const total = chaseW + puW + wanderW;
            const norm = roll * total;
            if (norm < chaseW) bot.aiBehavior = 'chase';
            else if (norm < chaseW + puW) bot.aiBehavior = 'powerup';
            else bot.aiBehavior = 'wander';
        }
    }

    // Execute behavior
    const spd = bot.speed * (bot.speedBoost ? 2 : 1) * (bot._poisonSlow ? 0.5 : 1);
    switch (bot.aiBehavior) {
        case 'chase': {
            if (bot.aiTarget && bot.aiTarget.alive) {
                const dx = bot.aiTarget.x - bot.x;
                const dy = bot.aiTarget.y - bot.y;
                const len = Math.sqrt(dx * dx + dy * dy) || 1;
                // Prediction
                const predX = bot.aiTarget.x + (bot.aiTarget.vx || 0) * bot.aiCfg.prediction * 0.5;
                const predY = bot.aiTarget.y + (bot.aiTarget.vy || 0) * bot.aiCfg.prediction * 0.5;
                const pdx = predX - bot.x;
                const pdy = predY - bot.y;
                const plen = Math.sqrt(pdx * pdx + pdy * pdy) || 1;

                // Predator circle-strafe — orbit prey before closing in
                if (traits.circleStrafe && len > bot.attackRange * 0.8 && len < bot.attackRange * 2.5) {
                    const perpX = -dy / len;
                    const perpY = dx / len;
                    const orbitFactor = 0.6 + 0.4 * Math.sin(gameTimer * 2);
                    bot.vx = (pdx / plen) * spd * 0.4 + perpX * spd * orbitFactor;
                    bot.vy = (pdy / plen) * spd * 0.4 + perpY * spd * orbitFactor;
                }
                // Trickster juke — erratic zigzag approach
                else if (traits.juke) {
                    const jukeAngle = Math.sin(gameTimer * 5 + bot.wanderAngle * 10) * 1.2;
                    const jx = Math.cos(jukeAngle) * pdx - Math.sin(jukeAngle) * pdy;
                    const jy = Math.sin(jukeAngle) * pdx + Math.cos(jukeAngle) * pdy;
                    const jlen = Math.sqrt(jx * jx + jy * jy) || 1;
                    bot.vx = (jx / jlen) * spd;
                    bot.vy = (jy / jlen) * spd;
                }
                // Assassin burst — sprint when close
                else if (traits.burstAttack && len < bot.attackRange * 2) {
                    bot.vx = (pdx / plen) * spd * 1.3;
                    bot.vy = (pdy / plen) * spd * 1.3;
                }
                else {
                    bot.vx = (pdx / plen) * spd;
                    bot.vy = (pdy / plen) * spd;
                }
            }
            break;
        }
        case 'flee': {
            if (bot.aiTarget) {
                const dx = bot.x - bot.aiTarget.x;
                const dy = bot.y - bot.aiTarget.y;
                const len = Math.sqrt(dx * dx + dy * dy) || 1;
                // Camper edge-hugger — flee toward arena edges
                if (traits.edgeHugger) {
                    const edgeDirX = (bot.x < arena.x + arena.w / 2) ? -1 : 1;
                    const edgeDirY = (bot.y < arena.y + arena.h / 2) ? -1 : 1;
                    bot.vx = (dx / len) * spd * 0.5 + edgeDirX * spd * 0.5;
                    bot.vy = (dy / len) * spd * 0.5 + edgeDirY * spd * 0.5;
                }
                // Trickster dodge — flee at random angles
                else if (traits.juke) {
                    const dodgeAngle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 1.5;
                    bot.vx = Math.cos(dodgeAngle) * spd;
                    bot.vy = Math.sin(dodgeAngle) * spd;
                } else {
                    bot.vx = (dx / len) * spd;
                    bot.vy = (dy / len) * spd;
                }
            }
            break;
        }
        case 'powerup': {
            const { target: pu } = findNearest(bot, powerUps.filter(p => p.alive));
            if (pu) {
                const dx = pu.x - bot.x;
                const dy = pu.y - bot.y;
                const len = Math.sqrt(dx * dx + dy * dy) || 1;
                bot.vx = (dx / len) * spd;
                bot.vy = (dy / len) * spd;
            } else {
                bot.aiBehavior = 'wander';
            }
            break;
        }
        case 'wander': {
            // Camper — wander toward arena edges
            if (traits.edgeHugger) {
                const cx = arena.x + arena.w / 2;
                const cy = arena.y + arena.h / 2;
                const awayX = bot.x - cx;
                const awayY = bot.y - cy;
                const awayLen = Math.sqrt(awayX * awayX + awayY * awayY) || 1;
                bot.wanderAngle += (Math.random() - 0.5) * dt;
                bot.vx = (awayX / awayLen) * spd * 0.35 + Math.cos(bot.wanderAngle) * spd * 0.25;
                bot.vy = (awayY / awayLen) * spd * 0.35 + Math.sin(bot.wanderAngle) * spd * 0.25;
            } else {
                bot.wanderAngle += (Math.random() - 0.5) * 2 * dt;
                bot.vx = Math.cos(bot.wanderAngle) * spd * 0.5;
                bot.vy = Math.sin(bot.wanderAngle) * spd * 0.5;
            }
            break;
        }
    }
    // Auto-attack nearest
    bot.attackCooldown -= dt;
    if (bot.attackSwingTimer > 0) bot.attackSwingTimer -= dt;
    if (bot.aiTarget && bot.aiTarget.alive && bot.attackCooldown <= 0) {
        const d = dist(bot, bot.aiTarget);
        if (d < bot.attackRange && Math.random() < bot.aiCfg.accuracy) {
            // Set swing visual for bot
            bot.lastAttackAngle = Math.atan2(bot.aiTarget.y - bot.y, bot.aiTarget.x - bot.x);
            bot.attackSwingTimer = 0.15;
            applyDamage(bot, bot.aiTarget);
            bot.attackCooldown = bot.attackSpeed;
        }
    }
    // Bot ability usage — use when off cooldown and in combat
    if (bot.botAbility && bot.abilityCooldown <= 0 && bot.aiBehavior === 'chase' && bot.aiTarget && bot.aiTarget.alive) {
        const d = dist(bot, bot.aiTarget);
        // Use ability with some randomness so bots don't all fire at once
        if (Math.random() < 0.02) { // ~2% chance per frame when chasing
            activateBotAbility(bot);
        }
    }
    bot.abilityCooldown -= dt;
}

// === BOT ABILITY SYSTEM ===
function activateBotAbility(bot) {
    const abilityKey = bot.botAbility;
    const abilityStats = ABILITIES[abilityKey];
    if (!abilityStats || bot.abilityCooldown > 0) return;

    switch (abilityKey) {
        case 'shockwave': {
            const targets = [...bots.filter(b => b !== bot && b.alive), player].filter(t => t && t.alive);
            for (const t of targets) {
                const d = dist(bot, t);
                if (d < abilityStats.radius) {
                    t.hp -= abilityStats.damage;
                    spawnDmgNum(t.x, t.y - t.radius, `-${abilityStats.damage}`, '#ff6600', false);
                    t.hitFlash = 0.2;
                    const angle = Math.atan2(t.y - bot.y, t.x - bot.x);
                    t.vx = Math.cos(angle) * abilityStats.knockbackForce;
                    t.vy = Math.sin(angle) * abilityStats.knockbackForce;
                    if (t.hp <= 0) {
                        t.alive = false;
                        if (t.isPlayer) {
                            addKillFeed(bot.nameTag, 'You');
                        } else {
                            addKillFeed(bot.nameTag, t.nameTag);
                        }
                    }
                }
            }
            particles.burst(bot.x, bot.y, 8, { speed: 100, life: 0.3, size: 2.5, color: '#ff6600', gravity: 0, shrink: true });
            spawnElimRing(bot.x, bot.y, 80, '#ff6600');
            break;
        }
        case 'teleport': {
            let newX, newY, attempts = 0;
            do {
                newX = arena.x + 30 + Math.random() * (arena.w - 60);
                newY = arena.y + 30 + Math.random() * (arena.h - 60);
                attempts++;
            } while (attempts < 5);
            particles.burst(bot.x, bot.y, 6, { speed: 80, life: 0.25, size: 2, color: '#aa00ff', gravity: 0, shrink: true });
            bot.x = newX; bot.y = newY;
            particles.burst(bot.x, bot.y, 6, { speed: 80, life: 0.25, size: 2, color: '#aa00ff', gravity: 0, shrink: true });
            break;
        }
        case 'healBurst': {
            bot.hp = Math.min(bot.maxHp, bot.hp + abilityStats.healAmount);
            particles.burst(bot.x, bot.y, 6, { speed: 60, life: 0.3, size: 2, color: '#00ff88', gravity: 0, shrink: true });
            break;
        }
        case 'shadowClone': {
            // Bot shadow clones: spawn 2 decoy entities briefly
            for (let c = 0; c < 2; c++) {
                const angle = Math.random() * Math.PI * 2;
                const cx = bot.x + Math.cos(angle) * 40;
                const cy = bot.y + Math.sin(angle) * 40;
                particles.burst(cx, cy, 5, { speed: 40, life: 0.5, size: 2, color: '#6644cc', gravity: 0, shrink: true });
            }
            break;
        }
    }
    bot.abilityCooldown = abilityStats.cooldown * (1 + Math.random() * 0.5); // add randomness to bot cooldowns
}

// === PLAYER INPUT ===
// === DASH SYSTEM ===
let _lastTapTime = 0;
let _lastTapPos = null;
const DASH_COOLDOWN = 4;
const DASH_SPEED = 22;
const DASH_DURATION = 0.12;

function checkDash(tap) {
    if (!player || !player.alive || player.dashCooldown > 0) return false;
    const now = performance.now() / 1000;
    if (_lastTapPos && now - _lastTapTime < 0.35) {
        // Double-tap detected — DODGE (enhanced dash with i-frames)
        const dx = tap.x - player.x;
        const dy = tap.y - player.y;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        player.vx = (dx / len) * DASH_SPEED;
        player.vy = (dy / len) * DASH_SPEED;
        player.dodgeDirection = { x: player.vx, y: player.vy };
        // Dodge cooldown: 2.5s (reduced from 4s)
        player.dashCooldown = gameState._dashMasterActive ? 1.25 : 2.5;
        player.dashTimer = DASH_DURATION;
        // Enable invulnerability during dodge
        player.isInvulnerable = true;
        player.dodgeAfterimages = [];
        cameraShake(4, 0.1);
        haptics.fire('light');
        audio.play('powerUp');
        particles.burst(player.x, player.y, 8, {
            speed: 60, life: 0.3, size: 2, color: '#00ffcc', gravity: 0, shrink: true,
        });
        showToast('DODGE!', '#00ffcc', 0.6);
        // LTM Dash Fury — dash deals damage to nearby enemies
        if (ltmDashDamage > 0) {
            for (const bot of bots) {
                if (!bot.alive) continue;
                if (dist(player, bot) < player.radius + bot.radius + 20) {
                    bot.hp -= ltmDashDamage;
                    spawnDmgNum(bot.x, bot.y - bot.radius, `-${ltmDashDamage}`, '#00ffcc', false);
                    bot.hitFlash = 0.15;
                    if (bot.hp <= 0) {
                        bot.alive = false;
                        gameState.kills++;
                        addKillFeed(player.nameTag || 'You', bot.nameTag);
                        spawnKanjiVFX(bot.x, bot.y, 'kill');
                    }
                }
            }
        }
        _lastTapPos = null;
        return true;
    }
    _lastTapTime = now;
    _lastTapPos = { x: tap.x, y: tap.y };
    return false;
}

// === ABILITY SYSTEM (Phase 5) ===
function activateAbility() {
    if (!player || !player.alive) return false;
    const abilityKey = gameState.selectedAbility;
    const abilityStats = ABILITIES[abilityKey];
    if (!abilityStats) return false;
    if (player.abilityCooldown > 0) return false; // on cooldown

    // Execute ability based on type
    switch (abilityKey) {
        case 'shockwave': {
            // Shockwave: damage + knockback all nearby enemies
            const radius = abilityStats.radius; // 100
            const damage = abilityStats.damage; // 15
            const knockbackForce = abilityStats.knockbackForce; // 40
            for (const bot of bots) {
                if (!bot.alive) continue;
                const d = dist(player, bot);
                if (d < radius) {
                    bot.hp -= damage;
                    spawnDmgNum(bot.x, bot.y - bot.radius, `-${damage}`, '#ff6600', false);
                    bot.hitFlash = 0.2;
                    // Knockback
                    const angle = Math.atan2(bot.y - player.y, bot.x - player.x);
                    bot.vx = Math.cos(angle) * knockbackForce;
                    bot.vy = Math.sin(angle) * knockbackForce;
                    if (bot.hp <= 0) {
                        bot.alive = false;
                        gameState.kills++;
                        addKillFeed(player.nameTag || 'You', bot.nameTag);
                        spawnKanjiVFX(bot.x, bot.y, 'kill');
                    }
                }
            }
            // Visual: expanding ring + camera shake + particles
            particles.burst(player.x, player.y, 12, {
                speed: 120, life: 0.4, size: 3, color: '#ff6600', gravity: 0, shrink: true,
            });
            cameraShake(6, 0.15);
            haptics.fire('medium');
            audio.play('powerUp');
            spawnElimRing(player.x, player.y, 100, '#ff6600');
            break;
        }
        case 'teleport': {
            // Teleport: move to random safe spot
            let newX, newY, attempts = 0;
            do {
                newX = arena.x + 30 + Math.random() * (arena.w - 60);
                newY = arena.y + 30 + Math.random() * (arena.h - 60);
                attempts++;
            } while (attempts < 5 && bots.some(b => b.alive && dist({x: newX, y: newY}, b) < 80));

            // Particle burst at old position
            particles.burst(player.x, player.y, 8, {
                speed: 100, life: 0.3, size: 2.5, color: '#aa00ff', gravity: 0, shrink: true,
            });
            // Teleport
            player.x = newX;
            player.y = newY;
            // Particle burst at new position
            particles.burst(player.x, player.y, 8, {
                speed: 100, life: 0.3, size: 2.5, color: '#aa00ff', gravity: 0, shrink: true,
            });
            // Brief invulnerability
            player.isInvulnerable = true;
            setTimeout(() => { if (player) player.isInvulnerable = false; }, 300);
            haptics.fire('light');
            audio.play('powerUp');
            break;
        }
        case 'healBurst': {
            // Heal Burst: restore HP
            const healAmount = abilityStats.healAmount; // 35
            const oldHp = player.hp;
            player.hp = Math.min(player.maxHp, player.hp + healAmount);
            const actualHeal = player.hp - oldHp;
            spawnDmgNum(player.x, player.y - player.radius, `+${actualHeal} HP`, '#00ff88', false);
            // Visual: green particles rising + green flash
            particles.burst(player.x, player.y, 10, {
                speed: 60, life: 0.4, size: 2, color: '#00ff88', gravity: -40, shrink: true,
            });
            cameraShake(2, 0.1);
            haptics.fire('light');
            audio.play('powerUp');
            break;
        }
        case 'shadowClone': {
            // Shadow Clone: spawn 2 decoy clones
            const cloneCount = abilityStats.cloneCount; // 2
            const duration = abilityStats.duration; // 4 seconds
            for (let i = 0; i < cloneCount; i++) {
                const angle = (Math.PI * 2 * i) / cloneCount;
                const offset = 60;
                const cx = player.x + Math.cos(angle) * offset;
                const cy = player.y + Math.sin(angle) * offset;
                abilityClones.push({
                    x: cx, y: cy,
                    radius: 18,
                    skin: player.skin,
                    duration: duration,
                    alpha: 0.6,
                    vx: 0, vy: 0,
                    wanderAngle: Math.random() * Math.PI * 2,
                    speed: 2,
                });
            }
            particles.burst(player.x, player.y, 8, {
                speed: 80, life: 0.3, size: 2, color: '#6644cc', gravity: 0, shrink: true,
            });
            haptics.fire('light');
            audio.play('powerUp');
            break;
        }
    }

    // Set cooldown
    player.abilityCooldown = abilityStats.cooldown;
    return true;
}

function updateAbilityClones(dt) {
    for (let i = abilityClones.length - 1; i >= 0; i--) {
        const clone = abilityClones[i];
        clone.duration -= dt;
        clone.alpha = Math.max(0, clone.alpha - dt / clone.duration * 0.5);

        if (clone.duration <= 0) {
            abilityClones.splice(i, 1);
            continue;
        }

        // Wander behavior
        clone.wanderAngle += (Math.random() - 0.5) * 0.3;
        const speed = clone.speed;
        clone.vx += Math.cos(clone.wanderAngle) * speed * dt;
        clone.vy += Math.sin(clone.wanderAngle) * speed * dt;
        clone.vx *= 0.95;
        clone.vy *= 0.95;

        clone.x += clone.vx;
        clone.y += clone.vy;

        // Keep in arena
        if (clone.x < arena.x + clone.radius) clone.x = arena.x + clone.radius;
        if (clone.x > arena.x + arena.w - clone.radius) clone.x = arena.x + arena.w - clone.radius;
        if (clone.y < arena.y + clone.radius) clone.y = arena.y + clone.radius;
        if (clone.y > arena.y + arena.h - clone.radius) clone.y = arena.y + arena.h - clone.radius;
    }
}

function drawAbilityClones(ctx) {
    for (const clone of abilityClones) {
        ctx.save();
        ctx.globalAlpha = clone.alpha;
        // Draw clone as semi-transparent player
        ctx.beginPath();
        ctx.arc(clone.x, clone.y, clone.radius, 0, Math.PI * 2);
        ctx.fillStyle = clone.skin.body;
        ctx.fill();
        ctx.strokeStyle = clone.skin.outline;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Eyes
        ctx.fillStyle = clone.skin.eye;
        ctx.beginPath();
        ctx.arc(clone.x - 6, clone.y - 4, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(clone.x + 6, clone.y - 4, 3, 0, Math.PI * 2);
        ctx.fill();
        // Pupils
        ctx.fillStyle = '#111';
        ctx.beginPath();
        ctx.arc(clone.x - 5, clone.y - 4, 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(clone.x + 7, clone.y - 4, 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

function updatePlayerInput(dt) {
    if (!player || !player.alive) return;
    // During dash, skip normal movement
    if (player.dashTimer > 0) return;
    const spd = player.speed * (player.speedBoost ? 2 : 1) * (rageMode ? 1.3 : 1) * (player._poisonSlow ? 0.5 : 1);
    if (_isDragging && _dragCurrent) {
        const dx = _dragCurrent.x - player.x;
        const dy = _dragCurrent.y - player.y;
        const len = Math.sqrt(dx * dx + dy * dy);
        if (len > 5) {
            player.vx = (dx / len) * spd;
            player.vy = (dy / len) * spd;
        } else {
            player.vx *= GAME_CONFIG.physics.friction;
            player.vy *= GAME_CONFIG.physics.friction;
        }
    } else {
        player.vx *= GAME_CONFIG.physics.friction;
        player.vy *= GAME_CONFIG.physics.friction;
    }
    // Auto-attack nearest bot
    player.attackCooldown -= dt;
    if (player.attackSwingTimer > 0) player.attackSwingTimer -= dt;
    if (player.attackCooldown <= 0) {
        const { target, dist: d } = findNearest(player, bots);
        if (target && d < player.attackRange) {
            applyDamage(player, target);
            player.attackCooldown = player.attackSpeed * (rageMode ? 0.6 : 1);
            player.attackSwingTimer = 0.15;
            const dx = target.x - player.x;
            const dy = target.y - player.y;
            player.lastAttackAngle = Math.atan2(dy, dx);
        }
    }
}

// === SURGE ACTIVATION ===
function checkSurgeActivation() {
    const tap = consumeTap();
    if (!tap) return;
    // Surge tap zone: left side x < 90, y 240-500
    if (tap.x < 90 && tap.y > 240 && tap.y < 500 && surgeLevel < 4) {
        if (surgeMeter >= SURGE_THRESHOLDS.L1 && surgeLevel === 0) {
            surgeLevel = 1; surgeMeter -= 20;
            player.damage += 3;
            showToast('SURGE L1!', '#00ff88');
        } else if (surgeMeter >= SURGE_THRESHOLDS.L2 && surgeLevel === 1) {
            surgeLevel = 2; surgeMeter -= 30;
            player.speed += 1;
            showToast('SURGE L2!', '#00ccff');
        } else if (surgeMeter >= SURGE_THRESHOLDS.L3 && surgeLevel === 2) {
            surgeLevel = 3; surgeMeter -= 25;
            player.attackSpeed *= 0.7;
            showToast('SURGE L3!', '#ffaa00');
        } else if (surgeMeter >= SURGE_THRESHOLDS.L4 && surgeLevel === 3) {
            surgeLevel = 4;
            rageMode = true;
            rageTimer = 8;
            showToast(getCommentary('rage'), '#ff3355', 2);
            cameraShake(12, 0.5);
            haptics.fire('heavy');
            audio.play('rage');
        }
    }
    // Pause button check (top-right)
    if (tap.x > W - 60 && tap.y < 60) {
        isPaused = !isPaused;
    }
}

// === ARENA SHRINK ===
function updateArenaShrink(dt) {
    arena.shrinkTimer -= dt * (ltmShrinkMult || 1);
    if (arena.shrinkTimer <= 0 && arena.w > 150) {
        arena.shrinkTimer = GAME_CONFIG.arena.shrinkInterval;
        arena.shrinkCount++;
        arena.targetW = Math.max(150, arena.w - GAME_CONFIG.arena.shrinkAmount);
        arena.targetH = Math.max(200, arena.h - GAME_CONFIG.arena.shrinkAmount * 1.2);
        showToast(getCommentary('shrink'), '#ff3355', 2);
        triggerNarrator('arena_shrink', {}, 1);
        cameraShake(5, 0.4);
        haptics.fire('medium');
        audio.play('shrink');
    }
    // Smooth shrink
    arena.w += (arena.targetW - arena.w) * 3 * dt;
    arena.h += (arena.targetH - arena.h) * 3 * dt;
    arena.x = (W - arena.w) / 2;
    arena.y = 98 + (700 - arena.h) / 2;
    // Remove hazards outside new arena bounds
    activeHazards = activeHazards.filter(h => h.x >= arena.x && h.x <= arena.x + arena.w && h.y >= arena.y && h.y <= arena.y + arena.h);
    // Damage entities outside arena
    const allEntities = [player, ...bots];
    for (const e of allEntities) {
        if (!e.alive) continue;
        if (isOutsideArena(e)) {
            e.hp -= 15 * dt;
            e.hitFlash = 0.05;
            clampToArena(e);
        }
    }
}

// === ENTITY EFFECTS UPDATE ===
function updateEffects(entity, dt) {
    for (const key of ['speed', 'shield', 'damage']) {
        if (entity.effectTimers[key] > 0) {
            entity.effectTimers[key] -= dt;
            if (entity.effectTimers[key] <= 0) {
                entity[key + (key === 'shield' ? 'Active' : 'Boost')] = false;
            }
        }
    }
    // Freeze timer
    if (entity.effectTimers.freeze > 0) {
        entity.effectTimers.freeze -= dt;
        if (entity.effectTimers.freeze <= 0) { entity.frozen = false; }
    }
    // Magnet timer
    if (entity.effectTimers.magnet > 0) {
        entity.effectTimers.magnet -= dt;
        if (entity.effectTimers.magnet <= 0) { entity.magnetActive = false; }
    }
    // Dash cooldown and invulnerability (dodge)
    if (entity.dashCooldown > 0) entity.dashCooldown -= dt;
    if (entity.dashTimer > 0) {
        entity.dashTimer -= dt;
        if (entity.dashTimer <= 0) {
            // End of dodge — brief vulnerability window
            entity.isInvulnerable = false;
        }
    }
    // Ability cooldown (Phase 5)
    if (entity.isPlayer && entity.abilityCooldown > 0) entity.abilityCooldown -= dt;
    // Combo timer decay (player only)
    if (entity.isPlayer && entity.comboTimer > 0) {
        entity.comboTimer -= dt;
        if (entity.comboTimer <= 0) {
            entity.comboCount = 0;
            entity.comboDamageBonus = 0;
        }
    }
    // Trail spawn
    entity.trailTimer -= dt;
    const spd = Math.sqrt(entity.vx * entity.vx + entity.vy * entity.vy);
    if (spd > 2 && entity.trailTimer <= 0) {
        entity.trailTimer = 0.05;
        particles.spawn(entity.x, entity.y, {
            speed: 5, life: 0.3, size: entity.radius * 0.4,
            color: entity.skin.body + '80', gravity: 0, shrink: true,
        });
    }
    if (entity.hitFlash > 0) entity.hitFlash -= dt;
    entity.pulseTimer += dt;
    if (entity.comboPulse > 0) entity.comboPulse -= dt;
}

// === MAIN PLAYING UPDATE ===
function updatePlaying(dt) {
    if (isPaused) {
        const tap = consumeTap();
        if (tap) {
            // Resume button
            if (hitTest(tap, W/2 - 100, H/2 - 30, 200, 60)) { isPaused = false; }
            // Menu button
            if (hitTest(tap, W/2 - 100, H/2 + 50, 200, 60)) { gameState.screen = 'menu'; isPaused = false; }
        }
        return;
    }
    // Emote wheel + onboarding updates
    updateEmotes(dt);
    updateOnboarding(dt);
    if (gameState.mpIsMultiplayer) updateSpectator();
    // Slow motion effect
    if (slowMoTimer > 0) {
        slowMoTimer -= dt;
        dt *= SLOW_MO_SCALE;
    }
    gameTimer += dt;
    updateCamera(dt);
    updateToasts(dt);
    updateDmgNums(dt);
    updateKillFeed(dt);
    updateSakura(dt);
    updateKanjiVFX(dt);
    updateNarrator(dt);
    // === PHASE 6: Weather Effects ===
    updateWeather(dt, currentWeather);
    // === PHASE 4 VFX UPDATES ===
    updateHitSparks(dt);
    updateElimRings(dt);
    // === PHASE 3: Environmental Hazards ===
    hazardSpawnTimer -= dt;
    if (hazardSpawnTimer <= 0 && gameTimer > 10) {
        hazardSpawnTimer = 8 + Math.random() * 4;
        spawnHazard();
    }
    updateHazards(dt);
    // Clear poison slow each frame (re-applied by hazard collision)
    if (player) player._poisonSlow = false;
    for (const bot of bots) bot._poisonSlow = false;
    // Kill cam update
    if (killCamActive) {
        killCamTimer -= dt / SLOW_MO_SCALE; // decrement in real time, not slow-mo time
        killCamLetterbox = Math.min(30, killCamLetterbox + dt * 200);
        if (killCamTimer <= 0) {
            killCamActive = false;
            killCamTimer = 0;
            killCamLetterbox = 0;
        }
    }
    // Screen flash decay
    if (screenFlashAlpha > 0) {
        screenFlashAlpha -= dt * 4;
        if (screenFlashAlpha < 0) screenFlashAlpha = 0;
    }
    // Kill streak glow timer
    if (killStreakGlowTimer > 0) {
        killStreakGlowTimer -= dt;
    }
    // Emote wheel check — tap bottom-left corner to toggle
    const preTap = consumeTap();
    if (preTap) {
        if (handleEmoteWheelTap(preTap)) { /* consumed by emote wheel */ }
        else if (hitTest(preTap, 0, H - 80, 50, 50) && player && player.alive) { toggleEmoteWheel(); }
        else if (hitTest(preTap, W - 90, 55, 75, 35) && spectatorTarget) { nextSpectatorTarget(); }
        else { _taps.unshift(preTap); } // put it back
    }
    // Dash check
    const dashTap = consumeTap();
    if (dashTap && player && player.alive) {
        if (!checkDash(dashTap)) {
            _taps.unshift(dashTap); // put it back for surge check
        }
    }
    // Ability button check (Phase 5) — bottom-right, x = W - 45, y = H - 55, r = 22
    const abilityTap = consumeTap();
    if (abilityTap && player && player.alive) {
        const abilityBtnX = W - 45, abilityBtnY = H - 55, abilityBtnR = 22;
        const dx = abilityTap.x - abilityBtnX;
        const dy = abilityTap.y - abilityBtnY;
        if (Math.sqrt(dx * dx + dy * dy) < abilityBtnR + 5) {
            if (activateAbility()) {
                haptics.fire('light');
                audio.play('powerUp');
            }
            // Consumed
        } else {
            _taps.unshift(abilityTap); // put it back
        }
    }
    // Surge/Rage
    checkSurgeActivation();
    if (rageMode) {
        rageTimer -= dt;
        if (rageTimer <= 0) { rageMode = false; }
    }
    // Player
    updatePlayerInput(dt);
    if (player.alive) {
        // Create dodge afterimages during dodge
        if (player.dashTimer > 0 && player.isInvulnerable) {
            player.dodgeAfterimages.push({
                x: player.x,
                y: player.y,
                alpha: 0.4
            });
            // Keep only last 3 afterimages
            if (player.dodgeAfterimages.length > 3) {
                player.dodgeAfterimages.shift();
            }
            // Fade out afterimages
            for (const ai of player.dodgeAfterimages) {
                ai.alpha *= 0.85;
            }
        } else {
            player.dodgeAfterimages = [];
        }
        player.x += player.vx; player.y += player.vy;
        player.vx *= GAME_CONFIG.physics.friction;
        player.vy *= GAME_CONFIG.physics.friction;
        clampToArena(player);
        updateEffects(player, dt);
    }
    // Update ability clones (Phase 5)
    updateAbilityClones(dt);

    // ── MULTIPLAYER MODE: server-driven sync ──
    if (gameState.mpIsMultiplayer) {
        // Poll server state
        mpPollTimer += dt * 1000;
        if (mpPollTimer >= MP_POLL_INTERVAL) {
            mpPollTimer = 0;
            pollArenaState();
        }
        // Send local player position to server
        sendMpPosition();
        // Lerp remote players
        lerpMpPlayers(dt);
        // Sync arena bounds from server
        if (gameState.mpRoom) {
            arena.x = gameState.mpRoom.arenaX;
            arena.y = gameState.mpRoom.arenaY;
            arena.w = gameState.mpRoom.arenaW;
            arena.h = gameState.mpRoom.arenaH;
            arena.shrinkTimer = gameState.mpRoom.shrinkTimer;
            arena.shrinkCount = gameState.mpRoom.shrinkCount;
        }
        // Sync powerups from server — resolve full display props via POWERUP_MAP
        // Filter out locally-collected power-ups (server may be 1-2 ticks behind)
        if (gameState.mpRoom && gameState.mpRoom.powerUps) {
            powerUps = gameState.mpRoom.powerUps.filter(p => p.alive && !mpCollectedPowerUps.has(p.id)).map(p => {
                const cfg = POWERUP_MAP[p.type] || { color: '#888', icon: '?', duration: 0, effect: '' };
                return {
                    _mpId: p.id, x: p.x, y: p.y, type: p.type, alive: true,
                    radius: 12, pulseTimer: gameTimer,
                    color: cfg.color, icon: cfg.icon, duration: cfg.duration, effect: cfg.effect,
                };
            });
            // Clean up collected set — if server finally removed it, stop tracking
            for (const id of mpCollectedPowerUps) {
                if (!gameState.mpRoom.powerUps.some(p => p.id === id && p.alive)) {
                    mpCollectedPowerUps.delete(id);
                }
            }
        }
        // Build bots array from remote players for rendering (alive only)
        bots = [];
        const myName = getMpName();
        for (const p of (gameState.mpPlayers || [])) {
            if (!p || !p.playerName) continue; // skip malformed entries
            if (p.playerName === myName) {
                // Sync our HP/kills from server
                if (mpLocalPlayer) {
                    player.hp = mpLocalPlayer.hp;
                    player.maxHp = mpLocalPlayer.maxHp;
                    player.damage = mpLocalPlayer.damage;
                    player.alive = mpLocalPlayer.alive;
                    gameState.kills = mpLocalPlayer.kills;
                }
                continue;
            }
            if (!p.alive) continue; // don't render dead bots
            const pos = getMpPlayerPos(p.playerName) || { x: p.x, y: p.y };
            const sk = SKINS[p.skin] || SKINS.default;
            bots.push({
                x: pos.x, y: pos.y, vx: p.vx || 0, vy: p.vy || 0,
                radius: 18, hp: p.hp, maxHp: p.maxHp,
                damage: p.damage, speed: 3,
                isPlayer: false, alive: true,
                attackCooldown: 0, attackRange: 60, attackSpeed: 0.6,
                skin: sk, aiCfg: null, aiTarget: null,
                aiDecisionTimer: 0, aiBehavior: p.aiBehavior || 'chase',
                wanderAngle: 0, speedBoost: false, shieldActive: false,
                damageBoost: false, frozen: false, magnetActive: false,
                effectTimers: { speed: 0, shield: 0, damage: 0, freeze: 0, magnet: 0 },
                dashCooldown: 0, dashTimer: 0, trailTimer: 0,
                pulseTimer: gameTimer, hitFlash: 0,
                nameTag: p.playerName || 'Bot',
                isBot: p.isBot,
                _mpName: p.playerName,
            });
        }
        // Auto-attack: find nearest enemy within range and report hit
        if (player.alive && player.attackCooldown <= 0) {
            let nearestBot = null;
            let nearestDist = Infinity;
            for (const b of bots) {
                if (!b.alive) continue;
                const d = dist(player, b);
                if (d < player.attackRange && d < nearestDist) {
                    nearestBot = b;
                    nearestDist = d;
                }
            }
            if (nearestBot && nearestBot._mpName) {
                // Send hit to server (async — don't wait)
                // Capture target ref for async callback
                const hitTarget = nearestBot;
                const hitTargetName = nearestBot._mpName;
                reportMpHit(hitTargetName).then(r => {
                    if (r && r.killed) {
                        // Server confirmed kill
                        addKillFeed(getMpName(), hitTargetName);
                        spawnKanjiVFX(hitTarget.x, hitTarget.y, 'kill');
                        cameraShake(12, 0.4);
                        if (typeof addBPXP === 'function') addBPXP(25);
                        slowMoTimer = 0.2;
                        showToast(`Eliminated ${hitTargetName}!`, '#ff3355', 2);
                    }
                });
                player.attackCooldown = player.attackSpeed;
                // Immediate local visual feedback (don't wait for server)
                spawnAttackVFX(player, nearestBot);
                nearestBot.hitFlash = 0.15;
                cameraShake(4, 0.1);
                // Local damage number prediction
                spawnDmgNum(nearestBot.x, nearestBot.y - nearestBot.radius, `-${player.damage}`, '#ff3355', false);
            }
        }
        // Alive count from server
        aliveCount = (gameState.mpPlayers || []).filter(p => p.alive).length;
        // Check game over from server
        if (gameState.mpRoom && gameState.mpRoom.status === 'finished') {
            if (!gameState._mpGameCounted) { gameState.totalGames++; gameState._mpGameCounted = true; }
            checkBpPromo();
            gameState.screen = 'mp_result';
            stopMpSync();
        } else if (!player.alive && gameState.screen === 'playing') {
            // We died but game continues — show spectator overlay
            // (for now just switch to result when game ends via server poll)
        }
        // MP Power-up collection (client-side with local tracking)
        for (const pu of powerUps) {
            if (!pu.alive) continue;
            pu.pulseTimer += dt;
            if (player.alive && dist(player, pu) < player.radius + pu.radius) {
                collectPowerUp(player, pu);
                if (pu._mpId !== undefined) mpCollectedPowerUps.add(pu._mpId);
                // Force position sync so server can also detect the collection
                sendMpPosition();
            }
        }
        powerUps = powerUps.filter(p => p.alive);
        // Magnet pull in MP
        if (player.alive && player.magnetActive) {
            for (const pu of powerUps) {
                if (!pu.alive) continue;
                const mdx = player.x - pu.x;
                const mdy = player.y - pu.y;
                const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
                if (mdist < 180 && mdist > 5) {
                    pu.x += (mdx / mdist) * 4;
                    pu.y += (mdy / mdist) * 4;
                }
            }
        }
        // Commentary timer
        if (commentaryTimer > 0) commentaryTimer -= dt;
        crowd.excitement = Math.max(0, crowd.excitement - 3 * dt);
        particles.update(dt);
        updateTransition(dt);
        return; // Skip single-player logic below
    }

    // ── SINGLE PLAYER MODE (unchanged) ──
    // Bots
    for (const bot of bots) {
        if (!bot.alive) continue;
        updateAI(bot, dt);
        bot.x += bot.vx; bot.y += bot.vy;
        bot.vx *= GAME_CONFIG.physics.friction;
        bot.vy *= GAME_CONFIG.physics.friction;
        clampToArena(bot);
        updateEffects(bot, dt);
    }
    // Power-up collection
    for (const pu of powerUps) {
        if (!pu.alive) continue;
        pu.pulseTimer += dt;
        if (player.alive && dist(player, pu) < player.radius + pu.radius) {
            collectPowerUp(player, pu);
        }
        for (const bot of bots) {
            if (bot.alive && dist(bot, pu) < bot.radius + pu.radius) {
                collectPowerUp(bot, pu);
            }
        }
    }
    powerUps = powerUps.filter(p => p.alive);
    // Magnet pull — attract power-ups toward player
    if (player.alive && player.magnetActive) {
        for (const pu of powerUps) {
            if (!pu.alive) continue;
            const mdx = player.x - pu.x;
            const mdy = player.y - pu.y;
            const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
            if (mdist < 180 && mdist > 5) {
                pu.x += (mdx / mdist) * 4;
                pu.y += (mdy / mdist) * 4;
            }
        }
    }
    // Power-up spawn
    powerUpSpawnTimer -= dt;
    if (powerUpSpawnTimer <= 0) {
        spawnPowerUp();
        powerUpSpawnTimer = 6 + Math.random() * 4;
    }
    // Arena shrink
    updateArenaShrink(dt);
    // Commentary timer
    if (commentaryTimer > 0) commentaryTimer -= dt;
    // Crowd decay
    crowd.excitement = Math.max(0, crowd.excitement - 3 * dt);
    // Update particles + transitions
    particles.update(dt);
    updateTransition(dt);
    // Check win/lose
    aliveCount = (player.alive ? 1 : 0) + bots.filter(b => b.alive).length;
    if (!player.alive) {
        handleGameOver(false);
    } else if (bots.filter(b => b.alive).length === 0) {
        handleGameOver(true);
    }
}

// === DRAWING: ARENA (JAPANESE STYLE) ===
function drawArena(ctx) {
    const ax = arena.x, ay = arena.y, aw = arena.w, ah = arena.h;
    // During gameplay, use selectedTheme; otherwise use equippedTheme
    const themeKey = gameState.screen === 'playing' ? gameState.selectedTheme : gameState.equippedTheme;
    const arenaTheme = ARENA_THEMES[themeKey];
    const theme = THEME_MAP[gameState.equippedTheme] || THEME_MAP['neon'];
    // Use arena theme stroke color if available, otherwise fall back to THEME_MAP
    const tAccent = arenaTheme ? arenaTheme.arenaStroke : theme.accent;
    ctx.save();
    // Inner floor — subtle gradient tinted to theme
    const floorGrad = ctx.createRadialGradient(ax + aw/2, ay + ah/2, 20, ax + aw/2, ay + ah/2, aw * 0.7);
    floorGrad.addColorStop(0, (arenaTheme ? arenaTheme.arenaStroke : tAccent) + '08');
    floorGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = floorGrad;
    ctx.fillRect(ax, ay, aw, ah);
    // Main border — double-line frame tinted to theme
    const borderColor = rageMode ? 'rgba(255,51,85,0.6)' : tAccent + '59';
    const borderColor2 = rageMode ? 'rgba(255,51,85,0.3)' : tAccent + '33';
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = 2;
    drawRoundRect(ctx, ax, ay, aw, ah, 4);
    ctx.stroke();
    ctx.strokeStyle = borderColor2;
    ctx.lineWidth = 0.8;
    drawRoundRect(ctx, ax + 4, ay + 4, aw - 8, ah - 8, 2);
    ctx.stroke();
    // Corner ornaments — torii-gate style marks
    const cLen = 18;
    const corners = [
        [ax, ay], [ax + aw, ay], [ax, ay + ah], [ax + aw, ay + ah]
    ];
    ctx.strokeStyle = rageMode ? '#ff3355' : tAccent;
    ctx.lineWidth = 2.5;
    ctx.globalAlpha = 0.6;
    for (const [cx, cy] of corners) {
        const sx = cx === ax ? 1 : -1;
        const sy = cy === ay ? 1 : -1;
        ctx.beginPath();
        ctx.moveTo(cx + sx * cLen, cy);
        ctx.lineTo(cx, cy);
        ctx.lineTo(cx, cy + sy * cLen);
        ctx.stroke();
        // Inner ornament dot
        ctx.beginPath();
        ctx.arc(cx + sx * 6, cy + sy * 6, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = rageMode ? '#ff3355' : '#e8a0bf';
        ctx.fill();
    }
    ctx.globalAlpha = 1;
    // Danger zone glow when shrinking
    if (arena.shrinkTimer < 3) {
        ctx.strokeStyle = `rgba(255,51,85,${0.3 + 0.3 * Math.sin(gameTimer * 6)})`;
        ctx.lineWidth = 3;
        drawRoundRect(ctx, ax - 3, ay - 3, aw + 6, ah + 6, 6);
        ctx.stroke();
    }
    ctx.restore();
    // Outside arena — dark with slight crimson tint
    ctx.save();
    ctx.fillStyle = 'rgba(20,0,10,0.15)';
    ctx.fillRect(0, 0, ax, H);
    ctx.fillRect(ax + aw, 0, W - ax - aw, H);
    ctx.fillRect(ax, 0, aw, ay);
    ctx.fillRect(ax, ay + ah, aw, H - ay - ah);
    ctx.restore();
}

// === DRAWING: ENTITY (JAPANESE STYLE — EXPRESSIVE FACES) ===
// === DODGE AFTERIMAGES ===
function drawDodgeAfterimages(ctx, entity) {
    if (!entity.dashTimer || entity.dashTimer <= 0 || entity.dodgeAfterimages.length === 0) return;
    for (let i = 0; i < entity.dodgeAfterimages.length; i++) {
        const ai = entity.dodgeAfterimages[i];
        ctx.globalAlpha = ai.alpha;
        // Draw ghost outline
        ctx.beginPath();
        ctx.arc(ai.x, ai.y, entity.radius, 0, Math.PI * 2);
        ctx.strokeStyle = entity.skin.body;
        ctx.lineWidth = 1;
        ctx.stroke();
    }
    ctx.globalAlpha = 1;
}

function drawEntity(ctx, entity) {
    if (!entity.alive) return;
    const { x, y, radius, skin, hitFlash, pulseTimer, hp, maxHp, isPlayer, nameTag } = entity;
    const behavior = entity.aiBehavior || 'wander';
    ctx.save();
    // Hit flash
    if (hitFlash > 0) {
        ctx.globalAlpha = 0.7 + 0.3 * Math.sin(hitFlash * 40);
    }
    // Dodge invulnerability flash — white during dodge
    if (entity.isInvulnerable && entity.dashTimer > 0) {
        ctx.globalAlpha = 0.5 * Math.sin(entity.dashTimer * 30);
    }
    // Frozen visual — ice crystal ring
    if (entity.frozen) {
        ctx.beginPath();
        ctx.arc(x, y, radius + 6, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(136,221,255,0.25)';
        ctx.fill();
        ctx.strokeStyle = '#88ddff'; ctx.lineWidth = 1.5;
        ctx.stroke();
        // Ice crystals
        for (let i = 0; i < 6; i++) {
            const a = (i / 6) * Math.PI * 2 + pulseTimer;
            ctx.beginPath();
            ctx.moveTo(x + Math.cos(a) * (radius + 3), y + Math.sin(a) * (radius + 3));
            ctx.lineTo(x + Math.cos(a) * (radius + 8), y + Math.sin(a) * (radius + 8));
            ctx.strokeStyle = 'rgba(136,221,255,0.6)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }
    }
    // Magnet aura — swirling particles
    if (entity.magnetActive) {
        const mR = radius + 10 + Math.sin(pulseTimer * 6) * 3;
        ctx.beginPath();
        ctx.arc(x, y, mR, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(204,68,255,${0.25 + 0.15 * Math.sin(pulseTimer * 8)})`;
        ctx.lineWidth = 1;
        ctx.stroke();
    }
    // Shield visual — golden ring
    if (entity.shieldActive) {
        ctx.beginPath();
        ctx.arc(x, y, radius + 8, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(212,165,116,${0.4 + 0.2 * Math.sin(pulseTimer * 5)})`;
        ctx.lineWidth = 2;
        ctx.stroke();
    }
    // Rage aura for player
    if (isPlayer && rageMode) {
        ctx.beginPath();
        ctx.arc(x, y, radius + 12, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,51,85,${0.15 + 0.1 * Math.sin(pulseTimer * 8)})`;
        ctx.fill();
    }
    // Outer glow — sakura-tinted
    ctx.beginPath();
    ctx.arc(x, y, radius + 5, 0, Math.PI * 2);
    const auraGrad = ctx.createRadialGradient(x, y, radius - 2, x, y, radius + 6);
    auraGrad.addColorStop(0, skin.body + '20');
    auraGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = auraGrad;
    ctx.fill();
    // Body — premium gradient with anime highlight
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    const bodyGrad = ctx.createRadialGradient(x - 5, y - 6, 2, x, y, radius);
    bodyGrad.addColorStop(0, '#ffffff60');
    bodyGrad.addColorStop(0.3, skin.body);
    bodyGrad.addColorStop(0.8, skin.outline);
    bodyGrad.addColorStop(1, skin.outline + 'aa');
    ctx.fillStyle = bodyGrad;
    ctx.fill();
    ctx.strokeStyle = skin.outline;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = skin.body;
    ctx.shadowBlur = 6;
    ctx.stroke();
    ctx.shadowBlur = 0;
    // --- EXPRESSIVE FACE (behavior-based) ---
    const eyeAngle = Math.atan2(entity.vy || 0, entity.vx || 0);
    const eyeOffX = Math.cos(eyeAngle) * 3;
    const eyeOffY = Math.sin(eyeAngle) * 3;
    const lx = x + eyeOffX - 4.5, ly = y + eyeOffY - 3;
    const rx = x + eyeOffX + 4.5, ry = y + eyeOffY - 3;
    if (entity.frozen) {
        // Frozen face — X eyes
        ctx.strokeStyle = skin.eye; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(lx-2,ly-2); ctx.lineTo(lx+2,ly+2); ctx.moveTo(lx+2,ly-2); ctx.lineTo(lx-2,ly+2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(rx-2,ry-2); ctx.lineTo(rx+2,ry+2); ctx.moveTo(rx+2,ry-2); ctx.lineTo(rx-2,ry+2); ctx.stroke();
        // Open mouth (shock)
        ctx.beginPath();
        ctx.arc(x + eyeOffX, y + eyeOffY + 4, 2.5, 0, Math.PI * 2);
        ctx.strokeStyle = skin.eye; ctx.lineWidth = 1;
        ctx.stroke();
    } else if (hitFlash > 0) {
        // Hit face — squint eyes, ouch mouth
        ctx.beginPath();
        ctx.moveTo(lx - 3, ly); ctx.lineTo(lx + 3, ly);
        ctx.moveTo(rx - 3, ry); ctx.lineTo(rx + 3, ry);
        ctx.strokeStyle = skin.eye; ctx.lineWidth = 1.8;
        ctx.stroke();
        // Wavy pain mouth
        ctx.beginPath();
        ctx.moveTo(x + eyeOffX - 4, y + eyeOffY + 5);
        ctx.bezierCurveTo(x + eyeOffX - 2, y + eyeOffY + 3, x + eyeOffX + 2, y + eyeOffY + 7, x + eyeOffX + 4, y + eyeOffY + 5);
        ctx.strokeStyle = skin.eye; ctx.lineWidth = 1;
        ctx.stroke();
    } else if (behavior === 'chase' || (isPlayer && rageMode)) {
        // Aggressive face — angled eyebrows, grin
        // Angry eyes (angled brows)
        ctx.beginPath();
        ctx.arc(lx, ly, 3, 0, Math.PI * 2);
        ctx.arc(rx, ry, 3, 0, Math.PI * 2);
        ctx.fillStyle = skin.eye;
        ctx.fill();
        // Pupils
        ctx.beginPath();
        ctx.arc(lx + eyeOffX * 0.3, ly + eyeOffY * 0.3, 1.5, 0, Math.PI * 2);
        ctx.arc(rx + eyeOffX * 0.3, ry + eyeOffY * 0.3, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = '#111';
        ctx.fill();
        // Angry brows
        ctx.beginPath();
        ctx.moveTo(lx - 4, ly - 5); ctx.lineTo(lx + 3, ly - 3);
        ctx.moveTo(rx + 4, ry - 5); ctx.lineTo(rx - 3, ry - 3);
        ctx.strokeStyle = skin.eye; ctx.lineWidth = 1.5;
        ctx.stroke();
        // Grin
        ctx.beginPath();
        ctx.arc(x + eyeOffX, y + eyeOffY + 4, 4, 0.1, Math.PI - 0.1);
        ctx.strokeStyle = skin.eye; ctx.lineWidth = 1;
        ctx.stroke();
    } else if (behavior === 'flee') {
        // Scared face — wide eyes, tiny mouth
        ctx.beginPath();
        ctx.arc(lx, ly, 3.5, 0, Math.PI * 2);
        ctx.arc(rx, ry, 3.5, 0, Math.PI * 2);
        ctx.fillStyle = skin.eye;
        ctx.fill();
        // Big pupils (dilated fear)
        ctx.beginPath();
        ctx.arc(lx, ly, 2, 0, Math.PI * 2);
        ctx.arc(rx, ry, 2, 0, Math.PI * 2);
        ctx.fillStyle = '#111';
        ctx.fill();
        // Tiny open mouth
        ctx.beginPath();
        ctx.arc(x + eyeOffX, y + eyeOffY + 5, 2, 0, Math.PI * 2);
        ctx.fillStyle = skin.eye + '80';
        ctx.fill();
    } else {
        // Default calm face — standard eyes + slight smile
        ctx.beginPath();
        ctx.arc(lx, ly, 3, 0, Math.PI * 2);
        ctx.arc(rx, ry, 3, 0, Math.PI * 2);
        ctx.fillStyle = skin.eye;
        ctx.fill();
        // Pupils (look direction)
        ctx.beginPath();
        ctx.arc(lx + eyeOffX * 0.3, ly + eyeOffY * 0.3, 1.3, 0, Math.PI * 2);
        ctx.arc(rx + eyeOffX * 0.3, ry + eyeOffY * 0.3, 1.3, 0, Math.PI * 2);
        ctx.fillStyle = '#111';
        ctx.fill();
        // Slight smile
        ctx.beginPath();
        ctx.arc(x + eyeOffX, y + eyeOffY + 4, 3, 0.2, Math.PI - 0.2);
        ctx.strokeStyle = skin.eye + '60'; ctx.lineWidth = 0.8;
        ctx.stroke();
    }
    // Weapon swing visual — arc on attack for ALL entities (player + bots)
    if (entity.attackSwingTimer > 0) {
        const swingAlpha = entity.attackSwingTimer / 0.15;
        const weaponStats = WEAPONS[entity.weapon] || WEAPONS.katana;
        ctx.save();
        ctx.globalAlpha = swingAlpha * (isPlayer ? 0.6 : 0.4);
        ctx.strokeStyle = weaponStats.color;
        ctx.lineWidth = isPlayer ? 3 : 2;
        ctx.beginPath();
        const arcHalfWidth = weaponStats.swingArc / 2;
        const arcStartAngle = entity.lastAttackAngle - arcHalfWidth;
        const arcEndAngle = entity.lastAttackAngle + arcHalfWidth;
        ctx.arc(x, y, radius + (isPlayer ? 20 : 16), arcStartAngle, arcEndAngle);
        ctx.stroke();
        ctx.restore();
    }
    // Weapon icon badge — small icon next to HP bar for all entities
    {
        const wStats = WEAPONS[entity.weapon] || WEAPONS.katana;
        ctx.save();
        ctx.font = '10px Arial'; ctx.textAlign = 'left';
        ctx.fillText(wStats.icon, x + 16, y - radius - 8);
        ctx.restore();
    }
    // HP bar — slim Japanese-style
    const barW = 28, barH = 3;
    const barX = x - barW / 2, barY = y - radius - 12;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    drawRoundRect(ctx, barX - 1, barY - 0.5, barW + 2, barH + 1, 2); ctx.fill();
    const hpPct = Math.max(0, hp / maxHp);
    const hpColor = hpPct > 0.5 ? '#88ddaa' : hpPct > 0.25 ? '#d4a574' : '#ff5566';
    ctx.fillStyle = hpColor;
    drawRoundRect(ctx, barX, barY, barW * hpPct, barH, 1.5); ctx.fill();
    // Name tag — Japanese style font treatment
    ctx.font = `bold ${isPlayer ? 11 : 9}px 'Segoe UI', Arial, sans-serif`;
    ctx.textAlign = 'center';
    if (isPlayer) {
        ctx.fillStyle = '#e8a0bf';
        ctx.shadowColor = '#e8a0bf'; ctx.shadowBlur = 4;
    } else {
        ctx.fillStyle = 'rgba(200,180,220,0.6)';
    }
    ctx.fillText(nameTag || '', x, y + radius + 14);
    ctx.shadowBlur = 0;
    // AI personality indicator — emoji + tier kanji above bots
    if (!isPlayer && entity.personality) {
        // Personality-colored subtle ring
        const persColors = {
            berserker: 'rgba(255,80,40,0.2)', guardian: 'rgba(80,160,255,0.2)',
            assassin: 'rgba(200,50,200,0.2)', camper: 'rgba(100,200,100,0.2)',
            hunter: 'rgba(255,200,50,0.2)', trickster: 'rgba(200,100,255,0.2)',
            predator: 'rgba(180,120,60,0.2)', scavenger: 'rgba(255,220,100,0.2)',
        };
        const pColor = persColors[entity.personality.id] || 'rgba(200,160,232,0.15)';
        ctx.beginPath();
        ctx.arc(x, y, radius + 3, 0, Math.PI * 2);
        ctx.strokeStyle = pColor;
        ctx.lineWidth = 2;
        ctx.stroke();
    }
    // Speed boost indicator
    if (entity.speedBoost) {
        ctx.font = '10px Arial';
        ctx.fillText('⚡', x + radius + 5, y - 5);
    }
    // Damage boost indicator
    if (entity.damageBoost) {
        ctx.font = '10px Arial';
        ctx.fillText('🔥', x - radius - 10, y - 5);
    }
    ctx.restore();
}

// === DRAWING: POWER-UPS ===
function drawPowerUps(ctx) {
    for (const pu of powerUps) {
        if (!pu.alive) continue;
        const pulse = 1 + 0.15 * Math.sin(pu.pulseTimer * 4);
        const r = pu.radius * pulse;
        ctx.save();
        // Glow
        ctx.beginPath();
        ctx.arc(pu.x, pu.y, r + 6, 0, Math.PI * 2);
        ctx.fillStyle = pu.color + '30';
        ctx.fill();
        // Body
        ctx.beginPath();
        ctx.arc(pu.x, pu.y, r, 0, Math.PI * 2);
        ctx.fillStyle = pu.color;
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Icon
        ctx.font = '14px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#fff';
        ctx.fillText(pu.icon, pu.x, pu.y);
        ctx.restore();
    }
}

// === DRAWING: HUD ===
function drawHUD(ctx) {
    ctx.save();
    // Top bar — gradient fade instead of solid block
    const topGrad = ctx.createLinearGradient(0, 0, 0, 92);
    topGrad.addColorStop(0, 'rgba(0,0,0,0.75)');
    topGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = topGrad;
    ctx.fillRect(0, 0, W, 92);

    // === LEFT: Score + Kills in pill badges (Japanese palette) ===
    // Score pill
    ctx.fillStyle = 'rgba(232,160,191,0.1)';
    drawRoundRect(ctx, 10, 8, 100, 26, 13); ctx.fill();
    ctx.font = 'bold 13px "Segoe UI", Arial'; ctx.textAlign = 'center';
    ctx.fillStyle = '#e8a0bf';
    ctx.fillText(`⭐ ${gameState.score}`, 60, 25);
    // Kills pill
    ctx.fillStyle = 'rgba(255,85,102,0.1)';
    drawRoundRect(ctx, 10, 38, 80, 24, 12); ctx.fill();
    ctx.font = 'bold 12px "Segoe UI", Arial';
    ctx.fillStyle = '#ff5566';
    ctx.fillText(`💀 ${gameState.kills}`, 50, 54);
    // Alive count pill
    ctx.fillStyle = 'rgba(200,160,232,0.1)';
    drawRoundRect(ctx, 10, 66, 75, 22, 11); ctx.fill();
    ctx.font = 'bold 11px "Segoe UI", Arial';
    ctx.fillStyle = '#c8a0e8';
    ctx.fillText(`👥 ${aliveCount}`, 47, 80);

    // === CENTER: Timer + Streak + Shrink ===
    // Timer — large centered
    ctx.font = 'bold 20px "Segoe UI", Arial'; ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.fillText(`${Math.floor(gameTimer)}s`, W / 2, 26);
    // Streak badge
    if (streak > 1) {
        const streakW = 60 + (streak > 5 ? 10 : 0);
        ctx.fillStyle = 'rgba(255,204,0,0.15)';
        drawRoundRect(ctx, W/2 - streakW/2, 34, streakW, 22, 11); ctx.fill();
        ctx.font = 'bold 12px "Segoe UI", Arial';
        ctx.fillStyle = '#ffcc00';
        ctx.fillText(`🔥 x${streak}`, W / 2, 49);
    }
    // Shrink timer — pulsing when close
    const shrinkUrgent = arena.shrinkTimer < 5;
    const shrinkAlpha = shrinkUrgent ? 0.7 + 0.3 * Math.sin(gameTimer * 6) : 0.5;
    ctx.globalAlpha = shrinkAlpha;
    ctx.font = '11px "Segoe UI", Arial';
    ctx.fillStyle = shrinkUrgent ? '#ff3355' : '#888';
    ctx.fillText(`⚠ ${Math.ceil(arena.shrinkTimer)}s`, W / 2, 72);
    ctx.globalAlpha = 1;

    // === RIGHT: Coins + Level/XP + Pause ===
    // Pause button — clean circle
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.beginPath(); ctx.arc(W - 28, 24, 16, 0, Math.PI * 2); ctx.fill();
    ctx.font = '16px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('⏸', W - 28, 24);
    ctx.textBaseline = 'alphabetic';
    // Coins pill
    ctx.fillStyle = 'rgba(255,204,0,0.12)';
    drawRoundRect(ctx, W - 115, 46, 80, 22, 11); ctx.fill();
    ctx.font = 'bold 11px "Segoe UI", Arial'; ctx.textAlign = 'center';
    ctx.fillStyle = '#ffcc00';
    ctx.fillText(`🪙 ${gameState.coins}`, W - 75, 61);
    // Level + XP bar
    ctx.fillStyle = 'rgba(200,160,232,0.1)';
    drawRoundRect(ctx, W - 100, 72, 65, 18, 9); ctx.fill();
    ctx.font = 'bold 10px "Segoe UI", Arial';
    ctx.fillStyle = '#c8a0e8';
    ctx.fillText(`LV ${gameState.level}`, W - 82, 84);
    // XP mini-bar inside level pill
    const xpPct = gameState.xp / gameState.xpToNext;
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    drawRoundRect(ctx, W - 55, 76, 32, 4, 2); ctx.fill();
    ctx.fillStyle = '#e8a0bf';
    drawRoundRect(ctx, W - 55, 76, Math.max(2, 32 * xpPct), 4, 2); ctx.fill();
    // Crowd meter (small bar under pause)
    drawCrowd(ctx);
    // === Surge meter (left side, y 240-500) ===
    const surgeBarX = 12, surgeBarY = 240, surgeBarW = 22, surgeBarH = 260;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    drawRoundRect(ctx, surgeBarX, surgeBarY, surgeBarW, surgeBarH, 8); ctx.fill();
    const fillH = (surgeMeter / 100) * surgeBarH;
    const surgeColor = surgeLevel >= 3 ? '#ff3355' : surgeLevel >= 2 ? '#ffaa00' : surgeLevel >= 1 ? '#00ccff' : '#00ff88';
    ctx.fillStyle = surgeColor;
    drawRoundRect(ctx, surgeBarX, surgeBarY + surgeBarH - fillH, surgeBarW, fillH, 8); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1;
    drawRoundRect(ctx, surgeBarX, surgeBarY, surgeBarW, surgeBarH, 8); ctx.stroke();
    // Threshold markers
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '8px Arial'; ctx.textAlign = 'center';
    const thresholds = [20, 50, 75, 100];
    for (const t of thresholds) {
        const tY = surgeBarY + surgeBarH - (t / 100) * surgeBarH;
        ctx.fillRect(surgeBarX, tY, surgeBarW, 1);
    }
    ctx.font = 'bold 9px Arial'; ctx.fillStyle = '#fff';
    ctx.fillText('S', surgeBarX + surgeBarW / 2, surgeBarY + surgeBarH + 12);

    // === COMBO DISPLAY (left side below surge meter) ===
    if (player && player.alive && player.comboCount > 1) {
        const comboY = surgeBarY + surgeBarH + 40;
        const comboColor = player.comboCount > 10 ? '#ff3355' : player.comboCount > 5 ? '#ffaa00' : '#ffcc00';
        // Combo background
        ctx.fillStyle = `rgba(255,200,0,0.15)`;
        drawRoundRect(ctx, surgeBarX - 5, comboY - 15, 40, 30, 8); ctx.fill();
        // Combo count (large)
        const scale = 1 + (player.comboPulse > 0 ? player.comboPulse * 0.3 : 0);
        ctx.save();
        ctx.translate(surgeBarX + 15, comboY), ctx.scale(scale, scale);
        ctx.font = 'bold 24px "Segoe UI", Arial';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = comboColor;
        ctx.shadowColor = comboColor;
        ctx.shadowBlur = 10;
        ctx.fillText(`x${player.comboCount}`, 0, 0);
        ctx.shadowBlur = 0;
        ctx.restore();
        // Damage bonus text
        const bonusText = `+${Math.floor(player.comboDamageBonus * 100)}%`;
        ctx.font = 'bold 10px "Segoe UI", Arial';
        ctx.textAlign = 'center';
        ctx.fillStyle = comboColor;
        ctx.fillText(bonusText, surgeBarX + 15, comboY + 18);
    }

    // Active power-up indicators (bottom bar)
    if (player && player.alive) {
        const puIcons = [];
        if (player.speedBoost) puIcons.push({ icon: '⚡', color: '#00ccff', t: player.effectTimers.speed, max: 5 });
        if (player.shieldActive) puIcons.push({ icon: '🛡', color: '#ffcc00', t: player.effectTimers.shield, max: 6 });
        if (player.damageBoost) puIcons.push({ icon: '🔥', color: '#ff3355', t: player.effectTimers.damage, max: 5 });
        if (player.magnetActive) puIcons.push({ icon: '🧲', color: '#cc44ff', t: player.effectTimers.magnet, max: 6 });
        for (let p = 0; p < puIcons.length; p++) {
            const pi = puIcons[p];
            const px = 90 + p * 36, py = H - 40;
            // Arc timer
            ctx.beginPath();
            ctx.arc(px, py, 14, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fill();
            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.arc(px, py, 14, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * (pi.t / pi.max));
            ctx.closePath();
            ctx.fillStyle = pi.color + '60'; ctx.fill();
            ctx.font = '14px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillStyle = '#fff';
            ctx.fillText(pi.icon, px, py);
        }
    }
    // Rage indicator
    if (rageMode) {
        ctx.fillStyle = `rgba(255,51,85,${0.5 + 0.3 * Math.sin(gameTimer * 10)})`;
        ctx.font = 'bold 14px Arial'; ctx.textAlign = 'left';
        ctx.fillText(`RAGE ${Math.ceil(rageTimer)}s`, 50, 270);
    }
    ctx.restore();
}

// === DRAWING: PAUSE OVERLAY ===
function drawPauseOverlay(ctx) {
