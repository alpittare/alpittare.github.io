// PHASE 3: CAMPAIGN SYSTEM — 100 Levels, Stars, Routing
// ═══════════════════════════════════════════════════════════════

// === 100-LEVEL CAMPAIGN ===
const GAME_LEVELS = (() => {
    const levels = [];
    for (let i = 0; i < 100; i++) {
        const levelNum = i + 1;
        const isBoss = levelNum === 25 || levelNum === 50 || levelNum === 75 || levelNum === 100;
        levels.push({
            level: levelNum, isBoss,
            isMilestone: i > 0 && i % 10 === 0,
            targetKills: Math.floor(3 + i * 0.15 + (isBoss ? 3 : 0)),
            bots: Math.min(12, 4 + Math.floor(i / 10) + (isBoss ? 2 : 0)),
            aiDifficulty: Math.min(0.2 + i * 0.008, 1.0),
            coinReward: 10 + i * 3 + (isBoss ? 50 : 0),
            starsRequired: isBoss ? 2 : 1,
        });
    }
    return levels;
})();

function getCampaignDifficulty(levelNum) {
    if (levelNum <= 10) return 'easy';
    if (levelNum <= 30) return 'medium';
    if (levelNum <= 60) return 'hard';
    return 'legend';
}

const PHASES = [
    { name: 'ROOKIE', color: '#22cc66', levels: [1, 25] },
    { name: 'PRO', color: '#ffaa00', levels: [26, 50] },
    { name: 'CHAMPION', color: '#ff5544', levels: [51, 75] },
    { name: 'LEGEND', color: '#cc44ff', levels: [76, 100] },
];

function startCampaignLevel(levelNumber) {
    const level = GAME_LEVELS[levelNumber - 1];
    if (!level) return;
    gameState.isCampaignMode = true;
    gameState.currentCampaignLevel = levelNumber;
    startGame(getCampaignDifficulty(levelNumber), level);
}

function isLevelUnlocked(levelNum) {
    if (levelNum === 1) return true;
    const prevLevel = levelNum - 1;
    const prevStars = gameState.levelStars[prevLevel] || 0;
    const prevLevelCfg = GAME_LEVELS[prevLevel - 1];
    return prevStars >= (prevLevelCfg ? prevLevelCfg.starsRequired : 1);
}

function calculateStars(levelNum, won, kills, duration) {
    if (!won) return 0;
    const level = GAME_LEVELS[levelNum - 1];
    if (!level) return 1;
    let stars = 1;
    if (kills >= level.targetKills) stars = 2;
    if (kills >= level.targetKills + 2 && duration < 60) stars = 3;
    return stars;
}

// === LEVEL SELECT SCREEN ===
let levelSelectScroll = 0;
let levelSelectPhaseFilter = 0; // Which phase to show

function updateLevelSelect(dt) {
    updateToasts(dt);
    const tap = consumeTap();
    if (!tap) return;
    // Back button
    if (hitTest(tap, 20, H - 70, 120, 50)) {
        gameState.screen = 'menu';
        return;
    }
    // Phase tabs
    for (let i = 0; i < PHASES.length; i++) {
        const tabX = 15 + i * 98;
        if (hitTest(tap, tabX, 90, 92, 36)) {
            if (gameState.phasesUnlocked[i]) {
                levelSelectPhaseFilter = i;
            }
            return;
        }
    }
    // Level grid buttons
    const phase = PHASES[levelSelectPhaseFilter];
    const startLvl = phase.levels[0];
    const endLvl = phase.levels[1];
    const cols = 5;
    const cellW = 68, cellH = 72;
    const gridX = 20, gridY = 145;
    for (let lvl = startLvl; lvl <= endLvl; lvl++) {
        const idx = lvl - startLvl;
        const col = idx % cols;
        const row = Math.floor(idx / cols);
        const cx = gridX + col * (cellW + 8);
        const cy = gridY + row * (cellH + 8) - levelSelectScroll;
        if (cy < 130 || cy > H - 90) continue;
        if (hitTest(tap, cx, cy, cellW, cellH)) {
            if (isLevelUnlocked(lvl)) {
                startCampaignLevel(lvl);
            }
            return;
        }
    }
}

function drawLevelSelect(ctx) {
    drawBackground(ctx);
    drawNeonText(ctx, 'CAMPAIGN', W/2, 50, 32, '#00ccff');
    // Phase tabs
    for (let i = 0; i < PHASES.length; i++) {
        const tabX = 15 + i * 98;
        const isActive = i === levelSelectPhaseFilter;
        const isUnlocked = gameState.phasesUnlocked[i];
        ctx.save();
        if (!isUnlocked) ctx.globalAlpha = 0.3;
        ctx.fillStyle = isActive ? PHASES[i].color : 'rgba(255,255,255,0.1)';
        drawRoundRect(ctx, tabX, 90, 92, 36, 8); ctx.fill();
        ctx.font = `bold 11px Arial`; ctx.textAlign = 'center';
        ctx.fillStyle = isActive ? '#000' : (isUnlocked ? '#fff' : '#666');
        ctx.fillText(PHASES[i].name, tabX + 46, 112);
        ctx.restore();
    }
    // Level grid
    const phase = PHASES[levelSelectPhaseFilter];
    const startLvl = phase.levels[0];
    const endLvl = phase.levels[1];
    const cols = 5;
    const cellW = 68, cellH = 72;
    const gridX = 20, gridY = 145;
    for (let lvl = startLvl; lvl <= endLvl; lvl++) {
        const idx = lvl - startLvl;
        const col = idx % cols;
        const row = Math.floor(idx / cols);
        const cx = gridX + col * (cellW + 8);
        const cy = gridY + row * (cellH + 8) - levelSelectScroll;
        if (cy < 130 || cy > H - 90) continue;
        const unlocked = isLevelUnlocked(lvl);
        const stars = gameState.levelStars[lvl] || 0;
        const levelCfg = GAME_LEVELS[lvl - 1];
        if (!levelCfg) { continue; }
        ctx.save();
        if (!unlocked) ctx.globalAlpha = 0.35;
        // Cell bg
        ctx.fillStyle = levelCfg.isBoss ? 'rgba(255,51,85,0.2)' : 'rgba(255,255,255,0.08)';
        drawRoundRect(ctx, cx, cy, cellW, cellH, 10); ctx.fill();
        ctx.strokeStyle = stars > 0 ? phase.color : 'rgba(255,255,255,0.15)';
        ctx.lineWidth = stars > 0 ? 2 : 1;
        drawRoundRect(ctx, cx, cy, cellW, cellH, 10); ctx.stroke();
        // Level number
        ctx.font = `bold ${levelCfg.isBoss ? 18 : 16}px Arial`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = unlocked ? '#fff' : '#555';
        ctx.fillText(lvl, cx + cellW / 2, cy + 28);
        // Boss icon
        if (levelCfg.isBoss) {
            ctx.font = '10px Arial';
            ctx.fillStyle = '#ff3355';
            ctx.fillText('BOSS', cx + cellW / 2, cy + 12);
        }
        // Stars
        ctx.font = '12px Arial';
        for (let s = 0; s < 3; s++) {
            ctx.fillStyle = s < stars ? '#ffcc00' : 'rgba(255,255,255,0.15)';
            ctx.fillText('★', cx + 17 + s * 14, cy + cellH - 10);
        }
        // Lock icon
        if (!unlocked) {
            ctx.font = '20px Arial'; ctx.textAlign = 'center';
            ctx.fillStyle = '#555';
            ctx.fillText('🔒', cx + cellW / 2, cy + 30);
        }
        ctx.restore();
    }
    // Back button
    drawButton(ctx, '← BACK', 20, H - 70, 120, 50, '#555555', '#fff');
    drawToasts(ctx);
}

// Listens for purchase success events from React Native WebView wrapper
window.addEventListener('purchaseSuccess', function(e) {
    const d = e.detail;
    if (d.productId === 'vip_yearly') {
        gameState.isVIP = true;
        showToast('👑 VIP Activated!', '#d4a574', 3);
    } else if (d.productId === 'battle_pass_premium') {

        gameState.addCoins(d.coins);

});

function triggerPurchase(productId) {
    // Native bridge (Expo/Capacitor)
    if (window.NativePurchase) {
        window.NativePurchase.buy(productId);
        return;
    }
    // Web fallback — simulate purchase for testing
    console.log('[Shop] Web mode — simulating purchase:', productId);
    const pack = COIN_PACKS.find(p => p.id === productId);
    if (pack) {
        const reward = PLACEMENT_REWARDS[pack.placement] || pack.coins;
        if (typeof reward === 'number') {
            gameState.addCoins(reward);
            showToast(`+${reward} coins!`, '#d4a574', 2);
        }
    } else if (productId === 'vip_yearly') {
        gameState.isVIP = true;
        showToast('👑 VIP Activated!', '#d4a574', 3);
    }
    gameState.saveToStorage();
}

function triggerRestore() {
    if (window.NativePurchase) { window.NativePurchase.restore(); return; }
    console.log('[Shop] Web mode — restore not available');
    showToast('Restore: native only', '#888', 2);
}

        const tx = 12 + t * (tabW + 6);
        if (hitTest(tap, tx, tabY, tabW, tabH)) { shopTab = t; shopScroll = 0; return; }

    // === TAB 0: SKINS ===

        for (let i = 0; i < SHOP_SKINS.length; i++) {

                if (owned) {

function checkAchievements() {
    for (const a of ACHIEVEMENTS) {
        if (gameState.missionProgress[a.stat] >= a.target && !gameState.achievements[a.id]) {
            gameState.achievements[a.id] = true;
            gameState.addCoins(a.coinReward);
            gameState.addXP(a.xpReward);
            showToast(`🏆 ${a.name}!`, '#ffcc00', 3);
        }
    }
}

// === DAILY REWARD ===
const DAILY_REWARDS = [25, 50, 75, 100, 150, 200, 350];

function checkDailyReward() {
    const today = new Date().toDateString();
    if (gameState.lastDailyReward === today) return false;
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (gameState.lastDailyReward === yesterday) {
        gameState.dailyStreak = Math.min(6, gameState.dailyStreak + 1);
    } else if (gameState.lastDailyReward !== null) {
        gameState.dailyStreak = 0;
    }
    return true;
}

function claimDailyReward() {
    const reward = DAILY_REWARDS[gameState.dailyStreak];
    gameState.addCoins(reward);
    gameState.lastDailyReward = new Date().toDateString();
    showToast(`Daily Reward: +${reward} coins!`, '#ffcc00', 2);
    gameState.saveToStorage();
}

// === CAMPAIGN RESULT SCREEN ===
let campaignResultData = { won: false, stars: 0, levelNum: 0 };

function updateCampaignResult(dt) {
    if (bpPromoVisible) bpPromoAnimTimer += dt;
    updateToasts(dt);
    const tap = consumeTap();
    if (!tap) return;
    if (updateBpPromo(dt, tap)) return;
    const lvl = gameState.currentCampaignLevel;
    const won = campaignResultData.won;
    const hasNext = lvl < 100;
    // RETRY button
    if (hitTest(tap, 57, 600, 300, 56)) {
        startCampaignLevel(lvl);
        return;
    }
    // NEXT LEVEL button (only if won and has next)
    if (won && hasNext && hitTest(tap, 57, 670, 300, 56)) {
        startCampaignLevel(lvl + 1);
        return;
    }
    // LEVELS button
    const levelsY = won && hasNext ? 740 : 670;
    if (hitTest(tap, 57, levelsY, 300, 56)) {
        gameState.screen = 'level_select';
        return;
    }
}

// ── MP SYNC ENGINE ──────────────────────────────────────────────
let mpSyncActive = false;
let mpPollTimer = 0;
const MP_POLL_INTERVAL = 300;    // ms between state polls (was 150 — saves 50% bandwidth)
const MP_POSITION_INTERVAL = 300; // ms between position sends (was 100 — saves 66% calls)
let mpRemotePlayers = {};        // { name: { prev, target, lerpT, ... } }
let mpLocalPlayer = null;        // ref to our arena_player from server
const mpCollectedPowerUps = new Set(); // track locally-collected power-up IDs to filter server sync

function startMpSync() {
    if (mpSyncActive) return;
    mpSyncActive = true;
    mpPollTimer = 0;
    mpRemotePlayers = {};
    mpLocalPlayer = null;
}

function stopMpSync() {
    mpSyncActive = false;
    mpRemotePlayers = {};
    mpLocalPlayer = null;
}

async function pollArenaState() {
    if (!gameState.mpRoomId || !mpSyncActive) return;
    try {
        const [room, players] = await Promise.all([
            convex.getArenaRoom(gameState.mpRoomId),
            convex.getArenaPlayers(gameState.mpRoomId),
        ]);
        gameState.mpRoom = room;
        gameState.mpPlayers = players || [];
        // Update remote player interpolation targets
        const myName = getMpName();
        for (const p of gameState.mpPlayers) {
            if (p.playerName === myName) {
                mpLocalPlayer = p;
                continue;
            }
            if (!mpRemotePlayers[p.playerName]) {
                mpRemotePlayers[p.playerName] = { prev: { x: p.x, y: p.y }, target: { x: p.x, y: p.y }, lerpT: 1, extrapolateT: 0, data: p };
            } else {
                const rp = mpRemotePlayers[p.playerName];
                rp.prev = { x: rp.target.x, y: rp.target.y };
                rp.target = { x: p.x, y: p.y };
                rp.lerpT = 0;
                rp.extrapolateT = 0;
                rp.data = p;
            }
        }
        // Clean up disconnected/dead players from interpolation map
        const names = new Set(gameState.mpPlayers.map(p => p.playerName));
        for (const k of Object.keys(mpRemotePlayers)) {
            if (!names.has(k)) delete mpRemotePlayers[k];
        }
        // Check if game ended
        if (room && room.status === 'finished' && gameState.screen === 'playing') {
            if (!gameState._mpGameCounted) { gameState.totalGames++; gameState._mpGameCounted = true; }
            checkBpPromo();
            gameState.screen = 'mp_result';
            stopMpSync();
        }
    } catch (e) {
        console.warn('[MP] Poll error:', e.message);
    }
}

async function sendMpPosition() {
    if (!gameState.mpRoomId || !mpSyncActive || !player || !player.alive) return;
    const now = Date.now();
    if (now - gameState.mpLastPositionSend < MP_POSITION_INTERVAL) return;
    gameState.mpLastPositionSend = now;
    try {
        await convex.sendArenaPosition(gameState.mpRoomId, getMpName(), player.x, player.y, player.vx, player.vy);
    } catch (e) { /* silent — next tick retries */ }
}

async function reportMpHit(targetName) {
    if (!gameState.mpRoomId) return null;
    try {
        // Force position sync before hit — ensures server has our latest position
        await convex.sendArenaPosition(gameState.mpRoomId, getMpName(), player.x, player.y, player.vx, player.vy);
        gameState.mpLastPositionSend = Date.now();
        return await convex.reportArenaHit(gameState.mpRoomId, getMpName(), targetName);
    } catch (e) { return null; }
}

function lerpMpPlayers(dt) {
    for (const rp of Object.values(mpRemotePlayers)) {
        rp.lerpT = Math.min(1, rp.lerpT + dt / 0.3); // lerp over 300ms (matches poll interval)
        rp.extrapolateT = (rp.extrapolateT || 0) + dt;
    }
}

function getMpPlayerPos(name) {
    const rp = mpRemotePlayers[name];
    if (!rp) return null;
    const t = Math.min(1, rp.lerpT);
    // Smooth easing — cubic ease-out for natural deceleration
    const eased = 1 - (1 - t) * (1 - t) * (1 - t);
    let x = rp.prev.x + (rp.target.x - rp.prev.x) * eased;
    let y = rp.prev.y + (rp.target.y - rp.prev.y) * eased;
    // Velocity extrapolation — fills gaps between polls smoothly
    if (t >= 1 && rp.data) {
        const extra = Math.min(0.4, (rp.extrapolateT || 0) - 0.3); // extrapolate up to 400ms past lerp
        if (extra > 0) {
            x += (rp.data.vx || 0) * extra * 4;
            y += (rp.data.vy || 0) * extra * 4;
        }
    }
    return { x, y };
}

// ── QUICK MATCH (searching) ─────────────────────────────────────
async function startQuickMatch() {
    try {
        const result = await convex.joinArenaQueue(getMpName(), gameState.mpDifficulty, gameState.mpMaxPlayers, gameState.equippedSkin);
        if (result && result.status === 'matched' && result.roomId) {
            gameState.mpRoomId = result.roomId;
            gameState.mpIsHost = false;
            gameState.screen = 'mp_lobby';
            mpLobbyAutoStartTimer = 0; mpLobbyAutoStarting = false;
            pollLobbyState();
        }
    } catch (e) {
        console.warn('[MP] Queue join error:', e.message);
        showToast('Connection error, retrying...', '#ff3355', 2);
    }
}

const MP_SEARCH_TIMEOUT = 30; // seconds searching queue before creating a lobby room (was 5)
let mpAutoStarting = false;   // prevent duplicate auto-start calls

function updateMpSearching(dt) {
    updateToasts(dt);
    gameState.mpSearchTimer += dt;
    // Poll queue status every 1.5 seconds
    if (gameState.mpSearchTimer < MP_SEARCH_TIMEOUT) {
        if (Math.floor(gameState.mpSearchTimer * 2) !== Math.floor((gameState.mpSearchTimer - dt) * 2)) {
            checkQueueStatus();
        }
    }
    // After timeout: create a PUBLIC lobby room so other players can still join.
    if (gameState.mpSearchTimer >= MP_SEARCH_TIMEOUT && !mpAutoStarting) {
        mpAutoStarting = true;
        createPublicLobbyRoom();
    }
    const tap = consumeTap();
    if (!tap) return;
    if (hitTest(tap, W / 2 - 80, H - 90, 160, 48)) {
        mpAutoStarting = false;
        convex.leaveArenaQueue(getMpName()).catch(() => {});
        gameState.screen = 'mp_menu';
    }
}

async function checkQueueStatus() {
    try {
        const result = await convex.checkArenaQueue(getMpName());
        if (result && result.status === 'matched' && result.roomId) {
            gameState.mpRoomId = result.roomId;
            gameState.mpIsHost = false;
            mpAutoStarting = false;
            gameState.screen = 'mp_lobby';
            mpLobbyAutoStartTimer = 0; mpLobbyAutoStarting = false;
            pollLobbyState();
        }
    } catch (e) { /* retry next tick */ }
}

/**
 * Create a PUBLIC lobby room and go to lobby screen.
 * Other players can join via joinArenaQueue step 1.
 * Lobby auto-start (10s) fills bots and starts the game.
 */
async function createPublicLobbyRoom() {
    try {
        await convex.leaveArenaQueue(getMpName()).catch(() => {});
        const result = await convex.createArenaRoom(
            getMpName(), gameState.mpDifficulty,
            gameState.mpMaxPlayers, gameState.equippedSkin,
            false  // PUBLIC room
        );
        if (result && result.roomId) {
            gameState.mpRoomId = result.roomId;
            gameState.mpRoomCode = result.roomCode;
            gameState.mpIsHost = true;
            gameState.screen = 'mp_lobby';
            mpLobbyAutoStartTimer = 0;
            mpLobbyAutoStarting = false;
            pollLobbyState();
        } else {
            showToast('Failed to create match', '#ff3355', 2);
            gameState.screen = 'mp_menu';
        }
    } catch (e) {
        console.warn('[MP] Create lobby error:', e.message);
        showToast('Connection error', '#ff3355', 2);
        gameState.screen = 'mp_menu';
    } finally {
        mpAutoStarting = false;
    }
}

function drawMpSearching(ctx) {
    drawBackground(ctx);
    const elapsed = gameState.mpSearchTimer;
    const remaining = Math.max(0, Math.ceil(MP_SEARCH_TIMEOUT - elapsed));
    const isFillingBots = elapsed >= MP_SEARCH_TIMEOUT;
    const t = elapsed; // shorthand for animations
    const mainColor = isFillingBots ? '#00ff88' : '#00ccff';
    const mainRGB = isFillingBots ? '0,255,136' : '0,204,255';

    // === Animated radar rings (behind everything) ===
    ctx.save();
    ctx.translate(W / 2, 310);
    for (let r = 0; r < 3; r++) {
        const ringT = (t * 0.8 + r * 1.1) % 3.3;
        const ringR = 30 + ringT * 60;
        const ringA = Math.max(0, 0.3 - ringT * 0.09);
        ctx.beginPath(); ctx.arc(0, 0, ringR, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(${mainRGB}, ${ringA})`; ctx.lineWidth = 1.5;
        ctx.stroke();
    }
    ctx.restore();

    // === Central player preview (your character) ===
    const skin = SKINS[gameState.equippedSkin] || SKINS.default;
    const bobY = Math.sin(t * 2.5) * 5;
    const previewX = W / 2, previewY = 300 + bobY;
    // Glow behind player
    ctx.save();
    const glowGrad = ctx.createRadialGradient(previewX, previewY, 0, previewX, previewY, 50);
    glowGrad.addColorStop(0, `rgba(${mainRGB}, 0.15)`);
    glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath(); ctx.arc(previewX, previewY, 50, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    // Player body
    ctx.beginPath(); ctx.arc(previewX, previewY, 24, 0, Math.PI * 2);
    ctx.fillStyle = skin.body; ctx.fill();
    ctx.strokeStyle = skin.outline; ctx.lineWidth = 2; ctx.stroke();
    // Eyes — looking around
    const eyeAngle = t * 1.5;
    const eyeLookX = Math.cos(eyeAngle) * 2, eyeLookY = Math.sin(eyeAngle) * 1;
    ctx.fillStyle = skin.eye || '#fff';
    ctx.beginPath(); ctx.arc(previewX - 7 + eyeLookX, previewY - 3 + eyeLookY, 5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(previewX + 7 + eyeLookX, previewY - 3 + eyeLookY, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(previewX - 5 + eyeLookX, previewY - 3 + eyeLookY, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(previewX + 9 + eyeLookX, previewY - 3 + eyeLookY, 2.5, 0, Math.PI * 2); ctx.fill();
    // Player name below
    ctx.font = 'bold 12px "Segoe UI", Arial'; ctx.textAlign = 'center';
    ctx.fillStyle = mainColor;
    ctx.fillText(getMpName(), previewX, previewY + 38);

    // === Orbiting dots (searching for opponents) ===
    if (!isFillingBots) {
        ctx.save();
        ctx.translate(W / 2, 300);
        for (let i = 0; i < 5; i++) {
            const orbitA = t * 1.2 + (Math.PI * 2 * i) / 5;
            const orbitR = 70 + Math.sin(t * 0.5 + i) * 8;
            const ox = Math.cos(orbitA) * orbitR;
            const oy = Math.sin(orbitA) * orbitR * 0.45; // squashed ellipse
            const dotAlpha = 0.3 + Math.sin(t * 3 + i * 1.5) * 0.3;
            ctx.beginPath(); ctx.arc(ox, oy, 4, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${mainRGB}, ${dotAlpha})`; ctx.fill();
        }
        // Question marks orbiting (looking for players)
        for (let i = 0; i < 3; i++) {
            const qA = -t * 0.6 + (Math.PI * 2 * i) / 3;
            const qR = 95;
            const qx = Math.cos(qA) * qR;
            const qy = Math.sin(qA) * qR * 0.4;
            ctx.font = '14px Arial';
            ctx.globalAlpha = 0.2 + Math.sin(t * 2 + i * 2) * 0.15;
            ctx.fillStyle = '#fff';
            ctx.fillText('?', qx, qy);
        }
        ctx.globalAlpha = 1;
        ctx.restore();
    } else {
        // Filling bots — show bot silhouettes sliding in
        const botColors = ['#ff5544', '#00ccff', '#cc44ff', '#ffcc00'];
        for (let i = 0; i < Math.min(4, gameState.mpMaxPlayers - 1); i++) {
            const slideIn = Math.min(1, (elapsed - MP_SEARCH_TIMEOUT) * 2 + i * 0.3);
            const bx = W / 2 + (i - 1.5) * 60;
            const by = 420 + (1 - slideIn) * 40;
            ctx.globalAlpha = slideIn;
            ctx.beginPath(); ctx.arc(bx, by, 14, 0, Math.PI * 2);
            ctx.fillStyle = botColors[i % 4]; ctx.fill();
            ctx.strokeStyle = shadeColor(botColors[i % 4], -30); ctx.lineWidth = 1.5; ctx.stroke();

            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(bx - 4, by - 2, 3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(bx + 4, by - 2, 3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#111';
            ctx.beginPath(); ctx.arc(bx - 3, by - 2, 1.5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(bx + 5, by - 2, 1.5, 0, Math.PI * 2); ctx.fill();

            ctx.font = '8px Arial'; ctx.textAlign = 'center';
            ctx.fillStyle = '#aaa';
            ctx.fillText('🤖', bx, by + 22);
            ctx.globalAlpha = 1;
        }
    }

    if (isFillingBots) {
        drawNeonText(ctx, 'MATCH FOUND!', W / 2, 100, 26, '#00ff88');
        ctx.font = '14px "Segoe UI", Arial'; ctx.textAlign = 'center';
        ctx.fillStyle = '#aaa';
        ctx.fillText('Filling arena with opponents...', W / 2, 130);
    } else {
        drawNeonText(ctx, 'FINDING MATCH', W / 2, 90, 24, '#00ccff');

        ctx.save();
        drawGlassCard(ctx, W / 2 - 55, 110, 110, 28, 14, 0.08);
        ctx.font = 'bold 12px "Segoe UI", Arial'; ctx.textAlign = 'center';
        ctx.fillStyle = '#fff';
        ctx.fillText(`⚔ ${gameState.mpMaxPlayers}-PLAYER`, W / 2, 128);

    // === Progress section ===
    const pct = Math.min(1, elapsed / MP_SEARCH_TIMEOUT);

    // Time label

        ctx.fillText('Starting soon...', W / 2, barY - 14);
    } else {
        ctx.fillStyle = '#888';
        ctx.fillText(`Searching ${Math.floor(elapsed)}s  ·  Auto-start in ${remaining}s`, W / 2, barY - 14);
    }

    // Progress bar with glow
    ctx.save();
    ctx.shadowColor = mainColor; ctx.shadowBlur = 8;
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    drawRoundRect(ctx, barX, barY, barW, barH, 4); ctx.fill();
    ctx.fillStyle = mainColor;
    drawRoundRect(ctx, barX, barY, Math.max(4, barW * pct), barH, 4); ctx.fill();
    // Animated shine on progress bar
    if (!isFillingBots) {
        const shineX = barX + (barW * pct) - 20 + Math.sin(t * 4) * 10;
        ctx.globalAlpha = 0.4;
        ctx.fillStyle = '#fff';
        drawRoundRect(ctx, Math.max(barX, shineX), barY, 12, barH, 4); ctx.fill();
        ctx.globalAlpha = 1;
    }
    ctx.restore();

    // === Rotating tips ===
    const tipIdx = Math.floor(elapsed / 4) % MP_SEARCH_TIPS.length;
    const tipFade = 1 - Math.abs(((elapsed % 4) / 4) * 2 - 1); // fade in/out

    ctx.font = '11px "Segoe UI", Arial'; ctx.textAlign = 'center';
    ctx.fillStyle = '#ccc';
    ctx.fillText(MP_SEARCH_TIPS[tipIdx], W / 2, 563);

    for (let i = 0; i < totalSlots; i++) {

        const isBot = isFillingBots && i > 0;
        ctx.fillStyle = isFilled ? mainColor : (isBot ? 'rgba(255,136,0,0.5)' : 'rgba(255,255,255,0.06)');
        drawRoundRect(ctx, sx, slotY + 8, slotW, slotW, 5); ctx.fill();

// ── LOBBY SCREEN ─────────────────────────────────────────────────
let mpLobbyPollTimer = 0;

async function pollLobbyState() {
    if (!gameState.mpRoomId) return;
    try {
        const [room, players] = await Promise.all([
            convex.getArenaRoom(gameState.mpRoomId),
            convex.getArenaPlayers(gameState.mpRoomId),
        ]);
        gameState.mpRoom = room;
        gameState.mpPlayers = players || [];
        // KEY: If room transitioned to countdown/playing on server (another client started it),
        // immediately start the game. The guard inside startMpGame() prevents double-init.
        if (room && (room.status === 'countdown' || room.status === 'playing') && gameState.screen === 'mp_lobby') {
            console.log('[MP] Poll detected room in', room.status, '— starting game');
            startMpGame();
        }
    } catch (e) { console.warn('[MP] pollLobbyState error:', e); }
}

let mpLobbyAutoStartTimer = 0;
let mpLobbyAutoStarting = false;
let mpAutoStartTimestamp = 0;
const MP_LOBBY_AUTO_START_DELAY = 15; // seconds — auto-start after entering lobby (was 10)

function updateMpLobby(dt) {
    updateToasts(dt);
    mpLobbyPollTimer += dt;
    mpLobbyAutoStartTimer += dt;
    if (mpLobbyPollTimer >= 1.5) {
        mpLobbyPollTimer = 0;
        pollLobbyState();
    }
    const players = gameState.mpPlayers || [];
    const maxP = gameState.mpRoom ? gameState.mpRoom.maxPlayers : gameState.mpMaxPlayers;
    const lobbyFull = players.length >= maxP;
    const timedOut = mpLobbyAutoStartTimer >= MP_LOBBY_AUTO_START_DELAY;

    if ((lobbyFull || timedOut) && !mpLobbyAutoStarting) {
        mpLobbyAutoStarting = true;
        mpAutoStartTimestamp = Date.now();
        convex.startArenaMatch(gameState.mpRoomId).then(async (r) => {
            if (r && r.success) {
                console.log('[MP] startArenaMatch succeeded, polling then starting game');
                await pollLobbyState();
                if (gameState.screen === 'mp_lobby') startMpGame();
                // NUCLEAR FALLBACK: if still on lobby after 3s, force transition
                setTimeout(() => {
                    if (gameState.screen === 'mp_lobby') {
                        console.warn('[MP] NUCLEAR FALLBACK — forcing game start');
                        startMpGame();
                    }
                }, 3000);
            } else {
                console.log('[MP] startArenaMatch returned false, polling for room status');
                mpLobbyAutoStarting = false;
                pollLobbyState();
            }
        }).catch((e) => { console.error('[MP] startArenaMatch error:', e); mpLobbyAutoStarting = false; pollLobbyState(); });
    }

    // Safety: if stuck for >5 seconds, reset so poll can retry
    if (mpLobbyAutoStarting && mpAutoStartTimestamp && (Date.now() - mpAutoStartTimestamp > 5000)) {
        console.warn('[MP] Auto-start stuck for 5s, resetting');
        mpLobbyAutoStarting = false;
        mpAutoStartTimestamp = 0;
        pollLobbyState();
    }

    const tap = consumeTap();
    if (!tap) return;
    if (hitTest(tap, W / 2 - 100, H - 170, 200, 55) && !mpLobbyAutoStarting) {
        mpLobbyAutoStarting = true;
        mpAutoStartTimestamp = Date.now();
        convex.startArenaMatch(gameState.mpRoomId).then(r => {
            if (r && r.success) startMpGame();
            else { showToast('Failed to start', '#ff3355', 1.5); mpLobbyAutoStarting = false; }
        }).catch(() => { showToast('Error starting match', '#ff3355', 1.5); mpLobbyAutoStarting = false; });
    }
    if (hitTest(tap, W / 2 - 75, H - 90, 150, 50)) {
        convex.leaveArenaQueue(getMpName()).catch(() => {});
        stopMpSync();
        gameState.mpRoomId = null;
        mpLobbyAutoStartTimer = 0; mpLobbyAutoStarting = false;
        gameState.screen = 'mp_menu';
    }
}

const CODE_CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
const codeKeyboard = [];
// Build 4-row keyboard
(function buildCodeKeyboard() {
    const rows = ['ABCDEFGH', 'JKLMNPQR', 'STUVWXYZ', '23456789'];
    for (let r = 0; r < rows.length; r++) {
        for (let c = 0; c < rows[r].length; c++) {
            codeKeyboard.push({
                char: rows[r][c],
                x: 22 + c * 47, y: 430 + r * 58, w: 42, h: 48,
            });
        }
    }
})();

function updateMpJoinCode(dt) {
    updateToasts(dt);
    const tap = consumeTap();
    if (!tap) return;
    // Back button
    if (hitTest(tap, 20, H - 70, 120, 50)) {
        gameState.screen = 'mp_menu'; return;
    }
    // Delete button
    if (hitTest(tap, W - 140, H - 70, 120, 50)) {
        gameState.mpCodeInput.pop(); return;
    }
    // Join button (when 4 chars entered)
    if (gameState.mpCodeInput.length === 4 && hitTest(tap, W / 2 - 100, 350, 200, 55)) {
        joinByCode(); return;
    }
    // Keyboard
    for (let i = 0; i < codeKeyboard.length; i++) {
        const k = codeKeyboard[i];
        if (hitTest(tap, k.x, k.y, k.w, k.h)) {
            if (gameState.mpCodeInput.length < 4) {
                gameState.mpCodeInput.push(k.char);
                if (gameState.mpCodeInput.length === 4) {
                    // Auto-join after short delay
                    setTimeout(joinByCode, 300);
                }
            }
            break;
        }
    }
}

async function joinByCode() {
    const code = gameState.mpCodeInput.join('');
    if (code.length !== 4) return;
    try {
        const result = await convex.joinArenaRoom(code, getMpName(), gameState.equippedSkin);
        if (result && result.roomId) {
            gameState.mpRoomId = result.roomId;
            gameState.mpRoomCode = code;
            gameState.mpIsHost = false;
            gameState.screen = 'mp_lobby';
            mpLobbyAutoStartTimer = 0; mpLobbyAutoStarting = false;
            pollLobbyState();
        } else {
            gameState.mpLobbyError = result?.reason || 'Room not found';
            showToast(gameState.mpLobbyError, '#ff3355', 2);

        gameState.mpLobbyError = 'Connection error';
        showToast('Failed to join room', '#ff3355', 2);

}

// ── START MP GAME ────────────────────────────────────────────────
function startMpGame() {
    if (gameState.screen === 'playing' && gameState.mpIsMultiplayer) {
        console.warn('[MP] startMpGame already called, skipping');
        return;
    }
    try {
        console.log('[MP] startMpGame — transitioning to playing');
        gameState.mpIsMultiplayer = true;
        gameState._mpGameCounted = false;
        if (mpCollectedPowerUps) mpCollectedPowerUps.clear();
        gameState.screen = 'playing';
        gameState.mpCountdown = 3;
        startMpSync();
        const myName = getMpName();
        const me = (gameState.mpPlayers || []).find(p => p.playerName === myName);
        const room = gameState.mpRoom;
        if (room) {
            arena.x = room.arenaX; arena.y = room.arenaY;
            arena.w = room.arenaW; arena.h = room.arenaH;
            arena.targetW = room.arenaW; arena.targetH = room.arenaH;
            arena.shrinkTimer = room.shrinkTimer;
        }
        const spawnX = me ? me.x : (arena.x + arena.w / 2);
        const spawnY = me ? me.y : (arena.y + arena.h / 2);
        player = createEntity(spawnX, spawnY, true, null, gameState.equippedSkin);
        player.nameTag = myName;
        bots = [];
        powerUps = [];
        projectiles = [];
        gameTimer = 0;
        streak = 0;
        bestStreakThisGame = 0;
        surgeLevel = 0;
        surgeMeter = 0;
        rageMode = false;
        rageTimer = 0;
        isPaused = false;
        commentaryText = '';
        commentaryTimer = 0;
        aliveCount = room ? room.maxPlayers : 5;
        totalBots = aliveCount - 1;
        gameState.score = 0;
        gameState.kills = 0;
        gameState.isCampaignMode = false;
        audio.startBGM();
        console.log('[MP] startMpGame completed — screen is now:', gameState.screen);
    } catch (e) {
        console.error('[MP] CRITICAL: startMpGame threw:', e.message, e.stack);
        gameState.screen = 'playing';
        gameState.mpIsMultiplayer = true;
        showToast('Match started with errors', '#ff8800', 2);
    }
}

    for (let i = 0; i < BP_MAX_TIER; i++) {

})();

function addBPXP(amount) {
    gameState.bpXP += amount;
    while (gameState.bpXP >= gameState.bpXPToNext && gameState.bpTier < BP_MAX_TIER) {
        gameState.bpXP -= gameState.bpXPToNext;
        gameState.bpTier++;
        gameState.bpXPToNext = 100 + gameState.bpTier * 20;
        showToast(`🎖 Battle Pass Tier ${gameState.bpTier}!`, '#d4a574', 2);
    }
}

function claimBPReward(tier, isPremium) {
    const key = `tier_${tier}${isPremium ? '_premium' : ''}`;
    if (gameState.bpClaimed[key]) return;
    if (tier > gameState.bpTier) return;
    if (isPremium && !gameState.bpPremium) return;
    const reward = isPremium ? BP_REWARDS[tier].premium : BP_REWARDS[tier].free;
    if (!reward) return;
    gameState.bpClaimed[key] = true;
    // Grant reward
    if (reward.type === 'coins') { gameState.addCoins(reward.amount); showToast(`+${reward.amount} coins!`, '#ffcc00', 1.5); }
    else if (reward.type === 'xp') { gameState.addXP(reward.amount); showToast(`+${reward.amount} XP!`, '#00ff88', 1.5); }
    else if (reward.type === 'skin') {
        if (!gameState.unlockedSkins.includes(reward.id)) gameState.unlockedSkins.push(reward.id);
        SKINS[reward.id] = { body: reward.color, eye: '#fff', outline: shadeColor(reward.color, -40) };
        showToast(`Unlocked: ${reward.name} Skin!`, reward.color, 2);
    }
    else if (reward.type === 'trail') {
        if (!gameState.unlockedTrails.includes(reward.id)) gameState.unlockedTrails.push(reward.id);
        showToast(`Unlocked: ${reward.name}!`, '#c8a0e8', 2);
    }
    else if (reward.type === 'emote') {
        if (!gameState.unlockedEmotes.includes(reward.id)) gameState.unlockedEmotes.push(reward.id);
        showToast(`Unlocked: ${reward.name} ${reward.id}`, '#e8a0bf', 2);
    }
    else if (reward.type === 'nameColor') {
        if (!gameState.unlockedNameColors.includes(reward.id)) gameState.unlockedNameColors.push(reward.id);
        showToast(`Unlocked: ${reward.name} Name!`, reward.id, 2);
    }
    else if (reward.type === 'deathFX') {
        if (!gameState.unlockedDeathFX.includes(reward.id)) gameState.unlockedDeathFX.push(reward.id);
        showToast(`Unlocked: ${reward.name}!`, '#ff3355', 2);
    }
    else if (reward.type === 'killFX') {
        if (!gameState.unlockedKillFX.includes(reward.id)) gameState.unlockedKillFX.push(reward.id);
        showToast(`Unlocked: ${reward.name}!`, '#ff8800', 2);
    }
    gameState.saveToStorage();
}

let bpScrollY = 0;
function updateBattlePass(dt) {
    updateToasts(dt);
    const tap = consumeTap();
    if (!tap) return;
    if (hitTest(tap, 20, H - 70, 120, 50)) { gameState.screen = 'menu'; return; }
    // Scroll via drag (simplified: tap top/bottom to scroll)
    if (hitTest(tap, 0, 70, W, 30)) { bpScrollY = Math.max(0, bpScrollY - 4); return; }
    if (hitTest(tap, 0, H - 100, W, 30)) { bpScrollY = Math.min(BP_MAX_TIER - 8, bpScrollY + 4); return; }
    // Claim rewards
    for (let i = bpScrollY; i < Math.min(bpScrollY + 8, BP_MAX_TIER); i++) {
        const ry = 120 + (i - bpScrollY) * 80;
        // Free reward claim
        if (hitTest(tap, 25, ry, 160, 70) && i <= gameState.bpTier && !gameState.bpClaimed[`tier_${i}`]) {
            claimBPReward(i, false); return;
        }
        // Premium reward claim
        if (hitTest(tap, W - 185, ry, 160, 70) && i <= gameState.bpTier && gameState.bpPremium && !gameState.bpClaimed[`tier_${i}_premium`]) {
            claimBPReward(i, true); return;
        }
    }
    // Buy premium button
    if (!gameState.bpPremium && hitTest(tap, W / 2 - 100, H - 130, 200, 45)) {
        if (typeof NativePurchase !== 'undefined') {
            NativePurchase.present('battle_pass_premium');
        } else {
            showToast('Premium available in app', '#ff8800', 2);
        }
    }
}

            } else if (unlocked) {
                ctx.font = 'bold 10px Arial'; ctx.fillStyle = '#00ff88';

            ctx.font = '20px Arial'; ctx.textAlign = 'center';
            ctx.fillStyle = premClaimed ? '#333' : (gameState.bpPremium ? '#fff' : '#555');
            ctx.fillText(icon2, W - 140, ry + 32);
            ctx.font = '10px Arial'; ctx.fillStyle = premClaimed ? '#444' : (gameState.bpPremium ? '#ccc' : '#444');
            ctx.fillText(r.premium.name || `${r.premium.amount}`, W - 140, ry + 52);

                ctx.font = '10px Arial'; ctx.fillStyle = '#cc44ff';
                ctx.fillText('✓ CLAIMED', W - 70, ry + 42);
            } else if (unlocked && gameState.bpPremium) {
                ctx.font = 'bold 10px Arial'; ctx.fillStyle = '#cc44ff';
                ctx.fillText('TAP CLAIM', W - 70, ry + 42);

                ctx.font = '10px Arial'; ctx.fillStyle = '#555';
                ctx.fillText('🔒', W - 70, ry + 42);

    }
    if (bpScrollY + 8 < BP_MAX_TIER) {
        ctx.font = '10px Arial'; ctx.textAlign = 'center'; ctx.fillStyle = '#555';
        ctx.fillText('▼ Tap to scroll down', W / 2, H - 140);
    }
    // Premium purchase button

    } else {

}

let ltmShrinkMult = 1; // active LTM shrink speed multiplier
let ltmDashDamage = 0; // active LTM dash-to-damage value

function startLTMGame(mode) {
    gameState.currentLTM = mode;
    startGame('medium');
    // Apply LTM modifiers after entity creation
    setTimeout(() => {
        if (player && mode.mods) {
            player.radius *= mode.mods.radiusMult || 1;
            player.hp *= mode.mods.hpMult || 1;
            player.maxHp *= mode.mods.hpMult || 1;
            player.damage *= mode.mods.damageMult !== undefined ? mode.mods.damageMult : 1;
            player.speed *= mode.mods.speedMult || 1;
            for (const bot of bots) {
                bot.radius *= mode.mods.radiusMult || 1;
                bot.hp *= mode.mods.hpMult || 1;
                bot.maxHp *= mode.mods.hpMult || 1;
                bot.damage *= mode.mods.damageMult !== undefined ? mode.mods.damageMult : 1;
                bot.speed *= mode.mods.speedMult || 1;
            }
            // Shrink speed multiplier (Shrink Rush = 3x faster)
            ltmShrinkMult = mode.mods.shrinkMult || 1;
            // Dash damage (Dash Fury mode — dash deals damage)
            ltmDashDamage = mode.mods.dashDamage || 0;
            // Boss mode: make first bot a mega-boss
            if (mode.mods.bossMode && bots.length > 0) {
                const boss = bots[0];
                boss.hp = 500; boss.maxHp = 500;
                boss.damage = 20; boss.radius = 30;
                boss.speed = 2.5;
                boss.nameTag = '👹 ONI BOSS';
                boss.skin = { body: '#ff2200', eye: '#fff', outline: '#880000' };
            }
        }
    }, 50);
}

// FEATURE: EMOTES SYSTEM
// ═══════════════════════════════════════════════════════════════
let emoteWheelOpen = false;
let emoteWheelTimer = 0;
const EMOTE_WHEEL_RADIUS = 70;

function toggleEmoteWheel() {
    emoteWheelOpen = !emoteWheelOpen;
    emoteWheelTimer = 0;
}

function selectEmote(index) {
    if (index < 0 || index >= gameState.equippedEmotes.length) return;
    gameState.activeEmote = gameState.equippedEmotes[index];
    gameState.emoteTimer = 2.0; // show for 2 seconds
    emoteWheelOpen = false;
}

function updateEmotes(dt) {
    if (gameState.emoteTimer > 0) gameState.emoteTimer -= dt;
    if (emoteWheelOpen) emoteWheelTimer += dt;
}

function drawEmoteAbovePlayer(ctx, entity) {
    if (!entity || !entity.alive) return;
    if (gameState.emoteTimer <= 0 || !gameState.activeEmote) return;
    if (!entity.isPlayer) return;
    const alpha = gameState.emoteTimer < 0.5 ? gameState.emoteTimer * 2 : 1;
    ctx.save();
    ctx.globalAlpha = alpha;
    // Bubble
    const bx = entity.x, by = entity.y - entity.radius - 30;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.beginPath(); ctx.arc(bx, by, 16, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.font = '18px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.fillText(gameState.activeEmote, bx, by);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
}

function drawEmoteWheel(ctx) {
    if (!emoteWheelOpen || !player || !player.alive) return;
    ctx.save();
    const cx = 60, cy = H - 180;
    // Dim background
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, 0, W, H);
    // Wheel background
    ctx.beginPath(); ctx.arc(cx, cy, EMOTE_WHEEL_RADIUS + 10, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(10,10,30,0.85)'; ctx.fill();
    ctx.strokeStyle = 'rgba(232,160,191,0.4)'; ctx.lineWidth = 2; ctx.stroke();
    // Emote slots
    for (let i = 0; i < 4; i++) {
        const angle = (Math.PI * 2 * i) / 4 - Math.PI / 2;
        const ex = cx + Math.cos(angle) * EMOTE_WHEEL_RADIUS * 0.65;
        const ey = cy + Math.sin(angle) * EMOTE_WHEEL_RADIUS * 0.65;
        ctx.beginPath(); ctx.arc(ex, ey, 22, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1; ctx.stroke();
        ctx.font = '24px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = '#fff';
        ctx.fillText(gameState.equippedEmotes[i] || '?', ex, ey);
    }
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
}

function handleEmoteWheelTap(tap) {
    if (!emoteWheelOpen) return false;
    const cx = 60, cy = H - 180;
    for (let i = 0; i < 4; i++) {
        const angle = (Math.PI * 2 * i) / 4 - Math.PI / 2;
        const ex = cx + Math.cos(angle) * EMOTE_WHEEL_RADIUS * 0.65;
        const ey = cy + Math.sin(angle) * EMOTE_WHEEL_RADIUS * 0.65;
        const dx = tap.x - ex, dy = tap.y - ey;
        if (Math.sqrt(dx * dx + dy * dy) < 28) {
            selectEmote(i);
            return true;
        }
    }
    emoteWheelOpen = false;
    return true;
}

// FEATURE: EXPANDED COSMETICS (Trails, Death FX, Kill FX)
// ═══════════════════════════════════════════════════════════════
const TRAIL_STYLES = {
    none: null,
    sakura: { color: '#ffb7c5', shape: 'petal', size: 4 },
    lightning: { color: '#00ccff', shape: 'spark', size: 3 },
    fire: { color: '#ff4400', shape: 'flame', size: 5 },
    void: { color: '#6600cc', shape: 'void', size: 4 },
};

function drawTrail(ctx, entity) {
    const trailId = entity.isPlayer ? gameState.equippedTrail : 'none';
    const style = TRAIL_STYLES[trailId];
    if (!style) return;
    const spd = Math.sqrt(entity.vx * entity.vx + entity.vy * entity.vy);
    if (spd < 1.5) return;
    // Spawn trail particles with style
    const cfg = { speed: 15, life: 0.4, size: style.size, color: style.color, gravity: style.shape === 'flame' ? -80 : 0, shrink: true };
    particles.spawn(entity.x + (Math.random() - 0.5) * 8, entity.y + (Math.random() - 0.5) * 8, cfg);
}

function playDeathFX(entity) {
    const fxId = entity.isPlayer ? gameState.equippedDeathFX : 'default';
    if (fxId === 'sakura_burst') {
        particles.burst(entity.x, entity.y, 20, { speed: 80, life: 1.0, size: 5, color: '#ffb7c5', gravity: 100, shrink: true });
        particles.burst(entity.x, entity.y, 10, { speed: 40, life: 0.8, size: 3, color: '#ff88aa', gravity: 50, shrink: true });
    } else if (fxId === 'void_collapse') {
        particles.burst(entity.x, entity.y, 25, { speed: 120, life: 0.6, size: 4, color: '#6600cc', gravity: 0, shrink: true });
        particles.burst(entity.x, entity.y, 8, { speed: 20, life: 1.2, size: 8, color: '#220044', gravity: 0, shrink: true });
    } else if (fxId === 'dragon_fire') {
        particles.burst(entity.x, entity.y, 30, { speed: 100, life: 0.8, size: 6, color: '#ff2200', gravity: -50, shrink: true });
        particles.burst(entity.x, entity.y, 15, { speed: 60, life: 0.5, size: 3, color: '#ffaa00', gravity: -80, shrink: true });
    } else {
        // Default death
        particles.burst(entity.x, entity.y, 15, { speed: 100, life: 0.6, size: 3, color: entity.skin.body, gravity: 200, shrink: true });
    }
}

function playKillFX(attacker, target) {
    const fxId = attacker.isPlayer ? gameState.equippedKillFX : 'slash';
    if (fxId === 'thunder') {
        // Lightning bolt VFX

function updateSpectator() {
    if (!gameState.mpIsMultiplayer || !player || player.alive) { spectatorTarget = null; return; }

const ONBOARDING_STEPS = [
    { step: 1, title: 'MOVEMENT', hint: 'Drag anywhere to move your character', highlight: 'drag', matchGoal: 'survive' },
    { step: 2, title: 'COMBAT', hint: 'Get close to enemies — you attack automatically!', highlight: 'attack', matchGoal: 'kill_1' },
    { step: 3, title: 'POWER-UPS', hint: 'Collect glowing orbs for special abilities!', highlight: 'powerup', matchGoal: 'collect_1' },
];

let onboardingOverlayTimer = 0;
let onboardingGoalMet = false;

function startOnboardingMatch(diff) {
    startGame('easy');
    onboardingGoalMet = false;
    onboardingOverlayTimer = 4; // show hint for 4 seconds
}

function updateOnboarding(dt) {
    if (gameState.onboardingStep >= 4) return; // done
    if (gameState.onboardingStep === 0) return; // not started
    if (onboardingOverlayTimer > 0) onboardingOverlayTimer -= dt;
    // Check goals
    const step = gameState.onboardingStep;
    if (step === 1 && player) {
        const spd = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
        if (spd > 2) onboardingGoalMet = true;
    }
    if (step === 2 && gameState.kills > 0) onboardingGoalMet = true;
    if (step === 3) {
        // Check if any powerup was collected (simplistic: check if player has any effect active)
        if (player && (player.speedBoost || player.shieldActive || player.damageBoost || player.magnetActive)) {
            onboardingGoalMet = true;
        }
    }
}

function drawOnboardingOverlay(ctx) {
    if (gameState.onboardingStep === 0 || gameState.onboardingStep >= 4) return;
    const step = ONBOARDING_STEPS[gameState.onboardingStep - 1];
    if (!step) return;
    // Floating hint at top
    if (onboardingOverlayTimer > 0) {
        const alpha = onboardingOverlayTimer < 1 ? onboardingOverlayTimer : 1;
        ctx.save(); ctx.globalAlpha = alpha;
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        drawRoundRect(ctx, 20, 50, W - 40, 65, 14); ctx.fill();
        ctx.strokeStyle = '#00ff8860'; ctx.lineWidth = 1;
        drawRoundRect(ctx, 20, 50, W - 40, 65, 14); ctx.stroke();
        ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center'; ctx.fillStyle = '#00ff88';
        ctx.fillText(`STEP ${step.step}: ${step.title}`, W / 2, 75);
        ctx.font = '12px Arial'; ctx.fillStyle = '#ccc';
        ctx.fillText(step.hint, W / 2, 100);
        ctx.restore();
    }
    // Goal indicator
    if (onboardingGoalMet) {
        ctx.save();
        ctx.fillStyle = 'rgba(0,255,136,0.15)';
        drawRoundRect(ctx, W / 2 - 60, 120, 120, 28, 8); ctx.fill();
        ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center'; ctx.fillStyle = '#00ff88';
        ctx.fillText('✓ Goal Complete!', W / 2, 138);
        ctx.restore();
    }
}

function advanceOnboarding() {
    if (gameState.onboardingStep >= 3) {

        showToast('🎓 Tutorial Complete! +200 coins', '#ffcc00', 3);

// === PARTICLE POOL (fixed 250 max, object pool pattern) ===
class ParticlePool {
    constructor(max = 250) {
        this._pool = Array.from({ length: max }, () => ({ active: false }));
    }
    spawn(x, y, cfg = {}) {
        const p = this._pool.find(p => !p.active);
        if (!p) return; // Pool exhausted — NEVER allocate new
        Object.assign(p, {
            active: true, x, y,
            vx: Math.cos(cfg.angle || Math.random() * Math.PI * 2) * (cfg.speed || 100),
            vy: Math.sin(cfg.angle || Math.random() * Math.PI * 2) * (cfg.speed || 100),
            life: cfg.life || 0.8, maxLife: cfg.life || 0.8,
            size: cfg.size || 3, color: cfg.color || '#FFF',
            gravity: cfg.gravity ?? 300, shrink: cfg.shrink ?? true,
            shape: cfg.shape || 'circle',
        });
    }
    burst(x, y, count, cfg = {}) {
        for (let i = 0; i < count; i++) {
            this.spawn(x, y, {
                ...cfg,
                angle: (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5,
                speed: (cfg.speed || 120) * (0.5 + Math.random() * 0.5),
            });
        }
    }
    update(dt) {
        for (const p of this._pool) {
            if (!p.active) continue;
            p.vy += p.gravity * dt;
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.life -= dt;
            if (p.life <= 0) p.active = false;
        }
    }
    draw(ctx) {
        for (const p of this._pool) {
            if (!p.active) continue;
            const a = Math.max(0, p.life / p.maxLife);
            ctx.globalAlpha = a;
            ctx.fillStyle = p.color;
            const sz = p.shrink ? p.size * a : p.size;
            if (p.shape === 'rect') {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.life * 8);
                ctx.fillRect(-sz, -sz, sz * 2, sz * 1.5);
                ctx.restore();
            } else {
                ctx.beginPath();
                ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        ctx.globalAlpha = 1;
    }
}

// === SCREEN TRANSITION ===
let screenTransition = { active: false, alpha: 0, direction: 'in' };
function triggerTransition() {
    screenTransition = { active: true, alpha: 1, direction: 'out' };
}
function updateTransition(dt) {
    if (!screenTransition.active) return;
    if (screenTransition.direction === 'out') {
        screenTransition.alpha -= dt * 3;
        if (screenTransition.alpha <= 0) {
            screenTransition.active = false;
            screenTransition.alpha = 0;
        }
    }
}
function drawTransition(ctx) {
    if (!screenTransition.active) return;
    ctx.save();
    ctx.globalAlpha = Math.max(0, screenTransition.alpha);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// PHASE 5: WEB AUDIO SYNTHESIZER
// ═══════════════════════════════════════════════════════════════
const audio = {
    _ctx: null, muted: false,
    _getCtx() {
        if (!this._ctx) this._ctx = new (window.AudioContext || window.webkitAudioContext)();
        return this._ctx;
    },
    _tone(freq, type, dur, vol, freqEnd) {
        if (this.muted || !gameState.audioEnabled) return;
        try {
            const ac = this._getCtx();
            if (ac.state === 'suspended') ac.resume();
            const o = ac.createOscillator(), g = ac.createGain();
            o.connect(g); g.connect(ac.destination);
            const t = ac.currentTime;
            o.type = type;
            o.frequency.setValueAtTime(freq, t);
            if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, t + dur);
            g.gain.setValueAtTime(vol, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + dur);
            o.start(t); o.stop(t + dur);
        } catch(e) {}
    },
    _chord(freqs, type, dur, vol) {
        freqs.forEach(f => this._tone(f, type, dur, vol));
    },
    play(event) {
        switch(event) {
            case 'click':     this._tone(400, 'sine', 0.05, 0.1); break;
            case 'hit':       this._tone(200, 'square', 0.1, 0.15, 100); break;
            case 'kill':      this._chord([523, 659, 784], 'triangle', 0.3, 0.25); break;
            case 'death':     this._tone(150, 'sawtooth', 0.5, 0.2, 50); break;
            case 'powerUp':   this._tone(440, 'square', 0.2, 0.2, 880); break;
            case 'shield':    this._chord([330, 440, 550], 'sine', 0.3, 0.15); break;
            case 'shrink':    this._tone(300, 'sawtooth', 0.4, 0.15, 150); break;
            case 'coin':      this._tone(1200, 'sine', 0.1, 0.15, 1600); break;
            case 'levelUp':   this._chord([523, 659, 784, 1047], 'triangle', 0.6, 0.25); break;
            case 'achieve':   this._chord([659, 784, 988, 1319], 'triangle', 0.8, 0.2); break;
            case 'rage':      this._chord([220, 330, 440], 'square', 0.4, 0.3); break;
            case 'win':       this._chord([523, 659, 784, 1047, 1319], 'triangle', 1.0, 0.3); break;
            case 'lose':      this._tone(200, 'sawtooth', 0.6, 0.2, 80); break;
            case 'menu':      this._tone(600, 'sine', 0.08, 0.08); break;
            case 'streak':    this._chord([440, 554, 659, 880], 'triangle', 0.5, 0.25); break;
        }
    },
    // Background music — looping ambient synth
    _bgmNodes: null,
    startBGM() {
        if (this.muted || !gameState.audioEnabled || this._bgmNodes) return;
        try {
            const ac = this._getCtx();
            if (ac.state === 'suspended') ac.resume();
            const g = ac.createGain();
            g.gain.setValueAtTime(0.04, ac.currentTime);
            g.connect(ac.destination);
            // Two detuned oscillators for ambient pad
            const o1 = ac.createOscillator();
            o1.type = 'sine'; o1.frequency.value = 65; // low C
            o1.connect(g); o1.start();
            const o2 = ac.createOscillator();
            o2.type = 'sine'; o2.frequency.value = 98; // low G
            o2.detune.value = 5;
            o2.connect(g); o2.start();
            // Subtle LFO modulation
            const lfo = ac.createOscillator();
            const lfoGain = ac.createGain();
            lfo.frequency.value = 0.15;
            lfoGain.gain.value = 3;
            lfo.connect(lfoGain);
            lfoGain.connect(o1.frequency);
            lfo.start();
            this._bgmNodes = { g, o1, o2, lfo, lfoGain };
        } catch(e) {}
    },
    stopBGM() {
        if (!this._bgmNodes) return;
        try {
            const { o1, o2, lfo, g } = this._bgmNodes;
            const ac = this._getCtx();
            g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.5);
            setTimeout(() => {
                try { o1.stop(); o2.stop(); lfo.stop(); } catch(e) {}
            }, 600);
        } catch(e) {}
        this._bgmNodes = null;
    }
};

// === GAME LOOP WITH ERROR CATCHING ===
let lastTime = 0;
function gameLoop(timestamp) {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;
    try { update(dt); draw(); }
    catch(e) {
        ctx.fillStyle = 'rgba(255,0,0,0.8)';
        ctx.fillRect(W - 200, H - 60, 200, 60);
        ctx.fillStyle = '#fff'; ctx.font = '10px monospace';
        ctx.fillText(e.message.substring(0, 30), W - 195, H - 40);
        console.error('[GAME LOOP]', e);
    }
    requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

// CONVEX BACKEND INTEGRATION
// ═══════════════════════════════════════════════════════════════

const CONVEX_URL = "https://gallant-kingfisher-867.convex.cloud";

class ConvexGameClient {
    constructor(url = CONVEX_URL) { this._url = url; this._playerId = null;
        const c = localStorage.getItem("convex_player_id"); if (c) this._playerId = c; }
    get playerId() { return this._playerId; }
    get isRegistered() { return this._playerId !== null; }
    async _mutation(path, args) {
        const r = await fetch(`${this._url}/api/mutation`, { method:"POST",
            headers:{"Content-Type":"application/json"}, body:JSON.stringify({path,args}) });
        if (!r.ok) throw new Error(await r.text()); return (await r.json()).value;
    }
    async _query(path, args) {
        const r = await fetch(`${this._url}/api/query`, { method:"POST",
            headers:{"Content-Type":"application/json"}, body:JSON.stringify({path,args:args||{}}) });
        if (!r.ok) throw new Error(await r.text()); return (await r.json()).value;
    }
    async registerPlayer(name) {
        const id = await this._mutation("players:registerPlayer",{name});
        this._playerId = id; localStorage.setItem("convex_player_id",id); return id;
    }
    async getOrRegisterPlayer(name) {
        if (this._playerId) return this._playerId;
        const ex = await this._query("players:getPlayerByName",{name});
        if (ex) { this._playerId=ex._id; localStorage.setItem("convex_player_id",ex._id); return ex._id; }
        return this.registerPlayer(name);
    }
    async submitSession(game,score,difficulty,won,stats,duration) {
        if (!this._playerId) return null;
        const args={playerId:this._playerId,game,score,difficulty,won,stats};
        if (duration!=null) args.duration=duration;
        return this._mutation("sessions:submitGameSession",args);
    }
    async getLeaderboard(game,limit=10) { return this._query("leaderboard:getLeaderboard",{game,limit}); }
    async getGlobalRanking(limit=10) { return this._query("leaderboard:getGlobalRanking",{limit}); }
    async getPlayerRank(game) { if(!this._playerId)return null;
        return this._query("leaderboard:getPlayerRank",{playerId:this._playerId,game}); }
    async getMatchHistory(game,limit=20) { if(!this._playerId)return [];
        const a={playerId:this._playerId,limit}; if(game)a.game=game;
        return this._query("sessions:getMatchHistory",a); }
    async syncCampaign(game,currentLevel,totalStars,levelStars) { if(!this._playerId)return null;
        return this._mutation("campaign:syncCampaign",
            {playerId:this._playerId,game,currentLevel,totalStars,levelStars}); }
    async unlockAchievement(achievementId,game) { if(!this._playerId)return null;
        return this._mutation("achievements:unlockAchievement",
            {playerId:this._playerId,achievementId,game}); }
    async syncPlayerStats(stats) { if(!this._playerId)return null;
        return this._mutation("players:updatePlayerStats",{playerId:this._playerId,...stats}); }
    // ── Arena Multiplayer API ──
    async joinArenaQueue(playerName, difficulty, maxPlayers, skin) {
        return this._mutation("arenaMultiplayer:joinArenaQueue",{playerName,difficulty,maxPlayers,skin}); }
    async checkArenaQueue(playerName) {
        return this._query("arenaMultiplayer:checkArenaQueue",{playerName}); }
    async leaveArenaQueue(playerName) {
        return this._mutation("arenaMultiplayer:leaveArenaQueue",{playerName}); }
    async getArenaQueueCount() {
        return this._query("arenaMultiplayer:getArenaQueueCount",{}); }
    async createArenaRoom(hostName, difficulty, maxPlayers, skin, isPrivate) {
        return this._mutation("arenaMultiplayer:createArenaRoom",{hostName,difficulty,maxPlayers,skin,isPrivate: isPrivate !== undefined ? isPrivate : true}); }
    async joinArenaRoom(roomCode, playerName, skin) {
        return this._mutation("arenaMultiplayer:joinArenaRoom",{roomCode,playerName,skin}); }
    async setArenaReady(roomId, playerName, ready) {
        return this._mutation("arenaMultiplayer:setArenaReady",{roomId,playerName,ready}); }
    async startArenaMatch(roomId) {
        return this._mutation("arenaMultiplayer:startArenaMatch",{roomId}); }
    async sendArenaPosition(roomId, playerName, x, y, vx, vy) {
        return this._mutation("arenaMultiplayer:sendArenaPosition",{roomId,playerName,x,y,vx,vy}); }
    async reportArenaHit(roomId, attackerName, targetName) {
        return this._mutation("arenaMultiplayer:reportArenaHit",{roomId,attackerName,targetName}); }
    async getArenaRoom(roomId) {
        return this._query("arenaMultiplayer:getArenaRoom",{roomId}); }
    async getArenaPlayers(roomId) {
        return this._query("arenaMultiplayer:getArenaPlayers",{roomId}); }
    async getLiveArenaMatches() {
        return this._query("arenaMultiplayer:getLiveArenaMatches",{}); }
}

// Initialize Convex client
const convex = new ConvexGameClient();

// Auto-register player on first launch
(async () => {
    try {
        await convex.getOrRegisterPlayer("ArenaPlayer_" + Math.random().toString(36).slice(2,8));
        console.log("[Convex] Player registered:", convex.playerId);
    } catch(e) { console.warn("[Convex] Registration failed (offline?):", e.message); }
})();

// Hook into handleGameOver — sync to backend after each game
const _origHandleGameOver = handleGameOver;
handleGameOver = function(won) {
    _origHandleGameOver(won);
    // Async sync to Convex (non-blocking)
    (async () => {
        try {
            await convex.submitSession("survivalarena", gameState.score, gameState.difficulty, won, {
                kills: gameState.kills, bestStreak: bestStreakThisGame,
                surgeLevel: surgeLevel, usedRage: rageMode || rageTimer > 0,
                placement: won ? 1 : aliveCount + 1,
            }, Math.floor(gameTimer));
            // Sync campaign if applicable
            if (gameState.isCampaignMode) {
                const totalStars = Object.values(gameState.levelStars||{}).reduce((a,b)=>a+b,0);
                await convex.syncCampaign("survivalarena", gameState.currentCampaignLevel||1,
                    totalStars, gameState.levelStars||{});
            }
            // Sync career stats (only arena-specific fields — backend merges)
            await convex.syncPlayerStats({
                totalGamesPlayed: gameState.totalGames,
                totalCoinsEarned: gameState.coins,
                level: gameState.level,
                xp: gameState.xp,
                bestScores: { survivalarena: gameState.bestScore },
                survivalarenaStats: {
                    totalKills: gameState.kills || 0,
                    totalWins: gameState.wins || 0,
                    bestKills: gameState.bestKills || 0,
                    bestStreak: gameState.missionProgress ? gameState.missionProgress.bestStreak || 0 : 0,
                    levelsCompleted: gameState.missionProgress ? gameState.missionProgress.levelsCompleted || 0 : 0,
                },
            });
            console.log("[Convex] Game synced to cloud");
        } catch(e) { console.warn("[Convex] Sync failed (offline?):", e.message); }
    })();
};

// Hook into checkAchievements — sync unlocks to backend
const _origCheckAchievements = checkAchievements;
checkAchievements = function() {
    const before = {...gameState.achievements};
    _origCheckAchievements();
    // Find newly unlocked
    for (const a of ACHIEVEMENTS) {
        if (gameState.achievements[a.id] && !before[a.id]) {
            convex.unlockAchievement(a.id, "survivalarena").catch(()=>{});
        }
    }
};
