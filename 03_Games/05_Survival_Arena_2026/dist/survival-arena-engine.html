// === GAME CONFIG ===
const GAME_CONFIG = {
    name: 'Survival Arena',
    genre: 'multiplayer-survival',
    canvasSize: { W: 414, H: 896 },
    coreMechanic: 'drag-to-move in shrinking arena with auto-attack',

// === CANVAS SETUP ===
const W = 414, H = 896;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

let _scale = 1;
function fitCanvas() {
    const r = Math.min(window.innerWidth / W, window.innerHeight / H);
    canvas.style.width = (W * r) + 'px';
    canvas.style.height = (H * r) + 'px';
    _scale = r;
}
window.addEventListener('resize', fitCanvas); fitCanvas();

function screenToGame(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: (clientX - rect.left) / (rect.width / W),
        y: (clientY - rect.top) / (rect.height / H)
    };
}

// === DRAW ROUND RECT WRAPPER — NEVER use ctx.roundRect() directly ===
function drawRoundRect(ctx, x, y, w, h, r) {
    const R = typeof r === 'number' ? r : (Array.isArray(r) ? r[0] : 0);
    ctx.beginPath();
    ctx.moveTo(x + R, y);
    ctx.lineTo(x + w - R, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + R);
    ctx.lineTo(x + w, y + h - R);
    ctx.quadraticCurveTo(x + w, y + h, x + w - R, y + h);
    ctx.lineTo(x + R, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - R);
    ctx.lineTo(x, y + R);
    ctx.quadraticCurveTo(x, y, x + R, y);
    ctx.closePath();
}

// === TOUCH + MOUSE INPUT (DUAL) ===
const _taps = [];
let _dragStart = null;
let _dragCurrent = null;
let _isDragging = false;

function consumeTap() { return _taps.length > 0 ? _taps.shift() : null; }

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const pos = screenToGame(e.touches[0].clientX, e.touches[0].clientY);
    _taps.push(pos);
    _dragStart = pos;
    _dragCurrent = pos;
    _isDragging = true;
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (_isDragging) {
        _dragCurrent = screenToGame(e.touches[0].clientX, e.touches[0].clientY);
    }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    _isDragging = false;
    _dragStart = null;
    _dragCurrent = null;
}, { passive: false });

canvas.addEventListener('mousedown', (e) => {
    const pos = screenToGame(e.clientX, e.clientY);
    _taps.push(pos);
    _dragStart = pos;
    _dragCurrent = pos;
    _isDragging = true;
});

canvas.addEventListener('mousemove', (e) => {
    if (_isDragging) {
        _dragCurrent = screenToGame(e.clientX, e.clientY);
    }
});

canvas.addEventListener('mouseup', () => {
    _isDragging = false;
    _dragStart = null;
    _dragCurrent = null;
});

    loadFromStorage() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return;
            const data = JSON.parse(raw);
            if (data.v !== STORAGE_VERSION) { localStorage.removeItem(STORAGE_KEY); return; }
            Object.keys(data).forEach(k => {
                if (k !== 'v' && this.hasOwnProperty(k)) this[k] = data[k];
            });
        } catch(e) { console.error('Load failed:', e); }
    }
};

gameState.loadFromStorage();

// === BUTTON HELPER ===
function hitTest(tap, x, y, w, h) {
    return tap.x >= x && tap.x <= x + w && tap.y >= y && tap.y <= y + h;
}

// === UI DRAWING HELPERS ===
function drawGlassCard(ctx, x, y, w, h, r, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha || 0.15;
    ctx.fillStyle = '#ffffff';
    drawRoundRect(ctx, x, y, w, h, r || 16);
    ctx.fill();
    ctx.globalAlpha = 0.3;
    ctx.strokeStyle = '#00ff88';
    ctx.lineWidth = 1;
    drawRoundRect(ctx, x, y, w, h, r || 16);
    ctx.stroke();
    ctx.restore();
}

function drawNeonText(ctx, text, x, y, size, color, align) {
    ctx.save();
    ctx.font = `bold ${size}px 'Segoe UI', Arial, sans-serif`;
    ctx.textAlign = align || 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = color || '#00ff88';
    ctx.shadowBlur = 15;
    ctx.fillStyle = color || '#00ff88';
    ctx.fillText(text, x, y);
    ctx.shadowBlur = 0;
    ctx.restore();
}

function drawButton(ctx, text, x, y, w, h, color, textColor) {
    ctx.save();
    const gradient = ctx.createLinearGradient(x, y, x, y + h);
    gradient.addColorStop(0, color || '#00ff88');
    gradient.addColorStop(1, shadeColor(color || '#00ff88', -30));
    ctx.fillStyle = gradient;
    drawRoundRect(ctx, x, y, w, h, 12);
    ctx.fill();
    ctx.shadowColor = color || '#00ff88';
    ctx.shadowBlur = 10;
    drawRoundRect(ctx, x, y, w, h, 12);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.font = `bold ${Math.min(22, h * 0.45)}px 'Segoe UI', Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = textColor || '#0a0a1a';
    ctx.fillText(text, x + w / 2, y + h / 2);
    ctx.restore();
}

function shadeColor(color, percent) {
    const num = parseInt(color.replace('#', ''), 16);
    const amt = Math.round(2.55 * percent);
    const R = Math.min(255, Math.max(0, (num >> 16) + amt));
    const G = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amt));
    const B = Math.min(255, Math.max(0, (num & 0x0000FF) + amt));
    return `#${(0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1)}`;
}

// === SAKURA PETAL SYSTEM ===
const _sakuraPetals = [];
const SAKURA_MAX = 30;
function initSakura() {
    _sakuraPetals.length = 0;
    for (let i = 0; i < SAKURA_MAX; i++) {
        _sakuraPetals.push({
            x: Math.random() * W, y: Math.random() * H,
            size: 2 + Math.random() * 4,
            speed: 0.3 + Math.random() * 0.6,
            drift: (Math.random() - 0.5) * 0.4,
            rot: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.03,
            alpha: 0.15 + Math.random() * 0.25,
        });
    }
}
initSakura();
function updateSakura(dt) {
    for (const p of _sakuraPetals) {
        p.y += p.speed;
        p.x += p.drift + Math.sin(p.y * 0.01) * 0.3;
        p.rot += p.rotSpeed;
        if (p.y > H + 10) { p.y = -10; p.x = Math.random() * W; }
        if (p.x > W + 10) p.x = -10;
        if (p.x < -10) p.x = W + 10;
    }
}
function drawSakuraPetals(ctx) {
    for (const p of _sakuraPetals) {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = p.alpha;
        // Petal shape — two arcs forming a leaf
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(p.size, -p.size, p.size * 2, 0, 0, p.size);
        ctx.bezierCurveTo(-p.size * 2, 0, -p.size, -p.size, 0, 0);
        ctx.fillStyle = '#ffb7c5';
        ctx.fill();
        ctx.restore();
    }
}

// === JAPANESE WAVE PATTERN ===
let _wavePhase = 0;
function drawWavePattern(ctx) {
    _wavePhase += 0.003;
    ctx.save();
    ctx.globalAlpha = 0.04;
    ctx.strokeStyle = '#c8a0e8';
    ctx.lineWidth = 0.8;
    for (let row = 0; row < H; row += 50) {
        ctx.beginPath();
        for (let col = 0; col <= W; col += 2) {
            const yOff = Math.sin((col * 0.02) + _wavePhase + row * 0.1) * 8;
            if (col === 0) ctx.moveTo(col, row + yOff);
            else ctx.lineTo(col, row + yOff);
        }
        ctx.stroke();
    }
    ctx.restore();
}

// === VIGNETTE BACKGROUND (JAPANESE) ===
function drawBackground(ctx) {
    const theme = THEME_MAP[gameState.equippedTheme] || THEME_MAP['neon'];
    // Gradient base from theme
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, theme.bg[0]);
    bg.addColorStop(0.5, theme.bg[1]);
    bg.addColorStop(1, theme.bg[2]);
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);
    // Wave overlay (optional per theme)
    if (theme.wave) drawWavePattern(ctx);
    // Grid with theme-tinted color
    ctx.strokeStyle = theme.grid;
    ctx.lineWidth = 0.5;
    for (let x = 0; x < W; x += 50) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += 50) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    // Sakura petals (optional per theme)
    if (theme.petals) drawSakuraPetals(ctx);
    // Vignette
    const vg = ctx.createRadialGradient(W/2, H/2, H*0.25, W/2, H/2, H*0.65);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, theme.vignette);
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
}

// === MENU AMBIENT VFX SYSTEM ===
// Dedicated petals, orbs, and aurora for the menu screen

// --- Menu Petals (larger, colorful, more visible than game sakura) ---
const _menuPetals = [];
const MENU_PETAL_COUNT = 25;
const MENU_PETAL_COLORS = [
    { fill: '#ffb7c5', glow: 'rgba(255,183,197,0.4)' },  // sakura pink
    { fill: '#c8a0e8', glow: 'rgba(200,160,232,0.4)' },  // lavender
    { fill: '#88ddff', glow: 'rgba(136,221,255,0.35)' },  // ice blue
    { fill: '#00ff88', glow: 'rgba(0,255,136,0.3)' },     // neon green
    { fill: '#ffcc00', glow: 'rgba(255,204,0,0.25)' },    // gold
];
function initMenuPetals() {
    _menuPetals.length = 0;
    for (let i = 0; i < MENU_PETAL_COUNT; i++) {
        const c = MENU_PETAL_COLORS[i % MENU_PETAL_COLORS.length];
        _menuPetals.push({
            x: Math.random() * W,
            y: Math.random() * H,
            size: 3 + Math.random() * 6,
            speedY: 0.2 + Math.random() * 0.5,
            speedX: (Math.random() - 0.5) * 0.3,
            drift: 0.5 + Math.random() * 1.5,       // sine wave amplitude
            driftFreq: 0.005 + Math.random() * 0.01, // sine wave frequency
            rot: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.04,
            alpha: 0.25 + Math.random() * 0.35,
            color: c.fill,
            glowColor: c.glow,
            phase: Math.random() * Math.PI * 2,      // individual phase offset
        });
    }
}
initMenuPetals();

function updateMenuPetals(dt) {
    for (const p of _menuPetals) {
        p.y += p.speedY;
        p.x += p.speedX + Math.sin(p.y * p.driftFreq + p.phase) * p.drift * dt * 2;
        p.rot += p.rotSpeed;
        // Subtle size pulse
        p._pulse = (p._pulse || 0) + dt * 2;
        if (p.y > H + 15) { p.y = -15; p.x = Math.random() * W; }
        if (p.x > W + 15) p.x = -15;
        if (p.x < -15) p.x = W + 15;
    }
}

function drawMenuPetals(ctx) {
    for (const p of _menuPetals) {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        const pulse = 1 + 0.15 * Math.sin(p._pulse || 0);
        const sz = p.size * pulse;
        ctx.globalAlpha = p.alpha;
        // Soft glow behind petal
        ctx.shadowColor = p.glowColor;
        ctx.shadowBlur = sz * 2;
        // Petal shape — two bezier arcs forming a leaf
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(sz, -sz * 1.1, sz * 2.2, 0, 0, sz * 1.1);
        ctx.bezierCurveTo(-sz * 2.2, 0, -sz, -sz * 1.1, 0, 0);
        ctx.fillStyle = p.color;
        ctx.fill();
        // Inner highlight
        ctx.globalAlpha = p.alpha * 0.4;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(sz * 0.5, -sz * 0.5, sz * 1.1, 0, 0, sz * 0.5);
        ctx.bezierCurveTo(-sz * 1.1, 0, -sz * 0.5, -sz * 0.5, 0, 0);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();
    }
}

// --- Floating Energy Orbs (glowing spheres with trails) ---
const _menuOrbs = [];
const MENU_ORB_COUNT = 8;
const MENU_ORB_COLORS = ['#00ff88', '#00ccff', '#cc44ff', '#ffcc00', '#ff3355', '#e8a0bf', '#88ddff', '#ff8800'];
function initMenuOrbs() {
    _menuOrbs.length = 0;
    for (let i = 0; i < MENU_ORB_COUNT; i++) {
        _menuOrbs.push({
            x: Math.random() * W,
            y: Math.random() * H,
            radius: 2 + Math.random() * 3,
            color: MENU_ORB_COLORS[i % MENU_ORB_COLORS.length],
            vx: (Math.random() - 0.5) * 0.6,
            vy: (Math.random() - 0.5) * 0.4,
            phase: Math.random() * Math.PI * 2,
            orbitRadius: 30 + Math.random() * 60,
            orbitSpeed: 0.3 + Math.random() * 0.5,
            trail: [],  // position history for trail
            alpha: 0.5 + Math.random() * 0.3,
        });
    }
}
initMenuOrbs();

function updateMenuOrbs(dt, t) {
    for (const o of _menuOrbs) {
        // Smooth orbital wandering
        o.x += o.vx + Math.sin(t * o.orbitSpeed + o.phase) * 0.5;
        o.y += o.vy + Math.cos(t * o.orbitSpeed * 0.7 + o.phase) * 0.3;
        // Bounce off edges gently
        if (o.x < -20) o.x = W + 20;
        if (o.x > W + 20) o.x = -20;
        if (o.y < -20) o.y = H + 20;
        if (o.y > H + 20) o.y = -20;
        // Trail — store last 12 positions
        o.trail.push({ x: o.x, y: o.y });
        if (o.trail.length > 12) o.trail.shift();
    }
}

function drawMenuOrbs(ctx) {
    for (const o of _menuOrbs) {
        ctx.save();
        // Draw trail
        if (o.trail.length > 2) {
            for (let i = 1; i < o.trail.length; i++) {
                const t = o.trail[i];
                const frac = i / o.trail.length;
                ctx.globalAlpha = frac * o.alpha * 0.3;
                ctx.beginPath();
                ctx.arc(t.x, t.y, o.radius * frac * 0.6, 0, Math.PI * 2);
                ctx.fillStyle = o.color;
                ctx.fill();
            }
        }
        // Main orb with glow
        ctx.globalAlpha = o.alpha;
        ctx.shadowColor = o.color;
        ctx.shadowBlur = o.radius * 6;
        ctx.beginPath();
        ctx.arc(o.x, o.y, o.radius, 0, Math.PI * 2);
        const orbGrad = ctx.createRadialGradient(o.x - 1, o.y - 1, 0, o.x, o.y, o.radius);
        orbGrad.addColorStop(0, '#ffffff');
        orbGrad.addColorStop(0.3, o.color);
        orbGrad.addColorStop(1, o.color + '00');
        ctx.fillStyle = orbGrad;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();
    }
}

// --- Aurora / Light Rays behind title ---
const _auroraWaves = [];
const AURORA_WAVE_COUNT = 4;
const AURORA_COLORS = [
    { from: 'rgba(0,255,136,0.06)', to: 'rgba(0,255,136,0)' },
    { from: 'rgba(0,204,255,0.05)', to: 'rgba(0,204,255,0)' },
    { from: 'rgba(204,68,255,0.04)', to: 'rgba(204,68,255,0)' },
    { from: 'rgba(232,160,191,0.04)', to: 'rgba(232,160,191,0)' },
];
for (let i = 0; i < AURORA_WAVE_COUNT; i++) {
    _auroraWaves.push({
        yBase: 30 + i * 35,
        amplitude: 15 + i * 8,
        freq: 0.008 + i * 0.003,
        speed: 0.4 + i * 0.15,
        height: 60 + i * 20,
        color: AURORA_COLORS[i],
        phase: i * 1.2,
    });
}

function drawAurora(ctx, t) {
    ctx.save();
    for (const wave of _auroraWaves) {
        ctx.beginPath();
        ctx.moveTo(0, wave.yBase);
        // Build wave path across screen width
        for (let x = 0; x <= W; x += 4) {
            const y = wave.yBase + Math.sin(x * wave.freq + t * wave.speed + wave.phase) * wave.amplitude
                     + Math.sin(x * wave.freq * 2.3 + t * wave.speed * 0.7) * wave.amplitude * 0.3;
            ctx.lineTo(x, y);
        }
        // Close to bottom of wave band
        for (let x = W; x >= 0; x -= 4) {
            const y = wave.yBase + wave.height + Math.sin(x * wave.freq * 0.8 + t * wave.speed * 0.5 + wave.phase + 1) * wave.amplitude * 0.5;
            ctx.lineTo(x, y);
        }
        ctx.closePath();
        // Gradient fill
        const grad = ctx.createLinearGradient(0, wave.yBase, 0, wave.yBase + wave.height);
        grad.addColorStop(0, wave.color.from);
        grad.addColorStop(0.5, wave.color.from);
        grad.addColorStop(1, wave.color.to);
        ctx.fillStyle = grad;
        ctx.fill();
    }
    ctx.restore();
}

// --- Ambient Sparkles (tiny twinkling stars) ---
const _menuSparkles = [];
const MENU_SPARKLE_COUNT = 40;
function initMenuSparkles() {
    _menuSparkles.length = 0;
    for (let i = 0; i < MENU_SPARKLE_COUNT; i++) {
        _menuSparkles.push({
            x: Math.random() * W,
            y: Math.random() * H,
            size: 0.5 + Math.random() * 1.5,
            twinkleSpeed: 1 + Math.random() * 3,
            twinklePhase: Math.random() * Math.PI * 2,
            color: ['#ffffff', '#00ff88', '#00ccff', '#c8a0e8', '#ffcc00'][Math.floor(Math.random() * 5)],
        });
    }
}
initMenuSparkles();

function drawMenuSparkles(ctx, t) {
    for (const s of _menuSparkles) {
        const alpha = 0.1 + 0.4 * Math.max(0, Math.sin(t * s.twinkleSpeed + s.twinklePhase));
        if (alpha < 0.12) continue; // skip invisible sparkles
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = s.color;
        // 4-point star shape
        const sz = s.size;
        ctx.beginPath();
        ctx.moveTo(s.x, s.y - sz * 2);
        ctx.lineTo(s.x + sz * 0.3, s.y - sz * 0.3);
        ctx.lineTo(s.x + sz * 2, s.y);
        ctx.lineTo(s.x + sz * 0.3, s.y + sz * 0.3);
        ctx.lineTo(s.x, s.y + sz * 2);
        ctx.lineTo(s.x - sz * 0.3, s.y + sz * 0.3);
        ctx.lineTo(s.x - sz * 2, s.y);
        ctx.lineTo(s.x - sz * 0.3, s.y - sz * 0.3);
        ctx.closePath();
        ctx.shadowColor = s.color;
        ctx.shadowBlur = sz * 3;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();
    }
}

function updateMenu(dt) {
    // Check daily reward availability
    if (checkDailyReward && checkDailyReward()) {

    }
    // Tutorial on first launch — progressive onboarding
    if (!gameState.tutorialSeen) {
        const tap = consumeTap();
        if (tap) {
            tutorialStep++;

                gameState.tutorialSeen = true;
                if (gameState.onboardingStep === 0) gameState.onboardingStep = 1; // start progressive onboarding
                gameState.saveToStorage();
            }
        }
        return;
    }
    const tap = consumeTap();
    if (!tap) return;
    // Settings gear (top-right, drawn at W-28, 28 r16)
    if (hitTest(tap, W - 46, 10, 36, 36)) {
        gameState.screen = 'settings';
        return;

    // Daily reward button (bottom bar)
    if (hitTest(tap, _mx, 540, 50, 42)) {

        const b = MENU_BUTTONS[i];
        if (hitTest(tap, b.x, b.y, b.w, b.h)) {
            if (b.id === 'easy' || b.id === 'medium' || b.id === 'hard' || b.id === 'legend') {
                if (gameState.onboardingStep < 4 && gameState.onboardingStep > 0) {
                    startOnboardingMatch(b.id);

            } else if (b.id === 'campaign') {

            } else if (b.id === 'shop') {

                gameState.screen = 'stats';

// Narrator state
let narratorText = '';
let narratorTimer = 0;
let narratorFadeIn = 0;
let narratorPriority = 0; // higher priority overrides current
let _narratorCooldown = 0;
let _firstBloodDone = false;
let _halfwayDone = false;
let _finalThreeDone = false;
let _gameStartNarrated = false;
let _lastNarratorEvent = '';

function triggerNarrator(event, data, priority) {
    priority = priority || 1;
    // Cooldown prevents spam (0.8s between low-priority, 0s for high-priority)
    if (_narratorCooldown > 0 && priority <= narratorPriority) return;
    if (priority < narratorPriority && narratorTimer > 0.5) return;

    const pool = AI_NARRATOR[event];
    if (!pool || pool.length === 0) return;
    let text = pool[Math.floor(Math.random() * pool.length)];

    // Template replacement
    if (data) {
        for (const [k, v] of Object.entries(data)) {
            text = text.replace(`{${k}}`, v);
        }
    }

    narratorText = text;
    narratorTimer = 3.5;
    narratorFadeIn = 0;
    narratorPriority = priority;
    _narratorCooldown = priority >= 3 ? 0.3 : 1.2;
    _lastNarratorEvent = event;
}

function updateNarrator(dt) {
    if (narratorTimer > 0) {
        narratorTimer -= dt;
        narratorFadeIn = Math.min(1, narratorFadeIn + dt * 4);
    }
    if (_narratorCooldown > 0) _narratorCooldown -= dt;

    // Auto-triggers based on game state
    if (!_gameStartNarrated && gameTimer > 0.5 && gameTimer < 2) {
        _gameStartNarrated = true;
        triggerNarrator('game_start', { count: aliveCount }, 2);
    }
    // Halfway point
    if (!_halfwayDone && aliveCount <= Math.ceil((totalBots + 1) / 2) && aliveCount > 3) {
        _halfwayDone = true;
        triggerNarrator('halfway', { count: aliveCount }, 2);
    }
    // Final three
    if (!_finalThreeDone && aliveCount === 3) {
        _finalThreeDone = true;
        triggerNarrator('final_three', {}, 3);
    }
}

function drawNarrator(ctx) {
    if (narratorTimer <= 0 || !narratorText) return;
    const alpha = Math.min(narratorFadeIn, Math.min(1, narratorTimer));
    if (alpha <= 0) return;

    ctx.save();
    ctx.globalAlpha = alpha;

    // Narrator bar at top-center below HUD (~y=60)
    const barY = 68;
    const barH = 28;
    const barW = Math.min(W - 20, 360);
    const barX = (W - barW) / 2;

    // Dark glass background
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    drawRoundRect(ctx, barX, barY, barW, barH, 8);
    ctx.fill();

    // Subtle accent border
    const borderGrad = ctx.createLinearGradient(barX, barY, barX + barW, barY);
    borderGrad.addColorStop(0, 'rgba(200,160,232,0.3)');
    borderGrad.addColorStop(0.5, 'rgba(232,160,191,0.5)');
    borderGrad.addColorStop(1, 'rgba(200,160,232,0.3)');
    ctx.strokeStyle = borderGrad;
    ctx.lineWidth = 1;
    drawRoundRect(ctx, barX, barY, barW, barH, 8);
    ctx.stroke();

    // AI icon
    ctx.font = '12px Arial';
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(200,160,232,0.8)';
    ctx.fillText('🤖', barX + 8, barY + barH / 2 + 4);

    // Narrator text — typewriter slide-in effect
    const displayLen = Math.floor(narratorText.length * Math.min(1, narratorFadeIn * 2));
    const displayText = narratorText.substring(0, displayLen);
    ctx.font = 'bold 11px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#e8d0f0';
    ctx.shadowColor = '#c8a0e8';
    ctx.shadowBlur = 4;
    ctx.fillText(displayText, W / 2, barY + barH / 2 + 4);
    ctx.shadowBlur = 0;

    ctx.restore();
}

        ctx.textAlign = 'center';

const _toasts = [];
function showToast(text, color, duration) {

function updateToasts(dt) {

        _toasts[i].timer -= dt;
        if (_toasts[i].timer < 0.5) _toasts[i].alpha = _toasts[i].timer / 0.5;
        if (_toasts[i].timer <= 0) _toasts.splice(i, 1);
    }
}
function drawToasts(ctx) {
    for (let i = 0; i < _toasts.length; i++) {
        const t = _toasts[i];
        ctx.save();

        ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center';
        ctx.fillStyle = t.color;
        ctx.shadowColor = t.color; ctx.shadowBlur = 10;
        ctx.fillText(t.text, W / 2, 130 + i * 30);

    }
}
