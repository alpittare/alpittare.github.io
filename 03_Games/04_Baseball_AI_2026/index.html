class Batter {
    constructor() {
        this.x = W / 2 + 18;
        this.y = 698;
        this.swingAngle = 0;
        this.swingActive = false;
        this.swingTimer = 0;
        this.swingDuration = 0.22;
        this.idleAnim = 0;
    }

    triggerSwing() {
        this.swingActive = true;
        this.swingTimer = 0;
        this.swingAngle = -Math.PI * 0.4;
    }

    resetSwing() {
        this.swingActive = false;
        this.swingTimer = 0;
        this.swingAngle = -Math.PI * 0.4;
    }

    update(dt) {
        this.idleAnim += dt * 1.5;
        if (this.swingActive) {
            this.swingTimer += dt;
            const p = Math.min(1, this.swingTimer / this.swingDuration);
            this.swingAngle = -Math.PI * 0.4 + p * Math.PI * 1.3;
            if (this.swingTimer >= this.swingDuration) this.swingActive = false;
        }
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);

        const bobY = Math.sin(this.idleAnim) * 1.5;

        // Ground shadow
        ctx.fillStyle = 'rgba(0,0,0,0.22)';
        ctx.beginPath();
        ctx.ellipse(0, 26, 18, 5, 0, 0, Math.PI * 2);
        ctx.fill();

        // ── LEGS / PANTS ──────────────────────────────────────────────────
        ctx.lineCap = 'round';
        // Pants
        ctx.strokeStyle = '#dde0e8';
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(-4, 6 + bobY);
        ctx.lineTo(-6, 22);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(4, 6 + bobY);
        ctx.lineTo(6, 22);
        ctx.stroke();
        // Cleats
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 6;
        ctx.lineCap = 'square';
        ctx.beginPath();
        ctx.moveTo(-6, 21); ctx.lineTo(-11, 25); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(6, 21); ctx.lineTo(11, 25); ctx.stroke();
        ctx.lineCap = 'round';

        // ── JERSEY (team blue) ────────────────────────────────────────────
        const jerseyGrad = ctx.createLinearGradient(-7, -10 + bobY, 7, 8 + bobY);
        jerseyGrad.addColorStop(0, '#4A90E2');
        jerseyGrad.addColorStop(1, '#2860B0');
        ctx.fillStyle = jerseyGrad;
        ctx.beginPath();
        ctx.roundRect(-7, -10 + bobY, 14, 18, 3);
        ctx.fill();
        // Pinstripes
        ctx.strokeStyle = 'rgba(255,255,255,0.30)';
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(-2, -10 + bobY); ctx.lineTo(-2, 8 + bobY); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(2, -10 + bobY); ctx.lineTo(2, 8 + bobY); ctx.stroke();

        // ── BAT ARM (swings) ──────────────────────────────────────────────
        const _batSurgeActive = _surgeActivated;
        const _batT = Date.now();

        // Surge aura around entire batter when activated
        if (_batSurgeActive) {
            ctx.save();
            const auraPulse = 0.5 + 0.5 * Math.sin(_batT / 180);
            const surgeCol = _surgeActivatedTier ? (
                _surgeActivatedTier.threshold >= 1.0 ? '#aa00ff' :
                _surgeActivatedTier.threshold >= 0.8 ? '#ff5722' :
                _surgeActivatedTier.threshold >= 0.5 ? '#ffeb3b' : '#00e5ff'
            ) : '#FFD700';
            ctx.shadowColor = surgeCol;
            ctx.shadowBlur = 18 + auraPulse * 14;
            ctx.globalAlpha = 0.25 + auraPulse * 0.15;
            ctx.fillStyle = surgeCol;
            ctx.beginPath();
            ctx.ellipse(0, -10 + bobY, 22, 38, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
            ctx.restore();
        }

        ctx.save();
        ctx.rotate(this.swingAngle);

        // Bat glow trail when surge active
        if (_batSurgeActive) {
            const surgeCol = _surgeActivatedTier ? (
                _surgeActivatedTier.threshold >= 1.0 ? '#aa00ff' :
                _surgeActivatedTier.threshold >= 0.8 ? '#ff5722' :
                _surgeActivatedTier.threshold >= 0.5 ? '#ffeb3b' : '#00e5ff'
            ) : '#FFD700';
            ctx.save();
            ctx.shadowColor = surgeCol;
            ctx.shadowBlur = 22 + 10 * Math.sin(_batT / 150);
            ctx.strokeStyle = surgeCol;
            ctx.globalAlpha = 0.6 + 0.3 * Math.sin(_batT / 200);
            ctx.lineWidth = 14;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(4, -26 + bobY);
            ctx.lineTo(26, -44 + bobY);
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
            ctx.restore();
            // Sparkle particles along bat
            for (let si = 0; si < 3; si++) {
                const sp = ((_batT / 80 + si * 40) % 100) / 100;
                const sx = 4 + sp * 22;
                const sy = -26 + bobY + sp * (-18);
                ctx.fillStyle = surgeCol;
                ctx.globalAlpha = 0.7 * (1 - sp);
                ctx.beginPath();
                ctx.arc(sx + (Math.sin(_batT / 100 + si) * 3), sy + (Math.cos(_batT / 120 + si) * 3), 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        // Upper arm (jersey)
        ctx.strokeStyle = '#4A90E2';
        ctx.lineWidth = 7;
        ctx.beginPath();
        ctx.moveTo(0, -4 + bobY);
        ctx.lineTo(2, -18 + bobY);
        ctx.stroke();
        // Forearm (sleeve)
        ctx.strokeStyle = '#dde0e8';
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(2, -18 + bobY);
        ctx.lineTo(4, -26 + bobY);
        ctx.stroke();
        // Bat grip (brown) — surge tints the bat color
        if (_batSurgeActive) {
            const surgeCol = _surgeActivatedTier ? (
                _surgeActivatedTier.threshold >= 1.0 ? '#cc44ff' :
                _surgeActivatedTier.threshold >= 0.8 ? '#ff7744' :
                _surgeActivatedTier.threshold >= 0.5 ? '#ffee55' : '#44eeff'
            ) : '#FFD700';
            ctx.strokeStyle = surgeCol;
            ctx.shadowColor = surgeCol;
            ctx.shadowBlur = 12;
        } else {
            ctx.strokeStyle = '#9B5523';
            ctx.shadowBlur = 0;
        }
        ctx.lineWidth = 9;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(4, -26 + bobY);
        ctx.lineTo(26, -44 + bobY);
        ctx.stroke();
        ctx.shadowBlur = 0;
        // Bat barrel (lighter / surge colored)
        ctx.strokeStyle = _batSurgeActive ? '#ffffff' : '#d4a47a';
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(14, -34 + bobY);
        ctx.lineTo(26, -44 + bobY);
        ctx.stroke();
        // Pine tar grip tape
        if (!_batSurgeActive) {
            ctx.strokeStyle = '#3a1a08';
            ctx.lineWidth = 10;
            ctx.lineCap = 'butt';
            ctx.setLineDash([3, 2]);
            ctx.beginPath();
            ctx.moveTo(4, -26 + bobY);
            ctx.lineTo(10, -31 + bobY);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        ctx.lineCap = 'round';
        ctx.restore();

        // ── BACK ARM ──────────────────────────────────────────────────────
        ctx.strokeStyle = '#4A90E2';
        ctx.lineWidth = 7;
        ctx.beginPath();
        ctx.moveTo(0, -4 + bobY);
        ctx.lineTo(-10, -14 + bobY);
        ctx.stroke();

        // ── HEAD ──────────────────────────────────────────────────────────
        // Neck
        ctx.fillStyle = '#f5c28a';
        ctx.beginPath();
        ctx.roundRect(-3, -16 + bobY, 6, 7, 2);
        ctx.fill();
        // Face
        ctx.fillStyle = '#f5c28a';
        ctx.beginPath();
        ctx.arc(0, -22 + bobY, 9, 0, Math.PI * 2);
        ctx.fill();
        // Eye (batter looks left toward pitcher)
        ctx.fillStyle = '#222';
        ctx.beginPath();
        ctx.arc(-4, -22 + bobY, 2, 0, Math.PI * 2);
        ctx.fill();
        // ── BATTING HELMET ────────────────────────────────────────────────
        // Dome
        ctx.fillStyle = '#C0392B';
        ctx.beginPath();
        ctx.arc(0, -22 + bobY, 9.5, Math.PI, 0, false);
        ctx.closePath();
        ctx.fill();
        // Ear flap
        ctx.fillStyle = '#A0291B';
        ctx.beginPath();
        ctx.arc(-8, -22 + bobY, 6, Math.PI * 0.5, Math.PI * 1.5);
        ctx.closePath();
        ctx.fill();
        // Bill
        ctx.fillStyle = '#A0291B';
        ctx.beginPath();
        ctx.moveTo(-9.5, -19 + bobY);
        ctx.quadraticCurveTo(-4, -12 + bobY, 10, -18 + bobY);
        ctx.quadraticCurveTo(6, -16 + bobY, -9, -17 + bobY);
        ctx.closePath();
        ctx.fill();

        ctx.restore();
    }

    isSwinging() {
        return this.swingActive;
    }
}

// ============================================================================
// SECTION 5: Ball class
// ============================================================================

class Ball {
    constructor() {
        this.x = W / 2;
        this.y = 345;
        this.spin = 0;
        this.visible = false;
    }

    reset() {
        this.x = W / 2;
        this.y = 345;
        this.spin = 0;
        this.visible = false;
    }

    draw(ctx, skin, speed) {
        if (!skin) skin = SKINS[0];
        const r = 12;
        const bx = this.x, by = this.y;

        // ── MOTION BLUR TRAIL ─────────────────────────────────────────────
        // Smooth ghost trail using position history (if available)
        const trailColor  = skin.trailColor  || skin.ballColor;
        const histLen = currentGame && currentGame.ballPositionHistory
                      ? currentGame.ballPositionHistory.length : 0;
        if (histLen > 1) {
            const hist = currentGame.ballPositionHistory;
            const maxShow = Math.min(histLen, 14);
            for (let i = histLen - maxShow; i < histLen - 1; i++) {
                const tp   = hist[i];
                const prog = (i - (histLen - maxShow)) / maxShow;  // 0 = oldest, 1 = newest
                const tr   = r * (0.3 + prog * 0.65);
                ctx.save();
                ctx.globalAlpha = prog * prog * 0.5;
                // Gradient color: matches surge tier if active
                const surgeActive = gameState.surgeProgress >= 0.20;
                if (surgeActive) {
                    const surgeLev = gameState.surgeProgress >= 1.0 ? SURGE_BADGE_LEVELS[3]
                                   : gameState.surgeProgress >= 0.80 ? SURGE_BADGE_LEVELS[2]
                                   : gameState.surgeProgress >= 0.50 ? SURGE_BADGE_LEVELS[1]
                                   : SURGE_BADGE_LEVELS[0];
                    ctx.fillStyle = surgeLev.color;
                    ctx.shadowColor = surgeLev.color;
                    ctx.shadowBlur  = 8;
                } else {
                    ctx.fillStyle = trailColor;
                }
                ctx.beginPath();
                ctx.arc(tp.x, tp.y, tr, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.restore();
            }
        } else if (speed > 300) {
            // Fallback basic blur for no history
            const blurSteps   = speed > 500 ? 6 : 3;
            const blurSpacing = speed > 500 ? 10 : 7;
            for (let i = blurSteps; i >= 1; i--) {
                ctx.globalAlpha = (0.1 / blurSteps) * (blurSteps - i + 1);
                ctx.fillStyle   = trailColor;
                ctx.beginPath();
                ctx.arc(bx - i * blurSpacing, by, r - 1, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }
        ctx.globalAlpha = 1;

        // ── SURGE AURA (when surge is active) ────────────────────────────
        const surgeP = gameState.surgeProgress;
        if (surgeP > 0.20) {
            const surgeLev = surgeP >= 1.0 ? SURGE_BADGE_LEVELS[3]
                           : surgeP >= 0.80 ? SURGE_BADGE_LEVELS[2]
                           : surgeP >= 0.50 ? SURGE_BADGE_LEVELS[1]
                           : SURGE_BADGE_LEVELS[0];
            const auraR = 18 + surgeP * 22;
            const auraPulse = 0.55 + 0.45 * Math.sin(Date.now() / 180);
            ctx.save();
            const aGrad = ctx.createRadialGradient(bx, by, r - 2, bx, by, auraR);
            aGrad.addColorStop(0, surgeLev.color + 'aa');
            aGrad.addColorStop(0.5, surgeLev.color + '44');
            aGrad.addColorStop(1, surgeLev.color + '00');
            ctx.globalAlpha = auraPulse * Math.min(1, surgeP * 1.5);
            ctx.fillStyle = aGrad;
            ctx.beginPath();
            ctx.arc(bx, by, auraR, 0, Math.PI * 2);
            ctx.fill();
            // Outer ring at max surge
            if (surgeP >= 1.0) {
                ctx.globalAlpha = 0.5 + 0.5 * auraPulse;
                ctx.strokeStyle = surgeLev.color;
                ctx.lineWidth = 2.5;
                ctx.shadowColor = surgeLev.color;
                ctx.shadowBlur = 14;
                ctx.beginPath();
                ctx.arc(bx, by, r + 6 + auraPulse * 4, 0, Math.PI * 2);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
            ctx.restore();
        }

        // ── GLOW (special skins) ──────────────────────────────────────────
        if (skin.id !== 'default') {
            ctx.save();
            const glowR = ctx.createRadialGradient(bx, by, 0, bx, by, r + 14);
            glowR.addColorStop(0, skin.ballColor + '60');
            glowR.addColorStop(1, skin.ballColor + '00');
            ctx.fillStyle = glowR;
            ctx.beginPath();
            ctx.arc(bx, by, r + 14, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        // ── BALL BODY ─────────────────────────────────────────────────────
        // Shadow on ball
        const ballGrad = ctx.createRadialGradient(bx - 3, by - 3, 1, bx, by, r);
        ballGrad.addColorStop(0, skin.ballColor);
        ballGrad.addColorStop(0.7, skin.ballColor);
        ballGrad.addColorStop(1, skin.ballColor + 'bb');
        ctx.fillStyle = ballGrad;
        ctx.beginPath();
        ctx.arc(bx, by, r, 0, Math.PI * 2);
        ctx.fill();

        // Drop shadow
        ctx.save();
        ctx.globalAlpha = 0.25;
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.ellipse(bx + 1, by + 2, r - 1, r - 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // ── SEAMS (4 curved lines, realistic baseball) ────────────────────
        ctx.save();
        ctx.translate(bx, by);
        ctx.rotate(this.spin);
        const seamColor = skin.seamColor;
        ctx.strokeStyle = seamColor;
        ctx.lineWidth = 1.5;
        ctx.lineCap = 'round';
        // Right seam (C shape)
        ctx.beginPath();
        ctx.arc(3, 0, r - 3, -0.9, 0.9);
        ctx.stroke();
        // Left seam (reverse C)
        ctx.beginPath();
        ctx.arc(-3, 0, r - 3, Math.PI - 0.9, Math.PI + 0.9);
        ctx.stroke();
        // Top seam arc
        ctx.beginPath();
        ctx.arc(0, -3, r - 3, -Math.PI + 0.6, -0.6);
        ctx.stroke();
        // Bottom seam arc
        ctx.beginPath();
        ctx.arc(0, 3, r - 3, 0.6, Math.PI - 0.6);
        ctx.stroke();
        ctx.restore();

        // ── SPECULAR HIGHLIGHT ────────────────────────────────────────────
        ctx.fillStyle = 'rgba(255,255,255,0.65)';
        ctx.beginPath();
        ctx.ellipse(bx - 4, by - 4, 3.5, 4.5, -Math.PI / 4, 0, Math.PI * 2);
        ctx.fill();
    }
}

// ============================================================================
// SECTION 6: GameSession class
// ============================================================================

class GameSession {
    constructor(difficulty, levelConfig) {
        this.difficulty = difficulty;
        this.levelConfig = levelConfig;
        // Use level config if provided, otherwise use standard difficulty config
        this.config = levelConfig || BASEBALL_CONFIG[difficulty];
        this.atBat = 0;
        this.maxAtBats = this.config.atBats || 5;
        this.homeRuns = 0;
        this.coinsEarned = 0;
        this.xpEarned = 0;
        this.pitcher = new Pitcher();
        this.batter = new Batter();
        this.ball = new Ball();
        this.theme = THEMES.find(t => t.id === gameState.settings.equippedTheme) || THEMES[0];
        this.skin = SKINS.find(s => s.id === gameState.settings.equippedSkin) || SKINS[0];

        this.pitchState = 'windup';
        this.windupTimer = 0;
        this.pitchType = 'fastball';
        this.pitchSpeed = this.config.pitchSpeed;
        this.pitchDuration = 1.0;
        this.pitchProgress = 0;
        this.curveDir = 0;
        this.curveAmount = 0;
        this.swingDetected = false;
        this.ballArrivalTime = 0;
        this.lastResult = '';
        this.lastTiming = '';
        this.resultTimer = 0;
        this.resultDuration = 1.6;

        this.ballStartX = W / 2;
        this.ballStartY = 345;
        this.ballEndX = W / 2;
        this.ballEndY = 705;

        this.ballPositionHistory = [];

        // Per at-bat balls/strikes count (baseball rules)
        this.strikes = 0;
        this.ballCount = 0;
        this.atBatOver = false;

        // === PHASE 2: Batting stance toggle ===
        this.battingStance = 'contact'; // 'contact' or 'power'

        // === PHASE 3: Pitch location zones ===
        this.pitchZone = 'center';
        this.zoneFlashTimer = 0;

        // === PHASE 4: Statcast metrics ===
        this.statcastLog = []; // array of { exitVelo, launchAngle, result, timing, pitchType, zone }

        // Combo multiplier system
        this.combo = 0;
        this.comboMultiplier = 1;
        this.totalHits = 0;
        this.totalWalks = 0;
        this.totalStrikeouts = 0;
        this.bestCombo = 0;

        // Power-up system
        this.activePowerUp = null;   // current power-up { id, name, icon, desc, color }
        this.powerUpPitches = 0;     // pitches remaining for current power-up
        this.powerUpFlashTimer = 0;  // visual flash timer

        // Pitch type indicator
        this.pitchTypeFlash = '';
        this.pitchTypeTimer = 0;

        // Internal power-up bonus tracking
        this._puPerfectBonus = 0;
        this._puGoodBonus = 0;
    }

    resetAtBat() {
        this.strikes = 0;
        this.ballCount = 0;
        this.atBatOver = false;
        pitchCountDisplay.reset();
    }

    _updateCombo(isHit) {
        if (isHit) {
            this.combo++;
            if (this.combo >= 2) {
                this.comboMultiplier = Math.min(1 + (this.combo - 1) * 0.5, 5);
                showToast(this.combo + 'x COMBO! 🔥', '#FF6B35', 1.5);
                commentary.trigger('combo');
            } else {
                this.comboMultiplier = 1;
            }
            this.bestCombo = Math.max(this.bestCombo, this.combo);
        } else {
            this.combo = 0;
            this.comboMultiplier = 1;
        }
    }

    _trySpawnPowerUp() {
        if (this.activePowerUp) return; // already have one
        if (Math.random() > 0.22) return; // ~22% chance on hit
        const pu = POWER_UP_TYPES[Math.floor(Math.random() * POWER_UP_TYPES.length)];
        this.activePowerUp = { ...pu };
        this.powerUpPitches = 2; // lasts 2 pitches
        this.powerUpFlashTimer = 2.0;
        showToast(pu.icon + ' ' + pu.name + ': ' + pu.desc, pu.color, 2.5);
        audio.play('levelup');
    }

    _applyPowerUpModifiers() {
        // Apply power-up effects to current pitch parameters
        if (!this.activePowerUp) return;
        if (this.activePowerUp.id === 'slowmo') {
            this.pitchSpeed *= 0.55;
            this.pitchDuration *= 1.8;
        } else if (this.activePowerUp.id === 'bigbat') {
            // Widen timing windows by 50%
            this._puPerfectBonus = (this.config.perfectWindow || 80) * 0.5;
            this._puGoodBonus = (this.config.goodWindow || 150) * 0.5;
        }
    }

    _tickPowerUp() {
        if (!this.activePowerUp) return;
        this.powerUpPitches--;
        this._puPerfectBonus = 0;
        this._puGoodBonus = 0;
        if (this.powerUpPitches <= 0) {
            this.activePowerUp = null;
            this.powerUpPitches = 0;
        }
    }

    startWindup() {
        this.pitcher.startWindup();
        this.ball.reset();
        this.swingDetected = false;
        this.batter.resetSwing();
        this.windupTimer = 0;
        this.pitchState = 'windup';
        this.ballPositionHistory = [];
    }

    decidePitch() {
        const bias = gameState.getTimingBias();
        const rand = Math.random();
        const consecutivePitchTypes = inlineAI.pitchHistory.slice(-2);

        let type = 'fastball';
        if (bias === 'early') {
            if (rand < 0.35) type = 'curveball';
            else if (rand < 0.55) type = 'changeup';
            else type = 'fastball';
        } else if (bias === 'late') {
            if (rand < this.config.curveChance * 0.5) type = 'curveball';
            else type = 'fastball';
        } else {
            if (rand < this.config.curveChance) type = 'curveball';
            else if (rand < this.config.curveChance + this.config.changeChance) type = 'changeup';
            else if (rand < this.config.curveChance + this.config.changeChance + (this.config.sliderChance || 0))
                type = 'slider';
            else type = 'fastball';
        }

        if (consecutivePitchTypes.length === 2 && consecutivePitchTypes[0] === type && consecutivePitchTypes[1] === type) {
            type = 'fastball';
        }

        return type;
    }

    _selectZone() {
        const diff = this.difficulty;
        // Easy: mostly center. Harder = more variety
        const weights = {
            easy:   { center: 0.60, inside: 0.10, outside: 0.10, high: 0.10, low: 0.10 },
            medium: { center: 0.35, inside: 0.18, outside: 0.18, high: 0.15, low: 0.14 },
            hard:   { center: 0.20, inside: 0.22, outside: 0.22, high: 0.18, low: 0.18 },
            legend: { center: 0.10, inside: 0.25, outside: 0.25, high: 0.20, low: 0.20 },
        };
        const w = weights[diff] || weights.easy;
        const r = Math.random();
        let cum = 0;
        for (const z of ZONE_NAMES) {
            cum += w[z];
            if (r < cum) return z;
        }
        return 'center';
    }

    startPitch() {
        this.pitchType = this.decidePitch();
        this.pitchSpeed = inlineAI.getAdaptiveSpeed(this.config.pitchSpeed, this.config);
        this.pitchDuration = (450 / this.pitchSpeed) * 1.2;
        this.ballArrivalTime = Date.now() + this.pitchDuration * 1000;

        // === PHASE 3: Select pitch zone ===
        this.pitchZone = this._selectZone();
        const zoneData = PITCH_ZONES[this.pitchZone] || PITCH_ZONES.center;
        this.zoneFlashTimer = 0.8; // show zone indicator for 0.8 seconds

        // Apply zone offset to ball target
        this.ballEndX = W / 2 + zoneData.xOff;
        this.ballEndY = 705 + zoneData.yOff;

        if (this.pitchType === 'curveball') {
            this.curveDir = Math.random() > 0.5 ? 1 : -1;
            this.curveAmount = 35;
        } else if (this.pitchType === 'slider') {
            this.curveDir = Math.random() > 0.5 ? 1 : -1;
            this.curveAmount = 22;
        } else if (this.pitchType === 'changeup') {
            this.curveAmount = 0;
        } else {
            this.curveAmount = 0;
        }

        this.pitchState = 'pitching';
        this.pitchProgress = 0;
        this.swingDetected = false;

        // Apply active power-up modifiers for this pitch
        this._applyPowerUpModifiers();

        // Flash pitch type indicator
        const typeNames = { fastball: '🔥 FAST', curveball: '🌀 CURVE', slider: '↗ SLIDER', changeup: '🐢 CHANGE' };
        this.pitchTypeFlash = typeNames[this.pitchType] || '⚾ PITCH';
        this.pitchTypeTimer = 0.8;

        audio.play('pitch');
    }

    processSwing() {
        const timeOffset = Date.now() - this.ballArrivalTime;

        // === PHASE 2: Stance modifies timing windows ===
        const _stanceMul = this.battingStance === 'power' ? 0.75 : this.battingStance === 'contact' ? 1.3 : 1.0;
        const perfectWindow = (this.config.perfectWindow || 150) * _stanceMul;
        const goodWindow = (this.config.goodWindow || 300) * _stanceMul;

        let timing = 'late';
        let result = 'STRIKE';

        const surgeActive = isSurgeActivated();
        // Power-up bonus to timing windows
        const puPerfBonus = this._puPerfectBonus || 0;
        const puGoodBonus = this._puGoodBonus || 0;
        // === PHASE 3: Zone timing modifier ===
        const _zoneTMod = (PITCH_ZONES[this.pitchZone] || PITCH_ZONES.center).timingMod;
        let adjustedPerfect = ((surgeActive ? perfectWindow * 1.4 : perfectWindow) + puPerfBonus) * _zoneTMod;
        let adjustedGood = ((surgeActive ? goodWindow * 1.35 : goodWindow) + puGoodBonus) * _zoneTMod;

        // Easy mode power-up: widen sweet spot by 1.5x
        if (_activeScoreBoost || _activeCoinMagnet || _activeXpBoost) {
            // Note: _activeCoinMagnet doesn't affect timing, but including it here for structure
        }
        if (_activeEasyMode) {
            adjustedPerfect *= 1.5;
            adjustedGood *= 1.5;
        }

        // Magnet power-up: convert would-be strikes into fouls
        const hasMagnet = this.activePowerUp && this.activePowerUp.id === 'magnet';

        // Coin multiplier from combo + power-up + surge activation
        let coinMult = this.comboMultiplier;
        if (this.activePowerUp && this.activePowerUp.id === '2xcoins') coinMult *= 2;
        if (_activeCoinMagnet) coinMult *= 1.5;  // Coin magnet power-up
        // Consume the activated surge — applies multiplier and drains meter
        const consumedSurge = consumeSurge();
        if (consumedSurge) coinMult *= consumedSurge.multiplier;

        if (Math.abs(timeOffset) <= adjustedPerfect) {
            timing = 'perfect';
            result = 'HOME RUN!';
            // Apply scoreBoost power-up (2x score)
            const hrIncrement = _activeScoreBoost ? 2 : 1;
            this.homeRuns += hrIncrement;
            const hrCoins = Math.round(3 * coinMult);
            gameState.addCoins(hrCoins);
            this.coinsEarned += hrCoins;
            let xp = 50;
            if (_activeXpBoost) xp *= 2;
            gameState.addXP(xp);
            this.xpEarned += xp;
        } else if (Math.abs(timeOffset) <= adjustedGood) {
            // Surge boost: good timing → HOME RUN when surge was consumed
            if (consumedSurge) {
                timing = 'good';
                result = 'HOME RUN!';
                // Apply scoreBoost power-up (2x score)
                const hrIncrement = _activeScoreBoost ? 2 : 1;
                this.homeRuns += hrIncrement;
                const hrCoins = Math.round(3 * coinMult);
                gameState.addCoins(hrCoins);
                this.coinsEarned += hrCoins;
                let xp = 50;
                if (_activeXpBoost) xp *= 2;
                gameState.addXP(xp);
                this.xpEarned += xp;
            } else {
                timing = 'good';
                result = 'BASE HIT';
                const hitCoins = Math.round(2 * coinMult);
                gameState.addCoins(hitCoins);
                this.coinsEarned += hitCoins;
                let xp = 20;
                if (_activeXpBoost) xp *= 2;
                gameState.addXP(xp);
                this.xpEarned += xp;
            }
        } else if (timeOffset < 0) {
            // Surge boost: early/foul → BASE HIT when surge was consumed
            if (consumedSurge) {
                timing = 'early';
                result = 'BASE HIT';
                const hitCoins = Math.round(2 * coinMult);
                gameState.addCoins(hitCoins);
                this.coinsEarned += hitCoins;
                let xp = 20;
                if (_activeXpBoost) xp *= 2;
                gameState.addXP(xp);
                this.xpEarned += xp;
            } else {
                timing = 'early';
                result = 'FOUL';
                gameState.addCoins(0);
                this.coinsEarned += 0;
                let xp = 5;
                if (_activeXpBoost) xp *= 2;
                gameState.addXP(xp);
                this.xpEarned += xp;
            }
        } else {
            // Late swing miss — but magnet converts to foul
            if (hasMagnet) {
                timing = 'early';
                result = 'FOUL';
                gameState.addCoins(0);
                this.coinsEarned += 0;
                let xp = 5;
                if (_activeXpBoost) xp *= 2;
                gameState.addXP(xp);
                this.xpEarned += xp;
            } else {
                timing = 'late';
                result = 'STRIKE';
                gameState.totalStrikes = (gameState.totalStrikes || 0) + 1;
            }
        }

        // Impact position — contact point in canvas coords
        const impX = this.ball.x || W / 2;
        const impY = this.ball.y || H * 0.48;

        // === PHASE 2: Stance-based result modification ===
        if (this.battingStance === 'contact' && result === 'HOME RUN!' && timing !== 'perfect') {
            // Contact hitters: downgrade HR to BASE HIT 40% of the time (unless perfect timing)
            if (Math.random() < 0.4) {
                result = 'BASE HIT';
                this.homeRuns = Math.max(0, this.homeRuns - 1); // undo HR increment from timing block
            }
        } else if (this.battingStance === 'power' && result === 'BASE HIT' && (timing === 'perfect' || timing === 'good')) {
            // Power hitters: upgrade BASE HIT to HR 35% of the time on good+ timing
            if (Math.random() < 0.35) {
                result = 'HOME RUN!';
                this.homeRuns++;
                gameState.totalHRs = (gameState.totalHRs || 0) + 1;
            }
        }

        // === PHASE 3: Zone HR modifier ===
        const _zoneHRMod = (PITCH_ZONES[this.pitchZone] || PITCH_ZONES.center).hrMod;
        if (result === 'HOME RUN!' && _zoneHRMod < 1.0 && timing !== 'perfect') {
            // Low HR mod zones reduce HR chance (unless perfect timing)
            if (Math.random() > _zoneHRMod) result = 'BASE HIT';
        } else if (result === 'BASE HIT' && _zoneHRMod > 1.0 && timing === 'good') {
            // High HR mod zones can upgrade BASE HIT to HR
            if (Math.random() < (_zoneHRMod - 1.0) * 0.5) {
                result = 'HOME RUN!';
                this.homeRuns++;
                gameState.totalHRs = (gameState.totalHRs || 0) + 1;
            }
        }

        // === PHASE 4: Generate Statcast metrics ===
        let _exitVelo = 0, _launchAngle = 0;
        if (result === 'HOME RUN!') {
            _exitVelo = 105 + Math.random() * 10; // 105-115 mph
            _launchAngle = 25 + Math.random() * 10; // 25-35°
        } else if (result === 'BASE HIT') {
            _exitVelo = 90 + Math.random() * 10; // 90-100 mph
            _launchAngle = 10 + Math.random() * 10; // 10-20°
        } else if (result === 'FOUL') {
            _exitVelo = 50 + Math.random() * 15; // 50-65 mph
            _launchAngle = -10 + Math.random() * 55; // -10 to 45°
        } else {
            _exitVelo = 0;
            _launchAngle = 0;
        }
        if (_exitVelo > 0) {
            this.statcastLog.push({
                exitVelo: Math.round(_exitVelo),
                launchAngle: Math.round(_launchAngle),
                result,
                timing,
                pitchType: this.pitchType,
                zone: this.pitchZone || 'center',
            });
            statcastPopup.trigger(_exitVelo, _launchAngle, result, timing === 'perfect');
        }

        // ── Per-at-bat logic: determine if at-bat ends ──
        if (result === 'HOME RUN!' || result === 'BASE HIT') {
            // Hit → at-bat is over
            this.atBatOver = true;
            this.atBat++;
            this.totalHits++;
            this._updateCombo(true);
            this._trySpawnPowerUp();
            this._tickPowerUp();
            // AI Bot reacts to hit
            if (result === 'HOME RUN!') {
                // === PHASE 6: Trigger slow-mo replay for home runs ===
                slowMoReplay.trigger();
                AI_BOT.show('playerHomeRun');
            } else {
                AI_BOT.show('playerHit');
                AI_BOT.recordHit();  // Track consecutive hits for streak
            }
        } else if (result === 'FOUL') {
            // Foul → adds a strike, but can't strikeout on a foul (caps at 2)
            this.strikes = Math.min(this.strikes + 1, 2);
            pitchCountDisplay.addStrike();
            this.atBatOver = false;
            this._tickPowerUp();
            // AI Bot reacts to foul
            AI_BOT.show('playerFoul');
        } else {
            // STRIKE (swinging)
            this.strikes++;
            pitchCountDisplay.addStrike();
            this._tickPowerUp();
            if (this.strikes >= 3) {
                // Strikeout
                this.atBatOver = true;
                this.atBat++;
                this.totalStrikeouts++;
                this._updateCombo(false);
                showToast('STRIKEOUT! ❌', '#FF6B6B', 1.5);
                // AI Bot taunts strikeout
                AI_BOT.show('playerOut');
            } else {
                this.atBatOver = false;
                // AI Bot taunts individual strike
                AI_BOT.show('playerStrike');
            }
        }

        if (result === 'HOME RUN!') {
            const _surgePowerMul = this.battingStance === 'power' ? 1.5 : 1.0;
            fillSurge(0.30 * _surgePowerMul);
            // Play bat crack sound immediately (satisfying contact feedback)
            audio.play('hit');
            Haptics.pulse('medium');
            const coinLabel = coinMult > 1 ? '⚾ +50XP ×' + coinMult.toFixed(1) : '⚾ +50 XP';
            impactFX.triggerHit(impX, impY, coinLabel, true);
            // Pass surge info for enhanced arc trail
            if (consumedSurge) {
                // Map POWER_SHOT tier to badge colors
                const surgeBadge = SURGE_BADGE_LEVELS.slice().reverse().find(b => consumedSurge.threshold >= b.threshold) || SURGE_BADGE_LEVELS[0];
                recordHRArc(this, true, surgeBadge.color, surgeBadge.darkColor);
            } else {
                recordHRArc(this);
            }
            // Fielders start chasing the ball
            const arcEnd = _hrArcPoints.length > 0 ? _hrArcPoints[_hrArcPoints.length - 1] : { x: W / 2, y: 220 };
            outfielders.onHit(arcEnd.x, arcEnd.y);
            // DEFER the big celebration — confetti, fireworks, shake, sound
            // will fire when arc reaches ~80% (ball clears the outfield wall)
            _hrCelebrationPending = true;
            _hrCelebrationFired = false;
        } else if (result === 'BASE HIT') {
            const _surgePowerMul = this.battingStance === 'power' ? 1.5 : 1.0;
            fillSurge(0.18 * _surgePowerMul);
            audio.play('hit');
            camera.triggerShake(8, 0.2);
            Haptics.pulse('medium');
            spawnConfetti(15);
            commentary.trigger('hit');
            crowdSystem.trigger('hit');
            const coinLabel = coinMult > 1 ? '+20XP ×' + coinMult.toFixed(1) : '+20 XP';
            impactFX.triggerHit(impX, impY, coinLabel, false);
            // Fielders chase and field the ball
            outfielders.onHit(impX + (Math.random() - 0.5) * 100, 320 + Math.random() * 40);
            setTimeout(() => outfielders.onFielded(), 800);
        } else if (result === 'FOUL') {
            const _surgePowerMul = this.battingStance === 'power' ? 1.5 : 1.0;
            fillSurge(0.08 * _surgePowerMul);
            audio.play('foul');
            Haptics.pulse('light');
            commentary.trigger('foul');
            crowdSystem.trigger('foul');
            impactFX.triggerHit(impX, impY, 'FOUL', false);
        } else {
            drainSurge(0.05);
            audio.play('strike');
            camera.triggerShake(3, 0.15);
            Haptics.pulse('medium');
            commentary.trigger('strike');
            crowdSystem.trigger('strike');
            impactFX.triggerHit(W / 2, H * 0.55, 'STRIKE', false);
        }

        this.lastResult = result;
        this.lastTiming = timing;
        pitchHistory.record(this);
        performanceGrade.calculate(this);
        nextPitchPreview.show(this);
        inlineAI.recordSwing(timing, this.pitchType, result);
        mlDataStore.addEvent('swing', {
            pitchType: this.pitchType,
            speed: Math.round(this.pitchSpeed),
            timing,
            result,
        });
        gameState.swingTimings.push(timing);
        if (gameState.swingTimings.length > 20) gameState.swingTimings.shift();

        this.pitchState = 'result';
        this.resultTimer = 0;
    }

    doSwing() {
        if (this.swingDetected || this.pitchState !== 'pitching') return;
        this.swingDetected = true;
        this.batter.triggerSwing();
        audio.play('swing');
        Haptics.pulse('swing');
        this.processSwing();
    }

    missedSwing() {
        if (this.swingDetected || this.pitchState !== 'pitching') return;
        this.swingDetected = true;

        // Ball chance — pitcher throws outside the zone (good for batter)
        const ballChance = this.config.ballChance || 0.25;
        const isBall = Math.random() < ballChance;

        if (isBall) {
            // BALL — pitch was outside, patient batting rewarded
            this.ballCount++;
            pitchCountDisplay.addBall();
            this.lastResult = 'BALL';
            this.lastTiming = 'ball';
            audio.play('foul'); // subtle sound for ball call
            commentary.trigger('close');
            Haptics.pulse('light');
            impactFX.triggerHit(W / 2, H * 0.55, 'BALL ' + this.ballCount, false);

            if (this.ballCount >= 4) {
                // Walk — take your base
                this.totalWalks++;
                this.totalHits++;
                this.atBatOver = true;
                this.atBat++;
                let walkCoins = Math.round(1 * this.comboMultiplier);
                if (_activeCoinMagnet) walkCoins = Math.round(walkCoins * 1.5);
                gameState.addCoins(walkCoins);
                this.coinsEarned += walkCoins;
                let xp = 10;
                if (_activeXpBoost) xp *= 2;
                gameState.addXP(xp);
                this.xpEarned += xp;
                this._updateCombo(true);
                showToast('WALK! 🚶 Take your base!', '#4fc3f7', 2);
            } else {
                this.atBatOver = false;
            }
        } else {
            // Called STRIKE — didn't swing at a pitch in the zone
            drainSurge(0.05);
            this.strikes++;
            pitchCountDisplay.addStrike();
            gameState.totalStrikes = (gameState.totalStrikes || 0) + 1;
            this.lastResult = 'STRIKE';
            this.lastTiming = 'late';
            audio.play('strike');
            camera.triggerShake(3, 0.15);
            commentary.trigger('strike');
            crowdSystem.trigger('strike');
            Haptics.pulse('medium');
            impactFX.triggerHit(W / 2, H * 0.55, 'STRIKE ' + this.strikes, false);

            if (this.strikes >= 3) {
                // Strikeout looking!
                this.atBatOver = true;
                this.atBat++;
                this.totalStrikeouts++;
                this._updateCombo(false);
                showToast('CALLED STRIKE THREE! ❌', '#FF6B6B', 1.5);
                // AI Bot taunts strikeout
                AI_BOT.show('playerOut');
            } else {
                this.atBatOver = false;
                // AI Bot taunts individual strike
                AI_BOT.show('playerStrike');
            }
        }

        this._tickPowerUp();
        inlineAI.recordSwing('late', this.pitchType, this.lastResult.toLowerCase());
        mlDataStore.addEvent('missed_pitch', {
            pitchType: this.pitchType,
            speed: Math.round(this.pitchSpeed),
            result: this.lastResult,
        });
        this.pitchState = 'result';
        this.resultTimer = 0;
        updateMissions();
        updateAchievements();
        gameState.saveToStorage();
    }

    update(dt) {
        // === PHASE 6: Apply slow-mo time scale ===
        const realDt = dt;
        dt = dt * slowMoReplay.getTimeScale();
        slowMoReplay.update(realDt); // update with real time

        camera.update(dt);
        particles.update(dt);
        updateCelebration(dt);
        crowdSystem.update(dt);
        skyAtmosphere.update(dt);
        impactFX.update(dt);
        fieldFX.update(dt, this.theme && this.theme.nightMode);
        pitchAtmosphere.update(dt, this);
        performanceGrade.update(dt);
        statcastPopup.update(dt);
        nextPitchPreview.update(dt);
        pitchWarning.update(this, dt);
        perfectBurst.update(dt);
        hitZoneViz.update(dt, this);
        ballPhysicsViz.update(dt, this);
        pitchCountDisplay.update(dt);
        outfielders.update(dt);
        this.pitcher.update(dt, this.config.windupDuration);
        this.batter.update(dt);

        // Phase 3: Zone flash timer
        if (this.zoneFlashTimer > 0) this.zoneFlashTimer -= dt;

        if (this.pitchState === 'windup') {
            this.windupTimer += dt;
            if (this.windupTimer >= this.config.windupDuration) {
                this.startPitch();
            }
        } else if (this.pitchState === 'pitching') {
            this.pitchProgress = Math.min(1, this.pitchProgress + dt / this.pitchDuration);
            const t = this.pitchProgress;
            const curve = this.curveAmount * this.curveDir * Math.sin(t * Math.PI);
            this.ball.x = this.ballStartX + curve;
            this.ball.y = this.ballStartY + (this.ballEndY - this.ballStartY) * t;
            this.ball.spin += dt * (this.pitchSpeed / 50);
            this.ball.visible = true;

            this.ballPositionHistory.push({ x: this.ball.x, y: this.ball.y });
            if (this.ballPositionHistory.length > 8) this.ballPositionHistory.shift();

            if (this.pitchProgress >= 1.0) {
                this.missedSwing();
            }
        } else if (this.pitchState === 'result') {
            this.resultTimer += dt;
            // Shorter pause for continuing same at-bat, longer for new at-bat
            const pauseDur = this.atBatOver ? this.resultDuration : this.resultDuration * 0.6;
            if (this.resultTimer >= pauseDur) {
                if (this.atBatOver) {
                    // At-bat ended — play ALL at-bats, then evaluate win
                    if (this.atBat >= this.maxAtBats) {
                        const won = this.homeRuns >= 1;
                        endGame(won);
                    } else {
                        this.resetAtBat();
                        this.startWindup();
                    }
                } else {
                    // Same at-bat continues — next pitch
                    this.startWindup();
                }
            }
        }

        // Power-up flash timer
        if (this.powerUpFlashTimer > 0) this.powerUpFlashTimer -= dt;
        // Pitch type indicator timer
        if (this.pitchTypeTimer > 0) this.pitchTypeTimer -= dt;
    }

    draw(ctx) {
        drawField(ctx, this.theme);
        camera.apply(ctx);

        // Pitch trail
        if (this.pitchState === 'pitching') {
            for (let i = 0; i < this.ballPositionHistory.length; i++) {
                const pos = this.ballPositionHistory[i];
                const alpha = (i / this.ballPositionHistory.length) * 0.4;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.skin.ballColor;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 7, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        // Field atmosphere effects (spotlights, dust, shimmer)
        fieldFX.drawSpotlights(ctx, this.theme);
        fieldFX.drawHeatShimmer(ctx);
        fieldFX.drawDustMotes(ctx);

        // Hit zone + sweet-spot visualization
        hitZoneViz.draw(ctx, this);

        // Ball smoke trail (drawn before ball so ball renders on top)
        ballPhysicsViz.drawSmoke(ctx);

        // Pitch prediction arc + windup tension ring
        pitchAtmosphere.drawPredictionArc(ctx);
        pitchAtmosphere.drawWindupMeter(ctx, this);

        this.pitcher.draw(ctx);
        if (this.ball.visible) {
            this.ball.draw(ctx, this.skin, this.pitchSpeed);
            ballPhysicsViz.drawSpinIndicator(ctx, this.ball, this.pitchType);
        }
        this.batter.draw(ctx);

        camera.restore(ctx);

        // ── Surge screen effects BEFORE HUD (edge glow behind everything) ──
        drawSurgeScreenEffects(ctx);

        // Outfielders (drawn on the field, before HUD)
        outfielders.draw(ctx);

        drawHUD(ctx, this);
        pitchCountDisplay.draw(ctx, this);
        drawStanceToggle(ctx, this);
        statcastPopup.draw(ctx);
        if (this.pitchState === 'result') {
            drawResultOverlay(ctx, this);
        }
        drawHRArcTrail(ctx);
        // Check deferred HR celebration (fires when arc reaches wall)
        _checkDeferredHRCelebration();
        drawConfetti(ctx);
        drawFireworks(ctx);
        particles.draw(ctx);
        impactFX.draw(ctx);
        // pitchWarning.draw(ctx);      // REMOVED: aggressive red vignette
        // pitchHistory.draw(ctx);       // REMOVED: tiny badges, cluttered
        // performanceGrade.draw(ctx);   // REMOVED: redundant with result overlay
        nextPitchPreview.draw(ctx);
        perfectBurst.draw(ctx);
        drawCommentaryText(ctx);
        drawAIBotBubble(ctx);
        slowMoReplay.draw(ctx);

        // ── Surge meter + activation banner ───────────────────────────────
        drawSurgeBar(ctx);
        drawSurgeBanner(ctx);

        drawToasts(ctx);
        drawAchievementToast(ctx);
    }
}

// ============================================================================
// SECTION 6b: Hit Zone Visualizer
// Animated sweet-spot zone, timing ring, zone pulse on ball arrival
// ============================================================================

const hitZoneViz = {
    active:    false,     // shows during windup
    zoneAlpha: 0,
    ringR:     0,         // expanding ring from sweet spot on arrival
    ringAlpha: 0,
    ballY:     700,       // last known ball Y

    _sweepAngle: 0,

    update(dt, session) {
        if (!session) {
            this.zoneAlpha = Math.max(0, this.zoneAlpha - dt * 3);
            this.ringAlpha = Math.max(0, this.ringAlpha - dt * 2);
            return;
        }
        this._sweepAngle += dt * 1.4;

        // Fade in zone during windup, out during pitching
        if (session.pitchState === 'windup') {
            this.zoneAlpha = Math.min(0.55, this.zoneAlpha + dt * 2.5);
        } else if (session.pitchState === 'pitching') {
            this.zoneAlpha = Math.max(0, this.zoneAlpha - dt * 1.5);
            // Trigger ring when ball gets close
            if (session.ball && session.ball.y > 540 && this.ringAlpha <= 0) {
                this.ringR     = 10;
                this.ringAlpha = 1.0;
            }
        } else {
            this.zoneAlpha = Math.max(0, this.zoneAlpha - dt * 3);
        }

        // Expand ring
        if (this.ringAlpha > 0) {
            this.ringR     = Math.min(80, this.ringR + dt * 160);
            this.ringAlpha = Math.max(0, this.ringAlpha - dt * 2.5);
        }
    },

    draw(ctx, session) {
        if (this.zoneAlpha <= 0 && this.ringAlpha <= 0) return;

        const sweetX = W / 2;
        const sweetY = 635;   // bat contact zone Y
        const zW = 110, zH = 40;

        ctx.save();

        // ── Sweet-spot zone rectangle ──
        if (this.zoneAlpha > 0) {
            ctx.globalAlpha = this.zoneAlpha * 0.5;

            // Outer zone (good)
            ctx.strokeStyle = '#00e5ff';
            ctx.lineWidth   = 1.5;
            ctx.setLineDash([6, 5]);
            ctx.beginPath();
            ctx.ellipse(sweetX, sweetY, zW / 2, zH / 2, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);

            // Inner perfect zone (smaller)
            const innerAlpha = this.zoneAlpha * 0.65;
            ctx.globalAlpha = innerAlpha;
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 2;
            const pulse = 0.85 + 0.15 * Math.sin(Date.now() / 260);
            const innerW = 44 * pulse, innerH = 18 * pulse;
            ctx.beginPath();
            ctx.ellipse(sweetX, sweetY, innerW / 2, innerH / 2, 0, 0, Math.PI * 2);
            ctx.stroke();

            // ★ label inside perfect zone
            ctx.globalAlpha = this.zoneAlpha * 0.8;
            ctx.font = '9px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffd700';
            ctx.fillText('PERFECT', sweetX, sweetY - 22);
            ctx.fillStyle = '#00e5ff';
            ctx.fillText('GOOD ZONE', sweetX, sweetY + 26);
            ctx.textBaseline = 'alphabetic';

            // Rotating arc indicators at edges
            ctx.globalAlpha = this.zoneAlpha * 0.4;
            ctx.strokeStyle = '#00e5ff';
            ctx.lineWidth = 2;
            for (let si = 0; si < 4; si++) {
                const sa = this._sweepAngle + (si / 4) * Math.PI * 2;
                const ex = sweetX + Math.cos(sa) * (zW / 2 + 8);
                const ey = sweetY + Math.sin(sa) * (zH / 2 + 8);
                ctx.beginPath();
                ctx.arc(ex, ey, 4, sa - 0.5, sa + 0.5);
                ctx.stroke();
            }
        }

        // ── Arrival ring ──────────────────────────────────────────────────
        if (this.ringAlpha > 0) {
            ctx.globalAlpha = this.ringAlpha * 0.8;
            ctx.strokeStyle = '#ff4444';
            ctx.lineWidth = 3;
            ctx.shadowColor = '#ff2200';
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.ellipse(sweetX, sweetY, this.ringR, this.ringR * 0.38, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        ctx.restore();
    },
};

// ============================================================================
// SECTION 6c: Advanced Ball Physics Visualizer
// Spin indicator arrows, magnus force vector, trajectory ghost dots
// ============================================================================

const ballPhysicsViz = {
    spinAngle:  0,
    ghostDots:  [],
    trailSmoke: [],    // smoke puffs that linger after ball

    update(dt, session) {
        this.spinAngle += dt * 4.5;

        // Smoke puffs every few frames
        if (session && session.pitchState === 'pitching' && session.ball && session.ball.visible) {
            if (Math.random() < 0.35) {
                this.trailSmoke.push({
                    x:     session.ball.x + (Math.random() - 0.5) * 8,
                    y:     session.ball.y + (Math.random() - 0.5) * 8,
                    r:     3 + Math.random() * 5,
                    vx:    (Math.random() - 0.5) * 15,
                    vy:    -8 - Math.random() * 12,
                    life:  0.4 + Math.random() * 0.4,
                    t:     0,
                    color: session.theme && session.theme.nightMode
                           ? 'rgba(180,220,255,' : 'rgba(200,200,200,',
                });
            }
        }
        for (let i = this.trailSmoke.length - 1; i >= 0; i--) {
            const s = this.trailSmoke[i];
            s.t  += dt;
            s.x  += s.vx * dt;
            s.y  += s.vy * dt;
            s.r  += dt * 4;
            s.vy *= 0.94;
            if (s.t >= s.life) this.trailSmoke.splice(i, 1);
        }
    },

    drawSmoke(ctx) {
        ctx.save();
        for (const s of this.trailSmoke) {
            const a = (1 - s.t / s.life) * 0.18;
            ctx.globalAlpha = a;
            ctx.fillStyle = s.color + a + ')';
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    },

    drawSpinIndicator(ctx, ball, pitchType) {
        if (!ball || !ball.visible) return;
        const T = Date.now();
        const r = 14;
        const bx = ball.x, by = ball.y;

        // Curveball: show curve arrow
        if (pitchType === 'curveball') {
            ctx.save();
            ctx.globalAlpha = 0.35 + 0.15 * Math.sin(T / 200);
            ctx.strokeStyle = '#9c27b0';
            ctx.lineWidth = 2;
            ctx.shadowColor = '#9c27b0';
            ctx.shadowBlur = 8;
            // Curved arrow to the right
            ctx.beginPath();
            ctx.arc(bx, by, r + 10, -Math.PI / 2, Math.PI / 2);
            ctx.stroke();
            // Arrowhead
            ctx.fillStyle = '#9c27b0';
            ctx.beginPath();
            ctx.moveTo(bx + 4, by + r + 10);
            ctx.lineTo(bx + 10, by + r + 8);
            ctx.lineTo(bx + 7, by + r + 15);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.restore();
        } else if (pitchType === 'fastball') {
            // Show speed streaks
            ctx.save();
            ctx.globalAlpha = 0.25;
            ctx.strokeStyle = '#ff8c00';
            ctx.lineWidth = 1.5;
            for (let streak = 0; streak < 3; streak++) {
                const sy = by - 4 + streak * 4;
                ctx.beginPath();
                ctx.moveTo(bx - r - 8 - streak * 6, sy);
                ctx.lineTo(bx - r - 20 - streak * 6, sy);
                ctx.stroke();
            }
            ctx.restore();
        }
    },
};

// ============================================================================
// SECTION 7: Inline AI (System 23)
// ============================================================================

const inlineAI = {
    history: [],
    timingCounts: { early: 0, perfect: 0, late: 0 },
    pitchHistory: [],

    recordSwing(timing, pitchType, result) {
        this.history.push({ timing, pitchType, result, t: Date.now() });
        if (this.history.length > 20) this.history.shift();
        this.timingCounts[timing] = (this.timingCounts[timing] || 0) + 1;
    },

    decidePitch(config) {
        const bias = gameState.getTimingBias();
        const rand = Math.random();
        const consecutivePitchTypes = this.pitchHistory.slice(-2);

        let type = 'fastball';

        if (bias === 'early') {
            if (rand < 0.35) type = 'curveball';
            else if (rand < 0.55) type = 'changeup';
            else type = 'fastball';
        } else if (bias === 'late') {
            if (rand < config.curveChance * 0.5) type = 'curveball';
            else type = 'fastball';
        } else {
            if (rand < config.curveChance) type = 'curveball';
            else if (rand < config.curveChance + config.changeChance) type = 'changeup';
            else if (rand < config.curveChance + config.changeChance + (config.sliderChance || 0)) type = 'slider';
            else type = 'fastball';
        }

        if (consecutivePitchTypes.length === 2 && consecutivePitchTypes[0] === type && consecutivePitchTypes[1] === type) {
            type = 'fastball';
        }

        this.pitchHistory.push(type);
        if (this.pitchHistory.length > 5) this.pitchHistory.shift();
        return type;
    },

    getAdaptiveSpeed(baseSpeed, config) {
        const bias = gameState.getTimingBias();
        const recentPerfects = this.history.slice(-5).filter(h => h.timing === 'perfect').length;
        let mod = 1.0;
        if (bias === 'early') mod = 0.8 + Math.random() * 0.1;
        else if (bias === 'late') mod = 1.04 + Math.random() * 0.08;
        else mod = 0.94 + Math.random() * 0.12;

        if (recentPerfects >= 2) mod *= 1.1;
        return Math.max(150, Math.min(800, baseSpeed * mod));
    },

    reset() {
        this.history = [];
        this.timingCounts = { early: 0, perfect: 0, late: 0 };
        this.pitchHistory = [];
    },
};

// ============================================================================
// SECTION 8: ML Data Store (System 24)
// ============================================================================

const mlDataStore = {
    events: [],
    sessionStart: Date.now(),

    addEvent(type, data) {
        this.events.push({
            t: Date.now() - this.sessionStart,
            event: type,
            ...data,
        });
        if (this.events.length > 500) this.events.shift();
    },

    getSessionStats() {
        const swings = this.events.filter(e => e.event === 'swing' || e.event === 'missed_pitch');
        const hrs = swings.filter(e => e.result === 'HOME RUN!').length;
        const perfects = swings.filter(e => e.timing === 'perfect').length;
        return {
            totalSwings: swings.length,
            homeRuns: hrs,
            perfectRate: swings.length > 0 ? (perfects / swings.length * 100).toFixed(1) : '0',
            pitchBreakdown: ['fastball', 'curveball', 'changeup', 'slider'].map(t => ({
                type: t,
                count: swings.filter(e => e.pitchType === t).length,
            })),
        };
    },

    export() {
        return JSON.stringify({ events: this.events, version: 2, exportTime: Date.now() });
    },
};

// ============================================================================
// SECTION 8b: Spotlight & Ambient Field Effects System
// Moving spotlight beams across field, heat-shimmer, crowd color sweep
// ============================================================================

const fieldFX = {
    spotlights: [],
    heatPhase:  0,
    sweepAngle: 0,
    dustMotes:  [],

    init() {
        // Two sweeping spotlights for night mode drama
        this.spotlights = [
            { angle: 0.2,  speed: 0.18, side: 'left',  alpha: 0 },
            { angle: 2.8,  speed: 0.22, side: 'right', alpha: 0 },
        ];
        // Ambient dust motes floating over the field
        for (let i = 0; i < 30; i++) {
            this.dustMotes.push({
                x:     Math.random() * 390,
                y:     300 + Math.random() * 400,
                vx:    (Math.random() - 0.5) * 14,
                vy:    -4 - Math.random() * 10,
                r:     0.8 + Math.random() * 2.2,
                alpha: 0.05 + Math.random() * 0.12,
                phase: Math.random() * Math.PI * 2,
            });
        }
    },

    update(dt, nightMode) {
        this.heatPhase += dt * 0.8;
        this.sweepAngle += dt * 0.3;
        for (const sp of this.spotlights) {
            sp.angle += sp.speed * dt;
            if (sp.angle > Math.PI * 2) sp.angle -= Math.PI * 2;
            // Fade in/out slowly
            sp.alpha = nightMode
                ? 0.06 + 0.04 * Math.sin(sp.angle * 0.5)
                : 0.025 + 0.015 * Math.sin(sp.angle * 0.5);
        }
        for (const d of this.dustMotes) {
            d.x += d.vx * dt;
            d.y += d.vy * dt;
            d.phase += dt * 1.2;
            if (d.y < 280) d.y = H - 60;
            if (d.x < -10) d.x = 400;
            if (d.x > 400) d.x = -10;
        }
    },

    drawSpotlights(ctx, theme) {
        // Two diagonal spotlight beams sweeping across infield
        ctx.save();
        const origins = [
            { ox: 18,      oy: 140 },
            { ox: W - 18,  oy: 140 },
        ];
        for (let si = 0; si < this.spotlights.length; si++) {
            const sp = this.spotlights[si];
            const or = origins[si];
            const tx = W / 2 + Math.cos(sp.angle) * 140;
            const ty = H * 0.55 + Math.sin(sp.angle * 0.6) * 80;
            const coneGrad = ctx.createRadialGradient(or.ox, or.oy, 0, tx, ty, 180);
            coneGrad.addColorStop(0, `rgba(255,250,220,${sp.alpha})`);
            coneGrad.addColorStop(0.4, `rgba(255,240,180,${sp.alpha * 0.4})`);
            coneGrad.addColorStop(1, 'rgba(255,220,120,0)');
            ctx.fillStyle = coneGrad;
            ctx.globalAlpha = 1;
            ctx.beginPath();
            const halfAngle = 0.22;
            const dist = 500;
            ctx.moveTo(or.ox, or.oy);
            ctx.lineTo(
                or.ox + Math.cos(sp.angle - halfAngle) * dist,
                or.oy + Math.sin(sp.angle - halfAngle) * dist
            );
            ctx.lineTo(
                or.ox + Math.cos(sp.angle + halfAngle) * dist,
                or.oy + Math.sin(sp.angle + halfAngle) * dist
            );
            ctx.closePath();
            ctx.fill();
        }
        ctx.restore();
    },

    drawDustMotes(ctx) {
        ctx.save();
        for (const d of this.dustMotes) {
            ctx.globalAlpha = d.alpha * (0.5 + 0.5 * Math.sin(d.phase));
            ctx.fillStyle = 'rgba(255,240,200,0.8)';
            ctx.beginPath();
            ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    },

    drawHeatShimmer(ctx) {
        // Subtle heat ripple effect at the bottom of the infield
        const shimY = H * 0.72;
        ctx.save();
        for (let xi = 0; xi < 8; xi++) {
            const sx  = (xi / 8) * W + 20;
            const amp = 2 + Math.sin(this.heatPhase + xi * 0.8) * 1.5;
            ctx.globalAlpha = 0.04 + 0.02 * Math.sin(this.heatPhase * 1.3 + xi);
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.beginPath();
            ctx.ellipse(sx, shimY, 12, amp, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    },
};
fieldFX.init();

// ============================================================================
// SECTION 8c: Pitch Prediction & Windup Atmosphere
// Ghost pitch arc preview, windup tension meter, pitcher stats badge
// ============================================================================

const pitchAtmosphere = {
    windupTension: 0,    // 0→1 builds during windup, drops on pitch
    predArc: [],         // ghost prediction dots shown briefly
    predAlpha: 0,        // fade for pred arc

    update(dt, session) {
        if (!session) return;
        if (session.pitchState === 'windup') {
            this.windupTension = Math.min(1,
                session.windupTimer / (session.config ? session.config.windupDuration : 1.5)
            );
            this.predAlpha = Math.min(0.55, this.windupTension * 0.65);
            // Build prediction arc if not built yet
            if (this.predArc.length === 0) {
                this._buildArc(session);
            }
        } else {
            this.windupTension = Math.max(0, this.windupTension - dt * 4);
            this.predAlpha     = Math.max(0, this.predAlpha - dt * 3);
            if (session.pitchState === 'windup') {
                /* keep */
            } else {
                this.predArc = [];
            }
        }
    },

    _buildArc(session) {
        this.predArc = [];
        const sx  = W / 2 + (session.curveDir || 0) * 10;
        const sy  = 370;
        const ex  = W / 2 + (session.curveDir || 0) * (session.curveAmount || 0) * 40;
        const ey  = 580;
        for (let t = 0; t <= 1; t += 0.1) {
            this.predArc.push({
                x: sx + (ex - sx) * t + (session.curveDir || 0) * Math.sin(t * Math.PI) * 20,
                y: sy + (ey - sy) * t,
            });
        }
    },

    drawWindupMeter(ctx, session) {
        if (!session || session.pitchState !== 'windup') return;
        const tension = this.windupTension;
        if (tension < 0.05) return;

        // Circular tension ring around pitcher
        const px = W / 2, py = 430;
        const r   = 32 + tension * 12;
        ctx.save();
        ctx.globalAlpha = tension * 0.55;
        const ringGrad = ctx.createRadialGradient(px, py, r - 4, px, py, r + 4);
        const tc = tension > 0.75 ? '#ff4444' : tension > 0.4 ? '#ff9800' : '#00e5ff';
        ringGrad.addColorStop(0,   tc + '00');
        ringGrad.addColorStop(0.5, tc + 'aa');
        ringGrad.addColorStop(1,   tc + '00');
        ctx.strokeStyle = tc;
        ctx.lineWidth   = 3;
        ctx.shadowColor = tc;
        ctx.shadowBlur  = 10;
        ctx.beginPath();
        ctx.arc(px, py, r, -Math.PI / 2, -Math.PI / 2 + tension * Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Tension label
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillStyle = tc;
        ctx.globalAlpha = tension;
        ctx.fillText(tension > 0.85 ? '🔥 MAX!' : '⚡ WINDING UP', px, py - r - 6);
        ctx.textBaseline = 'alphabetic';
        ctx.restore();
    },

    drawPredictionArc(ctx) {
        if (this.predArc.length < 2 || this.predAlpha <= 0) return;
        ctx.save();
        ctx.globalAlpha = this.predAlpha;
        ctx.strokeStyle = 'rgba(100,200,255,0.7)';
        ctx.lineWidth   = 1.5;
        ctx.setLineDash([4, 6]);
        ctx.beginPath();
        ctx.moveTo(this.predArc[0].x, this.predArc[0].y);
        for (const p of this.predArc) ctx.lineTo(p.x, p.y);
        ctx.stroke();
        ctx.setLineDash([]);
        // Dots at each point
        for (const p of this.predArc) {
            ctx.fillStyle = 'rgba(120,220,255,0.5)';
            ctx.beginPath();
            ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    },
};

// ============================================================================
// SECTION 8d: Pitch History & Performance Grade System
// Tracks last 6 pitches as colored badges; grades swing timing A–F
// ============================================================================

const pitchHistory = {
    log: [],       // { type, result, mph, timing }
    maxLog: 8,

    record(session) {
        if (!session) return;
        this.log.push({
            type:   session.pitchType   || 'fastball',
            result: session.lastResult  || '?',
            mph:    Math.round((session.pitchSpeed || 80) / 1.609),
            timing: session.lastTiming  || 'miss',
        });
        if (this.log.length > this.maxLog) this.log.shift();
    },

    reset() { this.log = []; },

    draw(ctx) {
        if (this.log.length === 0) return;
        const T = Date.now();
        // Show last 6 as small horizontal badges above radar gun
        const startX = 8, startY = H - 140, bw = 38, bh = 16, gap = 3;
        const showing = this.log.slice(-6);

        ctx.save();
        ctx.font = '7px monospace';
        ctx.textBaseline = 'middle';

        for (let i = 0; i < showing.length; i++) {
            const e  = showing[i];
            const bx = startX + i * (bw + gap);
            const by = startY;
            // Color by result
            const col = {
                'HOME RUN!': '#ffd700',
                'BASE HIT':  '#69f0ae',
                'FOUL':      '#ff9800',
                'STRIKE':    '#ff5252',
            }[e.result] || '#888';

            // Badge bg
            ctx.fillStyle = col + '22';
            ctx.strokeStyle = col + '88';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(bx, by, bw, bh, 4);
            ctx.fill();
            ctx.stroke();

            // Text: mph
            ctx.fillStyle = col;
            ctx.textAlign = 'center';
            ctx.fillText(e.mph + 'mph', bx + bw / 2, by + bh / 2);
        }
        ctx.textBaseline = 'alphabetic';
        ctx.restore();
    },
};

// PHASE 4: STATCAST METRICS SYSTEM

const statcastPopup = {
    active: false,
    exitVelo: 0,
    launchAngle: 0,
    result: '',
    timer: 0,
    maxTime: 2.0,
    isPerfect: false,

    trigger(exitVelo, launchAngle, result, isPerfect) {

        this.launchAngle = Math.round(launchAngle);
        this.result = result;
        this.timer = this.maxTime;
        this.isPerfect = isPerfect;

    update(dt) {
        if (this.active) {
            this.timer -= dt;
            if (this.timer <= 0) this.active = false;
        }
    },

    draw(ctx) {
        if (!this.active || this.timer <= 0) return;
        const alpha = this.timer < 0.5 ? this.timer / 0.5 : 1;
        const rise = (this.maxTime - this.timer) * 15;
        const baseY = H * 0.68 - rise;
        const baseX = W / 2;

        ctx.save();
        ctx.globalAlpha = alpha;

        // Background pill
        const pillW = 160, pillH = 44;
        const pg = ctx.createLinearGradient(baseX - pillW / 2, baseY - pillH / 2, baseX - pillW / 2, baseY + pillH / 2);
        pg.addColorStop(0, 'rgba(10,15,30,0.92)');
        pg.addColorStop(1, 'rgba(5,10,20,0.88)');
        ctx.fillStyle = pg;
        ctx.beginPath();
        ctx.roundRect(baseX - pillW / 2, baseY - pillH / 2, pillW, pillH, 10);
        ctx.fill();

        const bc = this.isPerfect ? '#ffd740' : '#00e5ff';
        ctx.strokeStyle = bc;

        ctx.shadowColor = bc;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.roundRect(baseX - pillW / 2, baseY - pillH / 2, pillW, pillH, 10);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Exit Velo
        ctx.font = 'bold 13px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        ctx.fillStyle = 'rgba(255,255,255,0.7)';
