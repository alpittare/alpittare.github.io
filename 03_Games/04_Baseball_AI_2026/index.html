function handleShopTap(x, y) {
    if (hitTest(_shopButtons.back, x, y)) {
        currentScreen = 'menu';
        return;
    }
    if (hitTest(_shopButtons.tabBalls, x, y)) {
        _shopTab = 'balls';
        _shopScroll = 0;
        return;
    }
    if (hitTest(_shopButtons.tabFields, x, y)) {
        _shopTab = 'fields';
        _shopScroll = 0;
        return;
    }
    if (hitTest(_shopButtons.tabStore, x, y)) {
        _shopTab = 'store';
        _shopScroll = 0;
        return;
    }

    // Store tab coin pack buttons
    if (_shopTab === 'store') {
        for (let i = 0; i < COIN_PACKS.length; i++) {
            const btn = _shopButtons['store_' + i];
            if (btn && hitTest(btn, x, y)) {
                const pack = COIN_PACKS[i];
                audio.play('click');
                if (window.NativePurchase) {
                    window.NativePurchase.buy(pack.id);
                } else {
                    gameState.addCoins(pack.coins);
                    gameState.saveToStorage();
                    showToast('+' + pack.coins + ' coins!', pack.color, 2);
                }
                return;
            }
        }

        // Power-up buy buttons
        for (let i = 0; i < POWER_UPS.length; i++) {
            const btn = _shopButtons['pu_' + i];
            if (btn && hitTest(btn, x, y)) {
                const pu = POWER_UPS[i];
                if (gameState.coins >= pu.cost) {
                    gameState.spendCoins(pu.cost);
                    gameState.powerUps[pu.id] = (gameState.powerUps[pu.id] || 0) + 1;
                    gameState.saveToStorage();
                    audio.play('click');
                    showToast(pu.icon + ' ' + pu.name + ' purchased!', '#00e5ff', 2);
                } else {
                    showToast('Not enough coins!', '#ff6666', 2);
                }
                return;
            }
        }
    }

    // Item action buttons (BUY / EQUIP)
    if (_shopButtons.items) {
        for (const btn of _shopButtons.items) {
            if (!hitTest(btn, x, y)) continue;
            const item = btn.item;
            const isSkin = _shopTab === 'balls';
            const ownedArr = isSkin ? gameState.ownedSkins : gameState.ownedThemes;
            const equipKey = isSkin ? 'equippedSkin' : 'equippedTheme';
            const levelReq = item.levelReq || 0;

            // Locked check
            if (gameState.level < levelReq) {
                showToast('Reach Level ' + levelReq + ' to unlock!', '#FF6B6B', 2);
                audio.play('foul');
                return;
            }

            const alreadyOwned = ownedArr.includes(item.id);
            const equipped = gameState.settings[equipKey] === item.id;

            if (equipped) {
                // Already equipped — no action
                return;
            }

            if (alreadyOwned || item.price === 0) {
                // Equip it
                gameState.settings[equipKey] = item.id;
                showToast('Equipped: ' + item.name + '!', '#00FF88', 2);
                audio.play('hit');
                Haptics.pulse('success');
                gameState.saveToStorage();
                return;
            }

            // Try to buy
            if (gameState.coins < item.price) {
                showToast('Need ' + item.price + ' 🪙 coins!', '#FF6B6B', 2);
                audio.play('foul');
                return;
            }

            // Purchase confirmed
            gameState.spendCoins(item.price);
            ownedArr.push(item.id);
            gameState.settings[equipKey] = item.id;
            showToast('Bought & Equipped: ' + item.name + '!', '#FFD700', 2.5);
            audio.play('levelup');
            Haptics.pulse('success');
            updateAchievements();
            gameState.saveToStorage();
            return;
        }
    }
}

let _lbData = null;
let _lbLoading = true;
let _lbRank = null;
let _lbError = null;

async function _fetchLeaderboard() {
    if (!window._convexClient || !window._convexClient.isRegistered) {
        _lbData = [];
        _lbLoading = false;
        _lbError = 'Not connected to cloud';
        return;
    }
    try {
        console.log('[BaseHit-LB] Fetching basehit top 10...');
        const lb = await window._convexClient.getLeaderboard('basehit', 10);
        console.log('[BaseHit-LB] Raw response:', JSON.stringify(lb));
        let rank = null;
        try {
            rank = await window._convexClient.getPlayerRank('basehit');
        } catch (re) {
            console.warn('[BaseHit-LB] Rank fetch failed:', re.message);
        }
        console.log('[BaseHit-LB] Rank:', JSON.stringify(rank));
        _lbData = Array.isArray(lb) ? lb : [];
        _lbRank = rank;
        _lbLoading = false;
        _lbError = null;
    } catch (e) {
        _lbData = [];
        _lbLoading = false;
        _lbError = 'Offline — play a match to sync';
        console.warn('[BaseHit-LB] Fetch failed:', e.message);
    }
}

    for (let i = 0; i < data.length; i++) {

          progress: Math.min(gameState.level, 5), goal: 5 },
        { name: 'Legend Mode',   desc: 'Win on Legend difficulty',   icon: '👑', tier: 'gold',
          unlocked: (gameState._legendWins || 0) > 0,
          progress: Math.min(gameState._legendWins || 0, 1), goal: 1 },
        { name: 'Surge Master',  desc: 'Fill surge bar 3 times',     icon: '⚡', tier: 'silver',
          unlocked: (gameState.surgesTriggered || 0) >= 3,
          progress: Math.min(gameState.surgesTriggered || 0, 3), goal: 3 },
        { name: 'Customizer',    desc: 'Own 3 shop items',           icon: '🎨', tier: 'bronze',
          unlocked: (gameState.ownedSkins.length + gameState.ownedThemes.length) >= 3,
          progress: Math.min(gameState.ownedSkins.length + gameState.ownedThemes.length, 3), goal: 3 },
        { name: 'Mission Done',  desc: 'Complete 5 missions',        icon: '📋', tier: 'gold',
          unlocked: (gameState.completedMissions || 0) >= 5,
          progress: Math.min(gameState.completedMissions || 0, 5), goal: 5 },
    ];

    const unlocked = achievements.filter(a => a.unlocked).length;
    const total    = achievements.length;
    // Overall progress pill
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText(`${unlocked} / ${total} unlocked`, W / 2, 72);
    // Overall bar
    const obx = W / 2 - 80, oby = 78;
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath();
    ctx.roundRect(obx, oby, 160, 5, 2);
    ctx.fill();
    const obGrad = ctx.createLinearGradient(obx, 0, obx + 160, 0);
    obGrad.addColorStop(0, '#ffd700');
    obGrad.addColorStop(1, '#ff8800');
    ctx.fillStyle = obGrad;
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.roundRect(obx, oby, 160 * (unlocked / total), 5, 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();

    // Achievement cards — 2 per row
    const tierColors = { bronze:'#cd7f32', silver:'#c0c0c0', gold:'#ffd700' };
    const cardW = (W - 32) / 2 - 4, cardH = 72;
    const startY = 96;

    for (let i = 0; i < achievements.length; i++) {
        const a   = achievements[i];
        const col = i % 2;
        const row = Math.floor(i / 2);
        const ax  = 12 + col * (cardW + 8);
        const ay  = startY + row * (cardH + 8);
        if (ay + cardH > H - 55) break;

        const tc  = tierColors[a.tier] || '#888';
        const locked = !a.unlocked;

        // Card background
        ctx.save();
        ctx.globalAlpha = locked ? 0.55 : 1.0;
        const cGrad = ctx.createLinearGradient(ax, ay, ax, ay + cardH);
        cGrad.addColorStop(0, locked ? 'rgba(15,15,25,0.88)' : 'rgba(20,24,48,0.92)');
        cGrad.addColorStop(1, locked ? 'rgba(8,8,14,0.92)'   : 'rgba(10,14,30,0.96)');
        ctx.fillStyle = cGrad;
        ctx.beginPath();
        ctx.roundRect(ax, ay, cardW, cardH, 10);
        ctx.fill();

        // Left accent bar — tier color
        ctx.fillStyle = locked ? 'rgba(100,100,100,0.4)' : tc;
        ctx.shadowColor = locked ? 'transparent' : tc;
        ctx.shadowBlur = locked ? 0 : 8;
        ctx.beginPath();
        ctx.roundRect(ax, ay, 4, cardH, [10, 0, 0, 10]);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Border
        ctx.strokeStyle = locked ? 'rgba(255,255,255,0.08)' : tc + '55';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(ax, ay, cardW, cardH, 10);
        ctx.stroke();

        // Icon — pulsing if unlocked
        const iconScale = a.unlocked ? (1 + 0.06 * Math.sin(T / 500 + i)) : 1;
        ctx.font = `${Math.round(20 * iconScale)}px sans-serif`;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText(a.icon, ax + 12, ay + 10);

        // Name
        ctx.font = `bold 11px sans-serif`;
        ctx.textBaseline = 'top';
        ctx.fillStyle = a.unlocked ? '#ffffff' : 'rgba(255,255,255,0.4)';
        ctx.fillText(a.name, ax + 38, ay + 8);

        // Desc
        ctx.font = '9px sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.45)';
        ctx.fillText(a.desc, ax + 38, ay + 22);

        // Progress bar
        const bx2 = ax + 10, by2 = ay + cardH - 18, bw2 = cardW - 20, bh2 = 5;
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.beginPath();
        ctx.roundRect(bx2, by2, bw2, bh2, 2);
        ctx.fill();
        const pct = a.goal > 0 ? a.progress / a.goal : 0;
        if (pct > 0) {
            const pbGrad = ctx.createLinearGradient(bx2, 0, bx2 + bw2, 0);
            pbGrad.addColorStop(0, locked ? 'rgba(100,100,100,0.5)' : tc + 'bb');
            pbGrad.addColorStop(1, locked ? 'rgba(60,60,60,0.5)'    : tc);
            ctx.fillStyle = pbGrad;
            ctx.beginPath();
            ctx.roundRect(bx2, by2, bw2 * pct, bh2, 2);
            ctx.fill();
        }

        // Progress label
        ctx.font = '8px monospace';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'bottom';
        ctx.fillStyle = a.unlocked ? tc : 'rgba(255,255,255,0.35)';
        ctx.fillText(a.unlocked ? '✓' : `${a.progress}/${a.goal}`, ax + cardW - 8, ay + cardH - 6);

        ctx.textBaseline = 'alphabetic';
        ctx.restore();
    }
}

// ============================================================================
// SECTION 16: Stats screen
// ============================================================================

function drawStatsScreen(ctx) {
    const T = Date.now();
    drawModernBg(ctx, '#4fc3f7', 180);
    // Back button
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.beginPath(); ctx.roundRect(12, 16, 40, 40, 10); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(12, 16, 40, 40, 10); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '500 18px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('\u2190', 32, 36);
    ctx.font = '800 22px sans-serif'; ctx.fillStyle = '#ffffff';
    ctx.fillText('CAREER STATS', W / 2, 36);
    ctx.textBaseline = 'alphabetic';

    // ── Key stat circles ──────────────────────────────────────────────────
    const gs   = gameState;
    const winRate = gs.totalGames > 0 ? gs.totalWins / gs.totalGames : 0;
    const topStats = [
        { label: 'GAMES',    value: gs.totalGames, color: '#4fc3f7',  icon: '🏟️' },
        { label: 'WINS',     value: gs.totalWins,  color: '#69f0ae',  icon: '🏆' },
        { label: 'WIN %',    value: (winRate * 100).toFixed(0) + '%', color: '#ffd700', icon: '📈' },
        { label: 'HR',       value: gs.totalHomeRuns || 0, color: '#ff7043', icon: '⚾' },
    ];

    const cY = 90, cR = 28, cSpacing = W / 4;
    for (let i = 0; i < topStats.length; i++) {
        const s = topStats[i];
        const cx = cSpacing / 2 + i * cSpacing;
        const pulse = 0.88 + 0.12 * Math.sin(T / 600 + i * 0.8);

        // Circle ring
        ctx.save();
        ctx.strokeStyle = s.color;
        ctx.lineWidth = 3;
        ctx.shadowColor = s.color;
        ctx.shadowBlur = 10 * pulse;
        ctx.beginPath();
        ctx.arc(cx, cY, cR, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Fill
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = s.color;
        ctx.beginPath();
        ctx.arc(cx, cY, cR, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        // Icon + value
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(s.icon, cx, cY - 2);
        ctx.font = 'bold 15px monospace';
        ctx.textBaseline = 'top';
        ctx.fillStyle = s.color;
        ctx.fillText(String(s.value), cx, cY + 2);
        ctx.textBaseline = 'alphabetic';

        // Label below circle
        ctx.font = '8px sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fillText(s.label, cx, cY + cR + 12);
        ctx.restore();
    }

    // ── Animated horizontal bar chart ────────────────────────────────────
    const barData = [
        { label: 'Win Rate',       pct: winRate,                              color: '#69f0ae' },
        { label: 'Perfect Swings', pct: Math.min(1,(gs.perfectSwings||0)/20), color: '#ffd700' },
        { label: 'Best Streak',    pct: Math.min(1, gs.bestStreak / 10),      color: '#ff7043' },
        { label: 'Level',          pct: Math.min(1, gs.level / 20),           color: '#9c27b0' },
        { label: 'Surge Fills',    pct: Math.min(1,(gs.surgesTriggered||0)/10), color: '#00e5ff' },
    ];

    const chartX = 16, chartY = 145, chartW = W - 32, rowH = 30;
    drawGlassCard(ctx, chartX - 4, chartY - 8, chartW + 8, barData.length * rowH + 20, 12);

    ctx.save();
    ctx.font = 'bold 10px sans-serif';
    for (let i = 0; i < barData.length; i++) {
        const b  = barData[i];
        const ry = chartY + i * rowH + 6;
        const animPct = Math.min(b.pct, (T % 5000) < 3000 ? b.pct : b.pct * (T % 1000) / 1000);

        // Label
        ctx.fillStyle = 'rgba(255,255,255,0.65)';
        ctx.textAlign  = 'left';
        ctx.fillText(b.label, chartX, ry + 12);

        // Bar track
        const bx3 = chartX + 90, bw3 = chartW - 100, bh3 = 10;
        const by3 = ry + 5;
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.beginPath();
        ctx.roundRect(bx3, by3, bw3, bh3, 5);
        ctx.fill();

        // Animated fill
        const bg = ctx.createLinearGradient(bx3, 0, bx3 + bw3, 0);
        bg.addColorStop(0, b.color + 'cc');
        bg.addColorStop(1, b.color);
        ctx.fillStyle = bg;
        ctx.shadowColor = b.color;
        ctx.shadowBlur = 5;
        ctx.beginPath();
        ctx.roundRect(bx3, by3, bw3 * b.pct, bh3, 5);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Pct label at end
        ctx.textAlign = 'right';
        ctx.fillStyle = b.color;
        ctx.font = 'bold 9px monospace';
        ctx.fillText((b.pct * 100).toFixed(0) + '%', chartX + chartW, ry + 14);
        ctx.font = 'bold 10px sans-serif';
    }
    ctx.restore();

    // ── Recent match history ──────────────────────────────────────────────
    const histY = chartY + barData.length * rowH + 24;
    drawGlassCard(ctx, chartX - 4, histY - 8, chartW + 8, H - histY - 60, 12);

    ctx.save();
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#ffd700';
    ctx.fillText('RECENT MATCHES', chartX + 4, histY + 10);
    ctx.strokeStyle = 'rgba(255,215,0,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(chartX, histY + 16);
    ctx.lineTo(chartX + chartW, histY + 16);
    ctx.stroke();

    const matches = (gs.matchHistory || []).slice(0, 6);
    if (matches.length === 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('No matches played yet', W / 2, histY + 38);
    } else {
        for (let i = 0; i < matches.length; i++) {
            const m  = matches[i];
            const my = histY + 24 + i * 24;
            if (my + 20 > H - 60) break;

            // Result dot
            ctx.fillStyle  = m.won ? '#69f0ae' : '#ff5252';
            ctx.shadowColor = m.won ? '#69f0ae' : '#ff5252';
            ctx.shadowBlur = 5;
            ctx.beginPath();
            ctx.arc(chartX + 8, my + 7, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Win/lose label
            ctx.font  = 'bold 10px sans-serif';
            ctx.fillStyle = m.won ? '#69f0ae' : '#ff5252';
            ctx.textAlign = 'left';
            ctx.fillText(m.won ? 'WIN' : 'LOSS', chartX + 18, my + 11);

            // Details
            ctx.fillStyle = 'rgba(255,255,255,0.55)';
            ctx.font = '9px sans-serif';
            const diffLabel = (m.difficulty || 'easy').toUpperCase();
            ctx.fillText(`${diffLabel}  ·  ${m.homeRuns || 0} HR  ·  +${m.coins || 0}🪙`, chartX + 50, my + 11);

            // Date (right)
            ctx.textAlign = 'right';
            ctx.fillStyle = 'rgba(255,255,255,0.25)';
            const d = m.date ? new Date(m.date) : null;
            ctx.fillText(d ? `${d.getMonth()+1}/${d.getDate()}` : '', chartX + chartW - 2, my + 11);
        }
    }
    ctx.restore();

    // === PHASE 7: ADVANCED ANALYTICS ===
    const anaStartY = H - 300;

    // Section header
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffd740';
    ctx.fillText('ADVANCED ANALYTICS', W / 2, anaStartY);

    // Divider line
    ctx.strokeStyle = 'rgba(255,215,64,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(40, anaStartY + 8);
    ctx.lineTo(W - 40, anaStartY + 8);
    ctx.stroke();

    // Career stats grid (2 columns — uses gs from drawStatsScreen scope)
    const avgVelo = gs.careerExitVelos.length > 0
        ? Math.round(gs.careerExitVelos.reduce((a,b) => a+b, 0) / gs.careerExitVelos.length)
        : 0;
    const perfectRate = gs.careerPitchCount > 0
        ? Math.round(gs.careerPerfectCount / gs.careerPitchCount * 100)
        : 0;
    const hrRate = gs.careerHitCount > 0
        ? Math.round((gs.totalHRs || 0) / gs.careerHitCount * 100)
        : 0;

    const anaStats = [
        { label: 'AVG EXIT VELO', value: avgVelo + ' mph', color: '#00e5ff' },
        { label: 'MAX EXIT VELO', value: gs.careerMaxExitVelo + ' mph', color: '#ffd740' },
        { label: 'PERFECT RATE', value: perfectRate + '%', color: '#69f0ae' },
        { label: 'HR RATE', value: hrRate + '%', color: '#ff6b35' },
    ];

    const colW = W / 2;
    for (let i = 0; i < anaStats.length; i++) {
        const col = i % 2;
        const row = Math.floor(i / 2);
        const ax = col * colW + colW / 2;
        const ay = anaStartY + 28 + row * 40;

        ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = anaStats[i].color;
        ctx.fillText(anaStats[i].value, ax, ay);

        ctx.font = '7px sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fillText(anaStats[i].label, ax, ay + 14);
    }

    // Hit distribution bar chart
    const barY = anaStartY + 110;
    const hrCount = gs.totalHRs || 0;
    const hitCount = Math.max(0, (gs.careerHitCount || 0) - hrCount);
    const otherCount = Math.max(0, (gs.totalGames || 0) * 5 - (gs.careerHitCount || 0));
    const maxVal = Math.max(1, hrCount, hitCount, otherCount);

    ctx.font = 'bold 8px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillText('HIT DISTRIBUTION', W / 2, barY);

    const bars = [
        { label: 'HR', count: hrCount, color: '#ff4444' },
        { label: 'HITS', count: hitCount, color: '#00e5ff' },
        { label: 'OUTS', count: otherCount, color: '#888888' },
    ];

    const barMaxW = W - 120;
    const barH = 14;
    const barGap = 6;
    const barStartX = 65;

    for (let bi = 0; bi < bars.length; bi++) {
        const by = barY + 12 + bi * (barH + barGap);
        const bw = Math.max(4, (bars[bi].count / maxVal) * barMaxW);

        // Background
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.beginPath();
        ctx.roundRect(barStartX, by, barMaxW, barH, 4);
        ctx.fill();

        // Fill
        ctx.fillStyle = bars[bi].color;
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.roundRect(barStartX, by, bw, barH, 4);
        ctx.fill();
        ctx.globalAlpha = 1;

        // Label
        ctx.save();
        ctx.font = 'bold 7px sans-serif';
        ctx.textAlign = 'right';
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.textBaseline = 'middle';
        ctx.fillText(bars[bi].label, barStartX - 5, by + barH / 2);
        ctx.restore();

        // Count
        ctx.save();
        ctx.font = 'bold 7px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillStyle = '#ffffff';
        ctx.textBaseline = 'middle';
        ctx.fillText(bars[bi].count.toString(), barStartX + bw + 5, by + barH / 2);
        ctx.restore();
    }
}

const _levelSelectState = { scrollOffset: 0, page: 0 };
const _levelButtons = {};

function drawLevelSelectScreen(ctx) {
    const T = Date.now();
    drawModernBg(ctx, '#9c27b0', 180);
    // Back button
    _levelButtons.back = { x: 12, y: 16, w: 40, h: 40 };
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.beginPath(); ctx.roundRect(12, 16, 40, 40, 10); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(12, 16, 40, 40, 10); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '500 18px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('\u2190', 32, 36);
    ctx.font = '800 22px sans-serif'; ctx.fillStyle = '#ffffff';
    ctx.fillText('CAMPAIGN', W / 2, 36);
    ctx.textBaseline = 'alphabetic';

    // Progress bar
    const progressPct = Math.min(1, gameState.campaignLevel / 100);
    const barY = 68;
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.beginPath();
    ctx.roundRect(14, barY, W - 28, 8, 4);
    ctx.fill();
    const progressColor = '#FFD700';
    ctx.fillStyle = progressColor;
    ctx.beginPath();
    ctx.roundRect(14, barY, (W - 28) * progressPct, 8, 4);
    ctx.fill();
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Level ' + gameState.campaignLevel + ' / 100  •  ' + gameState.totalStars + ' Stars', W / 2, barY + 22);

    // Level grid (5 columns, 4 rows per page)
    const startLevel = _levelSelectState.page * 20 + 1;
    const endLevel = Math.min(startLevel + 19, 100);
    const gridStartY = 110;
    const cellSize = (W - 28) / 5;
    const cellH = 52;
    let levelIndex = 0;

    for (let lvl = startLevel; lvl <= endLevel; lvl++) {
        const col = (lvl - startLevel) % 5;
        const row = Math.floor((lvl - startLevel) / 5);
        const cellX = 14 + col * cellSize;
        const cellY = gridStartY + row * (cellH + 8);

        const levelConfig = LEVEL_CONFIG[lvl - 1];
        const isUnlocked = lvl <= gameState.campaignLevel;
        const isBoss = levelConfig.isBoss;
        const stars = gameState.levelStars[lvl] || 0;

        _levelButtons['level_' + lvl] = { x: cellX, y: cellY, w: cellSize - 4, h: cellH, level: lvl };

        // Card bg
        if (isBoss) {
            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur = 10;
        }
        ctx.fillStyle = isUnlocked ? (isBoss ? '#FF6B3533' : 'rgba(30,40,70,0.9)') : 'rgba(60,60,80,0.5)';
        ctx.strokeStyle = isBoss ? '#FFD700' : (isUnlocked ? '#4488FF' : 'rgba(255,255,255,0.2)');
        ctx.lineWidth = isBoss ? 2 : 1;
        ctx.beginPath();
        ctx.roundRect(cellX, cellY, cellSize - 4, cellH, 8);
        ctx.fill();
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Level number
        ctx.fillStyle = isUnlocked ? '#ffffff' : 'rgba(255,255,255,0.4)';
        ctx.font = 'bold 13px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        if (isBoss) {
            ctx.fillText('BOSS', cellX + (cellSize - 4) / 2, cellY + 4);
            ctx.font = 'bold 11px sans-serif';
            ctx.fillText('Lv' + lvl, cellX + (cellSize - 4) / 2, cellY + 18);
        } else {
            ctx.fillText('Lv' + lvl, cellX + (cellSize - 4) / 2, cellY + 6);
        }

        // Stars
        if (isUnlocked) {
            ctx.font = '10px sans-serif';
            ctx.fillStyle = '#FFD700';
            let starStr = '';
            for (let s = 0; s < 3; s++) {
                starStr += s < stars ? '★' : '☆';
            }
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText(starStr, cellX + (cellSize - 4) / 2, cellY + cellH - 4);
        } else {
            // Lock icon
            ctx.font = 'bold 16px sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🔒', cellX + (cellSize - 4) / 2, cellY + cellH / 2);
        }
    }

    // Page navigation
    const maxPage = Math.ceil(100 / 20) - 1;
    if (maxPage > 0) {
        const navY = gridStartY + 4 * (cellH + 8) + 20;
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(`Page ${_levelSelectState.page + 1} / ${maxPage + 1}`, W / 2, navY);

        if (_levelSelectState.page > 0) {
            _levelButtons.prevPage = { x: 20, y: navY - 12, w: 40, h: 24 };
            ctx.fillStyle = '#4488FF';
            ctx.fillText('◀ PREV', 40, navY + 2);
        }
        if (_levelSelectState.page < maxPage) {
            _levelButtons.nextPage = { x: W - 60, y: navY - 12, w: 40, h: 24 };
            ctx.fillStyle = '#4488FF';
            ctx.fillText('NEXT ▶', W - 40, navY + 2);
        }
    }

    ctx.textBaseline = 'alphabetic';
}

const _settingsButtons = {};

function drawSettingsScreen(ctx) {
    const T = Date.now();
    drawModernBg(ctx, '#4488ff', 180);
    // Back button
    _settingsButtons.back = { x: 12, y: 16, w: 40, h: 40 };

function handleSettingsTap(x, y) {
    if (hitTest(_settingsButtons.back, x, y)) {
        currentScreen = 'menu';
        return;
    }
    if (hitTest(_settingsButtons.audioToggle, x, y)) {
        audio.muted = !audio.muted;
        gameState.settings.audioMuted = audio.muted;
        gameState.saveToStorage();
        return;
    }
    if (hitTest(_settingsButtons.hapticsToggle, x, y)) {
        gameState.settings.hapticsDisabled = !gameState.settings.hapticsDisabled;
        gameState.saveToStorage();
        return;
    }
    if (hitTest(_settingsButtons.reducedMotionToggle, x, y)) {
        gameState.settings.reducedMotion = !gameState.settings.reducedMotion;
        gameState.saveToStorage();
        return;
    }
    if (hitTest(_settingsButtons.highContrastToggle, x, y)) {
        gameState.settings.highContrast = !gameState.settings.highContrast;
        gameState.saveToStorage();
        return;
    }
    for (const diff of ['easy', 'medium', 'hard', 'legend']) {
        if (hitTest(_settingsButtons['diff_' + diff], x, y)) {
            gameState.settings.difficulty = diff;
            gameState.saveToStorage();
            return;
        }
    }
    if (hitTest(_settingsButtons.reset, x, y)) {
        if (confirm('Are you sure you want to reset all progress? This cannot be undone.')) {
            gameState.resetProgress();
            currentScreen = 'menu';
        }
        return;
    }
    if (hitTest(_settingsButtons.feedback, x, y)) {
        window.open('mailto:' + APP_CONFIG.support + '?subject=' + APP_CONFIG.name + ' v' + APP_CONFIG.version + ' Feedback', '_blank');
        return;
    }
}

function mpSimulateBotDerby(difficulty) {
    const diff = difficulty || 'medium';
    const atBats = BASEBALL_CONFIG[diff]?.atBats || 5;

    const params = {
        easy:   { hrChance: 0.25, targetRange: [0, 2] },
        medium: { hrChance: 0.35, targetRange: [1, 3] },
        hard:   { hrChance: 0.45, targetRange: [2, 3] },
        legend: { hrChance: 0.55, targetRange: [2, 4] },
    };
    const p = params[diff] || params.medium;

    let homeRuns = 0;
    for (let i = 0; i < atBats; i++) {
        if (Math.random() < p.hrChance) homeRuns++;
    }

    homeRuns = Math.max(p.targetRange[0], Math.min(p.targetRange[1], homeRuns));
    homeRuns = Math.min(homeRuns, atBats - 1);

    return { homeRuns, atBats, difficulty: diff };
}

}

// ============================================================================
// Convex Cloud Sync Function
// ============================================================================
async function _syncToConvex(won, score, difficulty, stats, duration) {
    try {
        if (!window._convexClient || !window._convexClient.isRegistered) {
            console.warn('[Convex] Client not ready, skipping sync');
            return;
        }

        // Submit game session
        await window._convexClient.submitSession('basehit', score, difficulty, won, stats, duration);

        // Sync career stats
        const maxDiff = Math.max(
            gameState.bestScoreByDiff.easy || 0,
            gameState.bestScoreByDiff.medium || 0,
            gameState.bestScoreByDiff.hard || 0,
            gameState.bestScoreByDiff.legend || 0
        );

        await window._convexClient.syncPlayerStats({
            totalGamesPlayed: gameState.totalGames || 0,
            totalCoinsEarned: gameState.coins || 0,
            level: gameState.level || 1,
            xp: gameState.xp || 0,
            bestScores: {
                crickbot: 0,
                goalbot: 0,
                basehit: maxDiff || 0,
            },
            basehitStats: {
                totalHRs: gameState.totalHRs || 0,
                totalSwings: gameState.totalSwings || 0,
                totalGoodHits: gameState.totalGoodHits || 0,
                totalFouls: gameState.totalFouls || 0,
                totalStrikes: gameState.totalStrikes || 0,
                bestStreak: gameState.bestStreak || 0,
            },
            crickbotStats: {
                totalRuns: 0, totalFours: 0, totalSixes: 0,
                totalBallsFaced: 0, totalWins: 0, legendWins: 0,
            },
            goalbotStats: {
                totalGoals: 0, totalShots: 0, totalSaves: 0, shotAccuracy: 0,
            },
        });

        // Sync campaign progress
        if (gameState.campaignLevel > 1 || gameState.totalStars > 0) {
            await window._convexClient.syncCampaign(
                'basehit',
                gameState.campaignLevel || 1,
                gameState.totalStars || 0,
                gameState.levelStars || {}
            );
            console.log('[Convex] Campaign synced for basehit');
        }

        console.log('[Convex] Sync complete for basehit game');
    } catch (e) {
        console.warn('[Convex] Sync failed:', e.message);
    }
}

let _endGameCelebrationFired = false; // prevents double celebration on game over screen

function endGame(won) {
    gameState.totalGames++;

    // Trigger VIP popup ONCE after first game completes (if not VIP yet)
    if (gameState.totalGames === 1 && !gameState.vipPopupShown && !gameState.isVIP) {
        _showVIPPopup = true;
        gameState.vipPopupShown = true;
        gameState.saveToStorage();
    }

    _endGameCelebrationFired = false; // reset — will fire on game over screen
    _hrArcActive = false;             // clear HR arc trail so it doesn't show on game-over screen
    _hrArcSurgePowered = false;
    _hrCelebrationPending = false;    // cancel any pending deferred celebration
    if (won) {
        gameState.totalWins++;
        gameState.streak++;
        if (gameState.streak > gameState.bestStreak) gameState.bestStreak = gameState.streak;
        if (currentGame.difficulty === 'legend') gameState._legendWins = (gameState._legendWins || 0) + 1;
        // NOTE: celebration (confetti, fireworks, sound) is DEFERRED to game over screen
        // so the player sees the final at-bat result before the big celebration

        // Award level stars if in campaign mode
        if (currentGame.levelConfig) {
            const levelNum = currentGame.levelConfig.level;
            let stars = 1;
            if (currentGame.bestCombo >= 3) stars = 2;
            if (currentGame.totalStrikeouts === 0) stars = 3;
            if (!gameState.levelStars[levelNum] || gameState.levelStars[levelNum] < stars) {
                gameState.levelStars[levelNum] = stars;
            }
            gameState.totalStars = Object.values(gameState.levelStars).reduce((a, b) => a + b, 0);
            // Unlock next level
            if (levelNum < 100 && !gameState._unlockedLevels) gameState._unlockedLevels = {};
            if (levelNum < 100) gameState._unlockedLevels[levelNum + 1] = true;
            gameState.campaignLevel = Math.max(gameState.campaignLevel, levelNum + 1);
        }
    } else {
        gameState.streak = 0;
        // NOTE: lose sound/shake deferred to game over screen
    }
    gameState.matchHistory.unshift({
        date: new Date().toISOString(),
        won,
        homeRuns: currentGame.homeRuns,
        atBats: currentGame.atBat,
        difficulty: currentGame.difficulty,
        coins: currentGame.coinsEarned,
    });
    if (gameState.matchHistory.length > 10) gameState.matchHistory.pop();

    // === PHASE 7: Update career analytics ===
    if (currentGame && currentGame.statcastLog) {
        for (const h of currentGame.statcastLog) {
            gameState.careerExitVelos.push(h.exitVelo);
            if (gameState.careerExitVelos.length > 100) gameState.careerExitVelos.shift();
            if (h.exitVelo > gameState.careerMaxExitVelo) gameState.careerMaxExitVelo = h.exitVelo;
            if (h.timing === 'perfect') gameState.careerPerfectCount++;
            gameState.careerHitCount++;
        }
        gameState.careerPitchCount += currentGame.atBat;
    }

    gameState.saveToStorage();

    // Sync to Convex Cloud
    const sessionDuration = Math.round((Date.now() - mlDataStore.sessionStart) / 1000);
    const baseballStats = {
        homeRuns: currentGame.homeRuns,
        swings: currentGame.atBat,
        streak: gameState.streak,
        perfectHits: gameState.totalPerfect,
        level: gameState.level
    };
    _syncToConvex(won, currentGame.homeRuns, currentGame.difficulty, baseballStats, sessionDuration);

    // Multiplayer routing
    if (mpIsChaser) {
        _mpResultCelebrationFired = false; // reset so celebration fires on result screen
        const playerHRs = currentGame.homeRuns;
        const opponentHRs = mpTarget;
        if (mpIsBotMatch && window._convexClient) {
            window._convexClient.recordBotMatch(
                'basehit', mpSelectedDifficulty,
                playerHRs, opponentHRs,
                playerHRs > opponentHRs ? 'win' : playerHRs === opponentHRs ? 'draw' : 'loss'
            ).catch(e => console.warn('[MP] Bot match record failed:', e));
        }
        currentScreen = 'mp_result';
        return;
    }

    updateMissions();
    updateAchievements();
    // AI Bot reacts to game outcome
    if (won) {
        AI_BOT.show('playerWinGame');
    } else {
        AI_BOT.show('botWinGame');
    }
    currentScreen = currentGame.levelConfig ? 'campaignResult' : 'gameOver';
}

let _swipeStart = null;

canvas.addEventListener('touchstart',
    e => {
        e.preventDefault();
        const pos = getCanvasPos(e.touches[0]);
        _swipeStart = { x: pos.x, y: pos.y, time: Date.now() };
    },
    { passive: false }
);

canvas.addEventListener('touchend',
    e => {
        e.preventDefault();
        if (!_swipeStart) return;
        const pos = getCanvasPos(e.changedTouches[0]);
        handleSwipeOrTap(pos.x, pos.y, _swipeStart);
        _swipeStart = null;
    },
    { passive: false }
);

canvas.addEventListener('mousedown', e => {
    const pos = getCanvasPos(e);
    _swipeStart = { x: pos.x, y: pos.y, time: Date.now() };
});

canvas.addEventListener('mouseup', e => {
    if (!_swipeStart) return;
    const pos = getCanvasPos(e);
    handleSwipeOrTap(pos.x, pos.y, _swipeStart);
    _swipeStart = null;
});

function handleSwipeOrTap(ex, ey, start) {
    const dx = ex - start.x;
    const dy = ey - start.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const elapsed = Date.now() - start.time;
    const isSwipe = dist > 28 && elapsed < 550;

    if (isSwipe && currentScreen === 'playing' && currentGame && !isPaused && currentGame.pitchState === 'pitching') {
        currentGame.doSwing();
        return;
    }

    handleTap(ex, ey);
}

function handleTap(x, y) {
    audio.play('click');

    // ── VIP popup intercept (blocks all other input) ───────────────────────
    if (_showVIPPopup) {
        // Check if tapped "GET VIP PASS" button
        if (x >= _vipBuyBtn.x && x <= _vipBuyBtn.x + _vipBuyBtn.w &&
            y >= _vipBuyBtn.y && y <= _vipBuyBtn.y + _vipBuyBtn.h) {
            // Trigger VIP purchase (native or web fallback)
            if (window.NativePurchase && typeof window.NativePurchase.buy === 'function') {
                window.NativePurchase.buy('vip_yearly');
            } else {
                // Web fallback - simulate purchase success
                gameState.isVIP = true;
                gameState.saveToStorage();
                _showVIPPopup = false;
                showToast('Welcome to VIP! Enjoy 2x coins & rewards! 👑', '#FFD700', 3);
                audio.play('levelup');
            }
            return;
        }
        // Check if tapped ✕ close button
        if (_vipCloseBtn && x >= _vipCloseBtn.x && x <= _vipCloseBtn.x + _vipCloseBtn.w &&
            y >= _vipCloseBtn.y && y <= _vipCloseBtn.y + _vipCloseBtn.h) {
            _showVIPPopup = false;
            return;
        }
        // Check if tapped "No thanks" dismiss area
        if (x >= _vipDismissBtn.x && x <= _vipDismissBtn.x + _vipDismissBtn.w &&
            y >= _vipDismissBtn.y && y <= _vipDismissBtn.y + _vipDismissBtn.h) {
            _showVIPPopup = false;
            return;
        }
        // Block other taps while VIP popup is open
        return;
    }

    // ── Splash screen — any tap advances to menu ──────────────────────────
    if (currentScreen === 'splash') {
        _splashDone = true;
        currentScreen = 'menu';
        return;
    }

    // ── Daily reward popup intercept ──────────────────────────────────────
    if (_showDailyPopup) {
        const cW = 310, cH = 360;
        const cX = (W - cW) / 2, cY = (H - cH) / 2;
        const btnX = cX + 55, btnY = cY + cH - 58, btnW = 200, btnH = 42;
        if (x >= btnX && x <= btnX + btnW && y >= btnY && y <= btnY + btnH) {
            claimDailyReward();
        } else {
            _showDailyPopup = false; // tap outside = dismiss
        }
        return;
    }

    if (!gameState.tutorialDone && currentScreen === 'menu') {
        advanceTutorial();
        return;
    }

    if (currentScreen === 'menu') {
        if (hitTest(_menuButtons.easy, x, y)) {
            startGame('easy');
            return;
        }
        if (hitTest(_menuButtons.medium, x, y)) {
            startGame('medium');
            return;
        }
        if (hitTest(_menuButtons.hard, x, y)) {
            startGame('hard');
            return;
        }
        if (hitTest(_menuButtons.legend, x, y)) {
            startGame('legend');
            return;
        }
        if (hitTest(_menuButtons.play, x, y)) {
            startGame(gameState.settings.difficulty);
            return;
        }
        if (hitTest(_menuButtons.multiplayer, x, y)) {
            currentScreen = 'multiplayer_lobby';
            mpSearching = false;
            mpState = 'idle';
            return;
        }
        if (hitTest(_menuButtons.levels, x, y)) {
            currentScreen = 'levels';
            _levelSelectState.page = 0;
            return;
        }
        if (hitTest(_menuButtons.shop, x, y)) {
            currentScreen = 'shop';
            return;
        }
        if (hitTest(_menuButtons.achievements, x, y)) {
            currentScreen = 'achievements';
            return;
        }
        if (hitTest(_menuButtons.stats, x, y)) {
            currentScreen = 'stats';
            return;
        }
        if (hitTest(_menuButtons.leaderboard, x, y)) {
            _lbData = null; _lbLoading = true; _lbRank = null; _lbError = null;
            _fetchLeaderboard();
            currentScreen = 'leaderboard';
            return;
        }
        if (hitTest(_menuButtons.settings, x, y)) {
            currentScreen = 'settings';
            return;
        }
        if (hitTest(_menuButtons.daily, x, y)) {
            _showDailyPopup = true;
            return;
        }
    } else if (currentScreen === 'playing') {
        if (x > W - 38 && y < 30) {
            isPaused = true;
            currentScreen = 'pauseOverlay';
            return;
        }
        // Surge button tap — activate surge for next swing
        if (hitTestSurgeButton(x, y) && getActivePowerShot() && !_surgeActivated) {
            activateSurge();
            return;
        }
        // === PHASE 2: Stance toggle tap ===
        if (currentGame && !isPaused) {
            const stX = W - 45, stY = H - 110, stR = 30;
            const sdx = x - stX, sdy = y - stY;
            if (sdx * sdx + sdy * sdy <= stR * stR) {
                currentGame.battingStance = currentGame.battingStance === 'contact' ? 'power' : 'contact';
                audio.play('click');
                return;
            }
        }
    } else if (currentScreen === 'pauseOverlay') {
        if (hitTest(_pauseButtons.resume, x, y)) {
            isPaused = false;
            currentScreen = 'playing';
            return;
        }
        if (hitTest(_pauseButtons.menu, x, y)) {
            isPaused = false;
            currentScreen = 'menu';
            return;
        }
    } else if (currentScreen === 'gameOver') {
        if (hitTest(_gameOverButtons.playAgain, x, y)) {
            startGame(currentGame.difficulty);
            return;
        }
        if (hitTest(_gameOverButtons.menu, x, y)) {
            currentScreen = 'menu';
            return;
        }
        if (_gameOverButtons.continue && hitTest(_gameOverButtons.continue, x, y)) {
            const continueCost = Math.round(50 * Math.pow(2, _continueCount));
            if (gameState.coins >= continueCost && _continueCount < 3) {
                gameState.spendCoins(continueCost);
                _continueCount++;
                currentGame.maxAtBats += 3;
                currentGame.atBatOver = false;
                currentGame.atBat++;
                currentGame.strikes = 0;
                currentGame.ballCount = 0;
                currentGame.resetAtBat();
                gameState.saveToStorage();
                audio.play('levelup');
                showToast('Continued! +3 at-bats', '#9C27B0', 2);
                currentScreen = 'playing';
                currentGame.startWindup();
            }
            return;
        }
    } else if (currentScreen === 'campaignResult') {
        const levelNum = currentGame && currentGame.levelConfig ? currentGame.levelConfig.level : 1;
        if (hitTest(_crButtons.retry, x, y)) {
            audio.play('click');
            startLevelGame(levelNum);
            return;
        }
        if (_crButtons.hasNext && hitTest(_crButtons.next, x, y)) {
            audio.play('click');
            startLevelGame(levelNum + 1);
            return;
        }
        if (hitTest(_crButtons.levels, x, y)) {
            audio.play('click');
            currentScreen = 'levels';
            _levelSelectState.page = 0;
            return;
        }
    } else if (currentScreen === 'shop') {
        handleShopTap(x, y);
    } else if (currentScreen === 'achievements') {
        if (x < 55 && y < 70) {
            currentScreen = 'menu';
            return;
        }
    } else if (currentScreen === 'stats') {
        if (x < 55 && y < 70) {
            currentScreen = 'menu';
            return;
        }
    } else if (currentScreen === 'leaderboard') {
        if (x < 55 && y < 70) {
            currentScreen = 'menu';
            return;
        }
    } else if (currentScreen === 'settings') {
        handleSettingsTap(x, y);
    } else if (currentScreen === 'levels') {
        if (hitTest(_levelButtons.back, x, y)) {
            currentScreen = 'menu';
            return;
        }
        if (hitTest(_levelButtons.prevPage, x, y)) {
            if (_levelSelectState.page > 0) {
                _levelSelectState.page--;
            }
            return;
        }
        if (hitTest(_levelButtons.nextPage, x, y)) {
            const maxPage = Math.ceil(100 / 20) - 1;
            if (_levelSelectState.page < maxPage) {
                _levelSelectState.page++;
            }
            return;
        }
        for (let i = 1; i <= 100; i++) {
            const btn = _levelButtons['level_' + i];
            if (btn && hitTest(btn, x, y)) {
                if (i <= gameState.campaignLevel) {
                    startLevelGame(i);
                }
                return;
            }
        }
    } else if (currentScreen === 'multiplayer_lobby') {
        updateMultiplayerLobby(x, y);
    } else if (currentScreen === 'mp_create_room') {
        if (hitTest(_mpLobbyButtons.crBack, x, y)) {
            currentScreen = 'multiplayer_lobby';
            mpPrivateRoomId = null;
            mpPrivateRoomCode = '';
            if (mpPrivatePolling) { clearInterval(mpPrivatePolling); mpPrivatePolling = null; }
            audio.play('click');
            return;
        }
        if (hitTest(_mpLobbyButtons.crCancel, x, y)) {
            currentScreen = 'multiplayer_lobby';
            mpPrivateRoomId = null;
            mpPrivateRoomCode = '';
            if (mpPrivatePolling) { clearInterval(mpPrivatePolling); mpPrivatePolling = null; }
            audio.play('click');
            return;
        }
    } else if (currentScreen === 'mp_join_room') {
        updateMpJoinRoom(x, y);
    } else if (currentScreen === 'mp_result') {
        if (hitTest(_mpResultButtons.playAgain, x, y)) {
            mpReset();
            currentScreen = 'multiplayer_lobby';
            mpSearching = false;
            audio.play('click');
            return;
        }
        if (hitTest(_mpResultButtons.menu, x, y)) {
            mpReset();
            currentScreen = 'menu';
            audio.play('click');
            return;
        }
    }
}

function drawSplashScreen(ctx, dt) {
    _splashTimer += dt;
    _splashArcAngle += dt * 0.9;
    const T = _splashTimer;
    const fadeIn  = Math.min(1, T / 0.8);
    const tapPulse = 0.55 + 0.45 * Math.sin(T * 3.5);

    // ── Deep space-blue sky gradient ─────────────────────────────────────
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0,   '#020612');
    bgGrad.addColorStop(0.35,'#050e28');
    bgGrad.addColorStop(0.65,'#0a1a3a');
    bgGrad.addColorStop(1,   '#0d2244');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    ctx.globalAlpha = fadeIn;

    // ── Twinkling star field ──────────────────────────────────────────────
    for (let s of _splashStars) {
        s.twinkle += dt * (1.2 + Math.random() * 0.5);
        const a = s.alpha * (0.4 + 0.6 * Math.abs(Math.sin(s.twinkle)));
        ctx.globalAlpha = a * fadeIn;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = fadeIn;

    // ── Stadium silhouette bottom panorama ───────────────────────────────
    ctx.save();
    const stadGrad = ctx.createLinearGradient(0, H - 200, 0, H);
    stadGrad.addColorStop(0, 'rgba(8,20,52,0)');
    stadGrad.addColorStop(0.3, '#061228');
    stadGrad.addColorStop(1, '#030810');
    ctx.fillStyle = stadGrad;
    // Curved upper-deck stands
    ctx.beginPath();
    ctx.moveTo(0, H - 140);
    for (let i = 0; i <= 40; i++) {
        const sx = (i / 40) * W;
        const sy = H - 140 - 30 * Math.sin((i / 40) * Math.PI) + 10 * Math.sin((i / 40) * Math.PI * 5);
        if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
    }
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fill();

    // Stadium light towers
    const towerPositions = [28, 115, W - 115, W - 28];
    towerPositions.forEach((tx) => {
        const tBase = H - 145;
        const tTop  = H - 320;
        // Tower pole
        ctx.fillStyle = '#1a2744';
        ctx.fillRect(tx - 4, tTop, 8, tBase - tTop);
        // Light cluster
        ctx.fillStyle = '#2a3a66';
        ctx.fillRect(tx - 14, tTop - 10, 28, 16);
        // Glowing lights
        for (let li = -1; li <= 1; li++) {
            const lx = tx + li * 8;
            const ly = tTop - 4;
            const lGrad = ctx.createRadialGradient(lx, ly, 0, lx, ly, 50);
            const flicker = 0.6 + 0.4 * Math.sin(T * 7 + tx + li);
            lGrad.addColorStop(0, `rgba(255,245,180,${0.9 * flicker})`);
            lGrad.addColorStop(0.08, `rgba(255,230,100,${0.4 * flicker})`);
            lGrad.addColorStop(0.3, `rgba(255,200,60,${0.12 * flicker})`);
            lGrad.addColorStop(1, 'rgba(255,200,60,0)');
            ctx.fillStyle = lGrad;
            ctx.beginPath();
            ctx.arc(lx, ly, 50, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = `rgba(255,250,220,${flicker})`;
            ctx.beginPath();
            ctx.arc(lx, ly, 3, 0, Math.PI * 2);
            ctx.fill();
        }
    });
    ctx.restore();

    // ── Crowd silhouettes in stands ───────────────────────────────────────
    ctx.save();
    const rowY = [H - 155, H - 175, H - 195];
    const rowColors = ['#1c2f5a','#182748','#142040'];
    for (let r = 0; r < 3; r++) {
        const ry = rowY[r];
        for (let ci = 0; ci < 32; ci++) {
            const cx2 = (ci / 32) * W + (r % 2 === 0 ? 6 : 0);
            const cheer = Math.sin(T * 2.4 + ci * 0.6 + r * 1.2);
            const headY  = ry - 10 - (cheer > 0.5 ? cheer * 8 : 0);
            ctx.fillStyle = rowColors[r];
            ctx.globalAlpha = 0.7 * fadeIn;
            // body
            ctx.beginPath();
            ctx.ellipse(cx2, ry, 5, 7, 0, 0, Math.PI * 2);
            ctx.fill();
            // head
            ctx.beginPath();
            ctx.arc(cx2, headY - 3, 4, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    ctx.restore();

    ctx.globalAlpha = fadeIn;

    // ── Central baseball spinning ─────────────────────────────────────────
    const cx = W / 2;
    const cy = H * 0.42;
    const ballR = 62;
    // Outer glow ring
    for (let gr = 3; gr >= 1; gr--) {
        const rg = ballR + gr * 22;
        const glowGrad = ctx.createRadialGradient(cx, cy, ballR - 5, cx, cy, rg);
        glowGrad.addColorStop(0, `rgba(255,160,0,${0.18 / gr})`);
        glowGrad.addColorStop(1, 'rgba(255,100,0,0)');
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.arc(cx, cy, rg, 0, Math.PI * 2);
        ctx.fill();
    }
    // Orbit dots
    const orbitR = ballR + 30;
    for (let oi = 0; oi < 8; oi++) {
        const angle = _splashArcAngle + (oi / 8) * Math.PI * 2;
        const ox = cx + Math.cos(angle) * orbitR;
        const oy = cy + Math.sin(angle) * orbitR * 0.38;
        const orbitAlpha = 0.4 + 0.5 * Math.sin(angle + T);
        ctx.globalAlpha = orbitAlpha * fadeIn;
        ctx.fillStyle = oi % 2 === 0 ? '#ffd700' : '#ff8c00';
        ctx.beginPath();
        ctx.arc(ox, oy, 3 + (oi % 2), 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = fadeIn;

    // Ball shadow
    const shadowGrad = ctx.createRadialGradient(cx + 8, cy + ballR - 4, 0, cx + 8, cy + ballR, ballR * 0.7);
    shadowGrad.addColorStop(0, 'rgba(0,0,0,0.45)');
    shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = shadowGrad;
    ctx.beginPath();
    ctx.ellipse(cx + 6, cy + ballR - 8, ballR * 0.8, ballR * 0.22, 0, 0, Math.PI * 2);
    ctx.fill();

    // Ball base — white sphere with shading
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, ballR, 0, Math.PI * 2);
    const ballGrad = ctx.createRadialGradient(cx - 18, cy - 18, 4, cx, cy, ballR);
    ballGrad.addColorStop(0,   '#ffffff');
    ballGrad.addColorStop(0.4, '#f5f0e8');
    ballGrad.addColorStop(1,   '#d4c9a8');
    ctx.fillStyle = ballGrad;
    ctx.fill();

    // Stitching (rotate with time)
    ctx.clip();
    const stitchAngle = T * 1.4;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(stitchAngle);
    ctx.strokeStyle = '#cc3333';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    for (let side of [-1, 1]) {
        ctx.beginPath();
        for (let i = 0; i <= 20; i++) {
            const a = (i / 20 - 0.5) * Math.PI * 0.9;
            const r2 = ballR * 0.72;
            const sx = side * (r2 * Math.sin(a) + 10);
            const sy = r2 * 0.55 * Math.cos(a) - r2 * 0.1;
            if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        }
        ctx.stroke();
        for (let i = 0; i <= 8; i++) {
            const a = (i / 8 - 0.5) * Math.PI * 0.85;
            const r2 = ballR * 0.72;
            const sx0 = side * (r2 * Math.sin(a) + 10);
            const sy0 = r2 * 0.55 * Math.cos(a) - r2 * 0.1;
            const nx = sx0 + side * 8;
            const ny = sy0 + (i % 2 === 0 ? -5 : 5);
            ctx.beginPath();
            ctx.moveTo(sx0, sy0);
            ctx.lineTo(nx, ny);
            ctx.stroke();
        }
    }
    ctx.restore();
    ctx.restore();

    // Ball specular highlight
    const specGrad = ctx.createRadialGradient(cx - 22, cy - 20, 0, cx - 14, cy - 12, ballR * 0.5);
    specGrad.addColorStop(0, 'rgba(255,255,255,0.7)');
    specGrad.addColorStop(0.4, 'rgba(255,255,255,0.15)');
    specGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = specGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, ballR, 0, Math.PI * 2);
    ctx.fill();

    // ── BASEBALL AI title ─────────────────────────────────────────────────────
    const titleY = cy - ballR - 42;
    ctx.save();

    // Shadow layers
    ctx.font = 'bold 44px sans-serif';
    ctx.textAlign = 'center';
    for (let sh = 0; sh < 6; sh++) {
        ctx.globalAlpha = (0.12 - sh * 0.018) * fadeIn;
        ctx.fillStyle = '#ff4400';
        ctx.fillText('BASEBALL AI', cx + sh, titleY + sh);
    }
    // Orange glow
    ctx.globalAlpha = 0.35 * fadeIn;
    ctx.shadowColor = '#ff8800';
    ctx.shadowBlur = 40;
    ctx.fillStyle = '#ff8800';
    ctx.fillText('BASEBALL AI', cx, titleY);
    ctx.shadowBlur = 0;
    // Gold fill
    ctx.globalAlpha = fadeIn;
    const titleGrad = ctx.createLinearGradient(cx - 120, titleY - 44, cx + 120, titleY + 4);
    titleGrad.addColorStop(0,   '#fff0a0');
    titleGrad.addColorStop(0.3, '#ffd700');
    titleGrad.addColorStop(0.6, '#ff9900');
    titleGrad.addColorStop(1,   '#ffe066');
    ctx.fillStyle = titleGrad;
    ctx.fillText('BASEBALL AI', cx, titleY);
    ctx.restore();

    // ── Tagline ───────────────────────────────────────────────────────────
    ctx.save();
    ctx.globalAlpha = Math.min(1, (T - 0.4) / 0.6) * fadeIn;
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#aac4ff';
    ctx.letterSpacing = '4px';
    ctx.fillText('HOME RUN CHALLENGE', cx, titleY + 28);
    ctx.restore();

    // ── Floating mini baseballs in background ─────────────────────────────
    for (const bp of _splashBalls) {
        bp.x  += bp.vx * dt * 0.06;
        bp.y  += bp.vy * dt * 0.06;
        bp.rot += bp.rotSpeed * dt;
        bp.phase += dt;
        if (bp.y + bp.r < -10) bp.y = H + bp.r;
        if (bp.x < -bp.r) bp.x = W + bp.r;
        if (bp.x > W + bp.r) bp.x = -bp.r;

        ctx.save();
        ctx.globalAlpha = bp.alpha * fadeIn * (0.6 + 0.4 * Math.sin(bp.phase));
        ctx.translate(bp.x, bp.y);
        ctx.rotate(bp.rot);
        ctx.beginPath();
        ctx.arc(0, 0, bp.r, 0, Math.PI * 2);
        const mbg = ctx.createRadialGradient(-bp.r * 0.3, -bp.r * 0.3, 0, 0, 0, bp.r);
        mbg.addColorStop(0, '#ffffff');
        mbg.addColorStop(1, '#ddd0aa');
        ctx.fillStyle = mbg;
        ctx.fill();
        ctx.strokeStyle = '#cc2222';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(0, 0, bp.r * 0.7, -0.6, 0.6);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, 0, bp.r * 0.7, Math.PI - 0.6, Math.PI + 0.6);
        ctx.stroke();
        ctx.restore();
    }
    ctx.globalAlpha = fadeIn;

    // ── Bottom "TAP TO PLAY" prompt ───────────────────────────────────────
    const tapVisible = Math.max(0, (T - 1.0) / 0.6);
    if (tapVisible > 0) {
        ctx.save();
        ctx.globalAlpha = tapVisible * tapPulse * fadeIn;
        // Pill background
        const px = cx - 110, py = H - 108, pw = 220, ph = 48;
        const pillGrad = ctx.createLinearGradient(px, py, px, py + ph);
        pillGrad.addColorStop(0, 'rgba(255,160,0,0.22)');
        pillGrad.addColorStop(1, 'rgba(255,80,0,0.10)');
        ctx.fillStyle = pillGrad;
        ctx.beginPath();
        ctx.roundRect(px, py, pw, ph, ph / 2);
        ctx.fill();
        ctx.strokeStyle = `rgba(255,180,0,${0.6 * tapPulse})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Text
        ctx.globalAlpha = tapVisible * fadeIn;
        ctx.font = 'bold 20px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ffffff';
        ctx.shadowColor = '#ff9900';
        ctx.shadowBlur = 12;
        ctx.fillText('TAP TO PLAY ▶', cx, py + 31);
        ctx.shadowBlur = 0;
        ctx.restore();
    }

    // ── Version / build tag ───────────────────────────────────────────────
    ctx.save();
    ctx.globalAlpha = 0.25 * fadeIn;
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#8899cc';
    ctx.fillText('⚾ SEASON 2025', cx, H - 22);
    ctx.restore();

    ctx.globalAlpha = 1;

    // Auto-advance after 4 seconds
    if (T >= 4.0 && !_splashDone) {
        _splashDone = true;
        currentScreen = 'menu';
    }
}

        titleGrad.addColorStop(0.5, '#b2ebf2');
        titleGrad.addColorStop(1, '#00bcd4');

        ctx.textBaseline = 'alphabetic';

        ctx.fillStyle = 'rgba(255,255,255,0.35)';

            ctx.fillStyle = '#00bcd4';

            ctx.textBaseline = 'middle';

        qmGrad.addColorStop(1, '#0097a7');
        ctx.fillStyle = qmGrad;
        ctx.shadowColor = 'rgba(0,188,212,0.3)';
        ctx.shadowBlur = 16;
        ctx.beginPath();
        ctx.roundRect(24, btnY, btnW2, btnH2, 12);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.font = '700 12px sans-serif';
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('QUICK MATCH', 24 + btnW2 / 2, btnY + btnH2 / 2);

        // Private Room
        const prX = W / 2 + 4;
        _mpLobbyButtons.privateRoom = { x: prX, y: btnY, w: btnW2, h: btnH2 };

        ctx.beginPath();
        ctx.roundRect(prX, btnY, btnW2, btnH2, 12);
        ctx.fill();
        ctx.strokeStyle = 'rgba(156,39,176,0.4)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(prX, btnY, btnW2, btnH2, 12);
        ctx.stroke();

        ctx.font = '700 12px sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.6)';

        // ── Stats row at bottom ──
        const statY = 400;

        const mpLosses = gameState.mpLosses || 0;
        const mpTotal = mpWins + mpLosses;

        ctx.font = '400 10px sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(mpWins + 'W  ' + mpLosses + 'L' + (mpTotal > 0 ? '  \u00b7  ' + winRate + '% win rate' : ''), W / 2, statY);

        ctx.restore();
    } else {
        // ════════════════════════════════════════════════════════════════
        // SEARCHING — modern spinner with status
        // ════════════════════════════════════════════════════════════════
        ctx.save();
        const searchTime = (Date.now() - mpSearchStartTime) / 1000;
        const centerY = H / 2 - 60;

        // ── Pulsing ring animation ──
        const ringR = 50;
        const pulse = 0.7 + 0.3 * Math.sin(T / 600);

        // Outer glow ring
        ctx.globalAlpha = 0.08 * pulse;
        ctx.strokeStyle = '#00bcd4';
        ctx.lineWidth = 20;
        ctx.beginPath();
        ctx.arc(W / 2, centerY, ringR + 10, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;

        // Background ring
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(W / 2, centerY, ringR, 0, Math.PI * 2);
        ctx.stroke();

        // Spinning arc
        const spinAngle = (T / 800) % (Math.PI * 2);
        const arcGrad = ctx.createLinearGradient(
            W / 2 + Math.cos(spinAngle) * ringR,
            centerY + Math.sin(spinAngle) * ringR,
            W / 2 + Math.cos(spinAngle + Math.PI) * ringR,
            centerY + Math.sin(spinAngle + Math.PI) * ringR
        );
        arcGrad.addColorStop(0, '#00bcd4');
        arcGrad.addColorStop(1, 'rgba(0,188,212,0.1)');
        ctx.strokeStyle = arcGrad;
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.arc(W / 2, centerY, ringR, spinAngle, spinAngle + Math.PI * 1.2);
        ctx.stroke();

        // Center icon
        ctx.font = '400 24px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fillText('\u26be', W / 2, centerY);

        // ── Status text ──
        ctx.font = '700 18px sans-serif';
        ctx.fillStyle = '#ffffff';
        ctx.textBaseline = 'top';
        ctx.fillText('Finding Opponent', W / 2, centerY + ringR + 28);

        // Phase message
        let phaseMsg = 'Searching nearby...';
        let phaseColor = 'rgba(255,255,255,0.35)';
        if (searchTime > 25) { phaseMsg = 'Matching with AI bot...'; phaseColor = '#ff9800'; }
        else if (searchTime > 15) { phaseMsg = 'Widening search...'; phaseColor = 'rgba(255,255,255,0.4)'; }
        else if (searchTime > 5) { phaseMsg = 'Expanding range...'; phaseColor = 'rgba(255,255,255,0.38)'; }

        ctx.font = '400 12px sans-serif';
        ctx.fillStyle = phaseColor;
        ctx.fillText(phaseMsg, W / 2, centerY + ringR + 54);

        // Elapsed dots (subtle)
        const elapsed = Math.floor(searchTime);
        const dots = '.'.repeat((elapsed % 3) + 1);
        ctx.font = '400 11px sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillText(elapsed + 's' + dots, W / 2, centerY + ringR + 76);

        // ── Cancel button ──
        const cancelW = 140, cancelH = 42;
        const cancelX = W / 2 - cancelW / 2, cancelY2 = centerY + ringR + 110;
        _mpLobbyButtons.cancel = { x: cancelX, y: cancelY2, w: cancelW, h: cancelH };

        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.beginPath();
        ctx.roundRect(cancelX, cancelY2, cancelW, cancelH, 10);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(cancelX, cancelY2, cancelW, cancelH, 10);
        ctx.stroke();

        ctx.font = '600 12px sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('CANCEL', W / 2, cancelY2 + cancelH / 2);

        ctx.restore();
    }
}

function updateMultiplayerLobby(x, y) {
    if (!mpSearching) {
        // Back
        if (hitTest(_mpLobbyButtons.back, x, y)) {
            currentScreen = 'menu';
            mpReset();
            return;
        }

        // Difficulty selection
        for (const diff of ['easy', 'medium', 'hard', 'legend']) {
            if (hitTest(_mpLobbyButtons['diff_' + diff], x, y)) {
                mpSelectedDifficulty = diff;
                audio.play('click');
                return;
            }
        }

        // Quick Match
        if (hitTest(_mpLobbyButtons.quickMatch, x, y)) {
            mpSearching = true;
            mpSearchStartTime = Date.now();
            audio.play('click');

            // Set timeout for bot match
            if (mpBotTimeoutId) clearTimeout(mpBotTimeoutId);
            mpBotTimeoutId = setTimeout(() => {
                mpStartBotMatch();
            }, MP_BOT_TIMEOUT_MS);
            return;
        }

        // Private Room
        if (hitTest(_mpLobbyButtons.privateRoom, x, y)) {
            currentScreen = 'mp_create_room';
            audio.play('click');
            return;
        }
    } else {
        // Cancel search
        if (hitTest(_mpLobbyButtons.cancel, x, y)) {
            mpSearching = false;
            if (mpBotTimeoutId) { clearTimeout(mpBotTimeoutId); mpBotTimeoutId = null; }
            audio.play('click');
            return;
        }
    }
}

function updateMpJoinRoom(x, y) {
    // Back
    if (hitTest(_mpLobbyButtons.jrBack, x, y)) {
        currentScreen = 'multiplayer_lobby';
        mpJoinCode = ['', '', '', ''];
        mpJoinCodeIdx = 0;
        mpJoinError = '';
        audio.play('click');
        return;
    }

    // Keyboard input
    for (const key of ['1', '2', '3', '4', '5', '6', '7', '8', '9', '0',
                       'A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J']) {
        if (hitTest(_mpLobbyButtons['key_' + key], x, y)) {
            if (mpJoinCodeIdx < 4) {
                mpJoinCode[mpJoinCodeIdx] = key;
                mpJoinCodeIdx++;
                mpJoinError = '';
                audio.play('click');
            }
            return;
        }
    }

    // Backspace
    if (hitTest(_mpLobbyButtons.jr_backspace, x, y)) {
        if (mpJoinCodeIdx > 0) {
            mpJoinCodeIdx--;
            mpJoinCode[mpJoinCodeIdx] = '';
        }
        audio.play('click');
        return;
    }

    // Join
    if (hitTest(_mpLobbyButtons.jr_join, x, y)) {
        const code = mpJoinCode.join('');
        if (code.length === 4) {
            // Try to join the room
            if (window._convexClient) {
                window._convexClient.joinPrivateRoom(code)
                    .then(result => {
                        if (result && result._id) {
                            mpPrivateRoomId = result._id;
                            // Start bot match simulation
                            mpIsBotMatch = true;
                            mpIsChaser = true;
                            const botResult = mpSimulateBotDerby(mpSelectedDifficulty);
                            mpOpponentData = botResult;
                            mpTarget = botResult.homeRuns;
                            startMultiplayerGame(mpSelectedDifficulty);
                        } else {
                            mpJoinError = 'Room not found';
                        }
                    })
                    .catch(e => {
                        mpJoinError = 'Invalid code';
                        console.warn('[MP] Join failed:', e);
                    });
            } else {
                mpJoinError = 'Not connected';
            }
        } else {
            mpJoinError = 'Enter 4-digit code';
        }
        audio.play('click');
        return;
    }
}

function drawMpTargetHUD(ctx) {
    const barY = 38;
    const barHeight = 36;

    // Semi-transparent gradient bar
    const barGrad = ctx.createLinearGradient(0, barY, 0, barY + barHeight);
    barGrad.addColorStop(0, 'rgba(0, 20, 40, 0.75)');
    barGrad.addColorStop(1, 'rgba(0, 10, 20, 0.65)');
    ctx.fillStyle = barGrad;
    ctx.fillRect(0, barY, W, barHeight);

    // Accent border
    ctx.strokeStyle = 'rgba(0, 188, 212, 0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, barY + barHeight);
    ctx.lineTo(W, barY + barHeight);
    ctx.stroke();

    const playerHRs = currentGame.homeRuns;
    const opponentHRs = mpTarget;
    const atBat = currentGame.atBat;
    const maxAB = currentGame.maxAtBats;
    let statusText = '';
    let statusColor = '#FFB3BA';

    if (playerHRs > opponentHRs) {
        statusText = '🔥 WINNING!';
        statusColor = '#4CAF50';
    } else if (playerHRs === opponentHRs) {
        if (opponentHRs === 0 && atBat === 0) {
            statusText = '⚾ Hit 1 HR to lead!';
            statusColor = '#00BCD4';
        } else {
            statusText = '⚡ TIED — need 1 more!';
            statusColor = '#FFD700';
        }
    } else {
        const need = opponentHRs - playerHRs + 1; // need to BEAT, not match
        statusText = 'Need ' + need + ' HR' + (need !== 1 ? 's' : '') + ' to win';
        statusColor = '#FF9999';
    }

    // Left: target info
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('TARGET: ' + opponentHRs + ' HR' + (opponentHRs !== 1 ? 's' : ''), 8, barY + 12);

    // Left bottom: status
    ctx.fillStyle = statusColor;
    ctx.font = 'bold 10px sans-serif';
    ctx.fillText(statusText, 8, barY + 26);

    // Right: player score + at-bat progress
    ctx.fillStyle = '#00BCD4';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('HR: ' + playerHRs, W - 8, barY + 12);

    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '10px sans-serif';
    ctx.fillText('At-Bat ' + Math.min(atBat + 1, maxAB) + '/' + maxAB + '  •  ' + mpSelectedDifficulty.toUpperCase(), W - 8, barY + 26);
}

function gameLoop() {
    // Schedule next frame FIRST so loop never dies even if drawing throws
    requestAnimationFrame(gameLoop);

    const now = Date.now();
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;

    // Reset critical canvas state at the top of every frame
    ctx.globalAlpha = 1;
    ctx.resetTransform();
    ctx.shadowBlur = 0;

    updateToasts(dt);
    if (_commentaryTimer > 0) _commentaryTimer -= dt;

    ctx.fillStyle = '#080818';
    ctx.fillRect(0, 0, W, H);

    switch (currentScreen) {
        case 'splash':
            drawSplashScreen(ctx, dt);
            break;
        case 'menu':
            drawMenuScreen(ctx);
            if (!gameState.tutorialDone) drawTutorialOverlay(ctx);
            if (_showDailyPopup) drawDailyRewardPopup(ctx);
            break;
        case 'playing':
            if (currentGame && !isPaused) currentGame.update(dt);
            // Only draw playing state if endGame() didn't switch screens
            if (currentGame && currentScreen === 'playing') currentGame.draw(ctx);
            if (mpIsChaser && currentGame && currentScreen === 'playing') {
                drawMpTargetHUD(ctx);
            }
            break;
        case 'pauseOverlay':
            drawPauseOverlay(ctx);
            break;
        case 'gameOver':
            // Fire celebration ONCE when game over screen first appears
            // Skip big burst if deferred HR celebration already fired (prevents double)
            if (!_endGameCelebrationFired && currentGame && currentGame.homeRuns >= 1) {
                _endGameCelebrationFired = true;
                audio.play('win');
                Haptics.pulse('homerun');
                // Only spawn small confetti burst here — deferred HR already did the big one
                if (!_hrCelebrationFired) {
                    spawnConfetti(80);
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => spawnFirework(Math.random() * W, 80 + Math.random() * (H * 0.40)), i * 400);
                    }
                }
            }
            if (!_endGameCelebrationFired && currentGame && currentGame.homeRuns < 1) {
                _endGameCelebrationFired = true;
                audio.play('lose');
                camera.triggerShake(6, 0.3);
                Haptics.pulse('error');
            }
            updateCelebration(dt);
            // Gentle ambient fireworks (less frequent, smaller)
            if (currentGame && currentGame.homeRuns >= 1) {
                _fireworkTimer += dt;
                if (_fireworkTimer > 2.5) {
                    _fireworkTimer = 0;
                    spawnFirework(Math.random() * W, 80 + Math.random() * 160);
                }
            }
            drawGameOverScreen(ctx);
            break;
        case 'campaignResult':
            updateCelebration(dt);
            drawCampaignResultScreen(ctx);
            break;
        case 'shop':
            drawShopScreen(ctx);
            break;
        case 'achievements':
            drawAchievementsScreen(ctx);
            break;
        case 'stats':
            drawStatsScreen(ctx);
            break;
        case 'leaderboard':
            drawLeaderboardScreen(ctx);
            break;
        case 'settings':
            drawSettingsScreen(ctx);
            break;
        case 'levels':
            drawLevelSelectScreen(ctx);
            break;
        case 'multiplayer_lobby':
            drawMultiplayerLobby(ctx);
            break;
        case 'mp_create_room':
            drawMpCreateRoom(ctx);
            break;
        case 'mp_join_room':
            drawMpJoinRoom(ctx);
            break;
        case 'mp_result':
            updateCelebration(dt);
            drawMpResultScreen(ctx);
            break;
    }

    drawVIPPopup(ctx);
    drawToasts(ctx);
    // Note: requestAnimationFrame(gameLoop) is called at the TOP of gameLoop()
}

        get playerId() { return this._playerId; }
        get isRegistered() { return this._playerId !== null; }

        async _mutation(path, args) {
            const res = await fetch(this._url + '/api/mutation', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path, args }),
            });
            if (!res.ok) throw new Error(await res.text());
            return (await res.json()).value;
        }
        async _query(path, args) {
            const res = await fetch(this._url + '/api/query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path, args: args || {} }),
            });
            if (!res.ok) throw new Error(await res.text());
            return (await res.json()).value;
        }

        async registerPlayer(name) {
            const id = await this._mutation('players:registerPlayer', { name });
            this._playerId = id;
            try { localStorage.setItem('convex_player_id', id); } catch(e) {}
            return id;
        }
        async getOrRegisterPlayer(name) {
            // If we have a cached ID, validate it still exists on this deployment
            if (this._playerId) {
                try {
                    const player = await this._query('players:getPlayer', { playerId: this._playerId });
                    if (player) return this._playerId;
                } catch(e) {
                    console.warn('[Convex] Cached player ID invalid, re-registering...');
                }
                this._playerId = null;
                try { localStorage.removeItem('convex_player_id'); } catch(e) {}
            }
            const existing = await this._query('players:getPlayerByName', { name });
            if (existing) {
                this._playerId = existing._id;
                try { localStorage.setItem('convex_player_id', existing._id); } catch(e) {}
                return existing._id;
            }
            return this.registerPlayer(name);
        }
        async submitSession(game, score, difficulty, won, stats, duration) {
            if (!this._playerId) return null;
            const args = { playerId: this._playerId, game, score, difficulty, won, stats };
            if (duration != null && Number.isFinite(duration)) args.duration = duration;
            return this._mutation('sessions:submitGameSession', args);
        }
        async getLeaderboard(game, limit) {
            return this._query('leaderboard:getLeaderboard', { game, limit: limit || 10 });
        }
        async getPlayerRank(game) {
            if (!this._playerId) return null;
            return this._query('leaderboard:getPlayerRank', { playerId: this._playerId, game });
        }
        async syncPlayerStats(payload) {
            if (!this._playerId) return null;
            return this._mutation('players:updatePlayerStats', {
                playerId: this._playerId, ...payload,
            });
        }
        async unlockAchievement(achievementId, game) {
            if (!this._playerId) return null;
            return this._mutation('achievements:unlockAchievement', {
                playerId: this._playerId, achievementId, game,
            });
        }
        async syncCampaign(game, currentLevel, totalStars, levelStars) {
            if (!this._playerId) return null;
            return this._mutation('campaign:syncCampaign', {
                playerId: this._playerId, game, currentLevel, totalStars, levelStars,
            });
        }
        async joinMatchmaking(game, difficulty) {
            if (!this._playerId) return null;
            return this._mutation('multiplayer:joinQueue', { playerId: this._playerId, game, difficulty });
        }
        async checkQueue(game) {
            if (!this._playerId) return null;
            return this._query('multiplayer:checkQueue', { playerId: this._playerId, game });
        }
        async leaveQueue(playerName) {
            return this._mutation('multiplayer:leaveQueue', { playerName });
        }
        async getRoom(roomId) {
            return this._query('multiplayer:getRoom', { roomId });
        }
        async recordBotMatch(game, difficulty, playerScore, botScore, result) {
            if (!this._playerId) return null;
            return this._mutation('multiplayer:recordBotMatch', {
                playerId: this._playerId, game, difficulty, playerScore, botScore, result
            });
        }
        async createPrivateRoom(game, difficulty) {
            if (!this._playerId) return null;
            return this._mutation('multiplayer:createPrivateRoom', {
                playerId: this._playerId, game, difficulty
            });
        }
        async joinPrivateRoom(code) {
            if (!this._playerId) return null;
            return this._mutation('multiplayer:joinPrivateRoom', {
                playerId: this._playerId, code
            });
        }
        async checkPrivateRoom(roomId) {
            return this._query('multiplayer:checkPrivateRoom', { roomId });
        }
    }

    window._convexClient = new ConvexGameClient(CONVEX_URL);
    window._convexClient.getOrRegisterPlayer('Alpit').then(id => {
        console.log('[Convex] Player ready:', id);
    }).catch(e => {
        console.warn('[Convex] Init failed (offline?):', e.message);
    });
})();
