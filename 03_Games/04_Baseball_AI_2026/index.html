// ============================================================================
// SECTION 1: roundRect polyfill + canvas fit
// Provides rounded rectangles and responsive canvas scaling
// ============================================================================

if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        const R = typeof r === 'number' ? r : (Array.isArray(r) ? r[0] : 0);
        this.moveTo(x + R, y);
        this.lineTo(x + w - R, y);
        this.quadraticCurveTo(x + w, y, x + w, y + R);
        this.lineTo(x + w, y + h - R);
        this.quadraticCurveTo(x + w, y + h, x + w - R, y + h);
        this.lineTo(x + R, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - R);
        this.lineTo(x, y + R);
        this.quadraticCurveTo(x, y, x + R, y);
        this.closePath();
        return this;
    };
}

function fitCanvasToScreen() {
    const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
    _scale = scale;
    canvas.width = W;
    canvas.height = H;
    canvas.style.position = 'absolute';
    canvas.style.width  = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
    canvas.style.left   = Math.floor((window.innerWidth  - W * scale) / 2) + 'px';
    canvas.style.top    = Math.floor((window.innerHeight - H * scale) / 2) + 'px';
}

window.addEventListener('resize', fitCanvasToScreen);
fitCanvasToScreen();

function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    const src  = e.touches ? e.touches[0] : (e.changedTouches ? e.changedTouches[0] : e);
    return {
        x: (src.clientX - rect.left) / _scale,
        y: (src.clientY - rect.top)  / _scale
    };
}

    for (let i = 1; i <= 100; i++) {
        const t = (i - 1) / 99;
        const themeIndex = Math.floor((i - 1) / 10) % LEVEL_THEMES.length;
        const theme = LEVEL_THEMES[themeIndex];
        const isBoss = (i % 25 === 0);
        const isMilestone = (i % 10 === 0);

        LEVEL_CONFIG.push({
            level: i,
            name: isBoss ? `Boss: ${theme.name}` : `Level ${i}: ${theme.name}`,
            theme: theme,
            isBoss: isBoss,
            isMilestone: isMilestone,
            pitchSpeed: Math.floor(240 + t * 420),
            pitchSpeedVar: Math.floor(35 + t * 70),
            perfectWindow: Math.max(25, Math.floor(135 - t * 110)),
            goodWindow: Math.max(55, Math.floor(225 - t * 170)),
            curveChance: Math.min(0.65, t * 0.7),
            changeChance: Math.min(0.35, t * 0.38),
            sliderChance: Math.min(0.22, t * 0.25),
            aiAggression: Math.min(1.0, 0.15 + t * 0.85),
            windupDuration: Math.max(0.9, 1.85 - t * 0.95),
            atBats: isBoss ? 7 : 5,
            ballChance: Math.max(0.12, 0.38 - t * 0.26),
            coinReward: 3 + i * 1 + (isBoss ? 15 : 0) + (isMilestone ? 5 : 0),
            xpReward: 15 + i * 2 + (isBoss ? 30 : 0),
            starsRequired: isBoss ? 2 : 1,

// SECTION 3: GameState class - Complete player state management
// Tracks coins, XP, level, achievements, missions, settings, and game stats

class GameState {
    constructor() {
        // Currency and progression
        this.coins = 0;
        this.xp = 0;
        this.level = 1;
        this.xpToNextLevel = 100;

        // Streak and game stats
        this.streak = 0;
        this.bestStreak = 0;
        this.totalGames = 0;
        this.totalWins = 0;
        this.totalHRs = 0;
        this.totalPerfect = 0;
        this.totalSwings = 0;
        this.totalGoodHits = 0;
        this.totalFouls = 0;
        this.totalStrikes = 0;

        // VIP Pass system
        this.isVIP = false;
        this.vipPopupShown = false;

        // Surge and combat
        this.surgeProgress = 0;

        // Tutorial and UI — skip tutorial by default so menu loads immediately
        this.tutorialDone = true;
        this.tutorialStep = 0;
        this.shopTab = 'skins';

        // Swing timing history for AI adaptation
        this.swingTimings = [];

        // Best scores by difficulty
        this.bestScoreByDiff = {
            easy: 0,
            medium: 0,
            hard: 0,
            legend: 0
        };

        // Internal tracking
        this._legendWins = 0;
        this._perfectSwings = 0;
        this._maxSurgeReached = false;

        // === PHASE 7: Career analytics ===
        this.careerExitVelos = [];
        this.careerMaxExitVelo = 0;
        this.careerPerfectCount = 0;
        this.careerPitchCount = 0;
        this.careerHitCount = 0;

        // Level progression (100-level campaign)
        this.campaignLevel = 1;
        this.levelStars = {};
        this.totalStars = 0;

        // Settings
        this.settings = {
            audioMuted: false,
            hapticsEnabled: true,
            difficulty: 'medium',
            equippedSkin: 'default',
            equippedTheme: 'day',
            colorBlindMode: 'none',
            reducedMotion: false,
            largeTargets: false,
            highContrast: false,
            screenReader: false
        };

        // Shop ownership tracking
        this.ownedSkins = ['default'];
        this.ownedThemes = ['day'];

        // Power-ups inventory
        this.powerUps = {
            scoreBoost: 0,    // 2x score multiplier
            extraLife: 0,     // +1 extra at-bat
            easyMode: 0,      // wider sweet spot
            coinMagnet: 0,    // +50% coin earnings
            xpBoost: 0,       // 2x XP
        };

        // Missions and achievements
        this.missions = [];
        this.achievements = {};

        // Match history and daily rewards
        this.matchHistory = [];
        this.dailyReward = {
            lastClaimedDate: null,
            streak: 0,
            rewards: [5, 8, 10, 12, 15, 20, 35]
        };

        // Initialize subsystems
        this._initMissions();
        this._initAchievements();

        // Load from storage if available
        this.loadFromStorage();
    }

    // Currency and progression methods
    addCoins(n) {
        const multiplier = this.isVIP ? 2 : 1;
        this.coins = Math.max(0, this.coins + (n * multiplier));
    }

    spendCoins(n) {
        if (this.coins >= n) {
            this.coins -= n;
            return true;
        }
        return false;
    }

    addXP(n) {
        this.xp += n;
        while (this.xp >= this.xpToNextLevel) {
            this._levelUp();
        }
    }

    _levelUp() {
        this.xp -= this.xpToNextLevel;
        this.level += 1;
        this.xpToNextLevel = Math.floor(100 * Math.pow(1.15, this.level - 1));
        this.addCoins(10 + (this.level * 3));
        audio.play('levelup');
        Haptics.pulse('levelUp');
        showToast('LEVEL UP: ' + this.level, '#FFD700', 2.5);
    }

    // Shop and purchase system
    canPurchase(item) {
        // VIP bypass: free cosmetics for VIP players
        if (this.isVIP && item.equipKey) {
            return this.level >= item.levelReq;
        }
        return this.coins >= item.price && this.level >= item.levelReq;
    }

    tryPurchase(item) {
        if (!this.canPurchase(item)) return false;
        // VIP players get free cosmetics
        if (this.isVIP && item.equipKey) {
            return true;
        }
        if (this.spendCoins(item.price)) {
            return true;
        }
        return false;
    }

    // Swing timing tracking for AI adaptation
    recordSwing(timing) {
        this.swingTimings.push(timing);
        if (this.swingTimings.length > 10) {
            this.swingTimings.shift();
        }
    }

    // Analyze player timing bias for AI
    getTimingBias() {
        if (this.swingTimings.length < 5) return 'balanced';
        const recent = this.swingTimings.slice(-5);
        const avgTiming = recent.reduce((a, b) => a + b, 0) / recent.length;
        if (avgTiming < -20) return 'early';
        if (avgTiming > 20) return 'late';
        return 'balanced';
    }

    // Initialize achievement system with 10 achievements
    _initAchievements() {
        this.achievements = {

    // Load from storage with fallback to defaults
    loadFromStorage() {
        const saved = localStorage.getItem('basehit_save_v3');
        if (!saved) return;
        try {
            const data = JSON.parse(saved);
            if (data.version !== 3) return;

            this.coins = data.coins ?? this.coins;
            this.xp = data.xp ?? this.xp;
            this.level = data.level ?? this.level;
            this.xpToNextLevel = data.xpToNextLevel ?? this.xpToNextLevel;
            this.streak = data.streak ?? this.streak;
            this.bestStreak = data.bestStreak ?? this.bestStreak;
            this.totalGames = data.totalGames ?? this.totalGames;
            this.totalWins = data.totalWins ?? this.totalWins;
            this.totalHRs = data.totalHRs ?? this.totalHRs;
            this.totalPerfect = data.totalPerfect ?? this.totalPerfect;
            this.totalSwings = data.totalSwings ?? this.totalSwings;
            this.totalGoodHits = data.totalGoodHits ?? this.totalGoodHits;
            this.totalFouls = data.totalFouls ?? this.totalFouls;
            this.totalStrikes = data.totalStrikes ?? this.totalStrikes;
            this.surgeProgress = data.surgeProgress ?? this.surgeProgress;
            this.tutorialDone = data.tutorialDone ?? this.tutorialDone;
            this.tutorialStep = data.tutorialStep ?? this.tutorialStep;
            this.shopTab = data.shopTab ?? this.shopTab;
            this.swingTimings = data.swingTimings ?? this.swingTimings;
            this.bestScoreByDiff = data.bestScoreByDiff ?? this.bestScoreByDiff;
            this._legendWins = data._legendWins ?? this._legendWins;
            this._perfectSwings = data._perfectSwings ?? this._perfectSwings;
            this._maxSurgeReached = data._maxSurgeReached ?? this._maxSurgeReached;
            this.campaignLevel = Math.max(1, data.campaignLevel ?? this.campaignLevel);
            this.levelStars = data.levelStars ?? this.levelStars;
            this.totalStars = data.totalStars ?? this.totalStars;
            this.settings = { ...this.settings, ...data.settings };
            this.ownedSkins = data.ownedSkins ?? this.ownedSkins;
            this.ownedThemes = data.ownedThemes ?? this.ownedThemes;
            if (data.powerUps) {
                this.powerUps = { ...this.powerUps, ...data.powerUps };
            }
            // Missions: restore only serializable state (done/progress) onto initialized
            // templates that already have check() functions — do NOT replace the array.
            if (data.missions && Array.isArray(data.missions)) {
                for (const saved of data.missions) {
                    const t = this.missions.find(m => m.id === saved.id);
                    if (t) {
                        t.done = saved.done ?? t.done;
                        t.progress = saved.progress ?? t.progress;
                    }
                }
            }
            // Achievements: same — restore only unlocked/progress, keep check() functions.
            if (data.achievements && typeof data.achievements === 'object') {
                for (const id of Object.keys(data.achievements)) {
                    if (this.achievements[id]) {
                        const s = data.achievements[id];
                        this.achievements[id].unlocked = s.unlocked ?? this.achievements[id].unlocked;
                        this.achievements[id].progress = s.progress ?? this.achievements[id].progress;
                    }
                }
            }
            this.matchHistory = data.matchHistory ?? this.matchHistory;
            this.dailyReward = { ...this.dailyReward, ...data.dailyReward };
            this.isVIP = data.isVIP ?? this.isVIP;
            this.vipPopupShown = data.vipPopupShown ?? this.vipPopupShown;
            // === PHASE 7: Career analytics ===
            this.careerExitVelos = data.careerExitVelos || [];
            this.careerMaxExitVelo = data.careerMaxExitVelo || 0;
            this.careerPerfectCount = data.careerPerfectCount || 0;
            this.careerPitchCount = data.careerPitchCount || 0;
            this.careerHitCount = data.careerHitCount || 0;
        } catch (e) {
            console.error('Failed to load game state:', e);
        }
    }
}

// ============================================================================
// SECTION 4: Web Audio Synthesizer (System 17)
// Synthesizes baseball game sound effects using Web Audio API
// ============================================================================

const audio = {
    _ctx: null,

    _getCtx() {
        if (!this._ctx) {
            this._ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        return this._ctx;
    },

    _tone(freq, duration, type = 'sine', attack = 0.01, decay = 0.1, sustain = 0, release = 0.1) {
        const ctx = this._getCtx();
        const osc = ctx.createOscillator();
        const env = ctx.createGain();
        const now = ctx.currentTime;

        osc.frequency.value = freq;
        osc.type = type;

        env.gain.setValueAtTime(0, now);
        env.gain.linearRampToValueAtTime(1, now + attack);
        env.gain.linearRampToValueAtTime(sustain, now + attack + decay);
        env.gain.linearRampToValueAtTime(0, now + attack + decay + release);

        osc.connect(env);
        env.connect(ctx.destination);

        osc.start(now);
        osc.stop(now + attack + decay + release);
    },

    _chord(freqs, duration, type = 'sine') {
        freqs.forEach(f => this._tone(f, duration, type, 0.01, 0.1, 0.2, 0.1));
    },

    play(event) {
        if (gameState.settings.audioMuted) return;

        switch(event) {
            case 'pitch':
                this._tone(220, 0.1, 'sine');
                break;
            case 'swing':
                this._tone(400, 0.08, 'sine');
                this._tone(600, 0.06, 'sine', 0.02);
                break;
            case 'homerun':
                this._chord([262, 330, 392], 0.6, 'sine');
                setTimeout(() => this._chord([330, 392, 523], 0.6, 'sine'), 0.3 * 1000);
                break;
            case 'hit':
                this._tone(523, 0.15, 'sine');
                break;
            case 'foul':
                this._tone(300, 0.2, 'square');
                break;
            case 'strike':
                this._tone(200, 0.25, 'sine');
                break;
            case 'strike3':
                this._tone(150, 0.1, 'sine');
                this._tone(150, 0.1, 'sine');
                this._tone(150, 0.2, 'sine');
                break;
            case 'curveball':
                this._tone(659, 0.3, 'sine', 0.05);
                this._tone(659, 0.3, 'sine', 0.05);
                break;
            case 'powershot':
                this._chord([440, 659, 880], 0.4, 'square');
                break;
            case 'levelup':
                this._chord([262, 330, 392, 523], 0.5, 'sine');
                break;
            case 'click':
                this._tone(800, 0.05, 'sine');
                break;
            case 'daily':
                this._chord([392, 523, 659], 0.4, 'sine');
                break;
            case 'win':
                this._chord([330, 392, 523, 659], 0.6, 'sine');
                break;
            case 'lose':
                this._tone(200, 0.1, 'sine');
                this._tone(150, 0.2, 'sine');
                break;
            case 'surge':
                this._chord([587, 659, 784], 0.5, 'square');
                break;
            case 'roundEnd':
                this._tone(349, 0.2, 'sine');
                break;
        }
    }
};

function applyColorBlindFilter(color, mode) {
    if (mode === 'none' || !mode) return color;
    // Simple color mapping for different color blindness types
    const filters = {
        protanopia:   { '#FF0000': '#FFB000', '#FF1744': '#FFB000', '#FF69B4': '#00B0FF', '#F44336': '#FFB000' },
        deuteranopia: { '#00FF00': '#00B0FF', '#4CAF50': '#00B0FF', '#00C853': '#00B0FF', '#0FB981': '#1E90FF' },
        tritanopia:   { '#0000FF': '#FF6B35', '#1976D2': '#FF6B35', '#2196F3': '#FF8C00', '#00BCD4': '#FF6B35' }
    };
    return filters[mode]?.[color] || color;
}

// ============================================================================
// SECTION 6: Camera System (System 14)
// Manages screen shake, zoom, and viewport transformations
// ============================================================================

const camera = {
    shakeX: 0,
    shakeY: 0,
    shakeIntensity: 0,
    shakeDuration: 0,
    shakeTimer: 0,

    zoom: 1,
    targetZoom: 1,
    zoomCX: W / 2,
    zoomCY: H / 2,
    zoomDuration: 0,
    zoomTimer: 0,

    triggerShake(intensity, duration) {
        this.shakeIntensity = intensity;
        this.shakeDuration = duration;
        this.shakeTimer = duration;
    },

    triggerZoom(level, cx, cy, durationMs) {
        this.targetZoom = level;
        this.zoomCX = cx;
        this.zoomCY = cy;
        this.zoomDuration = durationMs / 1000;
        this.zoomTimer = durationMs / 1000;
    },

    update(dt) {
        // Update shake
        if (this.shakeTimer > 0) {
            this.shakeTimer -= dt;
            const progress = 1 - (this.shakeTimer / this.shakeDuration);
            const decay = 1 - (progress * 0.5);
            this.shakeX = (Math.random() - 0.5) * this.shakeIntensity * 2 * decay;
            this.shakeY = (Math.random() - 0.5) * this.shakeIntensity * 2 * decay;
        } else {
            this.shakeX = 0;
            this.shakeY = 0;
        }

        // Update zoom
        if (this.zoomTimer > 0) {
            this.zoomTimer -= dt;
            const progress = 1 - (this.zoomTimer / this.zoomDuration);
            this.zoom = 1 + (this.targetZoom - 1) * progress;
        } else {
            this.zoom = this.targetZoom;
        }
    },

    apply(ctx) {
        ctx.translate(W / 2, H / 2);
        ctx.scale(this.zoom, this.zoom);
        ctx.translate(-W / 2, -H / 2);
        ctx.translate(this.shakeX, this.shakeY);
    },

    restore(ctx) {
        ctx.resetTransform();
    }
};

// ============================================================================
// SECTION 7: Particle Pool (System 15)
// Manages up to 250 particles for effects (spark trails, explosions, etc.)
// ============================================================================

class ParticlePool {
    constructor(maxSize = 250) {
        this.maxSize = maxSize;
        this.particles = [];
        for (let i = 0; i < maxSize; i++) {
            this.particles.push({
                active: false,
                x: 0, y: 0,
                vx: 0, vy: 0,
                life: 0, maxLife: 1,
                size: 2,
                color: '#FFFFFF',
                gravity: 0,
                shrink: false,
                shape: 'circle',
                rot: 0,
                rotV: 0
            });
        }
    }

    spawn(x, y, config = {}) {
        const p = this.particles.find(p => !p.active);
        if (!p) return;

        p.active = true;
        p.x = x;
        p.y = y;
        p.vx = config.vx || 0;
        p.vy = config.vy || 0;
        p.life = config.life || 1;
        p.maxLife = p.life;
        p.size = config.size || 2;
        p.color = config.color || '#FFFFFF';
        p.gravity = config.gravity || 0;
        p.shrink = config.shrink ?? true;
        p.shape = config.shape || 'circle';
        p.rot = config.rot || 0;
        p.rotV = config.rotV || 0;
    }

    update(dt) {
        for (const p of this.particles) {
            if (!p.active) continue;

            p.vy += p.gravity * dt;
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.life -= dt;
            p.rot += p.rotV * dt;

            if (p.life <= 0) {
                p.active = false;
            }
        }
    }

    draw(ctx) {
        for (const p of this.particles) {
            if (!p.active) continue;

            const alpha = Math.max(0, p.life / p.maxLife);
            const size = p.shrink ? p.size * alpha : p.size;

            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);

            if (p.shape === 'circle') {
                ctx.beginPath();
                ctx.arc(0, 0, size, 0, Math.PI * 2);
                ctx.fill();
            } else if (p.shape === 'rect') {
                ctx.fillRect(-size, -size, size * 2, size * 2);
            }

            ctx.restore();
        }
    }
}

let _confetti = [];
let _fireworks = [];

function spawnConfetti(count = 100) {
    const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA502', '#FF6348', '#C44569'];

    for (let i = 0; i < count; i++) {
        _confetti.push({
            x: W / 2 + (Math.random() - 0.5) * 100,
            y: H / 2,
            vx: (Math.random() - 0.5) * 300,
            vy: -Math.random() * 400 - 200,
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10,
            size: Math.random() * 4 + 4,
            color: colors[Math.floor(Math.random() * colors.length)],
            life: 2.5,
            maxLife: 2.5
        });
    }
}

function spawnFirework(x, y) {
    const hue = Math.random() * 360;
    for (let i = 0; i < 35; i++) {
        const angle = (Math.PI * 2 * i) / 35;
        const speed = Math.random() * 200 + 100;
        _fireworks.push({
            x: x,
            y: y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            color: `hsl(${hue}, 100%, 60%)`,
            life: 1.5,
            maxLife: 1.5,
            size: Math.random() * 3 + 2
        });
    }
}

function updateCelebration(dt) {
    // Update confetti
    _confetti = _confetti.filter(c => {
        c.x += c.vx * dt;
        c.y += c.vy * dt;
        c.vy += 300 * dt; // gravity
        c.rotation += c.rotationSpeed * dt;
        c.life -= dt;
        return c.life > 0;
    });

    // Update fireworks
    _fireworks = _fireworks.filter(f => {
        f.x += f.vx * dt;
        f.y += f.vy * dt;
        f.vy += 200 * dt; // gravity
        f.life -= dt;
        return f.life > 0;
    });
}

function drawConfetti(ctx) {
    for (const c of _confetti) {
        ctx.save();
        ctx.globalAlpha = c.life / c.maxLife;
        ctx.fillStyle = c.color;
        ctx.translate(c.x, c.y);
        ctx.rotate(c.rotation);
        ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size);
        ctx.restore();
    }
}

function drawFireworks(ctx) {
    for (const f of _fireworks) {
        ctx.save();
        ctx.globalAlpha = f.life / f.maxLife;
        ctx.fillStyle = f.color;
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

let _commentaryText = '';
let _commentaryTimer = 0;

function drawCommentaryText(ctx) {
    if (_commentaryTimer <= 0) return;
    const alpha = Math.min(1, _commentaryTimer / 0.5);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 6;
    ctx.fillText(_commentaryText, W / 2, H - 130);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
}

function drawAIBotBubble(ctx) {
    AI_BOT.update();
    if (AI_BOT.msgTimer <= 0 || !AI_BOT.currentMsg) return;

    const alpha = AI_BOT.msgTimer < 30 ? AI_BOT.msgTimer / 30 : 1;
    const t = Date.now() / 1000;
    const slideIn = Math.min(1, (AI_BOT.msgDuration - AI_BOT.msgTimer) / 12);
    const ease = 1 - Math.pow(1 - slideIn, 4);
    ctx.save();

    // Position: top of screen, just below HUD bar (52px)
    const bubbleW = 280;
    const bubbleH = 62;
    const targetX = (W - bubbleW) / 2;
    const bubbleX = targetX + (1 - ease) * W;
    const bubbleY = 55;
    const radius = 14;

    ctx.globalAlpha = alpha;

    const moodThemes = {
        confident: { c1: '#00e5ff', c2: '#0091ea', emoji: '😏', glow: 'rgba(0,229,255,' },
        mocking:   { c1: '#ffd700', c2: '#ff8f00', emoji: '😂', glow: 'rgba(255,215,0,' },
        angry:     { c1: '#ff4444', c2: '#d50000', emoji: '😤', glow: 'rgba(255,68,68,' },
        nervous:   { c1: '#ff8800', c2: '#e65100', emoji: '😰', glow: 'rgba(255,136,0,' },
        defeated:  { c1: '#c084fc', c2: '#7c3aed', emoji: '😱', glow: 'rgba(192,132,252,' }
    };
    const theme = moodThemes[AI_BOT.mood] || moodThemes.confident;

    // === OUTER GLOW PULSE ===
    const glowPulse = 0.4 + 0.3 * Math.sin(t * 2.5);
    ctx.shadowColor = theme.glow + glowPulse + ')';
    ctx.shadowBlur = 20;

    // === MAIN BUBBLE: frosted glass ===
    const bgGrad = ctx.createLinearGradient(bubbleX, bubbleY, bubbleX + bubbleW, bubbleY + bubbleH);
    bgGrad.addColorStop(0, 'rgba(10,14,30,0.88)');
    bgGrad.addColorStop(0.5, 'rgba(18,24,48,0.92)');
    bgGrad.addColorStop(1, 'rgba(10,14,30,0.88)');
    ctx.fillStyle = bgGrad;
    ctx.beginPath();
    ctx.roundRect(bubbleX, bubbleY, bubbleW, bubbleH, radius);
    ctx.fill();
    ctx.shadowBlur = 0;

    // === ANIMATED NEON BORDER ===
    const borderGrad = ctx.createLinearGradient(bubbleX, bubbleY, bubbleX + bubbleW, bubbleY + bubbleH);
    const shift = (t * 0.5) % 1;
    borderGrad.addColorStop((0 + shift) % 1, theme.c1);
    borderGrad.addColorStop((0.5 + shift) % 1, theme.c2);
    borderGrad.addColorStop((1.0 + shift) % 1, theme.c1);
    ctx.strokeStyle = borderGrad;
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = alpha * (0.6 + 0.3 * Math.sin(t * 3));
    ctx.beginPath();
    ctx.roundRect(bubbleX, bubbleY, bubbleW, bubbleH, radius);
    ctx.stroke();
    ctx.globalAlpha = alpha;

    // === INNER HIGHLIGHT LINE ===
    ctx.globalAlpha = alpha * 0.15;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.roundRect(bubbleX + 1, bubbleY + 1, bubbleW - 2, bubbleH - 2, radius - 1);
    ctx.stroke();
    ctx.globalAlpha = alpha;

    // === BOT AVATAR with spinning ring ===
    const avX = bubbleX + 28;
    const avY = bubbleY + bubbleH / 2;
    const avR = 18;

    // Spinning ring using arc segments (WebView compatible - no createConicGradient)
    ctx.save();
    const ringR = avR + 3;
    const segments = 4;
    const segAngle = Math.PI * 2 / segments;
    const rotAngle = t * 1.5;
    for (let i = 0; i < segments; i++) {
        const startA = rotAngle + i * segAngle;
        const endA = startA + segAngle * 0.6;
        ctx.strokeStyle = i % 2 === 0 ? theme.c1 : theme.c2;
        ctx.globalAlpha = alpha * (0.5 + 0.5 * Math.sin(t * 3 + i));
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(avX, avY, ringR, startA, endA);
        ctx.stroke();
    }
    ctx.globalAlpha = alpha;
    ctx.restore();

    ctx.beginPath();
    ctx.arc(avX, avY, avR, 0, Math.PI * 2);
    const avGrad = ctx.createRadialGradient(avX, avY - 4, 0, avX, avY, avR);
    avGrad.addColorStop(0, 'rgba(30,35,60,0.95)');
    avGrad.addColorStop(1, 'rgba(10,14,30,0.98)');
    ctx.fillStyle = avGrad;
    ctx.fill();

    ctx.font = '20px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffffff';
    ctx.fillText(theme.emoji, avX, avY + 1);

    // === BOT NAME + LEVEL BADGE ===
    const textLeft = bubbleX + 54;
    ctx.font = '700 9px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = theme.c1;
    ctx.fillText('PITCHER BOT', textLeft, bubbleY + 16);

    ctx.globalAlpha = alpha * 0.25;
    ctx.fillStyle = theme.c1;
    ctx.beginPath();
    ctx.roundRect(textLeft + 76, bubbleY + 9, 28, 13, 6);
    ctx.fill();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = theme.c1;
    ctx.font = '700 7.5px "Segoe UI", system-ui, sans-serif';
    ctx.fillText('Lv.4', textLeft + 80, bubbleY + 17);

    // === MESSAGE TEXT with typewriter effect ===
    const typeProgress = Math.min(1, (AI_BOT.msgDuration - AI_BOT.msgTimer) / 30);
    let msg = AI_BOT.currentMsg;
    const maxTextW = bubbleW - 70;
    ctx.font = '600 11px "Segoe UI", system-ui, sans-serif';
    if (ctx.measureText(msg).width > maxTextW) {
        while (ctx.measureText(msg + '...').width > maxTextW && msg.length > 0) msg = msg.slice(0, -1);
        msg += '...';
    }
    const visibleChars = Math.floor(msg.length * typeProgress);
    const displayMsg = msg.substring(0, visibleChars);

    ctx.fillStyle = '#edf0f7';
    ctx.textBaseline = 'middle';
    ctx.fillText(displayMsg, textLeft, bubbleY + 38);

    if (typeProgress < 1) {
        const cursorX = textLeft + ctx.measureText(displayMsg).width + 2;
        ctx.globalAlpha = alpha * (Math.sin(t * 8) > 0 ? 0.8 : 0);
        ctx.fillStyle = theme.c1;
        ctx.fillRect(cursorX, bubbleY + 31, 1.5, 14);
        ctx.globalAlpha = alpha;
    }

    // === SPARKLE PARTICLES ===
    for (let i = 0; i < 4; i++) {
        const angle = t * 0.8 + i * Math.PI / 2;
        const px = bubbleX + bubbleW / 2 + Math.cos(angle) * (bubbleW / 2 - 5);
        const py = bubbleY + bubbleH / 2 + Math.sin(angle) * (bubbleH / 2 - 3);
        const sparkleAlpha = 0.3 + 0.5 * Math.abs(Math.sin(t * 3 + i));
        ctx.globalAlpha = alpha * sparkleAlpha;
        ctx.fillStyle = theme.c1;
        ctx.beginPath();
        ctx.arc(px, py, 1.5, 0, Math.PI * 2);
        ctx.fill();
    }

    // === BOTTOM MICRO INDICATOR ===
    ctx.globalAlpha = alpha * 0.5;
    ctx.fillStyle = theme.c1;
    const indW = 30;
    ctx.beginPath();
    ctx.roundRect(bubbleX + (bubbleW - indW) / 2, bubbleY + bubbleH - 3, indW, 2, 1);
    ctx.fill();

    ctx.restore();
}

// ============================================================================
// SECTION 10: Crowd System (System 12)
// Rich animated spectator stands with individual fans, cheering waves,
// colored jerseys, foam fingers, and home-run celebrations
// ============================================================================

const crowdSystem = {
    excitement: 0.3,
    mood: 'neutral',
    waveActive: false,
    waveProgress: 0,
    waveSpeed: 1.2,
    hrFlash: 0,           // bright crowd flash on home run
    hrJump: 0,            // crowd jump height on HR
    _fans: [],
    _bannerColors: ['#ff2222','#2244ff','#22cc44','#ffcc00','#ff6600','#cc22cc'],
    _skinTones: ['#fcd8b0','#e8b88a','#c48a5a','#8d5524','#f5c5a3','#deb887'],

    init() {
        // 4 rows × 32 columns = 128 fans in visible stands
        this._fans = [];
        const ROWS = 4, COLS = 32;
        for (let row = 0; row < ROWS; row++) {
            for (let col = 0; col < COLS; col++) {
                const seed = row * 100 + col;
                const rng  = (n) => ((seed * 1664525 + n * 1013904223) & 0x7fffffff) / 0x7fffffff;
                this._fans.push({
                    col, row,
                    x:       (col / COLS) * 390 + rng(1) * (390 / COLS),
                    baseY:   142 + row * 18,
                    jerseyH: `hsl(${Math.floor(rng(2) * 360)},${60 + rng(3)*30}%,${38 + rng(4)*24}%)`,
                    skin:    this._skinTones[Math.floor(rng(5) * this._skinTones.length)],
                    hasBanner: rng(6) > 0.82,
                    bannerColor: this._bannerColors[Math.floor(rng(7) * this._bannerColors.length)],
                    hasFoam:  rng(8) > 0.88,
                    // Per-fan random offsets so they don't all move in sync
                    phase:    rng(9) * Math.PI * 2,
                    bobSpeed: 1.8 + rng(10) * 1.4,
                    cheer:    0,   // 0..1 cheer amplitude (lerped)
                    jumpOff:  0,   // extra Y offset for jump
                });
            }
        }
    },

    trigger(ev) {
        switch (ev) {
            case 'homerun':
                this.excitement  = Math.min(1, this.excitement + 0.5);
                this.waveActive  = true;
                this.waveProgress = 0;
                this.waveSpeed   = 1.8;
                this.hrFlash     = 1.0;
                this.hrJump      = 1.0;
                for (const f of this._fans) f.cheer = 1.0;
                break;
            case 'hit':
                this.excitement  = Math.min(1, this.excitement + 0.2);
                for (const f of this._fans) f.cheer = Math.min(1, f.cheer + 0.5);
                break;
            case 'strike':
                this.excitement  = Math.max(0.15, this.excitement - 0.08);
                break;
            case 'win':
                this.excitement  = 1;
                this.waveActive  = true;
                this.waveProgress = 0;
                this.hrFlash     = 1.0;
                for (const f of this._fans) f.cheer = 1.0;
                break;
        }
    },

    update(dt) {
        const T = Date.now() / 1000;
        this.excitement  = Math.max(0.25, this.excitement - dt * 0.08);
        this.hrFlash     = Math.max(0, this.hrFlash     - dt * 2.5);
        this.hrJump      = Math.max(0, this.hrJump      - dt * 1.8);

        if (this.waveActive) {
            this.waveProgress += dt * this.waveSpeed;
            if (this.waveProgress > 1.6) this.waveActive = false;
        }

        for (const fan of this._fans) {
            fan.cheer   = Math.max(0, fan.cheer - dt * 0.7);
            const waveAmp = this.waveActive
                ? Math.max(0, Math.sin((fan.col / 32 - this.waveProgress) * Math.PI * 2.5)) * 1.0
                : 0;
            const baseCheer = this.excitement * 0.3 + fan.cheer * 0.7 + waveAmp;
            // Jump offset: fans bounce up when cheering
            const targetJump = baseCheer * (8 + this.hrJump * 10) * Math.abs(Math.sin(T * fan.bobSpeed + fan.phase));
            fan.jumpOff = fan.jumpOff * 0.82 + targetJump * 0.18;
        }
    },

    draw(ctx) {
        const T     = Date.now() / 1000;
        const ROWS  = 4;
        // Background stand tiers — dark concrete bleachers
        for (let row = ROWS - 1; row >= 0; row--) {
            const rowY   = 142 + row * 18;
            const shade  = 20 + row * 5;
            ctx.fillStyle = `rgb(${shade},${shade + 6},${shade + 16})`;
            ctx.fillRect(0, rowY + 8, 390, 18);
        }

        // HR flash overlay on stands
        if (this.hrFlash > 0) {
            ctx.save();
            ctx.globalAlpha = this.hrFlash * 0.35;
            ctx.fillStyle   = '#ffee44';
            ctx.fillRect(0, 128, 390, 90);
            ctx.restore();
        }

        // Draw fans back-to-front (highest row first = furthest back)
        for (let row = ROWS - 1; row >= 0; row--) {
            const rowFans = this._fans.filter(f => f.row === row);
            for (const fan of rowFans) {
                const fy    = fan.baseY - fan.jumpOff;
                const scale = 0.7 + row * 0.08;   // fans closer to front appear larger

                ctx.save();
                ctx.translate(fan.x, fy);
                ctx.scale(scale, scale);
                ctx.globalAlpha = 0.82 + row * 0.04;

                // ── Body (jersey) ──
                ctx.fillStyle = fan.jerseyH;
                ctx.beginPath();
                ctx.roundRect(-4, -6, 8, 10, 2);
                ctx.fill();

                // ── Head ──
                ctx.fillStyle = fan.skin;
                ctx.beginPath();
                ctx.arc(0, -10, 4, 0, Math.PI * 2);
                ctx.fill();

                // ── Arms ──
                const cheer = fan.cheer + this.excitement * 0.25;
                const armUp = -0.5 - cheer * 1.1 - 0.15 * Math.sin(T * fan.bobSpeed + fan.phase);
                ctx.strokeStyle = fan.skin;
                ctx.lineWidth   = 2;
                ctx.lineCap     = 'round';
                // Left arm
                ctx.beginPath();
                ctx.moveTo(-4, -4);
                ctx.lineTo(-9, -4 + armUp * 8);
                ctx.stroke();
                // Right arm
                ctx.beginPath();
                ctx.moveTo(4, -4);
                ctx.lineTo(9, -4 + armUp * 8);
                ctx.stroke();

                // ── Foam finger (occasional) ──
                if (fan.hasFoam && cheer > 0.2) {
                    ctx.fillStyle = '#ff6600';
                    ctx.beginPath();
                    ctx.ellipse(9, -4 + armUp * 8 - 5, 3, 5, 0.3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ff9933';
                    ctx.font = 'bold 5px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('#1', 9, -4 + armUp * 8 - 4);
                }

                // ── Banner (occasional) ──
                if (fan.hasBanner && cheer > 0.4) {
                    const bx = -10, by = -20 + armUp * 5;
                    ctx.fillStyle = fan.bannerColor;
                    ctx.fillRect(bx, by, 20, 8);
                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    ctx.font = 'bold 4px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('HR!', bx + 10, by + 6);
                }

                ctx.restore();
            }
        }
    }
};

crowdSystem.init();

let _toasts = [];

function showToast(msg, color = '#FFF', duration = 2.5) {
    _toasts.push({
        msg: msg,
        color: color,
        timer: duration,
        maxTimer: duration,
        y: H - 200
    });
}

function updateToasts(dt) {
    _toasts = _toasts.filter(t => {
        t.timer -= dt;
        t.y -= dt * 30; // Float upward
        return t.timer > 0;
    });
}

function drawToasts(ctx) {
    for (const t of _toasts) {
        const alpha = Math.min(1, t.timer / 0.5);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = t.color;
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(t.msg, W / 2, t.y);
        ctx.globalAlpha = 1;
    }
}

    };

function drawAchievementToast(ctx) {
    if (!_achievementToast || _achievementToast.timer <= 0) return;

    const t = _achievementToast;
    const progress = 1 - (t.timer / t.maxTimer);
    const easeProgress = Math.min(1, progress * 2);
    const slideX = W - 120 + (1 - easeProgress) * 150;

    ctx.save();
    ctx.globalAlpha = Math.min(1, t.timer);

    // Gold background card
    ctx.fillStyle = '#FFD700';
    ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
    ctx.shadowBlur = 12;
    ctx.shadowOffsetX = 3;
    ctx.shadowOffsetY = 3;
    ctx.beginPath();
    ctx.roundRect(slideX - 80, 50, 160, 70, 8);
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;

    // Achievement icon
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#000000';
    ctx.fillText(t.icon, slideX, 70);

    // Text
    ctx.font = 'bold 10px sans-serif';
    ctx.fillText('Achievement Unlocked!', slideX, 86);
    ctx.font = '9px sans-serif';
    ctx.fillText(t.name, slideX, 99);
    ctx.fillText('+' + t.reward + '⭐', slideX, 112);

    ctx.restore();

    _achievementToast.timer -= 1/60;
}

// ============================================================================
// SECTION 12b: Impact Effects System
// Hit crack ring, spark burst, floating score popups, CRACK! text shatter
// ============================================================================

const impactFX = {
    rings:  [],    // expanding shockwave rings
    sparks: [],    // flying spark particles
    popups: [],    // floating score text (+100 etc.)
    cracks: [],    // CRACK! / STRIKE! letter shatter

    triggerHit(x, y, label, isHR) {
        // Shockwave ring
        for (let i = 0; i < (isHR ? 3 : 1); i++) {
            this.rings.push({
                x, y,
                r: 18 + i * 12,
                maxR: isHR ? 120 + i * 40 : 70,
                t: 0,
                life: isHR ? 0.75 : 0.5,
                color: isHR ? '#ffd700' : '#00e5ff',
                width: isHR ? 4 - i : 2,
            });
        }
        // Sparks
        const sparkCount = isHR ? 36 : 18;
        for (let i = 0; i < sparkCount; i++) {
            const angle = (i / sparkCount) * Math.PI * 2 + Math.random() * 0.3;
            const speed = (isHR ? 180 : 90) + Math.random() * 120;
            this.sparks.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed - (isHR ? 60 : 20),
                life: 0.6 + Math.random() * 0.4,
                t: 0,
                color: isHR
                    ? `hsl(${40 + Math.random() * 30},100%,${60 + Math.random() * 30}%)`
                    : `hsl(${180 + Math.random() * 40},100%,70%)`,
                r: isHR ? 3 + Math.random() * 3 : 1.5 + Math.random() * 2,
                gravity: 220 + Math.random() * 80,
            });
        }
        // Score popup
        this.popups.push({
            x: x + (Math.random() - 0.5) * 40,
            y: y - 30,
            text: label,
            vy: -90 - Math.random() * 30,
            life: isHR ? 1.4 : 0.9,
            t: 0,
            scale: isHR ? 1.6 : 1.0,
            color: isHR ? '#ffd700' : '#ffffff',
        });
        // CRACK! text
        this.cracks.push({
            x, y: y - 20,
            text: isHR ? '💥 HOME RUN!' : label,
            t: 0,
            life: isHR ? 1.2 : 0.6,
            scale: isHR ? 1.8 : 1.1,
            color: isHR ? '#ff8c00' : '#ffffff',
        });
    },

    update(dt) {
        const advance = (arr) => {
            for (let i = arr.length - 1; i >= 0; i--) {
                arr[i].t += dt;
                if (arr[i].t >= arr[i].life) arr.splice(i, 1);
            }
        };
        advance(this.rings);
        advance(this.sparks);
        advance(this.popups);
        advance(this.cracks);

        for (const s of this.sparks) {
            s.x  += s.vx  * dt;
            s.y  += s.vy  * dt;
            s.vy += s.gravity * dt;
            s.vx *= 0.96;
        }
        for (const p of this.popups) {
            p.y  += p.vy  * dt;
            p.vy *= 0.92;
        }
    },

    draw(ctx) {
        // ── Rings ──────────────────────────────────────────────────────
        for (const ring of this.rings) {
            const prog = ring.t / ring.life;
            const r2   = ring.r + (ring.maxR - ring.r) * prog;
            ctx.save();
            ctx.globalAlpha = (1 - prog) * 0.85;
            ctx.strokeStyle = ring.color;
            ctx.lineWidth   = ring.width * (1 - prog * 0.5);
            ctx.shadowColor = ring.color;
            ctx.shadowBlur  = 12;
            ctx.beginPath();
            ctx.arc(ring.x, ring.y, r2, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }

        // ── Sparks ─────────────────────────────────────────────────────
        for (const s of this.sparks) {
            const prog = s.t / s.life;
            ctx.save();
            ctx.globalAlpha = (1 - prog) * 0.9;
            ctx.fillStyle   = s.color;
            ctx.shadowColor = s.color;
            ctx.shadowBlur  = 6;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r * (1 - prog * 0.6), 0, Math.PI * 2);
            ctx.fill();
            // Streak tail
            ctx.strokeStyle = s.color;
            ctx.lineWidth   = s.r * 0.5;
            ctx.globalAlpha = (1 - prog) * 0.4;
            ctx.beginPath();
            ctx.moveTo(s.x, s.y);
            ctx.lineTo(s.x - s.vx * 0.04, s.y - s.vy * 0.04);
            ctx.stroke();
            ctx.restore();
        }

        // ── Score popups ───────────────────────────────────────────────
        for (const p of this.popups) {
            const prog = p.t / p.life;
            if (prog > 0.75) continue;
            const sc   = p.scale * (1 + 0.3 * Math.sin(prog * Math.PI));
            ctx.save();
            ctx.globalAlpha = Math.min(1, (1 - prog * 1.3));
            ctx.translate(p.x, p.y);
            ctx.scale(sc, sc);
            ctx.font        = `bold ${Math.round(14 * p.scale)}px sans-serif`;
            ctx.textAlign   = 'center';
            ctx.strokeStyle = 'rgba(0,0,0,0.6)';
            ctx.lineWidth   = 3;
            ctx.strokeText(p.text, 0, 0);
            ctx.fillStyle   = p.color;
            ctx.fillText(p.text, 0, 0);
            ctx.restore();
        }

        // ── CRACK text ─────────────────────────────────────────────────
        for (const c of this.cracks) {
            const prog = c.t / c.life;
            if (prog < 0.0 || prog > 0.8) continue;
            const bounce = prog < 0.15 ? prog / 0.15 : 1 - (prog - 0.15) / 0.65;
            const sc     = c.scale * (0.4 + bounce * 0.8);
            ctx.save();
            ctx.globalAlpha = Math.min(1, (1 - prog * 1.2));
            ctx.translate(c.x, c.y);
            ctx.scale(sc, sc);
            ctx.font        = `bold 18px sans-serif`;
            ctx.textAlign   = 'center';
            ctx.strokeStyle = 'rgba(0,0,0,0.7)';
            ctx.lineWidth   = 3;
            ctx.strokeText(c.text, 0, 0);
            ctx.fillStyle   = c.color;
            ctx.shadowColor = c.color;
            ctx.shadowBlur  = 12;
            ctx.fillText(c.text, 0, 0);
            ctx.restore();
        }
    }
};

// ============================================================================
// SECTION 12c: Sky Atmosphere System
// Moving clouds, birds, parallax depth layers, wind streaks
// ============================================================================

const skyAtmosphere = {
    clouds: [],
    birds:  [],
    windStreaks: [],
    _t: 0,

    init() {
        // Pre-create clouds
        for (let i = 0; i < 7; i++) {
            this.clouds.push(this._makeCloud(i * (390 / 7)));
        }
        // Birds
        for (let i = 0; i < 5; i++) {
            this.birds.push(this._makeBird(-Math.random() * 390));
        }
    },

    _makeCloud(startX) {
        return {
            x: startX !== undefined ? startX : 420,
            y: 18 + Math.random() * 90,
            w: 60 + Math.random() * 100,
            h: 20 + Math.random() * 30,
            speed: 8 + Math.random() * 14,
            alpha: 0.12 + Math.random() * 0.2,
            puffs: Array.from({ length: 4 + Math.floor(Math.random() * 3) }, (_, i) => ({
                ox: (i / 5 - 0.4) * 80,
                oy: (Math.random() - 0.5) * 14,
                r:  12 + Math.random() * 20,
            })),
        };
    },

    _makeBird(startX) {
        return {
            x:     startX !== undefined ? startX : -20,
            y:     30 + Math.random() * 80,
            speed: 30 + Math.random() * 50,
            flapT: Math.random() * Math.PI * 2,
            flapSpeed: 5 + Math.random() * 4,
            scale: 0.5 + Math.random() * 0.8,
        };
    },

    update(dt) {
        this._t += dt;

        for (const c of this.clouds) {
            c.x -= c.speed * dt;
            if (c.x + c.w < -40) {
                c.x     = 430 + Math.random() * 60;
                c.y     = 18 + Math.random() * 90;
                c.speed = 8 + Math.random() * 14;
                c.alpha = 0.12 + Math.random() * 0.2;
            }
        }

        for (const b of this.birds) {
            b.x    += b.speed * dt;
            b.flapT += b.flapSpeed * dt;
            if (b.x > 420) {
                b.x  = -20;
                b.y  = 25 + Math.random() * 85;
                b.speed = 28 + Math.random() * 55;
            }
        }
    },

    drawClouds(ctx, theme) {
        // Skip on heavy night — clouds not very visible
        const alpha = theme && theme.nightMode ? 0.06 : 1.0;
        ctx.save();
        for (const c of this.clouds) {
            ctx.globalAlpha = c.alpha * alpha;
            for (const puff of c.puffs) {
                const pg = ctx.createRadialGradient(
                    c.x + puff.ox, c.y + puff.oy, 0,
                    c.x + puff.ox, c.y + puff.oy, puff.r
                );
                pg.addColorStop(0,   'rgba(255,255,255,0.95)');
                pg.addColorStop(0.55,'rgba(240,245,255,0.7)');
                pg.addColorStop(1,   'rgba(220,230,255,0)');
                ctx.fillStyle = pg;
                ctx.beginPath();
                ctx.arc(c.x + puff.ox, c.y + puff.oy, puff.r, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        ctx.restore();
    },

    drawBirds(ctx, theme) {
        const alpha = theme && theme.nightMode ? 0 : 1;
        if (alpha === 0) return;
        ctx.save();
        ctx.strokeStyle = 'rgba(30,30,60,0.55)';
        ctx.lineCap = 'round';
        for (const b of this.birds) {
            const flap = Math.sin(b.flapT) * 0.55;
            ctx.save();
            ctx.translate(b.x, b.y);
            ctx.scale(b.scale, b.scale);
            ctx.globalAlpha = 0.55;
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.moveTo(-8, 0);
            ctx.quadraticCurveTo(-4, flap * 5, 0, 0);
            ctx.quadraticCurveTo(4, flap * 5, 8, 0);
            ctx.stroke();
            ctx.restore();
        }
        ctx.restore();
    },

    drawLensFlares(ctx, theme) {
        // Night-mode stadium light lens flares
        if (!theme || !theme.nightMode) return;
        const T = this._t;
        const towerPositions = [28, 88, W - 88, W - 28];
        ctx.save();
        for (const tx of towerPositions) {
            const ty = 42;
            const flicker = 0.7 + 0.3 * Math.sin(T * 7.3 + tx);
            // Main flare disc
            const fGrad = ctx.createRadialGradient(tx, ty, 0, tx, ty, 80);
            fGrad.addColorStop(0,    `rgba(255,248,200,${0.22 * flicker})`);
            fGrad.addColorStop(0.15, `rgba(255,230,120,${0.10 * flicker})`);
            fGrad.addColorStop(0.5,  `rgba(255,200,80,${0.04 * flicker})`);
            fGrad.addColorStop(1,    'rgba(255,180,60,0)');
            ctx.globalAlpha = 1;
            ctx.fillStyle = fGrad;
            ctx.beginPath();
            ctx.arc(tx, ty, 80, 0, Math.PI * 2);
            ctx.fill();
            // Streak rays
            ctx.globalAlpha = 0.06 * flicker;
            ctx.strokeStyle = '#fffacc';
            ctx.lineWidth = 1;
            for (let r = 0; r < 8; r++) {
                const ra = (r / 8) * Math.PI * 2 + T * 0.15;
                ctx.beginPath();
                ctx.moveTo(tx, ty);
                ctx.lineTo(tx + Math.cos(ra) * 100, ty + Math.sin(ra) * 100);
                ctx.stroke();
            }
            // Core bright dot
            ctx.globalAlpha = 0.85 * flicker;
            ctx.fillStyle   = '#fffde0';
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur  = 14;
            ctx.beginPath();
            ctx.arc(tx, ty, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Fireflies near towers (night only)
            for (let fi = 0; fi < 4; fi++) {
                const fa = T * (0.6 + fi * 0.22) + fi * 2.3;
                const fr = 18 + fi * 10;
                const fx = tx + Math.cos(fa) * fr;
                const fy = ty + 20 + fi * 8 + Math.sin(fa * 1.3) * 8;
                const fAlpha = 0.4 + 0.6 * Math.sin(T * 3.5 + fi * 1.1);
                ctx.globalAlpha = fAlpha;
                const ffGrad = ctx.createRadialGradient(fx, fy, 0, fx, fy, 6);
                ffGrad.addColorStop(0,   'rgba(180,255,100,0.9)');
                ffGrad.addColorStop(0.5, 'rgba(120,220,60,0.3)');
                ffGrad.addColorStop(1,   'rgba(80,180,30,0)');
                ctx.fillStyle = ffGrad;
                ctx.beginPath();
                ctx.arc(fx, fy, 6, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        ctx.restore();
    }
};
skyAtmosphere.init();

// ============================================================================
// SECTION 13: Surge Visual System (System 5)
// Multi-tier vertical badge meter + screen pulse + activation banner + ball aura
// ============================================================================

// ── Home Run Arc Trail ─────────────────────────────────────────────────────
// Records ball trajectory on HR and draws a dashed parabolic arc with glow
let _hrArcPoints  = [];    // [{x,y}] recorded hit-by-hit
let _hrArcTimer   = 0;     // seconds the arc has been showing
let _hrArcActive  = false;
let _hrArcSurgePowered = false;   // true if this HR was hit with surge active
let _hrArcSurgeColor   = '#ffd700'; // tier color for surge-powered arc
let _hrArcSurgeDark    = '#ff8800'; // dark/glow color for surge arc

// ── Deferred HR celebration ───────────────────────────────────────────────
// Instead of firing confetti/fireworks instantly at bat contact, we wait
// until the ball arc visually reaches the outfield wall (~0.4s).
let _hrCelebrationPending = false;
let _hrCelebrationFired   = false;

function _checkDeferredHRCelebration() {
    if (!_hrCelebrationPending || _hrCelebrationFired) return;
    // Fire when arc reveal is ≥ 80% (ball is past the wall)
    if (_hrArcTimer * 1.1 >= 0.96) {
        _hrCelebrationFired = true;
        _hrCelebrationPending = false;
        audio.play('homerun');
        camera.triggerShake(8, 0.25);
        Haptics.pulse('homerun');
        spawnConfetti(30);
        for (let i = 0; i < 2; i++) {
            setTimeout(() => spawnFirework(Math.random() * W, 80 + Math.random() * 160), i * 300);
        }
        commentary.trigger('homerun');
        crowdSystem.trigger('homerun');
        perfectBurst.trigger();
        // Trigger fielder miss reaction
        outfielders.onHomeRun();
    }
}

// ── Outfield Fielders ─────────────────────────────────────────────────────
// 3 fielders positioned in the outfield who react to hits
const outfielders = {
    players: [],
    _inited: false,

    init() {
        if (this._inited) return;
        this._inited = true;
        // Three outfielders: left field, center field, right field
        this.players = [
            { homeX: 60,      homeY: 310, x: 60,      y: 310, targetX: 0, targetY: 0, running: false, state: 'idle', timer: 0, flip: 1 },
            { homeX: W / 2,   homeY: 290, x: W / 2,   y: 290, targetX: 0, targetY: 0, running: false, state: 'idle', timer: 0, flip: 1 },
            { homeX: W - 60,  homeY: 310, x: W - 60,  y: 310, targetX: 0, targetY: 0, running: false, state: 'idle', timer: 0, flip: -1 },
        ];
    },

    reset() {
        for (const f of this.players) {
            f.x = f.homeX;
            f.y = f.homeY;
            f.running = false;
            f.state = 'idle';
            f.timer = 0;
        }
    },

    // Ball was hit — fielders start running toward the landing zone
    onHit(arcEndX, arcEndY) {
        this.init();
        for (const f of this.players) {
            // Pick a target near the ball landing point with some randomness
            f.targetX = arcEndX + (Math.random() - 0.5) * 60;
            f.targetY = arcEndY + (Math.random() - 0.5) * 30;
            f.running = true;
            f.state = 'chasing';
            f.timer = 0;
            f.flip = f.targetX > f.x ? 1 : -1;
        }
    },

    // Ball cleared the wall — fielders look up and react (missed)
    onHomeRun() {
        for (const f of this.players) {
            f.running = false;
            f.state = 'missed';
            f.timer = 0;
        }
    },

    // Base hit / foul — fielders return to positions
    onFielded() {
        for (const f of this.players) {
            f.running = false;
            f.state = 'returning';
            f.timer = 0;
        }
    },

    update(dt) {
        this.init();
        for (const f of this.players) {
            f.timer += dt;
            if (f.state === 'chasing' && f.running) {
                const dx = f.targetX - f.x, dy = f.targetY - f.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const speed = 120; // px/sec
                if (dist > 3) {
                    f.x += (dx / dist) * speed * dt;
                    f.y += (dy / dist) * speed * dt;
                } else {
                    f.running = false;
                }
            } else if (f.state === 'returning') {
                const dx = f.homeX - f.x, dy = f.homeY - f.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const speed = 80;
                if (dist > 3) {
                    f.x += (dx / dist) * speed * dt;
                    f.y += (dy / dist) * speed * dt;
                    f.flip = f.homeX > f.x ? 1 : -1;
                } else {
                    f.x = f.homeX; f.y = f.homeY;
                    f.state = 'idle';
                }
            } else if (f.state === 'missed' && f.timer > 1.8) {
                f.state = 'returning';
                f.timer = 0;
            }
        }
    },

    draw(ctx) {
        this.init();
        ctx.save();
        for (const f of this.players) {
            const bobY = f.running ? Math.sin(f.timer * 12) * 2 : 0;
            const px = f.x, py = f.y + bobY;

            // Body (uniform)
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.ellipse(px, py - 2, 7, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#333'; ctx.lineWidth = 0.8;
            ctx.stroke();

            // Head
            ctx.fillStyle = '#f5d0a0';
            ctx.beginPath();
            ctx.arc(px, py - 15, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#333'; ctx.lineWidth = 0.6;
            ctx.stroke();

            // Cap
            ctx.fillStyle = '#1a3f7a';
            ctx.beginPath();
            ctx.ellipse(px, py - 19, 7, 3, 0, Math.PI, Math.PI * 2);
            ctx.fill();
            // Cap brim
            ctx.fillStyle = '#1a3f7a';
            ctx.fillRect(px - 8, py - 19, 16, 2);

            // Glove hand
            const gloveX = px + f.flip * 10;
            ctx.fillStyle = '#8B4513';
            ctx.beginPath();
            ctx.arc(gloveX, py - 5, 4, 0, Math.PI * 2);
            ctx.fill();

            // Legs (running animation)
            if (f.running) {
                const legPhase = Math.sin(f.timer * 14);
                ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(px - 3, py + 8);
                ctx.lineTo(px - 3 + legPhase * 5, py + 18);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(px + 3, py + 8);
                ctx.lineTo(px + 3 - legPhase * 5, py + 18);
                ctx.stroke();
            } else {
                // Standing legs
                ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(px - 3, py + 8); ctx.lineTo(px - 4, py + 18); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(px + 3, py + 8); ctx.lineTo(px + 4, py + 18); ctx.stroke();
            }

            // Missed reaction — arms up, looking at sky
            if (f.state === 'missed' && f.timer < 1.5) {
                ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2; ctx.lineCap = 'round';
                const armWave = Math.sin(f.timer * 8) * 0.3;
                ctx.beginPath();
                ctx.moveTo(px - 7, py - 6);
                ctx.lineTo(px - 14, py - 22 + armWave * 10);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(px + 7, py - 6);
                ctx.lineTo(px + 14, py - 22 - armWave * 10);
                ctx.stroke();
            }

            // Number on back
            ctx.fillStyle = '#1a3f7a';
            ctx.font = 'bold 7px sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            const nums = ['7', '8', '9'];
            ctx.fillText(nums[this.players.indexOf(f)], px, py - 1);
        }
        ctx.restore();
    }
};

function recordHRArc(session, surgePowered, surgeTierColor, surgeTierDark) {
    _hrArcPoints  = [];
    _hrArcActive  = true;
    _hrArcTimer   = 0;
    _hrArcSurgePowered = !!surgePowered;
    _hrArcSurgeColor   = surgeTierColor || '#ffd700';
    _hrArcSurgeDark    = surgeTierDark  || '#ff8800';
    // Simulate parabolic path from bat contact point to outfield
    const startX  = session.ball ? session.ball.x : W / 2;
    const startY  = session.ball ? session.ball.y : H * 0.55;
    const peakX   = startX + (Math.random() - 0.3) * 120;
    const peakY   = 60 + Math.random() * 60;
    const endX    = peakX + 80 + Math.random() * 80;
    const endY    = 220;
    for (let t = 0; t <= 1; t += 0.04) {
        const inv = 1 - t;
        const px  = inv * inv * startX + 2 * inv * t * peakX + t * t * endX;
        const py  = inv * inv * startY + 2 * inv * t * peakY + t * t * endY;
        _hrArcPoints.push({ x: px, y: py });
    }
}

function drawHRArcTrail(ctx) {
    if (!_hrArcActive || _hrArcPoints.length < 2) return;
    _hrArcTimer += 1 / 60;
    const life    = 4.5;
    const fade    = Math.max(0, 1 - _hrArcTimer / life);
    if (fade <= 0) { _hrArcActive = false; _hrArcSurgePowered = false; return; }

    const revealPct = Math.min(1, _hrArcTimer * 1.1);
    const pointCount = Math.floor(_hrArcPoints.length * revealPct);
    if (pointCount < 2) return;

    const surgeOn = _hrArcSurgePowered;
    const mainColor = surgeOn ? _hrArcSurgeColor : '#ffd700';
    const glowColor = surgeOn ? _hrArcSurgeDark  : '#ff8800';
    const pulse = surgeOn ? (0.6 + 0.4 * Math.sin(Date.now() / 150)) : 1;

    ctx.save();

    // ── Surge outer energy field (extra wide glow, only for surge) ──
    if (surgeOn) {
        ctx.globalAlpha = fade * 0.2 * pulse;
        ctx.strokeStyle = mainColor;
        ctx.lineWidth   = 16;
        ctx.shadowColor = mainColor;
        ctx.shadowBlur  = 30;
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(_hrArcPoints[0].x, _hrArcPoints[0].y);
        for (let i = 1; i < pointCount; i++) {
            ctx.lineTo(_hrArcPoints[i].x, _hrArcPoints[i].y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
    }

    // ── Glow shadow pass ──
    ctx.globalAlpha = fade * (surgeOn ? 0.55 : 0.35);
    ctx.strokeStyle = mainColor;
    ctx.lineWidth   = surgeOn ? 8 : 6;
    ctx.shadowColor = glowColor;
    ctx.shadowBlur  = surgeOn ? 24 : 18;
    ctx.setLineDash(surgeOn ? [] : [12, 8]);
    ctx.beginPath();
    ctx.moveTo(_hrArcPoints[0].x, _hrArcPoints[0].y);
    for (let i = 1; i < pointCount; i++) {
        ctx.lineTo(_hrArcPoints[i].x, _hrArcPoints[i].y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // ── Crisp line pass ──
    ctx.globalAlpha = fade * 0.85;
    ctx.strokeStyle = surgeOn ? '#ffffff' : '#ffe066';
    ctx.lineWidth   = surgeOn ? 3 : 2.5;
    ctx.shadowBlur  = 0;
    ctx.setLineDash(surgeOn ? [4, 4] : [8, 6]);
    ctx.beginPath();
    ctx.moveTo(_hrArcPoints[0].x, _hrArcPoints[0].y);
    for (let i = 1; i < pointCount; i++) {
        ctx.lineTo(_hrArcPoints[i].x, _hrArcPoints[i].y);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // ── Surge sparkle particles along the trail ──
    if (surgeOn && pointCount > 4) {
        const sparkleTime = Date.now() / 80;
        for (let i = 2; i < pointCount; i += 3) {
            const pt = _hrArcPoints[i];
            const offsetX = Math.sin(sparkleTime + i * 1.7) * 8;
            const offsetY = Math.cos(sparkleTime + i * 2.3) * 6;
            ctx.globalAlpha = fade * (0.4 + 0.4 * Math.sin(sparkleTime + i));
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(pt.x + offsetX, pt.y + offsetY, 1.5, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // ── Animated dot chasing the arc head ──
    if (revealPct < 1) {
        const head = _hrArcPoints[pointCount - 1];
        ctx.globalAlpha = fade;
        const dotR = surgeOn ? 20 : 14;
        const dotGrad = ctx.createRadialGradient(head.x, head.y, 0, head.x, head.y, dotR);
        if (surgeOn) {
            dotGrad.addColorStop(0,   'rgba(255,255,255,0.95)');
            dotGrad.addColorStop(0.3, mainColor + 'cc');
            dotGrad.addColorStop(0.7, glowColor + '66');
            dotGrad.addColorStop(1,   'rgba(0,0,0,0)');
        } else {
            dotGrad.addColorStop(0,   'rgba(255,255,100,0.9)');
            dotGrad.addColorStop(0.4, 'rgba(255,180,0,0.4)');
            dotGrad.addColorStop(1,   'rgba(255,100,0,0)');
        }
        ctx.fillStyle = dotGrad;
        ctx.beginPath();
        ctx.arc(head.x, head.y, dotR, 0, Math.PI * 2);
        ctx.fill();
        // Inner bright core
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(head.x, head.y, surgeOn ? 5 : 4, 0, Math.PI * 2);
        ctx.fill();
        // Surge ring around dot
        if (surgeOn) {
            ctx.globalAlpha = fade * 0.6 * pulse;
            ctx.strokeStyle = mainColor;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(head.x, head.y, dotR + 4, 0, Math.PI * 2);
            ctx.stroke();
        }
    }

    // ── End label ──
    if (revealPct > 0.8 && pointCount >= _hrArcPoints.length) {
        const last = _hrArcPoints[_hrArcPoints.length - 1];
        ctx.globalAlpha = fade * (0.7 + 0.3 * Math.sin(Date.now() / 300));
        const label = surgeOn ? '⚡ SURGE HR!' : '⚾ GONE!';
        ctx.font = surgeOn ? 'bold 13px sans-serif' : 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.strokeStyle = 'rgba(0,0,0,0.8)';
        ctx.lineWidth = 3;
        ctx.strokeText(label, last.x, last.y - 6);
        ctx.fillStyle = mainColor;
        ctx.shadowColor = glowColor;
        ctx.shadowBlur = surgeOn ? 14 : 8;
        ctx.fillText(label, last.x, last.y - 6);
        ctx.shadowBlur = 0;
        ctx.textBaseline = 'alphabetic';
    }

    ctx.restore();
}

// Surge state for banner / flash
let _surgeActivationFlash = 0;   // 0–1, decays after activation
let _surgeBannerTimer = 0;       // countdown in ms
let _surgeBannerLevel = 0;
let _surgeBannerText = '';
let _surgeBannerColor = '#FFD700';
let _surgeFrameCount = 0;        // frame counter for shimmer

// Surge tier definitions for badge meter (maps to SURGE_TIERS thresholds)
const SURGE_BADGE_LEVELS = [
    { idx: 0, threshold: 0.20, color: '#00e5ff',  darkColor: '#00838f', icon: '⚡', label: 'L1', name: 'CHARGED' },
    { idx: 1, threshold: 0.50, color: '#ffeb3b',  darkColor: '#f9a825', icon: '⚡', label: 'L2', name: 'HOT'     },
    { idx: 2, threshold: 0.80, color: '#ff7043',  darkColor: '#d84315', icon: '🔥', label: 'L3', name: 'FIRE'    },
    { idx: 3, threshold: 1.00, color: '#aa00ff',  darkColor: '#6a1b9a', icon: '⭐', label: 'L4', name: 'SURGE!'  },
];

// ── Vertical Badge Surge Meter ────────────────────────────────────────────────
function drawSurgeBar(ctx) {
    _surgeFrameCount++;
    const progress = Math.max(0, Math.min(1, gameState.surgeProgress));
    const T = Date.now();

    const badgeW = 38, badgeH = 32, gap = 6, cornerR = 8;
    const rightX = W - badgeW - 10;
    const totalH = 4 * badgeH + 3 * gap;
    const topY = 58;   // below slim HUD bar

    ctx.save();

    // ── Badge stack (L4 at top, L1 at bottom) ────────────────────────────
    for (let vi = 3; vi >= 0; vi--) {
        const lev = SURGE_BADGE_LEVELS[vi];
        const row = 3 - vi;
        const bx = rightX;
        const by = topY + row * (badgeH + gap);

        const segCharge = Math.max(0, Math.min(1, (progress - (vi === 0 ? 0 : SURGE_BADGE_LEVELS[vi-1].threshold))
                                / (lev.threshold - (vi === 0 ? 0 : SURGE_BADGE_LEVELS[vi-1].threshold))));
        const isFilled  = progress >= lev.threshold;
        const isActive  = isFilled;

        ctx.beginPath();
        ctx.roundRect(bx, by, badgeW, badgeH, cornerR);

        if (isActive) {
            // Solid colored fill with pulse glow
            const pulse = 0.70 + 0.30 * Math.sin(T / 300 + vi * 0.8);
            const aGrad = ctx.createLinearGradient(bx, by, bx, by + badgeH);
            aGrad.addColorStop(0, lev.color);
            aGrad.addColorStop(1, lev.darkColor);
            ctx.fillStyle = aGrad;
            ctx.globalAlpha = 0.80 + pulse * 0.20;
            ctx.shadowColor = lev.color;
            ctx.shadowBlur = 12 + pulse * 10;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
            // Inner top shine
            const shine = ctx.createLinearGradient(bx, by, bx, by + badgeH * 0.4);
            shine.addColorStop(0, 'rgba(255,255,255,0.22)');
            shine.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = shine;
            ctx.beginPath();
            ctx.roundRect(bx + 1, by + 1, badgeW - 2, badgeH * 0.42, [cornerR, cornerR, 0, 0]);
            ctx.fill();
            // Shimmer sweep
            const shimPhase = ((_surgeFrameCount * 1.2 + vi * 35) % 100) / 100;
            if (shimPhase < 0.45) {
                ctx.save();
                ctx.beginPath();
                ctx.roundRect(bx, by, badgeW, badgeH, cornerR);
                ctx.clip();
                const shimX = bx - badgeW + (badgeW * 3) * (shimPhase / 0.45);
                const shimGrad = ctx.createLinearGradient(shimX, 0, shimX + badgeW, 0);
                shimGrad.addColorStop(0, 'rgba(255,255,255,0)');
                shimGrad.addColorStop(0.5, 'rgba(255,255,255,0.18)');
                shimGrad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = shimGrad;
                ctx.fillRect(bx, by, badgeW, badgeH);
                ctx.restore();
            }
        } else {
            // Dark glass background
            ctx.fillStyle = 'rgba(8, 12, 28, 0.72)';
            ctx.fill();
            // Partial charge fill (bottom-up)
            if (segCharge > 0.02) {
                ctx.save();
                ctx.beginPath();
                ctx.roundRect(bx, by, badgeW, badgeH, cornerR);
                ctx.clip();
                const fillH = badgeH * segCharge;
                ctx.fillStyle = lev.color;
                ctx.globalAlpha = 0.38;
                ctx.fillRect(bx, by + badgeH - fillH, badgeW, fillH);
                ctx.globalAlpha = 1;
                ctx.restore();
            }
        }

        // Border
        ctx.beginPath();
        ctx.roundRect(bx, by, badgeW, badgeH, cornerR);
        if (isActive) {
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1.8;
            ctx.shadowColor = lev.color;
            ctx.shadowBlur = 6;
        } else if (segCharge > 0.02) {
            ctx.strokeStyle = lev.color;
            ctx.lineWidth = 1.2;
            ctx.globalAlpha = 0.55;
        } else {
            ctx.strokeStyle = 'rgba(255,255,255,0.10)';
            ctx.lineWidth = 1;
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;

        // Icon
        ctx.font = `${isActive ? 13 : 10}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = isActive ? '#fff' : (segCharge > 0.02 ? lev.color : 'rgba(255,255,255,0.18)');
        ctx.fillText(lev.icon, bx + badgeW / 2, by + badgeH * 0.34);

        // Label
        ctx.font = `bold ${isActive ? 8 : 7}px sans-serif`;
        ctx.fillStyle = isActive ? '#ffffff' : 'rgba(255,255,255,0.28)';
        ctx.fillText(lev.label, bx + badgeW / 2, by + badgeH * 0.75);
    }

    // "POWER" label under stack
    const labelY = topY + totalH + 8;
    ctx.font = 'bold 7px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = progress > 0.2 ? SURGE_BADGE_LEVELS[0].color : 'rgba(255,255,255,0.20)';
    ctx.fillText('POWER', rightX + badgeW / 2, labelY);

    // Pulsing "TAP!" hint on the badge stack when power shot is available
    if (getActivePowerShot() && !_surgeActivated) {
        const tapPulse = 0.5 + 0.5 * Math.sin(T / 300);
        ctx.save();
        ctx.globalAlpha = 0.7 + tapPulse * 0.3;
        ctx.font = 'bold 9px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ffffff';
        ctx.shadowColor = '#FFD700';
        ctx.shadowBlur = 8;
        ctx.fillText('TAP!', rightX + badgeW / 2, labelY + 12);
        ctx.shadowBlur = 0;
        ctx.restore();
    }

    // ── Power shot available indicator (tappable button) ────────────────
    const activePower = getActivePowerShot();
    if (activePower) {
        const pulse2 = 0.80 + 0.20 * Math.sin(T / 250);
        const iconX = rightX - 44, iconY = topY + totalH / 2 - 22;
        const cx = iconX + 22, cy = iconY + 22;
        const surgeColor = activePower.icon === '⭐' ? '#aa00ff' : activePower.icon === '🔥' ? '#ff7043' : activePower.threshold >= 0.5 ? '#ffeb3b' : '#00e5ff';
        ctx.save();

        if (_surgeActivated) {
            // ── ACTIVATED state: pulsing bright ring ──
            const bigPulse = 0.6 + 0.4 * Math.sin(T / 120);
            ctx.globalAlpha = 1;
            ctx.shadowColor = surgeColor;
            ctx.shadowBlur = 20 + bigPulse * 15;
            // Filled bright circle
            ctx.fillStyle = surgeColor;
            ctx.beginPath();
            ctx.arc(cx, cy, 24, 0, Math.PI * 2);
            ctx.fill();
            // White border
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.shadowBlur = 0;
            // Icon
            ctx.font = '18px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(activePower.icon, cx, cy - 3);
            // "ACTIVE" label
            ctx.font = 'bold 7px sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.fillText('ACTIVE', cx, cy + 14);
            // Expanding ring animation
            const ringPhase = (T % 1200) / 1200;
            ctx.globalAlpha = 1 - ringPhase;
            ctx.strokeStyle = surgeColor;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cx, cy, 24 + ringPhase * 18, 0, Math.PI * 2);
            ctx.stroke();
        } else {
            // ── READY state: tappable button with hint ──
            ctx.globalAlpha = 0.90 * pulse2;
            ctx.shadowColor = surgeColor;
            ctx.shadowBlur = 14 * pulse2;
            // Circle button
            ctx.fillStyle = 'rgba(0,0,0,0.55)';
            ctx.beginPath();
            ctx.arc(cx, cy, 22, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = surgeColor;
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.globalAlpha = 1;
            ctx.font = '16px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(activePower.icon, cx, cy - 4);
            // "TAP" hint below icon
            ctx.font = 'bold 7px sans-serif';
            ctx.fillStyle = surgeColor;
            ctx.fillText('TAP', cx, cy + 12);
            // Name below button
            ctx.fillText(activePower.name, cx, cy + 25);
            ctx.shadowBlur = 0;
        }

        ctx.restore();
    }

    ctx.restore();
}

// ── Screen-wide surge pulse / edge glow ──────────────────────────────────────
function drawSurgeScreenEffects(ctx) {
    const progress = gameState.surgeProgress;
    const T = Date.now();

    // Edge vignette glow — appears once surge > 0.5
    if (progress > 0.50) {
        const tier = progress >= 1.0 ? SURGE_BADGE_LEVELS[3]
                   : progress >= 0.8 ? SURGE_BADGE_LEVELS[2]
                   : SURGE_BADGE_LEVELS[1];
        const intensity = (progress - 0.5) * 0.12;  // toned down from 0.24
        const pulse = 0.6 + 0.4 * Math.sin(T / 350);
        const vignette = ctx.createRadialGradient(W/2, H/2, H * 0.25, W/2, H/2, H * 0.75);
        vignette.addColorStop(0, 'rgba(0,0,0,0)');
        const _vc = tier.color;
        const _vr = parseInt(_vc.slice(1,3),16), _vg = parseInt(_vc.slice(3,5),16), _vb = parseInt(_vc.slice(5,7),16);
        vignette.addColorStop(1, `rgba(${_vr},${_vg},${_vb},${(intensity * pulse).toFixed(3)})`);
        // simpler approach:
        ctx.save();
        ctx.globalAlpha = intensity * pulse;
        ctx.fillStyle = tier.color;
        // manual edge vignette via 4 radial gradients at corners + center-transparent
        const edgeGrad = ctx.createRadialGradient(W/2, H/2, H * 0.22, W/2, H/2, H * 0.72);
        edgeGrad.addColorStop(0, 'rgba(0,0,0,0)');
        edgeGrad.addColorStop(1, tier.color + 'cc');
        ctx.fillStyle = edgeGrad;
        ctx.globalAlpha = intensity * pulse * 0.55;
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
    }

    // Activation flash (white screen flash when surge first maxes)
    if (_surgeActivationFlash > 0) {
        ctx.save();
        ctx.globalAlpha = _surgeActivationFlash * 0.55;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
        _surgeActivationFlash = Math.max(0, _surgeActivationFlash - 0.06);
    }
}

// ── Surge activation banner ───────────────────────────────────────────────────
function drawSurgeBanner(ctx) {
    if (_surgeBannerTimer <= 0) return;
    const T = _surgeBannerTimer;
    const duration = 2200;
    const t = 1 - T / duration;          // 0→1 as banner ages

    const scale    = t < 0.15 ? (t / 0.15) * (1 + 0.15 * (1 - t / 0.15)) : 1 - Math.max(0, t - 0.7) * 0.3;
    const alpha    = t < 0.15 ? (t / 0.15) : t > 0.72 ? Math.max(0, 1 - (t - 0.72) / 0.28) : 1;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(W / 2, H / 2 - 140);
    ctx.scale(scale, scale);

    const fontSize = 18 + _surgeBannerLevel * 3;

    // Shadow / outline
    ctx.strokeStyle = 'rgba(0,0,0,0.85)';
    ctx.lineWidth = 4;
    ctx.font = `bold ${fontSize}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeText(_surgeBannerText, 0, 0);

    // Glow
    ctx.shadowColor = _surgeBannerColor;
    ctx.shadowBlur = 14 + _surgeBannerLevel * 4;
    ctx.fillStyle = _surgeBannerColor;
    ctx.fillText(_surgeBannerText, 0, 0);
    ctx.shadowBlur = 0;

    // Sub-label for high levels
    if (_surgeBannerLevel >= 3) {
        ctx.font = `bold 11px sans-serif`;
        ctx.shadowColor = _surgeBannerColor;
        ctx.shadowBlur = 6;
        ctx.fillStyle = 'rgba(255,255,255,0.88)';
        ctx.fillText('POWER BOOST ACTIVE', 0, fontSize * 0.8);
        ctx.shadowBlur = 0;
    }

    ctx.restore();

    _surgeBannerTimer = Math.max(0, _surgeBannerTimer - 16);
}

function fillSurge(amount) {
    const before = gameState.surgeProgress;
    gameState.surgeProgress = Math.min(1, before + amount);
    const after  = gameState.surgeProgress;

    // Check tier crossing and trigger banner + flash
    for (const lev of SURGE_BADGE_LEVELS) {
        if (before < lev.threshold && after >= lev.threshold) {
            _surgeBannerLevel = lev.idx + 1;
            _surgeBannerText  = lev.name === 'SURGE!' ? '⭐ SURGE MAX! ⭐' : lev.icon + ' ' + lev.name + '!';
            _surgeBannerColor = lev.color;
            _surgeBannerTimer = 2200;
            _surgeActivationFlash = lev.idx >= 2 ? 1.0 : 0.55;
            camera.triggerShake(4 + lev.idx * 3, 0.18 + lev.idx * 0.08);
            Haptics.pulse(lev.idx >= 2 ? 'success' : 'medium');
            if (lev.threshold >= 1.0) {
                gameState._maxSurgeReached = true;
                commentary.trigger('powershot');
                audio.play('surge');
                Haptics.pulse('success');
                gameState.surgesTriggered = (gameState.surgesTriggered || 0) + 1;
            }
        }
    }

    gameState.saveToStorage();
}

function drainSurge(amount) {
    gameState.surgeProgress = Math.max(0, gameState.surgeProgress - amount);
}
