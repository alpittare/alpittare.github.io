        // Label
        ctx.font = 'bold 6px sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.fillText('STATCAST', baseX, baseY - pillH / 2 + 6);

        ctx.restore();
    }
};

// ================================================================
// PHASE 6: SLOW-MO HOME RUN REPLAY
// ================================================================
const slowMoReplay = {
    active: false,
    timer: 0,
    duration: 1.5,
    timeScale: 1.0, // applied to dt in game update
    letterboxH: 0,

    trigger() {
        this.active = true;
        this.timer = 0;
        this.timeScale = 0.3;
        this.letterboxH = 0;
    },

    update(dt) {
        if (!this.active) return;
        this.timer += dt; // real dt, not scaled

        // Phase transitions
        if (this.timer < 0.1) {
            // Ramp down
            this.timeScale = 1.0 - (this.timer / 0.1) * 0.7;
            this.letterboxH = (this.timer / 0.1) * 40;
        } else if (this.timer < 0.9) {
            // Slow-mo hold
            this.timeScale = 0.3;
            this.letterboxH = 40;
        } else if (this.timer < 1.2) {
            // Ramp back up
            const rampProgress = (this.timer - 0.9) / 0.3;
            this.timeScale = 0.3 + rampProgress * 0.7;
            this.letterboxH = 40 * (1 - rampProgress);
        } else {
            // Done
            this.active = false;
            this.timeScale = 1.0;
            this.letterboxH = 0;
        }
    },

    draw(ctx) {
        if (!this.active) return;

        // Letterbox bars
        if (this.letterboxH > 1) {
            ctx.fillStyle = 'rgba(0,0,0,0.85)';
            ctx.fillRect(0, 0, W, this.letterboxH);
            ctx.fillRect(0, H - this.letterboxH, W, this.letterboxH);
        }

        // Vignette during slow-mo
        if (this.timer > 0.1 && this.timer < 0.9) {
            const vig = ctx.createRadialGradient(W/2, H/2, H*0.25, W/2, H/2, H*0.6);
            vig.addColorStop(0, 'rgba(0,0,0,0)');
            vig.addColorStop(1, 'rgba(0,0,0,0.4)');
            ctx.fillStyle = vig;
            ctx.fillRect(0, 0, W, H);
        }

        // "REPLAY" flash text at start
        if (this.timer < 0.4) {
            const fa = Math.min(1, this.timer / 0.1) * (this.timer < 0.3 ? 1 : 1 - (this.timer - 0.3) / 0.1);
            ctx.save();
            ctx.globalAlpha = fa * 0.6;
            ctx.font = 'bold 10px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffd740';
            ctx.fillText('⏪ REPLAY', W / 2, this.letterboxH + 15);
            ctx.restore();
        }

        // Speed lines during slow-mo phase
        if (this.timer > 0.1 && this.timer < 0.9) {
            ctx.save();
            ctx.globalAlpha = 0.15;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1;
            for (let i = 0; i < 8; i++) {
                const angle = (Date.now() * 0.001 + i * Math.PI / 4) % (Math.PI * 2);
                const cx = W / 2, cy = H * 0.48;
                const r1 = 60 + i * 10;
                const r2 = r1 + 40;
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(angle) * r1, cy + Math.sin(angle) * r1);
                ctx.lineTo(cx + Math.cos(angle) * r2, cy + Math.sin(angle) * r2);
                ctx.stroke();
            }
            ctx.restore();
        }
    },

    getTimeScale() {
        return this.active ? this.timeScale : 1.0;
    }
};

// Performance Grade
const performanceGrade = {
    grade:      '',
    gradeTimer: 0,    // countdown to hide

    calculate(session) {
        if (!session) return;
        const t = session.lastTiming || '';
        let grade;
        if (t === 'perfect') grade = 'A+';
        else if (t === 'good')    grade = 'B';
        else if (t === 'early')   grade = 'C';
        else                      grade = 'F';
        this.grade      = grade;
        this.gradeTimer = 1.8;
    },

    update(dt) {
        if (this.gradeTimer > 0) this.gradeTimer -= dt;
    },

    draw(ctx) {
        if (this.gradeTimer <= 0 || !this.grade) return;
        const fade = Math.min(1, this.gradeTimer * 2);
        const T    = Date.now();
        const gx   = W - 56, gy = H - 148;
        const bounce = this.gradeTimer > 1.4 ? (1 - (1.8 - this.gradeTimer) / 0.4) * 0.3 : 0;
        const sc   = 1 + bounce;

        const colors = { 'A+':'#ffd700', 'B':'#69f0ae', 'C':'#ff9800', 'F':'#ff5252' };
        const gc = colors[this.grade] || '#ffffff';

        ctx.save();
        ctx.globalAlpha = fade;
        ctx.translate(gx, gy);
        ctx.scale(sc, sc);

        // Outer ring
        ctx.strokeStyle = gc;
        ctx.lineWidth = 3;
        ctx.shadowColor = gc;
        ctx.shadowBlur = 16;
        ctx.beginPath();
        ctx.arc(0, 0, 22, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Fill
        ctx.fillStyle = gc + '22';
        ctx.beginPath();
        ctx.arc(0, 0, 22, 0, Math.PI * 2);
        ctx.fill();

        // Grade letter
        ctx.font = `bold 20px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = gc;
        ctx.fillText(this.grade, 0, 1);
        ctx.textBaseline = 'alphabetic';

        // Label below
        ctx.globalAlpha = fade * 0.7;
        ctx.font = '8px sans-serif';
        ctx.fillStyle = '#ffffff';
        ctx.fillText('TIMING', 0, 32);

        ctx.restore();
    },
};

// ============================================================================
// SECTION 8e: Between-Pitch Countdown & Next-Up Preview
// After result shown, animated countdown + pitch type hint shown
// ============================================================================

const nextPitchPreview = {
    countdownTimer: 0,    // shows after result, before next windup
    nextType:       '',
    nextMPH:        0,
    visible:        false,
    _pulseT:        0,

    show(session) {
        if (!session) return;
        this.countdownTimer = 2.5;
        this.nextType  = session.pitchType || 'fastball';
        this.nextMPH   = Math.round((session.pitchSpeed || 80) / 1.609);
        this.visible   = true;
        this._pulseT   = 0;
    },

    update(dt) {
        if (!this.visible) return;
        this.countdownTimer = Math.max(0, this.countdownTimer - dt);
        this._pulseT += dt;
        if (this.countdownTimer <= 0) this.visible = false;
    },

    draw(ctx) {
        if (!this.visible || this.countdownTimer <= 0) return;
        const T     = Date.now();
        const fade  = Math.min(1, this.countdownTimer * 2, (2.5 - this.countdownTimer) * 5);
        const pulse = 0.7 + 0.3 * Math.sin(this._pulseT * 4);
        const countNum = Math.ceil(this.countdownTimer);

        ctx.save();
        ctx.globalAlpha = fade;

        // Countdown circle — moved down below crowd/stands area
        const cx = W / 2, cy = H * 0.26;
        const ring = 40;

        // Sweeping progress arc
        const arcPct = (this.countdownTimer % 1);
        ctx.strokeStyle = '#ff8c00';
        ctx.lineWidth   = 4;
        ctx.shadowColor = '#ff8c00';
        ctx.shadowBlur  = 14;
        ctx.beginPath();
        ctx.arc(cx, cy, ring, -Math.PI / 2, -Math.PI / 2 + arcPct * Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Background ring
        ctx.globalAlpha = fade * 0.2;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth   = 2;
        ctx.beginPath();
        ctx.arc(cx, cy, ring, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = fade;

        // Count number
        ctx.font = `bold 28px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#ffffff';
        ctx.shadowColor = '#ff8c00';
        ctx.shadowBlur = 12;
        ctx.fillText(countNum, cx, cy);
        ctx.shadowBlur = 0;

        // "NEXT PITCH" label
        ctx.font = 'bold 12px sans-serif';
        ctx.textBaseline = 'top';
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.fillText('NEXT PITCH', cx, cy - ring - 22);

        // Pitch type badge
        const typeColors = { fastball:'#FF6B35', curveball:'#9C27B0', changeup:'#2196F3', slider:'#00BCD4' };
        const typeIcons  = { fastball:'🔥', curveball:'🌀', changeup:'🎯', slider:'⚡' };
        const tc = typeColors[this.nextType] || '#ff8c00';
        ctx.globalAlpha = fade * pulse;
        const badgeW = 110, badgeH = 26;
        const bx = cx - badgeW / 2, by2 = cy + ring + 14;
        ctx.fillStyle  = tc + '44';
        ctx.strokeStyle = tc;
        ctx.lineWidth  = 1.5;
        ctx.shadowColor = tc;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.roundRect(bx, by2, badgeW, badgeH, 13);
        ctx.fill();
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#ffffff';
        ctx.font      = 'bold 13px sans-serif';
        ctx.textBaseline = 'middle';
        ctx.fillText(
            (typeIcons[this.nextType] || '') + ' ' +
            this.nextType.toUpperCase() + ' · ' + this.nextMPH + 'MPH',
            cx, by2 + badgeH / 2
        );
        ctx.textBaseline = 'alphabetic';

        ctx.restore();
    },
};

// ============================================================================
// SECTION 9: HUD drawing (System 22)
// ============================================================================

function drawHUD(ctx, session) {
    const gs = gameState;

    // ── TOP BAR (slim 52px) ────────────────────────────────────────────────
    const barGrad = ctx.createLinearGradient(0, 0, 0, 52);
    barGrad.addColorStop(0, 'rgba(5, 10, 22, 0.88)');
    barGrad.addColorStop(1, 'rgba(5, 10, 22, 0)');
    ctx.fillStyle = barGrad;
    ctx.fillRect(0, 0, W, 52);

    // ── Row 1: Level | At-Bats (compact dots) | Coins + Pause ────────────
    // Level (top-left)
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Lv.' + gs.level, 8, 14);
    drawProgressBar(ctx, 8, 19, 50, 3, gs.xp / gs.xpToNextLevel, '#4CAF50');

    // At-Bat dots (center, single row, small)
    const abCenterX = W / 2;
    const maxAB = session.maxAtBats || 5;
    const dotSpacing = 14;
    const totalWidth = (maxAB - 1) * dotSpacing;
    for (let i = 0; i < maxAB; i++) {
        const cx = abCenterX - totalWidth / 2 + i * dotSpacing;
        const cy = 13;
        const used = i < session.atBat;
        ctx.beginPath();
        ctx.arc(cx, cy, 5, 0, Math.PI * 2);
        if (used) {
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.25)';
            ctx.lineWidth = 1;
            ctx.stroke();
        } else {
            ctx.fillStyle = '#FF6B35';
            ctx.fill();
        }
    }

    // Coins (top-right, before pause)
    ctx.textAlign = 'right';
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 11px sans-serif';
    ctx.fillText('🪙 ' + gs.coins.toLocaleString(), W - 40, 14);

    // Pause button (top-right corner)
    ctx.fillStyle = 'rgba(255, 255, 255, 0.14)';
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(W - 34, 2, 30, 24, 7);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('⏸', W - 19, 19);

    // ── Row 2: Combo + Power-up (only if active, compact) ────────────────
    ctx.textBaseline = 'alphabetic';
    let row2Y = 36;
    if (session.combo >= 2) {
        ctx.save();
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = '#FF6B35';
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('🔥 ' + session.combo + 'x COMBO', abCenterX, row2Y);
        ctx.restore();
        row2Y += 12;
    }
    if (session.activePowerUp) {
        const pu = session.activePowerUp;
        ctx.save();
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = pu.color || '#FFD700';
        ctx.font = 'bold 9px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(pu.icon + ' ' + pu.name + ' [' + session.powerUpPitches + ']', abCenterX, row2Y);
        ctx.restore();
    }

    // ── STREAK BADGE — REMOVED (redundant with combo display) ──────────

    // ── PITCH INFO BADGE ──────────────────────────────────────────────────
    if (session.pitchState === 'pitching') {
        const typeLabels = { fastball: 'FASTBALL', curveball: 'CURVEBALL', changeup: 'CHANGEUP', slider: 'SLIDER' };
        const typeIcons  = { fastball: '🔥', curveball: '🌀', changeup: '🎯', slider: '⚡' };
        const typeColors = { fastball: '#FF6B35', curveball: '#9C27B0', changeup: '#2196F3', slider: '#00BCD4' };
        const speedMPH = Math.round(session.pitchSpeed / 1.609);
        const pType = session.pitchType || 'fastball';
        const pColor = typeColors[pType] || '#FF6B35';
        const pLabel = (typeIcons[pType] || '') + ' ' + (typeLabels[pType] || pType.toUpperCase());

        ctx.save();
        // Badge background
        ctx.fillStyle = pColor + '44';
        ctx.strokeStyle = pColor;
        ctx.lineWidth = 1;
        ctx.shadowColor = pColor;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.roundRect(W / 2 - 60, 58, 120, 18, 9);
        ctx.fill(); ctx.stroke();
        ctx.shadowBlur = 0;
        // Label + speed
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(pLabel + '  ' + speedMPH + ' MPH', W / 2, 70);
        ctx.restore();
    } else if (session.pitchState === 'windup') {
        ctx.save();
        const swipePulse = 0.6 + 0.4 * Math.sin(Date.now() / 400);
        ctx.globalAlpha = swipePulse;
        ctx.fillStyle = 'rgba(255,255,255,0)';
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(W / 2 - 68, 58, 136, 18, 9);
        ctx.fill(); ctx.stroke();
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('◀◀  SWIPE TO SWING  ▶▶', W / 2, 70);
        ctx.restore();
    }

    // === PHASE 3: Zone indicator ===
    if (session.pitchZone && session.zoneFlashTimer > 0) {
        const zd = PITCH_ZONES[session.pitchZone];
        if (zd && session.pitchZone !== 'center') {
            const zAlpha = Math.min(1, session.zoneFlashTimer * 2);
            ctx.save();
            ctx.globalAlpha = zAlpha * 0.8;
            ctx.font = 'bold 10px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = zd.color;
            ctx.shadowColor = zd.color;
            ctx.shadowBlur = 8;
            ctx.fillText(zd.icon + ' ' + zd.label, W / 2, 85);
            ctx.restore();
        }
    }

    // ── RADAR GUN PANEL — REMOVED (speed shown in pitch info badge) ─────
    // drawRadarGun(ctx, session);

    // ── HOME RUN COUNTER badge (bottom-right) ────────────────────────────
    drawHRCounter(ctx, session);
}

// ── Radar Gun display ─────────────────────────────────────────────────────
function drawRadarGun(ctx, session) {
    const T = Date.now();
    const bx = 8, by = H - 130, bw = 90, bh = 56;
    const speedMPH = Math.round((session.pitchSpeed || 80) / 1.609);

    ctx.save();
    // Panel glass
    const pgGrad = ctx.createLinearGradient(bx, by, bx, by + bh);
    pgGrad.addColorStop(0, 'rgba(10,20,50,0.88)');
    pgGrad.addColorStop(1, 'rgba(5,10,30,0.92)');
    ctx.fillStyle = pgGrad;
    ctx.beginPath();
    ctx.roundRect(bx, by, bw, bh, 10);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,200,255,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Top gloss
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    ctx.beginPath();
    ctx.roundRect(bx + 2, by + 2, bw - 4, bh / 2.5, [8, 8, 0, 0]);
    ctx.fill();

    // 📡 icon + RADAR label
    ctx.fillStyle = '#00e5ff';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('📡 RADAR', bx + 8, by + 16);

    // Speed reading — large mono digits
    const speedColor = speedMPH >= 95 ? '#ff4444' : speedMPH >= 85 ? '#ffaa00' : '#00e5ff';
    ctx.font = `bold 26px monospace`;
    ctx.fillStyle = speedColor;
    ctx.shadowColor = speedColor;
    ctx.shadowBlur = 10;
    ctx.fillText(speedMPH, bx + 10, by + 42);
    ctx.shadowBlur = 0;

    // MPH label
    ctx.font = '10px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('MPH', bx + 58, by + 42);

    // Speed bar
    const barX = bx + 8, barY = by + 47, barW = bw - 16, barH = 4;
    const speedPct = Math.min(1, (speedMPH - 60) / 50);
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW, barH, 2);
    ctx.fill();
    const barGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
    barGrad.addColorStop(0,   '#00e5ff');
    barGrad.addColorStop(0.5, '#ffaa00');
    barGrad.addColorStop(1,   '#ff4444');
    ctx.fillStyle = barGrad;
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW * speedPct, barH, 2);
    ctx.fill();

    ctx.restore();
}

// ── Home Run Counter badge ────────────────────────────────────────────────
function drawHRCounter(ctx, session) {
    const T = Date.now();
    const hx = W - 68, hy = H - 110, hw = 60, hh = 44;
    const hrs = session.homeRuns || 0;

    ctx.save();
    const hGrad = ctx.createLinearGradient(hx, hy, hx, hy + hh);
    hGrad.addColorStop(0, 'rgba(60,20,5,0.88)');
    hGrad.addColorStop(1, 'rgba(30,8,2,0.92)');
    ctx.fillStyle = hGrad;
    ctx.beginPath();
    ctx.roundRect(hx, hy, hw, hh, 8);
    ctx.fill();
    // Gold border — pulsing when HR > 0
    const borderPulse = hrs > 0 ? 0.5 + 0.5 * Math.sin(T / 500) : 0.25;
    ctx.strokeStyle = `rgba(255,200,0,${borderPulse})`;
    ctx.lineWidth = hrs > 0 ? 1.5 : 1;
    if (hrs > 0) {
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 8;
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
    // Top gloss
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.beginPath();
    ctx.roundRect(hx + 2, hy + 2, hw - 4, hh / 2.5, [6, 6, 0, 0]);
    ctx.fill();

    // Label
    ctx.font = 'bold 8px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,180,0,0.8)';
    ctx.fillText('HOME RUNS', hx + hw / 2, hy + 13);

    // Count
    ctx.font = `bold 20px sans-serif`;
    ctx.fillStyle = hrs > 0 ? '#ffd700' : 'rgba(255,255,255,0.25)';
    if (hrs > 0) {
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 10;
    }
    ctx.fillText(hrs, hx + hw / 2, hy + 33);
    ctx.shadowBlur = 0;

    // Goal indicator
    // Goal stars — filled gold up to current HR count
    const goalTarget = 1;
    ctx.font = '9px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText('GOAL: ' + goalTarget + (hrs >= goalTarget ? ' ✅' : ''), hx + hw / 2, hy + 53);
    // mini star dots showing progress toward goal
    for (let gi = 0; gi < goalTarget && gi < 3; gi++) {
        ctx.beginPath();
        ctx.arc(hx + hw / 2 - (goalTarget - 1) * 5 + gi * 10, hy + hh - 5, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = gi < hrs ? '#ffd700' : 'rgba(255,255,255,0.2)';
        if (gi < hrs) { ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 6; }
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    ctx.restore();
}

// SECTION 9b-pre: Combo Chain HUD + Result Confetti Particle System
// Combo counter tracks consecutive hits; confetti bursts on big results
// ============================================================================

const comboChain = {
    count: 0, timer: 0, maxSeen: 0, bumpTimer: 0,
    fireParticles: [],

    add(isHit) {
        if (isHit) {
            this.count++;
            this.timer = 3.8;
            if (this.count > this.maxSeen) this.maxSeen = this.count;
            this.bumpTimer = 0.45;
            // Spawn fire burst
            for (let i = 0; i < this.count * 3 + 4; i++) {
                this.fireParticles.push({
                    x: 56, y: H - 220,
                    vx: (Math.random() - 0.5) * 80,
                    vy: -(Math.random() * 60 + 20),
                    life: 0.8 + Math.random() * 0.5,
                    maxLife: 0, size: 3 + Math.random() * 5,
                    hue: Math.random() < 0.5 ? 30 : 55
                });
                this.fireParticles[this.fireParticles.length - 1].maxLife = this.fireParticles[this.fireParticles.length - 1].life;
            }
        } else {
            this.count = 0;
            this.timer = 0;
        }
    },

    update(dt) {
        if (this.timer > 0) this.timer -= dt;
        if (this.bumpTimer > 0) this.bumpTimer -= dt;
        this.fireParticles = this.fireParticles.filter(p => p.life > 0);
        this.fireParticles.forEach(p => {
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vy += 40 * dt; // gravity
            p.life -= dt;
        });
    },

    draw(ctx) {
        if (this.count < 2 || this.timer <= 0) return;
        const T = Date.now();
        const alpha = Math.min(1, this.timer / 0.5);
        const bump = this.bumpTimer > 0 ? 1 + 0.25 * (this.bumpTimer / 0.45) : 1;
        const cx = 56, cy = H - 220;

        // Fire particles
        this.fireParticles.forEach(p => {
            const pa = (p.life / p.maxLife) * 0.85;
            ctx.save();
            ctx.globalAlpha = pa * alpha;
            const r = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
            r.addColorStop(0, `hsl(${p.hue + 20}, 100%, 95%)`);
            r.addColorStop(0.5, `hsl(${p.hue}, 100%, 65%)`);
            r.addColorStop(1, `hsla(${p.hue - 10}, 90%, 40%, 0)`);
            ctx.fillStyle = r;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        });

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(cx, cy);
        ctx.scale(bump, bump);

        // Background card
        const cardW = 68, cardH = 46;
        const bgGrad = ctx.createLinearGradient(-cardW / 2, -cardH / 2, -cardW / 2, cardH / 2);
        if (this.count >= 5) {
            bgGrad.addColorStop(0, 'rgba(140, 0, 255, 0.92)');
            bgGrad.addColorStop(1, 'rgba(60, 0, 120, 0.95)');
        } else if (this.count >= 3) {
            bgGrad.addColorStop(0, 'rgba(255, 60, 0, 0.92)');
            bgGrad.addColorStop(1, 'rgba(120, 20, 0, 0.95)');
        } else {
            bgGrad.addColorStop(0, 'rgba(0, 130, 255, 0.88)');
            bgGrad.addColorStop(1, 'rgba(0, 50, 140, 0.92)');
        }
        ctx.fillStyle = bgGrad;
        ctx.beginPath();
        ctx.roundRect(-cardW / 2, -cardH / 2, cardW, cardH, 12);
        ctx.fill();

        // Glowing border
        const borderColor = this.count >= 5 ? '#cc44ff' : this.count >= 3 ? '#ff6600' : '#44aaff';
        ctx.strokeStyle = borderColor;
        ctx.lineWidth = 2;
        ctx.shadowColor = borderColor;
        ctx.shadowBlur = 10 + 6 * Math.sin(T / 300);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Top gloss
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.beginPath();
        ctx.roundRect(-cardW / 2 + 2, -cardH / 2 + 2, cardW - 4, cardH / 2.5, [10, 10, 0, 0]);
        ctx.fill();

        // COMBO label
        ctx.font = 'bold 8px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(255,255,255,0.65)';
        ctx.fillText('COMBO', 0, -cardH / 2 + 14);

        // Count
        const countColor = this.count >= 5 ? '#dd88ff' : this.count >= 3 ? '#ffaa44' : '#88ccff';
        ctx.font = `bold 18px sans-serif`;
        ctx.fillStyle = countColor;
        ctx.shadowColor = countColor;
        ctx.shadowBlur = 8;
        ctx.fillText('×' + this.count, 0, -cardH / 2 + 34);
        ctx.shadowBlur = 0;

        // Fire emoji row for high combos
        if (this.count >= 3) {
            ctx.font = '9px sans-serif';
            ctx.fillStyle = 'rgba(255,200,80,0.9)';
            const fires = '🔥'.repeat(Math.min(this.count, 5));
            ctx.fillText(fires, 0, cardH / 2 - 5);
        }

        ctx.restore();
    }
};

// ─── Result Confetti Particle System ─────────────────────────────────────────
const resultConfetti = {
    particles: [],

    _colors: ['#FF3366', '#FFD700', '#00E676', '#2979FF', '#FF6D00', '#E040FB', '#00BCD4', '#FFEB3B'],

    trigger(isHR) {
        const count = isHR ? 80 : 36;
        for (let i = 0; i < count; i++) {
            const angle = (Math.random() * Math.PI * 2);
            const speed = isHR ? (80 + Math.random() * 180) : (50 + Math.random() * 110);
            this.particles.push({
                x: W / 2 + (Math.random() - 0.5) * 60,
                y: H / 2 - 30,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed - (isHR ? 60 : 30),
                life: 1.2 + Math.random() * 0.8,
                maxLife: 0,
                color: this._colors[Math.floor(Math.random() * this._colors.length)],
                size: 3 + Math.random() * 6,
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 12,
                isRect: Math.random() < 0.6,
                spin: 0
            });
            this.particles[this.particles.length - 1].maxLife = this.particles[this.particles.length - 1].life;
        }
        // Additional stream from top for HR
        if (isHR) {
            for (let i = 0; i < 40; i++) {
                this.particles.push({
                    x: Math.random() * W,
                    y: -10,
                    vx: (Math.random() - 0.5) * 60,
                    vy: 80 + Math.random() * 120,
                    life: 1.5 + Math.random() * 1.0,
                    maxLife: 0,
                    color: this._colors[Math.floor(Math.random() * this._colors.length)],
                    size: 4 + Math.random() * 7,
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 15,
                    isRect: Math.random() < 0.5,
                    spin: 0
                });
                this.particles[this.particles.length - 1].maxLife = this.particles[this.particles.length - 1].life;
            }
        }
    },

    update(dt) {
        this.particles = this.particles.filter(p => p.life > 0);
        this.particles.forEach(p => {
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vx *= (1 - 1.5 * dt); // air drag
            p.vy += 160 * dt;        // gravity
            p.rotation += p.rotSpeed * dt;
            p.life -= dt;
        });
    },

    draw(ctx) {
        if (this.particles.length === 0) return;
        ctx.save();
        this.particles.forEach(p => {
            const a = Math.max(0, p.life / p.maxLife);
            ctx.globalAlpha = a * 0.92;
            ctx.fillStyle = p.color;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation);
            if (p.isRect) {
                ctx.fillRect(-p.size / 2, -p.size * 0.35, p.size, p.size * 0.7);
            } else {
                ctx.beginPath();
                ctx.arc(0, 0, p.size * 0.5, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        });
        ctx.globalAlpha = 1;
        ctx.restore();
    }
};

const pitchCountDisplay = {

// ─── Swing Timing Arc (visual arc showing timing window under batter) ─────────
const swingTimingArc = {
    active: false, progress: 0, hitMarker: -1,
    resultColor: '#ffffff', showResult: false, resultTimer: 0,
    arcSegments: [],

    activate(session) {
        this.active = true;
        this.progress = 0;
        this.hitMarker = -1;
        this.showResult = false;
        this.resultTimer = 0;
        this.arcSegments = [];
        // Build segments: early(red) | good(yellow) | perfect(green) | good(yellow) | late(red)
        const zones = [
            { start: 0.00, end: 0.20, color: '#ff4444', label: 'EARLY' },
            { start: 0.20, end: 0.36, color: '#ffcc22', label: 'GOOD'  },
            { start: 0.36, end: 0.64, color: '#44ff88', label: 'PERFECT' },
            { start: 0.64, end: 0.80, color: '#ffcc22', label: 'GOOD'  },
            { start: 0.80, end: 1.00, color: '#ff4444', label: 'LATE'  },
        ];
        this.arcSegments = zones;
    },

    recordHit(timing) {
        const tMap = { early: 0.10, good: 0.28, perfect: 0.50, late: 0.90 };
        this.hitMarker = tMap[timing] || 0.5;
        this.showResult = true;
        this.resultTimer = 1.5;
        this.resultColor = timing === 'perfect' ? '#44ff88'
                         : timing === 'good'    ? '#ffcc22' : '#ff5544';
    },

    update(dt, session) {
        if (!this.active) return;
        if (session && session.pitching) {
            const elapsed = session.pitchTimer || 0;
            const dur = session.pitchDuration || 1.8;
            this.progress = Math.min(elapsed / dur, 1);
        }
        if (this.showResult && this.resultTimer > 0) {
            this.resultTimer -= dt;
            if (this.resultTimer <= 0) { this.active = false; this.showResult = false; }
        }
    },

    draw(ctx, session) {
        if (!this.active || !session || !session.pitching) return;
        const T = Date.now();
        const cx = W / 2, cy = H * 0.72;
        const arcR = 34, arcW = 6;
        const startA = Math.PI * 0.75, endA = Math.PI * 2.25;
        const arcSpan = endA - startA;

        ctx.save();

        // Draw colored zone segments
        this.arcSegments.forEach(seg => {
            const sa = startA + seg.start * arcSpan;
            const ea = startA + seg.end   * arcSpan;
            ctx.beginPath();
            ctx.arc(cx, cy, arcR, sa, ea);
            ctx.lineWidth = arcW;
            ctx.strokeStyle = seg.color;
            ctx.globalAlpha = 0.35;
            ctx.stroke();
            ctx.globalAlpha = 1;
        });

        // Moving sweep indicator
        const sweepA = startA + this.progress * arcSpan;
        ctx.beginPath();
        ctx.arc(cx, cy, arcR, sweepA - 0.06, sweepA + 0.06);
        ctx.lineWidth = arcW + 4;
        ctx.strokeStyle = '#ffffff';
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur = 12;
        ctx.globalAlpha = 0.85;
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;

        // Hit marker (if swing happened)
        if (this.showResult && this.hitMarker >= 0) {
            const hitA = startA + this.hitMarker * arcSpan;
            ctx.beginPath();
            ctx.arc(cx, cy, arcR, hitA - 0.08, hitA + 0.08);
            ctx.lineWidth = arcW + 6;
            ctx.strokeStyle = this.resultColor;
            ctx.shadowColor = this.resultColor;
            ctx.shadowBlur = 20 + 10 * Math.sin(T / 200);
            const fa = Math.min(1, this.resultTimer / 0.4);
            ctx.globalAlpha = fa;
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
        }

        ctx.restore();
    }
};

// ============================================================================
// SECTION 9b: Pitch Arrival Warning + Perfect Hit Celebration
// "INCOMING!" flash as ball nears zone; multi-layer "PERFECT!" burst
// ============================================================================

const pitchWarning = {
    flash: 0,       // 0-1, shows when ball nears batter zone
    lastY: -1,

    update(session, dt) {
        if (!session || session.pitchState !== 'pitching') {
            this.flash = Math.max(0, this.flash - dt * 4);
            return;
        }
        // When ball within ~80px of batter zone
        const ballY = session.ball ? session.ball.y : -1;
        if (ballY > 560 && this.lastY <= 560) {
            this.flash = 1.0;
        }
        this.flash = Math.max(0, this.flash - dt * 2.5);
        this.lastY = ballY;
    },

    draw(ctx) {
        if (this.flash <= 0) return;
        ctx.save();
        // Red edge vignette pulse
        const vg = ctx.createRadialGradient(W/2, H*0.7, 80, W/2, H*0.7, 260);
        vg.addColorStop(0,   'rgba(255,0,0,0)');
        vg.addColorStop(0.7, `rgba(220,0,0,${this.flash * 0.08})`);
        vg.addColorStop(1,   `rgba(200,0,0,${this.flash * 0.2})`);
        ctx.fillStyle = vg;
        ctx.fillRect(0, 0, W, H);

        // "INCOMING!" text flash
        if (this.flash > 0.4) {
            ctx.globalAlpha = (this.flash - 0.4) / 0.6;
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#ff4444';
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 8;
            ctx.fillText('⚡ INCOMING!', W / 2, H * 0.58);
            ctx.shadowBlur = 0;
        }
        ctx.restore();
    },
};

// Perfect hit burst overlay
const perfectBurst = {
    timer: 0,
    active: false,

    trigger() {
        this.timer  = 1.6;
        this.active = true;
    },

    update(dt) {
        if (!this.active) return;
        this.timer = Math.max(0, this.timer - dt);
        if (this.timer <= 0) this.active = false;
    },

    draw(ctx) {
        if (!this.active || this.timer <= 0) return;
        const T    = Date.now();
        const fade = Math.min(1, this.timer * 2);
        const prog = 1 - this.timer / 1.6;   // 0 → 1 over time
        const cx   = W / 2, cy = H * 0.48;

        ctx.save();

        // Expanding starburst rings
        for (let ri = 0; ri < 5; ri++) {
            const rProg = Math.max(0, prog - ri * 0.1);
            if (rProg <= 0) continue;
            const r = rProg * (120 + ri * 40);
            ctx.globalAlpha = (1 - rProg) * fade * 0.6;
            ctx.strokeStyle = ri % 2 === 0 ? '#ffd700' : '#ff8c00';
            ctx.lineWidth = 4 - ri * 0.5;
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 16;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // Starburst rays
        ctx.globalAlpha = fade * 0.6 * (1 - prog);
        ctx.strokeStyle = '#fff8c0';
        ctx.lineWidth = 2.5;
        for (let r = 0; r < 16; r++) {
            const angle = (r / 16) * Math.PI * 2 + prog * 0.5;
            const inner = 20 + prog * 30;
            const outer = 60 + prog * 80;
            ctx.beginPath();
            ctx.moveTo(cx + Math.cos(angle) * inner, cy + Math.sin(angle) * inner);
            ctx.lineTo(cx + Math.cos(angle) * outer, cy + Math.sin(angle) * outer);
            ctx.stroke();
        }

        // PERFECT! text
        const textFade = prog < 0.5 ? prog / 0.5 : 1 - (prog - 0.5) / 0.5;
        const textScale = 0.5 + textFade * 0.7;
        ctx.globalAlpha = textFade * fade;
        ctx.translate(cx, cy);
        ctx.scale(textScale, textScale);
        ctx.font = 'bold 28px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.strokeStyle = 'rgba(0,0,0,0.8)';
        ctx.lineWidth = 5;
        ctx.strokeText('⭐ PERFECT! ⭐', 0, 0);
        const pGrad = ctx.createLinearGradient(-90, -16, 90, 16);
        pGrad.addColorStop(0, '#fff8c0');
        pGrad.addColorStop(0.3, '#ffd700');
        pGrad.addColorStop(0.7, '#ff9900');
        pGrad.addColorStop(1, '#fff8c0');
        ctx.fillStyle = pGrad;
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 28;
        ctx.fillText('⭐ PERFECT! ⭐', 0, 0);
        ctx.shadowBlur = 0;

        ctx.restore();
    },
};

// ============================================================================
// SECTION 10: Result overlay
// ============================================================================

function drawResultOverlay(ctx, session) {
    const fadeIn = Math.min(1, session.resultTimer / 0.22);
    const T = Date.now();

    const RESULT_STYLES = {
        'HOME RUN!': { color: '#FFD700', bg: 'rgba(255,107,0,0.18)', size: 36, glow: '#FF8800', isHR: true  },
        'BASE HIT':  { color: '#69F0AE', bg: 'rgba(0,200,80,0.15)',  size: 28, glow: '#00CC55', isHR: false },
        'FOUL':      { color: '#FF9800', bg: 'rgba(255,100,0,0.12)', size: 28, glow: '#FF5500', isHR: false },
        'STRIKE':    { color: '#FF5252', bg: 'rgba(200,0,0,0.15)',   size: 30, glow: '#CC0000', isHR: false },
    };
    const style = RESULT_STYLES[session.lastResult] || { color: '#fff', bg: 'rgba(0,0,0,0.5)', size: 28, glow: '#fff', isHR: false };

    // Overlay dim
    ctx.globalAlpha = fadeIn * (style.isHR ? 0.50 : 0.55);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = fadeIn;

    // HOME RUN special flash effect (white flash on first frame)
    if (style.isHR && session.resultTimer < 0.12) {
        const flashAlpha = (1 - session.resultTimer / 0.12) * 0.6;
        ctx.globalAlpha = flashAlpha;
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, W, H);
        ctx.globalAlpha = fadeIn;
    }

    // Colored radial backdrop
    const backdropR = ctx.createRadialGradient(W / 2, H / 2 - 20, 0, W / 2, H / 2 - 20, 220);
    backdropR.addColorStop(0, style.bg);
    backdropR.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = backdropR;
    ctx.fillRect(0, 0, W, H);

    // Scale bounce animation
    const scaleT = Math.min(session.resultTimer / 0.30, 1);
    const scale = 0.5 + 0.6 * scaleT - 0.1 * Math.max(0, scaleT - 0.8);

    ctx.save();
    ctx.translate(W / 2, H / 2 - 30);
    ctx.scale(scale, scale);

    // Text outline
    ctx.strokeStyle = 'rgba(0,0,0,0.8)';
    ctx.lineWidth = 5;
    ctx.font = `bold ${style.size}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeText(session.lastResult, 0, 0);

    // Glow
    ctx.shadowColor = style.glow;
    ctx.shadowBlur = 22;
    ctx.fillStyle = style.color;
    ctx.fillText(session.lastResult, 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();

    // Timing label
    const TIMING_LABELS = {
        perfect: '✨ PERFECT TIMING!',
        early:   '⏰ Too Early',
        late:    '⌛ Too Late',
        good:    '👌 Good Timing',
    };
    const timingLabel = TIMING_LABELS[session.lastTiming] || (session.lastTiming || '');
    if (timingLabel) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.88)';
        ctx.font = 'bold 17px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'alphabetic';
        ctx.shadowColor = 'rgba(0,0,0,0.7)';
        ctx.shadowBlur = 8;
        ctx.fillText(timingLabel, W / 2, H / 2 + 24);
        ctx.shadowBlur = 0;
    }

    // Coins earned
    const coinsThisSwing = session.lastResult === 'HOME RUN!' ? 10
                          : session.lastResult === 'BASE HIT' ? 5
                          : session.lastResult === 'FOUL' ? 1 : 0;
    if (coinsThisSwing > 0) {
        const coinBounce = 1 + 0.15 * Math.sin(T / 200);
        ctx.save();
        ctx.translate(W / 2, H / 2 + 58);
        ctx.scale(coinBounce, coinBounce);
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 17px sans-serif';
        ctx.textAlign = 'center';
        ctx.shadowColor = '#FF8800';
        ctx.shadowBlur = 12;
        ctx.fillText('+' + coinsThisSwing + ' 🪙', 0, 0);
        ctx.shadowBlur = 0;
        ctx.restore();
    }

    // Remaining at-bats
    const remaining = session.maxAtBats - session.atBat;
    if (session.lastResult !== 'HOME RUN!' && remaining > 0) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
        ctx.font = '13px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(remaining + ' at-bat' + (remaining > 1 ? 's' : '') + ' left', W / 2, H / 2 + 88);
    }

    ctx.globalAlpha = 1;
}

    _menuButtons.multiplayer = { x: W / 2 - 110, y: mpY, w: 220, h: mpH };
    const mpGrad = ctx.createLinearGradient(W/2 - 110, mpY, W/2 - 110, mpY + mpH);
    mpGrad.addColorStop(0, '#26C6DA'); mpGrad.addColorStop(0.5, '#00BCD4'); mpGrad.addColorStop(1, '#0097A7');
    ctx.fillStyle = mpGrad;
    ctx.beginPath(); ctx.roundRect(W/2 - 110, mpY, 220, mpH, 18); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath(); ctx.roundRect(W/2 - 108, mpY + 1, 216, mpH * 0.38, [16,16,0,0]); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.20)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(W/2 - 110, mpY, 220, mpH, 18); ctx.stroke();
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('⚡  MULTIPLAYER', W/2, mpY + mpH / 2);

    // ── CAMPAIGN BUTTON ──────────────────────────────────────────────────
    const levelsY = mpY + mpH + 6;
    const levH = 36;
    _menuButtons.levels = { x: W / 2 - 110, y: levelsY, w: 220, h: levH };
    const levelsGrad = ctx.createLinearGradient(W/2 - 110, levelsY, W/2 - 110, levelsY + levH);
    levelsGrad.addColorStop(0, '#AB47BC'); levelsGrad.addColorStop(0.5, '#9C27B0'); levelsGrad.addColorStop(1, '#7B1FA2');
    ctx.fillStyle = levelsGrad;
    ctx.beginPath(); ctx.roundRect(W/2 - 110, levelsY, 220, levH, 18); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath(); ctx.roundRect(W/2 - 108, levelsY + 1, 216, levH * 0.38, [16,16,0,0]); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.20)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(W/2 - 110, levelsY, 220, levH, 18); ctx.stroke();
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('📊  CAMPAIGN (Lv' + gameState.campaignLevel + ')', W/2, levelsY + levH / 2);
    ctx.textBaseline = 'alphabetic';

    // ── DAILY REWARD BANNER ──────────────────────────────────────────────
    const dailyY = levelsY + levH + 6;
    if (!gameState.dailyReward.claimed) {
        const gPulse = 0.88 + 0.12 * Math.sin(T / 450);
        const dailyH = 28;
        _menuButtons.daily = { x: 10, y: dailyY, w: W - 20, h: dailyH };
        const drBg = ctx.createLinearGradient(10, dailyY, W-10, dailyY);
        drBg.addColorStop(0, 'rgba(255,180,0,0.15)');
        drBg.addColorStop(0.5, 'rgba(255,140,0,0.22)');
        drBg.addColorStop(1, 'rgba(255,180,0,0.15)');
        ctx.fillStyle = drBg;
        ctx.beginPath(); ctx.roundRect(10, dailyY, W-20, dailyH, 8); ctx.fill();
        ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 1;
        ctx.globalAlpha = gPulse;
        ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 6;
        ctx.beginPath(); ctx.roundRect(10, dailyY, W-20, dailyH, 8); ctx.stroke();
        ctx.shadowBlur = 0; ctx.globalAlpha = 1;
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('🎁  DAILY REWARD  —  Tap to Claim!', W/2, dailyY + dailyH / 2);
        ctx.textBaseline = 'alphabetic';
    }

    // ── MISSIONS PANEL ────────────────────────────────────────────────────
    const navY = H - 64;
    const missY = navY - 110;
    // Missions card with accent border
    drawGlassCard(ctx, 10, missY, W - 20, 100, 12);
    ctx.fillStyle = 'rgba(0,255,136,0.10)';
    ctx.beginPath(); ctx.roundRect(10, missY, W-20, 20, [12,12,0,0]); ctx.fill();
    ctx.strokeStyle = 'rgba(0,255,136,0.25)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(10, missY, W-20, 100, 12); ctx.stroke();
    ctx.fillStyle = '#00FF88';
    ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText('📋  MISSIONS', 16, missY + 10);
    ctx.textBaseline = 'alphabetic';
    const missions = (gameState.missions || []).slice(0, 2);
    for (let i = 0; i < missions.length; i++) {
        const m = missions[i];
        const prog = m.getProgress ? m.getProgress(gameState) : (m.progress || 0);
        const goal = m.goal || 1;
        const pct  = Math.min(1, prog / goal);
        const isDone = pct >= 1 || m.done;
        const my = missY + 26 + i * 34;
        // Row bg
        ctx.fillStyle = isDone ? 'rgba(0,255,136,0.06)' : 'rgba(255,255,255,0.02)';
        ctx.beginPath(); ctx.roundRect(14, my - 3, W - 28, 24, 5); ctx.fill();
        // Name
        ctx.fillStyle = isDone ? '#00FF88' : 'rgba(255,255,255,0.85)';
        ctx.font = isDone ? 'bold 10px sans-serif' : '10px sans-serif';
        ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
        ctx.fillText((isDone ? '✓ ' : '') + m.name, 18, my + 7);
        // Progress bar
        drawProgressBar(ctx, 18, my + 11, W - 36, 5, pct, isDone ? '#00FF88' : '#4FC3F7');
        // Progress label
        ctx.fillStyle = isDone ? '#00FF88' : 'rgba(255,255,255,0.45)';
        ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'right';
        ctx.fillText(isDone ? '✓ DONE' : (prog + ' / ' + goal), W - 18, my + 7);
    }

    // ── COMPACT BOTTOM NAV ──────────────────────────────────────────────
    const navBgGrad = ctx.createLinearGradient(0, navY - 12, 0, H);
    navBgGrad.addColorStop(0, 'rgba(0,0,0,0)');
    navBgGrad.addColorStop(0.20, 'rgba(6, 10, 24, 0.92)');
    navBgGrad.addColorStop(1,   'rgba(4, 8, 20, 1.0)');
    ctx.fillStyle = navBgGrad;
    ctx.fillRect(0, navY - 12, W, H - navY + 12);
    // Top separator line
    ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, navY - 6); ctx.lineTo(W, navY - 6); ctx.stroke();

    const navButtons = [
        { key: 'shop',         icon: '⚾', label: 'SHOP',    x: W * 0.1 },
        { key: 'achievements', icon: '🏆', label: 'AWARDS',  x: W * 0.3 },
        { key: 'leaderboard',  icon: '🏅', label: 'RANKS',   x: W * 0.5 },
        { key: 'stats',        icon: '📊', label: 'STATS',   x: W * 0.7 },
        { key: 'settings',     icon: '⚙',  label: 'SETTINGS', x: W * 0.9 },
    ];
    for (const btn of navButtons) {
        const bx = btn.x - 26, by = navY;
        _menuButtons[btn.key] = { x: bx, y: by, w: 52, h: 54 };
        // Pill bg with subtle glow
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.strokeStyle = 'rgba(255,255,255,0.10)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.roundRect(bx, by, 52, 48, 12); ctx.fill(); ctx.stroke();
        // Icon
        ctx.fillStyle = '#ffffff';
        ctx.font = '18px sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(btn.icon, btn.x, by + 18);
        // Label
        ctx.fillStyle = 'rgba(255,255,255,0.45)';
        ctx.font = 'bold 7px sans-serif';
        ctx.textBaseline = 'alphabetic';
        ctx.fillText(btn.label, btn.x, by + 42);
    }
    ctx.textBaseline = 'alphabetic';
}

// ============================================================================
// SECTION 12: Game Over screen
// ============================================================================

const _gameOverButtons = {};

// ── Game Over reveal state ────────────────────────────────────────────────
let _goRevealTimer = 0;   // counts up from 0 on game over start
let _goLastScreen  = '';  // track screen transitions to reset timer
let _continueCount = 0;   // track number of continues used

// ── Active power-ups during game ────────────────────────────────────────────
let _activeScoreBoost = false;
let _activeCoinMagnet = false;
let _activeXpBoost = false;
let _activeEasyMode = false;

// ── VIP Popup system ──────────────────────────────────────────────────────
let _showVIPPopup = false;
const _vipBuyBtn = {};
const _vipDismissBtn = {};
let _vipCloseBtn = {};

function drawGameOverScreen(ctx) {
    if (!currentGame) return;

    ctx.globalAlpha = 1;
    ctx.resetTransform();
    ctx.shadowBlur = 0;

    const won = currentGame.homeRuns >= 1;
    const T   = Date.now();

    if (_goLastScreen !== 'gameOver') {
        _goLastScreen  = 'gameOver';
        _goRevealTimer = 0;
    }
    _goRevealTimer += 1 / 60;
    const rev = _goRevealTimer;

    // ── Background: solid gradient (no field showing through) ────────────
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    if (won) {
        bgGrad.addColorStop(0,   '#0a0e1a');
        bgGrad.addColorStop(0.3, '#0d1530');
        bgGrad.addColorStop(0.7, '#101835');
        bgGrad.addColorStop(1,   '#080c18');
    } else {
        bgGrad.addColorStop(0,   '#1a0808');
        bgGrad.addColorStop(0.5, '#140a0a');
        bgGrad.addColorStop(1,   '#0a0606');
    }
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // ── Subtle radial spotlight behind content ──────────────────────────
    ctx.save();
    ctx.globalAlpha = won ? 0.12 : 0.06;
    const spotGrad = ctx.createRadialGradient(W / 2, 260, 20, W / 2, 260, 320);
    spotGrad.addColorStop(0, won ? '#ffd700' : '#ff4444');
    spotGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = spotGrad;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();

    // ── Animated particle dots (subtle ambient) ─────────────────────────
    ctx.save();
    const particleT = T / 3000;
    for (let i = 0; i < 20; i++) {
        const px = ((i * 137.5 + particleT * 40) % W);
        const py = ((i * 89.3 + particleT * 20 + Math.sin(i + particleT) * 30) % H);
        const pa = 0.08 + 0.06 * Math.sin(T / 800 + i);
        ctx.globalAlpha = pa * Math.min(1, rev * 2);
        ctx.fillStyle = won ? '#ffd700' : '#ff6666';
        ctx.beginPath();
        ctx.arc(px, py, 1.2, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();

    if (won) {
        drawConfetti(ctx);
        drawFireworks(ctx);
    }

    // ── Score badge (compact, centered) ─────────────────────────────────
    const scoreVis = Math.min(1, rev * 3);
    if (scoreVis > 0) {
        ctx.save();
        ctx.globalAlpha = scoreVis;

        // Animated scale-in
        const scaleIn = 0.6 + 0.4 * Math.min(1, rev * 2.5);
        ctx.translate(W / 2, 62);
        ctx.scale(scaleIn, scaleIn);

        // Score circle
        const scoreR = 38;
        const circGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, scoreR);
        if (won) {
            circGrad.addColorStop(0, 'rgba(255,215,0,0.15)');
            circGrad.addColorStop(1, 'rgba(255,140,0,0.05)');
        } else {
            circGrad.addColorStop(0, 'rgba(255,60,60,0.12)');
            circGrad.addColorStop(1, 'rgba(200,0,0,0.04)');
        }
        ctx.fillStyle = circGrad;
        ctx.beginPath();
        ctx.arc(0, 0, scoreR, 0, Math.PI * 2);
        ctx.fill();

        // Ring
        ctx.strokeStyle = won ? 'rgba(255,215,0,0.4)' : 'rgba(255,80,80,0.35)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, scoreR, 0, Math.PI * 2);
        ctx.stroke();

        // Score number
        ctx.font = 'bold 32px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = won ? '#ffd700' : '#ff5252';
        ctx.fillText(String(currentGame.homeRuns), 0, -2);

        // "HR" label
        ctx.font = '600 9px sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fillText('HOME RUNS', 0, 20);

        ctx.restore();
    }

    // ── Result title ────────────────────────────────────────────────────
    const titleVis = Math.min(1, (rev - 0.2) * 3);
    if (titleVis > 0) {
        ctx.save();
        const titleY = 118;
        ctx.globalAlpha = titleVis;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'alphabetic';

        if (won) {
            // Clean "YOU WIN" with gradient
            ctx.font = '800 34px sans-serif';
            const tGrad = ctx.createLinearGradient(W/2 - 80, titleY - 30, W/2 + 80, titleY);
            tGrad.addColorStop(0,   '#ffffff');
            tGrad.addColorStop(0.5, '#fff3c4');
            tGrad.addColorStop(1,   '#ffd700');
            ctx.fillStyle = tGrad;
            ctx.shadowColor = 'rgba(255,200,0,0.3)';
            ctx.shadowBlur = 20;
            ctx.fillText('YOU WIN', W / 2, titleY);
            ctx.shadowBlur = 0;

            // Subtitle
            ctx.font = '500 13px sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.45)';
            const subLabel = currentGame.homeRuns > 1
                ? currentGame.homeRuns + ' home runs in ' + currentGame.atBat + ' at-bats'
                : 'Home run in ' + currentGame.atBat + ' at-bats';
            ctx.fillText(subLabel, W / 2, titleY + 20);
        } else {
            ctx.font = '800 32px sans-serif';
            ctx.fillStyle = '#ff5252';
            ctx.shadowColor = 'rgba(255,50,50,0.25)';
            ctx.shadowBlur = 16;
            ctx.fillText('GAME OVER', W / 2, titleY);
            ctx.shadowBlur = 0;
            ctx.font = '500 13px sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.fillText('Better luck next time', W / 2, titleY + 20);
        }
        ctx.restore();
    }

    // ── Stats card (clean, minimal) ─────────────────────────────────────
    const cardVis = Math.min(1, (rev - 0.45) * 2.5);
    if (cardVis > 0) {
        ctx.save();
        ctx.globalAlpha = cardVis;

        const cardX = 28, cardY = 158, cardW = W - 56, cardH = 236;

        // Card background
        const cGrad = ctx.createLinearGradient(cardX, cardY, cardX, cardY + cardH);
        cGrad.addColorStop(0, 'rgba(255,255,255,0.07)');
        cGrad.addColorStop(1, 'rgba(255,255,255,0.03)');
        ctx.fillStyle = cGrad;
        ctx.beginPath();
        ctx.roundRect(cardX, cardY, cardW, cardH, 16);
        ctx.fill();

        // Card border
        ctx.strokeStyle = 'rgba(255,255,255,0.10)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(cardX, cardY, cardW, cardH, 16);
        ctx.stroke();

        // ── Stat rows ──
        const stats = [
            { label: 'Home Runs',    value: String(currentGame.homeRuns), color: won ? '#ffd700' : '#ff5252', pct: Math.min(1, currentGame.homeRuns / Math.max(1, currentGame.maxAtBats)) },
            { label: 'At-Bats',      value: currentGame.atBat + '/' + currentGame.maxAtBats, color: '#64b5f6', pct: currentGame.atBat / currentGame.maxAtBats },
            { label: 'Base Hits',    value: String(currentGame.totalHits - currentGame.homeRuns), color: '#81c784', pct: Math.min(1, (currentGame.totalHits - currentGame.homeRuns) / Math.max(1, currentGame.maxAtBats)) },
            { label: 'Coins',        value: '+' + currentGame.coinsEarned, color: '#ffd54f', pct: Math.min(1, currentGame.coinsEarned / 50) },
            { label: 'XP',           value: '+' + currentGame.xpEarned, color: '#69f0ae', pct: Math.min(1, currentGame.xpEarned / 100) },
        ];

        const rowH = 38, rowStart = cardY + 16;
        for (let i = 0; i < stats.length; i++) {
            const s = stats[i];
            const ry = rowStart + i * rowH;
            const rowRev = Math.min(1, (rev - 0.45 - i * 0.08) * 4);
            if (rowRev <= 0) continue;
            ctx.globalAlpha = cardVis * rowRev;

            // Separator line (skip first)
            if (i > 0) {
                ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(cardX + 16, ry);
                ctx.lineTo(cardX + cardW - 16, ry);
                ctx.stroke();
            }

            // Label
            ctx.font = '400 12px sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fillText(s.label, cardX + 20, ry + rowH / 2 - 4);

            // Value
            ctx.textAlign = 'right';
            ctx.font = '700 14px sans-serif';
            ctx.fillStyle = s.color;
            ctx.fillText(s.value, cardX + cardW - 20, ry + rowH / 2 - 4);

            // Thin progress bar
            const barX = cardX + 20, barY2 = ry + rowH / 2 + 8, barW = cardW - 40, barH2 = 3;
            ctx.fillStyle = 'rgba(255,255,255,0.06)';
            ctx.beginPath();
            ctx.roundRect(barX, barY2, barW, barH2, 1.5);
            ctx.fill();
            const fillW = barW * s.pct * rowRev;
            if (fillW > 0) {
                ctx.fillStyle = s.color + '88';
                ctx.beginPath();
                ctx.roundRect(barX, barY2, fillW, barH2, 1.5);
                ctx.fill();
            }
        }
        ctx.globalAlpha = cardVis;

        // Difficulty badge (bottom-left of card)
        const diffColors = { easy:'#4CAF50', medium:'#FF9800', hard:'#FF5252', legend:'#9C27B0' };
        const diffC = diffColors[currentGame.difficulty] || '#888';
        const diffL = (currentGame.difficulty || 'easy').toUpperCase();
        ctx.font = '600 9px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = diffC + '22';
        ctx.strokeStyle = diffC + '55';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(cardX + 16, cardY + cardH - 28, 56, 18, 9);
        ctx.fill(); ctx.stroke();
        ctx.fillStyle = diffC;
        ctx.fillText(diffL, cardX + 44, cardY + cardH - 19);

        ctx.restore();
    }

    // ── PHASE 5: Spray Chart & Analytics ────────────────────────────────
    const chartVis = Math.min(1, (rev - 0.7) * 2.5);
    if (chartVis > 0 && currentGame && currentGame.statcastLog && currentGame.statcastLog.length > 0) {
        ctx.save();
        ctx.globalAlpha = chartVis;

        const scLog = currentGame.statcastLog;
        const chartX = W / 2;
        const chartY = 410;
        const chartSize = 60; // half-size of diamond

        // Draw diamond outline
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(chartX, chartY + chartSize); // home plate
        ctx.lineTo(chartX + chartSize, chartY); // 1st base
        ctx.lineTo(chartX, chartY - chartSize); // 2nd base / CF
        ctx.lineTo(chartX - chartSize, chartY); // 3rd base
        ctx.closePath();
        ctx.stroke();

        // Outfield arc
        ctx.beginPath();
        ctx.arc(chartX, chartY + chartSize, chartSize * 1.8, -Math.PI * 0.85, -Math.PI * 0.15);
        ctx.stroke();

        // Plot hits
        for (const h of scLog) {
            let dx = (Math.random() - 0.5) * chartSize * 1.2;
            let dy = 0;
            let dotColor = '#888';
            let dotR = 3;

            if (h.result === 'HOME RUN!') {
                dy = -chartSize * 1.3 - Math.random() * 20;
                dx = (Math.random() - 0.5) * chartSize * 1.4;
                dotColor = '#ff4444';
                dotR = 4;
            } else if (h.result === 'BASE HIT') {
                dy = -chartSize * 0.5 - Math.random() * chartSize * 0.6;
                dx = (Math.random() - 0.5) * chartSize * 1.0;
                dotColor = '#00e5ff';
                dotR = 3.5;
            } else if (h.result === 'FOUL') {
                // Foul territory
                const side = Math.random() > 0.5 ? 1 : -1;
                dx = side * (chartSize * 0.6 + Math.random() * 20);
                dy = Math.random() * chartSize * 0.5;
                dotColor = 'rgba(255,255,255,0.3)';
                dotR = 2.5;
            }

            ctx.fillStyle = dotColor;
            ctx.shadowColor = dotColor;
            ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.arc(chartX + dx, chartY + dy, dotR, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // Label
        ctx.font = 'bold 8px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fillText('SPRAY CHART', chartX, chartY + chartSize + 18);

        // === Analytics Row ===
        const anaY = chartY + chartSize + 32;
        const avgVelo = scLog.reduce((s, h) => s + h.exitVelo, 0) / scLog.length;
        const maxVelo = Math.max(...scLog.map(h => h.exitVelo));
        const perfects = scLog.filter(h => h.timing === 'perfect').length;
        const hrs = scLog.filter(h => h.result === 'HOME RUN!').length;

        const anaData = [
            { label: 'AVG VELO', value: Math.round(avgVelo) + ' mph', color: '#00e5ff' },
            { label: 'MAX VELO', value: maxVelo + ' mph', color: '#ffd740' },
            { label: 'PERFECT', value: perfects + '/' + scLog.length, color: '#69f0ae' },
            { label: 'HR RATE', value: Math.round(hrs / Math.max(1, scLog.length) * 100) + '%', color: '#ff6b35' },
        ];

        const anaSpacing = W / 4;
        for (let ai = 0; ai < anaData.length; ai++) {
            const ax = anaSpacing * ai + anaSpacing / 2;
            ctx.font = 'bold 13px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = anaData[ai].color;
            ctx.fillText(anaData[ai].value, ax, anaY);
            ctx.font = '6px sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.fillText(anaData[ai].label, ax, anaY + 12);
        }

        ctx.restore();
    }

    // ── Action buttons ──────────────────────────────────────────────────
    const btnVis = Math.min(1, (rev - 0.9) * 3);
    if (btnVis > 0) {
        ctx.save();
        ctx.globalAlpha = btnVis;
        const btnY = 520;
        const btnW = 145, btnH = 46;

        // Play Again button
        const paX = W / 2 - btnW - 8, paY2 = btnY;
        _gameOverButtons.playAgain = { x: paX, y: paY2, w: btnW, h: btnH };

        // Gradient button
        const paGrad = ctx.createLinearGradient(paX, paY2, paX, paY2 + btnH);
        paGrad.addColorStop(0, won ? '#ff8534' : '#e05050');
        paGrad.addColorStop(1, won ? '#e56a1a' : '#c43030');
        ctx.fillStyle = paGrad;
        ctx.shadowColor = won ? 'rgba(255,107,53,0.35)' : 'rgba(200,50,50,0.3)';
        ctx.shadowBlur = 14;
        ctx.beginPath();
        ctx.roundRect(paX, paY2, btnW, btnH, 12);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.font = '700 13px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#ffffff';
        ctx.fillText('PLAY AGAIN', paX + btnW / 2, paY2 + btnH / 2);

        // Menu button
        const mnX = W / 2 + 8, mnY2 = btnY;
        _gameOverButtons.menu = { x: mnX, y: mnY2, w: btnW, h: btnH };

        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.beginPath();
        ctx.roundRect(mnX, mnY2, btnW, btnH, 12);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(mnX, mnY2, btnW, btnH, 12);
        ctx.stroke();

        ctx.font = '700 13px sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.75)';
        ctx.fillText('MENU', mnX + btnW / 2, mnY2 + btnH / 2);

        // Continue button (only if not won and continues available)
        if (!won && _continueCount < 3) {
            const continueCost = Math.round(50 * Math.pow(2, _continueCount));
            const canContinue = gameState.coins >= continueCost;
            const contY = btnY + 60;
            const contW = 145, contH = 46;
            const contX = W / 2 - contW / 2;
            _gameOverButtons.continue = { x: contX, y: contY, w: contW, h: contH };

            if (canContinue) {
                const contGrad = ctx.createLinearGradient(contX, contY, contX, contY + contH);
                contGrad.addColorStop(0, '#9C27B0');
                contGrad.addColorStop(1, '#6A1B9A');
                ctx.fillStyle = contGrad;
            } else {
                ctx.fillStyle = 'rgba(100,50,150,0.4)';
            }
            ctx.shadowColor = 'rgba(156,39,176,0.3)';
            ctx.shadowBlur = 14;
            ctx.beginPath();
            ctx.roundRect(contX, contY, contW, contH, 12);
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.font = '700 13px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = canContinue ? '#ffffff' : 'rgba(255,255,255,0.4)';
            ctx.fillText('CONTINUE?', contX + contW / 2, contY + contH / 2 - 6);
            ctx.font = '600 10px sans-serif';
            ctx.fillText('🪙' + continueCost, contX + contW / 2, contY + contH / 2 + 8);
        }

        ctx.restore();
    }

    // ── Personal best badge ─────────────────────────────────────────────
    const pbVis = Math.min(1, (rev - 1.2) * 2);
    if (pbVis > 0 && won) {
        const prevBest = gameState.bestScoreByDiff[currentGame.difficulty] || 0;
        const isNewBest = currentGame.homeRuns > prevBest;
        if (isNewBest) {
            ctx.save();
            const pbY = 478;
            ctx.globalAlpha = pbVis;

            // Badge background
            const pbW = 180, pbH = 26;
            const pbX = W / 2 - pbW / 2;
            ctx.fillStyle = 'rgba(255,215,0,0.08)';
            ctx.strokeStyle = 'rgba(255,215,0,0.25)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(pbX, pbY, pbW, pbH, 13);
            ctx.fill(); ctx.stroke();

            ctx.font = '600 10px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffd700';
            const pulse = 0.85 + 0.15 * Math.sin(T / 400);
            ctx.globalAlpha = pbVis * pulse;
            ctx.fillText('NEW PERSONAL BEST', W / 2, pbY + pbH / 2);

            ctx.restore();
        }
    }

    drawSurgeScreenEffects(ctx);
    drawSurgeBanner(ctx);
    drawToasts(ctx);
    drawAchievementToast(ctx);
}

const _crButtons = {};

function drawCampaignResultScreen(ctx) {
    if (!currentGame || !currentGame.levelConfig) return;
    const T = Date.now();
    const lc = currentGame.levelConfig;
    const levelNum = lc.level;
    const won = currentGame.homeRuns >= (lc.starsRequired || 1);
    const stars = gameState.levelStars[levelNum] || 0;

    // Modern dark bg
    drawModernBg(ctx, won ? '#00ff88' : '#ff6644', 200);

    // Celebration
    if (won) {
        drawConfetti(ctx);
        drawFireworks(ctx);
    }

    // Panel
    const px = 24, py = 50, pw = W - 48, ph = H - 100;
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.strokeStyle = won ? 'rgba(0,255,136,0.12)' : 'rgba(255,100,50,0.12)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 16); ctx.fill(); ctx.stroke();

    // Level header
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('LEVEL ' + levelNum, W / 2, py + 25);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '10px sans-serif';
    ctx.fillText(lc.name || '', W / 2, py + 42);

    // Result
    if (won) {
        ctx.save();
        ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 20;
        ctx.font = '40px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('⚾', W / 2, py + 82);
        ctx.restore();
        ctx.fillStyle = '#00ff88';
        ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('LEVEL COMPLETE!', W / 2, py + 115);
    } else {
        ctx.font = '40px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('😤', W / 2, py + 82);
        ctx.fillStyle = '#ff6644';
        ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('LEVEL FAILED', W / 2, py + 115);
    }

    // Home runs score
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 40px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(currentGame.homeRuns + ' HR', W / 2, py + 165);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '10px sans-serif';
    ctx.fillText(currentGame.atBat + ' at-bats', W / 2, py + 183);

    // Stars
    const starY = py + 215;
    for (let s = 0; s < 3; s++) {
        const sx = W / 2 - 50 + s * 50;
        const earned = s < stars;
        const pulse = earned ? 1 + Math.sin(T * 0.004 + s * 0.8) * 0.1 : 1;
        ctx.save();
        if (earned) { ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 15; }
        ctx.font = (28 * pulse) + 'px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(earned ? '⭐' : '☆', sx, starY);
        ctx.restore();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = '7px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Win  •  Combo ≥3  •  No Strikeouts', W / 2, starY + 18);

    // Rewards
    if (won) {
        const rwdY = starY + 40;
        ctx.fillStyle = 'rgba(255,215,0,0.08)';
        ctx.beginPath(); ctx.roundRect(px + 20, rwdY, pw - 40, 36, 8); ctx.fill();
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('🪙 +' + lc.coinReward, W / 2 - 45, rwdY + 22);
        ctx.fillStyle = '#00ff88';
        ctx.fillText('⚡ +' + lc.xpReward, W / 2 + 45, rwdY + 22);
    }

    // Buttons
    const btnY = py + ph - 62;
    const btnH = 44;
    const hasNext = won && levelNum < 100;

    if (hasNext) {
        const smW = 68, bgW = 124, gap = 6;
        const totalW = smW * 2 + bgW + gap * 2;
        const startX = W / 2 - totalW / 2;

        // Retry
        _crButtons.retry = { x: startX, y: btnY, w: smW, h: btnH };
        ctx.fillStyle = 'rgba(0,229,255,0.15)';
        ctx.beginPath(); ctx.roundRect(startX, btnY, smW, btnH, btnH / 2); ctx.fill();
        ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.roundRect(startX, btnY, smW, btnH, btnH / 2); ctx.stroke();
        ctx.fillStyle = '#00e5ff'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('RETRY', startX + smW / 2, btnY + btnH / 2 + 4);

        // Next Level
        const nX = startX + smW + gap;
        _crButtons.next = { x: nX, y: btnY, w: bgW, h: btnH };
        const nGrad = ctx.createLinearGradient(nX, btnY, nX, btnY + btnH);
        nGrad.addColorStop(0, '#00ff88'); nGrad.addColorStop(1, '#00cc66');
        ctx.fillStyle = nGrad;
        ctx.beginPath(); ctx.roundRect(nX, btnY, bgW, btnH, btnH / 2); ctx.fill();
        ctx.save(); ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 15;
        ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.roundRect(nX, btnY, bgW, btnH, btnH / 2); ctx.stroke();
        ctx.restore();
        ctx.fillStyle = '#000'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('NEXT LEVEL ▶', nX + bgW / 2, btnY + btnH / 2 + 4);

        // Levels
        const lX = nX + bgW + gap;
        _crButtons.levels = { x: lX, y: btnY, w: smW, h: btnH };
        ctx.fillStyle = 'rgba(204,68,255,0.15)';
        ctx.beginPath(); ctx.roundRect(lX, btnY, smW, btnH, btnH / 2); ctx.fill();
        ctx.strokeStyle = '#cc44ff'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.roundRect(lX, btnY, smW, btnH, btnH / 2); ctx.stroke();
        ctx.fillStyle = '#cc44ff'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('LEVELS', lX + smW / 2, btnY + btnH / 2 + 4);

        _crButtons.hasNext = true;
    } else {
        const bW = 115, gap = 16;
        const startX = W / 2 - (bW * 2 + gap) / 2;

        _crButtons.retry = { x: startX, y: btnY, w: bW, h: btnH };
        ctx.fillStyle = '#00e5ff';
        ctx.beginPath(); ctx.roundRect(startX, btnY, bW, btnH, btnH / 2); ctx.fill();
        ctx.fillStyle = '#000'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('RETRY', startX + bW / 2, btnY + btnH / 2 + 4);

        const lX = startX + bW + gap;
        _crButtons.levels = { x: lX, y: btnY, w: bW, h: btnH };
        ctx.fillStyle = '#cc44ff';
        ctx.beginPath(); ctx.roundRect(lX, btnY, bW, btnH, btnH / 2); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('LEVELS', lX + bW / 2, btnY + btnH / 2 + 4);

        _crButtons.hasNext = false;
    }

    ctx.textBaseline = 'alphabetic';
}

const _pauseButtons = {};

function drawPauseOverlay(ctx) {
    if (currentGame) currentGame.draw(ctx);

    const T = Date.now();
    const cx = W / 2, cy = H / 2;

    // Frost/blur effect — dark gradient overlay
    const ovGrad = ctx.createLinearGradient(0, 0, 0, H);
    ovGrad.addColorStop(0,   'rgba(0,0,16,0.72)');
    ovGrad.addColorStop(0.5, 'rgba(0,0,12,0.78)');
    ovGrad.addColorStop(1,   'rgba(0,0,8,0.85)');
    ctx.fillStyle = ovGrad;
    ctx.fillRect(0, 0, W, H);

    // Pulsing pause circle in background
    const pulse = 0.7 + 0.3 * Math.sin(T / 550);
    ctx.save();
    ctx.globalAlpha = 0.08 * pulse;
    ctx.fillStyle   = '#4488ff';
    ctx.beginPath();
    ctx.arc(cx, cy, 140, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // ── Main pause card ───────────────────────────────────────────────────
    const cW = 300, cH = 380, cX = cx - cW/2, cY = cy - cH/2;
    ctx.fillStyle = 'rgba(10,14,30,0.95)';
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(cX, cY, cW, cH, 20);
    ctx.fill(); ctx.stroke();

    // ⏸ icon + PAUSED text
    ctx.save();
    ctx.font = '800 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffffff';
    ctx.fillText('PAUSED', cx, cY + 50);
    ctx.restore();

    // Divider
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cX + 20, cY + 72);
    ctx.lineTo(cX + cW - 20, cY + 72);
    ctx.stroke();

    // ── Mid-game stats ────────────────────────────────────────────────────
    if (currentGame) {
        const statRows = [
            { icon: '⚾', label: 'At-Bat',    value: `${currentGame.atBat} / ${currentGame.maxAtBats}` },
            { icon: '🏆', label: 'Home Runs', value: `${currentGame.homeRuns}` },
            { icon: '🔥', label: 'Best Combo', value: `${currentGame.bestCombo}x` },
            { icon: '🚶', label: 'Walks',     value: `${currentGame.totalWalks || 0}` },
            { icon: '🪙', label: 'Coins',     value: `+${currentGame.coinsEarned}` },
            { icon: '⚡', label: 'Surge',     value: `${Math.round(gameState.surgeProgress * 100)}%` },
        ];
        const statStartY = cY + 88;
        ctx.save();
        for (let i = 0; i < statRows.length; i++) {
            const sr = statRows[i];
            const ry = statStartY + i * 26;
            // Alternating row
            if (i % 2 === 0) {
                ctx.fillStyle = 'rgba(255,255,255,0.04)';
                ctx.beginPath();
                ctx.roundRect(cX + 12, ry - 1, cW - 24, 24, 5);
                ctx.fill();
            }
            ctx.font = '13px sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(sr.icon, cX + 20, ry + 11);
            ctx.font = '11px sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.55)';
            ctx.fillText(sr.label, cX + 40, ry + 11);
            ctx.textAlign = 'right';
            ctx.font = 'bold 12px sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(sr.value, cX + cW - 18, ry + 11);
            ctx.textBaseline = 'alphabetic';
        }
        ctx.restore();
    }

    // ── Buttons ───────────────────────────────────────────────────────────
    const btn1Y = cY + 258;
    const bW = cW - 48, bH = 46;
    _pauseButtons.resume = { x: cX + 24, y: btn1Y, w: bW, h: bH };
    // Resume — green accent
    ctx.fillStyle = '#2e7d32';
    ctx.beginPath(); ctx.roundRect(cX + 24, btn1Y, bW, bH, 12); ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.font = '700 15px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('▶  RESUME', cx, btn1Y + bH / 2);

    const btn2Y = btn1Y + 56;
    _pauseButtons.menu = { x: cX + 24, y: btn2Y, w: bW, h: 42 };
    // Menu — outline style
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(cX + 24, btn2Y, bW, 42, 12); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '600 13px sans-serif';
    ctx.fillText('MAIN MENU', cx, btn2Y + 21);

    // Hint
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.font = '10px sans-serif';
    ctx.fillText('tap anywhere to resume', cx, cY + cH - 12);
}
