function activateSurge() {
    const ps = getActivePowerShot();
    if (!ps) return false;
    _surgeActivated = true;
    _surgeActivatedTier = ps;
    _surgeActivatedFlash = 2500;
    _surgeBannerText = '⚡ ' + ps.name.toUpperCase() + ' READY! ⚡';
    _surgeBannerColor = ps.threshold >= 1.0 ? '#aa00ff' : ps.threshold >= 0.8 ? '#ff7043' : ps.threshold >= 0.5 ? '#ffeb3b' : '#00e5ff';
    _surgeBannerTimer = 2000;
    camera.triggerShake(6, 0.2);
    Haptics.pulse('success');
    audio.play('surge');
    return true;
}

function consumeSurge() {
    if (!_surgeActivated || !_surgeActivatedTier) return null;
    const tier = _surgeActivatedTier;
    _surgeActivated = false;
    _surgeActivatedTier = null;
    _surgeActivatedFlash = 0;
    // Drain the meter after use
    gameState.surgeProgress = 0;
    gameState.saveToStorage();
    return tier;
}

function isSurgeActivated() {
    return _surgeActivated && _surgeActivatedTier !== null;
}

// Hit test for the surge button (circle left of the badge stack)
function hitTestSurgeButton(x, y) {
    const badgeW = 38;
    const rightX = W - badgeW - 10;
    const totalH = 4 * 32 + 3 * 6; // 4 badges + 3 gaps
    const topY = 58;
    // Tap target covers BOTH the circle button AND the entire badge stack
    // Badge stack: rightX to rightX+badgeW, topY to topY+totalH
    // Circle button: rightX-44 to rightX-44+44, centered vertically
    const hitLeft = rightX - 50;
    const hitRight = rightX + badgeW + 6;
    const hitTop = topY - 6;
    const hitBottom = topY + totalH + 20;
    return x >= hitLeft && x <= hitRight && y >= hitTop && y <= hitBottom;
}

function getActivePowerShot() {
    return POWER_SHOTS.slice().reverse().find(p => gameState.surgeProgress >= p.threshold) || null;
}

// SECTION 14: Daily Reward (System 6)
// Streak-based daily login rewards with 7-day cycle
// ============================================================================

let _showDailyPopup = false;

function checkDailyReward() {
    const today = new Date().toDateString();
    if (gameState.dailyReward.lastClaimedDate === today) {
        return; // Already claimed today
    }

    // Check if it's the next day
    const lastDate = gameState.dailyReward.lastClaimedDate ? new Date(gameState.dailyReward.lastClaimedDate) : null;
    const todayDate = new Date();

    if (lastDate) {
        const dayDiff = Math.floor((todayDate - lastDate) / (1000 * 60 * 60 * 24));
        if (dayDiff === 1) {
            // Consecutive day - increase streak
            gameState.dailyReward.streak = Math.min(7, gameState.dailyReward.streak + 1);
        } else if (dayDiff > 1) {
            // Streak broken - reset
            gameState.dailyReward.streak = 1;
        }
    } else {
        gameState.dailyReward.streak = 1;
    }

    _showDailyPopup = true;
}

function claimDailyReward() {
    const rewardAmount = gameState.dailyReward.rewards[Math.min(6, gameState.dailyReward.streak - 1)];
    gameState.addCoins(rewardAmount);
    gameState.dailyReward.lastClaimedDate = new Date().toDateString();
    gameState.saveToStorage();
    _showDailyPopup = false;
    showToast('Daily Reward: +' + rewardAmount + '🪙', '#FFD700', 2.5);
    audio.play('daily');
}

function drawDailyRewardPopup(ctx) {
    if (!_showDailyPopup) return;
    const T = Date.now();

    // ── Backdrop blur simulation ──────────────────────────────────────────
    ctx.fillStyle = 'rgba(0, 0, 10, 0.82)';
    ctx.fillRect(0, 0, W, H);

    const cW = 310, cH = 360;
    const cX = (W - cW) / 2, cY = (H - cH) / 2;

    // ── Card background ───────────────────────────────────────────────────
    ctx.fillStyle = 'rgba(10,14,30,0.97)';
    ctx.beginPath(); ctx.roundRect(cX, cY, cW, cH, 18); ctx.fill();

    // Subtle gold accent glow at top
    ctx.save();
    ctx.globalAlpha = 0.08;
    const hdrGlow = ctx.createRadialGradient(W/2, cY, 10, W/2, cY, 160);
    hdrGlow.addColorStop(0, '#FFD700');
    hdrGlow.addColorStop(1, 'transparent');
    ctx.fillStyle = hdrGlow;
    ctx.fillRect(cX, cY, cW, cH/2);
    ctx.restore();

    // Border
    ctx.strokeStyle = 'rgba(255,215,0,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(cX, cY, cW, cH, 18); ctx.stroke();

    // ── X close button ────────────────────────────────────────────────────
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.arc(cX + cW - 20, cY + 20, 12, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('✕', cX + cW - 20, cY + 20);
    ctx.textBaseline = 'alphabetic';

    // ── Title ─────────────────────────────────────────────────────────────
    ctx.fillStyle = '#FFD700';
    ctx.font = '800 20px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillText('🎁  DAILY REWARD', W/2, cY + 34);

    // ── Day streak subtitle ───────────────────────────────────────────────
    const streak = gameState.dailyReward.streak || 1;
    ctx.fillStyle = 'rgba(255,255,255,0.60)';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Day ' + streak + ' of 7  —  Keep your streak!', W/2, cY + 58);

    // ── Day circles ───────────────────────────────────────────────────────
    const calY = cY + 90;
    const dayRewards = gameState.dailyReward.rewards || [10,15,20,25,30,40,50];
    const circR = 16;
    const circSpacing = cW / 7;
    for (let i = 0; i < 7; i++) {
        const cx = cX + circSpacing * i + circSpacing / 2;
        const cy = calY + circR;
        const isPast = i < streak - 1;
        const isCurrent = i === streak - 1;
        const isFuture = i >= streak;

        if (isPast) {
            // Completed: gold filled
            ctx.fillStyle = '#FFD700';
            ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 8;
            ctx.beginPath(); ctx.arc(cx, cy, circR, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#000'; ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('✓', cx, cy);
        } else if (isCurrent) {
            // Current: pulsing ring
            const pulse = 0.75 + 0.25 * Math.sin(T / 300);
            ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2.5;
            ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 14 * pulse;
            ctx.fillStyle = 'rgba(255,215,0,0.18)';
            ctx.beginPath(); ctx.arc(cx, cy, circR, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#FFD700'; ctx.font = 'bold 13px sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(dayRewards[i] || '?', cx, cy);
        } else {
            // Future: dark
            ctx.fillStyle = 'rgba(255,255,255,0.08)';
            ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(cx, cy, circR, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.30)'; ctx.font = '11px sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(dayRewards[i] || '?', cx, cy);
        }

        // Day label below
        ctx.textBaseline = 'alphabetic';
        ctx.fillStyle = isCurrent ? '#FFD700' : (isPast ? 'rgba(255,215,0,0.55)' : 'rgba(255,255,255,0.28)');
        ctx.font = isCurrent ? 'bold 9px sans-serif' : '9px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('D' + (i+1), cx, calY + circR*2 + 14);
    }

    // ── Reward amount display ─────────────────────────────────────────────
    const rewardAmount = dayRewards[Math.min(6, streak - 1)] || 10;
    const coinPulse = 1 + 0.08 * Math.sin(T / 220);
    ctx.save();
    ctx.translate(W/2, cY + cH - 118);
    ctx.scale(coinPulse, coinPulse);
    ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 12;
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('+' + rewardAmount + ' 🪙', 0, 0);
    ctx.restore();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.40)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillText('coins reward', W/2, cY + cH - 90);

    // ── CLAIM button ──────────────────────────────────────────────────────
    const btnX = cX + 55, btnY = cY + cH - 58, btnW = 200, btnH = 42;
    ctx.fillStyle = '#c8930a';
    ctx.beginPath(); ctx.roundRect(btnX, btnY, btnW, btnH, 12); ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.font = '700 15px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('CLAIM  🎁', W/2, btnY + btnH/2);

    // ── "tap outside to close" hint ───────────────────────────────────────
    ctx.fillStyle = 'rgba(255,255,255,0.20)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillText('tap outside to close', W/2, cY + cH + 18);
}

// SECTION 15: Mission and Achievement updaters
// Checks completion and grants rewards
// ============================================================================

function updateMissions() {
    for (const m of gameState.missions) {
        // Guard: check function must exist (defensive against corrupted localStorage)
        if (!m.done && typeof m.check === 'function' && m.check(gameState)) {
            m.done = true;
            gameState.addCoins(m.reward);
            gameState.addXP(30);
            showToast('Mission Complete: ' + m.name + ' +' + m.reward + '🪙', '#69F0AE', 3);
            audio.play('roundEnd');
            Haptics.pulse('success');
        }
    }
    gameState.saveToStorage();
}

function updateAchievements() {
    for (const achId of Object.keys(gameState.achievements)) {
        const ach = gameState.achievements[achId];

        // Update progress if applicable
        if (typeof ach.updateProgress === 'function') {
            ach.progress = ach.updateProgress(gameState);
        }

        // Guard: check function must exist (defensive against corrupted localStorage)
        if (!ach.unlocked && typeof ach.check === 'function' && ach.check(gameState)) {
            ach.unlocked = true;
            gameState.addCoins(ach.reward);
            gameState.addXP(50);
            showAchievementToast(ach);
            audio.play('levelup');
            Haptics.pulse('success');
            // Persist to Convex
            if (window._convexClient && window._convexClient.isRegistered) {
                window._convexClient.unlockAchievement(ach.id, 'basehit').catch(e => {
                    console.warn('[BaseHit] Achievement sync failed:', e.message);
                });
            }
        }
    }
    gameState.saveToStorage();
}

// Shared modern dark background for all non-gameplay screens
function drawModernBg(ctx, accentColor, accentY) {
    const bgG = ctx.createLinearGradient(0, 0, 0, H);
    bgG.addColorStop(0,   '#080c1a');
    bgG.addColorStop(0.35,'#0a1028');
    bgG.addColorStop(0.7, '#0c1230');
    bgG.addColorStop(1,   '#060a14');
    ctx.fillStyle = bgG;
    ctx.fillRect(0, 0, W, H);
    // Subtle radial accent
    if (accentColor) {
        ctx.save();
        ctx.globalAlpha = 0.07;
        const sg = ctx.createRadialGradient(W / 2, accentY || 200, 10, W / 2, accentY || 200, 280);
        sg.addColorStop(0, accentColor);
        sg.addColorStop(1, 'transparent');
        ctx.fillStyle = sg;
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
    }
    // Ambient particles
    ctx.save();
    const pT = Date.now() / 4000;
    for (let i = 0; i < 12; i++) {
        const px = ((i * 137.5 + pT * 25) % W);
        const py = ((i * 97.3 + pT * 12 + Math.sin(i + pT) * 20) % H);
        ctx.globalAlpha = 0.05 + 0.03 * Math.sin(Date.now() / 1000 + i);
        ctx.fillStyle = accentColor || '#ffffff';
        ctx.beginPath();
        ctx.arc(px, py, 1, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
}

// Modern screen header (back button + title)
function drawModernHeader(ctx, title, buttons, backKey) {
    backKey = backKey || 'back';
    buttons[backKey] = { x: 12, y: 16, w: 40, h: 40 };
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.beginPath(); ctx.roundRect(12, 16, 40, 40, 10); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(12, 16, 40, 40, 10); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '500 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u2190', 32, 36);
    // Title
    ctx.font = '800 22px sans-serif';
    ctx.fillStyle = '#ffffff';
    ctx.fillText(title, W / 2, 36);
}

function drawGlassCard(ctx, x, y, w, h, r = 12) {
    ctx.save();
    // Background fill with gradient
    const gGrad = ctx.createLinearGradient(x, y, x, y + h);
    gGrad.addColorStop(0, 'rgba(30, 40, 70, 0.92)');
    gGrad.addColorStop(1, 'rgba(10, 18, 40, 0.95)');
    ctx.fillStyle = gGrad;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
    ctx.fill();
    // Top highlight line (gloss effect)
    ctx.fillStyle = 'rgba(255, 255, 255, 0.10)';
    ctx.beginPath();
    ctx.roundRect(x + 1, y + 1, w - 2, h * 0.40, [r, r, 0, 0]);
    ctx.fill();
    // Border
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.22)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
    ctx.stroke();
    ctx.restore();
}

function drawNeonRect(ctx, x, y, w, h, color, r = 10) {
    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = 16;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.08;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();
}

function drawPillButton(ctx, cx, cy, w, h, label, bg, fg = '#fff') {
    ctx.save();
    const x = cx - w / 2, y = cy - h / 2;
    const r = h / 2;
    // Drop shadow
    ctx.shadowColor = bg;
    ctx.shadowBlur = 18;
    ctx.shadowOffsetY = 3;
    // Gradient fill
    const btnGrad = ctx.createLinearGradient(x, y, x, y + h);
    // Lighten bg color for top of gradient
    btnGrad.addColorStop(0, bg + 'ee');
    btnGrad.addColorStop(1, bg);
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;
    // Top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.beginPath();
    ctx.roundRect(x + 2, y + 2, w - 4, h * 0.45, [r, r, 0, 0]);
    ctx.fill();
    // Border
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
    ctx.stroke();
    // Label
    ctx.fillStyle = fg;
    ctx.font = `bold ${Math.round(h * 0.30)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 4;
    ctx.fillText(label, cx, cy);
    ctx.shadowBlur = 0;
    ctx.restore();
}

function drawGlow(ctx, x, y, radius, color, intensity = 0.6) {
    ctx.save();
    const grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
    const rgba = color.replace('rgb', 'rgba').replace(')', `, ${intensity})`);
    grad.addColorStop(0, rgba);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

function drawVignette(ctx) {
    ctx.save();
    const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.sqrt(W * W + H * H) / 2);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(0.7, 'rgba(0,0,0,0.15)');
    grad.addColorStop(1, 'rgba(0,0,0,0.45)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
}

function drawProgressBar(ctx, x, y, w, h, pct, color, bg = 'rgba(255,255,255,0.1)') {
    ctx.save();
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, h / 2);
    ctx.fill();
    ctx.fillStyle = color;
    const fillW = w * Math.max(0, Math.min(1, pct));
    ctx.beginPath();
    ctx.roundRect(x, y, fillW, h, h / 2);
    ctx.fill();
    ctx.restore();
}

function drawBadge(ctx, x, y, text, color) {
    ctx.save();
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.15;
    ctx.beginPath();
    ctx.roundRect(x - 24, y - 10, 48, 20, 10);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.2;
    ctx.stroke();
    ctx.fillStyle = color;
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, x, y);
    ctx.restore();
}

function hitTest(btn, x, y) {
    return btn && x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h;
}

function drawField(ctx, theme) {
    if (!theme) theme = THEMES[0];
    const T = Date.now();

    // ── SKY ──────────────────────────────────────────────────────────────
    const skyGrad = ctx.createLinearGradient(0, 0, 0, 262);
    skyGrad.addColorStop(0, theme.skyTop);
    skyGrad.addColorStop(0.55, theme.skyBot);
    skyGrad.addColorStop(1, theme.skyBot);
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, 262);

    // Night mode stars
    if (theme.nightMode) {
        ctx.save();
        const starSeed = [37,91,143,211,257,311,373,419,457,503,
                          541,587,631,673,709,751,797,839,881,929];
        for (let i = 0; i < starSeed.length; i++) {
            const sx = (starSeed[i] * 7 + i * 31) % W;
            const sy = (starSeed[i] * 3 + i * 13) % 200;
            const twinkle = 0.5 + 0.5 * Math.sin(T / 700 + i * 2.4);
            ctx.globalAlpha = 0.3 + twinkle * 0.6;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(sx, sy, (i % 3 === 0 ? 1.5 : 1), 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.restore();
    }

    // Live atmosphere: clouds, birds, night lens flares
    skyAtmosphere.drawClouds(ctx, theme);
    skyAtmosphere.drawBirds(ctx, theme);
    skyAtmosphere.drawLensFlares(ctx, theme);

    // ── STADIUM UPPER STRUCTURE (behind outfield wall) ───────────────────
    // Upper deck silhouette
    ctx.fillStyle = theme.nightMode ? '#0a0f1a' : '#1a2a1a';
    ctx.beginPath();
    ctx.moveTo(0, 210);
    ctx.lineTo(0, 245);
    ctx.lineTo(W, 245);
    ctx.lineTo(W, 210);
    // Arched upper deck profile
    for (let sx = W; sx >= 0; sx -= 4) {
        const arch = Math.sin((sx / W) * Math.PI) * 22;
        ctx.lineTo(sx, 220 - arch);
    }
    ctx.closePath();
    ctx.fill();

    // Stadium light towers (4 towers)
    const towerXs = [18, 90, W - 90, W - 18];
    for (const tx of towerXs) {
        // Pole
        ctx.fillStyle = theme.nightMode ? '#ccd0d8' : '#8a9aa8';
        ctx.fillRect(tx - 2, 100, 4, 145);
        // Top platform
        ctx.fillStyle = theme.nightMode ? '#dde0e8' : '#9aabb8';
        ctx.fillRect(tx - 10, 100, 20, 8);
        // Light banks
        if (theme.nightMode) {
            // Glow effect for lights
            for (let li = 0; li < 3; li++) {
                const lx = tx - 8 + li * 8;
                const lightFlicker = 0.88 + 0.12 * Math.sin(T / 400 + li * 1.2);
                // Light cone (triangle beam)
                ctx.save();
                ctx.globalAlpha = 0.07 * lightFlicker;
                ctx.fillStyle = '#fffadd';
                ctx.beginPath();
                ctx.moveTo(lx, 104);
                ctx.lineTo(lx - 62, 262);
                ctx.lineTo(lx + 62, 262);
                ctx.closePath();
                ctx.fill();
                ctx.globalAlpha = 1;
                // Bulb
                ctx.globalAlpha = lightFlicker;
                ctx.fillStyle = '#ffff99';
                ctx.shadowColor = '#ffffcc';
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.arc(lx, 104, 3.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.restore();
            }
        } else {
            // Day: just light fixtures
            ctx.fillStyle = '#c8d0d8';
            for (let li = 0; li < 3; li++) {
                ctx.fillRect(tx - 9 + li * 7, 100, 5, 7);
            }
        }
    }

    // ── OUTFIELD WALL ─────────────────────────────────────────────────────
    // Wall cap (red/white warning track color)
    const wallH = 22;
    const wallGrad = ctx.createLinearGradient(0, 243, 0, 243 + wallH);
    wallGrad.addColorStop(0, theme.wallColor || '#1a472a');
    wallGrad.addColorStop(1, theme.nightMode ? '#0a1a0a' : '#0d2e0d');
    ctx.fillStyle = wallGrad;
    ctx.fillRect(0, 243, W, wallH);
    // Wall cap stripe (yellow warning)
    ctx.fillStyle = '#e8c840';
    ctx.fillRect(0, 243, W, 3);

    // Scoreboard (only shown during active gameplay, not on menu)
    const _inGame = (typeof currentScreen !== 'undefined' && currentScreen === 'playing')
                 || (typeof currentGame !== 'undefined' && currentGame && currentGame.pitchState);
    if (_inGame) {
        const sbX = W / 2 - 50, sbY = 180, sbW = 100, sbH = 48;
        const sbGrad = ctx.createLinearGradient(sbX, sbY, sbX, sbY + sbH);
        sbGrad.addColorStop(0, '#111820');
        sbGrad.addColorStop(1, '#0a1018');
        ctx.fillStyle = sbGrad;
        ctx.beginPath();
        ctx.roundRect(sbX, sbY, sbW, sbH, 5);
        ctx.fill();
        ctx.strokeStyle = '#e8c840';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.fillStyle = '#e8c840';
        ctx.font = 'bold 8px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText('⚾ BASEBALL', W / 2, sbY + 4);
        const homeRuns = currentGame ? currentGame.homeRuns : 0;
        const atBat    = currentGame ? currentGame.atBat    : 0;
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 16px sans-serif';
        ctx.textBaseline = 'middle';
        ctx.fillText('HR: ' + homeRuns, W / 2, sbY + 26);
        ctx.fillStyle = 'rgba(255,200,50,0.65)';
        ctx.font = '8px sans-serif';
        const maxABsb = currentGame ? currentGame.maxAtBats : 5;
        ctx.fillText('AB ' + (atBat + 1) + '/' + maxABsb, W / 2, sbY + 40);
        ctx.textBaseline = 'alphabetic';
    }

    // Crowd (delegated to crowdSystem)
    crowdSystem.draw(ctx, theme);

    // ── GRASS ─────────────────────────────────────────────────────────────
    const grassGrad = ctx.createLinearGradient(0, 265, 0, H);
    grassGrad.addColorStop(0, theme.grassColor || '#2E7D32');
    grassGrad.addColorStop(0.5, theme.grassColorDark || '#256d28');
    grassGrad.addColorStop(1, theme.grassColorDark || '#1B5E20');
    ctx.fillStyle = grassGrad;
    ctx.fillRect(0, 265, W, H - 265);

    // Diagonal mowing stripes (baseball field look)
    ctx.save();
    for (let i = -H; i < W + H; i += 36) {
        ctx.globalAlpha = 0.06;
        ctx.fillStyle = i % 72 < 36 ? '#ffffff' : '#000000';
        ctx.beginPath();
        ctx.moveTo(i, 265);
        ctx.lineTo(i + 36, 265);
        ctx.lineTo(i + 36 - (H - 265), H);
        ctx.lineTo(i - (H - 265), H);
        ctx.closePath();
        ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    // ── DIRT INFIELD ──────────────────────────────────────────────────────
    // Warning track (arc around infield)
    const dirtColor = theme.dirtColor || '#c4a878';
    const dirtDark = theme.dirtColorDark || '#9a7a52';
    // Circular infield arc
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(W / 2, 600, 155, 90, 0, 0, Math.PI * 2);
    ctx.clip();
    const dirtGrad = ctx.createRadialGradient(W / 2, 580, 30, W / 2, 600, 180);
    dirtGrad.addColorStop(0, dirtColor);
    dirtGrad.addColorStop(1, dirtDark);
    ctx.fillStyle = dirtGrad;
    ctx.fillRect(W / 2 - 160, 510, 320, 200);
    ctx.restore();

    // Diamond overlay on dirt
    ctx.save();
    ctx.translate(W / 2, 540);
    ctx.rotate(Math.PI / 4);
    const diamondGrad = ctx.createLinearGradient(-80, -80, 80, 80);
    diamondGrad.addColorStop(0, dirtColor);
    diamondGrad.addColorStop(1, dirtDark);
    ctx.fillStyle = diamondGrad;
    ctx.beginPath();
    ctx.roundRect(-80, -80, 160, 160, 4);
    ctx.fill();
    ctx.restore();

    // Bases (white squares)
    const basePositions = [
        { x: W / 2,      y: 455 }, // 2nd base (top)
        { x: W / 2 - 98, y: 545 }, // 3rd base (left)
        { x: W / 2 + 98, y: 545 }, // 1st base (right)
    ];
    for (const b of basePositions) {
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(Math.PI / 4);
        ctx.fillStyle = '#f0ece0';
        ctx.shadowColor = 'rgba(0,0,0,0.4)';
        ctx.shadowBlur = 4;
        ctx.fillRect(-8, -8, 16, 16);
        ctx.shadowBlur = 0;
        ctx.restore();
    }

    // Foul lines
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.75)';
    ctx.lineWidth = 2.5;
    ctx.setLineDash([10, 5]);
    ctx.beginPath(); ctx.moveTo(W / 2, 705); ctx.lineTo(W / 2 - 185, 265); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W / 2, 705); ctx.lineTo(W / 2 + 185, 265); ctx.stroke();
    ctx.setLineDash([]);

    // Pitcher's mound
    const moundGrad = ctx.createRadialGradient(W / 2, 348, 0, W / 2, 348, 55);
    moundGrad.addColorStop(0, theme.moundColor || '#c8a070');
    moundGrad.addColorStop(1, theme.moundColorDark || '#9a7a52');
    ctx.fillStyle = moundGrad;
    ctx.beginPath();
    ctx.ellipse(W / 2, 350, 54, 34, 0, 0, Math.PI * 2);
    ctx.fill();
    // Pitcher's rubber
    ctx.fillStyle = '#eeeeee';
    ctx.strokeStyle = '#aaaaaa';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(W / 2 - 14, 344, 28, 9, 2);
    ctx.fill(); ctx.stroke();

    // Home plate (pentagon)
    ctx.fillStyle = '#f0ece0';
    ctx.strokeStyle = '#cccccc';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = 'rgba(0,0,0,0.3)';
    ctx.shadowBlur = 5;
    ctx.beginPath();
    ctx.moveTo(W / 2,       708);
    ctx.lineTo(W / 2 - 24,  682);
    ctx.lineTo(W / 2 - 14,  660);
    ctx.lineTo(W / 2 + 14,  660);
    ctx.lineTo(W / 2 + 24,  682);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;

    // Base path center line
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(W / 2, 708); ctx.lineTo(W / 2, 460); ctx.stroke();

    // ── SWEET SPOT ZONE ───────────────────────────────────────────────────
    const pulse = 0.7 + 0.3 * Math.sin(T / 280);
    // Outer ring glow
    ctx.save();
    ctx.globalAlpha = pulse * 0.18;
    ctx.strokeStyle = '#00FF88';
    ctx.lineWidth = 12;
    ctx.beginPath();
    ctx.roundRect(W / 2 - 52, 662, 104, 60, 10);
    ctx.stroke();
    ctx.globalAlpha = 1;
    // Inner fill
    ctx.globalAlpha = pulse * 0.28;
    ctx.fillStyle = '#00FF88';
    ctx.beginPath();
    ctx.roundRect(W / 2 - 44, 666, 88, 52, 8);
    ctx.fill();
    ctx.globalAlpha = 1;
    // Border
    ctx.strokeStyle = '#00FF88';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#00FF88';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.roundRect(W / 2 - 44, 666, 88, 52, 8);
    ctx.stroke();
    ctx.shadowBlur = 0;
    // Label
    ctx.fillStyle = '#00FF88';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('▲ SWEET SPOT ▲', W / 2, 660);
    ctx.restore();

    // Night ambient glow from stadium lights on field
    if (theme.nightMode) {
        const lightGrad = ctx.createRadialGradient(W / 2, 400, 50, W / 2, 400, 320);
        lightGrad.addColorStop(0, 'rgba(255, 255, 220, 0.06)');
        lightGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = lightGrad;
        ctx.fillRect(0, 265, W, H - 265);
    }

    // Vignette overlay
    drawVignette(ctx);
}

class Pitcher {
    constructor() {
        this.x = W / 2;
        this.y = 335;
        this.windupTimer = 0;
        this.state = 'idle';
        this.armAngle = -0.3;
        this.legSplay = 0;
        this.bodyLean = 0;
    }

    startWindup() {
        this.windupTimer = 0;
        this.state = 'windup';
    }

    update(dt, windupDuration) {
        if (this.state === 'windup') {
            this.windupTimer += dt;
            const p = Math.min(1, this.windupTimer / windupDuration);
            if (p < 0.5) {
                this.armAngle = -0.3 - p * 2 * 1.8;
                this.bodyLean = -p * 2 * 0.3;
            } else {
                this.armAngle = -0.3 - 1.8 + (p - 0.5) * 2 * 3.0;
                this.bodyLean = -0.3 + (p - 0.5) * 2 * 0.5;
            }
            this.legSplay = Math.sin(p * Math.PI) * 0.4;
        }
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);

        // Ground shadow
        ctx.fillStyle = 'rgba(0,0,0,0.22)';
        ctx.beginPath();
        ctx.ellipse(0, 30, 22, 7, 0, 0, Math.PI * 2);
        ctx.fill();

        // ── LEGS ─────────────────────────────────────────────────────────
        ctx.lineCap = 'round';
        // Pants (grey-white)
        ctx.strokeStyle = '#dde0e8';
        ctx.lineWidth = 7;
        ctx.beginPath();
        ctx.moveTo(-5 - this.legSplay * 9, 10);
        ctx.lineTo(-7 - this.legSplay * 7, 28);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(5 + this.legSplay * 9, 10);
        ctx.lineTo(7 + this.legSplay * 7, 28);
        ctx.stroke();
        // Cleats
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(-7 - this.legSplay * 7, 27);
        ctx.lineTo(-11 - this.legSplay * 4, 30);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(7 + this.legSplay * 7, 27);
        ctx.lineTo(11 + this.legSplay * 4, 30);
        ctx.stroke();

        // ── BODY / JERSEY ─────────────────────────────────────────────────
        ctx.save();
        ctx.rotate(this.bodyLean);
        // Jersey body
        const jerseyGrad = ctx.createLinearGradient(-8, -14, 8, 12);
        jerseyGrad.addColorStop(0, '#FF7040');
        jerseyGrad.addColorStop(1, '#CC4420');
        ctx.fillStyle = jerseyGrad;
        ctx.beginPath();
        ctx.roundRect(-8, -14, 16, 26, 3);
        ctx.fill();
        // White pinstripe
        ctx.strokeStyle = 'rgba(255,255,255,0.35)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(0, -14); ctx.lineTo(0, 12);
        ctx.stroke();
        // Jersey number
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 9px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('22', 0, 2);
        ctx.restore();

        // ── PITCHING ARM ──────────────────────────────────────────────────
        ctx.save();
        ctx.rotate(this.armAngle);
        // Upper arm
        ctx.strokeStyle = '#FF7040';
        ctx.lineWidth = 7;
        ctx.beginPath();
        ctx.moveTo(0, -4);
        ctx.lineTo(0, -18);
        ctx.stroke();
        // Forearm (white sleeve)
        ctx.strokeStyle = '#dde0e8';
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(0, -18);
        ctx.lineTo(0, -30);
        ctx.stroke();
        // Hand (skin)
        ctx.fillStyle = '#f5c28a';
        ctx.beginPath();
        ctx.arc(0, -32, 4.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // ── GLOVE ARM ─────────────────────────────────────────────────────
        ctx.save();
        ctx.rotate(-0.55 - this.armAngle * 0.35);
        ctx.strokeStyle = '#FF7040';
        ctx.lineWidth = 7;
        ctx.beginPath();
        ctx.moveTo(0, -4);
        ctx.lineTo(0, -18);
        ctx.stroke();
        // Glove (brown leather)
        const gloveGrad = ctx.createRadialGradient(0, -22, 0, 0, -22, 9);
        gloveGrad.addColorStop(0, '#b06820');
        gloveGrad.addColorStop(1, '#7a4510');
        ctx.fillStyle = gloveGrad;
        ctx.beginPath();
        ctx.arc(0, -22, 9, 0, Math.PI * 2);
        ctx.fill();
        // Glove stitching
        ctx.strokeStyle = '#5a3008';
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.arc(0, -22, 6, 0.5, Math.PI - 0.5);
        ctx.stroke();
        ctx.restore();

        // ── HEAD ──────────────────────────────────────────────────────────
        // Neck
        ctx.fillStyle = '#f5c28a';
        ctx.beginPath();
        ctx.roundRect(-3, -22, 6, 7, 2);
        ctx.fill();
        // Face
        ctx.fillStyle = '#f5c28a';
        ctx.beginPath();
        ctx.arc(0, -27, 9, 0, Math.PI * 2);
        ctx.fill();
        // ── CAP ───────────────────────────────────────────────────────────
        // Cap dome
        ctx.fillStyle = '#CC3010';
        ctx.beginPath();
        ctx.arc(0, -27, 9, Math.PI, 0, false);
        ctx.closePath();
        ctx.fill();
        // Cap button
        ctx.fillStyle = '#FF7040';
        ctx.beginPath();
        ctx.arc(0, -36, 2, 0, Math.PI * 2);
        ctx.fill();
        // Bill — extended forward (right for pitcher facing down)
        ctx.fillStyle = '#CC3010';
        ctx.beginPath();
        ctx.moveTo(-9, -24);
        ctx.quadraticCurveTo(2, -17, 14, -22);
        ctx.quadraticCurveTo(10, -19, -9, -22);
        ctx.closePath();
        ctx.fill();
        // Eye
        ctx.fillStyle = '#222';
        ctx.beginPath();
        ctx.arc(5, -27, 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }
}
