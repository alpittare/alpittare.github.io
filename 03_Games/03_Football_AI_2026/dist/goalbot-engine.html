// PARTICLES
// ============================================================================

class ParticleSystem {
    constructor() {
        this.particles = [];
    }

    emit(x, y, count, config) {
        // Hard cap to prevent unbounded growth
        const MAX_PARTICLES = 500;
        if (this.particles.length >= MAX_PARTICLES) {
            this.particles.splice(0, count); // remove oldest to make room
        }
        const actualCount = Math.min(count, MAX_PARTICLES - this.particles.length);
        for (let i = 0; i < actualCount; i++) {
            const angle = config.angle !== undefined ? config.angle + Utils.randRange(-config.spread, config.spread) : Math.random() * Math.PI * 2;
            const speed = Utils.randRange(config.speedMin || 1, config.speedMax || 5);
            this.particles.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: config.life || 60,
                maxLife: config.life || 60,
                color: config.colors ? config.colors[Utils.randInt(0, config.colors.length - 1)] : '#fff',
                size: Utils.randRange(config.sizeMin || 2, config.sizeMax || 6),
                gravity: config.gravity || 0.1,
                friction: config.friction || 0.98,
                type: config.type || 'circle',
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: Utils.randRange(-0.1, 0.1)
            });
        }
    }

    // Preset: goal celebration confetti
    confetti(x, y) {
        this.emit(x, y, 50, {
            speedMin: 3, speedMax: 12,
            life: 80,
            colors: COLORS.confettiColors,
            sizeMin: 3, sizeMax: 8,
            gravity: 0.15,
            type: 'rect'
        });
    }

    // Preset: grass spray
    grass(x, y) {
        this.emit(x, y, 8, {
            angle: -Math.PI / 2,
            spread: 0.5,
            speedMin: 1, speedMax: 3,
            life: 30,
            colors: [COLORS.fieldLight, COLORS.fieldDark, '#5a9e3f'],
            sizeMin: 2, sizeMax: 4,
            gravity: 0.2
        });
    }

    // Preset: impact sparks
    sparks(x, y) {
        this.emit(x, y, 15, {
            speedMin: 2, speedMax: 8,
            life: 25,
            colors: [COLORS.sparks, '#fff', COLORS.accent],
            sizeMin: 1, sizeMax: 3,
            gravity: 0.05
        });
    }

    update() {
        this.particles = this.particles.filter(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += p.gravity;
            p.vx *= p.friction;
            p.vy *= p.friction;
            p.life--;
            p.rotation += p.rotSpeed;
            return p.life > 0;
        });
    }

    draw(ctx) {
        this.particles.forEach(p => {
            const alpha = p.life / p.maxLife;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;

            if (p.type === 'rect') {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
                ctx.restore();
            } else {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                ctx.fill();
            }
        });
        ctx.globalAlpha = 1;
    }
}

// ===== ml-model.js =====
// ============================================================================
// ML MODEL — Real TensorFlow.js Neural Network + Player Analytics + Adaptive AI
// ============================================================================
//
// Architecture:
//   Neural Net: 12 → 32 → 16 → 3 (softmax)
//   12 Input features:
//     1. Last shot angle (normalized 0-1)
//     2. Last shot power (0-1)
//     3. Last shot X position (normalized 0-1)
//     4. Recent left bias (fraction of last N shots going left)
//     5. Recent right bias
//     6. Recent center bias
//     7. Streak same-direction count (normalized)
//     8. Alternation pattern score (0-1, how often player alternates L/R)
//     9. Power tendency (avg power last 5 shots)
//    10. Success rate (recent goals / recent shots)
//    11. Round progress (0-1)
//    12. Session momentum (scoring streak direction)
//
//   Output: Softmax [P(left), P(center), P(right)]
//   Training: Online learning — retrain every 3 shots, 8 epochs
// ============================================================================

class GoalkeeperML {
    constructor() {
        this.model = null;
        this.shotHistory = [];
        this.maxHistory = 150;
        this.trainingData = [];
        this.numFeatures = 12;
        this.numClasses = 3;        // left=0, center=1, right=2
        this.isReady = false;
        this.lastPrediction = null;
        this.confidence = 0;
        this.predictionProbs = [0.33, 0.34, 0.33];
        this.trainCount = 0;
        this.useFallback = false;

        // === PLAYER SKILL PROFILE ===
        this.playerProfile = {
            classification: 'beginner',  // beginner, intermediate, advanced, expert
            shotAccuracy: 0,             // % goals
            avgPower: 0.5,
            preferredDirection: 'center', // most common direction
            directionEntropy: 1.0,        // how unpredictable (0=always same, 1=random)
            avgReactionTime: 0,           // ms between shots
            longestStreak: 0,
            winRate: 0,
            totalShots: 0,
            totalGoals: 0,
            totalSaves: 0,
            sessionsPlayed: 0,
            skillScore: 50               // 0-100 composite skill rating
        };

        // === ANALYTICS LOG ===
        this.analytics = {
            sessionStart: Date.now(),
            events: [],                   // timestamped events
            shotLog: [],                  // detailed shot records
            difficultyHistory: [],        // difficulty adjustments over time
            sessionDuration: 0
        };

        // === ADAPTIVE DIFFICULTY ENGINE ===
        this.adaptive = {
            recentResults: [],            // last N shot outcomes (true=goal)
            windowSize: 10,               // look at last 10 shots
            targetSuccessRate: 0.55,      // aim for 50-70% → midpoint 55%
            adjustmentFactor: 0,          // -1 to +1
            smoothingRate: 0.15,          // how fast to adjust
            totalAdjustments: 0
        };

        this._buildModel();
    }

    _buildModel() {
        if (typeof tf === 'undefined') {
            console.warn('[ML] TensorFlow.js not loaded — statistical fallback');
            this.useFallback = true;
            this.isReady = true;
            return;
        }

        try {
            this.model = tf.sequential();

            // Layer 1: Input → 32 neurons (captures complex patterns)
            this.model.add(tf.layers.dense({
                units: 32,
                activation: 'relu',
                inputShape: [this.numFeatures],
                kernelInitializer: 'glorotUniform',
                kernelRegularizer: tf.regularizers.l2({ l2: 0.001 })
            }));

            // Layer 2: 32 → 16 (refines patterns)
            this.model.add(tf.layers.dense({
                units: 16,
                activation: 'relu'
            }));

            // Output: 16 → 3 (direction probabilities)
            this.model.add(tf.layers.dense({
                units: this.numClasses,
                activation: 'softmax'
            }));

            this.model.compile({
                optimizer: tf.train.adam(0.008),
                loss: 'sparseCategoricalCrossentropy',
                metrics: ['accuracy']
            });

            this.isReady = true;
            this.useFallback = false;
            console.log('[ML] Neural network initialized: 12→32→16→3 (TensorFlow.js)');
        } catch (e) {
            console.warn('[ML] Model build failed:', e);
            this.useFallback = true;
            this.isReady = true;
        }
    }

    // === DIRECTION CLASSIFICATION ===

    _classifyDirection(angle) {
        const normalized = angle + Math.PI / 2;
        if (normalized < -0.3) return 0;  // left
        if (normalized > 0.3) return 2;   // right
        return 1;                          // center
    }

    _directionLabel(idx) {
        return ['left', 'center', 'right'][idx];
    }

    // === ENHANCED 12-FEATURE EXTRACTION ===

    _extractFeatures() {
        const h = this.shotHistory;
        const n = h.length;
        if (n === 0) return new Array(this.numFeatures).fill(0.33);

        const last = h[n - 1];
        const recentN = Math.min(n, 10);
        const recent = h.slice(-recentN);
        const recent5 = h.slice(-Math.min(n, 5));

        // F1: Last shot angle (normalized 0-1)
        const angleNorm = (last.angle + Math.PI) / (Math.PI * 2);

        // F2: Last shot power
        const powerNorm = last.power;

        // F3: Last shot X position (normalized across goal width)
        const xNorm = last.aimX !== undefined ?
            (last.aimX - (DESIGN.width / 2 - DESIGN.goalWidth / 2)) / DESIGN.goalWidth : 0.5;

        // F4-6: Direction distribution (last N shots)
        const counts = [0, 0, 0];
        recent.forEach(s => counts[s.direction]++);
        const leftBias = counts[0] / recentN;
        const rightBias = counts[2] / recentN;
        const centerBias = counts[1] / recentN;

        // F7: Same-direction streak length (normalized)
        let streak = 0;
        if (n >= 2) {
            const lastDir = h[n - 1].direction;
            for (let i = n - 2; i >= Math.max(0, n - 8); i--) {
                if (h[i].direction === lastDir) streak++;
                else break;
            }
        }
        const streakNorm = Math.min(streak / 5, 1);

        // F8: Alternation pattern score (how often they switch sides)
        let alternations = 0;
        for (let i = 1; i < recent.length; i++) {
            if (recent[i].direction !== recent[i - 1].direction) alternations++;
        }
        const altScore = recentN > 1 ? alternations / (recentN - 1) : 0.5;

        // F9: Power tendency (average of last 5)
        const avgPower = recent5.reduce((s, x) => s + x.power, 0) / recent5.length;

        // F10: Recent success rate
        const recentGoals = recent.filter(s => s.scored).length;
        const successRate = recentGoals / recentN;

        // F11: Round progress
        const roundProgress = Math.min(n / 20, 1);

        // F12: Momentum — direction of recent scoring trend
        let momentum = 0;
        if (n >= 4) {
            const first2 = h.slice(-4, -2).filter(s => s.scored).length / 2;
            const last2 = h.slice(-2).filter(s => s.scored).length / 2;
            momentum = (last2 - first2 + 1) / 2; // normalized 0-1
        } else {
            momentum = 0.5;
        }

        return [
            angleNorm, powerNorm, xNorm,
            leftBias, rightBias, centerBias,
            streakNorm, altScore,
            avgPower, successRate,
            roundProgress, momentum
        ];
    }

    // === RECORD SHOT (with full analytics) ===

    recordShot(angle, power, scored, aimX, aimY, difficulty, round) {
        const direction = this._classifyDirection(angle);
        const now = Date.now();

        // Calculate reaction time from previous shot
        const prevShot = this.shotHistory.length > 0 ?
            this.shotHistory[this.shotHistory.length - 1] : null;
        const reactionTime = prevShot ? now - prevShot.timestamp : 0;

        const shotRecord = {
            angle, power, direction, scored,
            aimX: aimX || DESIGN.width / 2,
            aimY: aimY || DESIGN.goalLineY,
            difficulty: difficulty || 'medium',
            round: round || 0,
            timestamp: now,
            reactionTime
        };

        this.shotHistory.push(shotRecord);
        if (this.shotHistory.length > this.maxHistory) {
            this.shotHistory.shift();
        }

        // Add training sample
        if (this.shotHistory.length >= 3) {
            const prevHistory = this.shotHistory.slice(0, -1);
            const tempHistory = this.shotHistory;
            this.shotHistory = prevHistory;
            const features = this._extractFeatures();
            this.shotHistory = tempHistory;

            this.trainingData.push({ features, label: direction });
            if (this.trainingData.length > this.maxHistory) {
                this.trainingData.shift();
            }
        }

        // Retrain every 3 shots (not every shot — better performance)
        this.trainCount++;
        if (this.trainingData.length >= 5 && this.trainCount % 3 === 0) {
            this._train();
        }

        // Update player profile
        this._updatePlayerProfile(shotRecord);

        // Update adaptive difficulty
        this._updateAdaptiveDifficulty(scored);

        // Log analytics event
        this._logEvent('shot', {
            direction: this._directionLabel(direction),
            power, scored, difficulty: shotRecord.difficulty
        });
    }

    // === TRAINING ===

    async _train() {
        if (this.useFallback || !this.model) return;

        try {
            const xs = tf.tensor2d(this.trainingData.map(d => d.features));
            const ys = tf.tensor1d(this.trainingData.map(d => d.label), 'int32');

            await this.model.fit(xs, ys, {
                epochs: 8,
                batchSize: Math.min(this.trainingData.length, 16),
                shuffle: true,
                verbose: 0
            });

            xs.dispose();
            ys.dispose();

            this._logEvent('ml_train', { samples: this.trainingData.length });
        } catch (e) {
            console.warn('[ML] Training error:', e);
        }
    }

    // === PREDICTION ===

    predict() {
        if (!this.isReady) {
            return { direction: 'center', confidence: 0.33, probs: [0.33, 0.34, 0.33] };
        }

        if (this.useFallback || this.trainingData.length < 5) {
            return this._statisticalPredict();
        }

        try {
            const features = this._extractFeatures();
            const input = tf.tensor2d([features]);
            const prediction = this.model.predict(input);
            const probs = prediction.dataSync();
            input.dispose();
            prediction.dispose();

            const probArray = Array.from(probs);
            const maxIdx = probArray.indexOf(Math.max(...probArray));

            this.predictionProbs = probArray;
            this.confidence = probArray[maxIdx];
            this.lastPrediction = this._directionLabel(maxIdx);

            return {
                direction: this.lastPrediction,
                confidence: this.confidence,
                probs: probArray
            };
        } catch (e) {
            return this._statisticalPredict();
        }
    }

    _statisticalPredict() {
        const h = this.shotHistory;
        if (h.length < 3) {
            return { direction: 'center', confidence: 0.33, probs: [0.33, 0.34, 0.33] };
        }

        const recent = h.slice(-10);
        const counts = [0, 0, 0];
        recent.forEach(s => counts[s.direction]++);
        const total = recent.length;
        const probs = counts.map(c => c / total);

        // Detect alternation pattern
        let altPattern = null;
        if (h.length >= 3) {
            const last3 = h.slice(-3).map(s => s.direction);
            if (last3[0] !== last3[1] && last3[1] !== last3[2] && last3[0] === last3[2]) {
                // Alternating pattern detected — predict opposite of last
                altPattern = last3[2] === 0 ? 2 : last3[2] === 2 ? 0 : 1;
                probs[altPattern] = Math.max(probs[altPattern], 0.5);
                // Re-normalize
                const sum = probs.reduce((a, b) => a + b, 0);
                for (let i = 0; i < 3; i++) probs[i] /= sum;
            }
        }

        const maxIdx = probs.indexOf(Math.max(...probs));
        this.predictionProbs = probs;
        this.confidence = probs[maxIdx];
        this.lastPrediction = this._directionLabel(maxIdx);

        return {
            direction: this.lastPrediction,
            confidence: this.confidence,
            probs
        };
    }

    // === PLAYER SKILL PROFILING ===

    _updatePlayerProfile(shot) {
        const pp = this.playerProfile;
        pp.totalShots++;
        if (shot.scored) pp.totalGoals++;
        else pp.totalSaves++;

        // Running averages
        pp.shotAccuracy = pp.totalShots > 0 ? pp.totalGoals / pp.totalShots : 0;
        pp.avgPower = pp.avgPower * 0.9 + shot.power * 0.1; // exponential moving average

        // Preferred direction (from last 20 shots)
        const recent20 = this.shotHistory.slice(-20);
        const dirCounts = [0, 0, 0];
        recent20.forEach(s => dirCounts[s.direction]++);
        const maxDir = dirCounts.indexOf(Math.max(...dirCounts));
        pp.preferredDirection = this._directionLabel(maxDir);

        // Direction entropy (Shannon entropy — measures unpredictability)
        const total = recent20.length;
        if (total >= 3) {
            const dirProbs = dirCounts.map(c => c / total);
            pp.directionEntropy = 0;
            dirProbs.forEach(p => {
                if (p > 0) pp.directionEntropy -= p * Math.log2(p);
            });
            pp.directionEntropy /= Math.log2(3); // normalize to 0-1
        }

        // Reaction time (exponential moving average)
        if (shot.reactionTime > 0 && shot.reactionTime < 30000) {
            pp.avgReactionTime = pp.avgReactionTime === 0 ?
                shot.reactionTime :
                pp.avgReactionTime * 0.8 + shot.reactionTime * 0.2;
        }

        // Composite skill score (0-100)
        const accuracyScore = pp.shotAccuracy * 40;              // max 40 pts
        const unpredictScore = pp.directionEntropy * 25;          // max 25 pts
        const powerControl = (1 - Math.abs(pp.avgPower - 0.65)) * 15; // max 15 pts (optimal ~0.65)
        const speedScore = Math.max(0, (5000 - pp.avgReactionTime) / 5000) * 20; // max 20 pts
        pp.skillScore = Math.round(Math.min(100, accuracyScore + unpredictScore + powerControl + speedScore));

        // Classification
        if (pp.skillScore >= 80) pp.classification = 'expert';
        else if (pp.skillScore >= 60) pp.classification = 'advanced';
        else if (pp.skillScore >= 35) pp.classification = 'intermediate';
        else pp.classification = 'beginner';
    }

    // === ADAPTIVE DIFFICULTY ENGINE ===

    _updateAdaptiveDifficulty(scored) {
        const ad = this.adaptive;
        ad.recentResults.push(scored);
        if (ad.recentResults.length > ad.windowSize * 2) {
            ad.recentResults = ad.recentResults.slice(-ad.windowSize * 2);
        }

        if (ad.recentResults.length < 3) return;

        const window = ad.recentResults.slice(-ad.windowSize);
        const currentSuccessRate = window.filter(r => r).length / window.length;

        // How far from target?
        const error = currentSuccessRate - ad.targetSuccessRate;

        // Positive error = player too good → make harder
        // Negative error = player struggling → make easier
        ad.adjustmentFactor += error * ad.smoothingRate;
        ad.adjustmentFactor = Math.max(-0.5, Math.min(0.5, ad.adjustmentFactor));
        ad.totalAdjustments++;

        if (ad.totalAdjustments % 5 === 0) {
            this._logEvent('difficulty_adjust', {
                factor: ad.adjustmentFactor.toFixed(3),
                successRate: currentSuccessRate.toFixed(2),
                target: ad.targetSuccessRate
            });
        }
    }

    getAdaptiveAdjustment() {
        return this.adaptive.adjustmentFactor;
    }

    // === ANALYTICS LOGGING ===

    _logEvent(type, data) {
        this.analytics.events.push({
            type,
            data,
            timestamp: Date.now(),
            elapsed: Date.now() - this.analytics.sessionStart
        });

        // Keep last 500 events
        if (this.analytics.events.length > 500) {
            this.analytics.events = this.analytics.events.slice(-500);
        }
    }

    getAnalyticsSummary() {
        const a = this.analytics;
        const pp = this.playerProfile;
        const shots = this.shotHistory;

        return {
            sessionDuration: Math.round((Date.now() - a.sessionStart) / 1000),
            totalShots: pp.totalShots,
            totalGoals: pp.totalGoals,
            totalSaves: pp.totalSaves,
            accuracy: Math.round(pp.shotAccuracy * 100) + '%',
            skillScore: pp.skillScore,
            classification: pp.classification,
            preferredDirection: pp.preferredDirection,
            unpredictability: Math.round(pp.directionEntropy * 100) + '%',
            avgPower: pp.avgPower.toFixed(2),
            adaptiveFactor: this.adaptive.adjustmentFactor.toFixed(3),
            mlTrainingSamples: this.trainingData.length,
            usingTF: !this.useFallback,
            eventsLogged: a.events.length
        };
    }

    // === DEBUG INFO (for in-game overlay) ===

    getDebugInfo() {
        return {
            totalShots: this.shotHistory.length,
            trainingSamples: this.trainingData.length,
            lastPrediction: this.lastPrediction,
            confidence: this.confidence,
            probs: this.predictionProbs,
            usingTF: !this.useFallback,
            playerSkill: this.playerProfile.classification,
            skillScore: this.playerProfile.skillScore,
            adaptiveFactor: this.adaptive.adjustmentFactor,
            entropy: this.playerProfile.directionEntropy
        };
    }
}

// ===== renderer.js =====
// ============================================================================
// RENDERER — Premium stadium visuals, layered rendering, glassmorphism UI
// ============================================================================

class Renderer {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.scale = 1;
        this.offsetX = 0;
        this.offsetY = 0;
        this.frameCount = 0;

        // Camera effects
        this.cameraShake = 0;
        this.cameraZoom = 1;
        this.targetZoom = 1;
        this.vignetteAlpha = 0.4;

        // Pre-generated crowd data (random seated people)
        this._crowdData = [];
        this._generateCrowd();

        // Floodlight flicker
        this._flickerPhase = 0;
    }

    _generateCrowd() {
        // Generate ~300 crowd members with random positions, colors, sizes
        const crowdColors = [
            '#e53935','#d81b60','#8e24aa','#5e35b1','#3949ab','#1e88e5',
            '#039be5','#00acc1','#00897b','#43a047','#7cb342','#c0ca33',
            '#fdd835','#ffb300','#fb8c00','#f4511e','#6d4c41','#757575',
            '#ffffff','#ff9800','#2196f3','#00e5ff','#e91e63','#9c27b0'
        ];
        for (let row = 0; row < 8; row++) {
            for (let col = 0; col < 50; col++) {
                this._crowdData.push({
                    x: col * 9 + Utils.randRange(-2, 2),
                    row: row,
                    color: crowdColors[Utils.randInt(0, crowdColors.length - 1)],
                    skinTone: ['#fdbcb4','#d4a574','#8d5524','#c68642','#e0ac69','#f1c27d'][Utils.randInt(0, 5)],
                    size: Utils.randRange(0.7, 1.1),
                    waveOffset: Math.random() * Math.PI * 2,
                    waveSpeed: Utils.randRange(0.02, 0.06),
                    isWaving: Math.random() < 0.15
                });
            }
        }
    }

    resize() {
        const dpr = window.devicePixelRatio || 1;
        const w = window.innerWidth;
        const h = window.innerHeight;
        const scaleX = w / DESIGN.width;
        const scaleY = h / DESIGN.height;
        this.scale = Math.min(scaleX, scaleY);
        this.offsetX = (w - DESIGN.width * this.scale) / 2;
        this.offsetY = (h - DESIGN.height * this.scale) / 2;
        this.canvas.width = w * dpr;
        this.canvas.height = h * dpr;
        this.canvas.style.width = w + 'px';
        this.canvas.style.height = h + 'px';
        this.ctx.setTransform(dpr * this.scale, 0, 0, dpr * this.scale, dpr * this.offsetX, dpr * this.offsetY);
        return { scaleX: this.scale, scaleY: this.scale, offsetX: this.offsetX, offsetY: this.offsetY };
    }

    clear() {
        const ctx = this.ctx;
        ctx.save();
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.fillStyle = '#0a0e1a';
        ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        ctx.restore();
    }

    // Apply camera effects each frame
    applyCamera(ctx) {
        this.cameraZoom = Utils.lerp(this.cameraZoom, this.targetZoom, 0.08);
        const shakeX = this.cameraShake > 0.01 ? (Math.random() - 0.5) * this.cameraShake * 12 : 0;
        const shakeY = this.cameraShake > 0.01 ? (Math.random() - 0.5) * this.cameraShake * 12 : 0;
        this.cameraShake *= 0.9;

        if (this.cameraZoom !== 1 || shakeX || shakeY) {
            const cx = DESIGN.width / 2;
            const cy = DESIGN.height / 2;
            ctx.translate(cx + shakeX, cy + shakeY);
            ctx.scale(this.cameraZoom, this.cameraZoom);
            ctx.translate(-cx, -cy);
        }
    }

    // ====== LAYER 0: STADIUM BACKGROUND ======
    drawStadium(stadiumId) {
        const ctx = this.ctx;
        const theme = STADIUM_THEMES[stadiumId] || STADIUM_THEMES.default;
        this.frameCount++;
        this._flickerPhase += 0.03;
        // Debug: log active stadium every 300 frames (~5 sec)
        if (this.frameCount % 300 === 1) {
            console.log('[RENDER] Stadium:', stadiumId, '| Theme:', theme.name, '| Pattern:', theme.grassPattern);
        }

        // Night sky gradient — themed
        const skyGrad = ctx.createLinearGradient(0, -50, 0, DESIGN.fieldTop);
        skyGrad.addColorStop(0, theme.sky[0]);
        skyGrad.addColorStop(0.4, theme.sky[1]);
        skyGrad.addColorStop(1, theme.sky[2]);
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, -50, DESIGN.width, DESIGN.fieldTop + 50);

        // Stadium structure (tiered seating behind goal)
        const stadTop = -20;
        const stadBottom = DESIGN.fieldTop + 5;
        const tierCount = 3;

        for (let tier = 0; tier < tierCount; tier++) {
            const t = tier / tierCount;
            const y1 = Utils.lerp(stadTop, stadBottom - 40, t);
            const y2 = Utils.lerp(stadTop + 30, stadBottom, t);
            const inset = (tierCount - tier) * 15;

            // Tier background — themed concrete
            const tierGrad = ctx.createLinearGradient(0, y1, 0, y2);
            tierGrad.addColorStop(0, Utils.hexToRgba(theme.tierColor[0], 0.8 - tier * 0.15));
            tierGrad.addColorStop(1, Utils.hexToRgba(theme.tierColor[1], 0.9 - tier * 0.15));
            ctx.fillStyle = tierGrad;
            ctx.fillRect(inset, y1, DESIGN.width - inset * 2, y2 - y1);

            // Tier edge line
            ctx.strokeStyle = Utils.hexToRgba('#4a6070', 0.3);
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(inset, y2);
            ctx.lineTo(DESIGN.width - inset, y2);
            ctx.stroke();
        }

        // Draw crowd (animated)
        this._drawCrowd(ctx, stadTop, stadBottom);

        // Stadium roof edge — themed
        ctx.fillStyle = theme.roofColor;
        ctx.fillRect(0, stadTop - 5, DESIGN.width, 8);

        // Floodlights (4 towers) — themed
        this._drawFloodlights(ctx, theme);

        // Advertising boards behind goal — themed
        this._drawAdBoards(ctx, theme);

        // Neon glow strips for neon stadium
        if (theme.neonGlow) {
            this._drawNeonAccents(ctx, theme);
        }

        // Gold accent shimmer for world cup — bold and visible
        if (theme.goldAccent) {
            const shimmer = 0.06 + Math.sin(this.frameCount * 0.02) * 0.04;
            ctx.fillStyle = `rgba(255,215,0,${shimmer})`;
            ctx.fillRect(0, -50, DESIGN.width, DESIGN.fieldTop + 50);

            // Gold edge highlights on tier edges
            ctx.strokeStyle = `rgba(255,215,0,${0.15 + Math.sin(this.frameCount * 0.03) * 0.10})`;
            ctx.lineWidth = 2;
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.moveTo(0, DESIGN.fieldTop - 2);
            ctx.lineTo(DESIGN.width, DESIGN.fieldTop - 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
    }

    _drawNeonAccents(ctx, theme) {
        const time = this.frameCount * 0.04;
        const nc = theme.neonColors;
        // Bold neon strips along stadium — visible and vivid
        for (let i = 0; i < nc.length; i++) {
            const y = -12 + i * 22;
            const pulse = 0.5 + Math.sin(time + i * 1.5) * 0.3;
            ctx.shadowColor = nc[i];
            ctx.shadowBlur = 20;
            ctx.strokeStyle = nc[i];
            ctx.globalAlpha = pulse;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(5, y);
            ctx.lineTo(DESIGN.width - 5, y);
            ctx.stroke();
            // Double-pass for extra glow
            ctx.globalAlpha = pulse * 0.4;
            ctx.lineWidth = 8;
            ctx.stroke();
        }
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;

        // Neon side strips on field edges
        const ft = DESIGN.fieldTop;
        const fb = DESIGN.fieldBottom;
        for (let i = 0; i < 2; i++) {
            const x = i === 0 ? 4 : DESIGN.width - 4;
            const sideGrad = ctx.createLinearGradient(0, ft, 0, fb);
            const c1 = nc[i % nc.length];
            const c2 = nc[(i + 2) % nc.length];
            sideGrad.addColorStop(0, c1);
            sideGrad.addColorStop(1, c2);
            ctx.strokeStyle = sideGrad;
            ctx.lineWidth = 3;
            ctx.shadowColor = c1;
            ctx.shadowBlur = 12;
            ctx.globalAlpha = 0.4 + Math.sin(time + i * 2) * 0.2;
            ctx.beginPath();
            ctx.moveTo(x, ft);
            ctx.lineTo(x, fb);
            ctx.stroke();
        }
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
    }

    _drawCrowd(ctx, top, bottom) {
        const rowHeight = (bottom - top - 20) / 8;
        const time = this.frameCount;

        this._crowdData.forEach(person => {
            const baseX = person.x * (DESIGN.width / 450) + 10;
            const baseY = top + 15 + person.row * rowHeight;
            const s = person.size;

            // Subtle wave animation for some people
            let yOff = 0;
            if (person.isWaving) {
                yOff = Math.sin(time * person.waveSpeed + person.waveOffset) * 2;
            }

            // Head
            ctx.fillStyle = person.skinTone;
            ctx.beginPath();
            ctx.arc(baseX, baseY + yOff - 3 * s, 2.5 * s, 0, Math.PI * 2);
            ctx.fill();

            // Body (jersey)
            ctx.fillStyle = person.color;
            ctx.fillRect(baseX - 2.5 * s, baseY + yOff, 5 * s, 5 * s);
        });
    }

    _drawFloodlights(ctx, theme) {
        const positions = [
            { x: 25, y: -15 },
            { x: DESIGN.width - 25, y: -15 },
            { x: 80, y: -25 },
            { x: DESIGN.width - 80, y: -25 }
        ];

        const ft = theme ? theme.floodlightTint : [255, 255, 220];
        const flicker = 0.95 + Math.sin(this._flickerPhase) * 0.03 + Math.sin(this._flickerPhase * 3.7) * 0.02;

        positions.forEach(pos => {
            // Light pole
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y + 20);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();

            // Light housing
            ctx.fillStyle = '#888';
            ctx.fillRect(pos.x - 6, pos.y - 3, 12, 6);

            // Light beam (cone) — themed tint
            const grad = ctx.createRadialGradient(pos.x, pos.y, 5, pos.x, pos.y + 80, 150);
            grad.addColorStop(0, `rgba(${ft[0]},${ft[1]},${ft[2]},${0.15 * flicker})`);
            grad.addColorStop(0.5, `rgba(${ft[0]},${ft[1]},${Math.max(0,ft[2]-20)},${0.05 * flicker})`);
            grad.addColorStop(1, `rgba(${ft[0]},${ft[1]},${Math.max(0,ft[2]-20)},0)`);
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(pos.x - 5, pos.y);
            ctx.lineTo(pos.x - 100, DESIGN.fieldTop + 50);
            ctx.lineTo(pos.x + 100, DESIGN.fieldTop + 50);
            ctx.lineTo(pos.x + 5, pos.y);
            ctx.closePath();
            ctx.fill();

            // Bright point
            ctx.fillStyle = `rgba(${ft[0]},${ft[1]},${ft[2]},${0.8 * flicker})`;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 3, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    _drawAdBoards(ctx, theme) {
        const y = DESIGN.fieldTop - 2;
        const h = 14;
        const boardColor = theme ? theme.adBoardColor : '#1a237e';

        // Board background — themed
        ctx.fillStyle = boardColor;
        ctx.fillRect(30, y, DESIGN.width - 60, h);

        // LED dots effect
        for (let x = 35; x < DESIGN.width - 35; x += 4) {
            const brightness = 0.3 + Math.sin(x * 0.05 + this.frameCount * 0.1) * 0.2;
            ctx.fillStyle = `rgba(100,180,255,${brightness})`;
            ctx.fillRect(x, y + 2, 2, 2);
            ctx.fillStyle = `rgba(255,200,50,${brightness * 0.7})`;
            ctx.fillRect(x, y + 7, 2, 2);
        }

        // Brand text placeholder
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.font = 'bold 8px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GOALBOT', DESIGN.width / 2, y + 10);
    }

    // ====== LAYER 1: PREMIUM FIELD ======
    drawField(stadiumId) {
        const ctx = this.ctx;
        const theme = STADIUM_THEMES[stadiumId] || STADIUM_THEMES.default;
        const ft = DESIGN.fieldTop;
        const fb = DESIGN.fieldBottom;
        const fw = DESIGN.width;
        const fh = fb - ft;

        // ── Base grass — themed gradient ──
        const grassGrad = ctx.createLinearGradient(0, ft, 0, fb);
        grassGrad.addColorStop(0, theme.grass[0]);
        grassGrad.addColorStop(0.3, theme.grass[1]);
        grassGrad.addColorStop(0.6, theme.grass[2]);
        grassGrad.addColorStop(1, theme.grass[3]);
        ctx.fillStyle = grassGrad;
        ctx.fillRect(0, ft, fw, fh);

        // ── Grass pattern — unique per stadium ──
        this._drawGrassPattern(ctx, theme, ft, fb, fw, fh);

        // ── Grass texture — themed particles ──
        const tex = theme.grassTexture || { color: 'rgba(100,200,50,0.05)', count: 200 };
        ctx.fillStyle = tex.color;
        for (let i = 0; i < tex.count; i++) {
            const gx = Math.random() * fw;
            const gy = ft + Math.random() * fh;
            ctx.fillRect(gx, gy, 1, 2);
        }

        // ── Spotlight cones for night stadium ──
        if (theme.spotlightCones) {
            this._drawFieldSpotlightCones(ctx, ft, fw, fh);
        }

        // ── Field lines — themed color, width, optional glow ──
        this._drawFieldLines(ctx, theme, ft, fb, fw, fh);

        // ── Stadium shadow on field (top edge) ──
        const shadowGrad = ctx.createLinearGradient(0, ft, 0, ft + 40);
        shadowGrad.addColorStop(0, 'rgba(0,0,0,0.25)');
        shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = shadowGrad;
        ctx.fillRect(0, ft, fw, 40);

        // ── Spotlight on penalty area — themed intensity ──
        const spotGrad = ctx.createRadialGradient(fw / 2, ft + 80, 10, fw / 2, ft + 80, 150);
        spotGrad.addColorStop(0, `rgba(255,255,220,${theme.spotlightAlpha})`);
        spotGrad.addColorStop(1, 'rgba(255,255,220,0)');
        ctx.fillStyle = spotGrad;
        ctx.fillRect(fw / 2 - 150, ft, 300, 200);

        // ── Ambient overlay ──
        if (theme.ambientOverlay) {
            ctx.fillStyle = theme.ambientOverlay.color;
            ctx.fillRect(0, ft, fw, fh);
        }
    }

    // ── GRASS PATTERN RENDERERS ──

    _drawGrassPattern(ctx, theme, ft, fb, fw, fh) {
        const pattern = theme.grassPattern || 'stripes';

        switch (pattern) {
            case 'stripes':
                this._drawPatternStripes(ctx, theme, ft, fw, fh);
                break;
            case 'narrow_stripes':
                this._drawPatternStripes(ctx, theme, ft, fw, fh);
                break;
            case 'wide_bands':
                this._drawPatternWideBands(ctx, theme, ft, fw, fh);
                break;
            case 'diamonds':
                this._drawPatternDiamonds(ctx, theme, ft, fb, fw, fh);
                break;
            case 'neon_grid':
                this._drawPatternNeonGrid(ctx, theme, ft, fb, fw, fh);
                break;
        }
    }

    _drawPatternStripes(ctx, theme, ft, fw, fh) {
        const h = theme.stripeHeight || 28;
        const lightA = theme.stripeLightAlpha || 0.04;
        const darkA = theme.stripeDarkAlpha || 0.04;
        for (let y = ft; y < ft + fh; y += h) {
            const idx = Math.floor((y - ft) / h);
            ctx.fillStyle = idx % 2 === 0 ? `rgba(255,255,255,${lightA})` : `rgba(0,0,0,${darkA})`;
            ctx.fillRect(0, y, fw, h);
        }
    }

    _drawPatternWideBands(ctx, theme, ft, fw, fh) {
        // Wide alternating bands like World Cup broadcast
        const h = theme.bandHeight || 50;
        const lightA = theme.bandLightAlpha || 0.07;
        const darkA = theme.bandDarkAlpha || 0.04;
        for (let y = ft; y < ft + fh; y += h) {
            const idx = Math.floor((y - ft) / h);
            if (idx % 2 === 0) {
                // Bright band with subtle inner gradient
                const bandGrad = ctx.createLinearGradient(0, y, 0, y + h);
                bandGrad.addColorStop(0, `rgba(255,255,255,${lightA * 0.6})`);
                bandGrad.addColorStop(0.5, `rgba(255,255,255,${lightA})`);
                bandGrad.addColorStop(1, `rgba(255,255,255,${lightA * 0.6})`);
                ctx.fillStyle = bandGrad;
            } else {
                ctx.fillStyle = `rgba(0,0,0,${darkA})`;
            }
            ctx.fillRect(0, y, fw, h);
        }
    }

    _drawPatternDiamonds(ctx, theme, ft, fb, fw, fh) {
        // Bold checkerboard pattern for Champions Arena — unmistakable
        const size = theme.diamondSize || 36;
        const lightA = theme.diamondLightAlpha || 0.14;
        const darkA = theme.diamondDarkAlpha || 0.08;
        const cols = Math.ceil(fw / size);
        const rows = Math.ceil(fh / size);

        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                const isLight = (row + col) % 2 === 0;
                ctx.fillStyle = isLight ? `rgba(255,255,255,${lightA})` : `rgba(0,0,0,${darkA})`;
                const x = col * size;
                const y = ft + row * size;
                ctx.fillRect(x, y, size, Math.min(size, fb - y));
            }
        }

        // Purple prestige tint on alternate rows
        for (let row = 0; row < rows; row += 2) {
            const y = ft + row * size;
            ctx.fillStyle = 'rgba(120,50,200,0.06)';
            ctx.fillRect(0, y, fw, size);
        }

        // Diagonal accent lines
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        for (let d = -fh; d < fw + fh; d += size * 2) {
            ctx.beginPath();
            ctx.moveTo(d, ft);
            ctx.lineTo(d + fh, fb);
            ctx.stroke();
        }
    }

    _drawPatternNeonGrid(ctx, theme, ft, fb, fw, fh) {
        // BOLD neon grid — cyberpunk, unmistakable
        const spacing = theme.gridSpacing || 32;
        const gridColor = theme.gridColor || 'rgba(0,255,200,0.18)';
        const glowColor = theme.gridGlowColor || 'rgba(0,255,200,0.35)';
        const time = this.frameCount * 0.015;
        const pulse = 0.7 + Math.sin(time) * 0.3;

        ctx.save();

        // Main grid lines with glow
        ctx.shadowColor = '#00ffcc';
        ctx.shadowBlur = 6;
        ctx.globalAlpha = pulse;
        ctx.strokeStyle = gridColor;
        ctx.lineWidth = 1.5;

        // Horizontal grid lines
        for (let y = ft; y < fb; y += spacing) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(fw, y);
            ctx.stroke();
        }
        // Vertical grid lines
        for (let x = 0; x < fw; x += spacing) {
            ctx.beginPath();
            ctx.moveTo(x, ft);
            ctx.lineTo(x, fb);
            ctx.stroke();
        }

        ctx.shadowBlur = 0;

        // Bright intersection dots — bigger, glowing
        ctx.fillStyle = glowColor;
        ctx.shadowColor = '#00ffcc';
        ctx.shadowBlur = 8;
        for (let y = ft; y < fb; y += spacing) {
            for (let x = 0; x < fw; x += spacing) {
                ctx.beginPath();
                ctx.arc(x, y, 2.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        ctx.shadowBlur = 0;

        // Scanning line effect — bolder
        const scanY = ft + ((this.frameCount * 0.8) % fh);
        const scanGrad = ctx.createLinearGradient(0, scanY - 25, 0, scanY + 25);
        scanGrad.addColorStop(0, 'rgba(0,255,200,0)');
        scanGrad.addColorStop(0.5, 'rgba(0,255,200,0.20)');
        scanGrad.addColorStop(1, 'rgba(0,255,200,0)');
        ctx.globalAlpha = 1;
        ctx.fillStyle = scanGrad;
        ctx.fillRect(0, scanY - 25, fw, 50);

        // Secondary pink/purple scan line (offset)
        const scanY2 = ft + ((this.frameCount * 0.5 + fh * 0.5) % fh);
        const scanGrad2 = ctx.createLinearGradient(0, scanY2 - 15, 0, scanY2 + 15);
        scanGrad2.addColorStop(0, 'rgba(255,0,200,0)');
        scanGrad2.addColorStop(0.5, 'rgba(255,0,200,0.10)');
        scanGrad2.addColorStop(1, 'rgba(255,0,200,0)');
        ctx.fillStyle = scanGrad2;
        ctx.fillRect(0, scanY2 - 15, fw, 30);

        ctx.restore();
    }

    _drawFieldSpotlightCones(ctx, ft, fw, fh) {
        // DRAMATIC visible blue-white light cones on the dark field
        const cones = [
            { x: fw * 0.2, w: 130 },
            { x: fw * 0.8, w: 130 },
            { x: fw * 0.5, w: 180 }
        ];
        cones.forEach(cone => {
            const coneGrad = ctx.createRadialGradient(cone.x, ft, 10, cone.x, ft + fh * 0.5, cone.w);
            coneGrad.addColorStop(0, 'rgba(160,200,255,0.18)');
            coneGrad.addColorStop(0.4, 'rgba(160,200,255,0.06)');
            coneGrad.addColorStop(1, 'rgba(160,200,255,0)');
            ctx.fillStyle = coneGrad;
            ctx.fillRect(cone.x - cone.w, ft, cone.w * 2, fh * 0.6);
        });

        // Dark vignette around edges to sell the night effect
        const vigL = ctx.createLinearGradient(0, ft, 60, ft);
        vigL.addColorStop(0, 'rgba(0,0,0,0.25)');
        vigL.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = vigL;
        ctx.fillRect(0, ft, 60, fh);

        const vigR = ctx.createLinearGradient(fw, ft, fw - 60, ft);
        vigR.addColorStop(0, 'rgba(0,0,0,0.25)');
        vigR.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = vigR;
        ctx.fillRect(fw - 60, ft, 60, fh);
    }

    _drawFieldLines(ctx, theme, ft, fb, fw, fh) {
        const lineColor = theme.fieldLineColor || 'rgba(255,255,255,0.9)';
        const lineWidth = theme.fieldLineWidth || 2.5;

        // Apply glow if specified (world cup gold, neon green)
        if (theme.fieldLineGlow) {
            ctx.shadowColor = theme.fieldLineGlow.color;
            ctx.shadowBlur = theme.fieldLineGlow.blur;
        }
        if (theme.fieldBorderGlow) {
            ctx.shadowColor = theme.fieldBorderGlow.color;
            ctx.shadowBlur = theme.fieldBorderGlow.blur;
        }

        ctx.strokeStyle = lineColor;
        ctx.lineWidth = lineWidth;

        // Field border
        ctx.strokeRect(22, ft + 2, fw - 44, fh - 4);

        // Center line
        ctx.beginPath();
        ctx.moveTo(22, ft + fh / 2);
        ctx.lineTo(fw - 22, ft + fh / 2);
        ctx.stroke();

        // Center circle
        ctx.beginPath();
        ctx.arc(fw / 2, ft + fh / 2, 55, 0, Math.PI * 2);
        ctx.stroke();

        // Center spot
        ctx.fillStyle = lineColor;
        ctx.beginPath();
        ctx.arc(fw / 2, ft + fh / 2, 3, 0, Math.PI * 2);
        ctx.fill();

        // Penalty area (top)
        ctx.strokeRect(fw / 2 - 105, ft + 2, 210, 130);
        // 6-yard box
        ctx.strokeRect(fw / 2 - 65, ft + 2, 130, 55);

        // Penalty spot
        ctx.fillStyle = lineColor;
        ctx.beginPath();
        ctx.arc(fw / 2, ft + 100, 3, 0, Math.PI * 2);
        ctx.fill();

        // Penalty arc
        ctx.beginPath();
        ctx.arc(fw / 2, ft + 100, 60, 0.25, Math.PI - 0.25);
        ctx.stroke();

        // Bottom penalty area (mirror)
        ctx.strokeRect(fw / 2 - 105, fb - 132, 210, 130);
        ctx.strokeRect(fw / 2 - 65, fb - 57, 130, 55);

        // Bottom penalty spot
        ctx.beginPath();
        ctx.arc(fw / 2, fb - 100, 3, 0, Math.PI * 2);
        ctx.fill();

        // Corner arcs
        const corners = [[22, ft + 2], [fw - 22, ft + 2], [22, fb - 2], [fw - 22, fb - 2]];
        corners.forEach(([cx, cy]) => {
            ctx.beginPath();
            const sa = cx < fw / 2 ? (cy < fb / 2 ? 0 : -Math.PI / 2) : (cy < fb / 2 ? Math.PI / 2 : Math.PI);
            ctx.arc(cx, cy, 10, sa, sa + Math.PI / 2);
            ctx.stroke();
        });

        // Clear shadow
        ctx.shadowBlur = 0;
        ctx.shadowColor = 'transparent';
    }

    // ====== LAYER 2: PREMIUM GOAL ======
    drawGoal() {
        const ctx = this.ctx;
        const cx = DESIGN.width / 2;
        const gw = DESIGN.goalWidth;
        const gh = DESIGN.goalHeight;
        const left = cx - gw / 2;
        const top = DESIGN.fieldTop - 8;
        const pw = DESIGN.goalPostWidth;

        // Goal depth (back netting area)
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.beginPath();
        ctx.moveTo(left + pw, top);
        ctx.lineTo(left - 10, top - gh + 5);
        ctx.lineTo(left + gw + 10, top - gh + 5);
        ctx.lineTo(left + gw - pw, top);
        ctx.closePath();
        ctx.fill();

        // Net grid (perspective)
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= 16; i++) {
            const t = i / 16;
            const tx = Utils.lerp(left + pw, left + gw - pw, t);
            const bx = Utils.lerp(left - 10, left + gw + 10, t);
            ctx.beginPath();
            ctx.moveTo(tx, top);
            ctx.lineTo(bx, top - gh + 5);
            ctx.stroke();
        }
        for (let j = 0; j <= 6; j++) {
            const t = j / 6;
            const y = Utils.lerp(top, top - gh + 5, t);
            const lx = Utils.lerp(left + pw, left - 10, t);
            const rx = Utils.lerp(left + gw - pw, left + gw + 10, t);
            ctx.beginPath();
            ctx.moveTo(lx, y);
            ctx.lineTo(rx, y);
            ctx.stroke();
        }

        // Left post (3D cylindrical look)
        const postGrad = ctx.createLinearGradient(left - 2, 0, left + pw + 2, 0);
        postGrad.addColorStop(0, '#999');
        postGrad.addColorStop(0.3, '#fff');
        postGrad.addColorStop(0.7, '#fff');
        postGrad.addColorStop(1, '#aaa');
        ctx.fillStyle = postGrad;
        ctx.fillRect(left, top - gh + 5, pw, gh);

        // Right post
        const postGrad2 = ctx.createLinearGradient(left + gw - pw - 2, 0, left + gw + 2, 0);
        postGrad2.addColorStop(0, '#aaa');
        postGrad2.addColorStop(0.3, '#fff');
        postGrad2.addColorStop(0.7, '#fff');
        postGrad2.addColorStop(1, '#999');
        ctx.fillStyle = postGrad2;
        ctx.fillRect(left + gw - pw, top - gh + 5, pw, gh);

        // Crossbar (3D cylindrical)
        const barGrad = ctx.createLinearGradient(0, top - gh + 5, 0, top - gh + 5 + pw + 2);
        barGrad.addColorStop(0, '#fff');
        barGrad.addColorStop(0.5, '#f0f0f0');
        barGrad.addColorStop(1, '#bbb');
        ctx.fillStyle = barGrad;
        ctx.fillRect(left - 2, top - gh + 5, gw + 4, pw + 2);

        // Post highlight reflections
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillRect(left + 2, top - gh + 12, 2, gh - 15);
        ctx.fillRect(left + gw - pw + 2, top - gh + 12, 2, gh - 15);

        // Ground anchoring shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(left + pw / 2, top + 3, 6, 3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(left + gw - pw / 2, top + 3, 6, 3, 0, 0, Math.PI * 2);
        ctx.fill();
    }

    // ====== LAYER 5: VIGNETTE & LIGHTING ======
    drawVignette() {
        const ctx = this.ctx;
        const w = DESIGN.width;
        const h = DESIGN.height;

        // Edge vignette
        const grad = ctx.createRadialGradient(w / 2, h / 2, w * 0.3, w / 2, h / 2, w * 0.9);
        grad.addColorStop(0, 'rgba(0,0,0,0)');
        grad.addColorStop(1, `rgba(0,0,0,${this.vignetteAlpha})`);
        ctx.fillStyle = grad;
        ctx.fillRect(0, -50, w, h + 100);

        // Top-down lighting gradient (stadium lights from above)
        const lightGrad = ctx.createLinearGradient(0, DESIGN.fieldTop, 0, DESIGN.fieldBottom);
        lightGrad.addColorStop(0, 'rgba(255,255,220,0.03)');
        lightGrad.addColorStop(0.5, 'rgba(255,255,220,0)');
        lightGrad.addColorStop(1, 'rgba(0,0,20,0.08)');
        ctx.fillStyle = lightGrad;
        ctx.fillRect(0, DESIGN.fieldTop, w, DESIGN.fieldBottom - DESIGN.fieldTop);
    }

    // ====== SCOREBOARD (Glassmorphism — larger, cleaner) ======
    // Colored bottom panel behind scoreboard area
    drawBottomPanel(difficulty) {
        const ctx = this.ctx;
        const y = DESIGN.fieldBottom;
        const h = DESIGN.height - y;

        ctx.save();

        // Gradient background — dark cyber with subtle tint based on difficulty
        const diffTints = {
            easy:   { top: 'rgba(0,50,50,0.92)',    mid: 'rgba(5,25,35,0.96)',   bot: 'rgba(5,10,20,0.98)' },
            medium: { top: 'rgba(40,30,0,0.92)',    mid: 'rgba(20,18,5,0.96)',   bot: 'rgba(10,8,2,0.98)' },
            hard:   { top: 'rgba(50,10,10,0.92)',   mid: 'rgba(30,5,5,0.96)',    bot: 'rgba(15,3,3,0.98)' },
            legend: { top: 'rgba(35,0,50,0.92)',    mid: 'rgba(20,0,35,0.96)',   bot: 'rgba(10,0,20,0.98)' }
        };
        const tint = diffTints[difficulty] || diffTints.medium;

        const grad = ctx.createLinearGradient(0, y, 0, y + h);
        grad.addColorStop(0, tint.top);
        grad.addColorStop(0.4, tint.mid);
        grad.addColorStop(1, tint.bot);
        ctx.fillStyle = grad;
        ctx.fillRect(0, y, DESIGN.width, h);

        // Top edge accent highlight — cyan (cyber primary)
        const edgeGrad = ctx.createLinearGradient(0, 0, DESIGN.width, 0);
        edgeGrad.addColorStop(0, 'rgba(0,255,240,0)');
        edgeGrad.addColorStop(0.3, 'rgba(0,255,240,0.15)');
        edgeGrad.addColorStop(0.5, 'rgba(0,255,240,0.25)');
        edgeGrad.addColorStop(0.7, 'rgba(0,255,240,0.15)');
        edgeGrad.addColorStop(1, 'rgba(0,255,240,0)');
        ctx.fillStyle = edgeGrad;
        ctx.fillRect(0, y, DESIGN.width, 2);

        // Subtle cyan glow from top edge
        const glowGrad = ctx.createLinearGradient(0, y, 0, y + 25);
        glowGrad.addColorStop(0, 'rgba(0,255,240,0.08)');
        glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glowGrad;
        ctx.fillRect(0, y, DESIGN.width, 25);

        // Circuit board pattern overlay (instead of diamond) for cyber feel
        ctx.globalAlpha = 0.015;
        ctx.strokeStyle = '#00ffcc';
        ctx.lineWidth = 0.5;
        // Vertical circuit lines
        for (let dx = 0; dx < DESIGN.width + 20; dx += 50) {
            ctx.beginPath();
            ctx.moveTo(dx, y);
            ctx.lineTo(dx, y + h);
            ctx.stroke();
            // Horizontal connectors
            for (let dy = y; dy < y + h; dy += 60) {
                ctx.beginPath();
                ctx.moveTo(dx, dy);
                ctx.lineTo(dx + 25, dy);
                ctx.stroke();
            }
        }
        ctx.globalAlpha = 1;

        ctx.restore();
    }

    drawScoreboard(score, round, maxRounds, difficulty, streak) {
        const ctx = this.ctx;
        const cx = DESIGN.width / 2;
        const y = DESIGN.fieldBottom + 12;

        // Glassmorphism card — darker, more cyber
        const cardW = 360, cardH = 80;
        const cardX = cx - cardW / 2;

        // Background with dark cyber gradient
        const cardBg = ctx.createLinearGradient(cardX, y, cardX, y + cardH);
        cardBg.addColorStop(0, 'rgba(10,15,30,0.85)');
        cardBg.addColorStop(1, 'rgba(5,8,20,0.92)');
        ctx.fillStyle = cardBg;
        this._roundRect(ctx, cardX, y, cardW, cardH, 22);
        ctx.fill();

        // Cyan neon border glow
        ctx.shadowColor = '#00ffcc';
        ctx.shadowBlur = 12;
        ctx.strokeStyle = 'rgba(0,255,240,0.18)';
        ctx.lineWidth = 1.5;
        this._roundRect(ctx, cardX, y, cardW, cardH, 22);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Inner highlight (glass reflection)
        const hlGrad = ctx.createLinearGradient(cardX, y, cardX, y + 20);
        hlGrad.addColorStop(0, 'rgba(255,255,255,0.08)');
        hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = hlGrad;
        this._roundRect(ctx, cardX + 1, y + 1, cardW - 2, 20, 21);
        ctx.fill();

        ctx.textAlign = 'center';

        // Difficulty badge — neon colors with glow
        const diffNeonColors = { easy: '#00ff88', medium: '#ffea00', hard: '#ff1744', legend: '#aa00ff' };
        const neonColor = diffNeonColors[difficulty] || '#00bcd4';

        ctx.fillStyle = Utils.hexToRgba(neonColor, 0.15);
        this._roundRect(ctx, cardX + 12, y + 6, 55, 18, 9);
        ctx.fill();

        // Badge with neon glow
        ctx.shadowColor = neonColor;
        ctx.shadowBlur = 6;
        ctx.fillStyle = neonColor;
        ctx.font = 'bold 9px -apple-system, Arial';
        ctx.fillText('< ' + difficulty.toUpperCase() + ' >', cardX + 39, y + 18);
        ctx.shadowBlur = 0;

        // Round counter with HUD brackets
        ctx.fillStyle = 'rgba(255,255,255,0.65)';
        ctx.font = 'bold 10px -apple-system, Arial';
        ctx.fillText('[ ROUND ' + round + '/' + maxRounds + ' ]', cx, y + 18);

        // Streak badge (right) — gold with glow
        if (streak > 0) {
            const streakLabel = streak >= 5 ? '\uD83D\uDD25 UNSTOPPABLE' : streak >= 3 ? '\uD83D\uDD25 ON FIRE' : '\u26A1 ' + streak + ' STREAK';
            ctx.fillStyle = Utils.hexToRgba('#ffea00', 0.15);
            this._roundRect(ctx, cardX + cardW - 95, y + 6, 83, 18, 9);
            ctx.fill();
            ctx.shadowColor = '#ffea00';
            ctx.shadowBlur = 6;
            ctx.fillStyle = '#ffea00';
            ctx.font = 'bold 9px -apple-system, Arial';
            ctx.fillText(streakLabel, cardX + cardW - 53, y + 18);
            ctx.shadowBlur = 0;
        }

        // Separator accent line — cyan pulse
        const pulseAlpha = 0.1 + Math.sin(this.frameCount * 0.05) * 0.08;
        ctx.fillStyle = `rgba(0,255,240,${pulseAlpha})`;
        ctx.fillRect(cardX + 20, y + 27, cardW - 40, 1.5);

        // Score display row
        const scoreY = y + 57;

        // Player score with cyan glow
        ctx.shadowColor = '#00e5ff';
        ctx.shadowBlur = 12;
        ctx.fillStyle = '#00e5ff';
        ctx.font = 'bold 38px -apple-system, Arial';
        ctx.fillText(score.player, cx - 65, scoreY);
        ctx.shadowBlur = 0;

        // VS divider — cyan line with pulse
        const vsGrad = ctx.createLinearGradient(0, y + 30, 0, y + 70);
        vsGrad.addColorStop(0, 'rgba(0,255,240,0)');
        vsGrad.addColorStop(0.3, 'rgba(0,255,240,0.25)');
        vsGrad.addColorStop(0.7, 'rgba(0,255,240,0.25)');
        vsGrad.addColorStop(1, 'rgba(0,255,240,0)');
        ctx.fillStyle = vsGrad;
        ctx.fillRect(cx - 0.5, y + 30, 1.5, 40);

        // Keeper score with red glow
        ctx.shadowColor = '#ff1744';
        ctx.shadowBlur = 12;
        ctx.fillStyle = '#ff1744';
        ctx.font = 'bold 38px -apple-system, Arial';
        ctx.fillText(score.keeper, cx + 65, scoreY);
        ctx.shadowBlur = 0;

        // Labels
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.font = '10px -apple-system, Arial';
        ctx.fillText('YOU', cx - 65, scoreY + 15);
        ctx.fillText('AI', cx + 65, scoreY + 15);
    }

    // ====== ML DEBUG OVERLAY ======
    drawMLDebug(mlInfo) {
        const ctx = this.ctx;
        const x = 10, y = DESIGN.fieldBottom + 90;
        const cardWidth = 155;
        const cardHeight = 120;

        // Glass card — expanded for new fields
        ctx.fillStyle = 'rgba(15,25,50,0.7)';
        this._roundRect(ctx, x, y, cardWidth, cardHeight, 12);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 1;
        this._roundRect(ctx, x, y, cardWidth, cardHeight, 12);
        ctx.stroke();

        // Header
        ctx.font = 'bold 8px -apple-system, monospace';
        ctx.textAlign = 'left';
        ctx.fillStyle = mlInfo.usingTF ? 'rgba(76,175,80,0.8)' : 'rgba(255,152,0,0.8)';
        ctx.fillText('AI BRAIN ' + (mlInfo.usingTF ? '(Neural Net)' : '(Stats)'), x + 8, y + 13);

        // Direction probability bars
        const labels = ['LEFT', 'MID', 'RIGHT'];
        const barColors = ['#f44336', '#ff9800', '#00e5ff'];
        mlInfo.probs.forEach((p, i) => {
            const barY = y + 20 + i * 13;
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.font = '7px -apple-system, monospace';
            ctx.fillText(labels[i], x + 8, barY + 8);

            // Bar background
            ctx.fillStyle = 'rgba(255,255,255,0.06)';
            this._roundRect(ctx, x + 38, barY, 75, 9, 4);
            ctx.fill();

            // Bar fill
            ctx.fillStyle = barColors[i];
            if (p > 0.01) {
                this._roundRect(ctx, x + 38, barY, 75 * p, 9, 4);
                ctx.fill();
            }

            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.fillText((p * 100).toFixed(0) + '%', x + 118, barY + 8);
        });

        // Separator line
        const sepY = y + 60;
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.beginPath();
        ctx.moveTo(x + 8, sepY);
        ctx.lineTo(x + cardWidth - 8, sepY);
        ctx.stroke();

        // Player profile info
        ctx.font = '7px -apple-system, monospace';
        const infoStartY = sepY + 10;

        // Skill classification with color coding
        const skillColors = {
            beginner: '#f44336', intermediate: '#ff9800',
            advanced: '#00e5ff', expert: '#ffd700'
        };
        const skillLabel = (mlInfo.playerSkill || 'beginner').toUpperCase();
        ctx.fillStyle = skillColors[mlInfo.playerSkill] || '#fff';
        ctx.fillText('SKILL: ' + skillLabel, x + 8, infoStartY);

        // Skill score bar
        const scoreBarX = x + 80;
        const scoreVal = Math.min(100, mlInfo.skillScore || 0);
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        this._roundRect(ctx, scoreBarX, infoStartY - 7, 55, 8, 3);
        ctx.fill();
        ctx.fillStyle = skillColors[mlInfo.playerSkill] || '#00e5ff';
        if (scoreVal > 0) {
            this._roundRect(ctx, scoreBarX, infoStartY - 7, 55 * (scoreVal / 100), 8, 3);
            ctx.fill();
        }
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillText(scoreVal, scoreBarX + 58, infoStartY);

        // Entropy (unpredictability)
        const entropyVal = ((mlInfo.entropy || 0) * 100).toFixed(0);
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fillText('ENTROPY: ' + entropyVal + '%', x + 8, infoStartY + 12);

        // Adaptive factor
        const adaptVal = (mlInfo.adaptiveFactor || 0).toFixed(2);
        const adaptColor = mlInfo.adaptiveFactor > 0 ? '#f44336' : mlInfo.adaptiveFactor < 0 ? '#00e5ff' : '#fff';
        ctx.fillStyle = adaptColor;
        ctx.fillText('ADAPT: ' + (mlInfo.adaptiveFactor > 0 ? '+' : '') + adaptVal, x + 80, infoStartY + 12);

        // Training samples & shots count
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.fillText('SHOTS:' + (mlInfo.totalShots || 0) + '  TRAIN:' + (mlInfo.trainingSamples || 0), x + 8, infoStartY + 24);
    }

    // ====== INSTRUCTION OVERLAY (compact) ======
    drawInstruction(text, subtext) {

        const cy = DESIGN.fieldBottom - 50;

            ctx.fillText(subtext, cx, cy + 22);
