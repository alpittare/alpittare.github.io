    }

    // ====== VERTICAL POWER BAR (right side) ======
    drawPowerBar(power) {
        const ctx = this.ctx;

        // Position: right edge, vertically centered in field area
        const barX = DESIGN.width - 35;
        const barW = 16;
        const barH = 280;
        const barY = DESIGN.fieldTop + (DESIGN.fieldBottom - DESIGN.fieldTop - barH) / 2;
        const barR = 8;

        // Outer glow — follows fill level
        const color = power < 0.5 ? COLORS.uiSuccess : power < 0.8 ? COLORS.uiWarning : COLORS.uiDanger;
        const glowGrad = ctx.createRadialGradient(barX + barW / 2, barY + barH * (1 - power), 5,
                                                    barX + barW / 2, barY + barH * (1 - power), 45);
        glowGrad.addColorStop(0, Utils.hexToRgba(color, 0.3));
        glowGrad.addColorStop(0.6, Utils.hexToRgba(color, 0.08));
        glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glowGrad;
        ctx.fillRect(barX - 25, barY - 25, barW + 50, barH + 50);

        // Background track — dark cyber glass
        const bgGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
        bgGrad.addColorStop(0, 'rgba(5,8,16,0.75)');
        bgGrad.addColorStop(0.5, 'rgba(8,12,24,0.7)');
        bgGrad.addColorStop(1, 'rgba(5,8,16,0.75)');
        ctx.fillStyle = bgGrad;
        this._roundRect(ctx, barX, barY, barW, barH, barR);
        ctx.fill();
        ctx.shadowColor = '#00ffcc';
        ctx.shadowBlur = 6;
        ctx.strokeStyle = 'rgba(0,255,240,0.12)';
        ctx.lineWidth = 1.5;
        this._roundRect(ctx, barX, barY, barW, barH, barR);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Gradient fill (bottom → top)
        const fillH = barH * power;
        const fillY = barY + barH - fillH;

        if (fillH > 2) {
            ctx.save();
            this._roundRect(ctx, barX + 1, barY + 1, barW - 2, barH - 2, barR - 1);
            ctx.clip();

            // Multi-stop gradient — cyan to red
            const fillGrad = ctx.createLinearGradient(0, barY + barH, 0, barY);
            fillGrad.addColorStop(0, '#00ff88');
            fillGrad.addColorStop(0.35, '#00e5ff');
            fillGrad.addColorStop(0.55, '#ffea00');
            fillGrad.addColorStop(0.75, '#ff7043');
            fillGrad.addColorStop(0.9, '#ff1744');
            fillGrad.addColorStop(1, '#ff0055');
            ctx.fillStyle = fillGrad;
            ctx.fillRect(barX + 1, fillY, barW - 2, fillH);

            // Shine overlay (glass reflection)
            const shineGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
            shineGrad.addColorStop(0, 'rgba(255,255,255,0.05)');
            shineGrad.addColorStop(0.35, 'rgba(255,255,255,0.22)');
            shineGrad.addColorStop(0.65, 'rgba(255,255,255,0.08)');
            shineGrad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = shineGrad;
            ctx.fillRect(barX + 1, fillY, barW - 2, fillH);

            // Animated shimmer traveling up the bar
            const shimmerY = barY + barH - ((this.frameCount * 2) % (barH + 60)) - 15;
            const shimmerH = 30;
            if (shimmerY + shimmerH > fillY && shimmerY < barY + barH) {
                const shimGrad = ctx.createLinearGradient(0, shimmerY, 0, shimmerY + shimmerH);
                shimGrad.addColorStop(0, 'rgba(255,255,255,0)');
                shimGrad.addColorStop(0.5, 'rgba(255,255,255,0.12)');
                shimGrad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = shimGrad;
                ctx.fillRect(barX + 1, Math.max(fillY, shimmerY), barW - 2, shimmerH);
            }

            ctx.restore();
        }

        // Tick marks (every 25%) with subtle notch
        for (let t = 0.25; t < 1; t += 0.25) {
            const ty = barY + barH * (1 - t);
            ctx.strokeStyle = 'rgba(255,255,255,0.18)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(barX + 2, ty);
            ctx.lineTo(barX + barW - 2, ty);
            ctx.stroke();
            // Small tick label on left
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.font = '6px -apple-system, Arial';
            ctx.textAlign = 'right';
            ctx.fillText(Math.round(t * 100), barX - 3, ty + 2);
        }

        // Power percentage text with glow
        ctx.textAlign = 'center';
        ctx.shadowColor = color;
        ctx.shadowBlur = 6;
        ctx.fillStyle = color;
        ctx.font = 'bold 13px -apple-system, Arial';
        ctx.fillText(Math.round(power * 100) + '%', barX + barW / 2, barY + barH + 18);
        ctx.shadowBlur = 0;

        // "POWER" label
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.font = 'bold 7px -apple-system, Arial';
        ctx.fillText('P O W E R', barX + barW / 2, barY - 6);

        // Animated arrow indicator at current level
        const indicatorY = barY + barH - fillH;
        const arrowPulse = Math.sin(this.frameCount * 0.08) * 1.5;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(barX - 5 + arrowPulse, indicatorY - 4);
        ctx.lineTo(barX - 5 + arrowPulse, indicatorY + 4);
        ctx.lineTo(barX + 1, indicatorY);
        ctx.closePath();
        ctx.fill();
    }

    // ====== AIM LINE (cyber) ======
    drawAimLine(fromX, fromY, toX, toY, power) {
        const ctx = this.ctx;
        const dx = toX - fromX;
        const dy = toY - fromY;
        const len = Math.sqrt(dx * dx + dy * dy);
        if (len < 5) return;

        // Gradient dashed line — cyan
        ctx.save();
        ctx.setLineDash([6, 8]);
        const lineGrad = ctx.createLinearGradient(fromX, fromY, toX, toY);
        lineGrad.addColorStop(0, 'rgba(0,255,240,0.2)');
        lineGrad.addColorStop(1, 'rgba(0,255,240,0.6)');
        ctx.strokeStyle = lineGrad;
        ctx.lineWidth = 2;
        ctx.shadowColor = '#00ffcc';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.moveTo(fromX, fromY);
        ctx.lineTo(toX, toY);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.setLineDash([]);

        // Target reticle — cyan crosshair
        ctx.strokeStyle = 'rgba(0,255,240,0.8)';
        ctx.lineWidth = 1.5;
        ctx.shadowColor = '#00ffcc';
        ctx.shadowBlur = 8;
        const pulse = 1 + Math.sin(this.frameCount * 0.08) * 0.15;
        const crossSize = 10 * pulse;

        // Animated crosshair
        ctx.beginPath();
        ctx.moveTo(toX - crossSize, toY); ctx.lineTo(toX - 4, toY); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(toX + 4, toY); ctx.lineTo(toX + crossSize, toY); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(toX, toY - crossSize); ctx.lineTo(toX, toY - 4); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(toX, toY + 4); ctx.lineTo(toX, toY + crossSize); ctx.stroke();

        // Outer ring
        ctx.beginPath();
        ctx.arc(toX, toY, 12 * pulse, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Center dot
        ctx.fillStyle = '#00ffcc';
        ctx.beginPath();
        ctx.arc(toX, toY, 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }

    // ====== RESULT BANNER (cyber neon) ======
    drawResultBanner(text, color, progress) {
        const ctx = this.ctx;
        const cx = DESIGN.width / 2;
        const cy = (DESIGN.fieldTop + DESIGN.fieldBottom) / 2;
        const scale = Utils.easeOutBack(Math.min(progress / 15, 1));
        const alpha = Math.min(progress / 10, 1);

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(cx, cy);
        ctx.scale(scale, scale);

        // Expanding ring effect — neon glow
        if (progress < 30) {
            const ringT = progress / 30;
            const ringR = 40 + ringT * 120;
            ctx.shadowColor = color;
            ctx.shadowBlur = 10;
            ctx.strokeStyle = Utils.hexToRgba(color, Math.max(0, 0.35 - ringT * 0.40));
            ctx.lineWidth = 3 - ringT * 2.5;
            ctx.beginPath();
            ctx.arc(0, 0, ringR, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // Background blur card — dark cyber
        const cardGrad = ctx.createLinearGradient(-120, -35, -120, 35);
        cardGrad.addColorStop(0, 'rgba(5,8,20,0.65)');
        cardGrad.addColorStop(1, 'rgba(5,8,20,0.55)');
        ctx.fillStyle = cardGrad;
        this._roundRect(ctx, -130, -38, 260, 76, 38);
        ctx.fill();

        // Card border neon glow
        ctx.shadowColor = color;
        ctx.shadowBlur = 15;
        ctx.strokeStyle = Utils.hexToRgba(color, 0.32);
        ctx.lineWidth = 2;
        this._roundRect(ctx, -130, -38, 260, 76, 38);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Text glow (dual-layer for richer neon effect)
        ctx.shadowColor = color;
        ctx.shadowBlur = 40;
        ctx.fillStyle = color;
        ctx.font = 'bold 48px -apple-system, Arial';
        ctx.textAlign = 'center';
        ctx.fillText(text, 0, 18);
        // Second pass for stronger glow
        ctx.shadowBlur = 20;
        ctx.fillText(text, 0, 18);
        ctx.shadowBlur = 0;

        ctx.restore();
    }

    // ====== GOAL CELEBRATION OVERLAY ======
    drawGoalCelebration(timer, streak) {
        const ctx = this.ctx;
        const cx = DESIGN.width / 2;
        const w = DESIGN.width;
        const h = DESIGN.height;
        const t = timer / 40; // 0 → 1 over 40 frames

        // Neon cyan flash overlay (fades out)
        const flashAlpha = Math.max(0, 0.35 - t * 0.5);
        if (flashAlpha > 0) {
            ctx.fillStyle = `rgba(0,255,240,${flashAlpha})`;
            ctx.fillRect(0, 0, w, h);
        }

        // Radiating neon cyan light rays from center
        ctx.save();
        ctx.translate(cx, (DESIGN.fieldTop + DESIGN.fieldBottom) / 2);
        ctx.globalAlpha = Math.max(0, 0.3 - t * 0.4);
        for (let i = 0; i < 16; i++) {
            const angle = (i / 16) * Math.PI * 2 + timer * 0.05;
            const rayLen = 150 + timer * 8;
            const grad = ctx.createLinearGradient(0, 0,
                Math.cos(angle) * rayLen, Math.sin(angle) * rayLen);
            grad.addColorStop(0, 'rgba(0,255,240,0.45)');
            grad.addColorStop(1, 'rgba(0,255,240,0)');
            ctx.fillStyle = grad;
            ctx.shadowColor = '#00ffcc';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(Math.cos(angle - 0.08) * rayLen, Math.sin(angle - 0.08) * rayLen);
            ctx.lineTo(Math.cos(angle + 0.08) * rayLen, Math.sin(angle + 0.08) * rayLen);
            ctx.closePath();
            ctx.fill();
        }
        ctx.shadowBlur = 0;
        ctx.restore();

        // Streak bonus text (below main banner)
        if (streak >= 2 && timer > 10 && timer < 35) {
            const streakAlpha = Math.min((timer - 10) / 5, 1) * Math.min((35 - timer) / 5, 1);
            ctx.save();
            ctx.globalAlpha = streakAlpha;
            const streakY = (DESIGN.fieldTop + DESIGN.fieldBottom) / 2 + 60;
            ctx.fillStyle = '#ffea00';
            ctx.font = 'bold 22px -apple-system, Arial';
            ctx.textAlign = 'center';
            const streakText = streak >= 5 ? '\uD83D\uDD25 UNSTOPPABLE! \uD83D\uDD25' :
                               streak >= 3 ? '\uD83D\uDD25 ON FIRE! \uD83D\uDD25' :
                               '\u26A1 ' + streak + 'x STREAK!';
            ctx.shadowColor = '#ffea00';
            ctx.shadowBlur = 18;
            ctx.fillText(streakText, cx, streakY);
            ctx.shadowBlur = 0;
            ctx.restore();
        }
    }

    // ====== MENU SCREEN (Cyber theme) ======
    drawMenuScreen(selectedDifficulty, stats, animPhase, coins, dailyReward) {
        coins = coins || 0;
        dailyReward = dailyReward || { claimed: false, streak: 0 };
        const ctx = this.ctx;
        const W = DESIGN.width;
        const cx = W / 2;

        // Dark gradient background — deep cyber
        const bgGrad = ctx.createLinearGradient(0, 0, 0, DESIGN.height);
        bgGrad.addColorStop(0, '#050510');
        bgGrad.addColorStop(0.5, '#0c1020');
        bgGrad.addColorStop(1, '#050510');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, DESIGN.width, DESIGN.height);

        // Animated grid lines (cyber instead of orbs)
        ctx.globalAlpha = 0.08;
        ctx.strokeStyle = '#00ffcc';
        ctx.lineWidth = 0.5;
        const gridPhase = animPhase * 0.1;
        const gridSpacing = 80;
        for (let y = -gridSpacing + (gridPhase % gridSpacing); y < DESIGN.height + gridSpacing; y += gridSpacing) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(DESIGN.width, y);
            ctx.stroke();
        }
        for (let x = -gridSpacing + (gridPhase % gridSpacing); x < DESIGN.width + gridSpacing; x += gridSpacing) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, DESIGN.height);
            ctx.stroke();
        }
        ctx.globalAlpha = 1;

        // Animated cyan and purple orbs (neon accents)
        const orbColors = ['#00ffcc', '#aa00ff', '#00e5ff', '#7c4dff'];
        for (let i = 0; i < 12; i++) {
            const ox = (Math.sin(animPhase * 0.35 + i * 2.1) * 0.5 + 0.5) * DESIGN.width;
            const oy = (Math.cos(animPhase * 0.25 + i * 1.8) * 0.5 + 0.5) * DESIGN.height;
            const orb = orbColors[i % orbColors.length];
            const orbR = 40 + (i % 3) * 20;
            const orbGrad = ctx.createRadialGradient(ox, oy, 0, ox, oy, orbR);
            orbGrad.addColorStop(0, Utils.hexToRgba(orb, 0.08));
            orbGrad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = orbGrad;
            ctx.beginPath();
            ctx.arc(ox, oy, orbR, 0, Math.PI * 2);
            ctx.fill();
        }

        // Floating particles — cyan and purple
        ctx.globalAlpha = 0.12;
        for (let i = 0; i < 25; i++) {
            const px = ((i * 137.5) % DESIGN.width);
            const py = DESIGN.height - ((animPhase * 25 + i * 31) % DESIGN.height);
            const pr = 1 + (i % 3) * 0.7;
            ctx.fillStyle = orbColors[i % orbColors.length];
            ctx.shadowColor = orbColors[i % orbColors.length];
            ctx.shadowBlur = 3;
            ctx.beginPath();
            ctx.arc(px, py, pr, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;

        // Stadium silhouette at top — subtle
        ctx.fillStyle = 'rgba(0,255,240,0.015)';
        ctx.beginPath();
        ctx.moveTo(0, 120);
        ctx.quadraticCurveTo(cx, 60, DESIGN.width, 120);
        ctx.lineTo(DESIGN.width, 0);
        ctx.lineTo(0, 0);
        ctx.closePath();
        ctx.fill();

        // Logo — 🤖 robot instead of ⚽
        const logoScale = 1 + Math.sin(animPhase * 2) * 0.03;
        ctx.save();
        ctx.translate(cx, 150);
        ctx.scale(logoScale, logoScale);

        // Logo glow — cyan neon
        ctx.shadowColor = '#00ffcc';
        ctx.shadowBlur = 25;
        ctx.font = '72px serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#00ffcc';
        ctx.fillText('\uD83E\uDDE4', 0, 0);
        ctx.shadowBlur = 0;
        ctx.restore();

        // Title — cyan to purple gradient
        ctx.font = 'bold 34px -apple-system, Arial';
        const titleGrad = ctx.createLinearGradient(cx - 100, 200, cx + 100, 200);
        titleGrad.addColorStop(0, '#00fff0');
        titleGrad.addColorStop(0.5, '#aa00ff');
        titleGrad.addColorStop(1, '#00bcd4');
        ctx.fillStyle = titleGrad;
        ctx.shadowColor = '#00ffcc';
        ctx.shadowBlur = 15;
        ctx.textAlign = 'center';
        ctx.fillText('GOALBOT', cx, 215);
        ctx.shadowBlur = 0;

        // Subtitle — dim cyan
        ctx.fillStyle = 'rgba(0,255,240,0.5)';
        ctx.font = '13px -apple-system, Arial';
        ctx.fillText('AI Football Challenge', cx, 238);

        // Stats card — cyber glass
        let nextY = 260;
        if (stats.gamesPlayed > 0) {
            const cardW = 300, cardH = 55, cardX = cx - cardW / 2;
            ctx.fillStyle = 'rgba(10,15,30,0.5)';
            this._roundRect(ctx, cardX, nextY, cardW, cardH, 16);
            ctx.fill();
            // Cyan glow border
            ctx.shadowColor = '#00ffcc';
            ctx.shadowBlur = 8;
            ctx.strokeStyle = 'rgba(0,255,240,0.12)';
            ctx.lineWidth = 1.5;
            this._roundRect(ctx, cardX, nextY, cardW, cardH, 16);
            ctx.stroke();
            ctx.shadowBlur = 0;

            const statLabels = ['PLAYED', 'BEST', 'ACCURACY'];
            const statVals = [stats.gamesPlayed, stats.bestScore, stats.accuracy + '%'];
            statLabels.forEach((l, i) => {
                const sx = cardX + 50 + i * 100;
                ctx.fillStyle = 'rgba(128,203,196,0.6)';
                ctx.font = '9px -apple-system, Arial';
                ctx.fillText(l, sx, nextY + 18);
                ctx.fillStyle = '#00e5ff';
                ctx.shadowColor = '#00ffcc';
                ctx.shadowBlur = 6;
                ctx.font = 'bold 20px -apple-system, Arial';
                ctx.fillText(statVals[i], sx, nextY + 42);
                ctx.shadowBlur = 0;
            });
            nextY += cardH + 20;
        }

        // Difficulty grid — neon-colored difficulty buttons
        const difficulties = [
            { id: 'easy', label: 'EASY', color: '#00ff88', desc: 'Beginner AI', icon: '\u2B50' },
            { id: 'medium', label: 'MEDIUM', color: '#ffea00', desc: 'Balanced', icon: '\uD83D\uDD25' },
            { id: 'hard', label: 'HARD', color: '#ff1744', desc: 'Smart AI', icon: '\uD83D\uDCA5' },
            { id: 'legend', label: 'LEGEND', color: '#aa00ff', desc: 'Neural Net', icon: '\uD83E\uDDE0' }
        ];

        const btnW = 145, btnH = 60, btnGap = 12;
        difficulties.forEach((d, i) => {
            const row = Math.floor(i / 2);
            const col = i % 2;
            const bx = cx - btnW - btnGap / 2 + col * (btnW + btnGap);
            const by = nextY + row * (btnH + btnGap);
            const selected = selectedDifficulty === d.id;

            // Button background — dark glass with neon left border
            const btnGrad = ctx.createLinearGradient(bx, by, bx, by + btnH);
            btnGrad.addColorStop(0, 'rgba(10,15,30,0.6)');
            btnGrad.addColorStop(1, 'rgba(5,8,20,0.7)');
            ctx.fillStyle = btnGrad;
            this._roundRect(ctx, bx, by, btnW, btnH, 14);
            ctx.fill();

            // Neon left border accent
            ctx.fillStyle = d.color;
            ctx.shadowColor = d.color;
            ctx.shadowBlur = 8;
            ctx.fillRect(bx, by, 4, btnH);
            ctx.shadowBlur = 0;

            // Selected glow effect
            if (selected) {
                ctx.shadowColor = d.color;
                ctx.shadowBlur = 14;
            }
            ctx.strokeStyle = selected ? d.color : 'rgba(255,255,255,0.08)';
            ctx.lineWidth = selected ? 1.5 : 1;
            this._roundRect(ctx, bx, by, btnW, btnH, 14);
            ctx.stroke();
            ctx.shadowBlur = 0;

            // Top highlight (glass reflection)
            const btnHL = ctx.createLinearGradient(bx, by, bx, by + 16);
            btnHL.addColorStop(0, 'rgba(255,255,255,0.05)');
            btnHL.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = btnHL;
            this._roundRect(ctx, bx + 1, by + 1, btnW - 2, 16, 13);
            ctx.fill();

            // Icon
            ctx.font = '18px serif';
            ctx.textAlign = 'center';
            ctx.fillText(d.icon, bx + 25, by + 30);

            // Label — colored neon
            ctx.fillStyle = d.color;
            ctx.shadowColor = d.color;
            ctx.shadowBlur = selected ? 8 : 4;
            ctx.font = 'bold 14px -apple-system, Arial';
            ctx.textAlign = 'left';
            ctx.fillText(d.label, bx + 42, by + 27);
            ctx.shadowBlur = 0;

            // Description
            ctx.fillStyle = 'rgba(128,203,196,0.5)';
            ctx.font = '10px -apple-system, Arial';
            ctx.fillText(d.desc, bx + 42, by + 43);
            ctx.textAlign = 'center';

            d._rect = { x: bx, y: by, w: btnW, h: btnH };
        });

        // Play button — Cyan gradient
        const playY = nextY + 2 * (btnH + btnGap) + 25;
        const playW = 200, playH = 56;
        const playX = cx - playW / 2;

        // Cyan glow around button
        const playGlow = ctx.createRadialGradient(cx, playY + playH / 2, 10, cx, playY + playH / 2, 120);
        playGlow.addColorStop(0, 'rgba(0,255,240,0.15)');
        playGlow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = playGlow;
        ctx.fillRect(cx - 120, playY - 20, 240, playH + 40);

        // Button gradient — cyan to teal
        const playGrad = ctx.createLinearGradient(playX, playY, playX, playY + playH);
        playGrad.addColorStop(0, '#00bcd4');
        playGrad.addColorStop(1, '#006064');
        ctx.fillStyle = playGrad;
        this._roundRect(ctx, playX, playY, playW, playH, 28);
        ctx.fill();

        // Glow shadow
        ctx.shadowColor = '#00ffcc';
        ctx.shadowBlur = 15;
        this._roundRect(ctx, playX, playY, playW, playH, 28);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Highlight

    // ====== LEVEL SELECT SCREEN ======
    drawLevelSelectScreen(campaignLevel, levelStars, animPhase) {
        const ctx = this.ctx;
        const cx = DESIGN.width / 2;

        // Dark background
        const bgGrad = ctx.createLinearGradient(0, 0, 0, DESIGN.height);
        bgGrad.addColorStop(0, '#050510');
        bgGrad.addColorStop(0.5, '#0c1020');
        bgGrad.addColorStop(1, '#050510');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, DESIGN.width, DESIGN.height);

        // Back button (top-left)
        const backBtn = { x: 12, y: 20, w: 50, h: 40 };
        ctx.fillStyle = 'rgba(0,255,240,0.1)';
        this._roundRect(ctx, backBtn.x, backBtn.y, backBtn.w, backBtn.h, 10);
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,255,240,0.2)';
        ctx.lineWidth = 1;
        this._roundRect(ctx, backBtn.x, backBtn.y, backBtn.w, backBtn.h, 10);
        ctx.stroke();
        ctx.fillStyle = '#00ffcc';
        ctx.font = 'bold 20px -apple-system, Arial';
        ctx.textAlign = 'center';
        ctx.fillText('\u2190', backBtn.x + backBtn.w / 2, backBtn.y + 26);

        // Title
        ctx.fillStyle = '#00fff0';
        ctx.font = 'bold 28px -apple-system, Arial';
        ctx.textAlign = 'center';
        ctx.fillText('CAMPAIGN', cx, 55);

        // Current level display
        ctx.fillStyle = 'rgba(128,203,196,0.6)';
        ctx.font = '12px -apple-system, Arial';
        const levelCfg = FOOTBALL_LEVELS[campaignLevel - 1] || FOOTBALL_LEVELS[0];
        ctx.fillText(`Level ${campaignLevel} / 100`, cx, 75);

        // Level grid (5 columns, scrollable)
        const gridX = 12, gridY = 90, cellW = 74, cellH = 84, gap = 3, cols = 5;
        const totalRows = Math.ceil(FOOTBALL_LEVELS.length / cols);
        const visibleRows = 5;
        const scrollMax = Math.max(0, totalRows - visibleRows);
        let currentScroll = Math.floor((campaignLevel - 1) / cols) - 1;
        currentScroll = Math.max(0, Math.min(currentScroll, scrollMax));

        const levelBtns = [];
        for (let i = 0; i < FOOTBALL_LEVELS.length; i++) {
            const row = Math.floor(i / cols) - currentScroll;
            if (row < 0 || row >= visibleRows) continue;

            const level = FOOTBALL_LEVELS[i];
            const col = i % cols;
            const bx = gridX + col * (cellW + gap);
            const by = gridY + row * (cellH + gap);
            const isUnlocked = i + 1 <= campaignLevel;
            const isCurrent = i + 1 === campaignLevel;
            const stars = levelStars[level.level] || 0;

            // Background
            const isLevel = i + 1;
            if (isCurrent) {
                ctx.fillStyle = 'rgba(0,255,240,0.2)';
                ctx.shadowColor = '#00ffcc';
                ctx.shadowBlur = 12;
            } else if (isUnlocked) {
                ctx.fillStyle = 'rgba(50,150,150,0.15)';
                ctx.shadowBlur = 0;
            } else {
                ctx.fillStyle = 'rgba(30,30,40,0.4)';
                ctx.shadowBlur = 0;
            }
            this._roundRect(ctx, bx, by, cellW, cellH, 8);
            ctx.fill();
            ctx.strokeStyle = isCurrent ? '#00ffcc' : (isUnlocked ? 'rgba(0,255,240,0.2)' : 'rgba(100,100,100,0.1)');
            ctx.lineWidth = isCurrent ? 2 : 1;
            this._roundRect(ctx, bx, by, cellW, cellH, 8);
            ctx.stroke();
            ctx.shadowBlur = 0;

            // Level number
            ctx.fillStyle = isUnlocked ? '#00e5ff' : 'rgba(100,100,100,0.5)';
            ctx.font = 'bold 14px -apple-system, Arial';
            ctx.textAlign = 'center';
            ctx.fillText('' + (i + 1), bx + cellW / 2, by + 22);

            // Boss indicator
            if (level.isBoss) {
                ctx.fillStyle = '#ff1744';
                ctx.font = 'bold 10px -apple-system, Arial';
                ctx.fillText('BOSS', bx + cellW / 2, by + 35);
            } else if (level.isMilestone) {
                ctx.fillStyle = '#ffeb3b';
                ctx.font = '11px -apple-system, Arial';
                ctx.fillText('\u2605', bx + cellW / 2, by + 35);
            }

            // Stars
            if (isUnlocked && stars > 0) {
                let starStr = '';
                for (let s = 0; s < 3; s++) {
                    starStr += s < stars ? '\u2605' : '\u2606';
                }
                ctx.fillStyle = stars === 3 ? '#ffeb3b' : '#ffc107';
                ctx.font = '9px serif';
                ctx.fillText(starStr, bx + cellW / 2, by + 50);
            }

            levelBtns.push({ level: i + 1, x: bx, y: by, w: cellW, h: cellH, unlocked: isUnlocked });
        }

        // Scroll indicators
        if (currentScroll > 0) {
            ctx.fillStyle = 'rgba(0,255,240,0.4)';
            ctx.font = '12px -apple-system, Arial';
            ctx.textAlign = 'center';
            ctx.fillText('\u25B2 Scroll Up', cx, gridY - 5);
        }
        if (currentScroll < scrollMax) {
            ctx.fillStyle = 'rgba(0,255,240,0.4)';
            ctx.font = '12px -apple-system, Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Scroll Down \u25BC', cx, gridY + visibleRows * (cellH + gap) + 15);
        }

        // Level info (bottom)
        const infoY = DESIGN.height - 80;
        ctx.fillStyle = 'rgba(10,15,30,0.7)';
        this._roundRect(ctx, 12, infoY, DESIGN.width - 24, 65, 12);
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,255,240,0.15)';
        ctx.lineWidth = 1;
        this._roundRect(ctx, 12, infoY, DESIGN.width - 24, 65, 12);
        ctx.stroke();

        ctx.fillStyle = '#00e5ff';
        ctx.font = 'bold 14px -apple-system, Arial';
        ctx.textAlign = 'left';
        ctx.fillText(levelCfg.name, 22, infoY + 18);

        ctx.fillStyle = 'rgba(128,203,196,0.7)';
        ctx.font = '11px -apple-system, Arial';
        ctx.fillText(`Theme: ${levelCfg.theme.name} \u2022 Difficulty: ${Math.ceil((campaignLevel / 100) * 5)}/5`, 22, infoY + 35);
        ctx.fillText(`Rewards: ${levelCfg.coinReward} Coins + ${levelCfg.xpReward} XP`, 22, infoY + 50);

        return { back: backBtn, levels: levelBtns };
    }
