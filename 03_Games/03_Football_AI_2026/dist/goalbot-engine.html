    <!-- ENGINE MODULES (Phase 1-4 AI Engine) — INLINED FOR STANDALONE COMPATIBILITY -->
    <script>
// ============================================================================
// ENGINE MODULES (inlined, wrapped in IIFE to avoid name collisions)
// ============================================================================
(function() {
// --- core.js ---
// ============================================================================
// GAME ENGINE CORE — Phase 1
// Game Loop + Update/Render Separation + Entity System
// ============================================================================

class GameEngine {
    constructor(canvasId, width = 414, height = 896) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');

        this.WIDTH = width;
        this.HEIGHT = height;

        // DPI scaling
        this.dpr = window.devicePixelRatio || 1;
        this.canvas.width = width * this.dpr;
        this.canvas.height = height * this.dpr;
        this.ctx.scale(this.dpr, this.dpr);

        // Viewport fit
        this._fitToScreen();
        window.addEventListener('resize', () => this._fitToScreen());

        // Timing
        this._lastTime = 0;
        this._accumulator = 0;
        this._fixedStep = 1 / 60; // 60Hz physics tick
        this._running = false;
        this._rafId = null;

        // Performance tracking
        this.fps = 0;
        this._frameCount = 0;
        this._fpsTimer = 0;

        // Entity registry
        this.entities = [];
        this._pendingAdd = [];
        this._pendingRemove = new Set();

        // State machine
        this.state = null;
        this.states = {};

        // Event system (per-instance, not shared via prototype)
        this._listeners = {};

        // Debug
        this.debug = false;
    }

    // --- Viewport -----------------------------------------------------------

    _fitToScreen() {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const scale = Math.min(vw / this.WIDTH, vh / this.HEIGHT);
        this.canvas.style.width = Math.floor(this.WIDTH * scale) + 'px';
        this.canvas.style.height = Math.floor(this.HEIGHT * scale) + 'px';
        this._screenScale = scale;
    }

    screenToWorld(clientX, clientY) {
        const rect = this.canvas.getBoundingClientRect();
        return {
            x: (clientX - rect.left) * (this.WIDTH / rect.width),
            y: (clientY - rect.top) * (this.HEIGHT / rect.height)
        };
    }

    // --- Game Loop -----------------------------------------------------------

    start() {
        if (this._running) return;
        this._running = true;
        this._lastTime = performance.now();
        this._tick(this._lastTime);
    }

    stop() {
        this._running = false;
        if (this._rafId) cancelAnimationFrame(this._rafId);
    }

    _tick(now) {
        if (!this._running) return;
        this._rafId = requestAnimationFrame((t) => this._tick(t));

        // Delta time in seconds, clamped to prevent spiral of death
        const dt = Math.min((now - this._lastTime) / 1000, 0.1);
        this._lastTime = now;

        // FPS counter
        this._frameCount++;
        this._fpsTimer += dt;
        if (this._fpsTimer >= 1) {
            this.fps = this._frameCount;
            this._frameCount = 0;
            this._fpsTimer -= 1;
        }

        // Fixed-step update (physics-stable)
        this._accumulator += dt;
        while (this._accumulator >= this._fixedStep) {
            this._fixedUpdate(this._fixedStep);
            this._accumulator -= this._fixedStep;
        }

        // Variable-rate update (animations, input smoothing)
        this._update(dt);

        // Render with interpolation alpha
        const alpha = this._accumulator / this._fixedStep;
        this._render(alpha);

        // Flush entity additions/removals
        this._flushEntities();
    }

    // --- Update pipeline -----------------------------------------------------

    _fixedUpdate(dt) {
        if (this.state && this.states[this.state]?.fixedUpdate) {
            this.states[this.state].fixedUpdate(dt);
        }
        for (const entity of this.entities) {
            if (entity.active && entity.fixedUpdate) {
                entity.fixedUpdate(dt);
            }
        }
    }

    _update(dt) {
        if (this.state && this.states[this.state]?.update) {
            this.states[this.state].update(dt);
        }
        for (const entity of this.entities) {
            if (entity.active && entity.update) {
                entity.update(dt);
            }
        }
    }

    // --- Render pipeline -----------------------------------------------------

    _render(alpha) {
        const ctx = this.ctx;
        ctx.save();
        ctx.clearRect(0, 0, this.WIDTH, this.HEIGHT);

        // State-specific background render
        if (this.state && this.states[this.state]?.render) {
            this.states[this.state].render(ctx, alpha);
        }

        // Entity render (sorted by z-index)
        const sorted = this.entities
            .filter(e => e.active && e.visible)
            .sort((a, b) => (a.z || 0) - (b.z || 0));

        for (const entity of sorted) {
            if (entity.render) {
                ctx.save();
                entity.render(ctx, alpha);
                ctx.restore();
            }
        }

        // Debug overlay
        if (this.debug) this._renderDebug(ctx);

        ctx.restore();
    }

    _renderDebug(ctx) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(4, 4, 120, 50);
        ctx.fillStyle = '#0f0';
        ctx.font = '11px monospace';
        ctx.fillText(`FPS: ${this.fps}`, 10, 18);
        ctx.fillText(`Entities: ${this.entities.length}`, 10, 32);
        ctx.fillText(`State: ${this.state || 'none'}`, 10, 46);
    }

    // --- Entity management ---------------------------------------------------

    addEntity(entity) {
        entity.engine = this;
        this._pendingAdd.push(entity);
        return entity;
    }

    removeEntity(entity) {
        this._pendingRemove.add(entity);
    }

    _flushEntities() {
        if (this._pendingAdd.length) {
            this.entities.push(...this._pendingAdd);
            this._pendingAdd.length = 0;
        }
        if (this._pendingRemove.size) {
            this.entities = this.entities.filter(e => !this._pendingRemove.has(e));
            this._pendingRemove.clear();
        }
    }

    findByTag(tag) {
        return this.entities.filter(e => e.tag === tag);
    }

    findOne(tag) {
        return this.entities.find(e => e.tag === tag);
    }

    // --- State machine -------------------------------------------------------

    registerState(name, handlers) {
        this.states[name] = handlers;
    }

    switchState(name) {
        if (this.state && this.states[this.state]?.exit) {
            this.states[this.state].exit();
        }
        this.state = name;
        if (this.states[name]?.enter) {
            this.states[name].enter();
        }
    }
}


// ============================================================================
// BASE ENTITY
// ============================================================================

class Entity {
    constructor(x = 0, y = 0) {
        this.x = x;
        this.y = y;
        this.prevX = x;
        this.prevY = y;
        this.vx = 0;
        this.vy = 0;
        this.width = 0;
        this.height = 0;
        this.z = 0;          // render order
        this.active = true;
        this.visible = true;
        this.tag = null;
        this.engine = null;  // set by engine.addEntity()
    }

    // Store previous position for interpolation
    fixedUpdate(dt) {
        this.prevX = this.x;
        this.prevY = this.y;
        this.x += this.vx * dt;
        this.y += this.vy * dt;
    }

    // Interpolated position for smooth rendering
    lerpX(alpha) {
        return this.prevX + (this.x - this.prevX) * alpha;
    }

    lerpY(alpha) {
        return this.prevY + (this.y - this.prevY) * alpha;
    }

    // Override in subclass
    update(dt) {}
    render(ctx, alpha) {}

    // AABB bounds
    getBounds() {
        return {
            x: this.x,
            y: this.y,
            w: this.width,
            h: this.height
        };
    }

    destroy() {
        if (this.engine) this.engine.removeEntity(this);
    }
}


// ============================================================================
// PLAYER ENTITY
// ============================================================================

class Player extends Entity {
    constructor(x, y) {
        super(x, y);
        this.tag = 'player';
        this.width = 40;
        this.height = 60;
        this.z = 10;

        // Movement
        this.speed = 220;      // px/s
        this.moveDir = 0;      // -1, 0, 1

        // State
        this.state = 'idle';   // idle, run, jump, fall
        this.facing = 1;       // 1 = right, -1 = left
        this.grounded = false;
        this.color = '#00e5ff';
    }

    fixedUpdate(dt) {
        this.prevX = this.x;
        this.prevY = this.y;

        // Horizontal movement
        this.vx = this.moveDir * this.speed;
        if (this.moveDir !== 0) this.facing = this.moveDir;

        // Apply velocity
        this.x += this.vx * dt;
        this.y += this.vy * dt;

        // Clamp to screen bounds
        if (this.x < 0) this.x = 0;
        if (this.x + this.width > this.engine.WIDTH) {
            this.x = this.engine.WIDTH - this.width;
        }

        // Update state
        this._updateState();
    }

    _updateState() {
        if (!this.grounded) {
            this.state = this.vy < 0 ? 'jump' : 'fall';
        } else if (Math.abs(this.vx) > 10) {
            this.state = 'run';
        } else {
            this.state = 'idle';
        }
    }

    render(ctx, alpha) {
        const rx = this.lerpX(alpha);
        const ry = this.lerpY(alpha);

        // Body
        ctx.fillStyle = this.color;
        ctx.fillRect(rx, ry, this.width, this.height);

        // Direction indicator
        ctx.fillStyle = '#fff';
        const eyeX = this.facing === 1 ? rx + 28 : rx + 8;
        ctx.fillRect(eyeX, ry + 12, 6, 6);

        // State label (debug)
        if (this.engine.debug) {
            ctx.fillStyle = '#ff0';
            ctx.font = '10px monospace';
            ctx.fillText(this.state, rx, ry - 4);
        }
    }
}


// ============================================================================
// EXPORTS (for module or inline use)
// ============================================================================

if (typeof module !== 'undefined' && module.exports) {
    module.exports = { GameEngine, Entity, Player };
}


// --- football-physics.js ---
// ============================================================================
// FOOTBALL (SOCCER) PHYSICS ENGINE — Sport-Specific Module
// Ball Kick, Curve/Spin, Goal Detection, Goalkeeper AI, Difficulty Scaling
// Built on top of core.js Entity system
// ============================================================================

'use strict';


// ============================================================================
// CONSTANTS & CONFIGURATION
// ============================================================================

const FootballConfig = {
    // --- Field dimensions (relative to 414x832 canvas) ----------------------
    field: {
        width: 414,
        height: 832,

        goalWidth: 200,

        goalPostWidth: 8,

    },

    ball: {

        friction: 0.995,         // velocity decay/frame

        heightGravity: 0.25,     // chip shot gravity (px/frame²)
        maxHeight: 12,           // cap height for chip shots

    kicker: {

        aimOscRange: 0.33,       // fraction of goalWidth for oscillation

    },

    keeper: {

    difficulties: {

        },
        medium: {

            reactionDelayMs: 180,
            predictionError: 0.28,

        },
        hard: {

};


// ============================================================================
// FOOTBALL LEVELS SYSTEM (100 progressive levels with stadium themes)
// ============================================================================

const FOOTBALL_LEVELS = [];
(function generateFootballLevels() {
    const STADIUM_THEMES = [
        { name: 'London', bg1: '#4CAF50', bg2: '#388E3C', goalColor: '#FFFFFF', mod: null, desc: 'Wembley Stadium' },
        { name: 'Madrid', bg1: '#0D1B2A', bg2: '#1B2838', goalColor: '#E0E0E0', mod: 'night', desc: 'Santiago Bernabeu' },
        { name: 'Manchester', bg1: '#546E7A', bg2: '#37474F', goalColor: '#BDBDBD', mod: 'rain', desc: 'Old Trafford Rain' },
        { name: 'Buenos Aires', bg1: '#2196F3', bg2: '#1565C0', goalColor: '#FFFFFF', mod: 'wind', desc: 'La Bombonera Wind' },
        { name: 'Moscow', bg1: '#CFD8DC', bg2: '#B0BEC5', goalColor: '#EEEEEE', mod: 'snow', desc: 'Luzhniki Snow' },
        { name: 'Rio', bg1: '#FF6F00', bg2: '#E65100', goalColor: '#FFFFFF', mod: 'sunset', desc: 'Maracana Sunset' },
        { name: 'Istanbul', bg1: '#90A4AE', bg2: '#78909C', goalColor: '#BDBDBD', mod: 'fog', desc: 'Ataturk Fog' },
        { name: 'Munich', bg1: '#1A237E', bg2: '#0D1B2A', goalColor: '#E0E0E0', mod: 'storm', desc: 'Allianz Storm' },
        { name: 'Doha', bg1: '#FFB74D', bg2: '#FF9800', goalColor: '#FFFFFF', mod: 'desert', desc: 'Lusail Desert Heat' },
        { name: 'Paris', bg1: '#FFD700', bg2: '#FF6F00', goalColor: '#FFFFFF', mod: 'champion', desc: 'Parc des Princes Final' },
    ];

    for (let i = 1; i <= 100; i++) {
        const t = (i - 1) / 99;
        const themeIndex = Math.floor((i - 1) / 10) % STADIUM_THEMES.length;
        const theme = STADIUM_THEMES[themeIndex];
        const isBoss = (i % 25 === 0);
        const isMilestone = (i % 10 === 0);

        FOOTBALL_LEVELS.push({
            level: i,
            name: isBoss ? `Boss: ${theme.name}` : `Level ${i}: ${theme.desc}`,
            theme: theme,
            isBoss: isBoss,
            isMilestone: isMilestone,
            gkReactionTime: Math.max(0.08, 0.35 - t * 0.27),
            gkDiveSpeed: 1.0 + t * 1.5,
            gkCoverage: Math.min(0.95, 0.4 + t * 0.55),
            aiReadRate: Math.min(0.9, 0.1 + t * 0.8),
            shots: isBoss ? 7 : 5,
            targetGoals: isBoss ? 5 : Math.min(5, Math.ceil(1 + t * 3)),
            coinReward: 10 + i * 3 + (isBoss ? 50 : 0),
            xpReward: 15 + i * 2 + (isBoss ? 30 : 0),
        });
    }
})();


// ============================================================================
// UTILITY — Math helpers
// ============================================================================

const FBUtils = {
    clamp(val, min, max) { return Math.max(min, Math.min(max, val)); },
    lerp(a, b, t) { return a + (b - a) * t; },
    angle(x1, y1, x2, y2) { return Math.atan2(y2 - y1, x2 - x1); },
    dist(x1, y1, x2, y2) { return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2); },
    randRange(min, max) { return min + Math.random() * (max - min); },
    randInt(min, max) { return Math.floor(FBUtils.randRange(min, max + 1)); },
    easeOutCubic(t) { return 1 - (1 - t) ** 3; },
};


// ============================================================================
// FOOTBALL — Ball entity with kick, curve, height, trail physics
// ============================================================================

class Football extends Entity {
    constructor() {
        super(0, 0);
        this.tag = 'football';
        this.z = 15;
        this.radius = FootballConfig.ball.radius;
        this.width = this.radius * 2;
        this.height = this.radius * 2;

        // Physics state
        this.vx = 0;
        this.vy = 0;
        this.ballHeight = 0;     // simulated Z-height for chip shots
        this.heightVel = 0;
        this.spinAngle = 0;
        this.curveForce = 0;
        this.active = false;
        this.surgeMode = false;
        this.surgeLevel = 0;

        // Trail
        this.trail = [];

        // Shadow
        this.shadow = { x: 0, y: 0, scale: 1 };
    }

    reset() {
        this.x = FootballConfig.field.goalCenterX;
        this.y = FootballConfig.kicker.y;
        this.vx = 0;
        this.vy = 0;
        this.ballHeight = 0;
        this.heightVel = 0;
        this.spinAngle = 0;
        this.curveForce = 0;
        this.active = false;
        this.trail = [];
    }

    /**
     * Launch the ball toward a target
     * @param {number} angle - direction in radians
     * @param {number} power - 0..1 normalized
     * @param {number} [curve=0] - lateral curve force
     */
    shoot(angle, power, curve = 0) {
        const cfg = FootballConfig.ball;
        const speed = cfg.shotSpeed * FBUtils.clamp(power, FootballConfig.kicker.minPower, 1.0);
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.curveForce = curve; // direct — tuned in _shoot()
        this.active = true;

        // Chip shot at high power
        if (power > cfg.chipThreshold) {
            this.heightVel = (power - cfg.chipThreshold) * 20;
        }
    }

    fixedUpdate(dt) {
        if (!this.active) return;
        this.prevX = this.x;
        this.prevY = this.y;

        const cfg = FootballConfig.ball;

        // Curve (Magnus-like lateral force)
        this.vx += this.curveForce;
        this.curveForce *= cfg.curveDecay;

        // Position
        this.x += this.vx;
        this.y += this.vy;

        // Height (chip simulation)
        this.ballHeight += this.heightVel;
        this.heightVel -= cfg.heightGravity;
        if (this.ballHeight < 0) { this.ballHeight = 0; this.heightVel = 0; }
        if (this.ballHeight > cfg.maxHeight) {
            this.ballHeight = cfg.maxHeight;
            this.heightVel = Math.min(this.heightVel, 0);
        }

        // Friction
        this.vx *= cfg.friction;
        this.vy *= cfg.friction;

        // Spin visual
        const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
        this.spinAngle += speed * 0.08;

        // Trail generation
        if (speed > 2) {
            this.trail.push({
                x: this.x, y: this.y - this.ballHeight,
                alpha: 1, size: this.radius,
                surge: this.surgeMode, surgeLevel: this.surgeLevel,
            });
        }
        if (this.trail.length > cfg.trailMax) {
            this.trail.splice(0, this.trail.length - cfg.trailMax);
        }
        const trailDecay = this.surgeMode
            ? Math.max(0.02, cfg.trailDecay - this.surgeLevel * 0.01)
            : cfg.trailDecay;
        this.trail = this.trail.filter(t => {
            t.alpha -= trailDecay;
            t.size *= 0.95;
            return t.alpha > 0;
        });

        // Shadow
        this.shadow.x = this.x + this.ballHeight * 0.3;
        this.shadow.y = this.y + 5;
        this.shadow.scale = 1 - this.ballHeight * 0.01;

        // Side boundaries (wall bounce)
        if (this.x < 20) { this.x = 20; this.vx *= -0.5; }
        if (this.x > FootballConfig.field.width - 20) {
            this.x = FootballConfig.field.width - 20;
            this.vx *= -0.5;
        }
    }

    get speed() {
        return Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    }

    render(ctx, alpha) {
        if (!this.active) return;
        const rx = this.lerpX(alpha);
        const ry = this.lerpY(alpha) - this.ballHeight;

        // Trail
        for (const t of this.trail) {
            ctx.globalAlpha = t.alpha * 0.4;
            ctx.fillStyle = t.surge ? '#ff6600' : '#fff';
            ctx.beginPath();
            ctx.arc(t.x, t.y, t.size * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;

        // Shadow
        ctx.fillStyle = `rgba(0,0,0,${0.3 * this.shadow.scale})`;
        ctx.beginPath();
        ctx.ellipse(this.shadow.x, this.shadow.y, this.radius * this.shadow.scale,
            this.radius * 0.4 * this.shadow.scale, 0, 0, Math.PI * 2);
        ctx.fill();

        // Ball
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(rx, ry, this.radius, 0, Math.PI * 2);
        ctx.fill();

        // Pentagon pattern (simplified)
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(rx, ry, this.radius * 0.45, this.spinAngle, this.spinAngle + Math.PI * 1.2);
        ctx.lineTo(rx, ry);
        ctx.fill();
    }
}


// ============================================================================
// GOALKEEPER — AI-driven keeper with prediction, dive, save mechanics
// ============================================================================

class Goalkeeper extends Entity {
    constructor() {
        super(FootballConfig.field.goalCenterX, FootballConfig.field.goalLineY + 15);
        this.tag = 'goalkeeper';
        this.width = FootballConfig.keeper.width;
        this.height = FootballConfig.keeper.height;
        this.z = 10;

        // AI state
        this.state = 'idle';      // idle | anticipate | dive | save | concede
        this.stateTime = 0;
        this.idleSway = 0;

        // Dive parameters
        this.targetX = this.x;
        this.targetY = this.y;
        this.diveProgress = 0;
        this.diveDirection = 0;   // -1 left, 0 center, 1 right
        this.bodyAngle = 0;
        this.armExtension = 0;    // 0-1

        // AI decision
        this.willMiss = false;
        this.saveReachMultiplier = 1.0;
        this.earlyDiveBonus = 0;
    }

    reset() {
        this.x = FootballConfig.field.goalCenterX;
        this.y = FootballConfig.field.goalLineY + 15;
        this.state = 'idle';
        this.stateTime = 0;
        this.diveProgress = 0;
        this.bodyAngle = 0;
        this.armExtension = 0;
        this.willMiss = false;
    }

    /**
     * Trigger a dive toward target position
     * @param {number} targetX - dive target X
     * @param {number} diveSpeed - progress per frame
     * @param {boolean} willMiss - AI decided to miss
     */
    dive(targetX, diveSpeed, willMiss = false) {
        this.state = 'dive';
        this.stateTime = 0;
        this.diveProgress = 0;
        this.targetX = targetX;
        this.targetY = FootballConfig.field.goalLineY + 5;
        this.willMiss = willMiss;

        const goalCX = FootballConfig.field.goalCenterX;
        this.diveDirection = targetX < goalCX ? -1 : (targetX > goalCX ? 1 : 0);
        this._diveSpeed = diveSpeed || FootballConfig.keeper.diveDuration;
    }

    /**
     * Slight anticipatory shift before diving
     * @param {number} targetX
     */
    anticipate(targetX) {
        this.state = 'anticipate';
        this.stateTime = 0;
        this.targetX = targetX;
    }

    fixedUpdate(dt) {
        this.stateTime++;
        this.idleSway += FootballConfig.keeper.idleSwaySpeed;

        switch (this.state) {
            case 'idle':
                this.x = FootballConfig.field.goalCenterX +
                    Math.sin(this.idleSway) * FootballConfig.keeper.idleSwayAmount;
                this.y = FootballConfig.field.goalLineY + 15;
                this.bodyAngle = Math.sin(this.idleSway) * 0.05;
                this.armExtension = 0;
                break;

            case 'anticipate':
                this.x = FBUtils.lerp(this.x, this.targetX, 0.02);
                this.bodyAngle = (this.targetX - this.x) * 0.003;
                break;

            case 'dive':
                this.diveProgress = Math.min(1, this.diveProgress + this._diveSpeed);
                const eased = FBUtils.easeOutCubic(this.diveProgress);
                this.x = FBUtils.lerp(FootballConfig.field.goalCenterX, this.targetX, eased);
                this.y = FBUtils.lerp(FootballConfig.field.goalLineY + 15, this.targetY, eased * 0.5);
                this.bodyAngle = this.diveDirection * eased * 0.8;
                this.armExtension = eased;
                break;

            case 'save':
                this.bodyAngle *= 0.95;
                this.armExtension *= 0.98;
                if (this.stateTime > 60) this.state = 'idle';
                break;

            case 'concede':
                this.bodyAngle *= 0.95;
                this.armExtension *= 0.95;
                if (this.stateTime > 60) this.state = 'idle';
                break;
        }
    }

    /**
     * Check if keeper can save the ball at given position
     * @param {number} ballX
     * @param {number} ballY
     * @param {number} ballHeight - chip shot height
     * @returns {boolean}
     */
    canSave(ballX, ballY, ballHeight = 0) {
        const dx = Math.abs(ballX - this.x);
        const dy = Math.abs(ballY - this.y);
        const reach = this.saveReachMultiplier;

        const baseReachX = this.width * 0.5 + this.armExtension * FootballConfig.keeper.armReach;
        const baseReachY = this.height * 0.5 + 25;

        const earlyBonus = this.earlyDiveBonus || 0;
        let reachX = (baseReachX + earlyBonus * 20) * reach;
        const reachY = (baseReachY + earlyBonus * 10) * reach;

        // === WRONG-DIRECTION PENALTY ===
        // If keeper dove one way but ball is on the OTHER side, drastically reduce reach
        if (this.state === 'dive' && this.diveDirection !== 0 && this.diveProgress > 0.1) {
            const goalCX = FootballConfig.field.goalCenterX;
            const ballSide = ballX < goalCX - 15 ? -1 : (ballX > goalCX + 15 ? 1 : 0);
            if (ballSide !== 0 && ballSide !== this.diveDirection) {
                // Keeper dove wrong way — reach shrinks with dive commitment
                const wrongPenalty = this.diveProgress * 0.85;
                reachX *= (1.0 - wrongPenalty);
            }
        }

        // Chip shots reduce save effectiveness
        const heightPenalty = ballHeight > 2 ? Math.min(ballHeight * 1.5, 18) : 0;

        // Diving forward reach
        const diveYBonus = this.state === 'dive'
            ? this.diveProgress * FootballConfig.keeper.diveYBonus : 0;

        return dx < (reachX - heightPenalty) && dy < (reachY + diveYBonus);
    }

    render(ctx, alpha) {
        const rx = this.lerpX(alpha);
        const ry = this.lerpY(alpha);

        ctx.save();
        ctx.translate(rx + this.width / 2, ry + this.height / 2);
        ctx.rotate(this.bodyAngle);

        // Body
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);

        // Arms (extend during dive)
        if (this.armExtension > 0.01) {
            const armLen = 25 * this.armExtension;
            ctx.fillStyle = '#ffcc00';
            // Left arm
            ctx.fillRect(-this.width / 2 - armLen, -this.height / 4, armLen, 8);
            // Right arm
            ctx.fillRect(this.width / 2, -this.height / 4, armLen, 8);
        }

        // Gloves
        ctx.fillStyle = '#00cc44';
        ctx.fillRect(-this.width / 2 - 4, -this.height / 4 - 2, 8, 12);
        ctx.fillRect(this.width / 2 - 4, -this.height / 4 - 2, 8, 12);

        ctx.restore();
    }
}


// ============================================================================
// KEEPER AI — Decision-making engine for goalkeeper behavior
// ============================================================================

class KeeperAI {
    constructor(difficulty = 'medium') {
        this.difficulty = difficulty;
        this.adaptiveBias = 0;   // -1 (easier) to +1 (harder) based on performance
        this._shotHistory = [];  // for pattern prediction
    }

    get config() {
        return FootballConfig.difficulties[this.difficulty] || FootballConfig.difficulties.medium;
    }

    /**
     * Record a shot for pattern learning
     * @param {string} direction - 'left', 'center', 'right'
     */
    recordShot(direction) {
        this._shotHistory.push(direction);
        if (this._shotHistory.length > 20) this._shotHistory.shift();
    }

    /**
     * Simple pattern-based prediction of next shot direction
     * @returns {{ direction: string, confidence: number }}
     */
    predict() {
        if (this._shotHistory.length < 3) {
            return { direction: ['left', 'center', 'right'][FBUtils.randInt(0, 2)], confidence: 0.33 };
        }

        // Count direction frequency
        const counts = { left: 0, center: 0, right: 0 };
        for (const d of this._shotHistory) counts[d]++;
        const total = this._shotHistory.length;

        // Most frequent direction
        let maxDir = 'center';
        let maxCount = 0;
        for (const [dir, count] of Object.entries(counts)) {
            if (count > maxCount) { maxCount = count; maxDir = dir; }
        }

        // Check recent streak (last 3)
        const recent = this._shotHistory.slice(-3);
        if (recent[0] === recent[1] && recent[1] === recent[2]) {
            // Streak detected — higher confidence
            return { direction: recent[0], confidence: 0.7 };
        }

        return { direction: maxDir, confidence: FBUtils.clamp(maxCount / total, 0.33, 0.85) };
    }

    /**
     * Compute full keeper dive decision
     * @param {number} aimX - player's aim X position
     * @param {number} aimY - player's aim Y position
     * @returns {{ targetX: number, diveSpeed: number, willMiss: boolean, reactionDelay: number }}
     */
    computeDive(aimX, aimY) {
        const cfg = this.config;
        const adapt = this.adaptiveBias;
        const goalCX = FootballConfig.field.goalCenterX;
        const goalW = FootballConfig.field.goalWidth;
        const goalLeft = goalCX - goalW / 2;
        const goalRight = goalCX + goalW / 2;

        // Step 1: Predict direction
        const pred = this.predict();
        let predictedDir = pred.direction;
        let confidence = pred.confidence;

        // Scale confidence by difficulty
        const confScaleMap = { easy: 0.3, medium: 0.55, hard: 0.85, legend: 1.0 };
        const confScale = confScaleMap[this.difficulty] || 0.55;
        const scaledConf = 0.33 + (confidence - 0.33) * confScale;

        // Step 2: Apply prediction error
        const effectiveError = Math.max(0, cfg.predictionError - adapt * 0.1);
        if (Math.random() < effectiveError) {
            const dirs = ['left', 'center', 'right'].filter(d => d !== predictedDir);
            predictedDir = dirs[FBUtils.randInt(0, dirs.length - 1)];
            confidence *= 0.4;
        }

        // Step 3: Convert direction to target X
        const accuracy = FBUtils.clamp(cfg.positionAccuracy + adapt * 0.1, 0, 1);
        const aimBias = (aimX - goalCX) * accuracy;
        let diveX;
        switch (predictedDir) {
            case 'left':  diveX = goalCX - goalW * 0.35 + aimBias * 0.3; break;
            case 'right': diveX = goalCX + goalW * 0.35 + aimBias * 0.3; break;
            default:      diveX = goalCX + aimBias * 0.2; break;
        }

        // Step 4: Overcommit (dives too far)
        if (Math.random() < cfg.overcommitChance) {
            const overAmount = FBUtils.randRange(20, 45);
            if (predictedDir === 'left') diveX -= overAmount;
            else if (predictedDir === 'right') diveX += overAmount;
        }

        // Step 5: Human imprecision jitter
        const jitter = FBUtils.randRange(-15, 15) * (1 - accuracy * 0.5);
        diveX = FBUtils.clamp(diveX + jitter, goalLeft - 15, goalRight + 15);

        // Step 6: Will keeper miss?
        const effectiveMiss = Math.max(0.01, cfg.missChance - adapt * 0.05);
        const willMiss = Math.random() < effectiveMiss;

        // Step 7: Confidence-driven speed/timing
        let diveSpeed = cfg.diveSpeed;
        let reactionDelay = cfg.reactionDelayMs;

        if (scaledConf > 0.55) {
            const confBoost = (scaledConf - 0.5) * confScale;
            diveSpeed *= (1 + confBoost * 0.8);
            reactionDelay *= (1 - confBoost * 0.5);
        } else if (scaledConf < 0.38) {
            diveSpeed *= (0.85 + (1 - confScale) * 0.1);
            diveX = FBUtils.lerp(diveX, goalCX, 0.3 * confScale);
        }

        // Adaptive adjustments
        reactionDelay = Math.max(40, reactionDelay - adapt * 80);
        diveSpeed = Math.min(0.15, diveSpeed + adapt * 0.02);

        return {
            targetX: diveX,
            diveSpeed,
            willMiss,
            reactionDelay,
            predictedDir,
            confidence: scaledConf,
        };
    }

    /**
     * Adjust adaptive difficulty based on result
     * @param {string} result - 'goal' | 'save' | 'miss' | 'post'
     */
    adjustDifficulty(result) {
        switch (result) {
            case 'goal':
                this.adaptiveBias = FBUtils.clamp(this.adaptiveBias + 0.1, -1, 1);
                break;
            case 'save':
                this.adaptiveBias = FBUtils.clamp(this.adaptiveBias - 0.08, -1, 1);
                break;
            case 'miss':
            case 'post':
                this.adaptiveBias = FBUtils.clamp(this.adaptiveBias - 0.05, -1, 1);
                break;
        }
    }
}


// ============================================================================
// GOAL DETECTOR — Checks ball position against goal geometry
// ============================================================================

class GoalDetector {
    /**
     * Evaluate ball position relative to goal
     * @param {Football} ball
     * @param {Goalkeeper} keeper
     * @returns {null | { result: string, saved: boolean }}
     *   result: 'goal' | 'save' | 'post' | 'over' | 'miss'
     */
    static check(ball, keeper) {
        if (!ball.active) return null;

        const cfg = FootballConfig.field;
        const bx = ball.x;
        const by = ball.y;
        const pw = cfg.goalPostWidth;

        const goalLeft = cfg.goalCenterX - cfg.goalWidth / 2;
        const goalRight = cfg.goalCenterX + cfg.goalWidth / 2;
        const postInnerLeft = goalLeft + pw;
        const postInnerRight = goalRight - pw;

        const betweenPosts = bx > postInnerLeft && bx < postInnerRight;
        const hitLeftPost = Math.abs(bx - goalLeft - pw / 2) < 14 && by < cfg.goalLineY + 10;
        const hitRightPost = Math.abs(bx - goalRight + pw / 2) < 14 && by < cfg.goalLineY + 10;
        const pastGoalLine = by <= cfg.goalLineY;
        const deepInGoal = by <= cfg.goalLineY - 15;
        const overCrossbar = by < cfg.crossbarY - 10;

        // Ball hasn't reached goal area yet
        if (!pastGoalLine && !hitLeftPost && !hitRightPost) {
            // Check if ball went way off screen
            if (by < cfg.crossbarY - 30 || bx < goalLeft - 50 || bx > goalRight + 50) {
                return { result: 'miss', saved: false };
            }
            return null;
        }

        // Between posts
        if (betweenPosts) {
            const positionedForSave = keeper.canSave(bx, by, ball.ballHeight);
            const aiWillMiss = keeper.willMiss;
            const saved = positionedForSave && !aiWillMiss && !deepInGoal;

            if (saved) {
                keeper.state = 'save';
                keeper.stateTime = 0;
                return { result: 'save', saved: true };
            } else if (overCrossbar) {
                return { result: 'over', saved: false };
            } else {
                keeper.state = 'concede';
                keeper.stateTime = 0;
                return { result: 'goal', saved: false };
            }
        }

        // Hit post
        if (hitLeftPost || hitRightPost) {
            return { result: 'post', saved: false };
        }

        // Wide miss
        return { result: 'miss', saved: false };
    }
}


// ============================================================================
// MATCH MANAGER — Rounds, scoring, streaks
// ============================================================================

class MatchManager {
    constructor(difficulty = 'medium') {
        this.difficulty = difficulty;
        this.maxRounds = FootballConfig.difficulties[difficulty]?.maxRounds || 10;
        this.reset();
    }

    reset() {
        this.round = 0;
        this.playerScore = 0;
        this.keeperScore = 0;
        this.streak = 0;
        this.bestStreak = 0;
        this.results = [];       // per-round history
    }

    /**
     * Record a round result
     * @param {string} result - 'goal' | 'save' | 'miss' | 'post' | 'over'
     * @returns {{ roundComplete: boolean, matchComplete: boolean }}
     */
    recordResult(result) {
        this.round++;
        this.results.push(result);

        if (result === 'goal') {
            this.playerScore++;
            this.streak++;
            if (this.streak > this.bestStreak) this.bestStreak = this.streak;
        } else {
            if (result === 'save') this.keeperScore++;
            this.streak = 0;
        }

        return {
            roundComplete: true,
            matchComplete: this.round >= this.maxRounds,
        };
    }

    get scoreString() {
        return `${this.playerScore} - ${this.keeperScore}`;
    }
}


// ============================================================================
// AIM SYSTEM — Auto-oscillating aim target
// ============================================================================

class AimSystem {
    constructor() {
        this.x = FootballConfig.field.goalCenterX;
        this.y = (FootballConfig.field.goalLineY + FootballConfig.field.crossbarY) / 2;
        this.oscillation = 0;
        this.locked = false;
    }

    update() {
        if (this.locked) return;

        const cfg = FootballConfig;
        const goalCX = cfg.field.goalCenterX;
        const goalW = cfg.field.goalWidth;
        const goalLeft = goalCX - goalW / 2 + 20;
        const goalRight = goalCX + goalW / 2 - 20;

        this.oscillation += cfg.kicker.aimOscSpeed;
        const oscAmount = Math.sin(this.oscillation) * (goalW * cfg.kicker.aimOscRange);
        this.x = FBUtils.clamp(goalCX + oscAmount, goalLeft, goalRight);
        this.y = FBUtils.clamp(this.y,
            cfg.field.crossbarY + 5, cfg.field.goalLineY);
    }

    lock() {
        this.locked = true;
    }

    reset() {
        this.locked = false;
        this.x = FootballConfig.field.goalCenterX;
    }
}


// ============================================================================
// POWER GAUGE — Auto-oscillating power charge
// ============================================================================

class PowerGauge {
    constructor() {
        this.power = 0;
        this.charging = false;
        this.locked = false;
    }

    startCharge() {
        this.power = 0;
        this.charging = true;
        this.locked = false;
    }

    update() {
        if (!this.charging || this.locked) return;
        this.power = (this.power + FootballConfig.kicker.powerChargeRate) % 1.0;
    }

    lock() {
        this.locked = true;
        this.charging = false;
    }

    get clampedPower() {
        return FBUtils.clamp(this.power, FootballConfig.kicker.minPower, 1.0);
    }

    reset() {
        this.power = 0;
        this.charging = false;
        this.locked = false;
    }
}

// --- ai-engine.js ---
// ============================================================================
// AI ENGINE — Phase 1+2+3+4: Rules + Learning + Prediction + Claude API
// Mobile-optimized | Zero external deps (core) | Runs every frame
// ============================================================================
// Phase 1: Static lookup tables + weighted random decisions
// Phase 2: PlayerModel tracks behavior → feeds back into decisions
// Phase 3: BayesPredictor + SequencePredictor + AdaptiveDifficulty
// Phase 4: Optional Claude API integration (async, fail-safe, cached)
// ============================================================================
// Integration points:
//   cricket-physics.js → CricketConfig, ShotTypes, DeliverySystem
//   football-physics.js → FootballConfig, Goalkeeper, KeeperAI
//   core.js → GameEngine (event hooks)
// ============================================================================

'use strict';

// ============================================================================
// SECTION 0 — AI UTILITIES (zero-alloc math helpers)
// ============================================================================

const AIUtil = {
    // Weighted random pick from { key: weight } map — O(n) single pass
    weightedPick(weights) {
        let total = 0;
        for (const k in weights) total += weights[k];
        let r = Math.random() * total;
        for (const k in weights) {
            r -= weights[k];
            if (r <= 0) return k;
        }
        // Fallback: return first key
        for (const k in weights) return k;
    },

    // Clamp
    clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; },

    // Fast hash for string key (for lookup tables)
    hash2(a, b) { return a + '|' + b; },
    hash3(a, b, c) { return a + '|' + b + '|' + c; },
};


// ============================================================================
// SECTION 0.5 — PLAYER MODEL (Phase 2: Lightweight Learning)
// ============================================================================
// Tracks player behavior using simple maps + counters.
// Memory budget: ~2-4 KB total (safe for mobile).
// No heavy ML — just frequency tables, decay windows, and derived insights.
//
// Data structure per delivery type:
//   { "bouncer": { "PULL": 10, "DEFEND": 3, "miss": 2 } }
//
// This is the "brain" that observes the player and learns their tendencies.
// ============================================================================

class PlayerModel {
    /**
     * @param {object} [config]
     * @param {number} [config.maxSamples=200] — max events before oldest are pruned
     * @param {number} [config.decayRate=0.98] — per-tick weight decay (recency bias)
     * @param {number} [config.minSamples=5] — min observations before insights activate
     */
    constructor(config = {}) {
        this.maxSamples = config.maxSamples || 200;
        this.decayRate = config.decayRate || 0.98;
        this.minSamples = config.minSamples || 5;

        // ---- CRICKET BATTING TRACKING ----
        // Key: ballType → { shotName: count, miss: count }
        this.batByType = {};
        // Key: ballType|length → { shotName: count }
        this.batByDelivery = {};
        // Key: shotName → { runs: totalRuns, count: N, caught: N }
        this.shotOutcomes = {};
        // Timing quality distribution
        this.timingDist = { perfect: 0, good: 0, edge: 0, miss: 0 };
        // Overall batting aggression (0=defensive, 1=aggressive)
        this.aggressionScore = 0.5;

        // ---- CRICKET BOWLING TRACKING ----
        // Key: ballType → { runs: total, wickets: N, dots: N, balls: N }
        this.bowlResults = {};

        // ---- FOOTBALL TRACKING ----
        // Direction frequency: { left: N, center: N, right: N }
        this.fbDirection = { left: 0, center: 0, right: 0 };
        // Power histogram: [low, medium, high, max] buckets
        this.fbPowerBuckets = [0, 0, 0, 0];
        // Direction by round position (early/mid/late in match)
        this.fbPhaseDir = {
            early:  { left: 0, center: 0, right: 0 },
            mid:    { left: 0, center: 0, right: 0 },
            late:   { left: 0, center: 0, right: 0 },
        };
        // Streak tracking
        this.fbStreakDir = null;
        this.fbStreakLen = 0;
        // Post-save behavior (does player switch after being saved?)
        this.fbSwitchAfterSave = 0;
        this.fbStayAfterSave = 0;

        // ---- GLOBAL ----
        this._totalEvents = 0;
        this._sessionStart = Date.now();
    }

    // =====================================================================
    // CRICKET: Record a batting event
    // =====================================================================

    /**
     * @param {object} delivery — { ball_type, length, line }
     * @param {object} result — { action (shot), quality (timing), runs, wasCaught }
     */
    recordBatting(delivery, result) {
        this._totalEvents++;
        const type = delivery.ball_type;
        const key = AIUtil.hash2(type, delivery.length);
        const shot = result.action || 'DEFEND';
        const quality = result.quality || 'miss';

        // By ball type
        if (!this.batByType[type]) this.batByType[type] = {};
        this.batByType[type][shot] = (this.batByType[type][shot] || 0) + 1;
        if (quality === 'miss') {
            this.batByType[type].miss = (this.batByType[type].miss || 0) + 1;
        }

        // By full delivery key
        if (!this.batByDelivery[key]) this.batByDelivery[key] = {};
        this.batByDelivery[key][shot] = (this.batByDelivery[key][shot] || 0) + 1;

        // Shot outcomes
        if (!this.shotOutcomes[shot]) {
            this.shotOutcomes[shot] = { runs: 0, count: 0, caught: 0 };
        }
        this.shotOutcomes[shot].runs += (result.runs || 0);
        this.shotOutcomes[shot].count++;
        if (result.wasCaught) this.shotOutcomes[shot].caught++;

        // Timing distribution
        if (this.timingDist[quality] !== undefined) {
            this.timingDist[quality]++;
        }

        // Aggression score update (EMA)
        const isAggressive = (shot === 'LOFT' || shot === 'PULL' || shot === 'CUT') ? 1 : 0;
        this.aggressionScore = this.aggressionScore * 0.92 + isAggressive * 0.08;

        this._maybePrune();
    }

    // =====================================================================
    // CRICKET: Record a bowling result
    // =====================================================================

    /**
     * @param {object} delivery — { type, length, line }
     * @param {object} result — { runs, wasCaught }
     */
    recordBowling(delivery, result) {
        this._totalEvents++;
        const type = delivery.type;

        if (!this.bowlResults[type]) {
            this.bowlResults[type] = { runs: 0, wickets: 0, dots: 0, balls: 0 };
        }
        const rec = this.bowlResults[type];
        rec.balls++;
        rec.runs += (result.runs || 0);
        if (result.wasCaught) rec.wickets++;
        if ((result.runs || 0) === 0) rec.dots++;
    }

    // =====================================================================
    // FOOTBALL: Record a shot
    // =====================================================================

    /**
     * @param {object} shot — { direction, power, round, maxRounds, afterSave }
     */
    recordFootball(shot) {
        this._totalEvents++;
        const dir = shot.direction || 'center';
        const power = shot.power || 0.5;

        // Direction frequency
        this.fbDirection[dir] = (this.fbDirection[dir] || 0) + 1;

        // Power buckets: [0-0.4], [0.4-0.65], [0.65-0.85], [0.85-1.0]
        const bucket = power < 0.4 ? 0 : (power < 0.65 ? 1 : (power < 0.85 ? 2 : 3));
        this.fbPowerBuckets[bucket]++;

        // Phase-based direction
        const round = shot.round || 1;
        const maxR = shot.maxRounds || 10;
        const phase = round <= maxR * 0.33 ? 'early' : (round <= maxR * 0.66 ? 'mid' : 'late');
        if (this.fbPhaseDir[phase]) {
            this.fbPhaseDir[phase][dir] = (this.fbPhaseDir[phase][dir] || 0) + 1;
        }

        // Streak tracking
        if (dir === this.fbStreakDir) {
            this.fbStreakLen++;
        } else {
            this.fbStreakDir = dir;
            this.fbStreakLen = 1;
        }

        // Post-save behavior
        if (shot.afterSave) {
            if (shot.prevDirection && shot.prevDirection !== dir) {
                this.fbSwitchAfterSave++;
            } else if (shot.prevDirection) {
                this.fbStayAfterSave++;
            }
        }
    }

    // =====================================================================
    // INSIGHTS — Derived knowledge from tracked data
    // =====================================================================

    /**
     * Get player's preferred shot against a ball type
     * @param {string} ballType
     * @returns {{ shot: string, frequency: number } | null}
     */
    preferredShot(ballType) {
        const data = this.batByType[ballType];
        if (!data) return null;

        let best = null, bestCount = 0, total = 0;
        for (const shot in data) {
            if (shot === 'miss') continue;
            total += data[shot];
            if (data[shot] > bestCount) { bestCount = data[shot]; best = shot; }
        }
        if (total < this.minSamples) return null;
        return { shot: best, frequency: bestCount / total };
    }

    /**
     * Get miss rate against a specific delivery
     * @param {string} ballType
     * @returns {number} 0-1 miss rate, or -1 if insufficient data
     */
    missRate(ballType) {
        const data = this.batByType[ballType];
        if (!data) return -1;

        let total = 0;
        for (const k in data) total += data[k];
        if (total < this.minSamples) return -1;

        return (data.miss || 0) / total;
    }

    /**
     * Get weakest delivery type for the player (highest miss rate)
     * @returns {{ type: string, missRate: number } | null}
     */
    weakness() {
        let worst = null, worstRate = 0;
        for (const type in this.batByType) {
            const rate = this.missRate(type);
            if (rate > worstRate) { worstRate = rate; worst = type; }
        }
        return worst ? { type: worst, missRate: worstRate } : null;
    }

    /**
     * Get most effective bowling type (best economy + wickets)
     * @returns {{ type: string, economy: number, wicketRate: number } | null}
     */
    bestBowlType() {
        let best = null, bestScore = -Infinity;
        for (const type in this.bowlResults) {
            const r = this.bowlResults[type];
            if (r.balls < this.minSamples) continue;
            // Score = wicketRate * 3 + dotRate * 2 - economy
            const economy = r.balls > 0 ? (r.runs / r.balls) * 6 : 99;
            const wicketRate = r.balls > 0 ? r.wickets / r.balls : 0;
            const dotRate = r.balls > 0 ? r.dots / r.balls : 0;
            const score = wicketRate * 3 + dotRate * 2 - economy;
            if (score > bestScore) { bestScore = score; best = type; }
        }
        if (!best) return null;
        const r = this.bowlResults[best];
        return {
            type: best,
            economy: r.balls > 0 ? (r.runs / r.balls) * 6 : 0,
            wicketRate: r.balls > 0 ? r.wickets / r.balls : 0,
        };
    }

    /**
     * Football: Get predicted direction with confidence
     * @param {string} [phase] — 'early'|'mid'|'late' (optional phase filter)
     * @returns {{ direction: string, confidence: number, streakActive: boolean }}
     */
    predictDirection(phase) {
        // Check streak first (strongest signal)
        if (this.fbStreakLen >= 3) {
            return {
                direction: this.fbStreakDir,
                confidence: AIUtil.clamp(0.5 + this.fbStreakLen * 0.08, 0.5, 0.9),
                streakActive: true,
            };
        }

        // Phase-specific if available
        const src = phase && this.fbPhaseDir[phase]
            ? this.fbPhaseDir[phase]
            : this.fbDirection;

        let total = 0, best = 'center', bestCount = 0;
        for (const d in src) {
            total += src[d];
            if (src[d] > bestCount) { bestCount = src[d]; best = d; }
        }

        if (total < this.minSamples) {
            return { direction: 'center', confidence: 0.33, streakActive: false };
        }

        return {
            direction: best,
            confidence: AIUtil.clamp(bestCount / total, 0.33, 0.85),
            streakActive: false,
        };
    }

    /**
     * Football: Does player tend to switch direction after a save?
     * @returns {number} 0-1 switch probability, or 0.5 if unknown
     */
    switchAfterSaveProbability() {
        const total = this.fbSwitchAfterSave + this.fbStayAfterSave;
        if (total < 3) return 0.5; // not enough data
        return this.fbSwitchAfterSave / total;
    }

    /**
     * Football: Preferred power level
     * @returns {string} 'low'|'medium'|'high'|'max'
     */
    preferredPower() {
        const labels = ['low', 'medium', 'high', 'max'];
        let maxIdx = 0;
        for (let i = 1; i < 4; i++) {
            if (this.fbPowerBuckets[i] > this.fbPowerBuckets[maxIdx]) maxIdx = i;
        }
        return labels[maxIdx];
    }

    // =====================================================================
    // SERIALIZATION — Export/import for persistence (localStorage ready)
    // =====================================================================

    /**
     * Export model to plain object (JSON-safe)
     */
    toJSON() {
        return {
            v: 2, // schema version
            batByType: this.batByType,
            batByDelivery: this.batByDelivery,
            shotOutcomes: this.shotOutcomes,
            timingDist: this.timingDist,
            aggressionScore: this.aggressionScore,
            bowlResults: this.bowlResults,
            fbDirection: this.fbDirection,
            fbPowerBuckets: this.fbPowerBuckets,
            fbPhaseDir: this.fbPhaseDir,
            fbSwitchAfterSave: this.fbSwitchAfterSave,
            fbStayAfterSave: this.fbStayAfterSave,
            totalEvents: this._totalEvents,
        };
    }

    /**
     * Restore model from exported data
     * @param {object} data — from toJSON()
     */
    fromJSON(data) {
        if (!data || data.v !== 2) return; // version mismatch guard
        this.batByType = data.batByType || {};
        this.batByDelivery = data.batByDelivery || {};
        this.shotOutcomes = data.shotOutcomes || {};
        this.timingDist = data.timingDist || { perfect: 0, good: 0, edge: 0, miss: 0 };
        this.aggressionScore = data.aggressionScore || 0.5;
        this.bowlResults = data.bowlResults || {};
        this.fbDirection = data.fbDirection || { left: 0, center: 0, right: 0 };
        this.fbPowerBuckets = data.fbPowerBuckets || [0, 0, 0, 0];
        this.fbPhaseDir = data.fbPhaseDir || { early: {}, mid: {}, late: {} };
        this.fbSwitchAfterSave = data.fbSwitchAfterSave || 0;
        this.fbStayAfterSave = data.fbStayAfterSave || 0;
        this._totalEvents = data.totalEvents || 0;
    }

    /**
     * Get compact stats summary for debug HUD
     */
    get summary() {
        const totalBat = Object.values(this.timingDist).reduce((s, v) => s + v, 0);
        const totalFB = Object.values(this.fbDirection).reduce((s, v) => s + v, 0);
        return {
            events: this._totalEvents,
            batSamples: totalBat,
            fbSamples: totalFB,
            aggression: this.aggressionScore.toFixed(2),
            weakness: this.weakness(),
            fbPrediction: this.predictDirection(),
        };
    }

    // --- Internal --------------------------------------------------------

    _maybePrune() {
        // Simple cap: if too many events, apply decay to all counters
        if (this._totalEvents > this.maxSamples) {
            this._decayAll(this.decayRate);
            this._totalEvents = Math.floor(this._totalEvents * this.decayRate);
        }
    }

    _decayAll(factor) {
        // Decay all counter maps
        for (const type in this.batByType) {
            for (const k in this.batByType[type]) {
                this.batByType[type][k] = Math.floor(this.batByType[type][k] * factor);
            }
        }
        for (const key in this.batByDelivery) {
            for (const k in this.batByDelivery[key]) {
                this.batByDelivery[key][k] = Math.floor(this.batByDelivery[key][k] * factor);
            }
        }
        for (const k in this.timingDist) {
            this.timingDist[k] = Math.floor(this.timingDist[k] * factor);
        }
        for (const d in this.fbDirection) {
            this.fbDirection[d] = Math.floor(this.fbDirection[d] * factor);
        }
        for (let i = 0; i < this.fbPowerBuckets.length; i++) {
            this.fbPowerBuckets[i] = Math.floor(this.fbPowerBuckets[i] * factor);
        }
    }

    reset() {
        this.batByType = {};
        this.batByDelivery = {};
        this.shotOutcomes = {};
        this.timingDist = { perfect: 0, good: 0, edge: 0, miss: 0 };
        this.aggressionScore = 0.5;
        this.bowlResults = {};
        this.fbDirection = { left: 0, center: 0, right: 0 };
        this.fbPowerBuckets = [0, 0, 0, 0];
        this.fbPhaseDir = { early: { left: 0, center: 0, right: 0 }, mid: { left: 0, center: 0, right: 0 }, late: { left: 0, center: 0, right: 0 } };
        this.fbStreakDir = null;
        this.fbStreakLen = 0;
        this.fbSwitchAfterSave = 0;
        this.fbStayAfterSave = 0;
        this._totalEvents = 0;
    }
}


// ============================================================================
// SECTION 0.7 — BAYES PREDICTOR (Phase 3: Probability-Based Prediction)
// ============================================================================
// Lightweight Bayesian posterior estimation.
// Given observed evidence (delivery type, line, game state), compute
// posterior probability of each player action.
//
// P(action | evidence) ∝ P(evidence | action) × P(action)
//
// Priors come from Phase 1 lookup tables.
// Likelihoods are learned from Phase 2 PlayerModel observations.
// No matrix ops, no tensors — just counter-based Bayes.
// ============================================================================

class BayesPredictor {
    /**
     * @param {number} [smoothing=1] — Laplace smoothing to avoid zero probabilities
     */
    constructor(smoothing = 1) {
        this.smoothing = smoothing;

        // Conditional count tables
        // Key: evidenceKey → { action: count }
        this._conditionals = {};
        // Marginal action counts (prior)
        this._actionCounts = {};
        this._totalObs = 0;
    }

    /**
     * Record an observation: given evidence, player chose action
     * @param {string} evidenceKey — e.g. "bouncer|short|right"
     * @param {string} action — e.g. "PULL"
     */
    observe(evidenceKey, action) {
        if (!this._conditionals[evidenceKey]) this._conditionals[evidenceKey] = {};
        this._conditionals[evidenceKey][action] = (this._conditionals[evidenceKey][action] || 0) + 1;
        this._actionCounts[action] = (this._actionCounts[action] || 0) + 1;
        this._totalObs++;
    }

    /**
     * Predict posterior distribution over actions given evidence
     * @param {string} evidenceKey
     * @param {object} [priors] — optional prior weights { action: weight }
     * @returns {{ predictions: Array<{action: string, probability: number}>, topAction: string, topProb: number, confidence: number }}
     */
    predict(evidenceKey, priors = null) {
        const cond = this._conditionals[evidenceKey];
        const allActions = Object.keys(this._actionCounts);

        if (allActions.length === 0) {
            return { predictions: [], topAction: null, topProb: 0, confidence: 0 };
        }

        // Compute unnormalized posteriors
        const posteriors = {};
        let totalPosterior = 0;
        const k = this.smoothing;
        const nActions = allActions.length;

        for (const action of allActions) {
            // Prior: P(action) = (count + k) / (total + k*n)
            const prior = priors && priors[action] !== undefined
                ? priors[action]
                : (this._actionCounts[action] + k) / (this._totalObs + k * nActions);

            // Likelihood: P(evidence | action) approximated from conditional counts
            const condCount = cond ? (cond[action] || 0) : 0;
            const condTotal = cond ? Object.values(cond).reduce((s, v) => s + v, 0) : 0;
            const likelihood = (condCount + k) / (condTotal + k * nActions);

            posteriors[action] = prior * likelihood;
            totalPosterior += posteriors[action];
        }

        // Normalize
        const predictions = [];
        let topAction = null, topProb = 0;

        for (const action of allActions) {
            const prob = totalPosterior > 0 ? posteriors[action] / totalPosterior : 1 / nActions;
            predictions.push({ action, probability: prob });
            if (prob > topProb) { topProb = prob; topAction = action; }
        }

        // Sort descending
        predictions.sort((a, b) => b.probability - a.probability);

        // Confidence: how much the top prediction stands out
        // entropy-based: low entropy = high confidence
        let entropy = 0;
        for (const p of predictions) {
            if (p.probability > 0) entropy -= p.probability * Math.log2(p.probability);
        }
        const maxEntropy = Math.log2(nActions);
        // Edge case: single action → 100% confident; otherwise entropy-normalized
        const confidence = nActions <= 1 ? 1.0 : (maxEntropy > 0 ? AIUtil.clamp(1 - entropy / maxEntropy, 0, 1) : 0);

        return { predictions, topAction, topProb, confidence };
    }

    /**
     * Get number of observations for a given evidence key
     */
    observationCount(evidenceKey) {
        const cond = this._conditionals[evidenceKey];
        if (!cond) return 0;
        let total = 0;
        for (const k in cond) total += cond[k];
        return total;
    }

    get totalObservations() { return this._totalObs; }

    /**
     * Apply decay to all counters (recency bias)
     * @param {number} factor — 0..1 (e.g. 0.95)
     */
    decay(factor) {
        for (const key in this._conditionals) {
            for (const action in this._conditionals[key]) {
                this._conditionals[key][action] = Math.floor(this._conditionals[key][action] * factor);
                if (this._conditionals[key][action] === 0) delete this._conditionals[key][action];
            }
            if (Object.keys(this._conditionals[key]).length === 0) delete this._conditionals[key];
        }
        for (const action in this._actionCounts) {
            this._actionCounts[action] = Math.floor(this._actionCounts[action] * factor);
            if (this._actionCounts[action] === 0) delete this._actionCounts[action];
        }
        this._totalObs = Math.floor(this._totalObs * factor);
    }

    toJSON() {
        return { conditionals: this._conditionals, actions: this._actionCounts, total: this._totalObs };
    }

    fromJSON(data) {
        if (!data) return;
        this._conditionals = data.conditionals || {};
        this._actionCounts = data.actions || {};
        this._totalObs = data.total || 0;
    }
}


// ============================================================================
// SECTION 0.8 — SEQUENCE PREDICTOR (Phase 3: Markov Chain)
// ============================================================================
// First-order Markov chain: P(next | current).
// Tracks transition probabilities between consecutive player actions.
// Works for both cricket (shot sequences) and football (direction sequences).
//
// Example: If player did LEFT → LEFT → RIGHT, the transitions are:
//   LEFT → LEFT (count++)
//   LEFT → RIGHT (count++)
//
// Memory: O(states²) — for 6 shots × 6 shots = 36 cells max.
// ============================================================================

class SequencePredictor {
    /**
     * @param {number} [order=1] — Markov order (1 = first-order, 2 = bigram context)
     */
    constructor(order = 1) {
        this.order = order;
        // Transition table: { prevState: { nextState: count } }
        this._transitions = {};
        // State history buffer
        this._history = [];
        this._maxHistory = 50;
        this._totalTransitions = 0;
    }

    /**
     * Record a state observation (call sequentially)
     * @param {string} state — e.g. "PULL", "left", "dive_right"
     */
    observe(state) {
        // Record transition from previous state(s)
        if (this._history.length >= this.order) {
            const context = this.order === 1
                ? this._history[this._history.length - 1]
                : this._history.slice(-this.order).join('→');

            if (!this._transitions[context]) this._transitions[context] = {};
            this._transitions[context][state] = (this._transitions[context][state] || 0) + 1;
            this._totalTransitions++;
        }

        this._history.push(state);
        if (this._history.length > this._maxHistory) this._history.shift();
    }

    /**
     * Predict next state from current context
     * @param {string} [currentState] — override current context (default: last observed)
     * @returns {{ predictions: Array<{state: string, probability: number}>, topState: string, topProb: number }}
     */
    predict(currentState) {
        const context = currentState || (this._history.length > 0 ? this._history[this._history.length - 1] : null);
        if (!context || !this._transitions[context]) {
            return { predictions: [], topState: null, topProb: 0 };
        }

        const transitions = this._transitions[context];
        let total = 0;
        for (const s in transitions) total += transitions[s];

        const predictions = [];
        let topState = null, topProb = 0;

        for (const s in transitions) {
            const prob = total > 0 ? transitions[s] / total : 0;
            predictions.push({ state: s, probability: prob });
            if (prob > topProb) { topProb = prob; topState = s; }
        }

        predictions.sort((a, b) => b.probability - a.probability);
        return { predictions, topState, topProb };
    }

    /**
     * Get transition matrix as flat object (for debug/visualization)
     * @returns {object} { "from→to": probability }
     */
    getMatrix() {
        const matrix = {};
        for (const from in this._transitions) {
            let total = 0;
            for (const to in this._transitions[from]) total += this._transitions[from][to];
            for (const to in this._transitions[from]) {
                matrix[`${from}→${to}`] = total > 0 ? this._transitions[from][to] / total : 0;
            }
        }
        return matrix;
    }

    /**
     * Detect if player is in a repeating pattern
     * @param {number} [minLen=2] — minimum pattern length
     * @param {number} [minReps=2] — minimum repetitions
     * @returns {{ pattern: string[] | null, length: number, repetitions: number }}
     */
    detectPattern(minLen = 2, minReps = 2) {
        const h = this._history;
        if (h.length < minLen * minReps) return { pattern: null, length: 0, repetitions: 0 };

        // Check patterns of length 2, 3, 4
        for (let len = minLen; len <= Math.min(4, Math.floor(h.length / minReps)); len++) {
            const candidate = h.slice(-len);
            let reps = 0;
            let match = true;

            // Check backwards for repetitions
            for (let r = 1; r <= Math.floor(h.length / len); r++) {
                const offset = h.length - len * (r + 1);
                if (offset < 0) break;
                const segment = h.slice(offset, offset + len);
                if (segment.every((v, i) => v === candidate[i])) {
                    reps++;
                } else {
                    break;
                }
            }

            if (reps >= minReps - 1) {
                return { pattern: candidate, length: len, repetitions: reps + 1 };
            }
        }

        return { pattern: null, length: 0, repetitions: 0 };
    }

    get historyLength() { return this._history.length; }
    get lastState() { return this._history.length > 0 ? this._history[this._history.length - 1] : null; }

    toJSON() {
        return { transitions: this._transitions, history: this._history.slice(-20), total: this._totalTransitions };
    }

    fromJSON(data) {
        if (!data) return;
        this._transitions = data.transitions || {};
        this._history = data.history || [];
        this._totalTransitions = data.total || 0;
    }
}


// ============================================================================
// SECTION 0.9 — ADAPTIVE DIFFICULTY (Phase 3)
// ============================================================================
// Real-time difficulty adjustment based on player performance.
// Uses exponential moving average (EMA) of success rate to compute
// a difficulty multiplier that scales AI behavior.
//
// Flow:
//   Player performance → success EMA → difficulty curve → AI parameter scaling
//
// Ensures the game stays in the "flow zone" — not too easy, not too hard.
// ============================================================================

class AdaptiveDifficulty {
    /**
     * @param {object} [config]
     * @param {number} [config.targetWinRate=0.45] — ideal player success rate
     * @param {number} [config.emaAlpha=0.1] — EMA smoothing (0=slow, 1=instant)
     * @param {number} [config.adjustRate=0.02] — how fast difficulty changes per tick
     * @param {number} [config.minDifficulty=0.3] — floor
     * @param {number} [config.maxDifficulty=1.5] — ceiling
     * @param {number} [config.minSamples=5] — min events before adjustments begin
     */
    constructor(config = {}) {
        this.targetWinRate = config.targetWinRate || 0.45;
        this.emaAlpha = config.emaAlpha || 0.1;
        this.adjustRate = config.adjustRate || 0.02;
        this.minDifficulty = config.minDifficulty || 0.3;
        this.maxDifficulty = config.maxDifficulty || 1.5;
        this.minSamples = config.minSamples || 5;

        // State
        this.currentDifficulty = 1.0;  // 1.0 = baseline
        this.winRateEMA = 0.5;         // running success rate
        this._totalEvents = 0;
        this._wins = 0;
        this._losses = 0;
        this._recentResults = [];      // last N results for windowed analysis
        this._maxRecent = 30;

        // Streak tracking
        this.currentStreak = 0;        // positive = wins, negative = losses
        this.longestWinStreak = 0;
        this.longestLossStreak = 0;
    }

    /**
     * Record a game event outcome
     * @param {boolean} playerWon — true if player succeeded
     */
    recordResult(playerWon) {
        this._totalEvents++;
        if (playerWon) {
            this._wins++;
            this.currentStreak = this.currentStreak > 0 ? this.currentStreak + 1 : 1;
            if (this.currentStreak > this.longestWinStreak) this.longestWinStreak = this.currentStreak;
        } else {
            this._losses++;
            this.currentStreak = this.currentStreak < 0 ? this.currentStreak - 1 : -1;
            if (-this.currentStreak > this.longestLossStreak) this.longestLossStreak = -this.currentStreak;
        }

        this._recentResults.push(playerWon ? 1 : 0);
        if (this._recentResults.length > this._maxRecent) this._recentResults.shift();

        // Update EMA
        this.winRateEMA = this.winRateEMA * (1 - this.emaAlpha) + (playerWon ? 1 : 0) * this.emaAlpha;

        // Adjust difficulty
        if (this._totalEvents >= this.minSamples) {
            this._adjustDifficulty();
        }
    }

    /**
     * Core difficulty adjustment algorithm
     * Moves difficulty toward a value that would produce targetWinRate
     */
    _adjustDifficulty() {
        const error = this.winRateEMA - this.targetWinRate;
        // Positive error = player winning too much → increase difficulty
        // Negative error = player losing too much → decrease difficulty

        let adjustment = error * this.adjustRate;

        // Streak amplification: bigger adjustments during streaks
        const streakAbs = Math.abs(this.currentStreak);
        if (streakAbs >= 3) {
            adjustment *= (1 + (streakAbs - 2) * 0.15); // 15% extra per streak beyond 2
        }

        // Frustration guard: rapid decrease if on big losing streak
        if (this.currentStreak <= -4) {
            adjustment = Math.min(adjustment, -this.adjustRate * 2);
        }

        // Boredom guard: rapid increase if on big winning streak
        if (this.currentStreak >= 5) {
            adjustment = Math.max(adjustment, this.adjustRate * 2);
        }

        this.currentDifficulty = AIUtil.clamp(
            this.currentDifficulty + adjustment,
            this.minDifficulty,
            this.maxDifficulty
        );
    }

    /**
     * Get scaling parameters for AI behavior
     * @returns {object} { speedMul, accuracyMul, reactionMul, aggressionMul }
     */
    getScaling() {
        const d = this.currentDifficulty;
        return {
            // Ball speed / dive speed multiplier
            speedMul: 0.7 + d * 0.3,        // 0.7 → 1.15 across range
            // AI prediction accuracy
            accuracyMul: 0.5 + d * 0.4,     // 0.5 → 1.1
            // Reaction time multiplier (lower = faster)
            reactionMul: 1.5 - d * 0.5,     // 1.5 → 0.75 (inverted)
            // Bowling/keeper aggression
            aggressionMul: 0.6 + d * 0.4,   // 0.6 → 1.2
        };
    }

    /**
     * Get windowed win rate (last N results)
     * @returns {number} 0-1
     */
    get recentWinRate() {
        if (this._recentResults.length === 0) return 0.5;
        return this._recentResults.reduce((s, v) => s + v, 0) / this._recentResults.length;
    }

    /**
     * Human-readable difficulty label
     */
    get label() {
        const d = this.currentDifficulty;
        if (d < 0.5) return 'Very Easy';
        if (d < 0.8) return 'Easy';
        if (d < 1.1) return 'Medium';
        if (d < 1.3) return 'Hard';
        return 'Legend';
    }

    get summary() {
        return {
            difficulty: this.currentDifficulty.toFixed(2),
            label: this.label,
            winRate: this.winRateEMA.toFixed(2),
            recentWinRate: this.recentWinRate.toFixed(2),
            streak: this.currentStreak,
            events: this._totalEvents,
        };
    }

    toJSON() {
        return {
            difficulty: this.currentDifficulty,
            winRate: this.winRateEMA,
            events: this._totalEvents,
            wins: this._wins,
            losses: this._losses,
            streak: this.currentStreak,
        };
    }

    fromJSON(data) {
        if (!data) return;
        this.currentDifficulty = data.difficulty || 1.0;
        this.winRateEMA = data.winRate || 0.5;
        this._totalEvents = data.events || 0;
        this._wins = data.wins || 0;
        this._losses = data.losses || 0;
        this.currentStreak = data.streak || 0;
    }
}


// ============================================================================
// SECTION 1 — AI ENGINE CORE
// ============================================================================

class AIEngine {
    /**
     * @param {object} [config]
     * @param {string} [config.difficulty='medium'] — easy|medium|hard|legend
     * @param {number} [config.tickBudgetMs=2] — max ms per AI tick (perf guard)
     */
    constructor(config = {}) {
        this.difficulty = config.difficulty || 'medium';
        this.tickBudgetMs = config.tickBudgetMs || 2;
        this._frameCount = 0;

        // Sub-systems (lazy init — only allocate what's used)
        this._cricketAI = null;
        this._footballAI = null;

        // Phase 2: Player behavior model (shared across sub-systems)
        this.playerModel = new PlayerModel({
            maxSamples: config.maxSamples || 200,
            decayRate: config.decayRate || 0.98,
        });

        // Phase 3: Probability-based predictors (shared across sub-systems)
        this.cricketBayes = new BayesPredictor(config.bayesSmoothing || 1);
        this.fbBayes = new BayesPredictor(config.bayesSmoothing || 1);
        this.cricketSeq = new SequencePredictor(1);
        this.fbSeq = new SequencePredictor(1);
        this.difficulty_adaptive = new AdaptiveDifficulty({
            targetWinRate: config.targetWinRate || 0.45,
            emaAlpha: config.difficultyEmaAlpha || 0.1,
            adjustRate: config.difficultyAdjustRate || 0.02,
        });

        // Perf telemetry (debug only)
        this._lastTickMs = 0;
        this._avgTickMs = 0;
        this._peakTickMs = 0;
    }

    // --- Lazy getters --------------------------------------------------------

    get cricket() {
        if (!this._cricketAI) {
            this._cricketAI = new CricketAI(this.difficulty, this.playerModel,
                this.cricketBayes, this.cricketSeq, this.difficulty_adaptive);
        }
        return this._cricketAI;
    }

    get football() {
        if (!this._footballAI) {
            this._footballAI = new FootballAI(this.difficulty, this.playerModel,
                this.fbBayes, this.fbSeq, this.difficulty_adaptive);
        }
        return this._footballAI;
    }

    // --- Difficulty -----------------------------------------------------------

    setDifficulty(d) {
        this.difficulty = d;
        if (this._cricketAI) this._cricketAI.setDifficulty(d);
        if (this._footballAI) this._footballAI.setDifficulty(d);
    }

    // --- Per-frame tick (call from game loop's update/fixedUpdate) -----------

    /**
     * Main AI tick — budget-guarded, call once per frame
     * @param {number} dt — delta time in seconds
     */
    tick(dt) {
        const t0 = performance.now();
        this._frameCount++;

        if (this._cricketAI) this._cricketAI.tick(dt, this._frameCount);
        if (this._footballAI) this._footballAI.tick(dt, this._frameCount);

        // Perf telemetry
        const elapsed = performance.now() - t0;
        this._lastTickMs = elapsed;
        this._avgTickMs = this._avgTickMs * 0.95 + elapsed * 0.05; // EMA
        if (elapsed > this._peakTickMs) this._peakTickMs = elapsed;
    }

    // --- Debug stats ---------------------------------------------------------

    get stats() {
        return {
            lastMs: this._lastTickMs.toFixed(2),
            avgMs: this._avgTickMs.toFixed(2),
            peakMs: this._peakTickMs.toFixed(2),
            frame: this._frameCount,
        };
    }

    /** Get Phase 3 predictor summaries for debug HUD */
    get phase3Stats() {
        return {
            cricketBayes: this.cricketBayes.totalObservations,
            fbBayes: this.fbBayes.totalObservations,
            cricketSeq: this.cricketSeq.historyLength,
            fbSeq: this.fbSeq.historyLength,
            difficulty: this.difficulty_adaptive.summary,
        };
    }

    /** Serialize all Phase 3 state for persistence */
    savePhase3() {
        return {
            cricketBayes: this.cricketBayes.toJSON(),
            fbBayes: this.fbBayes.toJSON(),
            cricketSeq: this.cricketSeq.toJSON(),
            fbSeq: this.fbSeq.toJSON(),
            difficulty: this.difficulty_adaptive.toJSON(),
            playerModel: this.playerModel.toJSON(),
        };
    }

    /** Restore all Phase 3 state */
    loadPhase3(data) {
        if (!data) return;
        if (data.cricketBayes) this.cricketBayes.fromJSON(data.cricketBayes);
        if (data.fbBayes) this.fbBayes.fromJSON(data.fbBayes);
        if (data.cricketSeq) this.cricketSeq.fromJSON(data.cricketSeq);
        if (data.fbSeq) this.fbSeq.fromJSON(data.fbSeq);
        if (data.difficulty) this.difficulty_adaptive.fromJSON(data.difficulty);
        if (data.playerModel) this.playerModel.fromJSON(data.playerModel);
    }

    resetPeakMs() { this._peakTickMs = 0; }
}


// ============================================================================
// SECTION 2 — CRICKET AI
// ============================================================================
//
// Two decision modes:
// A) BATTING AI — Given a delivery, select optimal shot + timing
// B) BOWLING AI — Given game state, select delivery (type/length/line)
//
