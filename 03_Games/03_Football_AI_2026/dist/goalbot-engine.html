    _awardCoins(amount, reason) {
        this.coins += amount;
        console.log(`[COINS] +${amount} (${reason}) | Total: ${this.coins}`);
        this._saveProgress();
        return amount;
    }

    _awardXP(amount) {
        this.playerXP += amount;
        while (this.playerXP >= this.xpToNextLevel) {
            this.playerXP -= this.xpToNextLevel;
            this.playerLevel++;
            this.xpToNextLevel = Math.floor(this.xpToNextLevel * 1.4);
            this._awardCoins(this.playerLevel * 20, `Level ${this.playerLevel} up!`);
            console.log(`[LEVEL UP] Now level ${this.playerLevel}!`);

            // Check for feature unlocks at new level
            const unlock = this.levelUnlocks[this.playerLevel];
            if (unlock) {
                this._applyFeatureUnlock(unlock.feature, false);
                console.log(`[UNLOCK] Level ${this.playerLevel}: ${unlock.name} — ${unlock.desc}`);
            }
        }
    }

    _processRoundRewards(isGoal) {
        if (!this._progressionInit) return;

        // Base coin rewards
        if (isGoal) {
            let goalCoins = 10;
            // Golden ball coin bonus
            if (this._getBallEffect() === 'coin_bonus') {
                goalCoins = Math.ceil(goalCoins * 1.05);
            }
            this._awardCoins(goalCoins, 'Goal scored');
            this._awardXP(15);
            this.totalGoals++;

            // Streak bonus
            if (this.streak >= 3) {
                this._awardCoins(this.streak * 5, `${this.streak}x streak bonus`);
            }

            // Difficulty multiplier
            const mult = { easy: 1, medium: 1.5, hard: 2.5, legend: 4 };
            const bonus = Math.floor(5 * (mult[this.difficulty] || 1));
            if (bonus > 5) this._awardCoins(bonus, 'Difficulty bonus');
        } else {
            this._awardXP(5); // small XP for trying
        }

        // Update mission progress
        this._updateMissions(isGoal);
    }

    _updateMissions(isGoal) {
        this.missions.forEach(m => {
            if (m.progress >= m.target) return; // already completed
            switch (m.type) {
                case 'goals_per_game':
                    if (isGoal) m.progress++;
                    break;
                case 'streak':
                    m.progress = Math.max(m.progress, this.streak);
                    break;
                case 'games_played':
                    // incremented at game end
                    break;
            }
            if (m.progress >= m.target) {
                this._awardCoins(m.reward, `Mission: ${m.desc}`);
            }
        });
    }

    _processGameEndRewards() {
        if (!this._progressionInit) return;

        // Game completion XP
        this._awardXP(25);

        // Win bonus (more goals than keeper saves)
        if (this.score.player > this.score.keeper) {
            this._awardCoins(30, 'Game won');
            this._awardXP(20);
        }

        // Perfect game (no misses)
        if (this.score.player === this.maxRounds) {
            this._awardCoins(200, 'PERFECT GAME!');
            this._awardXP(100);
        }

        // Update games_played missions
        this.missions.forEach(m => {
            if (m.type === 'games_played' && m.progress < m.target) {
                m.progress++;
                if (m.progress >= m.target) {
                    this._awardCoins(m.reward, `Mission: ${m.desc}`);
                }
            }
            if (m.type === 'win_hard' && this.difficulty === 'hard' && this.score.player > this.score.keeper) {
                m.progress = 1;
                if (m.progress >= m.target) {
                    this._awardCoins(m.reward, `Mission: ${m.desc}`);
                }
            }
        });
    }

    purchaseItem(category, itemId) {
        const items = this.unlocks[category];
        if (!items) return { success: false, msg: 'Invalid category' };
        const item = items.find(i => i.id === itemId);
        if (!item) return { success: false, msg: 'Item not found' };
        if (item.unlocked) return { success: false, msg: 'Already unlocked' };
        if (this.coins < item.cost) return { success: false, msg: `Need ${item.cost - this.coins} more coins` };

        this.coins -= item.cost;
        item.unlocked = true;
        console.log(`[SHOP] Purchased ${item.name} for ${item.cost} coins`);
        this._saveProgress();
        return { success: true, msg: `Unlocked ${item.name}!` };
    }

        if (!window.CdvPurchase) {
            console.log('[IAP] No native store — running in web mode');
            return;
        }
        const store = window.CdvPurchase.store;
        // Register products
        this.coinPacks.forEach(pack => {
            store.register({ id: pack.id, type: CdvPurchase.CONSUMABLE, platform: CdvPurchase.APPLE_APPSTORE });
        });
        this.iapProducts.forEach(product => {
            const type = product.type === 'consumable' ? CdvPurchase.CONSUMABLE : CdvPurchase.NON_CONSUMABLE;
            store.register({ id: product.id, type, platform: CdvPurchase.APPLE_APPSTORE });
        });
        // Approved handler — award items after Apple validates
        store.when().approved(transaction => {
            const pid = transaction.products[0]?.id;
            console.log('[IAP] Approved:', pid);
            const coinPack = this.coinPacks.find(p => p.id === pid);
            if (coinPack) {
                this._awardCoins(coinPack.coins, `IAP: ${coinPack.id}`);
                this._setShopMessage(`+${coinPack.coins.toLocaleString()} Coins!`, '#ffc107');
            }
            const iapProd = this.iapProducts.find(p => p.id === pid);
            if (iapProd) {
                this.handleIAP(pid);
                if (pid === 'remove_ads') {
                    this.hasRemoveAds = true;
                    this._setShopMessage('Ads Removed!', '#00e5ff');
                } else if (pid === 'starter_bundle') {
                    this._awardCoins(2000, 'Starter Bundle');
                    this.hasRemoveAds = true;
                    const goldenBall = this.unlocks.balls.find(b => b.id === 'golden');
                    if (goldenBall) goldenBall.unlocked = true;
                    this._setShopMessage('Starter Bundle Activated!', '#00e5ff');
                }
            }
            this._saveProgress();
            transaction.finish();
        });
        store.initialize([CdvPurchase.APPLE_APPSTORE]);
        console.log('[IAP] Store initialized');
    }

    // ====== GAME LOOP ======

    _loop() {
        if (this._destroyed) return;
        if (!this._backgrounded) {
            try {
                this._update();
                this._draw();
            } catch (e) {
                console.error('[GAME LOOP] Error:', e);
                // Draw error in bottom-right corner
                try {
                    const ctx = this.renderer.ctx;
                    ctx.save();
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(DESIGN.width - 200, DESIGN.height - 60, 200, 60);
                    ctx.fillStyle = '#ff4444';
                    ctx.font = 'bold 10px monospace';
                    ctx.textAlign = 'left';
                    ctx.fillText('ERROR: Check Console (F12)', DESIGN.width - 190, DESIGN.height - 40);
                    ctx.fillStyle = '#ffaa44';
                    ctx.font = '8px monospace';
                    ctx.fillText((e.message || String(e)).substring(0, 30), DESIGN.width - 190, DESIGN.height - 25);
                    ctx.fillText('State: ' + this.state, DESIGN.width - 190, DESIGN.height - 10);
                    ctx.restore();
                } catch (e2) { /* ignore draw error */ }
            }
        }
        this._rafId = requestAnimationFrame(() => this._loop());
    }

    destroy() {
        this._destroyed = true;
        if (this._rafId) cancelAnimationFrame(this._rafId);
        if (this._resizeHandler) window.removeEventListener('resize', this._resizeHandler);
    }
}


    // Boot
    const bar = document.getElementById('loadingBar');
    let progress = 0;
    const interval = setInterval(() => {
        progress = Math.min(progress + Math.random() * 15 + 5, 100);
        bar.style.width = progress + '%';
        if (progress >= 100) {
            clearInterval(interval);
            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('hidden');
                window.game = new Game();
                // Pause game loop when app backgrounded (battery save, iOS)
                document.addEventListener('visibilitychange', () => {
                    if (document.hidden && window.game) {
                        window.game._backgrounded = true;
                    } else if (window.game) {
                        window.game._backgrounded = false;
                    }
                });
            }, 400);
        }
    }, 120);
    // Register service worker for offline PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // ============================================================
    // CONVEX CLOUD BACKEND — ConvexGameClient (HTTP, no SDK needed)
    // Deployment: gallant-kingfisher-867
    // ============================================================
    (function() {
        const CONVEX_URL = 'https://gallant-kingfisher-867.convex.cloud';

        class ConvexGameClient {
            constructor(url) {
                this._url = url;
                this._playerId = null;
                try {
                    const cached = localStorage.getItem('convex_player_id');
                    if (cached) this._playerId = cached;
                } catch(e) {}
            }
            get playerId() { return this._playerId; }
            get isRegistered() { return this._playerId !== null; }

            async _mutation(path, args) {
                const res = await fetch(this._url + '/api/mutation', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path, args }),
                });
                if (!res.ok) throw new Error(await res.text());
                return (await res.json()).value;
            }
            async _query(path, args) {
                const res = await fetch(this._url + '/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path, args: args || {} }),
                });
                if (!res.ok) throw new Error(await res.text());
                return (await res.json()).value;
            }

            async registerPlayer(name) {
                const id = await this._mutation('players:registerPlayer', { name });
                this._playerId = id;
                try { localStorage.setItem('convex_player_id', id); } catch(e) {}
                return id;
            }
            async getOrRegisterPlayer(name) {
                // If we have a cached ID, validate it still exists on this deployment
                if (this._playerId) {
                    try {
                        const player = await this._query('players:getPlayer', { playerId: this._playerId });
                        if (player) return this._playerId;
                    } catch(e) {
                        console.warn('[Convex] Cached player ID invalid, re-registering...');
                    }
                    this._playerId = null;
                    try { localStorage.removeItem('convex_player_id'); } catch(e) {}
                }
                const existing = await this._query('players:getPlayerByName', { name });
                if (existing) {
                    this._playerId = existing._id;
                    try { localStorage.setItem('convex_player_id', existing._id); } catch(e) {}
                    return existing._id;
                }
                return this.registerPlayer(name);
            }
            async submitSession(game, score, difficulty, won, stats, duration) {
                if (!this._playerId) return null;
                const args = { playerId: this._playerId, game, score, difficulty, won, stats };
                if (duration != null && Number.isFinite(duration)) args.duration = duration;
                return this._mutation('sessions:submitGameSession', args);
            }
            async getLeaderboard(game, limit) {
                return this._query('leaderboard:getLeaderboard', { game, limit: limit || 10 });
            }
            async getPlayerRank(game) {
                if (!this._playerId) return null;
                return this._query('leaderboard:getPlayerRank', { playerId: this._playerId, game });
            }
            async syncPlayerStats(payload) {
                if (!this._playerId) return null;
                return this._mutation('players:updatePlayerStats', {
                    playerId: this._playerId, ...payload,
                });
            }
            async unlockAchievement(achievementId, game) {
                if (!this._playerId) return null;
                return this._mutation('achievements:unlockAchievement', {
                    playerId: this._playerId, achievementId, game,
                });
            }
            async syncCampaign(game, currentLevel, totalStars, levelStars) {
                if (!this._playerId) return null;
                return this._mutation('campaign:syncCampaign', {
                    playerId: this._playerId, game, currentLevel, totalStars, levelStars,
                });
            }
            async joinMatchmaking(playerName, difficulty) {
                return this._mutation('multiplayer:joinQueue', { playerName, difficulty: difficulty || 'medium' });
            }
            async checkQueue(playerName) {
                return this._query('multiplayer:checkQueue', { playerName });
            }
            async leaveQueue(playerName) {
                return this._mutation('multiplayer:leaveQueue', { playerName });
            }
            async getRoom(roomId) {
                return this._query('multiplayer:getRoom', { roomId });
            }
            async updateInnings(roomId, innings, data) {
                return this._mutation('multiplayer:updateInnings', { roomId, innings, ...data });
            }
            async completeInnings1(roomId, data) {
                return this._mutation('multiplayer:completeInnings1', { roomId, ...data });
            }
            async completeMatch(roomId, data) {
                return this._mutation('multiplayer:completeMatch', { roomId, ...data });
            }
            async getLiveMatches() {
                return this._query('multiplayer:getLiveMatches', {});
            }
            async getQueueCount() {
                return this._query('multiplayer:getQueueCount', {});
            }
            async recordBotMatch(data) {
                return this._mutation('multiplayer:recordBotMatch', data);
            }
            async createPrivateRoom(playerName, difficulty) {
                return this._mutation('multiplayer:createPrivateRoom', { playerName, difficulty: difficulty || 'medium' });
            }
            async joinPrivateRoom(roomCode, playerName) {
                return this._mutation('multiplayer:joinPrivateRoom', { roomCode, playerName });
            }
            async checkPrivateRoom(roomId) {
                return this._query('multiplayer:checkPrivateRoom', { roomId });
            }
        }

        // Auto-init: create client and register player silently
        window._convexClient = new ConvexGameClient(CONVEX_URL);
        window._convexClient.getOrRegisterPlayer('Alpit').then(id => {
            console.log('[Convex] Player ready:', id);
        }).catch(e => {
            console.warn('[Convex] Init failed (offline?):', e.message);
        });
    })();
    </script>
</body>
