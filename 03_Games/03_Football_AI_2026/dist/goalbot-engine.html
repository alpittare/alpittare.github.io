    _updateMpWaiting() {
        let tap = this.touch.consumeTap();
        while (tap) {
            // Start Chase button
            if (tap.x >= 107 && tap.x <= 307 && tap.y >= 520 && tap.y <= 570) {
                this.mpIsChaser = true;
                this.mpTarget = (this.mpWaitingRoomData.innings1Score || 0) + 1;
                this.startGame(this.mpSelectedDifficulty);
                this.state = 'playing';
                this.audio.play('click');
                Utils.haptic(10);
            }
            // Back button
            if (tap.x < 60 && tap.y < 60) {
                this.state = 'multiplayer_lobby';
                this.audio.play('click');
                Utils.haptic(5);
            }
            tap = this.touch.consumeTap();
        }
    }

            this.renderer._roundRect(ctx, cx - 55, 115, 110, 26, 13);
            ctx.stroke();
            ctx.fillStyle = '#aa00ff'; ctx.font = 'bold 11px -apple-system, Arial';
            ctx.fillText(this.mpSelectedDifficulty.toUpperCase(), cx, 133);

            // ── Radar center ──
            const radarCY = 260;
            const radarR = 70;

            // Outer glow pulse
            const pulseR = radarR + 25 + Math.sin(this.animPhase * 3) * 8;
            const outerGlow = ctx.createRadialGradient(cx, radarCY, radarR - 10, cx, radarCY, pulseR);
            outerGlow.addColorStop(0, 'rgba(170,0,255,0.08)');
            outerGlow.addColorStop(0.6, 'rgba(170,0,255,0.04)');
            outerGlow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = outerGlow;
            ctx.fillRect(cx - pulseR, radarCY - pulseR, pulseR * 2, pulseR * 2);

            // Radar rings
            for (let r = 1; r <= 3; r++) {
                const ringR = radarR * r / 3;
                ctx.strokeStyle = `rgba(170,0,255,${0.08 + r * 0.03})`;
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(cx, radarCY, ringR, 0, Math.PI * 2); ctx.stroke();
            }

            // Radar crosshair
            ctx.strokeStyle = 'rgba(170,0,255,0.08)'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(cx - radarR, radarCY); ctx.lineTo(cx + radarR, radarCY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, radarCY - radarR); ctx.lineTo(cx, radarCY + radarR); ctx.stroke();

            // Rotating sweep (conic gradient or arc fallback)
            const sweepAngle = (elapsed % 2000) / 2000 * Math.PI * 2;
            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, radarCY, radarR, 0, Math.PI * 2);
            ctx.clip();
            // Sweep arc — gradient fade
            for (let s = 0; s < 30; s++) {
                const a = sweepAngle - s * 0.03;
                const alpha = (1 - s / 30) * 0.4;
                ctx.strokeStyle = `rgba(170,0,255,${alpha})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(cx, radarCY);
                ctx.lineTo(cx + Math.cos(a) * radarR, radarCY + Math.sin(a) * radarR);
                ctx.stroke();
            }
            ctx.restore();

            // Blip dots (random-seeded by elapsed)
            const blipSeed = Math.floor(elapsed / 3000);
            for (let b = 0; b < 4; b++) {
                const ba = ((blipSeed + b) * 2.39996) % (Math.PI * 2);
                const bd = (0.3 + ((blipSeed + b) * 0.618) % 0.6) * radarR;
                const bx = cx + Math.cos(ba) * bd;
                const by = radarCY + Math.sin(ba) * bd;
                // Fade based on proximity to sweep
                let angleDiff = Math.abs(sweepAngle - ba) % (Math.PI * 2);
                if (angleDiff > Math.PI) angleDiff = Math.PI * 2 - angleDiff;
                const blipAlpha = Math.max(0, 1 - angleDiff / 1.5) * 0.8;
                if (blipAlpha > 0.05) {
                    ctx.fillStyle = `rgba(0,255,240,${blipAlpha})`;
                    ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 6;
                    ctx.beginPath(); ctx.arc(bx, by, 3, 0, Math.PI * 2); ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            // Orbiting dots
            for (let o = 0; o < 3; o++) {
                const oa = this.animPhase * (1.2 + o * 0.4) + o * (Math.PI * 2 / 3);
                const od = radarR + 12;
                const ox = cx + Math.cos(oa) * od;
                const oy = radarCY + Math.sin(oa) * od;
                ctx.fillStyle = ['#aa00ff', '#00ffcc', '#ff6e00'][o];
                ctx.globalAlpha = 0.5;
                ctx.beginPath(); ctx.arc(ox, oy, 2.5, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1;
            }

            // Center dot
            ctx.fillStyle = '#aa00ff'; ctx.shadowColor = '#aa00ff'; ctx.shadowBlur = 10;
            ctx.beginPath(); ctx.arc(cx, radarCY, 4, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;

            // Progress arc (around radar)
            const arcR = radarR + 6;
            ctx.strokeStyle = 'rgba(170,0,255,0.15)'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(cx, radarCY, arcR, -Math.PI / 2, Math.PI * 1.5); ctx.stroke();
            ctx.strokeStyle = '#aa00ff'; ctx.lineWidth = 4;
            ctx.shadowColor = '#aa00ff'; ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.arc(cx, radarCY, arcR, -Math.PI / 2, -Math.PI / 2 + progress * Math.PI * 2);
            ctx.stroke(); ctx.shadowBlur = 0;

            // Phase status message
            let phase, phaseColor;
            if (remaining > 22) { phase = 'Scanning for opponents...'; phaseColor = '#aa00ff'; }
            else if (remaining > 15) { phase = 'Searching worldwide...'; phaseColor = '#7c4dff'; }
            else if (remaining > 8) { phase = 'Expanding search range...'; phaseColor = '#ff6e00'; }
            else if (remaining > 3) { phase = 'Preparing AI opponent...'; phaseColor = '#ff4444'; }
            else { phase = 'AI Bot joining!'; phaseColor = '#00ff88'; }

            ctx.fillStyle = phaseColor;
            ctx.font = 'bold 14px -apple-system, Arial';
            ctx.fillText(phase, cx, radarCY + radarR + 35);

            // Countdown timer — large
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 36px -apple-system, Arial';
            ctx.shadowColor = '#aa00ff'; ctx.shadowBlur = 12;
            ctx.fillText(remaining + 's', cx, radarCY + radarR + 75);
            ctx.shadowBlur = 0;

            // Progress bar below
            const barW = W - 80, barH = 6, barX = 40, barY = radarCY + radarR + 95;
            ctx.fillStyle = 'rgba(170,0,255,0.12)';
            this.renderer._roundRect(ctx, barX, barY, barW, barH, 3);
            ctx.fill();
            const fillW = barW * progress;
            const barGrad = ctx.createLinearGradient(barX, barY, barX + fillW, barY);
            barGrad.addColorStop(0, '#aa00ff');
            barGrad.addColorStop(1, remaining > 8 ? '#7c4dff' : (remaining > 3 ? '#ff6e00' : '#00ff88'));
            ctx.fillStyle = barGrad;
            this.renderer._roundRect(ctx, barX, barY, fillW, barH, 3);
            ctx.fill();

            // Cancel button
            const cancelY = barY + 30, cancelW = 180, cancelH = 48;
            const cancelX = cx - cancelW / 2;
            ctx.fillStyle = 'rgba(255,68,68,0.12)';
            this.renderer._roundRect(ctx, cancelX, cancelY, cancelW, cancelH, 24);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,68,68,0.35)'; ctx.lineWidth = 1.5;
            this.renderer._roundRect(ctx, cancelX, cancelY, cancelW, cancelH, 24);
            ctx.stroke();
            ctx.fillStyle = '#ff6b6b'; ctx.font = 'bold 15px -apple-system, Arial';
            ctx.fillText('CANCEL', cx, cancelY + cancelH / 2 + 5);
        }
    }

        // Back button
        ctx.fillStyle = 'rgba(0,255,240,0.08)';

        ctx.fill();
        ctx.strokeStyle = 'rgba(0,255,240,0.2)';

        // Opponent score
        const oppScore = this.mpWaitingRoomData ? (this.mpWaitingRoomData.innings1Score || 0) : 0;
        ctx.fillStyle = '#aa00ff';
        ctx.font = 'bold 56px -apple-system, Arial';

        ctx.font = 'bold 14px -apple-system, Arial';

        const diffColor = { easy: '#00ff88', medium: '#00ffcc', hard: '#ff6e00', legend: '#ff0080' }[this.mpSelectedDifficulty] || '#00ffcc';

        ctx.font = 'bold 11px -apple-system, Arial';
        ctx.fillText(this.mpSelectedDifficulty.toUpperCase(), cx, cardY + 195);

        const startY = 520, startW = 200, startH = 50;
        const startX = cx - startW / 2;
        const startGrad = ctx.createLinearGradient(startX, startY, startX, startY + startH);

        ctx.shadowBlur = 0;
        ctx.fillStyle = '#ffffff';

    }

    _drawMpResult() {
        const ctx = this.renderer.ctx;
        const cx = DESIGN.width / 2;
        const W = DESIGN.width, H = DESIGN.height;

        // Background
        const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
        bgGrad.addColorStop(0, '#050510');
        bgGrad.addColorStop(0.5, '#0c1020');
        bgGrad.addColorStop(1, '#050510');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, W, H);

        const playerScore = this.score.player;
        const opponentScore = this.mpTarget - 1; // bot's actual goals
        const won = playerScore > opponentScore;
        const draw = playerScore === opponentScore;

        // Result glow
        const glowColor = won ? '#00ffcc' : (draw ? '#ffea00' : '#ff1744');
        const glow = ctx.createRadialGradient(cx, 180, 10, cx, 180, 250);
        glow.addColorStop(0, Utils.hexToRgba(glowColor, 0.2));
        glow.addColorStop(0.5, Utils.hexToRgba(glowColor, 0.05));
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, W, 450);

        // Title
        ctx.shadowColor = glowColor;
        ctx.shadowBlur = 25;
        ctx.fillStyle = glowColor;
        ctx.font = 'bold 40px -apple-system, Arial';
        ctx.textAlign = 'center';
        ctx.fillText(won ? 'VICTORY!' : (draw ? 'DRAW!' : 'DEFEATED'), cx, 120);
        ctx.shadowBlur = 0;

        // Scores — side by side
        const scoreY = 200;
        // Player score (left)
        ctx.fillStyle = '#00ffcc';
        ctx.font = 'bold 11px -apple-system, Arial';
        ctx.fillText('YOU', cx - 70, scoreY - 30);
        ctx.font = 'bold 52px -apple-system, Arial';
        ctx.fillText(playerScore, cx - 70, scoreY);

        // VS
        ctx.fillStyle = 'rgba(200,200,200,0.4)';
        ctx.font = '20px -apple-system, Arial';
        ctx.fillText('vs', cx, scoreY - 8);

        // Opponent score (right)
        ctx.fillStyle = '#aa00ff';
        ctx.font = 'bold 11px -apple-system, Arial';
        ctx.fillText('BOT', cx + 70, scoreY - 30);
        ctx.font = 'bold 52px -apple-system, Arial';
        ctx.fillText(opponentScore, cx + 70, scoreY);

        // Difficulty badge
        ctx.fillStyle = 'rgba(170,0,255,0.2)';
        this.renderer._roundRect(ctx, cx - 50, scoreY + 20, 100, 22, 11);
        ctx.fill();
        ctx.fillStyle = 'rgba(170,0,255,0.7)';
        ctx.font = 'bold 10px -apple-system, Arial';
        ctx.fillText(this.mpSelectedDifficulty.toUpperCase(), cx, scoreY + 35);

        // Result message
        ctx.fillStyle = glowColor;
        ctx.font = '14px -apple-system, Arial';
        const msg = won ? 'You outscored the opponent!' : (draw ? 'Evenly matched!' : 'Better luck next time!');
        ctx.fillText(msg, cx, scoreY + 65);

        // Play Again button
        const btnY = 620, btnW = 200, btnH = 50;
        const btnX = cx - btnW / 2;
        const btnGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
        btnGrad.addColorStop(0, 'rgba(170,0,255,0.2)');
        btnGrad.addColorStop(1, 'rgba(170,0,255,0.05)');
        ctx.fillStyle = btnGrad;
        this.renderer._roundRect(ctx, btnX, btnY, btnW, btnH, 14);
        ctx.fill();
        ctx.shadowColor = '#aa00ff';
        ctx.shadowBlur = 10;
        ctx.strokeStyle = 'rgba(170,0,255,0.4)';
        ctx.lineWidth = 1.5;
        this.renderer._roundRect(ctx, btnX, btnY, btnW, btnH, 14);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#aa00ff';
        ctx.font = 'bold 16px -apple-system, Arial';
        ctx.textAlign = 'center';
        ctx.fillText('PLAY AGAIN', cx, btnY + btnH / 2 + 5);

        // Menu button
        const menuY = 690, menuW = 200, menuH = 50;
        const menuX = cx - menuW / 2;
        const menuGrad = ctx.createLinearGradient(menuX, menuY, menuX, menuY + menuH);
        menuGrad.addColorStop(0, 'rgba(0,229,255,0.15)');
        menuGrad.addColorStop(1, 'rgba(0,229,255,0.05)');
        ctx.fillStyle = menuGrad;
        this.renderer._roundRect(ctx, menuX, menuY, menuW, menuH, 14);
        ctx.fill();
        ctx.shadowColor = '#00e5ff';
        ctx.shadowBlur = 8;
        ctx.strokeStyle = 'rgba(0,229,255,0.3)';
        ctx.lineWidth = 1.5;
        this.renderer._roundRect(ctx, menuX, menuY, menuW, menuH, 14);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#00e5ff';
        ctx.font = 'bold 16px -apple-system, Arial';
        ctx.textAlign = 'center';
        ctx.fillText('BACK TO MENU', cx, menuY + menuH / 2 + 5);
    }

    // ====== UPDATE ======

    _update() {
        this.animPhase += 0.016;
        this.touch.update();

        switch (this.state) {
            case 'menu':
                this._updateMenu();
                break;
            case 'multiplayer_lobby':
                this._updateMultiplayerLobby();
                break;
            case 'mp_create_room':
                this._updateCreateRoom();
                break;
            case 'mp_join_room':
                this._updateJoinRoom();
                break;
            case 'mp_waiting':
                this._updateMpWaiting();
                break;
            case 'mp_result':
                this._updateMpResult();
                break;
            case 'shop':
                this._updateShop();
                break;
            case 'campaign':
                this._updateCampaign();
                break;
            case 'playing':
                this._updatePlaying();
                break;
            case 'shooting':
                this._updateShooting();
                break;
            case 'result':
                this._updateResult();
                break;
            case 'gameover':
                this._updateGameOver();
                break;
            case 'campaign_result':
                this._updateCampaignResult();
                break;
            case 'leaderboard':
                this._updateLeaderboard();
                break;
            case 'stats':
                this._updateStats();
                break;
            case 'achievements_screen':
                this._updateAchievementsScreen();
                break;
        }

        this.particles.update();
    }

    _updateMenu() {
        let tap = this.touch.consumeTap();
        while (tap) {
            if (this.menuButtons) {
                this.menuButtons.difficulties.forEach(d => {
                    if (d._rect && tap.x >= d._rect.x && tap.x <= d._rect.x + d._rect.w &&
                        tap.y >= d._rect.y && tap.y <= d._rect.y + d._rect.h) {
                        this.difficulty = d.id;
                        this._saveProgress(); // Persist difficulty preference
                        this.audio.play('click');
                        Utils.haptic(5);
                    }
                });

                const pb = this.menuButtons.play;
                if (tap.x >= pb.x && tap.x <= pb.x + pb.w && tap.y >= pb.y && tap.y <= pb.y + pb.h) {
                    this.mpIsChaser = false; // Reset MP mode for normal play
                    this.mpIsBotMatch = false;
                    this.startGame(this.difficulty);
                    this.audio.play('click');
                    Utils.haptic(10);
                }

                const sb = this.menuButtons.sound;
                if (tap.x >= sb.x && tap.x <= sb.x + sb.w && tap.y >= sb.y && tap.y <= sb.y + sb.h) {
                    this.audio.toggle();
                    this._saveProgress(); // Persist audio mute setting
                    Utils.haptic(5);
                }

                // Shop button
                if (this.menuButtons.shop) {
                    const sh = this.menuButtons.shop;
                    if (tap.x >= sh.x && tap.x <= sh.x + sh.w && tap.y >= sh.y && tap.y <= sh.y + sh.h) {
                        this.state = 'shop';
                        this.shopTab = 0;
                        this.shopScroll = 0;
                        this.audio.play('click');
                        Utils.haptic(5);
                    }
                }

                // Daily reward button
                if (this.menuButtons.daily) {
                    const dr = this.menuButtons.daily;
                    if (tap.x >= dr.x && tap.x <= dr.x + dr.w && tap.y >= dr.y && tap.y <= dr.y + dr.h) {
                        this._claimDailyReward();
                        this.audio.play('click');
                        Utils.haptic(10);
                    }
                }

                // Campaign button
                if (this.menuButtons.campaign) {
                    const cam = this.menuButtons.campaign;
                    if (tap.x >= cam.x && tap.x <= cam.x + cam.w && tap.y >= cam.y && tap.y <= cam.y + cam.h) {
                        this.state = 'campaign';
                        this.audio.play('click');
                        Utils.haptic(8);
                    }
                }

                // Multiplayer button
                if (this.menuButtons.multiplayer) {
                    const mp = this.menuButtons.multiplayer;
                    if (tap.x >= mp.x && tap.x <= mp.x + mp.w && tap.y >= mp.y && tap.y <= mp.y + mp.h) {
                        this.state = 'multiplayer_lobby';
                        this.mpSelectedDifficulty = 'medium';
                        this.audio.play('click');
                        Utils.haptic(8);
                    }
                }

                // Stats button
                if (this.menuButtons.stats) {
                    const st = this.menuButtons.stats;
                    if (tap.x >= st.x && tap.x <= st.x + st.w && tap.y >= st.y && tap.y <= st.y + st.h) {
                        this.state = 'stats';
                        this.audio.play('click');
                        Utils.haptic(8);
                    }
                }
                // Leaderboard button
                if (this.menuButtons.leaderboard) {
                    const lb = this.menuButtons.leaderboard;
                    if (tap.x >= lb.x && tap.x <= lb.x + lb.w && tap.y >= lb.y && tap.y <= lb.y + lb.h) {
                        this.state = 'leaderboard';
                        this._leaderboardData = null;
                        this._leaderboardLoading = true;
                        this._leaderboardRank = null;
                        this._fetchLeaderboard();
                        this.audio.play('click');
                        Utils.haptic(8);
                    }
                }
                // Achievements button
                if (this.menuButtons.achievementsBtn) {
                    const ab = this.menuButtons.achievementsBtn;
                    if (tap.x >= ab.x && tap.x <= ab.x + ab.w && tap.y >= ab.y && tap.y <= ab.y + ab.h) {
                        this.state = 'achievements_screen';
                        this.audio.play('click');
                        Utils.haptic(8);
                    }
                }
            }
            tap = this.touch.consumeTap();
        }
    }

    // ====== SHOP STATE ======

    _updateShop() {
        // Tick shop message timer
        if (this.shopMessage) {
            this.shopMessage.timer--;
            if (this.shopMessage.timer <= 0) this.shopMessage = null;
        }

        let tap = this.touch.consumeTap();
        while (tap) {
            if (this.shopButtons) {
                // Back button
                const bb = this.shopButtons.back;
                if (bb && tap.x >= bb.x && tap.x <= bb.x + bb.w && tap.y >= bb.y && tap.y <= bb.y + bb.h) {
                    this.state = 'menu';
                    this.audio.play('click');
                    Utils.haptic(5);
                    tap = this.touch.consumeTap();
                    continue;
                }

                // Tab buttons
                if (this.shopButtons.tabs) {
                    this.shopButtons.tabs.forEach((t, i) => {
                        if (tap.x >= t.x && tap.x <= t.x + t.w && tap.y >= t.y && tap.y <= t.y + t.h) {
                            this.shopTab = i;
                            this.shopScroll = 0;
                            this.audio.play('click');
                            Utils.haptic(5);
                        }
                    });
                }

                // Item buttons (buy or equip)
                if (this.shopButtons.items) {
                    this.shopButtons.items.forEach(btn => {
                        if (tap.x >= btn.x && tap.x <= btn.x + btn.w && tap.y >= btn.y && tap.y <= btn.y + btn.h) {
                            this._handleShopItemTap(btn.category, btn.itemId);
                            Utils.haptic(8);
                        }
                    });
                }

                // Ad reward button
                if (this.shopButtons.adReward) {
                    const ar = this.shopButtons.adReward;
                    if (tap.x >= ar.x && tap.x <= ar.x + ar.w && tap.y >= ar.y && tap.y <= ar.y + ar.h) {
                        this.showRewardedAd('bonus_coins');
                        this._setShopMessage('+ 50 Coins!', '#00e5ff');
                        this.audio.play('click');
                        Utils.haptic(10);
                    }
                }

                // Coin pack buttons (on Premium tab)
                if (this.shopButtons.coinPacks) {
                    this.shopButtons.coinPacks.forEach(cp => {
                        if (tap.x >= cp.x && tap.x <= cp.x + cp.w && tap.y >= cp.y && tap.y <= cp.y + cp.h) {
                            this._handleCoinPackPurchase(cp.packId);
                            Utils.haptic(12);
                        }
                    });
                }

                // Premium IAP buttons
                if (this.shopButtons.premiumItems) {
                    this.shopButtons.premiumItems.forEach(pi => {
                        if (tap.x >= pi.x && tap.x <= pi.x + pi.w && tap.y >= pi.y && tap.y <= pi.y + pi.h) {
                            this._handlePremiumPurchase(pi.productId);
                            Utils.haptic(12);
                        }
                    });
                }

                // Restore Purchases button
                if (this.shopTab === 4) { // Premium tab
                    if (this._restoreBtnX !== undefined) {
                        if (tap.x >= this._restoreBtnX && tap.x <= this._restoreBtnX + this._restoreBtnW &&
                            tap.y >= this._restoreBtnY && tap.y <= this._restoreBtnY + this._restoreBtnH) {
                            this.restorePurchases();
                            Utils.haptic(12);
                        }
                    }
                    // Privacy Policy link
                    if (this._privacyBtnY !== undefined) {
                        const ppW = 100, ppH = 20;
                        const ppX = this.renderer.canvas.width / 2 - ppW / 2;
                        if (tap.x >= ppX && tap.x <= ppX + ppW && tap.y >= this._privacyBtnY && tap.y <= this._privacyBtnY + ppH) {
                            window.open('https://alpittare.github.io/privacy-policy/', '_blank');
                            Utils.haptic(10);
                        }
                    }
                }
            }
            tap = this.touch.consumeTap();
        }
    }

    _handleCoinPackPurchase(packId) {
        const pack = this.coinPacks.find(p => p.id === packId);
        if (!pack) return;
        this.audio.play('click');
        Haptics.impact('medium');
        // Native IAP via Capacitor plugin (cordova-plugin-purchase / @capgo/capacitor-purchases)
        if (window.CdvPurchase && window.CdvPurchase.store) {
            const store = window.CdvPurchase.store;
            const product = store.get(packId);
            if (product) {
                store.order(product).then(() => {
                    console.log(`[IAP] Purchase initiated: ${packId}`);
                }).catch(err => {
                    console.error('[IAP] Purchase failed:', err);
                    this._setShopMessage('Purchase failed', '#ff4444');
                    Haptics.notification('error');
                });
            } else {
                console.warn('[IAP] Product not found:', packId);
                this._setShopMessage('Store not available', '#ff9800');
            }
        } else {
            // Web fallback — simulate for testing
            console.log(`[IAP-SIM] Simulated purchase: ${pack.id} for ${pack.price}`);
            this._awardCoins(pack.coins, `Coin Pack: ${pack.price}`);
            this._setShopMessage(`+${pack.coins.toLocaleString()} Coins!`, '#ffc107');
        }
    }

    _handlePremiumPurchase(productId) {
        const product = this.iapProducts.find(p => p.id === productId);
        if (!product) return;
        this.audio.play('click');
        Haptics.impact('medium');
        // Native IAP via Capacitor plugin
        if (window.CdvPurchase && window.CdvPurchase.store) {
            const store = window.CdvPurchase.store;
            const storeProduct = store.get(productId);
            if (storeProduct) {
                store.order(storeProduct).then(() => {
                    console.log(`[IAP] Premium purchase initiated: ${productId}`);
                }).catch(err => {
                    console.error('[IAP] Premium purchase failed:', err);
                    this._setShopMessage('Purchase failed', '#ff4444');
                    Haptics.notification('error');
                });
            } else {
                this._setShopMessage('Store not available', '#ff9800');
            }
        } else {
            // Web fallback — simulate for testing
            console.log(`[IAP-SIM] Premium purchase: ${product.name} for ${product.price}`);
            this.handleIAP(productId);
            if (productId === 'remove_ads') {
                this.hasRemoveAds = true;
                this._setShopMessage('Ads Removed!', '#00e5ff');
            } else if (productId === 'starter_bundle') {
                this._awardCoins(2000, 'Starter Bundle');
                this.hasRemoveAds = true;
                const goldenBall = this.unlocks.balls.find(b => b.id === 'golden');
                if (goldenBall) goldenBall.unlocked = true;
                this._setShopMessage('Starter Bundle Activated!', '#00e5ff');
            }
            this._saveProgress();
        }
    }

    _handleShopItemTap(category, itemId) {
        const items = this.unlocks[category];
        if (!items) return;
        const item = items.find(i => i.id === itemId);
        if (!item) return;

        if (item.unlocked) {
            // Equip it
            this._equipItem(category, itemId);
            this._setShopMessage(`Equipped ${item.name}!`, '#2196f3');
            this.audio.play('click');
        } else {
            // Try to buy
            const result = this.purchaseItem(category, itemId);
            if (result.success) {
                this._equipItem(category, itemId);
                this._setShopMessage(`Bought ${item.name}!`, '#00e5ff');
                this.audio.play('click');
            } else {
                this._setShopMessage(result.msg, '#ef5350');
                this.audio.play('tap');
            }
        }
    }

    _equipItem(category, itemId) {
        switch (category) {
            case 'stadiums': this.activeStadium = itemId; break;
            case 'balls':    this.activeBall = itemId; break;
            case 'skins':    this.activeSkin = itemId; break;
            case 'bots':
                this.activeBot = itemId;
                this._applyEquippedBot();
                break;
        }
        console.log(`[EQUIP] ${category}: ${itemId}`);
        this._saveProgress();
    }

    _getActiveIdForTab(tabIndex) {
        switch (tabIndex) {
            case 0: return this.activeBot;
            case 1: return this.activeBall;
            case 2: return this.activeStadium;
            case 3: return this.activeSkin;
            case 4: return null; // Premium tab has no equip
        }
        return null;
    }

    _getCategoryForTab(tabIndex) {
        return ['bots', 'balls', 'stadiums', 'skins', 'premium'][tabIndex] || 'bots';
    }

    _setShopMessage(text, color) {
        this.shopMessage = { text, color, timer: 90 }; // ~1.5 seconds
    }

    // CRITICAL: Apply equipped bot boosts to assistBot — called on init, equip, and game start
    _applyEquippedBot() {
        if (!this.assistBot.enabled) return; // bot not unlocked yet
        const botItem = (this.unlocks.bots || []).find(b => b.id === this.activeBot);
        if (botItem && botItem.boosts) {
            this.assistBot.boosts = { ...botItem.boosts };
            console.log('[BOT] Applied equipped bot:', this.activeBot,
                'PWR:', botItem.boosts.powerBoost,
                'SRG:', botItem.boosts.surgeGainMult,
                'AIM:', botItem.boosts.aimSteady);
        }
    }

    _claimDailyReward() {
        const today = new Date().toISOString().split('T')[0];
        if (this.dailyReward.lastClaimDate === today) {
            this._setShopMessage('Already claimed today!', '#ffa726');
            return;
        }

        // Check streak continuity
        if (this.dailyReward.lastClaimDate) {
            const lastDate = new Date(this.dailyReward.lastClaimDate);
            const diff = Math.floor((new Date(today) - lastDate) / 86400000);
            if (diff === 1) {
                this.dailyReward.streak = Math.min(this.dailyReward.streak + 1, this.dailyReward.rewards.length - 1);
            } else {
                this.dailyReward.streak = 0; // reset if missed a day
            }
        }

        const reward = this.dailyReward.rewards[this.dailyReward.streak];
        this._awardCoins(reward, `Day ${this.dailyReward.streak + 1} reward`);
        this.dailyReward.lastClaimDate = today;
        this.dailyReward.claimed = true;
        this.dailyBonusClaimed = true;
        this._setShopMessage(`Day ${this.dailyReward.streak + 1}: +${reward} Coins!`, '#00e5ff');
    }

    // Ball effect: applied during _shoot()
    _getBallEffect() {
        const ball = this.unlocks.balls.find(b => b.id === this.activeBall);
        return ball ? ball.effect : null;
    }

    // ====== CAMPAIGN STATE ======

    _updateCampaign() {
        let tap = this.touch.consumeTap();
        while (tap) {
            if (this.campaignButtons) {
                // Back button
                const back = this.campaignButtons.back;
                if (back && tap.x >= back.x && tap.x <= back.x + back.w && tap.y >= back.y && tap.y <= back.y + back.h) {
                    this.state = 'menu';
                    this.audio.play('click');
                    Utils.haptic(5);
                    tap = this.touch.consumeTap();
                    continue;
                }

                // Level selection — use for loop so we can break on first match
                if (this.campaignButtons.levels) {
                    let matched = false;
                    for (let i = 0; i < this.campaignButtons.levels.length; i++) {
                        const btn = this.campaignButtons.levels[i];
                        if (btn.unlocked && tap.x >= btn.x && tap.x <= btn.x + btn.w && tap.y >= btn.y && tap.y <= btn.y + btn.h) {
                            this._startCampaignLevel(btn.level);
                            Utils.haptic(10);
                            matched = true;
                            break;
                        }
                    }
                }
            } else {
            }
            tap = this.touch.consumeTap();
        }
    }

    _startCampaignLevel(levelNum) {
        const levelCfg = FOOTBALL_LEVELS[levelNum - 1];
        if (!levelCfg) { console.warn('[CAMPAIGN] No level config for', levelNum); return; }

        // Map campaign level to AI difficulty
        const mappedDifficulty = levelNum <= 10 ? 'easy' :
                                  levelNum <= 30 ? 'medium' :
                                  levelNum <= 60 ? 'hard' : 'legend';

        // Use the SAME startGame() path as normal play — just pass the level config
        this.startGame(mappedDifficulty, levelCfg);
    }

    _updatePlaying() {
        this.audio.resume();
        this._updateSurge();

        // Animate assist bot position (hover near player)
        if (this.assistBot.enabled) {
            this.assistBot.animPhase += 0.04;
            this.assistBot.x = this.playerX - 50 + Math.sin(this.assistBot.animPhase * 0.5) * 5;
            this.assistBot.y = this.playerY + 5 + Math.sin(this.assistBot.animPhase) * 3;
            this._updateBotVisuals();
        }

        // Update unlock banner timer
        if (this._pendingUnlock) {
            this._unlockBannerTimer++;
            if (this._unlockBannerTimer > 180) { // 3 seconds
                this._pendingUnlock = null;
                this._unlockBannerTimer = 0;
            }
        }

        const goalLeft = DESIGN.width / 2 - DESIGN.goalWidth / 2 + 15;
        const goalRight = DESIGN.width / 2 + DESIGN.goalWidth / 2 - 15;
        const goalCenterX = (goalLeft + goalRight) / 2;
        const goalHalfRange = (goalRight - goalLeft) / 2;

        const goalCenterY = (DESIGN.goalLineY + DESIGN.crossbarY) / 2;

        // === SWIPE-DRIVEN AIM (no joystick — pure skill) ===
        const sw = this.touch.swipe;

        if (!this.aimLocked) {
            // Silently track aim from live swipe (no visual)
            if (sw.active) {
                const hSens = 1.8;
                const vSens = 1.2;
                this.aimX = goalCenterX + (sw.liveDx * hSens);
                this.aimY = goalCenterY + (sw.liveDy * vSens);

                if (this.assistBot.enabled && this.assistBot.boosts.aimSteady > 0) {
                    const sf = this.assistBot.boosts.aimSteady;
                    this.aimX = this.aimX + (goalCenterX - this.aimX) * sf * 0.3;
                    this.aimY = this.aimY + (goalCenterY - this.aimY) * sf * 0.3;
                }

                this.aimX = Utils.clamp(this.aimX, goalLeft, goalRight);
                this.aimY = Utils.clamp(this.aimY, DESIGN.crossbarY + 5, DESIGN.goalLineY);
            } else {
                // Idle — aim stays at center
                this.aimX = goalCenterX;
                this.aimY = goalCenterY;
            }
        }

        // === POWER BAR: Auto-oscillates up/down, locked on swipe ===
        if (!this.aimLocked) {
            this.shotPower += 0.018 * this.powerDirection;
            if (this.shotPower >= 1) { this.shotPower = 1; this.powerDirection = -1; }
            if (this.shotPower <= 0.1) { this.shotPower = 0.1; this.powerDirection = 1; }
        }

        // Swipe to shoot — direction from swipe, power locked at current bar level
        const swipe = sw.consumeSwipe();
        if (swipe && swipe.dy < -10) {
            // Final aim from swipe direction
            const hSens = 1.8;
            const vSens = 1.2;
            this.aimX = Utils.clamp(goalCenterX + (swipe.dx * hSens), goalLeft, goalRight);
            this.aimY = Utils.clamp(goalCenterY + (swipe.dy * vSens), DESIGN.crossbarY + 5, DESIGN.goalLineY);

            if (this.assistBot.enabled && this.assistBot.boosts.aimSteady > 0) {
                const sf = this.assistBot.boosts.aimSteady;
                this.aimX = this.aimX + (goalCenterX - this.aimX) * sf * 0.3;
            }

            this.aimLocked = true;
            this._curveHintAlpha = 0; // dismiss hint on shoot
            // Store swipe data for curve calculation in _shoot()
            this._lastSwipeDx = swipe.dx;
            this._lastSwipeDy = swipe.dy;
            // Power is locked at whatever the oscillating bar was showing
            this._shoot();
        }

        // Tap detection for UI buttons
        let tap = this.touch.consumeTap();
        while (tap) {
            // Back button (top-left)
            const bb = this._backBtnHit;
            if (bb && tap.x >= bb.x && tap.x <= bb.x + bb.w && tap.y >= bb.y && tap.y <= bb.y + bb.h) {
                this.state = 'menu';
                this.audio.play('tap');
                return;
            }
            // Surge badge strip zone: generous tap area on left side
            const meterTop = 240;  // extended upward for easier tapping
            const meterBot = 500;  // extended downward
            if (this.surge.availableLevel >= 1 && !this.surge.active &&
                tap.x < 90 && tap.y > meterTop && tap.y < meterBot) {
                console.log('[SURGE] Tap hit! Activating surge level', this.surge.availableLevel);
                this._activateSurge();
            }
            tap = this.touch.consumeTap();
        }

        // Keeper idle animation
        const config = this.difficultyConfig[this.difficulty];
        this.keeper.update(config.diveSpeed);

        // AI anticipation — ALL levels use ML prediction, scaled by difficulty
        if (config.anticipation && this.ml.shotHistory.length >= 3 && this.keeper.state === 'idle') {
            const pred = this.ml.predict();
            const goalCX = DESIGN.width / 2;

            // Anticipation aggressiveness scales by difficulty
            const anticipationScale = {
                easy: 0,       // easy never anticipates (config.anticipation=false anyway)
                medium: 0,     // medium never anticipates
                hard: 0.6,     // moderate anticipation
                legend: 1.0    // full aggressive anticipation
            };
            const antScale = anticipationScale[this.difficulty] || 0;

            if (pred.confidence > 0.5) {
                this.keeper.state = 'anticipate';
                const shiftAmount = (20 + pred.confidence * 25) * antScale; // scaled shift
                if (pred.direction === 'left') this.keeper.targetX = goalCX - shiftAmount;
                else if (pred.direction === 'right') this.keeper.targetX = goalCX + shiftAmount;
                else this.keeper.targetX = goalCX;
            } else if (antScale > 0.7) {
                // Low confidence (legend only): subtle micro-movement to track aim
                this.keeper.state = 'anticipate';
                this.keeper.targetX = Utils.lerp(this.keeper.x, this.aimX, 0.02);
            }
        }
    }

    _updateShooting() {
        this.ball.update();
        this._updateSurge();
        this._updateBotVisuals();
        this._updateDualBall();
        const config = this.difficultyConfig[this.difficulty];
        this.keeper.update(this.keeper.diveSpeedOverride || config.diveSpeed);
        this._checkGoal();
    }

    _updateResult() {
        this.resultTimer++;
        if (this.celebrating) this.celebrationTimer++;
        const config = this.difficultyConfig[this.difficulty];
        this.keeper.update(config.diveSpeed);

        // Longer pause on goals for celebration, shorter on misses
        const waitTime = this.celebrating ? 110 : 75;
        if (this.resultTimer > waitTime) {
            this._nextRound();
        }
    }

    _updateGameOver() {
        let tap = this.touch.consumeTap();
        while (tap) {
            if (this.gameOverButtons) {
                const mb = this.gameOverButtons.menu;
                if (tap.x >= mb.x && tap.x <= mb.x + mb.w && tap.y >= mb.y && tap.y <= mb.y + mb.h) {
                    this.state = 'menu';
                    this.audio.play('click');
                    Utils.haptic(10);
                }
                const pb = this.gameOverButtons.play;
                if (tap.x >= pb.x && tap.x <= pb.x + pb.w && tap.y >= pb.y && tap.y <= pb.y + pb.h) {
                    this.mpIsChaser = false; // Reset MP mode
                    this.mpIsBotMatch = false;
                    this.startGame(this.difficulty);
                    this.audio.play('click');
                    Utils.haptic(10);
                }
            }
            tap = this.touch.consumeTap();
        }
    }

    // ========== CAMPAIGN RESULT SCREEN ==========

    _updateCampaignResult() {
        let tap = this.touch.consumeTap();
        while (tap) {
            if (this._crButtons) {
                for (const btn of this._crButtons) {
                    if (tap.x >= btn.x && tap.x <= btn.x + btn.w && tap.y >= btn.y && tap.y <= btn.y + btn.h) {
                        this.audio.play('click');
                        Utils.haptic(10);
                        btn.action();
                        return;
                    }
                }
            }
            tap = this.touch.consumeTap();
        }
    }

    _drawCampaignResult(ctx) {
        const W = DESIGN.width, H = DESIGN.height;
        const lc = this.currentLevelConfig;
        if (!lc) return;
        const levelNum = lc.level;
        const goalsScored = this.score.player;
        const targetGoals = lc.targetGoals;
        const won = goalsScored >= targetGoals;
        const stars = this.levelStars[levelNum] || 0;
        const t = Date.now();

        // Dark overlay
        ctx.fillStyle = won ? 'rgba(0, 15, 5, 0.92)' : 'rgba(15, 5, 0, 0.92)';
        ctx.fillRect(0, 0, W, H);

        // Panel
        const px = 16, py = 40, pw = W - 32, ph = H - 80;
        ctx.fillStyle = 'rgba(10, 15, 30, 0.9)';
        ctx.strokeStyle = won ? 'rgba(0, 255, 136, 0.3)' : 'rgba(255, 100, 50, 0.3)';
        ctx.lineWidth = 2;
        this.renderer._roundRect(ctx, px, py, pw, ph, 16);
        ctx.fill();
        ctx.stroke();

        // Level header
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.font = 'bold 13px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('LEVEL ' + levelNum, W / 2, py + 25);
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.font = '10px sans-serif';
        ctx.fillText(lc.name || '', W / 2, py + 42);

        // Result
        if (won) {
            ctx.save();
            ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 20;
            ctx.font = '40px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('⚽', W / 2, py + 80);
            ctx.restore();
            ctx.fillStyle = '#00ff88';
            ctx.font = 'bold 22px sans-serif';
            ctx.fillText('LEVEL COMPLETE!', W / 2, py + 112);
        } else {
            ctx.font = '40px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('😤', W / 2, py + 80);
            ctx.fillStyle = '#ff6644';
            ctx.font = 'bold 22px sans-serif';
            ctx.fillText('LEVEL FAILED', W / 2, py + 112);
            ctx.fillStyle = 'rgba(255,100,100,0.5)';
            ctx.font = '10px sans-serif';
            ctx.fillText('Need ' + (targetGoals - goalsScored) + ' more goals', W / 2, py + 130);
        }

        // Score
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 36px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(goalsScored + ' / ' + targetGoals, W / 2, py + 170);
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.font = '10px sans-serif';
        ctx.fillText('GOALS', W / 2, py + 188);

        // Stars
        const starY = py + 220;
        for (let s = 0; s < 3; s++) {
            const sx = W / 2 - 50 + s * 50;
            const earned = s < stars;
            const pulse = earned ? 1 + Math.sin(t * 0.004 + s * 0.8) * 0.1 : 1;
            ctx.save();
            if (earned) { ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 15; }
            ctx.font = (28 * pulse) + 'px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(earned ? '⭐' : '☆', sx, starY);
            ctx.restore();
        }
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.font = '7px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('Pass Level  •  Save 2+ Shots  •  Perfect Round', W / 2, starY + 18);

        // Stats row
        const sY = starY + 45;
        const statsArr = [
            { l: 'ACCURACY', v: this.round > 0 ? Math.round((this.score.player / this.round) * 100) + '%' : '0%' },
            { l: 'STREAK', v: this.bestStreak.toString() },
            { l: 'AI SAVES', v: this.aiSaves.toString() },
        ];
        for (let i = 0; i < statsArr.length; i++) {
            const sx = px + (i % 3) * (pw / 3) + pw / 6;
            ctx.fillStyle = '#00e5ff';
            ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(statsArr[i].v, sx, sY);
            ctx.fillStyle = 'rgba(255,255,255,0.35)';
            ctx.font = '7px sans-serif';
            ctx.fillText(statsArr[i].l, sx, sY + 14);
        }

        // Rewards
        if (won) {
            const rwdY = sY + 35;
            ctx.fillStyle = 'rgba(255,215,0,0.08)';
            this.renderer._roundRect(ctx, px + 20, rwdY, pw - 40, 36, 8);
            ctx.fill();
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('🪙 +' + lc.coinReward, W / 2 - 45, rwdY + 22);
            ctx.fillStyle = '#00ff88';
            ctx.fillText('⚡ +' + lc.xpReward, W / 2 + 45, rwdY + 22);
        }

        // Buttons
        const btnY = py + ph - 60;
        const btnH = 44;
        const hasNext = won && levelNum < 100;
        this._crButtons = [];

        if (hasNext) {
            const smW = 65, bgW = 120, gap = 8;
            const totalW = smW * 2 + bgW + gap * 2;
            const startX = W / 2 - totalW / 2;
            // Retry
            ctx.fillStyle = 'rgba(0,229,255,0.15)';
            this.renderer._roundRect(ctx, startX, btnY, smW, btnH, btnH / 2);
            ctx.fill();
            ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 1.5;
            this.renderer._roundRect(ctx, startX, btnY, smW, btnH, btnH / 2);
            ctx.stroke();
            ctx.fillStyle = '#00e5ff'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('RETRY', startX + smW / 2, btnY + btnH / 2 + 4);
            this._crButtons.push({ x: startX, y: btnY, w: smW, h: btnH, action: () => this._startCampaignLevel(levelNum) });

            // Next Level
            const nX = startX + smW + gap;
            const nGrad = ctx.createLinearGradient(nX, btnY, nX, btnY + btnH);
            nGrad.addColorStop(0, '#00ff88'); nGrad.addColorStop(1, '#00cc66');
            ctx.fillStyle = nGrad;
            this.renderer._roundRect(ctx, nX, btnY, bgW, btnH, btnH / 2);
            ctx.fill();
            ctx.save(); ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 15;
            ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 1.5;
            this.renderer._roundRect(ctx, nX, btnY, bgW, btnH, btnH / 2);
            ctx.stroke();
            ctx.restore();
            ctx.fillStyle = '#000'; ctx.font = 'bold 12px sans-serif';
            ctx.fillText('NEXT LEVEL ▶', nX + bgW / 2, btnY + btnH / 2 + 4);
            this._crButtons.push({ x: nX, y: btnY, w: bgW, h: btnH, action: () => this._startCampaignLevel(levelNum + 1) });

            // Levels
            const lX = nX + bgW + gap;
            ctx.fillStyle = 'rgba(204,68,255,0.15)';
            this.renderer._roundRect(ctx, lX, btnY, smW, btnH, btnH / 2);
            ctx.fill();
            ctx.strokeStyle = '#cc44ff'; ctx.lineWidth = 1.5;
            this.renderer._roundRect(ctx, lX, btnY, smW, btnH, btnH / 2);
            ctx.stroke();
            ctx.fillStyle = '#cc44ff'; ctx.font = 'bold 10px sans-serif';
            ctx.fillText('LEVELS', lX + smW / 2, btnY + btnH / 2 + 4);
            this._crButtons.push({ x: lX, y: btnY, w: smW, h: btnH, action: () => { this.state = 'campaign'; } });
        } else {
            const bW = 110, gap = 16;
            const startX = W / 2 - (bW * 2 + gap) / 2;
            // Retry
            ctx.fillStyle = '#00e5ff';
            this.renderer._roundRect(ctx, startX, btnY, bW, btnH, btnH / 2);
            ctx.fill();
            ctx.fillStyle = '#000'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('RETRY', startX + bW / 2, btnY + btnH / 2 + 4);
            this._crButtons.push({ x: startX, y: btnY, w: bW, h: btnH, action: () => this._startCampaignLevel(levelNum) });

            // Levels
            const lX = startX + bW + gap;
            ctx.fillStyle = '#cc44ff';
            this.renderer._roundRect(ctx, lX, btnY, bW, btnH, btnH / 2);
            ctx.fill();
            ctx.fillStyle = '#fff'; ctx.font = 'bold 12px sans-serif';
            ctx.fillText('LEVELS', lX + bW / 2, btnY + btnH / 2 + 4);
            this._crButtons.push({ x: lX, y: btnY, w: bW, h: btnH, action: () => { this.state = 'campaign'; } });
        }
    }

    // ====== DRAW ======

    _draw() {
        this.renderer.clear();
        const ctx = this.renderer.ctx;

        switch (this.state) {
            case 'menu':
                this.menuButtons = this.renderer.drawMenuScreen(this.difficulty, this.stats, this.animPhase, this.coins, this.dailyReward);
                // Storage warning indicator
                if (!this.storage.isAvailable) {
                    ctx.save();
                    ctx.fillStyle = 'rgba(244,67,54,0.9)';
                    ctx.font = 'bold 10px -apple-system, Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('⚠ Progress will not save — storage unavailable', DESIGN.width / 2, DESIGN.height - 20);
                    ctx.restore();
                }
                break;

            case 'multiplayer_lobby':
                this._drawMultiplayerLobby();
                break;

            case 'mp_create_room':
                this._drawCreateRoom();
                break;

            case 'mp_join_room':
                this._drawJoinRoom();
                break;

            case 'mp_waiting':
                this._drawMpWaiting();
                break;

            case 'mp_result':
                this._drawMpResult();
                break;

            case 'shop':
                this.shopButtons = this.renderer.drawShopScreen(
                    this.unlocks, this.shopTab, this.shopTabs,
                    this.coins, this._getActiveIdForTab(this.shopTab),
                    this._getCategoryForTab(this.shopTab),
                    this.animPhase, this.shopMessage,
                    this.coinPacks, this.iapProducts, this.hasRemoveAds
                );
                break;

            case 'campaign':
                this.campaignButtons = this.renderer.drawLevelSelectScreen(
                    this.campaignLevel, this.levelStars, this.animPhase
                );
                break;

            case 'playing':
            case 'shooting':
            case 'result':
                this._drawGameplay(ctx);
                break;

            case 'gameover':
                this._drawGameplay(ctx);
                this.gameOverButtons = this.renderer.drawGameOverScreen(
                    this.score,
                    {
                        accuracy: this.round > 0 ? Math.round((this.score.player / this.round) * 100) : 0,
                        bestStreak: this.bestStreak,
                        aiSaves: this.aiSaves,
                        difficulty: this.difficulty
                    },
                    this.animPhase
                );
                break;

            case 'campaign_result':
                this._drawGameplay(ctx);
                this._drawCampaignResult(ctx);
                break;

            case 'leaderboard':
                this._drawLeaderboard();
                break;
            case 'stats':
                this._drawStats();
                break;
            case 'achievements_screen':
                this._drawAchievementsScreen();
                break;
        }

        // Achievement toast overlay (renders on top of any screen)
        if (this.achievementToasts && this.achievementToasts.length > 0) {
            const now = Date.now();
            this.achievementToasts = this.achievementToasts.filter(t => now - t.showTime < t.duration);
            const ctx = this.renderer.ctx;
            this.achievementToasts.forEach((toast, i) => {
                const elapsed = now - toast.showTime;
                const alpha = elapsed < 300 ? elapsed / 300 : elapsed > toast.duration - 500 ? (toast.duration - elapsed) / 500 : 1;
                const y = 60 + i * 50;
                ctx.save();
                ctx.globalAlpha = Math.max(0, alpha);
                ctx.fillStyle = 'rgba(10,20,40,0.9)';
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 2;
                const tw = 240, th = 40, tx = (DESIGN.width - tw) / 2;
                ctx.beginPath();
                ctx.roundRect(tx, y, tw, th, 12);
                ctx.fill();
                ctx.stroke();
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 13px -apple-system, Arial';
                ctx.textAlign = 'center';
                ctx.fillText(toast.icon + '  ' + toast.name, DESIGN.width / 2, y + 25);
                ctx.restore();
            });
        }
    }

    _drawGameplay(ctx) {
        // Save transform state before camera
        ctx.save();

        // Apply camera effects (shake + zoom)
        this.renderer.applyCamera(ctx);

        // Layer 0: Stadium background — themed
        this.renderer.drawStadium(this.activeStadium);

        // Layer 1: Premium field — themed
        this.renderer.drawField(this.activeStadium);

        // Layer 2: Premium goal
        this.renderer.drawGoal();

        // Layer 3: Game objects
        this.keeper.draw(ctx);

        // Power Surge player aura (behind player, in camera space)
        if (this.state === 'playing' || this.state === 'shooting') {
            this.renderer.drawPlayerAura(this.playerX, this.playerY, this.surge);
        }

        if (this.state === 'playing') {
            // Draw assist bot(s) behind player
            if (this.assistBot.enabled) {
                this.renderer.drawAssistBot(this.assistBot.x, this.assistBot.y, this.assistBot.animPhase, this.assistBot.tier);
            }
            this._drawPlayer(ctx, this.playerX, this.playerY);
        }

        this.ball.draw(ctx);

        // Draw bot energy link particles
        if (this.assistBot.enabled && this.assistBot.linkParticles.length > 0) {
            this.renderer.drawBotEnergyLink(this.assistBot);
        }
        // Draw dual ball
        if (this.dualBall && this.dualBall.secondBall && this.dualBall.secondBall.active) {
            this.renderer.drawDualBall(this.dualBall.secondBall);
        }

        this.particles.draw(ctx);

        // Aim line (when playing, inside camera space)
        if (this.state === 'playing') {
            this.renderer.drawAimLine(this.playerX, this.playerY, this.aimX, this.aimY, this.shotPower);
        }

        // Layer 5: Vignette & lighting overlay
        this.renderer.drawVignette();

        // Restore transform (exit camera space)
        ctx.restore();

        // ---- UI layer (screen space — not affected by camera) ----

        // Bottom panel (colored background behind scoreboard)
        this.renderer.drawBottomPanel(this.difficulty);

        // Back/Menu button (top-left)
        this._backBtnHit = this.renderer.drawBackButton();

        // Vertical power bar on right side
        if (this.state === 'playing') {
            this.renderer.drawPowerBar(this.shotPower);
        }

        // === CURVE HINT OVERLAY — shows every 5 shots ===
        if (this.state === 'playing' && this._curveHintAlpha > 0) {
            ctx.save();
            const ha = this._curveHintAlpha;
            const hx = DESIGN.width / 2;
            const hy = DESIGN.height * 0.55;
            ctx.globalAlpha = ha * 0.7;
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            const bw = 300, bh = 220, br = 16;
            ctx.beginPath();
            ctx.moveTo(hx - bw/2 + br, hy - bh/2);
            ctx.lineTo(hx + bw/2 - br, hy - bh/2);
            ctx.quadraticCurveTo(hx + bw/2, hy - bh/2, hx + bw/2, hy - bh/2 + br);
            ctx.lineTo(hx + bw/2, hy + bh/2 - br);
            ctx.quadraticCurveTo(hx + bw/2, hy + bh/2, hx + bw/2 - br, hy + bh/2);
            ctx.lineTo(hx - bw/2 + br, hy + bh/2);
            ctx.quadraticCurveTo(hx - bw/2, hy + bh/2, hx - bw/2, hy + bh/2 - br);
            ctx.lineTo(hx - bw/2, hy - bh/2 + br);
            ctx.quadraticCurveTo(hx - bw/2, hy - bh/2, hx - bw/2 + br, hy - bh/2);
            ctx.closePath();
            ctx.fill();
            ctx.globalAlpha = ha;
            ctx.textAlign = 'center';
            ctx.font = 'bold 18px -apple-system, Arial';
            ctx.fillStyle = '#ffcc00';
            ctx.fillText('\u26BD Swipe to Curve!', hx, hy - 80);
            ctx.font = '14px -apple-system, Arial';
            const arrowY = hy - 30;
            const labelGap = 22;
            ctx.fillStyle = '#aaddff';
            ctx.fillText('\u2B06\uFE0F  Straight Up = No Curve', hx, arrowY);
            ctx.fillStyle = '#66eeff';
            ctx.fillText('\u2197\uFE0F  Slight Diagonal = Curve', hx, arrowY + labelGap);
            ctx.fillStyle = '#44ccff';
            ctx.fillText('\u2197\uFE0F\u2197\uFE0F  More Diagonal = Strong Curve', hx, arrowY + labelGap * 2);
            ctx.fillStyle = '#ffcc00';
            ctx.fillText('\uD83C\uDF4C  Max Diagonal = MAX CURVE!', hx, arrowY + labelGap * 3);
            const cx = hx, cy = hy + 55;
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#aaddff';
            ctx.globalAlpha = ha * 0.8;
            ctx.beginPath(); ctx.moveTo(cx, cy + 20); ctx.lineTo(cx, cy - 20); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx - 5, cy - 14); ctx.lineTo(cx, cy - 22); ctx.lineTo(cx + 5, cy - 14); ctx.stroke();
            ctx.strokeStyle = '#66eeff';
            ctx.beginPath(); ctx.moveTo(cx - 25, cy + 18); ctx.lineTo(cx - 50, cy - 15); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx - 44, cy - 9); ctx.lineTo(cx - 52, cy - 17); ctx.lineTo(cx - 44, cy - 17); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx + 25, cy + 18); ctx.lineTo(cx + 50, cy - 15); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx + 44, cy - 9); ctx.lineTo(cx + 52, cy - 17); ctx.lineTo(cx + 44, cy - 17); ctx.stroke();
            ctx.strokeStyle = '#ffcc00';
            ctx.beginPath(); ctx.moveTo(cx - 55, cy + 15); ctx.lineTo(cx - 90, cy - 5); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx - 83, cy + 1); ctx.lineTo(cx - 92, cy - 7); ctx.lineTo(cx - 83, cy - 7); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx + 55, cy + 15); ctx.lineTo(cx + 90, cy - 5); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx + 83, cy + 1); ctx.lineTo(cx + 92, cy - 7); ctx.lineTo(cx + 83, cy - 7); ctx.stroke();
            ctx.restore();
            this._curveHintAlpha -= 0.005;
        }

        // Scoreboard
        this.renderer.drawScoreboard(this.score, this.round, this.maxRounds, this.difficulty, this.streak);

        // Multiplayer target HUD overlay
        if (this.mpIsChaser && this.mpTarget > 0) {
            ctx.save();
            const tgtY = 60;
            const opponentGoals = this.mpTarget - 1; // bot's actual score
            const playerGoals = this.score.player;
            const needed = Math.max(0, (opponentGoals + 1) - playerGoals); // need MORE than opponent
            const isWinning = playerGoals > opponentGoals;
            const isTied = playerGoals === opponentGoals;

            // Target bar background
            ctx.fillStyle = 'rgba(10,15,30,0.8)';
            ctx.beginPath(); ctx.roundRect(DESIGN.width / 2 - 125, tgtY, 250, 30, 10); ctx.fill();
            ctx.strokeStyle = isWinning ? 'rgba(0,255,136,0.5)' : (isTied ? 'rgba(255,234,0,0.5)' : 'rgba(170,0,255,0.4)');
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.roundRect(DESIGN.width / 2 - 125, tgtY, 250, 30, 10); ctx.stroke();

            ctx.textAlign = 'center';
            ctx.font = 'bold 11px -apple-system, Arial';
            if (isWinning) {
                ctx.fillStyle = '#00ff88';
                ctx.fillText('WINNING! You ' + playerGoals + ' - ' + opponentGoals + ' Bot', DESIGN.width / 2, tgtY + 19);
            } else if (isTied) {
                ctx.fillStyle = '#ffea00';
                ctx.fillText('TIED ' + playerGoals + ' - ' + opponentGoals + ' | Score to win!', DESIGN.width / 2, tgtY + 19);
            } else {
                ctx.fillStyle = '#ff8c00';
                ctx.fillText('Beat ' + opponentGoals + ' goals | Need ' + needed + ' more', DESIGN.width / 2, tgtY + 19);
            }
            ctx.restore();
        }

        // ML Debug — disabled for clean gameplay UI
        // if (this.showMLDebug && this.ml.shotHistory.length > 0) {
        //     this.renderer.drawMLDebug(this.ml.getDebugInfo());
        // }

        // ENGINE AI indicator
        if (USE_ENGINE_AI) {
            ctx.save();
            ctx.font = '9px monospace';
            ctx.fillStyle = 'rgba(0, 255, 136, 0.6)';
            ctx.textAlign = 'right';
            ctx.fillText(`ENGINE AI | Bayes:${_aiEngine.fbBayes.totalObservations} Seq:${_aiEngine.fbSeq.historyLength}`, DESIGN.width - 8, DESIGN.height - 4);
            ctx.restore();
        }

        // Compact instruction
        if (this.state === 'playing') {
            this.renderer.drawInstruction(
                'Swipe \u2191 to shoot',
                null
            );
        }

        // Result banner
        if (this.state === 'result' && this.resultText) {
            this.renderer.drawResultBanner(this.resultText, this.resultColor, this.resultTimer);
        }

        // === CURVE SHOT FLASH — tier-based visual feedback ===
        if (this._curveFlash && this._curveFlash > 0.01) {
            ctx.save();
            const cfAlpha = this._curveFlash;
            const cfScale = 1 + (1 - cfAlpha) * 0.4;
            const cfY = DESIGN.height / 2 - 40 - (1 - cfAlpha) * 25;
            ctx.globalAlpha = cfAlpha;
            ctx.translate(DESIGN.width / 2, cfY);
            ctx.scale(cfScale, cfScale);
            ctx.rotate(this._curveFlashDir * (1 - cfAlpha) * 0.1);
            ctx.font = 'bold 26px -apple-system, Arial';
            ctx.textAlign = 'center';
            if (this._curveFlashTier >= 3) {
                ctx.shadowColor = '#ff8800';
                ctx.shadowBlur = 20;
                ctx.fillStyle = '#ffcc00';
                ctx.fillText('\uD83C\uDF4C MAX CURVE!', 0, 0);
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(180,80,0,0.6)';
                ctx.lineWidth = 1;
                ctx.strokeText('\uD83C\uDF4C MAX CURVE!', 0, 0);
            } else if (this._curveFlashTier >= 2) {
                ctx.shadowColor = '#00ccff';
                ctx.shadowBlur = 16;
                ctx.fillStyle = '#66eeff';
                ctx.fillText('\u26A1 STRONG CURVE!', 0, 0);
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(0,100,150,0.5)';
                ctx.lineWidth = 1;
                ctx.strokeText('\u26A1 STRONG CURVE!', 0, 0);
            } else {
                ctx.shadowColor = '#88bbff';
                ctx.shadowBlur = 10;
                ctx.fillStyle = '#cce5ff';
                ctx.font = 'bold 22px -apple-system, Arial';
                ctx.fillText('CURVE', 0, 0);
                ctx.shadowBlur = 0;
            }
            ctx.restore();
            this._curveFlash -= 0.025;
        }

        // Goal celebration overlay (golden flash + streaks)
        if (this.celebrating && this.celebrationTimer < 40) {
            this.renderer.drawGoalCelebration(this.celebrationTimer, this.streak);
        }

        // Progression HUD (coins, level, XP)
        if (this._progressionInit) {
            this.renderer.drawProgressionHUD(this.coins, this.playerLevel, this.playerXP, this.xpToNextLevel);
        }

        // Power Surge meter (always visible during gameplay)
        if (this.state === 'playing' || this.state === 'shooting') {
            this.renderer.drawSurgeMeter(this.surge);
        }

        // Power Surge screen pulse overlay
        if (this.surge.active || this.surge.activationFlash > 0.01) {
            this.renderer.drawSurgeScreenPulse(this.surge);
        }

        // Surge activation banner — level-aware
        if (this.surge.active && this.surge.duration - this.surge.timer < 60) {
            const def = this._getSurgeLevelDef(this.surge.level);
            this.renderer.drawSurgeActivationBanner(
                this.surge.duration - this.surge.timer,
                this.surge.level,
                def ? def.bannerText : 'SURGE!',
                def ? def.color : '#fff'
            );
        }

        // Unlock banner (level-up feature notification)
        if (this._pendingUnlock) {
            this.renderer.drawUnlockBanner(this._pendingUnlock, this._unlockBannerTimer, this.playerLevel);
        }

        // Joystick — hidden (swipe-to-shoot controls active)
        // (joystick removed — swipe-only)

        // Swipe trail
        this.touch.swipe.drawTrail(ctx);
    }

    _drawPlayer(ctx, x, y) {
        const skin = SKIN_CONFIGS[this.activeSkin] || SKIN_CONFIGS.default;
        ctx.save();
        ctx.translate(x, y);

        // Ground shadow
        ctx.globalAlpha = 0.25;
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.ellipse(0, 28, 20, 7, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        // Left leg (back) — themed shorts
        ctx.fillStyle = skin.shorts;
        ctx.beginPath();
        ctx.moveTo(-6, 8); ctx.lineTo(-10, 24); ctx.lineTo(-4, 24); ctx.lineTo(-2, 8);
        ctx.closePath(); ctx.fill();

        // Right leg (front, kicking stance)
        ctx.beginPath();
        ctx.moveTo(2, 8); ctx.lineTo(8, 22); ctx.lineTo(14, 22); ctx.lineTo(6, 8);
        ctx.closePath(); ctx.fill();

        // Boots — themed
        ctx.fillStyle = skin.boots;
        ctx.beginPath();
        ctx.moveTo(-11, 23); ctx.lineTo(-2, 23); ctx.lineTo(-2, 27); ctx.lineTo(-13, 27);
        ctx.closePath(); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(7, 21); ctx.lineTo(16, 21); ctx.lineTo(16, 25); ctx.lineTo(7, 25);
        ctx.closePath(); ctx.fill();

        // Body/torso (jersey) — themed gradient
        const jerseyGrad = ctx.createLinearGradient(-15, -28, 15, 10);
        jerseyGrad.addColorStop(0, skin.jersey[0]);
        jerseyGrad.addColorStop(0.5, skin.jersey[1]);
        jerseyGrad.addColorStop(1, skin.jersey[2]);
        ctx.fillStyle = jerseyGrad;
        ctx.beginPath();
        ctx.moveTo(-12, -24);
        ctx.quadraticCurveTo(-16, -10, -12, 10);
        ctx.lineTo(12, 10);
        ctx.quadraticCurveTo(16, -10, 12, -24);
        ctx.closePath(); ctx.fill();

        // Jersey collar — themed
        ctx.fillStyle = skin.collar;
        ctx.beginPath();
        ctx.ellipse(0, -24, 8, 3, 0, 0, Math.PI);
        ctx.fill();

        // Sleeve highlights
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(-15, -22, 5, 14);
        ctx.fillRect(10, -22, 5, 14);

        // Number on jersey — themed
        ctx.fillStyle = skin.number;
        ctx.font = 'bold 14px -apple-system, Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('10', 0, -8);
        ctx.textBaseline = 'alphabetic';

        // Arms
        ctx.strokeStyle = '#fdbcb4';
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(-14, -18);
        ctx.quadraticCurveTo(-22, -8, -18, 0);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(14, -18);
        ctx.quadraticCurveTo(24, -12, 20, -4);
        ctx.stroke();

        // Head
        ctx.fillStyle = '#fdbcb4';
        ctx.beginPath();
        ctx.arc(0, -36, 11, 0, Math.PI * 2);
        ctx.fill();

        // Hair — themed
        ctx.fillStyle = skin.hair;
        ctx.beginPath();
        ctx.arc(0, -38, 11, Math.PI * 1.1, Math.PI * -0.1);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(0, -47, 8, 4, 0, 0, Math.PI * 2);
        ctx.fill();

        // Eyes
        ctx.fillStyle = '#333';
        ctx.beginPath(); ctx.arc(-3.5, -37, 1.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(3.5, -37, 1.5, 0, Math.PI * 2); ctx.fill();

        // Socks — themed
        ctx.fillStyle = skin.socks;
        ctx.fillRect(-9, 18, 7, 5);
        ctx.fillRect(4, 16, 7, 5);

        ctx.restore();
    }

    // ====== SIMULATION TEST (call from console: game.runSimulation()) ======

    runSimulation(shotsPerDifficulty = 100) {
        const difficulties = ['easy', 'medium', 'hard', 'legend'];
        const results = {};

        difficulties.forEach(diff => {
            const config = this.difficultyConfig[diff];
            let goals = 0, saves = 0, misses = 0, posts = 0, overs = 0;

            for (let i = 0; i < shotsPerDifficulty; i++) {
                const goalCX = DESIGN.width / 2;
                const goalLeft = goalCX - DESIGN.goalWidth / 2;
                const goalRight = goalCX + DESIGN.goalWidth / 2;
                const pw = DESIGN.goalPostWidth;
                const postInnerLeft = goalLeft + pw;
                const postInnerRight = goalRight - pw;

                // Simulate player shot — random aim within goal area (some going wide/over)
                const spread = DESIGN.goalWidth * 1.2;
                const aimX = goalCX + (Math.random() - 0.5) * spread;
                const shotOnTarget = Math.random() > 0.08; // 8% chance of over/wide

                if (!shotOnTarget) {
                    if (Math.random() < 0.5) { overs++; } else { misses++; }
                    continue;
                }

                const betweenPosts = aimX > postInnerLeft && aimX < postInnerRight;
                const hitPost = Math.abs(aimX - goalLeft - pw / 2) < 14 || Math.abs(aimX - goalRight + pw / 2) < 14;

                if (!betweenPosts && !hitPost) {
                    misses++;
                    continue;
                }
                if (hitPost && !betweenPosts) {
                    posts++;
                    continue;
                }

                // === Simulate full AI decision chain ===

                // Step 1: Prediction — does keeper guess the right direction?
                let predictedDir;
                const shotDir = aimX < goalCX - 20 ? 'left' : aimX > goalCX + 20 ? 'right' : 'center';

                // ML-based prediction (legend) has higher base accuracy
                const baseAccuracy = config.useML ? 0.65 : (diff === 'hard' ? 0.5 : 0.35);
                if (Math.random() < baseAccuracy) {
                    predictedDir = shotDir; // correct guess
                } else {
                    const dirs = ['left', 'center', 'right'].filter(d => d !== shotDir);
                    predictedDir = dirs[Utils.randInt(0, dirs.length - 1)];
                }

                // Step 2: Prediction error can flip the guess
                if (Math.random() < config.predictionError) {
                    const dirs = ['left', 'center', 'right'].filter(d => d !== predictedDir);
                    predictedDir = dirs[Utils.randInt(0, dirs.length - 1)];
                }

                // Step 3: Compute keeper dive position with accuracy
                const accuracy = config.positionAccuracy || 0.5;
                let keeperX;
                switch (predictedDir) {
                    case 'left':  keeperX = goalCX - DESIGN.goalWidth * 0.35; break;
                    case 'right': keeperX = goalCX + DESIGN.goalWidth * 0.35; break;
                    default:      keeperX = goalCX; break;
                }
                // Accuracy pulls keeper toward actual ball position
                keeperX = Utils.lerp(keeperX, aimX, accuracy * 0.4);

                // Step 4: Overcommit
                if (Math.random() < config.overcommitChance) {
                    keeperX += Utils.randRange(-40, 40);
                }

                // Step 5: Jitter
                keeperX += Utils.randRange(-10, 10) * (1 - accuracy * 0.5);

                // Step 6: Calculate if keeper can reach the ball
                const earlyBonus = config.earlyDiveBonus || 0;
                const baseReach = DESIGN.keeperWidth * 0.5 + 45; // arm extension
                const reach = (baseReach + earlyBonus * 20) * config.saveReach;
                const canReach = Math.abs(aimX - keeperX) < reach;

                // Step 7: Miss chance (fumble even when positioned)
                const willMiss = Math.random() < config.missChance;

                // Step 8: Reaction time — did keeper react in time?
                // Ball travels ~520px in ~29 frames. Reaction delay in frames:
                const delayFrames = config.reactionDelayMs / 16.67;
                const diveFrames = 1 / config.diveSpeed; // frames to full dive
                const ballFrames = 29; // approx frames from kick to goal
                const keeperReady = (delayFrames + diveFrames * 0.6) < ballFrames;

                if (canReach && !willMiss && keeperReady) {
                    saves++;
                } else {
                    goals++;
                }
            }

            const saveRate = Math.round((saves / shotsPerDifficulty) * 100);
            const goalRate = Math.round((goals / shotsPerDifficulty) * 100);
            results[diff] = {
                goals, saves, misses, posts, overs,
                saveRate: saveRate + '%',
                goalRate: goalRate + '%',
                total: shotsPerDifficulty
            };
        });

        console.log('=== GOALBOT SIMULATION RESULTS ===');
        console.log('Shots per difficulty:', shotsPerDifficulty);
        console.table(results);
        console.log('Target SAVE rates: Easy 20-30%, Medium 40-55%, Hard 60-75%, Legend 70-85%');
        return results;
    }

    // Sync all features that should be unlocked at the current player level
    _syncLevelFeatures() {
        for (const [lvl, unlock] of Object.entries(this.levelUnlocks)) {
            if (this.playerLevel >= parseInt(lvl)) {
                this._applyFeatureUnlock(unlock.feature, true);
            }
        }
    }

    // Apply a specific feature unlock (silent = no banner)
    _applyFeatureUnlock(feature, silent) {
        if (this._unlockedFeatures.has(feature)) return;
        this._unlockedFeatures.add(feature);

        switch (feature) {
            case 'power_aim':
                this.aimOscSpeed = 0.020; // tighter oscillation
                break;
            case 'surge_l1': case 'surge_l2': case 'surge_l3': case 'surge_l4':
                // Surge levels are always available; this is a progression gate hint
                break;
            case 'assist_bot':
                this.assistBot.enabled = true;
                this.assistBot.tier = 1;
                this.assistBot.boosts = {
                    surgeGainMult: 1.25,    // +25% surge charge
                    powerBoost: 0.10,       // +10% shot power
                    aimSteady: 0.0,         // no aim help yet
                    surgeDurationMult: 1.0  // normal surge duration
                };
                break;
            case 'bot_upgrade':
                this.assistBot.tier = 2;
                this.assistBot.boosts = {
                    surgeGainMult: 1.30,    // +30% surge charge
                    powerBoost: 0.15,       // +15% shot power
                    aimSteady: 0.15,        // slight aim stabilization
                    surgeDurationMult: 1.15 // +15% surge duration
                };
                break;
            case 'bot_max':
                this.assistBot.tier = 3;
                this.assistBot.boosts = {
                    surgeGainMult: 1.35,    // +35% surge charge
                    powerBoost: 0.20,       // +20% shot power
                    aimSteady: 0.25,        // stronger aim stabilization
                    surgeDurationMult: 1.25 // +25% surge duration
                };
                break;
            case 'curve_shot':
                this.curveShot.enabled = true;
                this.curveShot.strength = 0.9;
                break;
            case 'strong_curve':
                this.curveShot.strength = 1.0;
                break;
            case 'dual_ball':
                this.dualBall.enabled = true;
                break;
            case 'chaos_mode':
                // Chaos mode active at level 20+ — enables multi-ball on surge activation
                break;
        }

        if (!silent) {
            const unlockInfo = Object.values(this.levelUnlocks).find(u => u.feature === feature);
            if (unlockInfo) {
                this._pendingUnlock = unlockInfo;
                this._unlockBannerTimer = 0;
            }
        }
    }
