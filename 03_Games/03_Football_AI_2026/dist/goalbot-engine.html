        ctx.strokeStyle = 'rgba(0,255,240,0.12)';
        ctx.lineWidth = 1.5;
        this._roundRect(ctx, x, y, 200, 42, 14);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Coin icon + count
        ctx.font = '13px serif';
        ctx.textAlign = 'left';
        ctx.fillText('\uD83E\uDE99', x + 10, y + 18);
        ctx.fillStyle = '#ffea00';
        ctx.shadowColor = '#ffea00';
        ctx.shadowBlur = 6;
        ctx.font = 'bold 13px -apple-system, Arial';
        ctx.fillText(coins.toLocaleString(), x + 28, y + 17);
        ctx.shadowBlur = 0;

        // Level badge — purple
        ctx.fillStyle = 'rgba(170,0,255,0.15)';
        this._roundRect(ctx, x + 100, y + 4, 48, 16, 8);
        ctx.fill();
        ctx.fillStyle = '#aa00ff';
        ctx.shadowColor = '#aa00ff';
        ctx.shadowBlur = 4;
        ctx.font = 'bold 9px -apple-system, Arial';
        ctx.textAlign = 'center';
        ctx.fillText('LV ' + level, x + 124, y + 15);
        ctx.shadowBlur = 0;

        // XP bar — cyan gradient
        const barX = x + 10, barY = y + 26, barW = 180, barH = 6;
        ctx.fillStyle = 'rgba(0,255,240,0.08)';
        this._roundRect(ctx, barX, barY, barW, barH, 3);
        ctx.fill();

        const xpPct = xpNeeded > 0 ? Math.min(xp / xpNeeded, 1) : 0;
        if (xpPct > 0) {
            const xpGrad = ctx.createLinearGradient(barX, 0, barX + barW * xpPct, 0);
            xpGrad.addColorStop(0, '#00bcd4');
            xpGrad.addColorStop(1, '#00e5ff');
            ctx.fillStyle = xpGrad;
            ctx.shadowColor = '#00ffcc';
            ctx.shadowBlur = 4;
            this._roundRect(ctx, barX, barY, barW * xpPct, barH, 3);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        ctx.textAlign = 'center'; // reset
    }

    // ====== COIN REWARD POPUP ======
    drawCoinReward(amount, timer) {
        if (timer > 60) return;
        const ctx = this.ctx;
        const cx = DESIGN.width / 2;
        const t = timer / 60;
        const y = DESIGN.height / 2 - 50 - t * 30;

        ctx.save();
        ctx.globalAlpha = Math.max(0, 1 - t);
        ctx.fillStyle = '#ffea00';
        ctx.font = 'bold 24px -apple-system, Arial';
        ctx.textAlign = 'center';
        ctx.shadowColor = '#ffea00';
        ctx.shadowBlur = 15;
        ctx.fillText('+' + amount + ' \uD83E\uDE99', cx, y);
        ctx.shadowBlur = 0;
        ctx.restore();
    }

    // ====== MULTI-LEVEL POWER SURGE VISUALS ======

    // Surge meter — clean vertical badge strip on left edge
    drawSurgeMeter(surge) {
        const ctx = this.ctx;

        // Layout: left-aligned badge column at mid-field height (centre circle area)
        const badgeW = 44, badgeH = 36, gap = 8, cornerR = 10;
        const leftX = 8;
        const totalH = 4 * badgeH + 3 * gap;
        const topY = 280; // aligned with centre circle on field

        const levels = [
            { idx: 0, threshold: 20,  color: '#00e5ff', darkColor: '#00838f', icon: '\u26A1', label: 'L1' },
            { idx: 1, threshold: 50,  color: '#ffeb3b', darkColor: '#f9a825', icon: '\u26A1', label: 'L2' },
            { idx: 2, threshold: 75,  color: '#ff7043', darkColor: '#d84315', icon: '\u{1F525}', label: 'L3' },
            { idx: 3, threshold: 100, color: '#aa00ff', darkColor: '#6a1b9a', icon: '\u{1F31F}', label: 'L4' }
        ];

        ctx.save();

        // Draw from top (L4) to bottom (L1)
        for (let vi = 3; vi >= 0; vi--) {
            const lev = levels[vi];
            // Visual index: L4 at top (row 0), L1 at bottom (row 3)
            const row = 3 - vi;
            const bx = leftX;
            const by = topY + row * (badgeH + gap);

            // Charge fill fraction for this segment
            const segCharge = Math.max(0, Math.min(1, (surge.charge - (vi * 25)) / 25));
            const isFilled = segCharge >= 1;
            const isActive = surge.active && surge.level === vi + 1;
            const isAvailable = !surge.active && surge.availableLevel === vi + 1;

            // --- Badge background (glassmorphism pill) ---
            ctx.beginPath();
            this._roundRect(ctx, bx, by, badgeW, badgeH, cornerR);

            if (isActive) {
                // Active: solid color with glow + gradient
                const pulse = 0.7 + Math.sin(surge.auraPhase * 2.5) * 0.3;
                const activeGrad = ctx.createLinearGradient(bx, by, bx, by + badgeH);
                activeGrad.addColorStop(0, lev.color);
                activeGrad.addColorStop(1, lev.darkColor);
                ctx.fillStyle = activeGrad;
                ctx.globalAlpha = 0.75 + pulse * 0.25;
                ctx.shadowColor = lev.color;
                ctx.shadowBlur = 12 + pulse * 10;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
                // Inner shine
                const activeHL = ctx.createLinearGradient(bx, by, bx, by + badgeH * 0.4);
                activeHL.addColorStop(0, 'rgba(255,255,255,0.2)');
                activeHL.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = activeHL;
                this._roundRect(ctx, bx + 1, by + 1, badgeW - 2, badgeH * 0.4, cornerR - 1);
                ctx.fill();
            } else if (isFilled) {
                // Filled: colored gradient background
                const fillGrad = ctx.createLinearGradient(bx, by, bx, by + badgeH);
                fillGrad.addColorStop(0, lev.color);
                fillGrad.addColorStop(1, lev.darkColor);
                ctx.fillStyle = fillGrad;
                ctx.globalAlpha = 0.6;
                ctx.fill();
                ctx.globalAlpha = 1;
                // Shimmer traveling across filled badge
                const shimPhase = ((this.frameCount * 1.5 + vi * 40) % 120) / 120;
                if (shimPhase < 0.4) {
                    ctx.save();
                    ctx.beginPath();
                    this._roundRect(ctx, bx, by, badgeW, badgeH, cornerR);
                    ctx.clip();
                    const shimX = bx - badgeW + (badgeW * 3) * (shimPhase / 0.4);
                    const shimGrad = ctx.createLinearGradient(shimX, 0, shimX + badgeW, 0);
                    shimGrad.addColorStop(0, 'rgba(255,255,255,0)');
                    shimGrad.addColorStop(0.5, 'rgba(255,255,255,0.12)');
                    shimGrad.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.fillStyle = shimGrad;
                    ctx.fillRect(bx, by, badgeW, badgeH);
                    ctx.restore();
                }
            } else {
                // Empty or partial: dark glass
                ctx.fillStyle = 'rgba(10,15,30,0.65)';
                ctx.fill();

                // Partial fill overlay (bottom-up)
                if (segCharge > 0) {
                    ctx.save();
                    ctx.beginPath();
                    this._roundRect(ctx, bx, by, badgeW, badgeH, cornerR);
                    ctx.clip();
                    const fillH = badgeH * segCharge;
                    ctx.fillStyle = lev.color;
                    ctx.globalAlpha = 0.35;
                    ctx.fillRect(bx, by + badgeH - fillH, badgeW, fillH);
                    ctx.globalAlpha = 1;
                    ctx.restore();
                }
            }

            // --- Border ---
            ctx.beginPath();
            this._roundRect(ctx, bx, by, badgeW, badgeH, cornerR);
            if (isActive) {
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
            } else if (isFilled) {
                ctx.strokeStyle = lev.color;
                ctx.lineWidth = 1.5;
                ctx.globalAlpha = 0.8;
            } else {
                ctx.strokeStyle = 'rgba(255,255,255,0.12)';
                ctx.lineWidth = 1;
            }
            ctx.stroke();
            ctx.globalAlpha = 1;

            // --- Icon (top half of badge) ---
            const iconSize = isActive ? 14 : 11;
            ctx.font = `${iconSize}px -apple-system, Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = isActive || isFilled ? '#fff' : 'rgba(255,255,255,0.25)';
            ctx.fillText(lev.icon, bx + badgeW / 2, by + badgeH * 0.35);

            // --- Label (bottom half) ---
            ctx.font = `bold ${isActive ? 10 : 9}px -apple-system, Arial`;
            ctx.fillStyle = isActive ? '#fff' : (isFilled ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.3)');
            ctx.fillText(lev.label, bx + badgeW / 2, by + badgeH * 0.72);

            // --- Available glow pulse (tap to activate) ---
            if (isAvailable && !surge.active) {
                const pulse = 0.4 + Math.sin(surge.readyFlashTimer * 0.12) * 0.4;
                ctx.shadowColor = lev.color;
                ctx.shadowBlur = 6 + pulse * 8;
                ctx.strokeStyle = lev.color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                this._roundRect(ctx, bx - 1, by - 1, badgeW + 2, badgeH + 2, cornerR + 1);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        // --- Status text below badges ---
        const statusY = topY + 4 * (badgeH + gap) + 2;
        ctx.textAlign = 'center';

        if (surge.active && surge.level > 0) {
            // Countdown timer
            const col = levels[surge.level - 1].color;
            const secs = Math.ceil(surge.timer / 60);
            ctx.fillStyle = col;
            ctx.font = 'bold 14px -apple-system, Arial';
            ctx.textBaseline = 'top';
            ctx.fillText(secs + 's', leftX + badgeW / 2, statusY);

        } else if (surge.availableLevel >= 1 && !surge.active) {
            // TAP prompt
            const col = levels[surge.availableLevel - 1].color;
            const pulse = 0.5 + Math.sin(surge.readyFlashTimer * 0.1) * 0.5;
            ctx.globalAlpha = 0.6 + pulse * 0.4;
            ctx.fillStyle = col;
            ctx.font = 'bold 11px -apple-system, Arial';
            ctx.textBaseline = 'top';
            ctx.fillText('TAP', leftX + badgeW / 2, statusY);
            ctx.globalAlpha = 1;

        } else if (!surge.active) {
            // Charge percentage
            ctx.fillStyle = 'rgba(255,255,255,0.35)';
            ctx.font = 'bold 10px -apple-system, Arial';
            ctx.textBaseline = 'top';
            ctx.fillText(Math.round(surge.charge) + '%', leftX + badgeW / 2, statusY);
        }

        // --- Drain flash (red pulse over all badges on charge loss) ---
        if (surge.drainFlash > 0.05) {
            ctx.globalAlpha = surge.drainFlash * 0.35;
            ctx.fillStyle = '#ff2222';
            for (let vi = 0; vi < 4; vi++) {
                const row = 3 - vi;
                const by = topY + row * (badgeH + gap);
                ctx.beginPath();
                this._roundRect(ctx, leftX, by, badgeW, badgeH, cornerR);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        ctx.textBaseline = 'alphabetic';
        ctx.restore();
    }

    // Player aura glow — intensity scales with surge level
    drawPlayerAura(x, y, surge) {
        if (!surge.active && surge.availableLevel < 1) return;
        const ctx = this.ctx;

        ctx.save();

        // Level-specific color palettes (override style at higher levels)
        const levelPalettes = {
            1: { inner: 'rgba(100,200,100,', outer: 'rgba(60,150,60,', mid: 'rgba(150,255,150,' },
            2: { inner: 'rgba(255,230,50,',  outer: 'rgba(200,180,0,',  mid: 'rgba(255,255,150,' },
            3: { inner: 'rgba(255,80,20,',   outer: 'rgba(200,30,0,',   mid: 'rgba(255,180,50,' },
            4: { inner: 'rgba(170,0,255,',   outer: 'rgba(100,0,200,',  mid: 'rgba(255,0,255,' }
        };

        // Style overrides for level 3-4 (style matters more at high levels)
        const stylePalettes = {
            fire:      { inner: 'rgba(255,100,0,', outer: 'rgba(255,50,0,',  mid: 'rgba(255,200,0,' },
            lightning: { inner: 'rgba(0,200,255,',  outer: 'rgba(0,100,255,', mid: 'rgba(200,240,255,' },
            ice:       { inner: 'rgba(100,200,255,', outer: 'rgba(0,150,255,', mid: 'rgba(200,240,255,' },
            cosmic:    { inner: 'rgba(170,0,255,',  outer: 'rgba(100,0,200,', mid: 'rgba(255,0,255,' }
        };

        if (surge.active) {
            const lv = surge.level;
            // Use level palette for L1-L2, style palette for L3-L4
            const palette = lv >= 3 ? (stylePalettes[surge.style] || stylePalettes.fire)
                                    : (levelPalettes[lv] || levelPalettes[1]);
            const phase = surge.auraPhase;
            const intensity = 0.15 + lv * 0.2;  // 0.35→0.55→0.75→0.95
            const pulse = 0.6 + Math.sin(phase * 2) * 0.4;

            // Outer aura — radius scales with level
            const outerR = 30 + lv * 15 + pulse * (5 + lv * 3);
            const outer = ctx.createRadialGradient(x, y - 15, 5, x, y - 15, outerR);
            outer.addColorStop(0, palette.mid + (intensity * 0.6).toFixed(2) + ')');
            outer.addColorStop(0.4, palette.inner + (intensity * 0.3).toFixed(2) + ')');
            outer.addColorStop(1, palette.outer + '0)');
            ctx.fillStyle = outer;
            ctx.beginPath();
            ctx.arc(x, y - 15, outerR, 0, Math.PI * 2);
            ctx.fill();

            // Inner aura — tighter, brighter at high levels
            if (lv >= 2) {
                const innerR = 20 + lv * 6 + pulse * 8;
                const inner = ctx.createRadialGradient(x, y - 10, 3, x, y - 10, innerR);
                inner.addColorStop(0, palette.mid + (intensity * 0.8).toFixed(2) + ')');
                inner.addColorStop(0.5, palette.inner + (intensity * 0.4).toFixed(2) + ')');
                inner.addColorStop(1, palette.outer + '0)');
                ctx.fillStyle = inner;
                ctx.beginPath();
                ctx.arc(x, y - 10, innerR, 0, Math.PI * 2);
                ctx.fill();
            }

            // Rising energy streaks — count scales with level
            const streakCount = lv + 1;
            for (let i = 0; i < streakCount; i++) {
                const angle = (phase + i * (Math.PI * 2 / streakCount)) % (Math.PI * 2);
                const dist = 15 + lv * 3 + Math.sin(phase * 3 + i) * 6;
                const sx = x + Math.cos(angle) * dist * 0.3;
                const sy = y - 20 - Math.sin(phase * 2 + i * 0.7) * (15 + lv * 5);
                const streakH = 10 + lv * 5 + Math.sin(phase * 2.5 + i) * 5;

                ctx.globalAlpha = (0.2 + lv * 0.1) + Math.sin(phase + i) * 0.2;
                const streakGrad = ctx.createLinearGradient(sx, sy, sx, sy - streakH);
                streakGrad.addColorStop(0, palette.inner + '0.6)');
                streakGrad.addColorStop(1, palette.outer + '0)');
                ctx.fillStyle = streakGrad;
                ctx.beginPath();
                ctx.moveTo(sx - 2 - lv * 0.5, sy);
                ctx.lineTo(sx, sy - streakH);
                ctx.lineTo(sx + 2 + lv * 0.5, sy);
                ctx.closePath();
                ctx.fill();
            }
            ctx.globalAlpha = 1;

        } else if (surge.availableLevel >= 1) {
            // Subtle ready glow — color matches highest available level
            const levelColors = ['', 'rgba(100,200,100,', 'rgba(255,230,50,', 'rgba(255,80,20,', 'rgba(170,0,255,'];
            const col = levelColors[surge.availableLevel] || levelColors[1];
            const pulse = 0.3 + Math.sin(surge.readyFlashTimer * 0.08) * 0.3;
            const glow = ctx.createRadialGradient(x, y - 10, 5, x, y - 10, 35);
            glow.addColorStop(0, col + (pulse * 0.25).toFixed(2) + ')');
            glow.addColorStop(1, col + '0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(x, y - 10, 35, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.restore();
    }

    // Screen pulse overlay — intensity scales with surge level
    drawSurgeScreenPulse(surge) {
        if (surge.activationFlash <= 0.01 && surge.screenPulseAlpha <= 0.01) return;
        const ctx = this.ctx;
        ctx.save();

        const levelColorMap = {
            1: 'rgba(100,200,100,',
            2: 'rgba(255,230,50,',
            3: 'rgba(255,80,20,',
            4: 'rgba(150,0,255,'
        };
        const col = levelColorMap[surge.level] || 'rgba(255,100,0,';

        // Flash overlay on activation — stronger at higher levels
        if (surge.activationFlash > 0.01) {
            ctx.fillStyle = 'rgba(255,255,255,' + (surge.activationFlash * 0.5).toFixed(3) + ')';
            ctx.fillRect(0, 0, DESIGN.width, DESIGN.height);
        }

        // Ambient screen pulse
        if (surge.screenPulseAlpha > 0.01) {
            const pulse = 0.5 + Math.sin(surge.auraPhase * 3) * 0.5;
            const intensityScale = 0.04 + (surge.level || 1) * 0.02;
            ctx.fillStyle = col + (surge.screenPulseAlpha * pulse * intensityScale).toFixed(3) + ')';
            ctx.fillRect(0, 0, DESIGN.width, DESIGN.height);
        }

        // Edge glow vignette — only at level 2+
        if (surge.active && surge.level >= 2) {
            const edgeBase = 0.05 + (surge.level - 1) * 0.05;
            const edgeAlpha = edgeBase + Math.sin(surge.auraPhase) * 0.03;
            const vignette = ctx.createRadialGradient(
                DESIGN.width / 2, DESIGN.height / 2, DESIGN.height * 0.3,
                DESIGN.width / 2, DESIGN.height / 2, DESIGN.height * 0.7
            );
            vignette.addColorStop(0, 'rgba(0,0,0,0)');
            vignette.addColorStop(1, col + edgeAlpha.toFixed(3) + ')');
            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, DESIGN.width, DESIGN.height);
        }

        ctx.restore();
    }

    // Activation banner — level-aware text and color
    drawSurgeActivationBanner(timer, level, text, color) {
        if (timer > 60) return;
        const ctx = this.ctx;
        const t = timer / 60;
        const cx = DESIGN.width / 2;
        const cy = DESIGN.height / 2 - 100;

        ctx.save();
        const scale = t < 0.2 ? Utils.easeOutBack(t / 0.2) : 1;
        const alpha = t < 0.7 ? 1 : Math.max(0, 1 - (t - 0.7) / 0.3);
        ctx.globalAlpha = alpha;
        ctx.translate(cx, cy);
        ctx.scale(scale, scale);

        // Size scales with level
        const fontSize = 22 + (level || 1) * 4;

        ctx.shadowColor = color || '#ff8800';
        ctx.shadowBlur = 20 + (level || 1) * 5;
        ctx.fillStyle = color || '#ffd700';
        ctx.font = `bold ${fontSize}px -apple-system, Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text || 'SURGE!', 0, 0);

        // Level indicator below banner for L3+
        if (level >= 3) {
            ctx.shadowBlur = 10;
            ctx.font = 'bold 14px -apple-system, Arial';
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.fillText('LEVEL ' + level, 0, fontSize * 0.7);
        }

        ctx.shadowBlur = 0;
        ctx.restore();
    }

    // ====== ASSIST BOT (robot helper near player) ======
    drawAssistBot(x, y, phase, tier) {
        const ctx = this.ctx;
        ctx.save();
        ctx.translate(x, y);

        // Tier-based colors
        const tierColors = {
            1: { primary: '#00e5ff', glow: 'rgba(0,229,255,', body1: '#546e7a', body2: '#78909c', body3: '#455a64' },
            2: { primary: '#76ff03', glow: 'rgba(118,255,3,', body1: '#1b5e20', body2: '#2e7d32', body3: '#1b5e20' },
            3: { primary: '#ea80fc', glow: 'rgba(234,128,252,', body1: '#4a148c', body2: '#7b1fa2', body3: '#6a1b9a' }
        };
        const tc = tierColors[tier] || tierColors[1];

        // Pulsing energy aura (outer glow ring)
        const pulse = 0.4 + Math.sin(phase * 3) * 0.2;
        const auraSize = 22 + tier * 4 + Math.sin(phase * 2) * 3;
        const aura = ctx.createRadialGradient(0, -4, 5, 0, -4, auraSize);
        aura.addColorStop(0, tc.glow + (pulse * 0.3).toFixed(2) + ')');
        aura.addColorStop(0.6, tc.glow + (pulse * 0.1).toFixed(2) + ')');
        aura.addColorStop(1, tc.glow + '0)');
        ctx.fillStyle = aura;
        ctx.beginPath();
        ctx.arc(0, -4, auraSize, 0, Math.PI * 2);
        ctx.fill();

        // Hover shadow
        ctx.globalAlpha = 0.2;
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.ellipse(0, 20, 12, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        // Hover bob
        const bob = Math.sin(phase * 2) * 3;
        ctx.translate(0, bob);

        // Bot body (rounded rect, metallic) — color scales with tier
        const bodyGrad = ctx.createLinearGradient(-12, -18, 12, 10);
        bodyGrad.addColorStop(0, tc.body2);
        bodyGrad.addColorStop(0.5, tc.body1);
        bodyGrad.addColorStop(1, tc.body3);
        ctx.fillStyle = bodyGrad;
        this._roundRect(ctx, -12, -18, 24, 28, 6);
        ctx.fill();

        // Inner body highlight
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        this._roundRect(ctx, -10, -16, 20, 12, 4);
        ctx.fill();

        // Visor (glowing eye) — pulses with energy
        const eyeGlow = 0.6 + Math.sin(phase * 3) * 0.3;
        ctx.fillStyle = tc.primary;
        ctx.shadowColor = tc.primary;
        ctx.shadowBlur = 6 + eyeGlow * 5 + tier * 2;
        this._roundRect(ctx, -8, -14, 16, 8, 3);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Eye dots
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(-4, -10, 2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(4, -10, 2, 0, Math.PI * 2); ctx.fill();

        // Antenna with energy tip
        ctx.strokeStyle = tc.body2;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(0, -18);
        ctx.lineTo(0, -24 + Math.sin(phase * 4) * 2);
        ctx.stroke();
        ctx.fillStyle = tc.primary;
        ctx.shadowColor = tc.primary;
        ctx.shadowBlur = 4 + tier * 2;
        ctx.beginPath();
        ctx.arc(0, -25 + Math.sin(phase * 4) * 2, 2 + tier * 0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Treads / feet
        ctx.fillStyle = tc.body3;
        this._roundRect(ctx, -10, 10, 8, 5, 2);
        ctx.fill();
        this._roundRect(ctx, 2, 10, 8, 5, 2);
        ctx.fill();

        // Tier badge (small indicator dots below bot)
        for (let i = 0; i < tier; i++) {
            ctx.fillStyle = tc.primary;
            ctx.globalAlpha = 0.7;
            ctx.beginPath();
            ctx.arc(-4 + i * 4, 18, 1.5, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;

        ctx.restore();
    }

    // Draw energy link particles flowing from bot to player
    drawBotEnergyLink(bot) {
        const ctx = this.ctx;
        const tierColors = { 1: '#00e5ff', 2: '#76ff03', 3: '#ea80fc' };
        const color = tierColors[bot.tier] || '#00e5ff';

        bot.linkParticles.forEach(p => {
            ctx.globalAlpha = p.life * 0.5;
            ctx.fillStyle = color;
            ctx.shadowColor = color;
            ctx.shadowBlur = 4;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
    }

    // Draw dual ball (second player ball)
    drawDualBall(db) {
        if (!db || !db.active) return;
        const ctx = this.ctx;

        // Trail
        db.trail.forEach(t => {
            if (t.life > 0.1) {
                ctx.globalAlpha = t.life * 0.25;
                ctx.fillStyle = db.surgeMode ? '#ff9800' : '#fff';
                ctx.beginPath();
                ctx.arc(t.x, t.y, db.radius * 0.5, 0, Math.PI * 2);
                ctx.fill();
            }
        });
        ctx.globalAlpha = 1;

        // Glow
        const glowColor = db.surgeMode ? 'rgba(255,152,0,0.25)' : 'rgba(255,255,255,0.15)';
        const glow = ctx.createRadialGradient(db.x, db.y, 2, db.x, db.y, db.radius * 2);
        glow.addColorStop(0, glowColor);
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(db.x, db.y, db.radius * 2, 0, Math.PI * 2);
        ctx.fill();

        // Ball (slightly transparent to distinguish from main)
        ctx.globalAlpha = 0.85;
        const ballGrad = ctx.createRadialGradient(db.x - 2, db.y - 2, 1, db.x, db.y, db.radius);
        ballGrad.addColorStop(0, '#fff');
        ballGrad.addColorStop(0.5, '#eee');
        ballGrad.addColorStop(1, '#999');
        ctx.fillStyle = ballGrad;
        ctx.beginPath();
        ctx.arc(db.x, db.y, db.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        // Pentagon pattern
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < 5; i++) {
            const a = (i / 5) * Math.PI * 2;
            ctx.beginPath();
            ctx.arc(db.x + Math.cos(a) * db.radius * 0.5, db.y + Math.sin(a) * db.radius * 0.5, db.radius * 0.25, 0, Math.PI * 2);
            ctx.stroke();
        }
    }

    // ====== UNLOCK BANNER (new feature notification) ======
    drawUnlockBanner(unlock, timer, level) {
        if (!unlock) return;
        const ctx = this.ctx;
        const cx = DESIGN.width / 2;

        // Animate: slide in -> hold -> fade out
        const slideIn = Math.min(timer / 20, 1);
        const fadeOut = timer > 140 ? Math.max(0, 1 - (timer - 140) / 40) : 1;
        const scale = 0.5 + slideIn * 0.5; // simple ease
        const alpha = fadeOut;

        const bannerY = 65;
        const bannerW = 280, bannerH = 56;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(cx, bannerY + bannerH / 2);
        ctx.scale(scale, scale);

        // Background card (golden glass)
        const bgGrad = ctx.createLinearGradient(-bannerW / 2, -bannerH / 2, -bannerW / 2, bannerH / 2);
        bgGrad.addColorStop(0, 'rgba(40,35,15,0.92)');
        bgGrad.addColorStop(1, 'rgba(25,20,8,0.95)');
        ctx.fillStyle = bgGrad;
        this._roundRect(ctx, -bannerW / 2, -bannerH / 2, bannerW, bannerH, 16);
        ctx.fill();

        // Golden border
        ctx.strokeStyle = 'rgba(255,215,0,0.4)';
        ctx.lineWidth = 1.5;
        this._roundRect(ctx, -bannerW / 2, -bannerH / 2, bannerW, bannerH, 16);
        ctx.stroke();

        // Top highlight
        const hlGrad = ctx.createLinearGradient(0, -bannerH / 2, 0, -bannerH / 2 + 14);
        hlGrad.addColorStop(0, 'rgba(255,215,0,0.12)');
        hlGrad.addColorStop(1, 'rgba(255,215,0,0)');
        ctx.fillStyle = hlGrad;
        this._roundRect(ctx, -bannerW / 2 + 1, -bannerH / 2 + 1, bannerW - 2, 14, 15);
        ctx.fill();

        // Icon
        ctx.font = '22px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(unlock.icon || '\u2B50', -bannerW / 2 + 28, 0);

        // "LEVEL X UNLOCK" header
        ctx.fillStyle = COLORS.uiGold;
        ctx.font = 'bold 9px -apple-system, Arial';
        ctx.textAlign = 'left';
        ctx.fillText('LEVEL ' + level + ' UNLOCK', -bannerW / 2 + 50, -12);

        // Feature name
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px -apple-system, Arial';
        ctx.fillText(unlock.name, -bannerW / 2 + 50, 4);

        // Description
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.font = '10px -apple-system, Arial';
        ctx.fillText(unlock.desc, -bannerW / 2 + 50, 18);

        ctx.textAlign = 'center';
        ctx.textBaseline = 'alphabetic';
        ctx.restore();
    }

    // Back/Menu button (top-left, during gameplay)
    drawBackButton() {
        const ctx = this.ctx;
        const bx = 10, by = 12, bw = 38, bh = 38, cr = 12;

        ctx.save();

        // Glass pill background with depth
        const bgGrad = ctx.createLinearGradient(bx, by, bx, by + bh);
        bgGrad.addColorStop(0, 'rgba(20,30,55,0.75)');
        bgGrad.addColorStop(1, 'rgba(8,14,30,0.85)');
        ctx.fillStyle = bgGrad;
        this._roundRect(ctx, bx, by, bw, bh, cr);
        ctx.fill();

        // Inner top highlight (glass reflection)
        const hlGrad = ctx.createLinearGradient(bx, by, bx, by + 14);
        hlGrad.addColorStop(0, 'rgba(255,255,255,0.1)');
        hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = hlGrad;
        this._roundRect(ctx, bx + 1, by + 1, bw - 2, 14, cr - 1);
        ctx.fill();

        // Border
        ctx.strokeStyle = 'rgba(255,255,255,0.18)';
        ctx.lineWidth = 1;
        this._roundRect(ctx, bx, by, bw, bh, cr);
        ctx.stroke();

        // "←" arrow icon
        const cx = bx + bw / 2, cy = by + bh / 2;
        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(cx + 5, cy - 7);
        ctx.lineTo(cx - 5, cy);
        ctx.lineTo(cx + 5, cy + 7);
        ctx.stroke();

        ctx.restore();

        // Return hit area for tap detection
        return { x: bx, y: by, w: bw, h: bh };
    }

    // ====== SHOP SCREEN (Premium Mobile Store UI) ======
    drawShopScreen(unlocks, activeTab, tabNames, coins, activeItemId, category, animPhase, shopMessage, coinPacks, iapProducts, hasRemoveAds) {
        const ctx = this.ctx;
        const cx = DESIGN.width / 2;
        const W = DESIGN.width;
        const H = DESIGN.height;
        coinPacks = coinPacks || [];
        iapProducts = iapProducts || [];

        // === BACKGROUND — deep cyber gradient ===
        const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
        bgGrad.addColorStop(0, '#050510');
        bgGrad.addColorStop(0.3, '#0c1020');
        bgGrad.addColorStop(0.7, '#080a18');
        bgGrad.addColorStop(1, '#050510');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, W, H);

        // Animated floating cyan/purple particles
        const particleColors = ['#00ffcc', '#aa00ff', '#00e5ff', '#7c4dff'];
        for (let i = 0; i < 25; i++) {
            const px = ((i * 137.5 + animPhase * 8) % W);
            const py = H - ((animPhase * 12 + i * 37) % H);
            const pr = 1 + Math.sin(animPhase * 2 + i) * 0.8;
            ctx.globalAlpha = 0.06 + Math.sin(animPhase * 3 + i * 0.5) * 0.04;
            ctx.fillStyle = particleColors[i % particleColors.length];
            ctx.shadowColor = particleColors[i % particleColors.length];
            ctx.shadowBlur = 2;
            ctx.beginPath();
            ctx.arc(px, py, pr, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.shadowBlur = 0;

        // Soft cyan orb behind header
        ctx.globalAlpha = 0.05;
        const orbGrad = ctx.createRadialGradient(cx, 30, 0, cx, 30, 180);
        orbGrad.addColorStop(0, '#00ffcc');
        orbGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = orbGrad;
        ctx.fillRect(0, 0, W, 200);
        ctx.globalAlpha = 1;

        // === BACK BUTTON ===
        const backBtn = this.drawBackButton();

        // === HEADER: Title + Coin Balance ===
        const titleGrad = ctx.createLinearGradient(cx - 60, 28, cx + 60, 28);
        titleGrad.addColorStop(0, '#00fff0');
        titleGrad.addColorStop(0.5, '#aa00ff');
        titleGrad.addColorStop(1, '#00bcd4');
        ctx.font = 'bold 24px -apple-system, Arial';
        ctx.textAlign = 'center';
        ctx.shadowColor = '#00ffcc';
        ctx.shadowBlur = 12;
        ctx.fillStyle = titleGrad;
        ctx.fillText('SHOP', cx, 40);
        ctx.shadowBlur = 0;

        // Coin pill (right side) — gold cyber style
        const coinPillW = 115, coinPillH = 34, coinPillX = W - coinPillW - 10, coinPillY = 15;
        const cpGrad = ctx.createLinearGradient(coinPillX, coinPillY, coinPillX, coinPillY + coinPillH);
        cpGrad.addColorStop(0, 'rgba(255,234,0,0.12)');
        cpGrad.addColorStop(1, 'rgba(255,234,0,0.04)');
        ctx.fillStyle = cpGrad;
        this._roundRect(ctx, coinPillX, coinPillY, coinPillW, coinPillH, 17);
        ctx.fill();
        ctx.shadowColor = '#ffea00';
        ctx.shadowBlur = 8;
        ctx.strokeStyle = 'rgba(255,234,0,0.3)';
        ctx.lineWidth = 1.5;
        this._roundRect(ctx, coinPillX, coinPillY, coinPillW, coinPillH, 17);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.font = 'bold 15px -apple-system, Arial';
        ctx.textAlign = 'right';
        ctx.fillStyle = '#ffea00';
        ctx.fillText('\uD83E\uDE99 ' + coins.toLocaleString(), W - 18, coinPillY + 23);

        // === TAB BAR — scrollable pill tabs ===
        const tabY = 56;
        const tabH = 32;
        const tabPad = 6;
        const tabHits = [];
        let tabTotalW = 0;
        const tabWidths = tabNames.map(name => {
            const w = Math.max(62, ctx.measureText ? 70 : 70);
            tabTotalW += w + tabPad;
            return w;
        });
        // Center tabs
        let tabStartX = Math.max(10, (W - tabTotalW) / 2);
        tabNames.forEach((name, i) => {
            const tw = tabWidths[i];
            const tx = tabStartX;
            tabStartX += tw + tabPad;
            const isActive = i === activeTab;

            // Tab pill — cyan when active
            if (isActive) {
                const tGrad = ctx.createLinearGradient(tx, tabY, tx, tabY + tabH);
                tGrad.addColorStop(0, '#00bcd4');
                tGrad.addColorStop(1, '#006064');
                ctx.fillStyle = tGrad;
                ctx.shadowColor = '#00ffcc';
                ctx.shadowBlur = 10;
            } else {
                ctx.fillStyle = 'rgba(255,255,255,0.04)';
            }
            this._roundRect(ctx, tx, tabY, tw, tabH, 16);
            ctx.fill();
            ctx.shadowBlur = 0;

            if (!isActive) {
                ctx.strokeStyle = 'rgba(255,255,255,0.06)';
                ctx.lineWidth = 0.5;
                this._roundRect(ctx, tx, tabY, tw, tabH, 16);
                ctx.stroke();
            }

            ctx.fillStyle = isActive ? '#fff' : 'rgba(128,203,196,0.6)';
            ctx.font = (isActive ? 'bold ' : '') + '10px -apple-system, Arial';
            ctx.textAlign = 'center';
            ctx.fillText(name, tx + tw / 2, tabY + 21);

            tabHits.push({ x: tx, y: tabY, w: tw, h: tabH });
        });

        // === CONTENT AREA ===
        const contentY = tabY + tabH + 14;
        const contentH = H - contentY - 10;
        const cardW = W - 32;
        const itemHits = [];
        const coinPackHits = [];
        const premiumHits = [];

        if (category === 'premium') {
            // ====== PREMIUM TAB ======
            this._drawPremiumTab(ctx, cx, W, contentY, cardW, animPhase, coinPacks, iapProducts, hasRemoveAds, coins, coinPackHits, premiumHits);
        } else {
            // ====== ITEM TABS (Bots, Balls, Stadiums, Skins) ======
            const items = unlocks[category] || [];
            const cardH = 86;
            const cardGap = 8;

            items.forEach((item, i) => {
                const iy = contentY + i * (cardH + cardGap);
                if (iy + cardH > H - 60) return;

                const isOwned = item.unlocked;
                const isActive = item.id === activeItemId;
                const canAfford = coins >= item.cost;

                // Card background with glass morphism — cyber themed
                ctx.save();
                if (isActive) {
                    const cGrad = ctx.createLinearGradient(16, iy, 16, iy + cardH);
                    cGrad.addColorStop(0, 'rgba(0,255,240,0.14)');
                    cGrad.addColorStop(1, 'rgba(0,255,240,0.03)');
                    ctx.fillStyle = cGrad;
                } else if (isOwned) {
                    const cGrad = ctx.createLinearGradient(16, iy, 16, iy + cardH);
                    cGrad.addColorStop(0, 'rgba(255,255,255,0.04)');
                    cGrad.addColorStop(1, 'rgba(255,255,255,0.01)');
                    ctx.fillStyle = cGrad;
                } else {
                    const cGrad = ctx.createLinearGradient(16, iy, 16, iy + cardH);
                    cGrad.addColorStop(0, 'rgba(255,255,255,0.025)');
                    cGrad.addColorStop(1, 'rgba(255,255,255,0.005)');
                    ctx.fillStyle = cGrad;
                }
                this._roundRect(ctx, 16, iy, cardW, cardH, 16);
                ctx.fill();

                // Top highlight (glass reflection)
                const hlGrad = ctx.createLinearGradient(16, iy, 16, iy + 14);
                hlGrad.addColorStop(0, 'rgba(255,255,255,0.04)');
                hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = hlGrad;
                this._roundRect(ctx, 17, iy + 1, cardW - 2, 14, 15);
                ctx.fill();

                // Border with glow for active — cyan
                if (isActive) {
                    ctx.shadowColor = '#00ffcc';
                    ctx.shadowBlur = 12;
                    ctx.strokeStyle = '#00e5ff';
                    ctx.lineWidth = 1.5;
                } else {
                    ctx.strokeStyle = isOwned ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.03)';
                    ctx.lineWidth = 0.5;
                }
                this._roundRect(ctx, 16, iy, cardW, cardH, 16);
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.restore();

                // Icon circle
                const iconCx = 48, iconCy = iy + cardH / 2;
                const iconR = 22;
                const iconBg = ctx.createRadialGradient(iconCx, iconCy, 0, iconCx, iconCy, iconR);
                iconBg.addColorStop(0, 'rgba(255,255,255,0.08)');
                iconBg.addColorStop(1, 'rgba(255,255,255,0.02)');
                ctx.fillStyle = iconBg;
                ctx.beginPath();
                ctx.arc(iconCx, iconCy, iconR, 0, Math.PI * 2);
                ctx.fill();
                ctx.font = '24px serif';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#fff';
                ctx.fillText(item.icon || '\u2B50', iconCx, iconCy + 8);

                // Name
                ctx.textAlign = 'left';
                ctx.fillStyle = isActive ? '#64b5f6' : (isOwned ? '#fff' : 'rgba(255,255,255,0.8)');
                ctx.font = 'bold 14px -apple-system, Arial';
                ctx.fillText(item.name, 78, iy + 28);

                // Description
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.font = '11px -apple-system, Arial';
                ctx.fillText(item.desc || '', 78, iy + 46);

                // Bot stat bar
                if (category === 'bots' && item.boosts) {
                    const bx = 78, by = iy + 60;
                    ctx.font = '9px -apple-system, Arial';
                    ctx.textAlign = 'left';
                    const b = item.boosts;
                    const stats = [];
                    if (b.powerBoost > 0) stats.push(`PWR +${Math.round(b.powerBoost * 100)}%`);
                    if (b.surgeGainMult > 1) stats.push(`SRG +${Math.round((b.surgeGainMult - 1) * 100)}%`);
                    if (b.aimSteady > 0) stats.push(`AIM +${Math.round(b.aimSteady * 100)}%`);
                    // Draw stat pills
                    let sx = bx;
                    stats.forEach(s => {
                        const sw = ctx.measureText ? ctx.measureText(s).width + 10 : 50;
                        ctx.fillStyle = 'rgba(255,193,7,0.12)';
                        this._roundRect(ctx, sx, by - 8, sw, 14, 7);
                        ctx.fill();
                        ctx.fillStyle = 'rgba(255,193,7,0.7)';
                        ctx.fillText(s, sx + 5, by + 2);
                        sx += sw + 4;
                    });
                }

                // Right side action area — cyber styled
                ctx.textAlign = 'right';
                const rx = 16 + cardW - 14;
                if (isActive) {
                    // Equipped badge — cyan
                    ctx.fillStyle = 'rgba(0,255,240,0.15)';
                    this._roundRect(ctx, rx - 78, iy + 24, 80, 28, 14);
                    ctx.fill();
                    ctx.shadowColor = '#00ffcc';
                    ctx.shadowBlur = 6;
                    ctx.strokeStyle = 'rgba(0,255,240,0.4)';
                    ctx.lineWidth = 1.5;
                    this._roundRect(ctx, rx - 78, iy + 24, 80, 28, 14);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#00e5ff';
                    ctx.font = 'bold 11px -apple-system, Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('\u2713 EQUIPPED', rx - 38, iy + 42);
                } else if (isOwned) {
                    // Equip button
                    ctx.fillStyle = 'rgba(255,255,255,0.05)';
                    this._roundRect(ctx, rx - 68, iy + 26, 70, 26, 13);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(128,203,196,0.12)';
                    ctx.lineWidth = 0.5;
                    this._roundRect(ctx, rx - 68, iy + 26, 70, 26, 13);
                    ctx.stroke();
                    ctx.fillStyle = 'rgba(128,203,196,0.7)';
                    ctx.font = '11px -apple-system, Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('EQUIP', rx - 33, iy + 43);
                } else {
                    // Buy button — gold or red
                    const btnColor = canAfford ? '#ffea00' : '#ff1744';
                    const btnBg = canAfford ? 'rgba(255,234,0,0.15)' : 'rgba(255,23,68,0.1)';
                    ctx.fillStyle = btnBg;
                    this._roundRect(ctx, rx - 88, iy + 20, 90, 34, 14);
                    ctx.fill();
                    if (canAfford) {
                        ctx.shadowColor = '#ffea00';
                        ctx.shadowBlur = 8;
                    }
                    ctx.strokeStyle = canAfford ? 'rgba(255,234,0,0.4)' : 'rgba(255,23,68,0.25)';
                    ctx.lineWidth = 1;
                    this._roundRect(ctx, rx - 88, iy + 20, 90, 34, 14);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = btnColor;
                    ctx.font = 'bold 13px -apple-system, Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('\uD83E\uDE99 ' + item.cost.toLocaleString(), rx - 43, iy + 42);
                }

                itemHits.push({ x: 16, y: iy, w: cardW, h: cardH, category, itemId: item.id });
            });

            // Watch Ad button (bottom, only on item tabs)
            const adY = H - 56;
            const adW = 220, adH = 40;
            const adX = cx - adW / 2;
            const adBg = ctx.createLinearGradient(adX, adY, adX, adY + adH);
            adBg.addColorStop(0, 'rgba(156,39,176,0.18)');
            adBg.addColorStop(1, 'rgba(156,39,176,0.05)');
            ctx.fillStyle = adBg;
            this._roundRect(ctx, adX, adY, adW, adH, 20);
            ctx.fill();
            ctx.strokeStyle = 'rgba(206,147,216,0.35)';
            ctx.lineWidth = 1;
            this._roundRect(ctx, adX, adY, adW, adH, 20);
            ctx.stroke();
            ctx.fillStyle = '#ce93d8';
            ctx.font = 'bold 12px -apple-system, Arial';
            ctx.textAlign = 'center';
            ctx.fillText('\uD83C\uDFAC  Watch Ad  \u2022  +50 Coins', cx, adY + 26);
        }

        // === SHOP MESSAGE TOAST ===
        if (shopMessage) {
            const msgAlpha = Math.min(1, shopMessage.timer / 20);
            const msgY = H / 2 - 28;
            ctx.globalAlpha = msgAlpha;
            // Backdrop blur simulation
            ctx.fillStyle = 'rgba(0,0,0,0.75)';
            this._roundRect(ctx, cx - 140, msgY, 280, 56, 18);
            ctx.fill();
            // Border
            ctx.strokeStyle = shopMessage.color ? Utils.hexToRgba(shopMessage.color, 0.4) : 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 1;
            this._roundRect(ctx, cx - 140, msgY, 280, 56, 18);
            ctx.stroke();
            ctx.fillStyle = shopMessage.color || '#fff';
            ctx.font = 'bold 16px -apple-system, Arial';
            ctx.textAlign = 'center';
            ctx.fillText(shopMessage.text, cx, msgY + 34);
            ctx.globalAlpha = 1;
        }

        return {
            back: backBtn,
            tabs: tabHits,
            items: itemHits,
            adReward: category !== 'premium' ? { x: cx - 110, y: H - 56, w: 220, h: 40 } : null,
            coinPacks: coinPackHits,
            premiumItems: premiumHits
        };
    }

    // ====== PREMIUM TAB — Coin Packs + IAP ======
    _drawPremiumTab(ctx, cx, W, startY, cardW, animPhase, coinPacks, iapProducts, hasRemoveAds, coins, coinPackHits, premiumHits) {
        let curY = startY;

        // Section: Coin Packs
        ctx.fillStyle = 'rgba(255,193,7,0.7)';
        ctx.font = 'bold 14px -apple-system, Arial';
        ctx.textAlign = 'left';
        ctx.fillText('\uD83E\uDE99  COIN PACKS', 20, curY + 14);
        curY += 26;

        // Coin pack cards — 2x2 grid
        const gridGap = 8;
        const halfW = (cardW - gridGap) / 2;
        const packH = 100;

        coinPacks.forEach((pack, i) => {
            const col = i % 2;
            const row = Math.floor(i / 2);
            const px = 16 + col * (halfW + gridGap);
            const py = curY + row * (packH + gridGap);

            const isBest = pack.tag === 'BEST VALUE';
            const isMega = pack.tag === 'MEGA PACK';

            // Card background
            ctx.save();
            if (isBest) {
                const bg = ctx.createLinearGradient(px, py, px, py + packH);
                bg.addColorStop(0, 'rgba(255,193,7,0.16)');
                bg.addColorStop(1, 'rgba(255,152,0,0.06)');
                ctx.fillStyle = bg;
            } else if (isMega) {
                const bg = ctx.createLinearGradient(px, py, px, py + packH);
                bg.addColorStop(0, 'rgba(156,39,176,0.14)');
                bg.addColorStop(1, 'rgba(156,39,176,0.04)');
                ctx.fillStyle = bg;
            } else {
                ctx.fillStyle = 'rgba(255,255,255,0.04)';
            }
            this._roundRect(ctx, px, py, halfW, packH, 16);
            ctx.fill();

            // Glass highlight
            const hl = ctx.createLinearGradient(px, py, px, py + 16);
            hl.addColorStop(0, 'rgba(255,255,255,0.05)');
            hl.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = hl;
            this._roundRect(ctx, px + 1, py + 1, halfW - 2, 16, 15);
            ctx.fill();

            // Glow border for featured
            if (isBest) {
                ctx.shadowColor = 'rgba(255,193,7,0.4)';
                ctx.shadowBlur = 12;
                ctx.strokeStyle = '#ffc107';
                ctx.lineWidth = 1.5;
            } else if (isMega) {
                ctx.shadowColor = 'rgba(156,39,176,0.3)';
                ctx.shadowBlur = 8;
                ctx.strokeStyle = '#ce93d8';
                ctx.lineWidth = 1.5;
            } else {
                ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                ctx.lineWidth = 0.5;
            }
            this._roundRect(ctx, px, py, halfW, packH, 16);
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.restore();

            // Tag ribbon
            if (pack.tag) {
                const tagColor = isBest ? '#ffc107' : isMega ? '#ce93d8' : '#00e5ff';
                const tagBg = isBest ? 'rgba(255,193,7,0.9)' : isMega ? 'rgba(156,39,176,0.85)' : 'rgba(0,229,255,0.8)';
                ctx.fillStyle = tagBg;
                const tagW = 72, tagH = 16;
                this._roundRect(ctx, px + halfW / 2 - tagW / 2, py - 4, tagW, tagH, 8);
                ctx.fill();
                ctx.fillStyle = isBest ? '#000' : '#fff';
                ctx.font = 'bold 8px -apple-system, Arial';
                ctx.textAlign = 'center';
                ctx.fillText(pack.tag, px + halfW / 2, py + 8);
            }

            // Coin icon + amount
            ctx.font = '22px serif';
            ctx.textAlign = 'center';
            ctx.fillText('\uD83E\uDE99', px + halfW / 2, py + 38);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px -apple-system, Arial';
            ctx.fillText(pack.coins.toLocaleString(), px + halfW / 2, py + 60);

            // Price pill
            const priceW = 60, priceH = 24;
            const priceX = px + (halfW - priceW) / 2;
            const priceY = py + packH - priceH - 8;
            const pGrad = ctx.createLinearGradient(priceX, priceY, priceX, priceY + priceH);
            pGrad.addColorStop(0, '#00bcd4');
            pGrad.addColorStop(1, '#006064');
            ctx.fillStyle = pGrad;
            this._roundRect(ctx, priceX, priceY, priceW, priceH, 12);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px -apple-system, Arial';
            ctx.textAlign = 'center';
            ctx.fillText(pack.price, priceX + priceW / 2, priceY + 17);

            coinPackHits.push({ x: px, y: py, w: halfW, h: packH, packId: pack.id });
        });

        curY += Math.ceil(coinPacks.length / 2) * (packH + gridGap) + 16;

        // Section: Premium Items
        ctx.fillStyle = 'rgba(206,147,216,0.7)';
        ctx.font = 'bold 14px -apple-system, Arial';
        ctx.textAlign = 'left';
        ctx.fillText('\uD83D\uDC8E  PREMIUM', 20, curY + 14);
        curY += 26;

        // Remove Ads + Starter Bundle
        const premItems = iapProducts.filter(p => p.type === 'non_consumable');
        const premH = 72;
        premItems.forEach((item, i) => {
            const iy = curY + i * (premH + 8);
            if (iy + premH > DESIGN.height - 10) return;

            const owned = (item.id === 'remove_ads' && hasRemoveAds);

            // Card
            const bg = ctx.createLinearGradient(16, iy, 16, iy + premH);
            bg.addColorStop(0, owned ? 'rgba(76,175,80,0.08)' : 'rgba(156,39,176,0.1)');
            bg.addColorStop(1, 'rgba(0,0,0,0.02)');
            ctx.fillStyle = bg;
            this._roundRect(ctx, 16, iy, cardW, premH, 16);
            ctx.fill();
            ctx.strokeStyle = owned ? 'rgba(76,175,80,0.3)' : 'rgba(206,147,216,0.2)';
            ctx.lineWidth = 0.5;
            this._roundRect(ctx, 16, iy, cardW, premH, 16);
            ctx.stroke();

            // Icon
            ctx.font = '26px serif';
            ctx.textAlign = 'center';
            ctx.fillText(item.icon || '\uD83D\uDC8E', 46, iy + 44);

            // Name + desc
            ctx.textAlign = 'left';
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px -apple-system, Arial';
            ctx.fillText(item.name, 74, iy + 28);
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.font = '10px -apple-system, Arial';
            ctx.fillText(item.desc || '', 74, iy + 46);

            // Price or Owned
            ctx.textAlign = 'right';
            const rx = 16 + cardW - 12;
            if (owned) {
                ctx.fillStyle = '#00e5ff';
                ctx.font = 'bold 12px -apple-system, Arial';
                ctx.fillText('\u2713 OWNED', rx, iy + 40);
            } else {
                // Price button
                const pbW = 70, pbH = 28;
                const pbX = rx - pbW, pbY = iy + (premH - pbH) / 2;
                const pbGrad = ctx.createLinearGradient(pbX, pbY, pbX, pbY + pbH);
                pbGrad.addColorStop(0, '#9c27b0');
                pbGrad.addColorStop(1, '#7b1fa2');
                ctx.fillStyle = pbGrad;
                ctx.shadowColor = 'rgba(156,39,176,0.3)';
                ctx.shadowBlur = 6;
                this._roundRect(ctx, pbX, pbY, pbW, pbH, 14);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px -apple-system, Arial';
                ctx.textAlign = 'center';
                ctx.fillText(item.price, pbX + pbW / 2, pbY + 19);
            }

            if (!owned) {
                premiumHits.push({ x: 16, y: iy, w: cardW, h: premH, productId: item.id });
            }
        });

        curY += premItems.length * (premH + 8) + 14;

        // Watch Ad button
        const adW = 240, adH = 40;
        const adX = cx - adW / 2;
        const adY = Math.min(curY, DESIGN.height - 55);
        const adBg = ctx.createLinearGradient(adX, adY, adX, adY + adH);
        adBg.addColorStop(0, 'rgba(156,39,176,0.15)');
        adBg.addColorStop(1, 'rgba(156,39,176,0.04)');
        ctx.fillStyle = adBg;
        this._roundRect(ctx, adX, adY, adW, adH, 20);
        ctx.fill();
        ctx.strokeStyle = 'rgba(206,147,216,0.3)';
        ctx.lineWidth = 1;
        this._roundRect(ctx, adX, adY, adW, adH, 20);
        ctx.stroke();
        ctx.fillStyle = '#ce93d8';
        ctx.font = 'bold 12px -apple-system, Arial';
        ctx.textAlign = 'center';
        ctx.fillText('\uD83C\uDFAC  Free Coins  \u2022  Watch Ad +50', cx, adY + 26);

        // Restore Purchases button
        const rpY = adY + adH + 14;
        const rpW = 200, rpH = 36;
        const rpX = cx - rpW / 2;
        ctx.fillStyle = 'rgba(255,255,255,0.04)';
        this._roundRect(ctx, rpX, rpY, rpW, rpH, 18);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 0.5;
        this._roundRect(ctx, rpX, rpY, rpW, rpH, 18);
        ctx.stroke();
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.font = '12px -apple-system, Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Restore Purchases', cx, rpY + 23);
        this._restoreBtnY = rpY;
        this._restoreBtnW = rpW;
        this._restoreBtnX = rpX;
        this._restoreBtnH = rpH;

        // Privacy Policy link
        const ppY = rpY + rpH + 10;
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.font = '10px -apple-system, Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Privacy Policy', cx, ppY + 10);
        this._privacyBtnY = ppY;
    }

    // Helper
    _roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }
}
