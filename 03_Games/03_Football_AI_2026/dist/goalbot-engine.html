// ============================================================================
// STORAGE — Capacitor Preferences abstraction with fallback to localStorage
// Handles: save, load, validation, defaults, migration, error recovery
// ============================================================================

class GameStorage {
    constructor() {
        this._backend = 'localStorage'; // 'capacitor' when native
        this._saveVersion = 2;          // schema version for migration
        this._lastSaveTime = 0;
        this._saveThrottleMs = 500;     // minimum ms between writes
        this._pendingSave = null;
        this._storageAvailable = true;
        this._lastError = null;

        // Detect Capacitor Preferences plugin
        if (typeof Capacitor !== 'undefined' && Capacitor.Plugins && Capacitor.Plugins.Preferences) {
            this._backend = 'capacitor';
            this._capacitorPrefs = Capacitor.Plugins.Preferences;
        }

        // Verify storage works
        this._testStorage();
    }

    // ── Test storage availability ──
    _testStorage() {
        try {
            const testKey = '__sg_test__';
            if (this._backend === 'capacitor') {
                // Capacitor is async but we test synchronously at init
                this._storageAvailable = true;
            } else {
                localStorage.setItem(testKey, '1');
                localStorage.removeItem(testKey);
                this._storageAvailable = true;
            }
        } catch (e) {
            this._storageAvailable = false;
            this._lastError = e.message;
            console.warn('[STORAGE] Storage unavailable:', e.message);
        }
    }

    // ── Default data schema — every field with safe defaults ──
    static defaults() {
        return {
            _version: 2,
            _lastSaved: null,

            // Currency & progression
            coins: 0,
            playerLevel: 1,
            playerXP: 0,
            xpToNextLevel: 100,
            totalGoals: 0,

            // Equipped items
            activeStadium: 'default',
            activeBall: 'classic',
            activeSkin: 'default',
            activeBot: 'basic',

            // IAP state
            hasRemoveAds: false,

            // Daily reward
            dailyReward: {
                lastClaimDate: null,
                streak: 0
            },

            // Unlocked items per category
            unlockedItems: {
                balls: ['classic'],
                stadiums: ['default'],
                skins: ['default'],
                bots: ['basic']
            },

            // Settings (NEW — persisted)
            settings: {
                audioMuted: false,
                difficulty: 'medium',
                surgeStyle: 'fire'
            },

            // Mission progress (NEW — persisted)
            missions: {
                score3: { progress: 0, completed: false },
                streak3: { progress: 0, completed: false },
                beat_hard: { progress: 0, completed: false },
                play5: { progress: 0, completed: false }
            },

            // Stats (merged into single save — was separate key)
            stats: {
                gamesPlayed: 0,
                bestScore: 0,
                totalShots: 0,
                successfulShots: 0
            }
        };
    }

    // ── SAVE — write game state to storage ──
    save(gameData) {
        if (!this._storageAvailable) {
            console.warn('[STORAGE] Save skipped — storage unavailable');
            return false;
        }

        const now = Date.now();

        // Throttle: if saving too fast, queue it
        if (now - this._lastSaveTime < this._saveThrottleMs) {
            if (this._pendingSave) clearTimeout(this._pendingSave);
            this._pendingSave = setTimeout(() => {
                this._pendingSave = null;
                this.save(gameData);
            }, this._saveThrottleMs);
            return true;
        }

        try {
            const data = this._buildSaveData(gameData);
            data._version = this._saveVersion;
            data._lastSaved = new Date().toISOString();

            const json = JSON.stringify(data);

            if (this._backend === 'capacitor') {
                this._capacitorPrefs.set({ key: 'smartgoal_data', value: json });
            } else {
                localStorage.setItem('smartgoal_data', json);
            }

            this._lastSaveTime = now;
            this._lastError = null;
            return true;
        } catch (e) {
            this._lastError = e.message;
            // iOS 5MB quota exceeded — try trimming non-essential data
            if (e.name === 'QuotaExceededError' || e.code === 22) {
                try {
                    // Strip large optional fields and retry
                    delete data.aiTrainingData;
                    delete data.shotHistory;
                    const trimmed = JSON.stringify(data);
                    localStorage.setItem('smartgoal_data', trimmed);
                    console.warn('[STORAGE] Saved with trimmed data (quota recovery)');
                    return true;
                } catch (e2) {
                    console.warn('[STORAGE] Quota recovery also failed');
                }
            }
            console.warn('[STORAGE] Save failed:', e.message);
            return false;
        }
    }

    // ── LOAD — read game state from storage ──
    load() {
        if (!this._storageAvailable) {
            console.warn('[STORAGE] Load skipped — storage unavailable');
            return GameStorage.defaults();
        }

        try {
            let raw = null;

            if (this._backend === 'capacitor') {
                // Capacitor Preferences is async; for init we need sync fallback
                // In production, use: const { value } = await this._capacitorPrefs.get({ key: 'smartgoal_data' });
                raw = localStorage.getItem('smartgoal_data');
            } else {
                raw = localStorage.getItem('smartgoal_data');
            }

            // Try new unified key first
            if (raw) {
                const data = JSON.parse(raw);
                return this._migrate(data);
            }

            // Migrate from legacy keys (v1 → v2)
            const legacyData = this._loadLegacy();
            if (legacyData) {
                console.log('[STORAGE] Migrated from legacy keys');
                // Save migrated data to new key
                this.save(legacyData);
                // Clean up old keys
                try {
                    localStorage.removeItem('smartgoal_progress');
                    localStorage.removeItem('smartgoal_stats');
                } catch (e) { /* ignore */ }
                return legacyData;
            }

            return GameStorage.defaults();
        } catch (e) {
            this._lastError = e.message;
            console.warn('[STORAGE] Load failed:', e.message);
            return GameStorage.defaults();
        }
    }

    // ── Migrate legacy data (v1 separate keys → v2 unified) ──
    _loadLegacy() {
        try {
            const progressRaw = localStorage.getItem('smartgoal_progress');
            const statsRaw = localStorage.getItem('smartgoal_stats');
            if (!progressRaw && !statsRaw) return null;

            const defaults = GameStorage.defaults();
            const progress = progressRaw ? JSON.parse(progressRaw) : {};
            const stats = statsRaw ? JSON.parse(statsRaw) : {};

            return {
                ...defaults,
                coins: progress.coins || 0,
                playerLevel: progress.playerLevel || 1,
                playerXP: progress.playerXP || 0,
                xpToNextLevel: progress.xpToNextLevel || 100,
                totalGoals: progress.totalGoals || 0,
                activeStadium: progress.activeStadium || 'default',
                activeBall: progress.activeBall || 'classic',
                activeSkin: progress.activeSkin || 'default',
                activeBot: progress.activeBot || 'basic',
                hasRemoveAds: progress.hasRemoveAds || false,
                dailyReward: progress.dailyReward || defaults.dailyReward,
                unlockedItems: progress.unlockedItems || defaults.unlockedItems,
                stats: stats.stats || defaults.stats
            };
        } catch (e) {
            return null;
        }
    }

    // ── Schema migration — handles version upgrades ──
    _migrate(data) {
        const defaults = GameStorage.defaults();
        const version = data._version || 1;

        // Ensure all fields exist (handles partial saves / new fields added)
        const merged = {
            ...defaults,
            ...data,
            settings: { ...defaults.settings, ...(data.settings || {}) },
            missions: { ...defaults.missions, ...(data.missions || {}) },
            stats: { ...defaults.stats, ...(data.stats || {}) },
            dailyReward: { ...defaults.dailyReward, ...(data.dailyReward || {}) },
            unlockedItems: {
                balls: data.unlockedItems?.balls || defaults.unlockedItems.balls,
                stadiums: data.unlockedItems?.stadiums || defaults.unlockedItems.stadiums,
                skins: data.unlockedItems?.skins || defaults.unlockedItems.skins,
                bots: data.unlockedItems?.bots || defaults.unlockedItems.bots
            }
        };

        // v1 → v2: add settings, missions, merge stats
        if (version < 2) {
            merged._version = 2;
            console.log('[STORAGE] Migrated v1 → v2');
        }

        return this._validate(merged);
    }

    // ── Validate data integrity — clamp values, fix corruption ──
    _validate(data) {
        // Coins must be non-negative integer
        data.coins = Math.max(0, Math.floor(data.coins || 0));

        // Level must be >= 1
        data.playerLevel = Math.max(1, Math.floor(data.playerLevel || 1));

        // XP must be non-negative
        data.playerXP = Math.max(0, Math.floor(data.playerXP || 0));
        data.xpToNextLevel = Math.max(50, Math.floor(data.xpToNextLevel || 100));

        // Total goals non-negative
        data.totalGoals = Math.max(0, Math.floor(data.totalGoals || 0));

        // Equipped items must be valid strings
        const validStadiums = ['default', 'champions', 'night', 'neon_stadium', 'worldcup'];
        const validBalls = ['classic', 'golden', 'neon', 'fire', 'lightning', 'ice'];
        const validSkins = ['default', 'away', 'retro', 'neon_kit', 'legend'];
        const validBots = ['basic', 'energy', 'sniper', 'elite'];

        if (!validStadiums.includes(data.activeStadium)) data.activeStadium = 'default';
        if (!validBalls.includes(data.activeBall)) data.activeBall = 'classic';
        if (!validSkins.includes(data.activeSkin)) data.activeSkin = 'default';
        if (!validBots.includes(data.activeBot)) data.activeBot = 'basic';

        // Validate difficulty
        const validDifficulties = ['easy', 'medium', 'hard', 'legend'];
        if (!validDifficulties.includes(data.settings?.difficulty)) {
            data.settings.difficulty = 'medium';
        }

        // Validate surge style
        const validStyles = ['fire', 'lightning', 'ice', 'cosmic'];
        if (!validStyles.includes(data.settings?.surgeStyle)) {
            data.settings.surgeStyle = 'fire';
        }

        // Ensure booleans
        data.hasRemoveAds = !!data.hasRemoveAds;
        data.settings.audioMuted = !!data.settings.audioMuted;

        // Stats must be non-negative
        if (data.stats) {
            data.stats.gamesPlayed = Math.max(0, data.stats.gamesPlayed || 0);
            data.stats.bestScore = Math.max(0, data.stats.bestScore || 0);
            data.stats.totalShots = Math.max(0, data.stats.totalShots || 0);
            data.stats.successfulShots = Math.max(0, data.stats.successfulShots || 0);
        }

        // Daily reward streak validation
        if (data.dailyReward) {
            data.dailyReward.streak = Math.max(0, Math.floor(data.dailyReward.streak || 0));
        }

        return data;
    }

    // ── Build save payload from live Game object ──
    _buildSaveData(g) {
        // g can be a raw object or a Game instance
        // This normalizes whatever is passed into the save schema
        return {
            _version: this._saveVersion,
            coins: g.coins || 0,
            playerLevel: g.playerLevel || 1,
            playerXP: g.playerXP || 0,
            xpToNextLevel: g.xpToNextLevel || 100,
            totalGoals: g.totalGoals || 0,
            activeStadium: g.activeStadium || 'default',
            activeBall: g.activeBall || 'classic',
            activeSkin: g.activeSkin || 'default',
            activeBot: g.activeBot || 'basic',
            hasRemoveAds: g.hasRemoveAds || false,
            dailyReward: {
                lastClaimDate: g.dailyReward?.lastClaimDate || null,
                streak: g.dailyReward?.streak || 0
            },
            unlockedItems: g.unlockedItems || {
                balls: ['classic'],
                stadiums: ['default'],
                skins: ['default'],
                bots: ['basic']
            },
            settings: {
                audioMuted: g.settings?.audioMuted || false,
                difficulty: g.settings?.difficulty || 'medium',
                surgeStyle: g.settings?.surgeStyle || 'fire'
            },
            missions: g.missions || GameStorage.defaults().missions,
            stats: g.stats || GameStorage.defaults().stats
        };
    }

    // ── Utility: check if storage works ──
    get isAvailable() { return this._storageAvailable; }
    get lastError() { return this._lastError; }
    get backend() { return this._backend; }

    // ── Clear all data (for testing/reset) ──
    clear() {
        try {
            if (this._backend === 'capacitor') {
                this._capacitorPrefs.remove({ key: 'smartgoal_data' });
            }
            localStorage.removeItem('smartgoal_data');
            localStorage.removeItem('smartgoal_progress');
            localStorage.removeItem('smartgoal_stats');
            return true;
        } catch (e) {
            return false;
        }
    }
}

// ============================================================================
// SWIPE DETECTOR — For shooting
// ============================================================================

class SwipeDetector {
    constructor() {
        this.startX = 0;
        this.startY = 0;
        this.startTime = 0;
        this.active = false;
        this.touchId = null;

        // Last detected swipe
        this.swipe = null;

        // Trail for visual
        this.trail = [];
    }

    handleTouchStart(touch) {
        this.startX = touch.x;
        this.startY = touch.y;
        this.startTime = Date.now();
        this.active = true;
        this.touchId = touch.id;
        this.trail = [{ x: touch.x, y: touch.y, t: Date.now() }];
        this.swipe = null;
        return true;
    }

    handleTouchMove(touch) {
        if (!this.active || touch.id !== this.touchId) return false;
        this.trail.push({ x: touch.x, y: touch.y, t: Date.now() });
        if (this.trail.length > 20) this.trail.shift();
        return true;
    }

    handleTouchEnd(touch) {
        if (!this.active || touch.id !== this.touchId) return false;
        this.active = false;

        const dx = touch.x - this.startX;
        const dy = touch.y - this.startY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const elapsed = Date.now() - this.startTime;
        const speed = dist / Math.max(elapsed, 1);

        if (dist > DESIGN.swipeThreshold && elapsed < 500) {
            this.swipe = {
                dx: dx,
                dy: dy,
                angle: Math.atan2(dy, dx),
                power: Utils.clamp(speed / 2, 0.3, 1.0),
                distance: dist,
                startX: this.startX,
                startY: this.startY,
                endX: touch.x,
                endY: touch.y
            };
        }

        this.touchId = null;
        return true;
    }

    consumeSwipe() {
        const s = this.swipe;
        this.swipe = null;
        return s;
    }

    drawTrail(ctx) {
        if (this.trail.length < 2 || !this.active) return;
        ctx.save();
        ctx.lineCap = 'round';
        for (let i = 1; i < this.trail.length; i++) {
            const alpha = i / this.trail.length;
            ctx.strokeStyle = Utils.hexToRgba(COLORS.accent, alpha * 0.6);
            ctx.lineWidth = alpha * 6;
            ctx.beginPath();
            ctx.moveTo(this.trail[i - 1].x, this.trail[i - 1].y);
            ctx.lineTo(this.trail[i].x, this.trail[i].y);
            ctx.stroke();
        }
        ctx.restore();
    }
}

// ============================================================================
// TOUCH MANAGER — Coordinates all touch inputs
// ============================================================================

class TouchManager {
    constructor(canvas) {
        this.canvas = canvas;
        this.scaleX = 1;
        this.scaleY = 1;
        this.offsetX = 0;
        this.offsetY = 0;

        this.swipe = new SwipeDetector();
        this.taps = []; // for UI button taps

        this._bindEvents();
    }

    setTransform(scaleX, scaleY, offsetX, offsetY) {
        this.scaleX = scaleX;
        this.scaleY = scaleY;
        this.offsetX = offsetX;
        this.offsetY = offsetY;
    }

    _getTouch(e, changedTouch) {
        const rect = this.canvas.getBoundingClientRect();
        return {
            id: changedTouch.identifier,
            x: (changedTouch.clientX - rect.left - this.offsetX) / this.scaleX,
            y: (changedTouch.clientY - rect.top - this.offsetY) / this.scaleY,
            rawX: changedTouch.clientX - rect.left,
            rawY: changedTouch.clientY - rect.top
        };
    }

    _getMouse(e) {
        const rect = this.canvas.getBoundingClientRect();
        return {
            id: -1,
            x: (e.clientX - rect.left - this.offsetX) / this.scaleX,
            y: (e.clientY - rect.top - this.offsetY) / this.scaleY,
            rawX: e.clientX - rect.left,
            rawY: e.clientY - rect.top
        };
    }

    _bindEvents() {
        const c = this.canvas;

        // Touch events — all touches go to swipe (joystick disabled)
        c.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (const ct of e.changedTouches) {
                const t = this._getTouch(e, ct);
                this.swipe.handleTouchStart(t);
                this.taps.push({ x: t.x, y: t.y, time: Date.now() });
            }
        }, { passive: false });

        c.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (const ct of e.changedTouches) {
                const t = this._getTouch(e, ct);
                this.swipe.handleTouchMove(t);
            }
        }, { passive: false });

        c.addEventListener('touchend', (e) => {
            e.preventDefault();
            for (const ct of e.changedTouches) {
                const t = this._getTouch(e, ct);
                this.swipe.handleTouchEnd(t);
            }
        }, { passive: false });

        c.addEventListener('touchcancel', (e) => {
            for (const ct of e.changedTouches) {
                const t = this._getTouch(e, ct);
                this.swipe.handleTouchEnd(t);
            }
        });

        // Mouse fallback for desktop
        let mouseDown = false;
        c.addEventListener('mousedown', (e) => {
            mouseDown = true;
            const t = this._getMouse(e);
            this.swipe.handleTouchStart(t);
            this.taps.push({ x: t.x, y: t.y, time: Date.now() });
        });

        c.addEventListener('mousemove', (e) => {
            if (!mouseDown) return;
            const t = this._getMouse(e);
            this.swipe.handleTouchMove(t);
        });

        c.addEventListener('mouseup', (e) => {
            mouseDown = false;
            const t = this._getMouse(e);
            this.swipe.handleTouchEnd(t);
        });
    }

    consumeTap() {
        if (this.taps.length === 0) return null;
        return this.taps.shift();
    }

    update() {
        // swipe-only — no joystick update needed
    }
}

// ============================================================================
// PHYSICS — Ball, Player, and Goalkeeper physics
// ============================================================================

class Ball {
    constructor() {
        this.reset();
        this.radius = DESIGN.ballRadius;
        this.spinAngle = 0;
        this.trail = [];
        this.shadow = { x: 0, y: 0, scale: 1 };
        this.height = 0;        // simulated Z-height for chip shots
        this.heightVel = 0;
        this.surgeMode = false;  // Power Surge active
        this.surgeLevel = 0;    // 0-4, controls trail intensity
        this.surgeStyle = 'fire';
        this.visualType = 'classic'; // Shop ball visual type
    }

    reset() {
        // Ball starts at penalty spot area
        this.x = DESIGN.width / 2;
        this.y = DESIGN.fieldBottom - 100;
        this.vx = 0;
        this.vy = 0;
        this.height = 0;
        this.heightVel = 0;
        this.spinAngle = 0;
        this.trail = [];
        this.active = false;     // not in flight
        this.curveForce = 0;     // lateral curve
        this.curveIntensity = 0; // visual: current curve strength
        this.curveDirection = 0; // visual: -1 left, +1 right
    }

    shoot(angle, power, curve) {
        const speed = DESIGN.shotSpeed * power;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.curveForce = curve || 0; // direct — tuned in _shoot()
        this.active = true;

        // Chip: slight lift on high power shots
        if (power > 0.85) {
            this.heightVel = (power - 0.85) * 20;
        }
    }

    update() {
        if (!this.active) return;

        // Apply curve (swerve) — 0.96 decay = tighter, dramatic arc
        this.vx += this.curveForce;
        this.curveForce *= 0.96;

        // Move
        this.x += this.vx;
        this.y += this.vy;

        // Height (chip simulation) — capped to prevent unsaveable lobs
        this.height += this.heightVel;
        this.heightVel -= 0.25; // gravity
        if (this.height < 0) { this.height = 0; this.heightVel = 0; }
        if (this.height > 12) { this.height = 12; this.heightVel = Math.min(this.heightVel, 0); }

        // Friction
        this.vx *= 0.995;
        this.vy *= 0.995;

        // Spin visual
        const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
        this.spinAngle += speed * 0.08;

        // Track curve intensity for visual effects
        this.curveIntensity = Math.abs(this.curveForce);
        this.curveDirection = this.curveForce > 0 ? 1 : -1;

        // Trail — density and decay scale with surge level
        if (speed > 2) {
            this.trail.push({
                x: this.x, y: this.y - this.height,
                alpha: 1, size: this.radius,
                surge: this.surgeMode, surgeLevel: this.surgeLevel, style: this.surgeStyle,
                curve: this.curveIntensity > 0.15 // flag curved trail points
            });
            // Curve swerve particles — scale with curve intensity
            if (this.curveIntensity > 0.12 && speed > 4) {
                const spread = 4 + this.curveIntensity * 12;
                this.trail.push({
                    x: this.x + Utils.randRange(-spread, spread) * -this.curveDirection,
                    y: this.y - this.height + Utils.randRange(-2, 2),
                    alpha: 0.6 + this.curveIntensity * 0.8,
                    size: this.radius * (0.25 + Math.random() * 0.25),
                    surge: false, curveTrail: true,
                    curveLevel: this.curveIntensity > 0.25 ? 3 : (this.curveIntensity > 0.15 ? 2 : 1)
                });
            }
            // Surge mode: extra trail particles scale with level (L1=0, L2=1, L3=2, L4=3)
            if (this.surgeMode && speed > 5) {
                const extraCount = Math.max(0, this.surgeLevel - 1);
                for (let i = 0; i < extraCount; i++) {
                    const spread = 3 + this.surgeLevel;
                    this.trail.push({
                        x: this.x + Utils.randRange(-spread, spread),
                        y: this.y - this.height + Utils.randRange(-spread, spread),
                        alpha: 0.7 + Math.random() * 0.3,
                        size: this.radius * (0.4 + Math.random() * 0.4 + this.surgeLevel * 0.05),
                        surge: true, surgeLevel: this.surgeLevel, style: this.surgeStyle
                    });
                }
            }
        }
        // Hard cap on trail length
        const MAX_TRAIL = 80;
        if (this.trail.length > MAX_TRAIL) this.trail.splice(0, this.trail.length - MAX_TRAIL);
        // Higher surge level = slower decay = longer trail
        const trailDecay = this.surgeMode ? Math.max(0.02, 0.06 - this.surgeLevel * 0.01) : 0.06;
        this.trail = this.trail.filter(t => {
            t.alpha -= trailDecay;
            t.size *= 0.95;
            return t.alpha > 0;
        });

        // Shadow
        this.shadow.x = this.x + this.height * 0.3;
        this.shadow.y = this.y + 5;
        this.shadow.scale = 1 - this.height * 0.01;

        // Side boundaries
        if (this.x < 20) { this.x = 20; this.vx *= -0.5; }
        if (this.x > DESIGN.width - 20) { this.x = DESIGN.width - 20; this.vx *= -0.5; }
    }

    getDisplayY() { return this.y - this.height; }

    draw(ctx) {
        const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
        const bv = BALL_VISUALS[this.visualType] || BALL_VISUALS.classic;

        // Ball trail (motion blur / energy trail)
        if (this.active && this.trail.length > 1) {
            for (let i = 0; i < this.trail.length; i++) {
                const t = this.trail[i];
                const progress = i / this.trail.length;

                if (t.surge) {
                    // MULTI-LEVEL SURGE TRAIL — colors shift by level
                    const lv = t.surgeLevel || 1;
                    const levelTrailColors = {
                        1: { r1: [80,180,80],    r2: [150,255,150] },
                        2: { r1: [255,200,0],    r2: [255,255,100] },
                        3: { r1: [255,60,0],     r2: [255,200,0] },
                        4: { r1: [130,0,255],    r2: [255,0,200] }
                    };
                    const styleTrailColors = {
                        fire:      { r1: [255,60,0],   r2: [255,200,0] },
                        lightning: { r1: [0,100,255],   r2: [150,230,255] },
                        ice:       { r1: [0,150,255],   r2: [200,240,255] },
                        cosmic:    { r1: [130,0,255],   r2: [255,0,200] }
                    };
                    const sc = lv >= 3 ? (styleTrailColors[t.style] || styleTrailColors.fire)
                                       : (levelTrailColors[lv] || levelTrailColors[1]);
                    const r = Math.round(Utils.lerp(sc.r1[0], sc.r2[0], progress));
                    const g = Math.round(Utils.lerp(sc.r1[1], sc.r2[1], progress));
                    const b = Math.round(Utils.lerp(sc.r1[2], sc.r2[2], progress));

                    ctx.globalAlpha = t.alpha * (0.3 + lv * 0.1);
                    ctx.shadowColor = `rgb(${r},${g},${b})`;
                    ctx.shadowBlur = 4 + lv * 2;
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, t.size * (0.3 + progress * 0.6 + lv * 0.1), 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else if (bv.trail) {
                    // SHOP BALL TRAIL — unique per ball type
                    const tc = bv.trail.colors;
                    const r = Math.round(Utils.lerp(tc[0][0], tc[1][0], progress));
                    const g = Math.round(Utils.lerp(tc[0][1], tc[1][1], progress));
                    const b = Math.round(Utils.lerp(tc[0][2], tc[1][2], progress));
                    ctx.globalAlpha = t.alpha * bv.trail.alpha;
                    ctx.shadowColor = `rgb(${r},${g},${b})`;
                    ctx.shadowBlur = 6;
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, t.size * (0.3 + progress * 0.7), 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else if (t.curveTrail) {
                    // CURVE TRAIL — tiered colors (blue/cyan/gold)
                    const cl = t.curveLevel || 1;
                    const cr = cl >= 3 ? 255 : (cl >= 2 ? 80 : 140);
                    const cg = cl >= 3 ? Math.round(Utils.lerp(180, 240, progress)) : (cl >= 2 ? Math.round(Utils.lerp(200, 240, progress)) : Math.round(Utils.lerp(190, 230, progress)));
                    const cb = cl >= 3 ? Math.round(Utils.lerp(0, 80, progress)) : 255;
                    ctx.globalAlpha = t.alpha * 0.45;
                    ctx.shadowColor = cl >= 3 ? '#ff8800' : '#44aaff';
                    ctx.shadowBlur = cl >= 3 ? 8 : 5;
                    ctx.fillStyle = `rgb(${cr},${cg},${cb})`;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, t.size * (0.25 + progress * 0.5), 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else {
                    // Normal trail (classic ball)
                    ctx.globalAlpha = t.alpha * 0.25;
                    const r = Math.round(255 * (1 - progress));
                    const g = Math.round(200 * progress + 55);
                    const b = 50;
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, t.size * (0.3 + progress * 0.7), 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            ctx.globalAlpha = 1;
        }

        // Shadow on ground
        if (this.active || this.height > 0) {
            ctx.save();
            ctx.globalAlpha = 0.22 * Math.max(0, this.shadow.scale);
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.ellipse(this.shadow.x, this.shadow.y, this.radius * 1.3 * Math.max(0.3, this.shadow.scale),
                        this.radius * 0.45 * Math.max(0.3, this.shadow.scale), 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        const drawY = this.getDisplayY();
        const r = this.radius + this.height * 0.15; // slightly bigger when high

        ctx.save();
        ctx.translate(this.x, drawY);

        // Outer glow when in motion — scales with surge level + ball type
        if (this.active && speed > 5) {
            const lv = this.surgeLevel || 0;
            const glowAlpha = this.surgeMode
                ? Math.min(speed / (20 - lv * 2), 0.3 + lv * 0.1)
                : Math.min(speed / 25, 0.3);
            const glowR = this.surgeMode ? r * (2.5 + lv * 0.4) : r * 2.5;

            let glowColor1, glowColor2;
            if (this.surgeMode) {
                const levelGlowMap = {
                    1: [`rgba(100,200,100,${glowAlpha})`, 'rgba(60,150,60,0)'],
                    2: [`rgba(255,230,50,${glowAlpha})`, 'rgba(200,180,0,0)'],
                    3: [`rgba(255,100,0,${glowAlpha})`, 'rgba(255,50,0,0)'],
                    4: [`rgba(180,0,255,${glowAlpha})`, 'rgba(100,0,200,0)']
                };
                const styleGlowMap = {
                    fire: [`rgba(255,100,0,${glowAlpha})`, 'rgba(255,50,0,0)'],
                    lightning: [`rgba(0,200,255,${glowAlpha})`, 'rgba(0,100,255,0)'],
                    ice: [`rgba(100,220,255,${glowAlpha})`, 'rgba(0,150,255,0)'],
                    cosmic: [`rgba(180,0,255,${glowAlpha})`, 'rgba(100,0,200,0)']
                };
                const gc = lv >= 3
                    ? (styleGlowMap[this.surgeStyle] || styleGlowMap.fire)
                    : (levelGlowMap[lv] || levelGlowMap[1]);
                glowColor1 = gc[0]; glowColor2 = gc[1];
            } else if (bv.glow) {
                // Shop ball glow (non-surge)
                const bg = bv.glow;
                glowColor1 = `rgba(${bg.color[0]},${bg.color[1]},${bg.color[2]},${glowAlpha * (bg.alpha / 0.3)})`;
                glowColor2 = `rgba(${bg.color[0]},${bg.color[1]},${bg.color[2]},0)`;
            } else {
                glowColor1 = `rgba(255,255,255,${glowAlpha})`;
                glowColor2 = 'rgba(255,255,255,0)';
            }

            const glow = ctx.createRadialGradient(0, 0, r, 0, 0, glowR);
            glow.addColorStop(0, glowColor1);
            glow.addColorStop(1, glowColor2);
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(0, 0, glowR, 0, Math.PI * 2);
            ctx.fill();
        }

        // === UNIFIED CURVE AURA — intensity-based ===
        if (this.active && this.curveIntensity > 0.08 && speed > 3) {
            const ci = Math.min(this.curveIntensity, 0.4);
            const dir = this.curveDirection;
            const isBanana = ci > 0.25;
            const isStrong = ci > 0.15;
            const auraR = r * (1.8 + ci * 4);
            const auraAlpha = Math.min(0.3, ci * 0.8);
            const auraGrad = ctx.createRadialGradient(dir * -r * 0.4, 0, r * 0.3, 0, 0, auraR);
            if (isBanana) {
                auraGrad.addColorStop(0, `rgba(255,200,0,${auraAlpha})`);
                auraGrad.addColorStop(0.6, `rgba(255,140,0,${auraAlpha * 0.3})`);
                auraGrad.addColorStop(1, 'rgba(255,100,0,0)');
            } else if (isStrong) {
                auraGrad.addColorStop(0, `rgba(100,220,255,${auraAlpha})`);
                auraGrad.addColorStop(0.6, `rgba(50,150,255,${auraAlpha * 0.3})`);
                auraGrad.addColorStop(1, 'rgba(0,100,255,0)');
            } else {
                auraGrad.addColorStop(0, `rgba(180,220,255,${auraAlpha * 0.6})`);
                auraGrad.addColorStop(0.6, `rgba(120,180,255,${auraAlpha * 0.2})`);
                auraGrad.addColorStop(1, 'rgba(80,140,255,0)');
            }
            ctx.fillStyle = auraGrad;
            ctx.beginPath();
            ctx.arc(0, 0, auraR, 0, Math.PI * 2);
            ctx.fill();
            if (isStrong) {
                const windTime = this.spinAngle * 2;
                ctx.lineWidth = 1.5;
                const arcCount = isBanana ? 3 : 2;
                for (let w = 0; w < arcCount; w++) {
                    const wa = windTime + w * (Math.PI * 2 / arcCount);
                    const windR = r * (1.3 + ci * 1.5) + Math.sin(windTime * 2 + w) * 2;
                    const arcLen = Math.PI * (0.25 + ci * 0.3);
                    ctx.globalAlpha = 0.25 + ci * 0.4;
                    ctx.strokeStyle = isBanana ? (w === 0 ? '#ffcc00' : '#ff8800') : (w === 0 ? '#66eeff' : '#44aaff');
                    ctx.shadowColor = isBanana ? '#ff8800' : '#00aaff';
                    ctx.shadowBlur = 3;
                    ctx.beginPath();
                    ctx.arc(0, 0, windR, wa * dir, (wa + arcLen) * dir, dir < 0);
                    ctx.stroke();
                }
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }
        }

        // Ball body — themed gradient from BALL_VISUALS
        const bc = bv.body;
        const grad = ctx.createRadialGradient(-r * 0.25, -r * 0.3, r * 0.05, r * 0.1, r * 0.1, r * 1.1);
        grad.addColorStop(0, bc[0]);
        grad.addColorStop(0.4, bc[1]);
        grad.addColorStop(0.75, bc[2]);
        grad.addColorStop(1, bc[3]);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fill();

        // Subtle border
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.stroke();

        // Pentagon patches — themed color
        ctx.fillStyle = bv.patch;
        for (let i = 0; i < 5; i++) {
            const a = this.spinAngle + (i * Math.PI * 2) / 5;
            const px = Math.cos(a) * r * 0.5;
            const py = Math.sin(a) * r * 0.5;
            ctx.beginPath();
            for (let j = 0; j < 5; j++) {
                const pa = (j * Math.PI * 2) / 5 + a * 0.3;
                const sx = px + Math.cos(pa) * r * 0.22;
                const sy = py + Math.sin(pa) * r * 0.22;
                if (j === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
            }
            ctx.closePath();
            ctx.fill();
        }

        // Hexagon seam lines between patches
        ctx.strokeStyle = 'rgba(0,0,0,0.12)';
        ctx.lineWidth = 0.6;
        for (let i = 0; i < 6; i++) {
            const a = this.spinAngle * 0.5 + (i * Math.PI * 2) / 6;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(Math.cos(a) * r * 0.85, Math.sin(a) * r * 0.85);
            ctx.stroke();
        }

        // Specular highlight (top-left)
        const hlGrad = ctx.createRadialGradient(-r * 0.3, -r * 0.35, 0, -r * 0.2, -r * 0.2, r * 0.6);
        hlGrad.addColorStop(0, 'rgba(255,255,255,0.8)');
        hlGrad.addColorStop(0.5, 'rgba(255,255,255,0.2)');
        hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = hlGrad;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fill();

        // Bottom edge shadow
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.beginPath();
        ctx.arc(0, r * 0.15, r, 0.2, Math.PI - 0.2);
        ctx.closePath();
        ctx.fill();

        ctx.restore();
    }
}

// ============================================================================
// GOALKEEPER — Premium styled with detailed sprite
// ============================================================================

class Goalkeeper {
    constructor() {
        this.reset();
        this.width = DESIGN.keeperWidth;
        this.height = DESIGN.keeperHeight;
    }

    reset() {
        this.x = DESIGN.width / 2;
        this.y = DESIGN.goalLineY + 15;  // just in front of visual goal line (y=87)
        this.targetX = this.x;
        this.targetY = this.y;
        this.vx = 0;
        this.vy = 0;
        this.state = 'idle';  // idle, anticipate, dive, save, concede
        this.stateTime = 0;
        this.diveDirection = 0;  // -1 left, 0 center, 1 right
        this.diveProgress = 0;
        this.armExtension = 0;
        this.bodyAngle = 0;
        this.idleSway = 0;

        // AI behavior overrides (set by Game._computeKeeperDive)
        this.diveSpeedOverride = null;
        this.saveReachMultiplier = 1.0;
        this.willMiss = false;
    }

    // ML-driven decision: where to dive
    // Now receives pre-computed diveX from Game._computeKeeperDive
    decideDive(prediction, diveX, diveY, confidence) {
        const goalCenterX = DESIGN.width / 2;

        this.targetX = diveX;
        this.targetY = diveY;
        this.state = 'dive';
        this.diveProgress = 0;
        this.diveDirection = diveX < goalCenterX - 10 ? -1 : diveX > goalCenterX + 10 ? 1 : 0;
    }

    update(diveSpeed) {
        this.stateTime++;
        this.idleSway += 0.03;

        diveSpeed = diveSpeed || 0.04;

        switch (this.state) {
            case 'idle':
                this.x = DESIGN.width / 2 + Math.sin(this.idleSway) * 15;
                this.y = DESIGN.goalLineY + 15;  // stay in front of visual goal
                this.bodyAngle = Math.sin(this.idleSway) * 0.05;
                this.armExtension = 0;
                break;

            case 'anticipate':
                // Slight shift toward predicted side
                this.x = Utils.lerp(this.x, this.targetX, 0.02);
                this.bodyAngle = (this.targetX - this.x) * 0.003;
                break;

            case 'dive':
                this.diveProgress = Math.min(1, this.diveProgress + diveSpeed);
                const eased = Utils.easeOutCubic(this.diveProgress);
                this.x = Utils.lerp(DESIGN.width / 2, this.targetX, eased);
                this.y = Utils.lerp(DESIGN.goalLineY + 15, this.targetY, eased * 0.5);
                this.bodyAngle = this.diveDirection * eased * 0.8;
                this.armExtension = eased;
                break;

            case 'save':
                this.bodyAngle *= 0.95;
                this.armExtension *= 0.98;
                if (this.stateTime > 60) this.state = 'idle';
                break;

            case 'concede':
                this.bodyAngle *= 0.95;
                this.armExtension *= 0.95;
                if (this.stateTime > 60) this.state = 'idle';
                break;
        }
    }

    canSave(ballX, ballY, ballHeight) {
        const dx = Math.abs(ballX - this.x);
        const dy = Math.abs(ballY - this.y);
        const reach = this.saveReachMultiplier || 1.0;

        // Base reach from body + arm extension during dive
        const baseReachX = this.width * 0.5 + this.armExtension * 45;
        const baseReachY = this.height * 0.5 + 25;

        // Early dive bonus: keeper who committed early has extended reach
        const earlyBonus = this.earlyDiveBonus || 0;
        let reachX = (baseReachX + earlyBonus * 20) * reach;
        const reachY = (baseReachY + earlyBonus * 10) * reach;

        // === WRONG-DIRECTION PENALTY ===
        // If keeper is diving one way but ball is on the OTHER side, massively reduce reach.
        // This prevents "phantom saves" where keeper dives left but saves a right-side shot.
        if (this.state === 'dive' && this.diveDirection !== 0 && this.diveProgress > 0.1) {
            const goalCX = DESIGN ? DESIGN.width / 2 : 207;
            const ballSide = ballX < goalCX - 15 ? -1 : (ballX > goalCX + 15 ? 1 : 0);
            // Ball is on opposite side of where keeper dove
            if (ballSide !== 0 && ballSide !== this.diveDirection) {
                // Keeper dove wrong way — reach shrinks drastically with dive progress
                // The further they've committed, the less they can reach back
                const wrongPenalty = this.diveProgress * 0.85; // up to 85% reach reduction
                reachX *= (1.0 - wrongPenalty);
            }
        }

        // Chip shots reduce save chance slightly (not drastically)
        const heightPenalty = ballHeight > 2 ? Math.min(ballHeight * 1.5, 18) : 0;

        // Diving keepers get forward reach (Y direction toward ball)
        const diveYBonus = this.state === 'dive' ? this.diveProgress * 15 : 0;

        return dx < (reachX - heightPenalty) && dy < (reachY + diveYBonus);
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.bodyAngle);

        const ext = this.armExtension;
        const dir = this.diveDirection;

        // Ground shadow (elongated when diving)
        ctx.globalAlpha = 0.22;
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.ellipse(dir * ext * 15, this.height * 0.45, 22 + ext * 25, 7 + ext * 3, this.bodyAngle * 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        // Left leg
        ctx.fillStyle = '#1a1a1a';
        ctx.beginPath();
        ctx.moveTo(-7, 12);
        ctx.lineTo(-10 - ext * dir * 5, 28 + ext * 3);
        ctx.lineTo(-3, 28 + ext * 3);
        ctx.lineTo(-2, 12);
        ctx.closePath();
        ctx.fill();

        // Right leg
        ctx.beginPath();
        ctx.moveTo(3, 12);
        ctx.lineTo(5 + ext * dir * 8, 26 + ext * 5);
        ctx.lineTo(12 + ext * dir * 8, 26 + ext * 5);
        ctx.lineTo(8, 12);
        ctx.closePath();
        ctx.fill();

        // Boots (dark with studs)
        ctx.fillStyle = '#111';
        ctx.beginPath();
        ctx.moveTo(-12 - ext * dir * 5, 27 + ext * 3);
        ctx.lineTo(-1, 27 + ext * 3);
        ctx.lineTo(-1, 31 + ext * 3);
        ctx.lineTo(-14 - ext * dir * 5, 31 + ext * 3);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(4 + ext * dir * 8, 25 + ext * 5);
        ctx.lineTo(14 + ext * dir * 8, 25 + ext * 5);
        ctx.lineTo(14 + ext * dir * 8, 29 + ext * 5);
        ctx.lineTo(4 + ext * dir * 8, 29 + ext * 5);
        ctx.closePath();
        ctx.fill();

        // Body (goalkeeper jersey — bright orange/neon)
        const jerseyGrad = ctx.createLinearGradient(-18, -32, 18, 12);
        jerseyGrad.addColorStop(0, '#ff6f00');
        jerseyGrad.addColorStop(0.4, '#ff8f00');
        jerseyGrad.addColorStop(0.7, '#ff6f00');
        jerseyGrad.addColorStop(1, '#e65100');
        ctx.fillStyle = jerseyGrad;
        // Rounded torso
        ctx.beginPath();
        ctx.moveTo(-15, -28);
        ctx.quadraticCurveTo(-19, -10, -14, 14);
        ctx.lineTo(14, 14);
        ctx.quadraticCurveTo(19, -10, 15, -28);
        ctx.closePath();
        ctx.fill();

        // Jersey collar (V-neck)
        ctx.fillStyle = '#222';
        ctx.beginPath();
        ctx.moveTo(-7, -28);
        ctx.lineTo(0, -22);
        ctx.lineTo(7, -28);
        ctx.closePath();
        ctx.fill();

        // Jersey side stripe
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(-17, -26, 4, 38);
        ctx.fillRect(13, -26, 4, 38);

        // Shoulder pads / padding detail
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.beginPath();
        ctx.ellipse(-14, -22, 5, 8, -0.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(14, -22, 5, 8, 0.2, 0, Math.PI * 2);
        ctx.fill();

        // Number on back
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 16px -apple-system, Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('1', 0, -8);
        ctx.textBaseline = 'alphabetic';

        // Arms with skin tone
        ctx.lineWidth = 6;
        ctx.lineCap = 'round';

        // Left arm
        const lArmEndX = -18 - 32 * ext;
        const lArmEndY = -22 - 18 * ext;
        // Upper arm (jersey color)
        ctx.strokeStyle = '#ff7a00';
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(-16, -18);
        ctx.quadraticCurveTo(-20 - ext * 10, -20 - ext * 5, lArmEndX * 0.6 - 5, lArmEndY * 0.6 - 5);
        ctx.stroke();
        // Forearm (skin)
        ctx.strokeStyle = '#d4a574';
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(lArmEndX * 0.6 - 5, lArmEndY * 0.6 - 5);
        ctx.lineTo(lArmEndX, lArmEndY);
        ctx.stroke();

        // Right arm
        const rArmEndX = 18 + 36 * ext;
        const rArmEndY = -18 - 20 * ext;
        ctx.strokeStyle = '#ff7a00';
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(16, -18);
        ctx.quadraticCurveTo(20 + ext * 12, -18 - ext * 6, rArmEndX * 0.6 + 5, rArmEndY * 0.6 - 3);
        ctx.stroke();
        ctx.strokeStyle = '#d4a574';
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(rArmEndX * 0.6 + 5, rArmEndY * 0.6 - 3);
        ctx.lineTo(rArmEndX, rArmEndY);
        ctx.stroke();

        // Goalkeeper gloves (bright neon green/yellow)
        const gloveGrad1 = ctx.createRadialGradient(lArmEndX, lArmEndY, 0, lArmEndX, lArmEndY, 9);
        gloveGrad1.addColorStop(0, '#c6ff00');
        gloveGrad1.addColorStop(0.6, '#aeea00');
        gloveGrad1.addColorStop(1, '#64dd17');
        ctx.fillStyle = gloveGrad1;
        ctx.beginPath();
        ctx.arc(lArmEndX, lArmEndY, 8 + ext * 2, 0, Math.PI * 2);
        ctx.fill();
        // Glove palm detail
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.beginPath();
        ctx.arc(lArmEndX + 1, lArmEndY + 1, 5, 0, Math.PI * 2);
        ctx.fill();

        const gloveGrad2 = ctx.createRadialGradient(rArmEndX, rArmEndY, 0, rArmEndX, rArmEndY, 10);
        gloveGrad2.addColorStop(0, '#c6ff00');
        gloveGrad2.addColorStop(0.6, '#aeea00');
        gloveGrad2.addColorStop(1, '#64dd17');
        ctx.fillStyle = gloveGrad2;
        ctx.beginPath();
        ctx.arc(rArmEndX, rArmEndY, 9 + ext * 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.beginPath();
        ctx.arc(rArmEndX + 1, rArmEndY + 1, 6, 0, Math.PI * 2);
        ctx.fill();

        // Finger details on gloves when extended
        if (ext > 0.3) {
            ctx.strokeStyle = '#aeea00';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            for (let f = 0; f < 4; f++) {
                const fa = -0.6 + f * 0.4;
                ctx.beginPath();
                ctx.moveTo(rArmEndX + Math.cos(fa) * 6, rArmEndY + Math.sin(fa) * 6);
                ctx.lineTo(rArmEndX + Math.cos(fa) * 11, rArmEndY + Math.sin(fa) * 11);
                ctx.stroke();
            }
        }

        // Head
        ctx.fillStyle = '#d4a574';
        ctx.beginPath();
        ctx.arc(0, -40, 12, 0, Math.PI * 2);
        ctx.fill();

        // Keeper cap/hat
        ctx.fillStyle = '#ff6f00';
        ctx.beginPath();
        ctx.arc(0, -42, 12, Math.PI * 1.15, Math.PI * -0.15);
        ctx.fill();
        // Cap brim
        ctx.fillStyle = '#e65100';
        ctx.beginPath();
        ctx.ellipse(0, -41, 14, 4, 0, Math.PI * 1.1, Math.PI * -0.1);
        ctx.fill();

        // Eyes
        ctx.fillStyle = '#222';
        ctx.beginPath();
        ctx.arc(-4, -40, 1.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(4, -40, 1.8, 0, Math.PI * 2);
        ctx.fill();

        // Eye whites
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(-4, -40.5, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#222';
        ctx.beginPath();
        ctx.arc(-3.5, -40, 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(4, -40.5, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#222';
        ctx.beginPath();
        ctx.arc(4.5, -40, 1.5, 0, Math.PI * 2);
        ctx.fill();

        // Determined expression when diving
        if (this.state === 'dive' || this.state === 'save') {
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(-6, -43); ctx.lineTo(-2, -44);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(2, -44); ctx.lineTo(6, -43);
            ctx.stroke();
        }

        // Mouth
        ctx.strokeStyle = '#8d5524';
        ctx.lineWidth = 1;
        if (this.state === 'concede') {
            // Disappointed open mouth
            ctx.beginPath();
            ctx.arc(0, -35, 3, 0, Math.PI);
            ctx.stroke();
        } else if (this.state === 'save') {
            // Celebrating grin
            ctx.beginPath();
            ctx.arc(0, -36, 4, 0.1, Math.PI - 0.1);
            ctx.stroke();
        } else {
            // Neutral focus
            ctx.beginPath();
            ctx.moveTo(-3, -35); ctx.lineTo(3, -35);
            ctx.stroke();
        }

        ctx.restore();
    }
}
