    // ====== UNIFIED SAVE/LOAD (GameStorage with Capacitor Preferences) ======

    _saveProgress() {
        // Build unlocked items from live catalog
        const unlockedItems = {};
        for (const cat of ['balls', 'stadiums', 'skins', 'bots']) {
            unlockedItems[cat] = (this.unlocks[cat] || [])
                .filter(item => item.unlocked)
                .map(item => item.id);
        }

        // Build mission progress from live missions array
        const missionData = {};
        if (this.missions) {
            this.missions.forEach(m => {
                missionData[m.id] = { progress: m.progress || 0, completed: !!m.completed };
            });
        }

        const savePayload = {
            coins: this.coins,
            playerLevel: this.playerLevel,
            playerXP: this.playerXP,
            xpToNextLevel: this.xpToNextLevel,
            totalGoals: this.totalGoals,
            activeStadium: this.activeStadium,
            activeBall: this.activeBall,
            activeSkin: this.activeSkin,
            activeBot: this.activeBot,
            hasRemoveAds: this.hasRemoveAds || false,
            dailyReward: {
                lastClaimDate: this.dailyReward ? this.dailyReward.lastClaimDate : null,
                streak: this.dailyReward ? this.dailyReward.streak : 0
            },
            unlockedItems: unlockedItems,
            settings: {
                audioMuted: this.audio ? this.audio.muted : false,
                difficulty: this.difficulty || 'medium',
                surgeStyle: this.surge ? this.surge.style : 'fire',
                colorBlindMode: this.colorBlindMode || 'none',
                reducedMotion: this.reducedMotion || false,
                largeTargets: this.largeTargets || false,
                highContrast: this.highContrast || false
            },
            missions: missionData,
            stats: this.stats || { gamesPlayed: 0, bestScore: 0, totalShots: 0, successfulShots: 0 },
            campaign: {
                campaignLevel: this.campaignLevel || 1,
                levelStars: this.levelStars || {},
                totalStars: this.totalStars || 0
            }
        };

        const ok = this.storage.save(savePayload);
        if (ok) {
            console.log('[SAVE] Progress saved — Coins:', this.coins, 'Level:', this.playerLevel,
                'Bot:', this.activeBot, 'Ball:', this.activeBall);
        }
        return ok;
    }

    _loadProgress() {
        const data = this.storage.load();

        // Restore currency & level
        this.coins = data.coins || 0;
        this.playerLevel = data.playerLevel || 1;
        this.playerXP = data.playerXP || 0;
        this.xpToNextLevel = data.xpToNextLevel || 100;
        this.totalGoals = data.totalGoals || 0;

        // Restore equipped items
        this.activeStadium = data.activeStadium || 'default';
        this.activeBall = data.activeBall || 'classic';
        this.activeSkin = data.activeSkin || 'default';
        this.activeBot = data.activeBot || 'basic';

        // Restore IAP state
        if (data.hasRemoveAds) this.hasRemoveAds = true;

        // Restore daily reward state
        if (data.dailyReward && this.dailyReward) {
            this.dailyReward.lastClaimDate = data.dailyReward.lastClaimDate || null;
            this.dailyReward.streak = data.dailyReward.streak || 0;
            const today = new Date().toISOString().split('T')[0];
            this.dailyReward.claimed = (this.dailyReward.lastClaimDate === today);
            this.dailyBonusClaimed = this.dailyReward.claimed;
        }

        // Restore unlock states
        if (data.unlockedItems) {
            for (const cat of ['balls', 'stadiums', 'skins', 'bots']) {
                const unlockedIds = data.unlockedItems[cat] || [];
                (this.unlocks[cat] || []).forEach(item => {
                    if (unlockedIds.includes(item.id)) {
                        item.unlocked = true;
                    }
                });
            }
        }

        // Restore settings (NEW)
        if (data.settings) {
            if (data.settings.audioMuted && this.audio) {
                this.audio.muted = true;
                if (this.audio._masterGain) this.audio._masterGain.gain.value = 0;
            }
            if (data.settings.difficulty) {
                this.difficulty = data.settings.difficulty;
            }
            if (data.settings.surgeStyle && this.surge) {
                this.surge.style = data.settings.surgeStyle;
            }
            // Restore accessibility settings
            if (data.settings.colorBlindMode) {
                this.colorBlindMode = data.settings.colorBlindMode;
            }
            if (data.settings.reducedMotion) {
                this.reducedMotion = data.settings.reducedMotion;
            }
            if (data.settings.largeTargets) {
                this.largeTargets = data.settings.largeTargets;
            }
            if (data.settings.highContrast) {
                this.highContrast = data.settings.highContrast;
            }
        }

        // Restore mission progress (NEW)
        if (data.missions && this.missions) {
            this.missions.forEach(m => {
                const saved = data.missions[m.id];
                if (saved) {
                    m.progress = saved.progress || 0;
                    m.completed = !!saved.completed;
                }
            });
        }

        // Restore stats (NEW — unified)
        if (data.stats) {
            Object.assign(this.stats, data.stats);
        }

        // Restore campaign progress (NEW)
        if (data.campaign) {
            this.campaignLevel = data.campaign.campaignLevel || 1;
            this.levelStars = data.campaign.levelStars || {};
            this.totalStars = data.campaign.totalStars || 0;
        }

        console.log('[LOAD] Progress restored — Coins:', this.coins, 'Level:', this.playerLevel,
            'Bot:', this.activeBot, 'Ball:', this.activeBall,
            '| Audio muted:', data.settings?.audioMuted,
            '| Difficulty:', data.settings?.difficulty,
            '| Campaign Level:', this.campaignLevel);
        return true;
    }

    // ====== STATE TRANSITIONS ======

    startGame(difficulty, campaignLevelCfg) {
        // If campaignLevelCfg passed, this is a campaign level
        this.currentLevelConfig = campaignLevelCfg || null;
        this.difficulty = difficulty;
        this.maxRounds = campaignLevelCfg ? campaignLevelCfg.shots : this.difficultyConfig[difficulty].maxRounds;
        this.round = 0;
        this.score = { player: 0, keeper: 0 };
        this.streak = 0;
        this.bestStreak = 0;
        this.aiSaves = 0;
        this.state = 'playing';
        this.showMLDebug = !campaignLevelCfg; // Show ML debug only in non-campaign
        // Reset surge state
        this.surge.charge = 0;
        this.surge.active = false;
        this.surge.level = 0;
        this.surge.availableLevel = 0;
        this.surge.ready = false;
        this.surge.timer = 0;
        this.surge.cooldown = 0;
        this.surge.auraPhase = 0;
        this.surge.activationFlash = 0;
        this.surge.screenPulseAlpha = 0;
        this.surge.drainFlash = 0;
        this.surge.lastPenalty = 0;

        // CRITICAL: Re-apply equipped items before gameplay starts
        this._applyEquippedBot();
        // Sync ball visual type for rendering
        this.ball.visualType = this.activeBall || 'classic';

        // Debug: log equipped state
        console.log('[GAME START] Difficulty:', difficulty,
            '| Campaign:', !!campaignLevelCfg,
            '| Rounds:', this.maxRounds,
            '| Bot:', this.activeBot, '| Ball:', this.activeBall);

        // ENGINE: Sync difficulty and reset predictors for new game
        _syncEngineDifficulty(difficulty);
        _aiEngine.playerModel.reset();

        this.audio.play('whistle');
        this._nextRound();
    }

    _nextRound() {
        this.round++;
        if (this.round > this.maxRounds) {
            this._endGame();
            return;
        }
        this.ball.reset();
        this.keeper.reset();
        this.playerX = DESIGN.width / 2;
        this.playerY = DESIGN.fieldBottom - 100;
        this.aimX = DESIGN.width / 2;
        this.aimY = (DESIGN.goalLineY + DESIGN.crossbarY) / 2;  // center of visual goal
        this.aimLocked = false;
        this.shotPower = 0.1 + Math.random() * 0.8; // random start position on power bar
        this.powerDirection = Math.random() < 0.5 ? 1 : -1;
        this.powerCharging = false;

        // CRITICAL: Drain any buffered swipes/taps to prevent auto-shooting next round
        this.touch.swipe.swipe = null;
        this.touch.swipe.active = false;
        this.touch.swipe.trail = [];
        while (this.touch.consumeTap()) {} // drain tap queue

        this.state = 'playing';
        this.resultText = '';
        this.celebrating = false;
        this.celebrationTimer = 0;

        // Show curve hint on round 1 and every 5 rounds
        if (this.round === 1 || this.round % 5 === 0) {
            this._curveHintAlpha = 1.0;
        }

        // Reset dual ball for new round
        if (this.dualBall) this.dualBall.secondBall = null;

        // Update bot position based on player
        this.assistBot.x = this.playerX - 50;
        this.assistBot.y = this.playerY + 5;
        this.assistBot.linkParticles = [];

        // Reset camera
        this.renderer.targetZoom = 1;
    }

    // ====== AI DECISION ENGINE ======

    _getAdaptiveAdjustment() {
        // Delegate to ML model's adaptive difficulty engine
        return this.ml.getAdaptiveAdjustment();
    }

    _computeKeeperDive() {
        const config = { ...this.difficultyConfig[this.difficulty] };

        // === BALL EFFECT: Ice Ball slows keeper reaction ===
        if (this._getBallEffect() === 'keeper_slow') {
            config.reactionDelayMs = (config.reactionDelayMs || 80) + 30;
            config.diveSpeed = Math.max(0.04, (config.diveSpeed || 0.08) - 0.01);
        }

        // === LEVEL-BASED AI SCALING ===
        // As player levels up, AI gets progressively harder to balance new player powers
        const lvl = this.playerLevel;
        if (lvl >= 6) {
            // Level 6-10: slight AI buff to compensate for curve shots
            const scaleFactor = Math.min((lvl - 5) * 0.015, 0.10);
            config.predictionError = Math.max(0.03, config.predictionError - scaleFactor * 0.4);
            config.diveSpeed = Math.min(0.13, config.diveSpeed + scaleFactor * 0.2);
        }
        if (lvl >= 11) {
            // Level 11-15: AI adapts to assist bot (gentler scaling)
            config.reactionDelayMs = Math.max(60, config.reactionDelayMs - (lvl - 10) * 2);
        }
        if (lvl >= 16) {
            // Level 16+: AI focuses on main ball (dual ball splits attention)
            config.saveReach = Math.min(1.10, config.saveReach + (lvl - 15) * 0.004);
            config.positionAccuracy = Math.min(0.96, config.positionAccuracy + (lvl - 15) * 0.004);
        }
        if (lvl >= 20) {
            // Level 20+: Chaos mode — AI tougher but capped to stay fair
            config.anticipation = true;
            // Floor missChance at 0.12 so intermediate players can still score ~15%+
            config.missChance = Math.max(0.12, config.missChance - 0.003);
            // Soften cumulative prediction error
            config.predictionError = Math.max(0.05, config.predictionError);
        }

        const goalCX = DESIGN.width / 2;
        const goalLeft = goalCX - DESIGN.goalWidth / 2;
        const goalRight = goalCX + DESIGN.goalWidth / 2;
        const adapt = this._getAdaptiveAdjustment();

        // Step 1: ALL levels use ML prediction (neural net or statistical fallback)
        // The ML model handles fallback internally — returns statistical predict if TF.js
        // isn't ready or not enough training data. This ensures ALL levels benefit from
        // pattern learning as the player's shot history grows.
        let predictedDirection;
        let confidence = 0.33;

        const mlPred = this.ml.predict();
        predictedDirection = mlPred.direction;
        confidence = mlPred.confidence;

        // ENGINE: Enhance prediction with Phase 1-4 engine AI (Bayes + Sequence + Adaptive)
        const enginePred = _getEngineKeeperPrediction(this.aimX, this.aimY, this.shotPower);
        if (enginePred) {
            // Blend engine anticipation with ML prediction:
            // If engine's anticipated zone agrees with ML direction → boost confidence
            // If engine disagrees → use the one with higher confidence
            const engineDir = enginePred.anticipated || 'center';
            if (engineDir === predictedDirection) {
                // Agreement: boost confidence by up to 20%
                confidence = Math.min(0.95, confidence + enginePred.confidence * 0.2);
            } else if (enginePred.confidence > confidence) {
                // Engine is more confident — override direction
                predictedDirection = engineDir;
                confidence = Math.max(confidence, enginePred.confidence * 0.7);
            }
            // Engine can also improve reaction time (applied in Step 7 below)
        }

        // Scale confidence impact by difficulty level
        // Easy/Medium: dampen confidence so the keeper doesn't exploit predictions as aggressively
        const confidenceScaling = {
            easy: 0.3,      // ML barely helps the easy keeper
            medium: 0.55,   // moderate ML benefit
            hard: 0.85,     // strong ML benefit
            legend: 1.0     // full ML exploitation
        };
        const confScale = confidenceScaling[this.difficulty] || 0.5;
        const scaledConfidence = 0.33 + (confidence - 0.33) * confScale;

        // Step 2: Apply prediction error (AI guesses wrong sometimes)
        const effectiveError = Math.max(0, config.predictionError - adapt * 0.1);
        if (Math.random() < effectiveError) {
            const dirs = ['left', 'center', 'right'].filter(d => d !== predictedDirection);
            predictedDirection = dirs[Utils.randInt(0, dirs.length - 1)];
            confidence *= 0.4;
        }

        // Step 3: Convert direction to target X — use positionAccuracy for precision
        const accuracy = config.positionAccuracy + adapt * 0.1;
        let diveX;
        // More accurate keeper dives closer to the actual aim position
        const aimBias = (this.aimX - goalCX) * Utils.clamp(accuracy, 0, 1);
        switch (predictedDirection) {
            case 'left':  diveX = goalCX - DESIGN.goalWidth * 0.35 + aimBias * 0.3; break;
            case 'right': diveX = goalCX + DESIGN.goalWidth * 0.35 + aimBias * 0.3; break;
            default:      diveX = goalCX + aimBias * 0.2; break;
        }

        // Step 4: Overcommit — sometimes dives too far
        if (Math.random() < config.overcommitChance) {
            const overAmount = Utils.randRange(20, 45);
            if (predictedDirection === 'left') diveX -= overAmount;
            else if (predictedDirection === 'right') diveX += overAmount;
        }

        // Step 5: Human imprecision — jitter inversely proportional to accuracy
        const jitter = Utils.randRange(-15, 15) * (1 - accuracy * 0.5);
        diveX += jitter;
        diveX = Utils.clamp(diveX, goalLeft - 15, goalRight + 15);

        // Step 6: Will the keeper miss even if positioned correctly?
        const effectiveMissChance = Math.max(0.01, config.missChance - adapt * 0.05);
        const willMiss = Math.random() < effectiveMissChance;

        // Step 7: Confidence-driven behavior (ALL levels, scaled by difficulty)
        let effectiveDiveSpeed = config.diveSpeed;
        let effectiveReactionDelay = config.reactionDelayMs;

        if (scaledConfidence > 0.55) {
            // High confidence: move earlier, dive faster, more aggressive
            const confBoost = (scaledConfidence - 0.5) * confScale;
            effectiveDiveSpeed *= (1 + confBoost * 0.8);    // up to 40% faster at legend
            effectiveReactionDelay *= (1 - confBoost * 0.5); // up to 25% faster reaction at legend
        } else if (scaledConfidence < 0.38) {
            // Low confidence: conservative, slower, more central positioning
            effectiveDiveSpeed *= (0.85 + (1 - confScale) * 0.1); // less penalty at easy
            diveX = Utils.lerp(diveX, goalCX, 0.3 * confScale);   // pull toward center
        }

        // Adaptive: if player is doing well, speed up reaction
        effectiveReactionDelay = Math.max(40, effectiveReactionDelay - adapt * 80);
        effectiveDiveSpeed = Math.min(0.15, effectiveDiveSpeed + adapt * 0.02);

        let finalSaveReach = Math.min(1.1, config.saveReach + adapt * 0.05);

        // === POWER SURGE AI DEBUFF ===
        const surgeDebuff = this._getSurgeAIDebuff();
        if (surgeDebuff) {
            effectiveReactionDelay += surgeDebuff.reactionDelayAdd;
            // Random extra prediction error during surge
            if (Math.random() < surgeDebuff.predictionPenalty) {
                const dirs = ['left', 'center', 'right'].filter(d => d !== predictedDirection);
                predictedDirection = dirs[Utils.randInt(0, dirs.length - 1)];
                // Recompute diveX for new direction
                switch (predictedDirection) {
                    case 'left':  diveX = goalCX - DESIGN.goalWidth * 0.35; break;
                    case 'right': diveX = goalCX + DESIGN.goalWidth * 0.35; break;
                    default:      diveX = goalCX; break;
                }
            }
            finalSaveReach *= (1 - surgeDebuff.saveReachPenalty);
        }

        return {
            diveX,
            diveY: (DESIGN.goalLineY + DESIGN.crossbarY) / 2,
            direction: predictedDirection,
            confidence: scaledConfidence,
            willMiss,
            diveSpeed: effectiveDiveSpeed,
            saveReach: finalSaveReach,
            reactionDelayMs: effectiveReactionDelay,
            earlyDiveBonus: config.earlyDiveBonus || 0
        };
    }

    _shoot() {
        if (this.state !== 'playing') return;

        const angle = Utils.angle(this.playerX, this.playerY, this.aimX, this.aimY);
        let power = Utils.clamp(this.shotPower, 0.3, 1.0);

        // === POWER ASSIST BOT — passive shot power boost ===
        if (this.assistBot.enabled) {
            power = Math.min(1.0, power + this.assistBot.boosts.powerBoost);
        }

        // === BALL EFFECT — item-based boosts ===
        const ballEffect = this._getBallEffect();
        if (ballEffect === 'power_boost') {
            power = Math.min(1.0, power + 0.08);
        }

        // === UNIFIED CURVE SYSTEM ===
        // Diagonal swipe ratio determines curve intensity
        // Aim offset determines curve direction (toward center = visible arc)
        const swDx = this._lastSwipeDx || 0;
        const swDy = this._lastSwipeDy || 0;
        const swipeAbsDy = Math.abs(swDy) || 1;
        const diagonalRatio = Math.abs(swDx) / swipeAbsDy;
        this._lastSwipeDx = 0;
        this._lastSwipeDy = 0;

        // === MULTI-LEVEL SURGE BOOST ===
        const isSurgeShot = this.surge.active && this.surge.level > 0;
        if (isSurgeShot) {
            const def = this._getSurgeLevelDef(this.surge.level);
            power = Math.min(1.0, power * def.powerMult);
            this.ball.surgeMode = true;
            this.ball.surgeLevel = this.surge.level;
            this.ball.surgeStyle = this.surge.style;
        } else {
            this.ball.surgeMode = false;
            this.ball.surgeLevel = 0;
        }

        // === UNIFIED CURVE — input-driven, 3 tiers, banana = max curve ===
        const goalCenterX = DESIGN.width / 2;
        const aimOffset = (this.aimX - goalCenterX) / (DESIGN.goalWidth / 2);
        let finalCurve = 0;
        let curveTier = 0;
        if (this.curveShot.enabled && diagonalRatio > 0.10) {
            const curveInput = Utils.clamp((diagonalRatio - 0.10) / 0.90, 0, 1);
            const curveStrength = Math.pow(curveInput, 1.5);
            const curveDir = -Math.sign(aimOffset) || (swDx > 0 ? -1 : 1);
            finalCurve = curveDir * curveStrength * 0.50 * this.curveShot.strength;
            if (curveStrength >= 0.75) curveTier = 3;
            else if (curveStrength >= 0.40) curveTier = 2;
            else if (curveStrength >= 0.05) curveTier = 1;
        }

        this.ball.shoot(angle, power, finalCurve);

        // === CURVE VISUAL FEEDBACK — tier-based flash ===
        this._curveFlash = 0;
        this._curveFlashTier = 0;
        this._curveFlashDir = 0;
        if (curveTier >= 1) {
            this._curveFlash = 1.0;
            this._curveFlashTier = curveTier;
            this._curveFlashDir = finalCurve > 0 ? 1 : -1;
            if (curveTier >= 3) Utils.haptic(30);
            else if (curveTier >= 2) Utils.haptic(20);
        }

        // Apply speed boost during surge — scales with level
        if (isSurgeShot) {
            const def = this._getSurgeLevelDef(this.surge.level);
            this.ball.vx *= def.speedMult;
            this.ball.vy *= def.speedMult;
        }

        // Ball effect: Lightning speed boost
        if (ballEffect === 'speed_boost') {
            this.ball.vx *= 1.10;
            this.ball.vy *= 1.10;
        }

        // === DUAL BALL (level 16+) ===
        if (this.dualBall.enabled) {
            setTimeout(() => {
                if (this.state === 'shooting') {
                    this._fireDualBall(angle, power, finalCurve);
                }
            }, this.dualBall.delay);
        }

        this.state = 'shooting';

        // (banana kick trigger removed — unified curve system)

        this.audio.play(isSurgeShot ? 'surgeShot' : (power > 0.75 ? 'powerKick' : 'kick'));
        this.particles.grass(this.playerX, this.playerY);
        Utils.haptic(15);

        // Camera zoom in during shot
        this.renderer.targetZoom = 1.08;

        // Compute AI decision (includes adaptive adjustments)
        const aiDecision = this._computeKeeperDive();

        // Store for canSave override
        this._currentAIDecision = aiDecision;

        // Delayed keeper reaction — uses AI decision's adjusted reaction time
        const delay = aiDecision.reactionDelayMs + Utils.randRange(-20, 40);

        setTimeout(() => {
            if (this.state === 'shooting') {
                this.keeper.decideDive(
                    aiDecision.direction,
                    aiDecision.diveX,
                    aiDecision.diveY,
                    aiDecision.confidence
                );
                this.keeper.diveSpeedOverride = aiDecision.diveSpeed;
                this.keeper.saveReachMultiplier = aiDecision.saveReach;
                this.keeper.willMiss = aiDecision.willMiss;
                this.keeper.earlyDiveBonus = aiDecision.earlyDiveBonus;
            }
        }, delay);

        this.resultTimer = 0;

        // Bot boost is applied passively in power calculation above
    }

    // _fireAssistBot removed — bot is now a passive power-boost companion

    _fireDualBall(angle, power, curve) {
        // Second ball shoots at slight offset from main aim
        const offset = Utils.randRange(-this.dualBall.offset, this.dualBall.offset);
        const dualAimX = Utils.clamp(this.aimX + offset,
            DESIGN.width / 2 - DESIGN.goalWidth / 2 + 20,
            DESIGN.width / 2 + DESIGN.goalWidth / 2 - 20);
        const dualAngle = Utils.angle(this.playerX, this.playerY, dualAimX, this.aimY);
        const dualPower = power * 0.9; // slightly weaker

        // Create second ball as a simple object (similar to bot ball)
        const speed = DESIGN.shotSpeed * dualPower;
        this.dualBall.secondBall = {
            x: this.playerX + Utils.randRange(-8, 8),
            y: this.playerY,
            vx: Math.cos(dualAngle) * speed + curve * 2,
            vy: Math.sin(dualAngle) * speed,
            active: true,
            radius: 10,
            trail: [],
            surgeMode: this.ball.surgeMode,
            surgeLevel: this.ball.surgeLevel,
            source: 'dual'
        };

        this.audio.play('kick');
    }

    _updateDualBall() {
        const db = this.dualBall.secondBall;
        if (!db || !db.active) return;

        db.trail.push({ x: db.x, y: db.y, life: 1.0 });
        if (db.trail.length > 10) db.trail.shift();
        db.trail.forEach(t => t.life *= 0.85);

        db.x += db.vx;
        db.y += db.vy;
        db.vx *= 0.995;
        db.vy *= 0.995;

        // Check goal for dual ball
        const goalLeft = DESIGN.width / 2 - DESIGN.goalWidth / 2 + DESIGN.goalPostWidth;
        const goalRight = DESIGN.width / 2 + DESIGN.goalWidth / 2 - DESIGN.goalPostWidth;

        if (db.y <= DESIGN.goalLineY - 15 && db.x > goalLeft && db.x < goalRight && db.y > DESIGN.crossbarY) {
            db.active = false;
            // Dual ball goals count! (but keeper might still be in position)
            if (!this.keeper.canSave(db.x, db.y, 0) || this.keeper.willMiss) {
                this.score.player++;
                this._awardCoins(8, 'Dual ball goal');
                this.particles.confetti(db.x, db.y);
                this.audio.play('goal');
                console.log('[DUAL] Second ball goal!');
            }
        }

        if (db.y < -80 || db.y > DESIGN.height + 50) {
            db.active = false;
        }
    }

    // _updateBotBalls removed — bot is now passive, no projectiles

    // Update bot energy link particles (visual only)
    _updateBotVisuals() {
        if (!this.assistBot.enabled) return;
        const bot = this.assistBot;

        // Energy pulse cycle
        bot.energyPulse = (bot.energyPulse + 0.025) % 1;

        // Spawn energy link particles that flow from bot to player
        if (Math.random() < 0.3) {
            const px = bot.x + Utils.randRange(-8, 8);
            const py = bot.y + Utils.randRange(-10, 5);
            bot.linkParticles.push({
                x: px, y: py,
                targetX: this.playerX,
                targetY: this.playerY - 20,
                life: 1.0,
                speed: 0.04 + bot.tier * 0.01,
                size: 2 + bot.tier * 0.5
            });
        }

        // Update link particles — move toward player, fade
        bot.linkParticles = bot.linkParticles.filter(p => {
            p.x = Utils.lerp(p.x, p.targetX, p.speed);
            p.y = Utils.lerp(p.y, p.targetY, p.speed);
            p.life -= 0.02;
            p.size *= 0.995;
            return p.life > 0 && Math.abs(p.x - p.targetX) > 3;
        });
    }

    _checkGoal() {
        if (this.state !== 'shooting') return;
        if (!this.ball.active) return;

        const bx = this.ball.x;
        const by = this.ball.y;

        // Visual goal coordinates (must match renderer.drawGoal exactly)
        const goalLineY = DESIGN.goalLineY;        // y=72 — goal mouth
        const crossbarY = DESIGN.crossbarY;         // y=17 — top of crossbar
        const pw = DESIGN.goalPostWidth;             // post width = 8
        const goalLeft = DESIGN.width / 2 - DESIGN.goalWidth / 2;   // x=107
        const goalRight = DESIGN.width / 2 + DESIGN.goalWidth / 2;  // x=307
        const postInnerLeft = goalLeft + pw;         // x=115
        const postInnerRight = goalRight - pw;       // x=299

        // Keeper's save envelope extends from their position forward
        // Keeper is at ~y=87, can reach ~40px forward (upward) when diving
        const keeperSaveZoneTop = this.keeper.y - 50;  // how far forward keeper can reach
        const keeperSaveZoneBottom = this.keeper.y + 20;

        // Ball in the engagement zone? (approaching or at goal)
        const inEngagementZone = by < keeperSaveZoneBottom;
        if (!inEngagementZone) return;

        // Is ball X between the inner edges of the posts?
        const betweenPosts = bx > postInnerLeft && bx < postInnerRight;

        // Hit post detection
        const hitLeftPost = Math.abs(bx - goalLeft - pw / 2) < 14 && by < goalLineY + 10;
        const hitRightPost = Math.abs(bx - goalRight + pw / 2) < 14 && by < goalLineY + 10;

        // Has ball entered the net area? (past goal line AND past keeper)
        const pastGoalLine = by <= goalLineY;
        const deepInGoal = by <= goalLineY - 15;  // clearly inside the goal
        const overCrossbar = by < crossbarY - 10;

        if (betweenPosts) {
            // Ball aimed between the posts — check save vs goal

            // Keeper can save if ball is within their physical reach zone
            const positionedForSave = this.keeper.canSave(bx, by, this.ball.height);
            const aiWillMiss = this.keeper.willMiss;

            // Save is possible if keeper can reach AND ball hasn't gone deep into net
            const saved = positionedForSave && !aiWillMiss && !deepInGoal;

            if (saved) {
                // SAVED!
                this._triggerResult('SAVED!', COLORS.uiDanger, false);
                this.score.keeper++;
                this.aiSaves++;
                this.streak = 0;
                this.keeper.state = 'save';
                this.keeper.stateTime = 0;
                this.audio.play('save');
                this.particles.sparks(bx, by);
                Utils.haptic(30);
                this.renderer.cameraShake = 0.3;
                this.ball.active = false;
                this.resultTimer = 0;
                this.renderer.targetZoom = 1;
                // Track for adaptive difficulty
                // Adaptive tracking handled by ml.recordShot() in _triggerResult
            } else if (deepInGoal && !overCrossbar) {
                // GOAL!!! — ball got past keeper and into the net
                this._triggerGoal(bx, by, positionedForSave);
                this.ball.active = false;
                this.resultTimer = 0;
                // Track for adaptive difficulty
                // Adaptive tracking handled by ml.recordShot() in _triggerGoal
            } else if (overCrossbar) {
                // Over the bar!
                this._triggerResult('OVER!', COLORS.uiTextDim, false);
                this.streak = 0;
                this.audio.play('miss');
                Utils.haptic(20);
                this.ball.active = false;
                this.resultTimer = 0;
                this.renderer.targetZoom = 1;
                // Adaptive tracking handled by ml.recordShot() in _triggerResult
            }
            // else: ball still approaching keeper, wait for next frame

        } else if (hitLeftPost || hitRightPost) {
            // POST!
            this._triggerResult('POST!', COLORS.uiWarning, false);
            this.streak = 0;
            this.audio.play('post');
            this.particles.sparks(bx, by);
            this.renderer.cameraShake = 0.4;
            Utils.haptic(20);
            this.ball.active = false;
            this.resultTimer = 0;
            this.renderer.targetZoom = 1;
            // Adaptive tracking handled by ml.recordShot() in _triggerResult

        } else if (by < crossbarY - 30 || bx < goalLeft - 50 || bx > goalRight + 50) {
            // MISS — ball went clearly wide or over
            this._triggerResult('MISS!', COLORS.uiTextDim, false);
            this.streak = 0;
            this.audio.play('miss');
            Utils.haptic(20);
            this.ball.active = false;
            this.resultTimer = 0;
            this.renderer.targetZoom = 1;
            // Adaptive tracking handled by ml.recordShot() in _triggerResult
        }

        // Ball went way off screen (safety net)
        if (by < -80 || by > DESIGN.height + 50) {
            if (this.ball.active) {
                this._triggerResult('MISS!', COLORS.uiTextDim, false);
                this.streak = 0;
                this.audio.play('miss');
                this.ball.active = false;
                this.resultTimer = 0;
                this.renderer.targetZoom = 1;
            }
        }
    }

    _resetStreak() {
        if (this._streakProtected) {
            this._streakProtected = false;
            console.log('[STREAK] Protected! Streak preserved.');
            return; // streak survives this round
        }
        this.streak = 0;
    }

    _triggerResult(text, color, isGoal) {
        this.state = 'result';
        this.resultText = text;
        this.resultColor = color;
        this.ml.recordShot(
            Utils.angle(this.playerX, this.playerY, this.aimX, this.aimY),
            this.shotPower, isGoal,
            this.aimX, this.aimY, this.difficulty, this.round
        );
        // ENGINE: Feed event into Phase 1-4 predictors
        _feedEngineShot(
            Utils.angle(this.playerX, this.playerY, this.aimX, this.aimY),
            this.shotPower, isGoal,
            this.aimX, this.aimY, this.difficulty, this.round, this.maxRounds
        );
        if (!isGoal) {
            this._processRoundRewards(false);
            // === SURGE DRAIN on failure — risk/reward mechanic ===
            if (text === 'SAVED!') {
                this._drainSurge('saved');
            } else if (text === 'POST!') {
                this._drainSurge('post');
            } else {
                // MISS, OVER, WIDE
                this._drainSurge('missed');
            }
        }
    }

    _triggerGoal(bx, by, keeperWasClose) {
        this.state = 'result';
        this.resultText = 'GOAL!';
        this.resultColor = COLORS.uiSuccess;
        this.score.player++;
        this.streak++;
        if (this.streak > this.bestStreak) this.bestStreak = this.streak;
        this.keeper.state = keeperWasClose ? 'save' : 'concede';
        this.keeper.stateTime = 0;

        // Record for ML
        this.ml.recordShot(
            Utils.angle(this.playerX, this.playerY, this.aimX, this.aimY),
            this.shotPower, true,
            this.aimX, this.aimY, this.difficulty, this.round
        );
        // ENGINE: Feed goal event into Phase 1-4 predictors
        _feedEngineShot(
            Utils.angle(this.playerX, this.playerY, this.aimX, this.aimY),
            this.shotPower, true,
            this.aimX, this.aimY, this.difficulty, this.round, this.maxRounds
        );

        // Process rewards
        this._processRoundRewards(true);

        // === POWER SURGE CHARGING ===
        this._chargeSurge('goal');

        // === CELEBRATION EFFECTS ===
        this.celebrating = true;
        this.celebrationTimer = 0;

        // Sound
        this.audio.play('goal');
        if (this.streak >= 3) this.audio.play('streak');

        // Big confetti burst (multi-wave)
        this.particles.confetti(bx, by);
        setTimeout(() => this.particles.confetti(DESIGN.width / 2, by + 30), 150);
        setTimeout(() => this.particles.confetti(DESIGN.width / 2, by + 60), 300);

        // Camera effects
        this.renderer.cameraShake = 0.8;
        this.renderer.targetZoom = 1.12;
        Utils.haptic(80);
        Haptics.notification('success');

        // Reset zoom after celebration
        setTimeout(() => {
            this.renderer.targetZoom = 1;
            this.celebrating = false;
        }, 1200);
    }

    // ====== MULTI-LEVEL POWER SURGE SYSTEM ======

    _getAvailableSurgeLevel() {
        const charge = this.surge.charge;
        if (charge >= 100) return 4;
        if (charge >= 75)  return 3;
        if (charge >= 50)  return 2;
        if (charge >= 20)  return 1;  // Lowered from 25 — one goal (20 charge) unlocks L1
        return 0;
    }

    _getSurgeLevelDef(level) {
        return this.surgeLevels[level] || null;
    }

    _chargeSurge(reason) {
        const s = this.surge;
        if (s.active || s.cooldown > 0) return;

        // === GOAL: gain charge with combo bonus ===
        const combo = Math.min(this.streak, s.comboMax);
        let amount = s.goalCharge + (combo > 1 ? s.comboBonus * combo : 0);

        // === POWER ASSIST BOT — surge gain multiplier ===
        if (this.assistBot.enabled) {
            amount = Math.round(amount * this.assistBot.boosts.surgeGainMult);
        }

        const prevLevel = this._getAvailableSurgeLevel();
        s.charge = Math.min(s.maxCharge, s.charge + amount);
        const newLevel = this._getAvailableSurgeLevel();
        s.availableLevel = newLevel;

        console.log(`[SURGE] +${amount} charge (combo x${combo}). Now: ${s.charge.toFixed(0)}%`);

        // Crossed a new threshold — notify player
        if (newLevel > prevLevel && newLevel >= 1) {
            s.ready = true;
            s.readyFlashTimer = 0;
            this.audio.play('surgeReady');
            Utils.haptic(40);
        }
    }

    _drainSurge(reason) {
        const s = this.surge;
        if (s.active) return; // don't drain during active surge
        if (s.charge <= 0) return;

        let penalty = 0;
        switch (reason) {
            case 'saved':  penalty = s.savePenalty; break;
            case 'missed': penalty = s.missPenalty; break;
            case 'post':   penalty = s.postPenalty; break;
            default: return;
        }

        // Anti-frustration: halve penalty when near max (≥75%)
        if (s.charge >= 75) {
            penalty *= s.antiFloor;
        }

        const prevLevel = this._getAvailableSurgeLevel();
        s.lastPenalty = Math.min(penalty, s.charge); // track for ad restore
        s.charge = Math.max(0, s.charge - penalty);
        const newLevel = this._getAvailableSurgeLevel();
        s.availableLevel = newLevel;

        // Visual feedback — red flash on meter
        s.drainFlash = 1.0;

        // Update ready state
        s.ready = newLevel >= 1;

        console.log(`[SURGE] -${penalty.toFixed(0)} (${reason}). Now: ${s.charge.toFixed(0)}%`);

        // Dropped a level — could trigger "watch ad" opportunity
        if (newLevel < prevLevel && prevLevel >= 1) {
            Utils.haptic(20);
        }
    }

    _activateSurge() {
        const s = this.surge;
        const level = s.availableLevel;
        if (level < 1 || s.active) return;

        const def = this._getSurgeLevelDef(level);
        if (!def) return;

        s.active = true;
        s.level = level;
        s.ready = false;

        // === POWER ASSIST BOT — surge duration multiplier ===
        let duration = def.duration;
        if (this.assistBot.enabled) {
            duration = Math.round(duration * this.assistBot.boosts.surgeDurationMult);
        }
        s.duration = duration;
        s.timer = duration;
        s.activationFlash = 0.3 + level * 0.2;   // stronger flash at higher levels
        s.screenPulseAlpha = 0.2 + level * 0.15;

        this.audio.play('surgeActivate');
        Utils.haptic(20 + level * 20);

        // Particle burst scales with level
        this.particles.confetti(this.playerX, this.playerY - 20);
        if (level >= 3) this.particles.confetti(this.playerX - 30, this.playerY);
        if (level >= 4) this.particles.confetti(this.playerX + 30, this.playerY);
        this.renderer.cameraShake = 0.2 + level * 0.15;

        console.log(`[SURGE] Level ${level} (${def.name}) activated!`);
    }

    _updateSurge() {
        const s = this.surge;

        // Update aura animation phase (speed scales with level)
        s.auraPhase += 0.06 + (s.level * 0.015);

        // Update ready flash
        if (s.ready) s.readyFlashTimer++;

        // Update available level from current charge
        if (!s.active) s.availableLevel = this._getAvailableSurgeLevel();

        // Cooldown countdown
        if (s.cooldown > 0) s.cooldown--;

        // Drain flash decay
        if (s.drainFlash > 0) s.drainFlash *= 0.9;

        // Active surge countdown
        if (s.active) {
            const def = this._getSurgeLevelDef(s.level);
            s.timer--;
            s.particleTimer++;

            // Decay screen pulse
            s.screenPulseAlpha *= 0.97;
            s.activationFlash *= 0.92;

            // Spawn energy particles — rate scales with level
            const rate = def ? def.particleRate : 4;
            if (s.particleTimer % rate === 0 && this.state === 'playing') {
                const spread = 15 + s.level * 5;
                const px = this.playerX + Utils.randRange(-spread, spread);
                const py = this.playerY + Utils.randRange(-50, 10);
                const levelColors = {
                    1: { fire: '#66bb6a', lightning: '#66bb6a', ice: '#66bb6a', cosmic: '#66bb6a' },
                    2: { fire: '#ffee58', lightning: '#ffee58', ice: '#ffee58', cosmic: '#ffee58' },
                    3: { fire: '#ff6600', lightning: '#00ccff', ice: '#80d8ff', cosmic: '#aa00ff' },
                    4: { fire: '#ff2200', lightning: '#0088ff', ice: '#00bcd4', cosmic: '#e040fb' }
                };
                const colMap = levelColors[s.level] || levelColors[1];
                if (this.particles.particles.length < 500) {
                    this.particles.particles.push({
                        x: px, y: py,
                        vx: Utils.randRange(-1.5, 1.5),
                        vy: Utils.randRange(-4, -1),
                        life: 1.0,
                        decay: Utils.randRange(0.02, 0.05),
                        size: Utils.randRange(2, 3 + s.level),
                        color: colMap[s.style] || colMap.fire,
                        type: 'surge'
                    });
                }
            }

            // End surge
            if (s.timer <= 0) {
                s.active = false;
                // Consume charge proportional to level used
                const consumed = this.surgeLevels[s.level].threshold;
                s.charge = Math.max(0, s.charge - consumed);
                s.level = 0;
                s.availableLevel = this._getAvailableSurgeLevel();
                s.cooldown = 45 + s.level * 10;
                s.screenPulseAlpha = 0;
                s.activationFlash = 0;
                // Check if still have a level available after consumption
                if (s.availableLevel >= 1) {
                    s.ready = true;
                    s.readyFlashTimer = 0;
                }
                console.log('[SURGE] Surge ended. Remaining charge: ' + s.charge);
            }
        }
    }

    // Get the AI debuff when surge is active — scales by level
    _getSurgeAIDebuff() {
        if (!this.surge.active || !this.surge.level) return null;
        const def = this._getSurgeLevelDef(this.surge.level);
        if (!def) return null;
        // Debuff strongest at start, weakens over duration
        const strength = Math.min(1, this.surge.timer / (this.surge.duration * 0.5));
        return {
            reactionDelayAdd: def.aiDebuff.reactionAdd * strength,
            predictionPenalty: def.aiDebuff.predPenalty * strength,
            saveReachPenalty: def.aiDebuff.reachPenalty * strength
        };
    }

    _drawStats() {
        const ctx = this.renderer.ctx;
        const cx = DESIGN.width / 2;
        const W = DESIGN.width, H = DESIGN.height;

        // Background
        const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
        bgGrad.addColorStop(0, '#050510');
        bgGrad.addColorStop(1, '#0c1020');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, W, H);

        // Back button
        ctx.fillStyle = 'rgba(0,255,240,0.08)';
        ctx.beginPath(); ctx.arc(30, 30, 20, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = 'rgba(0,255,240,0.2)'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(30, 30, 20, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = '#00ffcc'; ctx.font = 'bold 18px -apple-system, Arial';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('←', 30, 30);
        ctx.textBaseline = 'alphabetic';

        // Title
        ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 15;
        ctx.fillStyle = '#00e5ff';
        ctx.font = 'bold 26px -apple-system, Arial';
        ctx.textAlign = 'center';
        ctx.fillText('📊 CAREER STATS', cx, 42);
        ctx.shadowBlur = 0;

        const s = this.stats;
        const winRate = s.gamesPlayed > 0 ? Math.round((s.successfulShots / Math.max(1, s.totalShots)) * 100) : 0;

        // Top stat circles
        const topStats = [
            { label: 'PLAYED', value: s.gamesPlayed, color: '#00e5ff', icon: '🏟️' },
            { label: 'BEST', value: s.bestScore, color: '#00ff88', icon: '🏆' },
            { label: 'ACCURACY', value: s.accuracy + '%', color: '#ffd700', icon: '🎯' },
            { label: 'GOALS', value: s.successfulShots, color: '#ff7043', icon: '⚽' },
        ];

        const cY = 100, cR = 28, cSpacing = W / 4;
        const T = Date.now();
        for (let i = 0; i < topStats.length; i++) {
            const st = topStats[i];
            const sx = cSpacing / 2 + i * cSpacing;
            const pulse = 0.88 + 0.12 * Math.sin(T / 600 + i * 0.8);

            // Ring
            ctx.save();
            ctx.strokeStyle = st.color; ctx.lineWidth = 3;
            ctx.shadowColor = st.color; ctx.shadowBlur = 10 * pulse;
            ctx.beginPath(); ctx.arc(sx, cY, cR, 0, Math.PI * 2); ctx.stroke();
            ctx.shadowBlur = 0;

            // Fill
            ctx.globalAlpha = 0.12; ctx.fillStyle = st.color;
            ctx.beginPath(); ctx.arc(sx, cY, cR, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1;

            // Icon + value
            ctx.font = '12px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
            ctx.fillStyle = '#fff';
            ctx.fillText(st.icon, sx, cY - 2);
            ctx.font = 'bold 15px monospace'; ctx.textBaseline = 'top';
            ctx.fillStyle = st.color;
            ctx.fillText(String(st.value), sx, cY + 2);

            // Label
            ctx.font = '8px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.textBaseline = 'alphabetic';
            ctx.fillText(st.label, sx, cY + cR + 12);
            ctx.restore();
        }

        // Bar chart section
        const barData = [
            { label: 'Accuracy', pct: (s.accuracy || 0) / 100, color: '#00e5ff' },
            { label: 'Win Rate', pct: s.gamesPlayed > 0 ? s.successfulShots / Math.max(1, s.totalShots) : 0, color: '#69f0ae' },
            { label: 'Goals/Game', pct: Math.min(1, s.gamesPlayed > 0 ? (s.successfulShots / s.gamesPlayed) / 10 : 0), color: '#ffd700' },
            { label: 'Total Shots', pct: Math.min(1, s.totalShots / 200), color: '#ff7043' },
            { label: 'Best Score', pct: Math.min(1, s.bestScore / 10), color: '#aa00ff' },
        ];

        const chartX = 16, chartY = 160, chartW = W - 32, rowH = 30;

        // Glass card background
        ctx.fillStyle = 'rgba(10,15,30,0.5)';
        this.renderer._roundRect(ctx, chartX - 4, chartY - 8, chartW + 8, barData.length * rowH + 20, 12);
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,255,240,0.08)'; ctx.lineWidth = 1;
        this.renderer._roundRect(ctx, chartX - 4, chartY - 8, chartW + 8, barData.length * rowH + 20, 12);
        ctx.stroke();

        ctx.save();
        ctx.font = 'bold 10px -apple-system, Arial';
        for (let i = 0; i < barData.length; i++) {
            const b = barData[i];
            const ry = chartY + i * rowH + 6;

            // Label
            ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.textAlign = 'left';
            ctx.fillText(b.label, chartX, ry + 12);

            // Bar track
            const bx = chartX + 90, bw = chartW - 100, bh = 10;
            const by = ry + 5;
            ctx.fillStyle = 'rgba(255,255,255,0.08)';
            ctx.beginPath(); this.renderer._roundRect(ctx, bx, by, bw, bh, 5); ctx.fill();

            // Fill
            const bg = ctx.createLinearGradient(bx, 0, bx + bw, 0);
            bg.addColorStop(0, b.color + 'cc'); bg.addColorStop(1, b.color);
            ctx.fillStyle = bg; ctx.shadowColor = b.color; ctx.shadowBlur = 5;
            ctx.beginPath(); this.renderer._roundRect(ctx, bx, by, bw * Math.min(1, b.pct), bh, 5); ctx.fill();
            ctx.shadowBlur = 0;

            // Pct label
            ctx.textAlign = 'right'; ctx.fillStyle = b.color;
            ctx.font = 'bold 9px monospace';
            ctx.fillText((b.pct * 100).toFixed(0) + '%', chartX + chartW, ry + 14);
            ctx.font = 'bold 10px -apple-system, Arial';
        }
        ctx.restore();

        // Detailed stats below bars
        const detailY = chartY + barData.length * rowH + 30;
        ctx.fillStyle = 'rgba(10,15,30,0.5)';
        this.renderer._roundRect(ctx, chartX - 4, detailY - 8, chartW + 8, 100, 12);
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,255,240,0.08)'; ctx.lineWidth = 1;
        this.renderer._roundRect(ctx, chartX - 4, detailY - 8, chartW + 8, 100, 12);
        ctx.stroke();

        ctx.font = 'bold 11px -apple-system, Arial'; ctx.textAlign = 'left';
        ctx.fillStyle = '#ffd700'; ctx.fillText('DETAILED STATS', chartX + 4, detailY + 10);

        const details = [
            ['Total Shots', String(s.totalShots || 0)],
            ['Goals Scored', String(s.successfulShots || 0)],
            ['Shots Missed', String((s.totalShots || 0) - (s.successfulShots || 0))],
            ['Coins Earned', String(this.coins || 0)],
        ];
        ctx.font = '10px -apple-system, Arial';
        details.forEach((d, i) => {
            const dy = detailY + 28 + i * 18;
            ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.textAlign = 'left';
            ctx.fillText(d[0], chartX + 8, dy);
            ctx.fillStyle = '#00e5ff'; ctx.textAlign = 'right';
            ctx.fillText(d[1], chartX + chartW - 4, dy);
        });
    }

        const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
        bgGrad.addColorStop(0, '#050510');
        bgGrad.addColorStop(1, '#0c1020');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, W, H);

        // Back button
        ctx.fillStyle = 'rgba(0,255,240,0.08)';
        ctx.beginPath(); ctx.arc(30, 30, 20, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = 'rgba(0,255,240,0.2)'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(30, 30, 20, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = '#00ffcc'; ctx.font = 'bold 18px -apple-system, Arial';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('←', 30, 30);
        ctx.textBaseline = 'alphabetic';

        // Title
        ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 18;
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 26px -apple-system, Arial';
        ctx.textAlign = 'center';
        ctx.fillText('🏆 ACHIEVEMENTS', cx, 42);
        ctx.shadowBlur = 0;

        // Achievement definitions (mirrors _checkAchievements)
        const GOALBOT_ACHIEVEMENTS = [
            { id: 'first_goal', name: 'First Goal', icon: '⚽', desc: 'Score your first goal', tier: 'bronze' },
            { id: 'hat_trick', name: 'Hat Trick', icon: '🎩', desc: 'Score 3+ in a match', tier: 'silver' },
            { id: 'perfect_round', name: 'Perfect Round', icon: '🌟', desc: 'Score every shot', tier: 'gold' },
            { id: 'sharpshooter', name: 'Sharpshooter', icon: '🎯', desc: '75%+ accuracy (5+ games)', tier: 'gold' },
            { id: 'veteran_keeper', name: 'Veteran', icon: '🏅', desc: 'Play 10 games', tier: 'silver' },
            { id: 'legend_victor', name: 'Legend Victor', icon: '👑', desc: 'Beat Legend AI', tier: 'gold' },
            { id: 'clean_sheet', name: 'Clean Sheet', icon: '🧤', desc: 'Keeper scores 0', tier: 'silver' },
            { id: 'goal_machine', name: 'Goal Machine', icon: '🔥', desc: 'Score 50 total goals', tier: 'gold' },
            { id: 'century_goals', name: '100 Goals', icon: '💯', desc: 'Score 100 total goals', tier: 'gold' },
            { id: 'coin_master', name: 'Coin Master', icon: '💰', desc: 'Earn 2000 coins', tier: 'gold' },
        ];

        const unlocked = GOALBOT_ACHIEVEMENTS.filter(a => this.achievements[a.id]).length;
        const total = GOALBOT_ACHIEVEMENTS.length;

        // Progress
        ctx.font = '12px -apple-system, Arial'; ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fillText(unlocked + ' / ' + total + ' unlocked', cx, 65);

        // Progress bar
        const obx = cx - 80, oby = 72;
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.beginPath(); this.renderer._roundRect(ctx, obx, oby, 160, 5, 2); ctx.fill();
        const obGrad = ctx.createLinearGradient(obx, 0, obx + 160, 0);
        obGrad.addColorStop(0, '#ffd700'); obGrad.addColorStop(1, '#ff8800');
        ctx.fillStyle = obGrad; ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 6;
        ctx.beginPath(); this.renderer._roundRect(ctx, obx, oby, 160 * (unlocked / total), 5, 2); ctx.fill();
        ctx.shadowBlur = 0;

        // Achievement cards — 2 per row
        const tierColors = { bronze: '#cd7f32', silver: '#c0c0c0', gold: '#ffd700' };
        const cardW = (W - 32) / 2 - 4, cardH = 72;
        const startY = 90;

        for (let i = 0; i < GOALBOT_ACHIEVEMENTS.length; i++) {
            const a = GOALBOT_ACHIEVEMENTS[i];
            const col = i % 2;
            const row = Math.floor(i / 2);
            const ax = 12 + col * (cardW + 8);
            const ay = startY + row * (cardH + 8);
            if (ay + cardH > H - 20) break;

            const tc = tierColors[a.tier] || '#888';
            const isUnlocked = !!this.achievements[a.id];

            // Card bg
            ctx.save();
            ctx.globalAlpha = isUnlocked ? 1.0 : 0.55;
            const cGrad = ctx.createLinearGradient(ax, ay, ax, ay + cardH);
            cGrad.addColorStop(0, isUnlocked ? 'rgba(20,24,48,0.92)' : 'rgba(15,15,25,0.88)');
            cGrad.addColorStop(1, isUnlocked ? 'rgba(10,14,30,0.96)' : 'rgba(8,8,14,0.92)');
            ctx.fillStyle = cGrad;
            ctx.beginPath(); this.renderer._roundRect(ctx, ax, ay, cardW, cardH, 10); ctx.fill();

            // Left accent
            ctx.fillStyle = isUnlocked ? tc : 'rgba(100,100,100,0.4)';
            ctx.shadowColor = isUnlocked ? tc : 'transparent';
            ctx.shadowBlur = isUnlocked ? 8 : 0;
            ctx.fillRect(ax, ay + 4, 4, cardH - 8);
            ctx.shadowBlur = 0;

            // Border
            ctx.strokeStyle = isUnlocked ? tc + '55' : 'rgba(255,255,255,0.08)';
            ctx.lineWidth = 1;
            ctx.beginPath(); this.renderer._roundRect(ctx, ax, ay, cardW, cardH, 10); ctx.stroke();

            // Icon — pulse if unlocked
            const iconScale = isUnlocked ? (1 + 0.06 * Math.sin(T / 500 + i)) : 1;
            ctx.font = Math.round(20 * iconScale) + 'px sans-serif';
            ctx.textAlign = 'left'; ctx.textBaseline = 'top';
            ctx.fillStyle = '#fff';
            ctx.fillText(a.icon, ax + 12, ay + 10);

            // Name
            ctx.font = 'bold 11px -apple-system, Arial'; ctx.textBaseline = 'top';
            ctx.fillStyle = isUnlocked ? '#ffffff' : 'rgba(255,255,255,0.4)';
            ctx.fillText(a.name, ax + 38, ay + 8);

            // Desc
            ctx.font = '9px -apple-system, Arial';
            ctx.fillStyle = 'rgba(255,255,255,0.45)';
            ctx.fillText(a.desc, ax + 38, ay + 22);

            // Status
            ctx.font = '8px monospace'; ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
            ctx.fillStyle = isUnlocked ? tc : 'rgba(255,255,255,0.35)';
            ctx.fillText(isUnlocked ? '✓ UNLOCKED' : '🔒 LOCKED', ax + cardW - 8, ay + cardH - 6);

            ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
            ctx.restore();
        }
    }

    // ── GoalBot Achievements ──────────────────────────────────────
    _checkAchievements() {
        const GOALBOT_ACHIEVEMENTS = [
            { id: 'first_goal', name: 'First Goal', icon: '⚽', check: () => this.stats.successfulShots > 0 },
            { id: 'hat_trick', name: 'Hat Trick', icon: '🎩', check: () => this.score.player >= 3 },
            { id: 'perfect_round', name: 'Perfect Round', icon: '🌟', check: () => this.score.player === this.maxRounds && this.score.player > 0 },
            { id: 'sharpshooter', name: 'Sharpshooter', icon: '🎯', check: () => this.stats.accuracy >= 75 && this.stats.gamesPlayed >= 5 },
            { id: 'veteran_keeper', name: 'Veteran', icon: '🏅', check: () => this.stats.gamesPlayed >= 10 },
            { id: 'legend_victor', name: 'Legend Victor', icon: '👑', check: () => this.difficulty === 'legend' && this.score.player > this.score.keeper },
            { id: 'clean_sheet', name: 'Clean Sheet', icon: '🧤', check: () => this.score.keeper === 0 && this.stats.gamesPlayed > 0 },
            { id: 'goal_machine', name: 'Goal Machine', icon: '🔥', check: () => this.stats.successfulShots >= 50 },
            { id: 'century_goals', name: '100 Goals', icon: '💯', check: () => this.stats.successfulShots >= 100 },
            { id: 'coin_master', name: 'Coin Master', icon: '💰', check: () => (this.coins || 0) >= 2000 },
        ];
        try {
            for (const ach of GOALBOT_ACHIEVEMENTS) {
                if (!this.achievements[ach.id] && ach.check()) {
                    this.achievements[ach.id] = true;
                    this.achievementToasts.push({
                        name: ach.name, icon: ach.icon,
                        showTime: Date.now(), duration: 3500,
                    });
                    this.audio.play('surge');
                    Utils.haptic(50);
                    // Persist to Convex
                    if (window._convexClient && window._convexClient.isRegistered) {
                        window._convexClient.unlockAchievement(ach.id, 'goalbot').catch(e => {
                            console.warn('[GoalBot] Achievement sync failed:', e.message);
                        });
                    }
                }
            }
            try { localStorage.setItem('goalbot_achievements', JSON.stringify(this.achievements)); } catch(e) {}
        } catch(e) { console.warn('[ACHIEVEMENTS]', e.message); }
    }

    _endGame() {
        // Handle multiplayer mode
        if (this.mpIsChaser) {
            this.state = 'mp_result';
            this.audio.play('whistle');
            Haptics.notification('error');
            this.animPhase = 0;
            this.renderer.targetZoom = 1;
            this.renderer.cameraShake = 0;

            // Record bot match if it was a bot match
            if (this.mpIsBotMatch && window._convexClient) {
                try {
                    window._convexClient.recordBotMatch({
                        playerScore: this.score.player,
                        botScore: this.mpTarget - 1,
                        difficulty: this.mpSelectedDifficulty,
                        playerWon: this.score.player > (this.mpTarget - 1), // win = score MORE than opponent
                    }).catch(e => console.warn('[MP] Bot match record failed:', e.message));
                } catch(e) {}
            }
            return;
        }

        this.state = this.currentLevelConfig ? 'campaign_result' : 'gameover';
        this.stats.gamesPlayed++;
        this.stats.totalShots += this.round;
        this.stats.successfulShots += this.score.player;
        if (this.score.player > this.stats.bestScore) this.stats.bestScore = this.score.player;
        this.stats.accuracy = this.stats.totalShots > 0 ?
            Math.round((this.stats.successfulShots / this.stats.totalShots) * 100) : 0;

        // Check achievements after stats update
        this._checkAchievements();

        this.audio.play('whistle');
        Haptics.notification('error');
        this.animPhase = 0;
        this.renderer.targetZoom = 1;
        this.renderer.cameraShake = 0;

        // Calculate campaign stars if in campaign mode
        if (this.currentLevelConfig) {
            const levelNum = this.currentLevelConfig.level;
            const targetGoals = this.currentLevelConfig.targetGoals;
            const goalsScored = this.score.player;
            const shotsSaved = this.aiSaves;

            let stars = 0;
            if (goalsScored >= targetGoals) {
                stars = 1;  // 1 star: pass the level
                if (shotsSaved >= 2) stars = 2;  // 2 stars: save at least 2
                if (goalsScored === this.maxRounds) stars = 3;  // 3 stars: perfect round
            }

            // Update level stars and progress
            if (!this.levelStars[levelNum] || stars > (this.levelStars[levelNum] || 0)) {
                this.levelStars[levelNum] = stars;
                this._recalculateTotalStars();
            }

            // Advance campaign level if current level passed
            if (goalsScored >= targetGoals && levelNum === this.campaignLevel && levelNum < 100) {
                this.campaignLevel++;
                this.coins += this.currentLevelConfig.coinReward;
                this.playerXP += this.currentLevelConfig.xpReward;
            }
        }

        // Progression rewards
        this._processGameEndRewards();

        // Persist all state
        this._saveStats();
        this._saveProgress();

        // ── Convex Cloud Sync ──
        this._syncToConvex();

        // Ad check
        this._checkInterstitialAd();
    }

    // ====== CONVEX BACKEND INTEGRATION ======

    async _syncToConvex() {
        if (typeof window._convexClient === 'undefined' || !window._convexClient.isRegistered) return;
        const won = this.score.player > this.score.keeper;
        try {
            // 1. Submit match session
            await window._convexClient.submitSession(
                'goalbot',
                this.score.player,
                this.difficulty,
                won,
                {
                    goalsFor: this.score.player,
                    goalsAgainst: this.score.keeper,
                    totalShots: this.round,
                    round: this.maxRounds,
                    aiSaves: this.aiSaves || 0,
                    streak: this.streak || 0,
                },
                null // duration — not tracked yet
            );
            console.log('[GoalBot→Convex] Session submitted');

            // 2. Sync career stats
            await window._convexClient.syncPlayerStats({
                totalGamesPlayed: this.stats.gamesPlayed || 0,
                totalCoinsEarned: this.coins || 0,
                level: this.playerLevel || 1,
                xp: this.playerXP || 0,
                bestScores: {
                    crickbot: 0,
                    goalbot: this.stats.bestScore || 0,
                    basehit: 0,
                },
                crickbotStats: {
                    totalRuns: 0, totalFours: 0, totalSixes: 0,
                    totalBallsFaced: 0, totalWins: 0, legendWins: 0,
                },
                goalbotStats: {
                    totalGoals: this.totalGoals || 0,
                    totalShots: this.stats.totalShots || 0,
                    totalSaves: Math.max(0, (this.stats.totalShots || 0) - (this.stats.successfulShots || 0)),
                    shotAccuracy: this.stats.totalShots > 0
                        ? (this.stats.successfulShots || 0) / this.stats.totalShots
                        : 0,
                },
                basehitStats: {
                    totalHRs: 0, totalSwings: 0, totalGoodHits: 0,
                    totalFouls: 0, totalStrikes: 0, bestStreak: 0,
                },
            });
            console.log('[GoalBot→Convex] Career stats synced');

            // 3. Sync campaign progress
            if (this.campaignLevel > 1 || this.totalStars > 0) {
                await window._convexClient.syncCampaign(
                    'goalbot',
                    this.campaignLevel || 1,
                    this.totalStars || 0,
                    this.levelStars || {}
                );
                console.log('[GoalBot→Convex] Campaign synced');
            }
        } catch (e) {
            console.warn('[GoalBot→Convex] Sync failed (offline?):', e.message);
        }
    }

    _recalculateTotalStars() {
        this.totalStars = 0;
        for (const levelNum in this.levelStars) {
            this.totalStars += this.levelStars[levelNum] || 0;
        }
    }

    // ====== MULTIPLAYER BOT SIMULATOR ======
    // Bot simulates taking penalties against a virtual keeper.
    // CRITICAL: bot shots MUST equal player's maxRounds from difficultyConfig.
    // Goal chance tuned so bot scores ~40-65% — competitive but beatable.
    // Target ranges ensure the score stays within a fair band.
    _mpSimulateBotPenalties(difficulty) {
        const diff = difficulty || 'medium';
        // Use SAME maxRounds as player gets from difficultyConfig
        const maxRounds = this.difficultyConfig[diff]?.maxRounds || 10;

        // goalChance = base probability per shot (NO streak bonus to prevent runaway)
        // targetRange = [min, max] goals — clamp final result for fairness
        const params = {
            //              base chance    target goals range
            easy:   { goalChance: 0.30, targetRange: [2, 4]  },   // 8 shots → 2-4 goals (~25-50%)
            medium: { goalChance: 0.40, targetRange: [3, 6]  },   // 10 shots → 3-6 goals (~30-60%)
            hard:   { goalChance: 0.50, targetRange: [5, 8]  },   // 12 shots → 5-8 goals (~42-67%)
            legend: { goalChance: 0.58, targetRange: [7, 11] },   // 15 shots → 7-11 goals (~47-73%)
        };
        const p = params[diff] || params.medium;

        let goals = 0, saves = 0, streak = 0, bestStreak = 0;
        const results = [];

        for (let i = 0; i < maxRounds; i++) {
            const progress = i / maxRounds;
            // Slight aggression ramp in final 30% of innings (+5% max)
            const aggrBonus = progress > 0.7 ? (progress - 0.7) * 0.15 : 0;
            const chance = Math.min(0.75, p.goalChance + aggrBonus);

            if (Math.random() < chance) {
                goals++;
                streak++;
                if (streak > bestStreak) bestStreak = streak;
                results.push('goal');
            } else {
                streak = 0;
                saves++;
                results.push(Math.random() < 0.3 ? 'miss' : 'save');
            }
        }

        // Clamp to target range for fairness
        const [minG, maxG] = p.targetRange;
        if (goals < minG) goals = minG + Math.floor(Math.random() * 2);
        if (goals > maxG) goals = maxG - Math.floor(Math.random() * 2);
        // CRITICAL: bot can NEVER score ALL shots — must leave room for player to win
        // Max allowed = maxRounds - 1 (so player can always tie by scoring all)
        goals = Math.min(goals, maxRounds - 1);
        // Safety floor
        goals = Math.max(goals, 1);

        return {
            _id: 'bot_match_' + Date.now(),
            player1Name: 'GoalBot AI',
            player2Name: 'Alpit',
            difficulty: diff,
            status: 'innings2',
            createdAt: Date.now(),
            innings1Score: goals,
            innings1Wickets: maxRounds - goals,
            innings1Overs: maxRounds,
            innings1Balls: 0,
            innings1Fours: bestStreak,
            innings1Sixes: 0,
            innings1Complete: true,
            innings2Score: 0, innings2Wickets: 0, innings2Overs: 0,
            innings2Balls: 0, innings2Fours: 0, innings2Sixes: 0,
            innings2Complete: false,
            target: goals + 1,
            winner: '', winMargin: '',
            updatedAt: Date.now(),
            lastBallResult: '', lastBallRuns: 0,
            _isBot: true,
            _botResults: results,
        };
    }

    // ====== MULTIPLAYER SCREENS ======

    _updateMultiplayerLobby() {
        let tap = this.touch.consumeTap();
        const W = DESIGN.width, cx = W / 2;
        while (tap) {
            // Back button (top-left)
            if (tap.x < 60 && tap.y < 60) {
                // Cancel any search in progress
                if (this.mpSearching) {
                    this.mpSearching = false;
                    this.mpSearchStartTime = 0;
                    if (this.mpQueueCheckInterval) {
                        clearTimeout(this.mpQueueCheckInterval);
                        this.mpQueueCheckInterval = null;
                    }
                    if (window._convexClient) window._convexClient.leaveQueue('Alpit').catch(() => {});
                }
                this.state = 'menu';
                this.audio.play('click');
                Utils.haptic(5);
            }

            if (!this.mpSearching) {
                // ── IDLE STATE tap targets ──

                // Difficulty buttons — computed same as draw
                const diffBtnW = 85, diffBtnH = 45, diffGap = 6;
                const diffTotalW = 4 * diffBtnW + 3 * diffGap;
                const diffStartX = cx - diffTotalW / 2;
                const diffY = 120;
                const diffKeys = ['easy', 'medium', 'hard', 'legend'];
                for (let di = 0; di < 4; di++) {
                    const bx = diffStartX + di * (diffBtnW + diffGap);
                    if (tap.x >= bx && tap.x <= bx + diffBtnW && tap.y >= diffY && tap.y <= diffY + diffBtnH) {
                        this.mpSelectedDifficulty = diffKeys[di];
                        this.audio.play('click');
                        Utils.haptic(5);
                    }
                }

                // Find Match button — Y=295, W-60 wide, H=54
                const findY = 295, findW = W - 60, findH = 54;
                const findX = cx - findW / 2;
                if (tap.x >= findX && tap.x <= findX + findW && tap.y >= findY && tap.y <= findY + findH) {
                    this._startMpSearch();
                }

                // Create Room — Y=370, left half
                const crY = 370, crH = 46, crBtnW = (W - 52) / 2, crGap = 8;
                const createX = 20;
                if (tap.x >= createX && tap.x <= createX + crBtnW && tap.y >= crY && tap.y <= crY + crH) {
                    this.state = 'mp_create_room';
                    this.audio.play('click');
                    Utils.haptic(5);
                }

                // Join Room — Y=370, right half
                const joinX = 20 + crBtnW + crGap;
                if (tap.x >= joinX && tap.x <= joinX + crBtnW && tap.y >= crY && tap.y <= crY + crH) {
                    this.state = 'mp_join_room';
                    this.mpJoinCodeIdx = 0;
                    this.mpJoinCode = ['', '', '', ''];
                    this.mpJoinError = '';
                    this.mpJoinSuccess = false;
                    this.audio.play('click');
                    Utils.haptic(5);
                }
            } else {
                // ── SEARCHING STATE tap targets ──

                // Cancel button — compute same as draw
                const radarCY = 260, radarR = 70;
                const barY = radarCY + radarR + 95;
                const cancelY = barY + 30, cancelW = 180, cancelH = 48;
                const cancelX = cx - cancelW / 2;
                if (tap.x >= cancelX && tap.x <= cancelX + cancelW && tap.y >= cancelY && tap.y <= cancelY + cancelH) {
                    this.mpSearching = false;
                    this.mpSearchStartTime = 0;
                    if (this.mpQueueCheckInterval) {
                        clearTimeout(this.mpQueueCheckInterval);
                        this.mpQueueCheckInterval = null;
                    }
                    if (window._convexClient) window._convexClient.leaveQueue('Alpit').catch(() => {});
                    this.audio.play('click');
                    Utils.haptic(5);
                }
            }
            tap = this.touch.consumeTap();
        }
    }

    _startMpSearch() {
        if (this.mpSearching) return;
        this.mpSearching = true;
        this.mpSearchStartTime = Date.now();
        this.audio.play('click');
        Utils.haptic(10);

        const searchFunc = async () => {
            try {
                const result = await window._convexClient.joinMatchmaking('Alpit', this.mpSelectedDifficulty);
                if (result && result.matched) {
                    this.mpSearching = false;
                    this.mpWaitingRoomData = result.room;
                    this.state = 'mp_waiting';
                } else if (Date.now() - this.mpSearchStartTime > this.MP_BOT_TIMEOUT_MS) {
                    // Timeout: use AI bot
                    this.mpSearching = false;
                    this.mpIsBotMatch = true;
                    const botData = this._mpSimulateBotPenalties(this.mpSelectedDifficulty);
                    this.mpWaitingRoomData = botData;
                    this.state = 'mp_waiting';
                } else {
                    this.mpQueueCheckInterval = setTimeout(searchFunc, 1000);
                }
            } catch(e) {
                console.warn('[MP] Search failed:', e.message);
                this.mpSearching = false;
                this.mpIsBotMatch = true;
                const botData = this._mpSimulateBotPenalties(this.mpSelectedDifficulty);
                this.mpWaitingRoomData = botData;
                this.state = 'mp_waiting';
            }
        };

        searchFunc();
    }

    _updateCreateRoom() {
        let tap = this.touch.consumeTap();
        while (tap) {
            // Back button (top-left)
            if (tap.x < 60 && tap.y < 60) {
                // Cancel room if created
                if (this.mpPrivatePolling) {
                    clearInterval(this.mpPrivatePolling);
                    this.mpPrivatePolling = null;
                }
                this.mpPrivateRoomId = null;
                this.mpPrivateRoomCode = '';
                this.state = 'multiplayer_lobby';
                this.audio.play('click');
                Utils.haptic(5);
            }
            // Create button (only if no room yet)
            if (!this.mpPrivateRoomCode && tap.x >= 107 && tap.x <= 307 && tap.y >= 400 && tap.y <= 450) {
                this.audio.play('click');
                Utils.haptic(10);
                if (window._convexClient) {
                    window._convexClient.createPrivateRoom('Alpit', this.mpSelectedDifficulty).then(result => {
                        this.mpPrivateRoomId = result.roomId;
                        this.mpPrivateRoomCode = result.roomCode;
                        // Poll for opponent joining
                        this.mpPrivatePolling = setInterval(async () => {
                            try {
                                const room = await window._convexClient.checkPrivateRoom(this.mpPrivateRoomId);
                                if (room && room.status === 'innings1') {
                                    clearInterval(this.mpPrivatePolling);
                                    this.mpPrivatePolling = null;
                                    this.mpWaitingRoomData = room;
                                    this.mpIsBotMatch = false;
                                    this.state = 'mp_waiting';
                                }
                            } catch(e) {}
                        }, 2000);
                    }).catch(e => {
                        console.warn('[MP] Create room failed:', e.message);
                    });
                }
            }
            // Cancel room button
            if (this.mpPrivateRoomCode && tap.x >= 107 && tap.x <= 307 && tap.y >= 500 && tap.y <= 545) {
                this.audio.play('click');
                if (this.mpPrivatePolling) {
                    clearInterval(this.mpPrivatePolling);
                    this.mpPrivatePolling = null;
                }
                this.mpPrivateRoomId = null;
                this.mpPrivateRoomCode = '';
            }
            tap = this.touch.consumeTap();
        }
    }

    _updateJoinRoom() {
        let tap = this.touch.consumeTap();
        while (tap) {
            // Back button (top-left)
            if (tap.x < 60 && tap.y < 60) {
                this.mpJoinCode = ['', '', '', ''];
                this.mpJoinCodeIdx = 0;
                this.mpJoinError = '';
                this.mpJoinSuccess = false;
                this.state = 'multiplayer_lobby';
                this.audio.play('click');
                Utils.haptic(5);
            }

            // On-screen keyboard (3 rows QWERTY + numbers)
            const kbStartY = 340;
            const keyW = 32, keyH = 38, keyGap = 4;
            const rows = [
                'QWERTYUHJK'.split(''),
                'ASDFGZXCVB'.split(''),
                'LMNPRSTW23'.split(''),
                '456789'.split('')
            ];
            let keyHit = false;
            for (let ri = 0; ri < rows.length && !keyHit; ri++) {
                const row = rows[ri];
                const rowW = row.length * (keyW + keyGap) - keyGap;
                const rowX = DESIGN.width / 2 - rowW / 2;
                const rowY = kbStartY + ri * (keyH + keyGap);
                for (let ki = 0; ki < row.length; ki++) {
                    const kx = rowX + ki * (keyW + keyGap);
                    if (tap.x >= kx && tap.x <= kx + keyW && tap.y >= rowY && tap.y <= rowY + keyH) {
                        if (this.mpJoinCodeIdx < 4) {
                            this.mpJoinCode[this.mpJoinCodeIdx] = row[ki];
                            this.mpJoinCodeIdx++;
                            this.mpJoinError = '';
                            this.audio.play('click');
                            Utils.haptic(3);
                            keyHit = true;
                        }
                    }
                }
            }

            // Backspace button
            const bsY = kbStartY + rows.length * (keyH + keyGap) + 8;
            if (tap.x >= 80 && tap.x <= 180 && tap.y >= bsY && tap.y <= bsY + 40) {
                if (this.mpJoinCodeIdx > 0) {
                    this.mpJoinCodeIdx--;
                    this.mpJoinCode[this.mpJoinCodeIdx] = '';
                    this.mpJoinError = '';
                    this.audio.play('click');
                    Utils.haptic(3);
                }
            }

            // Join button
            const allFilled = this.mpJoinCode.every(c => c !== '');
            if (allFilled && tap.x >= 234 && tap.x <= 334 && tap.y >= bsY && tap.y <= bsY + 40) {
                this.audio.play('click');
                Utils.haptic(10);
                const code = this.mpJoinCode.join('');
                if (window._convexClient) {
                    window._convexClient.joinPrivateRoom(code, 'Alpit').then(result => {
                        if (result && result.roomId) {
                            this.mpJoinSuccess = true;
                            this.mpIsBotMatch = false;
                            window._convexClient.getRoom(result.roomId).then(room => {
                                this.mpWaitingRoomData = room;
                                this.state = 'mp_waiting';
                            });
                        } else {
                            this.mpJoinError = 'Room not found';
                        }
                    }).catch(e => {
                        this.mpJoinError = e.message || 'Failed to join';
                    });
                }
            }

            tap = this.touch.consumeTap();
        }
    }
