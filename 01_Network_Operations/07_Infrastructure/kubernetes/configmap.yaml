---
# CMI NaaP AI Network Intelligence Platform - Kubernetes ConfigMap
# Shared configuration for all platform services

apiVersion: v1
kind: ConfigMap
metadata:
  name: cmi-naap-config
  namespace: cmi-naap
  labels:
    app: cmi-naap
    version: "1.0.0"
data:
  # Global Configuration
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  TIMEZONE: "UTC"
  API_TIMEOUT: "30"
  WORKERS: "4"

  # Model Configuration
  MODEL_CACHE_DIR: "/models"
  MODEL_VERSION: "1.0.0"
  GPU_ENABLED: "false"

  # ML Model Specific Settings
  BATCH_SIZE: "32"
  LEARNING_RATE: "0.001"
  EPOCHS: "100"
  VALIDATION_SPLIT: "0.2"

  # Blast Radius Analysis Settings
  BLAST_RADIUS_THRESHOLD: "0.85"
  BLAST_RADIUS_TOP_K: "10"
  SHAP_EXPLANATION_ENABLED: "true"

  # Autonomous Operations Settings
  RL_GAMMA: "0.99"
  RL_EPSILON: "0.05"
  RL_LEARNING_RATE: "0.001"
  RL_BUFFER_SIZE: "100000"

  # Self-Healing Network Settings
  ANOMALY_THRESHOLD: "0.85"
  AUTOENCODER_THRESHOLD: "0.95"
  ISOLATION_FOREST_THRESHOLD: "0.7"
  HEALING_TIMEOUT: "120"

  # Predictive Capacity Settings
  FORECAST_HORIZON: "180"
  CONFIDENCE_INTERVAL: "0.95"
  SEASONALITY_PERIOD: "7"
  MIN_TRAINING_SAMPLES: "500"

  # Incident Correlation Settings
  GNN_HIDDEN_DIMS: "128"
  GNN_LAYERS: "3"
  CORRELATION_THRESHOLD: "0.75"
  RCA_DEPTH: "5"

  # Knowledge Assistant Settings
  EMBEDDING_MODEL: "bert-base-uncased"
  LLM_MODEL: "gpt-4-turbo"
  KB_SIZE: "50000"
  MAX_CONTEXT_LENGTH: "8192"
  RELEVANCE_THRESHOLD: "0.7"

  # Monitoring & Observability
  PROMETHEUS_ENABLED: "true"
  PROMETHEUS_PORT: "9090"
  ELK_ENABLED: "true"
  GRAFANA_ENABLED: "true"
  GRAFANA_PORT: "3000"

  # Data Storage
  DATA_VOLUME: "/data"
  LOG_VOLUME: "/logs"
  BACKUP_INTERVAL: "3600"
  RETENTION_DAYS: "90"

  # Network Configuration
  CISCO_NETWORK_TIMEOUT: "30"
  DEVICE_POLLING_INTERVAL: "60"
  TELEMETRY_BATCH_SIZE: "1000"

  # Security Configuration
  CORS_ORIGINS: "http://localhost:8000,http://localhost:3000"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRATION_HOURS: "24"

  # Application Info
  APP_NAME: "CMI NaaP AI Network Intelligence Platform"
  APP_VERSION: "1.0.0"
  BUILD_DATE: "2026-03-21"

---
# Sensitive Data Stored in Secrets (reference below)
apiVersion: v1
kind: ConfigMap
metadata:
  name: cmi-naap-app-config
  namespace: cmi-naap
  labels:
    app: cmi-naap
data:
  # Service Port Mapping
  MASTER_DASHBOARD_PORT: "8000"
  BLAST_RADIUS_PORT: "8001"
  AUTONOMOUS_OPS_PORT: "8002"
  SELF_HEALING_PORT: "8003"
  PREDICTIVE_CAPACITY_PORT: "8004"
  INCIDENT_CORRELATION_PORT: "8005"
  KNOWLEDGE_ASSISTANT_PORT: "8006"

  # Health Check Configuration
  HEALTH_CHECK_INTERVAL: "30"
  HEALTH_CHECK_TIMEOUT: "10"
  HEALTH_CHECK_RETRIES: "3"

  # Database Configuration
  DB_DRIVER: "postgresql"
  DB_HOST: "postgres.cmi-naap.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "cmi_naap"
  DB_POOL_SIZE: "20"
  DB_POOL_RECYCLE: "3600"

  # Redis Cache Configuration
  REDIS_HOST: "redis.cmi-naap.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_CACHE_TTL: "3600"

  # API Gateway Configuration
  API_GATEWAY_URL: "http://master-dashboard:8000"
  API_RATE_LIMIT: "1000"
  API_RATE_LIMIT_PERIOD: "60"

  # Logging Configuration
  LOG_FORMAT: "json"
  LOG_FILE_MAX_SIZE: "104857600"  # 100MB
  LOG_FILE_BACKUP_COUNT: "10"

---
# Kubernetes ConfigMap for service-to-service discovery
apiVersion: v1
kind: ConfigMap
metadata:
  name: cmi-naap-service-discovery
  namespace: cmi-naap
  labels:
    app: cmi-naap
data:
  SERVICE_ENDPOINTS: |
    {
      "master-dashboard": "http://master-dashboard:8000",
      "blast-radius-analysis": "http://blast-radius-analysis:8001",
      "autonomous-ops-agent": "http://autonomous-ops-agent:8002",
      "self-healing-network": "http://self-healing-network:8003",
      "predictive-capacity": "http://predictive-capacity:8004",
      "incident-correlation": "http://incident-correlation:8005",
      "knowledge-assistant": "http://knowledge-assistant:8006"
    }

  SERVICE_DEPENDENCIES: |
    {
      "master-dashboard": [
        "blast-radius-analysis",
        "autonomous-ops-agent",
        "self-healing-network",
        "predictive-capacity",
        "incident-correlation",
        "knowledge-assistant"
      ],
      "autonomous-ops-agent": [
        "blast-radius-analysis",
        "incident-correlation"
      ],
      "self-healing-network": [
        "predictive-capacity",
        "incident-correlation"
      ],
      "incident-correlation": [
        "blast-radius-analysis"
      ]
    }

---
# ML Model and Knowledge Base Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: cmi-naap-ml-config
  namespace: cmi-naap
  labels:
    app: cmi-naap
data:
  # Model Artifact Locations
  MODELS_LOCATION: |
    {
      "blast-radius": "/models/blast_radius_xgboost_v1.0.pkl",
      "autoencoder": "/models/self_healing_autoencoder_v1.0.h5",
      "lstm-forecaster": "/models/lstm_forecaster_v1.0.h5",
      "gnn": "/models/gnn_correlation_v1.0.pt",
      "bert-embedding": "/models/bert_embeddings_v1.0",
      "knowledge-base": "/kb/network_knowledge_base_v1.0"
    }

  # Feature Engineering Configuration
  FEATURE_ENGINEERING_CONFIG: |
    {
      "blast_radius": {
        "n_features": 256,
        "feature_scaling": "standardscaler",
        "feature_selection": "shap"
      },
      "anomaly_detection": {
        "n_features": 512,
        "window_size": 60,
        "feature_scaling": "minmaxscaler"
      },
      "forecasting": {
        "n_features": 128,
        "lag_features": [1, 7, 30],
        "seasonal_features": true
      }
    }

---
# Prometheus Configuration for Metrics
apiVersion: v1
kind: ConfigMap
metadata:
  name: cmi-naap-prometheus-config
  namespace: cmi-naap
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'cmi-naap-services'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - cmi-naap
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: cmi-naap
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_service]
            target_label: service

---
# Logging Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: cmi-naap-logging-config
  namespace: cmi-naap
data:
  logging.yaml: |
    version: 1
    disable_existing_loggers: false
    formatters:
      standard:
        format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
      json:
        format: '{"time": "%(asctime)s", "level": "%(levelname)s", "service": "%(name)s", "message": "%(message)s"}'

    handlers:
      console:
        class: logging.StreamHandler
        level: INFO
        formatter: json
        stream: ext://sys.stdout

      file:
        class: logging.handlers.RotatingFileHandler
        level: DEBUG
        formatter: json
        filename: /logs/cmi-naap.log
        maxBytes: 104857600
        backupCount: 10

    loggers:
      cmi_naap:
        level: INFO
        handlers: [console, file]
        propagate: false

    root:
      level: INFO
      handlers: [console, file]
