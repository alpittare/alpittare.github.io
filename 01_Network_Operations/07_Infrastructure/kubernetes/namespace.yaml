---
# CMI NaaP AI Network Intelligence Platform - Kubernetes Namespace
# Isolated namespace for all platform resources

apiVersion: v1
kind: Namespace
metadata:
  name: cmi-naap
  labels:
    app: cmi-naap
    version: "1.0.0"
    environment: production
    team: network-ai-platform
  annotations:
    description: "CMI NaaP AI Network Intelligence Platform"
    contact: "network-ai-platform@cmi.com"
    documentation: "https://github.com/cmi/naap-ai-network-intelligence"

---
# Network Policy - Allow internal communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cmi-naap-allow-internal
  namespace: cmi-naap
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from within namespace
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 8001
        - protocol: TCP
          port: 8002
        - protocol: TCP
          port: 8003
        - protocol: TCP
          port: 8004
        - protocol: TCP
          port: 8005
        - protocol: TCP
          port: 8006
    # Allow ingress traffic
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # Allow to DNS
    - to:
        - podSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # Allow to other pods
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 8001
        - protocol: TCP
          port: 8002
        - protocol: TCP
          port: 8003
        - protocol: TCP
          port: 8004
        - protocol: TCP
          port: 8005
        - protocol: TCP
          port: 8006
    # Allow external network access (for API calls to Cisco devices, etc.)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 22
        - protocol: TCP
          port: 830

---
# Resource Quota - Limit resource usage in namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: cmi-naap-quota
  namespace: cmi-naap
spec:
  hard:
    requests.cpu: "15"
    requests.memory: "30Gi"
    limits.cpu: "20"
    limits.memory: "40Gi"
    pods: "50"
    services: "20"
    secrets: "20"
    configmaps: "20"
  scopeSelector:
    matchExpressions:
      - operator: In
        scopeName: PriorityClass
        values: ["high", "medium", "low"]

---
# Network Policy - Allow external API access for Cisco devices
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cmi-naap-allow-external
  namespace: cmi-naap
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Allow external access to Cisco devices (NETCONF, SSH, gRPC)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32  # Block AWS metadata service
      ports:
        - protocol: TCP
          port: 22      # SSH
        - protocol: TCP
          port: 830     # NETCONF
        - protocol: TCP
          port: 57400   # gRPC (Cisco IOS-XR)
        - protocol: TCP
          port: 443     # HTTPS
