  name: predictive-capacity
  namespace: cmi-naap
  labels:
    app: cmi-naap
    component: predictive-capacity
  annotations:
    description: "Network capacity forecasting and planning service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8004
      targetPort: 8004
      protocol: TCP
  selector:
    app: cmi-naap
    component: predictive-capacity
  sessionAffinity: ClientIP

---
# Incident Correlation & RCA Service
apiVersion: v1
kind: Service
metadata:
  name: incident-correlation
  namespace: cmi-naap
  labels:
    app: cmi-naap
    component: incident-correlation
  annotations:
    description: "Multi-domain event correlation and root cause analysis service"
