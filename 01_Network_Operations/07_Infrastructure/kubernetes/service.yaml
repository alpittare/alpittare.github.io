  type: ClusterIP
  ports:
    - name: http
      port: 8005
      targetPort: 8005
      protocol: TCP
  selector:
    app: cmi-naap
    component: incident-correlation
  sessionAffinity: ClientIP

---
# Network Knowledge Assistant Service
apiVersion: v1
kind: Service
metadata:
  name: knowledge-assistant
  namespace: cmi-naap
  labels:
    app: cmi-naap
    component: knowledge-assistant
  annotations:
    description: "Natural language Q&A over network operational knowledge service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8006
      targetPort: 8006
      protocol: TCP
  selector:
    app: cmi-naap
    component: knowledge-assistant
  sessionAffinity: ClientIP

---
# Headless Service for StatefulSet DNS Resolution
apiVersion: v1
kind: Service
metadata:
  name: cmi-naap-headless
  namespace: cmi-naap
  labels:
    app: cmi-naap
spec:
  clusterIP: None
  selector:
    app: cmi-naap
  ports:
    - name: http
      port: 80
      protocol: TCP

---
# Persistent Volume Claims for Shared Storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cmi-naap-models
  namespace: cmi-naap
  labels:
    app: cmi-naap
    type: models
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: standard
  resources:
    requests:
      storage: 50Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cmi-naap-data
  namespace: cmi-naap
  labels:
    app: cmi-naap
    type: data
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: standard
  resources:
    requests:
      storage: 100Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cmi-naap-knowledge-base
  namespace: cmi-naap
  labels:
    app: cmi-naap
    type: knowledge-base
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: standard
  resources:
    requests:
      storage: 20Gi

---
# Service Monitor for Prometheus (if using Prometheus Operator)
apiVersion: v1
kind: Service
metadata:
  name: cmi-naap-metrics
  namespace: cmi-naap
  labels:
    app: cmi-naap
    component: metrics
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: cmi-naap
