---
# CMI NaaP AI Network Intelligence Platform - Kubernetes Services
# ClusterIP services for internal communication and external access

# Master Dashboard Service
apiVersion: v1
kind: Service
metadata:
  name: master-dashboard
  namespace: cmi-naap
  labels:
    app: cmi-naap
    component: master-dashboard
  annotations:
    description: "Central control and monitoring interface"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app: cmi-naap
    component: master-dashboard
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
# Blast Radius Analysis Service
apiVersion: v1
kind: Service
metadata:
  name: blast-radius-analysis
  namespace: cmi-naap
  labels:
    app: cmi-naap
    component: blast-radius-analysis
  annotations:
    description: "Network failure impact assessment service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8001
      targetPort: 8001
      protocol: TCP
  selector:
    app: cmi-naap
    component: blast-radius-analysis
  sessionAffinity: ClientIP

---
# Autonomous Operations Agent Service
apiVersion: v1
kind: Service
metadata:
  name: autonomous-ops-agent
  namespace: cmi-naap
  labels:
    app: cmi-naap
    component: autonomous-ops-agent
  annotations:
    description: "Automated remediation and configuration management service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8002
      targetPort: 8002
      protocol: TCP
  selector:
    app: cmi-naap
    component: autonomous-ops-agent
  sessionAffinity: ClientIP

---
# Self-Healing Network Service
