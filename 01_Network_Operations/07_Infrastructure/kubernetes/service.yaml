  labels:
    app: cmi-naap
    component: self-healing-network
  annotations:
    description: "Real-time anomaly detection and automated fault correction service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8003
      targetPort: 8003
      protocol: TCP
  selector:
    app: cmi-naap
