---
# CMI NaaP AI Network Intelligence Platform - Kubernetes Ingress
# Path-based routing for external access to platform services

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cmi-naap-ingress
  namespace: cmi-naap
  labels:
    app: cmi-naap
    version: "1.0.0"
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "60m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  tls:
    - hosts:
        - naap.example.com
      secretName: cmi-naap-tls-cert
  rules:
    # Master Dashboard - Root path
    - host: naap.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: master-dashboard
                port:
                  number: 8000

          # Blast Radius Analysis
          - path: /blast-radius
            pathType: Prefix
            backend:
              service:
                name: blast-radius-analysis
                port:
                  number: 8001

          # Autonomous Operations Agent
          - path: /autonomous-ops
            pathType: Prefix
            backend:
              service:
                name: autonomous-ops-agent
                port:
                  number: 8002

          # Self-Healing Network
          - path: /self-healing
            pathType: Prefix
            backend:
              service:
                name: self-healing-network
                port:
                  number: 8003

          # Predictive Capacity Intelligence
          - path: /predictive-capacity
            pathType: Prefix
            backend:
              service:
                name: predictive-capacity
                port:
                  number: 8004

          # Incident Correlation & RCA
          - path: /incident-correlation
            pathType: Prefix
            backend:
              service:
                name: incident-correlation
                port:
                  number: 8005

          # Network Knowledge Assistant
          - path: /knowledge-assistant
            pathType: Prefix
            backend:
              service:
                name: knowledge-assistant
                port:
                  number: 8006

          # Health check endpoint
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: master-dashboard
                port:
                  number: 8000

---
# API Gateway-style Ingress for microservices
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cmi-naap-api-ingress
  namespace: cmi-naap
  labels:
    app: cmi-naap
    component: api-gateway
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/api-enable: "true"
    nginx.ingress.kubernetes.io/rate-limit: "500"
    nginx.ingress.kubernetes.io/rate-limit-window: "60m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
spec:
  tls:
    - hosts:
        - api.naap.example.com
      secretName: cmi-naap-api-tls-cert
  rules:
    # API v1 endpoints
    - host: api.naap.example.com
      http:
        paths:
          # Blast Radius Analysis API
          - path: /v1/blast-radius
            pathType: Prefix
            backend:
              service:
                name: blast-radius-analysis
                port:
                  number: 8001

          # Autonomous Operations API
          - path: /v1/autonomous-ops
            pathType: Prefix
            backend:
              service:
                name: autonomous-ops-agent
                port:
                  number: 8002

          # Self-Healing Network API
          - path: /v1/self-healing
            pathType: Prefix
            backend:
              service:
                name: self-healing-network
                port:
                  number: 8003

          # Predictive Capacity API
          - path: /v1/predictive-capacity
            pathType: Prefix
            backend:
              service:
                name: predictive-capacity
                port:
                  number: 8004

          # Incident Correlation API
          - path: /v1/incident-correlation
            pathType: Prefix
            backend:
              service:
                name: incident-correlation
                port:
                  number: 8005

          # Knowledge Assistant API
          - path: /v1/knowledge-assistant
            pathType: Prefix
            backend:
              service:
                name: knowledge-assistant
                port:
                  number: 8006

---
# Ingress for metrics and monitoring (Prometheus)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cmi-naap-metrics-ingress
  namespace: cmi-naap
  labels:
    app: cmi-naap
    component: monitoring
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/auth-type: "basic"
    nginx.ingress.kubernetes.io/auth-secret: "cmi-naap-metrics-auth"
    nginx.ingress.kubernetes.io/auth-realm: "CMI NaaP Metrics"
spec:
  tls:
    - hosts:
        - metrics.naap.example.com
      secretName: cmi-naap-metrics-tls-cert
  rules:
    - host: metrics.naap.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090

---
# Network Policy for Ingress Traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cmi-naap-ingress-policy
  namespace: cmi-naap
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Allow from ingress-nginx namespace
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 8001
        - protocol: TCP
          port: 8002
        - protocol: TCP
          port: 8003
        - protocol: TCP
          port: 8004
        - protocol: TCP
          port: 8005
        - protocol: TCP
          port: 8006

---
# Certificate for HTTPS (using cert-manager)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cmi-naap-tls-cert
  namespace: cmi-naap
spec:
  secretName: cmi-naap-tls-cert
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - naap.example.com
    - "*.naap.example.com"

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cmi-naap-api-tls-cert
  namespace: cmi-naap
spec:
  secretName: cmi-naap-api-tls-cert
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - api.naap.example.com
    - "*.api.naap.example.com"

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cmi-naap-metrics-tls-cert
  namespace: cmi-naap
spec:
  secretName: cmi-naap-metrics-tls-cert
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - metrics.naap.example.com

---
# ClusterIssuer for Let's Encrypt (should be created once per cluster)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: network-ai-platform@cmi.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx

---
# Secret for Metrics Authentication
apiVersion: v1
kind: Secret
metadata:
  name: cmi-naap-metrics-auth
  namespace: cmi-naap
type: Opaque
data:
  # Base64 encoded: admin:admin (replace with secure password)
  auth: YWRtaW46YWRtaW4=

---
# Pod Disruption Budget to maintain availability during cluster maintenance
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cmi-naap-pdb
  namespace: cmi-naap
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: cmi-naap
