---
# Horizontal Pod Autoscaler for Load Balancing
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cmi-naap-hpa
  namespace: cmi-naap
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: blast-radius-analysis
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 15
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15

---
# Service Account and RBAC
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cmi-naap-sa
  namespace: cmi-naap

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cmi-naap-role
  namespace: cmi-naap
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cmi-naap-rolebinding
  namespace: cmi-naap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cmi-naap-role
subjects:
  - kind: ServiceAccount
    name: cmi-naap-sa
    namespace: cmi-naap
