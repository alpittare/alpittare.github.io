              valueFrom:
                configMapKeyRef:
                  name: cmi-naap-config
                  key: BLAST_RADIUS_THRESHOLD

          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3

          resources:
