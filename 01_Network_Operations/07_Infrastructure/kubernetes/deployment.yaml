---
# CMI NaaP AI Network Intelligence Platform - Kubernetes Deployments
# All 6 project deployments with auto-scaling and health checks

apiVersion: apps/v1
kind: Deployment
metadata:
  name: master-dashboard
  namespace: cmi-naap
  labels:
    app: cmi-naap
    component: master-dashboard
    version: "1.0.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cmi-naap
      component: master-dashboard
  template:
    metadata:
      labels:
        app: cmi-naap
        component: master-dashboard
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - cmi-naap
                topologyKey: kubernetes.io/hostname

      serviceAccountName: cmi-naap-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
        - name: master-dashboard
          image: cmi-naap:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "master-dashboard"
            - name: SERVICE_PORT
              value: "8000"
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: cmi-naap-config
                  key: LOG_LEVEL
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: cmi-naap-config
                  key: ENVIRONMENT
            - name: WORKERS
              valueFrom:
                configMapKeyRef:
                  name: cmi-naap-config
                  key: WORKERS

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

          volumeMounts:
            - name: logs
              mountPath: /logs
            - name: config
              mountPath: /config
              readOnly: true

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

      volumes:
        - name: logs
          emptyDir:
            sizeLimit: 1Gi
        - name: config
          configMap:
            name: cmi-naap-config

      terminationGracePeriodSeconds: 30

---
# Blast Radius Analysis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blast-radius-analysis
  namespace: cmi-naap
  labels:
    app: cmi-naap
    component: blast-radius-analysis
    version: "1.0.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cmi-naap
      component: blast-radius-analysis
  template:
    metadata:
      labels:
        app: cmi-naap
        component: blast-radius-analysis
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
    spec:
      serviceAccountName: cmi-naap-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
        - name: blast-radius-analysis
          image: cmi-naap:latest
          imagePullPolicy: Always
          workingDir: /app/01_Blast_Radius_Analysis
          command: ["python", "main.py"]
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: SERVICE_NAME
              value: "blast-radius-analysis"
            - name: SERVICE_PORT
              value: "8001"
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: cmi-naap-config
