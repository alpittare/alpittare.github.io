version: '3.9'

services:
  # Master Dashboard - Central Control Interface
  master-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
    container_name: cmi-naap-dashboard
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=master_dashboard.py
      - LOG_LEVEL=INFO
      - API_TIMEOUT=30
    networks:
      - cmi-naap-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    depends_on:
      - blast-radius-analysis
      - autonomous-ops-agent
      - self-healing-network
      - predictive-capacity
      - incident-correlation
      - knowledge-assistant
    volumes:
      - ./logs:/app/logs

  # Project 01: Blast Radius Analysis
  blast-radius-analysis:
    build:
      context: ./01_Blast_Radius_Analysis
      dockerfile: Dockerfile
    container_name: cmi-naap-blast-radius
    ports:
      - "8001:8001"
    environment:
      - SERVICE_NAME=blast-radius-analysis
      - SERVICE_PORT=8001
      - LOG_LEVEL=INFO
      - MODEL_CACHE_DIR=/models
      - BATCH_SIZE=32
      - WORKERS=4
      - TIMEOUT=30
    networks:
      - cmi-naap-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    volumes:
      - ./models:/models
      - ./data/blast-radius:/data
      - ./logs/blast-radius:/logs
    mem_limit: 2g
    cpus: "2"
    deploy:
      resources:
        reservations:
          cpus: "1"
          memory: 1G
        limits:
          cpus: "2"
          memory: 2G

  # Project 02: Autonomous Operations Agent
  autonomous-ops-agent:
    build:
      context: ./02_Autonomous_Operations_Agent
      dockerfile: Dockerfile
    container_name: cmi-naap-autonomous-ops
    ports:
      - "8002:8002"
    environment:
      - SERVICE_NAME=autonomous-ops-agent
      - SERVICE_PORT=8002
      - LOG_LEVEL=INFO
      - RL_LEARNING_RATE=0.001
      - RL_GAMMA=0.99
      - DEVICE_TIMEOUT=30
      - WORKERS=4
      - TIMEOUT=60
    networks:
      - cmi-naap-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    volumes:
      - ./models:/models
      - ./data/autonomous-ops:/data
      - ./logs/autonomous-ops:/logs
      - ./configs:/configs
    mem_limit: 1.5g
    cpus: "1.5"
    deploy:
      resources:
        reservations:
          cpus: "1"
          memory: 1G
        limits:
          cpus: "1.5"
          memory: 1.5G

  # Project 03: Self-Healing Network
  self-healing-network:
    build:
      context: ./03_Self_Healing_Network
      dockerfile: Dockerfile
    container_name: cmi-naap-self-healing
    ports:
      - "8003:8003"
    environment:
      - SERVICE_NAME=self-healing-network
      - SERVICE_PORT=8003
      - LOG_LEVEL=INFO
      - ANOMALY_THRESHOLD=0.85
      - AUTOENCODER_THRESHOLD=0.95
      - HEALING_TIMEOUT=120
      - WORKERS=4
      - TIMEOUT=30
    networks:
      - cmi-naap-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    volumes:
      - ./models:/models
      - ./data/self-healing:/data
      - ./logs/self-healing:/logs
    mem_limit: 2.5g
    cpus: "2"
    deploy:
      resources:
        reservations:
          cpus: "1.5"
          memory: 1.5G
        limits:
          cpus: "2"
          memory: 2.5G

  # Project 04: Predictive Capacity Intelligence
  predictive-capacity:
    build:
      context: ./04_Predictive_Capacity_Intelligence
      dockerfile: Dockerfile
    container_name: cmi-naap-predictive-capacity
    ports:
      - "8004:8004"
    environment:
      - SERVICE_NAME=predictive-capacity
      - SERVICE_PORT=8004
      - LOG_LEVEL=INFO
      - FORECAST_HORIZON=180
      - CONFIDENCE_INTERVAL=0.95
      - FORECAST_TIMEOUT=120
      - WORKERS=4
      - TIMEOUT=60
    networks:
      - cmi-naap-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    restart: unless-stopped
    volumes:
      - ./models:/models
      - ./data/predictive-capacity:/data
      - ./logs/predictive-capacity:/logs
    mem_limit: 3g
    cpus: "2"
    deploy:
      resources:
        reservations:
          cpus: "1.5"
          memory: 2G
        limits:
          cpus: "2"
          memory: 3G

  # Project 05: Incident Correlation & RCA
  incident-correlation:
    build:
      context: ./05_Incident_Correlation_RCA
      dockerfile: Dockerfile
    container_name: cmi-naap-incident-correlation
    ports:
      - "8005:8005"
    environment:
      - SERVICE_NAME=incident-correlation
      - SERVICE_PORT=8005
      - LOG_LEVEL=INFO
      - GNN_HIDDEN_DIMS=128
      - CORRELATION_THRESHOLD=0.75
      - RCA_DEPTH=5
      - WORKERS=4
      - TIMEOUT=60
    networks:
      - cmi-naap-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    volumes:
      - ./models:/models
      - ./data/incident-correlation:/data
      - ./logs/incident-correlation:/logs
    mem_limit: 3.5g
    cpus: "2.5"
    deploy:
      resources:
        reservations:
          cpus: "1.5"
          memory: 2G
        limits:
          cpus: "2.5"
          memory: 3.5G

  # Project 06: Network Knowledge Assistant
  knowledge-assistant:
    build:
      context: ./06_Network_Knowledge_Assistant
      dockerfile: Dockerfile
    container_name: cmi-naap-knowledge-assistant
    ports:
      - "8006:8006"
    environment:
      - SERVICE_NAME=knowledge-assistant
      - SERVICE_PORT=8006
      - LOG_LEVEL=INFO
      - EMBEDDING_MODEL=bert-base-uncased
      - LLM_MODEL=gpt-4-turbo
      - KB_SIZE=50000
      - MAX_CONTEXT_LENGTH=8192
      - WORKERS=4
      - TIMEOUT=60
    networks:
      - cmi-naap-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    volumes:
      - ./models:/models
      - ./data/knowledge-assistant:/data
      - ./logs/knowledge-assistant:/logs
      - ./knowledge-base:/kb
    mem_limit: 4g
    cpus: "3"
    deploy:
      resources:
        reservations:
          cpus: "2"
          memory: 3G
        limits:
          cpus: "3"
          memory: 4G

networks:
  cmi-naap-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  models:
    driver: local
  logs:
    driver: local
  data:
    driver: local
  knowledge-base:
    driver: local
  configs:
    driver: local
