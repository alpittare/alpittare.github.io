groups:
  - name: network_knowledge_assistant
    interval: 30s
    rules:
      # Service Health Alerts
      - alert: NetworkKnowledgeAssistantServiceDown
        expr: up{job="network-knowledge"} == 0
        for: 2m
        labels:
          severity: critical
          component: service
        annotations:
          summary: "Network Knowledge Assistant service is down"
          description: "{{ $labels.instance }} has been unreachable for 2 minutes"

      - alert: NetworkKnowledgeResponseTimeHigh
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="network-knowledge"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
          component: performance
        annotations:
          summary: "Network Knowledge response time exceeds threshold"
          description: "P95 latency is {{ $value }}s (threshold: 2s)"

      # Resource Alerts
      - alert: NetworkKnowledgeCPUHigh
        expr: rate(process_cpu_seconds_total{job="network-knowledge"}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
          component: resource
        annotations:
          summary: "Network Knowledge CPU usage high"
          description: "CPU usage is {{ $value }}% (threshold: 80%)"

      - alert: NetworkKnowledgeMemoryHigh
        expr: process_resident_memory_bytes{job="network-knowledge"} / 1e9 > 2.5
        for: 5m
        labels:
          severity: warning
          component: resource
        annotations:
          summary: "Network Knowledge memory usage high"
          description: "Memory usage is {{ $value }}GB (threshold: 2.5GB)"

      - alert: NetworkKnowledgeDiskHigh
        expr: node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"} < 0.1
        for: 5m
        labels:
          severity: warning
          component: resource
        annotations:
          summary: "Network Knowledge disk space low"
          description: "Disk usage is {{ $value | humanizePercentage }} (threshold: 90%)"

      # ML-Specific Alerts
      - alert: NetworkKnowledgePredictionLatencyHigh
        expr: histogram_quantile(0.99, rate(prediction_latency_seconds_bucket{job="network-knowledge"}[5m])) > 1.5
        for: 5m
        labels:
          severity: warning
          component: ml
        annotations:
          summary: "Prediction latency exceeds SLA"
          description: "P99 latency is {{ $value }}s (SLA: 1.5s)"

      - alert: NetworkKnowledgeModelDriftDetected
        expr: increase(model_drift_detected_total{job="network-knowledge"}[1h]) > 0
        for: 5m
        labels:
          severity: warning
          component: ml
        annotations:
          summary: "Model drift detected"
          description: "Model distribution has shifted significantly"

      - alert: NetworkKnowledgeAccuracyDegraded
        expr: model_accuracy{job="network-knowledge"} < 0.92
        for: 10m
        labels:
          severity: warning
          component: ml
        annotations:
          summary: "Model accuracy degraded"
          description: "Current accuracy is {{ $value }} (baseline: 0.92)"

      # Business Logic Alerts - UC6 Specific
      - alert: NetworkKnowledgeRAGRetrievalFailure
        expr: increase(rag_retrieval_failures_total{job="network-knowledge"}[5m]) > 10
        for: 5m
        labels:
          severity: warning
          component: business_logic
        annotations:
          summary: "RAG retrieval failures detected"
          description: "{{ $value }} retrieval failures in 5 minutes (threshold: 10)"

      - alert: NetworkKnowledgeIntentMisclassification
        expr: rate(intent_misclassifications_total{job="network-knowledge"}[5m]) > 0.15
        for: 5m
        labels:
          severity: warning
          component: business_logic
        annotations:
          summary: "Intent misclassification rate high"
          description: "Misclassification rate is {{ $value }}/sec (threshold: 0.15/sec)"

      - alert: NetworkKnowledgeGuardrailTriggerRate
        expr: rate(guardrail_triggers_total{job="network-knowledge"}[5m]) > 0.2
        for: 5m
        labels:
          severity: warning
          component: business_logic
        annotations:
          summary: "Guardrail trigger rate high"
          description: "Trigger rate is {{ $value }}/sec (threshold: 0.2/sec)"

      - alert: NetworkKnowledgeRAGRelevanceLow
        expr: histogram_quantile(0.5, rate(retrieval_relevance_score_bucket{job="network-knowledge"}[5m])) < 0.65
        for: 10m
        labels:
          severity: warning
          component: business_logic
        annotations:
          summary: "RAG retrieval relevance score low"
          description: "Median relevance is {{ $value }} (threshold: 0.65)"

      - alert: NetworkKnowledgeQueryQueueBacklog
        expr: rag_query_queue_depth{job="network-knowledge"} > 500
        for: 5m
        labels:
          severity: warning
          component: business_logic
        annotations:
          summary: "RAG query queue backlog high"
          description: "Queue depth is {{ $value }} (threshold: 500)"
