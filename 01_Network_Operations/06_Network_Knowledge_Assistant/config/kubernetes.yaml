apiVersion: v1
kind: Namespace
metadata:
  name: cmi-naap

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: network-knowledge-config
  namespace: cmi-naap
data:
  LOG_LEVEL: "INFO"
  SERVICE_PORT: "8006"
  ENVIRONMENT: "staging"
  MODEL_PATH: "/models"
  VECTOR_DB: "milvus:19530"
  LLM_ENDPOINT: "http://llm-service:8000"
  PROMETHEUS_ENABLED: "true"
  METRICS_PORT: "9090"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: network-knowledge-assistant
  namespace: cmi-naap
  labels:
    app: network-knowledge-assistant
    component: ai-ml
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: network-knowledge-assistant
  template:
    metadata:
      labels:
        app: network-knowledge-assistant
    spec:
      containers:
      - name: network-knowledge-assistant
        image: ghcr.io/cmi/network-knowledge-assistant:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8006
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        envFrom:
        - configMapRef:
            name: network-knowledge-config
        resources:
          requests:
            cpu: 1000m
            memory: 1.5Gi
          limits:
            cpu: 3000m
            memory: 3Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8006
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8006
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

---
apiVersion: v1
kind: Service
metadata:
  name: network-knowledge-assistant
  namespace: cmi-naap
  labels:
    app: network-knowledge-assistant
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8006
    targetPort: 8006
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: network-knowledge-assistant

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: network-knowledge-assistant-hpa
  namespace: cmi-naap
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: network-knowledge-assistant
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: network-knowledge-assistant-network-policy
  namespace: cmi-naap
spec:
  podSelector:
    matchLabels:
      app: network-knowledge-assistant
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: cmi-naap
    ports:
    - protocol: TCP
      port: 8006
    - protocol: TCP
      port: 9090
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: cmi-naap
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
