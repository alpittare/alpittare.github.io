hostname NEXUS-CORE-01
version 9.3(4)
nv overlay evpn

feature nv overlay

no ip domain-lookup
ip domain-name example.com

snmp-server contact "NetOps Team"
snmp-server location "DC1-Building-A"

role name default
  description This is a system role

interface Ethernet1/1
  description UPLINK-TO-SPINE-01
  speed 100G
  mtu 9216
  no shutdown
  ip address 10.1.1.1 255.255.255.0

interface Ethernet1/2
  description UPLINK-TO-SPINE-02
  speed 100G
  mtu 9216
  no shutdown
  ip address 10.1.2.1 255.255.255.0

interface Ethernet1/3
  description CONNECTION-TO-LEAF-01
  speed 40G
  mtu 9216
  no shutdown

interface Ethernet1/4
  description CONNECTION-TO-LEAF-02
  speed 40G
  mtu 9216
  no shutdown

interface Ethernet1/5
  description UNUSED
  shutdown

interface Ethernet1/6
  description UNUSED
  shutdown

interface mgmt0
  description Management Interface
  ip address 192.168.100.11 255.255.255.0
  no shutdown

interface Loopback0
  description BGP-Loopback
  ip address 10.0.0.1 255.255.255.255

interface Loopback1
  description VXLAN-Loopback
  ip address 10.0.1.1 255.255.255.255

vlan 29
  name MANAGEMENT-VLAN
  description Management network for network devices

vlan 100
  name DATA-VLAN
  description Production data VLAN

vlan 200
  name SERVICES-VLAN
  description Services and applications VLAN

vlan 300
  name GUEST-VLAN
  description Guest network VLAN

router bgp 65001
  bestpath as-path multipath-relax
  log-neighbor-changes
  neighbor 10.1.1.254 remote-as 65000
    description SPINE-01
    address-family ipv4 unicast
      send-community extended
      prefix-list PL-CORE-OUT out
    exit
  neighbor 10.1.2.254 remote-as 65000
    description SPINE-02
    address-family ipv4 unicast
      send-community extended
      prefix-list PL-CORE-OUT out
    exit
  vrf PROD
    router-id 10.0.0.1
    address-family ipv4 unicast
      redistribute connected route-map RM-CONN-TO-BGP
    exit
  exit

ip prefix-list PL-CORE-OUT seq 10 permit 10.0.0.0/8
ip prefix-list PL-CORE-OUT seq 20 permit 192.168.100.0/24

ip access-list standard ACL-MGMT-SSH
  10 permit 192.168.100.0 0.0.0.255
  20 permit 10.0.0.0 0.255.255.255

ip access-list extended ACL-DATA-IN
  10 permit tcp any any eq 80
  20 permit tcp any any eq 443
  30 permit icmp any any

route-map RM-CONN-TO-BGP permit 10
  match interface Loopback0
  set as-path prepend 65001

ntp server 10.0.0.100
ntp server 10.0.0.101

aaa authentication login default local
line console
  exec-timeout 10 0
line vty 0 4
  access-class ACL-MGMT-SSH in
  exec-timeout 10 0

logging console 5
logging buffer 2000000
logging server 10.0.0.200 facility LOCAL0
