hostname CAT6509-DIST-01
version 15.2

ip domain-name example.com
ip name-server 10.0.0.100
ip name-server 10.0.0.101

spanning-tree mode rapid-pvst
spanning-tree vlan 1-4094 priority 24576

interface Port-channel1
  description LINK-AGGREGATION-TO-CORE
  switchport mode trunk
  switchport trunk native vlan 1
  switchport trunk allowed vlan 1,29,100,200,300
  no shutdown

interface GigabitEthernet1/1
  description UPLINK-TO-NEXUS-CORE-01-A
  switchport mode trunk
  switchport trunk native vlan 1
  switchport trunk allowed vlan 1,29,100,200,300
  channel-group 1 mode active
  no shutdown

interface GigabitEthernet1/2
  description UPLINK-TO-NEXUS-CORE-01-B
  switchport mode trunk
  switchport trunk native vlan 1
  switchport trunk allowed vlan 1,29,100,200,300
  channel-group 1 mode active
  no shutdown

interface GigabitEthernet2/1
  description ACCESS-SWITCH-01-DATA-VLAN
  description Connected to ACCESS-SW-01
  switchport access vlan 100
  spanning-tree portfast edge
  spanning-tree bpduguard enable
  no shutdown

interface GigabitEthernet2/2
  description ACCESS-SWITCH-02-DATA-VLAN
  switchport access vlan 100
  spanning-tree portfast edge
  spanning-tree bpduguard enable
  no shutdown

interface GigabitEthernet2/3
  description ACCESS-SWITCH-03-SERVICES-VLAN
  switchport access vlan 200
  spanning-tree portfast edge
  spanning-tree bpduguard enable
  no shutdown

interface GigabitEthernet2/4
  description RESERVED-LINK
  shutdown

interface GigabitEthernet3/1
  description RESERVED-UPLINK
  shutdown

interface Vlan29
  description Management-Network
  ip address 192.168.100.10 255.255.255.0
  no shutdown

interface Vlan100
  description Data-VLAN-Interface
  ip address 10.100.0.1 255.255.255.0
  description Production data network
  no shutdown

interface Vlan200
  description Services-VLAN-Interface
  ip address 10.200.0.1 255.255.255.0
  no shutdown

interface Vlan300
  description Guest-VLAN-Interface
  ip address 10.200.50.1 255.255.255.0
  no shutdown

router bgp 65002
  bgp log-neighbor-changes
  bgp bestpath as-path multipath-relax
  neighbor 10.1.1.1 remote-as 65001
    description NEXUS-CORE-01
    description Core layer BGP peer
    address-family ipv4
      send-community extended
    exit-address-family
  exit
  address-family ipv4
    redistribute connected route-map RM-VLAN-EXPORT
  exit

ip prefix-list PL-VLAN100 seq 5 permit 10.100.0.0/24
ip prefix-list PL-VLAN200 seq 5 permit 10.200.0.0/24
ip prefix-list PL-VLAN300 seq 5 permit 10.200.50.0/24

route-map RM-VLAN-EXPORT permit 10
  match ip address prefix-list PL-VLAN100
  set as-path prepend 65002
  exit

route-map RM-VLAN-EXPORT permit 20
  match ip address prefix-list PL-VLAN200
  exit

route-map RM-VLAN-EXPORT permit 30
  match ip address prefix-list PL-VLAN300
  exit

ip access-list standard ACL-MGMT-VLAN29
  10 permit 192.168.100.0 0.0.0.255

ip access-list extended ACL-VLAN100-IN
  10 permit tcp any any eq 80
  20 permit tcp any any eq 443
  30 permit tcp any any eq 22
  40 permit icmp any any

snmp-server community public ro
snmp-server community private rw ACL-MGMT-VLAN29

aaa authentication login default local
aaa authentication enable default enable
aaa authorization exec default local

line con 0
  exec-timeout 10 0
line vty 0 4
  access-class ACL-MGMT-VLAN29 in
  exec-timeout 10 0
line vty 5 15
  access-class ACL-MGMT-VLAN29 in
  exec-timeout 10 0

ntp server 10.0.0.100
ntp server 10.0.0.101

logging 10.0.0.200
logging facility local0
logging source-interface Vlan29
