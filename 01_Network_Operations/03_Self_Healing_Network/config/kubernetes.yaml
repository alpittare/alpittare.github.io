apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-healing-network
  namespace: network-automation
spec:
  replicas: 3
  selector:
    matchLabels:
      app: self-healing-network
  template:
    metadata:
      labels:
        app: self-healing-network
    spec:
      containers:
      - name: shn
        image: self-healing-network:latest
        ports:
        - containerPort: 8000
        env:
        - name: LOG_LEVEL
          value: "INFO"
        - name: ENABLE_AUTO_REMEDIATION
          value: "true"
        - name: GUARDRAIL_MODE
          value: "strict"
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: config
          mountPath: /app/config
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: config
        configMap:
          name: shn-config
      - name: logs
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: self-healing-network
  namespace: network-automation
spec:
  selector:
    app: self-healing-network
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: LoadBalancer

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shn-config
  namespace: network-automation
data:
  settings.py: |
    DEVICE_CONFIG = {
      'primary': {
        'hostname': 'nexus-01',
        'ip_address': '10.0.0.1'
      }
    }
    GUARDRAILS = {
      'rate_limiter': {'max_actions_per_hour': 5},
      'change_window': {'start_hour_utc': 2, 'end_hour_utc': 6}
    }
