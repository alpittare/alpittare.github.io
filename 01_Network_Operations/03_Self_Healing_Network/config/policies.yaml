# Self-Healing Network Remediation Policies
# YAML-based policy definitions for closed-loop automation

policies:
  - name: "bgp_flap_recovery"
    enabled: true
    priority: 8
    auto_execute: true
    requires_approval: false
    conditions:
      - metric: "bgp_neighbors_down"
        operator: ">="
        threshold: 2
      - metric: "packet_loss_percent"
        operator: ">="
        threshold: 15
    action:
      type: "bgp_soft_reset"
      target: "neighbor"
      parameters:
        clear_soft: true
    estimated_duration_seconds: 15
    risk_level: "low"

  - name: "interface_down_recovery"
    enabled: true
    priority: 9
    auto_execute: true
    requires_approval: false
    conditions:
      - metric: "interface_errors"
        operator: ">="
        threshold: 100
      - metric: "link_utilization_percent"
        operator: "<"
        threshold: 2
    action:
      type: "interface_bounce"
      target: "interface"
      parameters:
        interface: "Ethernet1/1"
    estimated_duration_seconds: 30
    risk_level: "low"

  - name: "high_cpu_mitigation"
    enabled: true
    priority: 7
    auto_execute: false
    requires_approval: true
    conditions:
      - metric: "cpu_percent"
        operator: ">="
        threshold: 80
      - metric: "memory_percent"
        operator: ">="
        threshold: 70
    action:
      type: "bgp_reset"
      target: "system"
      parameters:
        reset_all: true
    estimated_duration_seconds: 60
    risk_level: "medium"

  - name: "stp_loop_mitigation"
    enabled: true
    priority: 10
    auto_execute: true
    requires_approval: false
    conditions:
      - metric: "stp_blocked_ports"
        operator: ">="
        threshold: 3
      - metric: "interface_errors"
        operator: ">="
        threshold: 1000
    action:
      type: "stp_priority_adjust"
      target: "vlan"
      parameters:
        vlan: 100
        priority: 4096
    estimated_duration_seconds: 10
    risk_level: "low"

  - name: "interface_flap_recovery"
    enabled: true
    priority: 8
    auto_execute: false
    requires_approval: true
    conditions:
      - metric: "interface_errors"
        operator: ">="
        threshold: 500
      - metric: "packet_loss_percent"
        operator: ">="
        threshold: 10
    action:
      type: "interface_bounce"
      target: "interface"
      parameters:
        interface: "Ethernet1/2"
    estimated_duration_seconds: 30
    risk_level: "low"

  - name: "packet_loss_alert"
    enabled: true
    priority: 3
    auto_execute: true
    requires_approval: false
    conditions:
      - metric: "packet_loss_percent"
        operator: ">="
        threshold: 25
    action:
      type: "alert_only"
      target: "none"
    estimated_duration_seconds: 0
    risk_level: "info"

guardrails:
  rate_limiter:
    enabled: true
    max_actions_per_hour: 5
    window_minutes: 60
  
  rollback_trigger:
    enabled: true
    health_degradation_threshold: -10.0
    monitor_duration_seconds: 300
  
  change_window:
    enabled: true
    start_hour_utc: 2
    end_hour_utc: 6
    allow_override: true
    override_requires_acknowledgment: true

notifications:
  slack:
    enabled: false
    webhook_url: "https://hooks.slack.com/services/..."
    channels:
      - "network-ops"
  
  email:
    enabled: false
    recipients:
      - "noc@company.com"
    on_events:
      - "remediation_started"
      - "remediation_failed"
      - "guardrail_violation"
  
  pagerduty:
    enabled: false
    integration_key: "..."
    severity_threshold: "critical"

logging:
  level: "INFO"
  file_path: "/var/log/self-healing-network.log"
  max_size_mb: 100
  retention_days: 30
  audit_trail: true
