version: '3.8'

services:
  self-healing-network:
    build: ..
    container_name: shn-main
    ports:
      - "8000:8000"
    environment:
      LOG_LEVEL: INFO
      ENABLE_AUTO_REMEDIATION: "true"
      GUARDRAIL_MODE: "strict"
    volumes:
      - ./policies.yaml:/app/config/policies.yaml
      - ./settings.py:/app/config/settings.py
      - logs:/app/logs
    networks:
      - shn-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: shn-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - shn-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana:latest
    container_name: shn-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - shn-network
    depends_on:
      - prometheus

volumes:
  logs:
  prometheus_data:
  grafana_data:

networks:
  shn-network:
    driver: bridge
