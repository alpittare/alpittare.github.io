groups:
  - name: incident_correlation_rca
    interval: 30s
    rules:
      # Service Health Alerts
      - alert: IncidentCorrelationServiceDown
        expr: up{job="incident-correlation"} == 0
        for: 2m
        labels:
          severity: critical
          component: service
        annotations:
          summary: "Incident Correlation RCA service is down"
          description: "{{ $labels.instance }} has been unreachable for 2 minutes"

      - alert: IncidentCorrelationResponseTimeHigh
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="incident-correlation"}[5m])) > 3.5
        for: 5m
        labels:
          severity: warning
          component: performance
        annotations:
          summary: "Incident Correlation response time exceeds threshold"
          description: "P95 latency is {{ $value }}s (threshold: 3.5s)"

      # Resource Alerts
      - alert: IncidentCorrelationCPUHigh
        expr: rate(process_cpu_seconds_total{job="incident-correlation"}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
          component: resource
        annotations:
          summary: "Incident Correlation CPU usage high"
          description: "CPU usage is {{ $value }}% (threshold: 80%)"

      - alert: IncidentCorrelationMemoryHigh
        expr: process_resident_memory_bytes{job="incident-correlation"} / 1e9 > 4.0
        for: 5m
        labels:
          severity: warning
          component: resource
        annotations:
          summary: "Incident Correlation memory usage high"
          description: "Memory usage is {{ $value }}GB (threshold: 4.0GB)"

      - alert: IncidentCorrelationDiskHigh
        expr: node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"} < 0.1
        for: 5m
        labels:
          severity: warning
          component: resource
        annotations:
          summary: "Incident Correlation disk space low"
          description: "Disk usage is {{ $value | humanizePercentage }} (threshold: 90%)"

      # ML-Specific Alerts
      - alert: IncidentCorrelationPredictionLatencyHigh
        expr: histogram_quantile(0.99, rate(prediction_latency_seconds_bucket{job="incident-correlation"}[5m])) > 4
        for: 5m
        labels:
          severity: warning
          component: ml
        annotations:
          summary: "Prediction latency exceeds SLA"
          description: "P99 latency is {{ $value }}s (SLA: 4s)"

      - alert: IncidentCorrelationModelDriftDetected
        expr: increase(model_drift_detected_total{job="incident-correlation"}[1h]) > 0
        for: 5m
        labels:
          severity: warning
          component: ml
        annotations:
          summary: "Model drift detected"
          description: "Model distribution has shifted significantly"

      - alert: IncidentCorrelationAccuracyDegraded
        expr: model_accuracy{job="incident-correlation"} < 0.87
        for: 10m
        labels:
          severity: warning
          component: ml
        annotations:
          summary: "Model accuracy degraded"
          description: "Current accuracy is {{ $value }} (baseline: 0.87)"

      # Business Logic Alerts - UC5 Specific
      - alert: IncidentCorrelationAlarmStorm
        expr: rate(alarms_received_total{job="incident-correlation"}[1m]) > 100
        for: 2m
        labels:
          severity: critical
          component: business_logic
        annotations:
          summary: "Alarm storm detected"
          description: "Alarm rate is {{ $value }}/sec (threshold: 100/min = 1.67/sec)"

      - alert: IncidentCorrelationClusterExplosion
        expr: dbscan_cluster_count{job="incident-correlation"} > 1000
        for: 5m
        labels:
          severity: warning
          component: business_logic
        annotations:
          summary: "DBSCAN cluster explosion detected"
          description: "Number of clusters is {{ $value }} (threshold: 1000)"

      - alert: IncidentCorrelationRCATimeout
        expr: increase(rca_timeout_total{job="incident-correlation"}[5m]) > 5
        for: 5m
        labels:
          severity: warning
          component: business_logic
        annotations:
          summary: "RCA analysis timeout detected"
          description: "{{ $value }} timeouts in 5 minutes (threshold: 5)"

      - alert: IncidentCorrelationLowConfidence
        expr: histogram_quantile(0.5, rate(correlation_confidence_bucket{job="incident-correlation"}[5m])) < 0.6
        for: 10m
        labels:
          severity: warning
          component: business_logic
        annotations:
          summary: "RCA correlation confidence low"
          description: "Median confidence is {{ $value }} (threshold: 0.6)"
