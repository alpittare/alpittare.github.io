version: '3.9'

services:
  # InfluxDB - Time-Series Database
  influxdb:
    image: influxdb:2.7.3
    container_name: capacity-influxdb
    environment:
      INFLUXDB_DB: network_intelligence
      INFLUXDB_ADMIN_USER: admin
      INFLUXDB_ADMIN_PASSWORD: admin123
      INFLUXDB_HTTP_AUTH_ENABLED: "true"
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - capacity-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka - Message Queue
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: capacity-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    ports:
      - "2181:2181"
    networks:
      - capacity-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: capacity-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    ports:
      - "9092:9092"
    networks:
      - capacity-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:10.2.0
    container_name: capacity-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb
    networks:
      - capacity-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus - Metrics (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: capacity-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - capacity-network

  # Capacity Intelligence API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: capacity-api
    ports:
      - "8000:8000"
    environment:
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-my-token}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-my-org}
      INFLUXDB_BUCKET: network_intelligence
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      LOG_LEVEL: INFO
      DEBUG: "false"
    depends_on:
      influxdb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./models:/app/models
    networks:
      - capacity-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NetFlow Collector (Optional)
  netflow-collector:
    build:
      context: .
      dockerfile: Dockerfile.collector
    container_name: capacity-netflow-collector
    ports:
      - "2055:2055/udp"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      LISTEN_PORT: 2055
      LOG_LEVEL: INFO
    depends_on:
      - kafka
    networks:
      - capacity-network

volumes:
  influxdb-data:
  grafana-data:
  prometheus-data:

networks:
  capacity-network:
    driver: bridge

# Commands:
# docker-compose up -d              # Start all services
# docker-compose down               # Stop all services
# docker-compose logs -f api        # View API logs
# docker-compose ps                 # Show running services
