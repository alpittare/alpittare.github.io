apiVersion: v1
kind: Namespace
metadata:
  name: cmi-naap

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: predictive-capacity-config
  namespace: cmi-naap
data:
  LOG_LEVEL: "INFO"
  SERVICE_PORT: "8004"
  ENVIRONMENT: "staging"
  MODEL_PATH: "/models"
  TIMESERIES_DB: "prometheus:9090"
  PROMETHEUS_ENABLED: "true"
  METRICS_PORT: "9090"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: predictive-capacity-intelligence
  namespace: cmi-naap
  labels:
    app: predictive-capacity-intelligence
    component: ai-ml
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: predictive-capacity-intelligence
  template:
    metadata:
      labels:
        app: predictive-capacity-intelligence
    spec:
      containers:
      - name: predictive-capacity-intelligence
        image: ghcr.io/cmi/predictive-capacity-intelligence:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8004
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        envFrom:
        - configMapRef:
            name: predictive-capacity-config
        resources:
          requests:
            cpu: 1500m
            memory: 2Gi
          limits:
            cpu: 4000m
            memory: 4Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8004
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

---
apiVersion: v1
kind: Service
metadata:
  name: predictive-capacity-intelligence
  namespace: cmi-naap
  labels:
    app: predictive-capacity-intelligence
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8004
    targetPort: 8004
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: predictive-capacity-intelligence

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: predictive-capacity-intelligence-hpa
  namespace: cmi-naap
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: predictive-capacity-intelligence
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: predictive-capacity-intelligence-network-policy
  namespace: cmi-naap
spec:
  podSelector:
    matchLabels:
      app: predictive-capacity-intelligence
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: cmi-naap
    ports:
    - protocol: TCP
      port: 8004
    - protocol: TCP
      port: 9090
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: cmi-naap
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
