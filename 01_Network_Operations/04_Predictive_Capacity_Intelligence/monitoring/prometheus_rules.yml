groups:
  - name: predictive_capacity_intelligence
    interval: 30s
    rules:
      # Service Health Alerts
      - alert: PredictiveCapacityServiceDown
        expr: up{job="predictive-capacity"} == 0
        for: 2m
        labels:
          severity: critical
          component: service
        annotations:
          summary: "Predictive Capacity Intelligence service is down"
          description: "{{ $labels.instance }} has been unreachable for 2 minutes"

      - alert: PredictiveCapacityResponseTimeHigh
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="predictive-capacity"}[5m])) > 2.5
        for: 5m
        labels:
          severity: warning
          component: performance
        annotations:
          summary: "Predictive Capacity response time exceeds threshold"
          description: "P95 latency is {{ $value }}s (threshold: 2.5s)"

      # Resource Alerts
      - alert: PredictiveCapacityCPUHigh
        expr: rate(process_cpu_seconds_total{job="predictive-capacity"}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
          component: resource
        annotations:
          summary: "Predictive Capacity CPU usage high"
          description: "CPU usage is {{ $value }}% (threshold: 80%)"

      - alert: PredictiveCapacityMemoryHigh
        expr: process_resident_memory_bytes{job="predictive-capacity"} / 1e9 > 3.0
        for: 5m
        labels:
          severity: warning
          component: resource
        annotations:
          summary: "Predictive Capacity memory usage high"
          description: "Memory usage is {{ $value }}GB (threshold: 3.0GB)"

      - alert: PredictiveCapacityDiskHigh
        expr: node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"} < 0.1
        for: 5m
        labels:
          severity: warning
          component: resource
        annotations:
          summary: "Predictive Capacity disk space low"
          description: "Disk usage is {{ $value | humanizePercentage }} (threshold: 90%)"

      # ML-Specific Alerts
      - alert: PredictiveCapacityForecastDrift
        expr: abs(forecast_accuracy{job="predictive-capacity"} - avg_over_time(forecast_accuracy{job="predictive-capacity"}[7d])) > 0.15
        for: 5m
        labels:
          severity: warning
          component: ml
        annotations:
          summary: "Forecast accuracy drift detected"
          description: "Drift magnitude is {{ $value }} (threshold: 0.15)"

      - alert: PredictiveCapacityPredictionLatencyHigh
        expr: histogram_quantile(0.99, rate(prediction_latency_seconds_bucket{job="predictive-capacity"}[5m])) > 3
        for: 5m
        labels:
          severity: warning
          component: ml
        annotations:
          summary: "Prediction latency exceeds SLA"
          description: "P99 latency is {{ $value }}s (SLA: 3s)"

      - alert: PredictiveCapacityModelDriftDetected
        expr: increase(model_drift_detected_total{job="predictive-capacity"}[1h]) > 0
        for: 5m
        labels:
          severity: warning
          component: ml
        annotations:
          summary: "Model drift detected"
          description: "Model distribution has shifted significantly"

      - alert: PredictiveCapacityAccuracyDegraded
        expr: model_accuracy{job="predictive-capacity"} < 0.88
        for: 10m
        labels:
          severity: warning
          component: ml
        annotations:
          summary: "Model accuracy degraded"
          description: "Current accuracy is {{ $value }} (baseline: 0.88)"

      # Business Logic Alerts - UC4 Specific
      - alert: PredictiveCapacityForecastDriftCritical
        expr: abs(forecast_accuracy{job="predictive-capacity"} - avg_over_time(forecast_accuracy{job="predictive-capacity"}[7d])) > 0.25
        for: 5m
        labels:
          severity: critical
          component: business_logic
        annotations:
          summary: "Forecast drift exceeds critical threshold"
          description: "Drift is {{ $value }} (critical threshold: 0.25)"

      - alert: PredictiveCapacityBreachPrediction
        expr: increase(capacity_breach_predictions_total{job="predictive-capacity"}[1h]) > 10
        for: 5m
        labels:
          severity: critical
          component: business_logic
        annotations:
          summary: "High number of capacity breach predictions"
          description: "{{ $value }} breach predictions in 1 hour (threshold: 10)"

      - alert: PredictiveCapacityLSTMTrainingFailure
        expr: increase(lstm_training_failures_total{job="predictive-capacity"}[5m]) > 1
        for: 5m
        labels:
          severity: critical
          component: business_logic
        annotations:
          summary: "LSTM model training failure"
          description: "{{ $value }} training failures detected"

      - alert: PredictiveCapacityForecastAccuracyLow
        expr: forecast_accuracy{job="predictive-capacity"} < 0.82
        for: 10m
        labels:
          severity: warning
          component: business_logic
        annotations:
          summary: "Forecast accuracy critically low"
          description: "Current accuracy is {{ $value }} (threshold: 0.82)"
