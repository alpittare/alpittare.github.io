<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" role="img" aria-labelledby="bannerTitle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif">
  <title id="bannerTitle">Vibe coder shipping production AI + ML — Launching FastAI Health Coach this week — exafabs.ai</title>

  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B2FBE"/>
      <stop offset="50%" stop-color="#C94080"/>
      <stop offset="100%" stop-color="#F5943A"/>
    </linearGradient>
    <linearGradient id="bgFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#240331"/>
      <stop offset="100%" stop-color="#1a0226"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bgFade)"/>

  <!-- Brand accent line on left -->
  <rect x="0" y="0" width="6" height="396" fill="url(#brand)"/>

  <!-- Subtle architecture pattern (right side, low opacity) -->
  <g opacity="0.18">
    <rect x="1100" y="60" width="120" height="44" rx="6" fill="none" stroke="#7B2FBE" stroke-width="1.5"/>
    <rect x="1260" y="60" width="120" height="44" rx="6" fill="none" stroke="#7B2FBE" stroke-width="1.5"/>
    <rect x="1420" y="60" width="120" height="44" rx="6" fill="none" stroke="#7B2FBE" stroke-width="1.5"/>

    <rect x="1100" y="170" width="440" height="60" rx="6" fill="none" stroke="url(#brand)" stroke-width="2"/>

    <rect x="1100" y="290" width="200" height="44" rx="6" fill="none" stroke="#7B2FBE" stroke-width="1.5"/>
    <rect x="1340" y="290" width="200" height="44" rx="6" fill="none" stroke="#7B2FBE" stroke-width="1.5"/>

    <line x1="1160" y1="104" x2="1160" y2="170" stroke="#C94080" stroke-width="1"/>
    <line x1="1320" y1="104" x2="1320" y2="170" stroke="#C94080" stroke-width="1"/>
    <line x1="1480" y1="104" x2="1480" y2="170" stroke="#C94080" stroke-width="1"/>
    <line x1="1200" y1="230" x2="1200" y2="290" stroke="#C94080" stroke-width="1"/>
    <line x1="1440" y1="230" x2="1440" y2="290" stroke="#C94080" stroke-width="1"/>
  </g>

  <!-- Tagline label -->
  <text x="60" y="78" fill="#F5943A" font-size="16" font-weight="700" letter-spacing="3">VIBE  CODER  ·  BUILDING  IN  PUBLIC</text>

  <!-- Main headline -->
  <text x="60" y="148" fill="#ffffff" font-size="50" font-weight="800">Shipping production AI + ML</text>
  <text x="60" y="200" fill="#ffffff" font-size="50" font-weight="800">with Claude as my pair programmer</text>

  <!-- Brand gradient line -->
  <rect x="60" y="222" width="380" height="3" fill="url(#brand)"/>

  <!-- Subline 1: launch -->
  <text x="60" y="262" fill="#fad7ff" font-size="22" font-weight="600">Launching FastAI Health Coach this week</text>
  <text x="60" y="290" fill="#8a7a94" font-size="17">AI fasting coach · cross-session memory · meal photo nutrition · per-user ML</text>

  <!-- Subline 2: stack credentials -->
  <text x="60" y="334" fill="#fad7ff" font-size="15" font-weight="600">Stack</text>
  <text x="115" y="334" fill="#8a7a94" font-size="15">Claude Sonnet 4 + Vision · Voyage embeddings · Convex · React Native (Expo) · RevenueCat · Clerk</text>

  <!-- Footer link -->
