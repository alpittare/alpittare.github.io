name: Web Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  web_deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Build web app
      - name: Build web application
        env:
          VITE_CONVEX_URL: ${{ secrets.CONVEX_URL }}
          VITE_SUPERWALL_API_KEY: ${{ secrets.SUPERWALL_API_KEY }}
          VITE_ENVIRONMENT: production
        run: npm run build
        continue-on-error: false

      # Upload build artifacts for inspection
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: web-build
          path: dist/
          retention-days: 7
          if-no-files-found: warn

      # Deploy to Vercel
      - name: Deploy to Vercel
        id: vercel-deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          npm install -g vercel
          DEPLOYMENT_URL=$(vercel deploy \
            --token "$VERCEL_TOKEN" \
            --prod)
          echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOYMENT_URL"

      # Run smoke tests
      - name: Smoke test
        run: |
          # Wait for deployment to be ready
          sleep 10

          # Check if app is accessible
          curl -f "${{ steps.vercel-deploy.outputs.deployment_url }}" \
            || (echo "Deployment health check failed" && exit 1)

          # Verify key endpoints
          curl -f "${{ steps.vercel-deploy.outputs.deployment_url }}/api/health" \
            || echo "Health check endpoint not available (optional)"

      # Create GitHub deployment
      - name: Create deployment record
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              production_environment: true,
              description: 'Web app deployed to Vercel',
              auto_merge: false
            })

      # Notify Slack on success
      - name: Notify Slack success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Web Deployment Successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Web App Deployed Successfully*\nURL: ${{ steps.vercel-deploy.outputs.deployment_url }}\nRef: ${{ github.ref }}"
                  }
                }
              ]
            }

      # Notify Slack on failure
      - name: Notify Slack failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Web Deployment Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Web App Deployment Failed*\nRef: ${{ github.ref }}\nCheck logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }

  # PR Preview Deployment (for pull requests only)
  preview_deploy:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for preview
        env:
          VITE_CONVEX_URL: ${{ secrets.CONVEX_URL }}
          VITE_SUPERWALL_API_KEY: ${{ secrets.SUPERWALL_API_KEY }}
          VITE_ENVIRONMENT: staging
        run: npm run build

      - name: Deploy preview to Vercel
        id: preview-deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          npm install -g vercel
          PREVIEW_URL=$(vercel deploy \
            --token "$VERCEL_TOKEN")
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🔍 Preview deployed: ${{ steps.preview-deploy.outputs.preview_url }}'
            })
